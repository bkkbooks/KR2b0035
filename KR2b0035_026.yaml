body:
  text: 大事記續編卷二十六明王禕撰晉孝惠皇帝元康元年春正月乙酉朔改元永平以本紀修解題曰宋庠紀年通譜永平漢明帝年號二月癸酉楚王瑋淮南王允來朝三月辛卯皇后遣殿中兵殺楊駿兄弟其黨皆夷三族解題曰晉二衛始制前驅由基強弩為三部司馬二衛各五部督其衛鎮四軍如五校各置千人更置殿中將軍中郎校尉司馬武帝甚重兵官軍校多選清望之士居之以陳協為殿中將軍每出入持白獸幡在乘輿左右誅駿之謀實起於殿中中郎孟觀李肇又命東安公繇帥殿中兵四百人討駿殿中兵制大略可見矣壬辰改元解題曰宋庠紀年通譜元康漢宣帝年號廢皇太后楊氏為庶人徙之金墉城解題曰按太平寰宇記宋敏求河南志金墉城在故洛陽城西北角魏所築晉惠帝曰永昌宫有小城永嘉兵亂築為壘餘見通鑑壬寅汝南王亮為太宰與衛瓘並録尚書事鎮南將軍楚王瑋為衛將軍領北軍中候論誅駿功侯者千餘人解題曰時亮輔政御史中丞傅咸致書曰駿之見討發自天聰孟觀李肇與知密言耳聖上論功寧厚此羣下所冝以實裁量而遂東安封王孟李郡公侯伯子男既妄有加復又三等超遷自古以來封賞未有若此者也無功而厚賞莫不樂國有禍禍起當復有大功也人而樂禍其可極乎厥後楚王瑋之誅亮瓘趙王倫之廢賈后以至齊王長沙成都河間東海之更相魚肉皆樂禍而為之咸之言不誣也事見通鑑夏六月皇后使楚王瑋殺亮瓘乙丑復殺瑋以紀傳修車騎司馬賈模為侍中散騎常侍張華為侍中中書監將軍裴頠為侍中輔政以通鑑目録修秋七月分荆揚州為江州以本紀修解題曰有司奏荆揚二州疆土曠逺於是割揚州之豫章鄱陽廬陵臨川南康建安晉安荆州之武昌桂陽安成合十郡置江州晉孝惠皇帝元康二年春二月己酉弒故太后楊氏以吕祖謙標目修晉孝惠皇帝元康三年夏六月𢎞農雨雹深三尺以本紀修甲寅晉孝惠皇帝元康四年夏五月胸奴郝散反秋八月伏誅以吕祖謙標目修是歲大飢山崩地震陷水涌以本紀舉要歷補遺修晉孝惠皇帝元康五年夏四月彗星見于西方孛于奎至軒轅以本紀修六月東海雨雹深五尺本紀冬十月武庫火十二月丙戌新作之以本紀修是歲大水以本紀修鮮卑拓跋氏分其國為三部以舉要歷補遺修晉孝惠皇帝元康六年春正月地震以舉要歷補遺修張華為司空以紀傳修夏胸奴羌胡俱反征西大將軍梁王肜都督雍梁州軍事秋八月氐帥齊萬年稱帝冬十一月遣將軍周處等討之以紀傳修關中飢疫以本紀修十二月略陽氐楊茂搜還保仇池以吕祖謙標目修解題曰仇池見梁天監五年東益州解題是嵗以將軍趙廞為益州刺史以吕祖謙標目修解題曰此亂蜀之始也晉孝惠皇帝元康七年春正月梁王肜逼周處攻齊萬年癸丑戰于六陌死之以紀傳修解題曰按列傳時賊屯梁山周處攻萬年於六陌蓋近梁山符登自六陌以趨廢橋魏元志發雍從六陌道將取高平亦此地也梁山在京兆府奉天縣秋七月雍梁旱疫以本紀修九月右僕射王戎為司徒時尚書令王衍河南尹樂廣皆為清談朝野慕之以紀傳修解題曰宗書五行志元康中貴逰子弟相與為散髮祼身之飲對弄婢妾逆之者傷好非之者負譏希世之士恥不與焉蓋胡翟侵中國之萌也豈徒伊川之民一被髮而祭者乎蘇轍曰易曰形而上者謂之道形而下者謂之器禮與形皆器也孔子生於周末其言及於道蓋寡非不能言謂道之不可以輕授人也夫道以無為體而入於羣有在仁而非仁在義而非義在禮而非禮在智而非智惟其非形器也故目不可以視而見耳不可以聽而知惟君子得之於心以之御物應變無方而不適其正則所謂時中也小人不知而竊其名與物相遇輒捐理而徇欲則所謂無忌憚也故孔子不以道與人其所以語人者必以禮非吝之也蓋曰君子上達小人下達君子由禮以達其道則自得而不眩小人由禮以達其器則有守而不狂若規之以禮而不格然後導之刑辟而聖人之所以御物者盡矣魏晉虛無放蕩之論盈於朝野何鄧導其源阮籍父子漲其流而王衍兄弟卒以亂天下要其終皆以濟邪佞成淫欲惡禮法之繩其姦故蔑棄禮法而以道自命小人便之君臣奢縱於上男女淫佚於下風俗大壞至於中原為墟而不悟相隨渡江而此風不改世無孔孟使楊墨塞路而莫之闢悲夫事見通鑑裴頠深患時俗放蕩不遵儒術何晏阮籍素有高名於世口談虛浮不遵禮法尸祿耽寵仕不事事至王衍之徒聲譽大盛位高勢重不以物務自嬰遂相放效風俗陵遲乃著崇有之論以釋其弊胡寅曰老莊之學見周末文勝人皆從事於儀物度數而不復有誠信為之主故欲掃除弊迹以趨乎本真而矯枉太過立言有失玄虛幽眇不切事情遂使末流遺略禮法忽棄實德浮遊波蕩其為世害更甚於文之滅質也故孔子曰中庸之為德其至矣乎夫物有形者也事有迹者也理則無形迹可窺而有小大長短輕重是非得失可揆者也無形迹可窺謂之有不可也有小大長短輕重是非得失可揆謂之無不可也何晏之論見於無遂以空為宗而遺失形而下者裴頠之論見於有遂以形器為執而遺失形而上者皆不知理之言也誠知理矣冝有則有烏能強之使無宜無則無烏能強之使有形器森列不足為空虛之纍空虛寥廓未嘗為形器之拘雖無思無為而天下之故未嘗不應雖開物成務而寂然之易未嘗有擾也此則聖人之正道也拓跋猗色西略降三十餘國以通鑑目録修晉孝惠皇帝元康八年秋九月大水以本紀修巴氐李特與略陽六郡流民入蜀以吕祖謙標目修晉孝惠皇帝元康九年春正月將軍孟觀討齊萬年大破擒之太子洗馬江統論徙戎不聽以紀傳修解題曰葉適曰江統徙戎論敘上世事雖略已得其理敘兩漢事極詳不獨漢魏人能為此議論者絶無而能知此本末者絶少也漢宣光魏武號為有識然皆身以戎狄之患遺後使其國尚未亡則子孫自當之蓋天下利害國家大體思患預防非聖人不能也何去非曰晉之亡大率中原半為夷居元海胸奴也而居晉陽石勒羯人也而居上黨姚氏羌也而居扶風符氏氐也而居臨渭慕容鮮卑也而居昌黎種族日繁其居處飲食皆趨華矣而其桀暴貪悍樂鬭喜亂之志態則無時而變也是以元海一倡而并雍之胡乘時四起自長淮之北無復晉土而為戰國者幾二百年事見通鑑成都王頴為平北將軍鎮鄴河間王顒為鎮西將軍鎮關中以本紀修夏六月賈模卒以吕祖謙標目修秋八月尚書裴頠為僕射以本紀修冬十一月甲子朔日有食之以本紀修十二月壬戌廢太子遹為庶人以本紀修解題曰葉適曰劉卞狂謀欲以子脅父而廢其母此非權道之所許張華拒之是也及愍懷既廢衆怒集於賈后華於是時以人主命廢后復太子以安人情此權道之所許也猶且安常襲故既不能去復不能謀坐視倫秀成其逆節大柄外移身既夷滅而國亡遂不可救可哀也夫事見通鑑晉孝惠皇帝永康元年春正月癸亥朔改元以本紀修解題曰宋庠紀年通譜永康漢桓帝年號西戎校尉司馬閻纘上書訟故太子寃不省以通鑑修解題曰李遘曰纘訟太子之枉太孫立復上疏焉夫以惠帝之愚賈后之賊安能聽言曰上聽言人誰不敢言佳哉纘也是難能也其言欲使著令諸有廢興倉卒東宫兵馬皆得輒嚴須録詣殿前面授口詔然後為信聽其臣子得如邴吉拒詔書周昌不遣王田叔孟舒隱親左右所以固儲副安後嗣諒哉人主有喜怒宫掖多姦詐怒解而後悔詐行而後覺無及矣如纘豈一世之言萬世之言也事見通鑑三月尉氏雨血妖星見南方太白晝見中台星拆以天文志修殺故太子遹以本紀修夏四月辛卯朔日有食之以本紀修癸巳右軍將軍趙王倫廢皇后賈氏為庶人殺張華裴頠等侍中賈謐及黨與皆誅解題曰倫矯詔敕三部司馬中宫與賈謐等殺吾太子今使車騎入廢中宫汝等皆當從命賜爵關中侯不從誅及三族衆皆從之倫又矯詔開門夜入陳兵道南遣翊軍校尉齊王冏將三部司馬百人排閣而入華林令駱休為內應迎帝幸東堂遂廢賈后為庶人幽之于建始殿餘見通鑑倫將篡位使左衛王輿前軍司馬稚等率甲士入殿譬喻三部司馬示以威賞王輿反秀率宫兵七百餘人自南掖門入敕宫中兵各守衛諸門三部為應於內輿斬孫秀等三部司馬於宣化闥中斬孫弼成都王頴攻長沙王乂乂固守洛陽殿中諸將及三部司馬疲於戰守密與左衛將軍朱默夜收乂别省東海王越以頃興事多由殿省乃奏宿衛有侯爵者皆罷之時殿中武官皆封侯由是出者略盡甲午倫自為都督中外軍事相國侍中孫秀為中書令追復故太子遹己亥殺庶人賈氏五月己巳立臨淮王臧為皇太孫秋八月中護軍淮南王允討倫不克見殺遊擊將軍齊王冏為平東將軍鎮許昌倫自加九錫吏部尚書劉須止之不可以紀傳吕祖謙標目修解題曰倫加九錫加世子荂撫軍將軍領軍將軍馥鎮軍將軍領護軍將軍虔中軍將軍領右衛將軍翊為侍中增相府兵為二萬人與宿衛同又隱匿兵士衆三萬餘見通鑑薛季宣曰晉武懲創魏氏內強宿衛領之貴戚外削州牧統於宗藩未幾宗王橫肆而宿衛散於私府禁衛單虛而州牧轉為強鎮是以關門無結草之固晉陽有屢舉之甲欲強而反弱將削而滋大者何哉事不師古急於矯弊崇私廢公而患生於所偏也冬十一月甲子立皇后羊氏以本紀修詔徴趙廞廞反以李特等為爪牙十二月趙廞自稱大都督益州牧以本紀載記修晉孝惠皇帝永寧元年解題曰宋庠紀年通譜建始漢成帝年號春正月以散騎常侍張軌為涼州刺史以列傳修乙丑趙王倫自即帝位改元建始丙寅廢帝為太上皇遷之金墉城廢皇太孫臧為濮陽王孫秀為侍中中書監儀同三司癸酉殺臧以紀傳修李特攻成都殺趙廞詔以梁州刺史羅尚為益州刺史以紀傳修解題曰此十六國亂之始也三月鎮東大將軍齊王冏起兵討倫征北大將軍成都王頴征西大將軍河間王顒等應之以本紀修閏月丙戌朔日有食之以本紀修自正月至於是月五星縱橫無常以通鑑修夏四月成都王頴大破倫兵于溴水解題曰按杜預左氏傳注溴水出河內軹縣東南至溫入河水經注溴水南徑原城西春秋會于溴梁謂是水之梁也辛酉左衛將軍王輿等誅孫秀帝復位癸亥改元丁卯倫父子伏誅以本紀修成都王頴至己巳河間王顒至以通鑑修五月立襄陽王尚為皇太孫以本紀修六月乙卯齊王冏至甲戌以冏為大司馬如宣文輔魏故事成都王頴為大將軍都督中外諸軍録尚書事並加九錫河間王顒為侍中太尉頴辭九錫還鄴以紀傳通鑑修東萊王𬎼與王輿謀廢齊王冏秋八月廢㽔為庶人誅輿三族以列傳修九月以李特及其弟流為將軍羅尚逼遣流民皆歸特冬十月特據廣漢攻尚以本紀紀載紀吕祖謙標目修晉孝惠皇帝太安元年解題曰宋庠紀年通譜誅齊王故改元春二月太孫尚薨以通鑑目録修夏四月彗星畫見以本紀修五月李特自稱大將軍益州牧以載紀修癸卯以清河王遐子覃為皇太子本紀秋七月大水以本紀修八月廣漢太守張微討李特敗死羅尚遣軍擊之亦敗以通鑑修冬十月地震本紀十一月丙戌復置寧州以吕祖謙標目修河間王顒起兵攻齊王冏十二月驃騎將軍長沙王乂殺冏改元乂為太尉都督中外軍事朝政皆咨成都王頴以本紀吕祖謙標目修是嵗陳留王薨諡曰魏元皇帝以通鑑修晉孝惠皇帝太安二年成始祖皇帝李特建初元年春正月李特據少城改元羅尚保太城二月襲特斬之李流領餘衆攻成都以載記修解題曰宋庠紀年通譜建初漢成帝年號太城在城都府華陽縣張儀所築謂之儀城築少城於其西成都縣治也夏五月義陽蠻張昌據江夏改元殺荆州都督新野王歆詔以荆州刺史劉𢎞都督荆州軍事秋七月昌黨石冰冦揚州據荆江揚豫徐五州境𢎞遣大都護陶侃討昌八月走之以吕祖謙標目修解題曰周端朝曰河南淮北諸郡不聞蠻擾魏晉始有之亦二漢末造所有也事見通鑑河間王顒成都王頴起兵攻長沙王乂帝討頴九月顒將張方大掠都城以本紀修解題曰永寧之初洛中尚有錦帛四百萬珠寶金銀百餘斛惠后北征蕩隂反駕布衾兩幅囊錢三千以為車駕之資而已餘見通鑑李流死李雄為大都督治郫城以通鑑修冬十月壬寅帝還宫戊申長沙王乂奉帝敗成都王頴將陸機於建春門又攻張方敗之以紀傳修解題曰宋敏求河南志都城十二門南面四門曰平昌門漢之平城門開陽門宣陽門漢之小苑門建陽門漢之津門東面三門曰清明門漢之宣平門東陽門漢之中東門建春門漢之上東門一曰上升門西面三門曰廣陽門西明門閶闔門漢之西門也北面二門曰廣莫門漢之榖門大夏門漢之夏門十二月議郎周玘等起兵討石氷以列傳修閏月李雄攻羅尚走之入成都以通鑑目録修幽州都督王浚表鮮卑假務勿塵為遼西公以本紀修甲子晉孝惠皇帝永興元年漢光武皇帝劉淵元熙元年成武皇帝李雄建興元年春正月癸亥司空東海王越執長沙王乂改元永安丙寅張方殺乂而還以紀傳修解題曰通鑑闕永安二字成都王頴入京師復還鄴以為丞相東海王越加尚書令以通鑑修解題曰按宋書百官志漢獻帝復置丞相魏及晉初又廢趙王倫以梁王肜為丞相永興元年以頴為丞相詔羅尚權統巴涪以吕祖謙標目修解題曰統巴東已郡涪陵涪陵今涪州餘見通鑑二月乙酉廢皇后及皇太子覃以通鑑修廣陵度支陳敏與周玘破石氷于建康三月氷伏誅以吕祖謙標目修戊申以成都王頴為皇太弟居鄴河間王顒為太宰雍州牧解題曰宋書五行志惠帝立頴為皇太弟猶加侍中大都督領丞相備九錫封二十郡如魏王故事既為副職不應復開封土兼領庶職此言之不從帝既播越頴亦不終事見通鑑秋七月丙申朔東海王越奉帝討頴戊戌復皇后皇太子己未帝敗于蕩隂侍中嵇紹死之解題曰蕭方曰父母之讎不同天下兄弟之讎不同國嵇紹之於晉室有私讎矣天不可讎理無容報繼之以死何其過乎輕於鴻毛延祖之謂事見通鑑蕩隂即今相州湯隂縣蕩音湯因蕩水為名庚申帝幸鄴改元建武越奔歸國范陽王虓以北軍中候茍晞為兖州刺史王浚及并州刺史東嬴公騰起兵攻頴八月張方入洛陽廢皇后皇太子頴遣劉淵發五部攻浚淵自稱大單于浚騰大敗頴兵頴奉帝奔洛陽騰以拓拔猗色擊淵破之以紀傳通鑑修張昌伏誅以吕祖謙標目修冬十月李雄稱成都王改元以載記修解題曰宋庠紀年通譜建興劉禪孫亮年號劉淵即漢王位於左國城改元以載紀修解題曰漢離石縣屬西河郡後漢末廢為南單于左國城魏黃初三年復置後陷劉淵石勒改為永石郡通鑑考異曰通典離石有南單于庭左國城淵雖遷猶在離石縣境內也十一月乙未張方劫帝幸長安以本紀修尚書僕射荀藩為留臺承制年號永安辛丑復皇后以吕祖謙標目修十二月丁亥廢太弟頴以豫章王熾為皇太弟改元河間王顒都督中外軍事張方為中領軍録尚書事以紀傳修解題曰宋庠紀年通譜一年三易號永安吳孫休年號建武漢光武年號永興漢桓帝年號按惠帝九改元而六同漢年一用吳號紀年頒朔政之大者皆事出倉卒安襲曩名庸非天厭惠德趣衰啓亂俾發號施令皆前王之芻狗傳曰其壞不可支也斯之謂歟晉孝惠皇帝永興二年漢光文皇帝元熙二年成武皇帝太武元年春正月甲午朔帝出居于長安以本紀修夏四月張方廢皇后以本紀修解題曰羊后於是三廢矣河間王顒矯詔以后屢為姦人所立遣尚書田淑敕留臺賜后死詔書纍至司𨽻校尉劉暾與尚書僕射荀藩河南尹周馥馳奏曰羊庶人門戶殘破廢故空宫門禁峻密無緣得與姦人構亂衆無愚知皆謂不然陛下更深與太宰參詳勿令逺近疑惑取謗天下顒大怒遣收暾暾奔青州后遂免帝還洛迎后復位洛陽令何喬又廢后及張方首至其日復后位餘見通鑑葉適曰幽王之詩稱周宗既滅靡所止戾正大夫離居莫知我勩三事大夫莫肯夙夜邦君諸侯莫肯朝夕蓋是時幽王見殺太子外遷而其辟公貴人首鼠自便莫以傾覆為念故人怨刺之如此暾為留臺而能抗拒強臣存活廢后視是詩所稱過之逺矣六月成都王雄改元以載紀修秋七月東海王越領徐州都督起兵攻河間王顒成都王頴故將公師藩起兵於趙魏八月越以豫州刺史劉喬為兾州刺史范陽王虓領豫州刺史喬拒虓解題曰喬成都王之黨也虓東海王之黨也冀州統郡國十三趙宋慶源信德真定中山四府之地巨鹿慶源信德二府之地安平兾州之地平原安德東平信德三府慱州永靜軍之地樂陵棣濵滄三州之地勃海滄清兾恩四州永靜軍之地章武河間府霸莫滄三州之地河間河間府莫雄軍涿三州保定之地高陽保州永寧廣信安肅順安四軍之地慱陵深祁二州之地清河大名安德二府恩慱二州之地中山中山真定二府保州永寧軍之地常山真定中山二府之地壬子顒都督河北軍事冬十月劉𢎞請顒越釋怨不納喬襲許虓奔河北有星孛于北斗𢎞受東海王越節度十二月頴入洛陽虓領冀州刺史濟河擊頴將敗之喬衆潰以紀傳吕祖謙標目修右將軍陳敏反於歷陽據江東劉𢎞遣江夏太守陶侃討之以吕祖謙標目修是嵗漢王淵徙黎亭以通鑑修解題曰按後漢郡國志上黨郡壺關縣有黎亭故黎國晉孝惠皇帝光熙元年漢光文皇帝元熙三年成武皇帝晏平元年春正月戊子朔帝出居于長安日有食之以本紀修河間王顒殺張方請和於東海王越越不許成都王頴奔長安夏四月己巳越屯溫五月遣兵入長安顒頴走己亥帝還洛陽六月丙辰朔復皇后辛未改元顒復入長安以本紀通鑑修解題曰皇后三廢而三復矣成都王雄即帝位改元國號成以吕祖謙標目修秋七月乙酉朔日有食之以本紀修八月太傅東海王越録尚書事以本紀修九月頓邱太守馮嵩執成都王頴范陽王長史劉輿殺之以本紀修解題曰宋開德府清豐縣晉頓邱郡也兖州刺史茍晞斬公師藩以通鑑目録修冬十月以范陽王司馬劉琨為并州刺史以吕祖謙標目修十一月庚午東海王越弒帝解題曰按帝紀司馬越鴆之癸酉皇太弟熾即皇帝位尊皇后曰惠皇后立妃梁氏為皇后以本紀修十二月壬午朔日有食之以本紀修河間王顒就徴鎮南將軍南陽王模殺之以本紀通鑑修己酉葬孝惠皇帝于太陽陵以本紀修大事記續編卷二十六
