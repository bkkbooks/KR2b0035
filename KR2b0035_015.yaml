body:
  text: 大事記續編卷十五明王禕撰漢孝順皇帝陽嘉元年解題曰宋庠紀年通譜時災異數見水旱相仍故下詔改元陽嘉意欲陽道嘉休以消灾眚又陽以喻君道亦取君道之美云春正月乙巳立貴人梁氏為皇后以本紀修解題曰袁宏曰梁商女也竦中子雍生商商生三男四女次女即后也二月海賊寇㑹稽屯兵緣海縣以本紀修三月揚州妖賊寇四十九縣以本紀修庚寅帝臨辟雍饗射改元以本紀修夏乘氏侯梁商加特進以列傳修秋九月鮮卑寇遼東本紀冬尚書令左雄請孝廉年不滿四十郡國不得察舉其茂材異等者不拘從之雄公直精明陳蕃李膺陳球等三十餘人得拜郎中以本紀袁宏漢紀修解題曰雄上言郡國孝廉古之貢士出則宰民宣協風教若其面牆則無所施用孔子曰四十而不惑禮稱强仕請自今孝廉年不滿四十不得察舉皆請先詣公府諸生試家法文吏課箋奏副之端門練其虛實以觀異能以美風俗有不承科令者正其罪法若有茂才異行自可不拘年齒帝從之於是班下郡國明年有廣陵孝廉徐淑年未及舉臺郎疑而詰之對曰詔書曰有如顔回子竒不拘年齒是故本郡以臣充選郎不能屈雄詰之曰昔顔回聞一知十孝廉聞一知幾耶淑無以對乃遣却之於是濟隂太守胡廣等十餘人皆坐謬舉免黜唯汝南陳蕃頴川李膺下邳陳球等三十餘人得拜郎中自是牧守畏栗莫敢輕舉迄于永嘉察選清平多得其人餘見通鑑吕祖謙曰左雄限年之法但使諸生試經學文吏試章奏一切責之以課試而貢舉之漸興矣當時胡廣輩以為詔舉孝廉乃捐本而志末及魏氏遂立九品中正之法以名求之則中正之選豈不合古然其流弊之甚至於純任閥閲不論賢愚反不若左雄之法行之十年號稱得人范煜論曰古者諸侯嵗貢進士賢受上賞非賢貶爵土升之司馬辨論其才論定然後祿之故王者得其人進士勸其行經邦𢎞務所由久矣漢初詔舉賢良方正州郡察孝廉秀才斯亦貢士之方也中興以後復增敦朴有道賢能直言獨行髙節質直清白敦厚之屬榮路既廣觖望難裁自是竊名僞服浸以流競權門貴仕請謁繁興自左雄任事限年試才雖頗有不密固亦因識時宜而黃瓊胡廣張衡崔瑗之徒泥滯舊方互相詭駮循名者屈其短算實者挺其效故雄在尚書天下不敢妄選十餘年間稱為得人斯亦效實之徴乎順帝始以童弱反政而號令自出知能任使故士得用情天下喁喁仰其風采遂乃備𤣥纁玉帛以聘樊英天子降寢殿設壇席尚書奏引延問失得急登賢之舉虛降已之禮于是處士鄙生忘其拘儒拂巾衽褐以企旌車之招矣至乃英能承風俊乂咸事若李固周舉之淵謨𢎞深左雄黃瓊之政事貞固桓焉楊厚以儒學進崔瑗馬融以文章顯吳祐蘇章种皓欒巴牧民之良幹龎參虞詡將帥之宏規王龔張皓虛心以推士張綱杜喬直道以糾違郎顗隂陽詳密張衡機術特妙東京之士於兹盛焉向使廟堂納其髙謀疆場宣其智力帷幄容其謇辭舉措禀其成式則武宣之軌豈其逺而詩云靡不有初鮮克有終可為恨哉及孝桓之時碩德繼興陳蕃楊秉處稱賢宰皇甫張段出號名將王暢李膺彌縫衮闕朱穆劉陶獻替匡時郭有道奬鑒人倫陳仲弓𢎞道下邑其餘宏儒逺智髙心潔行激揚風流者不可勝言而斯道莫振文武陵墜在朝者以正議嬰戮謝事者以黨錮致災往車雖折而來軫方遒所以傾而未顛决而未潰豈非仁人君子心力之為乎十二月庚戍復置𤣥菟郡屯田六郡本紀閏月庚子恭陵百丈廡災本紀是嵗起西苑以本紀修漢孝順皇帝陽嘉二年三月使胸奴中郎將王稠率南胸奴兵擊鮮卑破之以本紀通鑑修封乳母宋娥為山陽君梁冀為襄邑侯冀父商陳讓許之以列傳袁宏漢紀修夏四月己亥京師地震五月庚子詔公卿直言舉敦朴之士左雄以為封爵不可以私人且言九卿不可捶自是始免捶撲以袁宏漢紀通鑑修戊午王龔免以本紀修六月丁丑洛陽地陷旱帝引敦朴之士對策以李固為第一即斥宋娥還舍諸常侍悉謝罪擢固議郎尋復出之以列傳修秋七月己未龐參免以本紀修八月鮮卑寇代郡其主鞬死抄盜差稀以列傳修漢孝順皇帝陽嘉三年夏四月丙寅車師後部司馬掩擊北胸奴大破之以本紀修秋七月鍾羌寇隴西漢陽冬十月護羌校尉馬續破之以本紀修漢孝順皇帝陽嘉四年春二月丙子初聽中官養子世襲爵以本紀通鑑修謁者馬賢擊鍾羌大破之以本紀修夏四月戊寅以梁商為大將軍龐參為太尉商辟李固為從事中郎以紀傳修解題曰張栻曰李固方舉於朝即就梁商之辟商雖未有顯過然如固之志業其進也將以正邦殆不可茍也一為之屬即涉梁氏賔客事必有所牽制此其失也秋閏八月丁亥朔日有食之以志及本紀修冬十月烏桓寇雲中十一月圍耿曄於蘭池發諸郡兵走之以本紀修解題曰續漢志雲中郡沙南縣有蘭池城漢孝順皇帝永和元年春正月己巳宗祀明堂登靈臺改元以本紀修解題曰詔曰朕秉政不明災眚屢臻典籍所忌震食為重今日變方逺東觀記日陽嘉四年詔朕以不德謫見于天零陵言日食京師不見地搖京師咎徴不虛必有所應羣公百僚其各上封事指陳得失靡有所諱然則改元以是故也冬十月丁亥承福殿火本紀十一月龐參免以本紀修十二月象林蠻反以本紀修乙巳王龔為太尉通鑑是嵗以執金吾梁冀為河南尹以列傳修漢孝順皇帝永和二年夏五月癸丑收宋娥山陽君印綬以列傳修發交趾九真兵救象林秋七月二郡兵反以本紀修冬十月甲申帝幸長安十一月祠陵廟十二月乙亥還宫以本紀修漢孝順皇帝永和三年春二月乙亥京師金城隴西地震二郡山崩地陷以本紀修夏六月九真太守祝良交趾刺史張喬招降叛蠻以本紀修解題曰象林蠻反侍御史賈昌與州郡并力討之不利為所攻圍嵗餘兵穀不繼帝召公卿百官及四府掾屬問方略皆議遣大將發荆揚兖豫四萬人赴之李固駮曰若荆揚無事發之可也今二州盜賊磐結不散武陵南郡蠻夷未輯長沙桂陽數被徴發如復擾動必更生患不可一也又兖豫之人卒被徴發逺赴萬里無有還期詔書迫趣必致叛亡不可二也南州水土溫暑加有瘴氣致死亡者十必四五不可三也逺涉萬里士卒疲勞比至嶺南不復堪鬭不可四也軍行三十里為程而去日南當九千餘里三百日乃到計人廩五升用米六十萬斛不計將吏驢馬之食但負甲自致費便若此不可五也設軍到所在死亡必衆既不足禦敵當復更發此為刻割心腹以補四支不可六也九真日南相去千里發其吏民猶尚不堪何况乃苦四州之卒以赴萬里之艱哉不可七也宜更選有勇略仁惠任將帥者以為刺史太守悉使共住交趾故并州刺史祝良性多勇决張喬前任益州有破虜之功宜即拜良等便道之官餘見通鑑薛季宣曰古人調兵各從其方之便髙宗伐楚裒荆旅武王克商用西士征徐以魯追貊以韓平淮以漢略見於經可考也漢氏役民獨得古意其備胡則上郡隴西北地事越則㑹稽豫章擊朝鮮則齊遼東開西南夷則巴蜀移兵赴逺不過一再自東都兵不能繼然後盜起一方而羽檄被于三邉此李固所以憤惋也冬十月燒當羌寇金城護羌校尉馬賢破之以本紀修十二月戊戍朔日有食之以本紀修漢孝順皇帝永和四年春正月庚辰中常侍張逵蘧政楊定伏誅以本紀修解題曰順帝誅張逵三輩而曾不足以少損宦寺之勢者為曹鄧曹騰而誅之也事見通鑑夏四月癸卯馬賢討燒當羌大破之以本紀修冬十月戊子帝獵于上林苑至函谷關而還十一月丙寅幸廣成苑以本紀修漢孝順皇帝永和五年夏四月南胸奴句龍吾斯車紐等反五月詔度遼將軍馬續討破之使胸奴中郎將陳龜迫殺南單于坐下獄免本紀己丑晦日有食之本紀且凍羌寇三輔秋九月令扶風漢陽築隴道塢置屯兵以本紀修辛未王龔罷以本紀修且凍羌寇武都本紀句龍吾斯立車紐為單于引烏桓羌胡寇京兆并凉幽冀丁亥徙西河治離石上郡治夏陽朔方治五原以紀傳修解題曰李賢曰西河本都平定至此徙離石縣在郡南五百九里按上郡屬并州夏陽馮翊縣屬司翊冬十一月遣使胸奴中郎將張耽擊車紐破降之以本紀修漢孝順皇帝永和六年春正月丙子征西將軍馬賢與且凍羌戰于射姑山敗歿以本紀修閏正月鞏唐羌寇隴西三輔燒園陵以紀傳修二月丁巳有星孛于營室以本紀修三月武都太守趙冲討鞏唐羌破之以本紀修以太僕趙戒為司空以本紀修夏五月張耽大破烏桓羌胡于天山以本紀修解題曰東觀記耽將吏兵繩索相懸上通天山鞏唐羌寇北地本紀秋八月丙辰梁商薨壬戌以其子冀為大將軍奉車都尉不疑為河南尹以紀傳修九月諸羌寇武威以本紀通鑑修辛亥晦日有食之以本紀修冬十月癸丑徙安定居扶風北地居馮翊本紀十一月庚子以行車騎將軍張喬屯三輔以本紀修出李固為荆州刺史以列傳通鑑修解題曰唐仲友曰論治盜在一郡當如羊續守南陽在一路當如賈琮刺交趾在天下當如李固之論三人以吏之不良為盜之源清其源而盜自息事見通鑑漢孝順皇帝漢安元年春正月癸巳改元以本紀修秋八月句龍吾斯等復反以本紀修丁卯遣侍中杜喬守光祿大夫張綱等八人循行天下以本紀皇極經世修張綱劾奏梁冀梁不疑詔以俸贖罪以列傳修杜喬表奏泰山太守李固徴為將作大匠以列傳通鑑修解題曰按袁宏漢紀固方直不撓好推賢士上疏曰臣聞氣之清者為精人之清者為賢治身者以積精為寶治國者以積賢為道陛下初登大位聘樊英徴黃瓊楊厚賀純䇿書嗟嘆待以優位是以巖穴幽人莫不彈冠振衣樂為時用四海歡然歸服聖德自頃以來漸更陵遲諸侍中皆膏粱之餘勢家子弟無宿德名儒可顧問者愚以為瓊等久處郎署已且十年誠恨陛下隆崇于始而棄之于末也光祿大夫周舉侍中杜喬深沈正直當世名臣宜登常伯預聞國政者也天子納焉以張綱為廣陵太守以列傳修冬十一月壬午大司農胡廣為司徒以本紀修漢孝順皇帝漢安二年夏四月護羌校尉趙冲等擊燒當羌於參䜌破之以本紀修解題曰李賢曰參䜌縣屬安定郡􅒋音力全反六月丙寅立南胸奴守義王兜樓儲為南單于以本紀修冬十月甲辰減百官俸本紀丙午禁沽酒本紀閏十月趙沖擊燒當羌于阿陽破之以本紀修十一月使胸奴中郎將馬實遣人刺殺句龍吾斯本紀徐揚盜起以本紀修凉州地百八十震山裂敗城寺以本紀修漢孝順皇帝建康元年春三月領護羌校尉衛琚追叛羌破之以本紀修夏四月馬實擊南胸奴左部破之胡羌烏桓悉降以本紀修辛巳立子炳為皇太子以本紀修改元以本紀修秋八月九江范容周生據厯陽遣御史中丞馮緄督兵討之以通鑑修庚午帝崩于玉堂前殿解題曰洛陽宫殿記南宫有玉堂前後殿太子即皇帝位年二嵗尊皇后為皇太后臨朝丁丑太尉趙峻為太傅大司農李固為太尉參録尚書事以本紀修九月丙午葬孝順皇帝于憲陵以本紀修解題曰范曄論曰古之人君離幽放而反國祚者有矣莫不矯鑒前違審識情僞無忘在外之憂故能中興其業觀夫順朝之政殆不然乎何其效僻之多與是日地震水涌土裂以本紀修冬十月日南蠻反交趾刺史夏方降之以本紀修十一月九江賊徐鳳馬勉寇郡縣以本紀通鑑修是嵗盜發憲陵以通鑑修趙冲追叛羌於鸇隂河戰歿以本紀修解題曰李賢曰凉州姑臧縣東南有鸇隂縣故城因水以為名王容曰俗名正音城漢孝冲皇帝永嘉元年春正月戊戌帝崩于玉堂前殿徴章帝𤣥孫清河王蒜及渤海王鴻之子纘至京師李固議立蒜梁冀與太后定䇿禁申丙辰迎纘入南宫丁巳封建平侯即皇帝位太后臨朝蒜罷歸以本紀袁宏漢紀修己未葬孝冲皇帝于懷陵以本紀修三月馬勉稱帝九江都尉滕撫討斬之以本紀修夏五月下邳人擊徐鳳斬之以本紀修丙辰躋康陵于恭陵之上以本紀修六月鮮卑寇代郡本紀秋九月庚戌趙峻薨以本紀修冬十一月督徐揚二州事滕撫擊廣陵賊張嬰破之又斬九江賊華孟以本紀通鑑修漢孝質皇帝本初元年夏四月庚辰令郡國舉明經詣太學自大將軍至六百石皆遣子受業嵗滿官其髙第自是遊學增至三萬餘生以本紀修五月海水溢本紀閏六月甲申梁冀弒帝李固復議立清河王蒜冀與太后定䇿禁申丁亥策免固戊子胡廣為太尉趙戒為司徒與冀參録尚書事以本紀吕祖謙標目修解題曰梁冀忌帝聰慧遂令左右進鴆帝若煩甚使促召固固入前問陛下得患所由帝尚能言曰食煮餅今腹中悶得水尚可活冀曰恐吐不可飲水語未絶而崩固伏尸號哭推舉侍醫冀慮其事泄大惡之固議立嗣引司徒胡廣司空趙戒先與冀書冀乃召三公官二千石列侯大議所立固廣戒及大鴻臚杜喬皆以為清河王蒜明德著聞又屬最尊親宜立為嗣先是梁太后徴蠡吾侯志本文作帝到夏門亭李賢曰洛陽城北面西頭門㑹質帝崩質帝未崩已召蠡吾侯冀之此心動于惡久矣冀欲立之衆論既異憤憤不得意而未有以相奪中常侍曹騰等聞而夜往說冀曰將軍纍世有椒房之親秉攝萬機清河王嚴明若果立則將軍受禍不久矣不如立蠡吾侯富貴可長保也冀然其言明日重㑹公卿冀意氣凶凶言辭激切胡廣趙戒以下皆曰惟大將軍令而固獨與杜喬堅守本議冀厲聲曰罷㑹固意既不從猶望衆心可立復以書勸冀冀愈激怒乃說太后先策免固竟立蠡吾侯餘見通鑑胡寅曰固身為上公親聞質帝之言當即時請太后出御前殿召三公中二千石列侯司𨽻期門羽林士大㑹庭中推舉尚食窮問崩故可以立得罪人致於廷尉凡與謀者殺無赦自建明德䇿立清河王不崇朝而漢祚復隆矣梁冀雖久握兵權然事出倉卒名在弒君其下未必服從出一紙詔書諭以逆順衆决不動計不出此方且伏尸號哭一再致書比三日間冀策畫已立則雖有仲尼之智周公之才亦無及矣庚寅迎章帝曾孫蠡吾侯志入南宫即皇帝位太后臨朝以紀傳修秋七月乙卯葬孝質皇帝于靜陵以本紀修九月追尊祖河間孝王為孝穆皇夫人趙氏曰孝穆皇后蠡吾先侯曰孝崇皇冬十月甲午尊母匽氏為孝崇博園貴人以本紀修大事記續編卷十五
