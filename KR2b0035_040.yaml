body:
  text: 大事記續編卷四十明王禕撰齊世祖武皇帝永明十年年魏高祖孝文帝太和十六春正月己未魏宗祀顯祖於明堂遂登靈臺辛酉以太祖配南郊以本紀修齊竟陵王子良領尚書令以本紀修壬戌魏承晉為水德以吕祖謙標目修甲子魏罷租課以通鑑修乙丑魏詔踈屬異姓王公遞降一等以朱熹綱目修二月甲午魏主朝日於東郊以本紀修丁酉魏祀堯舜禹文王周公丁未親祠孔子以本紀修夏四月辛丑齊豫章文獻王嶷卒本紀解題曰永明末車駕數游幸唯嶷陪從上出新林苑同輦夜歸至宫門嶷下輦辭出上曰今夜行無使為尉司所呵也嶷對曰京輦之內皆屬臣州願陛下不垂過慮上笑每臨幸輒極日盡歡嶷謂上曰古來言願陛下壽偕南山或稱萬歲此殆近貌言如臣所懷實願陛下極壽百年亦足矣上曰百歲復何可得止得東西一百於事亦濟南史列傳武帝少年與新吳侯景先共車行泥路車久故壞至領軍府西門車轅折俱狼狽景先謂帝曰兩人脫作領軍亦不得忘今日艱辛及帝踐阼以景先兼領軍將軍拜還未至府門中詔相聞領軍今日故當無折轅事邪武帝奢侈後宫萬餘人猶以為未足嶷後房亦千餘人葉適曰蕭氏父子智識凡猥曽無毫髮為民請命之念放飯於大物流啜於高位國阼短促皆其自取民生其間受禍迫數可勝歎哉五月己巳尚書令竟陵王子良為揚州刺史以本紀修秋八月乙未魏伐柔然破之以吕祖謙標目修魏主養三老五更於明堂以本紀志修九月楊集始冦齊漢中魏以為武興王以通鑑修冬十二月癸未朔日有食之以天文志修齊世祖武皇帝永明十一年魏髙祖孝文帝太和十七年春正月丙子齊太子長懋卒以吕祖謙標目修三月乙亥齊雍州刺史王奐有罪伏誅其子肅奔魏以本紀列傳修夏四月甲午齊立南郡王昭業為皇太孫以吕祖謙標目修戊戌魏立馮氏為皇后以吕祖謙標目修秋七月癸丑魏立子恂為皇太子以吕祖謙標目修戊辰齊遣鎮軍大將軍江州刺史陳顯達鎮樊城以通鑑修解題曰按通典齊始全盛南鄭樊城襄陽義陽壽春淮陽角城晉義熙中置在宿遷縣界漣口朐山為重鎮其後頻為魏所侵至東昏永元初沔北諸郡相繼敗沒又失壽春三年齊亡事見通鑑戊寅齊主殂中書郎王融謀立竟陵王子良左僕射西昌侯鸞迎太孫昭業即皇帝位八月壬午鸞為尚書令癸未子良為太傅吕祖謙標目解題曰按齊書列傳融文辭辨捷尤善倉卒屬綴子良特相友好晚節大習騎馬才地既華兼藉子良之勢傾意賓客文武翕習輻湊之招集江西傖楚數百人並有幹用世祖不豫詔子良甲仗入延昌殿侍醫藥子良日夜在殿內太孫間日入參承世祖疾篤暫絶太孫未入內外惶懼百僚皆已變服融戎服絳衫於中書省閣口斷東宫仗不得進欲矯詔立子良詔草已立上重蘇問太孫所在因召東宫器甲皆入遺詔子良輔政西昌侯鸞知尚書事蕭衍謂范雲曰主上大漸國家自有故事道路籍籍將有非常之舉卿聞之乎雲不敢答俄而帝崩融乃處分以子良兵禁諸門西昌侯聞急馳至雲龍門不得進乃曰有敕召我排而入奉太孫登殿命左右扶出子良指麾部署音響如鐘融知不遂乃釋服還省歎曰公誤我鬱林深怨融餘見通鑑胡寅曰武皇不豫融欲矯詔立子良而子良不知戎服絳衫斷東宫仗而子良不知上殂融以子良兵禁諸門而子良又不知誠不知邪是不智也佯不知邪是不忠也危疑之際間不容穟而一聽融譸張為幻略無可否至於迹涉疑似恐懼而殞乃自取之安得獨罪融哉己丑魏主將伐齊以太尉東陽公丕等留守以本紀修齊王融伏誅以通鑑修九月魏聘齊以通鑑修辛酉齊主追尊考為文皇帝以本紀修庚午魏主至洛陽遣撫軍大將軍任城王澄諭留司以遷都之意冬十月戊寅朔魏營洛都以本紀吕祖謙標目修解題曰按河南志東西二十里南北十五里廟社宫室㑹府以外方三百步為一里開四門置里正四人門士八人總二百二十里宣武景明二年築坊三百二十各周一千二百葉適曰孝文遷洛不止慕古人居中土蓋欲身在近地經營江左爾明年遣盧昶等使齊詔昶曰江揚不早當晚㑹是朕物卿等欲言便言無相疑難蓋可見矣事見通鑑壬寅齊尊太妃為皇太后立妃何氏為皇后以本紀修魏以王肅為大將軍長史以吕祖謙標目修十一月魏鄴宫成徙御焉以本紀修齊高宗明皇帝蕭鸞建武元年魏高祖孝文帝太和十八年春正月丁未齊改元隆昌以吕祖謙標目修癸亥魏主南狩三月至平城以本紀修夏四月庚辰魏罷西郊祭天以本紀修戊子齊竟陵文宣王子良以憂卒以本紀修解題曰按齊史列傳子良既亡故人皆來奔赴陸惠曉於邸門逢袁彖問曰近者云云定復何謂王融見殺而魏凖破膽道路籍籍復云竟陵不永天年有之乎答曰齊氏微弱已數年矣爪牙柱石之臣都盡今之所餘政風流名士耳若不立長君無以鎮安四海王融雖為身計實安社稷恨其不能斷事以至於此道路之談自為虛說耳蒼生方塗炭矣政當瀝耳聽之餘見通鑑閏月丁卯齊鎮軍大將軍西昌侯鸞自為開府三月戊辰以中軍將軍新安王昭文為揚州刺史以本紀修五月甲戍朔日有食之以天文志修秋七月乙亥魏以宋王劉昶為大將軍鎮彭城以本紀修壬辰齊西昌侯鸞弒其主追廢之為鬱林王丁酉奉新安王昭文即皇帝位改元延興鸞自為驃騎大將軍録尚書事揚州刺史吕祖謙標目解題曰宋庠紀年通譜延興本魏孝文年號九月壬申朔魏主臨朝堂考百官以吕祖謙標目修解題曰按後魏書列傳初魏自公侯以下迄于選臣動有萬數冗散無事吏部尚書任城王澄品為三等量其優劣盡其能否之用咸無怨者餘見通鑑齊蕭鸞殺司徒鄱陽王鏘等七人以吕祖謙標目修冬十月齊蕭鸞自為太傅大將軍都督中外軍事宣城郡王加殊禮殺江夏王鋒等五人以吕祖謙標目修甲辰魏主以東陽公丕為太傅録尚書事辛亥發平城以通鑑修齊宣城王鸞廢其主為海陵王癸亥自即皇帝位改元以吕祖謙標目修解題曰周端朝曰荀彧以鴆死劉穆之以憂死唐武宗深仇李珏楊嗣復事㑹之間略有先後便關生死齊高宗之容謝朏不殺卞彬亦亂世一難事事見通鑑宋庠紀年通譜建武本漢光武晉惠帝元帝石虎慕容忠年號十一月癸酉齊以西中郎長史始安王遙光為揚州刺史丙戌以西中郎將聞喜公遙欣為荆州刺史以吕祖謙標目修戊子齊立子寶卷為皇太子以吕祖謙標目修魏主至洛陽置牧場於河陽以本紀吕祖謙標目修齊弒海陵王以本紀修十二月辛丑魏攻齊襄陽義陽鍾離南鄭以吕祖謙標目修壬寅魏禁胡服以吕祖謙標目修辛亥魏主伐齊以本紀修齊高宗明皇帝建武二年年魏髙祖孝文帝太和十九春正月壬申齊遣兵拒魏以本紀修癸酉魏禁侵掠吕祖謙標目乙未魏圍鍾離齊徐州刺史蕭惠休破之二月魏主至壽陽丙辰至鍾離齊遣將軍裴叔業救之義陽師退己未齊司州刺史蕭誕破之丁卯魏主遣使臨江數齊主罪三月師還夏四月南鄭師退庚申魏主如魯城祠孔子襄陽師退齊太子右衛率垣厯生追破之五月癸未魏主還洛陽甲申減冗官之祿以本紀吕祖謙標目修六月己亥魏禁北語以吕祖謙標目修癸丑魏求遺書以本紀修戊午魏法度量以本紀修壬戌齊殺領軍將軍蕭諶及撫軍將軍西陽王子明等以吕祖謙標目修秋八月乙巳魏選武勇為羽林虎賁以本紀修魏立國子太學四門小學以朱熹綱目修九月庚午魏六宫文武遷洛陽丙戍幸鄴以本紀修冬十月丙辰魏主至自鄴以本紀修壬戌魏詔州牧品官屬得失以聞以通鑑修十一月甲申魏主祀圜丘以本紀修十二月丁酉齊置晉諸陵宿衛以本紀修甲子魏賜羣臣冠服以本紀修魏鑄太和五銖始用錢以吕祖謙標目修齊高宗明皇帝建武三年年魏高祖孝文帝太和二十春正月魏改姓元氏并改羣臣姓以吕祖謙標目修解題曰葉適曰書稱别生分類而傳有賜姓命氏之文蓋帝王諸侯各為族姓義不相襲後世封建法廢既無專國不為自族姓而天子亦無賜姓命氏之法至傳國數百年而臣下仍用舊氏與編戶齊民無别蓋以兵力崛起而無德勢不暇爾雖然尊前代而慕聖賢使其後人以風流相命則猶可言也及魏起深北不毛以九十九姓為部落姓改氏易流布諸華至隋唐凡胡邱周伊穆陸劉賀梁冦羅葛樓鮑何高潘薛甄杜之類皆夷種而三代漢魏之氏族蕩不可識矣餘見通鑑魏詔定諸州士族以吕祖謙標目修二月壬寅魏聽羣臣終三年喪以吕祖謙標目修三月壬午齊去乘輿金銀飾以本紀修夏五月魏禁漢魏晉諸陵樵蘇以本紀修丁亥魏主祀方澤以本紀修秋七月魏廢皇后馮氏以本紀修冬十月戊戌魏以代遷之士皆羽林虎賁司州民十二夫調一為四年更卒歲開畨假以供力役以本紀修閏十二月丙寅魏廢太子恂為庶人以吕祖謙標目修戊辰魏置常平倉通鑑魏恆州刺史穆泰定州刺史陸睿等謀反遣吏部尚書任城王澄執之以吕祖謙標目修解題曰恆州領代郡善無梁城繁畤髙柳北靈邱內附靈邱今嵐州之地八郡定州領中山真定中山之地常山真定府平定軍巨鹿真定府深祁二州之地博陵深州祁州之地北平中山府易州之地五郡齊高宗明皇帝建武四年一年魏高祖孝文帝太和二十春正月丙申魏立子恪為皇太子以吕祖謙標目修乙巳魏主北巡通鑑丙辰齊殺尚書令王晏二月甲子以左僕射徐孝嗣為尚書令以本紀修癸酉魏主至平城穆泰陸睿伏誅免并州刺史新興公丕為民以通鑑修解題曰穆泰為定州刺史辭以疾病土溫則甚請恆州自效髙祖許之乃以恆州刺史陸睿為定州泰代焉泰不願遷都睿未及發而泰已至遂潛相扇誘圖為叛乃與睿及安樂侯隆撫冥鎮將魯郡侯業驍騎將軍超鎮北將軍樂陵王思譽等謀推朔州刺史陽平王頤為主頤不從僞許以安之密表其事高祖乃遣任城王澄率并肆兵以討之澄先遣治書侍御史李煥單車入代出其不意泰等驚駭計無所出煥曉諭逆徒示以禍福於是凶黨離心莫為之用泰自度必敗乃率麾下數百人攻煥冀以一捷不克單馬走出城西為人擒送澄尋亦到窮治黨與高祖幸代親見罪人問其反狀泰等伏誅餘見通鑑葉適曰泰與陸睿元丕遂誘子恂為逆皆緣遷都乃知盤庚委曲告諭非畏其臣也夏四月魏殺故太子恂以吕祖謙標目修解題曰按齊書魏虜傳初僞太后馮氏兄昌黎王馮莎二女大馮美而有疾為尼小馮為皇后生僞太子恂後大馮疾差納為昭儀宏初徙都恂意不樂思歸桑乾宏制衣冠與之恂竊毁裂解髮為編服左衽大馮有寵日夜讒恂宏出鄴城馬射恂因是欲叛北歸密選宫中御馬三千匹置河隂渚皇后聞之召執恂馳使告宏宏徙恂無鼻城侯河陽水經注溴水東南徑無辟邑謂之無比城亦曰馬髀城非也尋殺之立大馮為皇后餘見通鑑馮太后親弒髙宗者也而孝文乃立其二姪女為后既廢小馮而立大馮復因大馮之譖而殺其子而大馮亦卒以淫亂廢死以孝文之賢生性過人獨於大倫之際顧弗加察豈夷之為俗不能遽除故邪六月庚申魏主遷洛陽以本紀修秋七月甲午魏立昭儀馮氏為皇后以吕祖謙標目修八月庚辰魏主伐齊以本紀修氐帥楊靈珍襲楊集始九月丁酉魏遣河南尹李崇討之以本紀修魏攻齊南陽以本紀修魏李崇克武興以為梁州刺史以通鑑修冬十月丁巳魏主攻齊新野甲戌齊遣太子中庶子蕭衍等救雍州以本紀通鑑修十一月齊以楊靈珍為武都王以本紀修十二月丁丑齊遣度支尚書崔慧景救雍州以本紀修齊將軍魯康祚豫州刺史裴叔業侵魏魏豫州刺史王肅敗之以通鑑修齊高宗明皇帝永泰元年二年魏高祖孝文帝太和二十春正月丁亥魏拔新野齊沔北諸戍皆遁以本紀修乙未齊遣太尉陳顯達救雍州以本紀修丁未齊殺河東王鉉等十人高武子孫遂盡以紀傳修解題曰葉適曰魏晉取人之國甚酷多殺賢士大夫而其子孫獨得免知廢興存亡之要不在此故也至劉裕懲創司馬復興遂殘滅無遺育而蕭道成效之及其甚也鸞以庶代宗亦然哀哉事見通鑑二月甲子魏拔南陽吕祖謙標目三月壬午朔齊崔慧景蕭衍敗於鄧城以通鑑修解題曰今襄陽府襄陽縣有舊鄧城鎮即漢舊縣辛亥魏主如懸瓠王肅攻義陽齊裴叔業圍渦陽以救之大破魏師叔業軍亦潰以通鑑修解題曰渦陽今亳州䝉城縣夏四月甲寅齊改元以本紀修丁卯齊大司馬㑹稽太守王敬則反五月伏誅以吕祖謙標目修秋七月壬午魏減宫掖近屬費以給軍賞以本紀修癸卯齊太子中庶子蕭衍為雍州刺史以吕祖謙標目修解題曰按梁史列傳張𢎞䇿𢎞胄從武帝宿酒酣語及時事帝曰天下方亂舅知之乎冬下魏軍方動則亡漢北王敬則猜嫌己久當乘間而作𢎞䇿曰敬則張兩紅眼容能立事帝曰敬則庸才為天下唱先爾主上運祚盡於來年國權當歸江劉而江甚隘劉又暗弱都下當大亂死人如麻齊之厯數自兹亡矣梁楚漢當有英雄興𢎞䇿曰瞻烏爰止于誰之屋帝笑曰安知非僕𢎞䇿起曰今夜之言是天意也請定君臣之分帝曰舅欲效鄧晨乎是冬魏攻新野明帝密詔武帝代曹虎監雍州事𢎞䇿聞之心喜謂帝曰夜中言當驗帝笑曰且勿多言𢎞䇿從帝西行餘見通鑑武帝即蕭衍己酉齊主殂太子寶卷即皇帝位以本紀修九月己亥魏以不伐喪退師以吕祖謙標目修冬十一月戊子齊立妃禇氏為皇后以本紀修齊東昏侯蕭寶卷永元元年年魏高宗孝文帝太和二十二春正月戊寅朔齊改元以本紀修解題曰宋庠紀年通譜永泰以疾不瘳望氣者云冝改元永元本漢和帝張茂年號齊遣太尉陳顯達等擊魏癸未魏前將軍元英拒之以吕祖謙標目修戊戌魏主至洛陽以通鑑修二月癸亥魏以中軍上將軍彭城王協為司徒以本紀修齊陳顯達破中山王英取馬圈吕祖謙標目解題曰按齊書列傳馬圈城去襄陽三百里方輿志在鄧州穰縣北後魏立為鎮即漢沮陽縣地三月庚辰魏主發洛陽顯達大敗而還以吕祖謙標目修夏四月丙午朔魏主殂於穀塘原賜皇后馮氏死彭城王協奉喪至魯陽丁巳太子元恪即皇帝位本紀解題曰魏氏之興且百年矣至孝文始興禮樂修制度又慕中華遷居洛邑然不過一再傳國遂分裂以底於亡或者遂謂去乎夷狄而未能合乎中國則足以速其亡而已蓋魏之所以亂者始於世宗政事之不修繼以胡后之淫亂元禧元雍之輔相無狀劉騰元乂之黷貨稔釁興禮樂修制度慕中華何預焉事不察其原而猥其迹則儒者之論幾於可廢矣事見通鑑按魏書地形志睢州穀陽郡治穀陽城太和中置郡五月魏以侍中北海王詳為司空鎮南將軍王肅為尚書令鎮南大將軍廣陽王嘉為左僕射尚書宋辨為吏部尚書與太尉咸陽王禧右僕射任城王澄等輔政協都督冀定等七州軍事定州刺史以本紀修六月戊辰魏主追尊母高氏為文昭皇后封后兄肇為平原公以通鑑修齊始安王遙光撫軍大將軍開府徐孝嗣右僕射江祏中領軍蕭坦之侍中江祀衛尉劉暄更直內省蕭衍聞之修武備祏議廢立秋八月殺袥及祀乙卯遙光據東府起兵己未敗死以紀傳修解題曰按梁元帝金樓子遙光將敗都不識人孫樂祖曹樹生常心腹委付問孫卿是誰樹生曰是孫樂祖仍復問卿是誰曹以名答于時名士偕在側見不識人沈昭略昭光之徒一時皆去餘見通鑑齊之始安猶宋之建安也建安教明帝殺孝武諸子而尋亦見及始安教明帝殺髙武子孫而卒亦無所容不但身受其害而國亦隨之哀哉己巳齊以孝嗣為司空坦之為右僕射暄為領軍將軍閏八月殺坦之及暄冬十月乙未齊殺孝嗣及將軍沈文季以吕祖謙標目及紀傳修十一月丙辰齊太尉江州刺史陳顯達反十二月甲申襲宫城乙酉伏誅以吕祖謙標目修解題曰按齊書列傳自江祏始安王遙光等誅後左右應敕捉刀之徒並專國命人間謂之刀敕權奪人主時徐世􅋆尤見寵信自殿內主帥為直閣驍騎將軍陳顯達事加崔慧景侍中護軍將軍平南將軍都督衆軍事屯中堂加世􅋆輔國將軍專勢號令慧景備員而已餘見通鑑薛季宣曰世祖任外監則領軍但守虛位東昏信直閣則都督實不領兵甚者御刀用事謂之八要故蕭衍謂以昏主役刀敕之徒為不足畏者此也魏制官品以吕祖謙標目修齊東昏侯永元二年景明元年魏世宗宣武帝元恪春正月乙巳魏改元以本紀修齊冠軍將軍豫州刺史裴叔業叛降魏丁未魏遣驃騎大將軍彭城王協等赴壽陽二月戊戌協為揚州刺史己亥叔業死三月乙卯齊遣平西將軍崔慧景討之夏四月慧景至廣陵反南徐兖二州刺史江夏王寶𤣥入之慧景圍宫城征虜將軍豫州刺史蕭懿赴難慧景敗死丙申彭城王協敗齊將軍驃騎司馬陳伯之于硤石取合肥建安五月己酉寶𤣥死六月協進大司馬秋七月伯之攻壽陽八月乙酉協大破之於肥口淮南入于魏以本紀及齊紀吕祖謙標目修解題曰按齊書州郡志郢州有建安左郡又按水經注淮水徑壽陽縣西北肥水從縣城西北入淮謂之肥口在今安豐軍壽春縣應劭注西漢肥陵云夏水出城父城東南至此與肥合故曰合肥唐盧潘云肥水出雞鳴山北流二十里分為二其一東南流經合肥縣南東南入巢湖其一西北流二百里出壽春西投于淮爾雅歸異出同曰肥冬十月己卯齊殺尚書令蕭懿以本紀修丁亥魏大司馬彭城王協録尚書事以本紀修十一月齊蕭衍及西中郎長史行荆州事蕭頴胄奉荆州刺史南康王寶融舉兵十二月穎胄遣將軍楊公則降湘州以吕祖謙標目修魏罷鹽禁以食貨志修解題曰見魏孝文延興五年解題齊和皇帝中興元年二年魏世祖宣武帝景明春正月乙巳齊蕭衍等奉南康王寶融為相國戊申衍發襄陽以本紀梁紀修庚戌魏主親政罷彭城王協咸陽王禧為太保北海王祥為大將軍録尚書事恆州刺史于烈為領軍魏主年少幸臣外戚用事魏政浸衰以本紀通鑑修二月齊蕭衍圍魯山攻郢城本紀解題曰蕭衍之攻郢城無異沈攸之之攻郢城而成敗不同何也天命之向背人心之去就先後有不同故也事見通鑑魯山在今漢陽軍三月乙巳南康王寶融即皇帝位于江陵改元丙午廢其主為涪陵王以尚書令蕭頴胄行荆州刺史加左僕射蕭衍都督征討軍事假黃鉞以本紀修解題曰宋庠紀年通譜中興本慕容年號夏五月魏咸陽王禧謀反伏誅以本紀修齊巴西巴東郡遣兵擊蕭頴胄涪陵王遣軍主吳子陽等救郢州秋七月甲午雍州刺史張欣泰等謀廢涪陵王不克死丁酉蕭衍遣兵襲破子陽丁巳魯山降己未郢城降八月江州刺史陳伯之降以齊紀通鑑修九月魏築洛陽諸坊以本紀修己亥魏立皇后于氏以本紀修冬十月甲戌齊蕭衍大敗將軍王珍國等於朱雀航圍宫城以吕祖謙標目修十一月丁酉魏北海王祥為太𫝊領司徒以本紀修壬寅齊巴東公蕭頴胄卒以吕祖謙標目修解題曰按齊史列傳武帝年垂强仕方有冢嗣時徐元瑜降而又穎胄暴卒時人謂之三慶則武帝之存心可見矣餘見通鑑魏鎮南將軍元英請南伐不報以吕祖謙標目修解題曰按後魏書列傳平南將軍荆州刺史元嵩表蕭寶卷骨肉相殘忠良先戮流聞寶卷荆州刺史蕭衍兄懿於建康阻兵與衍相持荆郢二州刺史並寶卷之弟臣若遣書相聞并力除衍平衍之後彼必旋師赴救丹陽當不能固全漢沔臣之兵威已得臨據則沔南之地可一舉而收竚兵觀釁若其零落之形已彰便可順流摧鋒長驅席卷既而衍克建康乃止通鑑止載元英源懷之請而不及此十二月丙寅齊王珍國等弒涪陵王蕭衍以宣德太后令廢之為東昏侯衍自為大司馬録尚書事揚州刺史承制潘貴妃及外監茹法珍等伏誅以齊紀通鑑修大事記續編卷四十
