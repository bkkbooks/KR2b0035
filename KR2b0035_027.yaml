body:
  text: 大事記續編卷二十七明王禕撰晉孝懷皇帝永嘉元年漢光文皇帝元熙四年成武皇帝晏平二年春正月癸丑改元以本紀修解題曰宋庠紀年通譜永嘉漢沖帝年號二月東萊王彌冦青徐二州以本紀修陳敏伏誅以本紀修三月丁卯改葬楊太后諡曰武悼庚午立豫章王詮為皇太子本紀庚辰東海王越出鎮許昌本紀南陽王謨為征西大將軍開府都督秦雍梁益四州軍事鎮長安以本紀修夏五月馬牧帥汲桑羯胡石勒陷鄴殺司冀二州都督新蔡王騰進攻兖州東海王越使茍晞討之以紀傳修解題曰石勒上黨武鄉羯人其先胸奴别部羌渠之胄按胸奴傳有力羯種然則勒其力羯種歟事見通鑑秋七月己未以平東將軍監徐州軍事琅邪王睿為安東將軍都督揚州江南軍事鎮建業睿以司馬王導為謀主侍中顧榮為軍司㑹稽相賀循為吳國內史導說睿謙以接士儉以足用撫綏新舊江東歸心焉以吕祖謙標目修八月分荆州江州為湘州以本紀修解題曰分長沙衡陽湘東零陵邵陵桂陽及廣州之始安始興臨賀置湘州九月茍晞擊汲桑石勒大破之勒尋奔漢桑走死以本紀舉要歷補遺修解題曰汲桑之破鄴也東海王越出次官渡以討之命茍晞為前鋒桑素憚晞於城外為柵以自守晞將至頓軍休士先遣單騎示以禍福桑衆大震棄柵宵遁嬰城固守晞陷其九壘遂定鄴而還西討吕郎滅之後從高密王泰討青州賊劉根破公師藩敗石勒於河北威名甚盛時人擬之韓白餘見通鑑辛亥有大星如日小者如斗自西方流東北天盡赤俄有聲如雷以本紀修冬十一月戊申朔日有食之以本紀修十二月癸卯東海王越自為丞相領兖州牧解題通典晉司徒與丞相通職未嘗並立永嘉元年始兩置焉餘見通鑑以撫軍將軍茍晞為征東大將軍都督青州軍事青州刺史以紀傳修慕容廆自稱鮮卑大單于以載記修時帝始親郊祀以列傳修解題曰摯虞為太常卿時懷帝親郊自元康以來不親郊祀禮儀弛廢虞考正舊典法物粲然晉孝懷皇帝永嘉二年漢光文皇帝永鳳元年成武皇帝晏平三年春正月丙午朔日有食之以本紀修漢王淵遣將軍劉聰據太行石勒下趙魏以舉要歷補遺修二月辛卯東海王越殺清河王覃以本紀修庚子漢石勒冦常山驃騎大將軍王浚破之以本紀修三月東海王越徙鎮鄄城以舉要歷補遺修解題曰鄄城屬濮陽國袁紹使記曹操以許下卑濕雒陽殘破宜徙都鄄城以就全實水經河水東徑鄄城縣北注故城在河南十八里兖州舊治河上之邑最為峻固晉八王故事越治鄄城無故自壞七十餘文越恧之移治濮陽夏四月丁亥王彌入許昌五月甲子冦洛陽敗走歸漢以本紀修解題曰彌謂其黨劉靈曰晉兵尚彊歸無所厝劉淵昔為質子我與之周旋京師深有分契今稱漢王歸之可乎靈然之乃渡河歸淵餘見通鑑秋七月漢王淵徙都蒲子以通鑑目録修解題曰劉琨至晉陽元海在離石相去三百里許琨密遣離間其部種虜降者萬餘落淵甚懼遂城蒲子而居之餘見通鑑今隰州隰川縣北四十里即春秋時蒲城也八月東海王越屯濮陽以本紀修冬十月甲戌漢王淵即帝位改元以本紀通鑑目録修解題曰夷狄僣號自淵始十二月漢石勒冦魏汲頓邱以通鑑修晉孝懷皇帝永嘉三年漢光文皇帝河瑞元年成武皇帝晏平四年春正月漢徙都平陽改元以通鑑目録修解題曰今平陽路平陽縣有劉元海城晉地理志蒲子平陽皆屬平陽郡統於司州蓋逼畿甸矣宋庠紀年通譜於汾水中得玉璽王莽時璽也乃改元元璽三月丁巳東海王越入京師殺中書令繆播等以吕祖謙標目修以中書監王敦為揚州刺史以吕祖謙標目修解題曰潘滔說越曰今樹處仲於江外使其肆豪彊之心是見賊也不從東海王越領司徒王衍為太尉越奏罷宿衛以國兵代之以紀傳修漢陷黎陽以通鑑修大旱江漢河洛皆竭以本紀修夏漢石勒冦巨鹿常山以趙郡張賔為謀主以通鑑目録修秋七月漢陷壺關以通鑑修解題曰上黨郡故治長子縣董卓作亂移治壺關劉淵雖徙居壺關之黎亭未能得郡也至是王彌劉聰石勒共攻壺關降上黨大守而劉琨始即襄垣以為郡矣餘見通鑑八月漢楚王聰冦洛陽九月𢎞農太守垣延襲敗之以載記修王浚遣將大破石勒于飛龍山以載紀修解題曰今真定有飛龍山冬十月漢楚王聰等冦洛陽敗還以吕祖謙標目修成天水訇琦以梓潼降以吕祖謙標目修十一月漢石勒陷長樂以本紀修解題曰長樂屬魏郡十二月漢王彌遣長史曹嶷徇青州以通鑑目録修晉孝懷皇帝永嘉四年漢昭武皇帝劉聰光興元年成武皇帝晏平五年春二月漢石勒陷鄄城以本紀修成將文碩以巴西降以本紀修夏四月大水以本紀修成復取梓潼以吕祖謙標目修五月大蝗以本紀修秋七月羅尚卒以長沙太守皮素代之以吕祖謙標目修己卯漢主淵卒太子和立和弟聰弒而代之改元以北海王乂為太弟以吕祖謙標目修解題曰宋庠紀年通譜嘉平魏高貴鄉公年號氐蒲洪稱略陽公以載記修漢陷河內以本紀修九月流民王如反於南陽降于漢以吕祖謙標目修冬十月漢河內王粲等冦洛陽石勒圍倉垣陳留內史王讃走之以本紀通鑑修解題曰倉垣城在宋開封府開封縣東北水經注濟水東徑倉垣輿地志城南臨汴水劉琨表鮮卑拓跋猗盧為大單于代公以通鑑修解題曰杜延業晉春秋云猗盧胸奴之别種也族類數千各立稱號索頭其一也猗盧受琨節度欲遣索頭萬騎衛京師太𫝊越以洛中荒儉弗聽餘見通鑑琨與丞相箋曰琨比和猗盧遂引大衆躬啓戎行即具白太傅切陳愚見聰冝時討勒不可縱而宰相所慮不同更憂茍晞馮嵩之徒而稽二冦之誅遣使抑挫臣鋭氣臣即解甲遣盧衆歸國壬子王浚為司空平北將軍劉琨為平北大將軍進假勿務塵為大單于以紀傳修京師飢遣使徴天下兵不至以本紀修漢石勒破王如軍冦襄陽以朱熹綱目修十一月甲戌東海王越討石勒以王衍為軍司東屯項越自領豫州牧以本紀修解題曰朱黼曰越始領司徒凡宿衛有侯爵者盡奏罷之止以國兵數百宿衛後知京師單弱遂出屯于項帥甲士四萬且以行臺自隨朝賢素望悉為佐吏名將徑卒咸入其府宫省無復守衛此劉聰所以談笑而取之也幽王之詩曰皇父孔聖作都于向擇三有事亶侯多藏不憗遺一老俾守我王擇有車馬以居徂向小人之敗國家專為深謀者宛然同一軌也事見通鑑揚州都督周馥請遷都壽春東海王越召馥馥不至以紀傳修十二月皮素為其下所殺以巴東監軍韓松為益州刺史以通鑑修晉孝懷皇帝永嘉五年漢昭武皇帝嘉平元年成武皇帝玉衡元年春正月壬申漢曹嶷陷青州茍晞走以本紀修癸酉漢石勒陷江夏以本紀修乙亥成取涪城巴西改元以吕祖謙標目修湘州流人杜韜據長沙反以本紀修鎮東大將軍開府琅邪王睿遣將攻周馥馥走死以軍咨祭酒王敦為揚州刺史以通鑑修解題曰程逈曰馥以京師傾危故撫壽春請車駕幸之已而帝果陷賊其先見如蓍龜所以不從姦臣假托之召者欲保有壽春以待君父上以鑒皇甫規朱雋輕從董卓之召致國家之殄亡下亦自附於祖逖劉琨之烈光以自見於世而琅邪害之剪國家之羽翼以增亂人之氣見讎不討而動干戈於邦內江左不競此其兆朕也事見通鑑三月詔討東海王越以茍晞為大將軍督青徐兖豫六州軍事越薨以吕祖謙標目修建平都尉暴重殺韓松領三府事益州將吏殺重以巴郡太守張濯行三府事濯戰死平西司馬王異代之以通鑑修解題曰按載記羅尚為平西將軍領護西夷校尉益州刺史實開三府故三府官屬表韓松等而暴重張羅王異張啓皆領三府事至向沈蘭維浸就削弱但行西夷校尉而已事見通鑑夏四月漢石勒追東海王越喪敗之苦縣殺王衍及王公已下十餘萬人害宗室四十八王於洧倉以本紀通鑑修解題曰按晉春秋三十國春秋王衍將死顧謂劉望曰吾曹雖不如古人向令不共祖尚浮虛戮力悉心以治天下猶可不至今日餘見通鑑蘇轍曰晉世高談揖讓而無慷慨感激之操大言無當不適於用而畏兵革之事姦雄知其所忌而竊乘之是以顛沛隕越而不能以自存且夫劉石姦詐雄武譬如山林之人生於草木之間大風烈日之所咻而雪霜飢饉之所勞苦其筋力骨節之所嘗試者亦已至矣而使王衍之倫清談而當其衝譬如千金之家居於高堂之上食肉飲酒不習寒暑之勞而欲以之捍禦山林之勇夫固姦雄之所樂攻而無難者也富而不能勞貴而不能治此其所以喪天下之故哉水經注洧水又東入汶倉城內俗以是水為汶水故名汶倉非也蓋渭水之邸閣亦在頴昌府五月杜韜陷長沙以吕祖謙標目修漢前軍大將軍呼延晏入冦六月丁酉王彌及始安王曜等陷洛陽戊戌殺太子詮及王公士民三萬餘人遷帝于平陽以本紀修丁未漢改元以載記修茍晞立豫章王端為皇太子置行臺自領尚書令屯蒙城以本紀通鑑目録修解題曰梁國䝉縣山桑古城在縣北司徒荀藩等建行臺于密奉吳王晏子秦王業趣許昌以通鑑目録修鎮東大將軍琅邪王睿辟渡江賢俊以吕祖謙標目修琅邪王睿遣兵攻江州刺史華軼斬之以列傳修秋七月王浚承制假立太子自領尚書令以本紀通鑑修八月漢圍長安九月殺太尉南陽王模以中山王曜鎮長安以載記修漢石勒襲執茍晞及豫章王端以本記修冬十月漢石勒殺王彌屯葛陂以載記修解題曰勒於葛陂繕室宇課農造舟將冦建鄴㑹霖雨三月不止元帝使江南之衆大集壽春勒軍中飢疫死者大半檄書朝夕繼至勒㑹諸將議之勒發葛陂使石虎率騎二千距壽春大敗于巨靈口奔退百里及于勒軍軍中震擾謂王師大至勒陳以待之晉懼有伏兵退還壽春勒所過皆堅壁清野採掠無所獲軍中大飢士衆相食餘見通鑑勒號為善用兵然困於陽平敗於赤橋狼狽於飛龍倉垣亦幾危矣江漢雖能蹂躪河之南北固未容足之地至是飢疫瀕死此天亡之時而琅邪諸臣特幸其去曽不能乘機奮發以蹙之使得安行而據襄國卒之奄有天下大半鴟張大語以漢高光自擬嗚呼使勒得以稱雄於時者諸賢之罪也世遂從而信之可發千載一慨哉蔡州新蔡縣有葛陂周回三十里十一月拓跋猗盧入太原劉琨徙五縣百姓以避之以本紀修解題曰按晉書列傳宋書索虜傳後魏書本紀初單于猗㐌以救東嬴公騰之功琨表其弟猗盧為代郡公王浚以琨侵已之地數擊琨猗盧以封邑去國懸逺民不相接率部落自雲中入雁門從琨求句注陘北之地地里志魏黃初立并州自陘嶺以北並棄之至晉因而不改元和郡縣志句注山在代州西北三十五里雁門縣西陘山是也晉咸寧元年碑北方之險有盧龍飛狐句注為之尊天下之阻所以分别外內也晉亂為猗盧所據琨不能制且欲猗盧為援乃徙馬邑屬雁門郡隂館樓煩並漢縣屬雁門郡晉志無繁畤縣並屬雁門郡五縣民於新安以其地處之猗盧徙十萬家以充之安定太守賈匹馮翊太守索綝等大敗漢中山王曜於黃邱豫州刺史閻鼎奉秦王業趨武關以列傳通鑑修解題曰按載紀列傳劉曜既據長安安定太守賈匹及諸氐羌皆送質任唯雍州刺史麴特新平太守竺恢固守不降護軍麴允頻陽令梁肅自京兆南山將奔安定遇匹任子於隂密擁還臨涇推匹為平西將軍率衆五萬攻曜於長安扶風太守梁綜及麴特趙染來距敗蹟而還曜衆大敗中流矢退保甘渠匹帥戎晉二萬餘人將伐長安西平太守竺恢亦固守劉粲聞之使劉曜劉雅趙染距匹先攻恢不克匹邀擊大敗之曜退走匹追之至于甘泉旋自渭橋襲彭蕩仲殺之通鑑馮翊太守索綝等共推賈匹為平西將軍率衆五萬向長安雍州刺史麴特新平太守竺恢皆不降於漢漢河內王粲在新豐使其將劉雅趙染攻新平不克索綝救新平大小百戰雅等敗退中山王曜與匹戰於黃邱大敗匹遂襲漢梁州刺史彭蕩仲殺之耀州雲陽縣漢甘泉宫本秦林光宫武帝立泰畤開山圖漢官儀注晉灼皆云雲陽甘泉黃帝以來圓丘祭天處黃丘殆以此得名載記又云戰黃邱曜衆大敗退保甘渠即甘泉也地與耀州三原縣鄰王浚以崔毖為東夷校尉吕祖謙標目晉孝懷皇帝永嘉六年漢昭武皇帝嘉平二年成武皇帝玉衡二年春正月帝䝉塵于平陽以本紀修解題曰聰引帝入宴謂帝曰卿為豫章王時朕常與王武子相造武子稱朕於卿卿言聞其名久矣以卿所製樂府欲示朕謂朕曰聞君善為辭賦試為看之朕時與武子俱為盛德頌卿稱善者久之乂引朕射于皇堂朕得十二籌卿與武子俱得九籌卿贈朕柘弓銀研卿頗憶否帝曰臣安敢忘之但恨爾日不早識龍顔餘見通鑑以藩王而結交外夷任子晉之紀綱蕩然久矣二月壬子朔日有食之以本紀修漢石勒將攻建業以大雨止琅邪王睿上尚書檄討勒以通鑑本紀修夏賈匹等敗漢中山王曜走之秦王業入長安以通鑑修秋七月漢石勒據襄國以通鑑修解題曰襄國屬廣平郡宋信德府漢襲取晉陽八月庚戌劉琨奔常山以本紀修解題曰劉越石志槩英果亦以忠義自許獨惜其無學是以紐於奢豪而無深沈之度方其﨑嶇兵間此何如時而流連音律以忠諫殺士豈望塵之餘習猶未除耶卒於境土不保依棲戎狄功業竟無一成然則有志於事功者可不以學問為先哉事見通鑑九月辛巳雍州刺史賈匹等奉秦王業為皇太子建宗廟社稷以閻鼎為太子詹事總攝百揆加匹征西大將軍以紀傳修冬十月代公猗盧遣兵救劉琨大敗漢中山王曜十一月琨保陽曲以本紀修解題曰陽曲太原國縣水經注汾水西南徑陽曲城北魏土地記曰陽曲胡寄居太原界始平太守麴允馮翊太守梁緯等攻閻鼎鼎走死十二月羣胡攻賈匹殺之允領雍州刺史以通鑑修解題曰京兆尹梁綜與鼎爭權鼎殺綜鼎首建大謀立功天下始平太守麴允撫夷護軍索綝心害鼎功且規權勢馮翊太守梁緯北地太守梁肅並綜母弟綝之姻乃證其有無君之心專戮大臣遂攻鼎鼎奔雍為氐所殺夫首建入關之謀者閻鼎也與賈匹謀興復晉室者梁肅等也帥十萬衆㑹之者梁綜也今秦王輔入關而鼎以爭權殺綜麴允輩又欲專權而殺鼎匹亦斃於群胡之手欲帝業之定也難哉事見通鑑王浚遣督護王昌帥段疾陸眷等攻漢石勒大敗段氏遂附於勒以列傳修是歲王敦殺其從兄軍咨祭酒澄澄將玉機據廣州王如降於敦以吕祖謙標目修江陽太守張啓殺王異而代之尋卒三府表涪陵太守向沈行西夷校尉以通鑑修羌姚弋仲稱扶風公以通鑑修晉孝愍皇帝建興元年漢昭武皇帝嘉平三年成武皇帝玉衡三年春正月帝蒙塵于平陽以本紀修二月丁未漢主聰弒帝以通鑑修三月向沈卒成取巴陵以通鑑修解題曰初成都之失守也羅尚猶統巴涪暨尚卒於巴郡而巴亂矣故韓松治巴東而成亦遂取涪向沈蘭續退保涪陵終為成所併而已事見通鑑夏四月壬申皇太子業即皇帝位改元解題曰宋庠紀年通譜建興劉禪孫亮李雄年號愍帝雖草創繼世而建元合前三號不祥甚矣以麴允及京兆太守索綝為左右僕射以本紀修漢石勒使從子虎據鄴以通鑑修解題曰按晉春秋曰石勒背漢之謀始於此又按載記勒謂張賔曰鄴魏之舊都風俗殷雜誰可任也賔曰晉故東萊太守趙彭有佐時良幹於是徴為魏郡太守彭泣辭以石虎鎮鄴三臺石虎篡奪之萌兆於此張賔始勸勒不攻三臺避其實也既得襄國則亟圖三臺乘其虛也殆無遺算矣相臺志鄴在今相州東三十里本魏地城冢記云狄滅邢衛齊桓公築鄴城以衛諸侯管子亦曰築五鹿中牟鄴以衛諸夏今此城在鄴東一里半東西七里南北五里齊所築也漢置魏郡於此曹操建都凡七門南面三門東面一門西面一門北面二門餘見通鑑琅邪王録事參軍陳頵數論事睿出之為譙郡太守以通鑑修五月壬辰琅邪王睿大司馬南陽王保為左右丞相大都督陜東西軍事以本紀修石勒取山東郡縣以本紀修秋詔琅邪王睿進軍睿辭八月以長史刁協為丞相左長史從事中郎劉隗為司直軍咨祭酒祖逖為豫州刺史屯淮隂以本紀通鑑修武昌太守陶侃大破杜韜王敦表為荆州刺史以通鑑修九月荀藩薨以本紀修漢中山王曜敗麴允于黃白城以通鑑修解題曰黃白城在今耀州三原縣西南竟陵太守杜曽反冬十月擊敗陶侃侃擊杜韜大破之以通鑑修氐揚難敵取梁州自稱刺史以吕祖謙標目修十一月麴允襲漢中山王曜大敗之以吕祖謙標目修十二月漢石勒奉表於王浚以通鑑修解題曰昔智伯欲襲衛遺之乘馬先之以璧衛君大恱諸大夫皆喜而南文子獨有憂色衛君問之南文子曰無方之禮無功之賞禍之先也我未有往而彼有以來是以憂也於是衛君修梁津捍邉城智伯不敢伐浚豈未之知乎事見通鑑是嵗琅邪王睿遣世子紹鎮廣陵以舉要歷補遺修代公猗盧城盛樂及平城以通鑑修解題曰元和郡縣志續通典漢末胸奴擾邉定襄以西雲中雁門西河遂空曹公始立平城縣晉改屬雁門猗盧都平城道武建都東至軍都關西至河南至中山隘門塞北至五原為甸服孝文遷都為恆州唐正觀自朔州北定襄城移雲州及定襄縣於此天寶升大同軍節度使後魏雲州在郡北三百餘里定襄故城齊立朔州在西南一名平城甲戌晉孝愍皇帝建興二年漢昭武皇帝嘉平四年成武皇帝玉衡四年春正月己巳黑霧著人如墨辛未有如日隕于地又有二日相承出西方而東行以本紀修揚難敵去梁州地歸于城以吕祖謙標目修二月壬寅鎮西將軍張軌為太尉涼州牧王浚為大司馬都督幽冀軍事司𨽻校尉荀組為司空行留臺事劉琨為大將軍都督并州軍事以紀傳修漢石勒遣使劉琨請討王浚三月壬申勒襲執浚殺之使燕國劉翰戌薊翰歸段匹磾以吕祖謙標目修解題曰勒纂兵戒期將襲浚而懼劉琨及鮮卑烏丸為其後患沉吟未發張賔曰夫襲敵國當出其不意軍嚴經日不行豈顧有三方之慮乎勒曰為之奈何賔曰今三方未謂將軍便能懸軍千里以征幽州也輕軍往返不出二旬就使三方有動勢足旋趾且琨浚雖同名晉藩其實仇敵若修箋于琨送質請和琨必欣于得我喜于浚滅終不救浚而襲我也於是宵行遣張慮奉箋于琨陳已過深重求討浚以自效琨素疾浚乃檄諸州郡說勒知命思愆收纍年之咎求拔幽都效善將來今聽所請受任通和餘見通鑑琨嘗歸勒毋授以大將軍郡公之號勒方嬉笑靳侮謝而絶之今其勢日張何畏於琨而卑辭請和乎直畏我之擬其後耳而琨恬不之怪真謂其若有思愆念咎之意者勒遂得以襲取王浚略無後憂琨乃上表朝廷謂浚受其僞和為勒所虜勒勢轉盛欲來襲臣東北八州勒滅其七先朝所授存者惟臣是以勒朝夕謀慮以臣為計豈琨至是而後悟耶琨誚浚受其僞和而已乃復受其和其相去幾何是亦目睫之論也樂陵太守邵續附石勒尋歸琅邪王睿以為平原樂安太守以吕祖謙標目修夏五月己丑西平武穆公張軌薨世子實立以紀傳修漢中山王曜趙染冦長安六月敗還秋七月染攻北地麴允殺之以吕祖謙標目修冬十月張實都督涼州軍事涼州刺史以列傳修晉孝愍皇帝建興三年漢昭武皇帝建元元年成武皇帝玉衡五年春二月丙子琅邪王睿為丞相大都督督中外軍事南陽王保為相國大將軍荀組為太尉豫州牧劉琨司空都督并冀幽三州軍事進代公猗盧爵為王以本紀修杜韜别將陷豫章三月尋陽內史周訪平之以本紀修漢改元以載記修解題曰宋庠紀年通譜建元漢武帝年號漢青州刺史曹嶷盡得齊魯之地以吕祖謙標目修秋八月陶侃克長沙杜韜走死以本紀修琅邪王睿以王敦為鎮東大將軍都督江揚荆湘交廣六州軍事江州刺史敦以王機為交州刺史陶侃為廣州刺史從弟軍咨祭酒廙為荆州刺史杜曽迎荆州刺史第五猗以拒廙王機謀據廣州侃討之機走死以通鑑修九月漢中山王曜冦北地冬十月拔馮翊以本紀修晉孝愍皇帝建興四年漢昭武皇帝麟嘉元年成武皇帝玉衡六年春正月贈吳王晏太保諡曰孝以吕祖謙標目修二月漢殺少府陳休等七人太宰河間王易御史大夫陳元達等諫不聽三月易恚死元達自殺以載記修代王猗盧為其子六修所弒其將箕淡等歸劉琨以本紀修夏六月丁巳朔日有食之以本紀修大蝗以本紀修秋七月漢中山王曜圍北地大都督麴允救之衆潰九月曜陷長安外城冬十月乙未帝出降御史中丞吉朗死之丁酉遷帝于平陽允死之以本紀載記修解題曰帝之繼皇統也屬永嘉之末天下崩離長安城中戶不盈百墻宇頽毁蒿棘成林朝廷無車馬章服惟桑版署號而已公私有車四乘器械多闕運饋不繼巨猾滔天帝京危急諸侯無釋位之志征鎮闕勤王之舉故君臣窘迫以至殺辱云餘見通鑑漢以曜為秦王大都督督陜西軍事改元以本紀載記修劉琨遣箕淡攻石勒于坫城自屯廣牧勒大破之以列傳修解題曰按晉書地理志樂平郡有沾縣今石勒圍樂平太守韓據于坫城沾之為坫殆字畫之訛也又按晉書地理志并州新興郡有廣牧縣水經注河東徑廣牧故城北十二月乙邜朔日有食之以宋志修并州降石勒己未劉琨奔段匹磾以本紀修琅邪王睿刻日北征以漕運稽期誅督運令史淳于伯而還以吕祖謙標目修解題曰按列傳及宋書五行志後將軍禇裒鎮廣陵丞相揚聲北伐淳于伯以督運稽留及役使贓罪依征軍法戮之其息忠訴稱伯督運事訖無所稽乏受賕役使罪不及死軍是戍軍非為征軍自四年以來運漕租調皆有稽停不以軍興論至於伯也何獨明之司直劉隗彈劾衆官右將軍王導引咎請解職元帝無所問於是頻旱三年干寶以為寃氣之應餘見通鑑朱熹曰元帝無意於復中原託以督運稽期歸罪令史血逆柱流至二丈餘天理真不隔毫分琅琊王睿以邵續為冀州刺史以通鑑修晉孝愍皇帝建興五年漢昭武皇帝麟嘉二年成武皇帝玉衡七年涼張實建興五年春正月帝䝉塵于平陽以本紀修庚子三日並照以天文志修張實遣兵擊漢不能進而還以列傳修二月漢劉暢攻滎陽太子李矩大敗之以列傳修三月辛卯琅邪王睿即晉王位改元解題曰按本紀𤣥石圖有牛繼馬後故宣帝深忌牛氏遂為二榼共一口以貯酒焉帝先飲佳者以毒酒鴆其將牛金而恭王妃夏侯氏竟通小吏牛氏而生元帝亦有符云餘見通鑑胡寅曰魏明帝青龍三年寶石負圖有石馬七及犧牛之象司馬懿始封晉王至愍帝七世此石馬之數也前史載元帝之父牛其姓與夏侯妃通而生帝帝實姓牛而冒晉姓晉之君臣所以安之而不革者正以胡羯交侵江左微弱倘不慿依舊業無以係屬人心是以不得已而為之爾宋庠紀年通譜建武漢光武晉惠帝年號帝雖草創江左而再用惠元可謂亡其典矣立世子紹為太子以征南大將軍王敦為大將軍揚州刺史王導為驃騎將軍領中書監録尚書事刁協為左僕射劉隗為御史中丞以紀傳修劉琨等遣司馬溫嶠奉表勸進於晉王睿以通鑑修解題曰事見通鑑張栻曰溫嶠孝友篤至一旦奉劉琨之檄將命江左毋崔固止之不可至於絶裾而行太真有母此身固不得以許琨矣若既已委質為臣當危難而無避可也將命之舉豈無他人獨不得辭乎投富貴之機赴功名之㑹而其所喪若此惜哉夏四月漢殺太弟義吕祖謙標目五月壬午日有食之以天文志修荀組等上表勸進於晉王睿以列傳通鑑修解題曰按劉琨傳元帝稱制江左琨乃令溫嶠勸進於是河朔征鎮夷夏一百八十人連名上表荀組傳西都不守組乃遣使移檄天下共勸進事見通鑑琨之上表既列邵續曹嶷崔毖而通鑑於六月始書荀組邵續曹嶷崔毖等上表勸進者蓋續等始承琨檄已自列名至是又上表亦猶慕容廆始既連名又自專遣王濟也但通鑑於琨初勸進之時缺列三人名耳祖逖入譙城六月漢石虎圍之己巳晉王睿傳檄遣琅琊王裒等討虎尋還以紀傳修解題曰張栻曰為國有大幾大幾一失則其弊隨起而不可禁大幾者三綱之所存是也元帝初以懷帝之命來臨江左當時以時事艱難分建屏翰其責蓋不輕矣而其規模蓋有自為封殖之意而無慷慨謀國之誠懷帝䝉塵不聞勤王之舉愍帝之立增重寄委制詔深切而亦自若也愍再蒙塵懼天下之議已則陽為出師之勢遷延顧望終歸辜於運餉令史以塞責受君父之委託而坐視其禍變因時事之艱難而覬幸以自利三綱淪矣故其規摹亦復不競王敦輩不旋踵而起也事見通鑑西海太守張肅實叔父也以京師危逼請為先鋒擊劉曜實以肅年老弗許肅曰狐死首邱心不忘本肅受晉寵剖符列位羯逆滔天朝廷傾覆宴安方裔難至不奮何以為人臣既而聞京師陷沒悲憤而卒元帝聞此能無愧乎秋七月大旱蝗河汾溢以通鑑修解題曰按水經汾水出太原汾陽北管涔山注十三州志曰出武州之燕京山亦管涔之異名也東南過晉陽縣又南過大陵縣東注水於縣左迤為塢澤廣雅曰水自汾出為汾陂陂南接塢吕氏春秋謂之大理又名之曰漚夷之澤徑祈縣連延西接塢澤是謂祈藪即爾雅所謂昭餘祈矣又南入河東界過永安縣西又南過平陽縣又屈從臨汾縣西流至汾隂縣北西注于河荀組為司徒以本紀修八月漢荆州刺史趙固以洛陽降李矩以吕祖謙標目修九月戊寅武昌太守趙誘等攻杜曽敗死豫章太守周訪擊曽破之以紀傳修冬十一月己酉朔日有食之以天文志修丁卯劉琨為太尉以本紀修十二月戊戌漢主聰弒帝以本紀修解題曰西晉四帝共五十二年漢太子粲遣將攻洛陽趙固走以列傳修是嵗置史官立太學以本紀修解題曰此晉之所以即安於江左也按列傳時方修學校簡省博士置周易王氏尚書鄭氏古文尚書孔氏毛詩鄭氏周官禮記鄭氏春秋左傳杜氏服氏論語孝經鄭氏博士各一人其儀禮公羊榖梁及鄭易皆省不置太常荀嵩上疏武皇應運太學有石經古文先儒典訓賈馬鄭杜伏孔王何顔尹之徒置博士十九人今五經合九人猶冝增四鄭易鄭儀禮春秋公羊榖梁博士各一人命課農功諸軍佃作即以為禀以吕祖謙標目修大事記續編卷二十七
