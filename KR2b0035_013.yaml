body:
  text: 大事記續編卷十三明王禕撰漢孝安皇帝永初元年春二月丙午以廣成游獵地被災郡國公田假貧民以本紀修觧題曰李賢曰廣成在今汝州葉縣西二月庚午梁鮪薨以本紀修三月癸酉日有食之本紀觧題曰本志曰月二日也夏四月封三公及鄧隲兄弟為列侯隲等辭不受以列傳修五月甲戍以長樂衛尉魯恭為司徒本紀六月壬戌罷西域都䕶及伊吾屯田以紀傳修燒當先零種羌反遣鄧隲征西將軍任尚討之丁卯赦諸羌以紀傳修觧題曰續漢書種羌九千餘户在隴西臨洮谷秋九月庚午以災異免徐防辛未以雨水免尹勤以本紀及傳修觧題曰王安石曰世祖能馭大臣所以威名不減於髙祖至於為子孫慮則不然反以元成之後三公之任多脅於外戚豎官廧帷近習之人而致敗由是置三公之任而事歸臺閣臺閣之臣位卑事冗無所統一而奪於衆多之口此其為脅於外戚豎官廧帷近習者愈矣至於治有不進水旱不時災異或起則曰三公不能夑理隂陽而䇿免之甚者至於誅死豈不痛哉壬午詔减黄門皷吹廐馬半食以本紀修庚寅以張禹為太尉太常周章為司空以本紀修觧題曰漢官儀曰章字次叔荆州隨縣人也鄭衆等預政周章欲廢帝而立平原王勝冬十一月丁亥䇿免章自殺以本紀修觧題曰殤帝崩羣臣以平原王勝疾非痼意咸歸之太后以前既不立恐後為怨乃立清河孝王子祐章以衆心不附遂密謀閉宫門誅大將軍鄧隲兄弟及鄭衆蔡倫刼尚書廢太后於南宫封帝為逺國王而立平原王事覺䇿免餘見通鑑唐仲友曰章為大臣欲盡持危扶顛之道當於議立君之時議之如其不合而死不失為忠正今不廷争之於先而行險以僥倖成則兆亂敗則為賊終亦不免而已矣故曰非死之難處死之難也是嵗地震雨水大水大風雨雹以本紀修漢孝安皇帝永初二年春正月鄧隲為鍾羌所敗以通鑑修觧題曰自爰劒後子孫支分凡百五十種其九種在賜支河首及在蜀漢徼北其五十二種衰小不能自立其八十九種唯鍾最强勝兵十餘萬其餘大者萬餘人小者數千人盛衰無常順帝時勝兵合可二十萬人發羌唐旄等逺未嘗徃來釐牛白馬在蜀漢其種名號皆不可紀知也夏五月旱丙寅皇太后幸洛陽寺若盧獄録囚徒即日降雨以本紀袁宏漢紀修六月大水大風雨雹本紀冬十月任尚與先零羌戰於平襄敗績以本紀修觧題曰李賢曰平襄縣屬天水郡故襄戎邑十一月辛酉徴鄧隲為大將軍以朱熹綱目修觧題曰左校令龎㕘坐法輸作若盧使其子俊上書曰方今西州流民擾動徴發不絶水潦不休地力不復重之以大軍疲之以逺戍農功消於轉運資財竭於徴發臣愚以為萬里運粮逺就羌戎不若總兵養衆以待其疲車騎將軍隲宜且振旅留征西校尉任尚使督凉州士民轉居三輔休徭役以助其時止煩賦以益其財令男得耕種女得織紝然後蓄精鋭乗懈沮出其不意攻其不備則邊民之仇報奔北之恥雪矣書奏㑹樊準上疏薦叅太后即擢叅於徒中召拜謁者使西督三輔諸軍屯餘見通鑑陳瓘曰㕘之言如此雖欲無用得乎先零羌滇零稱天子冦三輔犯趙魏入益州以本紀修是嵗地震以本紀修漢孝安皇帝永初三年春正月帝加元服以本紀修遣騎都尉任仁討先零羌不利以本紀修三月京師大饑民相食本紀壬寅魯恭免以本紀修觧題曰葉適曰魯恭政理足以致物應而居公位不能弭隂陽之變史稱在位不以亮直稱自為三公常稱病不視事豈固欲蹈明哲保身之計耶其諫伐匈奴論立秋行刑援引根據蓋深於經者也唐仲友曰以恭之徳行經學近於王者之佐及為三公乃無可書以是知任而無權與不任等耳夏四月三公以國用不足奏令吏人入錢穀為闗内侯虎賁郎以下有差以本紀修六月烏桓冦代郡上谷涿郡本紀秋七月海賊張伯路等冦濵海九郡遣侍御史龎雄督州郡兵擊之以本紀通鑑修九月雁門烏桓及鮮卑反以本紀修冬十月南單于反十一月遣行車騎將軍何熈討之以本紀修十二月乙亥有星孛於天苑本紀是嵗地震雨水并凉大饑以本紀修漢孝安皇帝永初四年春正月元㑹徹樂以本紀修辛卯除三輔逋租過更口筭芻藁以本紀修張伯路攻厭次遣御史中丞王宗督幽冀兵破之以紀傳修觧題曰厭次本富平漢明帝更名今棣州所治度遼將軍梁慬等破南單于於屬國故城以本紀修丙午詔减百官及州縣俸以本紀修二月南匈奴冦常山本紀乙丑初置長安雍二營都尉以本紀修詔謁者劉珍等校定東觀五經諸子百家以本紀修觧題曰鄧太后使珍與校書劉騊駼馬融及五經博士校定東觀五經諸子傳記百家藝術整齊脱誤是正文字順帝永和元年復詔侍中伏無忌無與議郎黄景校定中書五經諸子百家藝術三月南單于降本紀先零羌冦褒中徵任尚還以列傳修觧題曰羌冦轉盛兵費日廣龎參奏記於鄧隲曰比年羌㓂特困隴右官負人債數十億萬今復募發百姓調取穀帛千里轉糧逺給武都西郡塗路傾阻難勞百端縣官不足輙貸於民名救金城而實困三輔三輔既困復為金城之禍矣夫拓境不寧無益於彊多田不耕何救飢敝故善為國務懐其内不求外利務富其民不貪廣土三輔民庶稀疏故縣邱城可居者多今宜徙邊郡不能自存者入居諸陵田戍故縣此善之善者也隲欲棄凉州并力北邊乃㑹公卿集議隲曰譬若衣敗壊一以相補猶有所完若不如此將兩無所保議者咸同郎中虞詡説太尉李修曰先帝開拓土宇劬勞而後定而今憚小費舉而棄之凉州既棄即以三輔為塞園陵單外此不可之甚也諺曰闗西出將闗東出相觀其習兵壮勇實過餘州今羗胡所以不敢入據三輔者以涼州在後故也其土人所以推鋒執鋭無反顧之心者為臣屬於漢故也若棄其境域徙其人庶安土重遷必生異志如使豪雄相聚席卷而東雖賁育為卒太公為將猶恐不及當議者喻以補衣猶有所完詡恐其疽食浸滛而無限極禹曰然則計當安出詡曰今凉土擾動人情不安竊憂卒然有非常之變誠宜令四府九卿各辟彼州數人外以勸厲答其功勤内以拘致防其邪計修善其言更集四府皆從詡議李賢曰四府謂太傅太尉司徒司空按時無太傅蓋太尉司徒司空大將軍也於是辟西州豪傑為掾屬拜牧守長吏子弟為郎以尉安之鄧隲以詡異其議因此不平欲以吏法中傷詡乃以為朝歌長觀後此永建元年龎參為大鴻臚詡薦參有宰相器能夫棄凉州之議參實發之也鄧隲以議論不同而惡虞詡詡不以議論不同而沮龎㕘用心之廣狹可以觀矣崔烈欲棄涼州傅燮論亦同李賢曰襃中縣屬漢中郡今梁州褒城縣古褒國也餘見初平二年觧題徙金城於襄武以本紀修觧題曰李賢曰襄武縣屬隴西郡令渭州縣戍子杜陵園火以本紀修夏四月蝗本紀冬十月鄧隲罷以本紀修是嵗地震大水以本紀修漢孝安皇帝永初五年春正月庚辰朔日有食之本紀丙戍地震己丑張禹免以本紀修二月先零羌㓂河東河内以本紀修三月詔徙隴西安定北地上郡於襄武羙陽池陽衙以本紀修觧題曰杜佑通典漢隴西郡治狄道縣今金城郡縣安定治臨涇羙陽在今京兆三原縣漢上郡治膚施縣今上郡龍泉縣衙今白水縣李賢曰北地郡今寧州池陽故城在涇州縣北髙句驪㓂𤣥莬以列傳通鑑修夏閏四月青州刺史法雄擊張伯路斬之以通鑑修是嵗蝗雨水以本紀修漢孝安皇帝永初六年春正月甲寅皇太后與皇帝祭於宗廟大臣命婦相以袁山松謝沈書古今注修觧題曰謁者劉珎上言曰永平初梁松言皇太后宜入廟與陛下交獻以彰至孝之心孝明皇帝使公卿愽士議時太傅鄧禹奏宜如松言光烈皇后於是入廟皇太后宜入宗廟如光烈皇后故事事下公卿僉曰宜如珎言李賢曰續漢志袁山松謝沈書皆云六年正月甲寅范紀七年庚戍疑誤三月蝗以本紀修夏四月詔紹封鄧禹等後九人為侯以袁宏漢紀修五月旱丙寅復羣吏秩賜爵有差以本紀及袁宏漢紀修六月壬辰豫章員谿原山崩本紀是嵗滇零死子零昌自立為天子以本紀修漢孝安皇帝永初七年春二月地震以本紀修夏四月乙未平原懐王勝薨以本紀修丙申晦日有食之本紀秋䕶羌校尉侯霸等破先零羌以本紀修八月京師大風蝗以本已修漢孝安皇帝元初元年春正月改元以本紀修三月日有食之以本紀修屯兵河内作塢壁以備羌以通鑑修夏四月旱蝗以本紀修五月先零羌㓂雍城本紀觧題曰郡國志右扶風有雍縣又後魏太武於鳳翔府天興縣東五里築雍城鎮今据方輿志滇零㓂及雍城注今懐州北有故城時方屯兵河内以備羌則是懐州之雍城非扶風之雍城也秋九月羌㓂武都漢中以本紀修冬十月戊子朔日有食之本紀乙卯詔除三輔田租更賦口筭三嵗以本紀修是嵗地震以通鑑修漢孝安皇帝元初二年春二月詔三輔河内河東上黨趙國太原理舊渠以本紀修觧題曰水經注智伯遏晉水以灌晉陽後人踵其遺跡蓄以為沼分為二派北瀆即智氏故渠其瀆乗髙東北注入晉陽城以灌溉東南出城注於汾水今所修渠即此三月零昌㓂益州以本紀修夏四月丙午立貴人閻氏為皇后本紀觧題曰袁宏曰閻氏滎陽人暢之女也五月旱蝗以本紀修秋九月壬午晦日有食之本紀冬十月遣中郎將任尚屯三輔乙未右扶風仲光等與先零戰於丁奚城敗沒以本紀修觧題曰李賢曰丁奚城在北地靈州以懐令虞詡為武都太守以列傳修十一月庚申地震以本紀修漢孝安皇帝元初三年春二月地震以本紀修三月辛亥日有食之本紀觧題曰本志月二日也夏四月壬寅封皇后父暢為北宜春侯以列傳修五月癸酉度遼將軍鄭遵率南匈奴擊先零羗於靈州破之觧題曰李賢曰靈州縣屬北地郡故城在今慶州馬嶺縣西北六月任尚遣兵破先零羗於丁奚城以本紀修冬十一月丙戍初聽大臣二千石刺史行三年䘮本紀觧題曰詔大臣得行三年䘮服闋還職尚書陳忠因此上言孝宣皇帝舊令人從軍屯及給事縣官者大父母死未滿三月皆勿徭令得塟送請依此制太后從之建光中尚書令祋諷尚書孟兾等以為孝文定約禮之制光武絶告寧之典貽則萬世誠不可改宜復建武故事忠上疏曰臣聞孝經始於愛親終於哀戚上自天子下至庶人其義一也夫父母於子三年乃免於懐抱先聖縁人情而著其節制服二十五月髙祖受命蕭何創制大臣有告寧之科合於致憂之義建武之初新承大亂凡諸國政多趨簡易大臣既不得告寧而郡司營禄念私鮮循三年之䘮以顧報復之恩者禮義之方實為彫損官竪不便之竟從諷議遂著於令地震以本紀修十二月任尚遣兵破先零羌於北地以本紀修漢孝安皇帝元初四年春二月乙巳朔日有食之本紀壬戍武庫災本紀夏四月戊申司空袁敞以失鄧氏㫖自殺以列傳修觧題曰鄧隲辭讓范曄謂其忠勞王室然袁敞以不阿權勢失㫖陳寵以不奉禮而不平豈非富貴生不仁沈溺致愚疾歟事見通鑑己巳鮮卑㓂遼西郡兵與烏桓擊破之以本紀修觧題曰李賢曰遼西郡故城今平州東陽縣樂城是六月雨雹如杯以本紀修秋九月䕶羌校尉任尚使客刺殺零昌以本紀修冬十二月甲子任尚等與先零羌狼莫戰於富平上河大破之䖍人羌降以夲紀修觧題曰富平上河縣屬北地郡故城在今靈州囬樂縣西南水經注河水於此有上河之名杜佑曰寧州彭原縣後漢富平縣地西魏置蔚州後置靈州東觀記曰䖍人種羌大豪恬狼等詣度遼將軍降是嵗雨水地震以本紀修漢孝安皇帝元初五年夏六月髙句驪濊貊㓂𤣥莬以本紀修觧題曰濊北與髙句驪沃沮南與辰韓接東窮大海西至樂浪濊及沃沮句驪本皆朝鮮之地秋八月丙申朔日有食之本紀鮮卑㓂代郡冬十月㓂上谷以本紀修鄧遵使羌雕何刺殺狼莫封武陽侯任尚坐争功十二月徴棄市以紀傳修觧題曰任尚嘗殺零昌矣止三伯户亭侯耳而鄧遵以殺狼莫封三千户此其所以争功也事見通鑑是嵗地震本紀漢孝安皇帝元初六年春二月乙巳地震水涌以本紀修秋七月鮮卑㓂馬城鄧遵率南單于擊破之以本紀袁宏漢紀修觧題曰李賢曰馬城縣屬代郡故城在今靈州定襄縣十二月戊午朔日有食之既以本紀修北匈奴役屬西域至是車師鄯善來降以吕祖謙標目修漢孝安皇帝永寧元年春三月北匈奴率車師後王殺燉煌司馬索班等復置西域副校尉以列傳修沈氐羌㓂張掖本紀觧題曰李賢曰續漢志曰羌在上郡西河者號沈氐夏四月丙寅立子保為皇太子改元以本紀修六月䕶羌校尉馬賢擊沈氐於鸞鳥破之以本紀修觧題曰李賢曰鸞鳥縣屬武威郡故城在今涼州昌松縣北鸞音雚秋七月乙酉朔日有食之本紀冬十二月遼西鮮卑降本紀癸酉以太常楊震為司徒以本紀修觧題曰震明經愽覧無不窮究不答州郡禮命年五十始仕州郡大將軍鄧隲聞其賢而辟之舉茂才四遷荆州刺史東萊太守元初四年為太僕遷太常餘見通鑑胡寅曰鄧隲推逹賢能自其羙操要之女主擅朝彼貴戚也被其薦者宜有去就之分豈可茍哉震不荅州郡禮命數十年一旦幡然為隲而起其處義殆未精矣越騎校尉鄧康免以列傳修是嵗大風雨水地震以本紀修大事記續編卷十三
