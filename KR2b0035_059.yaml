body:
  text: 大事記續編卷五十九明王禕撰唐肅宗皇帝至德元載春正月乙卯安禄山稱燕帝改元以吕祖謙標目修丙辰以李隨為河南節度使以通鑑修壬戌賊將史思明陥常山顔杲卿死之鄴廣平等郡復䧟以吕祖謙標目修解題曰禄山既反至藁城常山太守顔杲卿力不能拒與長史袁履謙往迎之禄山輙賜杲卿金紫質其子弟使仍守常山杲卿歸途中指其衣謂履謙曰何為著此履謙悟其意乃隂與杲卿謀起兵討禄山參軍馮䖍前真定令賈深藁城尉崔安石郡人翟萬德内邱丞張通幽等皆預謀遣人語太原尹王承業宻與相應㑹顔真卿自平原遣杲卿甥盧逖潜告杲卿欲連兵斷禄山後路以緩其西入之謀於是杲卿以計擒賊將李欽湊髙邈何千年千年謂杲卿曰太守欲輸力王室既善其始當慎其終此郡應兵烏合難以臨敵宜深溝髙壘勿與爭鋒俟朔方軍至併力齊進傳檄趙魏斷燕薊腰膂彼賊成擒矣今且聲言李光弼引步騎一萬出井陘且張獻誠方將五郡團結兵圍饒陽宜使人説獻誠云足下所將皆團練之人無堅甲利兵難以當山西勁卒彼必解圍遁去此亦一竒也杲卿用其計獻誠果遁去杲卿乃使人入饒陽城慰勞將士并徇諸郡云大軍已下井陘朝夕當至先平河北諸郡先下者賞後至者誅河北響應者十七郡皆歸朝廷兵合二十餘萬其附禄山者范陽盧龍宻雲漁陽汲鄴六郡而已至德元載杲卿使其子泉明賈深獻李欽湊首及何千年髙邈於京師張通幽泣請曰通幽兄陥賊乞與泉明偕行以救宗族杲卿哀而許之至太原杲卿欲自託於承業乃教以留泉明等更其表自以為功而毁短杲卿别遣使獻之杲卿起兵纔八日守偹未完史思明蔡希德引兵至城下杲卿告急於承業承業既竊其功擁衆不救杲卿晝夜拒戰糧盡矢竭城遂陥杲卿及履謙皆被執王承業使至京師𤣥宗大喜拜承業為羽林大將軍徵杲卿為衛尉卿朝命未至而城已䧟杲卿至洛陽禄山數杲卿反罪杲卿瞋目罵曰汝本營州牧羊羯奴天子擢汝為三道節度使恩幸無比何負於汝而反我世為唐臣禄位皆唐有豈從汝反耶我為國討賊恨不斬汝何謂反也臊羯狗何不速殺我禄山大怒并履謙等縛於中橋柱剮之二人比死罵不虚口顔氏一門死於刀鋸者三十餘人癸亥李光弼為河東節度使甲子加哥舒翰左僕射同平章事舊紀解題曰按新史志貞觀八年僕射李靖三兩日一至中書門下髙祖已後為宰相者必加同中書門下三品當時武帥得此者絶希今翰以左僕射同平章事盖責任方重故也及憲宗時王鍔為河東節度使求兼宰相權德輿等執不可以為方鎮𢃄宰相必有大忠若勲否則强不制者不得與之事乃止懿僖以後用以寵方鎮雖桀賊奴材不問可以觀世道矣事見通鑑南陽太守魯炅為南陽節度使以新紀修解題曰是載置襄陽南陽防禦使尋升南陽為節度使置興平節度使領上洛安康武當房陵二載廢升襄陽為山南東道節度領襄鄧隨唐安均房金商上元廢興平節度寳應金商𨽻京畿興元置金商都防禦使貞元元年鄧州𨽻都畿三年山南東道領復州十年安州𨽻奉義元和十年置唐隨鄧節度治唐州十一年治隨州十二年廢還山南東道光啟升金商都防禦使為節度是年罷為昭信軍防禦使文德賜山南東道號忠義軍光化升昭信軍為節度天祐賜號戎昭軍増領均房又更曰武定軍三年忠義軍復為山南東道廢武定軍均房𨽻山南東道乙丑安禄山遣其子慶緒冦潼闗哥舒翰擊却之以舊紀修二月李光弼取常山史思明救之敗走以通鑑修真源令張廵守雍丘通鑑解題曰真源亳州縣庚子賈賁與賊將令狐潮戰死之三月廵敗之以新紀通鑑修戊辰以靈昌太守嗣吳王祗為河南節度使以通鑑修壬午李光弼為范陽長史河北節度使以舊紀修加户部侍郎河北防禦使顔真卿為採訪使真卿克魏郡以通鑑修夏四月甲午郭子儀李光弼與史思明戰於九門大敗之庚子克趙郡以新紀通鑑修解題曰九門常山郡縣或曰土門以平盧逰奕使劉正臣為節度使安東將王𤣥志為副大都䕶以通鑑修五月丁巳魯炅潰於滍水以夷陵太守虢王巨為河南節度使以新紀傳修解題曰鄭樵曰滍水出汝州魯山縣東過犫縣故城北疑犫後来并入葉西北過定陵入於汝定陵頴昌府舞陽也壬午郭子儀李光弼擊史思明於嘉山大破之河北十餘郡復降以通鑑修解題曰竇苹音訓嘉山屬定州河洛春秋光弼頓軍恒陽樵採往来難趙州司户包處遂曰昔秦趙爭山先居者勝宜出有膂力者五萬被甲兩重陌刀各一東山髙峻先令五千上設伏後出二千人山東取糧賊追之奔山上伏兵與鼓一百面山上避賊百姓壯者亦與器械令隨大軍賊必圍山城内出五萬人將二人各領二萬人一將於南靣一將於北門賊營在山東其軍夜出去賊三十里行張左右翼以天曉合圍每二十五人為隊每隊置旗二􅕣􅕣皷子一圍落纔合則動皷子然後於城東門出一萬人布掌底陳山上亦擊皷而下齊攻之光弼然此計乃出人取糧賊果来襲即奔山上依前計大破賊於嘉山餘見通鑑楊國忠逼哥舒翰進兵六月庚寅與賊將崔乾祐戰於靈寳西原大敗翰降賊解題曰王師古曰翰之敗雖曰制於朝廷而明皇用國忠之計置翰於死地要之翰不能守所見以畏法而行殊不知行亦死不行亦死與其行而死以敗國事不若不行而死以全百萬之師為國家計也使李牧趙充國李忠嗣處之吾知其必不墮姦人術中以敗國殄民矣事見通鑑靈寳陜州縣漢𢎞農縣在西北故函谷闗乙未帝西幸丁酉次馬嵬楊國忠及貴妃皆伏誅解題曰按新史列傳安禄山反𤣥禮謀誅楊國忠闕下不果至馬嵬卒誅之餘見通鑑留太子討賊西京䧟陳希烈等降賊丙午次河池郡以劍南節度副大使崔圓為中書侍郎同平章事以新舊紀通鑑吕祖謙標目修戊申安禄山遣其將孫孝哲入長安通鑑太子自豐寧趍靈武以新紀修解題曰庚戌次豐寧見大河之險將保之㑹大風迴趍靈武餘見通鑑豐寧屬靈州劉正臣襲范陽史思明擊敗之以通鑑修秋七月甲子帝次普安郡以憲部侍郎房琯為文部侍郎同平章事以新紀修解題曰普安宋隆慶府太子亨即皇帝位於靈武尊皇帝為上皇天帝大赦改元御史中丞裴冕為中書侍郎同平章事以新紀修解題曰往年𤣥宗嘗欲使太子監國貴妃衘土請命而止今太子之東也又嘗宣㫖傳位特逡巡未敢受爾韋見素諸人懵不見事既無以啟𤣥宗之斷而裴冕輩急於富貴又未免陥太子於欲速之域他日永王璘之反未必不以是藉口也事幾一差使父父子子兄兄弟弟俱不得其正可不畏哉事見通鑑宋庠紀年通譜至德本陳長城公年號丁卯上皇以太子為天下兵馬元帥都統朔方河東河北平盧節度使永王璘盛王琦豐王珙皆為諸道節度惟璘之鎮以新紀通鑑修解題曰按司空圖詩注云禄山見詔書令諸王分鎮撫膺歎曰吾不得天下矣圖當時必有所聞新史通鑑皆遺闕此語餘見通鑑平盧見開元二年幽州節度使解題安禄山殺妃主皇孫以通鑑修庚午上皇次巴西郡以太守崔渙為門下侍郎同平章事韋見素為左相以新紀修解題曰巴西今綿州賊冦扶風太守兼防禦使薛景仙擊却之以通鑑修庚辰上皇次蜀郡以新紀修令狐潮圍雍邱張廵大破之以通鑑修顔真卿為工部尚書兼御史大夫以通鑑修郭子儀李光弼將兵至靈武八月壬午朔以子儀為武部尚書靈武長史光弼為户部尚書北都留守並同平章事光弼殺侍御史崔衆以舊紀通鑑修解題曰按新舊史列傳時節度王承業軍政不修侍御史崔衆主兵太原慢易承業光弼聞之素不平至是衆交兵於光弼衆素狂易見光弼長揖又不即交兵光弼怒收繫之㑹中使至拜衆御史中丞懐其勑問衆所在光弼曰衆有罪收繫之矣中使以勅示光弼光弼曰今日祗斬侍御史若宣制命斬中丞若拜宰相亦斬宰相中使懼而還翌日斬衆威振三軍餘見通鑑孫輔曰將帥專閫外之寄固當行法尚威以制服將士若天子所遣之使則非可以將士例待也當是時靈武初基將帥盡忠以奉王室尚慮不能起盛大之勢安得為强横之態以輕朝廷也衆驕慢信有罪矣曷不論奏乞行國法而遽以軍法從事朝廷方擢其人乃堅拒王命何强横之甚也光弼功髙諸將晩以讒間大節㣲虧由不能去强横之態也賊將逼雍丘張廵擊破之以通鑑修己亥上皇命韋見素房琯崔渙奉皇帝冊詣靈武以新紀修九月壬子史思明䧟趙郡常山以通鑑修以廣平王俶為天下兵馬元帥京兆李泌為侍謀軍國元帥府長史以通鑑修遣使請兵回紇以通鑑修解題曰葉適曰禄山始亂起於倉猝雖極可畏然未至無可經營就使巴蜀奔播靈夏單弱若處置得宜年嵗自定無故増立諸節度使次徧滿四方不知天下本何甞分裂而自作分裂借回紇諸蠻兵與禄山交鬭不知夷狄本未至侵凌而召其侵凌坐此二失百六十年與之始終禄山安能壊唐唐自壊爾事見通鑑南詔陥越嶲以通鑑修冬十月辛巳朔日有食之癸未帝次彭原以新紀修解題曰彭原今寧州初令御史諫官言事不先白大夫宰相宰相分直政事筆以新紀通鑑修始鬻爵度僧尼新紀江淮租庸使第五琦加山南等五道支度使作𣙜鹽法以通鑑修解題曰按新史列傳琦遷司金郎中兼侍御史諸道鹽鐵錢使鹽鐵名使自琦始餘見通鑑以房琯招討西京以新紀修以賀蘭進明為河南節度使以吕祖謙標目修甲申賊將令狐潮攻雍丘張廵大敗之以新紀修房琯及賊將安守忠戰於陳濤斜敗績以通鑑修解題曰按新舊史列傳琯分三軍楊希文將南軍自宜夀即盩厔縣又劉悊將中軍自武功入李光進將北軍自奉天入琯身為中軍先鋒庚子次便橋在咸陽西十里辛丑中軍北軍遇賊陳濤斜在咸陽縣戰不利琯欲持重有所伺中人邢延恩促戰故敗琯用春秋戰法以車二千乘繚營騎歩夾之賊順風揚塵鼓譟牛皆震駭因縱火焚之人畜撓敗殺四萬餘人存者數千而已癸卯琯又率南軍即戰復敗希文悊並降賊餘見通鑑史思明陥河北顔真卿南走以吕祖謙標目修十一月戊午郭子儀以回紇兵擊同羅部於榆林河破之以通鑑修解題曰榆林河即勝州河也遣崔渙宣慰江南知選舉以吕祖謙標目修十二月甲辰遣山南東道嶺南黔中江南西道節度都使永王璘朝於蜀遂反自江陵東下淮南節度使髙適淮南西道節度使来瑱江東節度使韋陟討之廢璘為庶人以紀傳脩解題曰山南見是年南陽節度使解題嶺南元載升五府經略使為節度使領廣韶循潮康瀧端新封春勤羅潘髙思雷崖瓊振儋萬安藤治廣州咸通分為東西道改曰嶺南東道節度乾寧號清海軍黔中天寳十四載五溪經略使増領守捉使大厯四年置辰溪巫錦業都團練守捉觀察處置使置辰州十二年置黔州經畧招討觀察使領黔施夷辰思費溆播南溱珍錦治黔州貞元増領奬溪元和領涪州大順賜號武泰軍節度光化溆州𨽻武貞節度又復徙治涪州江南西道至德置江東防禦使治杭州乾元元年置浙江西道節度使領昇潤宣歙饒江蘇常杭湖治昇州尋徙蘇州副使治杭州二年廢置觀察處置都團練守捉使治蘇州上元徙治宣州罷領昇州大厯元年罷領宣歙十四年合浙江東西道置都團練觀察使以所管州𨽻西道建中二年合二道置節度使治潤州尋號鎮海軍貞元三年分為二道復置都團練觀察使領潤江常蘇杭湖睦治蘇州四年江州𨽻江西大中復置鎮海節度文德置忠國軍節度使治湖州龍紀置杭州防禦使景福元年杭州號武勝軍防禦使二年陞為都團練觀察使尋廢徙鎮海節度使治杭州淮南至德元載置領揚楚滁和壽廬舒光蘄安黄申沔治揚州尋以光州𨽻淮西乾元沔州𨽻鄂岳壽州𨽻淮西永泰蘄黄𨽻鄂岳建中増領泗州四年置壽州團練使興元罷領豪壽廬升壽州為都團練觀察使領壽豪廬貞元淮南復領廬壽以泗州𨽻徐泗廢壽州為團練使十六年置舒廬滁和都團練使𨽻淮南元和泗州𨽻武寧節度使十三年淮南増領光州長壽増領宿州大和宿州𨽻武寧咸通増領濠州十年濠州𨽻武寧天祐廢舒廬滁和都團練使置光州防禦使張巡移守寧陵與睢陽太守許逺擊賊大破之以巡為河南節度副使以通鑑修解題曰寧陵宋州縣是嵗吐蕃陥威戎等軍石堡等城以吕祖謙標目修嶺南獠梁崇牽䧟容州以新紀修唐肅宗皇帝至德二載春正月帝出居於彭原以春秋修上皇誥憲部尚書李麟同平章事遣崔圓赴彭原以舊紀通鑑修河西兵馬使盖庭倫殺節度使周祕度支判官崔偁平之以新紀通鑑修安慶緒弑其父禄山稱帝以吕祖謙標目修殺子建寧王倓吕祖謙標目張廵奔睢陽破賊將尹子竒以吕祖謙標目修劉正臣卒以朱熹綱目修二月戊子帝次鳳翔隴右河西安西西域之兵皆㑹李泌請先取范陽不從以新舊紀吕祖謙標目修解題曰按新史列傳李鄴侯家傳初帝從容問破賊期泌對曰賊掠金帛子女悉送范陽有茍得心渠能定中國耶華人為之用者獨周勢髙尚等數人餘皆脅制偷合不出二年無冦矣陛下無欲速王者之師當務萬全圖久安肅宗曰何謂也曰逆胡將則史思明安守忠田乾真阿史那承慶張志忠皆善戰有謀今已令李光弼守太原出井陘郭子儀取馮翊入河東則思明志忠不敢離范陽常山守忠乾真不敢離長安是以三地禁其四將隨禄山者獨承慶耳賊亦不能東南略地矣使子儀毋取華令賊得通闗中則北守范陽西救長安奔命數千里其精卒勁騎不逾年而弊我以逸待勞来避其鋒去剪其疲以所徴之兵㑹扶風帝幸鳳翔盖用泌之策也與太原朔方軍共擊之来春命建寧王為范陽節度大使北竝塞與光弼南北掎角以取范陽賊失巢穴當死河南諸將手帝然之既逹扶風旬日而安西北庭及大食寧逺諸國兵皆㑹江淮庸調亦至梁洋成都信使絡繹長安人聞車駕至從賊中自拔而来日夜不絶泌請如前䇿收歸檀南取范陽帝欲得長安曰戰必勝攻必取何暇千里先事范陽乎泌曰必得兩京則賊再强我再困且我所恃者磧西突騎西北諸戎耳若先取京師期必在春闗東早熱馬且病士皆思歸不可以戰賊得休養士徒必復南来此危道也莫若用於寒鄉皆除巢穴使賊無所歸帝曰朕切於晨昏之戀不能待此决矣復兩京後當更圖之餘見通鑑葉適曰肅宗之失不在於先復兩京在於復兩京之後耳朝廷之命勅於奄士忠臣義士挫於姦邪懐恩分樹二帥之後唐事無可為者矣郭子儀取河東郡賊將蔡希德等圍太原李光弼大破走之以通鑑修丁酉闗西節度兵馬使郭英乂及安守忠戰於武功敗績以新紀修安慶緒以史思明為范陽節度使以列傳通鑑修解題曰賈循既死禄山以牛廷介知范陽軍事今慶緒更以廷介領安陽軍而思明節度范陽以其有定河北之功也餘見通鑑戊戌庶人璘伏誅以新紀修解題曰通鑑考異云新舊紀傳實録唐厯皆不見璘敗時在何地唯云璘進至當塗若在當塗不應登城望見瓜歩李白永王歌云龍盤虎踞帝王州帝子金陵訪古邱似已據金陵但諸書别未有所見今按新舊傳所載璘兵敗於新豐新豐在建康府遂南奔鄱陽璘敗在金陵顯然陸勢𤣥宗遺編録亦載永王璘於江寧將為逆而考異云然何邪事見通鑑庚子郭子儀破賊於潼闗既而復敗以舊紀通鑑修三月韋見素裴冕罷憲部尚書致仕苗晉卿為左相新紀上皇遣使祭張九齡以通鑑修郭子儀敗安守忠於河東夏四月戊寅朔以郭子儀為司空闗内河東副元帥以新紀修庚寅郭子儀敗賊將李歸仁於留運橋五月癸丑子儀及安守忠戰於清渠敗績以新舊紀通鑑脩解題曰竇苹音訓子儀軍潏水西守忠軍清渠北越七日王師不進賊乘桴以逼我軍子儀使壯士持陌刀於岸以俟之賊軍偽遁子儀帥師逐之賊以鋭卒九千為長蛇陣守忠為首從延平門路入安太清為尾從金光門路入各四千人而以千人趣平川當官軍而横擊之首尾翼張前後奔衝王師不虞賊之暴至遂大潰餘見通鑑竇苹音訓清治谷水自髙陵入擽陽西入耀州界曰清渠下入白渠丁巳房琯罷諫議大夫張鎬為中書侍郎同平章事以新舊紀通鑑修魯炅奔襄陽以通鑑修張廵敗尹子竒以通鑑修秋七月賊將䧟陜郡以新紀修八月甲申崔渙罷新紀己丑張鎬兼河南節度使都統淮南諸軍事以新紀修解題曰舊史傳鎬兼河南節度使持節都統淮南等道諸軍事事見通鑑新史志天寳末置天下兵馬元帥都統朔方河東河北平盧節度使招討都統之名始於此舊史志都統乾元中置或總三道或總五道盖李峘以乾元元年統淮南江東江西節度使則三道也李光弼以上元二年統河南淮東西山南東荆南則五道也建中初李勉以汴州節度使充河南汴州宋滑亳河陽等道都統使都統置使始於此元和中髙崇文以節度使充京西諸軍都統一路都統始於此韓𢎞以節度使充淮西諸軍行營兵馬都統兵馬都統始於此乾符後又置都都統李繪曰都統副都統其名盖生於統軍軍統於將者也都統又盡統諸將諸軍若漢都䕶之稱閏八月丁卯廣平王俶為天下兵馬元帥郭子儀副之以回紇南蠻兵討安慶緒以新紀修九月丁丑上黨節度使程千里為蔡希德所執以紀傳修解題曰至德置澤潞節度使上元増領沁州寳應増領鄭州又増領陳邢洺廣德置相衛節度使治相州増領貝邢洺又増領河陽三城澤潞節度増領懐州大厯元年相衛賜號昭義軍後田承嗣盗取相衛洺貝五年鄭州𨽻涇原建中元年昭義節度兼領澤潞二年罷領懐衛河陽三城二年増領洺州趙州𨽻深趙貞元陳州𨽻陳許中和孟方立徙昭義於邢州而兼領潞州五州有二節度使天復合為一復領澤州壬寅廣平王俶大敗安守忠等於灃水癸卯復京師安慶緒奔陜以新舊紀通鑑修解題曰按通典天寳末年盗賊奔突克復之後府庫一空又所在屯師用度不足於是遣御史康雲間出江淮陶鋭往蜀豪商富户皆籍其家資所有財貨蓄産或五分納一謂之率貸所收巨萬計盖權時之宜其後諸道節度觀察使多率税商賈以充軍資雜用或於津要及市肆交易之處計錢至一千以上者皆以分數税之自是商旅多失業矣餘見通鑑灃水出終南山合於渭甲辰遣使迎上皇以通鑑修冬十月戊申廣平王俶大敗安慶緒於新店克陜郡以新舊紀修解題曰竇苹音訓新店今陜府西四十里癸丑睢陽陥張巡等死之以新紀修解題曰按新舊史列傳李翰張巡傳巡為真源令與單父尉賈賁各召募豪傑同為義舉時雍邱令狐潮舉縣附賊遂自將東敗淮陽兵虜其衆反接在廷暫出行部淮陽囚更解縳迎賁等入潮不得歸巡屠其妻子磔城上吳王祗承制授賁監察御史潮怨賁還攻雍邱賁趍門為衆躪死士乃奉巡主軍祗乃舉兖以東委巡經畧潮以衆四萬薄城人大恐巡分千人乘城分千人為數隊出身前驅直薄潮軍軍却積六旬大小數百戰士帶甲食褁瘡鬬潮遂敗走追之幾獲潮怒復率衆来城中矢盡巡縳藁為人千餘被黒衣夜縋城下潮兵爭射之久乃藁人還得箭數十萬其後復夜縋人賊笑不設偹乃以死士五百斫潮營軍大亂焚壘幕追奔十餘里賊慙益兵圍之巡徐謂潮曰君須此城歸馬三十匹我得馬且出奔潮歸馬巡悉以給驍將約曰賊至人取一將潮怒欲戰陣未成三十騎突出擒將十四斬百餘級潮遁還陳留不復出七月潮率賊將攻城圍四月賊常數萬而巡衆纔千餘每戰輒克於是河南節度使虢王巨屯彭城假巡先鋒俄而魯東平陥賊濟隂太守髙承義舉郡叛巨走臨淮賊將楊朝宗謀趍寧陵絶巡餉路巡拔衆保寧陵至睢陽與太守許逺城父令姚誾等合乃遣將雷萬春南霽雲等領兵戰寧陵北斬賊將二十殺萬餘人朝宗夜遁詔拜巡主客郎中副河南節度使巡籍將士有功者請於巨巨纔授折衝果毅巡曰宗社尚危渠可吝賞與貲巨不聽禄山死慶緒遣尹子竒將同羅突厥奚勁兵十餘萬攻睢陽巡勵士固守日中二十戰氣不衰逺自以材不及巡請禀軍事而居其下巡受不辭逺專治軍糧戰具詔拜巡御史中丞逺侍御史誾吏部郎中子竒復圍城巡語其下曰吾蒙上恩賊若復来政有死爾諸君雖捐軀而賞不直勲以此痛恨乃椎牛大饗悉軍戰賊望兵少大笑巡逺親皷之賊潰追北數十里其五月賊刈麥乃濟師巡夜鳴皷嚴隊若將出賊申警俄息皷賊覘城上兵休乃弛備巡使南霽雲等開門徑抵子竒所斬將拔旗七月復圍城初睢陽穀六萬斛可支一嵗而巨發其半饟濮陽濟隂逺固爭不聽濟隂得粮即叛至是食盡士日賦米一勺齕木皮鬻紙而食纔千餘人皆癯劣不能彀救兵不至賊知之以雲衝傳堞巡出鈎干柱之使不得進篝火焚梯賊以鉤車木馬進巡輒破碎之賊服其機不復攻穿壕立柵以守士多餓死存者皆痍傷氣乏巡出愛妾曰諸君經年乏食而忠義不少衰吾恨不割肌以啖衆寧惜一妾而坐視士飢乃殺以大饗坐者皆泣巡疆令食之逺亦殺僮奴以哺卒至羅雀掘鼠煮鎧弩以食賀蘭進明代巨節度屯臨淮許叔冀尚衡次彭城皆觀望莫肯救巡使霽雲如叔冀請師不應遺布數千端霽雲嫚罵馬上請决死鬬叔冀不敢應巡復遣如臨淮告急引精騎三十冒圍出賊萬衆遮之霽雲左右射皆披靡既見進明進明曰睢陽存亡已决兵出何益霽雲曰城或未下如已亡請以死謝大夫但睢陽既拔即及臨淮皮毛相依理須援助何得宴安自處殊無救恤之心進明愛霽雲壯士欲留之為大饗樂作霽雲曰昨出睢陽將士不粒食已彌月今大夫兵不出而廣設聲樂義不忍獨享雖食弗下咽今主將之命不逹霽雲請置一指以示信歸報中丞也因拔佩刀斷指一坐大驚為出涕卒不食去次寧陵得城使亷坦兵三千夜冒圍入賊覺拒之且戰且引兵多死所至纔千人方大霧巡聞戰聲曰此霽雲等聲也乃啟門將士相持泣賊知外援絶圍益急初進明與房琯不相協琯為相用進明為河南節度使兼御史大夫復用靈昌太守許叔冀為進明都知兵馬使亦兼御史大夫虢王受代之時盡將部曲而行叔冀恃部下精鋭又名位等不受進明節制進明懼叔冀見襲又忌巡聲威恐成功初無出師意衆議東奔巡逺議以睢陽江淮保障也若棄之賊乘勝鼓而南江淮必亡且帥飢衆行必不逹十月癸丑賊攻城士病不能戰巡西向拜曰臣生不報陛下死為鬼以癘賊城遂陥與逺俱執子竒謂巡曰聞公督戰大呼輙眥裂血靣嚼齒皆碎何至是答曰吾欲氣吞逆賊顧力屈耳子竒怒以刀抉其口齒存者三四巡罵曰我為君父爾附賊乃犬彘也安得久子竒服其節將釋之或曰彼守義者烏肯為我用且得衆心不可留乃與姚誾雷萬春等三十六人遇害巡前後大小戰四百餘陣斬賊大小將三百人殺賊卒十二萬人多蕃兵勁卒餘見通鑑宋祁賛曰張巡許逺可謂烈丈夫矣以疲卒數萬鯁其喉牙使不得摶食東南牽掣首尾豗潰梁宋間大小數百戰雖力盡乃死而唐得全江淮財用以濟中興引利償害以百易萬可矣巡先死不為遽逺後死不為屈巡死三日而救至十日而賊亡天以完節付二人畀名無窮不待留生而後顯也壬戌復東京安慶緒奔河北以舊紀通鑑修解題曰嚴莊挾安慶緒棄東京北度河回紇大掠東都三日姦人導之府庫窮殫廣平王欲止不可而耆老以繒錦萬匹賂回紇止不剽葉䕶還京師帝遣羣臣勞之長樂帝坐前殿宴且勞之人賜錦繡繒器葉䕶頓首言留兵沙苑臣歸料馬以收范陽除殘盗詔進司空爵忠義王嵗給絹二萬匹餘見通鑑癸亥給復鳳翔五載以舊紀修賊黨嚴莊降以為司農卿以通鑑修丁卯帝至自靈武饗於太廟三日哭以新紀修十一月張鎬帥五節度徇河南河東郡縣皆下之以通鑑修十二月丙午上皇至自蜀居興慶宫甲寅苗晉卿為中書侍郎同平章事以新紀修戊午大赦以廣平王俶為太尉楚王苗晉卿侍中崔圓中書令李麟同三品郭子儀司徒李光弼司空餘功臣進階賜爵加封追贈李憕顔杲卿等復諸州及官名封子九人為王以新紀通鑑修乙丑史思明降以為范陽節度使歸義郡王河北皆降以吕祖謙標目修壬申陳希烈等伏誅以新紀修是嵗故妃韋氏卒置左右神武軍為北牙六軍及置英武軍置河中節度使分劍南為東西川以通鑑修解題曰按方鎮表至德元載置河中防禦守捉蒲闗使二載升節度使領蒲晉絳隰慈號同乾元虢州𨽻陜華上元同州𨽻鎮國廣德廢為河中五州都團練使興元復置節度領河中同絳虢陜貞元罷領陜虢四年置晉慈隰防禦觀察使元和罷三州𨽻河中長慶置晉慈都團練觀察使太和二州𨽻節度光啟賜號䕶國軍又按𤣥宗初分劍南為兩節度使百姓弊於調度髙適上疏曰劍南雖名東西川其實一道今裂梓遂等八州方鎮表係十州專為一節度西川可税賦者獨成都彭蜀漢四州而已以四州耗殘當十州之役其弊可見願罷東川以一劍南併力從事帝不納餘見開元七年劍南節度解題唐肅宗皇帝乾元元年春正月戊寅上皇加帝尊號以新舊紀修二月乙巳上上皇尊號丁未大赦改元免今載租庸復以載為年賜文武官階爵以新舊紀通鑑修三月甲戌徙楚王俶為成王通鑑戊寅立淑妃張氏為皇后新紀解題曰胡寅曰故妃韋氏無罪被廢為尼尚在禁中肅宗宜如何若以家事聽上皇之命則上皇無㫖使立張淑妃盖時移事變於韋氏必有憫惻之意矣至德二載韋氏卒史亡其月日乾元元年三月始冊張氏為后若如肅宗初問李泌之言豈至紆緩如此無乃上皇欲復韋氏久而不果此固張后輔國之所以深怨上皇者歟餘見通鑑夏四月辛亥祔新主於太廟以新紀修五月停采訪使改黜陟使為觀察使以吕祖謙標目修戊子張鎬罷新紀庚寅立成王為皇太子以通鑑修乙未崔圓李麟罷舊傳解題曰按舊史傳李輔國勢傾朝野宰相苗晉卿崔圓已下傾心事之唯麟正身謹事無所依附輔國不悦罷知政事餘見通鑑太常少卿王璵為中書侍郎同平章事璵請置太乙壇以新舊紀通鑑修贈顔杲卿太子太保諡忠節以通鑑修六月丁巳行新厯以舊紀修太子少師房琯貶邠州刺史以吕祖謙標目修解題曰通鑑作豳州誤也李光弼隂圖史思明思明殺節度副史烏承恩以反以稽古録修解題曰按新舊史列傳思明外順命内實通賊益募兵帝知之以其嘗事烏承恩父知義冀其無嫌即擢承恩為河北節度副大使河北節度即范陽也使圖思明承恩至范陽羸服夜過諸將隂諗以謀諸將返以告思明疑未有以騐㑹承恩與中人李思敬奏事還宣恩命畢將歸私第思明留承恩於館中明當有所議幃所寢狀伏二人焉承恩小男先留范陽思明令省其父夜語其子曰吾受命除此逆胡便授吾節度使矣二人呌呼而出以告思明執之探衣囊得賜阿史那承慶鐵劵及光弼牒又得薄紙書數畨皆先所從反軍將名賊大詬曰我何負於爾而至是耶承恩稱死罪此光弼之謀也思明集將吏百姓西嚮大哭曰臣以十三州之地十萬之兵降國家赤心不負陛下何至殺臣因榜殺承恩父子及支黨二百餘人囚思敬以聞帝遣使諭曰非朕與光弼意乃承恩所為殺之善也又聞三司議陳希烈等死思明懼曰希烈等皆大臣上皇棄而西既復位此等宜見勞反殺之况我今從禄山反乎諸將皆勸賊表天子誅光弼思明使耿仁智張不矜上疏請斬光弼不然且攻太原疏入於函仁智輙易去左右宻白思明執二人曰若負我耶命斬之既復召責曰仁智事我三十年今日我忘爾耶仁智怒曰人生㑹有一死須存忠節今大夫納邪説為反逆之計縱延旬月不若早死思明大怒亂捶殺之腦流於地餘見通鑑孫甫曰光弼謀思明事何不度事機不顧國體之甚耶思明罪固不容誅但能以范陽歸命朝廷天子既命之節帥封之王爵矣若以其險詐之情必不可留亦必國威兵力足以制服其心赫然命將誅之何至方降國命之際乃遣人為之副介使潜結部曲圖之此豈國體也况河北殘冦方觀國之恩信厚薄以為向背之計思明既以歸順被寵隨而圖之使叛者决其計此又豈事機也使思明復叛大亂兩河由兹失策矣秋七月丙戌初鑄當十大錢通鑑丁亥冊回紇毗伽闕可汗以公主妻之以吕祖謙標目修八月丙辰加郭子儀中書令李光弼侍中以通鑑修九月庚寅命郭子儀等九節度討安慶緒宦官魚朝恩為觀軍容宣慰處置使以吕祖謙標目修解題曰易師之六三師或輿尸凶六五長子帥師弟子輿尸貞凶程頥曰師旅之事任當專九二既以剛中之才為上信倚必專其事乃有成功若或更使衆人主之凶之道也輿尸衆主也盖指三也又曰任將授師之道當以長子帥師二在下而為師之主長子也若以弟子衆主之則所為雖正亦凶也弟子非長者也相州之役有子儀光弼在擇取焉用之則得長子之義矣衆節度紛紜而又以觀軍容宣慰處置之其為輿尸也甚矣其覆師非不幸也事見通鑑新舊史記朔方節度郭子儀河東節度李光弼闗内潞府節度王思禮淮西節度魯炅興平節度李奐滑濮節度許叔冀平盧兵馬使董秦北庭節度李嗣業鄭蔡節度李廣琛九節度之師按舊傳有河南節度崔光逺而無李奐通鑑命朔方淮西興平滑濮北庭鄭蔡河南七節度及平盧兵馬使討慶緒又命河東闗内二節度助之秦以兵馬使不在節度之數也冬十月甲辰皇太子更名豫以通鑑修郭子儀破安慶緒於衛州拔之遂圍鄴以舊史列傳修十一月河南節度使崔光逺拔衛州以通鑑舉要厯修十二月置浙江東西道節度使以吕祖謙標目修解題曰是年置浙江東道節度使領越睦衢婺台明處温治越州大厯五年廢置都團練守捉及觀察處置等使十四年廢以所管州𨽻浙西貞元分浙江東西為二道廣明升浙東道節度為義勝軍節度使光啟改為威勝軍乾寧改為鎮東餘見至德元載江南西道解題丁卯史思明䧟魏州新紀平盧軍亂立禆將侯希逸為軍使詔以為節度副使節度使由軍士廢立自此始以通鑑舉要厯修唐肅宗皇帝乾元二年春正月己巳朔羣臣上尊號以新舊紀修史思明稱燕王以舊紀修三月壬申史思明救鄴九節度之師潰以吕祖謙標目修史思明殺安慶緒尋還范陽以新紀通鑑修甲午兵部侍郎吕諲同平章事乙未苗晉卿王璵罷京兆尹李峴為吏部尚書舍人李揆為中書侍郎户部侍郎第五琦並同平章事丙申郭子儀為東畿等道兵馬元帥東京留守以新舊紀通鑑修殿中監李輔國專掌禁兵口為制敕李峴陳其亂政夏四月壬寅制罷口敕諸務各歸有司以舊紀及吕祖謙標目修解題曰按舊史列傳李輔國每日於銀䑓門决天下事須處分便稱制敕禁中符印悉佩之出入縱有敕輔國押署然後施行餘見通鑑史思明稱帝改元以吕祖謙標目修囬紇毗伽闕可汗死子登里可汗立以通鑑修五月辛巳李峴貶為刺史以新紀修秋七月召郭子儀還辛巳以子越王係為天下兵馬元帥李光弼副之以新舊紀通鑑修辛卯爵朔方節度副使僕固懐恩大寧郡王以通鑑修八月乙巳襄州將康楚元等逐刺史九月䧟荆州以新舊紀通鑑修戊辰鑄當五十大錢以舊紀通鑑修汴滑節度使許叔冀降於史思明李光弼退守河陽庚寅思明䧟東京冬十月乙巳光弼敗之於河陽以吕祖謙標目修解題曰汴滑節度見至德元年河南節度解題十一月庚午第五琦貶為刺史新紀十二月乙巳康楚元伏誅新紀史思明遣兵冦陜州神策軍將衛伯玉敗之以新紀修唐肅宗皇帝上元元年春正月辛巳加李光弼太尉中書令以舊紀通鑑修四月戊申襄州軍亂己未以陜西節度使来瑱為山南東道節度使討平之以通鑑修解題曰晁補之曰去年襄州逐刺史今年襄州殺節度使將吏逐帥阻兵自此始時大冦嗣興餘黨未殄朝廷置不暇問譬方搏虎救噬而豺攘其豬捨之宜也然因是以萌藩鎮戕主帥擅相立之患惜哉事見通鑑是月彗星出於婁胃以新紀修夏閏四月辛酉朔彗星出於西方以新舊紀修丁卯加河東節度使王思禮司空以舊紀通鑑修解題曰不為宰相而拜三公自是始己卯改元新紀解題曰舊紀星文變異大赦改元宋庠紀年通譜紀年建號不能無襲然必異代他姓失於詳討至若本朝舊朔無容忘悮而帝中興未幾復用祖宗之年與晉元帝魏孝武同弊實一朝之巨失焉五月丙午太子太傅苗晉卿為侍中以新舊紀修壬子吕諲罷以新紀修癸丑以京兆尹劉晏為户部侍郎度支鑄錢鹽鐵等使以舊紀修六月乙丑鳳翔節度使崔光逺破羌渾党項以新紀通鑑修詔開元乾元錢一當十當五十錢當三十以舊紀通鑑修秋七月丁未李輔國遷上皇於西内刑部尚書顔真卿帥百僚問起居坐貶以吕祖謙標目修解題曰蘇軾曰魯公湖州放生池碑載其所上表云一日三朝大明天子之孝問安侍膳不改家人之禮魯公知肅宗有愧於是也故以此陳孰謂公區區於放生者哉事見通鑑丙辰開府儀同三司髙力士流巫州以舊紀通鑑修八月庚午以衛伯玉為神策軍節度使以通鑑修九月以邠寧鄜坊節度使郭子儀為諸道兵馬都統自朔方取范陽事沮不行以列傳修解題曰魚朝恩素害子儀之功因其鄴城失律遂加譛訴既解其兵柄而授之李光弼矣及河洛再䧟西戎侵逼始授子儀邠寧鄜坊兩節度然尚居京師也至是起為諸道兵馬都統使率禁軍及河西河東鎮兵由邠寧朔方大同横野徑趨范陽可謂廟算矣而復為朝恩沮止迄使范陽不可取而他日僕固懐恩遂樹李懐仙以胚禍根豈不惜哉餘見通鑑冬十一月甲午宋州刺史劉展反䧟揚潤昇等州以稽古録通鑑修李光弼拔懐州擒賊將安太清以通鑑修唐肅宗皇帝上元二年春正月癸卯史思明改元以通鑑修乙卯劉展伏誅新紀二月己未奴刺党項冦寳雞侵鳳州以新舊紀修戊寅李光弼及史思明戰於北邙敗績河陽懐州䧟以新舊紀修解題曰按新舊史列傳思明使諜宣言賊將士皆北人謳吟思歸觀軍容使魚朝恩信然屢上賊可滅狀朝㫖令光弼速收東京光弼固言賊鋒尚鋭未可輕動朔方節度使僕固懐恩雄毅寡言而剛决犯上始居偏禆意有不合雖主將必詬折麾下皆蕃漢勁卒恃功多不法郭子儀每事優容之行師用兵倚以輯事及光弼代子儀持法嚴少假貸初㑹軍汜水朔方將張用濟後至斬纛下懐恩常邑邑不樂又害光弼之功潜附朝恩言賊可滅由是中使督戰光弼不得已令李抱玉守河陽出師次北邙光弼使傳山陣懐恩請陣諸原光弼曰有險可以勝可以敗陣於原敗斯殱矣懐恩不從賊據髙原以長㦸七百壯士執刀隨之委物偽遁懐恩軍爭剽獲伏兵發官軍大潰軍資器械並為賊所有光弼度河保聞喜抱玉棄河陽光弼請罪帝以懐恩違令覆軍優詔召入朝抗表請罪詔釋之餘見通鑑癸未李揆貶袁州長史河中節度使蕭華為中書侍郎同平章事以新紀修三月甲午史思明遣其子朝義冦陜州衛伯玉敗之以新紀修戊戍史朝義弑其父思明稱帝以吕祖謙標目修解題曰按姚汝能禄山事迹平致美薊門紀亂朝義殺思明以張通儒為燕京留守尋為髙鞠仁所殺推阿史那承慶為留守承慶與鞠仁接戰不敵奔潞縣鞠仁令城中殺胡者皆重賞於是羯胡盡殪其衆復以鞠仁為燕京都知兵馬使五月朝義以李懐仁為范陽節度自春至夏相殺者四五餘見通鑑李光弼罷副元帥開府侍中河中節度使以新紀通鑑修夏四月己未吏部侍郎裴遵慶為黄門侍郎同平章事以新舊紀修五月梓州刺史段子璋反尋伏誅以新舊紀列傳修史朝義將令狐彰降甲午以滑衛為節度使以通鑑修解題曰滑衛節度是年置領滑衛相魏貝博廣德増領亳更號滑亳節度増領德州衛𨽻澤潞析相貝置防禦魏博節度大厯四年増領陳七年為永平節度十一年増領宋泗十四年増領汴頴建中増領鄭析宋亳頴别置節度泗𨽻淮南興元汴𨽻宣武貞元元年更號義成軍増領許州三年許𨽻陳許長慶領頴州光啟改為宣義軍庚子以李光弼為河南副元帥太尉侍中都統河南等五道行營鎮泗州以新舊紀傳修解題曰按新舊史紀傳光弼都統河南淮南東西山南東道荆南五道節度行營通鑑増江南西浙江東西為八道今從紀傳秋七月癸未朔日有食之既大星皆見以舊紀修八月癸丑朔李輔國為兵部尚書以舊紀通鑑修九月甲申置道場於三殿以朱熹綱目修解題曰三殿在東内韋述兩京記宋敏求長安志云即麟德殿此殿三靣故以為名壬寅去尊號及年號以建子月為嵗首月以斗所建辰為名以新舊紀修建子月丁亥劉晏貶通州刺史戊子御史中丞元載為户部侍郎度支鹽鐵鑄錢等使以舊紀修己亥帝朝上皇於西内以通鑑修建丑月平盧范陽相攻連年援絶侯希逸引兵而南以通鑑修唐肅宗皇帝寳應元年建寅月李光弼克許州新紀建卯月癸丑河東殺其節度使鄧景山請以都知兵馬使辛雲京為代從之以吕祖謙標目修乙丑河中行營兵亂殺其節度使都統諸道李國貞於綘殺鎮西北庭節度使荔非元禮於翼城請以禆將白孝德為代從之解題曰翼城綘州縣辛未爵郭子儀汾陽郡王知朔方河中北庭潞儀澤沁節度行營興平定國軍副元帥以吕祖謙標目修建辰月戊申蕭華罷户部侍郎元載同平章事以新紀修建巳月壬子楚州獻定國寳玉十有三新紀帝不豫命皇太子監國皇后惡李輔國召太子欲圖之太子不許乃與越王係謀之丁卯皇后召太子入宫飛龍副使程元振以告輔國輔國止太子無入率兵殺係及兖王僴幽皇后於别殿是夜帝崩於長生殿殺后己巳皇太子豫即皇帝位新紀解題曰長生殿長安志在東内甲戌以子奉節郡王适為天下兵馬元帥郭子儀罷副元帥以新紀修解題曰帝即位六日而子儀罷副元帥由程元振之譛也通鑑不書闕也乙亥李輔國號尚父程元振為監門衛將軍知内侍省事五月庚辰郭子儀誅綘州亂軍以吕祖謙標目修壬午李輔國為司空兼中書令以新紀通鑑修爵李光弼臨淮郡王以舊紀傳修甲申以侯希逸為平盧淄青節度使以通鑑修解題曰至德元載置青宻節度使領北海青州髙宻宻州東牟登州東莱莱州治北海置鄆齊兖都防禦使治齊州乾元元年青宻増領滑濮二年増領淄沂海以滑𨽻汴滑濮𨽻鄆齊兖升鄆齊兖為節度使上元置淄沂節度使領淄沂滄德棣平盧節度侯希逸保青州授青宻節度使廢淄沂節度并所管州號淄青平盧節度増領徐州廣德滄德𨽻魏博寳應鄆兖濮徐𨽻河南登莱沂海泗𨽻淄青平盧大厯十年淄青平盧領德州十一年領鄆曹濮徐兖以泗州𨽻永平建中廢節度使置淄青都團練觀察使領淄青登莱齊兖鄆置曹濮都團練觀察使興元廢復淄青平盧節度領青淄登莱齊兖鄆徐海沂宻曹濮貞元徐州𨽻徐泗元和十四年領青淄齊登莱置鄆曹濮節度沂海觀察使領沂海兖宻十五年鄆曹濮號天平軍長慶升沂海為節度太和元年齊州𨽻横海二年淄青平盧増領𨽻八年廢沂海為觀察使大中復為節度咸通三年沂海増領徐州五年天平増領齊棣沂海罷領徐十三年淄青平盧復領齊棣乾寧沂海號泰寧軍大小錢皆當一以舊紀修李光弼使兖鄆節度使田神功擊史朝義於宋州大破之以通鑑修解題曰兖鄆節度見是年平盧淄青節度使解題封子二人為王以通鑑修追復庶人王氏為皇后新紀六月辛亥追廢皇后張氏越王係兖王僴為庶人以新紀修乙未李輔國罷元帥行軍司馬以程元振為元帥行軍司馬辛酉輔國罷中書令封博陸王以通鑑修乙亥以劉晏為户部侍郎京兆尹度支轉運鹽鐵等使以列傳通鑑修秋八月袁晁反於台州以新舊紀修徙封适為雍王以新紀修九月庚辰来瑱為兵部尚書同平章事仍為山南東道節度使以舊紀修乙未程元振加驃騎大將軍兼内侍監以通鑑修冬十月辛酉雍王适㑹諸道及回紇兵討史朝義加朔方節度使僕固懐恩同平章事領節度行營以副之以吕祖謙標目修解題曰按新舊史列傳代宗立程元振自謂於帝有功忌宿將難制離構百計因罷郭子儀副元帥加實户為肅宗山陵使子儀懼讒且成盡裒肅宗所賜詔勅千餘篇上之因自陳訴初帝與子儀同患難復兩京至是悔悟眷禮彌重史朝義尚盗洛帝欲使副雍王率師東討為朝恩元振交訾之乃止餘見通鑑壬戌盗殺李輔國新紀乙亥雍王适大敗史朝義於横水復東京以通鑑修解題曰竇苹音訓横水在洛陽北郊十一月丁丑史朝義將薛嵩以相衛洺邢張忠志以恒趙深定易等州降皆已受代僕固懐恩復其位丁酉以忠志為成德節度使賜姓名李寳臣以吕祖謙標目修解題曰成德節度是年置領恒定易趙深廣德増領冀州大厯増領滄州建中罷置恒冀都團練觀察使深趙都團練觀察使興元廢二觀察復置節度使領恒冀趙深貞元増領德棣元和德棣𨽻横海天祐更號武順軍己亥以僕固懐恩為左僕射中書令朔方河北副元帥以新紀修是嵗召李泌以李鄴侯家傳修大事記續編卷五十九
