body:
  text: 大事記續編卷七十二明王禕撰唐莊宗皇帝同光元年帝岐王李茂貞天祐二十年祖吳睿帝順義三年蜀王衍乾德五年南漢髙皇帝乾亨七年王楚王馬殷丹南平王髙季興安吳越王錢鏐閩王審知契太祖皇帝耶律巴堅天贊二年春二月梁冊吳越王鏐為國王以通鑑修三月晉潞州留後李繼韜降于梁其將裴約據澤州自守以通鑑目録修解題曰徐無黨曰唐末澤潞皆屬晉梁初已得澤州至此又屬晉中間不見晉得澤州年月蓋舊史闕不書五代之亂彼此得失常多類如此夏四月晉王存朂即皇帝位國號唐改元尊母曹氏為皇太后嫡母劉氏為皇太妃行臺左丞相豆盧革為門下侍郎右丞相盧程為中書侍郎同平章事郭崇韜為樞密使天雄掌書記張憲為租庸使孔謙副之以新紀列傳通鑑修解題曰按新史列傳革雖唐名族而素不學凡除拜官吏多失其序常為尚書郎蕭希甫駁正革頗憾之莊宗已滅梁革乃薦韋說為相革以說能知前朝事故引以佐已而說亦無學術徒以流品自髙是時莊宗內畏劉皇后外惑宦官伶人郭崇韜雖盡忠於國而亦無學術革說俯仰默默無所為唯諾崇韜而已歐陽修曰豫讀梁宣底見敬翔李振為崇政院使凡承上之㫖宣之宰相奉行之宰相有非其見時而事當上决者與其被㫖而復請者則具記事而入因崇政使以聞得㫖則復宣而出之是崇政使乃唐樞密之職蓋出納之任也唐常以宦者為之而戒其禍始參用士人其備顧問參謀議於中則有之未始有行事於外也至崇韜重誨為之始復樞密之名然權侔於宰相矣後世因之遂分為二文事任宰相武事任樞密樞密之任既重而宰相自此失其職也又按新史列傳梁興始置租庸使領天下錢榖廢鹽鐵戶部度支之官莊宗滅梁因而不改事見通鑑唐以魏州為東京太原為西京鎮州為北都新紀閏四月唐追尊曾祖以來考妣為帝后合髙祖太宗懿宗昭宗為七廟以新紀通鑑修癸卯唐橫海節度使李嗣源襲取梁鄆州以為天平節度使以新紀通鑑修五月梁以宣義節度使王彥章為北面招討使滑州兵馬留後段凝副之取德勝南城己巳進攻楊劉唐主存朂救之六月築城於馬家口彥章攻之弗克以通鑑修解題曰馬家口在博州唐盧程罷以新紀修秋八月壬申梁克澤州殺裴約以通鑑修梁决滑州河注曹濮鄆以限唐兵以舊史紀唐紀及通鑑修梁王彥章罷以段凝為招討使使王彥章屯兖鄆以吕祖謙標目修九月唐李嗣源敗王彥章於遞坊以新紀通鑑修解題曰遞坊屬東平府舊史作遞公鎮冬十月辛未朔日有食之通鑑壬申唐主存朂如鄆州甲戌敗王彥章於中都彥章死之解題曰中都東平府縣去府六十里戊寅梁主瑱自殺己卯唐主入汴敬翔自殺壬午段凝降丙戌族誅敬翔李振等追廢朱溫朱友貞為庶人以新紀通鑑修解題曰按新舊史紀傳實録故時魏牙兵驕數為亂羅紹威盡誅之揚師厚據魏州復置牙兵二千天祐十二年三月師厚死租庸使趙巖與判官邵瓉議曰魏為唐患百有餘年先帝常切齒紹威前恭後倨今師厚復為陛下憂所以然者地大而兵多也陛下不以此時制之寧知後人不為師厚也不若分相衛為兩鎮則無北顧之憂矣帝以為然乃分相澶衛相州東南至澶州一百四十五里南至衛州一百四十五里澶州西至衛州二百四十里為昭德軍以張筠為節度使魏博貝大名府北至博州二百十里東北至貝州二百里博州西北至貝州一百八十里為天雄軍以賀德倫為節度使舊史詔曰但緣鎮定賊境最為魏博親鄰其次相衛兩州皆控澤潞山口兩道並連於并晉分頭常冦於魏封既須目有枝梧未若俱分節制遣劉鄩以兵六萬渡河聲言攻鎮定王彥章以騎兵五百入魏州屯金波亭以虞變分魏牙兵之半入昭德租庸使遣孔目吏閲魏兵籍檢校府庫德倫促牙兵上道牙兵親戚相訣别哭聲盈路有效節軍將張彥者最為粗暴膽氣服人謀於其衆曰朝廷以我軍府强盛設法殘破之况我六州舊為藩府未嘗逺出河門一旦離親戚去鄉里生不如死二十九夜攻金波亭彥章走出遲明魏兵攻牙城殺五百餘人執德倫置之樓上縱兵大掠彥止其剽掠四月帝遣供奉官扈異馳諭彥許以刺史彥曰但以六州還魏而詔劉鄩反兵皇帝可以髙枕異還言彥狂獗不足畏宜促鄩擊之帝使人諭彥以制置已定使者三返彥怒曰傭保兒敢如是耶乃召羅紹威故吏司空頲曰為我作奏若復依違則渡河虜之耳帝優詔答之言王鎔死鎮人請降遣鄩以兵定鎮州非有他也若魏不便之即召鄩還戒彥勿為朝廷生事彥以楊師厚鎮魏州嘗帶招討使逼德倫論之帝不許諭以詔書詔曰别建節旄各令捍禦并鎮則委魏博控制澤潞則遣相衛枝梧彥裂詔書抵于地曰愚主聽人穿鼻難與共事矣今城中擾攘未有所依我兵甲雖多須資勢援晉王可以託附遂迫德倫奉書求援於太原五月晉王率兵赴魏州藩漢馬步都指揮使符存審自趙州帥師屯臨清貝州縣晉王東下德倫遣司空頲密啓張彥狂悖之狀不除亂階恐貽後悔王本文作上後倣此默然進軍永濟大名府臨清縣永濟鎮張彥謁見以銀槍效節五百人從皆被甲持兵王登樓諭之曰汝等濫殺平人奪人妻女數日來迎訴寃者百餘輩當斬汝以謝鄴人遽斬彥及同惡者七人軍士股栗翌日王輕裘緩䇿而進張彥部下環馬而從因命為帳前銀槍衆心大服劉鄩以精兵萬人自洹水大名府成安縣洹水鎮趨魏縣大名府元城縣大名鎮去府四十里王命符存審禦之王率親軍於魏縣西北夾河為柵六月王入魏州兼魏州節度使以賀德倫為大同軍節度使張源德為鄩守貝州諸將欲先擊貝州晉王曰貝城小而堅攻之難卒下且源德雖恃劉鄩之兵然與滄州相首尾今德州居其中西南至貝州二百三十里北至滄州二百四十里而無備不如先取之則滄貝之勢分而易圖乃襲破德州七月澶州刺史王彥章棄城遁劉鄩軍于洹水王率百騎覘其營是日隂晦鄩伏五千兵於河曲叢木間王至伏兵俱起大譟而來圍王數十重王馳突奮擊賊衆辟易决圍而出有頃援軍至乃解王顧謂軍士曰幾為賊所笑鄩謂晉兵悉赴魏而太原可襲潜軍出黃澤關按後魏書地形志樂平郡遼陽縣有黃澤關今遼州遼山縣有黃澤寨他日王檀襲晉陽城幾下則鄩未為無算也初鄩數日不出寂無聲迹遣遊騎覘之無斥候者城中無煙火有鳥止於壘上但有旗幟巡堞往來王曰我聞劉鄩用兵一步百變必以詭計誤我使視城中乃縛旗於芻偶之上使驢負之而行得城中羸老者詰之軍去已三日矣發騎追之時霖雨積旬鄩軍倍道兼行皆腹疾足腫加以山路險阻崖谷泥滑死者十二三至樂平平定軍縣去太原府三百里糗糧將竭晉本文作帝軍躡於後太原之衆在前鄩收合其衆還自邢州陳家口渡漳水枯漳河在大名府宗城縣東而東駐於宗城時屬貝州時魏之軍儲已乏臨清積粟所在鄩引軍據之初鄩軍之西周德威自幽州率千騎至土門及鄩東下急趨南宫知鄩在宗城遣十餘騎迫其營擒斥候者斷其腕而還德威軍至臨清鄩起軍駐貝州王率親騎次博州鄩軍堂邑博州縣在西四十里德威率五百騎躡之是日鄩軍莘縣大名府縣西至府一百里築甬道及河以饋軍王營於莘西一舍日夕交鬭八月梁賀瓌襲取澶州王遣符存審率兵五千攻貝州塹而圍之數挑戰鄩閉壁不出末帝以書責鄩曰閫外之事全付將軍河朔諸州一旦淪沒今倉儲已竭飛挽不充將軍與國同心宜思良畫如聞冦敵兵數不多宜設機權以時剪撲鄩報曰臣深溝髙壘日夜戒嚴偵視營壘兵數極多最為勍敵未可輕謀帝復問鄩必勝之䇿鄩曰臣無竒術請人給米十斛米盡則敵破矣帝大怒誚鄩曰將軍蓄米將療飢乎將破賊乎乃遣使者督其軍鄩召諸將謀曰主上深居禁中與白面兒謀必敗人事今敵盛未可輕動諸君以為如何諸將皆欲戰鄩乃悉召諸將坐之軍門人以河水一杯飲之諸將莫測或飲或辭鄩曰一杯之難猶若此滔滔河流可盡乎諸將皆失色帝又數促鄩使出戰鄩不肻出王與諸將謀曰劉鄩學六韜本欲示弱以襲我今其見迫必求速戰十三年二月王命符存審守魏陽為西歸潜兵貝州鄩報帝曰晉王西歸魏無備可擊三月鄩遣其將楊延直自澶州率兵萬人會于城下澶州北至大名府一百一十里夜半至南門外城中潜出壯夫五百人突入延直軍譟聲動地遲明鄩自莘引軍至城東與延直會鄩之來也存審率兵踵其後李嗣源自魏出戰俄而王自貝州至鄩忽見晉軍驚曰晉王耶兵稍却至故元城西存審大軍已成列矣前後為方陳鄩為圓陳禦晉兵再合鄩引騎軍突西南而走王以騎軍追擊之梁步兵合戰晉本文作帝後倣此軍鼓譟圍之數重埃塵漲天嗣源以千騎突入其間其衆披靡相􅏳如積晉軍四面斬擊棄甲之聲聞數十里騎軍追及于河上十百為羣赴水而死步兵七萬殲亡殆盡鄩奔滑州是月梁主遣匡國節度使王檀以竒兵出隂地襲太原晉兵皆從王于河上太原無備監軍張承業大恐率諸司工匠登城捍禦而外攻甚急代北安金全以疾居于太原强起謂承業曰太原晉之根本不守則大事去矣老夫誠憊矣然尚能為公破賊承業喜授以甲兵金全率子弟及故將吏得百餘人夜出北門擊檀于羊馬城中檀軍驚潰昭義李嗣昭遣騎三百赴援檀懼乃燒營而遁梁主聞之曰吾事去矣三月攻梁衛州降其刺史克磁州至洛州百一十里殺其刺史四月克洺州東南至大名府一百四十里五月王還晉陽六月圍邢州至洺州百二十里七月王自晉陽至八月進攻邢州東北至相州二百九十里張筠棄相州走東至大名府二百一十里邢州以城降九月王還晉陽戴思逺棄滄州而逃是月貝州平河朔悉為晉矣王至魏州十四年二月王聞劉鄩保黎陽在澶州西南率師攻之十月王還晉陽十一月如魏州十二月帝幸洛陽為來年郊禮時梁據揚劉城列柵相望王率軍履河冰而渡進攻揚劉城城中守兵三千人王率騎軍環城馳射又令步兵斧其鹿角負葭葦以堙塹王自負一圍而進諸軍譟鼓而登遂拔其壘帝聞之懼遂停郊禮十五年正月至自西都敬翔上疏曰故時河朔半在以先帝之武御貔虎之臣猶不得志於晉今晉日强梁日削陛下處深宫之中所與計事者非近習則親戚之私而望成事乎臣聞晉攻揚劉李亞子負薪渡水為士卒先陛下委蛇守文儒雅自喜而遣賀瓌為將豈足當彼之鋒乎臣雖憊矣受國恩深若其乏材願得自效趙岩等以為怨言遂不用二月梁將謝彥章帥衆數萬迫楊劉築壘自固又决河水以隔晉軍六月王至揚劉率諸軍涉水而進梁人臨水拒戰晉軍小却俄而鼓譟復進梁軍退因擊之交鬬於中流梁軍大敗彥章僅免八月大閲於魏郊河東魏博幽周德威滄符存審鎮王鎔定王處直邢洺李嗣源鄜髙萬興勝李嗣恩雲朔李存璋十鎮之師及奚契丹室韋吐渾之衆十餘萬步陳嚴整王自魏州次揚劉略地至鄆西至大名府二百二十里濮至大名府一百九十里而還遂營於麻家渡距行臺村十餘里諸鎮列營十數賀瓌謝彥章屯行臺村結壘相持百餘日王以數百騎摩壘求戰彥章帥精甲五千伏於堤下王以十餘騎登堤伏兵發圍王十數重俄而王之騎軍繼至攻於圍外王於圍中躍馬奮擊决圍而出存審兵至梁軍方退十二月王進軍迫行臺寨十里而止瓌善用步卒而彥章與孟審澄侯溫裕皆善將騎兵審澄溫裕所將不過三千彥章多而益辦瓌心忌之彥章與瓌行視郊外瓌指一地語彥章曰此營柵之地已而晉兵柵之瓌疑彥章隂以告晉益惡之彥章故與馬步都虞候朱圭有隙瓌欲速戰彥章請持重以老敵圭乃誣彥章以為反瓌享士使圭伏甲殺之審澄溫裕皆見害王喜曰將帥不和梁亡無日矣戊午王本文無王字下令軍中歸老疾於鄴悉兵趨汴辛亥次臨濮梁軍捨營踵於後癸亥次胡栁陂黎明候騎報曰梁軍至矣王戒軍曰步軍輜重俱行吾自殿後破賊德威奏曰賊倍道而來未成營壘我營柵已固守備已餘須决萬全之䇿此去汴州信宿而近至汴三百五十里梁軍父母妻子皆在其中梁人家國繫此一舉吾以深入之兵當其必死之戰可以計勝難與力爭也王宜按軍無動臣請以騎軍擾之使不得下營樵爨不暇給因其勞乏而乘之可以勝也王曰吾軍河上終日挑戰恨不遇賊今見敵不擊復何為乎顧存審曰公以輜重先吾為公殿遽督軍而出德威謂其子曰吾不知死所矣前遇梁軍而陳王與存審總河東魏博之衆居中鎮定之軍居左德威之軍居右而輜重次右之西兵已接王率銀槍軍馳入梁陳賀瓌王彥章單騎走濮陽王輜重見梁朱旗皆驚潰德威軍亂梁軍乘之德威父子皆戰死盡取其輜重軍已勝陳無石山即土山王至山下望梁陳堅而整呼其軍曰今日之戰得山者勝因馳騎犯之王建及將銀搶效節繼進梁軍遽下陳於山西晉兵遂得土山梁軍復於土山西結陳數里時日已晡諸將皆潰兵未集閻寶曰夫决勝料勢决戰料情情勢既得斷在不疑今梁兵窘蹙其勢可破勝而驕怠其情可知彼陳山上吾在其下尚能擊之况以髙而擊下不可失也白王曰請登髙臣即破敵王謝曰微公幾敗吾事於是李嗣昭領軍自土山北以逼梁軍建及呼衆曰今日所失輜重皆在山西盍往取之即馳犯梁軍諸軍繼之梁軍大敗時元城令吳瓊貴鄉令胡裝各部役徒於山下曳柴揚塵助其勢梁軍不之測自相騰藉奔歸汴者不滿千人晉拔濮陽遂軍德勝為南北城於河上十六年正月三日王還魏州三月兼領盧龍軍節度使四月賀瓌攻南城百道攻擊以竹笮維戰艦于河晉兵不得渡王馳而往陳於北岸南城告急王積金帛於軍門募能破梁戰艦者至於吐火禁呪莫不皆有建及重鎧執矟呼曰梁晉一水間耳何必巧為吾今破之矣乃以巨索連十艘選效節勇士三百人持斧被鎧鼓枻而進至中流梁樓船三層蒙以牛革懸板為楯建及率持斧者入艨艟間斬竹笮破懸楯又於上流取甕數百用竹笮圍之積薪於上灌以脂膏火發烜空又以巨艦載甲士隨之斧其竹笮梁兵皆去晉軍乃得渡救南城瓌解圍去七月王歸晉陽八月瓌卒開封尹王瓉代為行營招討使瓉自黎陽渡河攻澶州不克退屯楊村扼河上流與晉相持時晉軍德勝南北舟兵來往頗以為勞而河北無竹石振武節度使李存進以葦笮維大艦為浮梁王大喜十月至如魏州廣德勝北城日與梁軍接戰十二月戊戌王軍河南夜伏步兵潘張村在今東京封邱縣梁軍寨下以騎軍掠其餉運擒其斥候王瓉結陳以待王以鐵騎突之梁軍大奔赴水甚衆瓉保北城十七年四月朱友謙襲同州梁遣泰寧軍節度使劉鄩擊友謙友謙求救七月遣存審嗣昭救之九月擊鄩大破之鄩遁追擊於渭河又敗之十八年正月魏州人傳真獻唐受命寶一王已諾諸將即皇帝位張承業方卧病聞之自太原肩輿至魏諫曰大王父子與梁血戰三十年本欲雪家國之讐而復唐之社稷今元凶未滅而遽以尊名自居非王父子之初心且失天下望不可王謝曰此諸將之所欲也承業曰不然梁唐晉之仇賊而天下所共惡也今王誠能為天下去大惡復列聖之深讐然後求唐後而立之使唐之子孫在孰敢當之使唐無子孫天下之士孰可與王爭者王不聽承業知不可諫乃仰天大哭曰王自取之誤老奴矣肩輿歸太原自是病日加卒二月趙張文禮弒其君鎔時王方與諸將宴酒酣樂作聞鎔遇弒投觶而泣曰趙王同盟分如金石何負於人覆宗絶嗣文禮遣使請旄節王曰文禮之罪期於無赦敢邀旄節左右曰方今事繁不欲與人生事王乃承制授文禮鎮州兵馬留後河中朱友謙昭義李嗣昭橫海符存審義武王處直安國李嗣源成德張文禮天平閻寶大同李存璋振武李存進匡國朱令德唐復舊藩鎮名故同州稱匡國請王即位王三辭友謙等三請王曰豫當思之左右亦勸王早副人望王撝挹久之初王鎔令偏將符習從王屯於德勝文禮既行弒逆忌鎔故將遣使欲代習歸鎮習懼請留帝令傳㫖於習且言爾等從征蓋緣君父之故銜寃思報誰無人心吾當給爾糧助爾兵於是習等率諸將三千餘人哭於牙門請討文禮八月王授習成德軍兵馬留後以部下致討又遣閻寶助之以史建瑭為前鋒甲子攻趙州刺史王鋋迎寶遂引兵至鎮州城下趙州至中山府一百里文禮懼卒子處瑾祕喪拒守九月建瑭戰于城下為流矢所中而卒十月己未戴思逺攻德勝北城王命李嗣源設伏於戚城今屬開德府清豐縣令騎軍挑戰梁軍大至王御中軍以禦之步兵漸至李嗣源以鐵騎三千乘之梁軍大敗俘斬二萬計王處直叛附于契丹其子都幽處直十一月王至鎮州城下築土山以攻其壘十二月契丹冦幽州遂攻涿州冦定州王都告急王率五千騎赴之十九年正月王至新城今涿州縣古督亢地契丹前鋒三千騎至新樂中山府縣戴思逺乘虛襲魏州軍至魏店李嗣源自頓邱按輿地廣記唐大厯置澶州晉天福移濮陽於澶州南郡為治所而以頓邱為德清軍今屬開德府清豐縣馳入魏州梁人乃西渡洹水陷成安大名府縣而去時契丹渡沙河諸將相顧失色又聞梁人內侵皆欲旋師王以為不可敗契丹於新城望都追奔至于幽州是日戴思逺冦德勝北城晝夜攻擊存審極力拒守城中危急王自幽州倍道兼行梁人聞晉王至燒營而遁三月閻寶敗于鎮州以李嗣昭代之四月鎮兵出掠九門嗣昭擊之鎮軍且盡嗣昭為賊射中腦而卒以李存進代之八月梁段凝陷衛州刺史李存儒被擒戴思逺又陷共城新鄉等邑自是澶淵之西相州之南皆為梁所據九月張處球率兵奄至東垣渡在真定府真定縣李存進戰沒乃以符存審為招討使丙午夜趙將投縋以接王師諸軍畢入鎮州平王兼領成德節度同光元年三月李繼韜以潞州叛附于梁王本文無王字築即位壇於魏州四月即帝位大赦改元國號唐以魏州為東京太原為西京鎮州為北都所管節度十三州五十縣繼韜叛帝有憂色有自鄆來者言戴思逺領兵在河上州城無守可襲而取帝本文無帝字召李嗣源帳中謂曰昭義阻令而梁急攻澤州吾出其不意攻其鄆州以斷梁右臂可乎嗣源對曰夾河之兵久矣茍非出竒則大計不决臣請獨當之乃以步騎五千襲鄆州髙行周將前軍夜遇雨軍中欲止行周曰此天贊我也鄆人恃雨不備吾來宜出其不意即夜涉濟入其城鄆人方覺遂取之即拜嗣源天平節度使梁人大恐敬翔顧事急以繩納靴中入見末帝泣曰先帝取天下不以臣為不肖所謀無不用今强敵未滅陛下棄忽臣言臣身不用不如死乃引繩將自縊末帝使人止之問所欲言翔曰事急矣非王彥章不可五月乃遣王彥章代思逺問破賊之期對曰三日左右皆失笑彥章出馳兩日至滑州去汴一百一十里置酒大會隂遣人具舟於楊村命甲士六百人皆持巨斧載冶者具鞴炭乘流而下彥章會飲酒半佯起更衣引精兵數千沿河以趨德勝舟兵舉鎖燒斷之因以巨斧斬浮橋而彥章引兵急擊南城浮橋斷南城遂破蓋三日矣是時帝在魏以朱守殷守德勝聞彥章為招討使驚曰彥章驍勇吾嘗避其鋒非守殷敵也然彥章兵少利於速戰必急攻我南城即馳騎救之行二十里而得夾寨報者曰彥章兵已至比至而南城破矣罵曰駑才果誤豫事撒北城屋木攻具浮河而下增固楊劉與彥章俱浮于河各行一岸每舟筏相及輒戰一日數十接比及楊劉殆亡其半匡霸指揮使李周守楊劉梁人以巨艦絶河斷晉餉道周遣人趨求救請日行百里以赴急帝笑曰周為我守何憂日行六十里且行且獵比至周已絶糧三日梁兵解去結營於楊劉之南延袤十數柵六月帝登壘望見彥章為重塹以絶唐軍笑曰欲持久弊我也即排短兵出戰為彥章伏兵所射敗而歸問郭崇韜計安出對曰彥章圍我于此其志在取鄆州也臣願得兵數千據河下流築壘於必爭之地以應鄆州為名彥章必來爭既分其兵可以圖也然板築難卒就陛下日以精兵挑戰使彥章兵不得東十日壘成矣梁先鋒將康延孝隂送欵於李嗣源求可以通於帝本文作莊宗後倣此麾下范延光請行乃懷延孝蠟九書見帝且曰今延孝雖有降意而梁兵扼楊劉者甚盛未可圖也不如築壘馬家口以通汶陽屬兖州帝以為然乃遣崇韜與毛璋將數千人夜行所過驅掠居人毁屋伐木渡河築壘於博州東鄆博相去一百七十里晝夜六日壘成彥章引兵急攻之時方大暑彥章列騎環城使步軍堙壕登堞又於上流下巨艦十餘扼斷濟路攻擊百端城中危急帝引軍陳于西岸城中望之大呼帝將渡梁軍解圍退保鄒家口在楊劉下流七月帝沿河而南彥章棄鄒家口復至楊劉己未自楊劉退保楊村寨帝幸楊劉段凝與趙岩張漢傑交通彥章素剛憤梁日削而嫉岩等所為嘗謂人曰俟吾破賊還誅姦臣以謝天下岩等聞之懼叶力傾之其破南城也彥章與凝各用捷書以聞凝遣人告岩等匿彥章書而上已書末帝初疑其事已而使者至軍獨賜勞凝而不及彥章軍士皆失色及楊劉之敗凝乃上書言彥章使酒輕敵而至於敗岩等日夜從中毁之八月梁克澤州守將裴約死之帝自楊劉歸鄴梁罷彥章以凝為招討使彥章馳至京師入見以笏畫地自陳勝敗之迹岩等諷有司劾彥章不恭勒還第凝帥衆五萬營于王村在開德府觀城縣自酸棗决河東注鄆以隔絶唐軍庚寅唐軍朝城戊戌康延孝以百騎奔于唐帝解御衣金帶以賜之拜博州刺史南面招討指揮使帝屏人問延孝梁事延孝言末帝懦弱趙張用事段凝姦邪以入金多為大將故將皆出其下梁主每一發軍即令近臣監護進止可否悉取監軍處分小人進任而忠勇皆見疏斥必亡之勢也又聞梁計如何曰竊聞其議期以仲冬大舉遣董璋以陜虢澤潞之衆出石會以攻太原霍彥威以關西汝洛之兵掠邢洺以趨鎮定王彥章以京師禁衛擊鄆州段凝以河上之軍當陛下帝懼曰將何以禦之延孝曰梁兵雖衆分則無餘臣請待其既分以鐵騎五百自鄆趨汴出其不意搗其空虛不旬日必下矣帝壯其言梁聞晉將自兖州路出師急召彥章領保鑾騎士數千於東路守捉令張漢傑監其軍新史云時京師祇有保鑾五百騎乃以屬彥章按舊紀李嗣源初敗彥章擒梁將三百人俘斬二百級莊宗再敗彥章擒梁將吏二百餘人斬馘二萬奪馬千匹雖不止保鑾一軍亦不應止有五百人今從舊史傳唐自李繼韜以澤潞叛契丹數犯幽涿又聞梁欲大舉帝患之以問諸將皆曰唐得鄆州隔河難守不若棄鄆與梁而西取衛州黎陽以河為界與梁約罷兵毋相攻庶幾以為後圖帝不恱退卧帳中召郭崇韜問計崇韜曰陛下興兵仗義將士疲戰爭生民苦轉餉者十餘年矣今大號已建自河以北人皆引首以望成功而思休息今得一鄆州不能守而棄之縱欲指河為界誰與陛下守之且唐未失德勝時四方商賈征輸必集薪芻糧餉其積如山自保楊劉道路轉徙耗亡大半而魏博五州秋稼不稔不支數月此豈按兵持久之時乎自康延孝來盡得梁之虛實此正天亡之時願陛下分兵守魏固楊劉而自鄆長驅搗其巢穴不出半月天下定矣帝大喜曰此大丈夫之事也九月戊辰王彥章渡汶李嗣源遣軍偵視至遞坊鎮梁軍挑戰嗣源擊敗之帝大恱下令軍中歸其家屬於魏十月壬申帝發楊劉癸酉至鄆州嗣源為前鋒時彥章守中都甲戌帝攻之衆潰擒彥章等將吏二百餘人斬馘二萬奪馬千匹翌日彥章見殺彥章雖敗而段凝悉將梁兵屯河上帝未知所嚮諸將多言乘勝以取青齊嗣源曰彥章之敗凝猶未知使其聞之定計三日縱使料吾所向亟發救兵必渡黎陽數萬之衆舟楫非一日具也此去汴州不數百里前無險阻方陳而行信宿可至汴州已破凝豈足顧哉而郭崇韜亦勸帝入汴帝嘉之是夜嗣源率前軍死進丁丑取曹州至汴二百四十里梁帝聞晉軍長驅將至遣張漢倫馳馹召段凝于河上漢倫中道墜馬傷不能進帝呼敬翔曰朕居常忽卿言今急矣勿以為懟我當安歸翔曰臣從先帝三十餘年今雖為相實朱氏老奴爾事陛下如郎君以臣之心敢有所愛陛下初用段凝臣已爭之今凝不來敵勢已迫欲為陛下謀則小人間之必不見聽請先死不忍見宗廟之亡君臣相向慟哭時禁軍尚有四千人朱圭請以拒唐帝不從召開封尹王瓉謂之曰段凝未至社稷繫卿方略瓉驅軍民登城為備帝登建國樓五代㑹要開平元年改皇城南門為建國門以問羣臣或曰晉孤軍逺來勢難持久雖使入汴不能守也宜幸洛陽保嶮以召天下兵徐圖之勝負未可知也趙岩曰勢已如此一下此樓何人可保帝置傳國寶於卧房內俄失所在已為左右所竊迎唐軍矣召控鶴都將皇甫麟謂之曰吾與唐世讐不可俟彼刀鋸卿可盡我命勿落讐人之手麟不忍帝曰將賣我耶麟將自刎帝持之戊寅夕麟弒帝即自裁遲明嗣源攻封丘門北面之東南王瓉開門迎降帝軍繼進瓉迎帝自梁門西面次門入見嗣源手攬其衣以頭觸之曰天下與爾共之辛巳凝率兵五萬降此莊宗取魏博以後滅梁本末也後梁自太祖開平元年至均王龍德二年凡二世十六年己丑唐詔梁節度觀察使下至將校並不改更以舊紀及通鑑修甲午唐以郭崇韜守侍中無成德節度使戊戌加李嗣源中書令以舊紀及通鑑修楚王殷遣子希範上將吏籍于唐以通鑑修渤海王季興朝于唐以通鑑修十一月唐以滑州留後段凝為泰寧節度使以通鑑修乙巳唐復北都為鎮州太原為北都以新紀修戊申唐省文武官以通鑑修丙辰唐復東京為宣武軍汴州以新紀通鑑修丁巳唐禮部侍郎韋說同平章事以新紀修辛酉唐復永平軍為西都京兆府以新紀修甲子唐遷都于洛陽以通鑑修十二月唐復藩鎮舊名以舊紀修辛巳唐李繼韜伏誅以新紀修壬辰唐主畋于伊闕以新紀修甲申唐莊宗皇帝同光二年年岐王李茂貞天祐二十一年吳睿帝順義四蜀帝王衍乾德六年南漢髙祖皇帝乾亨八年興吳越王錢鏐寶大元年楚王馬殷南平王髙季閩王王審知契丹天贊三年春正月唐河南尹張全義及諸鎮進暖殿物分財賦為內外府以新紀修岐王茂貞稱臣遣子貢于唐以通鑑修唐召宦官詣闕復置內諸司使諸道監軍以吕祖謙標目修二月唐以宣徽使馬紹宏為內勾使以唐實録修辛巳唐進岐王茂貞爵秦王以吕祖謙標目修癸未唐立夫人劉氏為皇后時皇太后誥皇后教與制敕交行於藩鎮以吕祖謙標目修解題曰陸游曰莊宗欲立劉氏為后而韓夫人正室也伊夫人位次在劉氏上莊宗雖出夷狄承天下大亂之際然顧典禮人情未知所出羣臣無敢當其議者將相豆盧革郭崇韜上章言劉氏當立莊宗從之劉氏既立黷貨蠧政天下大亂莊宗弒死李氏子孫殱焉革不足言矣崇韜佐命大臣其請立劉氏不過謂天子所寵昵而自結焉將以賴其功而已然唐之亡實由劉氏是亡唐者崇韜也同光之初海內幾可指揮而定崇韜以覆其社稷宗廟之靈其肻赦之乎崇韜以盡忠赤族而革亦誅死豈非天哉昔唐髙宗立武昭儀為后褚遂良等力爭以為不可皆得禍獨李績勸成之窮極富貴而死及武氏得志太宗之子孫誅戮幾盡績亦以子敬業故發墓夷族遂良得禍不至此也天理之不可逃也如此事見通鑑三月丙午唐進渤海王季興爵南平王以通鑑修庚申唐遣使按視諸陵以通鑑修解題曰溫韜逋誅則雖按視諸陵無益也夏四月己巳朔唐上尊號以通鑑修唐遣客省使李嚴使于蜀以通鑑修秦王茂貞卒其子從曮權知鳳翔軍府事以吕祖謙標目修唐潞州將楊立反以新紀修五月壬寅唐以梁教坊使陳俊內園使儲德源為刺史以舊紀修壬戌唐以李從曮為節度使以通鑑修六月丙子唐楊立伏誅以新紀修壬辰唐以李嗣源為宣武節度使蕃漢馬步總管以吕祖謙標目修解題曰此他日嗣源入汴之張本也征蜀之役明宗為總管當行而姚坤之對阿保機亦謂新天子位至大總管之職蓋統兵之至重者也秋八月癸酉唐以孔謙為租庸使時使帖直下支郡天平節度使李存霸等以為言不從以吕祖謙標目修解題曰程大昌曰按舊史梁太祖之開國也屬黃巢大亂之餘以夷門一鎮外嚴烽候內辟汙萊厲以耕桑薄其租賦士雖苦戰民則樂輸二紀之間俄成霸業乃末帝與莊宗對壘于河上河南之民雖困于輦運亦未至流亡無他賦斂輕而邱園可戀故也及莊宗平梁任孔謙為租庸使峻法以剝下厚斂以奉上民産雖竭軍食尚虧加之以兵革因之以飢饉不四三年以至顛殞無他賦役重而寰區失望故也此事新史既不書通鑑亦不載殆惡朱梁之過也冬十月吳越王鏐遣使貢于唐以通鑑修十一月癸卯唐主畋于伊闕以新紀修蜀聘唐盡罷北邉屯兵以通鑑修丁巳唐加朱守謙太師尚書令賜鐵劵以列傳通鑑修十二月庚午蜀以宦者宣徽使王承休為天雄節度使以通鑑修解題曰蜀以秦州為天雄軍辛卯蜀改明年元以通鑑修是歲契丹冦唐以通鑑修解題曰按隂山雜録梁滅阿保機本文作阿保謹率兵直抵涿州時幽州安次潞三河漁陽懷柔密雲等縣皆為所陷俘其民而歸置州縣以居之不改中國州縣之名餘見通鑑吳越王鏐改元解題曰按九里松觀音尊勝幢寶大二年嵗次乙酉建乙酉乃唐同光三年其元年當在甲申又平江橫山寶積寺吳越碑亦稱寶大二年蓋自壬申以後用梁紀元至唐革命復自立正朔也唐莊宗皇帝同光三年祖吳睿帝順義五年吳蜀帝王衍咸康元年南漢髙皇帝白龍元年越王錢鏐寶大二年王楚王馬殷丹南平王髙季興閩王審知契天贊四年春正月庚子唐主如魏州以新紀修二月唐郭崇韜解節度使庚辰以李嗣源為成德節度使以通鑑修漢遣使貢于唐以通鑑修三月唐令宦者伶人擇妃嬪以通鑑修庚申唐主至自魏州以新紀修辛酉唐改東京為鄴都洛京為東都以新紀修夏四月癸亥朔日有食之通鑑五月唐大早以通鑑修秋八月癸未唐殺河南令羅貫以新紀修九月蜀主衍與太后游青城山以通鑑修庚子唐以魏王繼岌為行營都統郭崇韜為招討等使以伐蜀以通鑑新唐紀修大水以新舊紀修冬十月癸亥蜀主衍東游至利州而還以通鑑修戊寅唐取蜀鳯州辛巳取興州大敗蜀兵于三泉蜀諸鎮皆送欵十一月丙辰蜀主衍至成都中書令判六軍十二衛王宗弼劫之尋出降以通鑑修解題曰蜀自王建以唐大順二年入成都天祐七年建號傳子衍至同光三年而滅凡三十五年蘇轍曰國無釁而後可以伐人冒釁以伐人敵無釁則己受其災敵有釁則我與敵皆斃唐莊宗與梁人夾河相攻十戰九勝涉河取鄆不十日而克梁五代用兵未有神速若此者也然克敵之後幸一日之安沉湎聲色之娛宦官伶人交亂其政府庫之積罄於耳目之奉民怨兵怒國有土崩之勢而不知也一時功臣皆武夫倔起未有識安危之機者惟郭崇韜知其不可力言而不見聽求去而不見許中外佞幸視之仄目崇韜深病之矣時方欲伐蜀崇韜欲立功為自安計議以魏王為元帥而己為之副將兵六萬以去不逾時而克成都然崇韜知蜀之易與不知唐之已亂挈其良將徑兵西行數千里雖立大功而不免讒死征蜀之兵未還而趙在禮為亂河朔明宗北征遂與在禮皆反帥兵南向無一人能禦之向使西師不出蜀雖未下而京師有重兵崇韜不死叛臣心有所畏不敢妄動莊宗不亡崇韜不死禍福未可知也其冒釁以伐人蓋有智而未始學也事見通鑑十二月唐以右廂馬步都虞候董璋為東州節度使以吕祖謙標目修解題曰按新史左右廂起于唐用李靖兵法諸軍各分左右廂統之自府兵壞京師變為彍騎謂之禁兵諸道變為長征謂之鎮兵昭宗之亡禁旅盡矣朱全忠以方鎮建國遂以鎮兵之制用之京師是後京師軍有四廂而諸軍兩廂其廂使各掌城郭烟火之事而軍旅漸有廂軍之名自周世宗於方鎮寄招禁軍别立部曲由是州郡始有禁軍宋太祖作階級法專治禁軍而天下鎮兵通謂之廂軍教閲踈略浸為役卒矣唐魏王繼岌族誅王宗弼等以新紀通鑑修辛未閩王審知卒子延翰自稱威武留後以吕祖謙標目修丙子唐以北都留守孟知祥為西川節度使以吕祖謙標目修唐以伶人武德使史彥瓊為魏博監軍以通鑑修己卯唐主獵于白沙以新紀修漢改元以通鑑修唐李嗣源入朝以通鑑修解題曰按新史明宗自鎮州入覲奉朝請于京師莊宗頗疑其有異志隂遣李紹宏伺其動靜紹宏以情告明宗明宗自魏而反天下皆知禍起于魏孰知其啓明宗之二心者自紹宏始也事見通鑑閏月唐吏部尚書李琪請除折納紐配之法不行以通鑑修大事記續編卷七十二
