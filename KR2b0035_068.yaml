body:
  text: 大事記續編卷六十八明王禕撰唐懿宗皇帝咸通九年春正月彗星出于婁胃以新紀修夏六月鳳翔少尹李師望請分蜀為定邉軍從之以吕祖謙標目修解題曰定邉軍見開元二年劔南節度使解題秋七月武寧糧料判官龎勛反于桂州冬十月庚午陷宿州丁丑陷徐州執觀察使崔彥曾十一月陷濠州詔以金吾衛大將軍康承訓為徐泗都招討使帥沙陀朱邪赤心等討之十二月勛陷滁和二州以新紀通鑑修解題曰宋祁曰懿宗任相不明藩鎮屢畔南詔內侮屯戍思亂龎勛乘之倡戈橫行雖凶渠殱夷兵連不解唐遂以亡易曰喪牛于易有國者知戒西北之虜而不知患生於無備漢亡於董卓而兵兆於冀州唐亡於黃巢而禍基於桂林易之意深矣事見通鑑唐懿宗皇帝咸通十年春二月殺歡州流人楊收新紀康承訓大敗賊軍夏四月壬辰龐勛殺崔彥曾等承訓復敗之于桞子以新舊紀通鑑修解題曰按舊紀王晏權智興之猶子也故授以武寧節制以招之以冀招懷徐人怨王式之誅相扇搆亂數月招携啖之以利民吏卒無革心者餘見通鑑桞子去宿州九十里六月陜州民亂逐其觀察使崔蕘以吕祖謙標目修徐商罷户部侍郎劉瞻同平章事以新紀修秋八月彗星出于大陵以新紀修九月徐州降龎勛伏誅以通鑑修冬十月康承訓為河東節度使同平章事賜朱邪赤心姓名李國昌以為大同軍節度使以通鑑修解題曰大同軍節度使見開元九年天兵軍解題方鎮表會昌三年以雲蔚朔三州置大同都團練使治雲州明年改都防禦使乾符五年升節度使考之新史列傳及通鑑李國昌咸通十年已為大同節度使表以因乾符五年國昌再為大同節度使始書之誤也十二月南詔破定邉軍吕祖謙標目唐懿宗皇帝咸通十一年春正月甲寅朔上尊號以新紀通鑑修康承訓坐貶以吕祖謙標目修癸酉廢定邉軍吕祖謙標目南詔圍成都尋退以吕祖謙標目修解題曰按張雲解圍録自天寶庚寅閣羅鳳殺姚州都督張虔陀明年敗鮮于仲通又敗李謐至大和三年雖造成都不甚殘夷井邑至是暴掠尤劇自天寶至咸通甲子再周矣事見通鑑三月曹確罷夏四月丙午兵部侍郎韋保衡同平章事以新紀修五月光州民亂逐其刺史李弱翁以吕祖謙標目修秋八月魏博軍亂殺何全皥其將韓允中自稱留後九月庚戌從之以新紀通鑑修解題曰按新史列傳自進滔至全皥三世四十二年丙辰劉瞻罷尋貶歡州司户京兆尹溫璋貶振州司馬自殺以新舊紀修冬十一月辛亥兵部尚書王鐸為禮部尚書同平章事以新舊紀修十二月以金吾上將李國昌為振武節度使以通鑑修唐懿宗皇帝咸通十二年春正月以韓允中為節度使以通鑑修夏四月癸邜路巖罷以新紀修冬十月兵部侍郎劉鄴為禮部尚書同平章事以新紀修唐懿宗皇帝咸通十三年春正月丙申張允伸卒其子節度副大使簡會自稱盧龍留後以通鑑修解題曰舊史允伸鎮幽州二十三年二月丁巳于琮罷刑部侍郎趙隱為户部侍郎同平章事以新紀修三月平州刺史張公素逐張簡會自稱盧龍留後以新紀通鑑修夏四月封子三人為王以新紀修五月乙亥殺國子司業韋殷裕新紀解題曰朝補之曰論妃戚家私而當大逆不道之戮桀紂之暴不過於此唐之亡自此兆矣事見通鑑六月以張公素為節度使以通鑑修秋八月張義潮卒以沙州長史曹義金為歸義節度使是後中原多故河湟多為羌胡所據以吕祖謙標目修解題曰按五代史四夷附録甘涼瓜沙等州五代時吐蕃已微弱回鶻黨項諸羌夷分侵其地而不有其人民值中國衰亂不能撫有惟甘涼瓜沙四州常自通於中國甘州為回鶻牙而涼瓜沙三州將吏猶稱唐官數來請命自梁太祖時嘗以靈武節度使兼領河西節度使而觀察甘肅威等州然雖有其名而涼州自立守將唐長興四年涼州留後孫超遣大將求旌節明宗拜超節度使清泰元年留後李文謙來請命後數年涼州人逐文謙靈武馮暉遣吳繼勳代文謙晉高祖遣押衙陳延暉安撫涼州涼州劫以為刺史漢隱帝時涼州留後折逋嘉施來請命即以為節度使周廣順二年嘉施請命帥拜申師厚河西節度使世宗時師厚留其子而逃歸涼州遂絶於中國沙州梁開平中有節度使張奉自號金山白衣天子唐莊宗時留後曹義金遣使附回鶻以來莊宗拜為歸義節度使晉天福五年義金卒子元德立七年沙州曹元忠瓜州曺元深皆遣使來周世宗以元忠為歸義節度使元恭為瓜州團練使十一月王鐸為司徒韋保衡為司空新紀十二月徙李國昌為大同防禦使不赴其子克用執雲中防禦使段文楚以舊紀修解題曰詳見廣明元年解題唐懿宗皇帝咸通十四年春正月李克用殺段文楚自稱留後詔太原幽州兵討之以舊紀莊宗功臣列傳修三月癸巳迎佛骨以新舊紀修解題曰宋祁曰人之惑怪神也甚哉若佛者特西域一稿人耳裸顛露足以乞食自資癯辱其身屏營山樊行一槩之苦本無求于人徒屬稍稍從之然其言荒茫漫靡夷幻變現善推不驗無實之事以鬼神死生貫為一條據之不疑掊嗜欲棄親屬大抵與黃老相出入至漢十四葉書入中國迹夫生人之情以耳目不際為竒以不可知為神以物理之外為畏以變化無方為聖以生而死死復生回復償報歆豔其間為或然以賤近貴逺為喜鞮譯差殊不可研詰華人之譎誕者又攘莊周列禦冦之説佐其高層纍駕騰直出其表以無上下可加為勝妄相夸脅而倡其風於是自天子逮庶人皆震動而祠奉之初王縉以業緣事佐代宗於是始作內道場晝夜梵唄冀禳冦戎盂蘭肖祖宗像分供塔廟為賊臣嘻笑至憲宗世迎佛骨於鳳翔內之宫中韓愈指言其弊帝怒竄愈瀕死憲亦弗獲天年幸福而禍無亦左乎懿宗不君精爽奪迷復蹈前車而覆之興哀無知之場丐庇百解之􅗃以死自誓無有顧藉流淚拜伏雖事宗廟上帝無以進焉屈萬乘之貴自等於古胡數千載而逺以身為殉嗚呼運痑祚殫天告之矣懿不三月而爼唐德之不競厥有來哉悲夫朱熹曰歐陽修排佛就禮法上論程皓程頥止説義理惟宋祁捉得他正贓佛家先偷列子説耳目口鼻心體處有六佛氏即指為六根又三之為十八戒皆是中國人以莊列之説文於其間今按魏太武下詔云今胡神皆是前世漢人無賴子弟乞胡之誕言用老莊之虛假附而益之又傅欒對太宗謂佛是胡中桀黠欺誑夷狄漸流中國皆是邪僻小人模寫莊老之言文飾妖幻之教祁蓋本乎此夏五月南詔陷黔中以通鑑修六月王鐸罷新紀秋七月戊寅帝疾大漸庚辰左右軍中尉劉行深韓文約立少子普王儼為皇太子改名儇辛巳帝崩於咸寧殿太子即皇帝位以新紀通鑑修解題曰改名通鑑不書闕也范質五代通鑑梁李振謂陜州監軍韓彛範曰懿皇初升遐韓中尉殺長立幼以利其權遂亂天下今將軍復欲爾耶彛範即文約孫也懿宗八子僖宗第五餘子新舊書不言其所終不知所殺者何也事見通鑑八月丁未追尊母為皇太后新紀韋保衡為司徒九月貶為賀州刺史尋賜死以稽古録修冬十月乙未左僕射蕭倣為門下侍郎同平章事以通鑑修十二月貶荆南節度使路巖為新州刺史尋賜死以通鑑修唐僖宗皇帝乾符元年春二月甲午葬簡陵廟號懿宗以通鑑修趙隱罷華州刺史裴坦為中書侍郎同平章事夏五月乙未坦薨刑部尚書劉瞻為中書侍郎同平章事秋八月辛未瞻薨兵部侍郎崔彥昭為中書侍郎同平章事冬十月劉鄴罷吏部侍郎鄭畋為兵部侍郎户部侍郎盧攜並同平章事以新紀通鑑修十一月上尊號改元以通鑑修蕭倣為司空新紀韓允中卒其子節度副使簡自稱魏博留後尋從之新紀通鑑修十二月黨項回鶻冦天德軍新紀南詔冦黎雅二州以新紀修商州民毆其刺史王樞以吕祖謙標目修是嵗濮州人王仙芝尚君長起於長垣以吕祖謙標目修唐僖宗皇帝乾符二年春正月丙戌以天平節度使髙駢為西川節度使南詔請和以通鑑新紀修左軍中尉田令孜專政請籍商旅以吕祖謙標目修三月以韓簡為節度使狼山鎮遏使王郢陷蘇常二州夏五月蕭倣薨以通鑑修六月吏部尚書李蔚為中書侍郎同平章事以新紀修王仙芝等陷曹濮二州寃句人黃巢聚衆應之以吕祖謙標目修解題曰范祖禹曰自古賊盜之起國家之敗未有不由暴賦重斂而民之失職者衆也唐之季世政出閹尹不惟賦斂割剝復販鬻百物盡奪民利故有私鹽之盜使民無衣食之資欲不亡其可得乎事見通鑑盧龍將李茂勳逐張公素自稱留後秋八月以為節度使以新紀通鑑修冬十月昭義軍將劉廣逐其節度使髙湜自為留後詔以金吾大將軍曹翔為節度使以通鑑修十二月以平盧節度使宋威為招討草賊使以通鑑修唐僖宗皇帝乾符三年春三月李茂勳致仕立其子左司馬可舉為盧龍留後以新紀通鑑修崔彥昭罷左僕射王鐸兼門下侍郎同平章事以通鑑修夏五月以李可舉為節度使以通鑑修秋七月宋威大破王仙芝於沂州以通鑑修九月乙亥朔日有食之新紀王仙芝陷汝州冬十一月陷郢復二州十二月陷申光廬夀舒通六州以新紀修忠武節度使崔安潛為行營都統宫苑使李琢為招討草賊使以新紀修青滄戍卒逐桂州觀察使李瓉以通鑑修解題曰按方鎮表開耀置桂州管內經略使領桂梧賀連桞富昭蒙嚴環融古思唐龔治桂州廣德二年置桂雍都防禦觀察等增領雍管諸州大厯五年罷雍管諸州八年罷觀察使以諸州𨽻雍管貞元元年復置經略使元和元年增領巖州光化三年升靜江軍節度使唐僖宗皇帝乾符四年春正月崔彥昭為司空新紀二月王仙芝陷鄂州通鑑南詔酋龍死子法立以朱熹綱目修閏月崔彥昭罷以宰相表修王郢伏誅以通鑑修宣武軍節度使王鐸為檢校司徒兼門下侍郎同平章事以新紀修三月黃巢陷鄆沂二州新紀夏四月壬申朔日有食之以通鑑修陜州軍亂逐其觀察使崔碣以新紀修六月王鐸為司徒新紀賊帥桞彥璋陷江州以通鑑修秋九月王仙芝陷隨州通鑑冬十月河中軍亂逐其節度使劉侔以新紀修十一月王仙芝使尚君長請降宋威殺之以新紀修十二月桞彥璋伏誅以新紀修唐僖宗皇帝乾符五年春正月丁酉朔王仙芝陷江陵外郛新紀招討草賊副使曾元裕大破王仙芝於申州以為招討使宋威罷以新紀修解題曰胡寅曰僖宗諸相幸有鄭畋若專守其䇿賊必可平矣雖然秦有趙髙而後關東兵起漢有十常侍而後黃巾賊作正使畋計得行芝巢破滅而田令孜在內畋獨且奈何哉亦必亡而已矣事見通鑑二月李克用陷遮虜軍以新紀修解題曰按舊史列傳昭義李鈞充招討使太原幽州赫連鐸攻蔚州國昌本文作獻祖禦之克用本文作武皇以一軍南抵遮虜城拒李鈞實録太祖紀年録大順元年閏月幽州李匡威下蔚州赫連鐸引吐蕃黠戛斯之衆冦北鄙攻遮虜軍克用營渾河川戰於樂安鎮破之則遮虜軍當在雲中之南岢嵐之北竇蘋音訓謂即漢遮虜障彼在甘州非此也王仙芝伏誅其黨陷洪州以新紀通鑑修黃巢陷沂濮二州以通鑑修三月湖南軍亂逐其觀察使崔瑾以新紀修黃巢陷虔吉等州以通鑑修崔安潛罷都統新紀夏四月以李國昌為大同節度使以通鑑修詔河南貸商旅富人錢榖除官有差朱熹綱目五月丁酉鄭畋盧攜罷户部侍郎豆盧瑑為兵部侍郎吏部侍郎崔沆為户部侍郎同平章事以新紀修六月以荆南節度使髙駢為鎮海節度使以通鑑修秋八月黃巢陷杭州新紀九月李蔚罷吏部尚書鄭從謙為中書侍郎同平章事以新紀修黃巢陷越州新紀冬十月詔昭義節度使李鈞及李可舉討李國昌十一月丁未以河東宣慰使崔季康為河東節度代北招討使以新紀修十二月甲戌黃巢陷福州新紀庚辰崔季康李鈞及李克用戰于洪谷大敗鈞死之以新紀通鑑修解題曰洪谷在今岢嵐軍東十餘里接契丹界是嵗天平節度使張裼卒衙將崔君裕自知州事唐僖宗皇帝乾符六年春正月髙駢遣將擊黃巢屢破之巢趣廣南以駢為江淮鹽鐵轉運使以新舊紀列傳修解題曰按新史列傳巢南陷廣州駢建遣張鄰以兵五千屯郴扼賊西路留後王重任以兵八千並海進援循潮自將萬人繇大庾擊賊廣州且請起荆南王鐸兵三萬壁桂永以雍管兵五千壁端州則賊無遺類餘見通鑑胡寅曰高駢所建良䇿也而朝廷不從由崔沆豆盧瑑昧於制勝之道耳為宰相而不知兵輕用人國以致傾危安得專歸罪於北司哉凡人才氣當及其鋒而用之高駢既不得所請又移鎮淮南知朝廷不足稟畏其精鋭亦自銷耎不復能振矣二月甲戌河東軍亂殺崔季康以新紀修三月淄州刺史曹全晸平崔君裕以通鑑修夏四月庚申朔日有食之通鑑以王鐸為荆南節度使南靣招討都統以新紀修秋九月黃巢陷廣州冬十月以高駢為淮南節度使鹽鐵轉運使以通鑑修閏十月黃巢陷潭澧二州王鐸奔襄陽其守將劉漢宏大掠北歸以朱熹綱目修十一月丙辰兩日並出而鬭新紀黃巢陷江陵山南東道節度使劉巨容大破之於荆門縱賊不追巢陷鄂池等州以新紀修十二月王鐸罷兵部尚書盧攜為門下侍郎同平章事以新紀修大事記續編卷六十八
