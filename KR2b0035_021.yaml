body:
  text: 大事記續編卷二十一明王褘撰漢昭烈皇帝章武元年年吳王孫權元年魏髙祖文皇帝黃初二解題曰朱熹曰自古亦有無統時如周亡之後秦未帝之前三國六朝五代天下分裂不能相君臣此謂無統司馬光編年書止合書甲子而附年號於其下如蜀建興年魏黃初年吳黃武年方是今按通鑑綱目乃以劉備接漢統又似抑揚太過故用無統之例書之春三月魏以祕書令劉放為中書監祕書丞孫資為中書令掌機密以魏傳修解題曰杜佑通典後漢尚書為機衡之任尚書郎直宿建禮門為誥令曹公為魏王置祕書令典尚書奏事則祕書之職近密尚書之職踈逺魏文改祕書為中書歷代相沿而後漢尚書郎非今之尚書郎乃中書舍人也按魏書羣臣永寧宫奏中書監令之班微耳而得掌機事自是宰相始得以他官參掌荀朂為中書監侍中毗贊朝政張華為中書令劉卞謂其居阿衡之地殷浩為揚州刺史而參綜朝權皆此類也唐侍中尚書令中書令為真宰相其以他官參掌者則有同中書門下三品及平章事知政事參知政事參與政事之名或至十數人同時為之體統不正蓋肇於此朱熹曰曹操開魏王府未敢即擬朝廷建官但置祕書令丕既篡漢始改為中書監魏復五銖錢以魏紀修夏四月丙午漢中王備即漢帝位改元以諸葛亮為丞相許靖為司徒立宗廟祫祭髙皇以下以蜀傳修解題曰太傅許靖安漢將軍糜竺軍師將軍諸葛亮太常賴恭等上言今上無天子海內惶惶靡所式仰羣下前後上書者八百餘人咸稱述符瑞圖讖間黃龍見武陽赤水九日乃去又前圍襄陽襄陽男子獻玉璽衍濳漢水漢者髙祖本所起定天下之國號也大王襲先帝軌迹亦興於漢中也曹氏既篡主漢祚者舍先主奚屬而羣臣勸疏稱説符瑞反覆詳復儼如光武即位之時甚矣貽謀之不可不謹也伏惟大王出自孝景皇帝中山靖王之胄夲枝百世宜即帝位以纂二祖紹嗣昭穆前部司馬費詩上疏曰殿下以曹操父子逼主篡位故乃羈旅萬里糾合士衆將以討賊今大敵未克而自立恐人心疑惑昔髙祖與楚約先破秦者王及已入關猶逡巡不敢當况今殿下未出門庭耶由是忤指時中夏人情未一聞備在蜀四方延頸而備鋭意即真劉巴以為如此示天下不廣且欲緩之與主簿雍茂諌備以他事殺茂吕祖謙曰費詩之議不達時變漢統既絶昭烈安得不承之非髙祖之時比也餘見通鑑裴松之曰先主雖云出自孝景而世數悠逺昭穆難明既紹漢祚不知以何帝為元祖以立親廟於時英賢作輔儒生在官宗廟制度必有憲章而載記闕略良可恨哉孫權徙都武昌以通鑑目録修五月漢主立夫人吳氏為皇后子禪為皇太子以蜀傳修解題曰劉瑁納后瑁死后寡居羣下勸先主聘后先主疑與瑁同族法正進曰論其親踈何與晉文之於子圉乎於是納為夫人習鑿齒曰婚姻人倫之始王化之夲匹夫猶不可以無禮况人君乎晉文廢禮行權以濟其業非無故而違禮教者也先主無權事之逼而引前失以為譬非𨗳其君以堯舜之道者從之過矣吳立子登為太子以吳書修解題曰按吳立登為太子選置師傅銓簡賔友於是諸葛恪張休顧談陳表等入侍講詩書出從騎射登與恪等或同輿而載或共帳而寐登為皇太子恪為左輔休為右弼談為輔正表為翼正東宫號為多士史記楚子熊繹魯公伯禽衛康叔子平齊太公子伋俱事成王權用諸葛張顧諸賢侍太子蓋有得於三代之意矣餘見通鑑六月甲辰魏祀太祖於建始殿如家人禮以魏傳修解題曰以宗廟未成躬執饋奠如家人之禮丁卯魏殺夫人甄氏以通鑑修戊辰晦日有食之魏詔勿劾三公以魏紀修漢車騎將軍張飛為其下所殺以蜀傳修秋七月漢主帥師擊孫權權請和不許和以將軍陸遜為大都督拒之以通鑑修魏築凌雲臺以通鑑修八月孫權稱臣於魏歸于禁等丁巳魏封權為吳王加九錫以通鑑目録修解題曰魏略孫權聞魏受禪備稱帝乃呼問知星者已分野中星氣何如遂有僣意而以位次尚少無以威衆又欲先卑而後踞之為卑則可以假寵後踞則必致討然後可以怒衆衆怒然後可以自大故深絶蜀而專事魏餘見通鑑吳城武昌以吳傳修冬十月魏罷五銖錢朱熹綱目十一月魏遣使求香犀珠貝於吳以吕祖謙標目修時烏桓浸衰鮮卑強盛魏置護鮮卑烏桓二校尉以吕祖謙標目修漢昭烈皇帝章武二年年吳王黃武元年魏髙祖文皇帝黃初三春正月丙寅朔日有食之魏紀魏詔選士不限年以通鑑目録修二月魏復通西域以吕祖謙標目修漢主進軍夷道猇亭使將軍黃權督江北軍以蜀傳修閏六月陸遜大破漢軍漢主走吳以遜領荆州牧以蜀吳傳修解題曰遜遣將軍李異謝旌等將三千人攻蜀將詹晏陳鳯異將水軍旌將步兵斷絶險要即破晏等生降得鳯文攻房陵太守鄧輔南鄉太守郭睦大破之秭歸大姓文布鄧凱等合夷兵數千人首尾西方遜復部旌討破布凱前後斬獲招納凡數萬計諸葛亮與尚書令法正好尚不同以公相取亮每竒正智術漢主將東征孫權臣多諌不從大軍敗績還住白帝亮歎曰孝直若在則能制主上令不東行就復東行必不傾危矣餘見通鑑朱熹曰先主東征孔眀略不見之議論事敗之後方追恨孝直之不在得君如孔眀猶有不能盡言者乎秋八月黃權降魏以通鑑修九月甲午魏詔群臣不得奏事太后后族不得輔政以魏紀修十一月庚申晦日有食之春二月魏軍還三月漢主召諸葛亮與尚書令李平受遺夏四月殂于永安宫五月太子禪即皇帝位尊皇后曰皇太后改元封亮為武鄉侯領益州牧以蜀傳修解題曰先主病篤召亮於成都屬以後事謂亮曰若嗣子可輔輔之如其不才君可自取亮涕泣曰臣敢不竭股肱之力效忠貞之節繼之以死遺詔勑後主曰人五十不稱夭年已六十有餘何所復恨不復自傷但以卿兄弟為念勉之勿以惡小而為之勿以善小而不為惟賢惟德能服於人汝父德薄勿效之可讀漢書禮記間暇歷觀諸子及六韜商君書先主師友學問後世帝王鮮及然臨終教太子讀書之法不及論語經書其夲領欠闕多矣益人意智聞丞相為寫申韓管子六通亮嘗自比管樂其所學亦於此可見已畢未送可自更求聞達臨終呼魯王與語吾亡之後汝兄弟父事丞相今卿與丞相共事而已亮上言於後主曰遺詔事惟太宗動容損益百寮發哀滿三日除服到喪期復如禮其郡國太守相都尉縣令長三日便除服臣請宣下奉行永安宫在夔州餘見通鑑張拭曰亮之於學為未足者知有未至也知有未至則心為未盡未能盡其心則於天下之事物有所不能遍該而一以貫之也開國建后大事也而奉册所立者乃亡國之宗婦以日易月後世之大失也而冡宰所贊者乃因繆之禮茲可見其學之未至歟陳夀評曰先主之強毅寬厚知人待士蓋有髙祖之風英雄之氣焉及其舉國託孤於諸葛亮而心神無二葉適曰道得出司馬遷不能過也誠君臣之至公古今之盛軌也機權幹略不逮魏武是以基宇亦狹然折而不撓終不為下者抑揆彼之量必不容己非唯競利且以避害云爾又曰禮國君繼體踰年改元而章武之三年則革稱建興考之古義體禮為違又國不置史注記無官是以行事多遺災異靡書諸葛亮雖達於為政凡此之類猶有未周焉胡寅曰或謂昭烈知禪不才不能保孔明之必與禪也故於臨終正言兾亮德已而不忍取嗚呼可謂以小人之腹度君子之心矣玄德磊磊落落與孔明兼君臣師友之契三代已還未見其比夫豈以欺詐相待如市道之為乎曹操名為英雄考其心事乃真小人爾雖暴戻強伉殺人不忌至其病亡伊嬰涕泣留連妾婦平生姦偽死乃盡見方之玄德治命無一語及私其相去豈不逺哉玄德天資既髙克己亦力其從鄭康成盧植學問𢎞益多矣六月漢益州耆帥雍闓反以通鑑修秋九月漢尚書鄧芝聘吳吳遂絶魏以通鑑修解題曰亮遣使聘吳因結和親遂為與國亮集曰是嵗魏司徒華歆司空王朗等各有書與亮陳天命人事欲使舉國稱藩亮不報書作正議曰世祖創迹舊基奮羸卒數千摧莽強旅四十餘萬於昆陽之郊夫據道討淫不在衆寡軍誡曰萬人必死橫行天下昔軒轅整卒數萬制四方定海內况以數十萬之衆據正道而臨有罪可得干擬者哉餘見通鑑是嵗漢立妃張氏為皇后以通鑑修魏徴處士管寧為太中大夫不受以魏傳修漢安樂思公建興二年年吳王黃武三年魏髙祖文皇帝黃初五夏四月魏立太學以舉要厯補遺修吳輔義中郎將張溫聘漢以吳傳修秋七月魏主如許昌八月以舟師伐吳九月至廣陵而還以魏紀吳傳修解題曰魏文帝出廣陵吳人臨江孫權令趙達算之達曰曹丕走矣然吳衰庚子計五十八年權曰今日之憂不暇及子孫觀權此言豈有混一之志哉餘見通鑑吳殺尚書暨艷即徐彪廢張溫以通鑑修解題曰暨音揭將軍駱統表理張溫曰溫洪雅之素英秀之德文章之采論溫才則可惜言罪則可恕權不納餘見通鑑宋祁曰曹操忌孔融崔琰殺之操之宇為弗裕矣孫權引殺融為比而斥虞翻誅張溫權之量又下矣待賢少忌唯劉備為綽綽冬十一月戊申晦日有食之以通鑑修漢安樂思公建興三年年吳王黃武四年魏髙祖文皇帝黃初六春三月魏并州刺史梁習討鮮卑軻比能大破之以魏紀修漢諸葛亮討雍闓以蜀傳修魏主為舟師夏五月戊申至譙以魏紀通鑑修六月吳以太常顧雍為丞相以吳傳修解題曰初權當置丞相衆議歸張昭權曰方今多事職大者責重非所以優之也孫邵卒百寮復舉昭權曰孤豈為子布有愛顧丞相事煩而此公性剛所言不從怨咎將興非所以益之也乃用雍餘見通鑑陳亮曰昔吳起與田文論功至主少國疑大臣未親百姓未附之際吳起屈焉桓王屬大皇於張昭更以周瑜遺之後瑜驅馳於顛危之際昭遂廢不用何哉江東雖定而國輕矣秋七月諸葛亮平雍闓以蜀傳修解題曰益州永昌牂柯越嶲南中四郡皆平南中蓋昔夷越之地滇濮句町夜郎榆葉桐師舊堂侯王國以十數益州故滇池國今姚州之地漢武帝置郡東漢明帝分置永昌郡古哀牢國也牂柯故且蘭今珍承溱費西髙州之地漢武帝置郡越嶲今黎雅敘三州及姚嶲州之地漢武帝置郡亮平四郡改益州為建寧郡别立益州郡後改為晉寧郡分建寧越嶲置雲南郡又分建寧牂柯置興古郡事見通鑑魏了翁曰瀘水始於西南徼外吐蕃之地曲羅東下三百里又東注於三重瀘又東為西瀘水縣又東北會孫水嶲水又北會大渡水其支分為朱提水若水芊官水澠水淹水咸會於越嶲郡之馬湖縣由東北至僰道縣入江諸葛道所從出冬十月魏主至廣陵而還以魏紀修十二月吳鄱陽賊彭綺反以吳傳修漢安樂思公建興四年年吳王黃武五年魏高祖文皇帝黃初七夏四月魏殺治書執法鮑勛以吕祖謙標目修五月魏立子平原王睿為皇太子丙辰召中軍大將軍曹真鎮軍大將軍陳群征東大將軍曹休撫軍大將軍司馬懿受遺輔政丁巳魏主殂太子睿即皇帝位尊皇太后曰太皇太后皇后曰皇太后追諡甄夫人曰文昭皇后以魏紀修解題曰按晉書夲紀懿內忌而外寬猜忌多權變魏武察懿有雄豪志聞有狼顧相欲驗之乃召使行前令反顧面正後而身不動因謂太子丕曰司馬懿非人臣也必預汝家事太子素與懿善每相全佑故免懿於是勤於吏職夜以忘寢至於芻牧之間悉皆臨履由是魏武意遂安餘見通鑑天之禍敗人之國家也豈人之所能為哉以魏武之猜雄逆睹司馬不臣之迹咿嚶以告其子而丕故忘之擁護全佑任之託孤於是懿窺伺間便忽起而扼其吭曹氏不血食矣味孟子反爾之言察老氏好還之戒天實為之於丕何尤哉蕭方三十國春秋魏武王為司空辟髙祖髙祖以漢祚將衰不欲屈節曹氏辭以風痺不能起居武王使往微伺之髙祖卧不動又遣親信令史微服於髙祖門外樹隂下息時七月七日髙祖曝書令史竊知與相聞求共飲避暑遂坐談圍棊殺雞為餅令史還具説重辟之制行者曰若復不就便可收之髙祖懼而應命乃共談軍國之務盡日乃出又云髙祖辭以風痺不能起居曝書遇雨髙祖收書惟一婢見髙祖起懼言語泄漏張夫人乃手殺婢而白執爨焉今晉書帝紀列傳夲此稍加櫽括夫惟婢見其起則不應為令史所知令史既知之則所見不止一婢自相抵牾懿齒少名微豈為異日雄豪之地魏武何所見而遽憚之至此殆史臣及當時佞諛者誇其素美遂至千辭以述耳未必有此事也秋八月吳王權攻魏江夏遣將圍石陽尋退以吳傳修解題曰自是吳之有事于魏東不出合肥夀春西不過襄陽江夏而已殷扎嘗請權大舉謂若不悉軍動衆循前輕舉則民疲威消時往力竭彼蓋知之矣餘見通鑑春正月吳獲彭綺三月漢下詔伐魏諸葛亮屯漢中解題曰亮上疏曰先帝創業未半而中道崩殂今天下三分益州疲弊此誠危急存亡之秋也然侍衛之臣不懈于內忠良之士立身於外者蓋追先帝之殊遇欲報之於陛下也誠宜開張聖德以光先帝遺德恢𢎞志士之氣不宜妄自菲薄引喻以塞忠諌之路也宫中府中俱為一體陟罰臧否不宜異同若有作姦犯科及為忠善者宜付有司論其刑賞以昭陛下平明之理不宜偏私使內外異法也侍中郭攸之費禕侍郎董允等攸之南陽人廖立謂李郃等曰中郎郭演長從人者耳不足與經大事而作侍中蓋指攸之也此皆良實志慮忠純是以先帝簡拔以遺陛下愚以為宫中之事事無大小悉以咨之然後施行必能禆補闕漏有所廣益案允傳亮慮后主富於春秋朱紫難别以允秉心公亮欲任以宫省之事攸之性素和順偹員而已獻納之任允皆專之甚盡匡救之理後主常欲采擇以充後宫允以為嬪嬙已具不宜增益終執不聽後主益嚴憚之將軍向寵性行淑均曉暢軍事試用於昔日先帝稱之曰能是以衆議舉寵為督寵為牙門將秭歸之敗寵營特完後為中即督典宿衛兵愚以為營中之事悉以咨之必能使行陳和睦優劣得所親賢臣逺小人此先漢所以興隆也親小人逺賢臣此後漢所以傾頽也先帝在時每與臣論此事未嘗不歎息痛恨於桓靈也侍中尚書長史參軍此悉貞良死節之臣願陛下親之信之則漢室之隆可計日而待也亮於郭攸之費禕董允則曰良實忠純於向寵則曰性行淑均於長史參軍則曰貞良死節之臣至於智謀變詐宕蕩之士皆所不取蓋良實忠純則誠於報國而不涉於虛誕均淑則公於謀國而不涉於偏黨端良而有敢死之節則忠勇奮發而無避事之嫌亮之取人亦異乎後世所取矣臣夲布衣躬耕南陽茍全性命於亂世不求聞達於諸侯先帝不以臣卑鄙猥自枉屈三顧臣於草廬之中咨臣以當世之務由是感激遂許先帝以驅馳後值傾覆受任於敗軍之際奉命於危難之間爾來二十有一年矣先帝知臣謹慎故臨崩寄臣以大事也受命已來夙夜憂歎恐付託不效以傷先帝之眀故五月渡瀘深入不毛案瀘州瀘川縣有瀘岸髙三千丈地多瘴氣三四經之必死五月則無害今南方已定兵甲已足當奬率三軍北定中原庶竭駑鈍攘除姦凶興復漢室還於舊都此臣所以報先帝而忠陛下之職分也至於斟酌損益進盡忠言則攸之禕允之任也願陛下託臣以討賊興復之效不效則治臣之罪以告先帝之靈若無興德之言責攸之禕允等之慢以彰其咎陛下亦宜自謀以咨諏善道察納雅言深追先帝遺詔臣不勝受恩感激今當逺離臨表涕零不知所言蘇軾曰出師表簡而盡直而不肆與伊訓説命表裏亮謀取益州日月之食也至是則人皆仰之不復論前事矣陳亮曰初漢置御史大夫下丞相一等其後武帝遊晏後庭侍中中書令多以宦者為之成帝始更用士人中興雖置三公而臺閣専國命矣昭烈在蜀國政歸丞相其侍中中書令尚書令有所謂僕射黃門侍郎者更為輔導天子之官諸葛亮以大公之道一整紀綱明白洞達民用其情方連嵗出師而平世之文未遑具舉是以條章多闕非獨記注之失也論者稱其兵出之日天下震動而人心不憂死生成敗要何足論王者之不作天猶以為未踈哉夏四月乙亥魏復行五銖錢以通鑑修解題曰葉適曰黃初五銖錢未幾以穀貴罷至是始復行然則建安中物踊但用榖帛非若王莽日改幣而禁挾錢也幣與物相權從古而然雖操猜詐百出不敢用異説後世以有限逐無涯自坐窮處遂無䇿矣甲申魏初營洛陽宗廟以魏紀修冬十一月魏立貴嬪毛氏為皇后以魏紀修十二月孟達復降漢魏都督荆豫州軍事司馬懿帥師襲之以魏紀修解題曰降人李鴻詣諸葛亮曰間過孟達許適見王沖從南來言眀公切齒於達欲誅達妻子賴先主不聽耳達曰諸葛亮見顧有夲末終不爾也不信沖言委仰明公無復己巳亮欲誘達以為外援與達書達得書數相交通辭欲叛魏魏遣司馬懿征之即斬滅達亮亦以達無款誠之心故不救助也餘見通鑑漢安樂思公建興六年年吳王黃武七年魏烈祖明皇帝太和二春正月魏平孟達以通鑑修漢諸葛亮出祁山降天水南安安定魏遣大將軍曹真禦之二月魏主如長安亮參軍馬謖與魏將軍張郃戰於街亭敗績亮誅謖自貶為右將軍以蜀傳通鑑修解題曰夏侯楙鎮長安亮於南鄭與羣下計議督前部領丞相司馬魏延曰聞夏侯楙少主壻也怯而無謀魏略曰楙為安西將軍持節承夏侯淵處都督關中性無武略而好治生多畜伎妾今假延精兵五千直從褎中循秦嶺而東當子午而北子午谷在長安萬年縣出洋州真符縣北魏張郃攻漢中劉欽伐蜀晉司馬勳伐秦皆出入子午道不過十日可到長安楙聞延奄至必乘船逃走長安中惟有御史亰兆太守耳橫門邸閣與散民之穀足周食也比東方相合聚尚二十許日而公從斜谷來必足以達如此則一舉而咸陽以西可定矣亮以為此縣危不如安從坦道可以平取隴右十全必克而無虞故不用延計從魏李苗每讀蜀書見魏延請出長安諸葛不許歎息謂亮無竒計苗未足以語此也亮揚聲由斜谷道取郿縣屬鳯翔府當斜谷口使趙雲鄧芝為疑軍據箕谷在鳯翔府寶雞縣東南魏大將軍曹真舉衆拒之曹操經營四方多躬臨之操死而曹真曹仁曹休之徒接迹受事故不敢委之他人也亮率諸軍攻祁山在今西和州長道縣東十里水經注漢陽西南有祁山九州之名阻天下之竒峻戎陳整齊賞罰肅而號令明南安今鞏州之地天水安定叛魏應亮關中響應魏帝西鎮長安命張郃拒亮亮使參軍馬謖督諸軍在前張栻曰謖議論與孔明略相似其才非不可用置之帷幄則可為將帥則違其才孔明使之為前鋒不能無小差與郃戰於街亭在秦州隴城縣東北六十里俗名漢街城謖違亮節度依阻南山不下據城郃絶其汲道擊大破之亮拔西縣千餘家虜薑維還於漢中漢隴西郡西縣在今秦州清水縣今興元府西縣有諸葛亮城蓋亮還漢中築此以處之蜀人皆賀亮亮顔色愀然有戚容謝曰普天之下莫非漢氏國家威力未舉使百姓困於豺狼之吻一夫有死皆亮之罪以此相賀能不為愧觀此數語亮真可為王者之佐矣趙雲鄧芝兵弱敵強失於箕谷然斂衆固守不至大敗水經注褒水西北出衙嶺山東南徑大石門歷故棧道下谷諸葛亮與瑾書云趙子龍退軍燒壞赤崖以北閣道緣谷一百餘里又云子龍伯苗一戍赤崖屯田一戍崖口但得緣崖與伯苗相聞而已戮謖以謝衆上疏曰臣以弱才叨竊非據不能訓章明法臨事而懼至有街亭違命之闕箕谷不戒之失咎皆在臣授任無方臣明不知人恤事多暗春秋責帥臣職是當請自貶三等以督厥咎餘見通鑑或問亮始出隴右南安天水安定應之若速進則三郡非中國之有也而亮徐行不進既而官兵上隴三郡復反亮失此機何也袁暐曰蜀兵輕鋭良將少亮始出未知中國強弱是以嘗而疑之且大會者不求近功所以不進也曰何以知其疑也曰亮勇而能鬭三郡反而不速應此其疑徵也曰何以知其勇而能鬬曰亮之在街亭也前軍大破亮屯去數里不救官兵相接又徐行此其勇也亮之行軍安靜而堅重安靜則易動堅重則可以進退亮法令明賞罰信士卒用命赴險而不顧此所以能鬬也夏吳鄱陽太守周魴誘魏揚州牧曹休向晥秋八月吳王權至晥以陸遜為大都督大破休於石亭以魏紀吳傳修解題曰曹休將步騎十萬至晥城以迎魴時吳以陸遜為元帥全琮朱桓為左右督各督三萬人擊休休知見欺當引軍還自負衆盛邀於一戰桓進計曰休本以親戚見任非智勇名將也今戰必敗敗必走當由夾石挂車夾石在今安慶府桐城縣挂車鎮在其西此兩道皆險厄若以萬兵柴路則彼衆可盡而休可生虜臣請將所部以斷之若蒙天威得以休自效便可乘勝長驅進取壽春割有淮南以規許洛此萬世一時不可失也權先與陸遜議遜以為不可不施行遜自為中部朱桓全琮為左右翼三道俱進果衝休伏兵因驅走之追亡逐北徑至夾石斬獲萬餘牛馬騾驢車乘萬兩軍資器械略盡魏豫州刺史賈逵與休合進度休深入必敗乃部署諸將水陸並進行二百里得生賊言休戰敗權遣兵斷夾石諸將不知所為或欲待後軍逵兼道進軍多設旗鼓為疑兵吳軍遂退逵據夾石以兵糧給休休軍乃振餘見通鑑此一役也吳可以大得志而固失之豈陸遜耻其謀之不已出而致然歟推此心以往其害事大矣石亭在今安慶府睆口冬十二月漢諸葛亮出散關圍魏陳倉不克退斬魏追將王雙以通鑑修解題曰亮聞孫權破曹休魏兵東下關中虛弱上言曰先帝慮漢賊不兩立王業不偏安故託臣以討賊也以先帝之明量臣之才故知臣伐賊才弱敵強也然不伐賊王業亦亡惟坐而待亡孰與伐之是故託臣而弗疑也臣受命之日寢不安席食不甘味思惟北征宜先入南故五月渡瀘深入不毛并日而食臣非不自惜也顧王業不可得偏全於蜀故冒危難以奉先帝之遺意也而議者謂為非計今賊適疲於西又務於東兵法乘勞此進趨之時也夫難平者事也昔先帝敗軍於楚當此時曹操拊手謂天下已定然後先帝東連吳越西取巴蜀舉兵北征夏侯授首此操之失計而漢事將成也然後吳更違盟關羽毁敗秭歸蹉跌曹丕稱帝凡事如是難可逆見臣鞠躬盡力死而後已至於成敗利鈍非臣之愚所能逆睹也張栻曰三代衰五霸起而功利之説盈天下謀國者不復知正誼明道之為貴三老董公獨得宏綱以告漢髙帝猶未能盡其用也孔明當漢祚之季乃能執其機而用之其言曰漢賊不兩立臣鞠躬盡力死而後已此夏少康四十年經營宗祀而卒以配天之本心也孔明可謂有正大之體矣餘見通鑑鳳翔府寶雞縣有陳倉故城大散關在寶雞縣西魏遼東太守公孫恭兄子淵篡恭自立以魏紀修漢安樂思公建興七年年吳大皇帝黃龍元年魏烈祖明皇帝太和三春漢諸葛亮遣將定魏武都隂平二郡復為丞相以蜀傳通鑑修解題曰隂平今文龍州之地夏四月丙申吳王權即皇帝位改元追尊考妣為帝后立王太子登為皇太子以吳書修解題曰宋庠紀年通譜改元以協瑞黃龍本漢宣帝號再用舊元始於此六月漢遣衛尉陳震使吳吳主與盟約中分天下以吳蜀列傳修解題曰豫青徐幽屬吳兖兾并涼屬魏其司州之土以函谷關為界杜佑通典魏據中原有州十二司𨽻荆豫兖青徐涼秦兾幽并揚雍有郡國六十八東自廣陵壽春合肥沔口建安十五年文聘為太守吳頻攻不拔青龍後屬吳即漢陽軍西陽黃初中滿寵今將守之襄陽重兵以備吳西自隴西南安祁山漢陽陳倉諸葛亮攻陳倉不拔縣東二十里故城重兵以備蜀蜀主全制巴蜀置益梁二州有郡二十二以漢中興勢白帝為重鎮吳主北據江南盡海置交廣荆郢揚五州有郡四十有三以建平黃武初破蜀後得之西陵樂鄉建衡三年陸抗築武昌晥城晥音患牛渚圻天紀末何植守之濡須並為重鎮其後得沔口嘉禾後陸遜諸葛瑾屯守邾城今齊安郡東西界臨江與武昌對廣陵魏主追尊髙祖考妣為帝后以魏紀修秋七月魏詔後嗣由諸侯入奉大統者不得顧私親以通鑑修九月吳遷都建業使上大將軍陸遜輔太子登於武昌以吳傳修解題曰按江表傳初權在武昌欲遷都建業而慮水道沂流二千里一旦有警不相赴及以此懷疑及至夏口大會百官議之或陳宜立柵於夏口或言宜重設鐡鎖權皆以為非計張梁為小將越席而進曰今宜明樹賞罰之信遣將入沔與敵爭利形勢既成彼不敢干也使武昌有精兵萬人付智略者任將常使嚴整一旦有警應聲相赴作甘水城輕艦數十諸所宜用皆使備具如此開門延敵敵自不來矣權以梁計為得權大會將相文武特謂嚴畯曰孤昔歎魯子敬比鄧禹吕子衡方吳漢聞卿諸人未平此論今定云何畯退席曰臣未解指趣權曰昔鄧仲華初見光武時受更始使撫河北耳未有帝王之志也禹勸之以復漢業是禹開初議之端矣子敬英爽有殊略孤與一語便及大計與禹稍似吕子衡忠篤亮直性雖如奢然以憂公為先不足為損避袁術自歸於兄兄作大將别領部曲故憂兄事乞為都督辦護修整加之恪勤與漢相類皆有指趣非孤私之也畯乃服冬十月魏置聽訟觀又詔司空陳羣等刪律以魏紀傳修解題曰肉刑之議陳羣父子發之也自曹操以來屢議施行特迫於軍事不果耳今因衛覬之請刪約漢律而使羣輩尸其事不知所謂於正律為增於旁章科令為省者果得聖主制刑之意否耶至晉而又定律矣事見通鑑十一月魏宗廟成迎主於鄴以魏紀修解題曰裴松之曰按黃初四年有司奏立二廟太皇帝大長秋與文帝之髙祖共一廟特立武帝廟百世不毁今此無髙祖神主蓋以親盡毁也此則魏初唯立親廟祀四室而已至景初元年始定七廟之制十一月漢築漢樂二城以通鑑修解題曰通鑑築漢城於沔陽樂城於成固今興元府成固縣蜀曰樂城有南北城相對興元府西縣即古沔陽有西樂城周三十里常璩華陽國志蜀以沔陽為漢城城固為樂城史容曰漢樂二城皆在成固故沔陽自號西樂城魏黃門侍郎杜恕論刺史不宜領兵以魏傳修解題曰時公卿以下大議損益恕以為古之刺史奉宣六條以清淨為名威風著稱今可勿令領兵以専民事俄而鎮北將軍吕昭又領兾州乃上疏曰大魏奄有十州之地而承喪亂之弊計其户口不如往昔一州之民今荆揚青徐幽并雍涼緣邉諸州皆有兵矣其所恃內充府庫外制四夷者惟兖豫司兾而已臣前以州郡典兵則専心軍功不勤民事宜别置將守以盡治理之務而陛下復以兾州寵秩吕昭兾州户口最多墾闢又有桑棗之饒國家徴求之府誠不當復任以兵事也夫天下猶人之體腹心充滿四支雖病終無大患今兖豫司兾亦天下之腹心也實願四州之牧守獨修務本之業以堪四支之重司馬懿為曹操主簿以為天下土崩之勢由郡國無搜狩習戰之備故也可令州郡並置兵外備四夷內威不軌杜佑曰曰晉太康中都督知軍事刺史治民各用人惠帝末乃并任非要州則單為刺史漢安樂思公建興八年年吳大皇帝黃龍二年魏烈祖明皇帝太和四春正月吳遣將浮海求夷洲亶洲陸遜等諌不聼以吳傳修解題曰浮海求夷洲亶洲求馬遼東求珠崖儋耳吳之勢亦有所局矣後漢東夷傳會稽海外有夷州及亶州傳言秦始皇遣徐福將童男女入海求蓬萊神仙不得徐福遂止此洲沈瑩臨海水土志夷州在臨海東南二千里二月魏立郎吏課試法尚書諸葛誕中書郎鄧揚等以浮誕免官以通鑑修夏六月戊子魏太皇太后殂以魏紀修秋七月魏大司馬曹真大將軍司馬懿伐漢漢諸葛亮待之於成固赤阪九月真等還以魏紀蜀傳修解題曰魏使司馬懿由西城張郃由子午曹真由斜谷欲攻漢中諸葛亮待之於成固赤坂餘見通鑑按通典洋州西鄉興道洋源縣皆漢成固縣地非今興元府成固也赤坂在今洋州東龍亭山當子午谷路是嵗漢督前部魏延破魏雍州刺史郭淮於陽溪以蜀傳修吳五溪蠻叛以通鑑修漢安樂思公建興九年吳大皇帝黃龍三年魏烈祖明皇帝太和五年春二月吳使太常潘濬討叛蠻以通鑑修漢諸葛亮圍祁山魏司馬懿救之夏五月亮敗之於鹵城六月引退殺魏追將張郃以魏紀蜀傳通鑑修解題曰按漢晉春秋懿留精甲四千守上邽餘衆悉出西救祁山亮分兵留攻自逆懿於上邽郭淮費曜等邀亮亮破之與懿遇於上邽之東元和郡縣志縣東有司馬宣王壘諸葛壘斂軍依險軍不得交亮引還懿尋亮至於鹵城又登山掘營不肯戰賈詡魏平數請戰因曰公畏蜀如猛虎奈天下笑何懿病之五月辛巳乃使張郃攻無當監何平於南圍自按中道向亮亮使魏延髙翔吳班赴拒大破之懿還保營又按魏略亮軍退懿使張郃追之郃曰軍法歸軍勿追懿不聽郃不得已遂進蜀軍乘髙布伏弓弩亂發矢中郃髀餘見通鑑按晉書宣帝紀懿進軍隃麋亮聞大軍且至乃自帥衆將芟上邽之麥衆將皆懼懿曰亮慮多決少必安營自固然後芟麥吾得二日兼行足矣於是卷甲晨夜趨之亮望塵而遁懿曰吾倍疲勞此曉兵者之所貪也亮不敢據渭水此易與耳進次漢陽與亮相遇懿列陳以待之使將牛金輕騎餌之兵才接而亮退追至祁山亮屯鹵城據南北二山斷水為重圍懿攻拔其圍亮再出祁山一攻陳倉挫衄而反縱其復出不復攻城當求野戰必在隴東不在西也亮每以糧少為恨歸必積穀以吾料之不三稔不能動矣此皆因亮兵之開闔大言以詭其下耳作史者殆未之知也史容曰祁山在西和州長道縣鹵城與之相近秋魏東阿王植上疏詔寬諸侯王法禁以通鑑修解題曰植上疏詔報曰蓋教化所由各有隆敝非皆善始而惡終也勢使之然故忠厚仁及草木則行葦之詩作恩澤衰薄不親九族則角弓之章刺今令諸國兄弟情禮簡怠妃妾之家膏沐疏略朕縱不能敦而睦之王援古喻義備悉矣何言精誠不足以感通哉夫明貴賤崇親親禮賢良順少長國之綱紀本無禁錮諸國通問之詔也矯枉過正下吏懼譴以至於此耳已敕有司如王所訴植復上疏陳審舉之義帝復優答報餘見通鑑八月漢徙中都護李平於梓潼以蜀傳修解題曰張栻曰正觀政要載孔明語云吾心如稱不能為人作輕重此真孔明語也觀廖立李平之事可見矣事見通鑑冬十月吳使人誘魏揚州刺史王凌敗其兵以通鑑修十一月戊戌晦日有食之魏紀十二月丁邜吳改明年元以三國志吳傳修漢安樂思公建興十年吳大皇帝嘉禾元年魏烈祖明皇帝太和六年春正月吳太子登還建康以通鑑修二月魏詔諸侯王以郡為國以通鑑修解題曰蓋因東阿王之疏而為之者也王師古曰此詔下矣然未及三世司馬専權以至篡奪蓋明帝知有封建而不知所以封建雖有名而不得實效也事見通鑑三月吳遣將浮海之遼東秋九月魏邀之成山斬其將以吳紀修大事記續編卷二十一
