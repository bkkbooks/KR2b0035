body:
  text: 大事記續編卷六十九明王禕撰唐僖宗皇帝廣明元年春正月乙卯改元以新紀修奉寧軍將劉漢宏反新紀淮南將張璘及黃巢戰于大雲倉敗之新紀二月李國昌冦欣代二州河東軍亂殺其節度使康傳圭以通鑑新舊紀修殺左拾遺侯昌業以吕祖謙標目修三月庚午以金吾大將軍陳敬瑄為西川節度使以吕祖謙標目修辛未鄭從讜罷為河東節度代北招討使以吕祖謙標目修解題曰按實録初李國昌方強屬大同軍軍儲不繼乃密引沙陀部攻殺段文楚遂據振武雲朔等州令其子克用合諸部侵欣代竇瀚李侃李蔚相繼鎮并部皆不能遏康傳圭為三軍所殺軍士益驕朝廷重於謀帥故輟從讜自輔臣臨制之餘見通鑑以髙駢為諸道行營都統以舊紀及通鑑考異修夏四月丁酉以太府卿李琢為蔚朔招討都統以新紀修壬寅張璘克饒州黃巢請降於髙駢駢散諸道兵巢請戰五月璘敗死以吕祖謙標目修解題曰按舊史駢傳駢怨朝議有不附己者欲賊縱橫河洛令朝廷聳振則從而誅之大將畢師鐸說駢妖亂百萬所經鎮戍若跡無人之境今朝廷所恃者都統破賊要害之地唯江淮為首彼衆我寡若不據津要以擊之北渡長淮何以振束中原蹈覆必矣駢駭然即令出軍有吕用之者以左道媚駢駢頗用其言懼師鐸等有功則奪己權從容謂駢曰明公勳業髙矣妖賊未殄朝廷已有間言賊若蕩平則威望震主功居不賞公安稅駕耶為公良畫莫若觀釁自求多福駢然之乃止七月黃巢自采石北渡直抵天長時城內土客諸軍尚十餘萬皆良將徑兵議者慮狂賊有奔犯關防之患悉願盡力死戰然竟不議出軍巢遂至白馬初巢冦廣陵江東諸侯以駢屯數道徑卒居將相重任巢江海一逋逃耳固可折箠而擒之及聞安然度淮方鎮莫不解體驚聽録朝廷以駢名將黃巢必喪於淮海尋淮南表至云今大冦忽至入臣封處未肯綿伏但以山東兵士屯駐揚州各思故鄉臣遂放去亦具聞奏非臣自專今詔書責臣無備不合放回武勇又告城危徴兵勞於往返臣今以寡擊衆已當數陳粗成勝捷不落姦謀固護一方臣必能了但慮冦設深計支吾官軍迤邐過淮朝廷速下明詔上委中書門下速與商量中書異議京國士庶浮謗日興云淮南與巢衷私通連自固城池放賊過淮案駢之情狀舊史盡之矣通鑑考異乃謂駢宿將豈不知賊過淮之後不可復制若怨朝廷有不附己者則尤欲破賊立功以間執讒慝之口若縱賊過淮適足實議者之言非所以消謗也藉使駢有意使賊震驚朝廷從而誅之賊入汝洛之後當晨夜追擊以爭功名豈得反坐守淮南數年逗遛不出兵乎又云恐成功不賞敗衄稍損威名夫大功既成則有不賞之懼豈有未戰不知勝負豫憂威望震主耶駢為都統控扼江淮而擁兵縱賊使安然北渡其於威名獨無損乎雖用之淺謀無所不至駢自無參酌一至此耶盧攜暗於知人致中原覆沒駢先鋭後怯致京邑邱墟用之妖妄姦回致廣陵塗炭皆人所深疾故衆惡歸焉未必實然其說若反為駢解說何也徴東方兵討劉漢宏以通鑑修丙子以宣徽使李順融為樞密使始用白麻以通鑑修解題曰按林恩補國史德宗命神䇿監軍為中尉又置六軍統軍為節制徊翔地上方姑息功臣竇文場元本作長後同為中尉謂中尉古之重任不可以統軍為此皆當麻制文場加官潛請宰相進內狀請准統軍例草制上不諦覽及翰林進白麻鄭絪密疏封王命相即降白麻付中書門下宣告罷節除統軍亦降白麻今中尉加官降白麻未知祗奬文場出自權宜為復以此為例上覽疏封制留中謂文場曰髙祖太宗創業內臣止於內侍諸衛將軍同正賜緋者六七十人自朝恩峻秩崇階因緣漸多我任卿不謂無私今更越舊規白麻除授天下謂卿有脅君意非優寵也文場叩地待罪上取麻焚之下中書草詞自此罷鎮除統軍亦不降麻制按文場以貞元十二年為中尉至是八十三年而白麻復用按孫光憲北夢瑣言閹尹置左右軍十二衛觀軍容置樞密宣徽四院使擬於四相國朝㑹要唐宣徽南北院使掌總領內諸司及二班內侍之籍六月黃巢陷婺睦宣三州新紀李琢率李可舉及吐谷渾都督赫連鐸等討李國昌朔州降以舊紀通鑑修遣宗正少卿李龜年使南詔以通鑑修秋七月黃巢陷滁和二州新紀發河南諸道兵屯溵水以泰寧節度使齊克讓為汝鄭把截制置使以通鑑舊紀修解題曰泰寧節度使見乾元二年平盧淄青節度使解題劉漢宏降以為宿州刺史以新紀通鑑修李可舉大破李國昌李琢攻蔚州國昌及克用奔韃靼以赫連鐸為大同防禦使以吕祖謙標目修解題曰按舊紀新五代史紀張昭逺功臣列傳朱耶赤心以從破龎勛功拜單于大都護振武節度使賜姓名李國昌沙陀素彊而國昌恃功益橫恣懿宗患之咸通十三年徙國昌雲州刺史大同軍防禦使國昌稱疾拒命乃以太僕卿盧簡方檢校刑部尚書雲州刺史大同軍防禦等使上召簡方謂之曰卿以滄州節鎮屈轉大同然朕以沙陀退渾撓亂邊鄙卿曽在雲中惠及部落且忍屈為朕此行具逹朕㫖安慰國昌勿令有所猜嫌國昌已拒命克用乃殺大同軍防禦使段文楚據雲中自稱留後康君立為雲中牙校事防禦使段文楚時天下將亂代北仍嵗阻饑諸部豪傑咸有嘯聚之志文楚法令稍峻軍食不給戍兵咨怨沙陀兵馬使李盡忠謂君立等曰段公儒者難與共事今四方雲擾丈夫不能於此時立事非人豪也李振武父子官髙功大勇冠諸軍吾等合勢推之則代北之地旬月可定時克用本文作武皇為沙陀三部落副兵馬使在蔚州盡忠令君立往圖之曰天子付將臣以邊事嵗偶饑荒便削儲給我家安能守死公家父子素以威惠及五部當共除虐帥以謝邊人克用曰豫家尊在振武俟豫禀命君立曰事機已泄遲則變生十二月夜盡忠帥牙兵攻牙城執文楚及判官栁漢璋陳韜等繫之遂自知軍州事克用本文作太祖與退渾突厥三部落衆萬人趨雲中十四年正月至鬭雞臺械文楚等五人軍人亂食其肉克用權知留後三軍表請授克用大同防禦使懿宗不悅賜簡方詔曰李國昌久懷忠赤顯著功勞朝廷寵遇實寡比倫昨徴發兵師又令克讓克用之弟將領惟嘉節義固絶嫌疑近知大同軍不安殺害文楚國昌男克用主領兵權事雖出於一時心豈忘於長久文楚若實刻剝但可申論遽加慘毒殊可驚駭若克用暫勿主兵務束手待朝廷除人則事出權宜不足猜慮若便欲奄有大同則患繫久長固難依允料國昌效節必當已有指揮如卿兩任恩及國昌父子宜殷勤譬曉劈析指明切令大節無虧勿使前功併棄簡方諭之國昌不奉詔乃詔太原節度使崔彥昭幽州節度使張公素出師討之通鑑載國昌上言乞朝廷速除大同防禦使若克用違命臣請帥夲道兵討之終不愛一子以負朝廷此出於唐史臣文飾之辭非事實也三月以簡方為單于大都護振武節度麟勝等州觀察等使簡方至嵐州卒軍潰由是沙沱侵掠代北為邊患矣乾符元年十一月以宣慰沙陀六州部落徐無黨注五代史六州三部落皆不見其名處今按舊紀沙陀薩葛安慶即三部落六州未詳檢校兵部尚書李鈞為靈武節度初鈞父業鎮太原能安集代北部落時國昌父子據大同振武吐渾契苾幽州諸道之軍攻之不利故假鈞節鉞率師招諭之拜克用大同軍防禦使居久之國昌出擊党項吐渾赫連鐸襲破振武克用聞之自雲州往迎國昌而雲州人亦閉關拒之國昌父子無所歸掠蔚朔間得兵三千國昌入保蔚州克用還據新城四年十月詔昭義李鈞幽州李可舉吐渾赫連鐸白義誠沙陀安慶薩葛部落合兵討國昌父子於蔚州五年正月丁酉朔李盡忠陷遮虜軍八月沙陀陷岢嵐軍十一月以河東宣慰使權知代北行營招討崔季康檢校户部尚書充河東節度使代北行營招討使沙陀攻石州季康救之十二月季康北面行營招討使李鈞與克用戰于洪谷王師大敗鈞中流矢而卒廣明元年正月沙陀進逼欣州二月逼太原節度使康傳圭遣大將拒之於秦城驛為沙陀所敗三月沙陀冦欣代四月丁酉以檢校吏部尚書李琢為光祿大夫檢校尚書右僕射御史大夫充蔚朔等行營都招討使應東北面行營李孝昌李元禮諸葛爽王重榮朱玫等兵馬及欣代州土團並取琢處分六月李琢李可舉赫連鐸等軍討克用於雲州時克用大將𫝊文逹守蔚州髙文集守朔州鐸遣人說文集令歸國文集與沙陀首領李友金薩葛都督米海萬安慶都督史敬存以蔚州歸欵於琢克用率衆禦燕軍於雄武軍九月沙陀三部落李友金等開門迎天軍克用亟來赴援可舉追至藥兒嶺大敗之李琢赫連鐸又敗之于蔚州降文逹克用部下皆潰獨與國昌及諸兄弟北入韃靼部乃以赫連鐸為雲州刺史大同軍防禦使白義誠為蔚州刺史薩葛米海萬為朔州刺史加可舉檢校司徒同平章事今按克用以咸通十三年執段文楚十四年據雲州為留後至廣明元年敗奔韃靼首尾八年舊紀所載差為詳備通鑑因新紀乃於乾符五年始書克用殺段文楚考異又云克用既殺段文楚豈肯晏然安處必更侵擾邊陲朝廷亦須發兵徴討而自乾符四年以前皆不見其事舊五代史列傳新史附傳韃靼靺鞨之遺種本在奚契丹之東北奚契丹漸盛多為攻劫部衆分散或屬契丹或依渤海漸徙隂山語訛謂之韃靼咸通末有首領部帳於漢南勝兵三萬從朱耶赤心討龎勛其後李國昌父子亡韃靼後從克用入關破黃巢由是牙於雲代之間恣其畜牧石定臾京輔黃圖咸通九年康承訓乞沙陀三部落使朱耶赤心及逹覲契苾酋長各帥其衆以自隨韃靼逹覲同是靺鞨之遺種其後别部居隂山者自號韃靼一居黑水一居白山承訓引逹覲之兵以敗龎勛克用引韃靼之衆以𠞰黃巢九月忠武將周岌殺其節度使薛能自稱留後以通鑑修齊克用還兖州屯兵散冬十月黃巢陷申州以新舊紀修十一月甲寅以劉漢宏為浙東觀察使以通鑑修河中都虞候王重榮逐其節度使李都以為權知留後以新紀通鑑修壬戌護軍中尉田令孜為諸道兵馬制置招討使忠武監軍楊復光副之以新紀修丁卯黃巢陷東都以吕祖謙標目修以周岌為節度使岌以忠武牙將秦宗權為刺史以吕祖謙標目修十二月壬午黃巢陷潼關以吕祖謙標目修王重榮降于黃巢以通鑑修甲申盧携貶分司東都尚書左丞王徽為户部侍郎户部侍郎裴徹為工部侍郎同平章事攜自殺以新舊紀修行在咸陽以吕祖謙標目修丙戌黃巢陷西京大殺宗室壬辰稱齊帝改元以新紀修夏綏節度使諸葛爽屯櫟陽丙申降于黃巢以新紀修鳯翔節度使鄭畋舉兵討賊以吕祖謙標目修丁酉帝次興元以新紀修庚子黃巢殺豆盧瑑崔沆于琮劉鄴等將作監鄭綦庫部郎中鄭係死之以舊紀通鑑修義武節度使王處存舉兵入援以通鑑修王重榮復拒黃巢巢遣其將朱溫擊之重榮大破之以通鑑修唐僖宗皇帝中和元年春正月帝出居于興元以春秋修壬子帝如成都以新紀修壬申兵部侍郎蕭遘為工部侍郎同平章事以新紀修二月己卯朔太子少師王鐸為司徒門下侍郎同平章事以新紀修加髙駢太尉東面都統以通鑑修三月辛亥黃巢將朱溫陷鄧州以新紀通鑑修辛酉鄭畋為京城西面行營都統解題曰按新史紀傳舊紀皆作西面通鑑作四面筆之誤也畋請以涇原節度使程宗楚為副都統前朔方節度使唐𢎞夫為行軍司馬黃巢遣將冦鳯翔𢎞夫大敗之于龍尾陂以新傳通鑑修解題曰龍尾陂在鳯翔府岐山縣東十五里王徽罷以新紀修諸葛爽以河陽降以為節度使以新紀通鑑修夏四月以宥州刺史拓跋思恭權知夏綏節度使以吕祖謙標目修解題曰此西夏之先也程宗楚唐𢎞夫薄長安壬午黃巢遁于灞上還襲宗楚𢎞夫殺之以新紀修以王重榮為節度使以通鑑修赦李國昌克用以討黃巢以新紀修六月戊戌鄭畋為司空門下侍郎同平章事以新紀修李克用陷欣代二州自稱大同留後以新紀通鑑考異修秋七月丁巳改元以新紀修庚申兵部侍郎韋昭度同平章事以新紀修田令孜殺左拾遺孟昌圖新紀八月己丑夜星交流如織大如杯碗至丁酉乃止通鑑感化軍將時溥殺其節度使支詳自稱留後以新紀通鑑修解題曰按方鎮表咸通三年罷武寧軍節度使十一年號感化軍節度使通鑑合書感化軍將乃云武寧軍將誤也今從新紀餘見三年解題以秦宗權為奉國防禦使通鑑霍丘鎮使王緒陷夀光二州以王潮為軍正以新紀舉要厯補遺修以拓跋思恭為節度使以通鑑修石鏡將董昌據杭州以吕祖謙標目修解題曰石鏡在臨安府臨安縣昭義軍將成麟殺其節度使髙潯戍將孟方立殺麟自稱留後尋以為節度使以新紀新五代史列傳修解題曰按五代史列傳方立聞亂引兵自天井入據潞州唐因以為昭義節度使又舊史列傳方立入潞州自稱留後以潞州地形險阻屢篡主帥人心徑悍將漸弱之乃以邢州為府遷昭義軍於龍岡舊史列傳孟方立遷昭義軍於龍岡其大將及富室之家皆遷徙以監軍祁審誨知潞州潞人憤怨審誨因人怨咨令牙將安居受隂乞師於李克用克用遣李克修將兵赴之方立出師大敗由是連收澤潞二郡以克修為節度使昭義自劉悟有澤潞磁邢洺五州至是始分為兩鎮冬十月天平節度使曹全晸與賊戰死之其兄子存實自為留後以通鑑修鳯翔行軍司馬李昌言逐鄭畋十一月以昌言為節度招討使畋及裴徹罷以新紀修十二月安南戍將閔頊逐湖南觀察使李裕自稱留後新紀以時溥為節度使以通鑑修唐僖宗皇帝中和二年春正月帝出居于成都以春秋修髙駢罷都統以王鐸為諸道行營都都統承制封拜以新紀修以王處存拓跋思恭鄜延節度使李孝章為京城東北南面都統以新紀修二月己卯太子少傅分司東都鄭畋為司空門下侍郎同平章事以新紀修朱溫陷同州以通鑑修以李昌言為京城西面都統以新紀修三月卭州蠻阡能反以新紀修夏四月撫州刺史鍾傳陷洪州自稱江西留後以新五代史列傳修五月髙駢罷鹽鐵轉運使貢賦遂絶以列傳通鑑修六月己亥荆南監軍朱敬玫殺其節度使段彥謨少尹李燧自稱留後以新紀修秋八月劉漢宏軍西陵董昌遣將錢鏐大破之以通鑑修韓簡陷河陽以新紀通鑑修九月丙戌朱溫以同州降以為同華節度使以吕祖謙標目修解題曰按新史列傳忠武監軍楊復光率陳蔡兵萬人屯武功王重榮與連和擊賊將李詳於華州執以徇賊使尚讓來攻而朱溫將徑兵居前敗重榮兵於西關門於是出兵夏陽掠河中漕米數十艘重榮選兵三萬攻溫溫懼悉鑿舟沉于河遂舉同州降復光欲斬之重榮曰今招賊一切釋罪且溫武鋭可用殺之不祥表為同華節度使詔即副河中行營招討賜名全忠巢喪二州怒甚將精兵數萬壁梁田在京兆府渭南縣西五代史作良天陂重榮軍華隂復光軍渭北犄角攻之賊大敗執其將趙璋巢中流矢走餘見通鑑崔鶠曰皇甫嵩不斬董卓張守圭不誅安祿山王重榮不斬朱溫無不受之過也嶺南西道軍亂逐其節度使張從訓平盧將王敬武逐其節度使安師儒自稱留後以新紀通鑑修冬十月賊帥韓秀升斷峽江路以通鑑修韓簡攻鄆州殺曹存實詔以都將朱宣為天平留後以通鑑修解題曰新史列傳作宣注云今流俗以宣弟瑾於名加玉者非也事見通鑑賜朱溫名全忠以吕祖謙標目修楊復光招李克用討黃巢吕祖謙標目十一月黃巢以華州降以通鑑修朱敬玫以衙將陳儒為荆南留後以新紀通鑑修十二月以欣代等州留後李克用為鴈門節度使以通鑑修解題曰通鑑考異曰中和元年赦其罪復為大同防禦使及陷欣代自稱留後朝廷再召之始除鴈門新表中和二年更大同為鴈門節度以欣代二州𨽻鴈門徙治代州明年更為代北節度餘見開元九年天兵軍解題孟方立遷昭義軍於邢州以通鑑修是嵗廬州將楊行密逐刺史郎幼復和州刺史秦彥逐觀察使竇潏自立以新紀通鑑修唐僖宗皇帝中和三年春正月帝出居于成都以春秋修以李克用為京城東北面行營都統乙亥王鐸罷以新紀通鑑修解題曰按新史列傳先是諸將雖環賊莫肯先及鐸檄至號令殷然士氣皆起爭欲破賊故巢戰數蹙田令孜䇿賊必破欲使功出於己乃搆鐸於帝罷為檢校司徒以義成節還屯鐸功危就而讒見奪然卒因其勢困賊數月復京師䇿勳居關東諸鎮第一以田令孜為十軍十二衛觀軍容使以列傳通鑑修王景崇卒其子成德節度副使鎔自為留後以通鑑修二月壬子李克用及黃巢將尚讓戰于梁田陂大破之以通鑑修黃巢襲據華州以通鑑修諸葛爽取河陽以通鑑修魏博軍亂殺其節度使韓簡其將樂彥禎自稱留後以新紀修解題曰按新史列傳允中再世凡十二年吳縝糾繆韓君雄咸通十一年有魏博至中和三年實十四年云十二年誤也以陳儒為留後以通鑑修三月壬申李克用敗尚讓于零口以新舊紀修以楊行愍為廬州刺史以吕祖謙標目修己丑以朱全忠為宣武節度使以吕祖謙標目修解題曰此梁植根之始也癸巳李克用取華州以通鑑修眉州防禦使髙仁厚平韓秀升以通鑑修夏四月李克用敗黃巢于渭橋復京師巢遁以吕祖謙標目修解題曰按舊紀楊復光露布王重榮屯田待敵率土當衝收百姓十萬餘家降賊黨三萬餘衆自收同華進逼京師李克用自遣本軍南下與臣同力前驅今月八日遣前鋒楊守忠等三十二都隨克用自光泰門先入京師又遣河中將劉讓等七十都繼進賊尚有堅陳來抗官軍李克用率勵驍雄整齊金革楊守宗等齊驅直入合勢夾攻自卯至申羣凶大潰自望春宮䠞殺至升陽殿合圍其賊即時奔遁散入商山自收平京國三面皆立大功若破敵摧凶鴈門實居其首其餘將佐同效驅馳餘見通鑑五月奉國節度使秦宗權降于黃巢六月圍陳州以新紀通鑑修解題曰奉國軍節度使見至德元年淮南節度使解題以嶺南將劉謙為封州刺史以通鑑修秋七月以李克用為河東節度使解題曰此後唐植根之始也鄭畋為司徒東都留守鄭從讜為司空同平章事以吕祖謙標目修驍衛上將軍楊復光卒以通鑑修以王鎔樂彥禎朱宣為節度使以通鑑修鄭畋罷兵部尚書裴徹同平章事以新紀修八月以李國昌為代北節度使以通鑑修以閔頊為欽化節度使以通鑑修解題曰欽化節度使見大厯四年湖南解題九月以時溥為東面兵馬都統以新紀修解題曰按方鎮表感化軍光化元年始復為武寧軍未幾復為感化新史書武寧軍節度使時溥誤也以陳儒為節度使以通鑑修冬十月辛亥李克用據潞州以吕祖謙標目修解題曰此克用規度之始也以宗室女為公主妻南詔以通鑑修劉漢宏軍西陵錢鏐大破之以通鑑修十一月西川行軍司馬髙仁厚平阡能以新紀通鑑修十二月忠武大將鹿晏𢎞逐山南西道節度使牛朂自稱留後以新紀通鑑修以劉漢宏為義勝節度使以通鑑修解題曰義勝節度使見乾元元年浙江東西道解題朱全忠據亳州以通鑑修解題曰此全忠規度之始也唐僖宗皇帝中和四年春正月帝出居于成都以春秋修朱全忠求救於李克用以通鑑修三月甲子東川節度使楊師立反尋以髙仁厚為留後討之以吕祖謙標目修夏五月朱全忠敗黃巢以新紀修李克用敗黃巢還過汴朱全忠襲之克用遁以稽古録修解題曰按舊史紀克用班師甲戌次汴州朱全忠館克用于上源驛煬帝開汴河於此州起手因以上原名驛以克用兵力寡弱遂圖之實録克用次汴州駐軍近郊全忠請館于上源驛乃以腹心三百餘自衛全忠以克用兵從簡少大軍在逺謀害之是夜置酒宴罷以兵圍驛縱火焚之舊五代史後唐武皇紀曰班師過汴汴帥迎勞於封禪寺請武皇館於上源驛是夜張樂陳宴席武皇酒酣戲諸侍婢與汴帥握手叙破賊事以為樂汴帥素忌武皇乃與其將楊彥洪密謀竊發攻傳舍通鑑考異謂全忠是時所與為敵者非特患克用一人蓋克用恃功輕慢全忠出於一時之忿耳夫克用乘醉任氣固其所失然以為全忠素無忌克用之心亦非也餘見通鑑六月楊師立伏誅以髙仁厚為東川節度使以吕祖謙標目修秋七月黃巢伏誅新紀李克用請討朱全忠不許封隴西郡王以悅之以吕祖謙標目修解題曰孫甫曰巢賊之平克用為功臣之首全忠出於巢黨力屈來降王鐸崇奬過分已受同華節帥又與宣武大鎮克用追賊全忠密謀殺害克用既免不舉兵報怨奏對甚得人臣之體以降賊害功臣是賊心不悛况帥宣武未久若乘克用兵鋒詔近鎮助之破之必矣凶賊既除諸鎮亦未必敢為相噬之計天下或未至橫流也一失此機諸鎮交亂巨盜肆逆末如之何矣事見通鑑八月以李克修為昭義節度使以通鑑修解題曰李克用既請以麟朔蔚三州𨽻河東又請克修節度昭義其規置益廣矣徐無黨曰昭義軍跨山東西管五州至是澤潞入晉邢洺磁孟氏據之故有兩昭義按此後山東三州自號邢洺節度以别之及天復元年復合為昭義軍冬十月蕭遘為司空新紀十一月鹿晏𢎞陷許州周岌走晏𢎞自稱忠武留後以為節度使以實録修解題曰以晏𢎞為節度使他書不見惟實録云晏𢎞棄興元歸鄉里周岌聞其至遁去晏𢎞自稱留後朝廷因以節旄命之今載于此十二月盜殺義昌軍節度使王鐸新紀福建團練副使陳巖逐其觀察使鄭鎰壬寅以為觀察使以通鑑修解題曰按方鎮表開元二十一年置福建經略使領福建漳泉治福州二十二年增領汀漳潮𨽻嶺南乾元元年改為都防禦使上元升為節度使大厯廢置都團練觀察處置使乾寧升威武軍李昌言卒以其弟昌符為鳯翔節度使以通鑑修武昌軍將杜洪陷嶽州新紀唐僖宗皇帝光啓元年春正月帝出居于成都以春秋修荆南行軍司馬張環逐其節度使陳儒自稱留後以通鑑修三月丁卯帝至自成都己巳改元以新紀修解題曰按舊紀時李昌符據鳯翔王重榮據蒲陜諸葛爽據河陽洛陽孟方立據邢洺李克用據太原上黨朱全忠據汴滑秦宗權據蔡許時溥據徐泗朱宣據鄆齊曹濮王敬武據淄青髙駢據淮南八州秦彥據宣歙劉漢宏據浙東皆自擅兵賦迭相吞噬朝廷不能制江淮轉運路絶兩河江淮賦不上供但嵗時獻奉而已國命所制者山南劔南嶺南西道數十州大約郡將自擅常賦殆絶藩侯廢置不自朝廷王業於是蕩然秦宗權稱帝以時溥為四面行營都統討之以通鑑修蕭遘為司徒韋昭度為司空新紀夏四月田令孜兼兩池榷鹽使五月徙王重榮為泰寧節度使王處存為河中節度使以吕祖謙標目修解題曰按新史列傳田令孜惡克用與重榮合建言不可處近輔請授王處存河中而徙重榮則易定孤矣帝從之餘見通鑑上尊號以舊紀修六月盧龍軍將李全忠殺李可舉自稱留後以新紀通鑑修壬戌秦宗權陷東都新紀秋七月乙巳殺右補闕常濬新紀解題曰范祖禹曰殺諫臣者其國必亡故侯昌業孟昭圖常濬皆以諫死而唐亡之兆著矣何必天變彗孛之為妖乎夫忠臣欲救社稷之危人君不惟棄其言而又戮其身不祥莫大焉此其國所以為墟也事見通鑑義昌軍亂逐其節度使楊全玫立衙將盧彥威為留後以通鑑修解題曰義昌軍見貞元三年橫海節度解題以陳州刺史趙犫為蔡州節度使以通鑑修王重榮不受命九月詔遣朱玫李昌符攻之冬十一月李克用救河中解題曰按新史列傳重榮上書劾令孜離間方鎮令孜遣朱玫進討壁沙苑重榮詒克用書且言奉密詔須公到使我圖公此令孜朱玫之惑上也因示僞詔克用方與全忠有隙信之請討全忠及玫餘見通鑑十二月癸酉敗玫昌符于沙苑乙亥克用逼京師丙子帝幸鳯翔以新紀吕祖謙標目修是嵗王緒至漳州王潮執之圍泉州以舉要厯補遺修唐僖宗皇帝光啓二年春正月李克用請誅田令孜戊子令孜劫帝西幸以通鑑修二月鄭從讜為太傅新紀三月丙申帝次興元以新紀修戊戌御史大夫孔緯兵部尚書杜讓能並為兵部侍郎同平章事以新紀修以神䇿軍使王建遙領璧州刺史通鑑解題曰將帥遙領州鎮自此始陳敬瑄害髙仁厚以通鑑修夏四月壬子朱玫以嗣襄王煴入于京師以田令孜為西川監軍事樞密使楊復恭為左神䇿中尉出王建為利州刺史以吕祖謙標目修五月朱玫自加侍中大行封拜通鑑解題曰按新舊史列傳僖宗倉卒出城夜中百官不及扈從玫怒令孜弄權并望帝不諒其心謂蕭遘曰上奔播六年中原士庶與賊血戰肝腦塗地十室九空比至收復京都遺老殘民方喜車駕還宫上曾不念以諸侯勤王功為敕使之寵今姦臣與國生事召戎結怨昨奉指蹤徑來奔問不蒙見信翻類脅君羣臣報國極矣戰力殫矣安能垂頭塌翅惴惴於閽寺之手哉喪君有君公徐思其宜改圖可也遘曰上臨御十餘年未聞過行顧為令孜掣肘每言流涕數行下昨去陳倉上無行意令孜陳兵迫行不容俟且公誠有憂王室意止有歸兵還鎮拜表迎鑾改圖之言未敢聞命玫曰李家王子極多有天下者豈一王哉遘曰廢立危事伊霍尚貽後悔如公始謀未見其利玫退曰我擇一王為帝不從者斬乃立嗣襄王請遘為冊文苦辭乃命鄭昌圖為之玫滋不悅及還長安以昌圖為相署遘太子太保乃移病滿百日退居河中之永樂縣餘見通鑑六月詔以扈蹕都將楊守亮為金商節度使與王重榮李克用討朱玫以通鑑修解題曰金商節度使見至德元年南陽節度使解題新表光唘元年升金商都防禦使為節度使是年罷誤也淮西將黃皓殺欽化節度使閔頊衡州刺史周嶽陷潭州自稱節度使以新紀修秋七月戊寅秦宗權陷許州殺鹿晏𢎞以新舊紀修以周嶽為武安節度使李全忠為盧龍節度使八月全忠卒其子匡威自稱留後以通鑑新紀傳修解題曰全忠為節度使通鑑不載舊史云光啓元年春誤也新史云為節度使未幾卒今因命周嶽併書之王潮陷泉州以為刺史吕祖謙標目冬十月丙午朱玫等立嗣襄王煴為帝改元以吕祖謙標目修諸葛爽卒其子仲方自稱河陽留後以新紀修朱全忠陷滑州新紀十一月錢鏐克越州通鑑十二月辛酉王行瑜斬朱玫以降煴奔河中尋伏誅以舊紀通鑑修台州刺史執劉漢宏降董昌昌自稱浙東觀察使以錢鏐知杭州以新紀通鑑修秦宗權將孫儒陷河陽自稱節度使以通鑑修是嵗天平衙將朱瑾逐齊克讓自稱泰寧留後杜洪陷鄂州自稱武昌留後詔並以為節度使以新紀通鑑修唐僖宗皇帝光啓三年春正月帝出居于興元以春秋修以靜難軍將王行瑜為節度使解題曰靜難見大厯三年邠寧節度使解題扈蹕都頭李茂貞領武定節度使金商節度使楊守亮為山南西道節度使以通鑑修解題曰武定節度使見大厯二年山南西道解題辛巳以董昌為浙東觀察使錢鏐為杭州刺史通鑑二月戊辰流田令孜于端州不果行以通鑑修李國昌卒以新史列傳修三月癸未蕭遘裴徹等伏誅以新紀修壬辰帝幸鳯翔以吕祖謙標目修鄭從讜罷以新紀修鎮海軍將劉浩逐其節度使周寶度支催勘使薛朗自稱知府事以新紀修王建據閬州以通鑑修夏四月秦宗權遣將攻汴州朱全忠大破之以朱熹綱目修解題曰此全忠之所以卒滅宗權也甲子淮南兵馬使畢師鐸陷揚州執髙駢以新紀修五月丙申秦彥入于揚州楊行密攻之以通鑑修秦宗權陷鄭州六月陷孟州河陽將李罕之入于孟州張全義入于東都以新紀修己酉李昌符反庚戌犯大安門不克奔隴州以李茂貞為招討使以新紀修甲寅河中衙將常行儒殺王重榮詔以重榮弟陜虢節度使重盈為護國節度使以通鑑修解題曰護國節度使見上元二年河中節度使解題秋七月李昌符伏誅八月以李茂貞為鳯翔節度使以新紀修韋昭度為太保新紀九月户部侍郎張濬為兵部侍郎同平章事以新紀修秦彥殺髙駢通鑑目録冬十月封子為王以新紀修十一月楊行密克揚州秦彥畢師鐸奔孫儒行密自稱淮南留後孫儒攻之以通鑑修閏十一月朱全忠兼淮南節度使以通鑑修解題曰按新五代史全忠為蔡州四面行營都統討蔡州圍之百餘日不克時溥已為東南面都統全忠統行營而溥猶稱都統乃上書論溥討蔡無功而不落都統欲激怒溥以啓兵端新唐史傳賊平與全忠爭功嫌忌日搆孫儒與楊行密爭揚州詔全忠為淮南節度使平其亂溥自以先起功名顯朝廷位都統顧不得而全忠得頗悵恨此方挑其隙彼乃成其怨則全忠可謂狡而溥可謂愚已此成敗之所以異也事見通鑑王建攻成都不克以通鑑修十二月淮西將趙德諲陷江陵以新紀通鑑修朱全忠陷濮州解題曰全忠又將經營鄆兖也髙若拙後史補曰全忠本文作梁祖後同到梁園深有大志然兵力不足常欲外掠又虞四境之難每有鬱然之狀時有薦敬秀才於門下乃白曰明公方欲圖大事輕動必為四境所侵但令麾下將士詐為叛者而逃即明公奏于主上及告四鄰以自襲叛徒為名全忠曰天降竒人以佐於吾通鑑考異曰蓋翔為溫畫䇿詐令軍士叛歸宣以為釁端也餘見通鑑唐僖宗皇帝文德元年春正月帝出居于鳯翔以春秋修甲寅孫儒殺秦彥畢師鐸新紀癸亥以朱全忠為蔡州四面都統以新紀通鑑目録修丙寅薛朗伏誅新紀二月己丑帝至自鳯翔以新紀修庚寅改元以新紀修魏博軍亂殺樂彥楨其將羅𢎞信自稱權知留後以新紀修解題曰樂彥禎中和三年二月有魏博至文德元年共六年新傳稱七年誤也三月戊戌朔日有食之既新紀壬寅帝大漸十軍十二衛觀軍容使楊復恭立帝弟夀王傑為皇太弟更名敏癸卯帝崩于靈符殿乙巳太弟即皇帝位以新紀通鑑修解題曰范祖禹曰宦者利於幼弱欲專威權以長而立則己無功故必有所廢置謂之定䇿夫立君以為天下而宦者以私一己既以援立為功未有不亂國家者也事見通鑑長安志靈符殿在東內夏四月乙亥張全義襲河陽李罕之奔澤州以通鑑修壬午孫儒陷揚州自稱淮南節度使楊行密奔廬州以舊紀修追尊母為皇太后新紀韋昭度為中書令孔緯為司空新紀李克用遣兵攻河陽朱全忠救之張全義以河陽洛陽附全忠以吕祖謙標目修解題曰此克用之所以不得志於河南也歸州刺史成汭陷江陵自稱留後尋以為荆南節度使以新舊紀傳通鑑修五月趙德諲降以新紀修六月韋昭度罷以張全義為祐國節度使通鑑解題曰祐國節度使見大厯元年東畿解題秋七月以羅𢎞信為節度使以通鑑修冬十月陳敬瑄反新紀辛卯葬靖陵廟號僖宗以通鑑修解題曰歐陽修曰唐自穆宗以來八世而為宦官所立者七君然則唐之衰亡豈止藩鎮之患蓋朝廷天下之本也人君者朝廷之本也始即位者人君之本也其本始不正欲以正天下其可得乎懿僖當唐政之始衰而以昏庸相繼乾符之際嵗大旱蝗民愁盜起其亂遂不可復支蓋亦天人之㑹歟十一月朱全忠遣兵擊時溥大破之取宿州以通鑑修解題曰此全忠之初經營徐州也辛酉奉國將軍申叢執秦宗權新紀十二月王建為永平節度使以通鑑修解題曰永平節度使見開元七年劔南節度使解題韋昭度為招討使討陳敬瑄以新紀修是嵗贈孟昭圖起居郎常濬禮部貟外郎以實録修解題曰洪邁曰方時艱危救亡不暇而初政及此而通鑑失書之亦可惜也大事記續編卷六十九
