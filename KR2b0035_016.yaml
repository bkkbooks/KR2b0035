body:
  text: 大事記續編卷十六明王禕撰漢孝桓皇帝建和元年春正月辛亥朔日有食之本紀夏四月庚寅京師地震本紀六月郡國地裂水涌以本紀修胡廣免大司農杜喬為太尉以袁宏漢紀列傳修秋七月以定策功益封梁冀萬三千户封冀孫及弟姪四人為侯胡廣趙戒皆封侯又封中常侍劉廣等為列侯以袁宏漢紀修解題曰按袁宏漢紀太尉喬曰陛下越從藩王龍飛即位萬夫側望不急忠良之賞而先左右之封傷善害德讒諛暴興大將軍梁冀兄弟姦邪傾動天下皆有正卯之惡未被兩觀之誅而橫見式敘各受封爵天下惆悵神人皆憤非所為賞必當功罰必有罪也故陳斧鉞而民不畏刑班爵位而人不樂善苟遂斯道非徒傷治殄民為亂而已至于喪身滅國豈不慎哉是時梁氏貴盛羣臣莫不傾意唯喬直道而行在位者皆以為不及也餘見通鑑八月乙未立皇后梁氏以本紀通鑑修九月丁卯京師地震杜喬免冬十月趙戒為太尉胡廣為司空以本紀修十一月清河劉文等反欲立清河王蒜為天子事覺伏誅貶蒜為尉氏侯徙桂陽自殺李固杜喬被誣下獄死以本紀修解題曰按袁宏漢紀大將軍長史吳祐傷固之枉與冀爭之冀怒不從從事中郎馬融主為冀作章表祐時左坐謂融曰李公之罪成於卿手李公若誅何面目見天下人冀怒而起喬固遂死獄中又按列傳冀弟河南尹不疑好經書善待士冀疾之轉為光祿勳南郡太守馬融初除過謁不疑冀諷州郡以他事陷之髠鉗徙朔方融自刺不殊餘見通鑑融之自結於梁氏以為甚可依也而終不免于禍然則死于朔方孰若正色秉義不草固奏而死哉况祐申固之寃冀初不敢加害耶故為君子未必遽得禍為小人未必遽得福可以鑒矣餘見通鑑是嵗南單于兜樓儲死伊陵尸逐就單于車兒立以列傳修漢孝桓皇帝建和二年春正月甲子帝加元服以本紀修三月戊辰帝從皇太后幸梁冀府以本紀修白馬羌寇廣漢屬國益州刺史率板楯蠻破之以本紀修解題曰白馬羌在廣漢板楯蠻者髙祖發夷人伐三秦既定遣還巴中復其渠帥七姓不輸租賦餘户乃嵗入竇錢口四十世號為板楯蠻夏四月丙子尊孝崇皇夫人馬氏為孝崇園貴人以本紀修五月癸丑北宫德陽殿及左掖門火帝幸南宫以本紀及袁宏漢紀修秋七月京師大水本紀漢孝桓皇帝建和三年夏四月丁卯晦日有食之以本紀修六月乙卯地震憲陵寢屋本紀秋八月乙丑有星孛于天市本紀京師大水九月地震以本紀修郡國五山崩以本紀修冬十月趙戒免以本紀修是嵗前朗陵侯相荀淑卒以朱熹綱目修漢孝桓皇帝和平元年春正月甲子改元以本紀修己丑皇太后歸政以本紀通鑑修二月甲寅皇太后梁氏崩本紀三月帝還居北宫以本紀修加封梁冀萬户以通鑑修解題曰𢎞農宰宣性佞邪上言大將軍有周公之功今既封諸子則其妻宜為邑君封冀妻孫夀為襄城君人以梁冀為周公亦猶頌王莽之功德也袁宏漢紀冀既貪放而納賂遺承事左右宦者與之通為姦利梁商以曹節等用事遣冀兄弟與為交友商號小心而猶若此况于冀乎任其子弟賔客以為刺史二千石朱穆奏記曰大將軍內有貴親之固外有功業之重誠不可復枉道散財以事左右宦者選舉刑賞有干典制輒率公卿詣朝堂按其罪咎則改節從訓猶影響也今反越津逾序以大事小從其過言隨其失行天下之事受其枉戾傷損財物壞亂綱紀左右近官並以私情干擾天下雖大而民無所容足也毒害流布日夜廣逺願大將軍省廢他事考按古今如不早悟舟中之人皆敵國也餘見通鑑夏五月庚辰尊博園貴人曰孝崇皇后以本紀修秋七月梓潼山崩以本紀修解題曰李賢曰縣屬廣漢郡今始州縣有梓潼水漢孝桓皇帝元嘉元年春正月朔梁冀帶劒入省尚書張陵劾之詔以俸贖以列傳修癸酉改元以本紀修以潁陽侯梁不疑為光祿勳襄邑侯梁允為河南尹以列傳修夏四月己丑帝微行幸河南尹府舍是日大風拔木晝昏以通鑑修北胸奴寇伊吾以列傳修秋七月武陵蠻叛本紀冬十月胡廣致仕以紀傳修十一月辛巳京師地震本紀閏月太常黃瓊為司空以本紀修詔加梁冀殊禮增封十日一入平尚書事以列傳通鑑修解題曰帝欲褒崇冀使中朝二千石以上會議其禮特進胡廣太常羊溥司𨽻校尉祝恬太中邉韶等咸稱冀之勳德其制度賚賞宜比周公錫之山川土田附庸黃瓊建議曰冀前以親迎之勞增邑三千又其子允亦加封賞昔周公輔相成王制禮化致太平是以大開土宇開地七百今諸侯以户邑為制不以里數為限冀可比鄧禹食四縣賞賜之差同於霍光朝廷從之餘見通鑑葉適曰當時謂廣雖無謇諤之風屢有補缺之益夫正議而不能力爭故謂之無謇諤若自初回邪無復齊限則無可言矣漢孝桓皇帝元嘉二年春正月西域長史王敬殺于填王建國人攻敬殺之以本紀及注修秋七月庚辰日有食之本紀冬十月乙亥京師地震本紀十一月黃瓊免十二月特進趙戒為司空以本紀修漢孝桓皇帝永興元年夏五月丙申改元以本紀修秋七月蝗河水溢百姓流亡數十萬户冀州尤甚以侍御史朱穆為刺史宦者趙忠訴之坐徴輸作左校太學生劉陶等數千人上書訟穆乃赦之以列傳修冬十月太常胡廣為太尉太僕黃瓊為司徒趙戒免以本紀修是嵗武陵蠻降以通鑑修漢孝桓皇帝永興二年春二月辛丑復聽刺史二千石行三年喪以本紀通鑑修解題曰趙岐辟司空掾議二千石得去官為親行服朝廷從之癸卯京師地震以本紀修夏六月東海朐山崩本紀解題曰李賢曰朐山在今海州朐山縣南乙卯封乳母子馬初為列侯以袁宏漢紀通鑑修秋九月丁卯朔日有食之本紀胡廣免黃瓊為太尉以本紀修冬十一月泰山琅邪賊公孫舉等反以本紀修漢孝桓皇帝永夀元年春正月戊申改元本紀夏六月洛水溢本紀太常韓縯為司空本紀巴郡益州郡山崩本紀解題曰巴郡宋巴蓬果閬涪開達渠合忠萬夔漢屬巴郡南郡州重慶府廣安南平二軍大寧監漢屬巴郡南郡之地巴郡治涪州今重慶府巴東治魚腹今夔州巴西治閬中今閬州秋南胸奴左薁鞬臺耆且渠伯德等叛安定屬國都尉張奐討降之以列傳通鑑修漢孝桓皇帝永夀二年秋七月鮮卑寇雲中時檀石槐據胸奴故地東西萬四千餘里以故烏桓校尉李膺為度遼將軍以紀傳修公孫舉等寇青兖徐三州遣中郎將段頴討斬之以本紀修冬十二月京師地震本紀漢孝桓皇帝永夀三年夏四月九真蠻叛都尉魏朗擊破之以本紀修閏五月庚辰晦日有食之以志及本紀修冬十一月韓縯為司徒以本紀修漢孝桓皇帝延熹元年解題曰宋庠紀年通譜字説熹火熾也疑漢火德義若延其熹盛以冠元又諡法有功安人曰熹故和熹后為諡又有熹平光熹之元或兼取此義夏五月甲戌晦日有食之太史令陳授陳其咎在梁冀冀殺之以列傳通鑑修六月戊寅改元以本紀修秋七月黃瓊免太常胡廣為太尉以本紀修十二月南胸奴諸部叛與烏桓鮮卑寇邉以京兆尹陳龜為度遼將軍龜請易守尉除并涼租賦一年使胸奴中郎將張奐討胸奴破之梁冀譛龜徴還以尚書种皓代之龜自殺以紀傳修大事記續編卷十六
