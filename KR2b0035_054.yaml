body:
  text: 大事記續編卷五十四明王禕撰唐則天順聖皇后武氏聖厯元年正月甲子朔廬陵王出居于房州改元以通鑑脩解題曰宋庠紀年通譜將復召廬陵王故改元三月己巳召廬陵王于房州戊子廬陵王至自房州以新紀脩解題曰按新舊史列傳后欲以武三思為太子以問宰相衆莫敢對狄仁傑曰臣觀天人未厭唐德今欲繼統非廬陵王莫可后怒罷議久之召謂曰朕數夢雙陸不勝何也於是仁傑與王方慶俱在二人同辭對曰雙陸不勝無子也天其意者以儆陛下乎洪邁曰新史載舊史不載通鑑但書鸚鵡折翼一事而考異云雙陸之說世傳李邕所作狄梁公傳有之詞多鄙誕故不取藝文志有李蘩說纂其忠節門曰武后問石泉公王方慶曰朕夜夢雙陸不勝何也蓋謂宫中無子意者恐有神靈儆夫陛下后召廬陵王復其儲位俾石泉公為宫相輔翊之新史蓋兼采二李之說而莫辨其為王狄也通鑑去之文皇帝身蹈鋒鏑勤勞而有天下傳之子孫先帝寢疾詔陛下當國陛下掩神器而取之十有餘年又欲以三思為後且姑姪與母子孰親陛下立廬陵王則千秋萬嵗後常享宗廟三思立廟不祔姑内史王及善宻贊其謀后舊史本文作則天後倣此亦漸悟右肅政臺中丞吉頊素與張易之兄弟親善俱為控鶴監内供奉易之兄弟以寵盛思自全問頊計安出頊曰公家以倖進非有大功於天下勢必危吾有不朽䇿願効之非止保身且世世不絶胙易之流涕請頊曰天下思唐久矣廬陵斥外相王幽閉上春秋髙須有付託武氏諸王殊非屬意公盍從容請建立廬陵及相王以副人望易弔為賀之資也易之昌宗然其言遂乗間奏請后知頊預謀召見問狀頊曰廬陵相王皆陛下子先帝顧託於陛下當有主意后意乃定遣徐彦伯迎廬陵王於房州王至后匿王帳中召見仁傑時吉頊已貶琰州尉語廬陵事仁傑敷請切至涕下不能止后乃使王出曰還爾太子仁傑降階泣賀已奏曰太子歸未有知者人言紛紛何所信后然之更令太子舍龍門具禮迎還中外大悅餘見通鑑初王慶之等請立武承嗣為太子宰相岑長倩格輔元陳其不可竟以坐死賴李昭德發明未聞姪為姑立廟之論又進姑姪何如父子之說后始畧為之感動然有私謁皇嗣而斬者告皇嗣有異圖者誣皇嗣廬陵與南北牙同反者猶踵見此承嗣三思所以營求愈切也仁傑每從容言文皇天下當傳之子孫取昭德姑姪立廟之意兼舉而力陳之后方且對以家事不當預知及吉頊為二張謀承間屢言后意乃定頊之精忠雖未必如仁傑然當機之發不費辭而事濟固不可以人廢言也舊史亦稱中宗在房陵吉頊李昭德皆有匡復讜言固未有非之者而猶或譏其假善以濟私盍亦深攷其故也四月辛丑婁師德為隴右諸軍大使以新紀脩八月突厥冦邊豹韜衛將軍閻知微降之以新紀脩戊戌太子太保武承嗣卒以通鑑脩庚子春官尚書武三思檢校内史狄仁傑兼納言以新紀脩遣司屬卿武重規等為大總管四道擊突厥以新紀脩九月甲子夏官尚書武攸寧同三品以新紀脩壬申廬陵王立為皇太子復名顯甲戌為河北道行軍元帥擊突厥狄仁傑副之時突厥據地萬里西北諸夷皆附之以新紀脩十月命河内王武懿宗九江王武攸歸領都下屯兵以通鑑脩癸卯狄仁傑為河北安撫大使以新紀脩夏官侍郎姚崇同平章事以新紀脩夷閻知微三族以通鑑脩唐則天順聖皇后武氏聖厯二年正月皇太子在東宫以朱熹綱目脩壬戌以皇嗣為相王以新紀脩甲子司衛卿張易之為控鶴監銀青光禄大夫張昌宗為控鶴監内供奉以通鑑脩臘月戊子左肅政臺中丞吉頊為天官侍郎右肅政臺御史中丞魏元忠為鳳閣侍郎並同平章事以新紀通鑑脩辛亥賜皇太子姓武氏新紀二月庚申武攸寧罷以新紀脩三月婁師德為納言新紀四月吐蕃論贊婆降以通鑑舊紀脩壬辰魏元忠為天兵軍大總管婁師德副之以備突厥以新紀通鑑脩八月婁師德薨以吕祖謙標目脩戊申武三思為内史以新紀脩唐則天順聖皇后武氏久視元年正月皇太子在東宫以朱熹綱目脩戊午貶吉頊為琰州尉新紀壬申武三思罷新紀臘月丁酉狄仁傑為内史新紀一月作三陽宫新紀五月己酉朔日有食之以新紀脩癸丑改元罷天冊金輪太聖號以新舊紀脩解題曰宋庠紀年通譜疾平改元故取老子久視長生之語六月改控鶴為奉宸府以張易之為令以通鑑脩閏七月丁酉吐蕃冦涼州隴右諸軍大使唐休璟敗之于洪源谷八月庚申魏元忠為隴右諸軍大總管擊吐蕃以新紀脩九月辛丑梁文惠公狄仁傑薨所薦荆州長史張柬之監察御史桓彦範秦州刺史敬暉等數十人以吕祖謙標目脩解題曰范仲淹曰商有三仁弗救其滅漢有四皓正於未奪嗚呼武暴如火李寒如灰何心不隨何力可囘我公哀傷拯天之亡逆長風而孤騫遡大川以獨航金可革公不可革孰為乎剛地可動公不可動孰為乎方一朝感通羣隂披攘天子既臣而皇天下既周而唐七世發靈萬年垂光噫非天下之至誠其孰能當餘見通鑑十月甲寅復唐正月以新紀脩解題曰皇太子既在東宫所以用唐正月也唐則天順聖皇后武氏長安元年春正月皇太子在東宫以朱熹綱目脩丁丑改元大足以新紀脩解題曰宋庠紀年通譜成州有大人之跡故改元大足五月魏元忠為靈武道大總管以備突厥以新紀脩九月壬申殺皇太子子邵王重潤等以新紀脩丙申以相王旦知左右羽林衛大將軍事以吕祖謙標目脩十月壬寅如西京辛酉改元以新紀脩丙寅魏元忠同三品新紀十一月壬申武三思罷新紀戊寅改含元宫為大明宫以吕祖謙標目脩以主客郎中郭元振為涼州都督以舊紀通鑑脩唐則天順聖皇后武氏長安二年春正月皇太子在東宫以朱熹綱目脩乙酉設武舉朱熹綱目突厥入冦以舊紀脩九月乙丑朔日有食之不盡如鉤以新紀脩十月姚元崇同平章事新紀十一月命監察御史蘇頲按覆來俊臣等所推獄雪免者甚衆以吕祖謙標目脩十二月戊申置北庭都護府於庭州以通鑑脩唐則天順聖皇后武氏長安三年春正月皇太子在東宫以朱熹綱目脩三月壬戌朔日有食之以新紀脩七月壬寅正諫大夫朱敬則同平章事以新紀脩九月庚寅朔日有食之既通鑑解題曰胡寅曰吕后末年日食既后惡之曰此為我也未幾而卒武后至是日食再既明年亦卒日者至陽之精人君之表今乃為女主之應乎夫陽不競而隂慝作理固然也今武氏反隂為陽居中履極掩唐虞之舊域頒正朔於八荒其氣燄所感上致日星之變不亦宜乎丁酉貶魏元忠為髙要尉以新舊紀脩十月丙寅如神都以新紀脩是嵗西突厥為突騎施所併以吕祖謙標目脩唐則天順聖皇后武氏長安四年春正月皇太子在東宫以朱熹綱目脩丁未毁三陽宫作興泰宫以通鑑新紀脩二月壬申朱敬則罷以新紀脩三月出鳳閣侍郎韋嗣立等二十人為刺史以吕祖謙標目脩六月辛酉姚崇罷以新紀脩乙丑天官侍郎崔𤣥暐為鸞臺侍郎同平章事壬午相王府長史姚崇兼夏官尚書同三品以新紀脩十月辛酉姚崇為靈武道安撫大使崇舉秋官侍郎張柬之甲戌柬之同平章事以通鑑脩解題曰鼂補之曰按狄仁傑傳則天嘗問仁傑朕要一好漢任使仁傑曰豈非文士齷齪思得竒才用之以成天下之務乎則天曰此朕心也仁傑曰荆州長史張柬之其人雖老宰相才也乃召拜洛州司馬它日又求賢仁傑曰前言張柬之未用也則天曰已遷矣仁傑曰臣薦宰相今為司馬非用之也又遷為秋官侍郎竟召為相果興復中宗而柬之傳乃專言姚崇薦之以其時攷之仁傑初薦在荆州時再薦乃為秋官侍郎逮崇之薦時已在秋官矣或者則天聞仁傑之言已深知柬之因崇繼薦遂至大用非崇一言便為相也又傳曰仁傑所拔用至公卿者數十人崇自是仁傑薦用則天信重二人固自有間舊史未深攷爾餘見通鑑葉適曰柬之作相數月便能誅二張返正使其處仁傑地位必不如是遲緩也御史中丞宋璟請下張昌宗獄不從以通鑑目録脩大事記續編卷五十四
