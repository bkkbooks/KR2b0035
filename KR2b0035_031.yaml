body:
  text: 大事記續編卷三十一明王禕撰晉太宗簡文帝咸安元年代髙祖皇帝建國三十四年凉張天錫九年秦宣昭皇帝建元七年春正月秦援袁瑾桓温遣兵大破之丁亥㧞夀春瑾伏誅以夲紀通鑑修秦徙闗東豪傑及雜夷十五萬户於闗中以吕祖謙標目修二月秦復置雍州以長樂公丕為雍州刺史以吕祖謙標目修解題曰按地理志苻健都長安於雍州置司𨽻校尉以豫州刺史鎮許昌秦州刺史鎮上邽荆州刺史鎮豊陽商州縣洛州刺史鎮宜陽并州刺史鎮蒲坂苻堅分司𨽻為雍州分京兆為咸陽郡洛州刺史鎮陜城㓕燕之後分幽州置平州鎮龍城幽州刺史鎮薊城河州刺史鎮枹罕并州刺史鎮晋陽豫州刺史鎮倉垣雍州刺史鎮蒲坂於是移洛州居豊陽以許昌置東豫州以荆州刺史鎮㐮陽徐州刺史鎮彭城及姚興剋洛陽以并兾二州牧鎮蒲坂豫州牧鎮洛陽兖州刺史鎮倉垣分司𨽻領北五郡置雍州刺史鎮安定三月冠軍将軍建城公周楚卒以夲紀修秦伐仇池夏四月降之以夲紀通鑑修凉張天錫稱藩于秦以通鑑修冬十一月丁未桓温入建康廢帝為東海王己酉立㑹稽王昱為皇帝改元庚戌尊皇太后為崇徳太后癸丑殺東海王二子乙夘廢徙武陵王晞族誅著作郎殷㳙太宰長史庾倩等辛酉還姑孰十二月庚寅降東海王為海西公以本紀通鑑呂祖謙標目修是嵗鮮卑乞伏司繁降秦以吕祖謙標目修晋太宗簡文帝咸安二年凉張天錫十年年代髙祖皇帝建國三十五秦宣昭皇帝建元八年夏四月徙海西公於呉縣以吕祖謙標目修六月秦王猛為丞相司𨽻校尉陽平公融都督闗東六州軍事兾州牧以通鑑修庾希舉兵入京口秋七月伏誅以夲紀修帝不豫己未立子㑹稽王昌明為皇太子道子為琅邪王遺詔桓温依周公居攝故事侍中王坦之改令依諸葛亮王導故事通鑑觧題曰帝不豫詔温入一夜頻有四詔温上䟽曰盛衰常理過偹無害故漢髙枕疾吕后問相孝武不豫霍光啓嗣嗚噎以問身後盖所存者大也今皇子幼穉而朝賢時譽惟謝安王坦之才識智能皆簡在聖鑑内輔幼君外禦彊㓂實群情之大懼然理盡於此陛下便宜崇授使臣下知所寄而安等奉命陳力公私為宜至如臣温位兼将相如陛下垂布衣之顧但朽邁疾病懼不支乆無所復堪托以後事䟽未及奏而帝崩餘見通鑑帝崩太子昌明即皇帝位崇徳太后復令温居攝尚書僕射王彪之封還之以通鑑修八月秦加王猛都督中外軍事以吕祖謙標目修冬十月丁夘𦵏簡文帝于髙平陵廟號太宗以夲紀修是嵗秦䧟仇池以夲紀修晋烈宗孝武皇帝寧康元年凉張天錫十一年六代髙祖皇帝建國三十年秦宣昭皇帝建元九年春正月己亥朔改元以夲紀修二月桓温來朝三月甲午還姑孰夏温求九錫吏部尚書謝安王坦之遲之秋七月己亥南郡宣武公桓温薨以少子𤣥為嗣觧題曰張栻曰使温不死必受九錫既受九錫必稱兵向闕謝安當此時惟當以忠義率人與之一戰恐有可勝之理耳事見通鑑庚戌以南中郎将江州刺史桓冲為中軍将軍都督揚豫江州軍事揚豫二州刺史桓豁為征西将軍督荆揚雍交廣州軍事竟陵太守桓石秀為寕逺将軍江州刺史以通鑑紀傳修八月崇徳太后復臨朝以㠯祖謙標目修梁州刺史楊亮遣兵襲仇池秦将楊安定敗走之以吕祖謙標目修九月丙申王彪之為尚書令謝安為尚書僕射共掌朝政以吕祖謙標目修冬十月秦㧞漢中十一月䧟梓潼梁益二州刺史周仲孫奔南中以通鑑修丹揚尹王坦之為中書令以列傳修是嵗彗星出箕尾經太㣲掃東井以載記修甲戌晉烈宗孝武皇帝寜康二年凉張天錫十二年三代髙祖皇帝建國十七年元秦宣昭皇帝建十年春二月癸丑王坦之為北中郎将都督徐兖青州軍事徐兖二州刺史以紀傳修三月彗星見以夲紀修夏五月蜀人張育等起兵圍成都秋七月秦攻㓕之以夲紀修八月以擇后權停婚姻以夲紀修晉烈宗孝武皇帝寕康三年凉張天錫十三年八代髙祖皇帝建國三十年秦宣昭皇帝建元十一年夏五月藍田獻侯王坦之卒甲寅桓冲為鎮北将軍都督徐豫兖青揚州軍事徐州刺史謝安領揚州刺史以夲紀修秋七月秦清河武侯王猛卒臨終告其主堅晉雖僻處江南正朔相承願勿以為圖鮮卑西羗宜漸除之以載紀修觧題曰蘇轍曰堅滅慕容姚襄及二姓之子弟録其才能而官使之布滿中外若以世俗言之則以漸除之如猛之計得矣若以帝王之事言之則堅之意未必過也大雅之稱文王曰殷之孫子其麗不億上帝既命侯于周服侯服于周天命靡常殷士膚敏祼将于京厥作祼将常服黼哻文王用人其廣如此而堅何尤焉徳雖不若文王而竊慕焉顧其所以處之何如耳周公成王之際殷之遺孽猶與管蔡間周之隙曰予復反鄙我周邦故周公克殷改封微子于宋而遷其頑民于洛保釐東郊作多士而撫寕之所以慮其變者至矣至君陳畢公皆迭居成周而董帥之故康王之命畢公曰周公毖殷頑民遷于洛邑宻邇王室式化厥訓既歴三紀世變風移四方無虞予一人以寕然猶曰邦之安危惟茲殷士由此觀之文王之用殷人豈茍然而已哉今堅蓄飬豺虎于其腹心而貪心務勝不顧其後宜其斃於萇垂也使堅信猛之策南結鄰好保境息民雖百萇垂安能動之文王雖未可覬然亦非猛之所能及矣事見通鑑八月癸巳立皇后王氏以夲紀修冬十月癸酉朔日有食之以夲紀修秦置聼訟觀禁老荘圖䜟之學以通鑑修晉烈宗孝武皇帝太元元年凉張天錫十四年九代髙祖皇帝建國三十年秦宣昭皇帝建元十二年春正月壬寅朔帝加元服皇太后歸政甲辰改元以夲紀修觧題曰宋庠紀年通譜太元夲孫權年號桓冲為車騎将軍都督豫江州之六郡軍事鎮姑孰乙卯加謝安中書監録尚書事以夲紀通鑑修夏五月秦伐凉以列傳脩九月除度田收租之制公王以下口稅米三斛蠲在役之身夲紀觧題曰朱黼曰因等級而授之田因田而為之賦古法也自阡陌之開田無定賦民無定田履畆而受稅者尚為良法晉自穆宗始自王公以下口稅三石不復以畆計而授田之法無聞豈良法乎今孝武以酒禁病民特除去之更於民稅增米二石亦豈良法乎夫民可以無酒不可以無食古之所以禁酒者以其縻榖米以害民食今欲去𣙜酤之弊而重賦以病民是使民食愈艱國賦愈重也後世聚歛之臣不顧賦稅之增併復𣙜酤之法是三倍而取之民也忍言之哉事見通鑑秋八月秦敗凉兵甲午降張天錫以通鑑修觧題曰自軌為凉州至天錫九世七十六年冬十月秦伐代以吕祖謙標目修十一月代禦秦兵大敗十二月代王什翼犍為其子實君所弑秦分其國為二部以属匈奴劉庫仁劉衛辰什翼犍之孫珪依於庫仁以吕祖謙標目修是嵗乞伏司繁卒子國仁立通鑑晉烈宗孝武皇帝太元二年秦宣昭皇帝建元十三年春秦大修舟艦以通鑑修秋七月加謝安都督揚豫徐兖青州軍事以列傳修八月征西大将軍桓豁卒冬十月桓冲都督江荆等七州軍事荆州刺史鎮上明征西司馬謝𤣥為兖州刺史監江北軍事以夲紀通鑑修觧題曰上明在今江陵府松滋縣西五里壬寅王彪之卒以夲紀修晉烈宗孝武皇帝太元三年秦宣昭皇帝建元十四年春二月乙巳作新宫以夲紀脩秦王堅遣長樂公丕等四道攻㐮陽夏四月圍之以通鑑修秋七月新宫成以夲紀修觧題曰按建康實録内外殿宇大小三千五百間秦攻盱眙八月攻彭城魏興以吕祖謙標目修冬十月秦豫州刺史北海公重謀反執而赦之以通鑑修晉烈宗孝武皇帝太元四年秦宣昭皇帝建元十五年春二月秦䧟㐮陽執南中郎将梁州刺史朱序以夲紀修秦䧟彭城以吕祖謙標目修三月壬戌詔疆場多虞事從儉約廪俸减半以夲紀修夏四月戊申秦䧟魏興以呂祖謙標目修五月乙丑秦䧟盱眙以夲紀修秦圍三阿征虜将軍謝𤣥敗走之六月𤣥大破秦師于君川加𤣥徐州刺史以通鑑修觧題曰按列傳載記十六國春秋三年秋七月堅遣後将軍俱難後禁毛盛陵江邵保等歩騎七萬㓂淮陽盱眙八月楊武彭超㓂彭城攻将軍戴􅋟将軍毛虎生帥衆五萬距之與難等相持于淮南四年兖州刺史謝𤣥率東莞太守髙衡後軍将軍何謙次于泗汭将救彭城超置輜重于留城在徐州沛縣東南二十五里𤣥揚聲遣謙等向留城超引軍赴之􅋟率衆奔于𤣥先是兖州治中徐褒言於超曰呉人用兵陸戰不如中國而善於舟艥若泝淮而上從泗口分軍南救淮隂北救戴􅋟則邵保孤危彭城守固江淮之間陸路數百水道迂囬幾将一千又下邳南北水淺岸狹可宻遣歩騎三萬陳兵要之彼既無援彭城孤弱今以七萬之衆坐守一城甲士思奮且此行也非取彭城而已将欲還清江浦事之濟否在此役也宜展将士之力與邵保勢相交超不從故何謙等得觧圍遁超留徐褒守彭城復㓂盱眙俱難既克淮隂留邵保戍之進師而南四月右将軍毛當與强弩王顯率衆二萬自㐮陽會攻淮南五月超䧟盱眙獲髙宻内史毛璪之圍幽州刺史田洛於三阿山陽志在寳應府黄莆之南白馬湖之東今寶應東北十里有三阿村京都大震臨江列戍詔征虜将軍謝石率水軍次涂中右衛将軍毛安之㳺擊将軍王曇之次堂邑謝𤣥自廣陵救三阿毛當毛盛馳襲安之軍人驚散何謙觧田洛圍𤣥率衆三萬次于白馬塘在寳應北十五里俱難遣其将都顔逆戰于塘西𤣥大敗之斬顔𤣥進兵與難超戰超等又敗退保盱眙𤣥進次石梁通典属揚州天長縣六月戊子𤣥洛率衆五萬攻盱眙難超出戰復敗退屯淮隂𤣥遣何謙率舟師乗潮而上夜焚淮橋又與難等合戰斬邵保超難引退𤣥率謙􅋟洛追之戰于君川載記作君山即君山之川也復大破之参軍劉牢之攻破浮航白船督䕶諸葛侃單父令李都又破其運艦難等北走僅以身免難歸罪超斬其司馬栁渾堅大怒檻車徴超下獄超自殺難免為庶人以毛當為徐州刺史鎮彭城毛盛為兖州刺史鎮胡陸王顯為揚州刺史戍下邳賞堂邑之功詔殿中将軍慰勞𤣥進號冠軍加領徐州刺史還廣陵世多謂謝𤣥淮淝之戰出於幸勝是不然彭超俱難席累勝之鋒蹂踐三阿如入無人之境𤣥起而麾之追亡逐北所失不旋踵而復間歳遂有淮淝之功非善用兵而能爾乎是故未可以輕議也餘見通鑑冬閏十二月己酉朔日有食之以天文志宋書五行志修是嵗秦大饑以通鑑修晋烈宗孝武帝太元五年秦宣昭皇帝建元十六年春三月秦幽州刺史唐公洛鎮北大将軍北海公重反夏四月秦討之五月斬重擒洛以呂祖謙標目修司徒謝安為衛将軍與桓冲並加開府儀同三司以通鑑修觧題曰秦兵攻㐮陽桓冲擁衆七萬於上明憚其強而不敢進及㐮陽䧟上䟽送莭觧職朝廷免其罰已云幸矣而又可賞乎謝安鎮廟堂諸鎮相繼䧟没今僅能復一盱眙亦非受賞之時也事見通鑑六月秦平陽公融為中書監都督中外諸軍録尚書事尚書令長樂公丕都督闗東軍事兾州牧以吕祖謙標目修秋七月秦徙諸氐十五萬户于方鎮以吕祖謙標目修九月癸未皇后王氏崩以夲紀修是嵗立國學以宋書劉傳修觧題曰按宋書臧燾傳太元中衛将軍謝安始立國學徐兖二州刺史謝𤣥舉燾為明教安以今年為衛将軍而𤣥以徃年為徐兖州刺史故載於此晉烈宗孝武皇帝太元六年秦世祖宣昭皇帝建元十七年春正月立精舍於内殿以奉佛以本紀修二月東夷西域六十二國入貢於秦以通鑑修夏六月庚子朔日有食之以本紀修冬十一月秦㓂竟陵桓冲遣兵拒之十二月大破之以吕祖謙標目修晉烈宗孝武皇帝太元七年秦宣昭皇帝建元十八年秋八月秦以諌議大夫裴元略為巴西梓潼太守具舟師以通鑑修九月秦遣将軍吕光伐西域以吕祖謙標目修冬十月秦王堅議入㓂太子宏陽平公融僕射權翼太子衛率石越諌獨京兆尹慕容垂兖州刺史姚萇勸之以載記修觧題曰按十六國春秋苻堅伐晋徴乞伏國仁前将軍領先鋒騎既而叔父歩頽叛於隴西堅遣仁討之歩頽迎仁於路仁置酒髙會攘𬒮大言曰苻氏徃因趙石之亂遂妄竊名號窮兵極武跨僣八州疆宇既寕宜綏之以徳方虚廣威聲勤心逺畧搔動生民疲弊中國違天怒民将何以濟且物極則虧禍盈則覆者天之道也以吾量之是役也難以免矣當與諸君成一方之業事見通鑑觀國仁與其叔大言欲成一方之業則慕容垂姚萇之所以勸堅南伐其情可知矣是嵗秦大熟以通鑑脩大事記續編卷三十一
