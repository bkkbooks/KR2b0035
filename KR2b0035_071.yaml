body:
  text: 大事記續編卷七十一明王禕撰梁太祖皇帝朱晃開平元年蜀晉王李克用岐王李茂貞淮南楊渥並天祐四年髙祖皇帝王建天復七年南楚王馬殷閩南平王髙季興丹吳越王錢鏐嶺王劉隱王王審知契耶律安巴堅解題曰歐陽修職方考曰唐之盛時雖名天下為十道而其勢未分既其衰也置軍節度號為方鎮鎮之大者連州十餘小者猶兼三四故其兵驕則逐帥帥強則叛上土地為其世有干戈起而相侵天下之勢自茲而分自僖昭以來日益割裂梁初天下别為十南有吳浙荆湖閩漢西有岐蜀北有燕晉而朱氏所有七十八州以為梁莊宗初起并代取幽滄有州三十五其後又取梁魏博等十有六州合五十州以滅梁岐王稱臣又得其州七同光破蜀已而復失惟得秦鳳階成四州而營平二州陷於契丹其增置之州一明宗置寰州合一百二十三州以為唐石氏入立獻十有六州于契丹而得蜀金州又增置之州一髙祖置威州合一百九州以為晉劉氏之初秦鳳階成復入于蜀隱帝時增置之州一解州合一百六州以為漢郭氏代漢十州入于劉旻世宗取秦鳳階成瀛莫及淮南十四州又增置之州五太宗置濟州世宗置濵雄霸通四州而廢者三兖州武州景州合一百一十八州以為周宋興因之此其大略也其餘外屬者強弱相并不常其得失至於周末閩已先亡而存者七國自江以南二十一州為南唐自劒以南及山南西道四十六州為蜀自湖南北十州為楚自浙東西十三州為吳越自嶺南北四十七州為南漢自太原以北十州為東漢而荆歸峽三州為南平合中國所有二百六十八州而軍不在焉春三月梁遣將擊幽州夏四月劉守光擊却之守光因其父仁恭自稱盧龍留後以新唐書本紀修壬戌梁王全忠更名晃甲子稱皇帝戊辰改元廢唐帝為濟隂王遷之曹州解題曰按新史六臣傳唐哀帝遜位遷于梁遣中書侍郎同中書門下平章事張文蔚為册禮使禮部尚書蘇循為副中書侍郎同中書門下平章事楊涉為押傳國寶使翰林學士中書舍人張䇿為副御史大夫薛貽矩為押金寶使尚書左丞趙光逢為副甲子文蔚等自上源驛乘輅車導以金吾仗衛太常鹵簿朝梁于金祥殿五代會要東都大內內殿王衮冕南面臣文蔚臣循奉册升殿進讀已臣涉臣䇿奉傳國璽臣貽矩臣光逢奉金寶以次升殿進讀已降率文武百官北面舞蹈再拜賀嗚呼唐之亡也賢人君子既與之共盡其餘在者皆庸懦不肖傾險獪猾趨利賣國之徒也不然安能蒙恥忍辱於梁庭如此哉餘見通鑑以汴州為開封府曰東都以故東都為西都廢京兆府為雍州以吕祖謙標目修解題曰吳縝五代史纂誤案職方考梁初改京兆府曰大安佑國軍曰永平殊無以京兆為雍州之事與紀不同今按職方考有雍州范質五代通録亦云廢京兆府為雍州非誤也辛未梁以馬殷為楚王朱熹綱目梁追尊髙祖考妣已來為帝后以通鑑修梁作建昌院掌金榖以通鑑修解題曰葉夢得曰宋之大內梁建昌宫本唐宣武節度治所晉號大寧宫今新城是也周世宗始展外羅城晉岐淮南蜀用唐年號餘皆臣於梁以通鑑修岐王茂貞開府以通鑑修五月丁丑朔梁以張文蔚楊涉為門下侍郎御史大夫薛貽矩為中書侍郎同平章事以新紀通鑑修契丹主安巴堅遣使聘梁梁報之以新紀通鑑修己卯梁以吳王鏐為吳越王劉隱為大彭王癸未以權知荆南留後髙季興為節度使以通鑑修壬辰梁遣保平節度使康懷貞會魏博攻晉潞州以通鑑修甲午廢樞密院入崇政院知院事敬翔為使以吕祖謙標目修𢎞農王渥遣兵攻楚六月楚大敗之拔嶽州以通鑑修晉王克用遣蕃漢都指揮使周德威等救潞州以吕祖謙標目修甲寅梁平盧節度使韓建為司徒同平章事以新紀通鑑修秋七月甲午梁以劉守光為節度使以通鑑修解題曰於是知梁有子禍矣八月丁巳梁遣亳州刺史李思安為潞州行營都統以通鑑修九月己亥蜀王建稱皇帝以吕祖謙標目修冬十一月戊子劉守文降于梁以通鑑修梁太祖皇帝開平二年祐唐莊宗皇帝李存朂岐王李茂貞淮南楊隆演並天五年蜀髙祖皇帝武成元年平吳越王錢鏐天寶元年南王髙季興嶺南劉隱楚王馬殷知閩王王審春正月壬午蜀主建改元以通鑑修解題曰宋庠紀年通譜武成本周明帝李希烈年號辛卯晉王克用薨子存朂嗣位二月壬戌誅其振武節度使李克寧以吕祖謙標目修癸亥梁弒濟隂王追諡曰唐哀皇帝以吕祖謙標目修三月壬申朔梁主如澤州壬午以匡國節度使劉知俊為潞州招討使以新紀通鑑修蜀主建殺其養子太師王宗佶以通鑑修夏四月壬子梁主至自澤州以新紀修五月壬申晉王存朂大破康懷貞于夾寨歸命州縣舉賢才黜貪殘寬租賦撫孤窮伸寃濫禁姦盜練士卒以吕祖謙標目修解題曰此晉王之初政也及志得之後則非復前日矣事見通鑑胡寅曰喪不二事故春秋於背喪而即戎者皆深譏之惟其門庭之寇存亡係焉然後從權制而無避此費誓所以得列于典謨命誥之後也若李存朂夾寨之戰君子深有取者蓋以梁師距晉陽百餘里可謂危急之勢矣使存朂執哀戚之常情忽國家之大計上黨淪陷則晉陽不存又豈所以為孝是審緩急量輕重出竒制勝以走梁師然後霸基成矣晉王存朂承制封拜以通鑑修戊寅淮南左右牙指揮使張皓徐溫弒𢎞農王渥其弟隆演立丁亥溫殺皓專軍府事以吕祖謙標目修戊戌梁立唐三廟以新紀修楚王殷取朗州永貞節度使雷彥恭奔淮南殷陷灃州以吕祖謙標目修蜀岐晉攻梁雍州六月壬寅梁遣劉知俊拒之以新紀通鑑修己酉梁族誅金吾衛上將軍王師範以新紀通鑑修丙辰梁劉知俊大破岐兵于幕谷晉蜀兵還以通鑑修蜀立遂王元膺為太子以通鑑修秋七月壬辰梁封王審知為琅琊王以十國紀年修李儼承制以楊隆演為淮南節度使東面都統𢎞農王以通鑑修九月淮南將周本圍蘇州以通鑑修晉攻梁晉州丁丑梁主如陜州以救之晉師退以通鑑修冬十月華原賊溫韜發唐諸陵以通鑑修丁巳梁主至自陜州以通鑑修十一月梁定難節度使李思諫卒其子彛昌自為留後以通鑑修吳越改元以王厚之金石録修解題曰按臨安府崇化寺尊勝幢云天寶四年歲次辛未又明慶寺白傘蓋陀羅尼幢云天寶五年太歲壬申吳越國女弟子建其發願文序曰生忝霸朝則非唐天寶明矣蓋梁以丁卯篡唐吳越猶用天祐年號次年則自建元矣癸酉歲後復用梁紀元故錢塘湖龍王廟碑云貞明二年建登聖寺磨崖龍德元年建梁太祖皇帝開平三年南楊隆演並天祐六年唐莊宗皇帝岐王李茂貞淮蜀髙祖皇帝武成二年吳越王錢鏐天寶二年劉楚王馬殷王南平王髙季興南平王隱閩王審知春正月甲戌梁遷于西都以吕祖謙標目修二月丁酉朔日有食之通鑑三月甲戌梁主如河中以新紀通鑑修解題曰徐無黨曰以髙萬興降劉知俊兵攻鄜延故也淮南徐溫以其養子知誥治升州以通鑑修夏四月庚子梁以王審知為閩王劉隱為南平王以通鑑修辛亥吳越大破周本走之以通鑑修五月己卯梁主至自河中以新紀修劉守文以契丹吐谷渾兵攻劉守光見執以通鑑修梁族誅佑國節度使王重師六月劉知俊執佑國節度使劉捍降于岐以吕祖謙標目修解題曰改佑國曰永平由劉捍之執也庚戌梁遣兵討劉知俊辛亥梁主如陜州乙卯知俊奔岐以吕祖謙標目修撫州刺史危全諷攻洪州淮南遣周本救之以通鑑修秋七月甲子梁以劉守光為燕王以通鑑修乙亥梁主至自陜州以新紀修庚辰周本大敗危全諷于象牙潭擒之盡取江西以通鑑修解題曰王顔後唐烈祖開基志注象牙潭去洪州百餘里八月晉攻梁晉州弗克以通鑑修冬十一月岐遣中書令劉知俊攻梁靈州梁攻岐邠寧以救之十二月知俊大敗之於升平以新紀通鑑修解題曰今坊州宜君縣有升平鎮即故縣梁太祖皇帝開平四年王楊隆演並天祐七年唐莊宗皇帝岐王李茂貞吳蜀髙祖皇帝武成三年吳越王錢鏐天寶三年劉楚王馬殷王南平王髙季興南平王隱閩王審知春二月岐王茂貞承制加𢎞農王隆演吳王以通鑑修三月定難軍亂殺李彜昌夏四月甲子梁以其族父仁福為節度使以通鑑修五月癸丑鄴王紹威卒梁以其子周翰為天雄留後以通鑑修秋七月岐晉會邠涇兵攻梁夏州以通鑑修八月梁以劉守光兼義昌節度使以通鑑修解題曰通鑑考異曰實録是歲五月以義昌留後劉繼威為義昌節度使八月又云以守光兼義昌節度使不言置繼威於何地或者復為留後不然守光兼幽滄節度使繼威但為滄州節度使皆不可知今兩存之丙寅梁主如陜州辛未以鎮國節度使楊師厚為招討使救夏州以新紀修解題曰按舊史唐紀鳳翔李茂貞邠州楊崇本皆遣使來會兵同討靈夏帝令周德威將兵萬人西渡河以應之餘見通鑑職方考陜州唐曰保義梁改鎮國後唐復保義吳越築捍海石塘廣杭州城朱熹綱目九月甲午梁主至自陜州以新紀修冬十一月己丑梁以寧國節度使王景仁為招討使屯魏州襲據趙深冀二州晉遣周德威救趙以新紀通鑑修解題曰燕不救趙而晉救之則守光存朂所存較然可知矣事見通鑑寧國宣州也時屬楊隆演十二月蜀改明年元以通鑑修解題曰宋庠紀年通譜永平本漢明帝晉惠帝魏宣武李密年號晉王存朂救趙義武王處直會之以通鑑修梁太祖皇帝乾化元年王楊隆演並天祐八年唐莊宗皇帝岐王李茂貞吳蜀髙祖皇帝永平元年吳越王錢鏐天寶四年帝楚王馬殷王南平王髙季興南漢髙祖皇劉龔閩王審知春正月丙戌朔日有食之通鑑丁亥晉王存朂大破王景仁於柏鄉癸巳梁以楊師厚為北面招討使己亥晉遣兵攻邢州二月己未存朂攻魏州不克而還以通鑑修二月乙酉朔梁以羅周翰為節度使以通鑑修丁亥南平王隱卒其弟巖立以路振九國志修解題曰僣偽諸國若奉正朔臣事於人則書卒不然則書薨蜀伐岐岐攻梁長安尋退以通鑑修夏四月岐攻興元蜀擊却之以朱熹綱目修五月甲申朔梁改元以新紀修解題曰通鑑不書闕也甲辰梁以劉巖為清海節度使以通鑑修蜀主建如利州以通鑑修秋八月甲子燕王守光稱帝改元以吕祖謙標目修解題曰宋庠紀年通譜應天本朱泚年號乙亥岐大敗蜀兵於清泥嶺圍安逺軍以通鑑修九月庚子梁主如魏州以新紀修蜀大破岐兵於安逺軍以通鑑修戊申燕攻易定十二月甲子晉攻燕以救易定以通鑑修劉巖取楚容髙二州以吕祖謙標目修梁太祖皇帝乾化二年年唐莊宗皇帝岐王李茂貞吳王楊隆演並天祐九蜀髙祖皇帝永平二年吳越王錢鏐天寶五年皇楚王馬殷王南平王髙季興南漢髙祖帝閩王審知春二月甲子梁主如魏州以救鎮定以通鑑修夏四月梁主至東都以新紀通鑑修五月梁主如西都以新紀修晉敗燕兵于龍頭岡以通鑑修六月戊寅梁郢王友圭弒其父晃歸罪於養子博王友文而殺之自即帝位以新紀通鑑修解題曰歐陽修曰梁之惡極矣自其起盜賊至于亡唐其遺毒流於天下豪傑四面並起孰不欲揕刃於胸然卒不能少挫其鋒以得志梁之無敵於天下可謂虎狼之強矣及其敗也困於一二女子之娛至於洞胸流腸刲若羊豕禍生父子之間乃知女色之能敗人矣事見通鑑丙申梁匡國軍亂殺節度使韓建以通鑑列傳修解題曰按自開平二年以同州匡國軍為忠武許州忠武軍為匡國通鑑綱目是年以許州為忠武當别有所據梁宣義節度使楊師厚屯魏州秋七月逼羅周翰而代之徙周翰為宣義節度使以通鑑修解題曰羅𢎞信以唐文德元年為魏博節度使傳三世二十四年至周翰而為楊師厚所逐滑州故曰義成以避梁諱改宣義唐復故甲子梁以均王友貞為東都留守以通鑑修丙寅梁廢建昌宫使置國計使以通鑑修解題曰按舊史本紀應諸道茶鹽酒麯商稅悉還州郡八月戊戌梁攻護國節度使冀王友謙友謙降晉以通鑑修九月庚午梁以敬翔為中書侍郎同平章事壬申戶部尚書李振充崇政院使以新紀修冬十月晉王存朂救朱友謙梁兵退以通鑑修十一月梁楊師厚破趙兵以通鑑修梁均王朱瑱乾化三年王楊隆演並天祐十年唐莊宗皇帝岐王李茂貞吳蜀髙祖皇帝永平三年楚王馬殷漢南平王髙季興王吳越王錢鏐南髙祖皇帝閩王審知春正月丁巳晉拔燕順州以通鑑修甲子梁改元鳳厯以新紀修二月戊子梁均王友貞舉兵討亂庚寅友圭伏誅友貞即皇帝位於東都更名鍠復稱乾化三年追廢友圭為庶人以吕祖謙標目修解題曰舊史帝遇弒之際馮延諤親犯御幄而友圭復死於延諤之手天之報應可知事見通鑑三月冀王友謙復歸梁以通鑑修夏五月梁楊師厚攻趙以救燕晉分兵拒之以通鑑修六月丙子蜀以道士杜光庭為諌議大夫議政事以通鑑修秋七月己酉蜀殺其太子元膺以通鑑修梁封髙季昌渤海王劉巖南海王以通鑑新史世家修解題曰按世家末帝即位悉以隱官爵授巖襲封南海王通鑑不載今因封髙季興并書之冬十月甲子蜀立子衍為太子吕祖謙標目燕盧龍巡屬皆入于晉請救于契丹弗許燕王守光請降于晉十一月晉王存朂詣幽州不克成進攻克幽州執守光父子以通鑑修梁遣王景仁為淮南招討使侵廬夀十二月吳鎮海節度使徐溫大敗之於霍邱以通鑑修晉以周德威為盧龍節度使以通鑑修梁均王乾化四年年唐莊宗皇帝岐王李茂貞吳王楊隆演並天祐十一蜀髙祖皇帝永平四年楚王馬殷南南平王髙季興閩吳越王錢鏐漢髙祖皇帝王王審知春正月晉王存朂殺劉守光用其父仁恭于雁門以新紀修晉王存朂開府置行臺以通鑑修秋七月晉趙攻邢州梁楊師厚拒却之以通鑑修解題曰按唐新舊史紀傳梁傳范質通録唐天祐三年李克用本文作武皇遣周德威李嗣昭以嗣昭為留後四年五月太祖命康懷英率兵十萬圍潞州懷英築壘環城浚鑿池塹飛走路絶克用遣德威將兵赴援首鋒挑戰日有俘獲懷英不敢戰太祖乃以李思安代之思安引軍將營於潞州德威以五千騎搏之梁軍大敗思安退保堅壁别築外壘謂之夾寨梁發山東之民供饋運德威日以輕騎掩之思安乃自東南山口築夾道連接夾寨以通饋運六年正月克用卒子存朂立太祖遣人招降嗣昭嗣昭斬其使者德威尚在亂栁唐潞州銅鞮縣今為威勝軍思安屢為所敗閉壁不出三月梁祖自將兵至澤州以劉知俊為招討使代思安存朂本文作帝新立殺其叔父克寧國中未靖而晉之重兵悉屬德威于外晉人皆恐存朂使人以喪及克寧之難告且召其軍德威聞命即日還太原留其兵城外徒步而入伏哭幾絶羣情釋然汴人以為潞州必取遂停斥候梁祖亦歸洛陽存朂謂諸將曰晉之所以能敵梁而彼所憚者先王也今聞吾王之喪謂我新立未能出兵其意必怠若簡練兵甲倍道兼行出其不意以擊之非徒解圍亦足以定霸乃與德威等疾馳六日至北黃碾距潞四十五里五月朔天大昏霧伏兵三垂岡下在潞城縣西南三十七里詰旦復昏霧直趨夾城時李嗣源總帳下親軍攻東北隅李存璋王霸率丁夫燒寨斸夾城為二道周德威李存審各分道進攻軍士鼓譟三道齊進嗣源率先掩擊梁軍大恐投戈委甲俘馘萬級獲其副招討符道昭及大將三百人芻粟百萬懷英以百騎遁歸克用臨終謂存朂曰梁軍圍潞而德威與嗣昭有隙以吾命諭之若不解重圍殁有遺恨存朂遣達於德威德威感泣竟破強敵與嗣昭歡愛如初澤州將陷河南尹張宗奭召龍虎統軍牛存節謀之存節帥本軍及右神武羽林等軍往應接上黨回至天井關即引衆前救澤州比至州人已焚外城將降晉聞存節至乃稍定存節入城助澤人守晉人穴地道以攻之存節選勇士數十亦穴地以應之隧中敵不得入晉人解去存朂本文作晉王後倣此班師於晉陽告廟飲至賞勞有差下令國中禁盜賊恤孤寡徴隱逸止貪暴設隄防寬獄訟期月之間其俗丕變六月鳳翔李茂貞邠州楊崇本合王建之師五萬攻長安遣使會兵存朂遣張承業帥師赴之九月三鎮復大舉存朂遣嗣昭德威攻青州以應之丁丑梁帝如陜州本文無梁帝字後同十月己丑赴晉州晉軍去帝至東都七年三月楊師厚為潞州招討使六月同州節度使劉知俊叛梁附于岐辛亥帝發西都幸蒲坂七月邠岐及知俊告大舉以伐靈夏八月存朂自將至隂地關遣德威攻晉州乙亥帝至西都師厚領兵赴援德威收軍而退趙王王鎔祖母喪諸鎮皆弔梁使者見晉使在館還言趙王有二志是時魏博羅紹威卒梁因欲盡取河北八月帝如陜楊師厚為招討使以伐岐九月至自陜十月攻上黨遣杜廷隱監魏將夏諲以兵三千襲深冀二州鎮人懼乞師于晉義武王處直亦遣人至晉願絶梁以自效諸將皆疑鎔詐未可出師存朂不聽遣德威先屯晉州十二月丁巳朔梁命王景仁為北面招討使韓勍為副李思安為前鋒將魏滑汴宋兵七萬人攻趙丁丑景仁營于柏鄉趙人告急存朂自將兵出贊皇今慶源府縣處直以五千從會德威于石橋贊皇縣東南槐水西澤側石如牛迹相兼於其處作石橋又慶源府城南八里洨河上大石橋非此處也進距柏鄉五里營于野河北在柏鄉西北五里北劉鎮東流經真定府欒城縣晉兵少而景仁所將神威龍驤拱宸等軍皆梁精兵人馬鎧甲飾以組繡金銀其光耀日晉人望之色動德威勉其衆曰此汴宋傭販兒飾其外耳其中不足懼也其一甲直數十千適足為吾資當勉之退而告晉王曰梁兵甚鋭未可與爭宜少退以待之王曰吾提孤軍出千里其利速戰今不乘勢急擊之使敵知吾之衆寡則吾無所施矣德威曰不然趙人能城守而不能野戰吾之取勝利在騎兵平川廣野騎之所長今軍於河上迫賊營門非用長之地也王不悅退卧帳中諸將無敢入見德威謂張承業曰王怒老兵不速戰者非怯也且吾兵少而臨賊營門所恃者一水隔耳使梁得舟筏渡河吾無類矣不如退軍鄗邑即髙邑今慶源府縣在州西南四十三里誘敵出營擾而勞之可以䇿勝也承業入言曰德威老將知兵願無忽其言王遽起曰吾方思之已而德威獲梁遊兵問景仁何為曰治舟數百將以為浮梁德威引與俱見王笑曰果如公所料乃退軍鄗邑八年正月丁亥德威晨遣三百騎叩梁營挑戰自以徑兵三千繼之景仁怒悉其軍與德威戰至于鄗南梁軍為方陳分其兵為二汴宋軍居左魏滑軍居右王䇿馬登髙望曰平原淺草可前可却真吾之勝地使告德威曰吾當為公先公可繼進德威曰梁軍輕出而逺來與吾轉戰其來必不暇齎糧縱其能齎亦不暇食不及日午人馬俱飢因其將退而擊之勝諸將亦以為然德威擊其左史建瑭擊其右至未申時梁軍東偏塵起德威鼓譟而進麾其西偏曰魏滑軍走矣又麾其東偏曰梁軍走矣梁陳動不可復整乃皆走遂大敗自鄗追至柏鄉橫尸數十里景仁韓勍李思安等以數十騎夜遁是役也斬首二萬級獲馬三千匹鎧甲兵仗七萬擒將二百八十五人自梁與晉爭凡數十戰其大敗未嘗如此梁人棄深趙二州而遁癸巳梁以楊師厚為北面招討使己亥晉王本文無王字遣建瑭德威徇地邢魏王至洺州張承業李存璋以步兵攻邢州德威建瑭將三千騎長驅至澶魏王與嗣源率親軍繼進二月戊午德威進至臨河魏州縣本漢黎陽縣地己未魏羅周翰出兵塞石灰窑口按唐史地理志魏州貴鄉縣西渠徙永濟渠自石灰窠引流注魏橋石灰窠即石灰窑也德威以騎掩擊周翰閉壁自守王攻之城幾陷乙丑德威自臨清貝州縣東北至州六十里徇地貝郡貝州今為恩州至魏州二百七十五里攻博州至貝州百八十里下東武朝城李吉甫元和郡縣志魏州朝城縣本漢東武陽郡後為縣唐改朝城至州一百里澶州刺史張可臻棄城遁遂擊黎陽衛州縣至州一百二十里臨河淇門衛州汲縣淇門鎮庚午梁帝聞晉將攻河陽率親軍屯白馬陂水經沁水東過周縣北注白馬溝水注之水首受白馬湖一名朱管陂燕劉守光聞晉攻梁深入乃大治兵聲言助晉晉王乃令嗣昭掠相衛而還乙未至晉陽六月梁遣楊師厚將兵三萬屯邢州七月王會趙王于承天軍八月守光稱帝九月庚子梁帝自洺渡河至相州聞晉軍未出乃止十一月燕侵易定王處直來告難十二月遣德威將三萬人會鎮定之兵以攻燕入祁溝關元和郡縣志涿州范陽縣涿水源出西南岐溝東大坎下武經總要東北至涿州四十里西北至易州六十里守光求救於梁九年二月梁帝大舉河南之衆以援守光遣李周彜攻棗強冀州縣去州五十五里賀德倫攻蓨縣冀州縣去州百五十里三月帝自督軍攻棗強甲申屠之時晉精兵皆北攻燕獨符存審史建瑭以三千騎屯趙州相與謀曰梁軍若下蓨城必西攻深冀吾王方北伐以南鄙之事付我輩豈可坐觀其弊乃以八百騎趨下博橋建瑭分其麾下五百騎為五隊一之衡水今冀州縣一之南宫今冀州縣一之信都今冀州所治縣一之阜城冀州縣宋改𨽻永靜軍而自將其一約各取梁芻牧者十人會下博至暮擒梁兵數十皆殺之各留其一人縱使去告之曰晉王大軍且大至明日建瑭率百騎為梁旗雜其芻牧者暮叩梁營殺其守門卒縱火大呼斬擊數十百人而梁芻牧者所出各遇晉兵有所亡失其縱而不殺者歸而皆言晉軍且至梁帝夜拔營去蓨縣人追擊之梁軍棄其輜重鎧甲不可勝計帝方病由是增劇丁亥疾驅而還四月己巳至東京戊寅如西都五月己卯朔周德威大破燕軍自涿州進兵于幽州六月戊寅梁帝為其子友圭所殺以楊師厚為魏博節度使未幾鎮人晉人侵魏北鄙師厚率軍至唐店斬首五千級八月朱友謙以河中叛梁附于晉梁遣韓勍康懷英擊友謙十月癸未晉王出澤潞以救之遇懷英于解縣今解州縣大敗之追至白徑嶺在虞鄉縣東五十里懷英又敗十年一月朱友圭為其將袁象先所殺均王友貞即位友謙復臣於梁而亦不絶晉晉軍盡下燕諸縣劉守光被圍經年纍戰常敗晉王如幽州十一月攻破之十一年正月壬子至晉陽是月趙王王鎔北平王王處直奉册推晉王為尚書令始建行臺七月晉王東下會鎮人進軍邢洺戰于張公橋晉軍大敗八月還晉陽此莊宗未取魏博之前與梁相攻本末也八月梁武寧節度使蔣殷叛附于吳九月命天平節度使牛存節等討之以新紀修冬十一月南詔冦蜀十二月蜀大敗之以通鑑修岐靜難節度使楊崇本為其子彥魯所弒彥魯自稱留後以通鑑修梁均王貞明元年年唐莊宗皇帝岐王李茂貞吳王楊隆演並天祐十二蜀髙祖皇帝永平五年楚王馬殷南南平王髙季興閩吳越王錢鏐漢髙祖皇帝王王審知春二月梁蔣殷自焚死以新紀通鑑修三月梁天雄節度使楊師厚卒以平盧節度使賀德倫代之分相澶衛三州為昭德軍以宣徽使張筠為節度使遣鎮南節度使劉鄩將兵脅之軍亂夏四月劫德倫以附晉以吕祖謙標目修岐楊崇本之養子李保衡殺楊彥魯自稱留後降于梁以吕祖謙標目修吳徐溫以其子知訓為淮南行軍副使以通鑑修六月晉王存朂兼領天雄節度使以孔目吏孔謙為支度務使襲取梁德州解題曰自是晉以魏州為根本矣秋七月梁劉鄩襲晉晉陽不至還守莘縣以通鑑修八月晉圍梁貝州蜀攻岐以通鑑修庚戌吳徐溫守潤州以知訓秉政以通鑑修冬十月辛亥梁康王友敬作亂伏誅以新紀修十一月乙丑梁改元新紀解題曰宋庠紀年通譜即位三年始改元夫踰年之規天下之達禮况繼故誅亂自當新正朔以隆王祚而三年無改可謂失其旨蜀取岐階成秦鳳四州劉知俊奔蜀以吕祖謙標目修解題曰按新史列傳茂貞拜武定軍節度使徙山南西道節度使初取興元邠寧鄜坊皆附之有地二十州徐無黨曰岐隴涇原渭武秦成階鳳邠寧慶衍鄜坊丹延梁洋也其被梁圍也興元入于蜀開平已後邠寧鄜坊入于梁秦鳳階成入于蜀當梁末年所有七州而已十二月岐義勝節度使溫韜降于梁以新紀通鑑修解題曰按職方考李茂貞建耀州置義勝軍梁改為崇州曰靜勝後唐復耀州曰順義丁未蜀改明年元以通鑑修解題曰宋庠紀年通譜通正蓋取四時和為通正之義梁主鍠更名瑱以舊五代史修梁均王貞明二年年唐莊宗皇帝岐王李茂貞吳王楊隆演並天祐十三蜀髙祖皇帝通正元年楚王馬殷閩南平王髙季興丹吳越王錢鏐律南漢髙祖皇帝王王審知契髙祖皇帝耶安巴堅神册元年春二月梁劉鄩襲晉魏州大敗于故元城以新紀通鑑修解題曰漢元城縣屬魏郡今大名元城縣有故城梁匡國節度使王檀襲晉晉陽不克以吕祖謙標目修三月晉取梁衛磁二州夏四月取洺州以通鑑修秋八月蜀伐岐以通鑑修晉取梁相邢二州朱熹綱目契丹陷晉蔚州以通鑑修解題曰通鑑考異曰開元中振武軍在朔州西北單于都護府城內𨽻朔方節度使乾元元年置振武節度使領鎮北大都護麟勝二州後唐振武節度帶安北都護麟勝二州等使以後皆帶朔州刺史據此虜振武節度使李嗣本乃治蔚州不知遷徙年月九月晉王存朂還晉陽以通鑑修晉取梁滄貝二州晉王存朂如魏州以吕祖謙標目修冬十一月吳伐梁以應晉以通鑑修十二月戊申蜀改明年元國號漢以吕祖謙標目修解題曰宋庠紀年通譜天漢本漢武帝年號是歲契丹稱帝改元以通鑑修梁均王貞明三年年唐莊宗皇帝岐王李茂貞吳王楊隆演並天祐十四蜀髙祖皇帝天漢元年南漢髙祖皇帝乾亨元年錢楚王馬殷王南平王髙季興吳越王鏐閩王審知春二月晉新州將盧文進殺防禦使李存矩奔契丹解題曰按輿地廣記新州唐末置唐明宗實録莊宗未即位文進王郁繼入胡皆驅率幽薊數州士女為虜南藩教其織絍工作中國所為虜中悉備契丹所以強盛侵凌中國者以得文進郁之故也同光之世為患尤深文進在平州安帳率奚徑騎倐來忽往幽薊荆榛滿目寂無人煙餘見通鑑三月陷新州晉遣周德威攻之敗走契丹圍幽州夏四月晉遣安國節度使李嗣源救之以朱熹綱目修解題曰通鑑考異五代會要舊史地理志樂史寰宇記皆云梁建保義軍唐同光元年改為安國軍而唐莊宗明宗實録列傳舊史存審傳皆云天祐十三年授安國軍節度使恐才屬晉即改軍額不待同光也會要等書誤爾五月吳徐溫徙升州以徐誥為潤州團練使以通鑑修秋八月癸巳南海王巖稱越帝改元以吕祖謙標目修庚子晉李嗣源大敗契丹幽州圍解以吕祖謙標目修冬十月晉王存朂還晉陽十一月如魏州以通鑑修十二月辛亥蜀殺都招討使劉知俊以朱熹綱目修癸丑蜀改明年元以通鑑修丁卯梁以龍虎統軍賀環為北面招討使以新紀修晉王存朂渡河取梁楊劉以吕祖謙標目修解題曰竇蘋曰楊劉唐時大河渡口也今在東阿東北古堤上己巳梁主如洛陽郊以新紀修梁均王貞明四年年唐莊宗皇帝岐王李茂貞吳王楊隆演並天祐十五蜀王衍光天元年南漢髙祖皇帝乾亨二年越楚王馬殷閩南平王髙季興吳王錢鏐王王審知春正月乙亥朔蜀復國號蜀以吕祖謙標目修梁不克郊己卯梁主至自西都以新紀修夏五月蜀以宣徽使宋光嗣為樞密使自是宦者始用事六月壬寅蜀主建薨癸卯子衍即帝位改元以吕祖謙標目修解題曰按孫光憲北夢瑣言蜀先主以雅王肖己將立之為張妃所訴且止徐妃外結宰相希立己子衍既立終非先主素心一旦自夾城過聞諸子喧譟鬭雞築毬大怒于時太子在焉吁嗟曰我今日騎虎不得下此豚犬輩將來如何自此常有廢立之意唐扆為東宫使與徐妃張格隂謀進雞燒餅而殂本文作崩疾困大臣魏𢎞夫等請誅扆允之乃曰徐氏昆弟勿與兵權許存者如不能控御即殺之侯宗徹趙宗勉莫遣戍邉長吁而瞑吳靜淮節度使朱瑾殺徐知訓而自殺以通鑑修甲子晉王存朂大敗梁兵於河上以通鑑修秋七月戊戌吳以徐誥為淮南節度使秉政以通鑑修八月己酉梁泰寧節度使張萬進叛附于晉以通鑑修冬十一月越改號漢吕祖謙標目吳取楚虔州以通鑑修十二月辛酉蜀改明年元以通鑑修解題曰宋庠紀年通譜乾德本輔公祏年號壬戌梁賀環與晉王存朂戰于胡栁周德威死之存朂復敗環等甲子取濮陽以通鑑修解題曰按後唐實録胡栁之戰兩軍俱撓李嗣源日夕不知所向泣曰吾兵安歸萬一參差家國何寄濟河欲保安陽俄聞莊宗大軍復集從珂衛莊宗奪晚陳既旋斾濮陽莊宗以嗣源北渡不悅曰公謂吾死耶渡河安往嗣源待罪曰晡暝渡河冀全餘衆莊宗以其子立功賜大鍾酒以罰之自是寵待元行欽於嗣源稍薄賴從珂先登陷陳小足解愠餘見通鑑通鑑考異胡栁在濮州濮陽縣東梁均王貞明五年隆唐莊宗皇帝岐王李茂貞並天祐十六年吳王楊演武義元年蜀帝王衍乾德元年平南漢髙祖皇帝乾亨三年南王髙季興吳越王錢鏐楚王馬殷知閩王王審春正月晉築德勝南北城於河上以吕祖謙標目修解題曰王容曰此後晉天福三年徙澶州跨德勝津則德勝渡屬今之開德府也晉王存朂兼盧龍節度使以知嵐州孟知祥為河東魏博中門使教練使郭崇韜為副使以吕祖謙標目修夏四月戊戌朔吳王隆演即吳國王位改元以徐溫為大丞相都督中外軍事徐誥為左僕射參政事以通鑑新史列傳修吳越擊吳破之狼山以朱熹綱目修梁賀瓌攻晉德勝南城弗克以通鑑修秋七月吳越攻吳常州大敗而還以通鑑修晉王存朂還晉陽以巡官馮道為掌書記以通鑑修八月乙未朔梁賀瓌卒以開封尹王瓉為北面招討使以通鑑新紀修冬十月晉王存朂如魏州以通鑑修梁兖州安撫制置使劉鄩克兖州族誅張萬進以新紀通鑑修十二月晉敗梁兵復取濮陽以唐實録修解題曰通鑑考異曰莊宗實録去年十二月已拔濮陽至此又云攻下濮陽舊史梁紀去年十二月晉人攻濮陽陷之今年十二月又云晉人陷濮陽唐紀去冬拔濮陽今年四月追襲賀瓌至濮陽無下濮陽事非實録梁紀重復則是去冬唐雖得濮陽棄不守今冬復拔之也時契丹陷唐營州以秦再思洛中紀異修解題曰按秦再思洛中紀異盧文進投契丹説按巴堅徴諸路甲馬冦幽州設圍攻之莊宗召募救之契丹退以趙思溫為營州團練使北面沿邊巡檢都指揮使未期契丹圍營州踰年朝廷未暇救糧草俱盡兵刃亦無思溫欲自殺左右諫止安巴堅誓不殺乃南拜遙辭而倒戈餘見天成三年陷平州解題梁均王貞明六年隆唐莊宗皇帝岐王李茂貞並天祐十七年吳王楊演武義二年蜀帝王衍乾德二年平南漢髙祖皇帝乾亨四年南王髙季興吳越王錢鏐楚王馬殷知閩王王審夏四月梁冀王友謙襲逐忠武節度使程全暉附于晉以新紀修五月己丑吳王隆演薨六月其弟溥立以吕祖謙標目修解題曰按路振九國志隆演本文作渭嗣位政在徐氏恭已而已李球馬謙朱瑾等皆欲挾王以除執政隆演終無異辭餘見通鑑梁以泰寧節度使劉鄩為招討使攻同州秋七月晉遣兵救之以通鑑修八月蜀主衍北巡以通鑑修九月梁劉鄩敗還以通鑑修冬十一月戊子朔蜀伐岐尋退以通鑑修十二月梁以天平節度使霍彥威為北面招討使以新舊紀修解題曰按通鑑貞明五年八月賀瓌卒以開封尹王瓉為北面招討使十二月召瓉還天平節度使戴思逺代為招討使新紀八月瓉為招討使十二月天平節度使霍彥威為招討使又二年始以天平節度使戴思逺為招討使又列傳云瓉與晉相持經年大小百餘戰若瓉以八月為招討使十二月還則不得為經年又云瓉無功末帝遣戴思逺代瓉則不得為霍彥威此通鑑所以削去彥威一節也然舊史本紀龍德元年五月丁亥詔行營將士賞賚宜令招討使霍彥威副招討使王彥章曉示諸軍舊傳云彥威移鎮鄆州兼北面行營招討總大軍於河上新傳亦云彥威為招討使與晉軍相持河上則盡沒其實不可也但月日不可考今載之於龍德元年以前梁均王龍德元年楊唐莊宗皇帝岐王李茂貞並天祐十八年吳睿帝溥順義元年蜀帝王衍乾德三年平南漢髙祖皇帝乾亨五年南王髙季興吳越王錢鏐楚王馬殷知閩王王審春正月甲午蜀主衍還成都以通鑑修魏州人獻唐受命寶于晉以新紀修蜀吳勸晉王存朂稱帝張承業諫之以吕祖謙標目修二月吳改元以新紀通鑑修趙將張文禮殺其主王鎔滅其族自為留後以吕祖謙標目修解題曰王廷湊以長慶元年為留後傳五世一百年三月梁陳州刺史惠王友能反以新紀修夏五月丙戌朔梁改元以新紀修梁殺劉鄩以吕祖謙標目修六月乙卯朔日有食之通鑑秋七月赦梁惠王友能降封房陵侯以新紀修梁以天平節度使戴思逺為北面招討使以新紀傳修八月晉討張文禮文禮死其子處瑾拒守以吕祖謙標目修冬十月晉王存朂敗戴思逺于戚城以新紀通鑑修王處直為其養子王都所囚都自稱義武留後處直尋以憂死以吕祖謙標目修十一月晉王存朂討鎮州以朱熹綱目修十二月辛未契丹攻幽州陷涿州進冦定州晉王存朂救之以通鑑修梁均王龍德二年順唐莊宗皇帝岐王李茂貞並天祐十九年吳睿帝義二年蜀帝王衍乾德四年南漢髙祖皇帝乾亨六年王楚王馬殷丹南平王髙季興吳越王錢鏐閩王審知契天贊元年春正月戊戌晉王存朂大破契丹於望都走之以通鑑修解題曰望都中山府縣在東北六十里梁戴思逺襲德勝北城二月晉王存朂救之思逺還以通鑑修秋八月梁取晉衛州又克淇門共城新鄉以新紀修解題曰衛州共城縣去州五十五里新鄉縣去州四十八里冬十月丁未晉克鎮州殺張處瑾晉王存朂兼領成德節度使以吕祖謙標目修十一月戊寅晉特進張承業卒以通鑑修是歲契丹改元天贊通鑑髙麗統軍王建自稱王以吕祖謙標目修大事記續編卷七十一
