body:
  text: 大事記續編卷二十九明王禕撰甲申晉肅宗明皇帝太寧二年趙帝劉曜光初七年年成武皇帝玉衡十四後趙明皇帝六年年涼張駿建興十二春正月王敦殺其從事周嵩周筵及會稽內史周扎一門以列傳修後趙陷東莞東海兖州刺史劉遐退保泗口以列傳修解題曰杜佑曰臨淮郡宿遷縣界宋屬淮陽軍輿地廣記秦卞相縣晉元帝督運軍儲以為邸閣置宿豫郡縣劉遐自彭城退屯即此鄭樵通志泗水出卞縣故城東桃虛西北卞縣今兖州泗水也水經濟水至濟隂乘氏縣分為三東北流一南流今泗與濟不通出泗水縣西南流洙水入焉又西南至方與縣荷水入焉又云有漷水至高平湖陸入泗又南至彭城名曰沛水睢水入焉又西南至下邳沂水入焉又南至山陽入淮或云泗出東平府梁山泊後趙攻趙河南以通鑑修夏五月甲申張茂卒兄子駿立以呂祖謙標目修王敦以其子應為武衛將軍以自副解題曰按本紀敦將舉兵內向帝密知之乃乘巴滇駿馬微行至于湖察敦營壘而出有軍士疑帝非常人又敦正晝寢夢日環其城驚起曰此必黃鬚鮮卑奴來也帝母荀氏燕代人帝狀類外氏鬚黃敦故謂帝云於是使五騎物色追帝帝亦馳去馬有遺糞輒以水灌之見逆旅賣食嫗以七寶鞭與之曰後有騎來可以此示也俄而追者至問嫗嫗曰去已逺矣因以鞕示之五騎傳玩稽留久又見馬糞冷以為信逺而止帝僅而獲免司馬光疑無是事通鑑刪去然帝實英鋭其為太子也嘗欲與敦決戰明年王含至江寧帝又欲親將擊之故知有于湖之行也六月丁卯詔加王導大都督討敦解題曰按王敦以溫嶠為丹陽尹欲使覘伺朝廷嶠猶懼錢鳳為之姦謀因敦餞别嶠起行酒至鳳前鳳未及飲嶠偽醉以手版擊鳳幘墮作色曰錢鳳何人溫太真行酒而敢不飲敦以為醉兩釋之臨去言别涕泗橫流出閣復入如是再三然後即路及發後鳳説敦曰嶠於朝廷甚密而與度亮深交未必可信敦曰太真昨醉小加聲色豈得以此便相讒二由是鳳謀不行嶠得還都乃具奏敦之逆謀請先為之備餘見通鑑魏六鎮反爾朱兆問誰可使者賀拔允請使高歡領之歡拳毆其口折一齒曰平生天柱將奴輩伏處分如鷹犬今日敢僭妄言請殺之兆以歡為誠遂以其衆委焉其事與嶠正類然嶠君子之智也歡小人之術也秋七月壬申驃騎大將軍王含及參軍錢鳳等奄至建康帝出屯南皇堂癸酉諸將大破之敦死沈充舉兵舉含軍合乙未北中郎將劉遐臨淮內史蘇峻等大破之丙申含等遁帝還宮分遣諸將悉平其黨發敦瘞斬之冬十月以遐監淮北軍事徐州刺史峻為歷陽內史以紀傳修後趙司州刺史石生屯洛陽祖約退保夀春以本紀修解題曰按本紀永昌元年十月書石勒攻陷襄城城父遂圍譙破祖約别軍約退據夀春今年十月又書石勒將石生屯洛陽豫州刺史祖約退保夀陽約前既退據矣今又奚退耶蓋約往年雖自譙退據猶未委譙于賊也故戴洋説約還守譙城約既不從所以今年遂保夀陽洋又謂平西在夀春可得五年自今年至約奔歷陽正係五年今從本紀再書保夀春庶不沒事實晉肅宗明皇帝太寧三年趙帝劉曜光初八年年成武皇帝玉衡十五後趙明皇帝七年年涼張駿建興十三春復三族刑以本紀修二月張駿收趙河南地以通鑑修三月戊辰立子衍為皇太子以本紀修夏四月詔太宰司徒以下詣都坐議政道又詔求直言以紀傳修解題曰太宰羕也司徒導也所議未聞惟溫嶠所條七事見於傳耳後趙中郎將王騰據并州降趙以通鑑修五月陶侃為征西大將軍都督荆湘雍梁四州軍事荆州刺史以本紀修後趙石生逼河南李矩等降趙後趙盡陷司豫徐兖之地趙中山王嶽圍生于金墉後趙中山公虎敗之趙主曜救嶽軍潰而還六月虎擒嶽遂攻王騰殺之以本紀修李矩來歸道卒以呂祖謙標目修自正月不雨至于是月秋七月辛未郗鑒為車騎將軍都督徐兖青三州軍事兖州刺史以本紀修解題曰元帝渡江以後西北州縣率多僑寓司幽并冀皆置於徐益置於荆秦置於梁梁置於雍雍置於襄陽青置於廣陵皆遙置郡縣徐兖或居京口或居廣陵若徐州治鍾離治朐山兖州治盱眙治山陽豫州治夀春治蕪湖治姑孰治歷陽治邾城治武昌治馬頭在濠州鍾離縣西一百十七里太元二年謝玄以為馬頭城治譙多隨時遷徙兖豫青徐又嘗立南北州分合廢置亦皆不常閏八月壬午召太宰西陽王羕司徒王導尚書令卞壼將軍郗鑒庾亮陸曄丹陽尹溫嶠等受遺戊子帝崩于東堂解題曰南朝宮苑記正殿曰太極殿有東堂七間帝嘗獨引紀瞻於廣室慨然憂天下曰社稷之臣欲無復十人如何因屈指曰君便其一瞻辭讓帝曰方欲與君善語復云何崇謙讓耶葉適曰大哉斯言可以興邦矣惜其早世不然東晉不止如此也事見通鑑己丑皇太子衍即皇帝位尊皇后為皇太后秋九月辛丑葬明皇帝于武平陵廟號肅宗以本紀修癸卯太后臨朝王導録尚書事與中書令庾亮輔政事皆決於亮以紀傳修冬十一月癸巳朔日有食之以本紀修晉顯宗成皇帝咸和元年趙帝劉曜光初九年年成武皇帝玉衡十六後趙明皇帝八年年涼張駿建興十四春二月丁亥改元以本紀修夏六月癸亥郗鑒領徐州刺史以本紀修卞壼劾王導以呂祖謙標目修解題曰時貴遊子弟多慕王澄謝鯤為達壼厲色於朝曰悖禮傷教罪莫斯甚中朝傾覆實由於此欲奏推之王導庾亮不從乃止然聞者莫不折節餘見通鑑胡寅曰西晉以清談亡東晉宜革而不革雖然猶有陳頵熊逺卞壼之徒務欲矯正而郗鑒溫嶠陶侃諸公以實才拯難而救時不若洛下之波蕩而不反也不幸庾亮耽味老莊重為之倡而劉惔殷浩輩亹亹繼出雖雅量如謝安亦未免有清談之習故其餘弊終不可革向使諸賢以洙泗為師表言行相顧華不踰質豈特五世而斬哉餘見通鑑秋八月溫嶠為平南將軍都督江州刺史以本紀修冬十月殺車騎將軍南頓王宗免西陽王羕降為縣王以本紀修後趙世子𢎞守鄴以通鑑修十一月後趙石聰攻夀春蘇峻遣兵擊走之以本紀修自六月不雨至于是月以本紀修十二月下邳降于後趙以通鑑修後趙定九流立秀孝試經之制以通鑑修晉顯宗成皇帝咸和二年趙帝劉曜光初十年年成武皇帝玉衡十七後趙明皇帝太和元年涼張駿建興十五年夏五月甲申朔日有食之本紀張駿復稱晉涼州牧趙使其子徹擊之冬十月略河南地以通鑑修解題曰顔師古注西漢當北地郡之北黃河之南程大昌曰河自鹽澤西來達潼關凡四大折其初由積石而徑湟中則鄯蘭也及至靈州遂轉北而行凡千餘里此河西岸即為涼肅甘沙北流千里而遙至九原豐州又轉而東流豐州之東為勝州從州之東又轉而南直至潼關上郡北地隴西朔方西河皆在三河之南故曰河南也上郡唐之寧鄜坊延丹綏也北地靈慶鹽宥也隴西秦渭蘭會河岷鄯也西河銀川也朔方麟夏也事見通鑑徵蘇峻不至十一月峻與鎮西將軍祖約反以本紀修解題曰蘇轍曰王敦蘇峻二釁皆王導之所不欲而劉隗庾亮不忍以速其變以隗亮為是耶敦峻之禍發不旋踵以導為是耶使人主終身含垢何以為國魯自宣公政在季氏更三世至昭公不能忍將攻之子家羈曰捨民數世求以克事不可必也公不從而出隗亮之敗則昭公之舉也子産為鄭國小而逼族大多寵子産患之有事伯石賂以其邑又使為卿以次己位鄭乃少安及其政成大人之忠儉者從而豫之泰侈者因而斃之逐豐卷戮子晢鄭乃大治如導所為知賂伯石以全其始矣未知豫忠儉斃泰侈以成其終也以為賢於隗亮則可以論子産則逺矣事見通鑑十二月蘇峻遣將陷姑孰護軍將軍庾亮為征討大都督宣城內史桓彛與峻將戰于蕪湖敗績郗鑒遣其將赴難以本紀修解題曰姑孰今太平府治當塗縣蕪湖縣今亦𨽻太平按齊州郡志劉備謂孫權曰江東先有建業次有蕪湖又獻帝春秋備勸孫權據蕪湖曰蕪湖近濡須亦佳後陸遜亦嘗屯焉晉顯宗成皇帝咸和三年趙帝劉曜光初十一年成武皇帝玉衡十八年後趙明皇帝太和二年涼張駿建興十六年春正月溫嶠赴難軍尋陽解題曰尋陽晉初治江北之尋陽在蘄州羅田縣蘭城溫嶠始移于湓城之南在今城西十五里亦漢尋陽梁蕭大心因侯景亂移盆浦城以保險今江州德化縣是也丁未蘇峻濟橫江二月庚戌卞壼戰于西陵父子死之庾亮奔尋陽峻陷臺城解題曰按列傳蘇峻反左丞孔坦與司徒司馬陶回白王導曰及峻未至宜急斷阜陵之界守江西當利口彼少我衆一戰決矣若峻未來可往逼其城今不先往峻必先至先人有奪人之功時不可失導然之庾亮以為峻脫徑來是襲朝廷虛也故計不行峻率衆萬人乘風濟自橫江回復謂亮曰峻知石頭徐鍇方輿志楚滅越置金陵吳大帝改名石頭城宋景和中修為長樂宮有戌不敢直下峻自橫江登牛渚若順流向石頭則直下也必向小丹揚南道步今當塗東北近新市有故丹揚縣基與秼陵接壤即小丹揚宜伏兵要之可一戰而擒亮不從峻果由小丹揚經秼陵迷失道逢郡人執以為鄉導時峻夜行甚無部分亮聞之深悔不從回等之言峻據蔣陵建康志吳大帝陵在蔣山之陽去城一十五里云西陵覆舟山在建康府北七里按蘇峻濟江然後登牛渚向小丹揚經秼陵軍稜口據覆舟山通鑑先載峻至覆舟山然後載峻由小丹揚迷失道今略加檃括因風放火臺省及諸營寺署一時蕩盡遂陷宮城宮城即臺城本吳後苑城諸營寺署皆在其外餘見通鑑丁巳峻以祖約為太尉尚書令西陽王羕為太宰自為驃騎將軍與羕録尚書事以本紀修後趙改元以呂祖謙標目修解題曰宋庠紀年通譜太和本魏明帝年號三月皇太后以憂崩以本紀修夏四月後趙陷南陽以通鑑目録修五月溫嶠以陶侃討蘇峻乙未峻遷帝于石頭吳興太守虞潭等起兵郗鑒會侃于茄子浦六月峻兵陷宣城桓彜死之侃築白石壘使鑒還京口以紀傳通鑑修解題曰世説新語陶公自上流來赴蘇峻之難謂必戮庾公可以謝峻庾欲奔竄則不可欲會恐見執進退無計溫勸庾詣陶曰卿但遙拜必無他我為卿保之庾從溫言詣陶侃與嶠亮同赴京師戎卒六萬旌旗七百餘里鉦鼓之聲震于百里指石頭次于蔡洲在建康西南十餘里盧循泊蔡洲劉裕喜曰賊落吾下也遂率兵逼之侯景攻臺城裴之高率兵陳于蔡洲侃屯查浦在石頭南上十里循犯建康劉裕柵石頭斷查浦以拒之嶠屯沙門浦餘見通鑑茄子浦在建康西南十餘里白石壘在建康北十五里蘇峻湖在石頭城正北壘在其東岸按建康實録諸軍盡會石頭城西北賊盛未即決戰議於查浦築壘監軍李根固爭曰查浦地下又在水南唯白石壘固修之滅賊之術也許之後趙攻夀春秋七月祖約奔歷陽以本紀修後趙中山公虎攻蒲坂八月趙主曜擊破之圍石生于洛陽以本紀修解題曰按載記勒命石堪石聰及豫州刺史桃豹等各統見衆會滎陽使石虎進據石門水經注漢順帝自汴口以東積石為堰通淮曰金堤靈帝又修石門以遏渠口濟水與河渾濤東注桓溫北伐將通之不果而還劉裕命劉遵考仍此渠而漕之始激湍東注而山崩壅塞于此十里更鑿故渠通之勒統步騎四萬趣金墉濟自大堨水經注勒出延津號是為靈昌津顧謂徐光曰曜盛兵成皋關上策也阻洛水其次也坐守洛陽者成禽也諸軍集成皋見曜無守軍大悅舉手指天又自指額曰天也乃卷甲䘖枚詭道兼路出于鞏訾之間知曜陳其軍十餘萬于城南彌悅謂左右曰可以賀我矣餘見通鑑陳亮曰古之料敵者若薛公之料黥布司馬懿之料公孫淵石勒之料劉曜于謹之料蕭繹多矣薛公明于料敵而不明于逆順之理懿以棄城預走為淵之上計謹以席捲渡江為繹之上計皆言其甚不足畏也雖勿論可也若勒之策曜則有足言者矣成臯天下之險也使曜留萬人圍洛陽而身率徑兵以扼成臯則勒必不敢進進則乘高而擊之勝之必矣勒既不獲進則洛陽失援曜因得優遊而坐取之此所以為上計也若其阻洛水則勒亦未能進然而可設為疑兵而潛渡曜能應之則勝不能則敗此所以為中計也九月戊申王導奔白石以本紀修陶侃欲歸溫嶠止之庚午侃嶠攻石頭蘇峻敗死其弟逸領其衆以紀傳修解題曰陶侃溫嶠未能破賊侃欲率衆南還毛寶謂嶠曰下官能留之乃往説侃曰公本應鎮蕪湖為南北勢援前既已下勢不可還且軍政有進無退非直整齊三軍示衆必死而已亦謂退無所據終至滅亡往者杜韜非不強盛公竟滅之何至于峻獨不可破耶賊亦畏死非皆勇健公可試與寶兵使上岸斷賊資糧出其不意使賊困蹙若寶不立效然後公去人心不恨侃然之寶燒峻句容湖孰積聚峻頗乏食侃遂留不去餘見通鑑句容縣在建康府東輿地志湖孰縣西北有方山非太平之姑孰也冬十一月後趙主勒救洛陽十二月己卯大敗趙兵執趙主曜以歸殺之以本紀修晉顯宗成皇帝咸和四年成武皇帝玉衡十九年後趙明皇帝太和三年涼張駿建興十七年春正月帝在石頭蘇逸將匡術以苑城降逸殺侍中鍾雅右衛將軍劉超以本紀修戊辰將軍趙允遣兵敗祖約約奔後趙以本紀修趙太子熙南陽王允奔上邽關中降後趙以呂祖謙標目修二月諸軍克石頭乙未蘇逸伏誅殺西陽王羕時宮闕灰燼議欲遷都王導不可乃止解題曰按晉書建康實録時宗廟宮室並為灰燼帝居止蘭臺甚卑陋欲宮建平園苑城一名建平園溫嶠議遷都豫章三吳之豪請都會稽二論紛紜未有所適王導曰建康古之金陵舊為帝里孫仲謀劉玄德俱言王者之宅古之帝王不必以豐儉移都茍宏衛文大帛之冠則無往不可若不績其麻則樂土為墟矣且北冦遊魂伺我之隙一旦示弱竄于蠻越求之望實懼非良計今宜鎮之以靜羣情自安由是嶠等謀並不行餘見通鑑蘇軾曰春秋時楚大飢羣蠻叛之申息之北門不啓楚人謀徙于坂高蒍賈曰不可我能往寇亦能往於是以秦人巴人滅庸而楚始大魏惠王畏秦遷于大梁楚昭王畏吳遷于鄀頃襄王畏秦遷于陳考烈王畏秦遷于夀春皆不復振有亡徴焉賢哉導也可謂能定大事矣壬寅以湘州并荆州以本紀修三月壬子陶侃為太尉加都督交廣寧州軍事郗鑒為司空溫嶠為驃騎將軍開府以本紀修庾亮為平西將軍都督豫州揚州之宣城江西軍事豫州刺史鎮蕪湖以本紀修解題曰晉於是乎失刑矣陶侃移鎮巴陵以呂祖謙標目修夏四月乙未始安忠武公溫嶠卒平南軍司劉胤為江州刺史以紀傳修秋八月趙南陽王允趨長安九月後趙中山公虎大破之遂屠上邽盡滅劉氏蒲洪姚弋仲降之以本紀呂祖謙標目修解題曰按載記始元海以懷帝永嘉四年僭位至曜三世凡二十七載以成帝咸和四年滅宋庠曰劉氏五主十五年蓋太子熙不在其數也冬十二月壬辰右將軍郭默殺劉允據江州陶侃率衆討之以本紀修晉顯宗成皇帝咸和五年趙明皇帝建平元年年成武皇帝玉衡二十涼張駿建興十八年春二月後趙王勒稱大趙天王石虎為太尉中山王以載記修解題曰後趙自是皆稱趙趙族誅祖約以通鑑修夏五月乙卯郭默伏誅陶侃兼江州刺史鎮武昌以列傳修涼州張駿復收河南地以呂祖謙標目修六月初稅田畝三升本紀趙以丁零翟斌為句町王以載記修秋八月趙王勒即帝位改元都臨漳立其妻劉氏為皇后以本紀載記修解題曰事見通鑑宋庠紀年通譜建平本漢哀帝年號水經注漳水對趙臨漳宮按東魏始分鄴置臨漳縣當勒時臨漳即鄴也然載記既載勒自襄國都臨漳又載勒起明堂辟雍靈臺于襄國親授規模令任注張漸等監營鄴宮蓋勒雖營鄴宮實居襄國也趙入襄陽遷其民于樊城以紀傳修九月造新宮繕苑城以本紀修解題曰按建康實録注江左所築但有宣陽門成帝始開陵陽等五門今謂六門也南最西廣陽門次正中宣陽門對苑城門次最東開陽門東面最南清明門正東面建陽門正西面西明門東對建陽門即宮城大司馬門前橫街北面宮城無别門按宮苑記建康宮城周回八里濠濶五丈本吳後苑城晉成帝修為宮城南面最西廣陽門正門宣陽門次東開陽門最東清明門東陽門最北建春門北面最東延喜門次西廣莫門次西元武門最西大夏門西面最北西明門最南閶闔門實録止六門而宮苑記倍之實録又云宋元嘉二十五年新作閭闔廣莫等門按石虎臨江觀兵廣莫門此時已有廣莫門則非止於六門而元凶劭閉守六門齊立六門都慉梁韋黯屯六門皆止言六門者蓋六門為正餘皆便門耳冬十月成拔巴東以通鑑修張駿稱臣于趙以本紀修時陶侃聘于趙以載記修解題曰蘇峻將馮鐵殺侃子奔于石勒勒以為戌將侃告勒以故勒召而殺之侃之聘勒豈以此故耶然祖逖之在雍丘勒嘗修其母墓與逖書求通使交市逖不報其書誠不忍忘君父之讐而外交也侃豈不知出此者哉事見通鑑晉顯宗成皇帝咸和六年趙明皇帝建平二年一年成武皇帝玉衡二十涼張駿建興十九年春三月壬戌朔日有食之以本紀修夏趙起明堂辟雍靈臺以通鑑修秋七月成將李夀侵隂平武都楊難敵降之以本紀修九月趙營鄴宮以洛陽為南都以載記修晉顯宗成皇帝咸和七年趙明皇帝建平三年二年成武皇帝玉衡二十涼張駿建興二十年夏四月趙戍襄陽以本紀修趙右僕射程遐中書令徐光請除中山王虎趙主勒不從命太子𢎞省尚書事以通鑑修解題曰勒酒酣謂徐光曰朕方自古開基何等主也對曰陛丁神武籌略邁于漢高雄勢卓犖超絶魏祖自三王以來無可比也其軒轅之亞乎勒笑曰人豈不自知卿言亦以太過朕若逢漢高當北面事之與韓彭競鞭而爭先耳脫遇光武當並驅于中原未知鹿死誰手大丈夫行事當礌礌落落如日月皎然終不能如曹孟德司馬仲達欺他孤兒寡婦狐媚以取天下也朕當在二劉之間耳軒轅豈所擬乎餘見通鑑胡寅曰勒謂遇高祖則與彭韓爭先遇光武則並驅中原是以光武為韓彭之流乎高祖開四百年基業自後之慮付之平勃王陵勒肉未及冷妻子已不自保徐光乃謂其過於高祖主有侈心臣進諛説其不長世也宜哉秋陶侃遣子參軍斌及南中郎將桓宣取襄陽以本紀修冬十一月壬子朔加陶侃大將軍殊禮固辭以通鑑修十二月庚戌帝遷于新宮以本紀修晉顯宗成皇帝咸和八年趙明皇帝建平四年三年成武皇帝玉衡二十涼張駿建興二十一年春正月丙子趙遣使修好詔焚其幣以通鑑修三月成陷寧州以通鑑修夏五月甲寅慕容廆卒六月子皓立以呂祖謙標目修秋七月戊辰趙主勒卒太子宏即帝位中山王虎殺程遐徐光石聰來降為虎所殺解題曰按列傳石勒新死石虎專恣石聰及譙郡太守彭彪等各遣使請降侍中孔坦與聰書彭譙使至通鑑趙將石聰及譙郡太守彭彪各遣使來降知將軍忿疾醜類翻然同舉將軍出自名族誕育洪胄遭世多故國傾家覆生離親屬假養異類聰本晉人冒姓石氏雖逼偽寵將亦何賴若諭納往言宣之同盟率關右之衆輔河南之卒申威趙魏為國前驅雖竇融之保河西黥布之去項羽比諸古今未足為諭今六軍誡嚴水陸齊舉熊羆踴躍齕噬爭先自求多福惟將軍圖之朝廷遂不果北伐人皆懷恨餘見通鑑按石聰之降紀書于咸和八年孔坦傳乃云咸康元年石聰冦歷陽王導為大司馬討之請坦為司馬聰等遣使來降坦與聰書月日差舛今姑取本傳之書而存之八月虎自為丞相大單于魏王加九錫九月殺彭城王堪弒太后劉氏冬十月河東王生起兵關中遣使來降石朗起兵洛陽虎擊生及朗俱斬之徙秦雍民及氐羌于關東以蒲洪居枋頭姚弋仲居灄頭督之以通鑑呂祖謙標目修解題曰清河博州博平縣有聶城晏子所謂聊攝者疑即此司馬康通鑑釋文謂灄水名在西陽按光州光山縣古西陽界灄水出焉至漢陽軍灄口入江康蓋誤以此為灄頭也慕容皓兄翰奔鮮卑段部閏月其弟仁據遼東以朱熹綱目修十二月石生將郭權據上邽來降以本紀修鎮西大將軍張駿遣從事張淳上表以朱熹綱目修解題曰石勒僭號此駿所以臣勒也今勒死矣此駿之所以上表于晉也甲午晉顯宗成皇帝咸和九年趙帝石𢎞延熙元年年成武皇帝玉衡草四涼張駿建興二十二年春正月趙改元以通鑑修解題曰宋庠紀年通譜延熙本劉禪年號以郭權為鎮西將軍雍州刺史以本紀修二月丁卯以張駿為大將軍以本紀修慕容翰以段蘭攻栁城大破燕兵以通鑑修夏四月趙平郭權以本紀修解題曰石勒之死石聰以譙城宗降晉救未至而聰誅石生石朗起兵洛關遣使來降晉不暇應而朗生誅權生之將也嘗殺石挺而走虎兵矣生既失據權遂據上邽來降而京兆新平扶風馮翊北地皆為之響應當時陶侃擁強兵于荆州設為之應援聲勢聮屬則權未遽亡也而晉曾不聞遣一禆一旅以應之使權竟斃于豪族之手惜哉蔡謨號為通達時務者其止庾亮之北向也曰虎一攻而拔金墉再戰而斬石生禽彭彪殺石聰滅郭權謨欲止亮可也而遂以此為石虎之能不幾于譽賊矣乎事見通鑑六月乙卯長沙桓公陶侃薨以本紀修解題曰侃疾篤上表遜位曰臣欲為陛下西平李雄北吞石季龍是以遣母丘奧于巴東授桓宣于襄陽圖良未敘於此長乖侃嘗夢生八翼飛而上天見天門九重已登其八唯一門不得入閽者以杖擊之因墜地折其左翼及寤左腋猶痛及都督八州據上流握強兵潛有窺窬之志每思折翼之祥自抑而止朱熹乞加封侃申狀引劉義仲所撰贊曰侃有大功于晉讀其書凜乎若見其唱義于武昌破石頭斬蘇峻何其壯也晉史書折翼事豈有是乎又引吳澥論曰蘇峻之誅庾亮恥為侃屈侃後嗣零落而庾氏世總朝權其志一逞遂從而誣謗之秉史筆者有所畏所以旁見曲出以成其罪晉史誣侃以夢寐之祥以其難明故也使侃實懷異志則夢寐之祥正合自知他人安得而知之晉史未可據也餘見通鑑丁卯成主雄卒太子班即帝位以本紀修大旱以本紀修辛未庾亮都督江荆等六州軍州事江豫荆州刺史鎮武昌以呂祖謙標目修秋八月以慕容皓為平州刺史遼東公以載記修冬十月成將軍李越李期弒其主班期即帝位以本紀修十一月趙魏王虎廢其主𢎞自稱居攝天王尋弒𢎞及太后程氏弒秦主宏南陽王恢以呂祖謙標目修慕容皓克遼東以通鑑修晉顯宗成皇帝咸康元年趙武皇帝石虎建武元年成帝李期玉桓元年涼張駿建興二十三年春正月庚午朔帝加元服改元以本紀修成趙皆改元以通鑑修解題曰宋庠紀年通譜建武本漢光武晉惠帝元帝年號三月出侍中孔坦為廷尉以通鑑修趙王虎寇歷陽夏四月癸丑加王導大司馬假黃鉞都督中外軍事尋解嚴以本紀通鑑修大旱以通鑑修秋九月趙遷于鄴以呂祖謙標目修趙聽其民事佛以朱熹綱目修解題曰石虎傾心事佛圖澄尊敬莫與為比百姓故多奉佛皆營造寺廟相競出家虎下書料簡著作郎王度奏曰佛外國之神非諸華所應奉漢代初傳其道唯聽西域人立寺都邑以奉其神漢人皆不得出家魏承漢制亦循前軌今可斷趙人悉不聽詣寺燒香禮拜其趙人為沙門者還服百姓虎下書曰朕生自邉戎忝君諸夏至於饗祀應從本俗佛是戎神所應兼奉其夷趙百姓樂事佛者特聽之蓋虎雖聽其民事佛然猶以戎夷自居也而中國亦變於夷何哉冬十月乙未朔日有食之以本紀修是歲張駿上疏請北伐以通鑑修解題曰按列傳駿遣參軍麴護上疏曰晉室遭家不造宗廟有黍離之哀園林有殄廢之痛普天咨嗟含氣悲傷臣專命一方職在斧鉞遐陬僻嶠勢極秦隴勒雄既死人懷反正謂季龍李期之命曾不崇朝而皆篡繼凶逆鴟目有年是以臣前章懇切欲齊力時討而陛下雍容江表坐觀禍敗懷目前之安替四祖之業馳檄布告徒設空文臣所以宵吟荒漠痛心長路者也且兆庶離主漸冉經世先老消落後生靡識懷君戀故日月告流雖時有尚義之士畏逼首領哀嘆窮廬臣聞少康中興由於一旅光武嗣漢衆不盈百况以荆揚慓悍臣州突騎吞噬遺羯在於掌握哉願陛下敷𢎞臣慮永念先績敕司空鑒征西亮等泛舟江沔使首尾俱至也餘見通鑑韓淲曰此言不見于晉之公卿大夫而見于割據自立之諸侯哀哉晉顯宗成皇帝咸康二年趙武皇帝建武二年成帝李期玉恆二年涼張駿建興二十四年春正月辛巳彗星見于奎以本紀修慕容皓誅慕容仁以呂祖謙標目修二月辛亥立皇后杜氏以本紀修冬十一月成取漢中以呂祖謙標目修十二月趙襄國大武殿鄴東西宮成以通鑑修晉顯宗成皇帝咸康三年趙武皇帝建武三年成帝李期玉恆三年涼張駿建興二十五年春正月趙王虎稱大趙天王以通鑑修辛卯立大學以本紀修解題曰按宋禮志國子祭酒袁瓌太常馮懷上疏曰陛下以聖明臨朝百官以虔恭蒞事朝野無虞江外靜謐如之何泱泱之風邈然無聞洋洋之美墜于聖世乎疏奏帝有感焉由是議立國學徵集生徒而世尚老莊莫肯用心儒訓胡寅曰有天下國家者必建學非以是為美觀也君子學道則立身事君不違乎義理小人聞孝弟之訓亦將遷善逺罪不犯于有司此教養之所以為急務也老莊之言反經悖道以禮法不足尚事務不足理超然放曠以空虛相尚而不究其實子何以為孝臣何以為忠餘無責矣東晉請建學校者惟戴邈與袁馮三君子懇懇言之而終不能革清談之俗還孔孟之教任是責者其庾亮乎秋七月趙殺其太子邃立子宣為太子以載紀修冬十月丁卯慕容皓稱燕王十一月稱藩于趙請伐段遼以載紀修晉顯宗成皇帝咸康四年趙武皇帝建武四年元漢明文皇帝李夀漢興年高涼張駿建興二十六年年代祖皇帝什翼犍建國元春三月趙王虎燕王皓擊段部虎拔令攴段遼走以載紀修解題曰按載記列傳遼左右長史劉羣盧諶崔悅等封其府庫請降虎得公卿人士多殺之其見擢用者惟河東裴憲渤海石璞滎陽鄭系頴川荀綽北地傳暢及羣悅諶等十餘人而已令攴故城在平州盧龍縣餘見通鑑夏四月成漢王夀廢其主期自即帝位改國號漢改元五月弒期以呂祖謙標目修趙王虎圍燕燕慕容恪大敗之以呂祖謙標目修乙未王導為太傅中外大都督解題曰葉夢得曰都督中外諸軍事非僣叛自圖者未嘗付人惟王導以大司馬為之賊退解大司馬復轉中外大都督雖謝安亦止為征討大都督但總軍之在行者也其後都督荆揚等十五州亦未嘗加大都督也事見通鑑郗鑒為太尉征西將軍庾亮為司空導罷司徒拜丞相六月改元亮遙執朝權約鑒起兵廢導鑒不聽以呂祖謙標目修解題曰時王導輔政主幼時艱務存大綱不拘細目委任趙胤賈寧等諸將並不奉法大臣患之陶侃嘗欲起兵廢導而郗鑒不從乃止至是亮又欲率衆黜導又以咨鑒而鑒又不許亮與鑒箋曰昔於蕪湖反覆謂彼罪雖重而時弊國危且令方嶽道勝亦足有所鎮壓故共隱忍解釋陶公自兹迄今曾無悛改主上自八九歲以及成人入則在宮人之手出則在武官小人讀書無受音句顧問未嘗遇君子秦政欲愚其黔首天下猶知不可况欲愚其主哉主之少也不登進賢哲以輔導聖躬春秋既盛冝復子明辟不稽首歸政輔居師傅之尊多養無賴之士成人之主方受師臣之悖萬乘之君寄坐上九亢龍之爻有位無人公與下官並荷託付之重大姦不掃何以見先帝於地下鑒久不許故其事得息餘見通鑑庾亮據上流之勢動欲起兵以廢執政蓋習見晉事而然耳當時賴有郗鑒彌縫其間不然則又一王敦蘇峻王恭殷仲諶也亮謂導欲愚其主此加之罪之辭耳既並為輔相若欲養成君德自可薦進賢才朝夕切劘否則亦當申展情欵與導議之不此之圖而謀動干戈果何理也冬十一月代什翼犍即王位改元以呂祖謙標目修十二月段遼降燕以通鑑修晉顯宗成皇帝咸康五年趙武皇帝建武五年年漢昭文皇帝漢興二涼張駿建興二十七年代高祖皇帝建國二年春三月取漢寧州以呂祖謙標目修將軍毛寶為豫州刺史戍邾城夏四月庾亮請移鎮石城不許以通鑑修解題曰邾城在今黃州西北一百十二里吳赤烏四年城石城在今郢州燕殺段遼以呂祖謙標目修秋七月庚申始興文獻公王導薨以本紀修辛酉吏部尚書何充為護軍將軍振威將軍會稽內史庾氷為中書監揚州刺史參録尚書事以紀傳修解題曰充妻明穆皇后之妹也氷明穆皇后之弟也任相而必於母家其塗狹矣事見通鑑八月南昌文成公郗鑒薨太尉軍司蔡謨都督徐兖青州軍事徐州刺史以紀傳修九月趙陷沔南及邾城毛寶死之以本紀修冬涼州張駿立明堂辟雍以通鑑目録修晉顯宗成皇帝咸康六年趙武皇帝建武六午午漢昭文皇帝漢興三涼張駿建興二十八年代高祖皇帝建國三年春正月庚子朔都亭文康侯庾亮薨何充為中書令庚戌輔國將軍南郡太守庾翼都督江荆等六州軍事荆州刺史鎮武昌以通鑑修二月庚辰有星孛于太微以本紀修三月代都雲中解題曰李繪曰舊唐地理志雲州雲中縣隋雲內縣之恆安鎮也武德置恆州貞觀自朔州北定襄城移雲州於此開元改定襄為雲中縣又單于大都護府秦漢時雲中郡城龍朔置雲中都護府麟德改單于大都護府東北至朔州三百五十里蓋雲中郡縣類多遷改秦漢雲中唐單于都護府也唐雲中後魏所都平城也隋志雲內縣注後魏都此與舊志合新唐志單于都護府金河縣注謂後魏所都蓋誤餘見漢景曜三年定襄晉永嘉七年平城解題冬燕王皓襲趙以通鑑修冬趙太子宣與秦公韜迭省尚書奏事以呂祖謙標目修晉顯宗成皇帝咸康七年趙武皇帝建武七年年漢昭文皇帝漢興四涼張駿建興二十九年代高祖皇帝建國四年春二月甲子朔日有食之以五行志修以慕容皓為大將軍燕王本紀解題曰按蕭方三十國春秋杜延業晉春秋慕容皓之稱燕王也遣使求册命有司不聽聞王導庾亮薨遂上疏請庾氷何充奏許之蓋慕容廆蒲洪姚弋仲父子其初未嘗不假晉名字及羽翼既成則翩然翺翔不可復制燕之王不王無關於晉之盛衰劉翔之論殆如戰國䇿士不過為其主遊説耳然謂宴安江沱肆情縱欲以奢美為榮以敖誕為賢蹇諤之言不聞征伐之功不立將何以尊主濟民乎此則中晉之膏盲也事見通鑑三月戊戌皇后杜氏崩以本紀修夏四月正土斷白籍以通鑑目録修解題曰參之隋食貨志晉至梁陳百姓之自拔南奔者謂之僑人皆取舊名僑立郡縣往往散居無有土著其軍國所須雜物隨土所出臨時折課市取乃無恆法其無貫之人不樂州縣編戶者謂之浮浪人樂輸亦無定數任量準所輸終優於正課焉都下人多為正宫貴人佃客典計衣食客之類無課役第一品至九品佃客自四十户至五户止其佃穀與大家量分典計第一品至六品置三人以至一人皆通在佃客數中六品以上并得衣食客三人第七第八二人九品一人客皆注家籍按司馬元顯傳稱王公以下日廪七升而范寧亦言起廨舍置兵仗之弊雖賦祿少而得占多比後世自為優爾晉顯宗成皇帝咸康八年趙武皇帝建武八午年漢昭文皇帝漢興五涼張駿建興三十年年代高祖皇帝建國五春正月己未朔日有食之以本紀修二月豫州刺史庾懌有􅓧自殺以朱熹綱目修三月初以武悼皇后配武帝廟以本紀修夏六月詔以母弟司徒琅邪王嶽為嗣壬辰庾氷何充等受遺癸巳帝崩于西堂解題曰南朝宮苑記正殿曰太極殿次西有西堂七間甲午琅邪王嶽即皇帝位己亥封兄子丕為琅邪王奕為東海王秋七月丙辰葬成皇帝于興平陵廟號顯宗以本紀修解題曰帝少而聰敏有成人之量為舅氏所制不親庶政及長頗留心萬幾務在簡約嘗欲於後園作射堂計用四十金以勞費乃止雄武之度雖有愧於前人恭儉之德足追蹤於往烈矣己未何充都督徐州揚州之晉陵軍事徐州刺史以本紀修冬十月燕王皓遷都龍城以舉要厯補遺修解題曰龍城今營州之地商時孤竹國也漢為柳城縣皓自徒河之青山徙于此後改為龍城慕容寶馮跋亦都焉徒河故城在東北青山在東百九十里事見通鑑十一月燕入高句麗以通鑑修十二月壬子立妃禇氏為皇后以通鑑修趙營長安洛陽宮以通鑑修趙徵諸州兵通鑑晉康皇帝建元元年趙武皇帝建武九年年漢昭文皇帝漢興六涼張駿建興三十一年代高祖皇帝建國六年春正月改元本紀解題曰宋庠紀年通譜建元本漢武劉聰年號按通鑑不書闕也秋七月以司州刺史桓宣都督司雍梁荆州之四郡軍事梁州刺史以列傳修八月漢主夀卒太子勢即帝位以本紀修趙以段蘭屯今支以通鑑修冬十月安西將軍庾翼為征討大都督鎮襄陽紀傳解題曰翼向襄陽朝廷不許故以安陸為辭今德安府安陸縣帝及朝士皆遣使譬止翼遂違詔輒行至夏口復上表請鎮襄陽翼之違詔而行此禇裒桓溫之所以拜表輒行也杜佑通典曰祖逖死境宇殊蹙以合肥淮隂夀陽泗口角城安帝義熙中置在宿遷縣為重鎮每因劉石符姚衰亂之際則進兵屯戍於漢中襄陽彭城大抵上明江陵夏口武昌合肥夀陽淮隂常為鎮守刺史所治皆置州兵雖有不經攻圍亦是重鎮計有功曰庾氏之勢盛矣亮翼區區北伐非為萬全計也獨以門户之故茍困事力邾城丹水之敗所喪幾何而國步危矣撥亂致治渠其人耶事見通鑑辛巳車騎將軍庾氷都督荆江等七州軍事江州刺史鎮武昌驃騎將軍何充為中書監揚州刺史録尚書事徐州刺史禇裒為衛將軍領中書令琅邪內史桓溫都督青徐兖州軍事徐州刺史以紀傳修甲辰晉康皇帝建元二年趙武皇帝建武十年漢帝李勢太和元年涼張駿建興三十二年代高祖皇帝建國七年春正月趙大閲罷兵以通鑑修漢改元以吕祖謙標目修解題曰宋庠紀年通譜太和本魏明帝石勒年號二月燕滅鮮卑宇文部以呂祖謙標目修夏桓宣擊趙兵于丹水敗績秋八月宣卒以紀傳修解題曰丹水今鄧州內鄉縣丹水鎮閏八月丁巳禇裒都督兖州徐州之琅邪軍事兖州刺史鎮金城以紀傳修解題曰金城去建康三十五里吳所築九月丙申立子𥅆為皇太子戊戌帝崩于式乾殿解題曰南朝宮苑記後宮有式乾殿己亥皇太子𥅆即皇帝位年二歲尊皇后為皇太后壬寅臨朝稱制禇裒為特進都督徐兖青揚州之四郡軍事徐兖二州刺史以紀傳修冬十月乙丑葬康皇帝于崇平陵以本紀修十一月庚辰庾氷卒征西將軍庾翼為江州刺史鎮夏口以通鑑修晉孝宗穆皇帝永和元年趙武皇帝建武十一年漢帝李勢太和二年涼張駿建興三十三年代高祖皇帝建國八年燕文明皇帝慕容皓十二年夏四月壬戌會稽王昱録尚書六條事以紀傳修解題曰宋百官志晉康帝世何充讓録表曰咸康中分置二録王導録其一荀嵩陸曄各録六條事然則似有二十四條若止有十二條則荀陸分録六條導又何所司乎若導總録荀陸分掌則不得復云導録其一也其後每置二録輒云各録六條事又止有十二條事也不知悉何條晉江右有四録則四人參録也江右張華江左庾亮並經關尚書七條亦不知皆何事也何充解録又參關尚書庾翼請以子爰之為荆州刺史弗許秋七月庚午翼卒以本紀修解題曰翼表子爰之行輔國將軍荆州刺史委以後任彼蓋習見庾亮之死已既以弟代兄故已之死亦欲以子代父翼猶且然何責於唐世之藩鎮哉事見通鑑八月豫州刺史路永叛奔趙以本紀修解題曰按庾翼傳稱赭圻路永則其時豫州治赭圻也赭圻在今寧國府南陵縣西北輔國將軍桓溫為安西將軍都督荆司等六州軍事領南蠻校尉荆州刺史以紀傳修冬張駿降焉耆十二月自稱假涼王以紀傳修解題曰按地理志及後魏書列傳駿分武威涼州武興涼州嘉麟縣本漢宣威縣地西平西寧湟廓州張掖甘州酒泉肅州建康甘州西北百九十里祁連山唐置建康軍西郡甘州剛丹縣西海甘州張掖縣本漢居延縣東漢興平二年亦立西海郡魏晉因之湟河廓州晉興在西寧河州廣武蘭州金城縣十一郡為涼州以長子重華為刺史興晉蘭州河州也金城河蘭會西寧州武始熙州蘭州南安鞏州也永晉未詳大夏分晉興廣武立在河州寧河縣武成水經注渭水東徑武成縣西梁載言十道志狄道城秦為縣今武成魚豢典略武都故武城漢中疑即漢陽八部為河州以寧戎校尉張瓘為刺史敦煌沙州晉昌瓜州晉昌縣本漢宜安高昌西州西域都護伊州戊巳校尉玉門肅州玉門縣大護軍三郡三營為沙州以西戎校尉楊宣為刺史餘見通鑑燕王皓始不用晉年號以載紀修晉孝宗穆皇帝永和二年趙武皇帝建武十二年漢帝李勢嘉寧元年涼張重華建興三十四年代高祖皇帝建國九年燕文明皇帝十三年春正月己卯都鄉文穆侯何充卒二月癸丑以左光祿大夫蔡謨領司徒録尚書六條事與撫軍大將軍會稽王昱輔政以紀傳修三月丙子前司徒長史殷浩為建武將軍揚州刺史以本紀修夏四月朔日有食之以劉羲叟長厯修解題曰按本紀四月己酉朔劉羲叟長厯是月甲午朔非己酉也又宋五行志亦不載此年日食姑闕其疑五月丙戌西平忠成公張駿卒子重華立以本紀通鑑修六月趙伐涼涼將軍謝艾大破之以紀傳修七月禇裒為征北大將軍開府以本紀修冬漢太保李奕以晉夀叛敗死漢改元以載紀修解題曰宋庠紀年通譜平李奕因大赦改元十一月辛未桓溫伐漢拜表輒行以本紀修晉孝宗穆皇帝永和三年趙武皇帝建武十三年漢帝李勢嘉寧二年涼張重華建興三十五年代高祖皇帝建國十年燕文明皇帝十四年春三月桓溫及漢主勢戰于笮橋破之遂克成都丁亥勢降以本紀載記修解題曰按載記列傳溫率水軍伐勢次青衣輿地廣記云青衣水出盧山徼外東南流至龍遊而與􅡠江合龍遊居青衣水口非漢之青衣也然溫之伐蜀至青衣留輜重於彭模而大軍直指成都不應自雅之青衣而復回彭山今龍遊有青衣江青衣山青衣渡皆以青衣為名往往漢縣之所統闊逺極青衣水之所至皆𨽻屬焉耳餘見漢安樂思公建興十三年注勢大發兵拒守又遣李福與咱堅等數千人從山陽趣合水嘉定甲志云青衣水從西來至城西與陽山江合名雅江又曰蒙水疑即此距溫謂溫從步道而上諸將欲設伏于江南以待咱堅不從率諸軍從江北鴛鴦崎在敘州南溪縣向犍為今眉州彭山縣晉犍為郡治溫次彭模水經注江水自武陽東至彭模水延岑入蜀軍次是地亦謂之平模水曰外水在今彭山縣乃命參軍周楚孫盛守輜重自將步卒直指成都李福及從兄權等攻彭模楚等禦之福退走溫又擊權等三戰三捷賊衆散自間道歸成都蕭繹金樓子載溫伐蜀之詩曰龍驤肅方澤虎嘯出平臯其氣蓋吞李勢矣咱堅到犍為方知與溫異道乃回從沙頭津渡及堅至溫已造成都十里陌堅衆自潰勢悉衆與溫戰于笮橋去成都四里勢衆大潰餘見通鑑李特以惠帝太安元年起兵至此六世凡四十六年以穆帝永和三年滅晉三用師于蜀劉敬宣朱齡石皆以偏師往而溫以元帥自行李氏之勢非譙縱乍起之比故也敬宣揚聲外水由勢江進達黃滸無功而還齡石疑兵出內水中水自外水破彭模城舍船步進遂平成都所歷大略與溫相似但溫五月而成功齡石八月而成功遲速異耳林邑范文陷日南以呂祖謙標目修夏四月丁巳故漢將鄧定等據成都以通鑑修趙伐涼涼以謝艾為軍師將軍大破之以列傳修秋七月鄧定立范賁為帝以本紀修八月戊午涼謝艾擊趙將麻秋大敗之以本紀修冬十月乙丑以張重華為大將軍涼州刺史以紀傳修晉孝宗穆皇帝永和四年趙武皇帝建武十四年年涼張重華建興三十六燕代高祖皇帝建國十一年年景昭皇帝慕容雋元平元秋八月趙太子宣殺太尉秦公韜趙王虎殺之以載記修桓溫為征西大將軍開府以本紀修殷浩參綜朝權與桓溫浸相疑二以通鑑修秋九月丙申燕王皓卒以本紀修冬十一月燕世子雋立改元以通鑑修解題曰宋庠紀年通譜按後魏書稱雋年號元平今檢范亨燕書燕載記無元平之目元平本漢昭帝年號十二月以蔡謨為侍中司徒固辭不拜以通鑑修晉孝宗穆皇帝永和五年趙武皇帝太寧元年七年涼張重華建興三十代高祖皇帝建國十二年燕景昭皇帝元平二年春正月趙王虎即帝位改元以呂祖謙標目修趙高力督梁犢反攻下辨掠滎陽趙主虎以燕王斌為大都督破斬之以載記修夏四月平西將軍益州刺史周撫擊范賁斬之以本紀修封慕容雋為燕王以本紀修趙主虎以燕王斌為丞相録尚書事將軍張豺為鎮衛大將軍受遺皇后使豺殺斌豺都督中外諸軍録尚書事己巳虎卒太子世即帝位五月庚寅彭城王遵殺豺廢世而自立遂弒世及太后沛王沖起兵于薊遵遣都督中外軍事冉閔擒之以通鑑目録呂祖謙標目修趙車騎大將軍蒲洪來降以通鑑修六月桓溫屯安陸遣諸將討河北趙揚州刺史王浹以夀春降以本紀修秋七月禇裒為征討大都督伐趙裒將王龕等敗于代陂八月裒還以紀傳修解題曰按紀傳載記後魏書列傳石虎死子世嗣五月石遵廢世而自立六月桓溫屯安陸遣諸將經營北方遵揚州刺史王浹以夀陽降西中郎將陳逵進據夀春禇裒上表請伐之即日戒嚴直指泗口朝議以裒事任貴重不宜深入可先進偏師裒重陳遣前鋒督護王頥之等徑造彭城示以威信後遣督護麋嶷進軍下邳賊即奔潰今宜速發以成聲勢於是除征討大都督徐兖青揚豫五州諸軍事裒率衆三萬徑進彭城河朔士庶歸降者日以千計裒撫納之甚得其歡心遣督護王龕伐沛獲偽相攴重郡中二千餘人歸降魯郡五百餘家亦建義請援裒遣龕李邁領鋭卒三千迎之裒次丁邳遵以李農為南討大都督率騎二萬來距龕次代陂為農所敗死傷大半執龕送鄴又殺邁龕裒之驍將三軍喪氣乃引還陳逵聞之懼遂焚夀陽積聚毁城而還餘見通鑑後魏列傳遵使李農領萬餘騎逆圍龕於薛據地理志魯郡有薛縣代陂蓋在薛也趙雍州豪傑遣使告晉建威將軍梁州刺史司馬􅈴赴之以通鑑修九月張重華稱涼王以朱熹綱目修司馬􅈴破趙長城璧冬十月還以通鑑修解題曰水經注渭水東徑郿塢南董卓築塢高與長安城等渭水之東水出南山洛谷北流徑長城西甘露二年蜀薑維出駱谷圍長城即斯地也十一月趙冉閔弒其主遵立義陽王鑒為帝閔自為大將軍以載紀修秦雍流民推蒲洪為主趙以洪為征西大將軍都督諸軍事以呂祖謙標目修十二月己酉都鄉元穆侯禇裒卒以本紀修趙新興王祗舉兵于襄國冉閔遣汝隂王琨討之閔殺胡羯二十餘萬人以通鑑修大事記續編卷二十九
