body:
  text: 大事記續編卷五十一明王禕撰唐太宗文武皇帝貞觀五年春正月詔僧尼道士拜父母吕祖謙標目修癸酉帝獵于昆明池丙子還宫以通鑑修癸未朝集使請封禪弗許以舊紀修二月封弟五人子七人為王以本紀修夏五月乙丑以金帛贖隋人沒于突厥者以新紀修秋八月甲辰遣使髙麗瘞隋人戰亡者以新紀修戊申殺張藴古以新紀修解題曰按舊史刑法志河南人李好德風疾瞀亂有妖妄之言詔按其事大理丞張藴古奏好德癲病有徵法不當坐治書侍御史權萬紀劾藴古貫相州好德兄厚德為刺史情在阿縱奏事不實太宗曰吾嘗禁囚於獄內藴古與之奕棊統紀上將寬宥藴古密報其㫖仍引與博戲萬紀奏劾之今復阿縱好德是亂吾法也遂斬於東市既而悔之又交州都督盧祖尚以忤㫖斬於朝堂帝亦追悔下制凡决死刑雖令即殺仍三覆奏尋謂侍臣曰人命至重一死不可再生昔世充殺鄭頲既悔追止不及今春府史取財不多朕怒殺之後亦尋悔皆由思不審也比來决囚雖三覆奏須㬰之間三奏便訖都未得思三奏何益自今以後冝一日中五覆奏又古者行刑君為徹樂減膳朕庭無常設之樂然對食即不啖酒肉且曹司斷獄多據律文雖在可矜而不敢違法或恐有寃自今門下覆理有據法合死而情可宥者冝録狀奏自是全活者甚衆其五覆奏以决前一日二日决日又三覆奏惟犯惡逆者一覆奏而已著之於令九月修九成宫及洛陽宫以吕祖謙標目修解題曰將復修洛陽宫民部尚書戴胄上表諫曰比關中河北盡置軍團富室强丁並從戎旅重以九成作役餘丁向盡去京二千里內先配司農將作假有遺餘勢何足紀亂離甫爾户口單弱一人就役舉家便廢籍軍者督戎仗課役者責糧齎七月已來霖潦未止濱河南北田正汙下年之有無未可知壯者盡行賦調不給則帑藏虛矣洛陽宫殿足蔽風雨數年功畢亦謂非晚帝覽奏罷役洛陽宫之修常以張𤣥素之諫而止今復修繕亦由驕心之萌也不然明年溫彥博何以願帝常如貞觀初魏徵亦以營繕微多為言耶唐仲友曰太宗修九成宫以避暑也後世驪山兆於此冬十月議封建通鑑解題曰按新舊史列傳通典㑹要二年太宗謂公卿朕欲使子孫長久社稷永安其理如何蕭瑀對曰臣觀前代國祚長久者莫不建諸侯以為磐石之固秦罷侯置守二代而亡漢郡國參建年餘四百魏晉廢之不能永久封建之法實可遵行上然之始議封建禮部侍郎李百藥以為祚之長短必在天時政或盛衰有關人事而著述之家多守常轍欲以百王之季行三代之法請待斫雕成朴刑措之教一行登封之禮云畢然後定疆理之制唐仲友曰百藥之論非不是但封建聖人為民不獨為國祚也中書侍郎顔師古以為莫如分置王國不得過大間以州縣錯雜而居互相維持為置官僚一皆省選法令之外不得擅作威刑朝貢禮儀具為條式唐仲友曰封建郡縣亦難並行魏徵曰隋民離亂黎元始蒙𤣥澤一朝棄之為諸侯之隸未可一也既立諸侯當建社廟禮樂儀衛頓闕則理必不安粗修則事有未暇未可二也大夫卿士咸資祿俸薄賦則官府困窮厚斂則人不堪命未可三也王畿千里征稅不多貢賦所資在侯甸之外今並為國邑府藏必虛諸侯朝宗無所取給未可四也燕秦趙代俱帶蕃夷追兵內地逺赴邊亭將有他變未可五也唐仲友曰徵知太宗及羣臣德不及恐革而不當故為適時之論然徵亦無此學由是罷不復議至名儒劉秩建論以為設爵無土署官不職非古之道故權移外家宗廟絶而更存存之之理在取順而難逆絶之之原在單弱而無所憚至謂郡縣可以小寧不可以久安大抵與曹陸相上下唐仲友曰秩専以藩屏言亦未盡封建利害而杜佑柳宗元深探其本據古援今而反復焉佑之言曰夫為人置君欲其蕃息則在郡縣然而主祚常促為君置人不病其寡則在建國然而主祚常永建國利一宗列郡利百姓且法未有不敝者聖人在度其患之短長而為之建國之制初若磐石然敝則鼎峙力爭凌遲而後已故為患也長列郡之制始天下一軌敝則土崩俱潰然而戡定者易為功故其為患也短唐仲友曰但以三代漢唐論之佑論自屈宗元曰封建非聖人意也然而更堯舜禹湯文武莫能去之非不欲去之勢不可也秦破六國列都㑹置守宰據天下之圖攝制四海此得也二世而亡有由矣暴威刑竭人力天下相合劫令殺守圜視而並起時則有叛民無叛吏漢矯秦枉剖海內立宗子功臣數十年間奔命扶傷不給時則有叛國無叛郡唐興制州縣而桀黠時起失不在州而在於兵時則有叛將無叛州以為矯而革之垂二百年不在諸侯明矣唐仲友曰宗元不足知聖人本意至宋祁之論則曰建侯置守如質文遞救亦不可一概責也救土崩之難莫如建諸侯削尾大之勢莫如置守宰唐有鎮帥古諸侯比也故王者視所救為之勿及於敝則善矣唐仲友曰宋祁此說如韓愈論性欲并包說實不見侯守利害唐仲友曰封建在古可行後世一廢而不復者一則風俗壞一則法制異不原風俗不知法制妄以世祚短長國勢理亂議之以古帝王萬世之法與秦世茍簡之制度長挈大職由道喪學絶無三代之佐太宗區區有三代之心而道學不足既知不封建不足以大治衆議紛然喑默而止可勝歎哉十一月丙子祀圓丘以新紀修十二月開黨項地十六州吕祖謙標目修解題曰按舊五代史列傳黨項古析支之地漢西羌别種其地東至松州南接諸羌連吐渾處山谷間亘三千餘里丁亥制决死囚五覆奏下諸州者三覆奏死罪可矜者以聞以新紀及吕祖謙標目修壬寅帝幸溫湯癸卯獵于驪山戊申還宫以新舊紀修康國求內附却之以通鑑修是嵗馮盎入朝以通鑑修唐太宗文武皇帝貞觀六年春正月乙卯朔日有食之以新紀修羣臣復請封禪魏徵諫止之以通鑑修解題曰按舊史志㑹要貞觀初羣臣並請封禪惟魏徵以為不可太宗曰朕欲卿極言之豈功不髙耶德不厚耶諸夏未始安耶夷狄不慕義耶嘉瑞不至耶年穀不登耶何謂而不可對曰陛下功髙矣而民未懷惠德厚矣而澤未滂流諸夏安矣未足以供事逺夷慕義矣無以供其求符瑞雖臻罻羅猶密積嵗豐稔倉廪尚虛臣未能逺譬且借喻於人今有人十年常患瘡治且愈此人應皮骨僅存便欲使負米一石日行百里必不可得隋民之亂非止十年陛下為之良醫疾苦雖已獲安未甚充實告成天地臣竊有疑此數語甚剴切不知新史及通鑑何以刪之且陛下東封萬國咸萃要荒之外莫不奔走今伊洛以東暨於海岱人烟斷絶道路蕭條豈可引彼夷狄示以虛弱太宗不能奪乃止六年文武官以平突厥年穀屢登表封泰山太宗謂侍臣曰朕每聞衆議以封禪為盛事頻勸行之如朕本心但使天下太平雖闕封禪亦可比德堯舜若百姓不足夷狄內侵縱修封禪之儀亦何異桀紂王圭對曰陛下發德音明封禪本末非臣愚短之所能及魏徵進曰隋末大亂黎民遇陛下始有生望養之則至仁勞之則未可升中之禮千乘萬騎供帳之費動役數州户口蕭條何以能給太宗雖納徵言而藩臣猶抗表勸請上問禮官兩漢封禪儀注遣中書侍郎杜正論行泰山上古七十五帝壇是年兩河水潦事乃寢范祖禹曰古者天子巡守至於方嶽必告祭柴望所以尊天而懷柔百神也後世學禮者失其傳而諸儒之諂諛者為說以希世主謂之封禪實自秦始古無有也人主不法三代而法秦亦已謬矣太宗方明朝多賢臣而佞者猶倡其議惟魏徵以為時未可而亦不以其事為非也後議其禮徵亦預焉髙宗明皇遂踵行之終唐之世惟栁宗元以封禪為非嗚呼禮之失也久矣世俗之失可勝救哉二月丙戌置三師官以舊史修三月戊辰帝幸九成宫以舊紀修夏五月以魏徵為檢校侍中新紀秋七月己巳詔天下行鄉飲酒以新紀修九月己酉帝幸慶善宫冬十月乙卯還宫以新舊紀修十二月辛未録囚縱死罪還家以新紀修解題曰吳縝曰案太宗紀貞觀四年天下斷死罪者二十九人何其少也今六年十二月太宗躬自慮囚而京師死罪繫者已三百九十人舉京師之數而推之天下不又多乎多寡遼絶蓋出於史氏歸美太宗之故而實則不然此三百九十人乃録囚之時歸京師輕重繫者非實皆死罪也太宗以其盛冬縲繫故矜而縱之使明年就刑如期既至則憐而宥之若謂三百九十人實皆死罪而太宗釋之必不然也事見通鑑是嵗大省內外官以杜佑通典及百官志修解題曰新史百官志序太宗省內外官定制為七百三十員曰吾以此待天下賢才足矣杜佑通典貞觀六年大省內外官凡文武定員六百四十有三而已然是時已有員外置其後又有特置同正員杜佑通典國初有員外神龍二年置員外官二千餘人員外官其初但云員外永徽六年有員外官復司正員者至於撿挍兼守判知之類皆非本制通典撿挍者云撿挍某官某階髙而官卑者稱行階卑而官髙者稱守階官同者無行守字判官者云判某官事知者云知某官事又有置使之名或因事而置事已則罷或遂置而不廢其名類繁多莫能遍舉中世以後盜起兵興又有軍功之官遂不勝濫矣唐太宗文武皇帝貞觀七年春正月更破陳樂曰七德舞以通鑑修三月戊子王圭罷庚寅魏徵為侍中新紀癸巳直太史李淳風造渾天黃道儀成舊紀夏五月癸未帝幸九成宫以新舊紀修六月戴胄卒以新紀修秋九月大水以舊紀修縱囚來歸赦之以新紀修解題曰按宋書齊書南北史晉謝方明為南郡相年終江陵縣獄囚悉散聽歸家使過正還到罪重者二十餘人一時遣之囚以就死無恨竟無逃者齊王志為東陽太守有重囚十餘人冬至日悉遣還家過節皆返惟一人失期明旦果自詣獄辭以婦孕蕭撝為周刺史嘗至元日獄中繫囚悉放歸家聽三日然後赴獄主者不可撝曰吾獲罪所甘心也諸囚依限而至隋王伽為齊州參軍州使送流囚等詣京師並枷鎖傳送伽次滎陽謂之曰枷鎖亦大辛苦吾欲與汝等脫去能不違期不皆拜謝悉脫其枷停援卒期某日至京師依期而至太宗之縱死囚殆亦迹古人之所已行而為之爾故歐陽修譏之曰堯舜三代之治必本於人情不立異以為髙不逆情以干譽事見通鑑冬十月庚申帝還宫以通鑑修十一月辛丑頒新定五經於天下以皇極經世修壬辰開府儀同三司長孫無忌為司空新舊紀修十二月丙辰帝獵於少陵原戊午還宫以新紀修唐太宗文武皇帝貞觀八年春正月癸未頡利可汗卒以吕祖謙標目修壬寅命李靖等十三人循省天下以新舊紀修三月庚辰帝幸九成宫以新紀修夏五月辛未朔日有食之以新紀修六月驍衛大將軍假志𤣥等為行軍總管伐吐谷渾以新紀修秋七月大水以通鑑修冬十月作大明宫以新紀通鑑修解題曰大明宫地本太極宫之後苑東西面射殿也地在龍首山上太宗初於其地營永安宫以備太上皇清暑雖嘗改名大明宫然太上仍居太安宫未徙入也髙宗厭西內湫濕龍朔二年始大興葺曰蓬萊宫咸亨改含元宫宫南端門名丹鳳在平地門北三殿相望第一殿曰含元殿後即宣政門門內曰宣政殿殿之左門下省𢎞文館右中書省史館殿後即紫宸門門內曰紫宸殿蓬萊池在其北東為蓬萊殿又紫宸之東有延英殿此據六典韋述西京記吕大防長安都城圖程大昌雍録石定叟唐京輔黃圖甲子帝還宫以通鑑修十一月辛未李靖罷為特進每三兩日平章政事以新紀修解題曰平章政事之名始此事見通鑑甲申吐蕃入貢以吕祖謙標目修解題曰此吐蕃通唐之始也按新史列傳吐蕃本西羌種屬蓋百有五十種散處河湟江岷間未始與中國通居析支水西祖曰鶻提勃悉野稍並諸羌據其地蕃發聲近故其子孫曰吐蕃而姓勃窣野或曰南凉秃髮利鹿孤之後子樊尼臣沮渠䝉遜為臨松太守䝉遜滅樊尼率兵西濟河逾積石遂撫有羣羌云十二月辛丑李靖為行軍大總管率五總管兵伐吐谷渾以新紀修中書舍人髙季輔請給外官卑品祿秩以吕祖謙標目修唐太宗文武皇帝貞觀九年春三月分民户為九等以舊紀通鑑修夏閏四月丙寅朔日有食之以新紀修五月庚子太上皇崩於大安宫新紀壬子李靖等奏平吐谷渾殺其王伏允以舊紀修秋七月甲寅修太廟為六室以舊紀修楊恭仁罷以宰相表修冬十月庚寅葬太武皇帝於獻陵廟號髙祖以新舊紀通鑑修解題曰竇蘋音訓獻陵在三原縣東十八里唐太宗文武皇帝貞觀十年春三月癸丑以荆王元景等十二人為諸州都督以吕祖謙標目修解題曰按新舊史列傳諫議大夫褚遂良上疏曰皇子幼年或授刺史陛下誠以至親扞四方如臣愚見刺史郡帥民仰以安得一善人部內蘇息遇一不善合州勞弊陛下兒子內年齒尚幼未堪臨人者且留京師教以經學養成德器審堪臨州然後敦遣太宗深納之唐仲友曰王為虛名而都督刺史世襲則名實不相副矣宗室豈可例為都督刺史失古者親賢並建之意矣此其所以不能久也事見通鑑皇子魏王泰置文學館以吕祖謙標目修解題曰陳𫝊良曰建成為太子太宗為天䇿上將此正如承乾為太子而泰為魏王時也太宗開天䇿府作文學館學士遞宿閣下給珍膳訪政事討論文典此正如泰之即府置館引學士衛尉供帳光祿給食時也太宗收人傑納館中卒以此攘建成之位泰親太宗之子得無動心乎况日廪所入過於太子逺甚則泰豈肯甘心復為太子下故曰啓泰之邪心者太宗也非泰之罪也事見通鑑夏六月壬申以溫彥博為右僕射太常卿楊師道為侍中魏徵罷為特進知門下省事以新舊紀修己卯皇后長孫氏崩以新舊紀修秋八月禁上書告訐者以朱熹綱目修冬十二月蕭瑀罷新紀黜治書御史權萬紀以吕祖謙標目修是嵗定十道府兵之制以吕祖謙標目修解題曰按㑹要關內置府二百六十一積兵士二十六萬舉關中之衆以臨四方又置折衝府二百八十通計舊府六百三十三河東府額亞於關中河北人多壯勇故不置府每嵗十二月以衛士帳上於兵部以俟徵發天下衛士六十萬餘見通鑑杜牧原十六衛曰貞觀中內以十六衛蓄養戎臣外開折衝果毅府以儲兵伍有事則戎臣提兵居外無事則放兵居內其居內也富貴恩澤以奉養其身所部之兵散舍諸府上府不越千二百人三時耕稼一時治武籍藏將府伍散田畝力解勢破人人自愛雖有雖尤為帥亦不可使為亂耳及其居外也緣部之兵被檄乃來斧鉞在前爵賞在後飄暴交椊豈暇異略雖有雖尤為帥亦無由為叛也自貞觀至開元百三十年間戎臣兵伍未始逆篡此聖人所以能柄統輕重制鄣表裏聖術神算也開元末府兵內剷邊兵外作戎臣兵伍湍奔矢往內無一人矣尾大中乾成燕偏重而天下掀然萌根燼然七聖旰食求欲除之且不能也由此觀之戎臣兵伍豈可一日使出落鈴鍵哉然為國者不能無兵居外則叛居內則篡使外不叛內不篡古今已還法術最長其置府立衛乎李郛曰唐之府兵本無建立推行之法皆周隋之舊也周地狹止據所有之地盡籍為兵以與齊戰及得齊河東頻復增置以自助故關中最多而河東次之及平齊之後所置絶少以河南之重止置府於四郡河北山南皆止置於六郡而已隋既平陳自江南以至嶺海百二十郡止於越潭各置一府廣州二府貴州一府而已唐亦無大增損陸贄遂以為太宗居重馭輕之法唐史臣遂以為髙祖太宗之兵制皆不考之過也又曰周封建唐府兵皆以漢法考之乃通蓋王畿之外不盡為侯國時有特封者則未封以前必有掌其地者計王朝命吏之在四方漢之守令固不少也但周官不明之言爾府兵止西北諸郡為多東方諸郡少則兵民之在郡國如漢車騎材官者必未嘗廢如江西宣潤劍南之兵尚可考見唐太宗文武皇帝貞觀十一年春正月作飛山宫舊紀房𤣥齡等定律令格敕以吕祖謙標目修解題曰葉適曰太宗房杜諸公參酌輕重著為刑統之書人之情僞無不周法之比例無不該雖云古者議事以制不為刑辟子産鑄刑書叔向非之然古今之變不同古者有禮樂之器庠序次第之法以教化天下不為刑辟惟恐民知爭端後世治天下既與古不同則必著為成書使天下有所依據故古者不待刑書以為治後世必待刑書而後治可成刑統既成天下更不可易餘見周顯德五年解題以孔子為先聖顔回配以吕祖謙標目修二月甲子豫為山陵終制朱熹綱目帝幸洛陽宫壬午獵於鹿臺嶺以新舊紀修三月丙戌朔日有食之以新舊紀修丙午行新修五禮以通鑑修辛亥帝獵于廣成澤癸丑還洛陽以新紀修羣臣請封禪帝使議之以通鑑修夏六月虞恭公溫彥博薨以新紀修以宗室荆王元景功臣長孫無忌等世襲刺史以通鑑目録修秋七月癸未朔大雨穀洛溢詔百官言事廢明德宫及飛山宫之𤣥圃院給遭水家以新舊紀修解題曰中書侍郎岑文本封事言今雖億兆乂安方隅寧謐既承喪亂之後又接凋弊之餘户口減損尚多田疇墾闢猶少覆燾之恩著矣而瘡疾未復德教之風被矣而資産屢空古人譬之種樹年祀綿逺則枝葉扶疏若種之日淺根本未固一人搖之必致枯槁今之百姓頗類於此常加含養則日就養滋暫有征役則隨而凋耗凋耗既甚人不聊生怨氣充塞則離叛之心生矣此載於舊史新史不録九月河溢以新紀修冬十一月辛卯帝幸懷州獵於濟源麥山以故荆州都督武士彠女為才人唐太宗文武皇帝貞觀十二年春正月定氏族以吕祖謙標目修解題曰唐仲友曰古者重氏族故有同姓異姓庶姓之别奠世繫辨昭穆史氏掌之豈容少有混淆自秦罷侯封而命氏别族之禮廢自元魏有中原而華夷之姓雜然無辨唐承南北之弊氏族之書安得不作不幸遭許李挾艷后以焚信書至見目為勳格使太宗之美意不傳可勝歎哉事見通鑑鄭樵曰隋唐而上官有簿狀家有譜系選舉必由於簿狀婚姻必由於譜系歷代有圖譜局置郎令史以掌之仍用儒者知探譜事凡百官族姓之有家狀者則上之官官為考定詳實藏於祕閣副在左户私書有濫則糾之以官籍官籍有闕則糾之以私書五季以來取士不問家世婚姻不問閥閲故其書散佚而不傳二月癸亥帝如河北觀砥柱乙亥獵於河濱以新紀修閏二月庚辰朔日有食之新紀丙戌帝還宫以新紀修秋七月癸酉吏部尚書髙士亷為右僕射以新紀及皇極經世修八月吐蕃冦松州以吏部尚書侯君集為大總管率三總管兵伐之以新紀修解題曰吐蕃之禍始於此九月辛亥濶水道行軍總管牛進達敗吐蕃於松州以新紀修癸酉以薛延陀真珠可汗二子為小可汗以吕祖謙標目修冬十月己卯帝獵於始平乙未還宫新紀十一月丁未初置𤣥武門飛騎以通鑑修是嵗西突厥分為兩可汗以吕祖謙標目修唐太宗文武皇帝貞觀十三年春三月乙巳朔帝謁獻陵丁未還宫以新舊紀修房𤣥齡為太子少師自領度支以吕祖謙標目修解題曰太宗嘗責房杜以求賢而不使之親細務似得任相之道矣今𤣥齡之領度支無乃下行有司之職乎借曰制國用者冡宰之事而名之不正亦甚矣事見通鑑永寧懿公王圭卒以通鑑修二月庚子停世封刺史新紀解題曰唐仲友曰太宗以諸王為都督刺史又欲世封功臣二事乃法制根本欲行周典當自是始惜乎羣臣不足以語此諸王守土遂良方以為非功臣世封無忌等自同於遷徙二事既無所成本末俱弱武氏得以談笑篡之惜哉事見通鑑夏四月戊寅帝幸九成宫甲申中郎將阿史那結社率犯御營伏誅以新舊紀修壬寅雲陽火然新紀五月旱甲寅避殿詔五品以上言事減膳罷役理囚賑乏乃雨魏徵上疏論十漸以新舊紀傳通鑑修解題曰按新史列傳徵上疏極言曰陛下貞觀初清淨寡欲今萬里遣使市駿馬訪珍怪此不克終一漸也犯旅獒之戒貞觀初護民之勞喣之如子不輕營為頃既奢肆思用人力乃曰百姓無事則易驕勞役則易使自古未有百姓逸樂而致傾敗何有逆畏其驕而為勞役哉此不克終二漸也犯無逸之戒貞觀初役已以利物比來縱欲以勞人雖憂人之言不絶於口而樂身之事實切於心此不克終三漸也犯無逸之戒貞觀初親君子逺小人比來輕褻小人禮重君子重君子恭而逺之輕小人狎而近之此不克終四漸也犯立政之戒貞觀初不貴異物不作無益而今難得之貨雜然並進玩好之作無時而息此不克終五漸也犯旅獒之戒貞觀初求士如渴賢者所舉即信而任之取其所長常恐不及比來由心好惡以衆賢舉而用以一人毁而棄雖積年任而信或一朝疑而斥此不克終六漸也犯立政之戒貞觀初無田獵畢弋之好數年之後志不克固鷹犬之貢逺及四夷晨出夕返馳騁為樂此不克終七漸也犯無逸之戒貞觀初遇下有禮羣情上達今外間奏事顔色不接間因所短詰其細過此不克終八漸也犯太甲接下思恭之戒貞觀初孜孜治道常若不足比恃功業之大長傲縱欲無事興兵問罪逺裔此不克終九漸也犯說命干戈省躬之戒貞觀初頻年霜旱畿內户口並就關外無一户亡去由矜育撫寧故死不擕二比者疲於徭役關中尤甚脫有一穀不收恐不能如前日之帖泰此不克終十漸也犯大禹本固邦寧之戒疏奏帝曰朕今聞過矣願改之以終善道有違此言當何施顔面與公相見哉乃以所上疏列為屏障朝夕見之兼録付史館使知萬世君臣之義唐仲友曰徵之言條目雖多然不過修己用人聽言安民四事而已藹然如伊傅周召之戒其君大禹之訓後世非慮之至忠之盡安能及此六月丙申封弟為王以新紀修秋八月辛未朔日有食之舊紀遣突厥還磧南庚辰立阿史那思摩為可汗賜姓李以吕祖謙標目修解題曰唐仲友曰思摩之立在延陀之後故突厥終見逼於延陀蓋頡利之亡其下多走延陀若北庭早建則可以收撫散亡延陀既受唐號而思摩復立故勞口舌之諭而延陀終亦叛渙亦不蚤從魏徵之過也事見通鑑冬十月甲申帝還宫以通鑑修十一月辛亥楊思道為中書令戊辰尚書左丞劉洎為黃門侍郎參知政事以新舊紀修解題曰參知政事之名始此十二月以侯君集為大總管伐髙昌以吕祖謙標目修己亥立皇子為王以本紀修壬辰獵於咸陽癸巳還宫唐太宗文武皇帝貞觀十四年春正月庚子令有司讀時令以新舊紀修二月丁丑幸國子監時增築學舍千二百間學生三千餘員命祭酒孔頴達等撰五經正義以新舊紀及通鑑修解題曰范祖禹曰古之教者家有孰黨有庠遂有序國有學士修於家而後升於鄉升於國達於天子其教之有素養之有漸升之有序故賢才不可勝用後世鄉里之學廢人君能教者不過聚天下之士而烏合於京師眩曜於一時而已非有教養之實也唐之儒學惟貞觀開元為盛其所成就者則亦可覩矣孟子曰學所以明人倫也故有國者以為先然為學而不復三代之制亦未知其可也吕祖謙曰傳注之學漢之諸儒專門名家以至魏晉梁隋全經固失然鄭𤣥王肅之徒其說猶存猶有可見之美自孔頴達集衆家之說為正義後之觀經者但知有正義而諸儒之說無復存矣事見通鑑壬午帝幸溫湯辛卯還宫以新紀修秋八月庚午作襄城宫新紀解題曰新史地志汝州臨汝縣有清暑宫在鳴臯山南即襄城宫癸酉侯君集克髙昌擒其王九月以其地為西州乙卯置安西都護府魏徵及黃門侍郎褚遂良諌不聽唐地東極於海西至焉耆南盡林邑北抵大漠皆為州縣以吕祖謙標目修解題曰按新舊史列傳太宗欲以髙昌為州縣魏徴諌曰陛下初臨天下髙昌夫婦先來朝謁自後商胡被其遏絶貢獻王誅載加罪止文泰可矣未若撫其人而立其子伐罪弔民威德被於遐外今若利其土壤以為州縣常須千餘人鎮守數年一易每往交畨死者十三四遣辦衣資離别親戚十年之後隴右空虛陛下終不得髙昌撮穀尺布以助中國散有用而事無用臣未見其可不從以其地為西州褚遂良上疏曰古者哲王必先華夏而後夷狄務廣德化不事遐荒陛下誅滅髙昌以為州縣嵗遣千餘人逺事屯戍去者資裝自須營辦既賣菽粟假其機杼經途死亡復在言外兼遣罪人增其防遏所遣之內復有逃亡官司捕捉為國生事河西方已腹心髙昌他人手足豈得縻費中華以事無用冝擇髙昌可立者而立之長為藩翰不省餘見通鑑唐仲友曰太宗志在西域自髙昌始故得其地而守之不暇顧勞費魏徵遂良之諌萬世之長䇿也太宗不暇顧省欲谷設之降又以其地為庭州此後焉耆龜兹之伐繼行遂置四鎮而中國之民萬里征戍自兹始矣通典漢宣帝初置西域都護晉宋以後有都護之官齊陳伯起為西江都護沈顗為南江都護冬閏十月乙未帝如同州獵於堯山庚戌還宫以新紀修十一月甲子朔祀南郊以通鑑修詔增服制以吕祖謙標目修十二月下侯君集獄既而赦之以通鑑修解題曰按新史侯君集傳君集平髙昌還為有司所劾詔詣獄簿對中書侍郎岑文本諌餘見通鑑吳縝曰本紀十六年正月辛未中書舍人岑文本為中書侍郎専典機密則是年十二月文本未為中書侍郎也宰相表又云十六年正月辛未中書舍人兼侍郎岑文本為中書侍郎則傳所書者其兼官歟不書正官而書兼官非史法也紀書正官而不著兼官亦未允也唐太宗文武皇帝貞觀十五年春正月丁丑以公主妻吐蕃以吕祖謙標目修解題曰唐仲友曰太宗得志四夷獨於吐蕃終以和解者太宗之兵力盡於東北故不暇及於吐蕃一也夷狄之勢離則弱合則强太宗滅西域破吐谷渾為吐蕃毆民所以終為唐患二也中國不可輕假借夷狄太宗得之於薛延陀失之於吐蕃使得借中國之勢以服其種人三也以太宗之智算而猶有遺慮其為中國患亦有天數耶事見通鑑辛巳帝幸洛陽次溫湯衛士作亂伏誅以新紀修三月戊辰帝幸襄城宫罷之以新紀通鑑修夏四月辛卯朔詔以來嵗二月有事於泰山以新紀修六月己酉有星孛於太微丙辰詔罷封禪以通鑑修秋七月甲戌遣使立西突厥沙鉢羅葉護可汗以通鑑修遣職方郎中陳大德使髙麗以吕祖謙標目修解題曰去年得志於西域今又遣人觀釁於東夷矣事見通鑑冬十月帝獵於伊闕幸洛陽宫以新紀修十一月薛延陀攻突厥命兵部尚書李績等為四道行軍總管伐之以新紀修十二月戊子帝還京師以通鑑修唐太宗文武皇帝貞觀十六年春正月魏王泰上括地志泰居武德殿魏徵諌遣歸第以通鑑修辛未中書舍人兼中書侍郎岑文本為侍郎以新紀及表修夏六月庚寅追復建成皇太子元吉巢王以舊紀修甲辰詔皇太子用庫物有司勿為限期以朱熹綱目修秋七月戊午長孫無忌為司徒房𤣥齡為司空以新舊紀修九月丁巳魏徵為太子太師以舊紀修西突厥咄陸可汗殺沙鉢羅葉護可汗而驕諸部請廢之遣使立射匱可汗以吕祖謙標目修冬十月丙辰帝獵於武功壬戌獵於岐陽幸慶善宫庚午還宫十二月癸卯幸溫湯甲辰獵於驪山乙巳還宫以新紀修是嵗髙麗大人泉蓋蘇文弒其王建武以舊紀修唐太宗文武皇帝貞觀十七年春正月戊辰鄭文貞公魏徵卒以新紀吕祖謙標目修解題曰按新舊史列傳太宗嘗臨朝謂侍臣曰徵亡後朕遣人至其家得書一紙始半藁其可識者曰天下之事有善有惡任善人則國安用惡人則國亂公卿之內情有愛憎憎者惟見其惡愛者惟見其善愛憎之間所冝詳慎若愛而知其惡憎而知其善去邪勿疑任賢勿二可以興矣其遺表如此朕顧思之恐不免斯事公卿侍臣可書之於笏知而必諌也徵狀貌不逾中人而素有志膽每犯顔進諌雖逢帝怒甚神色不徙而天子亦為霽威議者謂賁育不能過嘗上冡還奏曰向聞陛下有關南之行既辦而止何也帝曰畏卿遂停耳餘見通鑑唐仲友曰諌臣有三長曰學曰識曰氣徴三者兼有而氣最勝故以直著徵諌諍甚多然亦有綱領以堯舜為凖以仁義為本以修身知人安民為說可觸類而通也二月戊申圖功臣於凌烟閣新紀解題曰南部新書凌烟閣在西內三清殿側畫功臣皆北面事見通鑑唐仲友曰太宗以平隱巢之難為元勳故長孫無忌居房杜之上而張亮侯君集皆預焉犯小人勿用之戒矣齊州都督齊王佑殺長史權萬紀而反三月丙辰遣李績將兵討之伏誅以吕祖謙標目修夏四月乙酉廢皇子承乾為庶人漢王元昌侯君集駙馬都尉杜荷等皆伏誅幽魏王泰丙戌立晉王治為皇太子以吕祖謙標目修丁亥楊師道罷己丑長孫無忌兼太子太師房𤣥齡兼太傅蕭瑀為太保李績為詹事瑀績並同中書門下三品以通鑑修解題曰同三品自此始宋敏求曰時中書令侍中皆正三品大厯升為二品癸巳降魏王泰為郡王以新紀修六月己卯朔日有食之以新紀修壬辰葬隋恭帝新紀丁酉髙士亷同三品平章政事以新紀修閏六月丁巳詔皇太子典左右屯營兵以新紀修薛延陀來納幣絶其昏以朱熹綱目修遣使册封髙麗王藏以通鑑朱熹綱目修秋七月罷魏徵子叔玉尚主踣墓碑以吕祖謙標目修解題曰徵既亡帝思之不已登凌烟閣觀畫像賦詩悼痛聞者􅎱之毁短百為指其與杜正倫侯君集為阿黨又言徵嘗録前後諌諍語示史官褚遂良帝滋不悅先許以衡山公主降其子叔玉於是手詔停昏仆所為碑餘見通鑑曽鞏曰太宗嘗屈己以從羣臣之議而魏公之徒感知己之遇事之大小無不諫諍唐之所以治其源蓋出於此能知其有此者以其書存也及觀魏徵以諌諍事付史館而太宗怒之每恨其不思而益知公之為賢夫君之使臣與臣之事君大公至正之道而已大公至正之道非滅人言以掩已過取小亮以私其君此其不可者也又有甚不可者夫以諌諍為當掩是以諌諍為不美也則後世誰復當諌諍乎况前代之君有納諫之美而後世不見則非惟失一時之公又將使後世之君謂前代無諌諍之事是啓其怠且忌矣丁酉房𤣥齡罷以紀傳修八月庚戌兵部尚書張亮為工部尚書參豫朝政以新紀修九月庚辰新羅乞兵伐髙麗遣使諭之以通鑑修徙庶人承乾黔州順陽王泰均州以吕祖謙標目修冬十月丁巳房𤣥齡起復新紀十一月己卯祀圓丘以通鑑修黜封德彜贈諡以朱熹綱目修帝疑太子仁弱密謂長孫無忌曰吳王恪英果類我立之何如無忌固爭乃止以吕祖謙標目修唐太宗文武皇帝貞觀十八年春帝欲征髙麗李績勸之褚遂良諌不聽以吕祖謙標目修解題曰按新舊史列傳太宗謂侍臣曰髙麗莫離支賊殺其王虐用其民夫出師當乘機便今誅之甚易褚遂良對曰陛下手平冦亂西北誅夷徼外懾伏今將興師遼東臣意熒惑何者兵既渡遼指期克捷萬一差跌無以示逺方若再發忿兵則安危難測太宗深然之李績曰近者延陀犯邊升下必欲追擊聽魏徴之言遂失機㑹若如聖䇿可五十年間疆域無事帝曰誠如卿言由徵計誤朕不欲以一計不當而尤之遂良翌日上疏曰譬諸身兩京腹心也四境手足也殊裔絶域殆非支體所屬髙麗殺其主陛下討逆收地斯實乘機但命二三勇將發兵四五萬唾手可取今太子新立年實幼小自餘藩屏陛下所知一旦棄金湯之全渡遼海之外叵忽三思愁煩並集東京太原徑路非逺為其節度以設軍謀實安全之上計不納餘見通鑑唐仲友曰髙麗之舉起於裴矩溫彥博之諫裴溫言遼東本箕子國魏晉時故封內不可不自此即開逺略之端一言而幾於喪邦者也滋於陳大德之使發於新羅之侵定於李績之議𤣥齡遂良之諌皆不欲也拏兵十數年海東丘墟天下騷動仁人之言其利溥哉不仁之言其害亦大矣又曰王魏既沒諌臣惟遂良而其識量逺不及徵李績武臣所見者惟邊功奈天下計何徵在績此言必不發就使有此言徵肯但已耶遂良以克為善其言已不能無過矣胡不明夷夏之分申知足之戒以告耶績之指徵所以杜遂良之再諫惜乎不抗疏而力陳之太宗之欲用兵也指徵之失其悔用師也興徵之思諫臣繫國之輕重也如此夫夏四月辛亥帝幸九成宫以新紀修秋七月甲午遣營州都督張儉率兵及契丹奚伐髙麗以新紀修八月壬子以安西都護郭孝恪為行軍總管伐焉耆以新紀修甲子帝還宫以新紀修丁卯散騎常侍劉洎為侍中岑文本為中書令中書侍郎馬周守中書令以新紀修九月以褚遂良為黃門侍郎參預朝政以通鑑修解題曰按新舊史列傳太宗嘗謂無忌等曰人苦不自知公冝面論攻朕得失無忌曰陛下武功文德冠卓千古臣將順之不暇實不見陛下有所愆失帝曰朕冀聞過公等乃相諛悅朕今面談公等得失以為鑒誡因目無忌曰善避嫌疑應對敏速求之古人未有其比而總兵攻戰非所長也髙士亷涉獵古今心術聰悟臨難不改節為官無朋黨所少者骨鯁規諌耳唐儉言辭俊利善和解人事朕三十載遂無一言論國家事楊師道性行純善自無愆過而情實怯懦緩急不可得力岑文本性道敦厚文章是其所長而持論常據經逺自當不負於物劉洎性最堅貞言多利益然其意尚然諾於朋友馬周見事敏速性甚貞正論量人物直道而行朕比任使多所稱意褚遂良學問稍長性亦堅正既寫忠誠親附於朕譬如飛鳥依人自加憐愛王圭與房𤣥齡李靖溫彥博戴胄同輔政太宗謂圭曰卿識鑒清通尤善談論自房𤣥齡等咸冝品藻又可自量孰與諸子賢對曰孜孜奉國知無不為臣不如𤣥齡才兼文武出將入相臣不如李靖敷奏詳明出納惟允臣不如彥博處繁理劇衆務必舉臣不如戴胄以諌諍為心恥君不及堯舜臣不如魏徵至於激濁揚清嫉惡好善臣於數子亦有一日之長帝稱善而𤣥齡等亦以為盡己所長謂之確論及太宗評無忌等人才視之劣矣郭孝恪平焉耆以吕祖謙標目修冬十月辛丑朔日有食之以新紀修甲寅帝幸洛陽房𤣥齡留守京師以新舊紀修十一月遣張亮李績馬周為行軍大總管率十六總管兵伐髙麗仍詔親征以新紀修解題曰按新舊史列傳太宗將伐遼東召靖入謂曰公南平吳北破突厥西定慕容惟東有髙麗未服公意如何對曰往憑天威薄展微效今殘年朽骨惟擬此行陛下誠不棄疾且瘳矣太宗愍其老不許太宗欲取髙麗若委之靖固能辦之然太宗方欲以髙麗為己功故棄靖不用耳所以無功之可紀也餘見通鑑十二月壬寅庶人承乾卒新紀戊午突厥部落南渡河李思摩來奔以吕祖謙標目修唐太宗文武皇帝貞觀十九年春二月庚戌帝伐髙麗蕭瑀留守洛陽以新紀通鑑修解題曰按南蠻傳貞觀時林邑與㜑剎羅剎二國使者偕來林邑言不恭羣臣請問罪太宗曰昔苻堅欲吞晉衆百萬一戰而亡隋取髙麗嵗調發人與為怨乃死匹夫手朕敢妄議發兵耶赦不問伐髙麗之失太宗非不知之也一怵於陳大德之觀釁再激於新羅之求救遂掃境而屬之而不暇他顧也豈非所謂知之非艱行之惟艱耶事見通鑑贈殷比干太師諡忠烈以新舊紀修三月帝至定州皇太子監國命攝太子太傅髙士亷左庶子劉洎馬周等輔皇太子監國長孫無忌攝侍中吏部尚書楊師道攝中書令及岑文本從行夏四月丁未文本薨右庶子許敬宗撿挍中書侍郎通鑑李績克蓋牟城以新紀修五月張亮拔沙卑城以朱熹綱目修解題曰竇蘋音訓卑沙城今朔庭南海府在梁水南三百里甲申帝克遼東城置遼州六月丁酉朔克白巖城置巖州己未大敗髙麗於安市城以新舊紀修解題曰竇蘋音訓白巖城今戎人以為巖州在梁水西北四十里安市城在梁水城南百八十里夷人亦呼為鐡州秋七月壬申薛延陀真珠可汗死子拔灼自立為多彌可汗以吕祖謙標目修李績攻安市城不克癸未帝乃班師以舊紀修冬十月命祀魏徵復立所踣碑以朱熹綱目修解題曰唐仲友曰髙麗之役褚遂良諌不聽帝所狎也遼東之還謂魏徵在吾無此行帝所憚也古人言成王畏相以此事見通鑑戊午次漢武臺刻石紀功新紀十一月丁亥貶楊師道為工部尚書新紀十二月戊申帝次并州以新紀修薛延陀冦河南領軍大將軍執失思力大敗之以通鑑修庚申殺劉洎以新舊紀修解題曰按新舊史列傳帝征遼東詔劉洎兼太子左庶子檢校民部尚書輔皇太子監國太宗謂洎曰我今逺征使卿輔太子安危所寄卿冝深識我意洎曰願陛下無憂大臣有愆失臣謹即行誅帝以其妄發頗怪之謂曰卿性疏而太健恐以此敗深冝戒慎帝還不豫洎與馬周入候洎周出褚遂良問起居洎泣曰上體患癰殊可懼遂良誣奏之曰國家不足慮正當輔少主行伊霍事大臣有異志者誅之自定矣帝愈召洎問狀洎以實對又引馬周以自明周對與洎所陳不異遂良執不已乃賜洎自盡洎臨引絶索筆牘欲有所奏有司不敢與帝後知之有司皆得罪孫甫曰遂良不應譛洎蓋遂良被譴之後洎子訴寃李義府助之又貞觀實録許敬宗頗以私意改易舊文則譛洎之事未必可信蘇軾取其說顯慶中其子𢎞業詣闕訴遂良譖死狀李義府右之髙宗告近臣樂彥禕曰辨之是暴先帝過刑事寢餘見通鑑馬周攝吏部尚書始罷四時選以通鑑修唐太宗文武皇帝貞觀二十年春正月夏州都督喬師望等擊薛延陀大破之以新紀修丁丑遣大理卿孫伏伽等二十二人以六條察四方以通鑑修解題曰王容曰按百官志監察御史十道巡按一察官人善惡二察户口流散籍帳隱沒賦役不均三察農桑不勤倉庫耗減四察妖猾盜賊生業為公私蠧害五察德行孝悌茂材異等藏器晦迹應時用者六察黠吏豪宗兼并縱暴貧弱寃苦不能自伸者此言巡察四方或者即此六條歟餘見通鑑按舊史李嶠傳則天初置右御史臺巡按天下嶠上疏今之所察但凖漢之六條推而廣之則無不包矣無為多張科目空費簿書三月己巳帝還京師以新舊紀修己丑張亮謀反伏誅以吕祖謙標目修閏三月癸巳朔日有食之新紀戊戌罷遼州巖州以吕祖謙標目修回紇攻薛延陀六月乙亥遣江夏王道宗李績伐薛延陀回紇殺多彌可汗據其地以新紀修秋八月甲子立皇孫為王以本紀修回紇諸部並降己巳帝幸靈州受之九月諸部上號為可汗以吕祖謙標目修冬十月蕭瑀罷以舊紀修丙戌帝還京師以新舊紀修唐太宗文武皇帝貞觀二十一年春正月壬辰申文獻公髙士亷薨以新紀修丙辰以回紇諸部為州府其酋長為都督刺史以吕祖謙標目修解題曰范祖禹曰中國之有夷狄猶晝之有夜陽之有隂君子之有小人也中國失政四夷交侵先王所以御之者曰而難任人蠻夷率服曰無怠無荒四夷來王蓋柔逺能邇治內安外而殊俗之嚮慕不以利誘不以威脅而自至矣故不勞民不費財至於後世之君或讐疾而欲殄滅之或愛悅而欲招來之二者皆非也何則彼雖夷狄亦人類也王者於天地間無所不養况人類而欲殘之乎殘之尚不可况不勝而欲自殘其民乎仁人之所不為也為之者秦始皇是也山川之所限風氣之所移得其地不可居得其民不可使列為州縣是崇虛名而受實弊也且得之既以為功則失之必以為恥其失不在於己則在於子孫故有征討之勞饋餉之煩民不堪命而繼之以亡隋煬帝是也人君類忽近而喜逺厭故而喜新雖或未至於亡而常與之同事其纍德豈細哉事見通鑑丁酉詔以來嵗二月有事於泰山以新舊紀修丁丑皇太子釋菜於太學新紀三月戊子遣武衛大將軍牛進達等為行軍大總管率三總管兵伐髙麗以新紀通鑑修夏四月乙丑作翠微宫以新舊紀修丙寅置燕然都護府以吕祖謙標目修五月戊子帝幸翠微宫以新舊紀修庚戌李績克南蘇木底城新紀六月癸亥長孫無忌遙領揚州都督以通鑑舊紀修秋七月乙未牛進達克石城新紀庚子作玉華宫庚戌還宫以吕祖謙標目修解題曰玉華宫在坊州冝君縣北四十里鳳凰谷永徽廢為寺縣治古殳栩城北谷蓋因鳳凰集殳栩得名也八月壬戌河北水災停封禪以舊紀通鑑修解題曰朝補之曰太宗始排羣議欲守儉約賢君仁人之言也請者不已後卒議行徒以星變水災而止太宗好大喜功不憚萬里伐髙麗况封禪耶使其本心薄之而不為雖舉天下以勸我何有哉既行而以事輟則特不得已耳語曰智及之仁不能守之太宗之謂矣事見通鑑立子明為曹王尋以為巢刺王元吉後以通鑑修解題曰唐仲友曰觀魏徵辰嬴王圭郭亡之諫知後世必有武氏楊氏之事矣事見通鑑戊戌發江南所造船伐髙麗以通鑑修冬十月癸丑褚遂良罷新紀十一月突厥車鼻可汗入貢以通鑑修癸卯徙順陽王泰為濮王以通鑑修十二月戊寅遣驍衛大將軍契苾何力為行軍大總管率三總管兵伐龜兹以新紀修唐太宗文武皇帝貞觀二十二年春正月庚寅馬周薨以新紀修解題曰唐仲友曰周鋭敏多中機㑹與太宗性合其得君過房杜而人才不及矣戊戌帝幸溫湯以新紀修己亥中書舍人崔仁師為中書侍郎參知機務以通鑑修丙午遣武衛大將軍薛萬徹為大總管伐髙麗以新紀修長孫無忌檢校中書令知尚書門下省事新紀戊申還宫以新紀修二月褚遂良起復以新紀修乙亥帝幸玉華宫以新紀修流崔仁師於連州以新紀修三月充容徐惠以帝東征西討營繕相繼服玩華靡上疏諌以通鑑修解題曰唐仲友曰數調兵討定四夷稍稍治宫室勞役百姓隋亡以此二事之極也惟魏徵嘗言之然於用兵亦不極諫而惠之疏乃及於此可謂切中時病矣事見通鑑夏四月丁巳武侯將軍梁建方破松州蠻以新紀修五月右衛率長史王𤣥䇿平天竺以吕祖謙標目修秋七月命劒南造船伐髙麗以吕祖謙標目修解題曰唐仲友曰昔漢武平四夷惟胸奴天下共其勞其他各止一方太宗征遼之役固已天下共勞矣今舟楫糧械之役齊蜀與越皆同其擾信乎兵者民之殘財之蠧也事見通鑑壬辰殺華州刺史李君羡以吕祖謙標目修癸卯梁文昭公房𤣥齡薨以吕祖謙標目修解題曰按舊史列傳𤣥齡謂諸子曰今天下清謐惟東討髙麗不止為國患主上含怒意决臣下莫敢犯顔吾知而不言則銜恨入地遂抗表諫曰臣聞兵惡不戢武貴止戈今上古所不臣者陛下皆臣之矣惟髙麗歷代逋誅陛下責其弒逆親總六軍問罪遼碣未經旬月即拔遼東虜獲數十萬計比功較德萬倍前王且陛下拔將於行伍之中取士於凡庸之末逺夷之使一見不忘小臣之名未嘗再問加以留情墳典屬意篇什筆邁鍾張辭窮班馬撫萬姓以慈遇羣下以禮褒秋毫之善解吞舟之網逆耳之諫必聽膚受之訴斯絶降乘吮思摩之瘡登堂臨魏徵之柩哭戰亡之卒則哀動六軍負填道之薪則精感天地衆美兼備臣深為陛下惜之重之愛之寶之易曰知進退存亡而不失其正者其惟聖人乎傳曰知足不辱知止不殆陛下威名功德亦可足矣拓地開疆亦可止矣邊夷賤類古者以遐荒視之冝從闊絶若必欲絶其種類恐獸窮則摶師還靺鞨犯陳亦可見矣且陛下每决一死囚必三復五奏進素食停音樂以人命之重為之感動也今士無一罪驅之行陳委之鋒刃肝腦塗地魂魄無歸老父孤兒寡妻慈母望轊車而掩泣抱枯骨以摧心足以變動隂陽感傷和氣使髙麗違失臣節誅之可也侵擾百姓滅之可也長能為中國患除之可也今無是三者而坐敝中國為舊主雪恥新羅報仇非所存者小所損者大乎願下沛然之詔許髙麗自新焚凌波之船罷應募之衆自然華夷慶賴逺肅邇安臣死且不朽餘見通鑑宋祁贊曰太宗取孤隋攘羣盜天下已平用𤣥齡如晦興大亂之餘紀綱雕弛而能興仆植僵使號令典刑粲然罔不完具雖數百年猶䝉其功可謂名宰相然求所以致之之蹟殆不可見何哉唐栁芳有言帝定禍亂而房杜不言功唐仲友曰太宗折淮安王明二人之功與蕭何類王魏善諌而房杜讓其直唐仲友曰禹曰豫何言豫思日孜孜是遜臯直益贊於禹禹拜昌言曰俞是遜益直伊尹相湯仲虺咎單作書傅說相髙宗祖己作訓古大臣相成大率如此英衛善兵而房杜濟以文唐仲友曰事有出於人主之所好所能者人臣非助之為難全之為難也太宗好兵而能於兵英衛助太宗者也房杜濟太宗者也雖然使房杜有伊周之學能興三代之制度以副太宗之所好彼其自喜冝何如而豈復快心於一髙麗哉號令典刑悉因隋舊僅得魏徵仁義之說以輔之固足濟太宗之武使不至於如隋終豈免於偏勝封建井田肉刑明堂之屬不能建明而顧以空言止髙麗之伐哉持衆美效之君是後新進更用事𤣥齡身處要地不吝權善始以終此其成大名者諒其然乎如晦任事雖淺觀𤣥齡許與及帝所親欵則謨謀果有大過人者方君明臣良志叶議從相資以成事固千載一遇蕭曹之勳不足進焉唐仲友曰自王迹熄至秦極壞故漢承秦為難魏太和復古至隋頗備唐承隋為易故號令典刑唐若可以過漢者所因不同也雖然宰相所以代天者也輔贊彌縫而藏諸用使斯人由而不知唐仲友曰太宗與房杜君臣之契謂之明良相逢可矣而古之王者必有師臣湯之於伊尹武王之於尚父是也故能以道正君格其非心以登堯舜之盛房杜之於太宗可以為名相矣未可以為畏相也故髙麗之伐危惙之疏不能已也至於魏徵輔贊彌縫雖未可與房杜比而畏相之風則頗有之經世之材佐之創業正君之道輔之守成兹其所以為太宗二子之不能相兼亦其所以止於太宗歟八月己酉朔日有食之新紀修九月庚辰崑立道行軍總管阿史那杜爾及薛延陀餘部戰敗之以新紀修己亥褚遂良為中書令以吕祖謙標目修壬寅眉卭雅三州獠反新紀冬十月癸丑帝還宫以通鑑修十二月阿史那社爾平龜兹閏月擒其王以吕祖謙標目修唐太宗文武皇帝貞觀二十三年夏四月己亥帝幸翠微宫以新舊紀修五月戊午出李績為疊州都督以吕祖謙標目修解題曰按新史列傳績既忠力帝謂可托大事後留宴顧曰朕思屬幼孤無易公者公昔不遺李密豈負朕哉績感涕因囓指流血俄大醉帝因解衣覆之帝疾謂太子曰爾於李績無恩今以事出之我死冝即授以僕射彼必致死矣乃授疊州都督唐仲友曰太宗出之使髙宗用之得其死力此尤可笑豈有社稷臣而以用舍易其心哉太宗之意不過謂名將無過於績慮中外有變髙宗得其用詎知女戎起於宫壼非績不學之所能止哉辛酉衛景武公李靖卒以通鑑修解題曰唐仲友曰靖自囚上急變君臣之義也績不負李密意氣之交也太宗逆取順守不過假仁義是以重意氣之交深託李績至於知君臣大義如靖者不免於讒毁賴靖忠智有以自明耳太宗之知人失於此矣己巳帝崩長孫無忌禇遂良受遺詔輔太子解題曰按新舊史列傳帝疾甚召長孫無忌入卧內帝引手捫無忌頥無忌哭帝感塞不得有所言翌日與遂良入受詔謂之曰漢武寄霍光劉備託諸葛朕之後事一以委卿太子仁孝卿之所悉須盡誠輔佐永保宗社謂太子曰無忌遂良在汝無憂矣顧遂良曰無忌盡忠於我我有天下多此人力爾輔政無令讒毁者害之因命遂良草詔餘見通鑑唐仲友曰漢髙祖謂陳平智有餘王陵可以輔之安劉氏者必周勃故雖有吕氏之難而社稷不搖髙祖知人之審蓋以大度得之太宗屬意於李績用無忌遂良而以許敬宗李義府參之敬宗卒附武氏李績勸成其事唐祚幾移太宗素有知人之鑒蓋暗於多欲也庚午奉大行還京師辛未禮部尚書兼太子少師于志寧為侍中太子少詹事張行成兼侍中撿挍刑部尚書兼右庶子髙季輔兼中書令六月甲戌朔皇太子治即皇帝位以遺詔罷遼東及土木之役以新舊紀及通鑑修丁丑李績為特進撿挍洛州刺史癸未長孫無忌為太尉癸巳績為開府儀同三司參掌機密以新紀傳修秋八月河東地震晉州尤甚以新舊紀修庚寅葬文帝於昭陵廟號太宗以舊紀修解題曰曽鞏曰太宗屈己從諫仁心愛人可謂有天下之志以租庸任民以府衛任兵以職事任官以才能任職以尊本任衆操於上者要而不繁取於下者寡而易供民有農之實而兵之備存兵有兵之名而農之利在事之分有歸而祿之出不浮材之品不遺而治之體相承其亷恥日以篤其田野日以闢其法修則安且治廢則危且亂可謂有治天下之材行之數嵗粟米斗至數錢居者有餘蓄行者有餘資人人自厚幾於刑措可謂有治天下之效然而不得與先王並者法度之行擬之先王未備也禮樂之具田疇之制擬之先王未備也躬親行陳之間戰必勝攻必克天下莫不以為武而非先王之所尚也四夷萬國古所未及以政者莫不服從天下莫不以為盛而非先王之所務也太宗之為政於天下者得失如此竇蘋音訓昭陵在醴泉縣六十里九嵕山九月乙卯李績為左僕射同中書門下三品以舊紀修解題曰僕射同三品自此始孫甫曰唐采魏晉之制以僕射侍中中書令為正宰相僕射二品侍中中書令三品李績自尚書授詹事詹事卑於尚書藉其輔翼太子故授之同中書門下三品使得與聞國政此侍中中書令之任也今績授開府儀同三司從一品又改僕射從二品而反同三品故蘇冕㑹要駮其事曰豈不與立號之意乖乎永隆崔知溫薛元超除中書令而曰同中書門下三品又大乖也杜佑以裴炎為正議大夫守侍中崔知溫為正議大夫中書令劉景先為中大夫侍中並同中書門下三品當以階卑官髙令所給祿秩同三品耳據此似非位署後同三品者止記初命率不以為位號也冬十一月乙丑晉州地震新紀修唐髙宗皇帝永徽元年春正月辛丑改元以新舊紀修丙午立妃王氏為皇后以舊紀修張行成為侍中新紀修日引刺史十人入閣問民疾苦時長孫無忌禇遂良同心輔政有貞觀之風以通鑑修二月立子三人為王以本紀修夏四月己巳朔晉州地震以新紀修解題曰胡寅曰隋煬帝立為太子天下地震其事未逺髙宗必聞之矣即位才逾兩月而地震於晉陽又荐震於晉州天之示戒深矣髙宗曽無恐懼修省之心使其推類而求克正厥事則武氏必不入宫禍原自弭矣當時大臣亦無一言致戒欲銷去之者兹非闕失之大歟六月庚辰晉州地震新紀秋九月置單于瀚海二都護府以吕祖謙標目修冬十月戊辰李績罷左僕射新紀十一月己未褚遂良罷為刺史以通鑑修唐髙宗皇帝永徽二年春正月乙巳黃門侍郎宇文節中書侍郎柳奭同三品新紀瑶池都督阿史那賀魯叛自稱可汗以新紀修秋七月賀魯冦庭州武衛大將軍梁建方驍衛大將軍契苾何力為行軍總管以討之以新紀修明堂以髙祖配五天帝太宗配五人帝以通鑑修八月己巳于志寧張行成為左右僕射同三品髙季輔為侍中以通鑑修九月癸巳廢玉華宫更命九成宫為萬年宫以通鑑修十月晉州地震新舊紀十二月壬子處月朱耶孤注叛附於賀魯以新紀修唐髙宗皇帝永徽三年春正月梁建方等大破處月朱耶孤注於牢山以通鑑修解題曰此後唐之先也詳見元和二年解題新史地理志堅昆部落有牢山黠戞斯傳牢山亦曰賭蒲距回鶻舊衙度馬行十五日竇蘋音訓謂即平晉縣之牢山誤也己巳褚遂良為吏部尚書同三品以通鑑修二月甲寅帝御安福門觀百戲以通鑑修解題曰范祖禹曰髙宗即位之初問民疾苦尊禮輔相蔡道裕希㫖而自責行己之不足覩胡人進戲而知所好之不可不謹豈不足為賢君哉不數年而悖繆昏惑卒成武氏之篡何哉初親賢後用佞也可不戒哉事見通鑑六典皇城西南二門北曰安福三月宇文節為侍中柳奭守中書令新紀夏四月兵部侍郎韓瑗為黃門侍郎同三品新紀秋七月丁巳立陳王忠為皇太子新紀解題曰按舊史列傳王皇后無子后舅柳奭以忠母微立之必親己后然之奭以褚遂良韓瑗諷長孫無忌于志寧等固請立忠為儲后帝許之夫立子以嫡否則以賢今忠既非嫡又非賢而强欲立之柳奭不足道也遂良韓瑗亦何不思之甚耶餘見通鑑九月中書侍郎來濟同三品以新紀修冬十月癸巳濮王泰薨以通鑑舉要厯修大事記續編卷五十一
