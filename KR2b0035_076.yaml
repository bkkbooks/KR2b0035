body:
  text: 大事記續編卷七十六明王禕撰漢髙祖皇帝劉暠天福十二年年南唐元宗皇帝保大五年南漢中宗皇帝乾和五蜀秦國公孟昶廣政十年倧楚王馬希廣帝南平王髙從誨元吳越王錢𢎞遼世宗皇耶律烏雲天授年春正月丁亥朔遼主徳光入汴戊子殺楊承勲己丑殺張彦澤庚寅景延廣自殺癸夘晉主重貴北遷以通鑑吕祖謙標目脩解題曰歐陽脩曰自古禍福成敗之理未有如晉氏之明驗也其始以契丹而興終為契丹所滅方其以逆抗順孤城被圍外無救援而徒將一介之命能使契丹空國興師應若符契出危解難遂成晉氏當是時維翰之力為多及少主新立釁結兵連敗約起争發自延廣然則晉氏之事維翰成之延廣壞之二人之用心者異而受禍也同其故何哉蓋本末不順而與夷狄共事者常見其禍未見其福也可不戒哉事見通鑑按通鑑契丹以晉主為負義侯置於黄龍府即慕容氏和龍城也漢乾祐二年遷之建州去燕京一千一百里遼主徳光除諸鎮節度使彰義史匡威不受代雄武何重建以秦成階三州降蜀勢稍沮晉昌節度使趙在禮自殺遼縱胡騎剽掠括借士民錢帛内外怨憤以通鑑脩劉知逺奉表於遼以朱熹綱目脩唐虞部員外郎韓熈載上疏請恢復以吕祖謙標目脩二月遼主徳光行朝賀禮以通鑑脩遼主徳光以趙延夀為恒州留守大丞相以通鑑脩辛未劉知逺即皇帝位於河東用晉天福年號解題曰歐陽脩正統論曰梁唐晉漢周皆黜之而論者猶以漢為疑以謂契丹滅晉天下無君而漢起太原徐駈入汴與梁唐晉周其迹異矣而今乃一概可乎曰較其心迹小異而大同爾且知逺晉之大臣也方晉有契丹之亂竭其力以救難力所不勝而不能存晉出於無可奈何則可以少異乎四國矣契丹與晉戰者三年矣漢獨髙拱而視之如齊之視越人也卒幸其敗亡而取之及契丹之北也以中國委之許王從益而去從益之勢雖不能存晉然使忠於晉者得而奉之可以冀於有為也漢乃殺之而後入以是而較其心其異於四國者幾何又曰梁太祖以乾化二年遇弑明年末帝已誅友珪黜其鳯翼之號復稱乾化三年尚為有説至漢髙祖建國黜晉出帝開運四年復稱天福三年者蓋其於出帝無復君臣之義而幸禍以為利者其素心也宋庠紀年通譜漢髙祖既有天下而追用晉氏已往之元於義則非忠於禮則非孝進退無據其衰季亂制乎徐無黨曰髙祖初建國無國號蓋其制詔皆無明文故闕不書然稱天福十三年則國仍號晉可知下書改國號漢則未改之前冝有所稱可以推知也知逺以弟河東馬步軍都指揮𢎞倧為特進太原尹武節都指揮使史𢎞肇攻代州殺其刺史王暉以新紀九國志脩三月丙戌朔遼主徳光行入閤禮以通鑑脩晉遣使安集農民保聚山谷者以通鑑脩吳越大敗唐兵取福州閩地遂三分以吕祖謙標目十國紀年脩遼主徳光以其將蕭翰為宣武節度使壬寅北還以吕祖謙標目脩夏四月晉主知逺以從弟北京馬軍都指揮使信為侍衞馬軍都指揮使史𢎞肇為親軍步軍都指揮使都押衙楊邠權樞宻使蕃漢兵馬都孔目官郭威權樞宻副使兩使都孔目官王章權三司使以新紀通鑑脩解題曰按新史列傳王章財賦聚斂急刻舊制田税每斛更輸二升謂之雀鼠耗王章始令更輸二斗謂之省耗又按陶岳五代史補錄後唐明宗幸倉場每石加二斗耗以雀䑕侵蠧謂之雀鼠耗倉場加耗自此始餘見通鑑癸亥晉立魏國夫人李氏為皇后以新紀脩甲子晉河東節度判官蘇逢吉觀察推官蘇禹珪為中書侍郎同平章事以新紀通鑑脩解題曰按新史列傳是時制度草創朝廷大事皆出逢吉然素不學問隨事裁決出其意見故漢世尤無法度而不施徳政民莫有所稱焉髙祖既定京師逢吉與蘇禹珪同在中書除吏多違舊制逢吉尤納貨賂市權鬻官謗者讙譁然髙祖方倚信二人故莫敢有告者事見通鑑晉以折從阮為永安節度使以通鑑脩解題曰按新史職方考府州晉置永安軍漢罷之周復晉史𢎞肇取潞州以新紀脩戊辰奉國指揮使武行徳以河陽來歸新紀丙子遼主徳光道死其衆入於恒州五月乙酉遼東丹王之子永康王烏雲執趙延夀而自稱帝以吕祖謙標目脩壬辰楚王希範卒其弟希廣立以吕祖謙標目脩甲午晉以劉崇為北京留守以新紀脩丙申晉主知逺如汴京史𢎞肇取澤州以新紀通鑑脩蕭翰北遁以郇國公李從益知南朝軍國事從益遣使迎晉主知逺以新紀通鑑脩遼主烏雲北歸以安國節度使達爾瑪守恒州以吕祖謙標目脩六月吳越國王𢎞佐卒其弟𢎞倧立以吕祖謙標目脩丙辰晉主知逺次洛陽殺李從益及王太妃於汴以吕祖謙標目脩解題曰按新史列傳契丹至京師趙延夀所尚明宗公主已死耶律徳光乃為延夀娶從益妹是為永安公主公主養於王淑妃妃至京師主婚禮徳光拜從益為彰信軍節度使從益辭不之官與妃俱還洛陽徳光北歸留蕭翰守汴州漢髙祖起太原翰欲北去乃使使者迫之以東遂以從益權知南朝軍國事從益御崇元殿翰率契丹諸將拜殿上晉羣臣拜殿下羣臣入謁太妃妃曰吾家子母孤弱為翰所迫此豈福邪禍行至矣乃以王松趙上交為左右丞相李式翟光鄴為樞宻使燕將劉祚為侍衞親軍都指揮使翰留契丹兵千人屬祚而去漢髙祖擁兵而南從益遣人召髙行周武行徳等為拒不至乃與王松謀以燕兵閉城自守妃曰吾家亡國之餘安敢與人争天下乃遣人上書迎髙祖髙祖聞其嘗召行周而不至遣郭從義先入京師殺妃母子妃臨死呼曰吾家母子何罪何不留吾兒使毎嵗寒食持一盂飯灑明宗墳上聞者悲之餘見通鑑甲子晉主知逺至自太原戊辰改國號漢以新紀吕祖謙標目脩遼太后發兵拒遼主烏雲兵敗見囚烏雲改元以吕祖謙標目脩秋七月甲午漢封馬希廣為楚王以通鑑脩天雄節度使杜重威天平節度使李守貞歸命漢徙重威歸徳節度使以歸徳節度使髙行周代之䕶國節度使趙匡賛為晉昌節度使守貞代之閏月重威反庚午以行周為招討使辛未楊邠郭威王章皆為正使以新紀通鑑脩庚辰漢立髙祖光武二廟追尊髙祖考妣以下為帝后凡六廟以新紀通鑑脩洺州歸漢八月控鶴指揮使李榮等逐達爾瑪以恒州歸漢以吕祖謙標目脩漢敕盜皆抵死以吕祖謙標目脩漢封吳越王𢎞倧為吳越王以通鑑脩唐宋齊丘罷以通鑑脩南漢主晟殺其諸弟以吕祖謙標目脩解題曰按路振九國志晟殺其弟浩昌等十四人龑之諸子盡矣餘見通鑑九月甲戌漢以吏部尚書竇貞固守司空兼門下侍郎翰林學士李濤為中書侍郎同平章事以新紀脩庚寅漢主如魏州趙匡賛降蜀解題曰匡賛延夀之子契丹所立也冬十一月丁丑杜重威降漢以為太傅中書令以通鑑吕祖謙標目脩己夘漢史𢎞肇領歸徳節度使兼馬步都指揮使劉信領忠武節度使兼馬步副都指揮使以吕祖謙標目脩解題曰宋州故屬宣武軍後唐曰歸徳十二月癸巳漢主至自魏州以新紀脩吳越誅李達以十國紀年脩漢鳯翔節度使侯益降蜀以吕祖謙標目脩解題曰益契丹所署也吳越將胡進思廢其主𢎞倧立𢎞倧之弟俶以新史世家脩漢敕犯私鹽麯皆抵死以通鑑脩漢髙祖皇帝乾祐元年年南唐元宗皇帝保大六年一南漢中宗皇帝乾和六蜀秦國公孟昶廣政十年吳楚王馬希廣俶南平王髙保融越淮海王錢遼天授二年春正月乙夘漢改元以新紀脩趙匡賛侯益復降漢以吕祖謙標目脩己未漢主更名暠以通鑑脩漢以前威勝節度使馮道為太師以通鑑脩丁丑漢主大漸楊邠遣忠武節度使劉信之鎮漢主暠殂以新紀通鑑脩解題曰邠專輒之端見矣庚辰漢誅杜重威及其三子二月辛巳朔皇子周王承祐即皇帝位丁亥尊皇后曰皇太后以新紀通鑑脩漢鳯翔巡檢使王景崇及蜀人戰於大散關敗之以新紀脩三月漢永興軍將趙思綰據城李守貞反自稱秦王以通鑑脩甲戌漢以王景崇為邠州留後不受命以通鑑脩遼節度使耶律忠棄定州遁晉末所陷州縣皆復於漢以吕祖謙標目脩漢李濤請出楊邠郭威丁丑罷以吕祖謙標目脩夏四月漢以楊邠為中書侍郎同平章事兼樞宻使郭威為樞宻使王章同平章事以新紀通鑑脩解題曰按新史列傳是時漢方新造承契丹之後京師空乏而西三叛作周太祖用兵西方章供饋軍旅未嘗乏絶然征利剝下民甚苦之往時民租章増省耗緍錢出入皆以八十為陌章減其出者陌三縣民訴田者必至州縣覆之以括其陷田天下由此重困餘見通鑑沈括曰唐自皇甫鎛為墊錢法至昭宗末乃定八十為陌漢王章又減三錢以七十七為陌輸官仍用八十壬午漢以鎮寧節度使郭從義為永興都部署戊子保義節度使白文珂為河中都部署以新紀舊傳脩解題曰澶州故屬天雄軍晉置鎮寧軍六月戊寅朔日有食之通鑑乙酉漢王景崇降蜀亦受李守貞官爵以通鑑脩秋七月庚申漢郭威同平章事以通鑑脩蜀以茶酒使王昭逺知樞宻使以吕祖謙標目脩八月壬午漢以郭威為西面招慰安撫使以通鑑脩乙未漢封吳越王俶為國王以通鑑脩冬十月蜀遣兵救王景崇漢鳯翔節度使趙暉破走之以通鑑脩癸夘南平王髙從誨卒其子保融知荆南留後以吕祖謙標目脩十一月甲寅漢族誅太子太傅李崧以通鑑脩十二月丁丑漢以髙保融為節度使以通鑑脩漢隠帝劉承祐乾祐二年年南唐元宗皇帝保大七年南漢中宗皇帝乾和七蜀秦國公孟昶廣政十二年越楚王馬希廣吳淮海王錢俶南平王髙保融遼天授三年解題曰宋庠紀年通譜隠帝即位三年卒不建元以至亡國雖天命有改亦人禮之先亡乎徐無黨曰五代亂世以嗣君即位者五而改元不依古者四梁末帝晉出帝即位逾年宜改元而不改又明年然後改漢隠帝周世宗皆仍稱先帝年號終其世不改帝名承祐年名乾祐舉國臣民共稱而不改避當時莫大之失夏五月乙丑趙思綰降漢尋殺之以新紀脩六月癸酉朔日有食之以通鑑脩秋七月壬戌漢李守貞自殺以吕祖謙標目脩八月漢郭威以頭子命白文珂代西京留守王守恩以通鑑脩楚武平節度使馬希蕚攻潭州敗還以吕祖謙標目脩漢郭威入朝九月乙巳溥加執政藩鎮恩以通鑑脩解題曰威此舉蓋推廣馮道不愛官物以賞士卒之意不待他日即位班賞已收中外之心矣事見通鑑吳越募墾荒田者勿收其税以通鑑脩冬十月遼冦趙魏己丑漢遣郭威禦之十一月遼兵遁以新紀脩十二月癸巳漢王景崇自殺以吕祖謙標目脩是嵗留從効取漳州唐以為清源節度使以十國紀年脩漢隠帝乾祐三年年南唐元宗皇帝保大八年年南漢中宗皇帝乾和八蜀國公孟昶廣政十三楚王馬希蕚錢南平王髙保融年吳越淮海王俶遼天授四春正月唐罷招討使以通鑑脩夏四月壬午漢以郭威為天雄節度使領樞宻使以新紀脩解題曰按新史列傳周太祖出鎮魏州史𢎞肇議帶樞宻行蘇逢吉楊邠以為不可與𢎞肇争於是卒如𢎞肇議𢎞肇恨之明日㑹飲竇貞固第𢎞肇厲聲舉爵屬太祖曰昨日廷論何為異同今日與公飲此逢吉與邠亦舉大爵曰此國家事也何必介意乎遂俱飲釂餘見通鑑胡寅曰國有異政則變風作政無二門則上下治故善致理者政事必出於中書五代輕宰相而重樞宻使是政出於二矣又命樞宻使兼節度使是政出於三矣其後又詔河北兵甲但見郭威文書立皆禀應是政出於四矣廢君易國反覆如奕棋不亦宜乎五月己亥漢以府州蕃漢馬步都指揮使折徳扆為團練使以通鑑脩冬十一月甲子朔日有食之通鑑辛未楚王馬希蕚攻潭州以通鑑脩丙子漢族誅楊邠史𢎞肇王章使誅郭威弗克丁丑威反辛巳義成節度使宋延渥降之壬午泰寧節度使慕容彦超屯於七里甲申漢主勞軍於劉子陂彦超擊威弗克解題曰七里今河南府洛陽縣有七里澗洛陽記曰城東有石橋以跨七里澗朱敏求河南志後魏城東七里橋是也水經注穀水逕張方壘北方圍洛陽於城西七里鑿壘河南志後魏城西七里有張方橋是也隋因漢魏故城西徙十八里五代因之則前日之城東固在其東而城西亦在其東當攷劉子陂在七里店之北乙酉漢主承祐奔趙村自殺蘇逢吉自殺解題曰按實錄郭允明知事不濟抽刃犯蹕而崩舊史帝紀郭允明知事不濟乃剚刃於帝而崩允明自殺周太祖紀允明弑漢帝於北郊新史本紀郭允明弑帝列傳帝走趙村郭允明從後追之弑帝於民舍乃自殺劉恕曰允明帝所親信何由弑逆蓋郭威兵殺帝事成之後諱之因允明自殺歸罪耳通鑑遂謂弑帝未必是允明要之皆臆決也不如以實錄新舊史為據丙戌威入京師大掠己丑威請立武寧節度使贇為嗣遣馮道迎之解題曰按九國志隠帝遇弑周祖駐兵京師將謀篡代恐人心未洽於是議立嗣君五代史闕文新史列傳周祖入京師百官謁之周祖見道猶設拜意道便行推戴道受拜如平時徐曰侍中此行不易周祖意沮故禪代之謀稍緩遂陽立湘隂公贇為漢嗣遣道迎贇於徐州贇未至太祖將兵北至澶州擁兵而反遂代漢陶岳五代補錄湘隂公鎮徐州辟郭忠恕為推官忠恕知事變正色責馮道曰令公累朝大臣誠信著天下四方無賢不肖皆謂之長者今一旦作脱空漢前功俱棄令公之心安乎道無以對因勸湘隂公殺道奔河東猶豫不決遂及禍通鑑考異曰周祖既克京城所以不即為帝者蓋以漢之宗室崇在河東信在許州贇在徐州若遽代漢慮三鎮舉兵以興復為辭則中外必有響應者故陽稱輔立宗子信素庸愚不足畏贇乃崇子故迎贇立之使兩鎮息謀俟其離徐已逺去京稍近然後併信除之則三鎮去其二矣然後自立則所與為敵者惟崇而已此其謀也豈馮道受拜之所能沮乎道之所以受拜如平時者正欲示器宇凝重耳事見通鑑唐潞王舉兵逼京師馮道望風勸進又先衆人雅拜今見周祖受拜如平時何前之恭而後之倨耶或謂潞王養子疑乎為君者也故道拜之不疑周祖臣也道之義固不容屈故受拜以挫其鋭是不然道嘗為周祖畫䇿其交已深至是周祖之事已成故陽為不屈以示雅量其實内有恃恩之心知其必不殺己也道老於販國其情狀豈難見乎壬辰太后臨朝以宣徽使王峻為樞宻使侍衞步軍都指揮使王殷為侍衞親軍都指揮使以新紀傳脩解題曰按五代史闕文郭威本文作周祖後倣此自鄴起兵劉銖盡誅周祖之家子孫婦女十數人極其慘毒及隠帝遇害威以漢太后令收銖下獄使人責銖殺其家對曰銖為漢家戮叛族爾不知其他周世宗朝史官脩漢隠帝實錄諱銖之忠言而不載故通鑑不取惟畧見於新史云遼冦漢十二月甲午朔郭威擊之以吕祖謙標目脩甲辰楚馬希蕚陷潭州殺馬希廣自立以吕祖謙標目脩癸丑漢郭威至澶州而旋己未廢贇為湘隂公其將鞏廷美楊温據徐州威殺忠武節度使信庚申監國以新紀傳吕祖謙標目脩大事記續編卷七十六
