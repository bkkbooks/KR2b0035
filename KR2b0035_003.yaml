body:
  text: 大事記續編卷三明王禕撰漢孝元皇帝初元元年春正月辛丑葬社陵上諡曰孝宣皇帝以本紀修賜諸侯王公主列侯黃金二千石以下錢帛有差大赦天下以本紀修以散騎諫大夫給事中劉向為散騎宗正給事中以荀悅漢紀修解題曰元帝即位蕭望之選白宗室明經達學散騎諌大夫劉更生給事中餘見通鑑丙午立倢妤王氏為皇后封其父禁為陽平侯以列傳修解題曰初濟北王安失國齊人謂之王家因以為氏孫賀為武帝繡衣御史徙魏郡元城建公曰昔春秋沙麓崩晉史卜之曰陰為陽雄土火相乘故有沙麓崩後六百四十五年宜有聖女興其齊田乎今王翁孺徙日月當之後八十年當有貴女興天下云禁本始三年生政君禁有四女八男政君在身夢月入其懷年十八入掖庭為家人子帝令擇後宮家人子虞侍太子政君與在其中送太子宮見於丙殿一幸有身甘露三年生成帝於甲館畫堂夫王莽變天下以諂偽自謂裔出黃虞其詳不可致詰然則沙麓夢月之類皆假神怪以誑愚俗耳班固乃從而盡紀之柳宗元作貞符如玄鳥巨迹白魚流火之異一切排詆之以扶正道固安足以語此以公田及苑可省者賑業貧民賦貸種食以本紀修封外祖父同産弟子中常侍許嘉為平恩侯以本紀修夏四月遣光祿大夫褒等十二人循行天下以本紀修解題曰詔曰朕承先帝之聖緒獲奉宗廟戰戰兢兢間者地數動而未靜懼於天地之戒不知所由方田作時朕憂蒸庶之失業臨遣光祿大夫褒等十二人循行天下延登賢俊招顯側陋因覽風俗之化相守二千石誠能正躬勞力一明教化以親萬姓則六合之內和親庶幾乎無憂矣書不云乎股肱良哉庶事康哉布告天下使明知朕意史稱元帝號令溫雅有古風烈故録此詔亦見其文有餘實不足也詔郡國被災甚者毋出租賦江湖園池屬少府者假貧民以本紀修賜宗室為三老孝弟力田鰥寡孤獨帛吏民五十户牛酒以本紀修六月以民疾疫損太官膳減樂府員省苑馬以振困乏以本紀修秋八月上郡屬國降胡亡入胸奴以本紀修九月關東郡國十一大水飢令宮館希幸者勿治減榖食馬肉食獸以本紀修遣使徵王吉貢禹吉道病死以禹為諫議大夫以列傳修解題曰元帝即位召王吉貢禹與武帝召申公枚乘同意不可謂無志於為治者吉死而禹亦耄及不競惜哉事見通鑑是歲初置戊巳校尉屯田車師故地以百官表列傳修解題曰顔師古曰甲乙丙丁庚辛壬癸皆有正位惟戊巳寄治耳今所置校尉亦無常居故取戊巳為名有戊校尉巳校尉一説戊巳居中鎮覆四方今校尉亦處西域之中撫諸國也按校尉屯田車師前王庭則有常居矣非寄治也西域自有都護校尉特其屬爾鎮覆四方非其所任况車師王庭亦非西域之中蓋戊巳土也屯田耕種以土為事故以名官也餘見通鑑詔除減律令以刑法志修解題曰見哀帝建平三年光武建武十四年解題漢孝元皇帝初元二年春正月帝幸甘泉郊泰畤以本紀修下蕭望之周堪劉向獄皆免為庶人以列傳通鑑修解題曰此初逐受遺大臣也初宣帝不甚從儒術任用法律而中書宦官用事中書令𢎞恭久典樞機明習文法與車騎將軍史高為表裏論議常獨持故事不從望之等望之以為中書政本宜以賢明之選自武帝遊宴後廷故用宦者白欲更置士人繇是大與恭顯忤餘見通鑑陳瓘曰宣帝以兵柄授許史以樞機付恭顯而歸過於儒不亦悖乎二月丁巳立弟竟為清河王以諸侯王表及本紀修戊午隴西地震毁落太上皇廟敗城郭官寺民屋以荀悅漢紀修三月立廣陵王太子霸為王本紀罷黃門乘輿狗馬水衡禁囿宜春下苑少府佽飛外池嚴籞池田假貧民以本紀修解題曰晉灼曰葬二世杜南宜春苑中顔師古曰即今京城東南隅曲江池是如淳曰佽飛具矰繳以射鳬鴈故有池也蘇林曰嚴籞射苑也詔災甚者無出租賦赦天下舉茂材直言極諫之士以本紀修解題曰翼奉奏封事曰臣聞人氣內逆則感動天地天變見於星氣日蝕地變見於竒物震動所以然者陽府其精陰用其形猶人之有五藏六體五藏象天六體象地故藏病則氣色發於面體病則欠申動於貌古者朝廷必有同姓以明親親必有異姓以明賢賢今左右無同姓獨以舅后之家為親異姓之臣又疏王后之黨滿朝非特處位執尤奢潛過度陰氣之盛不亦宜乎又聞未央建章甘泉宮才人各以百數皆不得天性及諸侯王國與其後宮宜為設員出其過制者今異至不應災將隨之其法大水極陰生陽反為大旱甚則火災春秋宋伯姬是矣餘見通鑑夏四月丁巳立子驁為皇大子賜御史大夫爵關內侯中二千石右庶長天下當為父後者爵一級列侯錢以荀悅漢紀修賜蕭望之爵關內侯給事中以列傳通鑑修六月關東飢本紀秋七月地震北海水溢詔公卿陳過失以本紀修徵周堪劉向為中郎尋下獄免為庶人解題曰堪向至是再用而再黜矣冬十二月中書令𢎞恭僕射石顯譖蕭望之望之自殺以本紀修解題曰劉更生使其外親上變事言春秋地震為在位執政太盛也不為三獨夫動亦已明矣前𢎞恭奏望之等獄決三月地大震恭移病出後復視事天陰雨雪由是言之地動殆為恭等書奏恭顯疑更生所為白請考姦詐辭果服遂逮更生繫獄下太傅韋玄成諫大夫貢禹與廷尉雜考劾更生前為九卿坐與望之堪謀排車騎將軍高許史氏侍中者毁離親戚欲退去之而獨專權為臣不忠幸不伏誅復蒙恩徵用不悔前過而教令人言變事誣罔不道更生坐免為庶人而望之亦坐使子上書自寃前事恭顯白令詣獄置對望之自殺餘見通鑑夫韋玄成貢禹世之所謂儒者也豈不知望之更生國之楨幹縱不能如鄭昌之訟寬饒慶忌之救劉輔亦何忍傳會貴幸而中以深文乎今劾更生罪至不道是殆觀望恭顯許史之意耳儒者若此豈有益於人之國哉張拭曰望之向輔初政以元帝天資之弱而外有史高總朝廷之事內有恭顯制樞機之權可謂孤危之甚要當艱深其慮正固其守誠意懇惻以廣上心人才兼收以強國勢積之以久羣心歸而理勢順庶幾可為此易屯膏小貞之義也今二子綢繆經理未嘗有一日之功遽白罷中書宦官其機已盡露而無餘既不蒙信用而中外小人並起而乘之以鄭朋之傾邪而使之待詔至於華龍之汙穢亦欲入其黨彼蓋有以召之矣袁安任隗當竇憲強橫之時非惟不能加害而卒能去之以其所處者正也二子曾不知此至於使外親上變事與子上書則又其無識之甚者矣𢎞恭死石顯為中書令以通鑑修漢孝元皇帝初元三年春令諸侯相位郡守下本紀解題曰顔師古曰諸侯謂諸侯王也棄珠崖郡以紀傳修解題曰揚雄曰珠崖之絶捐之之力也否則介鱗易我衣裳事見通鑑夏四月乙未茂陵白鶴館災赦天下以五行志修解題曰通鑑據本紀作乙未晦劉羲叟長厯四月癸丑晦非乙未也五行志但作乙未今從之旱荀悅漢紀立長沙王旦弟宗為王通鑑六月詔罷甘泉建章宮衛令就農百官條奏省費以本紀修以周堪為光祿勳堪弟子張猛為光祿大夫給事中以列傳通鑑修漢孝元皇帝初元四年春正月帝幸甘泉郊泰畤三月幸河東祠后土以本紀修赦汾陰徒通鑑漢孝元皇帝初元五年春正月以周子南君為周承休侯本紀三月帝幸雍祠五畤本紀夏四月有星孛于參詔太官所具減半乘輿馬無乏正事而已罷角抵上林宮館希御幸者齊三服官北假田官鹽鐵官常平倉及博士弟子員省刑罰七十餘事以本紀荀悅漢紀修解題曰用貢禹諸儒議也詔曰朕之不逮序位不明衆僚又慮未得其人元元失望上感皇天陰陽為變咎流萬民朕甚懼之乃者關東連遭災害飢寒疾疫天下終命詩不云乎凡民有喪匍匐救之其令太官毋日殺所具各減半乘輿秣馬毋乏正事而已顔師古曰正事謂駕供祭祀搜獵之事非遊田者也罷角抵上林宮館希御幸者齊三服官李斐曰齊國舊有三服之官春獻冠幘縰為首服紈素為冬服輕綃為夏服凡三吳莘曰按地理志齊郡臨淄縣有服官三服官者言有官舍三所非謂首服冬服夏服而名官也貢禹論三服官作工各數千人言各則知其非一矣漢紀載此疏乃去各字非也襄邑有服官獨不能蓋所供龍衮之屬禮不可缺至臨淄三官固可省者禹又言三工官費五千萬亦謂每一工官為費若此也北假田官晉灼曰胸奴傳秦始皇渡河據陽山北假中王莽傳五原北假膏壤殖榖北假地名鹽鐵官始元欲罷而未能至是罷之永光復常平倉簫望之謂耿壽昌欲近糴漕關內之榖築倉治船費直二萬萬餘其擾動可見博士弟子毋置員以廣學者賜宗室子有屬籍者馬一匹至二駟三老孝者帛人五匹弟者力田二匹鰥寡孤獨二匹吏民五十户牛酒省刑罰七十餘事見哀帝建平三年解題除光祿大夫以下至保同産之令應劭曰舊時相保一人有過皆當坐之顔師古曰特為郎中以上除此令者所以優之也令從官給事宮司馬門者得為大父母父母兄弟通籍顔師古曰從官親近天子常侍從者也司馬門者宮之外門也衛尉有八屯衛侯司馬主衛士僥巡宿衛每面各二司馬故衛宮之外門為司馬門應劭曰籍者為二尺竹牒記其年紀名字物色縣之宮門案省相應乃得入也令民七歲乃出口錢以列傳荀悅漢紀修解題曰貢禹上書古民亡賦算口錢起武帝征伐四夷重賦於民民産子三歲則出口錢故民重困至於生子輒殺甚可悲痛宜令兒七歲去齒乃出口錢年二十乃算民産子七歲乃出口錢自此始也六月辛酉以長信少府貢禹為御史大夫冬十二月丁未禹卒以長信少府薛廣德為御史大夫以百官表紀傳修解題曰禹在位數言得失初石顯聞衆人胸胸言已殺前將軍蕭望之望之當世名儒顯恐天下學士姍已病之是時諫大夫貢禹明經著節顯使人致意深自結納因薦禹厯位九卿至御史大夫禮事之甚備議者於是稱顯以為不妬譖望之矣後漢曹節以陳蕃竇氏既誅海內多怨欲借寵時賢以為名白靈帝拜韋著為東海相事相類餘是通鑑胸奴郅支單于殺漢使者西走康居以紀傳修司隸校尉諸葛豐劾侍中許章收豐司𨽻節以列傳荀悅漢紀修解題曰豐為司𨽻校尉刺舉無所避時侍中許章以外屬貴幸奢淫不奉法賓客犯事與章相連豐按劾章欲奏其事適逢許侍中私出豐駐車舉節詔章曰下欲收之章迫窘馳車去豐追之許侍中因得入宮門自歸上豐亦上奏於是收豐節司𨽻去節自豐始漢孝元皇帝永光元年春正月帝幸甘泉郊泰畤以本紀修三月詔丞相御史舉質朴敦厚遜讓有行者光祿歲以此科第郎從官本紀解題曰顔師古曰始令丞相御史舉此四科人以擢用之而見在郎及從官又令光祿每歲依此科考校定其第高下用知其人賢否也三月赦天下無田者貸種食以本紀修解題曰詔曰五帝三王任賢使能以登至平而今不治者豈斯民異哉咎在朕之不明亡以知賢也是故壬人在位而吉士雍蔽重以周泰之弊民漸薄俗去禮義觸刑法豈不哀哉繇此觀之元元何辜其赦天下令厲精自新各務農業無田者皆假之貸種食如貧民呂祖謙曰漢至元帝百餘年矣文景武昭宣之盛為兩漢之冠永光元年之詔猶云承周秦之敝俗化陵夷風俗之難格如此雨雪隕霜殺桑以五行志修秋七月史高免以百官表荀恱漢紀修九月隕霜殺稼大飢以五行志通鑑修戊子以侍中衛尉王接為大司馬車騎將軍以百官表荀恱漢紀修解題曰荀恱曰接者宣帝舅王無故之子也薛廣德免帝欲以太中大夫孔霸代之霸固讓乃以太子太傅韋玄成為御史大夫以列傳修解題曰按列傳自御史大夫貢禹卒及薛廣德免輒欲用霸霸讓位自陳至于再三上深知其至誠乃弗用孔叢子載其辭語曰臣世以經學為業家轉相承作為訓法今俗儒繁法逺本雜以妖妄侍中安國受詔綴集古義臣乞為太常典臣家業與安國紀綱古訓帝遂拜太常孔叢子偽書也不足據待詔賈捐之棄市以列傳修冬十二月于定國免以列傳百官表修城門校尉諸葛豐免以列傳通鑑修胸奴呼韓邪單于歸北庭朱熹綱目徙清河王竟為中山王以通鑑修解題曰中山故郡也景帝三年為國今中山府祁州之地左遷光祿勳周堪河東太守光祿大夫張猛槐里令以列傳修解題曰以石顯許史等譖故也於是堪等三用而三黜矣事見通鑑漢孝元皇帝永光二年春二月赦天下以本紀修解題曰據胡安國通鑑舉要厯補遺此後赦之無事義者不載丁酉韋玄成為丞相復封扶陽侯右扶風鄭𢎞為御史大夫以列傳百官表修三月壬戌朔日有食之令內郡國舉茂材賢良直言以本紀修夏六月赦天下本紀秋七月西羌反遣右將軍馮奉世擊之八月以太常任千秋為奮威將軍别將五校並進大破之本紀解題曰按後漢列傳無弋爰劒曾孫忍忍子研景帝時研種留何率種人求守隴西塞於是徙於狄道安故臨洮氐道羌道縣武帝開西河四郡隔絶羌胡不得交關先零與封養牢姐與胸奴通遣李息徐自為擊平之始置護羌校尉統領焉羌乃去湟中依西海鹽池左右宣帝時先零渡湟水郡縣不能禁趙充國破平之研十三世孫燒當立元帝時彡姐等七種冦隴西馮奉世破降之按先零之反也充國之計在於招降罕研解散虜謀故雖發三輔中都官徒弛刑及佽飛羽林胡越騎郡國材官郡騎士合六萬人用許延壽辛武賢為將軍而充國終守罷騎兵屯田之䇿而先零以降彡姐旁種之反也奉世之計在於師不久暴而天誅亟決故雖已調萬二千人必待發三輔河東𢎞農越騎迹射佽飛彀者羽林及呼速參嗕種六萬餘人而後進而彡姐以破其計不同其成功則一而已班固謂奉世為折衝宿將功名次充國其確論哉事見通鑑顔師古曰彡音所亷反又音先亷反姐音紫天雨草有雄雞生角以五行志荀恱漢紀修解題曰荀恱曰本志以為黃龍初元永光雞變三見王氏僭位之明也漢孝元皇帝永光三年春二月馮奉世還京師以為左將軍爵關內侯以通鑑修三月立子康為濟陽王以本紀修解題曰按漢地里志後漢郡國志樂史寰宇記歐陽志輿地廣記宣帝甘露二年更濟陰為定陶四年復成帝河平復為定陶哀帝復後漢因之晉為濟陽郡杜預注曹國在濟陰定陶而晉志乃有濟陽郡郡更名在預之後也宋興仁府濟濮拱單徐五州廣濟軍之地夏四月平昌考侯王接薨秋七月許嘉為大司馬車騎將軍以通鑑修冬十一月地震雨水通鑑復鹽鐵官博士弟子員本紀漢孝元皇帝永光四年春三月帝幸雍祠五畤以本紀修夏六月甲戌孝宣園東闕災本紀戊寅晦日有食之詔直言無所諱以本紀修以周堪為光祿大夫領尚書事張猛為太中大夫堪尋卒中書令石顯譖猛猛自殺以列傳修解題曰是時孝宣廟闕災其晦日食帝召諸前言日變在堪猛者責問皆稽首謝乃下詔曰河東太守堪先帝賢之命而傅朕資質淑茂道術通明論議正直秉心有常發憤悃愊信有憂國之心以不能阿尊事貴孤特寡助抑厭遂退顔師古曰厭一甲反不伸也卒不克明往者衆臣見異不務自修深惟其故而反暗昧説天託咎此人朕不得已出而試之以彰其材堪出之後大變仍臻衆亦默然堪治未期年而三老官屬有識之士詠頌其美漢敬三老之風至叔世猶然如頌至尊之類是也使者過郡靡人不稱此固足以彰先帝之知人而朕有以自明也俗人乃造端作基非議詆欺或引幽隱非所宜明意疑以類欲以陷之朕亦不取也朕迫於俗不得專心帝之優柔不斷如此乃者大暑大異朕甚愳焉今堪年衰歲暮恐不得自信排於異人將安究之哉其徵堪詣行在所拜為光祿大夫秩中二千石領尚書事猛復為太中大夫給事中餘見通鑑堪等於是四任用矣愈用而愈不競惜哉以帝之知堪如此而卒使之厭抑以死此郭公之所以亡國也歟秋九月戊子罷衛思后園及戾園本紀冬十月乙丑罷郡國祖宗廟諸陵分屬三輔以本紀修作初陵勿置縣邑徙民以本紀修漢孝元皇帝永光五年春正月帝幸甘泉郊泰畤三月幸河東祠后土以本紀修秋穎川水以本紀修冬大獵於長楊以本紀修十二月乙酉毀太上皇孝惠帝寢廟園以本紀修河決清河以溝洫志修解題曰自塞宣防後河復北決於館陶今大名府館陶縣分為屯氏河河水别出為屯氏河東北至章武入海顔師古曰隋誤以為毛氏河東北經魏郡清河信都勃海入海廣深與大河等故因其自然不隄塞也此開通後館陶東北四五郡雖時小被水害而兖州以南六郡無水憂地節中光祿大夫郭昌使行河北曲三所水流之勢皆邪直貝丘縣屬清河郡恐水盛隄防不能禁乃各更穿渠直東經東郡界中不令北曲渠通利百姓安之永光五年河決清河靈鳴犢口而屯氏河絶魏郡宋大名開德隆德三府相磁濬洺四州之地勃海河間安得燕山三府滄霸清棣莫五州永靜保定信安三軍之地東郡滑濮博濟四州濟南東平大名開德興仁信德六府之地靈縣屬清河郡河水别出為鳴犢河東北至信都蓨縣入屯氏河蓨音條漢孝元皇帝建昭元年解題曰宋庠紀年通譜義取建立昭明之義春正月戊辰隕石于梁以五行志修三月帝幸雍祠五畤以本紀修秋八月有白蛾羣飛蔽日以本紀修冬河間王元有罪遷房陵本紀罷孝文太后孝昭太后寢園本紀漢孝元皇帝建昭二年春正月幸甘泉郊泰畤三月幸河東祠后土以本紀修益三河太守秩户十二萬為大都本紀夏六月立子興為信都王以本紀修郎中京房奏考功課吏法令公卿議之以通鑑修八月光祿勳匡衡為御史大夫以百官表傳修閏月丁酉太皇太后上官氏崩以本紀通鑑修冬十一月齊楚地震大雨雪本紀御史中丞陳咸髠為城旦以列傳修以京房為魏郡太守尋徵下獄棄市以本紀列傳修解題曰永光建昭間西羌反日蝕久青亡光陰霧不精房上疏所言屢中天子數召見問房對曰古帝王以功舉賢則萬化成瑞應著末世以毁譽取人故功業廢而致災異宜令百官各試其功災異可息詔使作其事房奏考功課吏法晉灼曰令丞尉治一縣崇教化亡犯法者輒遷有盜賊滿三日不覺則尉事也令覺之自除二尉負其二率相準如此法上令公卿朝臣與房會議皆以房言煩碎不可許上意鄉之時部刺史奏事京師上召見諸刺史令房曉以課事刺史復以為不可行唯御史大夫鄭𢎞光祿大夫周堪初言不可後善之後上令房上弟子曉知考功課事者欲試用之房上中郎任良姚平願以為刺史試考功法臣得通籍殿中為奏事以防壅蔽石顯五鹿充宗皆疾房欲逺之建言宜試以房為魏郡太守得以考功法治郡房自請願無屬刺史得除用它郡人自第吏千石已下歲竟得乘傳奏事天子許焉房自知數以論議為大臣所非內與石顯五鹿充宗有隙不欲逺離左右及為太守憂懼未發上令陽平侯鳳承制詔房止無乘傳奏事房意愈恐去月餘竟徵下獄棄市餘見通鑑胡寅曰君臣之交有淺深交深者聖人猶存不可則止之戒况交淺者乎房事元帝其交固淺陳考功法帝雖向之而公卿朝臣皆以為不可又欲上加親信而不量帝之庸懦不可恃也亦難乎其免矣房學易不明其義徒以災變占候為事此易之末也易曰不出户庭何謂也子曰亂之所生也言語以為階君不密則失臣臣不密則失身房乃每道所對上語於人致石顯之言得入又曰樂天知命故不憂房言災變常中既去朝占曰涌水出道人當逐死知不免矣猶上疏以趙高斤石顯冀上還已是不自信其術也故占候前知之學君子不貴焉惟明乎消息盈虛之理語默進退之機以不失乎時中則易之道也漢孝元皇帝建昭五年夏六月甲辰扶陽共侯韋玄成薨以本紀修壬子晦日有食之不盡如鉤以五行志修秋七月癸亥匡衡為丞相封樂安侯衛尉李延壽為御史大夫以百官表列傳修冬使護西域騎尉甘延壽副校尉陳湯矯發屯田吏士西域胡兵襲擊郅支單于於康居殺之以本紀稽古録修漢孝元皇帝建昭四年春正月縣郅支首藳街十日告祠郊廟羣臣上壽置酒以本紀修解題曰晉灼曰藳街在長安城門內顔師古曰蠻夷邸在此街邸若今鴻臚客館夏四月詔遣諫大夫博士等二十一人循行天下以本紀修六月甲申中山王竟薨本紀藍田地震山崩壅霸水安陵岸崩壅涇水逆流以本紀修解題曰水經霸水從灞陵縣西北流注渭水涇水出藍田縣藍田谷又左合滻水厯白鹿原又北徑軹道上有霸橋又東徑新豐縣東北徑霸城南又北合於渭漢地理志注涇水出安定郡涇陽縣西東南至馮翊陽陵縣入渭涇陽宋原州平高縣陽陵宋京兆府高陵縣漢孝元皇帝建昭五年春三月赦天下以本紀修夏六月庚申復戾園本紀壬申晦日有食之本紀秋七月庚子復太上皇寢廟園原廟昭靈后武哀王昭哀后衛思后園本紀徙濟陽王康為山陽王以列傳通鑑修解題曰山陽故梁國景帝中六年為山陽國武帝建武五年别為郡宋濟州單州襲慶府之地漢孝元皇帝竟寧元年解題曰應劭曰單于願保塞邊竟得以安寧故以冠元顔師古曰應説讀竟為境古字實同但此詔云邊垂長無兵革之事竟者終極之言既無兵革中外安寧豈止境上依本字讀義更𢎞通春正月胸奴呼韓邪單于來朝請罷備塞吏卒郎中侯應陳十不可乃止以本紀通鑑綱目修皇太子冠賜列侯嗣子爵五大夫天下為父後者爵以本紀修三月丙寅以太子少傅張談為御史大夫以通鑑修解題曰石顯見馮奉世父子為公卿著姓女又為昭儀在內心欲附之薦言昭儀兄謁者逡修敕宜侍帷幄天子召見欲以為侍中逡請間言顯顓權天子大怒罷歸郎官其後御史大夫闕羣臣比白舉逡兄大鴻臚野王行能第一天子以問顯顯曰九卿無出野王者然野王親昭儀兄臣恐後世必以陛下度越衆賢私後宮親以為三公上曰善吾不見是餘見通鑑文帝賢皇后弟竇廣國欲以為相曰恐天下以吾私廣國與此政相類然天下終不以元帝為文帝者文帝斷之自已而元帝出於石顯也癸未復孝惠皇帝寢廟園孝文太后孝昭太后寢園本紀以河南太守召信臣為少府以列傳修夏封甘延壽為列侯賜陳湯爵關內侯以紀傳修解題曰初石顯欲以姊妻甘延壽延壽不取及丞相御史亦惡其矯制湯素貪所鹵獲財物入塞多不法既至論功石顯匡衡以為延壽湯擅興師矯制幸得不誅如復加爵土則後奉使者爭欲乘危僥幸生事於蠻夷議久不決劉向上疏言宜除過勿治尊寵爵位以勸有功於是下詔赦延壽湯罪令公卿議封焉餘見通鑑陳瓘曰莎車之事望之據所見若衡於郅支則不能無阿石顯之嫌張耒曰漢公卿論陳湯斬郅支賞其守常不通者則曰是不當賞且開後奉使者乘危僥幸生事蠻夷而竒其功憤其為庸臣所詘者則稱譽贊説宜尊寵以勸有功夫奮不顧身決計出竒以孤軍取其單于之頭梟之藳街自漢擊胸奴以來未有能如此者而以一切矯制生事謂之有罪而赦之不使有尺寸之賞此天下皆知其不近人情然使朝廷遂厚賞之一不問其矯制則人臣不待命而有功者將得以要我故劉向之論善矣而未盡也夫所惡夫賞矯制而開後患者謂其功可以相踵而比肩者也陰山之北凡幾單于自漢擊胸奴獨一陳湯得單于耳若裂地封湯而著之令曰有能矯制斬單于如陳湯者無罪而封侯吾意漢雖欲再賞一人焉雖數十年未有繼也何遽有邀功生事之憂哉帝欲廢太子立山陽王康駙馬都尉侍中史丹泣諫乃止以列傳通鑑綱目修五月壬辰帝崩于未央宮本紀毁太上皇孝惠孝景皇帝廟罷孝文太后孝昭太后昭靈后武哀王昭哀后寢園本紀解題曰初高祖時令諸侯王都皆立太上皇帝廟至惠帝尊高帝廟為太祖廟景帝尊孝文廟為太宗廟所嘗行幸郡國各立廟宣帝復尊孝武廟為世宗廟凡祖宗廟在郡國六十八合百六十七所顔師古曰六十八者郡國之數也百六十七所宗廟之數也而京師自高祖至宣帝與太上皇悼皇考各居陵旁立廟并為百七十六又園中各有寢便殿顔師古曰寢者陵上正殿若路寢便殿者寢側之别殿日祭於寢月祭於廟時祭於便殿寢日四上食廟歲二十五祠晉灼曰漢儀注宗廟一歲為十二祠五月嘗麥六月七月三伏立秋貙婁又嘗菜八月先少饋飱皆一太牢酎祭用九太牢十月嘗稻又飲蒸二太牢十一月嘗十二月臘二太牢又每月一太牢如閏加一祀與此上十二為二十五祠便殿歲四祠又月一遊衣冠而昭靈后武哀王昭哀后孝文太后孝昭太后衛思后戾太子戾后各有寢園與諸帝合凡三十所元帝時貢禹言古者天子七廟今孝惠孝景廟皆親盡宜毁及郡國廟不應古禮宜正定永光四年乃下詔先議罷郡國廟承相玄成等七十人以為宗廟在郡國宜無修奏可因罷昭靈后武哀王昭哀后衛思后戾太子戾后園皆不奉祠後月餘復下詔曰明王制禮立親廟四祖宗之廟萬世不毁所以明尊祖敬宗者親親也惟大禮未備戰栗恐懼其與將軍列侯中二千石二千石諸大夫博士議玄成等四十四人奏議曰禮王者始受命諸侯始封之君皆為太祖以下五廟而迭毁顔師古曰迭互也親盡則去故云迭也毁廟之主藏乎太祖五年而再殷祭言一禘一祫也顔師古曰殷大也禘諦也祫合也一一祭之也祫祭者毁廟與未毁廟之主皆合食於太祖父為昭子為穆孫復為昭古之禮也顔師古曰昭穆者父子易其號序也昭明也穆美也以晉諱改昭為韶祭議曰王者禘其祖自出顔師古曰所從出也以其祖配之而立四廟言始受命而王祭天以其祖配而不為立廟親盡也立親廟四親親也親盡而迭毁親疏之殺示有終也周之七廟以后稷始封文武受命而王是以三廟不毁與親廟四而七臣愚以為高帝宜為帝者太祖之廟世世不毁承後屬盡者宜毁今宗廟異處昭穆不序宜入就太祖廟而序昭穆如禮太上皇孝惠孝文孝景廟皆親盡宜毁皇考廟親未盡如故大司馬車騎將軍許嘉二十九人以為孝文皇帝宜為帝者太宗之廟廷尉忠以為孝武皇帝宜為世宗之廟諫大夫更始等十八人以為皇考上序於昭穆非正禮宜毁於是上重其事依違者一年乃下詔曰王者祖有功而宗有德尊尊之大義也存親廟四親親之至恩也高皇帝為漢太祖孝文皇帝為漢太宗世世承祀傳之無窮孝宣皇帝為後於義一體顔師古曰謂俱為昭也禮孫與祖俱為昭宣帝於昭帝為從孫劉敞曰以孝宣為昭帝後臣子一體也孝景皇帝及皇考皆親盡其正禮儀玄成等奏曰高皇帝為太祖孝文皇帝為大宗孝景皇帝為昭孝武皇帝為穆孝昭皇帝與孝宣皇帝俱為昭皇考廟親未盡太上孝惠廟皆親盡宜毁孝文太后孝昭太后寢祠園宜如禮勿復修奏可後歲餘匡衡為丞相上寢疾夢祖宗譴罷郡國廟上少弟楚孝王亦夢焉上議欲復之衡深言不可上疾連年遂盡復諸所罷廟至是元帝崩衡奏言衛思后戾太子戾后園親未盡孝惠孝景廟親盡宜毁及太上皇孝文孝昭太后昭靈后昭哀后武哀王祠請悉罷勿奉從之厥後成帝以無繼嗣河平元年復太上皇寢廟園世世奉祀昭靈后武哀王昭哀后并食於太上寢廟如故哀帝即位丞相孔光大司空何武奏言損益之禮不敢有與迭毁之次當以時定於是光祿勳彭宣等五十三人皆以為孝武皇帝親盡宜毁大僕王舜中壘校尉劉歆議曰高帝建大業為太祖孝文皇帝德至厚也為文太宗孝武皇帝功至著也為武世宗禮記王制及穀梁傳天子七廟七者其正法數可常數者也宗不在此數中宗變也顔師古曰言非常數故云變也茍有功德則宗之不可預為設數故於殷太甲為太宗太戊曰中宗武丁曰高宗繇是言之宗無數也朱熹曰歆謂宗不在七廟中者蓋恐有德者多占了七廟數其説似是制曰太僕舜中壘校尉歆議可歆又以為禮去事有殺顔師古曰去除也殺漸也去音丘吕反殺音所例反故春秋外傳曰日祭月祀時享歲貢終王祖禰則日祭曾高則月祀二祧則時享壇墠則歲貢張晏曰去祧為壇墠而祭也顔師古曰祧逺祖也築土為壇除地為墠大禘則終王顔師古曰每一王終新王即位蠻夷乃來助祭德盛而遊廣親親之殺也如淳曰遊流也彌逺則彌尊故禘為重矣孫居王父之處正昭穆則孫常與祖相代此遷廟之殺也聖人於祖出於情矣禮無所不順故無毁廟自貢禹建迭毁之議惠景及太上寢園廢而為墟失禮意矣平帝元始中大司馬王莽奏本始元年丞相義等議孝宣皇帝親曰悼園置邑三百家至元康元年丞相相等奏悼園宜稱尊號曰皇考立廟臣愚以為皇考廟不當立又孝文太后南陵孝昭大后雲陵園陵名未正謹與大司徒晏等百四十七人議皆曰孝宣皇帝以兄孫繼統為孝昭後以數故孝元世以孝景及皇考廟親未盡不毁此兩統二父違於禮制臣請皇高祖考廟奉明園毁勿修罷南陵雲陵為縣奏從其議定陶共皇丁傅后之事王莽方指為竒貨招君之過以取名又脅平帝隔絶衛氏故建明皇考廟不當立薄太后趙太后陵名未正平晏等皆從而傳會其説也朱熹曰王制天子七廟三昭三穆與太祖之廟而七大夫士降殺以兩天子太祖百世不遷一昭一穆為宗亦百世不遷宗亦曰世室亦曰祧鄭康成曰逺廟曰祧周為文武之廟遷主藏焉先公藏主於后稷之廟先王藏之於文武之廟明堂有文世室武世室鄭康成曰世室者不毁之名也二昭二穆為四親廟高祖以上親盡則毁而遞遷昭常為昭穆常為穆假令新死者當祔昭廟則毁其高祖之廟而祔於左祧遷其祖之主於高祖之故廟而祔新死者於祖之故廟當祔於穆者其序亦然蓋祔昭則羣昭皆動而穆不動故虞之明日祔於祖父蓋將代居其處故為之祭以告新舊之神也元豐何洵直張璪以此為説而陸佃非稱之曰昭穆者父子之號方其為父則稱昭其為子則穆豈可膠哉壇立於右墠立於左以周制言之則太右遷王親盡去右壇而為墠王季親盡去左祧而為壇左徒無嫌殊不知昭穆本以廟之居東居西主之向南向北而得名初不為父子之號也必曰父子之號則穆之子又安得復為昭哉壇墠之左右亦為去廟之後主藏夾室而又有儔之祭且壇墠又皆一而已昭不可以越壇而徑墠穆不可以有壇而無墠故迭進而無嫌非若廟之有昭穆可以各由其序而遞遷也况昭穆之分自始封以下入廟之時便有定次後雖百世不復移易而其尊卑則不以是而可紊也儀禮所謂以其班祔檀弓所謂祔于祖父者三代之制大略如此漢承秦敝不能深考古制貢禹韋玄成匡衡之徒雖欲正之而終不能以盡合旋亦廢罷六月己未太子即皇帝位謁高廟尊皇太后曰太皇太后皇后曰皇太后本紀解題曰帝既即位丞相匡衡知帝有酒色之失上疏勸上正妃匹之際究經學之意謹威儀之則以明慎始之道上敬納其言然諒暗受朝乃末世弊習衡曽不能正其原乃謂今正月初幸路寢臨朝賀置酒以饗萬方願留神動靜之節使羣下得望盛德休光是不揣其本而齊其末放飯流啜而問無齒決者也以元舅侍中衛尉陽平侯王鳳為大司馬大將軍領尚書事以本紀修秋七月丙戌葬渭陵上諡曰孝元皇帝大赦天下本紀大事記續編卷三
