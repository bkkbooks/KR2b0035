body:
  text: 大事記續編卷四十三明王禕撰梁髙祖武皇帝太清元年孝靜皇帝武定五年魏文帝大統十三年東魏春正月己亥朔日有食之不盡如鈎以魏志修壬寅梁江州刺史湘東王繹都督荆雍等州軍事荆州刺史以梁紀修丙午東魏勃海獻武王髙歡卒以吕祖謙標目修解題曰按北齊書梁史紀傳侯景言於髙歡請兵三萬橫行天下要須濟江縳取蕭衍老公以作太平寺主歡壯其言使擁兵十萬專制河南杖任若己之半體景右足短弓馬非其長所在惟以智謀歡部將髙昻彭樂皆雄勇冠時景常輕之言似豕突勢何所至素輕世子甞謂司馬子如曰王在吾不敢有異王無吾不能與鮮卑小兒共事子如掩其口至是世子為歡本文作神武後放此書召景景先與歡約得書書背微㸃乃来書無㸃景不至又聞歡疾遂擁兵自固歡謂世子曰我雖疾爾靣更有餘憂色何也世子未對又問曰豈非憂侯景叛耶曰然歡曰景專制河南十四年矣常有飛揚跋扈志顧我能養豈為汝駕御也今四方未定勿遽發哀厙狄干鮮卑老公斛律金𠡠勒老公並性遒直終不負汝可朱渾道元劉豐生遠来投我必無異心賀拔焉過兒樸實無罪潘相樂本作道人心和厚汝兄弟當得其力韓軌少戇宜寛借之彭樂心腹難得宜防䕶之少堪敵侯景者唯有慕容紹宗我故不貴之留以與汝宜深加殊禮委以經畧餘見通鑑蘇軾曰齊神武寢疾告其子曰侯景專制河南惟慕容紹宗可以制之我故不貴留以遺汝而唐太宗亦謂髙宗汝於李勣無恩我今責出之汝當授以僕射古之人君所以為其子孫長計遠慮者寧其身不受知人之明而使其子孫專享得賢之利類皆如此胡寅曰伊尹稱成湯曰敷求哲人俾輔于爾後嗣成王將崩召太保等同受顧命葢平日儲養賢才以遺子孫推誠盡禮各得其道豈用私意小智屈之而使子孫以利禄誘之使其臣利禄之人也則可使其臣不以三公易其介也又安得而用之彼紹宗勣皆利禄之人故紹宗逐侯景不盡其力而李勣事髙宗不竭其忠其君臣得失豈不明且驗耶辛亥東魏侯景以河南叛降魏遣司空韓軌討之以吕祖謙標目修二月魏除宫刑以朱熹綱目修庚辰侯景降梁侍中朱异請納之壬午以為大將軍河南王大行臺承制三月甲辰遣司州刺史羊鴉仁等赴懸瓠以吕祖謙標目及本紀修解題曰按梁書列傳景遣其行臺郎中丁和上表請降曰臣與豫治懸瓠城領郡九廣治襄城領郡七頴領郡十荆治穰城領郡八襄治赭陽城領郡六兖治瑕邱南兖治譙城領郡七去彭城百二十里濟治碻磝城領郡五東豫治廣陵城領郡六洛本司州領郡六陽領郡二北荆領郡三北揚治項城領郡五刺史等隂結私圖待時即發函谷以東瑕邱以西咸願歸誠聖朝惟有青徐數州僅須折簡黃河以南臣之所職易同反掌若齊宋一平徐事燕趙髙祖召羣臣廷議尚書僕射謝舉等皆云非宜初帝以是歲正月乙卯於善言殿讀佛經因謂左右曰我昨夢天下太平爾其識之及和至校景實以正月乙卯日定計甞夙興至武德閣口南朝宫苑記太極東堂東有武德水閣梁所起由水閣入永福省有文德武德殿獨言我國家猶若金甌無一傷缺承平若此今便受地詎是事宜脱致紛紜悔無所及中領軍朱异探帝微㫖應聲答曰聖明御宇上應蒼𤣥北土遺黎誰不慕仰為無機㑹未達其心今侯景分魏大半遠歸聖朝豈非天誘其衷人奬其計今若不容恐絶後来之望願陛下無疑帝深納异言又感前夢遂納之餘見通鑑胡寅曰夢固非一端武帝之夢想所生也然國家大計當以義理斷其可否豈有憑一夢而决者乎帝既不能自克朱异又謟以成之悲夫夏四月壬申東魏髙澄入鄴以通鑑修丁亥梁改元以梁紀修解題曰宋庠紀年通譜太清本張天錫年號五月甲辰東魏以髙洋為尚書令領中書監徐州刺史慕容紹宗為左僕射以魏紀通鑑修東魏韓軌圍侯景於潁川魏遣荆州刺史王思政等救之六月魏徵景景辭遂專附梁以吕祖謙標目修東魏以髙洋為京畿大都督髙澄還晉陽秋七月澄自為都督中外諸軍錄尚書事勃海王以通鑑魏紀修八月乙丑梁以南豫州刺史蕭淵明為大都督伐東魏以本紀修解題曰七月方改壽春為南豫州辛未東魏勃海王澄入鄴以魏紀修戊子梁以侯景錄行臺尚書事以通鑑修解題曰按丘悦三國典略澄本文作王欲間景於梁又與景書而謬其辭云本使景陽畔欲與圖西西人知之故景更以圖南為事漏其書於梁人亦不之信餘見通鑑東魏勃海王澄幽其主壬辰殺侍讀蔣濟等九月辛丑還晉陽以魏紀修梁蕭淵明圍彭城冬十一月東魏以慕容紹宗為東南道行臺擊之擒淵明以魏紀修解題曰按北齊書列傳武定八年辛術除東南道行臺尚書東徐州刺史郭志殺郡守髙洋本文作文宣敕術自今所統十餘州地有犯法者刺史先啓聴報以下先斷後表聞齊代行臺兼總民事自術始事見通鑑十二月東魏慕容紹宗擊侯景於渦陽敗績以魏紀傳修梁髙祖武皇帝太清二年孝靜皇帝武定六年魏文帝大統十四年東魏春正月己亥東魏慕容紹宗擊侯景景衆潰以吕祖謙標目修甲辰梁羊鴉仁遁侯景奔壽陽乙卯梁以為南豫州牧光禄大夫蕭介諌不聼以吕祖謙標目本紀修二月東魏求通於梁朱异請許之司農卿𫝊岐諫不聴以吕祖謙標目修三月屈洞獠斬李賁以本紀修夏五月魏宇文泰自為太師以北史周紀修秋七月庚寅朔日有食之以魏志修八月東魏以慕容紹宗為大行臺攻魏王思政於潁州以魏紀修東魏略梁淮北二十三州以通鑑修梁合州刺史鄱陽王範請討侯景朱异沮之戊戌景反甲辰遣開府邵陵王綸督衆軍討之冬十月景陷譙州丁未陷厯陽尚書羊侃請守采石襲壽陽朱异沮之戊申以臨賀王正德都督京師軍事己酉景濟江詔以揚州刺史宣城王大器都督城内軍事羊侃副之辛亥正德降景景圍臺城十一月戊午朔正德稱帝改元正平己巳湘東王繹遣兵赴難庚辰邵陵王綸還軍赴難乙酉敗於𤣥武湖丙戌鄱陽王範遣兵與西豫州刺史裴之髙赴難十二月南兖州刺史南康王㑹理赴難癸巳羊侃卒湘東王繹遣世子方赴難丙辰司州刺史柳仲禮前衡州刺史韋粲前司州刺史羊鴉仁並赴難推仲禮為大都督以吕祖謙標目及本紀修解題曰合州去年以合肥改譙州今滁州清流縣西豫州遷置不一按隋書地理志汝南郡新息縣魏置東豫州梁曰西豫州又曰淮州南齊書州郡志宋分淮東為南豫州治厯陽而淮西為豫州泰始五年省淮西没虜七年復分淮東置南豫齊建元二年太祖以西豫吏民寡省南豫永明二年復置南豫州四年冠軍長史沈憲啓二豫分置以桑堁子亭為斷潁州汝陽在南譙厯陽界内屬西豫廬江居晉熙汝隂之中屬南豫求以潁川汝陽屬南豫廬江還西豫七年南豫州别駕殷瀰稱潁川汝陽寄治譙厯實應屬南豫廬江屬南豫實為便利遠踰西豫非其所願郡領灊舒通典舒州梁為豫州及始新左縣竹産採伐為益不少府州新創希得廬江詔可餘見宋永初二年解題梁髙祖武皇帝太清三年孝靜皇帝武定七年魏文帝大統十五年東魏春正月丁巳侯景攻梁韋粲粲死之柳仲禮擊景破之仲禮被傷不復戰以南史梁紀吕祖謙標目修庚申梁朱异卒以梁紀修解題曰程頥易傳曰明夷之六四以陰居陰而處近君之位是陰邪之人居髙位以柔邪順於君者也六五明夷之君位陽明之主也四以主柔邪順從之以固其交夫小人之事君未有由顯明以道合者也必以隱僻之道自結於上故云入於左腹謂其交深也其交之深故得其心出於門庭既信之於心而後行之於外也邪臣之事闇君必先蠱其心而後能行於外朱异之謂矣戊辰梁封山侯正表以北徐州叛降東魏以通鑑修解題曰北徐州今濠州癸未梁髙州刺史李遷仕天門太守樊文皎赴難文皎戰死以梁紀修解題曰隋地理志梁於髙涼郡置髙州梁壽陽降東魏以吕祖謙標目修二月侯景請和梁中領軍傅岐諌不聴以景為大丞相都督江西四州軍事南康王㑹理等赴難至白下移之南岸湘東王繹軍武城湘州刺史河東王譽軍青草湖信州刺史桂陽王慥軍峽口敕止之景復反三月戊午南康王㑹理等進軍東府北大敗丁卯臺城陷景自為大都督中外諸軍録尚書事邵陵王綸奔㑹稽景廢蕭正德為大司馬以本紀通鑑及吕祖謙標目修解題曰武城水經注江之右有武口水上通安陸之延頭江水東逕若城南注庾仲雍江記若城至武城口三十里信州今䕫州梁湘東王繹殺桂陽王慥以通鑑修壬午侯景遣將陷梁廣陵以吕祖謙標目修梁吴郡降侯景以通鑑修東魏取梁青冀東徐北青州淮陽山陽淮陰郡以本紀通鑑修解題曰按隋地理志梁於東海郡懐仁縣置南北二青州今海州縣也於下邳郡置東徐州今淮陽軍也於下邳郡淮陽縣置淮陽郡屬今淮陽軍下邳縣也夏四月東魏慕容紹宗攻魏潁川溺死以魏紀修五月丙辰梁主以憂殂辛巳太子綱即皇帝位以本紀修魏詔代人改姓者復舊以北史紀修六月丁亥梁立宣城王大器為皇太子以梁紀修東魏拔魏潁川執王思政以吕祖謙標目修梁湘東王繹假黃鉞大都督中外軍事司徒承制以梁紀修癸丑侯景殺蕭正德以列傳修梁湘東王繹使其世子方等攻河東王譽方敗死以梁紀修解題曰方之母徐氏失愛於繹故方亦無寵其所著三十國春秋於父子骨肉之際輙反覆極論亦固有所感慨而然乎方謂是行吾必死之死得其所吾復奚恨其志可悲也已事見通鑑梁廣州刺史元景仲附侯景秋七月甲寅西江督䕶陳覇先誅之迎定州刺史蕭勃為刺史以吕祖謙標目修解題曰按隋書地理志黃州麻城縣陳置定州梁湘東王繹使信州刺史鮑泉攻湘州以梁紀通鑑修梁鄱陽王範歸合州於東魏以乞師以通鑑修八月辛卯東魏立子長仁為太子以魏紀修盗殺東魏勃海王澄于鄴其弟太原公洋以太尉髙岳等守鄴遂如晉陽以吕祖謙標目修九月癸丑侯景遣將陷梁吴興太守張嵊死之以通鑑修梁岳陽王詧伐江陵以救湘州湘東王繹遣兵襲襄陽詧遁繹使將軍王僧辯攻湘州以梁紀修冬十一月梁岳陽王詧附庸於魏湘東王繹遣兵攻詧魏遣開府楊忠救之以通鑑修十二月庚寅侯景陷梁㑹稽盡没三吴之地以吕祖謙標目修梁始興太守陳覇先起兵討侯景以吕祖謙標目修東魏降梁司州盡有淮南之地以吕祖謙標目修梁太宗簡文皇帝蕭綱大寶元年皇帝髙洋天保元年魏文帝大統十六年齊顯祖文宣春正月辛亥朔梁改元以梁紀修戊辰東魏髙洋自為丞相都督中外諸軍録尚書事齊郡王以魏紀修庚午梁邵陵王綸至郢州自稱都督中外軍事承制以通鑑修魏楊忠執梁司州刺史柳仲禮盡有漢東之地以本紀修癸酉梁前江都令祖皓襲取廣陵以梁紀修二月魏楊忠至石城梁湘東王繹請盟而還以通鑑修解題曰此亡江陵之張本也侯景遣其將任約于慶等攻梁諸藩以吕祖謙標目修侯景遣將屠廣陵以本紀修三月東魏齊郡王洋自為王以吕祖謙標目修夏四月辛巳梁王僧辯克湘州殺河東王譽壬寅湘東王繹始發喪以吕祖謙標目修五月東魏齊王洋入鄴甲寅自為相國加九錫戊午即皇帝位改元始給百官禄己未廢其主為中山王追尊父兄為皇帝王太后婁氏為皇太后乙丑降魏封爵六月封功臣及弟十三人為王以通鑑及吕祖謙標目修梁武陵王紀遣其世子圓照赴難湘東王繹止之于白帝以通鑑修齊立李氏為皇后子殷為太子以通鑑修魏立岳陽王詧為梁王秋七月辛酉詧朝于魏以列傳修戊辰任約陷梁江州于慶陷梁豫章以吕祖謙標目修魏宇文泰帥師討齊以魏紀修八月甲午梁湘東王繹遣將軍王僧辯逼郢州以梁紀修齊定律立九等户以齊紀修解題曰朱黼曰古有授田之制故天下有常業之民其貧富髙下未甚相遠也周官地有上中下三等之辨而農亦有上中下三等之差阡陌既開取予無制富者占田無藝以貲力而刼假貧者謀生無術以饑寒而流落髙下敻絶制賦調役詎可復以三等分之髙洋始立九等以别民户富者税其錢貧者役其力更隋唐莫之變也雖錙分銖析不能皆一而類推彚比或可相附授田之制至天寶亡矣今之立法乃曰貲力五十萬以下謂之丙等一百萬以下謂之乙等是二等相去猶不甚遠今曰田一百萬以上以至累數千巨萬皆謂之甲等無乃大相遼乎太史公曰凡編户之民富相埒則卑下之百則畏憚之千則役萬則僕今豪宗巨室所積不知幾百千萬也而使百萬者與之比肩受賦役是奴𨽻而抗封君也安得不摧折顛覆哉必欲均一賦役當以九等為正九月辛酉梁邵陵王綸奔齊昌降於齊齊以為梁王以吕祖謙標目修解題曰齊昌在蘄春縣北通典義陽郡鍾山縣齊置齊昌郡庚午齊主如晉陽以齊紀修解題曰李璋晉陽事跡齊太原郡屬并州移居汾水東任約據梁西陽武昌以吕祖謙標目修解題曰按杜佑通典黃州宋為西陽郡齊分置齊安郡齊州郡志西陽郡有西陽縣隋地理志黄州麻城縣有西陽縣乙亥侯景自為相國漢王加殊禮冬十月乙未景自加宇宙大將軍都督六合軍事以吕祖謙標目修十一月魏師至建州而還河南自洛陽河北自平陽已東入於齊以吕祖謙標目修解題曰通典文宣之後守境而已大抵西則姚襄城洪洞今平陽郡縣北故城晉州武平關三關並綘州正平縣界栢崖河清縣西侯景築軹關河南府濟源界河陽南則虎牢洛陽北荆州孔城防伊闕縣故城汝南郡臨汝郡梁縣西魯城汝南郡魯山縣東北置兵以防周南境要害未遑制置也魏書地形志建州領髙都今澤州晉城縣長平今澤州晉城縣安平澤州端氏縣泰寧澤州沁水縣四郡梁載言十道志澤州魏孝明置建州隋改澤州胡寅曰宇文泰為髙洋篡國而興師則不患於無名矣乃逡巡而退何也無諸已而後可以非諸人泰弑君之人也參度彼此尚何髙洋之問哉使泰無弑君之事當此機㑹舉師東伐則齊未可知也古之人所以大過人者無他焉不行不義不殺不辜不作茍免不事茍得而已事見通鑑梁秦州刺史徐文盛大破任約于貝磯以通鑑修解題曰水經注江水東逕貝磯北在武昌崢嶸洲之下侯景殺梁南康王㑹理等以通鑑修十二月齊主還鄴以通鑑修解題曰齊以晉陽得國自是徃来如别都然今後非有他役不書魏作租庸調府兵以李鄴侯家傳及吕祖謙標目修解題曰按魏書列傳初魏孝莊帝拜爾朱榮柱國大將軍位丞相上榮敗後此官遂廢大統三年文帝復以宇文泰為之其後功參佐命望實俱重者亦居此職宇文泰督中外軍廣陵王欣懿戚從容禁闥而已此外趙郡公李弼隴西公李虎河内公獨孤信南陽公趙貴常山公于謹彭城公侯莫陳崇各督二大將軍分掌禁旅今之稱門閥者咸推八柱國家十二大將軍廣王贊淮王育齊王廓章武公宇文導平原公侯莫陳順髙陽公達奚武陽平公李遠范陽公豆盧寧化政公宇文貴博陵公賀蘭祥陳雷公楊忠忠武公王雄各統開府二人每一開府領一軍是為二十四軍北史列傳十二大將軍十五日上則門攔陛㦸警晝巡夜十五日下則教旗習戰無他賦役每兵唯辦弓刀一具月簡閲之甲槊戈弩並資官給鄴侯李泌家傳唐德宗曰朕欲復府兵之制如何對曰初置府兵周文帝與蘓綽之謀也自三代之後無與為比雖戰國之教士武卒伎擊皆不及時魏之境自陜而右關中及隴右河西而已東魏河北河南殷實富强而自襄鄧蜀漢皆屬於梁初置府不滿百每府郎將主之而分屬二十四軍每軍以開府一人將焉每二開府屬一大將軍二大將軍屬一柱國大將軍仍加號使持節大都督以統之共有衆不滿五萬而敗髙歡平齊滅江陵破陳初置府兵皆於六戸上等已上家有三丁選材力一人免其身租庸調郡守農隙教閲兵仗衣䭾牛驢及糗粮百蓄六家共備餘見唐貞觀十年府兵解題朱熹曰魏代漢晉代魏皆仍舊物至六朝相代率皆祖述弊法不可變更元魏北齊後周中原生靈死於兵禍幾盡故宇文泰蘓綽能立租庸調隋唐因之薛季宣曰韋孝寛所謂廣州義旅山南驍騎北山稽胡皆勁兵也克齊之後并相各置六府而東北别為七總管自此𨽻户有還奴虜有免隱丁有誅府兵有復丁以十二取役以一月代粮畜以六家備民力日以裕矣齊始行天保厯以通鑑修齊以相國府騎兵外兵曹為省掌機密以北齊列傳修解題曰按北齊書列傳齊朝因髙祖作丞相府外兵曹騎兵曹分掌兵馬及天保受禪諸司監咸歸尚書惟此二曹不廢令唐邕白建主治謂之外兵省其後邕建位望轉隆各為省主令中書舍人分判二省事梁帝蕭棟大正元年年齊文宣皇帝天保二年魏文皇帝大統十七春二月乙亥魏拔汝南執邵陵王綸殺之以魏紀修解題曰按本紀綸走至安陸董城死隋地理志安陸郡吉陽縣梁立汝南郡西魏改郡為董城吉陽屬德安應山縣董城屬德安孝感縣三月庚戌魏主殂太子欽即皇帝位以吕祖謙標目修乙卯梁徐文盛等克武昌以通鑑修己未齊以湘東王繹為梁相國承制以齊紀修閏月侯景西上癸卯梁徐文盛擊破之夏四月丙午景襲陷郢州文盛軍潰湘東王繹遣大都督王僧辯軍于巴陵景攻之五月繹遣將軍胡僧祐救之六月擒任約乙巳景遁以梁紀修解題曰按岳陽志江水西来㑹洞庭湖並流逕巴陵北過射獵磯與侯景港合中有平阜上為城門四達前為戍樓髙出城上景之所築胡僧祐陸法和敗景巴陵景宵遁故曰侯景港事見通鑑于慶攻梁鄱陽弗克退走以吕祖謙標目修梁王僧辯克郢州秋八月壬寅朔克尋陽以吕祖謙標目修戊午侯景廢梁主為晉安王殺皇太子諸王侯壬戌立豫章王棟為帝改元大正冬十月壬寅侯景弑晉安王以吕祖謙標目修梁湘東王繹割南鄭與魏刺史宜豐侯循拒守以吕祖謙標目修侯景將劉神茂以東陽應湘東王繹以通鑑修十一月己卯侯景自加九錫己丑稱帝改元太始廢梁主棟為淮陰王以吕祖謙標目修解題曰宋庠紀年通譜太始本漢武帝張𤣥靚年號十二月齊弑中山王以吕祖謙標目修梁世祖孝元皇帝蕭繹承聖元年年魏主欽元年齊文宣皇帝天保三解題曰宋庠紀年通譜時魏復周制但稱元年春正月魏取梁東梁州以通鑑修解題曰按寰宇記梁於魏興郡置北梁州尋改為南梁州魏置東梁州西魏大統元年梁蘭欽取諸郡罷梁州廢帝元年東梁州刺史李遷哲降魏魏又置東梁州地形志東梁州領金城安康魏明並屬金州三郡突厥土門大破柔然殺頭兵可汗自號伊利可汗以吕祖謙標目修二月梁江州刺史王僧辯擊侯景與東揚州刺史陳霸先盟于白茅灣以陳紀修解題曰按晉宋書向韶魏詠之劉藩破桓石綏於白茅疑即此地今江州彭澤縣有白茅馬驛霸先自南康而出故僧辯㑹之於此也侯景陷東陽以通鑑修三月丁丑梁王僧辯等大敗侯景兵于姑熟丁亥僧辯及陳霸先大敗景于西州景走吴戊子僧辯遣將侯瑱追之己丑僧辯上表勸進於湘東王繹且請還都不許以列傳通鑑修辛卯梁湘東王繹殺豫章王棟以皇極經世修齊取梁廣陵以通鑑修夏四月梁王僧辯啓陳霸先鎮京口以吕祖謙標目修解題曰王僧辯出霸先於京口亦猶劉毅不欲劉裕居中也劉裕入為揚州而劉毅危矣霸先襲石頭而僧辯死矣事見通鑑乙巳梁武陵王紀稱帝改元天正以吕祖謙標目修解題曰宋庠紀年通譜天正之號暗與蕭棟合皆未幾而滅侯景伏誅以吕祖謙標目修盗以傳國璽歸齊以齊紀修解題曰按唐六典徐令言玉璽記秦始皇取藍田之玉刻之其書李斯所製靣文曰受命于天既壽永昌上隱起為盤龍文曰受天之命皇帝壽昌方四寸紐五龍盤傳漢至少帝失位掌璽者投於井中為孫堅所得袁術奪之術死荆州刺史上之傳魏至晉懐帝没於劉聦後冉閔以璽送建業侯景敗為將侯子監盗璽走江東棲霞寺僧得之陳永定三年僧普智奉獻傳於隋又晉陽秋晉孝武十九年雍州刺史郄恢於慕容永處得璽送建業文字巧妙與傳國璽同但玉色不逮自晉至梁謂之鎮璽侯景敗兖州刺史郭元建以送於齊隋平江南得真傳國璽乃改前所得大者名神璽隋末没於宇文化及竇建德平裴矩奉傳國璽神璽六璽以獻五月甲申齊吏部尚書楊愔為右僕射以齊紀修梁開府王僧辯為司徒陳霸先為開府以紀傳修侯景僕射王偉等伏誅以梁紀修丙戌齊取梁厯陽以吕祖謙標目修齊圍梁秦郡陳霸先大破之以通鑑修解題曰秦郡今真州六合縣魏取梁漢中以吕祖謙標目修解題曰漢中之復且十七年而遽失之明年遂失蜀矣事見通鑑秋八月梁武陵王紀伐湘東王繹以吕祖謙標目修冬十月齊築長城以齊紀修戊申梁湘東王繹執湘州刺史王琳其長史陸納據州反以吕祖謙標目修十一月丙子梁湘東王繹即皇帝位改元己卯立太子方矩為皇太子以吕祖謙標目修梁世祖孝元皇帝承聖二年保四年魏主欽二年齊文宣皇帝天春正月梁遣王僧辯討陸納陳霸先鎮揚州以通鑑修二月魏宇文泰去丞相大行臺自為都督中外軍事以周紀修突厥伊利可汗死子乙息記可汗立三月又死其弟木扞可汗立以通鑑修梁主患武陵王紀求救於魏魏遣大將軍尉遲逈伐蜀以吕祖謙標目修解題曰侯景之逼江陵也繹歸南鄭而求援於魏魏既遣達奚武將兵而取漢中繹亦可以悟矣今武陵王之東下繹復貽魏書而使之甘心觀魏之諸將皆難其事則魏固未必遽有伐蜀之心也繹既招冦而蜀事去矣詩曰兄弟䦧于墻外禦其侮繹胡不思之甚乎事見通鑑夏五月甲子魏取梁潼州以梁紀修解題曰潼州今綿州梁王僧辯大敗陸納以梁紀修己丑梁武陵王紀軍西陵梁城硤口以禦之以梁紀通鑑修六月梁赦王琳陸納降以吕祖謙標目修秋七月梁武陵王紀敗死以吕祖謙標目修八月戊戌梁益州降魏魏以尉遲逈為大都督益潼等州軍事以吕祖謙標目修庚子梁下詔將還建康尋止九月庚午王僧辯還建康陳霸先還京口以吕祖謙標目修解題曰胡寅曰荆州用武之國何不可都之有然於蕭繹則不可也宗廟社稷皆在建康髙祖憤崩簡文弑殞所當營奉陵寢伸至痛之情糞除祊祧修乏享之祀如不及也正使内無襄陽之難外無齊魏之虞江陵全盛猶不可宴安而處今孝誠不昭義聲不播第欲保其故有偷為尊顯率此為道雖使據百二之勢猶將為人圖取又何江陵建康之擇乎事見通鑑契丹冦齊齊主北巡以齊紀修冬十月齊襲梁以通鑑修齊主大破契丹遂如晉陽齊以肆州刺史斛律金為太師以吕祖謙標目修十一月突厥攻柔然柔然主奔齊癸亥齊主擊突厥遷柔然于馬邑以吕祖謙標目修十二月齊宿預降梁以梁紀修閏十二月丁丑梁南豫州刺史侯瑱大敗齊師于東關以通鑑修解題曰按劉義叟長厯梁閏十二月戊午朔丁丑二十日也當時南北置閏多有不同長厯氣朔置閏最為詳明司馬光雖載之通鑑目錄而本文不能按以為據葢修通鑑時未見長厯後乃收拾之於目錄耳今据其顯然者畧銓次之梁世祖孝元皇帝承聖三年宣皇帝天保五年魏恭皇帝拓拔廓元年齊文春正月癸巳齊主洋討山胡屠之自是始為威虐以齊紀吕祖謙標目修梁陳霸先圍齊廣陵以梁紀修魏宇文泰作九命九秩之典改置州郡以魏紀修魏宇文泰廢其主欽立齊王廓為皇帝去年號稱元年復姓拓拔氏以吕祖謙標目修解題曰按後周紀夏四月帝大饗羣臣魏史柳蚪執簡於朝曰廢帝文皇帝之嗣子年七歲文皇帝託於安定公曰是子才由于公不才亦由于公公既受兹重寄遂納女為皇后不能訓誨乃成致令廢黜負文皇帝付屬之意此咎非公而誰泰乃令太常盧辯作告諭公卿按柳蚪傳為丞相府記室上疏曰南史抗節表崔杼之罪董狐書法明趙盾之愆是知直筆於朝其来久矣而漢魏已還密為記注徒聞後世無益當時請皆當朝顯言其狀然後付之史閣事遂施行葉適曰髙貴鄉公謂司馬昭之心路人所知泰舉動如此欲以誰欺王莽篡而大誥作泰用周禮亦然豈從周者固當爾耶三月甲辰梁王僧辯為太尉以梁紀修夏四月柔然冦齊齊主大破之以吕祖謙標目修癸酉梁陳霸先為司空以梁紀修魏弑其故主欽以通鑑修五月魏取梁巴信二州以通鑑修梁以衡州刺史王琳為廣州刺史以吕祖謙標目修六月齊冀州刺史段韶定淮南陳霸先遁韶拔宿預以吕祖謙標目修秋七月齊主還鄴以通鑑修八月齊殺太保錄尚書事髙隆之及其諸子以通鑑修解題曰按齊書北史列傳文襄委任右僕射崔暹黃門郎崔季舒等文襄崩隆之啓文宣欲害之不許文宣以隆之舊齒委以政事隆之子婬於楊遵彦前妻帝妹也故遵彦䜛毁日至季舒譖隆之每見訴訟者輙加哀矜之意以示非已能裁文宣以其委過要名非大臣義餘見通鑑九月辛卯梁主講老子於龍光殿以梁紀修冬十月魏遣柱國于謹等伐梁十一月謹及梁王詧圍江陵城陷十二月辛未殺梁主以江陵資詧取其襄陽以吕祖謙標目修解題曰按後周書列傳梁元帝嗣位於江陵外敦隣睦内懐異計荆州刺史長孫儉密陳攻取之謀於是徴儉入朝問其經畧對曰今江陵既在江北去我不遠湘東即位已渉三年觀其形勢不欲東下骨肉相殘民厭其毒荆州軍資器械儲積已久此荆州言襄陽也且兼弱攻昧武之善經國家既有蜀土若更平江漢收其貢賦以供軍國天下不足定也太祖深然之乃令儉還州密為之備梁王僧辯陳霸先奉江州刺史晉安王方智為太宰承制以吕祖謙標目修是歲魏加益州刺史尉遲逈六州承制以通鑑修解題曰葉適曰梁樹本根比宋齊為厚所以速亡者武帝納侯景一失也元帝能克景而不歸建康二失也王僧辯畏齊立貞陽侯陳霸先因之而起三失也或謂元帝猜嫌非繼世之君其理則然然使即歸舊都僧辯霸先當無異志而並獲其用北人不能徑渡必不身遭屠戮僧辯之心固不在篡梁若不以立君為舉棊霸先雖姦凶無自而發梁祚尚可延也十年之間積三大失而國安有不亡者哉事見通鑑梁敬皇帝蕭方智紹泰元年後梁中宗皇帝蕭詧大定元年魏恭皇帝二年齊文宣皇帝天保六年春正月梁王詧即皇帝位改元是為後梁立子巋為皇太子以吕祖謙標目修梁王琳救江陵不及遣兵伐後梁以吕祖謙標目修齊取梁郢州以吕祖謙標目修辛丑齊遣兵納梁貞陽侯淵明以通鑑修二月梁晉安王至建康即梁王位以王僧辯為中書監録尚書都督中外軍事加陳霸先征西大將軍以梁紀修三月丙戌齊克梁東關王僧辯屯姑熟以通鑑修梁蕭勃復據廣州以吕祖謙標目修夏五月丙午梁王僧辯立蕭淵明為帝改元天成以梁王方智為太子以吕祖謙標目修解題曰胡寅曰齊之納蕭淵明亦猶魏之立梁王詧也其視江南猶外府姑使為之主爾王僧辯執義不堅之人也事湘東臨危而不救奉晉安有急而改圖立身處國輕摇易變如此安得不為人所取耶事見通鑑六月庚戌齊築長城以吕祖謙標目修齊歸梁郢州以吕祖謙標目修秋七月齊主自將伐柔然大破之以齊紀修梁王琳屯長沙以吕祖謙標目修齊使道士為沙門以吕祖謙標目修九月甲辰梁陳霸先襲殺王僧辯于石頭冬十月己酉陳霸先奉方智即皇帝位改元稱藩于齊以蕭淵眀為司徒以梁紀通鑑修壬子梁陳霸先自為尚書令都督中外軍事揚南徐二州刺史以梁紀修戊午梁主立妃王氏為皇后以通鑑修梁震州刺史杜龕攻將軍陳蒨於長城義興太守韋載應之辛未陳霸先討之丙子譙秦二州刺史徐嗣徽降齊與南豫州刺史任約襲據石頭十一月庚寅霸先還以梁紀修解題曰震州今湖州長城今湖州之長興州據梁史列傳徐嗣徽任約引齊兵據石頭帝問計於韋載載曰齊若分兵先據二吴之路畧定東境則時事去矣今可急於淮南即侯景故壘築城通東道轉輸别令輕兵絶其粮運使進無所虜退無所資則齊將之首旬日可致餘見通鑑葉適曰當時為謀於急迫中反暇豫若此宜其不能立事也齊殺太保清河王岳以齊紀修徐嗣徽徃采石十二月丙辰梁陳霸先破石頭柵齊軍至梁將軍侯安都破之徐嗣徽等奔齊以梁紀吕祖謙標目修梁以晉安陳寶應為太守以吕祖謙標目修是歲魏降宗室諸王為公以吕祖謙標目修突厥滅柔然以吕祖謙標目修梁敬皇帝太平元年後梁中宗皇帝太定二年魏恭皇帝拓㧞廓三年齊文宣皇帝天保七年春正月丁丑魏初行周禮建六官以魏紀修解題曰按後周紀魏列傳以宇文泰為太師大冡宰李弼為太傅大司徒趙貴為太保大宗伯獨孤信為大司馬于謹為大司冦侯莫陳崇為大司空初泰以漢魏官繁思革前弊大統中乃命蘇綽盧辯依周禮改創其事尋亦置六官然撰次未成衆務猶歸臺閣至是始畢乃行之宣帝嗣位事不師古官員班品隨情變革于時雖行周禮内外衆職又兼用秦漢等官其紀傳内更有餘官而不載者史之闕文也蘇轍䇿問曰周官分建六職各帥其屬以治百事仰以奉天地鬼神外以御諸侯四夷下以治士農工商至於草木鳥獸無不咸在宇文氏雖叅考其舊以命庶工而典籍亡逸不可究知其兵戎之官多設於六卿之外梁陳蒨斬杜龕二月斬東揚州刺史張彪江州刺史侯瑱拒命以吕祖謙標目修癸亥齊徐嗣徽任約襲采石以本紀修三月丙子梁罷東揚州以梁紀修壬午梁詔雜用古今錢以梁紀修戊戌齊遣儀同蕭軌等伐梁陳霸先遣兵破之于梁山齊師屯蕪湖夏五月癸未梁太傅蕭淵明卒六月乙卯霸先大敗齊師于幕府山獲蕭軌徐嗣徽等以本紀通鑑修解題曰葉適曰晉宋相承四方之兵累鬭都下率常不支徐嗣徽任約引齊師五月再至數十里内盡為敵場危亡在眼中矣陳霸先决死鬭再敗其衆遂以得國後世專倚一江敵一得渡則鳥獸散甚者或未渡已望風驚潰何脆怯之甚也事見通鑑梁山即東西梁山幕府山在建康城北十里梁王琳遣使如齊又如魏以通鑑修秋七月丙子梁陳霸先自為中書監司徒揚州刺史以梁紀通鑑修梁侯瑱降丁亥以為司空以紀傳修解題曰按陳書列傳瑱趨湓城投其將焦僧度勸瑱以陳霸先有大量必能容己乃詣闕請罪霸先復其爵位餘見通鑑九月壬寅梁改元以梁紀修解題曰宋庠紀年通譜太平孫亮馮跋柔然豆崙年號梁陳霸先自為丞相録尚書事以吕祖謙標目修冬十月壬申梁王琳取江夏以吕祖謙標目修乙亥魏安定文公宇文泰卒丙子世子覺嗣為太師大冡宰鎮同州以吕祖謙標目修解題曰按後周書北史泰本文作周文寛仁罕猜忌元氏戚屬並保全之内外任使布於列職孝閔明武亦遵先志雖魏命已遷枝葉榮茂足逾於前代矣葉適曰自元偉已下十四人皆有大位於周與髙氏相絶矣十一月梁徴王琳為司空辭不至以通鑑修壬子齊併省州郡以吕祖謙標目修十二月魏宇文覺自為周公以吕祖謙標目修梁臨川周迪據郡以吕祖謙標目修齊築長城以朱熹綱目修大事記續編卷四十三
