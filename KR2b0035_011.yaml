body:
  text: 大事記續編卷十一明王禕撰漢肅宗孝章皇帝建初元春正月丙寅詔二千石勸農桑有司謹選舉順時令理寃獄以本紀修觧題曰肅宗初承永平故事吏政尚嚴切尚書決事率近於重陳寵以帝新即位宜改前世苛俗乃上疏曰聖賢之政以刑罰為首者斷獄嚴明所以威懲姦慝姦慝既平必宜濟之以寛陛下數詔羣僚𢎞崇晏晏而有司未悉奉承猶尚深刻斷獄者急於篣格酷烈之痛執憲者煩於詆欺放濫之文夫為政猶張琴瑟大弦急者小弦絶宜隆先王之道蕩滌煩苛之法全廣至徳以奉天心帝敬納寵言每事務於寛厚其後遂詔有司絶鉆鑽諸慘酷之科李賢曰鉆其炎反鐵鋷也鑽作喚反臏刑謂鑽去其臏骨觧妖惡之禁除文致之請讞五十餘事葉適曰元帝改宣帝故事章和亦鍳明帝苛察而漢皆由此不振蓋人主之徳不至而以政為寛宜其有弛緩之弊叚彭擊車師大破之二月耿恭還詔罷戊巳校尉都䕶官徴班超超更還踈勒以吕祖謙標目録三月甲寅山陽東平地震己巳詔舉賢良方正直言極諫夏五月辛酉初舉孝亷郎中補長相以本紀修秋七月辛亥詔以上林池籞田賦民以本紀修八月庚寅有星孛於天市以本紀修九月哀牢夷叛以本紀修冬十一月阜陵王延謀反貶為侯以本紀修南單于及烏桓擊北匈奴大破之以本紀修漢肅宗孝章皇帝建初二年春二月辛丑詔禁奢縱僣侈以本紀修甲辰罷伊吾廬屯兵本紀永昌越嶲益州兵討哀牢平之以本紀通鑑修夏四月戊子詔還坐楚淮陽徙者四百餘家以本紀修詔齊相省冰紈方空縠吹綸絮以本紀修觧題曰李賢曰紈素也冰言色鮮㓗如冰釋名曰縠綬也方空者紗薄如空也或曰空孔也綸似絮而細吹者言吹嘘可成亦紗也帝欲封諸舅太后固止之以通鑑修六月燒當諸種𦍑反冦金城漢陽秋八月遣行車騎將軍馬防長水校尉耿恭討之以本紀修觧題曰城門校尉馬防行車騎將軍以長水校尉耿恭副將北軍五校士及諸郡積射士征西羌第五倫上疏曰貴戚可封侯以富之不當職事以任之何者繩以法則傷恩私以親則違憲伏聞馬防今當西征臣以太后仁恩陛下至孝恐有纎芥難以意愛不省餘見通鑑北軍京師重兵西京不輕調光武罷郡國材官建武十九年臧宫始将北軍平原武自此始接踵於外矣冬十二月戊寅有星孛於紫宫以本紀修漢肅宗孝章皇帝建初三年春正月己酉宗祀明堂登靈臺以本紀修耿恭破諸羌降之坐忤馬防㝷下獄免以吕祖謙標目修觧題曰按袁宏漢紀恭到隴西上言宜令車騎將軍防屯漢陽以為威重昔竇融懐集羌胡得其驩心子孫今樂聞竇氏前擊白山盧水聞竇固至三日而兵合宜復奉大使又薦臨邑侯劉復明畧卓異反以微過歸國宜令復將烏桓兵由是忤於馬防防令謁者李譚奏恭不憂軍被詔怨望徴下獄免餘見通鑑陳瓘曰耿恭有功無過以忤馬防而免官第五倫謂貴戚不宜任以職事蓋慮此矣三月癸巳立貴人竇氏為皇后觧題曰竇勲獄死而后其女非禮也賜民爵孤寡癃貧粟以本紀修夏四月罷虖沱石臼河漕以本紀修觧題曰永平中理虖沱石臼河從都慮至羊腸倉欲令通漕太原西漢地里志注太原上交縣緜蔓水至常山郡蒲吾縣入虖沱河李賢曰石臼河在今定州唐縣東後漢郡國志常山國蒲吾縣注古今注永平十年作常山虖沱蒲吾渠通漕舡水經注汾陽故城積粟所在謂之羊腸倉在晉陽西北今嵐州界羊腸阪是也苦役連嵗無成轉運所經三百八十九隘前後沒溺死者不可勝筭拜鄧訓謁者使監領其事訓考量𨼆括知大功難立是以上言遂罷其役餘見通鑑閏月班超擊姑墨大破之以本紀修冬十二月丁酉以馬防為車騎將軍兼城門校尉以本紀袁宏漢紀修有司奏遣諸王歸國不許以列傳修漢肅宗孝章皇帝建初四年春二月庚寅牟融薨以本紀修夏四月戊子立子慶為皇太子賜民爵孤寡癃貧粟辛卯封皇子二人為王以本紀修癸卯封馬廖馬防執金吾馬光為侯五月丙辰廖等以特進就第以列傳通鑑修甲戍以鮑昱為太尉南陽太守桓虞為司徒以本紀修六月癸丑皇太后馬氏崩本紀冬十一月壬戍詔諸儒諸生㑹白虎觀議五經同異帝親稱制臨決以本紀修觧題曰校書郎楊終言宣帝博徴羣儒論定五經於石渠閣方今天下少事學者得成其業而章句之徒破壊大體宜如石渠故事永為後世則餘見通鑑唐仲友曰光武講論經理明帝正坐自講章帝稱制臨決皆一律也又曰自石渠論後専門益熾矣白虎觀在北宫漢肅宗孝章皇帝建初五年春二月庚辰朔日有食之詔舉直言極諫甲申令二千石理寃獄以本紀修夏五月辛亥詔直言士任外官以本紀修觧題曰肅宗可謂有好直言之實矣事見通鑑戊辰趙憙薨以本紀修冬始行月令迎氣樂以本紀修是嵗班超擊䟽勒破之以本紀修漢肅宗孝章皇帝建初六年夏六月丙辰鮑昱薨以本紀修辛未晦日有食之以本紀修秋七月癸巳以大司農鄧彪為太尉以本紀修冬十二月詔以四科辟士以和帝本紀及漢官儀修觧題曰應劭漢官儀曰建初六年十二月詔書辟士四科一曰徳行髙妙志節清白二曰經明行修能任博士三曰明曉法律足以決疑能案章覆問文任御史四曰剛毅多畧遭事不貳明足照姦勇足決斷才任三輔令皆存孝悌清公之行自今已後審四科辟召及刺史二千石察舉茂才尤異孝亷務實校試以職有非其人不習曹事正舉者故不以實法之也漢肅宗孝章皇帝建初七年夏六月甲寅廢皇太子慶為清和王立子肇為皇太子殺慶母宋貴人以本紀修觧題曰宋楊姑馬后之外祖母也后聞楊二女皆有才色迎而訓之永平末選入太子宫甚有寵肅宗即位並為貴人大貴人生慶為皇太子貴人長於人事供奉長樂宫身執饋饌太后憐之竇勲尚東海王彊女泚陽公主長女與女弟俱以選例入見長樂宫肅宗先聞后有才色數以訊諸姬𫝊及見雅以為羙馬太后亦異焉因入掖庭后性敏給傾心承接稱譽日聞遂立為皇后妺為貴人梁貴人者梁竦之女也少失母為伯母舞隂長公主所養年十六與中姊俱入掖庭為貴人生子肇是為和帝竇后無子並疾忌之太后崩后與母謀陷宋氏外令兄弟求其纎過内使御者偵伺得失貴人病思生莵令家求之因誣言欲作蠱道祝詛為厭勝之術日夜毁譛遂漸見䟽慶出居承禄觀六月廢慶為清河王皇子肇保育皇后以為皇太子餘見通鑑宋貴人者馬后所憐愛而後有寵於帝竇后者帝先羙其才色而後見異於馬后此所以竇氏為后而宋氏不立及馬后既崩而宋氏危矣母死子廢固其勢也光武廢郭后及太子已虧夫婦父子之道及再𫝊而章帝遂效其所為正始之道可不謹哉秋八月飲酎禘於高廟以本紀修九月甲戌帝幸偃師乙酉幸鄴復元氏租賦三嵗辛卯還宫以本紀修觧題曰至河内下詔曰車駕行秋稼觀收穫因渉郡界皆精騎輕行無輜重不得輙修道橋逺離城郭遣吏逢迎刺探起居出入前後以為煩擾動務省約但患不能脱粟瓢飲耳所過欲令貧弱有利無違詔書遂覧淇園乙酉進幸鄴勞饗魏郡守令已下至於三老門闌走卒賜錢各有差勞賜常山趙國吏人復元氏租賦三嵗李賢曰偃師縣屬河南郡冬十月癸丑帝幸長安謁廟陵十二月還宫以本紀修螟以本紀修漢肅宗孝章皇帝建初八年春正月東平王蒼薨以本紀修冬十二月甲午帝東狩戊申還宫以本紀修詔立古文尚書毛詩左氏糓梁春秋講郎以紀傳修觧題曰按袁宏漢紀古文尚書者魯恭王壊孔子宅欲廣其宫得古文尚書孔安國得其書多於伏生所傳六十篇獻之毛詩者出於魯人毛萇自謂子夏所傳河間獻王好之榖梁者瑕邱江公受之魯申公董仲舒善説公羊榖梁學浸微後蕭望之廷論二家同異多從榖梁漢初張蒼賈誼張敞皆修春秋左傳誼為訓故建武初議立左氏學博士范升以為不宜立帝愍左氏學廢乃使賈逵叙明大義於是置弟子葉適曰古文尚書毛詩左氏周官學者藉此以知古人統紀源流而西京湮塞不行至東漢乃卒傳之豈杜林鄭興陳元賈逵􅀢知識實能過於西京諸儒耶特其門户偶相承耳下梁竦獄殺之殺皇太子母梁貴人以列傳通鑑修觧題曰梁竇素交結所以竇后不子宋貴人之子而子梁貴人之子及子肇既立梁氏方私自相慶而竇氏又移其所以陷宋氏者陷梁氏作為飛書置竦死地貴人姊妺亦以憂卒利之所激則深宫之女皆儀秦也吁可畏哉事見通鑑遣馬廖馬防就國以列傳通鑑修虎賁中郎將竇憲奪沁水公主田帝知之弗治以通鑑修觧題曰太后崩後馬氏失勢廖性寛緩不能教勅子弟子豫遂投書怨誹光奢侈好樹黨與外戚賔客嘗坐隂氏梁氏廢徙而馬竇傷交結黨與殆經制不立之過也有司奏免豫遣廖防光就封諸馬得罪歸國而竇氏始貴憲為侍中虎賁中郎将篤為黄門侍郎並侍宫省貴寵日盛憲以賤直請奪沁水公主園田主逼畏不敢計肅宗出過園指以問憲憲隂喝不得對後發覺帝大怒召憲切責曰深思前過請主田園時何用愈趙髙指鹿為馬乆念使人驚怖貴主尚見枉奪何况小民哉國家棄憲如孤雛腐䑕耳憲大懼皇后為毁服深謝良乆乃得觧餘見通鑑漢制皇女皆封縣公主儀服同列侯其尊崇者皆號長公主儀服同藩王諸王女皆封鄉亭公主儀服同鄉亭侯肅宗時唯東平王蒼琅邪王京女為縣公主其後安帝桓帝妹亦封長公主同之皇女其封公主者所生之子襲母封為列侯皆傳國於後鄉亭之封則不傳襲漢肅宗孝章皇帝元和元年夏詔議貢舉法以通鑑修秋七月丁未詔定箠令以本紀修八月甲子鄧彪罷大司農鄭𢎞為太尉以本紀修癸酉改元以本紀修帝南狩九月辛丑幸章陵冬十一月己丑還宫以本紀修十二月壬子詔除妖惡禁錮以本紀修觧題曰鮑昱之言帝即俞納至是十年而禁錮始除求以銷變異於朝夕難哉事見通鑑復鹽鐵均輸以列傳修觧題曰見章和二年觧題漢肅宗孝章皇帝元和二年春正月乙酉詔賜胎養榖復其夫勿筭以本紀修詔戒俗吏矯餙以本紀修觧題曰詔三公曰方春生養萬物莩甲宜助萌陽以育時物其令有司罪非殊死且勿案騐及吏人條書相告不得聽受兾以息事寧人敬奉天氣立秋如故夫俗吏矯餙外貌似是而非揆之人事則悦耳論之隂陽則傷化朕甚厭之甚苦之安静之吏悃愊無華日計不足月計有餘如襄城令劉方吏人同聲謂之不煩雖未有他長斯亦殆近之矣間勅二千石各尚寛明而今富姦行賂於下貪吏枉法於上使有罪不論而無過被刑甚大逆也夫以苛為察以刻為明以輕為徳以重為威四者或興則下有怨心吾詔書數下冠蓋接道而吏不加理人或失職其咎安在勉思舊令稱朕意焉唐仲友曰帝舉孝亷寛博者詔褒劉方皆懲吏事刻深南單于長死單于泛之子宣立以列傳修二月甲寅始用四分厯以本紀修觧題曰自太初元年始用三統厯施行百有餘年厯稍後天朔先厯朔或在晦月見考其行日有退無進月有進無退建武八年中太僕朱浮等言厯當改未遑考正永平五年詔令待詔楊岑署弦望月食官復令待詔張盛京房鮑業等以四分法與岑課嵗餘盛等所中多岑六事十二年十一月詔書令盛房代岑署弦望月食加時四分之術始頗施行盛房等未能分明厯元綜校分度但用其弦望而已元和二年太初失天益逺冬至之日日在斗二十一度未至牽牛五度而以為牽牛中星後天四分日之三晦朔弦望差天一日宿差五度帝召治厯編訢李𣑽等綜校其狀二月甲寅下詔改行四分訢梵猶以為元首十一月當先大欲以合耦弦望命有常日而十九嵗不得七閏晦朔失實帝復使左中郎將賈逵問治厯者衛承李崇及訢梵等十人以為月當先小春秋經書朔不書晦者朔必有明晦不朔必在其月也即先大則一月再朔後月無朔是明不可必上勅天元始起之月當小定厯數遂正詔議增修羣祀丙辰帝東狩辛未柴告岱宗幸奉髙壬申祀五帝於明堂三月己丑幸魯庚寅祀孔子及七十二弟子夏四月乙卯還宫庚申假於祖禰以本紀修秋七月庚子詔毋以十一月十二月報囚以通鑑目録修冬南單于與北匈奴戰於涿邪山破之詔還其所掠生口以列傳吕祖謙標目修漢肅宗孝章皇帝元和三年春正月乙酉詔廪嬰兒無親屬及有子不能養者以本紀修丙申帝北廵三月辛卯還宫以本紀修觧題曰二月乙丑勅侍御史司空曰方春所過無得有所伐殺車可以引避引避之騑馬可輟觧輟觧之詩云敦彼行葦牛羊勿踐履禮人君伐一草木不時謂之不孝俗知順人莫知順天其明稱朕意夏四月丙寅鄭𢎞以論竇憲免㝷卒紀傳觧題曰按袁宏漢紀𢎞敷陳竇憲勢太盛言苦切為憲不容奏𢎞洩漏奏事坐詰讓收印綬𢎞乞骸未許疾篤上書曰竇憲姦惡貫天逹地海内疑惑賢愚疾惡憲何術以迷主上臣雖命在移晷死不忘忠願陛下誅四凶之罪以厭人鬼憤結之望餘見通鑑吕祖謙曰章帝號為賢君然其失不减得竇憲奪公主園田蓋驕縱之漸帝僅責之而不能正其罪其後憲譖鄭𢎞免其三公帝省𢎞奏雖温詞慰藉而終不能去憲若每事如此與元帝相去亦何逺哉以大司農宋由為太尉以紀傳修五月丙子第五倫免太僕袁安為司空以本紀修觧題曰吕祖謙曰倫本嚴毅之資及居位反深厭刻薄崇尚寛大縁人主本原寛厚人臣亦從而寛厚唱和之理也又曰章帝慈祥豈弟屈已下賢一時名士多立其朝如袁安之徒尚能於和帝之初正色折姦臣立紀綱皆帝招賢者以遺後之人也秋八月乙丑帝幸安邑觀鹽池九月還宫以本紀修冬燒當羗迷吾㓂隴西以本紀修西域長史班超擊斬疏勒王以本紀修以前廷尉正郭躬為廷尉以列傳修觧題曰躬家世掌法務在寛平及典官決獄斷刑多依矜恕乃條諸重文可從輕者四十一事奏之事皆施行陳瓘曰章帝得郭躬而成其長者之政漢肅宗孝章皇帝章和元年觧題曰宋庠紀年通譜詔曰是因瑞以章顯先徳之和故改元春正月詔侍中曹褒定漢禮以列傳通鑑修三月䕶羗校尉傅育擊羗敗歿以本紀修夏六月桓虞免袁安為司徒光禄勲任隗為司空以本紀袁宏漢紀修秋七月鮮卑擊斬北匈奴單于以本紀修燒當羗迷吾冦金城䕶羗校尉張紆斬之其子迷唐復叛以紀傳修壬戌改元養老賜髙年布帛以本紀修八月癸酉帝南狩以本紀修乙未晦日有食之九月復封阜陵侯延為王以本紀修冬十月丙子還宫以本紀修北匈奴五十八部來降以紀傳修曹褒奏所撰制度以列傳修觧題曰顯宗即位博士曹充言漢再受命禮樂崩闕下詔改太樂官曰大予樂褒少𫝊充業常感朝廷制度未備慕叔孫通漢禮儀晝夜専思㑹肅宗欲制禮樂褒乃上疏宜定文制著成漢禮太常巢堪以一代大典非褒所定不可作帝知羣僚拘攣難與圖治拜褒侍中𤣥武司馬班固曰京師諸儒多能説禮宜廣招共議得失帝曰諺言作舍道邊三年不成㑹禮之家名為聚訟昔尭作大章一夔足矣召褒詣嘉徳門令小黄門持班固所上叔孫通漢儀十二篇勅褒曰此制散畧多不合經帝知叔孫通之禮不合經其言大矣而不知䜟緯之尤不經何也今宜依禮條正使可施行於南宫東觀按洛陽宫殿名南宫有東觀陸機洛陽記在南宫髙閣十二門介於承風觀光武定都實於南宫其後又建前殿而北宫乃永平所起今東觀在南宫豈經始於建武歟褒乃次序禮事依凖舊典雜以五經䜟記之文撰次天子至庶人冠婚吉凶終始制度百五十篇奏上帝以衆論難一故但納之不復令有司平奏胡寅曰孔子刪詩定書繫易作春秋而不述禮樂之制蓋禮因人情為之節文樂以象功故難立一成不變之制夏商周皆不免於損益其不可一也明矣雖然聖人必因事以明其義蓋其數可陳祝史有司之所能與也其義難知非仁且智不能本人情而約之以中道也故或先王有之而不宜於今或古未之有而可以義起神而明之存乎其人而已曹褒蓋亦深見叔孫通之義有未當者故憤然欲正之而帝亦以是命之若請博徴名儒遲以年嵗猶庶幾乎不大違戾身當重任決以獨見才數月間遽成百五十篇又雜以䜟記之文其不純乎古禮甚矣和帝即位褒乃作為章句帝遂以新禮二篇冠後太尉張酺尚書張敏等奏褒擅制漢禮破亂聖術宜加刑誅帝雖寝其奏而漢禮遂不行唐仲友曰一代之興合有一代之禮樂與其闕而不制寧其制而未盡善褒習䜟緯固為未善然不可因噎廢食也酺敏之言亦豈為此之故哉不過習於専門不容一家制作而已是嵗班超擊莎車大破之以本紀修觧題曰吕祖謙曰章帝慈祥長者非好大喜功之君而所行之事與武帝相去無幾此慈祥之過也班超窮兵西域以慈祥不能奪超之議傅育張紆擾動羌胡亦慈祥不斷之所致君徳以剛為主若剛徳有虧雖有慈祥之意不過能謹其小而未免失之於大事見通鑑大事記續編卷十一
