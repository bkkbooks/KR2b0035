body:
  text: 大事記續編目録編年類卷一起漢孝武皇帝征和四年盡漢孝宣皇帝地節元年卷二起漢孝宣皇帝地節二年盡漢孝宣皇帝黃龍元年卷三起漢孝元皇帝初元元年盡漢孝元皇帝竟寧元年卷四起漢孝成皇帝建始元年盡漢孝成皇帝綏和元年卷五起漢孝成皇帝綏和二年盡漢孝哀皇帝元夀元年卷六起漢孝哀皇帝元夀二年盡新莽地皇三年卷七起漢淮陽王更始元年盡淮陽王更始二年卷八起漢世祖光武皇帝建武元年盡漢世祖光武皇帝建武十二年卷九起漢世祖光武皇帝建武十三年盡漢世祖光武皇帝建武中元二年卷十起漢顯宗孝明皇帝永平元年盡漢顯宗孝明皇帝永平十八年卷十一起漢肅宗孝章皇帝建初元年盡漢肅宗孝章皇帝章和元年卷十二起漢肅宗孝章皇帝章和二年盡漢孝殤皇帝延平元年卷十三起漢孝安皇帝永初元年盡漢孝安皇帝永寧元年卷十四起漢孝安皇帝建光元年盡漢孝順皇帝永建六年卷十五起漢孝順皇帝陽嘉元年盡漢孝質皇帝本初元年卷十六起漢孝桓皇帝建和元年盡漢孝桓皇帝延熹元年卷十七起漢孝桓皇帝延熹二年盡漢孝桓皇帝永康元年卷十八起漢孝靈皇帝建寧元年盡漢孝靈皇帝中平五年卷十九起漢孝靈皇帝中平六年盡漢孝獻皇帝興平二年卷二十起漢孝獻皇帝建安元年盡漢孝獻皇帝延康元年卷二十一起漢昭烈皇帝章武元年盡漢安樂思公建興十一年卷二十二起漢安樂思公建興十二年盡漢安樂思公延熙十一年卷二十三起漢安樂思公延熙十二年盡魏元皇帝咸熙元年卷二十四起晉世祖武皇帝泰始元年盡晉世祖武皇帝咸寧五年卷二十五起晉世祖武皇帝太康元年盡晉世祖武皇帝太熙元年卷二十六起晉孝惠皇帝元康元年盡晉孝惠皇帝光熙元年卷二十七起晉孝懷皇帝永嘉元年盡晉孝愍皇帝建興五年卷二十八起晉中宗孝元皇帝大興元年盡晉肅宗明皇帝太寧元年卷二十九起晉肅宗明皇帝太寧二年盡晉孝宗穆皇帝永和五年卷三十起晉孝宗穆皇帝永和六年盡晉海西公太和五年卷三十一起晉太宗簡文帝咸安元年盡晉烈宗孝武皇帝太元七年卷三十二起晉烈宗孝武皇帝太元八年盡晉烈宗孝武皇帝太元二十一年卷三十三起晉安皇帝隆安元年盡晉安皇帝元興二年卷三十四起晉安皇帝元興三年盡晉安皇帝義熙十二年卷三十五起晉安皇帝義熙十三年盡晉恭皇帝元熙元年卷三十六起宋髙祖武皇帝劉裕永初元年盡宋太祖文皇帝元嘉二十九年卷三十七起宋太祖文皇帝元嘉三十年盡宋太宗明皇帝泰始二年卷三十八起宋太宗明皇帝泰始三年盡宋順皇帝升明二年卷三十九起齊太祖髙皇帝蕭道成建元元年盡齊世祖武皇帝永明九年卷四十起齊世祖武皇帝永明十年盡齊和皇帝中興元年卷四十一起梁髙祖武皇帝蕭衍天監元年盡梁髙祖武皇帝大通元年卷四十二起梁髙祖武皇帝大通二年盡梁髙祖武皇帝中大同元年卷四十三起梁髙祖武皇帝太清元年盡梁敬皇帝太平元年卷四十四起陳髙祖武皇帝陳霸先永定元年盡陳髙宗宣皇帝大建八年卷四十五起陳髙宗宣皇帝大建九年盡陳髙宗宣皇帝大建十二年卷四十六起陳髙宗宣皇帝大建十三年盡陳長城煬公禎明二年卷四十七起隋髙祖文皇帝開皇九年盡隋髙祖文皇帝仁夀四年卷四十八起隋煬皇帝大業元年盡隋煬皇帝大業十三年卷四十九起唐髙祖神堯皇帝武德元年盡唐髙祖神堯皇帝武德八年卷五十起唐髙祖神堯皇帝武德九年盡唐太宗文武皇帝貞觀四年卷五十一起唐太宗文武皇帝貞觀五年盡唐髙宗皇帝永徽三年卷五十二起唐髙宗皇帝永徽四年盡唐髙宗皇帝𢎞道元年卷五十三起唐則天順聖皇后武氏光宅元年盡唐則天順聖皇后武氏神功元年卷五十四起唐則天順聖皇后武氏聖厯元年盡唐則天順聖皇后武氏長安四年卷五十五起唐中宗皇帝神龍元年盡唐中宗皇帝景龍三年卷五十六起唐睿宗皇帝景雲元年盡唐𤣥宗皇帝先天元年卷五十七起唐𤣥宗明皇帝開元元年盡唐𤣥宗明皇帝開元二十三年卷五十八起唐𤣥宗明皇帝開元二十四年盡唐𤣥宗明皇帝天寶十四載卷五十九起唐肅宗皇帝至德元載盡唐肅宗皇帝寶應元年卷六十起唐代宗皇帝廣德元年盡唐德宗皇帝建中三年卷六十一起唐德宗皇帝建中四年盡唐德宗皇帝貞元二十年卷六十二起唐順宗皇帝永貞元年盡遷髙宗主于西夾室卷六十三起唐憲宗皇帝元和元年盡唐憲宗皇帝元和十二年卷六十四起唐憲宗皇帝元和十三年盡唐敬宗皇帝寶厯二年卷六十五起唐文宗皇帝太和元年盡唐文宗皇帝開成四年卷六十六起唐文宗皇帝開成五年盡唐武宗皇帝㑹昌五年卷六十七起唐武宗皇帝㑹昌六年盡唐懿宗皇帝咸通八年卷六十八起唐懿宗皇帝咸通九年盡唐僖宗皇帝乾符六年卷六十九起唐僖宗皇帝廣明元年盡唐僖宗皇帝文德元年卷七十起唐昭宗皇帝龍紀元年盡唐昭宗皇帝天祐三年卷七十一起梁太祖皇帝朱晃開平元年盡梁均王龍德二年卷七十二起唐莊宗皇帝同光元年盡唐莊宗皇帝同光三年卷七十三起唐明宗皇帝李亶天成元年盡唐明宗皇帝長興四年卷七十四起唐愍帝李從厚應順元年盡唐潞王清泰二年卷七十五起晉髙祖皇帝石敬塘天福元年盡晉出帝開運三年卷七十六起漢髙祖皇帝劉皓天福十二年盡漢隱帝乾祐三年卷七十七起周太祖皇帝郭威廣順元年盡周世宗恭皇帝顯德六年臣等謹案大事記續編七十七卷明王禕撰禕字子充義烏人少遊栁貫黃溍之門明初徵為中書省掾修元史成拜翰林待制使雲南抗節死贈翰林學士追諡忠文事跡具明史本傳此書乃續吕祖謙大事記而作體例悉遵祖謙之舊惟解題不別為一書即附于各條之下俞恂稱其書自征和迄宋德祐二年凡一千三百六十五年而今所傳本實自漢武帝征和四年至周恭帝顯德六年而止不知恂何據而云然或禕本有此志而未及卒業歟考何喬新集嘗稱禕此書豫奪褒貶與綱目大不合如綱目以昭烈紹漢統章武紀年直接建安此書乃用無統之例以漢與魏吳並從分注不從朱子而取陳夀裴松之之說又綱目斥武后之號紀中宗之年每嵗書帝所在用春秋公在乾侯例而此書乃以武后紀年又李克用父子唐亡稱天祐年號以討賊為辭名義甚正故綱目紀年先晉後梁本春秋存紀存陳之義此書乃先梁後晉幾于獎篡皆好竒之過所言實切中其失然其間考訂同異如載漢武帝仙人妖妄之言淖方成禍水之說以為出于漢武故事飛燕外傳而譏通鑑輕信之失紀光武帝省并十三國而以地志正本紀之誤此類亦頗有所見又宋庠紀年通譜劉羲叟長厯今皆不傳而此書間引及之亦可以備考證至前賢議論薈萃尤多體例雖乖而搜採尚博瑕瑜不掩讀者節取其長焉可矣其書抄本舊藏蜀王府中成化間始刋行于世云乾隆四十五年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
