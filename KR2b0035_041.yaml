body:
  text: 大事記續編卷四十一明王禕撰梁髙祖武皇帝蕭衍天監元年魏世宗宣武皇帝景明三年春正月戊戌齊宣德太后臨朝稱制蕭衍自為都督中外軍事加殊禮甲寅自為相國梁公加九錫二月殺太常湘東王寶眰等三人丙寅以驃騎司馬沈約為吏部尚書兼右僕射黄門侍郎范雲為侍中丙戌衍進王爵三月辛丑殺中將軍邵陵王寶攸等三人衞將軍鄱陽王寶寅奔魏齊主東歸夏四月丙寅梁王衍自即皇帝位改元丁卯廢齊主為巴陵王遷之姑熟治書侍御史顔見逺死之以呂祖謙標目修解題曰宋庠紀年通譜天監取詩云天之降監初齊和帝鎮荆州以顔見逺為錄事參軍及即位以為治書侍御史兼中丞髙祖受禪見逺乃不食發憤數日而卒帝聞之曰我自應天從人何預天下士大夫事而顔見逺乃至於此也餘見通鑑胡寅曰易之革曰湯武革命順乎天而應乎人未聞應天也應者對感而為言人事作於下則天理應於上豈可天感乎上而人應乎下歟故易惟曰順乎天順天者順理也晁説之曰方百僚署名送東昏首時王志獨憤歎不署張充偃蹇不來㑹江蒨在江州拒髙祖之師不受命顔見逺覩髙祖即位不食以死姚察徒稱充之典選廉平蒨以風格顯畧不一言其大節何耶梁主追尊考妣為帝后封功臣十五人為公侯沈約為尚書僕射范雲為散騎常侍吏部尚書以本紀修戊辰梁弑巴陵王以呂祖謙標目修解題曰齊自髙帝至和帝五世通鬱林王昭業海陵恭王昭文為七世凡二十四年梁議贖刑以本紀修解題曰朱熹曰贖刑盖本舜典金作贖刑之語實則不然舜典所謂贖者官府學校之刑爾若五刑則固未甞贖也五刑之寛惟處以流鞭扑之寛方許其贖漢張敞以討羌兵食不繼為入穀贖罪之法初未甞及殺人與盜之罪而蕭望之等猶以為如此則富者得生貧者獨死恐開利路以傷治化曾謂唐虞之世而有是贖法哉惟周穆盤遊無度財匱民勞至其末年無以為計乃為贖刑之法以斂民財後世當戒而不當遵也事見通鑑齊宗室南康侯子恪等仕梁以壽終以呂祖謙標目修解題曰姚察曰昔魏藉兵威而革漢運晉因宰輔乃移魏厯異乎古之禪授以德相傳故抑前代宗枝用絶民望然劉煜曹志猶顯於朝及宋遂為廢姓而齊之戚屬一皆殱焉其祚不長抑亦由此有梁革命弗取前規髙祖之𢎞量度越前代矣胡寅曰梁武雖以兵取而其資非殘忍之人也故於子恪等能保全之向使沈約不進邪説則必封巴陵於小國俾主齊祀矣帝以利害所迫狃於弊俗未受命間先殺寶攸等以脅中外既受命又惑於約而有鄭伯禽之事是皆不知命之所為詩曰商之孫子其麗不億上帝既命侯于周服侯服于周天命靡常夫惟順天而受命則命在我矣何虞乎商之復得而𠞰其後裔哉向使武帝移待子恪之心以待巴陵王與寶攸等豈不為五朝盛德之主耶事見通鑑梁徵前中書令謝朏處士何㸃㸃弟前國子祭酒𦙍塗朏𦙍不至以本紀修梁鎮軍大將軍江州刺史陳伯之反五月戊子遣領軍將軍王茂討之以本紀修六月梁以楊紹先為武都王以本紀修陳伯之攻豫章不克遂奔魏以紀傳修梁益州刺史劉季連反以吕祖謙標目修秋八月梁定律令制鍾律以梁紀隋樂志修冬十一月甲子梁立子統為皇太子以呂祖謙標目修魏洛陽宮室始成通鑑是歲梁大旱以梁紀修梁髙祖武皇帝天監二年年魏世宗宣武皇帝景明四春正月乙卯梁沈約范雲為左右僕射以本紀修梁劉季連降以呂祖謙標目修夏四月癸未朔魏以蕭寶寅都督東揚等三州軍事東揚州刺史齊王陳伯之都督淮南軍事江州刺史以本紀傳修五月丁巳梁霄城文侯范雲卒尚書左丞徐勉右衞將軍周捨秉政以呂祖謙標目修梁斷郡縣獻奉以朱熹綱目修六月梁以謝朏為司徒尚書令以本紀修秋七月庚午魏復鹽池之利以本紀修辛未魏以彭城王勰為太師以本紀修八月庚子魏以元英都督征義陽諸軍事司州刺史以本紀修冬十一月楊集始卒己未魏立其子紹先為武興王以通鑑修癸亥魏侍中左僕射源懷行北邊六鎮三州懷奏損鎮官以魏紀傳修解題曰梁載言十道四蕃志六鎮在靈州懷逺縣杜佑通典既於靈州懷逺縣注云漢富平縣魏六鎮在此又於馬邑雲中單于界注六鎮在焉豈靈州與雲中封壤相錯耶李吉甫元和郡縣志豐州天德軍城北六十里沃野故城即六鎮從西第一鎮陸恭之風土記云朔方故城後魏太和十年改為沃野鎮正始三年尚書源思禮撫巡蕃塞以沃野鎮居南與蘭山澤六鎮不齊别置三戍東受降城光祿城東北有懷朔古鎮即六鎮從西第二鎮東受降城武川城即六鎮從西第三鎮按魏本紀太和十八年魏主幸懷朔武川撫㝠柔𤣥四鎮詔賜六鎮及禦夷城民粟是禦夷在六鎮之外也又明帝改沃野懷朔薄骨律武川撫㝠柔𤣥懷荒禦夷諸鎮為州豈懷荒禦夷為州而沃野懷朔薄骨律武川撫㝠柔𤣥自為六鎮歟又通典後魏置懷荒禦夷二鎮於蔚州魏納貴嬪髙氏以呂祖謙標目修梁髙祖武皇帝天監三年年魏世宗宣武皇帝正始元春正月丙寅魏改元以魏紀修解題曰宋庠紀年通譜正始本魏髙貴鄉公髙雲年號二月魏任城王澄攻梁鍾離夏四月乃退以呂祖謙標目修五月丁未朔魏免太傅錄尚書北海王詳為庶人尋殺之以通鑑修解題曰按北史列傳帝密令害之故書殺秋七月梁將軍馬仙琕救義陽大敗八月乙酉魏降義陽取三闗封元英為中山王以梁紀魏紀修解題曰三闗者平靖闗一曰行者坡在信陽軍南武陽闗一曰大寨廣峴闗一曰九里闗亦屬信陽軍界左傳蔡侯呉子伐楚還塞大隧直轅㝠阸乃武陽平靖冬十一月戊午魏營國學以魏紀修解題曰按北史儒林傳序魏道武初定中原立太學置五經博士天興增國子太學生員太武天安初詔立鄉學太和建明堂辟雍尊三老五更又開皇子之學及遷都洛邑詔立國子太學四門小學大抵南北所為章句好尚互有不同江左周易則王輔嗣尚書則孔安國左傳則杜元凱河洛左傳則服子慎周易則鄭康成詩則並主於毛公禮則同遵於鄭氏餘見通鑑甲子梁除金贖罪之科以通鑑修十二月己亥魏議定律令以魏紀修梁髙祖武皇帝天監四年年魏世祖宣武皇帝正始二春正月癸卯朔梁置五經博士開五經館以本紀修解題曰按儒林傳序江左草創日不暇給迄于宋齊國學時或開置而勸課未博建之不及十年廢之多厯世祀髙祖詔求碩學治五禮定六律天監四年置五經博士廣開館宇招内後進於是以平原明山賔吴國沈峻建平嚴植之㑹稽賀瑒補博士各主一館館有數百生其射䇿通明者即除為吏十數月間懷經負笈者雲㑹又選學生如㑹稽受業於何𦙍分遣博士祭酒到州郡立學七年又詔大啓庠斆博延胄子命皇太子皇子宗室王侯就業髙祖親釋奠於先師先聖申之以讌語勞之以束帛濟濟焉洋洋焉大道之行也如是盖武帝孜孜學問博通經術故於庠序知所崇尚然其於聖經豈真有所得哉不然何委身釋氏竟以亡天下也餘見通鑑梁漢中太守夏侯道遷降魏魏以尚書邢巒為鎮西將軍赴之二月取漢中夏四月入劒閣以呂祖謙標目修梁益州刺史蕭淵藻殺前刺史鄧元起坐貶以通鑑修六月庚戌梁初立孔子廟以通鑑修秋七月魏軍逼梁涪城通鑑冬十月丙午梁大舉伐魏以揚州刺史臨川王宏都督軍事以本紀修楊紹先稱帝十一月戊辰朔魏討之以通鑑修魏邢巒請取蜀不從以呂祖謙標目修是歳梁大有年以梁紀修梁髙祖武皇帝天監五年年魏世宗宣武皇帝正始三春正月壬申魏滅楊氏以其地為東益州以吕祖謙標目修解題曰按通典漢建安中氐酋楊滕為部落大帥滕子駒始據仇池後有名千萬者魏拜為百頃氐王孫飛龍漸盛晉武帝假西平將軍還居畧陽茂捜元康初還保百頃苻堅克之茂捜孫宋奴二子佛奴佛狗佛奴子定有秦州之地後與乞伏乾歸戰見殺佛狗子盛襲位至紹先為魏所滅以為武興鎮後改為東益州地形志東益州領武興仇池槃頭洛聚並沔州之地廣萇未詳廣業未詳梓潼未詳七郡三月丙寅朔日有食之以梁本紀修丁亥陳伯之自壽陽歸梁以本紀修夏四月乙未魏罷鹽池禁以北史本紀修庚戌魏以中山王英為征南將軍拒梁軍五月梁取魏宿預梁城合肥羊石霍丘等城六月取朐山城秋七月魏安將軍都督東討軍事邢巒敗梁師九月取宿預己丑梁臨川王宏軍潰于洛口冬十月魏中山王英圍鍾離十一月梁遣將軍曹景宗救之以通鑑梁紀魏紀傳修解題曰水經注淮水北注下蔡縣故城東又東徑八公山北又東逕梁城四瀆編案兩淮對境圖濠州㙭澗鎮黄團新城之間有梁城灘北對歐村二十里洛河二十五里羊石魏書列傳彭城王勰至壽春東定城戍至於陽石則陽石盖在壽春之東也又東闗樅水陽石合肥有急懸之切則陽石盖邇於合肥也寰宇記霍邱縣本梁所置霍邱戍隋開皇為縣梁髙祖武皇帝天監六年年魏世宗宣武皇帝正始四春二月梁遣豫州刺史韋叡救鍾離三月與曹景宗大破魏軍中山王英走秋八月英坐除名以本紀修解題曰葉適曰江南自劉裕後惟韋叡邵陽洲之捷最偉時魏號百萬連城數十不止為一鍾離也昔徐晃救曹仁破堰城四冡屯陷入圍裏遂全樊城叡於曹景宗營前立城致敵來攻裝艦為水軍拔柵斫橋魏人崩潰而鍾離自解晃以勇奪敵氣叡以勇奪敵勢故皆能取勝也事見通鑑冬閏十月乙丑梁驃騎將軍開府臨川王宏為司徒左僕射沈約為尚書令以梁紀修丁卯魏尚書令髙肇弑皇后于氏以朱熹綱目修梁髙祖武皇帝天監七年年魏世宗宣武皇帝永平元春正月梁定品班以列傳修解題曰按梁史列傳天監初官名互有省置徐勉撰立選簿奏之有詔施用開九品為十八班自是貪冒茍進者以財貨取通守道淪退者以貧寒見没矣二月庚午梁置州望郡宗鄉豪掌捜薦以梁紀修三月戊子魏髙肇殺皇子昌以朱熹綱目修秋七月甲午魏立貴嬪髙氏為后以魏紀修八月魏冀州刺史京兆王愉反乙丑遣鎮北將軍李平討之以魏紀修解題曰宋庠紀年通譜改元建平本漢哀帝石勒慕容盛慕容德白亞栗斯劉義宣年號丁卯魏改元以魏紀修解題曰宋庠紀年通譜永平本漢明帝晉惠帝年號九月戊戌魏殺彭城王勰以皇極經世修魏京兆王愉伏誅以呂祖謙標目修梁取三闗魏遣中山王英救之冬十月懸瓠降梁梁取魏宿豫安陸諸城十二月己未魏鎮南將軍都督南討軍事邢巒拔懸瓠以呂祖謙標目修解題曰通典梁氏雍州下溠戍漢東郡棗陽縣東南夏口白茍堆在京汝南郡真陽縣大同中東魏遣堯雄為南境守將曰白茍堆梁北面重鎮請備之硤石城下蔡縣合州即合肥鍾離淮隂朐山為重鎮及景平後江北悉陷髙齊漢蜀没于西魏安陸梁置南司州宋德安府是歳柔然佗汗可汙為髙車王彌俄突所殺以呂祖謙標目修梁髙祖武皇帝天監八年年魏世宗宣武皇帝永平二春正月梁令諸儒草封禪儀著作郎許懋議古無封禪納之以呂祖謙標目修解題曰梁武於是賢於漢唐之君逺矣事見通鑑魏取三闗以呂祖謙標目修三月魏侵梁雍州刺史吴平侯昺大破之以通鑑修冬十一月己丑魏主講佛書以呂祖謙標目修解題曰帝於式乾殿為諸僧及朝臣講維摩詰經帝篤好佛理常於禁中親講經論沙門條錄為内起居上既崇之下彌企尚至延昌中州郡僧尼寺積有一萬三千七百二十七所餘見通鑑朱熹曰佛教初入中國止有四十二章經是古書至東晉有談義如今講師作議一篇總説之今則文字至多餘見天監十五年求佛書于西域解題梁髙祖武皇帝天監九年年魏世宗宣武皇帝永平三春正月庚寅梁新作緣淮塘以本紀修三月己丑梁主幸國子學詔皇太子以下皆入學以本紀修夏四月丁巳梁詔尚書令史用士流以呂祖謙標目修解題曰朱黼曰周官太宰小宰宰夫之屬上士八人中士十有六人下士三十有二人凡天下之務百官羣有司之事無不闗决總督也今行文書之史僅十有二而士乃五十六何賤者寡而貴者多乎盖掌官法官常以相切磋而出政令者非奔走服力小夫之所當與也使小夫足以辦此則茍可以為利行奸者烏得而盡察之不若付之賢士雖文書闊略不足慮也漢自蕭何以刀筆致相位遂謂天下大事茍知文書者皆足以相參考於是特立誦書九千文之科用以擇吏曹參繼之擇郡國史亦不過木訥淳謹而已自是以徃令史雖非士流然相府掾屬尚擇人也魏晉以下遂專以國事委之吏胥武帝全用士流要不為無意也按梁書良吏傳序髙祖在田知民疾苦梁臺建仍下寛大書東昏時雜調悉除省逮踐皇極躬覽庶事日昃聽政求民之瘼乃命輶軒以省方俗置肺石以達窮民始去貲計丁為布身服浣濯之衣太官徹牢饌日膳蔬菜飲酒不過三醆以儉先海内每選長吏務簡亷平皆召見親朂治道始擢尚書殿中郎到溉為建安内史左民侍郎劉騣為晉安太守又著令小縣有能遷大縣大縣有能遷二千石於是山隂令邱仲孚治有異績以為長沙内史武康令何遠清公以為宣城太守剖符為吏者徃徃承風焉是歲梁始行大明厯以梁紀修梁髙祖武皇帝天監十年年魏世宗宣武皇帝永平四春三月盗殺梁東莞琅琊太守以胊山降魏魏遣徐州刺史盧昶赴之夏四月梁遣將軍馬仙琕擊之冬十一月朐山降十二月昶走仙琕追擊大破之以稽古錄修解題曰按魏書列傳自經理江左唯中山王英敗於鍾離昶於朐山失利最為甚焉餘見通鑑是後南北州名不可勝紀以吕祖謙標目修解題曰按宋書州郡志地理參差其詳難舉實由名號驟易境土屢分或一郡一縣割成四五四五之中亟有離合千囘百改巧厯不算尋校推求未易精悉葉適曰時代遷換南北割裂而地之去留無常是人事不能免至於樂變慕廣不求於政而求於地則後世之通患也其後又不止此或州增複名郡累冗號無益而祗為異去古逾遠矣書地之法當存舊繫雅削浮没猥而已梁髙祖武皇帝天監十一年魏世宗宣武皇帝延昌元年春正月丙辰魏以車騎大將軍尚書令髙肇為司徒尚書僕射清河王懌為司空以魏紀修夏四月乙丑魏改元以魏紀修冬十月乙亥魏立子翊為皇太子以魏紀修十一月梁五禮成行之以梁紀修解題曰普通五年中軍將軍徐勉上修五禮表伏尋所定五禮起齊永明三年太子歩兵校尉伏曼容表求制一代禮樂於時參議置新舊學士十人止修五禮軍火散失天監元年尚書左丞何佟之啓審省署之宜敕使外詳時尚書叅詳欲省禮局併還尚書儀曹詔即撰次於是尚書僕射沈約等請五禮各置舊學士一人各自舉學士二人相助抄撰乃以右軍記室參軍明山賔掌吉禮中兵騎兵參軍嚴植之掌㓙禮中軍田曹行參軍賀瑒掌賔禮征虜記室參軍陸璉掌軍禮右軍參軍司馬聚掌嘉禮何佟之總其事後以鎮北諮議參軍伏暅代之更使鎮軍將軍沈約太常卿張充及臣三人同參厥務又使中書侍郎周捨庾於陵復豫參知大凡一千一百七十六卷八千一十九條餘見通鑑葉適曰雖去取得失之中不可知然一時君臣不可謂不盡其心矣考之隋經籍志惟存吉禮十卷賔禮九卷梁髙祖武皇帝天監十二年魏世宗宣武皇帝延昌二年春二月庚辰盗殺梁青冀二州刺史張稷以降魏梁北兖州刺史康絢討平之以通鑑修解題曰按齊州郡志建元初以東海一郡屬冀州全領一郡治連口通典泗州漣水縣齊冀州寄治於此北兖州宋置於淮陰閏三月乙丑梁建昌隱侯沈約卒以梁紀修夏六月癸巳梁新作太廟以梁紀修秋魏恒肆二州頻年地震山鳴以通鑑修解題曰肆州治九原領永安宋太原府忻代雲三州之地秀容嵐憲忻代四州岢嵐寧化火山保德四軍之地鴈門代州之地宋白續通典秦始皇移樓煩郡於善無縣今句注山北下館城是也故續漢書云鴈門郡治陰館魏文帝移郡南度句注置廣武城後魏明帝移置廣武東古上館城初太平二年置肆州寄治忻州秀容城周宣帝移於此為代州三郡梁髙祖武皇帝天監十三年魏世宗宣武皇帝延昌三年冬十月辛亥魏以髙肇為大將軍大都督攻梁益州中䕶軍元遥為征南將軍都督遏梁楚以魏紀修梁初堰淮以吕祖謙標目修梁髙祖武皇帝天監十四年魏世宗宣武皇帝延昌四年春正月丁巳魏主殂皇太子詡即皇帝位以魏紀修己未魏罷兵以吕祖謙標目修魏以右僕射任城王澄為尚書令與太保髙陽王雍秉政御史中丞王顯弗從領軍將軍于忠誅之二月庚辰尊皇后為皇太后召髙肇還辛巳伏誅以吕祖謙標目修解題曰按列傳于忠與門下議以肅宗幼年未親機政太尉髙陽王雍屬尊望重宜入居西栢堂省決庶政任城王澄明德茂親可為尚書令總攝百揆奏中宫請即敕授御史王顯欲逞其奸與中常侍給事中孫伏連等厲色不聽寢門下之奏伏連等欲矯太后令以髙肇録尚書事顯與渤海公髙猛同為侍中忠即於殿中收顯殺之餘見通鑑先是中書尚書之權迭為輕重至是女主臨朝則門下之權重矣是年髙陽王雍為太師録尚書事與太傅懌等入居門下同釐庶政熙平二年太師髙陽王雍正元四年太尉汝南王悦入居門下參決尚書奏事北史列傳武定二年陽休之除中書侍郎先是中書專主綸言魏宣武已来事移門下至是發詔依舊又王遵業傳時政歸門下世謂侍中黃門侍郎為小宰相皆胡后臨朝時後世三省並稱遂為故實癸未魏髙陽王雍為太傅領太尉清河王懌為司徒驃騎大將軍廣平王懷為司空以魏紀修己亥魏尊胡貴嬪為皇太妃三月甲辰朔廢皇太后吕祖謙標目修魏于忠專朝政以吕祖謙標目修魏復百官禄罷綿麻税以魏紀修夏四月梁淮堰潰復作之以梁紀修秋八月乙亥魏于忠殺左僕射郭祚尚書裴植免髙陽王雍以吕祖謙標目修丙子魏尊胡太妃為皇太后以其父國珍為光禄大夫以吕祖謙標目修己丑清河王懌為太傅領太尉廣平王懐為太保領司徒任城王澄為司空庚寅車騎大將軍于忠為尚書令特進崔志為車騎大將軍並儀同三司壬辰員外郎元义為通直散騎常侍以魏紀修九月魏太后臨朝稱令于忠為征北大將軍冀州刺史任城王澄領尚書令以通鑑修梁將軍趙祖悦襲據魏西硖石癸亥魏遣將軍崔亮攻之以通鑑修解題曰西硖石見晉孝武太元八年解題冬十月乙酉魏胡國珍為中書監儀同三司以通鑑修閏十二月魏以髙陽王雍為太師録尚書事以魏紀傳修盗殺魏晉壽太守以降梁益州刺史鄱陽王恢遣巴西梓潼太守張齊赴之以通鑑修魏胡太后攝行祭事以吕祖謙標目修梁髙祖武皇帝天監十五年元年魏肅宗孝明皇帝元翊熙平春正月戊辰朔魏改元以魏紀修魏以吏部尚書李平為鎮東大將軍行臺二月乙丑克硖石平將攻浮山堰崔亮稱疾師還以魏紀吕祖謙標目修三月戊辰朔日有食之以梁紀修夏四月梁淮堰成以吕祖謙標目修梁張齊破魏兵圍武興魏以鎮南軍司𫝊豎眼為西征都督秋七月擊齊敗之復取東益州以吕祖謙標目修九月梁淮堰壊以吕祖謙標目修魏任城王澄請重北邊鎮將選舉不聽以吕祖謙標目修是歲魏作永寧寺求佛書於西域以魏釋老志及通鑑修解題曰太后好事佛民多絶户為沙門髙陽王友李瑒上言三千之罪莫大於不孝不孝之大無過於絶祀孔子云未知生焉知死安有棄堂堂之政而從鬼教乎都統僧暹等忿瑒謂之鬼教以為謗佛泣訴於太后太后責之瑒曰天曰神地曰祇人曰鬼傳曰明則有禮樂幽則有鬼神然則明者為堂堂幽者為鬼教佛本出於人名之為鬼愚謂非謗熙平元年詔遣沙門惠生使西域採諸經律正光三年冬還京師所得經論一百七十部行於世神龜元年冬司空尚書令任城王澄奏曰髙祖定鼎嵩瀍城内唯擬一永寧寺地郭内唯擬尼寺一所餘悉城郭之外景明之初微有犯禁世宗爰發明㫖城内不造立浮屠僧尼寺舍正始三年沙門統惠深違禁前詔仍卷不行邇来十年私營轉盛城郭之内垂五百寺奪民居三分且一昔如来闡教多依山林今此僧徒戀著城邑當由利引其心莫能自止非但京邑如此天下州鎮僧寺亦然侵奪細民廣占田宅如臣愚意都城中有營造麤功可改者請在郭外任擇所便若僧不滿五十者小就大寺未幾喪亂加以河陰之禍朝士死者其家多舍宅以施僧尼京邑第舍略為寺矣今不復行水經註永寧寺作九級浮屠下基方一十四丈自金露拌下至地四十九丈取法代都七級而又廣髙之雖西京之盛五都之富未有若斯之富楊衒之洛陽伽籃記自後漢至晉永嘉惟四十二寺後魏京城内外一千五百六十七寺東魏遷鄴焚毁外餘四百三十寺柔然伏跋可汗大破髙車殺其王彌俄突以吕祖謙標目修梁髙祖武皇帝天監十六年魏肅宗孝明皇帝熙平二年春正月魏詔五銖錢與古錢通行巧偽者罪之以通鑑修魏考核軍功尋止以通鑑修夏四月戊申魏中書監開府胡國珍為司徒以通鑑修梁宗廟以麵代牲冬十月薦脩用蔬果以梁紀修梁髙祖武皇帝天監十七年魏肅宗孝明皇帝神龜元年春二月己酉魏改元以魏紀修解題曰宋庠紀年通譜獲神龜於九龍殿靈芝池故改元神龜夏四月丁酉魏秦文宣公胡國珍卒號太上秦公以吕祖謙標目修魏復税綿麻以魏傳修解題曰諌議大夫張普惠上疏以為髙祖廢大斗去長尺改重秤以愛萬姓從薄賦知軍國須綿麻之用故絹上税綿八兩布上税麻十五斤萬姓歌舞以供其賦自兹以降所税絹布漸漸長闊百姓怨嗟宰輔不尋其本革其弊存其可存而特放綿麻之調以悦天下之心尚書知國少綿麻便欲去天下之大信奏求還復以充國用不思庫中大有綿麻而羣官共竊之何者今絹布匹有丈五之盈絲綿斤兼百銖之剰未聞依律罪州郡或一匹之濫一斤之惡則鞭户主連三長百官請俸之人樂長闊厚重無復准極不聞嫌長惡廣求計還官者今若必復綿麻宜明立嚴禁復本幅度依太和之税使天下知二聖之心愛民惜法如此則髙祖之軌中興於神龜矣夫髙祖增綿麻之初正以民之病於大斗長尺重秤有甚於綿麻故也然綿麻既取之後安能保後世幅度銖合不復增乎未幾何時浸復長闊則雖蠲綿麻已無益矣况復從而征之乎天下之事固有以善意為之而反作俑於後日者此類是也魏主始月一視朝以朱熹綱目修解題曰孝文臨朝堂謂穆亮曰三代之禮日出視朝漢魏以降禮義漸殺晉令有朔望集公卿於朝堂而論政事亦無天子親臨之文今因卿等日中之集中前則卿等自論政事中後與卿等共議可否葢自孝文之後論政之禮又廢矣至是始因張普惠之言而行之事見通鑑五月戊寅梁司徒驃騎大將軍揚州刺史臨川王宏免以朱熹綱目修秋七月癸未朔魏以宦者侍中劉騰為衛將軍儀同三司以吕祖謙標目修戊申魏弑故太后髙氏以吕祖謙標目修冬十月乙亥梁中軍將軍中書監臨川王宏為司徒以通鑑修是歲魏復㩁鹽以呂祖謙標目修梁髙祖武皇帝天監十八年魏肅宗孝明皇帝神龜二年春正月丁亥魏胡太后稱詔以吕祖謙標目修二月庚午魏羽林虎賁殺征西將軍張彛不復窮治以通鑑稽古録修解題曰識者於是知魏之將亂也按齊書本紀髙湖子謐仕魏至侍御史坐法徙懐朔鎮生樹樹生歡累世北邊故習其俗遂同鮮卑長而深沉有大度給鎮為隊主函使自洛陽還傾産以結客親故怪問之曰宿將羽林相率焚領軍宅朝廷懼其亂而不問為政若此事可知也財物豈可常保耶自是乃有澄清天下之志餘見通鑑葉適曰髙歡中國人也以徙於北邊遂習鮮卑宇文泰鮮卑也而欲行中國禮樂之事習相逺也豈不然又曰歡微賤給使所徃来皆胥吏下𨽻而史載其傾産結客不知歡衣食尚不自給産於何傾而天下清濁亦竟何在盖為文飾之過耳魏吏部尚書崔亮初立停年格選舉失人自亮始以吕祖謙標目修解題曰通典亮奏為年格制官不問愚賢以停解日月為斷雖復官須此人停日後者終不得取庸才下品年月久者則先擢用時沉滯者皆稱其能後甄琛元脩義城王徽相繼為吏部尚書利其便已踵而行之自是賢愚同貫魏之失才從亮始也及辛雄為吏部郎中上疏曰神龜以来專以停年為選士無善惡歲久先敘職無劇易名到授官執案之吏以差次日月為功能銓衡之人以簡得老舊為平直且庸劣之人莫不貪鄙貨賄是求肆心縱意致徭役不均發調違謬盖助陛下治天下者唯在守令宜須簡置以康國道請上等郡縣為第一清中等為第二清下等為第三清選補之法妙盡才具如不可並後地先才不得拘以停年竟無銓革三載黜陟有稱者補在京名官如前代故事不厯郡縣不得為内職則人思自勉書奏㑹帝崩時亮外甥劉景安書規亮曰殷周以鄉塾貢士兩漢由州郡薦才魏晉又置中正雖未盡美應十收六七朝廷貢士止求其文不取其理察孝亷推論章句立中正不考人才行業空辨姓氏髙下至於取士之途不溥沙汰之理未精舅須改張易調如何反為停年格以限之天下誰復修勵名行哉亮答書曰古今不同時宜復異昔有中正品其才上之尚書據狀量人授職此乃與天下共爵人也今之選專歸尚書以一人之鍳照察天下何異以管窺天哉今勲人甚少又羽林入選武夫倔起而不解書計忽令佩組乗軒求其烹鮮之效文武人至多官員至少不可周溥設令十人共一官猶無官可授况一人冀一官哉吾近靣執不宜使武人入選請賜其爵厚其禄既不見從是以權立此格限以停年耳夏五月戊戌魏以任城王澄為司徒驃騎大將軍儀同三司以本紀修魏賞賜無節府庫漸虚乃减百官祿力以吕祖謙標目修朱熹綱目修冬十二月癸丑魏任城文宣王澄卒以吕祖謙標目修梁髙祖武皇帝普通元年年魏肅宗孝明皇帝正光元春正月乙亥朔梁改元以梁紀修丙子日有食之以梁紀修秋七月丙子魏領軍將軍元义及劉騰幽太后於北宫殺清河王懌以吕祖謙標目修己卯梁江淮海溢以梁紀修辛卯魏改元以魏紀修解題曰宋庠紀年通譜加元服故改元魏相州刺史中山王熙起兵誅元义劉騰不克八月見殺以魏紀稽古錄修甲子梁車騎將軍永昌嚴侯韋叡卒以吕祖謙標目修九月戊戌魏以髙陽王雍為丞相與元义同決庻務以魏紀修解題曰十月以汝南王悦為侍中太尉十二月以京兆王繼為司徒通典曰後魏舊制有大將軍不置太尉有丞相不置司徒自正光以後始俱置之然又重門下官多以侍中輔政則侍中為樞密之任柔然可汗阿那瓌奔魏以魏紀修冬十月魏以汝南王悦為侍中太尉十二月辛酉魏京兆王繼為司徒以魏紀修魏聘梁復通好以通鑑修梁髙祖武皇帝普通二年年魏肅宗孝明皇帝正光二春正月魏納阿那瓌于柔然弗克以通鑑修三月魏右將軍奚康生謀迎太后不克見殺劉騰為司空夏四月京兆王繼為太保崔光為司徒以吕祖謙標目修六月梁琬琰殿火以梁紀修秋七月梁將軍裴邃為豫州刺史以通鑑修解題曰時以合肥為豫州髙車破柔然可汗婆羅門降魏冬十月魏分處阿那瓌婆羅門於邊以吕祖謙標目修梁髙祖武皇帝普通三年年魏肅宗孝明皇帝正光三夏五月壬辰朔日有食之既以本紀修冬十一月丙午魏初行正光厯以魏紀修十二月京兆王繼為太傅崔光為太保以魏紀修柔然婆羅門叛魏亡歸尋見擒以吕祖謙標目修是歲梁西豐侯正德奔魏以通鑑修梁髙祖武皇帝普通四年年魏肅宗孝明皇帝正光四春二月柔然阿那瓌入魏境以本紀修三月魏劉騰卒以吕祖謙標目修夏四月阿那瓌北遁以吕祖謙標目修魏尚書令李崇請改縁邊諸鎮為州不從以吕祖謙標目修魏懐荒鎮民及沃野鎮民破六韓拔陵反改元以吕祖謙標目修冬十一月癸未朔日有食之以本紀修十二月戊午梁始鑄鐵錢以梁紀修是歲梁西豐侯正德自魏逃歸復其封爵以列傳修解題曰正德逃歸而復其封爵所以基他日叛逆之禍也事見通鑑梁髙祖武皇帝普通五年年魏肅宗孝明皇帝正光五春三月魏遣臨淮王彧討破六韓㧞陵夏四月敕勒酋長胡琛應拔陵武川懐朔鎮陷五月彧敗壬申以李崇開府為討北大都督討之以吕祖謙標目魏紀修六月梁遣裴邃伐魏以吕祖謙標目修魏秦州莫折大提反遣雍州刺史元志討之大提死其子念生自稱天子改元秋七月甲寅遣吏部尚書元脩義為西道行臺討之以吕祖謙標目修魏將軍崔暹敗於白道李崇還雲中以吕祖謙標目修解題曰冀州圖云雲中郡北去陰山八十里南去通漢長城百里即白道川也當原陽鎮北八月甲午魏元志大敗於隴口以魏紀修解題曰按太平寰宇記唐元載云原州當隴山之右武經揔要今鎮戎軍故原州城東西部敕勒皆附破六韓拔陵丙申魏始改鎮為州以吕祖謙標目修魏秀容人反别將爾朱榮討平之魏紀九月梁拔魏諸城裴邃襲壽陽弗克以梁紀修壬申魏以左僕射蕭寶寅為西道行臺大都督以魏紀修冬十月魏營州就德興反以吕祖謙標目修解題曰營州領昌黎建德遼東樂浪冀陽營兵六郡並營州之地梁裴邃進兵魏守將多棄城走以通鑑修十一月戊申莫折天生陷魏岐州殺元志十二月壬辰魏以京兆王繼都督西道討之以本紀吕祖謙標目修解題曰岐州治雍城鎮領秦平鳳翔府武都鳳翔府隴州武功鳳翔府醴州之地三郡梁取魏三關圍頴州弗克以通鑑修解題曰郢州領安陽城陽汝南後省三郡魏地形志豫州義陽郡注永安三年置天平四年罷隋地理志汝南郡真陽縣注後魏置郢州東魏廢州改置義陽郡是歲梁太子詹事周捨免散騎常侍朱异代掌機密以吕祖謙標目修梁髙祖武皇帝普通六年年魏肅宗孝明皇帝孝昌元春正月梁破魏南鄉郡及馬圈等城以朱熹綱目修庚申魏徐州刺史元法僧稱帝改元魏討之法僧降梁梁以為司空以吕祖謙標目修魏征西將軍西道都督崔延伯及蕭寶寅大破莫折天生於黒水走之以京兆王繼為太尉以魏紀修解題曰按水經注謂水自落門東至黒水峽東有黒水出南山北流入海癸酉梁裴邃大敗魏河間王琛于壽陽以梁紀修二月魏元义為驃騎大將軍開府尚書令以吕祖謙標目修三月乙丑梁遣豫章王綜督彭城軍召元法僧還以吕祖謙標目修魏京兆王繼班師以吕祖謙標目修柔然阿那瓌討破六韓拔陵破之夏四月自稱可汗以朱熹綱目吕祖謙標目修辛卯魏胡太后臨朝發劉騰墓賜元义死以開府屬鄭儼前鴈門太守徐紇為中書舍人以魏紀傳修壬辰胡琛遣將万俟醜奴等冦魏涇州崔延伯擊之敗死以魏紀修五月梁夷陵烈侯裴邃卒壬子以中䕶軍夏侯亶督壽陽軍事以吕祖謙標目修六月庚辰梁豫章王綜降魏魏取彭城立綜為丹陽王更名贊梁召夏侯亶還以吕祖謙標目修癸未魏改元以魏紀修西部鉄勒降魏廣陽王深大敗破六韓拔陵以魏傳修秋八月魏杜洛周反於上谷改元以魏紀修冬魏二荆西郢州蠻反梁將曹義宗圍荆州以吕祖謙標目修解題曰按水經注東荆州治沘陽縣通典後魏置東荆州於唐州荆州於鄧州魏書列傳裴絢為郢州刺史以蠻酋地居險要表為西郢州刺史後周紀改西郢州為鴻州屬唐州十二月戊子梁邵陵王綸有罪免官削爵土以朱熹標目修魏山胡劉蠡升自稱天子改元以吕祖謙標目修解題曰按通典稽胡一曰歩落稽晉時匈奴别種或云赤狄之後自離石昌化郡以西安定以東方七八百里居山谷間蠡升居雲陽谷在縣界梁髙祖武皇帝普通七年年魏肅宗孝明皇帝孝昌二春正月魏鮮于脩禮反於定州以吕祖謙標目修夏四月魏鮮于阿胡反於朔州遣左光祿大夫長孫稚為都督討之鮮于脩禮敗稚五月以吏部尚書廣陽王淵為北討大都督以魏紀修解題曰懐荒民叛而沃野應之髙平民叛而秦州應之秀容民叛而和龍上谷定朔諸州相延而動卒使爾朱得之以為資其所由来者漸矣按地形志朔州領大安廣寧神武太平附化五郡後並省隋地理志代公猗盧都代即朔州後魏為懐朔鎮孝文於州北定襄故城置朔州齊天保六年於州西南四十七里置朔州八年移於馬邑城即今城也廣陽王淵北史避唐髙祖諱改作深按魏收書作淵而通鑑從北史今改從收書秋七月魏行臺常景破杜洛周别帥以通鑑修戊申鮮于阿胡陷魏平城以吕祖謙標目修梁遣頴州刺史元樹及夏侯亶伐魏以本紀修八月癸巳賊帥元洪業殺鮮于脩禮以降魏賊黨葛榮殺洪業而自立以吕祖謙標目修魏恒朔州都督爾朱榮襲取肆州以吕祖謙標目修九月辛亥葛榮殺魏都督章武王融自稱天子國號齊改元又殺廣陽王淵以吕祖謙標目修就德興陷魏平州以通鑑修莫折念生降魏既而復反破六韓拔陵殺胡琛万俟醜奴併其衆以吕祖謙標目修冬十一月辛巳魏壽陽降梁梁以夏侯亶為豫南豫二州刺史以通鑑修解題曰按輿地志梁克壽春立淮南梁西汝陰武安四郡通典自齊永元陷後魏至是二十七年始復胡寅曰梁武三築淮堰至是十年死者數十萬人然後能取壽陽才得七萬五千口是十年勞費以三四人而易一人其愚甚矣事見通鑑杜洛周陷魏幽州執常景以魏紀修魏豫徴六年租調以吕祖謙標目修解題曰王師古曰魏自北方諸鎮選舉既輕守令率以暴賦横歛為先故其亂相尋而不息魏之君臣不深推其本而欲恃力以求勝連歲征討國用耗竭於是豫歛六年租調以給征討之費甚至入市有税邸店有征既以重歛失六鎮之心又恣虐取以重中土之怨是以手足之疾而使心腹俱受其蠧其亡不亦宜乎事見通鑑梁髙祖武皇帝大通元年年魏肅宗孝明皇帝孝昌三春正月乙丑梁徐勉為尚書僕射以梁紀修辛未魏葛榮陷殷州以本紀修解題曰殷州統趙宋屬慶源真定中山三府南趙信德慶源二府南鉅鹿慶源大名二府三郡莫折念生大敗魏司空蕭寶寅於涇州遂陷岐豳北華州寶寅免為庶人以本紀修解題曰豳州領西北地宋屬慶陽府原環二州趙興寧州襄樂慶陽延安二府寧州三郡方輿記大統十四年分涇州新平縣置南豳州廢帝三年去南為豳州北華州領中部延安府鄜坊二州敷城延安府鄜州二郡通典魏置東泰州於鄜州後改北華州餘見升平元年解題辛卯梁譙州刺史湛僧智圍魏東豫州司州刺史夏侯䕫取魏平靜穆陵陰山關以通鑑修解題曰按地形志東豫州治廣陵即新蔡郡長陵縣領汝南蔡州東新蔡光蔡二州新蔡蔡州弋陽光州長陵蔡州陽安未詳六郡隋書地理志蔡州新息後魏置東豫州又魏書曹世表傳世表行豫州刺史值蕭衍將湛僧珞即僧智陷東豫州州民劉獲鄭辯反於州界朝廷以源子恭代世表為東南道行臺率元顯伯等討之時賊衆强斷小殷關穎昌府郾城縣北有小溵水諸將咸欲保城自固世表時患背腫輿病呼統軍是云寶謂曰僧珞所以敢深入為冦者以辯獲皆州民之望為之内應譯知劉獲移軍欲迎僧珞去此八十里今出不意一戰可破獲破則僧珞自走乃簡士馬付寶暮出城比曉兵合一戰破獲僧珞退走元慶和傳慶和東豫州刺史為梁將所攻舉城降之梁書夏侯䕫傳䕫司州刺史譙州刺史湛僧智圍魏東豫州刺史元慶和於廣陵入其郛魏書地形志東豫州太和置治廣陵城興和分置豫州廣陵郡領宋安光城安蠻新蔡汝南五縣後省通鑑考異知其非南兖州之廣陵但不明載其處耳顯伯率軍赴援䕫自武陽魏書地形志豫州襄城郡有武陽縣隋書地理志蔡州西平縣有故武陽縣㑹僧智斷魏軍歸路䕫至遂請降顯伯夜遁衆軍追斬獲不可勝數詔以僧智領東豫鎮廣陵䕫引軍屯安陽魏書地形志汝南郡有安陽縣隋地理志光州固始縣有安陽郡遣偏將屠楚城由是義陽北道遂與魏絶餘見通鑑穆陵陰山關在黃州麻城縣餘見天監三年三關解題二月莫折念生據魏潼關既而西走以魏紀修三月辛未梁主没身同泰寺以皇極經世修解題曰南朝宫苑記同泰寺武帝造在𤣥武門内逼路東寺南門直對宫城大通門甲戌梁改元以梁紀修解題曰宋庠紀年通譜梁創同泰寺開大通門對之取反語以協同泰也改元符寺及門名也秋七月魏相州刺史樂安王鍳降葛榮魏討之八月丁未伏誅以魏紀修九月魏秦州杜粲殺莫折念生據其州以魏紀修魏將軍元顯伯救東豫州冬十月庚戌東豫州降梁顯伯敗走以通鑑修魏以衛將軍討虜大都督爾朱榮為車騎將軍儀同三司以本紀修梁東宫直閣陳慶之取魏渦陽大敗魏兵以通鑑修魏以中尉酈道元為關右大使甲寅征西將軍雍州刺史開府西討大都督蕭寶寅殺之而反自稱齊帝改元魏遣尚書僕射長孫稚為行臺討之以魏紀修十一月丁卯梁以䕶軍蕭淵藻為都督鎮渦陽以梁紀修葛榮陷魏冀州十二月戊申殺刺史源子邕以魏紀修秦州殺杜粲以降魏以魏紀修大事記續編卷四十一
