body:
  text: 大事記續編卷六明王禕撰漢孝哀皇帝元壽二年春正月胸奴單于烏孫大昆彌來朝通鑑三月壬辰晦日有食之以天文志修夏五月正三公官董賢為大司馬孔光為大司徒彭宣為大司空封長平侯以本紀修解題曰哀帝始以大司馬居大司徒之上自是遂為故事故後漢百官志先太尉而後司徒徐防之徒由司徒而為太尉六月戊午帝崩於未央宫本紀解題曰蘇轍曰哀帝在國好禮節儉知成帝權奪於王氏及即位收攬威柄朝廷竦然而傅太后僣竊名號復寵任幸臣雖欲貶損王氏而身既失德朝無重臣所以資之者多矣詩曰無競維人四方其訓之有覺德行四國順之二者帝皆失之其若王氏何哉太皇太后之未央宫收璽綬詔尚書發兵符節百官奏事中黃門期門兵皆屬王莽董賢自殺庚申莽為大司馬領尚書事紀傳稽古録解題曰太后遣使者馳召莽詔尚書諸發兵符節百官奏事中黃門期門兵皆屬莽總政機收兵權也按後漢王閎傳哀帝臨崩以璽綬付董賢曰無妄以豫人時國無嗣立內外悚懼閎白元后請奪之即帶劍至宣德殿後闥舉手叱賢曰宫車晏駕國嗣未立公受恩深重當俯伏號泣何事以持璽綬以待禍至耶賢知閎必死不敢拒之乃跪授璽綬閎馳上后朝廷壯之其事班固不載餘見通鑑百官表尚書符節令中黃門皆屬少府期門兵屬光祿勳三輔黃圖未央宫有宣德殿闥宫中門也秋七月遣車騎將軍安陽侯王舜等迎元帝孫中山王衎以傳紀修貶皇太后為孝成皇后徙孝哀皇后於北宫以本紀修貶傅太后為定陶恭王母丁太后為丁姬以列傳修何武及左將軍公孫祿免孔鄉侯傅晏等徙合浦遣武及王立就國八月廢孝成皇后孝哀皇后為庶人皆自殺以列傳修彭宣免就國以列傳修戊午右將軍王崇為大司空封扶平侯以列傳修九月辛酉中山王即皇帝位謁高廟年九歲太皇太后臨朝稱制王莽秉政百官總已以聽以本紀修孔光為帝太傅位四輔右將軍馬宫為大司徒封扶德侯以列傳修冬十月壬寅葬義陵上諡曰孝哀皇帝以史記修漢孝平皇帝元始元年春正月益州塞外蠻夷獻白雉羣臣言王莽功德比周公宜賜號安漢公賜民爵三月丙辰孔光為太師王舜為太保左將軍甄豐為少傅封廣陽侯居四輔奉車都尉甄邯封承陽侯莽為太傅幹四輔之事號曰安漢公以列傳通鑑修解題曰葉適曰王莽秉政才四月而篡事已成蓋承諸父之舊內外無非王氏之人故速捷如此事見通鑑立故東平王雲太子開明為王故桃鄉頃侯子成都為中山王封宣帝耳孫信等三十六人為列侯賜太僕王惲等二十五人爵關內侯置羲和官以本紀百官表修公卿奏言太皇太后不宜親小事乃下詔令安漢公莽四輔平決州牧二千石茂才吏以列傳修夏五月丁巳朔日有食之本紀六月拜帝母衛姬為中山孝王后賜帝舅衛寶衛玄爵關內侯封周公後公子寬為褒魯侯孔子後孔均為褒成侯以本紀恩澤侯表修追諡孔子為褒成宣尼公本紀解題曰魏了翁曰古者弟子之於師子孫之於祖父尊之而無以加也則稱字以别之字之至貴漢初猶然而新莽不知仲尼之為尊也妄為作諡然宣尼之云未嘗削其字也至追崇之典代增則以絫諡為重加封為貴矣漢孝平皇帝元始二年春黃支國獻犀牛本紀越嶲郡上黃龍遊江中孔光等稱安漢公莽功德比周公大司農孫寶斥之坐免官列傳解題曰吕祖謙曰使平帝廷臣皆如寶則漢何自而亡事見通鑑三月癸酉王崇謝病免夏四月丁酉甄豐為大司空右將軍孫建為左將軍光祿勳甄邯為右將軍以吕祖謙標目修紹封宗室及功臣後為王侯者百餘人朱熹通鑑綱目郡國大旱蝗安漢公莽四輔三公卿大夫吏民皆獻田宅以口賦貧民本紀光祿大夫龔勝大中大夫邴漢謝病歸以列傳修解題曰策曰惟元始二年六月庚寅光祿大夫大中大夫耆艾二人以老病罷太皇太后使謁者僕射策詔之賜帛及行道舍宿歲時羊酒衣衾皆如韓福故事餘見通鑑秋九月戊申晦日有食之本紀使謁者大司馬掾四十四人持節行邉兵本紀頒四條於胸奴以列傳修漢孝平皇帝元始三年夏安漢公莽奏定車服制度吏民飬生送終嫁娶奴婢田宅器械之品郡國縣鄉立學校庠序置經師以本紀修安漢公莽子宇與帝外氏衛氏有謀宇下獄死盡滅衛氏支屬殺章敬長公主紅陽侯王立平阿侯王仁汜鄉侯何武鮑宣等數百人以紀傳修解題曰自寒浞之後以人臣而篡天子之位自莽始也後世易代往往皆師莽之所為莽誅除異已者曹操殺孔融司馬氏殺夏侯玄嵇康劉裕殺謝混劉藩至白馬而其禍極矣事見通鑑漢孝平皇帝元始四年春正月郊祀高祖以配天宗祀孝文以配上帝本紀改殷紹嘉公曰宋公周承休公曰鄭公本紀三月丁未立安漢公莽女王氏為皇后以本紀修解題曰班固贊外戚曰易著吉凶而言謙盈之效天地鬼神至於人道靡不同之夫女寵之興繇至微而體至尊窮富貴而不以功此固道家所謂禍福之宗也自漢興終於孝平外戚後庭色寵著聞二十有餘人然其保位全家者唯文景武帝太后及卭成后四人而已至如史良娣王悼后許恭哀后身皆夭折不辜而家依託舊恩不敢縱恣是以能全其餘大者夷滅小者放流嗚呼鑒兹行事變亦備矣吕祖謙曰班固論外戚之成敗深切著明然謂許史不敢縱恣亦誣矣殺蕭望之蓋寬饒皆是物也縱恣有大於此者乎餘見通鑑遣太僕王惲等八人行天下觀風俗以通鑑修夏四月甲子皇后見高廟加安漢公莽號宰衡賜莽母號功顯君子二人為列侯以紀傳修解題曰莽內媚事旁側長御以下賂遺以千萬數白尊太后姊妹為君皆食湯沐邑日夜共譽莽又知太后婦人厭居深宫中莽欲虞樂以市其權乃令太后四時車駕巡狩四郊所至屬縣輒施恩惠賜民錢帛牛酒歲以為常夫行媚於內而施賂於外愚弄其民而虞羿於田樹之詐慝以取其國家此寒浞之所以篡夏也莽不學寒浞而事與之合豈凡篡弒者固同一術耶餘見通鑑孔光辭位詔毋朝十日一入省中以列傳修秋立明堂辟雍靈臺築學舍萬區立樂經益博士員徴天下通經異能之士以紀傳修解題曰應劭曰明堂所以正四時出教化明堂上圓下方八窗四達布政之宫在國之陽八窗法八風四達法四時九室法九州十二重法十二月三十六戶法三十六雨七十二牖法七十二風孝經曰宗祀文王於明堂以配上帝黃帝曰合宫有虞曰總章殷曰陽館周曰明堂辟雍者象璧圜雍言以水象教化流行胡寅曰明堂辟雍靈臺雜見於詩禮孝經孟子其制作之詳不可聞然以理考之王者嚮明而治古之堂今之殿也故孝經以為宗祀之所孟子以為王政之堂然則是天子之外朝猶後世大朝會之正衙也若吕不韋青陽總章之制劉歆世室重屋之説豈可盡信乎靈臺據詩與孟子而言亦燕遊之所耳若辟雍則未有明言其義者獨詩言於樂辟雍又曰鎬京辟雍而已夫辟君也雍和也言人君有和德而天地之和應之天下之心服之也此二詩者亦言與民同樂建立都邑之事而己未遽及學校之政也況其上章又有皇王維辟之云哉王制記天子諸侯之學始有辟雍泮宫之名不知何所本而云泮水之詩亦未有以見其為學校者獨取匪怒伊教之句以為證則末矣徴能治河者以通鑑修解題曰莽徴能治河者以百數長水校尉關並言河決率常於平原東郡左右其地形下而土疏惡聞禹治河時本空此地以為水秦漢以來河決曹衛之域其南北不過百八十里者可空此地勿以為官亭民室大司馬史張戎言水性就下行疾則自刮除成空而稍深河水重濁號為一石水而六斗泥民皆引水溉田故使河流遲貯淤而稍淺水暴至溢決而隄塞之稍益高於平地猶築垣而居水也可各順從其性毋復灌溉則水道自利矣御史韓牧以為可略於禹九河處穿之縱不能為九但為四五宜有益大司空掾王橫言河入勃海地高於韓牧所欲穿處往天嘗連雨東北風海水溢西南出九河之地已為海所漸矣禹之行河水本從西山下東北去周譜定王五年河徙則今所行非禹之所穿也又秦攻魏決河灌其都決處遂大不可復補宜郤徙完平處更開空使緣西山足乘髙地而東北入海莽時但崇空語無施行者陳瓘曰並戎二䇿至今猶可施行也餘見通鑑尊孝宣廟為中宗孝元廟為高宗本紀分天下為十二州冬置西海郡本紀解題曰西海今肅州之地後為吐谷渾都餘見隋大業五年解題梁王立徙漢中自殺以本紀修分京師置前輝光後承烈二郡更公卿大夫元士官名位次及十二州名分界以本紀修大風吹長安城東門瓦屋以五行志修漢孝平皇帝元始五年春正月祫祭明堂諸侯王列侯宗室子徴助祭益戶賜爵秩金帛補吏有差以本紀修復南北郊三十餘年間天地之祠凡五徙以紀志修解題曰元帝好儒貢禹韋玄成匡衡等相繼為公卿禹建言漢家宗廟祭祀多不應古禮上是其言成帝即位丞相衡御史大夫談奏言帝王之事莫大乎承天之序承天之序莫重於郊祀故祭天於南郊就陽之義也瘞地於北郊即隂之象也天之於天子也因其所都而各饗焉往者孝武皇帝居甘泉宫即於雲陽立泰畤祭於宫南今常幸長安郊見皇天反北之泰隂祠后土反東之少陽事與古殊制宜可徙置長安願與羣臣議定大司馬車騎將軍許嘉等八人以為宜如故右將軍王商博士師丹議郎翟方進等五十人以為宜違俗復古天子從之建始元年始於長安定南北郊衡又言泰畤紫壇有文章采鏤黼黻之飾及玉女樂石壇仙人瘞鸞路騂駒寓龍馬之屬宜皆勿修又雍鄜密上下畤本秦所立及北畤未定時所立不宜復修及陳寶祠由是皆罷明年衡談復條奏郡國候神方士使者所祠凡六百八十三所其二百八所應禮其餘四百七十五所不應禮請皆罷奏可又罷高祖所立梁晉秦荆巫及孝文渭陽孝武泰一孝宣泰山蓬山之屬明年衡坐事免官爵又初罷甘泉畤作南郊日大風壞甘泉竹宫折拔畤中樹木十圍以上百餘天子異之以問劉向對曰家人尚不欲絶種祠況於國之神寶舊畤且甘泉汾隂及雍五畤始立皆有神祗感應然後營之及陳寶祠至今七百餘歲矣古今異制經無明文至尊至重難以疑説正也前納貢禹之議後人相因易大傳曰誣神者殃及三世恐其咎不獨止禹等上意恨之向謂經無明文難以疑正尚不違經義至謂家人種祠與誣神者殃及三世則不經之甚矣後上以無繼嗣永始三年遂復甘泉泰畤汾隂后土及雍五畤陳寶祠天子復親郊禮又復長安郡國祠著明者且半帝末年頗好鬼神故多上書言祭祀方術者谷永説上曰臣聞明於天地之性不可惑以神怪知萬物之情不可罔以非類諸背仁義之正道不遵五經之法言而盛稱竒怪鬼神及言世有仙人服食不經之藥皆姦人惑衆挾左道懷詐偽以欺罔世主惟陛下距絶此類毋令姦人有以窺朝者上善其言楊時曰人情狃於禍福而易動鬼神隱於無形而難知以易動之情稽難知之理而欲正百年之謬宜乎其難矣綏和二年成帝崩皇太后詔復南北郊長安如故哀帝即位寢疾盡復前世所嘗具神祠官凡七百餘所一歲三萬七千祠建平三年復泰畤后土祠如故逮平帝元始五年安漢公王莽奏言與太師孔光等六十七人議宜如丞相衡等議復長安南北郊莽又頗改其祭祀曰周官天地之祀樂有合有别其合樂曰以六律六鍾五聲八音六舞大合樂祀天神祭地祗祀四望祭山川享先妣先祖凡六樂奏六歌而天地神祗之物皆至其别樂曰冬日至於地上之圜丘奏樂六變則天神皆降夏日至於澤中之方丘奏樂八變則地祗皆出隂陽之别於日冬夏至其會也以孟春正月上辛若丁天子親合祀天地於南郊以高帝高后配以日冬至使有司奉祠南郊高帝配而望羣陽日夏至使有司奉祭北郊高后配而望羣隂奏可三十餘年之間天地之祠五徙焉郡國置宗師以本紀修夏四月乙未孔光薨以馬宫為太師以列傳修吏民上書薦安漢公莽者前後四十八萬七千餘人五月策莽以九錫以列傳修解題曰此權臣受九錫之始也韓詩外傳曰諸侯有德天子錫之一錫輿馬再錫衣服三錫樂則四錫朱戶五錫納陛六錫虎賁七錫弓矢八錫鈇鉞九錫秬鬯事見通鑑封羲和劉歆等十二人為列侯以本紀修琅邪太守公孫閎言災異誅以列傳修閏月發定陶恭王母及丁姬冢取其璽綬壞恭王廟以列傳修解題曰時有燕數千銜土投丁姬穿中哀帝尊寵丁傅踰禮過制固當裁定然莽以私意為之遂至逆天理而失人心燕之銜土甚類臨江王志一之動氣也餘見通鑑封師丹為義陽侯尋卒以列傳修秋八月壬午馬宫免列傳泉陵侯劉慶上書請安漢公莽居攝以列傳修冬十一月高帝原廟災十二月丙午安漢公莽弒帝葬康陵上諡曰孝平皇帝令天下吏六百石以上皆服喪三年以紀傳修解題曰班固曰孝平之世政自莽出褒善顯功以自尊盛觀其文辭方外百蠻無思不服休徴嘉應頌聲並作至乎變異見於上民怨於下莽亦不能文也尊孝成廟曰統宗孝平廟曰元宗以列傳修長樂少府平晏為大司徒以列傳修解題曰班固曰自孝武興學公孫𢎞以儒相其後蔡義韋賢玄成匡衡張禹翟方進孔光平當馬宫及當子晏咸以儒宗居宰相位服儒衣冠先生語其醖藉可也然皆持祿保位被阿諛之譏彼以古人之迹見繩烏能勝其任乎前輝光謝囂奏武功得白石丹書告安漢公莽為皇帝王舜請令莽稱攝太皇太后許之詔徴宣帝玄孫又詔莽居攝踐阼以列傳修漢孺子嬰居攝元年春正月莽祀南郊迎春東郊以列傳修三月己丑立宣帝玄孫嬰為皇太子年二歲尊皇后曰皇太后以王舜為太傅左輔甄豐為太阿右拂甄邯為太保後承又置四少以列傳修夏四月安衆侯劉崇起兵討莽不克死之朱熹綱目五月甲辰太皇太后詔莽朝見稱假皇帝以列傳修冬十月丙辰朔日有食之列傳是歲西羌攻西海郡以列傳修漢孺子嬰居攝二年夏五月更造錯刀契刀大錢與五銖錢並行列傳秋九月東郡太守翟義起兵討莽立嚴鄉侯劉信為天子義自號大司馬柱天大將軍莽以輕車將軍孫建等七人為將軍擊義遣三將軍屯諸關塞三輔趙朋霍鴻等起兵應義莽以王級閻遷為將軍擊朋等冬十月莽作大誥以諭天下諸將至陳留災與義戰破之十二月圍義圉城殺義信亡走以列傳修漢孺子嬰初始元年春地震以列傳修虎牙將軍王邑等還引兵西趙朋等皆滅以列傳修封將帥有功者三百九十五人為侯伯子男以列傳修莽封子褒新侯安都堂侯臨為公以列傳修秋九月莽母功顯君死以列傳修冬十一月莽奏太皇太后請毋言攝改元以列傳修梓潼哀章為金匱以獻戊辰莽受於高廟即天子位國號新改正朔易服色以十二月癸酉朔為元年朔更太皇太后號為新室文母太皇太后以列傳修解題曰班彪曰三代以來王公失世稀不以女寵及王莽之興由孝元后歷漢四世為天下母饗國六十餘載羣弟世權更持國柄五將十侯卒成新都位號已移於天下而元后卷卷猶握一璽不欲以授莽悲夫事見通鑑新莽始建國元年解題曰張衡條上班固所敘與典籍不合者以為王莽本傳但應載篡事而已至於編年月紀災祥宜為元后本紀厥後沈既濟以唐武后紀併之中宗蓋本於此今據通鑑以莽年接漢統書之從其實也宋庠紀年通譜其正月乃前年之十二月用商正建丑之月耳春莽立妻王氏為皇后子臨為皇太子安為新嘉辟封子宇子六人為公廢孺子為定安公孝平皇后為定安太后以列傳修按金匱封拜四輔三公四將以列傳修更諸官名降漢諸王為公侯為子列傳立祖廟五親廟四以漢高廟為文祖廟立漢廟於定安國其園寢廟在京師者勿罷以列傳修禁剛卯刀錢更作小錢與大錢五並行禁民不得挾銅炭以列傳修夏四月徐鄉侯劉快起兵討莽不克死之朱熹綱目名天下田曰王田奴婢曰私屬不得賣買以列傳修秋遣五威將王竒等十二人班符命於天下授新印綬列傳貶勾町王西域王為侯更胸奴單于印列傳冬靁桐華以列傳修遣諫大夫五十人分鑄錢於郡國列傳是歲真定常山大雨雹以列傳修新莽始建國二年春二月廢漢諸公為民列傳立五均司市錢府官𣙜酤賣鹽鐡器鑄錢禁民不得挾弩鎧以列傳食貨志修解題曰劉歆言周有泉府之官收不讎與欲得顔師古曰讎讀曰售即易所謂理財正辭禁民為非者也莽乃下詔曰夫周禮有賖貸樂語有五均鄧展曰樂語樂元語河間獻王所傳道五均事臣瓉曰其文曰天子取諸侯之士以立五均則市無二賈四民常均強者不得困弱富者不得要貧則公家有餘恩及小人民矣傳記各有斡焉今開賖貸張五均設諸斡者所以齊衆庶抑并兼也遂於長安及五都洛陽邯鄲臨淄宛成都立五均官皆置交易丞五人錢府丞一人工商皆采金銀連錫登龜取貝者如淳曰登進也皆自占司市錢府顔師古曰各以其所采取之物自隱實於司市錢府也又以周官稅民凡田不耕為不殖出三夫之稅城郭中宅不樹藝者為不毛出三夫之布民浮遊無事出夫布一匹其有不能出布者冗作縣官衣食之諸取鳥獸魚鱉百蟲於山林水澤及畜牧者嬪婦桑蠶織紝紡績補縫工匠醫巫卜祝及他技商販賈人皆各自占所為於其在所之縣官除其本計其利十分之而以其一為貢敢不自占自占不以實者盡沒入所采取而作縣官一歲諸司市常以四時中顔師古曰中讀作仲實定所掌為物上中下之賈各自用為其市平衆民賣買五穀布帛絲綿之物周於民用而不售者均官考檢厥實用其本賈取之萬物昂貴過平一錢則以平賈賣與民低賤減平者聽民自相與市以防貴庾者民欲祭祀喪紀而無用者錢府以所入工商之貢但賖之顔師古曰但空也徒也言賖與之不取息也民或乏絶欲貸以治産業者均授之除其費計所得受息毋過歲什一顔師古曰均謂各依先後之次除其費謂衣食之費已用者也周官泉府掌以市之征布斂市之不售貨之滯於民用者以其賣買之物揭而書之以待不時而買者賣者各從其抵都鄙從其主國人郊人從有司然後豫之凡賖者祭祀無過旬日喪紀無過三月凡民之貨者與其有司辨而授之以國服為之息凡國之財用取具焉歲終則會其出入而納其餘鄭衆云假令其國出絲絮則以絲絮償其國出絺葛則以絺葛償鄭玄謂以國服為之息以其於國服事之稅為息也於國事受園㕓之田而貸萬泉者則期出息五百王莽時民貸以治産業者但計贏所得受息無過歲什一賈公彥疏曰萬泉五百計當二十而取一若然近郊十一者萬泉期出息一千逺郊二十而三者萬泉期出息一千五百甸稍縣鄙之民萬泉期出息二千也王莽時則與周少異周時不計其贏所得多少據本徴利王莽時雖計本多少為定及其徴科唯據所贏多少假令萬泉歲還贏萬泉徴一千贏五千徴五百餘皆據利徴什一也胸奴擊車師戊巳校尉史陳良等殺校尉刁護降胸奴以列傳修冬十一月罷漢廟在京師者以列傳修更號定安太后為黃皇室主以列傳修十二月雷列傳更名胸奴單于曰降奴服於遣將軍孫建等率甲卒三十萬人擊之須畢至同出以列傳修更作金銀龜貝錢布名寶貨尋寢但行大小錢列傳更始將軍甄豐自殺殺豐子京兆大尹尋東通靈將五司大夫劉棻等數百人以列傳修解題曰初甄豐劉秀王舜為王莽腹心安漢宰衡之號皆豐等所共謀而豐舜秀亦並富貴非復欲令莽居攝也莽意欲稱居攝豐等承順其意莽輒復封豐等子孫以報之豐等爵位已盛又實畏漢宗室天下豪傑而疏逺欲進者並作符命莽遂據以即真豐子尋作符命言黃皇室主為尋之妻莽心疑大臣怨謗欲震威以懼下因是發怒收捕尋豐自殺辭連秀子棻棻弟泳等連引黨親列侯死者數百人餘見通鑑吕祖謙曰三子成王莽居攝之勢而不欲莽之居攝荀彧致曹操九錫之功而不欲操之受九錫是猶培其根而惡其實也是嵗起八風臺以列傳修新莽始建國三年胸奴入塞殺太守都尉諸將屯邉郡未進兵將軍嚴尤請令先至者深入不聽民苦徴發盜賊始起以列傳修王舜死列傳遣使者迎龔勝為太子師友祭酒勝死之列傳瀕河郡蝗列傳河決魏郡以列傳修新莽始建國四年夏赤氣出東南竟天以列傳修定五等國邑以圖籍未定未授國邑王田私屬得自買賣以列傳修句町殺牂柯大尹周歆高勾驪殺遼西大尹田談以列傳修解題曰漢地理志高勾驪玄莬郡縣也後漢列傳在遼東之東千里南與朝鮮濊貊東與沃沮北與扶餘接武帝滅朝鮮以為縣新莽始建國五年春二月太皇太后王氏崩合葬渭陵而溝絶之以列傳修解題曰魯昭公之喪季孫使役如闞公氏將溝焉榮駕鵝曰生不能事死又離之以自旌也縱子忍之後必恥之乃止王莽之惡於是浮於季孫矣冬十一月彗星出以列傳修是歲烏孫大小昆彌遣使貢獻焉耆殺都護但欽等以列傳修除挾銅炭之禁以列傳修改明年元以列傳修胸奴烏珠留單于死其弟咸立以胸奴傳修新莽天鳯元年解題曰宋庠紀年通譜疑有鳯凰之祥因以為號春正月莽將都洛陽遣太傅平晏等先相宅以列傳修三月壬申晦日有食之以列傳修夏四月隕霜殺草木以列傳修六月黃霧四塞以列傳修秋七月大風拔樹飛北闕直城門屋瓦雨雹殺牛羊以列傳修置卒正連率大尹州牧部監六鄉六尉六隊六郊以列傳修胸奴和親檻送陳良等燔殺之列傳緣邉大飢人相食列傳益州蠻殺大尹程隆遣將軍馮茂擊之列傳復下金銀龜貝之貨作貨布貨泉罷小錢以食貨志修新莽天鳯二年春二月日中見星以列傳修民訛言黃龍死以列傳修改胸奴單于曰恭奴善于以胸奴傳修五原代郡盜賊起以列傳修邯鄲以北大雨水出列傳新莽天鳯三年春二月地震大雨雪關東尤甚竹柏或枯以列傳修夏五月庚寅朔始賦吏祿以列傳修六月戊辰長平館岸崩壅涇水北行以列傳修解題曰荀悅紀作長平觀如淳曰在池陽南上原之阪有長平觀去長安五十里顔師古曰在涇水南原今謂眭城坂按徐錯方輿志長平觀在涇陽縣東南九里長平坂在涇陽縣非一處也戊子晦日有食之以列傳修秋大司馬陳茂免以將軍嚴尤代之以列傳修冬十月戊辰王路朱鳥門鳴以列傳修馮茂擊句町不克徴還下獄死復遣將軍亷丹擊之以列傳修越嶲蠻任貴殺太守自立為卭穀王以列傳修是歲遣五威將王駿等出西域焉耆襲殺之以列傳修新莽天鳯四年夏五月封保成師友祭酒唐林為建德侯諫議祭酒紀逡為封德侯以列傳修六月更授諸侯茅土於明堂以列傳修是歲臨淮琅邪及荆州緑林兵起以通鑑修解題曰李賢曰緑林山在今荆州當陽縣東北新莽天鳯五年春正月北軍南門災以列傳修考吏致富者收其財五分之四以助邉以列傳修莽孫功崇公宗自殺以列傳修是歲諸吏中散大夫楊雄卒以列傳修解題曰雄字子雲蜀郡成都人也少時好學博覽無所不見為人簡易佚蕩默而好深湛之思清靜無為少耆欲不汲汲於富貴不戚戚於貧賤不修亷隅以徼名當世顧嘗好辭賦為郎當成哀平間三世不徙官王莽篡位以久次轉為大夫莽既以符命自立欲絶其原而甄豐子尋劉歆子棻復獻之莽誅豐父子投棻四裔時雄校書天祿閣上治獄事使者欲收雄雄從閣上自投下幾死莽聞之曰雄何故在此間使問其故乃劉棻嘗從雄學作竒字雄不知情詔勿問卒年七十一琅邪樊崇兵起以通鑑修解題曰崇起兵於莒同郡人逢安東海人徐宣謝祿各起兵合數萬人復引從崇餘見通鑑莒琅邪國縣東觀記崇安東莞人宣祿東海臨沂人胸奴烏纍單于死弟左賢王輿立以胸奴傳修新莽天鳯六年春亷丹擊益州不克徴還遣大司馬護軍郭興等擊之以列傳修胸奴寇邉大募丁男及死罪囚吏民奴為鋭卒稅吏民訾三十取一公卿以下皆保飬軍馬以列傳修嚴尤免以列傳修解題曰尤素有智略非莽攻伐四夷數諫不從及遣尤與亷丹誅單于而立須卜當尤固言胸奴可且以為後先憂山東盜賊莽大怒䇿免尤蓋王莽伐胸奴而不憂盜賊與煬帝伐高麗而不憂盜賊其亡一耳餘見通鑑復訾民三十稅一以列傳修新莽地皇元年春正月改元以列傳修解題曰宋庠紀年通譜按莽傳莽見盜賊多乃令太史推三萬六千歲厯紀六歲一改元布告天下十二月改元地皇從厯紀也令犯法者論斬毋須時以列傳修二月壬申日正黑以列傳修秋七月大風毁王路堂以列傳修立子安為新遷王臨為皇太子尋改為統義陽王以列傳修九月起九廟以列傳修大雨六十餘日以列傳修巨鹿男子馬適求謀舉燕趙兵誅莽不克死以列傳修以豫虞唐尊為太傅封平化侯以列傳修是歲罷大小錢更行貨布以食貨志列傳修南郡江夏下江兵起以列傳修解題曰續漢志南郡編縣有藍口聚即下江也新莽地皇二年春莽妻王氏死諡孝睦皇后統義陽王臨謀殺莽事覺自殺新遷王安死以列傳修遣太師羲仲景尚等擊青徐賊以列傳修轉天下穀邉郡以擊胸奴以列傳修解題曰程頥曰古有兵車載糗糧百人須二十五人然止在中國若深入則決無省力秦運海隅之粟以饋邉率三十鍾而致一石是二百倍一兵行一夫饋止可供七日耳且以三夫助一兵計之須十五日即回一日不回則一日食乏古人所以不得已而後用之也秋隕霜殺菽關東大飢蝗以列傳修毁漢高廟以列傳修是歲南郡秦豐兵起以列傳修解題曰莽召問羣臣禽賊方略皆曰此天囚行尸命在漏刻秦使者之對二世虞世基之對煬帝皆謂鼠竊狗盜無能為即此類也豐南郡改縣黎丘鄉人李賢曰黎丘故城在襄州率道縣北初四方皆以餓寒窮愁起為盜賊稍稍羣聚常思歲熟得歸鄉里衆雖萬數不敢略有城邑諸長吏牧守皆自亂鬬中兵而死賊非敢欲殺之也而莽終不諭其故荆州牧發奔命二萬人討緑林賊賊帥迎擊大破牧軍鈎牧車屏泥刺殺其驂乘然終不敢殺牧大司馬士按章豫州為賊所獲賊送付縣餘見通鑑陳瓘曰莽之賊剝下民可謂極矣然民不以略城邑為利而以去鄉里為重民之本心豈欲亂乎新莽地皇三年春二月霸橋災以列傳修樊崇等殺景尚列傳關東人相食列傳夏四月遣太師王匡及亷丹討赤眉樊崇遣大將軍孔仁納言大將軍嚴尤等擊新市平林兵以列傳修蝗飛蔽天流民入關者數十萬人以列傳修赤眉殺亷丹以列傳修冬長沙王發六世孫縯及其弟秀起兵舂陵與新市平林兵合攻拔棘陽以後漢紀傳修解題曰鄧晨娶秀姊元秀嘗與縯及晨俱之宛與蔡少公等宴語少公頗學圖讖言劉秀當為天子或曰是國師公劉秀乎秀戲曰何用知非僕耶李通父守好星厯讖記通素聞守説讖云劉氏復興李氏為輔會秀避事在宛通遣從弟軼迎秀及相見共語移日因具言讖文事光武之信讖本於此秀乃與通軼起於宛縯自發舂陵子弟合七八千人餘見通鑑李賢曰新市縣屬江夏郡故城在今郢州富永縣東北平林在今隨州隨縣東北宛屬南陽郡故城在今鄧州南陽縣舂陵本屬零陵冷道縣元帝時以蔡陽白水鄉封舂陵侯故城在今棗陽縣西南棘陽縣屬南陽郡古謝國在棘水之陽故城在今唐州湖陽縣西北十一月有星孛於張以列傳修劉縯與前隊大夫甄阜屬正梁丘賜等戰大敗還保棘陽以後漢本紀修大事記續編卷六
