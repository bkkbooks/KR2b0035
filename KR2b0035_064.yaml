body:
  text: 大事記續編卷六十四明王禕撰唐憲宗皇帝元和十三年春正月乙酉大赦免元和二年以前逋負新紀修麟德殿二月浚龍首池以吕祖謙標目修三月戊戍李鄘罷庚子御史大夫李夷簡為門下侍郎同平章事以新舊紀修己酉橫海節度使程權入朝歸滄景二州以新紀及吕祖謙標目修解題曰程懷直以建中三年為橫海軍節度副大使傳四世三十六年夏四月甲寅王承宗歸德𨽻二州庚辰赦承宗以新紀修解題曰張耒曰魏鎮兵強國富屹然大鎮非可易攻者也德宗始使馬燧李抱真攻之二將之力弊於田恱而王武俊朱滔相煽而起四方諸侯始輕京師淮西雖積於判然數郡之地也元濟昏童倔強其間豈河朔諸鎮比哉憲宗乘其機察其時一舉而滅李師道王承宗之徒或誅或臣而四方靡然效順矣無他德宗先攻其堅敵未亡而已之氣先索而力先弊此朱泚懷光所以陸梁而下忌者也憲宗先攻其易既碎其巢穴戮其鯨鯢兵雖猶未出而制勝之氣業已威震于天下則是師道與承宗攻一時而不得者所以消沮而不能抗也事見通鑑六月癸丑朔日有食之舊紀秋七月以鳯翔節度使李訴統武寧橫海軍討李師道以新紀修辛丑李夷簡罷以新紀修八月壬子朔王涯罷以新紀修九月甲辰戶部侍郎皇甫鏄諸道鹽鐵轉運使程異為工部侍郎同中書門下平章事判使如故以新舊紀修解題曰按新舊史列傳帝以天下略平亦欲崇臺沼宮觀自娛樂鎛與程異知帝意數貢羡餘隂佐所欲又賂吐突承璀為奧援胡寅曰任宦官喜進奉德宗之膏肓也憲宗逺慕貞觀之治而近修真元之失殆幼小習聞熟見以為常事而不知怪耳羣臣朝夕納誨期於格心必使之如晉元帝之覆抔苻堅之止獵終身不可為也苟攻病不去其源用藥不窮其證雖目前暫安亦終於危亡而已帝以異鎛平蔡時供饋不乏並拜平章事詔書既下物情駭異雖市道皆嗤之崔羣裴度以物議上聞帝不聽度乃表罷政事因論之曰華夏安否繫於朝廷朝廷輕重在於宰相如臣駑鈍不能增日月之明廣天地之德遂使每事皆勞聖心所以平賊安人費力如此方期陛下博探人望致之輔弼而乃忽取微人列於重地鏄自掌財賦唯事割剝應仰給度攴之處無不切齒願食其肉比者淮西諸軍糧料所破五成錢只與一兩成士卒怨怒臣到行營慰喻方小安今舊兵悉向淄青討伐忽聞此人入相必相與驚憂以為更有前日之事異雖人品凡俗心事和平處之煩劇或亦得力升之相位實亦非宜今者臣若不退天下謂臣有負恩寵今退既未許言又不聽如火燒心若箭攢體今淮西蕩定河北咸寧承宗斂手削地程權束身赴闕韓𢎞輿疾討賊非力能制之祗是朝廷能服其心今繼關中興陛下何忍却自破除使四方解體帝以為朋黨竟不省覽鎛知公論不可益以巧媚自固奏減內外官俸以贍國用給事中崔植封還詔書乃止帝斥內帑所餘詔度支評直售之以給邉兵繒綵觸手輒壞士怨怒聚而焚之度以事聞鏄因引其足奏曰此靴乃內庫出者臣以錢二千買之勞韌可服彼言不可信詐也帝以為然由是鏄益無忌憚蘇轍曰權萬紀言宣饒部中鑿山冶鐵嵗可取數百萬緍以佐國用帝怒罵曰吾所乏忠言嘉謨有益於民者耳汝為御史不能進賢退不肖而怵吾以利豈謂我漢桓靈耶斥去不用於是士莫敢以利言者故房杜諸人得效其忠力及玄宗初用姚崇宋璟盧懷慎蘇頲後用張説源乾曜張九齡憲宗初用杜黃裳李吉甫裴度李絳後用韋貫之崔羣故開元元和之初其治度幾貞觀然玄宗方用宋璟而宇文融以括田幸遽至宰相融既死而言利者爭進至楊國忠而聚斂極矣故天寶之亂海內分裂而不可復合憲宗方平淮蔡而程異皇甫鎛皆以利進裴度三上書極論不可帝以天下略平欲自娛樂異鎛揣知其意數貢羡財以順所欲故度卒逐去而異鎛皆用不三年而禍發於宦官玄宗在位嵗久聚斂之害遍於天下故天下遂分憲宗之世其害未究故禍止於其身然方鎮之強宦官之橫遂與唐相終始可不哀哉帝嘗語度本文作臣事君當勵善底公朕惡夫樹黨者度曰君子小人以類而聚未有無徒者君子之徒同德小人之徒同惡外甚類中實逺在陛下觀所行則辨帝曰言者大抵若此朕豈易辨之度退喜曰上以為難辨則易以為易辨則難君子小人行判矣已而卒為異鎛所構冬十一月丁亥以山人桞泌為台州刺史以求仙藥以新紀修十二月庚戍迎佛骨於風翔新紀唐憲宗皇帝元和十四年春正月刑部侍郎韓愈諫迎佛骨癸巳貶為潮州刺史以吕祖謙標目修丙申田𢎞正大敗李師道兵於東阿二月戊午師道伏誅分淄青等十二州為三道庚午以淄青都知兵馬使劉悟為義成節度使以新舊紀通鑑修解題曰李正己以永泰元年為留後傳四世凡五十四年實録唐厯初盜殺武元衡王承宗叔父士平上封乃得張晏等三十人初副仗內鞫不得其情詔送京兆命監察御史陳中師尹裴武鞫之獄成皆處斬及田𢎞正平淄青奏擒害元衡賊二人既至詔三司使推問以其黨與散亡情實難驗既為師道所使皆笞殺之後究其實乃承宗深以戕賊宰臣為恥嘗訴於𢎞正𢎞正既平師道將入覲欲遂提承宗至闕以為己功許以翻張晏之獄以陳中師貶裴武為解因以師道殺元衡蹤迹置於鄆之文簿崔羣參驗前後知其不可且元衡六月三日遇害前二日承宗奏事官武庭秀已印卷於滋水伺候知元衡死乃倍道歸報裴武知其事請追庭秀上慮其羌互則承宗有辭張晏獄其後庭秀至太原王鍔鞫問奏陳獄情無差大抵鎮鄆皆發刺客入關計行則各竊其功競歸求賞故再擒盜而京師猶惑之夏四月丙寅從橫海節度使烏重胤之請詔節度等使所統支郡兵馬並令刺史領之以通鑑及吕祖謙標目修解題曰舊五代史職官志重胤以所管德棣景三州各還刺史職分州兵並𨽻分管是後雖幽鎮魏自相傳襲唯滄州一道獨稟命受代重胤制置使然也餘見通鑑本紀諸道節度都團練防禦經略等使所管支郡除本軍州外别置鎮遏守捉兵馬等並合屬刺史如刺史帶本州團練防禦鎮遏等使兵馬使𨽻此使如無别使即屬軍中又列傳六亘赴兖州刺史延英面奏曰凡節度使握兵分屯屬郡者刺史不能制遂為一州之弊宜有處分因詔天下兵屯屬郡者𨽻于朝廷孫之宏曰賈誼分封之䇿至武帝卒能寬同姓之憂烏重胤欲殺節鎮之權至我宋實用以弭五代之禍變而通之存其人而已辛未程異薨以新紀修丙子裴度罷新紀秋七月戊寅韓𢎞入朝歸汴宋亳潁四州以新紀吕祖謙標目修解題曰孫輔唐史記憲宗元年誅楊惠琳收夏州誅劉闢收劔南三年誅李錡收浙西于頔入朝得山南東道五年擒盧從史收澤潞張茂昭入朝得易定七年得魏慱十一年誅吳元濟收淮西十三年王承宗伏罪得德棣程權入朝得滄景十四年誅李師道析十三州為三鎮韓𢎞入朝得汴宋亳潁己丑加上尊號以新舊紀修辛邜沂海卒王辨殺其觀察使王遂自稱留後以新紀修解題曰沂海見貞元四年徐泗豪節度解題丁酉河陽節度使令狐楚為中書侍郎同平章事通鑑秋八月丁酉韓𢎞守司徒兼中書令通鑑九月戊寅王辨伏誅新紀冬十月壬戌安南將楊清殺都護李象古以新舊紀修癸酉吐蕃冦鹽州以通鑑修帝服柳泌藥起居舍人裴潾切諫十一月己亥坐貶以舊紀修十二月乙卯崔羣罷新紀解題曰按新史列傳度支稟賜邉士不時物多弊惡李光顔憂甚至欲引佩刀自決中外皆恐皇甫鏄奏邉鄙無事乃崔羣鼓動欲以賣直歸怨天子於是罷為湖南觀察使餘見通鑑裴延齡之陷陸贄也言贄等怨望顯言嵗飢民流度支糧芻乏以激怒衆士會帝畋苑中而神䇿軍訴度支不賦􅕆芻帝惑其言詔斥贄等小人之陷君子如出一轍可不畏哉唐憲宗皇帝元和十五年春正月庚子宦者陳𢎞志等弒帝于中和殿殺吐突承璀及澧王惲賜內外諸軍錢閏正月丙午太子恆即皇帝位以新舊紀稽古録范祖禹唐鑑修解題曰范祖禹曰陳𢎞志殺憲宗而穆宗不討賊故舊史於憲宗之崩疑以傳疑其後文宗謀誅宦官本討元和之亂宣宗追怨穆宗以為預謀窮治逆黨誅之殆盡其子孫皆以為弒則無疑也故曰為陳𢎞志所弒張安河南志中和殿在東內按舊史本紀敬宗即位詔賞神䇿諸軍士人賜絹十匹錢十千畿內諸軍鎮絹十匹錢五千其餘軍鎮有差穆宗初即位在京軍士人獲五十千在外軍鎮差降無幾至是宰臣奏議請量國力頒賞故差減如先朝餘見通鑑丁未貶皇甫鎛為崖州司户新紀辛亥御史中丞蕭俯中書舍人段文昌為中書侍郎同平章事俯等以兩河略定乃議銷兵以新舊紀修解題曰按新史列傳穆宗初兩河底定俯與段文昌當國謂四方無虞遂議太平事以為武不可黷勸帝偃革尚文乃密詔天下鎮兵十之嵗限一為逃死不補謂之銷兵既而籍卒逋無生業曹聚山林間為盜賊會朱克融王庭湊亂燕趙一日悉收用之朝廷調兵不充乃召募市人烏合戰輒比遂復失河朔矣餘見通鑑崔鶠曰元和十有五年王承元始歸朝後三日而俯已罷俯去位而劉總始歸朝後三日而段文昌亦罷承元歸凡十月總歸凡五月而克融叛中間嵗限逃死之兵不補者多便謂調兵不充皆由二人可乎壬子柳泌伏誅朱熹綱目乙卯尊母郭貴妃為皇太后以新紀通鑑修丁卯帝與羣臣皆釋服以通鑑修二月丁丑幸丹鳯門肆赦觀俳優丁亥幸神䇿軍觀角抵以新舊史紀修壬辰廢雍管入容管以吕祖謙標目修解題曰天寶十四載置雍州管內經略使領雍貴橫欽澄賔嚴羅淳瀼山田籠州乾元元年兼都防禦使二年升以為節度上元復為都防禦經略使廣德廢𨽻桂管大厯五年復置都防禦使八年增領桂管諸州貞元罷領桂管增領潯州永貞省瀼田山州元和元年雍州都防禦觀察經略使領懷逺軍使嚴州𨽻容管羅州𨽻嶺南十五年廢經略使長慶二年復咸通三年升為嶺南西道節度使增領蒙州韓愈狀併雍容兩管為一道深合事宜然雍州與賊逼近容州則甚懸隔經略使若置在雍州則與賊隔江兵鎮所處物力必全一則不敢輕犯一則易逐便措置今置在容則雍州兵馬必少賊易生姦心請移經略使於雍容州但置刺史三月楊清伏誅新紀夏五月庚申葬景陵廟號憲宗以通鑑修解題曰蔣係曰憲宗嗣位之初讀列聖實録見貞觀開元故事竦慕不能釋卷顧謂丞相曰太宗之創業如此玄宗之致理如此既覽國史乃知萬倍不如先聖當先聖之代猶須宰執臣僚同心輔助豈朕今日獨能為理哉自是延英議政晝漏率下五六刻方退自貞元十年已後朝廷威福日削方鎮權重德宗不委政宰相細務多自臨決姦佞之臣如裴延齡輩數人得以錢榖術數進宰相備位而已上自臨御訖于元和軍國樞機盡歸之於宰相由是中外咸理紀律再張果能翦削亂階誅除羣盜睿謀英斷近古鮮儔然任異鎛之聚斂逐裴度於藩方政道國經未至衰紊惜乎服食過當閹竪竊發苟天假之年庶幾于理矣六月丁丑韓𢎞罷新紀秋七月丁卯令狐楚罷新紀八月戊戍御史中丞崔植為中書侍郎同平章事以新舊紀修九月庚子大合樂于魚藻宫舊紀解題曰宋敏求長安志魚藻宫去宫城十三里冬十月庚辰王承宗卒其弟成德觀察支使承元歸鎮趙深冀四州以新紀修解題曰按王武俊以建中三年為觀察使傳三世凡三十九年癸未吐蕃冦涇州發神䇿軍及八鎮軍禦之以新舊紀修解題曰神䇿八鎮見永貞元年神䇿京西行營節度使解題乙酉以田𢎞正為成德節度使王承元為義成節度使劉悟為昭義節度使以舊紀吕祖謙標目修十一月己未帝幸華清宫以舊紀修十二月庚辰獵於城南壬午獵于城西甲申獵于苑北以新舊紀修唐穆宗皇帝長慶元年春正月辛丑改元以新舊紀修壬戍蕭俯罷新紀二月劉總歸盧龍道八州以新紀修解題曰劉怦以貞元元年為留後傳三世三十六年壬申段文昌罷户部侍郎杜元頴同平章事以新舊紀修回鶻保義可汗死以通鑑修劉總奏分所屬為三道請除節度觀察使遣都知兵馬使朱克融等入京時帝不留意庶務宰相不知大體三月以總為天平節度使宣武節度使張𢎞靖為盧龍節度使權知京兆尹盧士玫為瀛莫觀察使尋遣克融等歸本軍以通鑑修戊午立弟九人子五人為王以通鑑修己未以屯田員外郎李德裕為考功郎中左補闕李紳為員外郎充翰林學士以舊紀修解題曰按舊史列傳元和初用兵伐叛始於杜黃裳誅蜀吉甫經畫兩河方欲出師而卒繼之元衡裴度而韋貫之李逢吉沮議深以用兵為非而韋李相次罷相故逢吉常怒吉甫度而德裕於元和時逢吉僧孺宗閔以私意排擯之時德裕與李紳元稹俱在翰林情頗欵密逢吉之黨深惡之其月罷學士出為御史中丞通鑑考異云此際元稹入相逢吉在淮南豈能排擯德裕蓋出於黨人之語傳固云逢吉僧孺宗閔不獨云逢吉也夏四月丁丑貶禮部侍郎錢徽中書舍人李宗閔為外州刺史右補闕楊汝士為開江令以舊紀修解題曰按新舊史列傳初李吉甫在相位時牛僧孺李宗閔對直言䇿深詆時政之失吉甫泣訴於上有司皆得罪遂與為怨德裕元和時久不調僧孺宗閔恆排擯之錢徽為禮部侍郎宰相段文昌學士李紳以所善諉徽求致第籍徽不能如二人請自取楊殷士蘇巢巢宗閔壻殷士汝士弟皆與徽厚文昌怒方帥西川入辭奏徽所放進士鄭朗等十四人皆子弟藝薄不當在選中李德裕李伸元稹有寵於帝共白徽納干丐取士不以實詔王起白居易覆試朗等十人皆落下貶徽江州刺史宗閔劔州刺史汝士開江令汝士等勸徽出文昌紳私書自直徽曰茍無愧心得喪一致修身慎行安可以私書相證耶令焚之人稱徽長者因是列為朋黨兩相傾軋垂四十年餘見通鑑范祖禹曰漢之黨錮始於甘陵二部相譏而成於太學諸生相譽海內塗炭二十餘年唐之朋黨始於僧孺宗閔對䇿而成於錢徽之貶皆自小致大因私以害公皆由主聽不明君子小人雜進於朝不分邪正忠讒以黜陟之而聽其自相傾軋以養成之也漢之黨尚風節故政亂於上而俗清於下及其亡也人猶畏義而有不為唐之黨趍勢利勢窮利盡而止故其衰季士無操行不足稱也為國家者可不防其漸哉丙戌册回鶻宗德可汗五月以太和長公主妻之以舊紀朱熹綱目修六月彗星出於昴以新紀修秋七月甲辰朱克融囚張𢎞靖自為盧龍留後以新紀修解題曰劉總以盧龍歸朝廷六月而復亂事見通鑑壬子上尊號以新舊紀修壬戍成德兵馬使王廷湊殺田𢎞正自為留後解題曰孫甫曰一賢者相凡四年平定天下數庸人相不二年河北復亂天下安危皆係於相豈不明乎事見通鑑八月乙亥起復前涇原節度使田布為魏博節度使以新紀修丙子􅌡州軍亂逐盧士玫以新舊紀修丁丑命魏博橫海昭義河東義武兵討王庭湊己邜以深州刺史牛元翼為深冀節度使以新紀通鑑修解題曰深冀節度見寶應元年成德節度使解題己丑河東節度使裴度為幽鎮招討使以吕祖謙標目修癸巳王庭湊圍深州新紀九月乙巳相州軍亂殺其刺史邢楚以新紀修吐蕃請盟許之舊紀冬十月丙寅鹽鐡轉運使刑部尚書王播為中書侍郎同平章事以新舊紀修裴度為鎮州行營都招討使以新舊紀修裴度論翰林學士元稹與知樞密魏𢎞簡交結稹罷為工部侍郎以舊紀修解題曰按新舊史列傳稹遷翰林承旨學士數召入禮遇益厚自謂得言天下事中人爭與稹交魏𢎞簡在樞密尤相善雖與裴度無憾然頗忌前達加於已上度方用兵山東處置軍事有所論奏每多為稹輩所持度上疏論之曰逆豎搆亂震驚山東姦臣作萌撓敗國政陛下欲掃蕩幽鎮宜肅清朝廷何者為患有大小議事有先後河朔逆賊秪亂山東禁闈姦臣必亂天下是河朔患小禁闈患大小者臣與戎臣必能剪滅大者非陛下制斷覺悮無計驅除令文武中外有心者無不憤怒有口者無不咨嗟直以奬用方深不敢抵觸恐事未行而禍已及不為國計且為身謀臣自兵興以來所陳章疏事皆切要所奉書詔多有參差惜陛下委付之意不輕被姦臣抑損之事不少臣素知佞幸亦無讎嫌秪是昨者臣請乘傳詣闕面陳戎事姦臣懼臣悉數其過百計止臣臣又請領兵齊進逐便攻討姦臣恐臣或有成功進退皆受羈牽意見悉遭敝塞復共憸狡同辭合力或兩道招撫逗遛旬時或遣蔚州行營拖曵日月但欲使臣無成則天下理亂山東勝負悉不顧矣以臣愚見若朝中姦臣盡去則逆賊不討自平若朝中姦臣尚在則逆賊縱平無益儻陛下未信忠言乞出臣此表與百僚集議彼不受責臣合伏辜繼上三章穆宗雖不悅然懼大臣正議乃以𢎞簡為弓箭庫使罷稹內職然寵稹之意不衰餘見通鑑陳繹西府記唐初典兵禁中出於帷幄之議孜以機密名官開元中設堂後五房而機密自為一司獨宰相得知官屬無預貞元後藩鎮旅拒重以兵屬人乃以中官分領左右神䇿軍而樞密之職歸於北司然寄治省寺廡下延英會議則屏立殿西勢猶厭厭傳道官省而已劉恕中國紀年內侍言遵美言舊制北司供奉官袴衫入侍無秉簡入侍之儀樞密使公廨三間貯文簿而已無視事之廳堂狀貼黃處置乃楊復恭奪宰相權也范祖禹曰昔宣王使文武之臣征伐於外而左右前後得孝友正良之士以善君心此所以能成功也穆宗庸昏姦諂在側裴度欲先正其本而後治其末先圖其大而後憂其小此輔相之職業也而其君多僻卒無成功蓋自古命將出師而小人沮之於內未有能克勝者也可不戒哉十二月庚午深州行營節度使杜叔良大敗於博野戊寅以鳯翔節度使李光顔為忠武節度使代之以通鑑修解題曰博野永寧軍縣按方鎮表至德置淮南西道節度領義陽弋陽潁川滎陽汝南乾元置鄭陳節度領鄭陳亳潁上元廢州𨽻淮南貞元三年置陳許節度十年賜號忠武軍元和十二年增領溵州十三年增領蔡州長慶省溵州中和蔡州置奉國軍乾寧元年增領汝州光化三年汝𨽻東都赦朱克融以為節度使以新舊紀修唐穆宗皇帝長慶二年春正月庚子魏博軍潰于南宫癸卯田布自殺兵馬使史憲誠自為留後己酉以為節度使以新舊紀修解題曰王容曰魏博自田𢎞正徙鎮嵗餘而復亂蘇過曰𢎞正有恩於魏故使布恆世其官魏人以河北舊事逼之豈有害之之心哉布盍請於軍中曰先將軍以六州歸天子使汝一方不陷叛逆宣慰之言在耳今幾日而忘之布不能從諸君為亂上負君父取笑天下請諸君殺布而後反則魏人素德其父寧忍殺其子也昔𢎞正遣布以兵討蔡上議使人代之而士卒愛布願留乃止則布亦素有德於魏人也此輩寧忍殺布也哉若以忠義激之禍福動之戮一憲誠軍自定矣而後舉兵討鎮雪𢎞正之寃克融勢孤不戰而擒矣萬一死憲誠之手使朝廷以殺帥之罪討魏豈不賢於自經溝瀆之為諒哉故曰河北再亂者布之死也事見通鑑二月甲子赦王庭湊以為節度使兵部侍郎韓愈為宣慰使以新舊紀修辛巳崔植罷元稹同平章事以新紀修丁亥裴度為東都留守以舊紀通鑑修三月乙巳武寧節度副使王智興逐其節度使崔羣尋以智興為節度使以新紀通鑑修解題曰按舊史智興傳羣纍表請追智興授以他官事未行詔班師智興師衆斬關而入羣傳以智興早得士心表請因授智興旄鉞不報智興回鎮城內皆是父兄開關延入裴度崔羣神道碑云幽朔興亂發武寧徑卒五千俾王智興由沂州刺史為公之二將以北征逮帥將反公亟請於朝以智興宿將仍嵗立功得士卒心今擁衆在外為末而大臣所守在中為本不若速處智興於征鎮不爾移臣所受而授之則師人知歸必免叛戾連表不報蓋舊史兩傳互見而神道碑則偹言之也戊午司徒淮南節度使裴度同平章事王播罷以新紀修夏四月辛酉朔日有食之舊紀壬戌成德節度使牛元翼奔京師王庭湊陷深州以新紀修六月甲子裴度元稹罷兵部尚書李逢吉為門下侍郎同平章事以新舊紀修解題曰按舊裴度傳初度與李逢吉素不協度自太原入朝而惡度者以逢吉善於隂計足能搆度乃自襄陽召逢吉為兵部尚書度既復知政事而魏𢎞簡劉承偕之黨在禁中逢吉用族子仲言之謀因醫人鄭注與中尉王守澄交結內官皆為之助餘見通鑑通鑑考異以惡度者不過元稹與宦官彼欲害度其術甚多何必召逢吉也葉夢得曰李逢吉遣于方刺裴度事逢吉元稹傳皆不詳載其實稹欲立竒功令方募士反間王庭湊以出牛元翼爾而刺度事則出於逢吉之誣韓臯鄭覃既雜治無迹度與稹宜無罪乃反遭罷逢吉以兵部尚書與治此獄故得自隱其始謀不然逢吉正當獨坐况得相乎臯與覃皆號端士亦不能暴之何也唐史但書其事殊不别白其所以然亦可恨云戊子復雍管以吕祖謙標目修秋七月壬辰宣武將李臣則逐其節度使李願都押衙李㝏自為留後丙辰兖海節度使曹華等敗之八月丙子㝏伏誅以通鑑修冬十一月庚午皇太后幸華清宫辛未帝迎太后獵于驪山以新紀通鑑修十二月癸巳立子景王湛為皇太子新紀是嵗初行宣明厯通鑑唐穆宗皇帝長慶三年春正月壬戌御史中丞牛僧孺為户部侍郎同平章事以新舊紀修解題曰按舊史列傳李逢吉既得權位鋭意報怨時李德裕與牛僧孺俱有相望逢吉欲引僧孺懼李紳與德裕從中沮之九月出德裕浙西尋引僧孺同平章事由是交怨愈深通鑑考異謂德裕以此疑怨逄吉未必皆出逢吉之意則待逢吉過厚矣餘見通鑑秋九月壬子朔日有食之以新舊紀修冬十月己丑杜元頴罷以新紀修唐穆宗皇帝長慶四年春正月壬申帝崩于清思殿丙子皇太子湛即皇帝位以新舊紀修解題曰韋述兩京記清思殿在大明宫二月癸未貶户部侍郎李紳為端州司馬以舊紀通鑑修解題曰紳李德裕之黨也按新舊史列傳紳改户部侍郎李逢吉終欲陷之紳族子虞有文學名隱居華陽時來省紳虞與柏耆程昔範善及耆為拾遺虞以書求薦書誤達於紳紳痛誚之虞失望後至京師以紳所言逢吉姦邪傅會之語告逢吉逢吉大怒乃用張又新李續等計擢虞昔範與劉栖楚皆為拾遺以伺紳隙內結王守澄自助會敬宗立逢吉知紳失勢可乘慮嗣君復用之使守澄從容奏言先帝始議立太子杜元頴李紳勸立深王獨逢吉請立陛下而李續李虞助之帝雖沖年亦疑其事會逢吉奏李紳嘗不利於陛下請逐之帝不能自執乃貶紳端州司馬栖楚等怒得善地皆切齒惟韋處厚屢言紳枉折逢吉之姦天子亦稍開悟會禁中檢尋舊事得穆宗封書一篋發之得裴度元頴紳疏請立帝為嗣帝感悟興嘆悉焚逢吉黨所上謗書紳黨得保全餘見通鑑胡寅曰敬宗既得裴度李紳之疏則逢吉守澄誣罔明白于是罷逢吉而相紳置守澄于法豈不偉哉然使紳誠有動搖之罪穆宗發覺治之可也敬宗既為天子矣又何治焉今以逢吉讒紳謀不利於己則欲殺之得紳立己疏則嗟嘆之是其喜怒皆私己而發不以公道行之此所以來讒賊之口也己亥尊皇太后為太皇太后乙巳尊帝母王氏為皇太后以舊紀通鑑修丁未帝幸中和殿擊鞠自是遊宴擊鞠奏樂不可悉紀以通鑑修夏四月丙申帝擊鞠于清思殿染匠張韶作亂伏誅以吕祖謙標目修五月乙卯吏部侍郎李程户部侍郎竇易直同平章事以新紀修冬十一月庚申葬光陵廟號曰穆宗以通鑑修十二月韓愈卒舊紀解題曰愈嘗著原道一篇深明聖賢仁義道德之説以闢異端漢魏以來諸儒之論未有能及之者也其辭曰老子之小仁義非毁之也其見者小也坐井而觀天曰天小非天小也彼以煦煦為仁孑孑為義其小之也則宜其所謂道道其所道非吾所謂道也其所謂德德其所德非吾所謂德也凡吾所謂道德云者合仁與義言之也天下之公言也老子之所謂道德云者去仁與義言之也一人之私言也周道衰孔子沒火於秦黃老於漢佛於晉宋齊梁魏隋之間其言道德仁義者不入於楊則入於墨不入於墨則入於老不入於老則入於佛入於彼必出於此入者主之出者奴之入者附之出者汙之噫後之人其欲聞仁義道德之説孰從而聽之古之為民者四今之為民者六古之教者處其一今之教者處其三農之家一而食粟之家六工之家一而用器之家六賈之家一而資焉之家六奈之何民不窮且盜也古之時人之害多矣有聖人者立教之相生養之道為之君為之師驅其蟲蛇禽獸而處之中土寒然後為之衣飢然後為之食木處而顚土處而病也然後為之宫室為之工以贍其器用為之賈以通其有無為之醫藥以濟其夭死為之葬埋祭祀以長其恩愛為之禮以次其先後為之樂以宣其湮鬱為之政以率其怠勸為之刑以鋤其強梗相欺也為之符璽斗斛權衡以信之相奪也為之城郭甲兵以守之今其言曰聖人不死大盜不止剖斗折衡而民不爭嗚呼其亦不思而已矣如古之無聖人人之類滅久矣何也無羽毛鱗介以居寒熱也無瓜牙以爭食也是故君者出令者也臣者行君之令而致之民者也民者出粟米麻絲作器皿通貨財以事其上者也今其法曰必棄而君臣去而父子禁而相生養之道以求其所謂清淨寂滅者嗚呼其亦幸而出於三代之後不見黜於禹湯文武周公孔子也其亦不幸而不出於三代之前不見正於禹湯文武周公孔子也帝之於王其號雖殊其所以為聖一也夏葛而冬裘渴飲而飢食其事雖殊其所以為智一也今其言曰曷為不為太古之無事是亦責冬之裘者曰曷不為葛之之易也責飢之食者曰曷不為飲之之易也傳曰古之欲明明德於天下者先治其國欲治其國者先齊其家欲齊其家者先修其身欲修其身者先正其心欲正其心者先誠其意然則古之所謂正心而誠意者將以有為也今也欲治其心而外國家天下滅其天常子焉而不父其父臣焉而不君其君民焉而不事其事孔子之作春秋也諸侯用夷禮則夷之夷而進於中國則中國之今也舉夷狄之法而加之先王之教之上幾何其不胥而為夷也夫所謂先王之教者仁義道德其文詩書易春秋其法禮樂刑政其民士農工商其位君臣父子師友賔主昆弟夫婦其服絲麻其居宫室其食粟米蔬果魚肉其為道易明而其為教易行也斯吾所謂道也非向所謂老與佛之道也堯以是傳之舜舜以是傳之禹禹以是傳之湯湯以是傳之文武周公文武周公傳之孔子孔子傳之孟軻軻之死不得其傳焉荀與楊擇焉而不精語焉而不詳由周公而上上而為君故其事行由周公而下下而為臣故其説長然則如之何其可也曰不塞不流不止不行人其人火其書廬其居明先王之道以道之鰥寡孤獨廢疾者有養也其亦庶乎其可也宋程皓曰韓愈亦近世豪傑之士如原道中語雖不能無病痛然自孟子後能將大見識尋求者才見此人至如斷曰孟氏醇乎醇荀與楊擇焉而不精語焉而不詳若無所見安能由千載之後見得若是之明也朱熹曰愈之於道知其用之周於萬事而未知其體之具於吾之一心知其可行於天下而未知其本之當先於吾之一身也是以其言嘗詳於外而略於內其志常極於逺大而其行未必能謹於細微雖知文與道有內外淺深之殊而終未能審其緩急輕重之序以決取舍雖知汲汲以行道濟時抑邪與正為事而或未免雜乎貪利慕祿之私此其見於文字中得失有不可掩者是嵗回鶻崇德可汗死弟曷薩特勒立以通鑑修唐敬宗皇帝寶厯元年春正月辛亥改元以新舊紀修乙卯牛僧孺罷新紀三月辛酉册回鶻昭禮可汗朱熹綱目夏四月癸巳上尊號以新舊紀修秋九月壬午劉悟卒其子從諫自稱昭義留後以新紀修解題曰實録從諫以金幣賂當權者舊史列傳李逢吉王守澄受其賂曲為致請通鑑考異以事有無難眀故不取也冬十一月立子為王以新紀修唐敬宗皇帝寶厯二年春二月丁未山南西道節度使裴度守司空同平章事以新紀修解題曰僧孺罷則度相矣孫甫曰韋處厚為郎官日嘗為裴度貶官李逢吉亦所深怨也處厚犯權臣之威稱其所怨復不念已之隙力言其賢是公忠之性過人而益之以至明也事見通鑑三月橫海節度使李全略卒其子同捷自稱留後以吕祖謙標目修夏四月戊申以劉從諫為節度使以舊紀修五月盧龍軍亂殺朱克融立其子延嗣為節度使以新紀修六月遣使詣潤州迎周息元以朱熹綱目修秋八月盧龍兵馬使李載義殺朱延嗣自稱留後尋以為節度使以通鑑修九月壬申李程罷以新紀通鑑修冬十一月甲申李逢吉罷以新紀修解題曰度相則逢吉罷矣通鑑考異謂宰相之門何常無特所親愛之士數蒙引接詢訪得失其間忠邪溷殽固亦多矣其疏逺不得志者則從而怨疾之巧立名目以相機誚此乃古今常態非獨逢吉之門有八關十六子也舊史逢吉傳以為有求於逢吉者必先經此八人納賂無不如意亦恐未必然但逢吉之門險陂為多耳劉栖楚敢與王承宗爭事此乃正直之士何得為侫邪之黨哉此皆出於李讓夷敬宗實録讓夷德裕之黨而栖楚逢吉所善故深詆之考異此論若無區别而又以栖楚為正直之士何也十二月辛丑宦官劉克明弒帝立絳王悟壬寅樞密使王守澄等誅克明殺絳王流道士趙歸真於嶺南乙丑奉江王涵即皇帝位更名昻以吕祖謙標目修解題曰范祖禹曰裴度位上相安危所係君弒不討賊君立不預謀二日之間宦者三易主而不關宰相唐之綱紀於是大壞以度之勳德處之猶如此而况不賢者乎事見通鑑新史裴度傳帝崩定策誅劉克明等迎立江王劉克明傳樞密使王守澄等與宰相裴度共迎江王發左右神䇿及六軍飛龍兵討之與唐鑑不同戊申尊母蕭氏為皇太后王太后為寶厯太后以通鑑修庚戌兵部侍郎韋處厚為中書侍郎同平章事以新舊紀修解題曰按新舊史列傳文宗勤於聽政然浮於斷決宰相奏事得請往往中變處厚當獨論奏曰言不見納宜先罷即趍下頓首帝矍然曰何至是處厚趍出帝復召問所欲言處厚對數百言又言裴度忠可久任帝嘉納之自是無復橫議者胡寅曰人之性無有不善而材有愚明柔強之異知學以反之則無陷於一偏之失矣文宗恭儉寬勤其質甚美年十有八正講明道義增益德慧之時裴韋二公宜敷求名儒置之左右使得以二帝三王正心修身之學輔導啓沃使知義理之正忠邪之别是非可否之處先後緩急之序然後勉以有為則雖愚亦明柔亦強矣植木而不培其根浚水而不自其源乃欲則效於章疏望治於頰舌不亦逺乎庚申詔出宫人省樂工伎術縱鷹犬停貢纂組雕鏤以新紀修解題曰按舊史本紀詔曰朕以眇薄遭逢內難刷君父之仇恥攄億兆之哀寃而股肱大臣羣卿庶士引義抗請至於再三以圖宗社之安以答華夷之望俯從衆欲夙夜震驚思所以克己復禮修政安人宵興匪寧旰食勞慮夫儉過則酌之以禮文勝則矯之以質庶乎俗登太古道浹生靈儀刑家邦以化天下內庭宫人非職掌者放三千人任從所適長春宫斛斗諸物依前户部收管鄠縣渼陂鳯翔府駱谷地還府縣教坊樂官翰林待詔伎術官并總監諸色職掌內冗員者共一千二百七十人並宜停廢總監中一百二十四人先屬諸軍並各歸本司餘七百三人勒納牒身放歸本管先供教坊衣糧一百分廂家及諸司新加衣糧三千分並宜停給五坊鷹鷂並解放今年新宣附食度支糧小兒一百人並停給别詔宣索纂組雕鏤不在常貢內者並停度支鹽鐡户部及州府百司應供宫禁年支一物以上並準貞元元額為定先造供禁中床榻以金筐瑟瑟寶鈿者悉宜停造東頭御馬坊毬場宜却還龍武軍其殿及亭子所司毁拆餘舍賜本軍應行從處張陳不得用花蠟結綵華飾今年已來諸道所進音聲女人各賜束帛放還城外墳墓先有開斸以備行幸處宜曉示百姓任其修塞其大逆魁首蘇佐明等二十八人並已處斬宗族籍沒妖妄僧惟真道士趙歸真等或假於卜筮或託以醫方疑衆挾邪已從流竄其情非姦惡迹涉詿誤者一切不問帝在藩邸知兩朝之積弊此時釐革並出宸衷士民相慶喜理道之復興矣帝以十二月乙已即位距下此詔十六日爾大事記續編卷六十四
