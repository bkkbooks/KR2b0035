body:
  text: 大事記續編卷四十六明王禕撰陳高宗宣皇帝大建十三年年後梁中宗皇帝天保二十年隋高祖文皇帝楊堅開皇元春正月壬午周改元大定以周紀修春二月甲子周隋王堅自稱皇帝改元除周六官置三師三公省臺寺府勳散官相國司馬高熲為左僕射兼納言相國內郎李德林為內史令乙丑追尊考妣為帝后丙寅立王后獨孤氏為皇后世子勇為皇太子己巳廢其主為介公尋滅宇文氏以隋紀吕祖謙標目修解題曰葉適曰易周氏官儀依漢魏之舊篡位第一事也雖庸諂相遇知在掃滅前迹亦由茍慕虛名人情不順有以使之矣胡寅曰虞慶則請除宇文氏非惟逢迎隋主忌克之心亦習聞前世弊風以為故常爾李德林正言而不見信者國移君廢已無仗節死難之義而欲全彼破亡之宗宜隋主之忽其言也若乃以書生斥之云者猾胥險吏固疾儒士此則楊堅之本態也隋之所以亡國者有二焉一曰隋文以胥吏治國上曰獨孤氏以妬忌治家如是而已餘見通鑑隋前開府儀同三司蘇威為太子少保以列傳修丁丑隋晉王廣為並州總管以通鑑修三月戊子隋上開府賀若弼為吳州總管和州刺史韓擒虎為廬州總管以吕祖謙標目修解題曰隋書地理志後周改南兖州為吳州戊戌隋蘇威兼納言度支尚書與高熲參掌朝政威奏減簡賦役以吕祖謙標目修夏四月隋放散樂禁雜戲以隋紀修五月隋弒介公以吕祖謙標目修秋八月吐谷渾冦隋涼州隋敗之以隋紀修九月庚午陳取隋胡野以吕祖謙標目修解題曰胡野在滁州來安縣本紀作胡野通鑑作故野而明年正月又書歸胡野可見其誤辛未隋蜀王秀為益州總管以吕祖謙標目修壬申隋遣高熲侵陳以吕祖謙標目修隋鑄五銖錢悉禁古錢及私錢以本紀修隋上柱國鄭譯除名以通鑑修隋定律冬十月行之以吕祖謙標目修十一月隋聘陳以隋紀修是歲隋聽民出家賦錢營佛像書以朱熹綱目修解題曰韋述兩京記曰隋文帝承周武之後大崇釋氏以收人望隋褒廉吏以岐州刺史梁彥光為相州刺史相州刺史樊叔略為大司農新豐今房恭懿纍遷德州司馬以通鑑修隋太子左庶子盧賁柱國劉昉除名以吕祖謙標目修突厥他鉢可汗死沙鉢略可汗立與高寶寧伐隋以吕祖謙標目修陳高宗皇帝大建十四年隋高祖文皇帝開皇二年後梁中宗皇帝天保二十一年春正月甲寅陳主殂揚州刺史始與王叔陵反伏誅丁巳太子叔寶即皇帝位以本紀修解題曰按陳書本紀陳主以二月葬顯寧陵通鑑書於明年隋以晉王廣秦王俊蜀王秀為河北河南西南行臺尚書令以吕祖謙標目及隋紀修解題曰隋書列傳高祖初即位每懲周世諸侯微弱以致滅亡由是分王諸子權侔王室以為磐石之固餘見通鑑通典魏末司馬昭討諸葛誕散騎常侍裴秀等以行臺從晉永嘉東海王越帥衆許昌以行臺自隨後魏謂之尚書大行臺别置官屬北齊行臺兼統民事其官置令僕其尚書丞郎皆隨時權置江左唯梁末以侯景為河南王大行臺隋謂之行臺省有尚書令僕各一人有考功禮部膳部兵部駕部刑部庫部度支金部工部屯田侍郎各一人陳以長沙王叔堅為驃騎將軍開府揚州刺史以通鑑修陳尊皇后為皇太后以本紀修戊辰陳歸胡野以和隋以稽古録修己巳陳立妃沈氏為皇后以本紀修二月己丑隋以不伐喪高熲退師以吕祖謙標目修夏四月丙申陳立子𦙍為皇太子以本紀修五月己未高寶寧以突厥五可汗之兵伐隋以隋紀修六月甲申隋遣使弔陳以通鑑修隋敗突厥以隋紀修丙申隋作長安新都以本紀修解題曰按隋志京兆大興縣舊曰萬年高祖封號大興故改焉城東西十八里一百一十五步南北十五里三百七十五步東面通化春明延興三門南面啓夏明德安化三門西面延平金光開逺三門北面光化一門里一百六市二新唐志前直子午谷後枕龍首山左臨灞岸右抵灃水程大昌曰秦孝公都咸陽正渭北漢都長安在渭南咸陽之東南也隋都又在漢城東南十三里石定叟曰隋建新都雖不能盡循先王之法度然畦分棊布里有門門有墉逋亡姦僞無所容足而朝廷宫寺民居市區井井有條唐因之以為治數百年間不能有改秋七月陳自京口至荆州江水如血八月癸未夜天有聲如風水相擊乙酉夜亦如之以本紀修解題曰葉適曰天地示變蓋江東之事盡矣九月陳主設大㑹捨身以本紀修冬十月癸酉隋太子勇屯咸陽以備突厥以本紀修陳長城煬公陳叔寶至德元年隋高祖文皇帝開皇三年後梁中宗皇帝天保二十年春正月壬寅陳改元以本紀修陳出長沙王叔堅為江州刺史以吕祖謙標目修解題曰陳史上陰令人造其厭媚又令人告之餘見通鑑二月己巳朔日有食之以隋紀修陳聘隋以隋紀修三月丙辰隋遷于新都以通鑑修隋減役調罷𣙜酒鹽以吕祖謙標目修解題曰隋食貨志帝入新宫初令軍人以二十成丁减十二畨每歲為二十日役減調絹一匹為二丈先是尚依周末之弊置酒坊鹽池鹽井皆禁至是罷與百姓共之逺近大悅夫榷酒鹽者後周末年之政然則茍未至於大不得已固未忍出於此也故隋文汲汲而弛之後世乃奪民衣食之奉以為經常之法而不可變盍亦少思哉朱黼曰古者發民而興作畨民而徒衛與調民而征守皆謂之役役與調非二事周官均人豐年則公旬用三日每丁以四十歲計之則一生在宫之日不過百二十日而已秦制月為更卒已復為正一歲屯戍一歲力役三十倍於古漢興有三更之法魏晉而下於役之外復有調是再役也後周置司均豐年旬不役者調絹一匹是十倍也隋減為二十日役調絹減半是猶六倍也至唐因之不役則收其庸日三尺是一歲之庸一匹有半不幾於十倍乎隋求遺書以隋紀修夏四月隋八道伐突厥己卯大破之于白道擊高寶寧寶寧奔磧北尋奔契丹死以隋紀通鑑修己丑陳郢州降隋隋不納遣使聘陳自是不絶以吕祖謙標目修隋左右僕射分判六部以吕祖謙標目修解題曰唐德宗欲令軍旅糧儲事李泌主之吏禮委張延賞刑法委柳渾李泌曰宰相之職不可分也非如給事則有吏過兵過舍人則有六押至於宰相天下之事咸共平章若各有所主是乃有司非宰相也帝笑而止隋高祖方以胥吏之習為治故不足與語治體也事見通鑑五月隋秦州總管竇榮定破突厥阿婆可汗沙鉢略可汗與阿波連兵各求援於隋以隋紀通鑑修秋八月丁卯朔日有食之以通鑑考異修解題曰通鑑考異曰隋紀作七月丁卯蓋厯差冬十月隋廢河南道行臺以吕祖謙標目修十一月隋罷郡為州以吕祖謙標目修解題曰通典初齊制州為上中下三等每等又有上中下之差凡九等隋州置刺史亦同九等之制總管刺史加使持節至罷郡以州統縣自是刺史之名存而職廢後雖有刺史皆太守之互名理一郡而已按魏置使持節寵奉使官之任隋氏廢郡以刺史牧人既非使官則合罷持節之稱其時不以為意後改太守亦復不省使持節之名及於邊逺小郡十二月隋復刪律以吕祖謙標目修解題曰葉適曰自高睿等上齊律當時稱其法令明審科條簡要而齊人多曉法律者至髙熲造隋律蘇威牛𢎞再定然皆本於齊也由唐及今雖有增損然皆本於隋也是歲隋置沿河倉漕粟給長安以通鑑目録修隋治書侍御史柳彧論煩碎以吕祖謙標目修陳長城煬公至德二年年後梁中宗皇帝天保二十三年隋高祖文皇帝開皇四春正月甲子朔日有食之以隋紀修梁主朝於隋以隋紀修壬辰隋頒張賓厯以隋紀修二月突厥達頭可汗降於隋以隋紀修夏五月陳吏部尚書江總為尚書僕射以本紀修六月隋鑿渭水至潼關以隋紀修秋八月乙卯陳將軍夏侯苗降隋隋不納以稽古録修隋關中饑九月甲戌隋主如洛陽以吕祖謙標目修隋禁詞華以吕祖謙標目修突厥沙鉢略可汗請和于隋以吕祖謙標目修是歲陳起臨春結綺望仙閣中書舍人沈客卿責關市之稅以給之陳主與江總及都官尚書孔範散騎常侍王瑳日事遊宴以吕祖謙標目修陳長城煬公至德三年年後梁中宗皇帝天保二十四年隋高祖文皇帝開皇五春正月戊午朔日有食之陳紀戊辰隋頒五禮以隋紀修三月戊申隋主還長安以隋紀修夏五月甲申隋閲户口置義倉作輸籍法以通鑑通典修解題曰杜佑曰時承西魏喪亂周齊分據賦重役勤人不堪命多依豪室姦僞允滋高熲覩流冗之病建輸籍之法定其名輕其數使人知為浮客被强家收大半之賦為編氓奉上蒙輕賦之征浮客謂避公稅依强家作佃客也蒸庶懷惠姦無所容隋氏資儲遍於天下熲之力焉事見通鑑程大昌曰熲之法立為籍樣頒下諸州令縣令依樣定户則既無詭隱矣浮客避公稅依强家作佃者熲輒輕公田之賦以致之人知浮客則為强家佃客而强家收大半之賦不如為編氓奉公上則䝉輕減之征故爭去私佃而趨公田梁主殂太子琮即位以吕祖謙標目修阿波可汗别為西突厥隋遣使撫之以吕祖謙標目修秋八月突厥居漠南以通鑑修九月陳侵隋以隋紀修冬十月壬辰隋以上柱國楊素為信州總管以吕祖謙標目修陳殺中書通事舍人傅縡以吕祖謙標目修陳長城煬公至德四年年後梁帝蕭琮廣運元年隋高祖文皇帝開皇六春正月梁改元以吕祖謙標目修二月隋始令刺史上佐歲暮上課以隋紀修隋築長城以隋紀修解題曰隋書列傳令司農少卿崔仲方發丁三萬於朔方靈武築長城東至黃河西距綏州南至勃出嶺周地圖記郁郅城今名尉季城在白馬嶺西川交口水經注尉季亦曰不窟疑郁郅之訛勃出又疑不窟之訛按寰宇志在今慶州綿亘七百里明年上復令發丁十五萬於朔方已東緣邊險要築數十城以遏胡冦李吉甫元和郡縣志開皇長城西自代州繁畤縣經縣北七十里東入飛狐縣界又起嵐州合河縣北東經幽州延袤千餘里十六年因古跡修築紀傳並係開皇六年十字衍文秋閏八月丁卯隋太子勇鎮洛陽以稽古録修隋上柱國梁士彥宇文欣柱國劉昉皆伏誅以隋紀修冬十月癸丑隋以秦王俊為山南行臺尚書令以吕祖謙標目修陳長城煬公禎明元年年後梁帝蕭琮廣運二年隋高祖文皇帝開皇七春正月戊寅陳改元以本紀修乙未隋制諸州歲貢士三人以通鑑修二月隋築長城以隋紀修夏四月隋開山陽瀆以隋紀修解題曰寰宇記舊水道屈曲多諸梁埭隋文帝重加修掘通利焉水經注淮陰縣城西二里有公路浦又東徑淮陰縣故城北北臨淮水縣有中瀆水首受江水於廣陵郡之江都縣昔吳築䢴城掘深溝謂之䢴江亦曰䢴溟溝通射陽湖所謂築水也又中瀆水自廣陵北出武廣湖東陸陽湖西下注樊梁湖舊道東北至傳芝射陽二湖餘見大建元年解題五月乙亥朔日有食之以隋紀修秋八月隋徵梁主入朝以兵戍之九月梁安平王巖等以江陵户口降陳隋封梁主為莒公以吕祖謙標目修是時陳臨平湖自開以通鑑修陳殺大市令章華以吕祖謙標目修突厥沙鉢略可汗死其弟處羅㬋立為莫何可汗擊阿波擒之以吕祖謙標目修陳長城煬公禎明二年年隋高祖文皇帝開皇八春正月陳遣散騎常侍周羅㬋屯峽口以陳紀修解題曰通典注隋軍來伐戚欣守狼尾灘宜都縣界將仲肅據荆門亦宜都界顧覺鎮安蜀城亦夷陵界陳紀鎮公安巴陵已下風靡退散餘見通鑑二月陳侵隋以陳紀修夏五月陳廢太子𦙍為吳興王立始安王深為太子以吕祖謙標目修冬十月己未隋以晉王廣為淮南行省尚書令甲子廣及秦王俊清河公楊素為行軍元帥伐陳高熲為晉王元帥長史以隋紀通鑑修十二月突厥莫何可汗死都藍可汗立以吕祖謙標目修楊素水軍東下陳中書舍人施文慶等不以聞將軍樊毅請備京口采石不納以吕祖謙標目修大事記續編卷四十六
