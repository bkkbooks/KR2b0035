body:
  text: 大事記續編卷六十三明王禕撰唐憲宗皇帝元和元年春正月丙寅上上皇尊號以通鑑修丁卯改元以新舊紀修解題曰宋庠紀年通譜元和本漢章帝年號劉闢求兼領西川不得圍梓州癸未以長武城使髙崇文為神䇿行營節度使率京西行營兵馬使李元奕等討之以新舊紀修解題曰按林恩補國史劉闢舉兵扼鹿頭關下東蜀帥李康棄城走上臨軒赫怒敕宰相選將討伐杜丞相曰保義節度劉灉即劉澭長武城節度髙崇文皆剛毅忠勇冠武臣上曰卿謂二人誰為上曰澭自涿州拔城歸闕將士扶老携幼萬人就路飲食舒慘與衆共之法令嚴整付以專征必著勳績上曰澭固良將性本倔強且與濟不協危急歸命河朔氣習宛然盡在若征代有功須且令鎮西川全蜀地重控制戎夷碩德名臣方當委任澭向者幽縶幕客數殺縣吏若使鎮西川是自掇心腹之疾崇文久將親軍立功塞上寬和得衆其他謀略不下澭且務儉任真必竭誠節乃命為西川行營節度使餘見通鑑甲申太上皇崩新紀劉闢陷梓州三月髙崇文克之以新紀修辛巳楊惠琳伏誅以吕祖謙標目修夏四月丁未杜佑為司徒解度支鹽鐵轉運等使以兵部侍郎李巽領之以吕祖謙標目修五月庚辰鄭餘慶罷以通鑑修辛卯尊太上皇后為皇太后通鑑六月丁酉髙崇文破賊於鹿頭關以通鑑修解題曰按元和郡縣志鹿頭關在漢州德陽縣北閏月壬戌朔李師古卒其弟師道自稱淄青留後以新紀修秋七月壬寅葬豐陵廟號順宗以通鑑修解題曰按新舊史韓愈順宗實録順宗為人寬仁喜學藝善𨽻書禮重師傅見輒先拜從幸奉天常執弓矢居左右於父子間慈孝交洽無嫌每以天下為憂德宗在位久稍不假權宰相左右幸臣如裴延齡李齊運韋渠牟等以姦佞相次進用延齡尤狡險判度支務刻剝聚斂以自為功天下皆怨怒每進見候顔色輒言其不可至陸贄張滂李充等以毁譴朝臣􅋏懼陽城等伏閣極論德宗怒甚將加城等罪無敢救者獨開解之城等賴以免卒不任延齡渠牟為相嘗侍宴魚藻宫張水嬉綵艦宫人為棹歌衆樂間發德宗歡甚顧太子曰今日何如太子引詩人好樂無荒為對每於敷對未嘗以顔色假借宦官居儲位二十年天下隂受其賜惜乎寢疾踐祚近習弄權而能傳政元良克昌運祚賢哉八月壬戌以妃郭氏為貴妃以舊紀修丁卯立子七人為王以通鑑修九月辛亥髙崇文克成都以新舊紀修冬十月丙寅以髙崇文為西川節度使以新舊紀修以李師道為節度副使以舊傳修戊子劉闢伏誅新紀十一月鄭餘慶罷新紀丙辰以內常侍吐突承璀為神䇿中尉以吕祖謙標目修唐憲宗皇帝元和二年春正月乙巳杜黃裳罷解題曰按新舊史始德宗創艾多難務姑息藩鎮每帥臣死遣中人伺其軍觀衆所欲立者故大將私金幣結左右以求節制晏年尤甚方鎮選不出朝廷黃裳每從容具言陛下宜鑒貞元之弊整法度肅諸侯則天下治憲宗然其言由是用兵誅蜀夏剪齊滅蔡復兩河以機秉還宰相紀律設張赫然號中興自黃裳啓之餘見通鑑己酉戶部侍郎武元衡為門下侍郎翰林學士李吉甫為中書侍郎同平章事以新舊紀修監察御史李絳兼翰林學士以舊史列傳修解題曰按新史鄭絪傳始盧從史隂與王承宗連和有詔歸潞從史辭潞乏糧請留軍山東李吉甫密譛絪漏言於從史帝怒詔學士李絳語其故且曰若何而處絳曰誠如是罪當族然誰以聞陛下者曰吉甫為我言絳曰絪任宰相識名節不當如犬彘梟獍與姦臣外通恐吉甫勢軋內忌造為醜辭以怒陛下帝良久曰幾誤我吳縝糾繆但見吉甫以三年九月罷相絪以四年二月罷相三月王士貞卒其子承宗自稱留後朝廷始討承宗紀傳年表皆不合遂疑絳之門生故吏撰集絳事者務多書其事以為美談史臣展轉失實今考李絳論事集曰絳奏從史比來事彰露頗多意不自安務欲生事所以曲陳利害頻獻計謀兾許用兵以求姑息今請親領士馬欲往邢洺以就糧賫去就之際情狀可知又貶盧從史制辭云况頃年上請就食山東及遣旋師不時恭命致動其衆覬生其心然則當李鄭未罷之前士真未死之日從史實嘗就食邢洺朝廷亦嘗使之旋師而託辭拒命憲宗亦嘗以此而疑鄭絪漏言特新史不當云與承宗連和耳今因絳為學士載之又按絳集上嘗御浴堂程大昌曰館本唐圖有浴殿在綾綺殿南長安志綾綺在蓬萊殿東志又記有浴堂門浴堂殿浴堂院從容問曰貞觀開元之化備在青史朕不量菲薄欲庶幾仰承祖宗之道將延拔俗之士致濟代之才舉兹凋瘵納諸仁壽何行而可以致是絳曰陛下誠能正身勵己尊賢貴德親信端士逺棄邪佞盡忠進直者奬之希合從諛者斥之與大臣言敬而信之不使小人參其事與賢士遊親而禮之不令不肖者搆其隙唯義所比不論親踈唯仁是行不論貴賤去冗官無益於時者則祿及才能矣出宫女之希御者則時無怨曠矣簡繁數之儀則禮得其節矣除靡慢之奏則樂得其和矣將帥亷則士卒勇矣官師公則治化洽矣法令行則下不違矣教化篤則俗必遷矣如此則聖聞周達德聲遐宣唯陛下勤行之爾上曰美哉斯言當書於紳四年因有旨檢自古君臣事迹造屏風圖畫美惡題其事狀施於便殿坐卧觀閲用為鑒戒絳等檢討五十餘事造屏風三合進入上大恱以示宰臣即日張於便殿冬十月李錡反命諸道兵討之以通鑑修丁卯武元衡罷新紀十一月甲申李錡伏誅新紀十二月山南東道節度使于頔入朝吕祖謙標目是歲李吉甫上元和國計簿以通鑑修解題曰按續通典舊史傳簿十卷總計天下方鎮凡四十八道管州府二百九十五領縣一千四百五十三見户二百四十四萬二千五十四其鳳翔鄜坊邠寧振武涇原夏銀靈鹽河東易定魏博鎮冀范陽滄景淮西淄青等十五道七十一州不申户口每歲賦入倚辨止於浙西東宣歙淮南江西鄂嶽福建湖南等八道合四十九州一百四十四萬户比量天寶供稅之户則四分有一天下兵戎仰給縣官者八十三萬餘人比量天寶士馬則三分加一率以兩户資一兵其他水旱徴科又在常役之外比較天寶州郡三百一十五今二百十八州府上供錢米計少九十七天寶户八百三十八萬五千二百二十三今五百三十二萬五千八百一十八在見供稅賦三十一道州府管內元和見在户二百四十四萬二千五十四計少天寶百九十四萬四千九百六十九天寶租稅庸調計錢粟絹布絲綿五千二百三十餘萬端匹屯貫石元和兩稅𣙜酒鹽茶等總三千五百十五萬一千二百三十八貫石計少一千七百一十四萬八千七百七十貫石天寶衛兵彍騎邊將等五十八萬四千九百四十三人元和軍八十三萬三百二十一人多二十四萬五千三百七十人開成初王彥威上供軍圖序至德訖元和天下觀察者十節度者二十九防禦者四經略者三大都通邑無不有兵最凡八十餘萬長慶户口凡三百三十五萬兵約九十九萬率三户資一兵今舉天下之入歲三千五百萬上供者三之一又三之二則衣賜仰給焉自留州留使兵士衣食之外餘四十萬皆仰度支葉適曰唐人倉猝不知以田養兵而以稅養兵故流害相承至此之極夫以田養兵畝四十至百而養一以稅養兵畝四百至千而養一以田養者可至百萬以稅養兵過十萬則困竭矣唐憲宗皇帝元和三年春正月癸巳上尊號以新舊紀修以神威軍為天威軍以兵志會要修城臨涇以唐厯修解題曰按續唐厯庚子以將城臨涇詔麟遊靈臺良原崇信歸化等五鎮修整士馬掎角相應城直涇州西北九十里餘見通鑑三月回鶻騰里可汗死以通鑑修夏四月䇿試賢良牛僧孺皇甫湜李宗閔李吉甫惡其言直考官翰林學士王涯吏部員外郎韋貫之户部侍郎楊於陵皆坐貶以舊紀通鑑修五月丙午册回鶻保義可汗以通鑑修六月沙陀酋長朱邪執宜詣靈州降朔方靈鹽節度使范希朝置之鹽州以通鑑修解題曰歐陽修五代史後唐贊曰李氏之先蓋出於西突厥本號朱邪拔野古為始祖其自序云沙陀者北庭之磧也唐太宗破西突厥諸部分同羅僕骨之人於此磧置沙陀府而以拔野古為都督考于傳記太宗分其諸部置十三州未嘗有沙陀府時西突厥鐵勒阿史那之類最大其别部有同羅僕骨拔野古等以十數又有處月處密諸部其小者也朱邪者處月别部之號太宗二十二年降拔野古其明年阿史那賀魯判至髙宗永徽二年處月朱邪孤注為契苾何力所敗後百五六十年有朱邪盡忠及子執宜見於中國而自號沙陀矣至盡忠孫始賜姓李氏云事見通鑑秋七月辛巳朔日有食之以新舊紀修九月庚寅于頔為司空同平章事丙申戶部侍郎裴垍為中書侍郎同平章事戊戌李吉甫罷以新紀修解題曰按新舊史列傳先是天下賦法有三曰上供曰送使曰留州建中初定兩稅時貨重錢輕是後貨輕錢重民輸率倍其初其留州送使所在又降省估就實估而重賦於人及垍為相奏留州送使物一切令依省估觀察使得用所治州租調不足乃取資郡以贍故送使之錢悉為上供江淮稍息肩程大昌曰上供者以其租調而上之度支今户部也送使者各以所𨽻節度觀察轉運而輸送之猶今轉運提刑司也此兩色外記逐州留為州用今係省錢也唐史載此謂節察轉運得攙用上供至於諸郡無定留州之數不得輒加牟取故節察轉運於其所屬無辭以羡取而屬郡刺史亦得保其所留不至為所侵奪此法既行而江淮之民始得蘇息也然未嘗盡以上供之額與之假令上供全額為萬緡用及其半則所存半賦仍歸度支今傳言送使之財悉為上供是節察轉運所得用之數併歸上供也則送使之數於何取給新志又云送使之餘與其上供之物皆輸度支是額應送使而送使不盡者亦入度支也是諸使許用上供之時其半反為度支之所掩也當云其以上供給用者給用之餘仍歸度支乃為得實餘見通鑑冬十二月南詔異牟尋死子尋閣勸立以通鑑修唐憲宗皇帝元和四年春二月丁卯鄭絪罷給事中李藩為門下侍郎同平章事以新紀修三月乙酉王士真卒其子節度副使承宗自稱成德留後以新紀修閏月己酉以旱降繫囚蠲租稅出宫人絶進奉禁掠賣以通鑑修丁卯立子鄧王寧為皇太子以新紀修夏六月以范希朝為河東節度使處沙陀於定襄川以通鑑修解題曰按新史列傳希朝鎮太原詔沙陀舉軍從之希朝乃料其徑騎千二百號沙陀軍而處其餘衆於定襄川欣州定襄郡有定襄縣朱邪執宜乃保神武川之黃花堆太原府壽陽縣北有神武故城後魏神武郡也秋八月王承宗獻德棣二州九月庚戌以為節度使冬十月承宗反以吐突承璀為招討宣慰使討之以新紀通鑑修解題曰按白居易題海圖屏風詩海水無風時波濤安悠悠鱗介無小大逐性各沈浮突兀海底鼇首冠三神邱鈎網不能制其來非一秋或者不量力謂兹鼇可求負贔牽不動綸絶沉其鈎一鼇既頓頷諸鼇齊掉頭白濤與黑浪呼吸澆咽喉噴風激飛亷鼓波怒陽侯鯨鯢得其便張口欲吞舟萬里無恬鱗百川多倒流遂使江海水朝宗意亦休蒼然屏風上此意亦少休注云時方討淮蔡蘇軾曰仁人君子之於兵蓋不忍輕用如此淮蔡且欲以德懷况欲弊所恃以動無用乎事見通鑑十一月己巳吳少誠卒其將吳少陽自稱淮西留後以新紀修是歲南詔王尋閣勸死子勸龍晟立以通鑑修唐憲宗皇帝元和五年春正月己巳神䇿軍大將軍酈定及王承宗戰敗死之以新紀修盧從史與王承宗通謀三月吐突承璀執之尋貶之為歡州司馬以吕祖謙標目修夏四月丁亥范希朝張茂昭大破王承宗兵於木刀溝以新紀修解題曰元和郡縣志木刀溝在定州新樂縣東南義豐縣南三十二里陘邑縣南二里秋七月丁未赦王承宗以德棣二州與之以吕祖謙標目修乙卯劉總弒其父濟與兄緄自為幽州盧龍留後九月以為節度使以新舊紀修解題曰按新史列傳總已毒父即領軍政朝廷不知其姦故詔嗣節度通鑑失書降吐突承璀為軍器使以舊紀修丙寅太常卿權德輿為禮部尚書同平章事以新舊紀修冬十月張茂昭請入朝歸易定二州以左庶子任迪簡為義武行軍司馬都虞候揚伯玉等作亂伏誅壬辰以迪簡為節度使以新舊紀修十一月庚申裴垍罷新紀唐憲宗皇帝元和六年春正月甲辰以吳少陽為節度使以舊紀修庚申淮南節度使李吉甫為中書侍郎同平章事以新舊紀修二月壬申李藩罷新紀李絳解翰林學士為户部侍郎以舊紀通鑑修夏六月丁卯李吉甫請省吏員併州縣減仕塗秋九月甲寅省內外官八百餘員諸司流外七百餘員以朱熹綱目修冬十一月丙申出左衛上將軍吐突承璀為淮南監軍以吕祖謙標目修十二月己丑李絳為中書侍郎同平章事以新舊紀修閏月辛亥皇太子薨本紀唐憲宗皇帝元和七年夏六月癸巳杜祐罷以新紀修秋七月乙亥立子遂王宥為皇太子改名恆以吕祖謙標目修解題曰按新舊史列傳吐突承璀恩寵特異惠昭太子薨議立儲副承璀獨排羣議屬澧王欲以威權自樹賴憲宗明斷不惑將建東宫詔翰林學士崔羣代澧王作讓表羣奏大凡已當得則讓不當得之烏用讓今遂王嫡冝為太子帝從其議八月戊戌田季安卒其子魏博節度副大使懷諌自稱知軍府事冬十月乙未魏博以其將田興知軍府事興以六州來歸甲辰以為節度使十一月辛酉給復一年賞其軍士以吕祖謙標目修解題曰按新舊史列傳田季安疾甚李吉甫請任薛平為義成節度使以重兵控邢洺因圖上河北險要所在帝張於浴堂門壁每議河北事必指吉甫曰朕日按圖信如卿料矣季安卒懷諌母元氏召諸將立懷諌吉甫議討之李絳曰不然兩河所懼者部將以兵圖已也故委諸將總兵皆使力敵任均以相維制不得為變若主帥強則足以制其命今懷諌乳臭不能事必假權於人權重則怨生向之權力均者將起事生患矣衆所歸必在寬厚簡易軍中素所愛者彼得立不倚朝廷亦不能安惟陛下蓄威以候之懷諌幼不能事政皆決於私奴蔣士則數易置諸將軍中怒取田𢎞正本文作興後同為留後𢎞正廷玠之子學頗通兵法勇而有禮為衙內兵馬使季安不恤軍務屢行殺罰𢎞正從容規切軍中賴之李安內忌出於臨清鎮將欲因罪誅之𢎞正陽痺痼炙灼滿身乃免懷諌召還舊職衙兵詣𢎞正第陳請𢎞正拒關不出衆譁於門𢎞正出衆拜之脅還府𢎞正度不免即令於軍曰爾屬不以吾不肖使主軍今與公等約能聽命否皆曰惟公命因曰吾欲守天子法舉六州版籍請吏於朝茍天子未命敢有請吾旗節者死殺人及掠人者死皆曰諾遂到府殺士則等十餘人圖魏博相衛貝澶之地籍其人以獻不敢署僚屬而待王官先時諸將出屯質妻子里民不得相往來𢎞正悉除其禁聽民通饋謝慶弔服玩僣侈者即日徹毁之承嗣時正寢華侈𢎞正避不敢居憲宗嘉之吉甫復請命中人宣慰因刺其變徐議所宜絳謂不如推誠撫納即假旌節他日使者持三軍表來請與𢎞正則制在彼不在此可奏與特授安得同哉帝重違吉甫欲詔張忠順特節往而授𢎞正留後絳固請由是即拜𢎞正節度使孫甫曰德宗嘗以魏博叛逆遣將討之反致大亂憲宗又以鎮州拒命出兵伐之卒不能平蓋三鎮相為勢援救復結河南叛臣不可卒破也田懷諌一稚子領軍府事李吉甫議用兵以取之此固平常之見殊不思三鎮相結正為子孫計一稚子雖可取奈他鎮何必又如鎮州之失䇿也李絳以先覺之明料千里未形之事如見憲宗從之悉如絳所䇿此真廟堂之謀也絳復曰王化不及魏博久矣一日挈六州來歸不大犒賞人心不激請斥禁錢百五十萬緡賜其軍有言太過者絳曰假令舉十五萬衆期歲而得六州計所轉給三倍於費今𢎞正天挺忠義首變汚俗破兩河之膽可嗇小費隳事機哉從之遣司封郎中知制誥裴度宣慰賚其軍錢六州民給復一年赦見囚存問髙年惸獨廢疾不能自存者度明辨具陳朝廷厚意𢎞正不勝自失乃深相結納奉上益謹復請度遍行其部宣示天子恩詔因令布衣崔歡奉表陳謝且言山東奧壤化為戎墟國家含垢垂六十年臣若假天之齡奉陛下宸算兾洗濯偽風然後退歸邱園死不恨田氏自承嗣至懷諌四世凡四十九年餘見通鑑營田振武天德以通鑑修解題曰按新食貨志初度支歲市糧於北都以贍振武天德靈武鹽夏之軍費錢五六十萬緡泝河舟溺甚衆元和中振武軍飢李絳請開營田憲宗稱善乃以韓重華為振武京西營田和糴水運使起代北墾田二百頃出贓罪九百餘人給以耒耜牛假種糧使償所負粟二歲大熟因募為十五屯每屯百三十人人耕百畝就髙為堡東起振武西逾雲州極於中受降城凡六百餘里列柵二十墾田三千八百餘里歲收粟二十萬石省度支錢二千餘萬緡李絳集作二十萬重華入朝奏請益開田五千頃法用人七千可盡給五城會絳罷而止按新地志鄯州鄯城縣開元拔石堡城號振武軍天寶更曰天威舊志振武軍在單于都護府城內按會要振武軍單于大都護合為一門豈石堡之捷初置是軍故徙單于都護府歟當考唐憲宗皇帝元和八年春正月辛未權德輿罷以新紀修二月辛卯賜田興名𢎞正以通鑑修丁酉貶于頔為恩王傳新紀三月甲子西川節度使武元衡為中書侍郎同平章事以新舊紀修夏六月大水辛丑出宫人以新紀通鑑修秋七月徙天德軍於大同故城以通鑑修解題曰通鑑考異曰實録云李光進請修東受降城兼理河防又云以中受降城及所管騎士𨽻于天德軍舊傳盧坦與李絳協議以為西城張仁願所築不可廢三者不同今但云受降城闕疑也今按元和郡縣志天德軍本安北都護開元十年移理中受降城天寶十三年於大同川西築城置軍乾元後西南移三里權居永清柵其治所又移西受降城元和八年黃河泛濫城南面壞防禦使請修築李吉甫陳便宜曰西城河水已毁其半不堪重修其子城猶堅牢量留一千足得居住天德軍士抽歸舊城舊城在西城正東微南一百八十里即隋氏大同城去本城三里已下城甚牢小安思順所置居大同川中當北戎大路南接牟那山鉗耳觜山牟那山南又是麥泊其地良沃於是移天德軍治於舊城元和郡縣志乃吉甫所正所載甚明白無足疑也廢天威軍𨽻神䇿軍以會要厯修冬十二月庚辰振武軍亂逐其節度使李進賢以新舊紀修羣臣請立后弗許以通鑑舊傳修解題曰按新舊史列傳八年十二月羣臣三請立后上以歲暮來年有子午之忌時後宫多嬖艷以后門族華盛慮正位之後不容嬖幸故章報聞罷竇蘋音訓曰古者宗子年雖七十不無主婦以族人不可無統祭祀不可無助爾憲宗立八年而不立后亂典禮甚矣唐憲宗皇帝元和九年春正月乙亥誅振武亂兵以通鑑修二月癸卯李絳罷甲辰以吐突承璀為神䇿中尉以吕祖謙標目修夏六月壬寅河中節度使張𢎞靖為兵部尚書同平章事以新舊紀修秋閏八月丙辰吳少陽卒其子元濟自稱知淮西軍事遣山南東道節度使嚴綬等討之以新紀修冬十月丙午李吉甫薨以新舊紀傳修十二月戊辰尚書右丞韋貫之同平章事以新舊紀修唐憲宗皇帝元和十年春正月乙酉加韓𢎞守司徒以新舊紀修召栁宗元等至京師三月以為逺州刺史以舊紀修解題曰蘇軾曰劉禹錫既敗為書自解言王叔文工言治道能以口辨移人既得用所施為人不以為當太上久疾宰相及用事者不得對宫掖事祕建桓立順功歸貴臣由是及貶後漢宦者傳論云孫程定立順之功曹騰參建桓之䇿與梁兾比捨清河而立蠡吾此漢所以亡也與廣陵王監國豈可同年而語哉禹錫以此為比以此知小人為姦雖已敗猶不悛也其可復置之要地乎事見通鑑田𢎞正遣其子布將兵討吳元濟以通鑑修王承宗李師道請赦吳元濟不許以通鑑修夏五月遣御史中丞裴度宣慰淮西行營以舊紀列傳修忠武節度使李光顔敗淮西兵以通鑑修六月癸卯盜殺武元衡戊申京師大索新紀乙丑裴度為中書侍郎同平章事以新舊紀修解題曰孫輔曰知裴度之賢足以破賊明之至也京師凶賊竊發殺害宰相不能撓用兵之計斷之至也宜乎不數年而兩河略定也事見通鑑秋七月甲戌絶王承宗朝貢以新舊紀修八月己亥朔日有食之通鑑李師道遣兵襲東都捕得伏誅朱熹綱目乙丑李光顔敗於時曲通鑑解題曰時曲壁名亦曰洄曲在蔡州西北近溵水竇蘋音訓在懸瓠西北三十里九月癸酉以韓𢎞為淮西行營都統以新紀修冬十一月壬申李光顔及河陽節度使烏重胤敗淮西兵於小溵河以通鑑修解題曰河陽節度使見大厯元年都畿解題戊寅盜焚獻陵寢宫新紀武寧節度使李願破淄青兵以通鑑修解題曰武寧節度使見貞元四年徐泗濠節度使解題韓𢎞守司徒解題曰實録興元初德宗方以公相寵勳臣宰相虛列官氏於制敕者多至八九及元和初平章在藩鎮不過一二而已至三年始加𢎞檢校司空同平章事後王鍔檢校司徒及在太原李吉甫奏授同平章事𢎞在鍔下每咎吉甫吉甫卒乃致書於武元衡以露其忿自處將帥二十年未嘗朝覲朝廷亦未以誠信待𢎞方欲用其勢以臨淮西故命守司徒加鍔上焉唐憲宗皇帝元和十一年春正月己巳張𢎞靖罷以新紀修庚辰中書舍人錢徽駕部郎中蕭俯請罷兵解內職以吕祖謙標目修癸未發河東盧龍義武橫海魏博昭義兵討王承宗以吕祖謙標目修甲申盜斷建陵門戟新紀二月乙巳中書舍人李逢吉為門下侍郎同平章事以新舊紀修三月庚午皇太后崩新紀夏四月庚子李光顔烏重胤敗淮西兵於陵雲柵以新紀通鑑修解題曰陵雲柵在郾城縣北辛亥司農卿皇甫鎛兼御史中丞判度支以舊史列傳及吕祖謙標目修六月甲辰淮西大敗隨唐鄧節度使髙霞寓於鐵城以通鑑修解題曰唐隨鄧節度使見至德元載南陽節度使解題鐵城在隨州應山縣西北秋七月壬午韓𢎞破淮西兵於郾城以新紀通鑑修八月壬寅韋貫之罷新紀冬十二月丁未工部侍郎王涯為中書侍郎同平章事以新舊紀修甲寅以太子詹事李訴為唐隨鄧節度使吕祖謙標目修唐憲宗皇帝元和十二年春正月戊子彗星出于畢以新紀修三月乙丑李訴屯冝陽柵降文城柵以通鑑修解題曰蔡州吳房縣元和改遂平縣於柵南置夏四月李光顔敗淮西兵於郾城以新紀通鑑修五月辛酉李訴敗淮西兵於張柴以新紀修丙子罷討王承宗吕祖謙標目修秋七月裴度為門下侍郎同平章事兼彰義節度使淮西宣慰處置使户部侍郎崔羣為中書侍郎同平章事以新舊紀修解題曰王師古曰憲宗削平藩方之志甚鋭裴度以輔相之任親從事於矢石其意蓋謂淮蔡既平則天下可以無事不知君心已移則始勤終怠其弊有不可勝言者方其罷李絳而召承璀則忠邪之塗已紊用皇甫鎛而寵程異則聚斂之端已萌而度方以征伐自任本末內外之際豈尚有未思者乎方其初也承璀李巽用事志慮嘗一偏矣杜黃裳李絳為相消息調伏卒使正人進用而邪佞以息此元和之所以治也度不知此晚歲見其怠荒始纂述用兵機略來上冀以感悟之然則何益矣事見通鑑翰林學士令狐楚罷以通鑑修九月丁未李逢吉罷新紀冬十月辛未李訴襲破蔡州癸酉擒吳元濟尋伏誅以吕祖謙標目修解題曰按新舊史紀傳實録涼公平蔡録吳少陽據蔡州五年不朝覲地多原澤益蓄馬時掠壽州茶山劫商賈招四方亡命以實其軍元和九年死子元濟匿不發喪以病聞表請元濟主軍務上遣醫往而不問元濟醫工至則稱疾愈不見而反自蜀平帝鋭意取淮西李吉甫在淮南聞少陽上下攜泮自請徙壽州以天子命招懷之會討王承宗未及用後田𢎞正以魏歸吉甫知魏人謂田進誠才而唐州又蔡喉夾請拔進誠為刺史汝州捍蔽東都兵寡不足憚寇而河陽乃魏博之津𢎞正歸國則為內鎮不宜戌重兵請徙屯汝州閏八月辛酉以河陽節度使烏重胤兼汝州刺史九月以洺州刺史李光顔為陳州刺史忠武都知兵馬使泗洲刺史令狐通為壽州團練使山南東道節度使袁滋為荆南節度使嚴綬為山南東道節度使少陽判官蘇兆楊元卿及其將侯惟清嘗勸少陽入朝元濟縊兆囚惟清元卿先奏事在京師見宰相李吉甫具言淮西事且請蔡使在道者隨在所繫之少陽死四十日帝不為輟朝易將增戍以須變董重質者少誠壻也善為兵元濟倚之因説元濟請以精騎三千由壽之間道取揚州東約李思道以舟師襲潤州遣竒兵掩商鄧進守襄陽以搖東南則荆衡黔巫傳一矢可定又請精兵五百自崿領故關在河南府登封縣三日襲東都則天下騷動元濟猶豫不能用吉甫以為淮西內地不同河朔且四無黨援國家常宿數十萬兵以為守禦冝因時取之平章事張𢎞靖請先遣使者弔贈待不恭乃加兵詔可元濟不得命乃焚舞陽及葉掠魯山襄城陽翟許汝居人皆竄伏荆榛間剽係千餘里關東大恐弔使至弗克入而還十月以李光顔為忠武節度使嚴綬充申光蔡等州招撫使仍令內常侍崔潭峻監其軍尚書右丞吕元膺為東都留守十年正月乙酉宣武節度使韓𢎞守司徒丙申嚴綬次于蔡州西鄙己亥削奪元濟官爵令宣武太原武寧淮南宣歙等道兵馬合藝山南東道及魏博荆南江西劒南東川兵馬與鄂嶽計會東都防禦使與懷汝鄭節度及義成兵馬掎角相應併河陽忠武泗壽共十七道同期進討元濟不能有所指授諸將趙昌凌朝江董重質李佑李憲王覽趙曄王仁清等以便宜人自為戰抗王師有少誠少陽舊風二月嚴綬敗于磁邱唐州縣退保唐州韓𢎞遣子公武以兵二千餘𨽻李光顔令狐通為賊攻焚廥聚破屯柵詔金吾大將軍李文通代之田𢎞正遣子布率兵三千討李師道師道不敢顯助元濟光顔戰于臨頴許州縣敗之四月甲辰又敗之于南頓陳州縣元濟遣人求援于鎮鄆王承宗李師道上表請赦元濟不從詔興諸道兵不及鄆師道選卒二千抵壽春陽言為王師助實欲援蔡也亡命少年為師道計曰河隂者江淮委輸河南帝都請燒河隂敖庫募洛壯士劫宫闕則朝廷救腹心疾此解蔡一竒也師道乃遣客燒河隂漕院錢三十萬緡米數萬斛人情駭擾五月以御史中丞裴度視行營諸軍還奏攻取䇿與帝意合且問諸將才否度對光顔義而勇當有成功不三日光顔破時曲兵帝歎度之知人乃以度兼刑部侍郎自是中外相賀決不赦賊初賊衆晨壓光顔之壘而陳光顔不得出乃自毁其柵之左右出騎以突之光顔將數騎冒堅以衝之出入者數四賊衆盡識光顔矢集於身如蝟人爭奮躍賊大潰死者數千人門下侍郎武元衡上稱為長者李吉甫卒淮蔡用兵悉以機務委之承宗遣使請赦元濟請事於宰相辭禮悖慢元衡叱之承宗因飛章詆元衡又有説師道曰討蔡謀皆出宰相而元衡得君願為袁盎事後宰相必懼請罷兵是不用師蔡圍解矣六月癸卯盜夜伏於靖安坊在永樂坊南元衡入朝害之批顱骨持去又遣盜於通化坊在長安縣朱雀街西第一街次南刺裴度傷首而免庚戌神䇿將士王士則王士平以盜名上且言王承宗所使乃捕得張晏等八人鞠於內仗遂付京兆府鞠之議者欲罷度安二鎮反側帝怒曰度得全天也若罷之是賊計適行吾倚度足破二賊度亦以王室陵夷常憤愧無死所自行營歸知賦曲折帝益信仗乙丑度為中書侍郎同平章事張晏等處斬七月絶承嗣朝貢初師道置邸東都多買田伊闕陸渾間以舍山棚唐實録東畿西南連虢鄧州山谷曠而多猛獸人習射獵而不耕蠶春夏遷徙無常俗呼山棚宋敏求河南志在今河南府伊闕縣遣將訾嘉珍門察部分浮屠圓靜為之謀大饗士邸中椎牛釃酒既衷甲矣其徒白官發之八月留守吕元膺以兵掩邸賊突出轉略畿部入山中數月奪山棚所占山棚怒道官軍襲擊盡殺之及窮治嘉珍乃害元衡者汪應辰曰新史王承宗傳則承宗與師道同謀而殺元衡者張晏等李師道傳則不及承宗而害元衡者訾嘉珍門察元衡傳則訾嘉珍門察使謀殺元衡會張晏先發故籍之以告師道而竊其賞至於燒河隂漕院則承宗師道傳皆言不知果誰所遣訾嘉珍等為留守司掩獲又鹽鐵使得嘉珍所斷建陵戟迹狀明白然承宗傳乃謂承宗遣盜斷門戟伏甲欲反洛陽則非師道矣十一年盜斷建陵門戟在嘉珍敗獲後餘見元和十四年辭題八月李光顔敗於時曲嚴綬無威略經年無尺寸功裴度屢言綬非才九月以韓𢎞充淮西兵馬都統冬十月庚子析山南東道為兩節度以户部侍郎李遜充襄復均郢房節度使右羽林將軍髙霞寓充唐隋鄧節度使承宗數出兵掠鄰鄙田𢎞正上言承宗宜誅十一月李文通奏敗元濟之衆三千戊寅賊焚獻陵寢宫光顔重胤破元濟之衆於小溵河平其柵韓𢎞素蹇縱隂挾賊自重惡光顔力戰隂圖撓屈乃飾名姝教歌舞六博竇蘋音訓用十二棊分白黑各采擲之襦襡竇蘋音訓音屬矩衣珠琲舉止光麗費百巨萬遣使以遺光顔兾一見恱感而怠於軍政也使者曰公以君暴露于外恭進侍者光顔約旦日納焉乃大合將校置酒引使者以侍姝至秀曼都雅一軍驚視光顔徐曰我去室家久以為公憂誠無以報德然光顔受國恩深誓不與賊同生今戰卒數萬皆棄妻子蹈白刃光顔奈何猶以女色為樂因嗚咽泣下將卒數萬皆感激流涕乃厚賂使者還之於是士氣益勵𢎞令諸軍齊攻賊城賊攻重胤之壘重胤中數槍馳請救於光顔光顔以小溵橋賊之堡也乘其無備使田頴宋朝隂襲取之由是不克救重胤𢎞以光顔違令取頴朝隱將戮之光顔不敢留會中使景忠信至乃矯詔令所在械繫之馳以聞詔釋之𢎞及光顔迭以表論帝謂𢎞使曰違都統令當死但以功可贖𢎞不悅乙亥以嚴綬為太子少保帝欲討承宗張𢎞靖曰戎事並興鮮有濟者不如悉力淮西已平乃治河朔十一年正月𢎞靖罷為河東節度使庚辰翰林學士錢徽蕭俯以請罷兵各守本官癸未削奪承宗官爵令河東義武盧龍橫海魏博昭義六節度兵進討甲申盜斷建陵門戟二十七竿韋貫之請釋鎮州等專力淮西且言陛下豈不知建中事乎始於蔡急而魏應也齊趙同起故朱泚乘以為亂今陛下獨不能少忍邪帝不聼二月李光顔次于翟城翟陽翟也本鄭之櫟三月壁于堂河髙霞寓破賊于郎山四月庚子光顔重胤破賊於陵雲柵五月破賊於陵雲柵次於柵東霞寓雖悍而寡謀始引兵趨蕭陂戰小勝六月進至文城柵賊偽北逐之為伏所掩遂大敗才以身免人情悚駭宰相多請罷兵上曰勝負兵家常勢不可以一將失利便沮成計今但議用兵方略朝廷庶務制置可否耳霞寓退保唐州七月丁丑貶為歸州刺史李遜左遷恩王傅以河南尹鄭權為山南東道節度使袁滋為彰義節度使以唐州為理所壬午宣武軍奏破郾城蔡州縣長慶屬許州之衆二萬殺二千餘人八月壬寅韋貫之罷昭義節度使郤士美大破賊下三營環柏鄉隋於漢鄗城南十八里置柏鄉縣今髙邑縣柏鄉鎮也時諸鎮合兵十餘萬多玩寇犯法獨士美兵鋭整最先有功承宗大震懼九月乙酉光顔拔陵雲柵丙戌拔蔡州石越二柵壽州奏破光州殷城縣光州固始縣有殷城縣本蔣國宋改商城省為鎮收柵六李師道懼偽貢欵誠冬十一月加檢校司空辛巳命內常侍梁守謙監淮西行營軍仍以空名告身五百通及金帛付之庚寅光顔檢校左僕射重胤檢校右僕射田布兼御史中丞韓公武兼御史大夫辛卯李文通奏破賊於固始十二月甲寅以太子詹事李訴充唐隋鄧節度使初置淮頴水運使運楊子院米自淮隂泝流入穎口穎水至夀春府入淮至項城縣陳州縣入溵河輸于郾城得米五十萬石茭一千五百萬束十二年正月甲申貶袁滋為撫州刺史李訴以軍初傷夷士氣未寬乃不為斥候部伍令于軍曰天子知訴能忍恥故委以撫養戰非吾事也衆信而安之士傷夷疾病親為營護賊以嘗敗髙袁二帥又訴名非夙所畏者易之不為備二月己亥淮西行營奏克古葛伯城在郾城北甲寅鄂嶽團練使李道古攻申州尅羅城賊力戰道古之衆大敗三月光顔敗元濟之衆三萬于郾城殺賊十二三李訴謀襲蔡請濟師詔益河中鄜坊二千騎由是完葺器械隂計戎事嘗獲賊將丁士良與語不撓署捉生將士良謝曰吳秀琳以數千兵不可破者陳光洽為之謀也我能為公取之擒以獻秀琳舉文城柵降署為牙將四月李訴至嵖岈山在蔡州遂平縣西五十六里郾城守將鄧懷金降光顔元濟始懼盡發左右及守城卒屬董重質以抗光顔重胤五月李訴襲破朗山蔡州縣執戍將梁希果平汶淃等三壁詔罷河北用兵專事淮西吳秀琳為訴䇿曰必破賊非李祐無與成功者祐賊健將也守興橋柵在蔡州西其戰嘗易官軍訴候祐護獲于野遣史用誠以壯騎三百伏其旁見羸卒若將燔聚者祐果輕出用誠禽而還諸將素苦祐請殺之訴不聽以為客待間召祐及李忠義屏人語至夜艾忠義亦賊將所謂李憲者軍中多諌此二人不可近訴待益厚六月元濟上表請東身歸朝時連破三柵賊勢迫蹙而制於左右不果行財殫力屈宰相三人唯度獨言賊可滅上亦病之因使三相俱陳利害度獨不言惟請身自督戰帝目度留曰果為朕行乎度俯伏流涕曰臣誓不與賊偕存上為之動七月丙辰度守門下侍郎同平章事彰義軍節度淮西宣慰招討處置使以韓𢎞領都統乃上還招討以避𢎞然實行都統又制詔有異辭欲激賊怒𢎞者度請易其辭窒疑間之嫌汪應辰曰舊裴度傳制詞云雖挈地求生者實繁有徒而嬰城執迷者未剪其類又云遙聽鼓鼙更張琴瑟煩我台席董兹戎旃度請祇稱宣慰處置使又以既兼招撫請改剪其類為革其志又請改更張琴瑟為近軺樞軸煩我台席為授以成算通鑑李逄吉不欲討蔡令狐楚與逢吉善度恐合中外之勢以沮軍事乃請改制書且言其草制失詞罷楚學士按楚所草詞不見其激賊怒𢎞之意舊史得其迹通鑑得其意於是表馬總為宣慰副使韓愈行軍司馬李正封馮宿李宗閔備幕府入對延英曰主憂臣辱義在必死賊滅則朝天有日賊在則歸闕無期上為之流涕李訴將襲元濟會雨水自五月至七月不止不可出師軍吏咸以不殺李祐為言訴無以止之乃持祐泣曰豈天不欲平賊乎何見奪者衆耶則械而送之朝表言必殺祐無與共誅蔡者詔釋以還訴訴乃令佩刀出入帳下署六院兵馬使六院者隨唐兵也凡三千人皆山南竒材鋭士故委祐統之祐捧檄嗚咽諸將乃不敢言宋祈贊曰訴得祐不殺付以兵不疑知可以破賊也祐受任不辭決䇿入死以訴能用其謀也祐之才得訴乃顯故曰平蔡功祐為多舊令舍諜者族訴除其令因使厚之諜反以情告訴訴益知賊中虛實八月三日裴度赴淮西帝御通化門臨遣都城外郭東西三門最北曰通化賜通天御帶發神䇿騎三百為衛以郾城為治所光顔重胤謂梁守謙曰若俟度至而有功則非我利六日出兵戰於賈店為賊所敗度至郾城巡撫諸軍時諸道兵皆有中使監陳進退不由主將戰勝則先使獻捷偶衄則凌挫百端度至行營奏去之時止罷監陳非監軍也衆皆喜恱九月丁未李逢吉罷十月李訴圍吳房縣本漢縣元和攻其城毁之十二年改遂平縣移文城柵南新城賊以梟騎追訴訴下馬據胡床令於衆曰敢回戈者斬衆力戰射殺賊將孫獻忠賊乃退或勸訴遂拔吳房訴曰拔則賊力專不若留之以分其力度率賓從於沱口郾城縣有沱口鎮竇蘋音訓今郾城東南觀版築賊以竒兵自五溝五溝水在郾城縣至注弩挺刃勢將及度光顔力戰却之先是光顔密遣田布伏精騎溝下扼其歸賊棄騎越溝墜而死者千餘人由是賊悉鋭士屯洄曲以抗光顔李訴知其隙可乘乃遣從事鄭澥告師期於裴度李翺韓愈行狀公知蔡州精卒悉聚界上以拒官軍守城者率老弱且不過千人亟白丞相謂以兵三千人間道以入必禽元濟未及行而李訴自唐州文城壘提其卒以夜入蔡州果得元濟十月以李祐率突騎三千為先鋒李憲副之訴率中軍三千田進誠以後軍三千殿出文城柵衆請所向訴曰東六十里止襲張柴竇蘋音訓今日張塞殱其戍敕士少休益治鞍鎧發刃彀弓會大雨雪天晦凛風偃旗裂膚馬皆縮栗士抱戈凍死於道十一二張柴之東陂澤阻奧衆未嘗蹈也始發吏請所向訴曰入蔡州取吳元濟士失色監軍使者泣曰果落李祐計然業從訴人人不敢自為計道分五百人斷洄曲路橋又分五百人斷朗山路行七十里夜半至懸瓠城雪甚城旁皆鵝鶩池訴令擊之以亂軍聲賊恃吳房朗山戌晏然無知者祐等坎墉先登衆從之殺門者發關留持柝傳夜自如黎明雪止訴入駐元濟外宅蔡吏驚曰城陷矣元濟曰是洄曲子弟歸求寒衣耳及聞號令曰常侍傳語始驚曰何常侍得至此率左右登牙城田進誠兵薄之訴計元濟且望救於董重質乃訪其家慰安之使以書召重質重質以單騎白衣降進誠火南門元濟請罪梯而下檻送京師申光諸屯尚二萬衆皆降訴不戮一人其為賊執事帳內厨廄厮役悉用其舊使不疑乃屯兵鞠場以待裴度初重質自洄曲還蔡州光顔躍馬入賊營大呼衆萬餘人皆投甲請命度先遣馬總入城安撫明日度建彰義軍節領洄曲降卒繼進訴具櫜鞬候度將避之訴曰此方不識上下之分久矣請因以示之度以宰相禮受訴謁衆聳觀明日軍還文城柵度以蔡卒為牙兵或謂反側未安不可去備度笑曰吾為彰義節度元惡就禽蔡人即吾人也衆感泣李訴帳下厨廄皆用舊人而蔡人不疑裴度用蔡卒為牙兵而蔡人感泣可謂得安反側之道矣初元濟禁偶語於道夜不然燭酒食相饋遺者以軍法論度下令唯盜賊鬬死抵法餘一蠲除往來不限晝夜民始知有生之樂甲申詔淮西立功將士委韓𢎞裴度條疏聞奏淮西軍人一切不問給復二年十一月丙戌朔帝御興安門唐六典大明宫南靣五門次西曰興安受俘以元濟徇兩市斬於獨栁之下吳少誠以貞元二年為留後傳三世凡三十一年李訴檢校左僕射山南東道節度使封涼國公加韓𢎞侍中李光顔烏重胤並檢校司空韓公武檢校左常侍鄜坊節度使田布右金吾將軍度自蔡州入朝留馬總為彰義軍留後淮西之平凡三年而後成功由憲宗之能斷也故韓愈碑銘曰凡此蔡功惟斷乃成甲戌淮南節度使李鄘為門下侍郎同平章事以新舊紀修十二月壬戌爵裴度晉國公復知政事以通鑑修大事記續編卷六十三
