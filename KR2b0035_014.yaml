body:
  text: 大事記續編卷十四明王禕撰漢孝安皇帝建光元年春正月幽州刺史討髙句驪濊貊不克以本紀修三月癸巳皇后鄧氏崩本紀解題曰范曄論曰孝安雖稱尊享御而權歸鄧氏至乃損徹膳服克念政道然令自房帷威不逮逺始失根統歸成陵敝遂復計金授官移民逃寇推咎台衡以答天眚既云哲婦亦惟家之索矣鄧隲位特進封上蔡侯以列傳修帝始親政事戊申追尊清河孝王曰孝德皇皇妣左氏曰孝德后祖妣宋貴人曰隱敬后以通鑑本紀修長樂太僕蔡倫自殺以列傳修夏四月濊貊鮮卑寇遼東以本紀修徴薛包為侍中不拜以通鑑修解題曰包父娶後妻而憎包分出之包日夜號泣不去至被驅杖不得已乃廬於舍外旦入灑掃父怒之又逐之乃廬於里門晨昏不廢居嵗餘父母慙而還之餘見通鑑吕祖謙曰大抵暴戾之性凡人有此根者終必發露惟其本無者雖屢撓而莫能有薛包之事父母自常人之心父母逐之至再至三則必有不能忍者今包終不能去而昏晨之奉益勤蓋無暴戾之根故也遣鄧隲就國廢西平侯鄧廣宗西華侯鄧忠等五人為庶人廣宗及忠皆自殺五月隲與子鳳從弟河南尹豹舞陽侯遵將作大匠暢皆自殺以紀傳修解題曰鄧氏臨朝約己為民號為賢后然安帝之齒長矣而不復子明辟使之蓄忿留恨雖微宫人之誣吾猶為鄧宗危之也朱寵上疏謂利口傾險反亂國家彼小人離閒人之子母者亦可畏哉事見通鑑丙申貶平原王翼為都鄉侯以傳紀修大司農朱寵訴鄧氏廷尉陳忠劾免之以列傳修解題曰陳忠不得志於鄧氏隲等敗忠為尚書數上書陷成其惡大司農朱寵輿櫬上疏追訟隲帝意頗悟忠劾寵餘見通鑑陳瓘曰陳忠不肖人也其父兼通經書奏議溫粹而忠以私滅公𨗳人主於有過之地險薄不肖不亦甚哉以牟平侯耿寶為羽林左軍車騎封宋楊子四人為列侯皇后兄宜春侯閻顯及其弟景耀晏為鄉侯典禁兵以本紀修解題曰陳瓘曰鄧氏七人死不以命而宋氏之四子封侯諸閻並為卿校矣事見通鑑封中黃門江京李閏為侯京等與中常侍樊豐帝乳母王聖聖女伯榮通姦賂楊震論之不省以列傳修秋七月己卯改元以本紀修燒當羌麻奴復反八月馬賢擊之不利以紀傳修九月鮮卑圍烏桓校尉於馬城度遼將軍耿夔救之以本紀修戊子帝幸衛尉馮石府以本紀修雨水冬十一月地震裂除今年田租以本紀修庚子復斷二千石以上三年喪以本紀修初置漁陽營兵本紀十二月高句驪濊貊圍𤣥莬城以本紀修漢孝安皇帝延光元年春三月丙午改元以本紀修夏四月癸未雨雹以本紀修六月蝗以本紀修秋七月髙句驪降本紀八月陽陵園寢火以本紀修冬十月鮮卑寇鴈門定襄十一月寇太原以本紀修燒當羌降以本紀修是嵗雨水大風地震以本紀修漢孝安皇帝延光二年夏四月戊子爵王聖為野王君以列傳修解題曰朱熹曰當時大勢如人衰老百病交作小小變動便成大疾如乳母如單超徐璜如張讓趙忠略有權柄便須擾亂此何等時耶餘見通鑑北胸奴與車師寇河西以軍司馬班勇為西域長史屯柳中以列傳修秋七月丹陽山崩本紀冬十月甲戍以楊震為太尉時為王聖修第震上疏論之不聽以吕祖謙標目修聘處士周燮馮良不至以朱熹綱目修是嵗大風雨水地震以本紀修漢孝安皇帝延光三年二月丙子帝東狩辛卯幸泰山柴告岱宗壬辰祀五帝於明堂三月戊戍祀孔子及七十二弟子於闕里壬戍還京師幸太學以本紀修楊震免遣歸本郡自殺以紀傳修解題曰樊豐謝惲等見震切諫不從無所顧忌遂詐作詔書調發司農錢榖大匠見徒材木各起冡舍園池廬觀役費無度㑹東狩岱宗豐等因乘輿在外競修第宅震部掾髙舒召大匠令史考校之得豐等所詐下詔書具奏須行還上之豐等惶怖㑹太史言星變逆行遂共譛震及車駕行還夜遣使者䇿收震太尉印綬於是柴門絶賔客豐等復惡之復請大將軍耿寶寶為大鴻臚明年始為大將軍范史誤也奏震大臣不服罪懷恚望有詔遣歸本郡高舒亦得罪以减死論餘見通鑑葉適曰兩漢之衰大臣與小人爭不勝而死亡者蕭望之王商王嘉袁安楊震李固陳蕃七人者皆其國之所以存亡也孔子曰天子有爭臣七人雖無道不失其天下又曰所謂大臣者以道事君不可則止又曰無求生以害仁有殺身以成仁又曰民之於仁也甚於水火水火吾見蹈而死者矣未見蹈仁而死者也參以數端大節可見夏四月戊辰以光祿勳馮石為太尉以本紀修南單于檀死弟拔立以列傳修六月鮮卑寇𤣥莬本紀庚午閬中山崩本紀解題曰李賢曰閬中縣屬巴郡今隆州縣秋八月辛巳以大鴻臚耿寶為大將軍以本紀修九月丁酉廢皇太子保為濟隂王太僕來厯等詣鴻都門連日諫尚書令陳忠奏免厯官以紀傳修解題曰皇太子驚病不安避幸安帝乳母王聖舍太子乳母王男厨監邴吉等以為聖舍新繕修犯土禁不可久御聖及其女永江京樊豐王男邴吉等互相是非聖永遂誣譛男吉皆幽囚死太子思男等數為太息京豐懼有後害妄造虛無讒搆太子閻后傳后與江京樊豐等共譛皇太子及東宫官屬帝怒召公卿以下㑹議廢立耿寶等承㫖皆以為當廢厯與太常桓焉廷尉張皓議曰經說年未滿十五過惡不在其身且男吉之謀皇太子容有不知宜選忠良保傅輔以禮義廢置事重此誠聖恩所宜宿留帝不從是日遂廢太子為濟隂王時監太子家小黃門籍建中傅髙梵等皆徙朔方厯乃要結光祿勳祋諷宗正劉瑋將作大匠薛皓侍中閭邱𢎞陳光趙代施延太中大夫朱倀第五頡中散大夫曹成諫議大夫李尤符節令張敬侍書侍御史龔調羽林右監孔顯城門司馬徐崇衛尉守丞樂闈長樂未央廄令鄭安世等俱詣鴻都門證太子無過龔調據法律明之以為男吉犯罪皇太子不當坐御史之職如此帝與左右患之乃使中常侍奉詔脅羣臣曰父子一體天性自然以義割恩為天下也厯諷等不識大典而與羣小共為歡議外見忠直而內希後福飾邪違義豈事君之禮朝廷廣開言事之路故且一切假貸若懷迷不反當顯明刑書諫者莫不失色乃各稍自引起厯獨守闕連日不肯去帝大怒乃免厯兄弟官餘見通鑑安帝惟一子耳因其乳媪而廢之者由來厯之諫不獲伸也唐德宗亦惟一子因其妻母欲廢之然尋止者由李泌之論得伸也使漢之三公有如李泌漢之羣僚皆如來厯安有濟隂之事耶德宗謂貞觀開元皆易太子何故不亡益知祖宗詒厥之道不可不謹東漢至孝安才五君耳而廢太子者三光武安得不任其咎哉庚申晦日有食之本紀冬十月帝幸長安閏月乙未祠廟陵十一月乙丑至自長安以本紀修是嵗地震雨水風雹以本紀修漢孝安皇帝延光四年春二月甲辰帝南狩以本紀修三月戊午朔日有食之本紀庚申帝幸宛不豫而還丁卯崩於葉庚午還宫辛未尊皇后為皇太后臨朝解題曰蔡雍獨斷曰少帝即位太后即代攝政臨前殿朝羣臣太后東面少帝西面羣臣奏事上書皆為兩通一詣后一詣少帝餘見通鑑大鴻臚閻顯為車騎將軍定䇿禁中立章帝孫濟北王壽子北鄉侯懿乙酉即皇帝位夏四月馮石為太傅司徒劉熹為太尉參録尚書事以本紀修辛卯耿寶樊豐王聖等坐阿黨豐下獄死寶自殺聖母子徙雁門以本紀修解題曰豐等媚事閻顯共爭太子情好方篤及顯専朝遽至爭權顯挾太后之重此豐等所以死徙也連雞不俱栖信哉事見通鑑己酉葬孝安皇帝於恭陵以本紀修秋七月班勇擊車師後王斬之以本紀修冬十月丙午越嶲山崩本紀辛亥少帝薨閻顯及江京等祕不發喪閉宫門屯兵十一月丁巳地震中黃門孫程等十九人斬京等迎濟隂王於德陽殿下即皇帝位登南宫雲臺屯兵南北宫門衛尉閻景率兵入北宫尚書郭鎮斬之遣使者取璽綬戊午帝幸嘉德殿顯及其弟城門校尉耀執金吾晏皆伏誅罷屯兵遷太后於離宫以本紀修解題曰十月二十七日北鄉侯薨閻顯白太后徴諸王子簡為帝嗣未及至十一月二日孫程遂與中黃門王康等十八人聚謀於西鍾下漢官儀崇賢門內德陽殿袁宏漢記太子廢居於德陽殿西鍾下皆截單衣為誓四日夜程等共㑹崇德殿上因入章臺門東京賦既新崇德遂作德陽皆北宫也崇德在東德陽在西相去五十步北宫有章臺門殿門也時江京劉安及李閏陳逹等俱坐省門下程與王康共就斬京安逹以李閏權藝積為省內所服欲引為主因舉刃脅閏曰今當立濟隂王無得動搖閏諾於是扶閏起俱於西鍾下迎濟隂王立之召尚書令僕射以下尚書令僕射與中黃門之屬皆屬少府令僕射各一人尚書六人左右丞各一人侍郎三十六人令史二十一人從輦幸南宫雲臺時太后在北宫故帝自北宫幸南宫雲臺登臺據高臨下然後號召百官也召公卿百僚使虎賁羽林士屯南北宫諸門程等守省門遮扞內外閻顯時在禁中憂迫不知所為小黃門樊登勸顯發兵以太后詔召越騎校尉馮詩顯為車騎將軍兵柄屬之景為衛尉衛士屬之耀為城門校尉城門兵屬之晏為執金吾緹騎屬之崇為虎賁中郎將期門屬之獨北軍五營未有所屬故召馮詩及詩歸營屯守而閻氏敗失虎賁中郎將閻崇屯朔平門北宫北門曰朔平以禦程等誘詩入省太后授之印曰能得濟隂王者封萬户侯得李閏者五千户侯顯以詩所將衆少使與登迎吏士於左掖門外詩因格殺登歸營屯守顯弟景遽從省中還外府收兵至盛德門景為衛尉當時虎賁羽林雖已為孫程用必有畨休在外者馮詩歸營自守景窘急遂還外府收兵欲入北宫也程𫝊召諸尚書使收景尚書郭鎮時卧病聞之即率直宿羽林出南上東門逢景從吏士拔白刃呼曰無干兵鎮即下車持節詔之景曰何等詔因斫鎮不中鎮引劒擊景墮車左右以㦸義其胸遂禽之送廷尉獄夜死旦日遣使者入省奪得璽綬乃幸嘉德殿南宫有嘉德殿洛陽記殿在九龍門內令侍御史收顯等送獄袁宏漢記使御史詣崇德殿收顯等親族於是遂定北鄉侯病司徒李郃隂與少府陶範步兵校尉趙直謀立順帝㑹程等事先成故郃功不顯明年坐吏民疾病賜䇿免將作大匠翟酺上郃潛圖大計以安社稷於是録隂謀之功封郃涉都侯辭讓不受餘見通鑑己卯葬少帝以本紀修辛巳封孫程等為侯以將作大匠來厯為衛尉以列傳袁宏漢記修十二月改葬故太尉楊震祀以中牢以朱熹綱目修京師大疫本紀漢孝順皇帝永建元年春正月帝朝太后於東宫辛未太后崩以傳紀修辛巳馮石劉熹免以本紀修二月丙戍太常桓焉為太傅大鴻臚朱寵為太尉參録尚書事以吕祖謙標目修鍾羌反馬賢討破之以本紀修秋七月庚午來厯為車騎將軍以本紀修八月鮮卑寇代郡本紀司𨽻校尉虞詡按中常侍張防坐輸作左校浮陽侯孫程等救之乃赦之以列傳修解題曰中常侍張防特用權勢每請托受取詡輒按之甚而屢寢不報詡不勝其憤乃自繫廷尉防流涕訴帝詡坐論輸左校防必欲害之二日之中𫝊考四獄宦者孫程張賢等知詡以忠獲罪乃相率乞見程曰陛下始與臣等造事之時常疾姦臣知其傾國今日即位而復自為何以非先帝乎司𨽻校尉虞詡為陛下盡忠而更被拘繫常侍張防贓罪明正反構忠良今客星守羽林其占宫中有姦臣宜急收防送獄以塞天變下詔出詡還假印綬時防立在帝後程叱防曰姦臣張防何不下殿程曰陛下急收防無令從阿母求請李賢曰阿母宋娥也帝問諸尚書尚書賈朗素與防善證詡之罪帝疑焉於是詡子顗與門生百餘人舉幡候中常侍高梵車叩頭流血訴言枉狀梵乃入言防坐徙邊賈朗等或死或黜即日赦出詡程復上書陳詡有大功語甚切激帝感悟復徴拜議郎數日遷尚書僕射餘見通鑑虞詡得罪而論救之者乃出於孫程張賢之口時事可知矣孫程等坐爭功免官十九侯俱就國以列傳修九月初令三公尚書入奏事本紀冬十月鮮卑犯邊增置邊郡步兵以本紀修漢孝順皇帝永建二年春二月鮮卑寇遼東𤣥莬護烏桓校尉耿曄率南單于擊鮮卑破之以本紀修三月旱以本紀修夏六月乙酉追尊母李氏為恭愍皇后以本紀修班勇及燉煌太守張朗討焉耆尉犂尼須破之勇後期徴下獄免以紀傳修秋七月甲戍朔日有食之本紀壬午朱寵免以吕祖謙標目修徴處士樊英為五官中郎將尋稱病詔以光祿大夫歸在所致榖羊酒英辭位時又徴賀純楊厚黃瓊為議郎以列傳袁宏漢紀謝承書修解題曰英字季齊南陽人少習京氏易兼明五經隱於壺山之陽李賢曰山在今鄧州新城縣北受業者四方而至州郡禮請不應公卿舉賢良方正有道皆不行安帝初徴為博士建元二年復詔公車賜䇿書徴不至䇿書備禮𤣥纁徴之復固辭詔切責郡縣駕載上道英到京稱病不肯起雖與入殿猶不以禮屈帝怒謂英曰朕能生君能殺君能貴君能賤君能富君能貧君君何以慢朕命英曰臣受命於天生盡其命天也死不得其命亦天也陛下焉能生臣焉能殺臣臣見暴君如見仇讐立其朝猶不肯可得而貴乎雖在布衣之列環堵之中晏然自得不易萬乘之尊又可得而賤乎陛下焉能貴臣焉能賤臣臣非禮之祿雖萬鍾不受若申其志雖簞食不厭陛下焉能富臣焉能貧臣帝不能屈使出就太醫養疾四年天子乃為英設壇令公車令𨗳尚書奉引賜几杖待以師傅之禮延問得失拜五官中郎將數月稱疾篤詔以為光祿大夫賜告歸令在所送榖千斛常以八月致牛酒英辭位不受有詔譬㫖勿聽河南張楷與英俱徴既而謂英曰天下有二道出與處也吾前以子之出能輔是君也濟斯人也而子始以不訾之身怒萬乘之主及其享受爵祿又不聞匡救之術進退無所據矣賀純楊厚黃瓊俱公車徴李固素慕於瓊乃以書逆遺之曰君子謂伯夷隘柳下惠不恭不夷不惠可否之間蓋聖賢居身之所珍也誠遂欲枕山棲谷擬跡巢由斯則可矣若當輔政濟民今其時也自生民以來善政少而亂俗多必待堯舜之君此為志士終無時矣嘗聞語曰嶢嶢者易缺皎皎者易汙陽春之曲其和必寡盛名之下其實難副近樊君初至朝廷設壇席猶待神明雖無大異而言行所守亦無所缺而毁謗布流應時折减者豈非觀聽望深聲名太盛乎自頃徴聘之士胡元安薛孟嘗朱仲昭顧季鴻其功業皆無所採是故俗論皆言處士純盜虛聲願先生𢎞此逺謨令衆人歎服一雪此言耳左雄論守相長吏數易帝乃申無故去官之禁既而不能行以列傳修漢孝順皇帝永建三年夏六月旱以本紀修秋七月丁酉茂陵園寢災以本紀修九月鮮卑寇漁陽本紀冬十二月己亥桓焉免以本紀修是嵗來厯罷以本紀修南單于拔死弟休利立以列傳修徴孫程等還以列傳修漢孝順皇帝永建四年春正月丙子帝加元服以本紀修夏五月壬辰桂陽太守獻大珠還之以本紀修雨水本紀秋九月復安定北地上郡舊治以本紀修癸酉以大鴻臚龎參為太尉録尚書事太常王龔為司空以吕祖謙標目修冬十一月鮮卑寇朔方以本紀修是嵗分㑹稽為吳郡本紀漢孝順皇帝永建五年夏蝗以本紀修漢孝順皇帝永建六年春三月辛亥復伊吾屯田置司馬以本紀修秋九月辛巳起太學以本紀修耿􅀈擊鮮卑破之以本紀修大事記續編卷十四
