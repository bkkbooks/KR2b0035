body:
  text: 大事記續編卷七十四明王禕撰唐愍帝李從厚應順元年髙潞王李從珂清泰元年髙吳睿帝太和六年南漢祖皇帝大有七年蜀祖皇帝孟知祥明德元年誨閩帝王鏻龍啓二年契楚王馬希範南平王髙從吳越王錢元瓘丹天顯九年春正月戊寅唐改元以新紀修壬午唐河陽節度使侍衛親軍都督指揮使康義誠判六軍諸衛事以通鑑修唐樞密使朱𢎞昭同二品馮贇兼侍中以通鑑修唐以馬希範為楚王勃海王髙從誨為南平王吳王錢元瓘為吳越王以通鑑修閏月唐册皇后為皇太后淑妃王氏為皇太妃以新紀修己巳蜀王知祥稱帝以吕祖謙標目修二月己卯唐徙石敬瑭為成德節度使潞王從珂為河東節度使庚寅從珂反解題曰按新史列傳權知天雄後事孟漢瓊請入朝朱𢎞昭馮贇乃議徙成德范延光代漢瓊北京留守石敬瑭代延光鳯翔潞王從珂代敬瑭三人者皆唐大臣以漢瓊故輕易其地又不降制書第遣使者監之上道從珂遂反餘見通鑑辛卯詔以西京留守王思同為西面都部署三月乙卯圍鳯翔思同軍潰庚申從珂入西京辛酉唐殺侍衛親軍馬步都督指揮使朱𢎞實解題曰歐陽修曰唐末方鎮兵一軍有指揮使一人而合一州之諸軍又有馬步軍都指揮使一人蓋卒伍之長也自梁以宣武軍建國因其舊制有在京馬步軍都指揮使明宗始更為侍衛親軍馬步軍都指揮使當是時天子自有六軍諸衛之職六軍有統軍諸衛有將軍而又以大臣宗室一人判六軍諸衛事此朝廷大將天子國兵之舊制也而侍衛親軍者天子自將之私兵也天子自為將則都指揮使乃其卒伍之都長耳然自漢周以來其職益重漢有侍衛司獄史𢎞肇為都指揮使與宰相樞密使並執國政而𢎞肇尤專任以至於亡親軍之號始於明宗其後又有殿前都指揮使亦親軍也皆不見其更置之始李石曰唐有六軍十二衛以大臣一人總之梁置在京馬步軍都指揮使而自將之蓋六軍諸衛之外别為私兵唐明宗以康義誠為侍衛親軍馬步軍都指揮使秦王從榮為大元帥此侍衛司所從始也又從榮反侍衛馬軍都指揮使朱𢎞實敗之其後遂不廢殿前軍起於周世宗宋太祖為殿前都虞候詔天下選壯士送京師命太祖擇其武藝精髙者為殿前諸班而置都點檢位都指揮使上見於國史而修云而不知其所始何也自有兩司六軍諸衛漸廢今但有其名則兩司不獨親軍而已天下之兵柄皆在焉癸亥以康義誠為都招討使義誠降從珂戊辰朱𢎞昭自殺京城巡檢使安從進殺馮贇唐主奔衛州宣徽使孟漢瓊降從珂從珂殺之以新紀實録通鑑吕祖謙標目修唐興元武定兩鎮降蜀朱熹綱目夏四月壬申從珂入洛陽癸酉監國廢唐主從厚為鄂王乙亥從珂即皇帝位丁丑僦民屋直以賞軍戊寅弒鄂王於衛州磁州刺史宋令詢死之以新紀通鑑實録修解題曰按後唐實録少帝出奔於魏石敬瑭承詔赴闕相遇覃懷之東帝以敬瑭默無所陳虞其有變因會於郡驛將不利於敬瑭左右覺之少主從騎百餘人悉為敬瑭所擒少主知事不濟以符璽授帝長慟而别敬瑭遣刺史王𢎞贄置少主公舍尋為潞王所害敬瑭後長以此愧其心焉歐陽修曰安重誨區區獨見潞王之禍而謀之不臧至於殞身赤族其隙自滋及愍帝之亡也穴於徽陵其土一壠路人見者皆為之悲使明宗有知其有愧於重誨矣胡寅曰歐陽修死節死事傳不及令詢豈以其君微其事略而遺之歟夫閔帝雖不為儲副國固其國也所以不終者身乏股肱朝無楨幹年在幼沖胡能有定乎令詢不以其微而廢君臣之義以死立志不事潞王雖王彥章裴約何以加哉事見通鑑己卯唐石敬瑭入朝以通鑑修辛巳蜀改元以通鑑修唐散關以南皆入於蜀以通鑑修乙酉唐改元以新紀修戊子唐族誅康義誠朱𢎞昭馮贇以實録修五月丙午唐端明殿學士韓昭胤為樞密使莊宅使劉延朗為樞密副使以通鑑修解題曰按新史列傳初廢帝起於鳯翔與共事者五人節度判官韓昭胤掌書記李專美牙將宋審虔客將房皓而劉延朗為孔目官帝反使專美作檄書遣使馳告諸鎮皆不應獨隴州防禦使相里金遣其判官薛文遇計事帝得文遇大喜而延朗調率城中民財以給軍帝既立昭胤皓為樞密使延朗為副使審虔為侍衛步軍都指揮使而薛文遇亦為樞密直學士由是審虔將兵專美文遇主謀議而昭胤皓及延朗掌機密餘見通鑑歐陽修曰廢帝之起所與圖議者此五六人而已考其逆順之理雖有智者為之謀未必不敗况如此五六人者哉唐遣石敬瑭歸河東以通鑑修庚戌唐馮道罷以天雄節度使范延光為樞密使以新紀修唐以李從曮為鳯翔節度使以通鑑修吳徐知詢卒以通鑑修六月唐立沛國夫人劉氏為皇后新紀解題曰劉氏應州人也秋七月甲子蜀主知祥薨丁卯太子昶即帝位以吕祖謙標目修九月契丹冦唐以新紀修冬十月唐李愚罷以新紀修蜀殺武信節度使中書令判六軍事李仁罕通鑑十一月徐知誥召其子璟還金陵為鎮海寧國節度副大使次子牙內馬部都指揮使景遷為左僕射輔政以通鑑修十二月乙亥唐雄武節度使張延朗為中書侍郎同平章事以通鑑修唐潞王清泰二年秦吳睿帝天祚元年年南漢髙祖皇帝大有八年蜀國公孟昶明德二閩帝王鏻永和元年王楚王馬希範丹南平王髙從誨吳越錢元瓘契天顯十年春正月丙申朔閩改元以通鑑修解題曰宋庠紀年通譜永和本漢順帝晉穆帝姚泓年號二月唐以定難行軍司馬李彞殷權知軍州事彞超尋卒以彞殷為節度使以通鑑修三月辛丑唐忠武節度使趙延夀兼樞密使以新紀修夏四月唐韓昭胤加中書侍郎同平章事宣徽使劉延皓為樞密使以通鑑修五月契丹冦唐以新紀修六月唐詔竊盜行極法以通鑑修解題曰刑統諸竊盜不得財笞五十一尺杖六十一匹加一等五匹徒一年五匹加一等五十匹加役流秋七月唐武信節度使張敬達為北面副總管屯代州以通鑑修九月丙申吳改元冬十月庚辰閩王繼鵬弒其父鏻及后而即帝位更名昶以吕祖謙標目修吳加徐知誥尚父大丞相大元帥齊王備殊禮辭尚父丞相殊禮不受以通鑑修十二月唐以前匡國節度使馮道為司空以通鑑修解題曰按舊史職官志唐以來三公無職事自親王不恆置於宰相為加官無單置者道在位帶司空及罷鎮未命官議者不練故事悉意行之言議紛然及就列無故事乃不就朝堂敘班兩省官入就列方入宰相退踵後退劉煦罷相出入就列一與道同議者非之晉李鏻周竇貞固為司徒蘇禹圭為司空遂以為例大事記續編卷七十四
