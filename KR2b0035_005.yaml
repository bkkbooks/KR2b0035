body:
  text: 大事記續編卷五明王禕撰漢孝成皇帝綏和二年春正月帝幸甘泉郊泰畤以本紀修二月熒惑守心壬子切責翟方進令自殺以紀傳修大水以五行志修大廄馬生角以五行志修三月帝幸河東祠后土以本紀修丙戌帝崩於未央宫本紀左將軍孔光為丞相封博山侯以列傳修昭儀趙氏自殺以列傳修復長安南北郊以本紀修夏四月丙午太子即皇帝位謁高廟尊皇太后曰太皇太后皇后曰皇太后賜宗室馬吏民爵以本紀修葬延陵上諡曰孝成皇帝以本紀修高昌侯董宏請立定陶太后傅氏為帝太后免為庶人以列傳修尊定陶恭王為恭皇以本紀修五月丙戌立皇后傅氏本紀詔尊定陶太后曰定陶恭皇太后丁姬曰定陶恭皇后封舅丁明舅子丁滿皇后父傅晏皇太后弟侍中光祿大夫趙欽等為列侯以本紀修解題曰陳瓘曰猝暴無漸者不長克已躬行則久而自化哀帝自少聞王氏驕盛心不能善當克己躬行漸求革正之理猝然以寵貴親屬為先欲隆諸傅以消王氏就使享國長久此志終遂王衰傳盛何以相異且臨朝屢誅大臣以則武宣適足以蹙漢之脈而已矣事見通鑑六月罷樂府以本紀修益封河間王良萬戶本紀詔中壘校尉劉歆典領五經歆奏七略以藝文志通鑑修解題曰胡寅曰法家慘刻名家苛嬈墨則二本縱橫則妾婦之道是皆五經之棄也其歸固足取乎若六經則固儒者之所修也今列儒於九家而曰修六藝之術以觀九家之言則修六藝者為誰耶歆之言其舛如此事見通鑑詔限諸侯王列侯公主名田關內侯吏民皆毋過三十頃諸侯至吏民奴婢有差犯者沒入官尋寢以本紀食貨志修解題曰蘇洵曰三十頃之田周氏三十夫之田縱不能盡如周制一人而兼三十夫之田亦已過矣而期之三年是又迫蹙平民使自壞其業非人情難用吾欲少為之限而不禁其已過吾限者但使後之人不敢多占田以過吾限耳要之數世富者之子孫或不能保其地而復於貧矣或者子孫出而分之以為幾矣如此則富民所占者少而餘地多餘地多則貧民易取以為業夫不驚民不動衆不用井田之制而獲井田之利雖周何以逺過此哉事見通鑑齊三服官官織綺繡皆止無作除任子令誹謗詆欺法嫁掖庭宫人免官奴婢益吏三百石以下俸博士弟子父母死豫寧三年本紀解題曰應劭曰漢儀注吏二千石以上視事滿三年得任同産若子一人為郎秋七月丁卯王莽免尋以為特進給事中朝朔望以通鑑修庚午左將軍領尚書事師丹為大司馬封高樂侯以列傳修遣王根成都侯王况就國况免為庶人以列傳修九月庚申京師至北邉地震三十餘處以五行志修定世宗為不毁之廟以朱熹綱目修冬十月遣何武就國癸酉師丹為大司空以列傳通鑑修復置司𨽻以百官表修解題曰按百官表列傳哀帝改司𨽻校尉但曰司𨽻冠進賢冠比司直徴陳湯還通鑑漢孝哀皇帝建平元年春正月隕石於北地十六以五行志修免侍中新成侯趙欽成陽侯趙欣為庶人徙遼西以本紀修丁酉光祿大夫傅喜為大司馬封高武侯以列傳修太皇太后王氏詔王氏田非冢塋皆以豫貧民荀恱漢紀解題曰厚施於民陳民所以傾齊以私田豫貧民王氏所以傾漢蓋王氏不師陳氏而事偶合者也哀帝不能明家施不出國之義以裁之豈未察其姦故耶二月舉孝弟敦厚直言通政事可親民者以本紀修秋九月甲辰隕石於虞二以五行志修郎中令冷褒等奏尊恭皇太后恭皇后不宜引定陶之名宜為恭皇立廟京師孔光傅喜師丹不可免丹為庶人尋以為關內侯冬十月壬申京兆尹朱博為大司空以列傳修傅太后誣中山馮太后祝詛并其弟宜鄉侯參等皆自殺司𨽻孫寶請覆治馮氏獄坐下獄以列傳通鑑目録修漢孝哀皇帝建平二年春正月有星孛於牽牛以五行志修傅喜免尋就國以列傳修三月罷大司空夏四月戊午朱博為御史大夫陽安侯丁明為大司馬衛將軍以本紀百官表修乙亥孔光免為庶人朱博為丞相封陽鄉侯以百官表列傳修詔恭皇不宜稱定陶尊恭皇太后曰帝太太后恭皇后曰帝太后立恭皇廟於京師以本紀修解題曰禮父為士子為天子祭以天子其尸服以士服子無爵父之義尊父母也為人後者為之子故為所後服斬衰三年而降其父母期尊無二上重正統也當時師丹等議謂成帝既為定陶恭王立後則哀帝繼體成帝持重大宗義不可復奉定陶祭而立廟京師其言可謂達制禮之意矣哀帝徇私情廢正禮莫之能從惜哉事見通鑑復封董宏為高昌侯免師丹為庶人遣王莽就國以列傳修解題曰傅太后丁姬皆稱尊號有司奏新都侯莽前為大司馬不廣尊尊之義請免為庶人上曰莽與太皇太后有屬勿免遣就國餘見通鑑胡寅曰姦人之欲圖大事者必託於正以售其術若公道不出於朝清議不本於上則彼得竊而用焉哀帝背違大義悅冷褒段猶董宏之邪説而不用孔光傅喜師丹之正諫於是王莽為大司馬先奏免宏次撤傅太后幄坐至於罷政就國而不悔莽他未有建明獨惓惓定陶一事莽豈能賢哉政將詭激以遂其姦爾故士大夫以莽為是而天下多寃之再居柄任用儒術平寃獄治誣告黜譛人斯乃哀帝行乖禮義倒持太阿而授之莽也使公道出於朝廷清議本乎人主政事修理忠邪區分則雖百莽亦何能為哉事見通鑑罷州牧復刺史本紀六月帝太后丁氏崩本紀改元太初元將易號陳聖劉太平皇帝以本紀宋庠紀年通譜修解題曰宋庠紀年通譜按本紀詔以建平二年為太初元年王莽傳莽自陳符命前孝哀皇帝下詔書更為太初元將元年今官本哀紀但稱太初元年太初武帝年號世代未逺不容更襲舊名顔氏無訓注非史文之略蓋校讎者不曉其意又不參考莽傳故削去二字但曰元年前朝好本皆有元將二字事見通鑑秋七月為初陵勿徙民以本紀修八月罷改元易號事待詔夏賀良等伏誅以列傳修盡復諸神祠以郊祀志修甲戌朱博有罪自殺御史大夫趙玄減死二等論孔鄉侯傅晏削戶四分之一以本紀百官表修解題曰傅太后怨傅喜不已使孔鄉侯晏風丞相令奏免喜侯朱博與御史大夫趙玄議玄許可博惡獨斥奏以故大司空何武坐過免就國即并奏喜武請皆免為庶人上知傅太后素怨喜疑博玄承指即召玄詣尚書問狀玄辭服有詔左將軍彭宣與中朝者雜問宣等奏博為臣不忠不道玄大不敬晏不敬臣請謁者召詣廷尉詔獄制曰將軍中二千石諸大夫博士議郎議右將軍蟜望等四十四人如宣言諫大夫龔勝等十四人以晏本造謀宜與博玄同罪上減玄死罪二等削晏户四分之一假謁者節召丞相詣廷尉詔獄博自殺餘見通鑑吕祖謙曰傅晏以風指諭朱博朱博奉傅晏之指其罪一也而羣臣之議則以博為不忠不道而晏止為不敬哀帝之用刑則殺朱博而晏止於削戶是法徒行於大臣而不行於外戚也龔勝之議公矣哉又曰賈捐之之附石顯朱博之黨傅氏皆自以為固寵之至計而情見詐得卒不免於死使其守道不二未必不免也此可為小人之戒九月光祿勳平當為御史大夫冬十月甲寅平當為丞相賜爵關內侯京兆尹王嘉為御史大夫以荀悅漢紀通鑑修漢孝哀皇帝建平三年春正月立廣德王雲客弟廣漢為廣平王以本紀修癸卯帝太太后所居桂宫正殿災本紀三月己酉平當薨以列傳百官志修有星孛於河鼓本紀夏四月丁酉王嘉為丞相封新甫侯以百官表列傳修河南太守王崇為御史大夫百官表六月立魯王徑子閔為王以列傳諸侯王表修冬十一月壬子復泰畤后土祠罷南北郊以本紀修無鹽危山土起瓠山石立東平王雲及后謁坐詛祝雲自殺謁棄市以本紀修左遷王崇為大司農百官表列傳修輕殊死刑以後漢列傳修解題曰宣帝置廷平涿郡太守鄭昌上疏言刪定律令未及修正元帝初立下詔曰夫法令者所以抑暴扶弱欲其難犯而易避也今律煩多而不約自典文者不能分明而欲羅元元之不逮斯豈刑中之意哉其議律令可蠲除輕減者條奏成帝河平中復下詔曰甫刑曰五刑之屬三千大辟之罰其屬二百今大辟之刑千有餘條律令頗多百有餘萬言竒請它比日以益滋自明習者不知所由欲以曉諭衆庶不亦難乎其與中二千石二千石博士及明習律令者議死刑及可蠲除約者令較然易知條奏有司不能廣宣上恩建立明制而徒鈎托微細毛舉數事以塞詔而已東觀記元帝初元五年輕殊死刑哀帝建平三年輕除死刑八十一事其四十二事手殺人者減死一等葉適曰手殺人當如後世殺人無證情理可閔之類餘見建武十四年解題漢孝哀皇帝建平四年春大旱本紀關東民傳行西王母籌以本紀通鑑目録修二月癸卯封帝太太后從弟侍中傅商為汝昌侯尚書僕射鄭崇諫不聽以紀傳修丁卯諸吏散騎光祿勳賈延為御史大夫以百官表修賜侍中駙馬都尉董賢爵關內侯以列傳通鑑修解題曰上欲封董賢等心憚王嘉使傅晏持詔書視丞相御史於是嘉與御史大夫賈延上封事言宜暴賢等本奏語言廷問公卿大夫博士議郎暴評其事必有言當封者在陛下所從天下雖不説咎有所分不獨在陛下前定陵侯淳于長初封其事亦議大司農谷永以長當封衆人歸咎於永先帝不獨蒙其譏餘見通鑑吕祖謙曰嘉延以一身橫當董賢之衝忠矣然其書言暴評其事必有言當封者在陛下所從此乃為董賢畫計也使哀帝今日下公卿議則明日董宏冷褒輩爭言當封矣大抵事有是非兩端事誠是耶則或出於君或出於臣其利一也事誠非耶則或出於君或出於臣其害一也故谷永任咎而成帝之咎不下於永李斯分謗而亡秦之謗不分於斯安得謂之咎有所分乎鄭崇下獄死孫寶免為庶人以列傳通鑑修解題曰陳瓘曰封一傅商崇死寶免而趙昌得意人主之禍莫大於殺諫臣崇死則哀帝已矣事見通鑑夏四月雨血山陽胡陵五行志六月尊帝太太后為皇太太后本紀秋八月辛卯封皇太太后同母弟子鄭業為陽信侯以列傳修解題曰王太后之援田蚡而封茍參也成帝猶曰封田氏非正也至是則無復拒之者矣事見通鑑董賢及光祿大夫息夫躬南陽太守孫寵以告東平王封列侯以百官表通鑑修恭皇園北門災本紀左遷執金吾母將隆沛郡都尉以列傳修諫大夫鮑宣上書論事語刻切帝優容之以列傳修漢孝哀皇帝元壽元年春正月辛丑朔傅晏為大司馬衛將軍陽安侯丁明為大司馬驃騎將軍是日日有食之不盡如鈎詔公卿大夫陳過失舉賢良方正直言以本紀百官表五行志修解題曰杜鄴對曰今諸外家昆弟無賢不肖並侍帷幄布在列位或典兵衛或將軍屯至乃並置大司馬將軍之官當拜之日暗然日食不在前後臨事而發欲令昭昭以覺聖朝由後視前忿邑非之逮身所行不自鏡見則以為可計之過者不報又徴孔光詣公車問日食事光對曰陛下聖德聰明兢兢業業承順天戒敬畏變異勤心虛已延見羣臣思求其故然後敕躬自約總正萬事光所對大抵皆委曲之辭無一語切於事者此所以拜官加秩位次丞相踰月而歷御史至相位也王嘉上封事論董賢帝不悅以列傳修解題曰嘉奏封事曰恭皇寢廟今始作治而董賢亦起官寺上林中又為賢治大第使者護作賞賜吏卒甚於治宗廟為賢治器器成奏御乃行自貢獻宗廟三宫猶不至此賢家有賓婚及見親諸官並共賜使者護視發取市物百賈震動道路歡譁羣臣惶惑惟陛下慎已之所獨鄉察衆人之所共疑往者鄧通韓嫣驕貴失度卒陷罪辜所謂愛之適以害之者也王嘉所言大旨與鮑宣王閎同哀帝於宣閎則能容之於嘉則不説何也宣閎小臣非帝與賢所憚嘉位尊望重帝與賢固嚴憚之言不合則死隨之矣賢良周護等對䇿訟王莽徴莽還以列傳修辛亥傅晏罷以百官表修丁巳皇太太后傅氏崩稱孝元傅皇后以紀傳修遣息夫躬孫寵就國躬尋伏誅以列傳修孔光為光祿大夫給事中位次丞相以列傳修鮑宣上書拜為司𨽻以列傳修上欲益封董賢等王嘉封還詔書奏封事諫召嘉詣尚書責問三月下獄死以列傳修解題曰按列傳漢紀尚書劾王嘉宣帝嘗使尚書召問黃霸事下將軍中朝者光祿大夫孔光左將軍公孫祿右將軍王安光祿勳馬宫光祿大夫龔勝司𨽻鮑宣等十四人劾嘉應迷國不道法請與廷尉雜治勝獨以為嘉備宰相隂陽不和諸事並廢咎由嘉生嘉坐薦相等微薄以應迷國罔上不道恐不可以示天下遂可光等奏光等請謁者召嘉詣廷尉詔獄制曰驃騎將軍御史大夫等五十人以為如光等言可許議郎龔等以為嘉言事前後相違不任宰相之職宜免為庶人永信少府猛等十人以為聖王斷獄必先原心定罪探意立情故死者不抱恨而入地生者不銜怨而受罪明主躬聖德重大臣廣延有司議欲海內咸服嘉罪名雖應法聖王之於大臣進之以禮退之以義誄之以行按嘉本以薦相等為罪大臣括髮關械裸體受笞非所以重國褒宗廟也今春月寒氣錯繆霜露數降宜示天下以寬和陳瓘曰孝文逮繫周勃賈生陳堂陛之説霍光持刑罰嚴杜延年輔之以寬猛蓋兼之矣餘見通鑑漢世每事必議王通遂謂議能盡天下之心然類多逆探風指以為向背其間無所回撓者殆無幾爾王嘉之議漢存亡之所關也鮑宣遂至雷同附和若龔勝雖能小異亦未免出入於其間獨猛等明白抗論而有重國寬和之意嘉之死天也彼亦奈之何哉夏五月乙卯孔光為御史大夫秋七月丙午孔光為丞相復封博山侯泛鄉侯何武為御史大夫以列傳百官表修八月徙何武為前將軍辛卯光祿大夫彭宣為御史大夫以列傳百官表修鮑宣下獄髠鉗以列傳修九月乙卯丁明免以列傳修解題曰丁明頗害董賢罷及王嘉死明甚憐之乃册免明曰前東平王祠祭祝詛雲后舅伍宏以醫待詔禍甚迫切賴董賢以聞將軍位尊任重既不能折消未萌又不深疾雲宏之惡反痛恨雲等賢等獲封嫉妬忠良非毁有功復與丞相王嘉相比令嘉有依得以罔上其上驃騎將軍印綬餘見通鑑吕祖謙曰丁明幸託外親備大臣王嘉之死當正救之坐視不救雖憐無益也東平之寃當正辨之坐視不辨雖恨無益也董賢之盛當正斥之坐視不斥雖疾無益也進退無據雖受黜免亦豈為君子之所豫哉冬十一月光祿大夫韋賞為大司馬車騎將軍己丑薨以百官表列傳修解題曰賞之用定陶王故也十二月庚子董賢為大司馬衛將軍領尚書事百官表列傳孝元廟殿門銅龜蛇鳴以本紀修是歲大月氏使者伊存口授博士弟子秦景浮屠經以後魏書釋老志修解題曰此佛法入中國之始也詳見永平八年解題大事記續編卷五
