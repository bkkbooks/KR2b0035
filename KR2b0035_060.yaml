body:
  text: 大事記續編卷六十明王禕撰唐代宗皇帝廣德元年春正月癸未劉晏為吏部尚書同平章事以新舊紀修壬寅流来瑱於播州尋殺之以吕祖謙標目修史朝義奔幽州其將田承嗣以莫州李懐仙以范陽降朝義自殺閏月以薛嵩為相衛節度使懐仙為盧龍節度使承嗣為魏博都防禦使僕固懐恩恐賊平寵衰故留嵩等以為黨援朝廷因而授之以吕祖謙標目修解題曰按新史藩鎮傳承嗣降於僕固瑒厚以金帛反間瑒將士瑒慮下生變即約降承嗣詐疾不出瑒欲馳入取之承嗣列千刀為備瑒不得志餘見通鑑河洛春秋承嗣欲於城中宴㑹瑒謂諸將曰承嗣假為屈伏其實未降若不潜圖之必慮他時為冦瑒聞為將必先伐謀若欲相會此其時也乃與諸道節度俱入其城令諸軍進入承嗣令每門排陌刀手一千人為備其器械悉不得入瑒計不行承嗣義不服從而賂遺甚厚瑒亦留馬四百匹以酬之相衛節度使見乾元二年汴滑解題又按方鎮表置魏博防禦領魏博貝瀛滄治魏州是年升節度使増領德貝𨽻洺相大厯増領澶州十年瀛𨽻盧龍滄𨽻義武德𨽻淄青平盧十一年領衞相洺貝貞元置横海節度領滄景大和元年増領齊州三年更號齊滄德節度四年省景州五年賜號義昌軍天祐魏博號天雄軍藩鎮傳序曰安史亂天下至肅宗大難略平君臣皆幸安故瓜分河北付授叛將䕶養孽萌以成禍根亂人乘之遂擅署吏以賦税自私不朝獻於廷效戰國肱髀相依以土地傳之子孫脅百姓加鋸其頸利怵逆汙遂使其人自視猶羌狄然一冦死一賊生訖唐亡百餘年卒不為王土當其盛時蔡附齊連内裂河南地為合從以抗天子杜牧至以山東王不得不王霸不得不霸賊得之故天下不安又曰厥今干戈朽鐵鉞鈍含引混貸煦育逆孽殆為故常而執事大人曽不厯筭周思以為宿謀方且嵬岸抑揚自以為廣大繁昌莫已若也嗚呼其不知乎其俟蹇碩顛傾而後為之支計乎且天下幾里列郡幾所自河以北蟠城數百角奔為冦伺吾人顦顇天時不利則將與其朋伍駭亂吾民於掌股之上今者及吾之壯不圖擒取乃偷處恬逸以為後世子孫背脅疽根此復何也議者曰倔彊之徒吾以良將勁兵為衘䇿髙位美爵充飽其腹安而不撓外而不拘猶豢虎狼而不拂其心則忿氣不萌此大厯貞元所以守邦也何必疾戰焚煎吾民然後為快也愚曰大厯貞元之間有城數十千百卒夫則朝廷貸以法故於是濶視大言自植一家破制削法角為尊奢天子不問有司不呵王侯通爵越録受之覲聘不来几杖扶之逆息虜嗣皇子嬪之地益廣兵益彊僣擬益甚侈心益昌土田名器分劃大盡而賊夫貪心未及畔岸滛名越號走兵四略以飽其志趙魏燕齊同日而起梁蔡吳蜀躋而和之其餘混澒軒嚻欲相效者往往而是運遭孝武前英後傑夕思朝議故能大者誅鉏小者恵来大抵生人油然多欲欲而不得則怒怒則爭亂隨之是以教笞於家刑罰於國征伐於天下裁其欲而塞其爭也大厯貞元之間反此提區區之有而塞無涯之爭是以首尾指支幾不能相運掉也凡今者不知非此而反用以為經將見為盗者非止於河北而已嗚呼大厯貞元守邦之術永戒之哉餘見通鑑范祖禹曰僕固懐恩既平河北而除惡不絶其本復留賊黨以邀後功亦由任蕃夷為制將故也唐失河北實自此始使郭李為將其肯遺國患乎三月山南東道兵馬使梁崇義據襄州甲辰以為留後以新紀通鑑修解題曰晁補之曰代宗時連遭大喪寇亦未殄崇義之罪不惟不暇討遂因以節與之姑息之政始於此矣按劉裕平原口向建康以孟昶為長史總攝後事及討司馬休之以劉道憐監留府事皆留後之任也李林甫領隴右節度副大使杜希望始知留後事見通鑑辛酉葬泰陵廟號𤣥宗庚午葬喬陵廟號肅宗以通鑑修遷獻懿二祖於夾室以新舊志修夏四月庚辰李光弼奏擒袁晁通鑑六月癸酉禮部侍郎楊綰請罷明經進士察孝亷以通鑑修解題曰胡寅曰綰初議請縣令察孝亷取行著鄉閭學知經術薦之於州刺史考試升之於省是猶彷彿鄉舉里選之意及上貢舉條目則徒有問經對策之目而無縣察州升之文或者猶沮止之建議之難如此事見通鑑汪應辰曰賈至𫝊則綰請舉孝亷李栖筠𫝊則綰請置五經秀才科至傳則多是綰言至議以為自晉後衣冠遷徙所在占籍今鄉舉取人未盡請廣學校増國子博士員大縣得置大學館召置生徒保桑梓者鄉里舉焉在流寓者庠序推焉議者更附至議栖筠𫝊則栖筠賈至李廙以綰言為是盖至與栖筠議者乃孝亷綰雖嘗請置五經秀才非此所議鄭寅曰宋白續通典三載此事盖隨他書本文互有不同今參合事實綰請罷明經進士道舉而察孝亷其他科目猶在詔左右丞諸司侍郎御史大夫給舍同議給事中李廙李栖筠左丞賈至人御史大夫嚴武上議而實至之文然議者不應僅四盖更附至議者此三人耳舊史至𫝊云議者然之不謂更附至議豈廙等各上異耶是時敕㫖嵗察孝亷其明經進士道舉並停所司作條件處分宰臣等奏今嵗且許依舊綰遂條上孝亷之外又有秀才孝悌力田則因舊科而節文之其云衣冠多去故鄉所在州縣且舉所諳知則用至之説也其云今年願依舊業者聽則用宰臣之説也代宗問翰林學士或以明經進士不可頓改乃詔兼行庚寅以田承嗣為節度使以通鑑修秋七月壬寅上尊號壬子改元以新舊紀修册回紇可汗以通鑑修吐蕃盡取河西隴右之地以吕祖謙標目修解題曰新史地理志唐地東西九千五百一十一里南北一萬六千九百一十八里天寳盗起中國用兵而河西隴右不守䧟於吐蕃至大中咸通始復隴右乾符以後天下大亂至於唐亡然舉唐之盛時開元天寳之際東至安東西至安西南至日南北至單于府盖南北如漢之盛東不及而西過之自古為天下者務廣德而不務廣地德不足矣地雖廣莫能守也嗚呼盛極必衰雖曰勢使之然而怠忽驕滿常因盛大可不戒哉事見通鑑八月僕固懐恩反於汾州九月壬戌遣裴遵慶諭之不受命以舊紀修乙丑涇州刺史髙暉降於吐蕃冬十月辛未吐蕃冦武功奉天壬申以雍王适為闗内兵馬元帥郭子儀副之丙子帝幸陜州新紀解題曰按新舊史列傳自變生倉卒天下皆咎程元振又以郭子儀復立功不欲天子還京説帝都洛陽帝可其計子儀奏曰雍州古稱天府地方數千里帶甲十餘萬兵强士勇雄視八方秦漢因之卒成帝業故髙祖先入闗定天下太宗以来居洛亦鮮先帝興朔方誅慶緒陛下席西土戮朝義雖天道助順亦地勢則然比土蕃慿陵而不能抗者以六軍皆市井人竄虛名逃實賦及驅以就戰百無一堪又宦豎掩迷庶政荒奪遂令陛下徬徨暴露斯委任失人豈秦地非良哉今道路流言咸謂且都洛陽洛陽自大盗以来焚埃略盡百曹榛荒畿内不滿千户人烟斷絶千里蕭條何以奉萬乘牲餼供百官次舍哉陛下意者不以京畿新罹剽蹂國用不足乎昔衛為狄滅文公廬於曹衣大布之衣大帛之冠卒復舊邦况赫赫天子躬儉節用寧為一諸侯下哉願斥素餐去冗食掩閹寺任直臣薄征弛役䘏隱撫鰥委宰相以簡賢任能付臣以訓兵禦侮則中興之功日月可冀惟時邁亟還以幸天下帝得奏泣謂左右曰子儀真社稷臣也可亟還京師此疏與王導説元帝不可遷都意同可謂係唐之安危矣通鑑不載戊寅吐蕃入京師立廣武王承宏為帝改元癸巳吐蕃潰郭子儀復京師以新紀修十一月辛丑朔太常博士柳伉上疏論程元振詔削元振官爵放歸田里以吕祖謙標目修十二月甲午帝至自陜州以新舊紀修魚朝恩為天下觀軍容宣慰處置使總禁兵通鑑乙未苗晉卿裴遵慶罷檢校禮部尚書李峴為黄門侍郎同平章事以新紀修丙申放承宏於華州以新紀修吐蕃䧟松維保及西山諸州以吕祖謙標目修解題曰按通鑑䧟松維保三州及雲山奉州號雲山復改保州新籠城當在奉州之境新史髙適傳亡松維二州及雲山城吐蕃傳乃云南入松維保等州及雲山新籠城節度使髙適不能救於是劍南西山諸州亦入吐蕃矣按雲山即保州當以適傳為據又按唐茂州號西山中北路山自劍門分東西其西行者按文龍之岡直南至黎雅謂之西山管内有松翼靜宕悉當維保霸恭十州威戎通化兩軍後分維保霸通化為南路唐代宗皇帝廣德二年春正月壬寅流程元振於溱州以舊紀修癸卯合劍南東西川為一道以吕祖謙標目修解題曰合劍南東西川為一道偹吐蕃也乙卯立雍王适為皇太子新紀戊午郭子儀兼河東副元帥河中節度使以新舊紀修癸亥劉晏李峴罷散騎常侍王縉為黄門侍郎太常卿杜鴻漸為兵部侍郎同平章事以新舊紀修二月僕固懐恩軍潰奔靈武以吕祖謙標目修以李光弼為東都留守光弼歸徐州以列傳通鑑修解題曰張唐英曰王忠嗣曰假如明主見責豈失一金吾羽林而歸宿衛其次豈失一黔中上佐又魚朝恩遣人發郭子儀父墓子儀入朝中外甚憂子儀入言臣久在軍中不禁兵士殘人墳墓多矣此臣不忠不孝所致朝廷乃安以忠嗣子儀而觀光弼之識淺矣事見通鑑三月己酉以太子賔客劉晏為河南江淮轉運使以通鑑修夏五月癸丑初行五紀厯以通鑑修郭子儀請罷諸節度自河中始六月庚辰罷其節度使以吕祖謙標目修解題曰胡寅曰子儀忠謀為國反見黜削不明之君胡可與言哉是時河南諸鎮兵罷之易爾若河北不受命子儀必有以處之代宗一切不問而獨罷河中此乃魚朝恩計也朝恩屯兵守渭橋鄠縣若朝廷從子儀所請則渭橋鄠縣之兵必還禁旅不得外屯矣故為是謂可以抑子儀不知於子儀無損而國計則大謬矣續通典元載王縉請以河中府為中都魚朝恩既誅建議曰中都𨽻陜虢晉絳汾潞儀石慈隰等十城長安去中都三百里臨流而東有羊腸底柱之險濁河孟門之限以轘轅為襟帶與闗中為表裏初幸陝之後每嵗八九月京師恟恟載知人情不安兾因制置竊有兵權代宗探見載意不行舊紀載大㫖以十州户税入奉京師置精兵五萬以威四方辭多押闔疏入不報事見通鑑赦僕固懐恩以為太保中書令不受命以通鑑修秋七月庚子初税青苗給百官俸以新紀通鑑修解題曰按新史食貨志大厯元年詔天下苗一畆税錢十五市輕貨給百官手力課以國用急不及秋方苗青即征之又有地頭錢每畆二十通名為青苗錢畆加一倍而地頭錢不在焉己酉臨淮武穆王李光弼薨新舊紀傳解題曰張耒曰光弼提孤軍與安史健虜百鬬百勝其治軍行兵風采出子儀之右而當時諸將皆望風伏子儀如敬君父而光弼之任彭城諸將已不為之使子儀能使吐蕃謂父而史思明乃請誅光弼大抵光弼之實不及子儀之名子儀安坐而有餘光弼馳騁而不足甞思其故子儀之為人至誠不欺其胷中洞然大人也故靜則人安其德動則人伏其義光弼用烏承恩使襲史思明此雖狡夫猾虜之常態意其人雄悍慓勇而中有不可保信者市井之智盗賊之謀有時而用也不然何以召思明之侮而田承嗣之膝獨為子儀屈歟事見通鑑温庭筠乾􅍧子光弼問穆寧進退之計寧曰以某短見有四第一范蠡五湖留侯赤松也第二曹公挾漢室令諸侯是也第三田横海島壯夫也第四屬鏤寘堇也公歎曰策之末者是僕上策由是旬時理軍中及條疏身後事一旦帳中飲酖而薨八月丙寅王縉都統河南淮南山南東道節度行營僕固懐恩引回紇吐蕃入冦郭子儀屯奉天以通鑑修九月劍南節度使嚴武破吐蕃當狗城以新舊紀修冬十月僕固懐恩等逼奉天尋自潰以新紀修冬十二月乙丑衆星隕新紀是嵗吐蕃䧟凉州吕祖謙標目户二百九十餘萬口一千六百九十餘萬以吕祖謙標目修唐代宗皇帝永泰元年春正月癸巳朔改元以新紀修解題曰宋庠紀年通譜永泰本齊明帝年號三月庚戌吐蕃請和新紀夏五月平盧兵馬使李懐玉逐侯希逸秋七月壬辰以懐玉為留後賜名正己時李寳臣田承嗣薛嵩李懐仙自署將吏不供貢賦交結梁崇義及正己朝廷姑息不能復制以吕祖謙標目修八月庚辰王縉為河南副元帥新紀九月庚寅朔置髙座講仁正經以朱熹綱目修僕固懐恩與吐蕃雜虜入冦新舊紀解題曰葉適曰獨孤及言減江淮山南諸道兵以贍國用謂今天下惟朔方闗西有吐蕃僕固之虞邠匡鳳翔之兵足以當之自此東泊海南至番禺西盡巴蜀無䑕竊之盗而兵不為解傾天下之貨竭天下之榖以給不用之軍為無端之費自可以糧儲屝屨之資充疲人貢賦嵗可以滅國租半陛下遲疑於改作率土之患日甚一日此正肅代之間無故變天下皆為兵之實録也事見通鑑丁酉僕固懐恩死冬十月吐蕃退至邠州復與回紇入冦郭子儀挺身見回紇使擊吐蕃癸酉子儀大破吐蕃於靈䑓西原以新舊紀朱熹綱目修閏十月辛卯朔方副將李懐光克靈州以新紀修辛亥劍南西山兵馬使崔寧殺其節度使郭英义以新舊紀修解題曰寧本崔旴後賜名寧唐末賜姓名猥多假子名氏尤為淆亂今皆歸一其賜姓名無闗於大體者不載事見通鑑十二月戊戌流華原令顧繇於綿州以通鑑列傳修唐代宗皇帝大厯元年春正月乙酉復補國子學生以通鑑修丙戌户部尚書劉晏為都畿河南等道轉運常平鹽鐵鑄錢使侍郎第五琦為京畿闗内等道轉運等使分理財賦以舊紀通鑑修解題曰按方鎮表至德元載置東畿觀察使領懐鄭汝陝乾元元年陜𨽻陜虢華汝𨽻豫許汝二年置陜虢華節度使上元元年改為陜西節度尋置觀察都防禦使二年罷領華廣德元年懐𨽻昭義増領虢二年罷大厯復置領汝州建中二年置河陽三城節度以東畿觀察使兼之領懐鄭汝陜尋置使増領衛州亦曰懐衛節度四年罷觀察置東畿汝州節度貞元元年廢置都防禦使増領唐鄧置陜虢都防禦觀察陸運使罷河陽節度置都團練使二年升東都畿汝州防禦使為都防禦觀察使三年唐鄧𨽻山南東道五年罷觀察使置都防禦使汝州别置防禦使十二年復置河陽懐節度治河陽元和三年罷東都畿汝州都防禦使九年河陽節度増領汝十三年汝𨽻東畿復置東畿汝州都防禦使罷河陽節度大和三年罷陜虢都防禦使開成元年復置都防禦使觀察使㑹昌三年復置河陽節度四年増領澤州中和升陜虢防禦觀察使為節度光啓置東畿觀察兼防遏使三年升為佑國軍節度龍紀賜陜虢節度為保義軍節度乾寧汝𨽻忠武光化復置東畿觀察使兼防遏使罷佑國軍河陽節度罷領澤州天祐罷東畿觀察防遏使又按方鎮表至德置京畿節度使領京兆鳳翔同岐金商是年金商岐𨽻興平鳳翔同𨽻商州上元華州置鎮國節度亦曰闗東節度寳應廢京畿廣德罷鎮國二年置京畿觀察使建中置京畿商州節度興元罷京畿以同州為奉誠軍節度領同晉慈隰是年罷華州置潼闗節度貞元九年罷乾寧元年乾州置威勝軍節度二年升同州為匡國軍節度光化元年華州置鎮國軍節度領華同三年罷天復升隴州防禦為保勝軍節度天祐元年以京畿置佑國軍節度領金商三年罷匡國軍置義勝軍節度領耀鼎元載令百官論事先白長官宰相刑部尚書顔真卿爭之二月乙未真卿坐貶以吕祖謙標目修壬子以杜鴻漸為山南西道劍南東西川副元帥西川節度使新舊紀通鑑解題曰按方鎮表至德置山南西道防禦守捉使乾元置興鳳都團練守捉使廣德升山南西道節度尋為觀察使領梁洋集壁文通巴興鳳利開渠蓬建中元年升節度興元二年増領果閬光啟元年升興鳳防禦使置武定節度二年升興鳳感義軍節度使文德感義増領利州大順武定増領階扶景福増領果州乾寧更感義曰昭武軍光化元年蓬壁𨽻武定三年巴州置防禦使天復二年昭武罷領利州三年置利州節度天祐二年山南西道罷領巴渠開升為三州團練觀察使三年利州増領閬陵榮果蓬通更號利閬節度置興文節度領興文集壁秋八月壬寅以茂州刺史崔寧為成都尹節度行軍司馬以新舊紀通鑑修甲辰魚朝恩判國子監事以列傳通鑑修解題曰按新史宦者傳魚朝恩怙貴誕肆凡詔㑹羣臣計事折愧坐人出其上雖元載辯彊亦拱黙唯禮部郎中相里造殿中侍御史李衎酬詰徃返未始降屈朝恩不懌黜衎以動造又謀將易執政以震朝廷乃㑹百官都堂且言今水旱不時屯軍饋運困竭天子卧不安席宰相何以輔之不逺避賢路尚何頼乎宰相俛首坐皆失色造徙坐從之因曰隂陽不和五榖踊貴皆軍容事宰相何預哉且軍帑不散故天降之沴今京師無事六軍可相維鎮又屯十萬饋糧所以不足百官無稍食軍容為之宰相行文書而已何所歸罪朝恩拂衣去曰南衙朋黨且害我餘見通鑑冬十月乙未帝生日節度使獻金帛為夀以通鑑修十一月甲子改元十二月己亥彗星出於瓠瓜癸卯同華節度周智光反以新紀修解題曰同華節度使見元年京畿解題唐代宗皇帝大厯二年春正月郭子儀討周智光甲子伏誅以新紀修夏六月召杜鴻漸還秋七月丙寅以崔寧為西川節度使以吕祖謙標目修九月吐蕃圍靈州郭子儀屯奉天以通鑑修唐代宗皇帝大厯三年春二月庚子以後宫獨孤氏為貴妃通鑑三月乙巳朔日有食之新紀夏四月崔寧入朝瀘州刺史楊子琳入成都寧還鎮以通鑑修五月乙卯追號齊王倓為皇帝新紀六月壬辰幽州兵馬使朱希彩等殺李懐仙自為留後秋七月劍南留後崔寛克成都以新紀修八月吐蕃冦靈州新紀王縉兼河東節度使新紀九月士申郭子儀移屯奉天以通鑑修冬十一月以朱希彩為幽州盧龍節度使以通鑑修十二月己酉徙邠寧節度馬璘為涇原節度使以舊紀修解題曰按方鎮表大厯三年置涇原節度使五年遥領鄭頴十四年鄭𨽻永平貞元領四鎮北庭行軍節度元和増領行渭州乾寧號彰義軍増領渭武唐代宗皇帝大厯四年夏六月戊申王縉罷副元帥都統新紀解題曰新紀廣德二年王縉都統河南等道節度行營永泰元年王縉為河南副元帥通鑑載其為都統而為副元帥則不書至是年乃書縉表讓副元帥何也郭子儀兼邠寧節度使列傳解題曰按方鎮表邠寧節度乾元置領邠寧慶涇原鄜坊丹延上元罷領鄜坊丹延大厯三年罷十四年復置邠寧慶節度大中五年増領武州光啟號靜難軍時元載患吐蕃故徙馬璘以四鎮北庭兵鎮涇州子儀以朔方兵鎮邠州未幾議城原州移京西軍戌之而移子儀於涇不從以列傳通鑑修解題曰按凌凖邠志初吐蕃既退諸侯入覲是時馬公鎮西川四鎮兼邠寧李公軍澤潞以防秋軍盩厔元載使人諷諸將責己曰今中外未寧公執國柄有年矣安危大計一無所聞如之何載莞然曰安危係於大臣非獨宰相也先王作兵置之四境所以禦戎狄也今内地無虞朔方軍在河中澤潞軍在盩厔王畿之内豈假是耶必令損益須自此始郭李曰宰相但圖之載曰今若徙四鎮於涇朔方於邠澤潞於岐則三邊有偹三賢之意何如三公曰惟所指揮三月詔馬公領涇原尋以鄭頴資之李公兼領山南猶以澤潞資之郭公兼領邠寧以河中資之朔方軍自此大徙於邠郭公雖統數道軍之精甲悉聚邠府其子弟分居蒲靈通鑑考異三年立此議四年子儀遷邠按舊傳璘徙涇州其士衆賞自四鎮北庭赴難中原僑居驟移將士董之因人心動揺導以為亂段秀實捕殺十餘人於是遷涇州建中二年楊炎請城原州下涇州為具涇軍恐曰吾曹始治於邠纔置農桑地著之安纔立城壘又教之塞外吾何罪而寘此乎劉文喜因人怨怒拒不奉詔命朱泚李懐光攻之别將劉海賓斬文喜首原州竟不能城由此言之此非易事也元載固慮不及此也秋九月吐蕃冦靈州以通鑑修冬十一月杜鴻漸罷丙子左僕射裴冕同平章事十二月戊戌冕薨以新舊紀通鑑修唐代宗皇帝大厯五年春三月癸酉魚朝恩伏誅以吕祖謙標目修解題曰李德裕窮愁志元載之圖魚朝恩也以崔昭尹神州俾昭日詣苑中以牢醴為朝恩饌因與北門大將軍王駕鶴等結歡共籌隂計又按柳抗疏悉出内使𨽻諸州持神策兵付大臣及誅朝恩赦釋其黨與曰北軍將士皆朕爪牙並宜仍舊勿有憂懼是北軍未嘗不可收也及以范希朝為神䇿京西行營節度使欲收其柄而不可得矣餘見通鑑己丑罷度支使以宰相領之亦罷諸道轉運常平鹽鐵使以舊紀通鑑修夏四月庚子湖南兵馬使臧玠殺其團練使崔灌新紀解題曰按方鎮表至德置衡州防禦使領衡涪岳潭郴邵永道乾元元年罷領郴二年涪𨽻荆南岳𨽻鄂岳上元廢廣德置湖南都團練觀察處置等使領衡潭邵永道中和升為欽化軍節度光啟改為武安以王縉為門下侍郎同平章事以舊傳通鑑修彗星出於五車五月己卯出於北方以新紀修冬以李泌為江西觀察判官以朱熹綱目修解題曰按方鎮表乾元置洪吉都防禦團練觀察處置使領洪吉䖍撫袁上元増領信州廣德更號江南西道建中升為節度貞元元年廢置都團練觀察使四年増領江咸通升鎮南軍節度乾符廢置江南西道觀察使龍紀復鎮南軍節度唐代宗皇帝大厯六年春三月容管經略使王翃擒梁崇牽平容州以吕祖謙標目修解題曰按方鎮表天寳置容管經略領容白禺牢繡黨竇亷義欝林湯岩辦平琴十四州乾元増都防禦使上元升觀察使建中元年増領順藤二年省平琴元和辦𨽻嶺南岩𨽻桂管省湯咸通廢以所管十一州𨽻邕管未幾復乾寧升寧逺軍容州之䧟十七年矣至是始平事見通鑑夏五月戊申殺殿中侍御史陸珽成都府司録李少良大理評事韋頌以新紀修秋八月丙子以浙西觀察使李栖筠為御史大夫以吕祖謙標目修解題曰按新史列傳元載當國久益恣横代宗不能堪隂引剛鯁大臣自助欲收綱權以黜載㑹御史大夫敬括卒即召栖筠與河南尹張延賞擇可為大夫者延賞先至遂代括㑹李少良陸珽等上書劾載隂事詔御史問狀延賞稱疾不敢鞫少良珽覆得罪死帝殊失望出延賞為淮南節度使拜栖筠為御史大夫始栖筠見帝敷奏明辯不阿附帝心善之故制自中授中外竦然餘見通鑑是嵗以尚書右丞韓滉為户部侍郎判度支通鑑唐代宗皇帝大厯七年秋幽州盧龍將殺朱希彩經略副使朱泚自稱留後冬十月辛未以泚為節度使以新紀通鑑修唐代宗皇帝大厯八年春正月薛嵩卒其叔父㠋自為昭義留後以通鑑修解題曰昭義見至德二年上黨節度使解題相䑓志薛嵩統相衛邢洺治相州號昭義軍田承嗣統貝博滄瀛治魏州賜軍號天雄承嗣以詐力動朝廷又建其軍為大都督府帥即授長史嵩死弟萼為裴志清所逐以衆歸承嗣於是相統於魏遷昭義軍於潞州後又徙昭義於邢州河朔人號邢相曰東昭義潞曰西昭義餘見通鑑二月戊申司空田承嗣進太尉以宰相表修秋八月己未吐蕃冦靈州以新紀通鑑修朱泚遣其弟滔將兵防秋涇州以新舊列傳修解題曰按新舊史列傳泚使滔將勁兵三千請率先諸軍備塞安史後山東雖外臣順實傲肆不庭泚首效欵帝嘉之持詔勒兵貫王城而出置酒開逺門餞之通鑑謂將五千精騎今從本傳九月壬午循州刺史哥舒晃殺嶺南節度使吕崇賁以反以新紀修冬十月壬寅朔方兵馬使渾瑊及吐蕃戰於宜禄敗績馬璘敗吐蕃於潘原以新紀通鑑修解題曰宜禄邠州縣潘原涇州縣舊史吐蕃傳吐蕃之衆自潘口東分為三道一趍隴州一趍汧陽之東一趍釣竿原唐代宗皇帝大厯九年春三月永樂公主許適田承嗣之子華以通鑑修夏六月癸未胡僧不空卒贈司空肅國公以通鑑修秋九月朱泚入朝以列傳通鑑修唐代宗皇帝大厯十年春正月田承嗣誘昭義兵馬使裴志清逐薛蕚承嗣䧟相州以新紀通鑑修朱泚請留以滔知幽州盧龍留後以吕祖謙標目修解題曰按新史列傳泚之来滔攝後務稍稍剪落泚牙角泚自知失權為滔所賣不得志乃請留京師帝因授滔節度留後分防秋兵使各有統河陽永平兵郭子儀統之决勝軍唐良臣賞為决勝軍節度使當攷楊猷兵楊猷即楊子琳也以禮朗鎮遏使擅舉兵是年以為洮州刺史隴右節度兵馬使李抱玉主之淮南鳳翔兵馬璘主之汴宋淄青兵實録有成德兵泚主之舊史本紀大厯九年四月詔諸道嵗有防秋兵馬淮南四千人浙西三千人魏博四千人昭義二千人成德三千人山南東道三千人荆南二千人湖南三千人山南西道二千人劍南西川三千人東川二千人鄂兵一千五百人宣歙三千人其嶺南浙東路逺往来増費各委本道每年取當使諸色雜錢每人計二十貫據合配防秋人數計錢數市輕貨送上都以偹和糴今考開元十五年以吐蕃為患制令隴右道及諸軍團兵五萬六千人河西道及諸軍團兵四萬人又徴闗中兵萬人集臨洮朔方兵二萬集會州防秋不過近就西北邉調發未及他道也至貞元中李泌對德宗謂嵗徴闗東卒戍京西者十七萬人則又不勝其其擾矣癸丑田承嗣䧟洺州以新紀修乙卯崔寧大破吐蕃於西山以新紀通鑑修二月乙丑田承嗣䧟衛州新紀辛未封子十二人為王以通鑑修河陽軍亂逐三城使常休明新紀三月甲午朔陜州軍亂逐觀察使李國清以新紀修夏四月貶田承嗣為永州刺史癸未遣河東節度使薛兼訓及諸道兵討之五月乙未磁州降以新紀修六月甲戌李寳臣及田承嗣戰於冀州敗之以新紀修秋九月吐蕃入冦鳳翔節度使李抱玉及馬璘敗之以新紀修解題曰按方鎮表上元置興鳳隴節度建中號保義軍貞元領臨洮軍使元和升隴右經略使為節度復舊名増領靈䑓良原崇信三鎮大中四年領秦州五年隴州置防禦使咸通秦州𨽻天雄軍冬十月辛酉朔日有食之新紀甲子昭義留後李承昭大破田承嗣兵於清水既而承嗣行反間李正己李寳臣遂不用命以通鑑修丙寅貴妃獨孤氏薨丁卯追册為皇后新紀十一月丁酉瀛州降以新紀修丁未嶺南節度使路嗣恭克廣州哥舒晃伏誅新紀唐代宗皇帝大厯十一年春正月辛亥崔寧奏大破吐蕃以新紀通鑑修二月赦田承嗣以吕祖謙標目修三月李栖筠卒以新史列傳修解題曰按新史列傳帝比比欲召相憚載輙止然有進用皆宻訪焉多所補助栖筠見帝依違不斷亦内憂憤卒夏五月汴宋都虞候李靈曜殺兵馬使孟鍳六月戊午以靈曜為留後靈曜復反秋八月詔淮南節度使李忠臣等討之冬十月田承嗣遣兵救之不克甲寅靈曜伏誅以新舊紀列傳修解題曰汴宋見天寳十四載河南節度使解題按方鎮表淮西節度至德置領義陽申州弋陽光州潁川許州滎陽鄭州汝南蔡州乾元元年増領陳頴亳别置豫許汝節度二年廢陳頴亳𨽻陳鄭是年復置領申光夀安沔蘄黄上元二年増領陳鄭頴亳汴曹宋徐泗尋以亳𨽻滑衛徐𨽻兖鄆寳應元年増領許隋唐鄭州𨽻澤潞頴汴宋曹𨽻河南泗𨽻兖鄆申𨽻蔡汝永秦沔蘄黄𨽻沔鄂大厯八年廢蔡汝節度十一年増汴州十四年號淮寧軍尋更號申光蔡節度汝𨽻東都汴𨽻永平興元夀州别置觀察使貞元元年唐𨽻東都許𨽻義成三年安𨽻山南東道元和十二年復為淮西節度十三年廢十四年號彰義軍大中置蔡州防禦使中和升奉國軍節度乾寧増領申州唐代宗皇帝大厯十二年春三月辛巳元載伏誅併殺其妻子貶王縉栝州刺史夏四月壬午太常卿楊綰為中書侍郎禮部侍郎常衮為門下侍郎同平章事以新舊紀修癸巳詔諫官獻封事勿限時新紀己酉詔加京官俸解題曰按舊史本紀加京官料錢文官一千八百五十四員武官九百四十二員嵗加給一十五萬六千貫并舊給凡二十六萬貫餘見通鑑罷諸州團練守捉使定諸州兵官健團結以通鑑及吕祖謙標目修秋七月己巳楊綰薨以列傳通鑑修九月庚午吐蕃冦坊州新紀冬十二月丁亥崔寧奏大破吐蕃以新舊紀修庚子朱泚兼隴右節度使以通鑑修唐代宗皇帝大厯十三年春正月戊辰回紇冦并州新紀夏四月甲辰吐蕃冦靈州新紀唐代宗皇帝大厯十四年春二月癸未田承嗣卒其兄子悦自稱魏博留後三月丁未淮西將李希烈逐李忠臣自稱留後以新紀修夏五月辛酉帝崩於紫宸内殿本紀解題曰西内宣政殿北有紫宸門内有紫宸殿癸亥太子适即皇帝位以新舊紀修閏月壬申貶中書舍人崔祐甫為河南少尹甲戌貶常衮為河南少尹以祐甫為門下侍郎同平章事以新舊紀修解題曰按舊史列傳楊綰卒無中書侍郎舍人崔祐甫領省事衮以同中書門下平章事兼綜中書祐甫不能平累至忿競遂令祐甫分知吏選事所擬官又多駮下代宗崩衮與禮官議禮為君斬衰三年漢文權制猶三十六日太宗遺詔亦三十六日羣臣不忍既葬而除及𤣥宗肅宗崩始變為二十七日遺詔雖曰吏人三日釋服羣臣宜如皇帝服二十七日乃除祐甫曰遺詔朝臣庶人之别朝野中外何非天下凡百執事誰非吏職是皇帝宜二十七日而羣臣三日也衮曰公卿大臣膺受寵禄故宜異數今與黔首同信宿而除於爾安乎祐甫曰若遺詔何詔而可改孰不可改意氣殊厲衮方入臨遣從吏扶立殿墀上祐甫持之謂衆曰臣哭君所有扶禮乎衮不勝怒乃劾祐甫率情變禮請貶潮州刺史德宗以為重改河南少尹初肅宗時天下事殷宰相更直堂事若休沐還第則聽直者代署以聞是時郭子儀朱泚俱以平章事當署勅尾而不行宰相事衮如故事代署子儀泚入言祐甫不宜貶帝曰卿向何所言今云非耶二人對初不知帝以衮為欺罔是日羣臣直絰序立月華門外六典大明宫宣政殿殿東廊日華門門東門下省西廊月華門門西中書省即兩换職祐甫至昭應徴還胡寅曰方喪三年短為二十七日矣而祐甫猶以為多祐甫非不忠不孝者特狃於遺詔而又通吏人於百執事則過矣自古未有以宰相為吏人者此强辯也遺詔從薄臣子從厚不亦可乎祐甫素惡常衮是故立異設若衮初為祐甫之説則祐甫拒之必如衮議盖徒以虚氣加衮而不核義理之真也使其説可行則既相之後可以行矣而卒從衮豈非理有難乎罷貢獻不急者及梨園樂工以吕祖謙標目修甲申郭子儀為尚父太尉中書令罷其兵以通鑑修解題曰按崔龜從續唐厯崔祐甫相以子儀年老久掌兵權其下偏禆皆已崇貴慮一旦子儀沒而難相統攝遂罷子儀而命李懐光常謙光渾瑊分將其兵論者伏焉事見通鑑丙戌禁言祥瑞丁亥出宫人放禽獸以新舊紀修解題曰范祖禹曰德宗即位之初思致太平知天下厭代宗之政滌其煩穢决其底滯四海之内聞風震悚以為不世出之主也不數年而致大亂何哉燭理不明而所任非人求欲速之功役其獨智而不本於人情故也孟子曰其進鋭者其退速其德宗之謂乎戊子以李希烈為節度使以通鑑修京兆尹黎幹伏誅以吕祖謙標目修吏部尚書劉晏判度支鹽鐵轉運等使六月禁置寺觀度僧尼以吕祖謙標目修封子弟九人為王以新紀修丙午詔六品以上清望官日二人待制新紀秋七月戊辰朔日有食之以新舊紀修罷𣙜酒吕祖謙標目修乙未以翰林學士張渉為散騎常侍以通鑑修甲辰道州司馬楊炎為門下侍郎懐州刺史喬琳為御史大夫同平章事以新舊紀修解題曰按通鑑考異曰崔祐甫與炎皆自門下遷中書是時中書在上也憲宗以後門下在上中書在下不知何時升改乙巳遣使和吐蕃以吕祖謙標目修協律郎沈既濟上選舉議以通鑑修解題曰舜端拱無為而其載在舜典言其所用之人惟九官而已盖置九官於朝廷之上使之擇人以列於執事之中則天下舉皆賢人非必在上之人一一以擇之也陸贄請令䑓省長官各舉其屬沈既濟欲使羣司長官宰臣進叙六品以下或僚佐之屬許州府辟用或選用非公則吏部兵部得察而舉之罪其私冒不慎舉者此皆執要御繁之術為上者端拱無為而天下莫非賢人矣事見通鑑冬十月丁酉朔吐蕃南詔入冦朱泚等敗之以新紀修己酉葬元陵廟號代宗以通鑑修十一月壬午喬琳罷新紀十二月乙卯立子宣王誦為皇太子新紀丙寅晦日有食之新紀以大盈内庫財賦歸之左蔵以吕祖謙標目修唐德宗皇帝建中元年春正月丁卯改元上尊號初定兩税以新舊紀修解題曰按新舊史志傳㑹要大厯四年楊炎上疏曰初定令事租賦庸調法自開元承平久不為版籍人户寖溢隄防不禁丁口轉死非舊名矣田畆移换非舊額矣貧富升降非舊第矣户部嵗以空文上之舊制戍邉者蠲其租庸六嵗免歸𤣥宗事夷狄戍者多死邉將諱不以聞故貫籍不除天寳中王鉷為户口使以籍存而丁不在是隠課不出乃按舊籍除當免者積三十年責其租庸人苦無告至德兵起因以飢癘百役並作人戸凋耗軍國之用仰給於度支轉運二使四方征鎮又自給於節度團練使賦歛之司數四莫相統攝朝廷不能覆諸使諸使不能覆諸州四方貢獻悉入内庫權臣猾吏因縁為姦重兵處皆厚自奉養生賦所入無幾百姓竭膏血鬻親愛輸送無休息富人多丁率為官為僧以色役免貧人無所入則丁存是以地著者百不四五今請作両税法凡百役之費一錢之歛先度其數而賦於人量入制出户無主客以見居為簿人無丁中以貧富為差行商者在郡縣稅三十之一與居者均役居人之税秋夏兩入之其租庸雜徭悉省而丁額不廢田税租大厯十四年墾田之數為定嵗終以户賦増失進退長吏而以度支統之帝喜之使諭中外議者以租庸調行數百年不可輕改帝不聽天下果利之舊户三百八十萬五千使者按比得主户三百八十萬客户三十萬天下之民不土斷而地著不更版籍而得其虛實嵗斂二千五十餘萬緡米四百萬斛以供外錢九百五十餘萬斛緡米千六百餘萬斛以供京師税法既行民力未及寛而朱淊王武俊田悦叛用益不給陸贄論曰國家參考厯代之制法制均一雖欲轉徙莫容其姦故人無揺心事有定制天寳季嵗兆庶雲擾賦法隳於奉軍執事者知弊之宜革而所作兼失其源知前之可從而所操不得其要舊患雖滅新沴復滋兵興之後供億不恒此時之弊非法弊也更掃庸調之成規創兩税之新制分命使臣搜摘郡邑劾驗簿書取大厯中科率錢榖數最多者以為定額先王之制賦入必以丁夫為本不以務穡増其税不以輟稼減其租則播種多不以植産厚其征不以流寓免其調則地著固不以飭勵重其役不以窳怠蠲其資則功力勤如是然後能使人安其居盡其力兩税惟以資産為宗不以丁身為本曽不寤資産之中有蔵於襟懐囊篋物雖貴而人莫能窺有積於場圃囤倉直雖輕而重以為富流通蕃息之貨數雖寡而計日取贏廬舍器用之資價雖髙而終嵗無利一槩計估筭緡宜其失平長偽務輕賫而樂轉徙者忻脫於徭役敦本業而樹居産者每困於徴求請舉其尤者㧾雜徴虚數以為恒規計奏一定有加無除一也新法既行旋屬征討國用不充復以供軍每貫加徴二百二也定税之數皆計緡錢納税之時多配綾絹往納絹一匹當錢三千二三百今當錢一千五六百往輸其一今過於二三也税物送至上都度支頒給羣司例皆増長本價抑使剥徴四也税法之重既無以拯之復有進奉宣索之繁尚在其外變徴役以召顧之目换科取以和市之名其為科抑特甚常徭五也大厯中非法賦歛急備供軍之類既併收入兩税後又並存六也田里荒蕪户口减耗牧守罕盡申聞所司莫肯矜恤七也量土地之沃瘠計物産之少多倫比諸州定為兩等州等下者每户取錢之數少州等髙者每户取錢之數多委觀察使更於當今所取錢數之内均融處置務盡事宜既免擾人且不變法又曰凡國之賦税必量人之力任土之宜故賦入者惟布麻繒纊與百榖焉先王懼物之失平而人之交易難凖又立貨泉之法節輕重之宜歛散馳張必由於是榖帛者人之所為也錢貨者官之所為也國朝著令租出榖庸出絹調出繒絹布麻曷常有僸人鑄錢而以錢為賦者也今兩税但估資産為差便以錢榖定税臨時折徴雜物每嵗色目頗殊惟計未得之利宜靡論供辦之難易遂或増價以置其所無减價以賣其所有一増一損耗損已多宜令所司勘㑹州府初納兩税年絹布定估比類當年時價加賤减貴酌取其中總計合税之錢折為布帛之數依庸調舊制各隨鄉土所宜某州某年定出税布若干端定出税絹若干疋其有絁綿雜貨亦隨所出定名勿更計錢以為税數如此則土有常制人有常輸為薄何益乎吕祖謙曰楊炎變租庸調但求一時之便不知古法自此變壞租庸調猶略有二代之意炎正以暴賦横歛名色之多皆在租庸調之外故舉而均之二税二税之外不許誅求一錢炎能保後来之不誅求乎孟子言粟米之征租也布縷之征調也力役之征庸也自古源流如此古者或緩其二或緩其一至唐太宗則盡從而征之且如租庸調之外有暴賦横歛正以軍興窘急及暴君汚吏為之耳使賢君出無軍興之患去之不難也安可舉舊法掃地而壊之乎大抵治財最不可者壊舊法也併省名目也名目既省則後来復置之易矣此作俑所以至今日也劉晏罷錢榖皆歸金倉部以舊紀列傳通鑑脩二月癸卯以涇原節度使段秀實為司農卿癸亥朱泚兼涇原節度使以舊紀通鑑脩三月辛未張渉放歸田里以舊紀脩解題曰吕祖謙曰竇太后以魏其武安交通賔客賣弄權勢謂儒者不可信而甘心於黄老之言德宗以張涉薛邕之贓敗亦謂儒者不可信惑於宦官武將之説是以噎而廢食以蹶而廢行者也事見通鑑癸巳以諫議大夫韓洄為户部侍郎判度支金部郎中杜佑權江淮水陸轉運使如舊制以吕祖謙標目修解題曰按新史佑傳建中初上議曰咎繇作士今刑部尚書大理卿則二咎繇也垂作共工今工部尚書將作監則二垂也契作司徒今司徒户部尚書則二契也伯夷為秩宗令禮部尚書禮儀使則二伯夷也伯益為虞今虞部郎中都水使者則二伯益也伯冏為太僕今太僕卿駕部郎中尚輦奉御閑廐使則四伯冏也古天子六軍漢前後左右將軍四人今十二衛神策八軍將軍六十員漢置别駕隨刺史巡察猶今觀察使之有副也參軍者參其府軍事猶今節度判官也官名職務直遷易不同爾詎有事實哉神龍中置員外官二千人自是以為常天寳中編户九百餘萬帑蔵盈溢雖有浮費不足有憂今天下户比天寳三分之一就中浮寄又五之二安可不革且應權省别駕參軍司馬州縣額内官約户置尉當罷者有行義在所以聞不省夏四月乙未朔四鎮北庭行軍别駕劉文喜據涇州反尋伏誅以新紀修癸丑詔不受生日貢獻以舊紀通鑑修六月甲午崔祐甫薨吕祖謙標目辛丑城奉天以舊紀修回紇頓莫賀殺登里可汗自立乙卯冊為武義成功可汗以通鑑修秋七月殺忠州刺史劉晏以吕祖謙標目修解題曰胡寅曰庾凖言劉晏與朱泚書書必可驗也召兵拒命兵必可覈也遣公正御史往忠州鞫治如其不妄晏何辭焉一聞讒言乃命中使宻殺之非政刑矣故来瑱死於前而僕固懐恩叛劉晏死於後而田悦李正已以為懼由殺之不以其罪也事見通鑑八月甲午振武留後張光晟殺回紇使者以吕祖謙標目修解題曰振武見開元九年朔方節度使解題丁巳遥尊母沈氏為皇太后以新紀修冬十月左丞薛邕以贓貶連山尉州縣始知畏以吕祖謙標目修唐德宗皇帝建中二年春正月戊辰李寳臣卒解題曰按谷况燕南記李建中河朔記李寳臣末年唯納妖妄之人爭獻圖䜟稱有尊位詐作朱草靈芝鑿石上作名字又於後堂結壇塲清齋菜食置金杯玉斚銀盤云甘露神酒自至又言天符下降將吏罔有諫者牒告州縣知委妖妄者矯云不日當有天神持金箱玉印而至然後即大位天所授也四方不待征討而定矣寳臣大悦多以金銀羅錦異物賞之妖妄者自知虛偽恐事泄見誅共言相公宜服甘露靈芝草湯即天神降速遂於湯中著毒藥飲畢失音三日而卒舊傳亦以為然通鑑考異以為方士酖殺寳臣身在府中安能免死雖愚必不為此盖時人見寳臣曽飲其湯遇疾而死以為所酖耳然以寳臣平日狂妄之迹觀之盖有此理未可斷其為無此事也寳臣子惟岳自稱成德留後與田悦李正己反命朱㴞討惟岳神策都虞候李晟河東節度使馬燧昭義節度使李抱真等討悦永平節度使李勉為汴滑等節度都統以新紀吕祖謙標目修解題曰德宗之心未嘗一日不在藩鎮不勝其憤鋭於遣三將以出伐而朱泚之變則終身不敢復言藩鎮文宗之心未嘗一日不在宦官不勝其忿任訓注以一决而生甘露之禍則終身不敢復言宦官永平節度使見乾元二年滑衛節度使解題餘見通鑑二月乙巳御史大夫盧把為門下侍郎同平章事以新紀修解題曰范祖禹曰君子與小人莫不引其類而聚於朝人君得一賢者而相之為之相者舉其類而進之後之進者亦舉其類而繼之是百姓被其澤數十年而未已也茍任小人其患亦然德宗既相盧把而復引裴延齡以自助則其國可知把相於建中之初而延齡用於正元之後是始終之以小人也故德宗之世賢人君子常阨窮而道不得行由小人彚進而不已也事見通鑑移京西防秋兵九萬餘人戍闗東以舊紀通鑑修梁崇義反以吕祖謙標目修五月丙寅増商税為什一以舊紀修田悦攻臨洺守將張伾破之以新史藩鎮傳建中實録修六月癸巳爵李希烈南平郡王漢南北兵馬招討使討梁崇義以舊紀修辛丑汾陽忠武王郭子儀薨以紀傳修秋七月以伊西北庭節度使李元忠為北庭大都䕶四鎮留後郭昕為節度使安西大都護以舊紀通鑑修庚申楊炎罷前永平節度使張鎰為中書侍郎同平章事以新舊紀修辛巳邠寧節度使李懐光兼朔方節度使以通鑑修癸未馬燧李抱真大破田悦於臨洺李正已卒其子納自稱平盧留後以通鑑新紀修梁崇義伏誅九月李納䧟宋州新紀李惟岳將張孝忠以易定二州降以為成德節度使以紀傳修冬十月乙未楊炎貶崖州司馬尋殺之以吕祖謙標目修解題曰孫甫曰楊炎懐元載私恩讎劉晏而害之誅之宜矣惜其誅之非公法也始炎譛晏附獨孤妃欲立韓王德宗不察遽殺晏後以忠州叛罪之中外寃惜炎懼人言之多奏遣腹心使於四方言殺晏事本由君怒以解己罪德宗若下詔書述聽䜛之過正炎之罪猶可明國常憲反擢用盧把加炎他罪而殺之此豈公心哉君相逞私欲如是欲求免於亂難矣事見通鑑癸卯祫於太廟獻祖復東嚮以新史禮志修戊申李納將以徐州降以新紀修解題曰按新舊史列傳李正己反將斷江淮路令兵守埇橋渦口江淮進奉船泊渦下不敢過以張萬福為濠州刺史馳至渦口立馬岸上發進奉船淄青兵倚岸睥睨不敢動李洧以徐降地迫於㓂常困蹙不支李泌言東南漕自淮逹汴徐之埇橋為江淮津口今刺史甚少脫為納所併以梗餉路是失江淮也請以張建封代之益與濠泗二州梁載言十道志南北朝彭城為要害之地隋鑿御河以米南控埇橋以扼梁泗厯古名鎮莫重於斯韓子中曰埇橋鎮在汴水上大和七年置宿州後移符離十一月辛丑宣武節度使劉𤣥佐等大破李納田悦兵於徐州以新紀通鑑修解題曰宣武節度使見天寳十四載河南節度使解題唐德宗皇帝建中三年春正月馬燧等大敗田悦於洹水悦奔魏州攻之弗克以吕祖謙標目修解題曰按新舊史紀傳實録建中初黜陟使洪經綸諭河北聞悦養士七萬輙下符罷其四萬歸田畆悦即奉命因大集將士激怒之曰而等籍軍中久仰縑廪養父母妻子今罷去何恃而生衆大哭悦乃悉出家貲給之各令還部自此魏人惑悦而怨朝廷吕祖謙曰德宗初立李正己獻錢三十萬緡上欲受之則恐受欺却之則恐無辭崔祐甫請遣使勞其將士因以所獻錢賜之使將士人人戴國恩諸道聞之知朝廷不重財貨上從之而正己慙服田悦强梗未如正己洪經綸罷其四萬人而人皆怨朝廷處之有其道則朝廷之恩施於淄青御之無其術則朝廷之怨結於河北居無何𫝊言帝且表封李勉城汴州而李正己懼率兵萬人屯曹州乃遣人説悦同叛悦因與梁崇義等連和以王侑扈㠋許士則為腹心邢曹俊孟希祐李長春符琇康愔為爪牙二年鎮州李惟岳淄青李納求襲節度不許悦為請不答遂合謀同叛時朝廷遣張孝忠等討恒州悦將孟希祐等率衆五千援之又遣康愔率衆八千圍邢州楊朝光以兵五千壁盧疃在邯鄲西北絶昭義餉道悦自將兵數萬繼進又使朝光攻臨洺元和郡縣志縣屬洺州本漢易陽縣地守將張伾伾固守食且盡賞賜不足乃飾愛女示衆曰庫廩竭矣願以此女代賞士感泣請死戰大破悦軍沈既濟建中實録五月癸未衆軍大破田悦於臨洺初悦攻臨洺甚急詔發禁兵及太原之師救之不解守將張伾大破之德宗實録續唐厯皆本於此新史藩鎮傳亦云伾飾愛女願以代賞士感泣請死戰大破悦軍詔河東河陽昭義救伾通鑑考異伹見癸未之㨗有衆軍字遂據谷况燕南記以為七月燧與抱真自潞府東下臨洺大破悦但既濟當時史官止書伾破賊而不及燧等不可以衆軍二字害意也况五月七月故自不同耶詔河東馬燧昭義李抱真神策兵馬使李晟合軍救之曹俊老而多智為貝州刺史悦未得志召問計安出對曰兵法十則攻今公以逆干順勢不敵也宜於􅛒口竇苹音訓潞州四十里入邢洺潞置兵萬人以遏西師則河北二十四州惟公所命今攻臨洺糧竭卒老不見其可悦昵㠋希祐等皆訾短之故不聽其言燧出􅛒口未過險移書抵悦示之好語悦謂燧畏之十一月田悦傳作七月按權德輿作燧行狀在十月以後師次邯鄲縣在磁州東北悦使至皆斬之朝光於臨洺南雙岡東列二柵以禦燧燧率軍營二壘間其夜東柵走燧進營狗明山竇苹音訓洺州永平縣有聰明山狗山鮑欽止聰明山廟碑云永平縣臨洺鎮祠臨馬鳴灣悦計曰朝光堅柵不下萬人未可以數日下且殺傷必衆吾此必抜臨洺饗士以戰必勝術也即分恒州兵五千助朝光燧令大將李自良李奉國將騎兵合神策軍於雙岡禦之戒曰令悦得過者斬燧乃推火車焚其柵斬朝光禽其將盧子昌斬首五千級虜八百餘人居五日進軍臨洺悦悉軍戰燧以鋭士當之凡百餘返士皆决死悦大敗斬首萬餘級虜九百人得榖三十萬斛悦夜遁邢州圍亦觧三年正月悦求救於青恒兾李惟岳李納合兵萬三千人救悦裒散兵二萬壁洹水水經洹水出上黨東過内黄縣北東入白溝淄青軍其東恒兾軍其西燧進屯鄴奏請益兵詔河陽李芃以兵㑹次於漳悦遣將王光進以兵守長橋築月城以為固燧乃於下流維車數百絶河戴土囊遏水而後度悦知燧食乏深壁不戰燧令士齎十日糧進營倉口水經注水出林慮縣之倉石溪東北逕魯班門又北合白水溪又東逕林慮縣石門谷又注於蒼溪水又北逕磻陽城北流注於漳水與悦夾洹水而軍造三橋踰洹日挑戰悦不出隂伏萬人將以掩燧燧令諸軍夜半食光鷄鳴時鳴鼓角而潜師並洹趍魏州令曰聞賊至則止為陣又令百騎吹鼓角於後持火待軍畢發匿其旁須悦衆渡即焚橋軍行十數里悦率淄青恒州歩騎四萬餘人乘風縱火譟而前燧令士無動除榛莽廣百歩為場募勇士五千人陣而待比悦至火止氣少衰乃縱兵擊之悦軍大敗時神策昭義河陽軍小却河東軍勝諸軍還鬭合擊又大破之悦軍走橋橋已焚衆赴水死者不可計斬首二萬級虜三千人淄青兵幾殱抱真芃問曰糧少而深入何也燧曰糧少則速戰兵法善於致人今悦與淄青恒兾三軍為首尾欲不戰以老我師若分擊左右未可必破悦且来救是前後受敵也法有攻其必救故趍魏以破之皆曰善悦收合殘卒奔魏大將李長春拒闗不納以須官軍三帥頓兵於魏州南平邑浮圖遲留不進長春乃開門納之悦得入殺長春持佩刀立軍門流涕曰悦藉伯父餘業與卿等同事今軍旅敗亡士民塗炭皆悦之罪也悦正縁老母不能自剄願公等斬悦首以取富貴無庸俱死乃自投於地衆憐皆抱持之曰今士馬之衆尚可一戰事脱不濟死生以之悦收涙曰諸公不以悦喪敗誓同存亡縱身先地下敢忘厚意乎乃自割一髻以為要誓將士亦斷髮約為兄弟乃率家財及府庫所有大行賜予而李再春及其子瑶以博州降悦從兄昂以洺州降悦族昂等家悦自視兵械單耗懼不知所出復召曹俊與之謀曹俊為整軍完壘人心復堅餘見通鑑孫甫曰燧與抱真不合遷延不進致悦嬰城固守且誘朱滔等同叛盖燧窺朝廷之事盧把所為險薄專報怨讎必無公平之法以御於外故少所忌憚敢乘私忿而不顧國事也丙寅朱滔張孝忠敗李惟岳兵於束鹿以紀傳修解題曰束鹿屬深州本漢鄡苦么反縣地辛未復𣙜酒以吕祖謙標目修閏月乙未李惟岳將康日知以趙州降甲辰惟岳伏誅深州降以新紀通鑑修解題曰李寳臣再世凡二十年以朱滔為節度使以新史列傳修田悦愽洺二州降以新紀修二月戊午李惟岳將以定州降以新舊紀修甲子以張孝忠為易定滄節度使成德兵馬使王武俊為恒兾都團練觀察使康日知為深趙都團練觀察使以舊紀通鑑修解題曰易定滄節度使按方鎮表建中三年置義武軍列傳定州置軍名義武以張孝忠為節度易定滄等州觀察使孝忠牙將程日華假滄州刺史參軍李宇曰此軍本號横海能絶易定自為一州請為天子言之日華遣宇西帝大喜拜御史中丞滄州刺史復置横海軍即以為使舊史地理志義武節度治定州領定易祁三州豈滄州分𨽻之後以祁州𨽻之歟夏四月戊午李納德棣二州降以新紀修朱滔反以舊紀修解題曰按新史列傳李惟岳拒命滔與張孝忠再破之束鹿取深州賜德棣二州康日知為深趙團練使滔失深州不平又請恒定七州所賦供軍不許愈怨時馬燧圍田悦悦窮間滔與王武俊同叛滔姑子劉怦為涿州刺史以書諫曰司徒身節制太尉位宰相恩遇極矣今昌平有太尉鄉司徒里不朽業也能以忠順自將則無不濟比忘上樂戰不顧成敗如安史者今復何有司徒圖之無貽後悔滔不從連兵救悦又懼張孝忠之襲使怦壁險而軍滔激其衆曰士蹀血鬭既下堅城朝廷乃見奪奏賞不報君等疾趍破馬燧以取貲糧可乎軍中不應三號之乃曰幽人死於南者骸撑不掩痛藏心髓奈何復欲暴骨中野乎司徒兄弟受國寵士各蒙官賞願安之不䘏其他滔罷潜殺不可共亂者數十人日知發其情天子以悦未下重起兩冦即封滔通義郡王滔愈悖分兵與武俊屯趙州脅日知矯詔散其糧貯即引兵救悦次束鹿軍大譟曰天子令司徒北還而南救趙寧有詔耶滔懼走匿傳舍禆將蔡雄好諭士曰天子約取成德所得州縣賜有功者抜深州者燕也本鎮常苦無絲纊兾得深州以佐調率今顧不得又天子以帛賜有功士為馬燧掠去今引而南非自為也軍中悔謝復曰雖然司徒南行違詔書莫如還滔回次深州誅首變者二百人衆懼乃率兵南壁寧晉趙州縣本廮陶縣地與武俊合事見通鑑范祖禹曰民皆有常性飢食渇飲以養其父母妻子而終其天年此人情之所欲也豈樂為叛而沉其族哉然自古治少而亂多由上失其道而民不知所從故姦權得以詭其衆而用之也天寳以後幽薊為反逆之區中國視之無異戎狄朱滔刼其民如此不得已而後從之亦足見其本非好亂也人君茍行仁政使民親其長愛其上驅之為亂莫肯從也姦雄豈得而詐之哉田承嗣幾禽矣李正己寳臣沮撓而承嗣得以逋誅田悦勢屈矣朱滔王武俊改計而悦終於不可下同惡相求如市賈焉况當時區畫有未善者乎自是而河北亂根成矣甲子借商括質以吕祖謙標目修解題曰按舊紀新志朱滔王武俊田悦合從而叛用益不給初太常博士韋都賔陳京請借富商錢大率每商留萬貫餘並入官不一二十大商則國用濟矣杜佑曰合諸道用兵月費度支錢一百餘萬貫若獲五百萬貫纔可支給數月乃以户部侍郎趙賛判度支代佑行借錢令約罷兵乃償之京兆少尹韋禎長安令薛苹搜督甚峻人不勝鞭笞乃至自縊家若被盗然總京師豪人田宅奴婢之估裁得八十萬緡又取僦樻納質錢及粟麥糶於市者四取其一長安為罷市市民相率遮邀宰相哭訴盧把疾驅而過韋禎乃請錢不及萬緡粟麥不及五十斛者免而所獲纔二百萬緡按杜佑所對謂今月費百萬得五百萬纔足數月言其無益故罷祐而用賛新志乃云德宗以問度支杜佑以為軍費裁支數月幸得商錢五百萬緡可支半嵗乃以趙賛判官度支代佑借錢令似失其實召朱泚還戊寅張鎰罷為鳳翔隴右節度使以舊紀通鑑修解題曰按崔延光奉天録泚在京師私第絶朝謁日給酒肉而已内侍一人監之通鑑不取者疑無是事爾攷之趙元一奉天録羣盗謀曰太尉朱泚久囚必生異志又泚偽赦亦云幽囚之中神器自至則非無是事也餘見通鑑五月丙寅増兩税及鹽𣙜錢乙巳杜佑罷以中書舍人趙賛為户部侍郎判度支以舊紀修六月辛巳王武俊反李懐光馬燧等及田悦朱滔王武俊戰於愜山敗績秋七月退保魏州以新舊紀修解題曰愜山在今大名府大名縣西漢成帝時王延世於此塞决河故曰愜山癸巳停借商錢以新舊紀修八月置汴東西水陸運兩税鹽鐵使以舊紀通鑑修辛酉以涇原留後姚令言為節度使通鑑九月癸巳税商貨茶漆竹木冬十月丙辰吏部侍郎闗播為中書侍郎同平章事以新舊紀修十一月朱滔田悦王武俊李納稱王以吕祖謙標目修十二月丁丑李希烈自稱天下兵馬都元帥建興王通鑑更造正元厯以通鑑修大事記續編卷六十
