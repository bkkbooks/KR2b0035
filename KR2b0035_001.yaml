body:
  text: 大事記續編卷一明王禕撰漢孝武皇帝征和四年春正月帝幸東萊欲浮海求神仙羣臣諫弗聽大風海湧而止以通鑑目録稽古録修二月丁酉雍縣無雲如雷者三隕石二以本紀修三月帝耕于巨定以本紀荀悅漢紀稽古録修解題曰武帝一紀征伐宫室祭祀詩樂之事無嵗無之獨農桑之務未嘗及焉至是始親耕巨定是殆悔心之萌乎輪臺悔過之詔富民搜粟之封兆于此矣應劭曰齊國縣地理志齊郡馬車瀆首受巨定東北入海還幸泰山庚寅祀明堂癸巳禪石閭大鴻臚田千秋白斥遣方士候神人者同上解題曰通鑑載上每對羣臣自嘆曰鄉時愚惑為方士所欺天下豈有仙人盡妖妄耳節食服藥差可少病而已此出漢武故事其言絶不類西漢通鑑誤取爾夏六月還幸甘泉丁巳以千秋為丞相先是搜粟都尉桑𢎞羊與丞相御史請田輪臺帝乃下哀痛之詔不復出軍而封千秋為富民侯以趙過為搜粟都尉教民代田同上解題曰自武帝初通西域置校尉屯田渠犂渠犂城東北與尉犂東南與且末南與精絶接西有河至龜兹五百八十里輪臺與渠犂相連自伐大宛之後西域多遣使者貢獻於是自敦煌西至鹽澤往往起亭而輪臺渠犂皆有田卒萬人征和中李廣利以軍降胸奴上既悔逺征伐而桑𢎞羊與丞相御史奏言故輪臺以東捷枝渠犂皆牧圉地廣饒水草有溉田五千頃以上可益通溝渠種五榖與中國同時熟其旁國少錐刀貴黃金綵繒可以易榖食宜給足不乏顔師古曰言以錐刀及黃金綵繒與此旁國易榖食可以給田卒不乏糧可遣屯田卒置校尉三人分護各舉圖本地形通利溝渠以時益種五榖上乃下詔深陳既往之悔曰前有司奏欲益夷賦三十助邊用顔師古曰每口增三十錢也是重困泄弱孤獨也而今又請遣卒田輪臺輪臺西於車師千餘里前開陵侯晉灼曰胸奴介和王來降者擊車師時危須尉犂樓蘭六國子弟在京師者皆先歸發畜食迎漢軍又自發兵凡數萬人王各自將共圍車師降其王諸國兵便罷力不能復至道上食漢軍漢軍破城食至多然士自載不足以竟師顔師古曰士雖各自載糧而在道已盡歸塗尚苦乏食不能終師旋之事強者盡食畜産羸者道死數千人朕發酒泉驢橐駝負食出玉門迎軍吏卒起張掖不甚逺然尚厮留其衆顔師古曰言其前後離厮不相逮及也厮音斯曩者朕之不明以軍候𢎞上書言胸奴縳馬前後足置城下馳言秦人我丐若馬又漢使者久留不還故興師遣二師將軍欲以為使者威重也古者卿大夫與謀參以蓍龜不吉不行乃者以縳馬書遍視丞相御史二千石諸大夫郎為文學者乃至郡屬國都尉成忠趙破奴等皆以虜自縳其馬不祥甚哉或以為欲以見強夫不足者視人有餘易之卦得大過爻在九五胸奴困敗公車方士太史治星望氣及太卜龜蓍皆以為吉胸奴必破時不可再得也西漢百官表大初元年初置太卜史記日者傳乃日太卜之起由漢興唐六典謂秦漢奉常屬官有太卜令丞武帝置太卜博士又曰北伐行將於釜山必克卦諸將二師最吉故朕親發二師下釜山詔之必毋深入今計謀卦兆皆反繆重合侯得虜候者言聞漢軍當來胸奴使巫埋羊牛所出諸道及水上以詛軍單于遺天子馬裘常使巫祝之縛馬者詛軍事也又卜漢軍一將不吉胸奴常言漢極大然不能飢渴失一狼走千羊乃者二師敗軍士死略離散悲痛常在朕心今請逺田輪臺欲起亭隧是擾勞天下非以優民也今朕不忍聞大鴻臚等又議欲募囚徒送胸奴使者明封侯之賞以報忿五伯所弗能為也且胸奴得漢降者常提掖搜索問以所聞今邊塞未正闌出不禁障候長吏使卒獵獸以皮肉為利卒苦而烽火乏失亦上集不得顔師古曰長吏利於皮肉多使障候之卒獵獸故今烽火有乏又其人勞苦因致奔亡凡有此失皆不集於所上文書後降者來若捕生口虜乃知之當今務在禁苛暴止擅賦力本農修馬復令馬復因養馬以免猺賦也復方目反以補闕毋乏武備而已郡國二千石各上進畜馬方略補邊狀與計對餘見通鑑與計對與上計者同來對也讀輪臺詔知武帝遣將之出成敗勝負皆以實聞無毫髮不知者故天下之柄皆歸人主而不為左右欺罔此所以行兵三十年之久而國不亡也又詔曰方今之務在於力農以趙過為搜粟都尉過能為代田一畝三甽甽壟也工犬反亦作畎嵗代處故曰代田后稷始甽田以二耜為耦併兩耜而耕廣尺深尺曰甽長終畝一畝三甽一夫三百甽而播種於甽中苗生葉以上稍耨隴草因潰其上以附苖根潰謂下之也故其詩曰或藝或耔黍稷薿薿藝除草也耔附根也薿薿盛也率十二夫為田一井一屋故畝五頃鄧展曰九夫為井三夫為屋夫百畝於古為十二頃古百步為畝漢時二百四十步為畝古千二百畝得今五頃用耦犂二牛三人一嵗之外常過縵田顔師古曰縵田不為甽者也音莫幹反畝一斛以上善者倍之過便教田太常三輔蘇林曰太常王諸陵有民故亦課種大農置工巧奴與從事為作田器二千石遣令長二老力田及里父老善田者受田器學耕種養苗狀民或若少牛無以趍澤顔師古曰趍讀曰趣及也澤雨之潤澤也故平都令光教過以人挽犂過奏光以為丞教民相與庸挽犂庸功也換工共作也義與貫同率多人者田日三十畝少者十三畝以故田多墾闢過試以離宫卒田其宫壖地課得榖皆多其旁田畝一斛以上令命家田三輔公田韋昭曰命家謂受爵命一爵為公上以上令將田公田優之也令力成反又教邊郡及居延城居延張掖縣有田卒是後邊城河東𢎞農三輔大常民皆便代田用力少而得榖多秋八月辛酉晦日有食之不盡如鈎以五行志修漢孝武皇帝後元元年春正月帝幸甘泉郊泰畤遂幸安定以本紀修解題曰宋庠紀年通譜武帝雖沿文景故事復為後元然始以後元二字加於年上此為異也非史官追書之名蜀敞曰昭帝紀詞訟在後二年者皆勿聽治則當稱後元年昌邑哀王髆薨通鑑二月赦天下以本紀修夏六月御史大夫商邱成有罪伏誅以本紀修解題曰坐祝詛也古者王官有竒邪之禁而執左道以亂政者殺所以正人心而謹防範也武帝縱諸巫往來上林中而又為方以祠祝胸奴大宛非其道矣晚年意多忌惡羣臣多坐祝詛誅民轉相誣死者前後數萬至於皇后太子公主皆不相保其禍不可勝言先王維持世道之具其不可踰也如此侍中僕射莽何羅與弟重合侯通謀反侍中駙馬都尉金日磾奉車都尉霍光上官桀討誅之以本紀列傳修解題曰莽何羅與江充善太子命石德張光等分將使長安因如侯發長水宣曲胡騎顔師古曰長水校名宣曲宫名也並胡騎之所屯莽通斬如侯入長安發輯濯士以于商邱成顔師古曰輯濯士王用輯及濯行船者池短曰輯長曰濯輯音集字本從木濯字亦本作棹並直孝反景建從通獲石德商邱成力戰獲張光皆用是得侯江充既誅往往懼及成於孝文廟醉歌曰出居安能鬱鬱殆必有邪謀成死而何羅兄弟景建皆誅矣餘見通鑑百官表奉車都尉常御乘輿車駙馬都尉掌駙馬皆武帝初置秋七月地震本紀是嵗殺倢妤趙氏以通鑑修解題曰後世如元魏立主必殺其母實始於此事見通鑑漢孝武皇帝後元二年春正月帝朝諸侯王于甘泉賜宗室二月幸五柞宫乙丑立皇子弗陵為皇太子年八嵗霍光為大司馬大將軍金日磾為車騎將軍太僕上官桀為左將軍桑𢎞羊為御史大夫與田千秋受遺詔輔政丁卯帝崩於五柞宫入殯未央前殿戊辰太子即皇帝位謁髙廟以武宣紀修解題曰霍光字子孟河東平陽人為侍中奉車都尉光祿大夫太初元年更中大夫為光祿大夫出則奉車入侍左右出入禁闥二十餘年小心謹慎未嘗有過甚見親信金日磾字翁叔本胸奴休屠王太子也輸黃門養馬時年十四武帝遊宴後宫滿側金日磾等數十人牽馬過殿下莫不窺視至日磾獨不敢容貌甚嚴馬又肥好即日拜為馬監遷侍中駙馬都尉光祿大夫日磾未嘗有過失上甚信愛之出則驂乘入侍左右賜出宫女不敢近上欲內其女後宫不肯其篤慎如此上官桀字少叔隴西上邽人也為羽林期門郎從上甘泉天大風車不得行解蓋授桀桀奉蓋雖風常屬車雨下蓋輒御上竒其材力遷未央廄令上嘗體不安及愈見馬多瘦大怒曰令以我不復見馬邪桀頓首曰臣聞聖體不安日夜憂懼意誠不在馬言未卒泣數行下上以為忠由是為侍中稍遷至太僕武帝之所以取三人者其故如此餘見通鑑吕祖謙曰世稱漢武拔霍光於宿衛託以幼孤為知人抑不知所謂大臣者非可以寄安危而屬存亡者不在此位如周之召畢內則總衆職外則統諸侯君存則輔政君沒則託孤所謂受遺者蓋其一職也武帝垂沒始拔一人而付之平時大臣果安用乎其無具甚矣是時田千秋實為宰相武帝茍以千秋為不足恃賴則易相可也今光以將軍輔政而千秋以丞相參焉體統不正甚矣厥後政事一決大將軍而丞相為具員其勢然也然武帝平時雖不委任宰相而權猶自己出衛霍雖貴盛未嘗敢侵宰相之權今宰相失職如此宜乎外戚相踵當國而漢遂以亡也按禮天子諸侯既葬乃即位是時立太子倉卒故帝崩明日而太子踐祚此霍光不學之過也李燾曰成王崩逆子釗于南門之外太子在外特出而迎之表異之也及康王尸天子天下莫不聞知是以人人寅畏以服事其上而不敢覬覦此可為百世帝王之大法武帝求神仙以死為諱自衛太子後羣臣莫敢以繼立為言者病既彌留而霍光請之乃與日磾等俱拜床下受遺詔輔少主此何法也侍中王忽在帝左右猶不聞封日磾等事執金吾郭廣待詔五柞宫不知帝所病但云宫中歡言帝崩諸將軍等共立太子年八九嵗葬時亦不出臨是朝廷之間皆未知嗣天子為何如人也燕王怪之遂有邪謀使帝以至公為心早建太子行顧命之法決不至此顔師古曰長楊五柞二宫皆以樹名揚雄賦振師五柞習馬長楊張衡賦掩長楊而聮五柞觀武帝往來其間蓋密邇也帝姊鄂邑公主益湯沐邑為長公主共養省中霍光秉政領尚書事金日磾上官桀副焉以本紀通鑑修解題曰顔師古曰長公主儀比諸王伏儼曰本為禁中門閣有禁非侍御之臣不得妄入行道豹尾中孝元皇后父名禁故曰省中省察也言入此中皆當察視不可妄共居用反漢因秦置尚書主殿中發畫百官表侍中中常侍得入禁中諸曹受尚書事晉宋官志亦謂武帝時左右曹諸吏分平尚書奏事知樞要者領尚書事蓋天下奏事皆下尚書諸曹侍中中常侍諸吏皆加官出入禁闥審察章奏霍光受遺輔政兼管內庭之事故以大司馬將軍領尚書而平決衆事也光死霍山繼之魏相謂其秉樞機恐浸不制白去上書副封以防其患逮霍氏誅則上自省尚書事其所關係如此其後史髙等領尚書事受遺遂為故事矣班固於百官表闕而不書大赦以宣帝紀丙吉傳修解題曰劉攽曰是年二月有赦紀失載宣紀及丙吉傳可考三月甲辰葬茂陵上諡曰孝武皇帝追尊李夫人為孝武皇后配食以本傳外戚傳修解題曰追尊李夫人使配食此霍光不學之過也夏六月赦天下本紀秋七月有星孛于東方本紀濟北王寬有罪自殺國除本紀解題曰國除為北安縣屬泰山郡賜長公主宗室昆弟各有差本紀追尊趙倢妤為皇太后起雲陵本紀解題曰顔師古曰雲陵在甘泉宫南今土俗人呼為女陵冬胸奴入朔方本紀漢孝昭皇帝始元元年春二月黃鵠下建章宫太液池中公卿上夀賜諸侯王列侯宗室金錢有差以本紀修解題曰君在諒暗而稱賀上夀非禮也蓋自文帝行短喪之制習以為常此公卿不學之過也郊祀志建章宫為千門萬户其北治大池漸臺髙二十餘丈名曰泰液池中有蓬萊方丈瀛洲壺梁象海中神山龜魚之屬帝耕于鈎盾弄田以本紀修解題曰應劭曰鈎盾宦者近署臣瓉曰弄田在未央宫中顔師古曰謂遊宴之田天子所戲弄益封燕王旦廣陵王胥及鄂邑長公主以本紀修夏雲陵起園廟本紀益州夷二十四邑反遣水衡都尉吕破胡募吏民發犍為蜀郡奔命擊破之本紀解題曰武帝之後兵有選募有罪徒選募則勇敢奔命伉健豪吏應募私從是也罪徒則謫民惡少亡命徒刑罪人應募罪人是也應劭曰舊時郡國皆有材官騎士以赴急難今夷反常兵不足以討之故權選取精勇聞命奔走故謂之奔命也更河內屬冀州河東屬井州本紀解題曰地里志武帝初置部刺史河內河東二郡隸司隸校尉蓋武帝意好廣闊故徙函谷關廣置左右輔昭帝嗣位即割司隸地歸之二州與武帝規摹異矣秋七月赦天下本紀解題曰霍光秉政始行寬緩欲以悅天下故赦數下也齊王澤中山王長與燕王旦謀反殺諫者韓義等十五人八月澤等伏誅旦勿治以通鑑修解題曰按史記世家武帝年長老而太子不幸薨未有所立而燕王旦使來上書請身入宿衛於長安孝武見其書怒曰生子當置之齊魯禮義之鄉乃置之燕趙果有爭心不讓之端見矣於是使使斬其使者於闕下班固不書此事昭帝初旦果作怨而望大臣自以長子當立與齊王子劉澤等謀為叛逆出言曰我安得弟在者今立者乃大將軍子也欲發兵事覺當誅昭帝緣恩寬忍抑案不揚公卿大臣請遣宗正與太中大夫公户滿意御史二人偕往使燕風喻之到燕各異日更見責王吳王濞反亦遣太常奉宗廟宗正輔親戚使告吳宗正者主宗室諸劉屬籍先見王為列陳道昭帝實武帝子狀侍御史乃復見王責之以正法問王欲發兵罪名明白當坐漢家有正法王非纎介小罪過即行法直斷耳安能寬王驚動以文法王意益下心恐公户滿意習於經術最後見王稱引古今通義國家大禮文章爾雅謂王曰古者天子必內有異姓大夫所以正骨肉也外有同姓大夫所以正異族也周公輔成王誅其兩弟故治武帝在時尚能寬王今帝始立年幼富於春秋未臨政委任大臣古者誅罰不阿親戚故天下治方今大臣輔政奉法直行無敢阿恐不能寬王王可自謹無令身死國滅為天下笑於是燕王旦乃恐懼服罪叩頭謝過大臣欲和合骨肉難傷之以法其後旦復與左將軍上官桀等謀反大將軍光與公卿大夫議曰燕王不改過悔正行惡不變於是修法直斷行罪誅旦自殺國除餘見通鑑昭帝之喻旦先之宗正以盡其情次之御史以舉其法終之經術士以申其義故旦服罪謝過而大臣又和合骨肉不忍傷之以法曲盡情狀褚少孫載之甚詳班固皆削之陳瓘曰旦澤之罪一也旦又殺諌者十五人而以至親不治以恩撓法失之矣九月秺侯金日磾薨以吕祖謙標目修閏月遣使廷尉王平等五人行郡國舉賢良問民疾苦以本紀修解題曰此霍光輔政之初政也王平後以治侯史吳獄抵罪蓋長者也冬無冰本紀漢孝昭皇帝始元二年春正月以前捕斬反者功封霍光為博陸侯上官桀為安陽侯本紀解題曰武帝遺詔封金日磾為秺侯桀為安陽侯光為博陸侯文頴曰博大陸平取其嘉名食邑北海河東城顔師古曰蓋取鄉聚之名以為國非必縣也公孫𢎞平津鄉是已皆以前捕反者功封時衛尉王莽子忽侍中揚語曰帝崩忽常在左右安得遺詔封三子事羣兒自相貴耳光聞之切讓王莽莽鴆殺忽當主少國疑之時人言未靖三子秉國大政雖謙讓不受封可也而光乃以咎王莽其示人亦不廣矣使光而而知學殆不如此舉宗室茂材劉辟疆劉長樂為光祿大夫以本紀修解題曰王介曰此霍光設施也三月遣使振貸秋八月詔所貸勿收責毋出今年田租本紀解題曰杜延年見國家承武帝奢侈師旅之後數為大將軍光言年嵗比不登流民未盡宜修孝文時政示以儉約寬和順天心悅民意年嵗宜應光納其言舉賢良議罷酒榷鹽鐵今考始元六年詔問賢良文學以民所疾苦而傳載延年奏記於三年之後蓋追述前事耳延年為霍光故吏自光秉政即進善言蓋不特議罷鹽酒一事也胸奴柧鹿姑單于死子壺衍鞮單于立其國始衰以胸奴傳通鑑修漢孝昭皇帝始元三年春二月有星孛于西北本紀欲募民徙雲陵本紀冬十月鳳凰集東海遣使祠之本紀十一月壬辰朔日有食之本紀漢孝昭皇帝始元四年春三月甲寅立倢妤上官氏為皇后以本紀修解題曰上官桀子安取霍光女結婚相親昭帝始立鄂邑蓋長公主居禁中共養蓋主私近河間丁外人上與大將軍聞之不絶主歡董偃私侍館陶公主而武帝寵之鄂邑公主私近丁外人而昭帝不絶其歡事相類長主內周陽氏女令配耦時上官安有女因光欲內之光不聽安説外人曰聞長主內女安子容貌端正誠因長主時得入為后足下何憂不封侯乎外人喜言於長主詔安女入為倢妤月餘遂立為皇后王后之立竇太后之力也此上官安所以得行其計歟光欲后有子因上侍疾醫言禁內後宫皆不得進唯皇后顓寢皇后年六嵗而立十三年而昭帝崩昭帝立十三年而崩遂絶繼嗣光執朝政猶周公之攝也昭帝通詩尚書有明哲之性而光秉政九年久於周公上既冠而不歸政後遂誅滅有愧於周公之德逺矣然而立上官氏非光意也而劉向深以咎光何哉蓋養君德保君體大臣之職也人君夀夭皆係於大臣周公作無逸告成王言商之諸君享國有永有不永正此意也武帝親攜昭帝之手而屬之光光不能博選師友致之髙明光大之域而使早親嗜欲賊其天年固有任其咎者矣蘇轍曰晉平公有蠱疾醫和視之曰是謂近女非鬼非食惑以喪志良臣將死天命不宥國之大臣受其寵祿而任其大節有災禍興而無改焉必受其咎趙孟受之而不辭而光又何逃焉赦天下本紀解題曰立后故也詞訟在後二年皆勿聽治孟康曰武帝後二年夏六月皇后謁髙廟賜長公主丞相以下及郎吏宗室錢帛有差本紀徙三輔富人雲陵本紀秋七月詔民毋出馬本紀冬遣大鴻臚田廣明擊益州本紀廷尉李种坐故縱死罪棄市本紀解題曰任宣謂霍禹曰廷尉李种王平左馮翊賈勝胡及少府徐仁皆坐逆將軍意下獄死則傳所謂持法嚴信矣以皇后父騎都尉上官安為車騎將軍以稽古録胡安國通鑑舉要厯補遺修漢孝昭皇帝始元五年春正月追尊皇太后父趙父為順成侯以紀傳修夏陽男子張延年詣闕自稱衛太子廷尉驗治伏誅以紀傳稽古録修解題曰程頤曰雋不疑説春秋非是然其處事應機則不異於古人矣胡寅曰蒯瞶衛靈公世子也出奔於宋靈公未嘗命廢之而更立它子也靈公卒蒯瞶之子輒遂自立拒蒯瞶亦未嘗有靈公之命也蒯瞶欲殺南子又忘父喪當黜何疑然輒拒之則失人子之道故春秋於趙鞅納蒯瞶書曰世子明其位之未絶也於石曼姑圍戚書齊國夏為首惡其黨輒也然則謂春秋是輒者考實未詳而處義未精矣又況與戾園之事非倫乎據稱兵闕下與父交戰正使不死而父宥之其位不得有矣果來自詣但當以此下令叱吏收縳自足以成獄而議刑不必引春秋也霍光不學故莫之能辨然其言曰公卿當用經術明於大誼者則格言也事見通鑑夏罷天下亭母馬及馬弩關夲紀解題曰應劭曰武帝數伐胸奴再擊大宛馬死略盡乃令天下諸亭養母馬欲其繁孳又作馬上弩機關今悉罷之孟康曰舊法馬髙五尺六寸齒未平弩十石以上皆不得出關今不禁也六月封上官安為桑樂侯以本紀修詔三輔太常舉賢良郡國舉文學髙第以本紀修賜吏民爵有差本紀罷儋耳真畨郡本紀解題曰臣瓉曰茂陵書儋耳領縣五真畨郡治霅縣十五縣賈捐之傳罷儋耳郡并屬珠崖應劭曰玄菟郡故真畨併真畨入玄莬也畨音普安反吕破胡等擊益州斬首捕虜三萬餘人以本紀修諌大夫杜延年請霍光修孝文時政儉約寬和光從之以列傳修漢孝昭皇帝始元六年春正月帝耕于上林以本紀修二月詔有司問賢良文學民所疾苦皆碩罷鹽鐵酒𣙜均輸官於是鹽鐵之議起桑𢎞羊難之以紀傳桓寬鹽鐵論修解題曰按桓寬鹽鐵論文學初言鹽鐵酒𣙜均輸之害桑大夫答之皆謂不然及再發問則獨答以鹽鐵均輸而已此所以獨罷𣙜酤官而鹽鐵均輸未及施行也然漢初羣飲之禁未嘗不可行而乃令民自占租又從而升稅四錢是亦月攘一雞者耳其桑大夫之意歟事見通鑑中郎將蘇武前使胸奴至是來歸以為典屬國以紀傳修夏旱大雩本紀秋七月罷𣙜酤官令民得以律占租賣酒升四錢本紀解題曰劉攽曰罷酤占租賣酒共一事耳謂令民賣酒以所得租占而輸其利占不以實則論如律也租賣酒之稅也賣酒升四錢限民不得原財也王子侯表旁況侯殷坐貸子錢不占租取息過律會赦免侯正其事也占音章瞻反分天水隴西張掖郡置金城郡本紀解題曰金城郡河蘭廓會樂肅涼西寧八州積石軍之地立鈎町侯毋波為王賜田廣明爵關內侯以紀傳修解題曰鈎町屬牂柯郡音劬挺上官桀父子與霍光爭權詐為燕王旦上書告光罪帝覺之以列傳稽古録修解題曰長公主上官桀父子與霍光爭權有隙知燕王旦怨光私與交及桑𢎞羊等皆與旦交通數記疏光過失與旦令上書告之桀欲從中下其章旦聞之喜上疏曰陛下承明繼成委任公卿羣臣連與成朋非毁宗廟膚受之訴日騁於廷惡吏廢法立威主恩不及下究臣聞武帝使中郎將蘇武胸奴見留二十年不降還亶為典屬國今大將軍長史敞無勞為搜粟都尉又將軍都郎羽林顔師古曰都大也謂大會試之漢光祿挈令諸當試者不會都所免之道上移蹕大官先置且願歸符璽入宿衛察姦臣之變帝覺其有詐遂親信光而疏桀等餘見通鑑顔師古曰本紀云詐令人為燕王上書上曰朕知此詐也將軍都郎屬耳燕王何以得知之而傳乃云旦自上疏而帝覺其詐自相抵牾如此蓋班固欲見其詐上之書故於本傳全載之耳又本紀載於明年時上年十四張晏謂武帝崩時八嵗今年十五顔師古云初桀安父子詐為燕王書蓋追道前事非今嵗也張失之漢孝昭皇帝元鳳元年解題曰應劭曰三年中鳳凰比下東海海西樂鄉於是冠元焉春益長公主湯沐邑以本紀修泗水王賀前薨無子國除後宫有遺腹子暖立之本紀三月郡國所選有行義涿郡韓福等五人賜帛遣歸郡縣以時存問以本紀荀悅漢紀修武都氐反遣執金吾馬適建將三輔太常免刑徒擊之以本紀荀悅漢紀修解題曰蘇林曰太常主諸陵縣治民也百官表永光五年始分陵邑屬三輔鄂邑長公主燕王旦上官桀桀子安等謀反伏誅以朱熹通鑑綱目修改元本紀夏六月赦天下本紀秋七月己亥晦日有食之本紀冬十月封告斬反者杜延年等為列侯以韓義子延夀為諌大夫以列傳通鑑修以尚書令張安世為右將軍光祿勳杜延年為太僕以列傳通鑑修解題曰王介曰光經變之後持刑稍嚴故以張安世自副又以杜延年為給事中以其為張湯杜周之子也幸安世志行純篤延年持論寬厚不類其父不爾殆哉胸奴入冦追獲其甌脫王以列傳通鑑修漢孝昭皇帝元鳳二年夏四月帝自建章宫徙未央宫置酒賜百官帛宗室錢以本紀修六月赦天下詔郡國毋斂今年馬口錢以本紀修解題曰詔曰朕閔百姓未贍前年減漕三百萬石頗省乘輿馬及菀馬顔師古曰乘輿馬謂天子所自乘以駕車輿者以補三輔乘輿傳馬張晏曰驛馬也其令郡國毋斂今年馬口錢文頴曰往時有馬口出斂錢如淳曰所謂租及六畜也吳華曰太初二年籍吏民馬捕車騎馬又漢儀注民出口賦錢人二十三其二十錢以供天子其三錢者武帝加口錢以補車騎馬也自元狩以來中國馬乏於是有馬者籍之且增口賦三錢以買馬所謂馬口錢也昭帝既有乘輿馬及菀馬故所出三錢可以勿斂淳􅀈以為算舟車之類非也租及六畜自王莽事胸奴求和親以列傳舉要厯補遺修漢孝昭皇帝元鳳三年春正月泰山石自起立上林枯柳自起生符節令眭𢎞坐妖言誅以紀傳修罷中牟苑賦貧民本紀解題曰地理志中牟有圃田澤詔使使者振困乏所振貸勿收止四年毋漕以本紀修解題曰詔曰乃者民被水災頓匱於食朕虛倉廩使者振困乏其止四年毋漕四年明年也三年以前所振貸非丞相御史所請邊郡受牛者勿收責應劭曰武帝始開三邊徙民屯田皆與犂牛後丞相御史復間有所請今敕自上所賜與勿收責丞相所請乃令其稅耳夏四月少府徐仁廷尉王平左馮翊賈勝胡坐縱反者仁自殺平勝胡要斬以本紀修解題曰霍光以丞相千秋擅召中二千石以下外內異言遂下平仁獄朝廷皆恐丞相坐之杜延年奏記光光以廷尉少府弄法輕重皆論棄市而不以及丞相蓋光嘗言於千秋謂光治內君侯治外分內外廷為二宰相已失職矣今又以丞相擅召中二千石為罪則外廷之事併治之宰相特具員而已武帝建置之失其勢必至是也事見通鑑吕祖謙曰霍光秉政始者固無可議及經上官桀之變嚴刑峻法此其大失也光天資渾厚而不知學一有所恐動遂拾武帝已弛之嚴酷而用以鎮壓天下雖杜延年左右彌縫不過小節其大綱已失矣宣帝繼之刻薄少恩用申韓之法亦光有以導之也冬遼東烏桓反遣度遼將軍范明友將北邊七郡騎擊之本紀解題曰此烏桓初見也按後漢傳烏桓本東胡冒頓滅其國餘類保烏桓山武帝擊破胸奴左地因徙烏桓於上谷媯蔚二州之地漁陽檀薊景三州之地右北平檀薊營三州之地遼東安東都護府遼西營平景三州之地塞外為漢偵察胸奴動靜置護烏桓校尉監領之使不得與胸奴交通平帝時護烏桓使者告烏桓民毋得復豫胸奴皮布稅則前此嘗豫之蓋自和親後其禁稍弛餘見通鑑漢孝昭皇帝元鳳四年春正月丁亥帝加元服見于髙廟賜諸侯王至吏民金帛牛酒有差賜吏民爵逋更賦未入者四年五年口賦皆勿收酺五日以本紀修解題曰顔師古曰元首也冠者首之所著故曰元服如淳曰更有三品有卒更有踐更有過更音工衡反古者正卒無常人皆當迭為之一月一更是為卒更貧者欲得雇更錢者次直者出錢雇之月二千是為踐更天下人皆直戍邊三日亦名為更律所謂繇戍也雖丞相子亦在戍邊之調不可人人自行三日戍又行者當自戍三日不可便往還因便住一嵗一更諸不行者出錢三百入官官以給戍者是為過更張晏曰百人為卒取一人所贍常為之月用二千使人直之謂之過更律説卒更踐更者居也居更縣中五月乃更後從尉律卒踐更一月休十一月也食貨志月為更卒已復為正一嵗屯戍一嵗力役三十倍於古此漢初因秦法而行之也後遂改易有謫乃戍邊一嵗耳逋未出更錢者也富民侯田千秋薨以本紀修二月乙丑御史大夫王欣為丞相封宜春侯以百官表修夏四月封范明友為平陵侯以本紀荀悅漢紀修平樂監傅介子使樓蘭誘殺其王安歸封為義陽侯以本紀修解題曰平定益州田廣明之勞多矣止得關內侯耳而范明友瑣瑣之功遂侯之其與傅介子同下詔者恐人之竊議也此霍光之私意也事見通鑑五月丁亥孝文廟正殿火帝及羣臣皆素服發中二千石將五校作治太常及廟令丞等皆劾大不敬以本紀修解題曰五校後漢官制屯騎步兵越騎長水射聲五營是也前漢之制則異長水校在宣曲步兵校在上林胡騎校在池陽未即調發今所將五校蓋中壘屯騎越騎射聲虎賁耳六月赦天下本紀漢孝昭皇帝元鳳五年春正月廣陵王胥來朝益封以本紀修夏大旱本紀六月發三輔郡國惡少年吏有告劾亡者屯遼東本紀解題曰備烏桓也顔師古曰惡少年謂無賴子弟也告劾亡者謂被告劾而逃亡秋罷象郡屬鬱林牂牁本紀冬十一月大雷本紀十二月庚戍宜春敬侯王欣薨以本傳修解題曰欣守扶風武帝數出幸安定北地過扶風宫館馳道修治供張辨武帝嘉之駐車拜為真其始所以進如此漢孝昭皇帝元鳳六年春正月築遼東玄莬城以本紀修解題曰備烏桓也夏赦天下本紀封張安世為富平侯本紀烏桓復犯塞遣范明友擊之本紀冬十一月乙丑御史大夫楊敞為丞相封安平侯以百官表列傳修漢孝昭皇帝元平元年春二月詔減口賦錢什三以本紀修解題曰詔曰天下以農桑為本日者省用罷不急官減外繇耕桑者益衆而百姓未能家給朕甚愍焉其減口賦錢有司奏請減十三上許之甲辰有流星大如月衆星皆隨西行以本紀修夏四月癸未帝崩于未央宫無嗣霍光請皇后遣行大鴻臚事史樂成宗正劉德等迎武帝孫昌邑王賀以紀傳荀悅漢紀修張安世為車騎將軍光祿勳以百官表列傳修六月丙寅立昌邑王為皇太子即皇帝位尊皇后曰皇太后以本紀修壬申葬平陵上諡曰孝昭皇帝以紀傳荀悅漢紀修天隂不見日月二十餘日以列傳荀悅漢紀修昌邑王有過霍光與張安世大司農田延年定議召丞相御史將軍列侯等會議未央宫奏皇太后廢賀歸昌邑賜湯沐邑二千户以紀傳通鑑目録綱目録解題曰皇太后車駕幸未央承明殿翼奉云未央宫有宣室溫室承明殿被珠襦盛服晉灼曰貫珠以為𥜗形若今單襦坐武帳中孟康曰今御武帳置兵闌五兵於帳中侍御數百人皆持兵期門武士陛戟陳列殿下顔師古曰謂執戟以衛陛下羣臣以次上殿召昌邑王伏前聽詔光與羣臣連名奏王尚書令讀奏曰丞相臣敞大司馬大將軍臣光車騎將軍臣安世度遼將軍臣明友前將軍臣增後將軍臣充國御史大夫臣誼宜春侯臣談當塗侯臣聖隨桃侯臣昌樂杜侯臣屠耆堂太僕臣延年太常臣昌大司農臣延年宗正臣德少府臣樂成廷尉臣光執金吾臣延夀大鴻臚臣賢吕祖謙據後漢官志以太常光祿勳衛尉太僕廷尉大鴻臚宗正大司農少府為九卿執金吾不與者以官志不言卿故也時光祿勳張安世兼之衛尉范明友兼之漢官名字莫詳於此左馮翊臣廣明右扶風臣德長信少府臣嘉典屬國臣武京輔都尉臣廣漢司隸校尉臣辟兵諸吏文學光祿大夫臣遷臣畸臣吉臣賜臣管臣勝臣梁臣長幸臣夏侯勝大中大夫臣德臣卬昧死言皇太后陛下臣敞等頓首死罪天子所以永保宗廟總一海內者以慈孝禮誼賞罰為本孝昭皇帝早棄天下亡嗣臣敞等議禮曰為人後者為之子也昌邑王宜嗣後遣宗正大鴻臚光祿大夫奉節使徵昌邑王典喪服斬縗亡悲哀之心廢禮誼居道上不素食使從官略女子載衣車內所居傳舍始至謁見立為皇太子常私買雞豚以食受皇帝信璽行璽大行前孟康曰漢初有三璽天子之璽自佩行璽信璽在符節臺大行前昭帝柩前也就次發璽不封顔師古曰璽既國器常當針封而王於大行前受之退還所次遂爾發漏更不封之言不重慎也從官更持節引內昌邑從官騶宰官奴二百餘人常與居禁闥內敖戲自之符璽取節十六朝暮臨令從官更持節從為書曰皇帝問侍中君卿使中御府令髙昌奉黃金千斤賜君卿取十妻大行在前殿發樂府樂器引內昌邑樂人擊鼓歌吹作俳倡會下如淳曰下謂柩之入冢葬還不居喪位便處前殿也還上前殿擊鐘磬召內泰一宗廟樂人輦道牟首鄭氏曰祭泰一神樂人也如淳曰輦道閣道也臣瓉曰牟首地名在上林苑中師古曰召泰一樂人內之於輦道牟首而鼓吹歌舞也劉攽曰輦道輦人之牟首也牟者謂岑牟也岑牟者蓋鼓角士胄即禰衡為鼓吏所著者鼓吹歌舞悉奏衆樂發長安厨三太牢具祠閣室中如淳曰黃圖北出中門有長安厨故謂之厨城門閣室閣道之有室者祀已與從官飲啖駕法駕皮軒鸞旗驅馳北宫桂宫弄彘鬭虎召皇太后御小馬車張晏曰皇太后所駕遊宫中輦車也漢廄有果下馬髙三尺以駕輦使官奴騎乘遊戲掖庭中與孝昭皇帝宫人蒙等淫亂詔掖庭令敢泄言要斬取諸侯王列侯二千石綬及墨綬黃綬以并佩昌邑郎官者免奴顔師古曰免奴謂放免為良人者變易節上黃旄以赤以劉屈氂與戾太子戰加節上黃旄遂以為常今輒改之發御府金錢刀劒玉器采繒賞賜所與遊戲者與從官官奴夜飲湛沔於酒詔大官上乘輿食如故食監奏未釋服未可御故食復詔大官趣具無關食監大官不敢具即使從官出買雞豚詔殿門內以為常獨夜設九賔溫室於溫室中設九賔之禮也延見姊夫昌邑關內侯祖宗廟祠未舉為璽書使使者持節以三太牢祠昌邑哀王園廟稱嗣子皇帝受璽以來二十七日使者旁午持節詔諸官署徵發凡一千一百二十七事文學光祿大夫夏侯勝等及侍中傅嘉數進諌以過失使人簿責勝縳嘉繫獄荒淫迷惑失帝王禮誼亂漢制度臣敞等數進諌不變更日以益甚恐危社稷天下不安臣敞等謹與博士臣霸臣雋舍臣德臣虞舍臣射臣倉議博士之職如此皆曰宗廟重於君陛下未見命髙廟不可以承天序奉祖宗廟子萬姓當廢臣請有司御史大夫臣誼宗正臣德太常臣昌與太祝以一太牢具告祠髙廟臣敞等昧死以聞皇太后詔曰可餘見通鑑昌邑之惡誠不可以君天下矣然不審之於始非霍光之罪歟誅昌邑羣臣二百餘人惟中尉王吉郎中令龔遂師王式以直諌減死以列傳修解題曰昌邑羣臣坐亡輔導之誼陷王於惡光悉誅殺二百餘人出死號呼市中曰當斷不斷反受其亂餘見通鑑蘇軾曰昌邑王廢則已矣何至誅其從官二百餘人必其中有謀光者光知之故立廢賀非專以淫亂故也二百人號呼於市曰當斷不斷此其有謀明矣特其事祕無緣得之著此者亦欲後人微見其意也武王數紂之罪孔子猶且疑之光等疏賀之惡可盡信耶秋七月霍光奏皇太后遣宗正劉德迎衛太子據之孫病已庚申入未央宫封為陽武侯已而即皇帝位謁髙廟侍御史嚴延年劾奏光擅廢立主無人臣禮不道以列傳通鑑修解題曰延年奏雖寢朝廷肅焉敬憚之吕祖謙曰大哉延年之奏也自夷齊之後一人而已事見通鑑八月己巳安平敬侯楊敞薨本紀九月大赦天下本紀戊戌御史大夫蔡義為丞相封陽平侯以百官表外傳修解題曰時大將軍光秉政議者或言光置宰相不選賢人用可顓制者光聞之曰以為人主師當為宰相何謂云云此語不可使天下聞也吕祖謙曰甚矣霍光之自恣也十一月壬子立倢妤許氏為皇后以紀傳修賜諸侯王至吏民鰥寡孤獨金錢有差本紀皇太后歸長樂宫長樂宫初置屯衛以本紀修解題曰衛太子發長樂宫衛則舊有衛士矣今兹增置故謂之屯衛也漢孝宣皇帝本始元年春正月募郡國吏民訾百萬徙平陵本紀遣使者詔郡國謹牧養風德化以本紀修霍光歸政帝謙讓不受以本紀朱熹綱目修以定䇿功增霍光張安世等封邑封御史大夫田廣明等五人為列侯賜右扶風周德等爵關內侯以本紀修解題曰詔曰褒有德賞元功張安世曰有功古今通誼也漢封國詔書皆用此數語大司馬大將軍光車騎將軍光祿勳富平侯安世宿衛忠正宣德明恩守節兼誼以安宗廟其以河北東武陽益封光萬七千户賞賜前後黃金七千斤錢六千萬雜繒三萬匹奴婢百七十人馬二千匹甲第一區益封安世萬六百尸功次大將軍光故丞相安平侯敞等居位守職與大將軍光車騎將軍安世建議定䇿以安宗廟功賞未加而薨其益封敞嗣子忠餘各以次受封又詔有司論定䇿功大將軍霍光功德過太尉絳侯周勃車騎將軍張安世丞相楊敞功比丞相陳平前將軍韓增御史大夫蔡義功比潁隂侯灌嬰太僕杜延年功比朱虛侯劉章後將軍趙充國大司農田延年少府史樂成功比典客劉揭夏四月庚午地震本紀詔內郡國舉文學髙第以本紀修五月鳳凰集膠東千乘赦天下賜吏民爵租稅勿收以本紀荀悅漢紀修解題曰劉攽曰按此賜爵不及中二千石者緣帝即位九卿率已與關內侯矣膠東今萊濰二州千乘今青淄棣博五州追諡皇太子據曰戾良姊曰戾夫人皇孫曰悼夫人曰悼后置園邑改葬以紀傳修秋七月詔立燕王旦太子建為廣陽王廣陵王胥少子𢎞為髙密王以本紀修解題曰廣陽故燕國今涿州髙密故膠西國今密濰二州之地廷尉史路溫舒上書論刑獄以列傳荀悅漢紀修解題曰溫舒為獄小吏因學律令轉為獄吏太守署決曹史元鳳中廷尉光以治詔獄路溫舒署奏曹掾守尉史會昭帝崩昌邑王廢宣帝即位溫舒上書言尚德緩刑蓋目睹上官燕王之獄吏為峻詆霍光又以刑罰痛繩羣下故其言剴切如此餘見通鑑荀悅漢紀載於本始元年黃霸為廷尉正之前通鑑乃載於地節三年十二月置廷平之前蓋因刑法志而書之也但溫舒上書後遷廣陽私府長又遷右扶風丞始願暴骨方外事下度遼將軍范明友太僕杜延年問狀按范明友以地節四年秋誅不應半載之間涉厯如此之速今從荀氏漢孝宣皇帝本始二年春以水衡錢為平陵徙民起第宅以本紀修解題曰應劭曰水衡與少府皆天子私􅟹耳縣官工作仰給司農今出水衡錢言宣帝即位為異政也晉灼曰食貨志初大司農管鹽鐵官布故置水衡欲以主鹽鐵及楊可告緡上林財物衆乃令水衡主上林上林三官主鑄錢也田延年有罪自殺本紀夏五月詔有司議孝武廟樂長信少府夏侯勝坐非議詔書丞相長史黃霸坐不舉劾下獄以列傳荀悅漢紀通鑑修六月尊孝武皇帝廟為世宗廟所幸郡國皆立廟以本紀朱熹綱目修解題曰世宗廟奏盛德文始五行之舞禮樂志孝昭采昭德舞為盛德以尊世宗廟諸帝廟皆奏文始四時五行舞云賜民爵百户牛酒以本紀修漢孝宣皇帝本始三年春正月癸亥霍光妻顯弒皇后許氏以通鑑修戊辰以田廣明等為五將軍校尉常惠持節護烏孫兵擊胸奴夏五月軍罷田廣明田順有罪自殺惠克獲封長羅侯以紀傳荀悅漢紀修解題曰漢大發關東輕鋭士選郡國吏三百石伉健習騎射者皆從軍遣御史大夫田廣明為祁連將軍出西河度遼將軍范明友出張掖前將軍韓增出雲中後將軍趙充國為蒲類將軍出酒泉雲中太守田順為虎牙將軍出五原餘見通鑑西河今勝汾石銀麟隰六州晉寧之地張掖今甘涼二州之地酒泉今肅甘沙三州之地五原今豐勝鹽三州及麟州之地大旱郡國傷甚者毋出租稅三輔民就賤者毋收事盡四年以本紀修解題曰顔師古曰收謂租賦也事謂役使也盡本始四年而止六月己丑陽平節侯蔡義薨以本紀修甲辰長信少府韋賢為丞相封扶陽侯大司農魏相為御史大夫潁川太守趙廣漢為京兆尹以百官表列傳通鑑修冬胸奴擊烏孫大雪人畜多死諸國羈屬者皆叛其國遂衰以列傳稽古録修漢孝宣皇帝本始四年春正月詔遣使者振貸困乏令大官損膳省宰減樂府人丞相至都官令丞入榖助貸以本紀修三月乙卯立霍氏為皇后賜丞相至郎吏金帛有差赦天下以本紀修解題曰霍光既隂知妻之邪謀矣而卒欲貴其女禮秩賞賜又從而侈縱焉無識甚矣王莽曹操皆以女為后蓋效光者也事見通鑑夏四月壬寅郡國地震山崩水出北海琅邪壞祖宗廟殺六千餘人詔丞相御史列侯中二千石博問經學之士三輔太常四郡國舉賢良方正地震甚者勿收租賦大赦天下上素服避正殿遣使問吏民以紀傳通鑑修解題曰胡寅曰地者妻道也臣道也宜靜而動隂盛而反常也然不能終動不過為妻道不得臣道不寧之象耳是時郡國四十九同日地震山崩二郡壞祖宗廟蓋霍氏專權又弒許后而立其女以至咎徴著見如此而不知戒宣帝詔問經學賢良亦無的言其所以然者使宣帝恐懼祗戒以象類推求而有以善處之則霍氏異日之禍亦無由而成矣餘見通鑑陳瓘曰舉賢良將以自問也不如使臣下人人傳問之為廣宣帝得之矣以夏侯勝為諌大夫黃霸為揚州刺史以朱熹綱目修鳳凰集北海以本紀通鑑修解題曰北海今青濰密三州之地廣川王吉有罪廢遷上庸自殺國除以紀傳修解題曰廣川故信都國景帝前二年為廣川國宣帝甘露四年復為信都郡今深冀保三州之地漢孝宣皇帝地節元年解題曰應劭曰先者地震山崩水出於是改元欲地得其節春正月有星孛于西方本紀三月假郡國貧民田本紀夏六月詔宗室屬籍未盡而罪絶者復屬以本紀荀悅漢紀修冬十一月楚王延夀坐附廣陵王胥謀反伏誅國除胥勿治以紀傳舉要厯補遺修解題曰彭城故楚國今徐漢屬楚國沛郡沂二州之地十二月癸亥晦日有食之本紀以水衡都尉于定國為廷尉以列傳通鑑修解題曰定國父于公為縣史郡決曹定國學法於父亦為獄史郡決曹補廷尉史以選與御史中丞從事治反者獄舉侍御史遷御史中丞由水衡都尉超為廷尉十八嵗漢用人之塗如此大事記續編卷一
