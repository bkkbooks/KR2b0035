body:
  text: 大事記續編卷五十五明王禕撰唐中宗皇帝神龍元年解題曰宋庠紀年通譜古者人君即位嵗中不改元所以申孝道踰年必改元所以正君統二者國體之本以禮為界雖聖哲愚亂皆勉企及中宗遭罹廢黜中興唐祚既踰年而不改武周之朔非無法之甚歟春正月壬午朔皇太子在東宫以朱熹綱目脩改元癸卯麟臺監張易之春官侍郎張昌宗謀作亂張柬之崔𤣥暐及羽林衛將軍敬暉桓彦範司刑少卿袁恕己等率羽林兵入禁中誅之併其兄司禮少卿同休等洛州長史薛季昶請誅武三思不從甲辰皇太子監國袁恕己為鳳閣侍郎同平章事丙午皇太子復位相王旦為安國相王太尉丁未遷武氏于上陽宫戊申上尊號曰則天大聖皇帝庚戌張柬之袁恕己同三品崔𤣥暐守内史敬暉為納言桓彦範守納言餘官賞有差二月甲寅復國號唐郊廟百官服色皆如故以神都為東都北都為并州以新舊紀通鑑脩解題曰按新舊唐書紀傳栁芳唐厯實録則天不豫張易之昌宗恐後為皇太子所誅入閣侍疾潜圖逆亂張柬之與桓彦範敬暉等建䇿將誅之柬之謂右羽林大將軍李多祚曰將軍居北門幾何曰三十年曰將軍貴寵當代非大帝恩乎多祚泣數行下曰死且不忘柬之曰今在東宫乃大帝子而嬖豎擅朝危逼宗社國家廢興在將軍將軍誠有意乎曰茍利國家惟相公處分不敢顧身及妻子因指天地以自誓遂定謀初柬之代揚元琰共乗艫江中私語外家革命元琰悲沸慷慨志在王室柬之執政引為右羽林將軍謂曰江上之言君詎忘之今可以勉又以彦範敬暉李湛並為左右羽林將軍委以禁兵易之等疑懼靈武大總管姚崇自屯所還遂參計議以武攸宜為羽林大將軍易之乃安時太子於北門起居彦範暉因得謁見宻陳大計太子從之癸卯𤣥暉柬之彦範暉湛左威衛將軍薛思行等率左右羽林兵及千騎千騎後為萬騎又為龍武軍五百餘人討易之昌宗令湛多祚太子典膳部王同皎就東宫迎太子至𤣥武門指麾將士太子拒不許同皎曰逆豎反道顯肆不軌諸將與南衙執事刻期誅之須殿下到以係衆望太子曰上方不豫得無不可乎同皎曰將相毁家族以安社稷奈何欲内之鼎鑊乎太子自出諭之衆乃止太子猶豫同皎即扶上馬從至𤣥武門殿中監田歸道押千騎宿衛𤣥武門暉等遣使就索千騎拒不與斬闗入斬易之等廡下湛率所部兵直至太后所寢長生殿環繞侍衛因奏臣等奉令誅逆臣易之昌宗恐漏大謀不獲預奏頓首請歸死后曰我於而父子不薄亦豫是耶后見中宗曰乃汝耶豎子誅可還宫彦範進曰太子今不可以歸往天皇棄羣臣以愛子託陛下今久居東宫羣臣思天皇之德不血刃清内難此天意人事歸李氏惟陛下傳位萬世不絶后乃卧不復言又令金吾將軍收易之兄汴州刺史昌期司禮少卿同休從父弟通事舍人景雄悉斬之並梟首天津橋南士庶見者莫不相賀或臠割其肉一夕都盡袁恕己從相王統南衙兵南衙者諸衛兵也時彦範等將北軍故恕己統南衙兵以備非常甲辰皇太子監國大赦天下恕己為鳯閣侍郎平章事乙巳傳位皇太子丙午即皇帝位赦天下惟易之黨與不在原限為周興來俊臣所枉陷者咸令雪免内外文武官加兩階三品已上加爵二等入五品等特減三考相王拜太尉同鳳閣鸞臺三品公主加鎮國太平公主丁未太后徙上陽宫韋述兩京記在皇城西南南臨洛水西距糓水新史志在禁苑之東東接皇城之西南隅上元中置髙宗之季常居以聴政戊申帝率百官上尊號曰則天大聖皇帝庚戌柬之為夏官尚書同鳳閣鸞臺三品𤣥暉為内史恕己同鳳閣鸞臺三品敬暉桓彦範為納言李多祚封遼陽郡王同皎為右千牛將軍琅邪郡公李湛為羽林大將軍趙國公餘封各有差餘見通鑑孫甫曰舊史書武后傳位於中宗蓋史官諱其事也然彦範傳書武三思以武后為彦範等所廢常深憤怨是廢之為實唐之天下髙祖太宗之天下也髙宗以子託后后奪其位僭竊大號毒流内外踰二十年不道至此若終身無禍何以垂戒於後况實廢之安可諱也若以彦範等奉子而廢母於事不順是不達其理春秋莊公元年夫人孫于齊以悖亂之事去其氏而貶之春秋之法可見矣用春秋之法為唐貶絶罪人則可以垂戒於後矣貶鳳閤侍郎同平章事韋承慶為髙要尉流正諫大夫同平章事房融於髙州以新紀通鑑脩姚崇罷以新紀脩甲子復皇后韋氏贈其父𤣥貞上洛王以吕祖謙標目脩大赦新紀復宗室死于周者官爵新紀丙寅太子賔客武三思為司空同三品以新紀脩貶譙王重福為濮州刺史尋徙之均州以通鑑脩丁卯散騎常侍武攸暨為司徒以新舊紀脩解題曰按新舊史列傳二張之誅也張柬之勒兵景運門長安志在東内京輔黄圖西内太極宫宫城南面東畔第一門未知孰是㑹要外命婦朝參景運門放出將遂夷諸武洛州長史薛季昶勸曰二凶雖誅産禄猶在請除之㑹日暮事遽彦範不欲廣殺因曰三思机上肉爾留為天子藉手季昶嘆曰吾無死所矣朝邑尉劉幽求謂桓彦範敬暉曰三思尚存公輩終無𦵏地若不早圖噬臍無及不從按舊史薛季㫤敬暉傳唐統紀唐厯狄梁公傳皆以為張柬之敬暉不欲誅三思通鑑因之韓琬御史臺記云張柬之勒兵于景運門將收諸武誅之彦範不従新史蓋本此葉適乃云柬之等初不欲除三思止是薛季㫤有言不知新史何所據而云然是殆未深考也事見通鑑辛未安國相王旦罷新紀丁丑武三思武攸暨罷新紀立子二人為王以本紀脩三月甲申詔昭洗文明後破家者以新紀脩夏四月辛亥桓彦範為侍中袁恕己為中書令以新紀脩以方士鄭普思為秘書監尚衣奉御葉靜能為國子祭酒以通鑑脩丁卯魏元忠為衛尉卿同平章事以通鑑脩辛未敬暉為侍中甲戌魏元忠崔𤣥暐檢校益府長史韋安石並為吏部尚書涼州都督唐休璟為輔國大將軍同三品乙亥張柬之為中書令以新紀通鑑脩五月壬午遷武氏神主于崇恩廟乙酉立太廟社稷于東郊新紀甲午敬暉等五人罷為郡王尋出崔𤣥暐為梁州刺史以吕祖謙標目脩降河内王武懿宗等十二人爵為公以通鑑脩甲辰特進豆盧欽望唐休璟為左右僕射六月癸亥欽望共平章軍國重事是後專拜僕射者不復為宰相以新紀通鑑脩韋安石為中書令魏元忠為侍中新紀秋七月辛巳太子賔客韋巨源同三品以新紀脩出張柬之為襄州刺史以通鑑脩追冊妃趙氏為皇后新紀九月癸巳韋巨源罷新紀冬十月帝幸龍門獵於新安新紀辛未魏元忠為中書令以新紀脩十一月戊寅上帝后尊號以吕祖謙標目修己丑帝幸洛城南門觀潑寒胡戲以新紀修壬寅則天大聖皇后崩廢崇恩廟以新紀通鑑修唐中宗皇帝神龍二年春正月戊寅吏部尚書李嶠同三品以新紀脩閏正月丙午制公主開府以吕祖謙標目修出敬暉桓彦範袁恕己為諸州刺史朱熹綱目三月乙未禮部尚書韋巨源為刑部尚書同三品以新紀修丙申遣十道巡察使新紀解題曰按㑹要通典貞觀十八年遣十七道巡察二十年遣二十一人以六條巡察四方垂拱二年諸道巡察使科目四十四件神龍置一道二人再朞而代景雲改按察使道各一人開元十年省十七年復置二十二年改置採訪處置使三月甲辰韋安石罷户部尚書蘇瓌守侍中戊申唐休璟罷以新紀修庚戌殺光禄卿駙馬都尉王同皎等以新紀修解題曰按新舊史列傳武三思烝濁王室同皎惡之與張仲之祖延慶周璟李悛冉祖雍謀須武后靈駕發伏弩射殺三思㑹播州司兵參軍宋之愻以外妹妻延慶延慶辭之愻固請乃成昏延慶不復疑故之愻子曇得其實之愻兄之問嘗舍仲之家亦得其謀令曇宻語三思遣俊上急變且言同皎欲擁兵闕下廢皇后帝殊不曉大怒斬同皎於都亭驛餘見通鑑大置員外官以吕祖謙標目脩夏四月殺處士韋月將黄門侍郎宋璟爭之尋出為具州刺史以通鑑脩解題曰范祖禹曰自古殺諫臣未有不亡國者中宗愚闇足以取亡而髙祖太宗德澤未逺人心天命未厭唐也故禍及其身而已矣事見通鑑五月庚申合𦵏則天大聖皇后於乾陵以新紀通鑑脩六月戊寅貶敬暉桓彦範袁恕己崔𤣥暉張柬之為逺州司馬以朱熹綱目修秋七月戊申立衛王重俊為皇太子以吕祖謙標目脩丙寅魏元忠為右僕射兼中書令李嶠守中書令以新紀脩流敬暉桓彦範袁恕己崔𤣥暐張柬之于遠州武三思尋殺之以吕祖謙標目脩冬十月癸巳蘇瓌為侍中新紀戊戌帝至自東都以吕祖謙標目脩十一月戊午流鄭普思于儋州以舊紀脩十二月己卯突厥入冦靈武大總管沙吒忠義敗于鳴沙以新紀通鑑脩解題曰按元和郡縣志神龍二年鳴沙為默啜所冦遂移縣於廢豐安城即今縣治西枕黄河人馬經此沙隨有聲故號新史地理志咸亨以靈州故鳴沙縣地置威州有鳴沙縣今環州地也通典沙州燉煌有鳴沙山非此丙申魏元忠為左僕射以新紀脩時帝女安樂公主用事以吕祖謙標目脩解題曰按新史列傳公主私請廢太子求為皇太女帝以問左僕射魏元忠元忠曰公主而為皇太女駙馬都尉當何名主恚曰山東木彊安知禮阿母子尚為天子天子女有不可乎元忠固稱不可自是語塞餘見通鑑唐中宗皇帝景龍元年春二月丙戌復武氏廟陵置韋氏廟陵以通鑑脩夏四月辛巳以公主妻吐蕃以吕祖謙標目脩六月丁卯朔日有食之新紀秋七月辛丑皇太子重俊與羽林大將軍李多祚等誅武三思及其子崇訓兵潰重俊等見殺吕祖謙標目脩解題曰按新舊史列傳元忠嫉三思專權用事思有以誅之㑹節愍太子起兵與聞其謀太子已誅三思引兵走闕下遇元忠子太僕少卿昇於永安門脅使從戰太子兵至𤣥武樓下多祚等猶豫不戰元忠又持兩端由是不克昇為亂兵所殺帝以其嘗有功且為髙宗武后素所禮置不問宗楚客紀處訥大怒固請夷其族不聴元忠不自安上政事及國封詔以特進齊國公致仕餘見通鑑唐書備闕孝和以韋氏專權與三思姦又欲加三思虎賁三百人欲為弑逆乃宻詔太子與多祚等誅三思及多祚被殺百官來朝反悲泣說太子枉殺三思賴韋后保護朕躬聞者莫不嗤笑八月丙戌上帝后尊號以新紀脩魏元忠罷尋貶死以新紀通鑑修九月丁酉吏部侍郎蕭至忠為黄門侍郎兵部尚書宗楚客左衛將軍紀處訥同三品以新紀脩庚子改元以新舊紀脩解題曰宋庠紀年通譜受尊號即位涉三年始改元云辛亥韋巨源紀處訥為侍中蘇瓌罷以新紀脩壬戌改羽林千騎為萬騎以舊紀脩冬十月戊寅殺習藝館内教蘇安恒新紀壬午彗星出于西方以新紀脩十二月乙丑朔日有食之以新紀脩唐中宗皇帝景龍二年春二月癸未有星隕於西南新紀三月丙辰朔方大總管張仁愿築三受降城於河上新紀解題曰按新史地理志在豐州元和郡縣志東城本漢雲中郡地在勝州榆林縣東北八里後屬振武節度中城本漢五原郡有天德軍西城漢朔方郡地在豊州西北八十里李華張仁亶廟碑據河山翫其動靜納行旅歸之袵席憑墉而望匹馬單兵不匿形影虜由是械手足而刳腹心朝廷無草竊之虞天下減征役之半矣秋七月癸巳朔張仁愿同三品以吕祖謙標目脩冬十一月庚申西突厥突騎施酋婆葛犯塞殺使者癸未將軍牛師奬戰于火燒城敗死安西陷以娑葛為可汗以吕祖謙標目脩解題曰按新史突厥傳突騎施烏質勒西突厥别種賀魯滅屯碎葉西北稍攻得碎葉居之謂碎葉川為大牙弓月城伊麗水為小牙其地東隣北突厥西諸胡東直西庭州神龍封懷德郡王其子娑葛襲封餘見通鑑是嵗皇后妃主昭容賣官行墨敕斜封以新紀脩唐中宗皇帝景龍三年春二月己丑帝及后幸𤣥武門觀宫女拔河為宫市以新紀脩壬寅韋巨源為左僕射同三品三月戊午宗楚客為中書令蕭至忠為侍中太府卿韋嗣立守兵部尚書並同三品中書侍郎崔湜守兵部侍郎趙彦昭為中書侍郎同平章事戊寅禮部尚書韋温為太子少保同三品太常少卿鄭愔守吏部侍郎同平章事以新舊紀脩夏五月出崔湜為襄州刺史鄭愔江州司馬以新舊紀脩秋七月丙辰娑葛降以新紀脩八月乙酉李嶠同三品蕭至忠為中書令特進韋安石為侍中以新紀通鑑修九月吏部尚書蘇瓌為右僕射同三品以新紀脩冬十一月乙丑祀南郊皇后亞獻以新舊紀脩甲戌豆盧欽望薨以新舊紀脩十二月壬辰唐休璟為太子少師同三品以新紀脩大事記續編卷五十五
