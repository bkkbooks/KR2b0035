body:
  text: 大事記續編卷六十六明王禕撰唐文宗皇帝開成五年春正月戊寅帝不豫楊嗣復李珏欲奉皇太子成美當國己邜左右神䇿軍中尉魚𢎞志仇士良立頴王瀍為皇太弟廢成美為陳王辛巳帝崩于太和殿太弟即皇帝位癸未殺成美及安王溶賢妃楊氏以新舊紀修解題曰胡寅曰昔成王不以病疾困殆而正衣冠就公卿出經逺保世之格言女子小人姦謀慝計何由得乘其隙此固周召作聖之功而成王敬德之效也文宗有美質而無聖學故始終大節懵懵焉不然當疾病時自力御殿引召宰執靣命太子臨見羣臣仇士良輩亦安得而移易之哉故孔子作春秋公薨必書其所垂教之意深矣事見通鑑長安志太和殿在大明宫追尊母為皇太后新紀以仇士良為開府儀同三司左衛上將軍以實録修二月庚申彗星出于室壁以新紀修夏五月己邜楊嗣復罷刑部尚書崔珙同平章事以新舊紀修秋八月內樞密劉𢎞逸薛季􅏢謀因山陵殺仇士良不克見殺新舊紀解題曰按舊紀八月十七日葬章陵知樞密劉𢎞逸薛季稜率禁軍護靈駕二人素為文宗奬遇仇士良惡之心不自安因是欲倒戈誅士良陳𢎞志鹵簿使王起山陵使崔鄲覺其謀先諭鹵簿諸軍是日𢎞逸季稜伏誅賈緯唐年補録亦同舊王起傳八月充山陵鹵簿使劉𢎞逸薛季稜懼誅欲因山陵兵士謀廢立起與山陵使知其謀密奏伏誅舊楊嗣復傳五年九月貶湖南明年誅季稜𢎞逸通鑑以舊紀王起傳與楊嗣復傳嵗月異同謂若已誅𢎞逸季稜不當至明年始貶嗣復等故從實録於㑹昌元年三月貶嗣復時始書𢎞逸季稜之誅蓋𢎞逸季稜謀因山陵起兵其事甚明不可以嗣復傳之誤遂致疑於其間若謂𢎞逸季稜已誅不應㑹昌元年始貶嗣復則嗣復李珏之罷與𢎞逸季稜之誅相去止數十日耳實録明年固云有再以其事動帝意者帝赫怒欲殺之始再及貶無可疑也壬戌葬章陵廟號文宗以新舊紀修庚午李珏罷新紀九月丁丑淮南節度副大使李德裕為門下侍郎同平章事以新紀修黠戞斯攻殺回鶻可汗冬十月回鶻嗢沒斯內附詔備之以吕祖謙標目修十一月彗星出于東方以新紀修何進滔卒其子都知兵馬使𢎞敬自稱魏博留後以新傳通鑑修十二月封子為王以新紀修唐武宗皇帝㑹昌元年春正月辛巳改元新舊紀二月回鶻十三部立烏介可汗以吕祖謙標目修三月甲戌御史大夫陳夷行為門下侍郎同平章事以新舊紀修帝欲誅楊嗣復李珏宰相救之乃貶為逺州刺史以吕祖謙標目修夏六月以何𢎞敬為節度使以舊紀修帝受法籙於趙歸真以吕祖謙標目修秋七月彗星出于羽林以新紀修八月仇士良加觀軍容使統神䇿左右軍以新史列傳通鑑修九月癸巳盧龍軍將陳行泰殺史元忠自稱知留務閏月軍將張絳殺行泰自稱主軍務雄武軍使張仲武請討絳冬十月以為留後以通鑑修解題曰蘇轍曰唐德宗老而厭兵凡節度使將佐之得志者皆就命留後宣武劉士寧以暴慢失衆其將李萬榮因其出畋閉門逐之帝將命以其位陸贄曰如士寧之惡萬榮棄而違之可也討而逐之可也惟伺隙而篡取其位則不可何者方鎮之臣事多專制欲加之罪誰無辭者若使傾奪之徒輒得其處則四方諸將無復安者矣且萬榮搆亂之日諸郡守將固非其同謀也一城士衆亦未必皆其黨也方成敗逆順之勢交戰於中其肯捐軀與之同惡乎今若選命賢將降詔軍中奬萬榮撫定之功别加寵任褒將士輯睦之義例賜恩賞使衆知保安則誰肯復助其亂萬榮縱欲跋扈勢亦無所至矣帝竟不許㑹昌中盧龍諸將連害帥臣最後張絳殺陳行泰李德裕以為河朔請帥皆報下太速故軍得以安若稍緩之必且有變既而回鶻烏介可汗擾天德塞軍使張仲武請以本軍擊之德裕問知仲武可用言之武宗舉以為帥張綘既為其下所殺而仲武遂以功名終德裕之謀即贄之故智也事見通鑑新史地志雄武軍在薊州故廣漢川也五代史唐紀在蔚州藥兒嶺東十一月壬寅彗星出于營室以新紀修癸邜崔鄲罷新紀唐武宗皇帝㑹昌二年春正月以張仲武為節度使以通鑑修二月丁丑淮南節度副大使李紳為中書侍郎同平章事以新舊紀修夏四月甲申嗢沒斯降以新紀通鑑修丁亥上尊號以新紀修五月回鶻逼幽州張仲武遣兵破之以通鑑修六月陳夷行罷秋七月尚書右丞李讓夷為中書侍郎同平章事以新舊紀修八月回鶻冦大同川庚午詔發兵禦之以通鑑修九月甲辰以左司員外郎白敏中為翰林學士以吕祖謙標目修冬十月丁邜封子二人為王以新紀修十一月獵于白鹿原新紀十二月立子二人為王以通鑑修是嵗吐蕃逹磨贊普死其妃之兄子乞離胡立其國內亂以吕祖謙標目修唐武宗皇帝㑹昌三年春正月庚子天德行營副使石雄大破回鶻於殺胡山迎太和公主以歸以吕祖謙標目修二月庚申朔日有食之新紀辛未崔珙罷新紀黠戞斯遣使貢馬以通鑑修夏四月乙丑劉從諫卒其姪都知兵馬使稹自稱昭義留後以新紀修仇士良罷為左衛上將軍內侍監尋卒以通鑑新史列傳修解題曰按新史列傳帝明斷雖士良有援立功內實嫌之陽示尊寵李德裕得君士良愈恐以疾辭罷為內侍監知省事因請老中人舉送還第謝曰諸君能聽老夫語乎衆唯唯士良曰天子不可令間暇暇必觀書見儒臣則又納諫智慮深吾屬恩且薄而權輕矣莫若殖財貨盛鷹馬日以毬獵聲色蠱其心極侈靡使悅不知息則必斥經術暗外事萬機在我恩澤權力欲焉往哉衆再拜餘見通鑑范祖禹曰小人莫不養其君之欲以濟己之欲使其君動而不靜為而不止則其計行矣豈獨奢靡之娛足以蕩其心哉或殖貨利或治宫室或開邊境或察臣下隨其所好以竊權寵人君樂得其欲而不知其為天下害是以政日亂而不自知惟能親正直逺邪佞則可以免斯患矣五月辛丑以王元逵何𢎞敬為招討使及河中節度使陳夷行河陽節度使王茂元河東節度使劉沔討劉稹以新紀修壬寅中書舍人崔鉉為中書侍郎同平章事以新舊紀修築望仙觀以新紀修秋七月遣刑部侍郎李回宣慰河北三鎮以通鑑修以豐州都防禦使石雄為晉絳行營節度副使以通鑑修九月辛邜忠武節度使王宰兼河陽行營攻討使以新紀修冬十月石雄破昭義兵於烏嶺以新紀通鑑修解題曰烏嶺今平陽有烏嶺山党項入冦以新紀修十二月丁巳王宰克天井關新紀解題曰天井關一名太行關在澤州晉城縣南唐武宗皇帝㑹昌四年春正月乙酉河東將楊辨逐其節度使李石尋伏誅以新紀修二月甲寅朔日有食之新紀夏四月戊寅左僕射王起同平章事充山南西道節度使以通鑑修解題曰文臣直除使相自此始六月减州縣官一千二百一十四員以通鑑修削仇士良官爵籍其家以舊紀通鑑修秋七月淮南節度副大使杜悰為右僕射同平章事閏月壬戌李紳罷以通鑑修昭義邢洺磁三州降八月軍將郭誼殺劉稹以降誼尋伏誅以新舊紀通鑑修戊申加司徒李德裕太尉衛國公以通鑑新史列傳修解題曰按新舊史紀傳實録及李德裕集李訓約劉從諫誅鄭注及甘露事宰相皆夷族傳言死非其罪從諫不平三上章請涯等罪時宦豎得志天子弱鄭覃李石新執政藉其論執以立權綱中人憚而怨之又劾奏蕭本非太后弟仇士良積怒倡言從諫志窺伺從諫亦妄言清君側因與朝廷猜二從諫蓄馬髙九尺獻之帝不納疑士良所沮怒殺馬自是招納亡命繕完兵仗志益跋扈又聞士良寵方渥愈憂惑因被病㑹昌三年四月疾甚謂妻裴曰吾父子有忠勳向雖遭飛語實無分寸反狀今軍事付之他人即一家便為所賣乃以弟子稹主軍事觀朝廷之㫖如不許更在此軍徐圖一家出計以稹為衙內都知兵馬使堂姪匡周中軍兵馬使孔目官王協為押衙親事兵馬使劉守義守忠董可武崔𤣥度將兵馬語竟而卒稹祕不發喪協謀遣將姜岑請醫于朝中使解朝政領醫官至稹云相公不任拜詔朝政欲入劉武德劉可武等躡簾而立敕使走出遣衙將梁叔文謝問疾使薛士幹入境都不問疾直作從諫已亡之意武德可武乃大出軍迎候都押衙郭誼等見敕使言河朔事體遂見監軍崔士康士康懦不敢拒乃至喪次扶稹出見三軍士幹還云不得入衙門詔從諫從弟從素令以書喻稹護喪還東都稹不奉詔詔羣臣議宰臣百寮以塞上用兵不宜中原生事潞府請以親王遙領令稹權知兵馬事李德裕曰澤潞內地不同河朔前後命帥皆用儒臣頃李抱真成立此軍德宗猶不許承襲及劉悟死敬宗方怠於政遂以符節付從諫自後跋扈難制規脅朝廷及有狗馬疾謝醫拒使便以兵屬稹捨而不討何以令四方若因循授之則威令去矣帝曰卿算用兵必尅否對曰稹所恃者河朔三鎮耳但得魏鎮不與稹同破之必矣請使近臣明告以澤潞命帥不同三鎮自艱難已來列聖許三鎮嗣襲已成故事今欲加兵誅稹邢洺磁境連魏鎮王師不欲輕出山東請兩藩收山東三郡令喻將校許賊平厚加爵賞韓愈論淮西事宜曰淄青恆冀兩道與蔡州氣類略同今因討罰元濟人情必有救助之意然皆暗弱自保無暇宜特下詔云蔡州自吳少誠已來相承為節度使亦微有功效少誠之死朕亦本擬與元濟恐其年少未能理事待其稍能緝綏許其承繼今忽自為狂悖侵掠不受朝命事不得已所以有此討罰至如淄青恆州范陽等道祖父各有功業相承命節制年嵗已久朕必不利其土地輕有改易各宜自安如妄自疑懼敢相扇動朕即赦元濟回軍討之自然膽破不敢妄有異說德裕蓋本此意也帝曰吾與德裕同之保無後悔乃令御史中丞李回使三鎮諭㫖又以忠武節度使王茂元為河陽節度使邠寧節度使王宰為忠武節度使五月茂元以兵屯萬善在懷州河南縣河東劉沔守昻車關一名芒車關在威勝軍武鄊縣北壁榆社遼州縣魏博何𢎞敬柵肥鄊侵平恩並洺州縣成德王元逵次臨洺任略堯山並宋信德府縣向城在孟州河陽縣河中陳夷行營翼城侵冀氏嵐州縣制劉從諫劉稹官並削奪元逵充北靣招討使𢎞敬充東靣招討使先時河北諸將死皆先遣使弔祭次冊賜次近臣宣尉度軍中便宜乃與即軍中不許出乃用兵大扺不半嵗不能定故皆得為之偹稹初不意即見討及茂元録詔示稹舉族號慟武寧節度使李彥佐為晉絳行營節度使六月茂元奏遣兵馬使馬繼領馬步二千人到天井關南科斗店稹遣衙內十將薛茂卿領親軍二千人至天井關詔元逵彥佐沔茂元𢎞敬取七月中旬五道齊進劉稹歸降並不得納又詔沔取昻車關路臨賊境七月以山南東道節度使盧鈞為昭義節度使德裕奏曰貞元大和間有所討伐諸道兵出境即仰給度支供餉或與賊約令懈守備得一縣一屯以報天子故師無大功請處分元逵收邢州𢎞敬收洺州茂元收澤州彥佐劉沔同收潞州勿攻縣帝然之彥佐踰月未出師乃以天德軍防禦使石雄為之副稹表臣亡父以李訓等名陷大逆纍獻封章雖遏顛危禍釁遂深呌天莫聞雖死何補伏乞稍回宸慮活臣一方𢎞敬亦表論雪稹皆不報回使河朔𢎞敬元逵具櫜鞬郊迎俯僂從命元逵出師屯趙州張仲武以幽州兵攻回鶻與劉沔不協回至諭以大義仲武欣然釋憾范祖禹曰武宗不惟使三鎮不敢逆又因以為臂指之用由德裕所以告之者能服其心也元逵拔宣務壁山名在信德府堯山縣破援軍堯山加平章事八月稹牙將李丕降用為欣州刺史𢎞敬逗遛持兩端德裕建遣王宰以陳許精甲假道於魏以代磁仍詔元逵𢎞敬以河陽太原皆隔山險進軍未得之故己邜薛茂卿破科斗寨執四將火十七柵懷州相去只十餘里以無稹命不敢入中外交章皆曰悟功高不可絶其嗣又從諫蓄兵十萬粟支十年未可破他宰相亦媕阿趍和德裕曰勝負兵家之常惟聖䇿先定不以小利鈍為浮議所搖則有功矣如不利臣請以死塞責帝忿然曰為我語於朝有沮吾軍議者先誅之羣議遂息德裕言河陽兵寡以忠武為援既以捍洛并制魏博詔宰速發五千人援河陽仍領餘軍繼進稹遣將張巨劉公直與薛茂卿同取萬善茂元欲走㑹日暮賊自潰去九月辛巳魏博奏請自涉漳取磁𢎞敬懼陳許兵入界軍中有變遂倉皇出師魏博奏守肥鄉收平恩殺傷甚衆𢎞敬加檢校左僕射以王宰兼河陽行營攻討使茂元卒以河南尹敬昕為河陽節度使宰代總萬善之師以石雄為行營節度使代李彥佐雄受命即越烏嶺破賊五寨斬獲千計時王宰屯萬善劉沔屯石㑹按晉史載記胡部大張㔨督擁衆壁上黨劉元海令石勒統之勒命㔨督姓名曰石㑹此地豈其故屯歟後魏地形志上黨郡有石井關修文殿御覽上黨郡石碎關西漢地理志上黨郡石研關石井石研石碎石㑹非偏傍誤即語音之訛竇蘋音訓嶺在今絳州垣曲縣相顧未進帝聞捷大悅曰今將帥義而勇罕雄比者十月移劉沔為鄭滑節度使以前荆南節度使李石為河東節度使陳許士票武賊衆素憚畏薛茂卿負戰勝冀厚賞或言其兵犯王略深朝廷且怒節益不可至稹然之茂卿失望乃與宰通十一月茂卿僞挑戰亟北委天井關去左右七營皆潰茂卿奔澤州使諜言於宰曰澤可取吾應於內宰疑不進失期茂卿扼腕悵恨稹聞其二召誅之以劉公直代茂卿澤州西界烏嶺安全慶守之又西北凋黃嶺凋黃山在晉州冀氏嶺東五十八里兵馬使李佐堯守之西北界接太原石㑹關兵馬使郭寮守之次南武鄉縣兵馬使康良佺守之王宰進兵欲圍澤州公直拒戰忠武軍小却公直乘勝取天井關宰進破公直劉沔又取石㑹關李石代沔稹因石兄洺州刺史恬移書乞降石以聞右拾遺崔碣表請納之帝怒斥碣鄧城令令石答書許稹靣縛石馳往受之稹不出初劉沔破回鶻以兵三千人戌橫水按回紇傳回鶻至漢南剽橫水水經注王莽之祈縣世謂之橫水又謂之陽曲河又東與舊鹵水合東南流徑鹵城在居庸縣西北二百里太和中更名禦夷鎮王逢軍榆社乞濟師詔太原助逢軍石起橫水戍千五百人令别將楊辨領之當日軍興人賜二縑治裝㑹財匱給以半又將及嵗除促令上路衆愈不悅辨乘隙激衆以亂四年正月還兵逐石與稹連和稹諸將建議我求承襲彼叛卒若與之是與反者械其使送京師使康良佺屯鼓腰嶺敗太原兵帝猶不赦帝遣中人馬元實往太原宣諭覘其所為詔太原軍盡留榆社易定軍一千騎宣武兖海步兵各二千人王逢自領收太原王元逵以兵五千扼土門張仲武扼鴈門延英對宰臣帝曰澤潞用兵方有次第忽有太原事莫妨進軍否宰臣曰太原兵馬在外諸州城鎮必不應接惟速令王逢進軍到城下必自有變德裕奏曰緣橫水猶有數千人曽經楊辨將領與亂軍同處恐辨招呼至太原又代州有度支錢物尚多得欣州斷其路即保無慮又橫水官健何清朝所管清朝極好將兼側近有仲武行營兵料辨招呼亦不動辨厚賂中人還奏曰辨兵極多德裕奏辨微賤决不可恕如國力不及寧捨劉稹辨太原軍恐妻孥無孑遺盡留客軍自收太原從五月七日至二十八日而擒辨帝謂德裕曰太原之平實卿之功德裕遜謝因奏王宰未收澤州緣宰與石雄不叶恐進兵綴却昭義大軍雄輕兵徑入功歸雄緣宰有男晏實任磁州刺史為顧望計帝有詔切責三月丁巳李石為太子少傅分司河中節度使崔元式為河東節度使石雄為河中節度使雄破賊寨三堡一壬申德裕曰凡事皆有激發之勢令其自急陛下令王宰直抵磁𢎞敬懼而全軍赴行營又令王逢領客軍收太原兵士急功自取楊辨今請劉沔移河陽令將滑州徑兵二千人直抵萬善即在王宰肘腋之下宰知朝廷此意必不遑安若便進攻得沔聲勢亦壯戊寅以沔為河陽節度使宰懼急攻陵川破賊石㑹關四月宰進攻澤州始從諫將死命稹無笞辱羣奴故季士貴等與王協尤用事士戰有功不賞下無鬭志財貨山積而協請稅商人使劉溪等分出檢實溪并齊民閲其資十取二百姓始怨從諫妻弟裴問守邢州有募兵五百號夜飛將多豪家子其家以輸資不時為溪所囚問以為言溪大怒閏七月問囚殺溪與刺史崔􅀈自歸成德軍王釗守洺州士㠿布一端稹檄代嵗稟釗謂衆曰庫物尚多欲發以為賞可乎士皆喜悉所有給之送欵魏博軍磁州將髙玉堯山將魏元談等以次降成德八月宰臣稱賀帝曰山東既順澤潞無能為宜乘此速有制置德裕曰臣等議三州當置一留後且管領三州不爾恐為立功大將所占若有請即難為可否給事中盧𢎞止素諳軍旅性又通敏帝曰只令主百姓不要領兵取潞州恐與裴問爭功詔盧鈞乘驛赴鎮稹聞三州降大懼郭誼王協等遂議圖稹時劉匡周兼押衙在院誼白稹云十三郎在衙院人皆不敢發言卒致山東如此稹召匡周納且請假匡周奮曰吾在院中人人不敢他議吾若請假族矣擊指而出誼令董可武入說云山東叛只是五舅今城內何人不自疑留後欲如何稹曰城中尚有五萬人閉門且過可武曰亦是未了義今束身入朝朝廷只左降一刺史從他郭誼知留後平寧後别求土地此上計也稹言誼安肯如此可武言已與之盟不負心可武即引誼咨事稹屏人約定入白其母裴母曰入朝大好只已遲耳吾弟尚如此郭誼安可保一切任汝稹遂素衣出門作母意令誼充都知兵馬使協輩戒大將㕔前祇候誼謝稹即入大㕔見大將稹遂居內㕔誼補置更易一夕事定明日令可武入謁稹云有公事商量稹曰何不便言曰恐驚夫人遂步步引出至北宅學院大飲半酣言今日之事欲全太尉一家願留後自圖去就朝廷必惻悼稹曰如所言稹之心也即執稹崔𤣥度斫之悉取從諫子在襁褓者二十餘并匡周等殺之誅張谷張㳂陳掦庭李仲京王渥王羽韓茂章茂實賈庠郭台甄戈十一族夷之張谷張㳂陳揚庭皆有文仲京訓之兄渥璠之子羽涯族孫茂章茂實約之子庠餗子台行餘子甘露難作皆奔從諫衣食之軍中大亂素有小嫌者即殺之流血成泥緘稹首送澤州過劉公直營寨中慟哭丙申宰臣陳賀李德裕曰今不必置三州留後盧𢎞止便充三州宣慰使元逵𢎞敬兩道亦遣𢎞止去帝曰郭誼如何處置德裕曰稹庸下亂繇誼始及窮蹙乃圖稹邀榮不誅無以懲姦臣及兵在境宜悉取逆黨送京師論如法詔石雄入潞縛誼及王協劉公直武德董可武等送京師並誅死杖崔士康殺之盧鈞停山東道節度使戊戌王宰𫝊稹首京師詔澤潞五州給復一年近昭義及當路州縣今年秋稅並免劉從諫暴賦加徴並免劉稹招收團練官健並放歸誼日望旌節移書責雄雄大怒與監軍中使同入潞州剽劫殺戮至甚誼等參賀了敕使張仲清即云郭都知告身明日當到諸高班告身即見在晚衙入來諸將及誼稍安又云晚衙㸃名喚宣之恐不得相識今且欲相見仰同赴闕遂便收縛誼等於是朝廷以王元逵兼太子太師何𢎞敬同平章事劉沔檢校司徒王宰檢校司空崔元式檢校吏部尚書石雄檢校兵部尚書丁未劉從諫暴尸潞州市戊申德裕守太尉衛國公先是韓全義敗於蔡杜叔良敗於深皆監軍宦人制其權將不得專進退詔書一日三四下宰相不豫又諸道鋭兵票士皆監軍取以自隨每督戰乘髙建旗自表師小不勝輒卷旗去大兵隨以北繇是所向多負至討回鶻澤潞德裕建請詔書付宰司乃下監軍不得干軍要率兵百人取一以為衛自是號令明一將乃有功三鎮每奏事德裕引使者戒敕為忠義指意丁寧使歸各為其帥道之故河朔畏威不敢慢初劉悟以元和十五年為昭義節度使傳三世凡二十五年范祖禹曰古之明王天下有不順者必諄諄而告教之再三不可然後征之則其民知罪而用兵有辭矣自唐之失河朔或討伐之或姑息之不聞有修訓敕之辭也是以兵加而不服恩厚而愈驕李德裕以一相而制御三鎮如運之掌使武宗享國長久天下豈有不平者乎帝既數討叛有功德裕慮忲于武不可戢奏言陛下征伐無不得所欲願以兵為戒乃可保成功帝嘉納其言武宗實録甘露之變王涯賈餗等橫罹大禍至㑹昌已易代矣朝廷不能因事洗滌明其無罪羽庠非投跡强臣莫全其軀至是不幸巳為潞卒所殺而復聲其罪以逆為名識者知德裕之及禍矣冬十月獵于鄠縣十二月獵于雲陽新紀再貶太子太傅東都留守牛僧孺為循州長史湖州刺史李宗閔流封州以列傳通鑑修解題曰按實録初僧孺宗閔亦嘗交連為聲援一旦以謀危社稷逺竄時論寃之餘見通鑑王涯賈餗之徒為士良所陷至於族滅德裕以李訓嘗陷己怒及涯輩子孫避禍逃竄德裕方目以逆徒則所謂宗閔僧孺謀危社稷之罪庸可信乎唐武宗皇帝㑹昌五年春正月己酉上尊號以新舊紀修築望仙臺於南郊通鑑庚申義安太后王氏崩以通鑑修解題曰敬宗之母也夏五月壬戌杜悰崔鉉罷乙丑户部侍郎李回為中書侍郎同平章事以新紀修解題曰悰鉉黨於僧孺者也秋七月丙午朔日有食之通鑑山南東道節度使鄭肅檢校右僕射同平章事以新紀修八月壬午大毁佛寺勒僧尼為民以新紀修解題曰按舊紀時道士趙歸真特承恩禮諫官上疏論之歸真自以涉物論遂舉羅浮道士鄧元起有長年之術帝遣中使迎之由是與衡山道士劉𤣥靖及歸真膠固排毁釋氏而拆寺之請行焉餘見通鑑胡寅曰一身正氣為邪氣所傷必以五榖六味養生之物輔之然後邪去而正復若盜跖伏於室內乃召陽虎而去之是重自伐也庸何愈此元魏用冦謙之㑹昌用趙歸真去釋氏之類也釋氏蠧民心而耗其財誠宜廢絶武宗君臣以公道行之夫豈不可而待歸真乎事見通鑑九月李德裕請置備邉庫以吕祖謙標目修大事記續編卷六十六
