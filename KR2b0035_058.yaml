雖有大柄假人擁兵太重之說亦安能回二人已成之勢哉不謹於大而謹於小知所以保身而不知所以保國此固小人之常態但力士得譽於當時無疾之者故不可不辨五月壬午加上尊號以新舊紀修六月賜安祿山鐵券通鑑甲辰以度支郎中楊國忠為給事中御史中丞判度支事王鉷加户部侍郎以通鑑新舊傳修唐𤣥宗明皇帝天寶八載夏四月殺咸寧太守趙奉璋以新紀修五月癸酉李林甫奏停折衝府上下魚書以通鑑修六月乙卯哥舒翰克石堡城以吕祖謙標目修解題曰石堡之陷八年矣至是乃復至德初又失之閏六月丙寅帝謁太清宫加𤣥元皇帝號及諸帝后諡丁卯加上尊號以新舊紀修始禘祫于太清宫朱熹綱目唐𤣥宗明皇帝天寶九載春正月羣臣請封西嶽許之既而關中旱西嶽祠災乃罷以朱熹綱目修夏五月乙卯爵安祿山東平郡王唐將帥封王自此始以吕祖謙標目修秋八月安祿山兼河北採訪處置使以通鑑修解題曰按理道要訣開元已來每道主兵處方有節度使别置度支營田使以給軍須其按俗澄清又别有採訪處置使更相檢制各得竭盡因有節將立勳承寵朝廷嘉尚復務簡省度支營田事務悉以兼之其後便為成規續又總採訪之任所以外權日重成幽陵之凶勢此事已罷五十餘年固不可再復但如寶應永泰之際有事委租庸兼之不必明下制敕因事漸收外權朔方軍毆其判官癸亥貶節度使張齊邱為濟隂太守以通鑑目録修解題曰自募丁壯長充邊軍而其弊見矣事見通鑑冬十月得妙寶真符時所在爭言符瑞以吕祖謙標目修解題曰尹喜宅之符人固謂田同秀之所為也紫微山之符則按問而知其詐矣今妙寶真符殆亦前日之類爾而帝猶不之悟耶事見通鑑安祿山誘殺奚契丹辛未入朝獻俘以吕祖謙標目修庚辰復張易之兄弟官爵以通鑑修十二月髙仙芝誘虜石國王以吕祖謙標目修南詔鳳閣羅反以吕祖謙標目修唐𤣥宗明皇帝天寶十載春正月壬辰朝獻太清宫癸巳朝享太廟甲午祀南郊以新紀修丁酉李林甫兼朔方節度副大使以新紀修二月丙辰安祿山兼河東節度使以通鑑修夏四月壬午劍南節度使鮮于仲通討南詔敗績復募兵擊之以吕祖謙標目修解題曰天下之禍莫大於用兵成敗而主不知漢武帝輪臺之詔萬里外如家人父子對面語所以行兵三十年而國不亡明皇喪師十萬而國忠更以捷聞壅蔽如此宜其養成大禍也事見通鑑秋七月髙仙芝擊大食敗績以吕祖謙標目修八月丙辰武庫災新紀安祿山擊契丹大敗以吕祖謙標目修冬十一月楊國忠領劍南節度使以舊紀通鑑目録修唐𤣥宗明皇帝天寶十一載春安祿山欲奪朔方節度副使阿布思兵二月庚午阿布思叛以新紀通鑑目録修三月乙巳改吏兵刑部為文武憲部以朱熹綱目修夏四月乙酉户部郎中王銲京兆尹邢縡謀反伏誅丙戌殺御史大夫王鉷以新紀修庚子以安思順為朔方節度使以通鑑修五月丙辰京兆尹楊國忠加御史大夫京畿採訪等使以通鑑修冬十一月乙卯李林甫薨庚申楊國忠為右相兼文部尚書以新紀修解題曰洪邁曰國忠為度支郎領十五餘使至宰相領四十餘使第署一字不能盡胥吏恣為姦欺新舊史皆不載其職案其拜相前銜云御史大夫判度支權知太府卿事兼蜀郡長史劍南節度支度營田等副大使本道兼山南西道採訪處置使兩京太府司農出納監倉祠祭木炭宫市長春九成宫等使關內道及京畿採訪處置使拜右相兼吏部尚書集賢殿崇𤣥館學士修國史太清太微宫使餘自所領又有管當租庸鑄錢等使唐𤣥宗明皇帝天寶十二載春正月楊國忠注選人於都堂一日而畢以通鑑修解題曰通典按格令內外官萬八千八十五員而合入官自諸館學生以降凡十二萬餘員其外文武貢士及應制挽郎輦腳軍功使勞徵辟奏薦神童陪位諸以親䕃并藝術百司雜直或恩賜出身受職不為常員者不可悉類大率八九人爭官一員餘見通鑑二月癸未追削李林甫官爵剖其棺以通鑑修夏哥舒翰兼河西節度使秋八月爵哥舒翰東平郡王以通鑑目録修解題曰理道要訣十載翰入朝制以其兵馬使張濯為劍南節度副使節度使則宰相楊國忠領之濯官已至列卿詣翰第辭杖煞其不忌之甚亦凌上之漸矣九月甲寅葛邏祿葉護擒阿布思以新紀修唐𤣥宗明皇帝天寶十三載春正月安祿山入朝加左僕射兼間廏隴右羣牧等使兼總監事以舊紀通鑑修二月壬申朝獻太清宫加𤣥元皇帝號癸酉享太廟增祖宗諡甲戌加上尊號以新紀修解題曰崔鶠曰唐十八君其不加尊號者髙祖太宗睿宗文宗而已而開元天寶之間至六上尊號其臣之諛亦甚矣而明皇安受而不辭其播越流離非不幸也漢光武詔天下上書不得言聖顯宗曰先帝詔書禁人言聖自今有過稱虛譽尚書宜抑而不省所以能成盛建武永平之事見通鑑丁丑楊國忠為司空是日雨土新紀安祿山奏超加將士賞以舊紀修解題曰通典開元二十年以後邀功之將務恢封略以甘上心將欲蕩滅奚契丹信安王禕討奚契丹剪除蠻吐蕃喪師者失萬而言一勝敵者獲一而言萬寵錫云極驕矜遂增哥舒翰統西方二師安祿山統東北三師踐更之卒俱受官名郡縣之積罄為祿秩於是驍將鋭士善馬精金空於京師萃於二統邊陲勢强既如此朝廷勢弱又如彼姦人乘便樂禍覬欲脅之以善誘之以利祿山稱兵內侮未必素畜凶謀地逼則勢疑力侔則亂起事理然也開元初每嵗邊費約用錢二百萬貫開元末已至一千萬貫天寶末更加四五百萬按兵部格破敵戰功各有差等其授官千才一二天寶以後邊帥怙寵便請授官易州遂成府坊州安臺府别將果毅之類每一制則同授千餘人其餘可知雖在人間無白身者關輔及朔方河隴四十餘郡河北三十餘郡每郡官倉粟多者百萬少不減五十萬石給充行官祿暨天寶末無不罄矣三月哥舒翰復河源九曲尋置神䇿軍以新紀及吕祖謙標目修夏六月乙丑朔日有食之不盡如鈎以新紀修劍南節度留後李宓擊南詔敗死以新紀修解題曰胡寅曰楊國忠鮮于仲通開南詔之隙喪師幾二十萬髙仙芝擊大食喪師三萬安祿山討奚契丹喪師六萬前此楊思勗討安南所殺十一萬夫為天養人者天子之職也將帥殺之如此而明皇不知失職久矣其能免乎事見通鑑秋八月丙戌陳希烈罷文部侍郎韋見素為武部尚書同平章事以新紀修瀍洛水溢新紀九月扶風太守房琯言水災坐貶以吕祖謙標目修冬閏十月壬寅貶武部侍郎吉溫為長史以新史列傳修解題曰按舊史傳明年溫又坐贓七千匹及奪人口馬奸穢事發貶端州髙要尉溫止於始興郡八月遣大理司直蔣琬鞠之死獄中初溫之斥𤣥宗在華清宫謂朝臣曰吉溫是酷吏子姪朕被人誑惑用之至此屢勸朕起刑獄以作威福朕不受其言今去矣卿等可安枕也餘見通鑑是嵗天下户九百餘萬口五千餘萬以稽古録修解題曰按理道要訣隋大業户僅九百萬國家至天寶末百三十年圖籍所收才如隋氏舊數唐之盛合踰西漢元始間而少三百萬直以選授多在藝文才職相乖因習生弊親簿領謂之淺俗務根本目以迂闊職事委於羣胥貨財行於公府而至此也通典天寶中計帳户約有八百九十餘萬計租稅庸調每嵗錢粟絹綿布約得五千二百二十餘萬端匹貫石新史食貨志揚州租調以錢嶺南以米安南以絲益州羅紬綾絹供春綵江南以布代租諸色資課及勾剝所獲不在其中據天寶中度支每嵗所入端匹貫石五千七百餘萬其資課及句剝等得四百六十餘萬新史食貨志云太府卿楊崇禮句剝分銖其度支嵗計粟則二千五百餘萬石布絹綿則二千七百餘萬端屯匹錢則二百餘萬貫自開元及天寶開拓邊境多立功勳每嵗軍用日增其費糴米粟則三百四十萬匹段給衣則五百二十萬别支計則二百一十萬開元以前每嵗夷戎所用不過百萬貫自後經費日廣以至於此而錫賚之費不與焉其時錢穀之司唯務割制府藏雖豐閭閻困矣尚書省度支總天下經費至德乾元之際置度支使永泰度支置態使以掌其外度支以掌其內建中初又置轉運使復歸度支分命黜陟使往諸道收户口及錢穀名數每嵗天下共斂三千餘萬貫其二千五十餘萬貫以供外費九百五十餘萬貫供京師稅米麥共千六百餘萬石其二百餘萬石供京師千四百萬石給外費唐𤣥宗明皇帝天寶十四載春二月辛亥安祿山請以蕃將代漢將從之解題曰祿山表請蕃將三十三人代漢將帝許之同平章事韋見素不悅謂國忠曰祿山反狀暴天下今又以蕃代漢難將作矣國忠不應見素曰知禍之牙不能防見患之形不能制焉用彼相明日當懇論之即入帝迎諭曰卿等有疑祿山意耶國忠見素趍下具陳祿山反狀明甚詔復位因以祿山表置帝前乃出帝命中官袁思藝傳詔曰此姑忍朕徐圖之由是奉詔宋巨幸蜀記曰自是見素數奏其凶狀竇蘋曰祿山有精兵十萬收西北良馬納之間中而兩都無誰何之夫祿山雖無反心其可已耶惜乎見素但爭祿山之叛而不能告明皇以守備不修外重太甚又以蕃代漢縱祿山不反貽後世子孫憂段秀實未嘗言朱泚反而請完禁衛何害為明達君子哉若以知人反叛為明而不知經國之大間是王衍識石勒賢於江統也餘見通鑑夏六月徵祿山入朝不至冬十月庚寅帝幸華清宫十一月甲子祿山反使節度副使賈循守范陽平盧節度副使吕知誨守平盧乙丑襲殺太原尹楊光翽解題曰按新史列傳實録包胥河洛春秋李匡文幸蜀記楊國忠謀授祿山同中書門下平章事召還朝以賈循代為范陽節度使吕知誨代為平盧節度使楊光翽為河東節度使制未下帝使中官輔璆琳賜大柑因察非常祿山厚賂之還言無他帝遂不召未幾事泄帝託他罪殺之自是始疑然祿山亦懼朝廷圖己每使者至稱疾不出嚴衛然後見黜陟使裴士淹行部至范陽再旬不見既而使武士挾引無復臣禮士淹宣詔還不敢言帝賜慶宗娶宗室女手詔祿山觀禮辭疾甚獻馬三千匹騶靮自倍車三百乘乘三士因欲襲京師河南尹達奚珣極言無內騶兵詔可帝賜書曰為卿别治一湯可㑹十月朕待卿華清宫使至祿山踞牀曰天子安穩否乃送使者别館使還言曰臣幾死冬十一月反范陽詭言奉密詔討楊國忠騰榜郡縣以髙尚嚴莊為謀主孫季哲髙邈張通儒為腹心以同羅契丹室韋等衆號曰曳落河猶言健兒以范陽平盧河東忠檀薊等衆號曰父子軍馬步相兼十五萬號二十萬師行日六十里使賈循主留務吕知誨守平盧髙秀岩守大同燕老人扣馬諫祿山使嚴莊好謂曰吾憂國之危非私也禮遣之因下令有沮軍者夷三族凡七日反書聞帝方在華清宫中外失色車駕還京師斬慶宗賜其妻康死榮義郡主亦死下詔切責祿山許自歸祿山答書慢甚叵可忍遣髙邈臧均以射生騎二千馳入太原劫取尹楊光翽殺之以張獻誠守定州祿山謀逆十餘年凡降蕃夷皆接以恩有不服者假兵脅制之所得士釋縛給湯沐衣服或重譯以達故蕃夷情僞悉得之邈最有謀勸祿山取李光弼為左司馬不納既而悔之憂見顔色久而曰史思明粗當之矣賊之未反邈為謀聲進生口直取洛陽無殺光劌天下當未有知者不從何千年亦勸令髙秀巖以兵三萬從大同取振武下朔方誘諸蕃取鹽夏鄜坊使李歸仁張通義以兵二萬道雲中取太原團弩士萬五千人取蒲關以動關中勸祿山自將兵五萬梁河陽取洛陽使蔡希德賈循以兵二萬絶海收淄青以搖江淮則天下無復事矣漢吳王濞之反也吳臣田祿伯為大將軍曰兵屯聚而西無他寄道難以立功臣願得五萬人别循江淮而上收淮南長沙入武關與大王會此亦一竒也吳王不許吳少將桓將軍曰吳多步兵步兵利險漢多車騎車騎利平地願大王所過城不下直去疾西據洛陽武庫食敖倉粟阻山河之險以令諸侯雖無入關天下固已定矣大王徐行留下城邑漢車騎至馳入梁楚之郊事敗矣王不用劉濞祿山以臣犯君天理不容人心不順田祿伯桓將軍髙邈何千年固不足以知此然使其謀或售則為漢唐之害又甚矣時兵暴起鎧仗皆穿朽鈍折不可用持挺鬭弗能亢吏皆棄城還禁衛皆市井徒既授甲不能脫弓襡弓衣音獨劍䌘劍帶必滅切乃發左藏庫繒帛大募兵餘見通鑑壬申詔以安西節度使封常清為范陽平盧節度使丙子帝還宫太僕卿安慶宗伏誅以九原太守郭子儀為朔方節度副大使衛尉卿張介然為河南節度使解題曰九原豐州按方鎮表河南節度使至德置領陳留睢陽靈昌淮陽汝隂譙濟隂濮陽淄川琅邪彭城臨淮東海乾元元年廢置汴州都防禦使尋以滑濮𨽻青密節度亳州𨽻淮西節度二年廢都防禦使置汴滑節度領滑濮汴曹宋又置河南節度領徐泗海亳潁以濮𨽻兖鄆節度潁亳𨽻鄭陳節度上元元年海𨽻青密節度廢二節度以徐泗汴宋曹𨽻淮西節度滑州𨽻滑衛節度寶應復置河南節度治汴州領汴宋曹徐潁兖鄆濮大厯領泗州潁州𨽻澤潞節度十一年廢曹兖鄆濮徐𨽻淄青節度宋潁泗𨽻永平節度汴𨽻淮西節度建中置宋潁亳節度號宣武軍興元徙治汴州丁丑金吾大將軍髙仙芝為兵馬副元帥屯陜祿山陷河北諸郡常山太守顔杲卿起兵討賊十二月辛卯祿山陷陳留郡張介然死之壬辰制徵朔方河西隴右兵癸巳祿山陷滎陽郡太守崔無詖死之丙申封常清與戰于罌子谷敗績丁酉陷東京留守李憕御史中丞盧奕等死之髙仙芝退守潼關己亥顔杲卿殺賊將克趙巨鹿等十四郡解題曰竇革音訓罌子谷在汜水西趙宋慶源府巨鹿宋信德府也三輔記潼關隋大業七年移關於南北鎮城門杭檻谷去舊關四里餘天授二年移近北臨河為路開元十三年御製碑立於華嶽祠前癸卯殺常清仙芝以哥舒翰為兵馬副元帥守潼關解題曰李匡文幸蜀記人臣為元帥自哥舒翰郭子儀房琯李光弼始事見通鑑祿山將郭秀岩冦振武子儀遣都知兵馬使李光弼武鋒使僕固懷恩等敗之解題曰宋祁曰杜牧稱安思順為朔方節度使時郭汾陽李臨淮俱為牙門都將二人不相能雖同盤飲食常睇相視不交一言及汾陽代思順臨淮欲亡去計未决旬日詔臨淮分半兵東出趙魏臨淮入請曰一死固甘乞免妻子汾陽趍下持手上堂曰今國亂主遷非公不能東伐豈懷私忿時邪及别執手涕泣相勉以忠義訖平劇盜實二人之力知其心不叛知其心難也忿必見短知其材益難也唐仲友曰按顔真卿所作臨淮碑言天寶十三載為安思順朔方兵馬使思順請為婚辭不獲免託疾罷官哥舒翰奏歸京師十四年十一月祿山反明年正月起為河東節度使又按新書汾陽以十四載十一月以節度朔方臨淮以十五載正月節度太原則杜牧所載汾陽代安思順旬日復詔臨淮持節詔至臨淮入請死汾陽持手上堂曰今國亂主遷非事實也臨淮居京師安有欲亡去事哥舒尚守潼關安有主遷事汾陽臨淮之命相去兩月亦非旬日也按李𫝊言郭子儀薦其能詔持節河東節度碑言臨淮以朔方馬步八千人出土門則臨淮入朔方軍汾陽分之兵皆當時實有之李郭不相能亦當如牧之所載汾陽棄怨舉能執手上堂及别執手涕泣相勉以忠義皆事實不如是無以為李郭也其曰欲亡去相免妻子者飾詞也濟南太守李隨單父尉賈賁平原太守顔真卿東平太守嗣吳王祗起兵討賊解題曰濟南今濟南路單父宋州縣平原今德州也河朔盡陷獨平原城守具備使司平參軍李平馳奏𤣥宗始聞亂歎曰河北二十四郡無一忠臣耶及平至帝大喜謂左右曰朕不識真卿何如人所為乃若是餘見通鑑蘇軾曰古之任人無內外輕重之異唐開元天寶間重內輕外當時公卿名臣非以罪責不出守郡雖藩鎮帥守以為不如寺監之僚佐故郡縣多不得人祿山之亂河北皆降賊獨有一顔真卿而明皇初不識也此重內輕外之弊不可不為鑒賈循謀以范陽歸國見殺以實録新舊紀通鑑修大事記續編卷五十八
