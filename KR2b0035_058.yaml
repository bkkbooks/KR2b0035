body:
  text: 大事記續編卷五十八明王禕撰唐𤣥宗明皇帝開元二十四年春二月庚午更太子及諸子名帝欲廢太子張九齡諫之以吕祖謙標目修三月壬辰始委禮部侍郎試貢舉以通鑑修張守圭使討擊使驍衛大將軍安祿山討奚契丹敗績夏四月奏請斬之敕以白衣領職以實録通鑑修解題曰蘇軾曰齊桓公不殺敬仲楚成王不殺重耳漢髙祖不殺劉濞晉武不殺劉淵苻堅不殺慕容垂明皇不殺安祿山皆盛德事也彼五人者皆無罪何名而殺祿山則有死罪矣明皇不能按法行辟而愎諌養姦何得為盛德耶事見通鑑六月初分月給百官俸以通鑑修秋八月壬子張九齡上千秋金鏡録以朱熹綱目修冬十月戊申京師地震新紀丁卯帝至自東都以新舊紀修十一月辛丑東都地震新紀壬寅裴耀卿張九齡罷李林甫兼中書令朔方節度副大使牛仙客為工部尚書同三品領朔方節度使以通鑑新紀修解題曰崔融對憲宗曰𤣥宗用姚崇宋璟張九齡韓休李元紘杜暹則理用李林甫楊國忠則亂人皆以天寶十五年祿山自范陽起兵是理亂分時臣以為開元二十四年罷賢相張九齡任奸臣李林甫理亂自此已分矣按上美張守圭之功欲以為相張九齡諫宰相者代天理物非賞功之官也乃止牛仙客在河西實倉庫修器械上欲加尚書九齡曰尚書古之納言惟舊相有德望者為之仙客河湟使典今驟居清要恐羞朝廷上默然未幾九齡罷政而仙客相矣夫相去才一年而人主之意向已轉移如此他日雖思九齡之風度何益哉事見通鑑唐𤣥宗明皇帝開元二十五年春正月初置𤣥學博士通鑑三月河西節度副大使崔希逸襲吐蕃破之以新紀修夏四月辛酉殺監察御史周子諒貶右丞相張九齡為刺史以吕祖謙標目修解題曰范祖禹曰古之殺諫臣者必亡其國明皇親為之其大亂之兆乎開元之初諫者受賞及其末也而殺之非獨此也始抑外戚焚珠玉詆神仙禁言祥瑞其終也惑女寵極奢侈求長生恱禨祥一人之身而相反如此由有所陷溺其心故也事見通鑑通鑑考異曰栁宗元周君墓碣云有唐貞臣汝南周氏諱某字某天寶中有以諂諛至相位賢臣放退公為御史抗言以白其事得死于墀下宗元此碣雖無名字其事則子諒也云在天寶年微誤乙丑廢太子瑛鄂王瑤光王琚為庶人殺之以新紀修五月癸未募丁壯長充邊軍以吕祖謙標目修解題曰按鄴侯李泌家傳唐舊制戍邊者三年一代後以其勞於道路乃募吏住三年者賜物二十段開元中遂令諸軍皆募謂之健兒李林甫又請諸軍召募長征健兒以息山東兵士於是師不土著無家族之顧殺帥自擅之兆生矣事見通鑑秋七月己卯大理寺奏斷死刑五十八有鵲來巢百官表賀庚辰封李林甫牛仙客國公解題曰范祖禹曰明皇一日殺三子而宰相以刑措受賞讒諛得志天理滅矣能無亂乎事見通鑑九月壬申頒新修律令格式以通鑑舊紀修戊子行和糴法停江淮北河運以舊紀通鑑修冬十月廣平文貞公宋璟卒以通鑑修十二月丙午惠妃武氏薨追冊為皇后以新紀修是嵗初令庸調租皆輸土物以通鑑修唐𤣥宗明皇帝開元二十六年春正月乙亥牛仙客為侍中新紀令天下州縣里置學以舊紀通鑑修壬辰李林甫兼隴右節度副大使二月乙卯牛仙客兼河東節度副大使新紀三月吐蕃冦河西崔希逸破之新紀夏五月乙酉李林甫兼河西節度副大使新紀六月庚子立忠王璵為皇太子新紀解題曰孫甫曰太子瑛之廢雖由武妃林甫亦張說之過也初忠王出見百官說有貌類太宗之言蓋昭成方娠時說侍讀東宫知其異事謂王當受天命故因事言之以廣於衆耳說事明皇情意至厚言從計行於忠王豈無密議也使明皇之意已移嬖寵之言易入說無以逃其過矣事見通鑑突騎施分為兩可汗以吕祖謙標目修秋九月丙午朔日有食之以新舊紀修庚子益州長史王昱及吐蕃戰于安戎城敗績新紀解題曰安戎城後改平戎城在重慶府南戊午冊南詔蒙歸義為雲南王以吕祖謙標目修解題曰南詔本哀牢夷後烏蠻别種也其先渠帥有六自號六詔蒙舍詔在諸部南故稱南詔居永昌姚州之間王都羊苴咩苴側加切咩密夜切城餘見通鑑地志自巂州清溪關百一十里至達伏城西南經菁口㑹川四百三十里至河子鎮城三十里渡瀘水五百四十里至姚州九十里至外沴蕩館百里至佉龍驛六十里至雲南城八十里至百崖城八十里至龍尾城四十里至羊苴咩城東南距安南水陸二千里八國志安南府至羊苴咩城五十二程是嵗作東西都道上行宫以通鑑修分左右羽林置龍武軍以通鑑修唐𤣥宗明皇帝開元二十七年春二月己巳上尊號以新紀修秋八月乙亥磧西節度使蓋嘉運擒突騎施兩可汗以吕祖謙標目修甲申追諡孔子為文宣王通鑑冬十二月更定禘祫之制以朱熹綱目修唐𤣥宗明皇帝開元二十八年春二月始興文獻公張九齡卒以通鑑修三月丁亥朔日有食之以新紀修劍南節度使章仇兼瓊克吐蕃安戎城以新紀修冬十一月牛仙客罷朔方河東節度副大使以新紀修是嵗兩都米斛不滿錢三百絹匹亦如之海內富安行萬里不持寸兵以吕祖謙標目修解題曰葉適曰史稱𤣥宗始終之異性習相逺以開元治而天寶亂也開元不得言治但盛耳韓愈言髙祖太宗既除既治髙宗中睿休養生息至於𤣥宗受報收功極熾而豐物衆地大蘖芽其間是唐人之論本以開元為盛不以為治也髙宗中睿六十年中父母骨肉相戕殺幾盡存者性命如絲髮爾𤣥宗以諸王殺韋后便超冢嫡以監國誅太平徑擅天下家禍慘烈如此君臣皆以為功不以為畏也姚宋舊相止三數嵗自用李林甫遂至二十年蓋𤣥宗以豪俊之資用人主利勢享國既久盛極而衰正自當爾不得言始終異而性習逺也唐𤣥宗明皇帝開元二十九年春正月丁酉立𤣥元皇帝廟以新紀修夏五月求明道德經莊列文子者以新紀修六月吐蕃入冦以朱熹綱目修秋七月乙亥伊洛溢以新舊紀修八月乙未特進羽林大將軍平盧兵馬使安祿山為營州都督平盧軍使以實録舊史修冬十月壬寅分北庭安西為二節度以吕祖謙標目修十一月辛未寧王憲薨諡曰讓皇帝以吕祖謙標目修十二月乙巳吐蕃陷石堡城以吕祖謙標目修唐𤣥宗明皇帝天寶元年春正月丁未朔改元以新舊紀通鑑目録修壬子分平盧為節度以安祿山為節度使時天下置十節度經略使以備邊鎮兵四十九萬人以吕祖謙標目修解題曰按舊史地理志大凡鎮兵四十九萬人戎馬八萬餘匹每嵗經費衣賜則千二十萬匹軍食則九十萬石通鑑考異曰此兵數唐厯所載也舊紀是嵗天下健兒團結彍騎等五十七萬四千七百三十三此蓋止言邊兵彼併諸州彍騎數之爾安西節度治龜兹城兵三萬馬二千七百撫寧西域統龜兹焉耆東八百里于闐南二千里疏勒西二千餘里四國北庭節度治北庭都護府兵二萬馬五千防制突騎施西北三千餘里堅昆北七千里管瀚海在城內兵一萬二千馬四千二百天山西州城內兵五千馬五百伊吾伊州西北三千里兵三千馬三百三軍河西節度治涼州兵七萬三千馬萬九千四百斷隔羌胡統赤水在城內兵三萬三千馬萬三千大斗西二百餘里兵七千五百馬二千四百建康西二百里兵五千三百馬五百寧冦瓜州西北兵五千馬四百玉門肅州西二百里兵五千二百馬六百墨離瓜州西北千里兵五千馬四百豆盧在沙州兵四千三百馬四百三守捉朔方節度治靈州兵六萬四千七百馬四千三百捍禦北狄統經略軍治城內兵二萬七百馬二千豐安軍在西黃河外兵八千馬千三百定逺城東北三百里兵七千馬三千西受降城在豆州兵七千馬千七百東受降城在勝州東北二百里兵七千馬千七百安北都護治中受降城兵六千馬二千振武軍在單于都護府城內兵九千馬千六百七軍河東節度治太原府兵五萬五千馬萬四千掎角朔方統天兵治城內兵三萬馬五千五百大同代州北三百里兵九千五百馬五千五百橫野蔚州東北一百四十里兵三千馬千八百岢嵐嵐州北百里兵一千四軍欣八兵七千百代兵四千嵐兵三千三州雲中守捉單于府西北二百里兵七千七百馬三千范陽節度治幽州兵九萬一千馬六千五百臨制奚契丹統經略在薊州城內兵萬六千馬五百威武檀州兵萬人馬三百清夷在媯州兵萬人馬三百靜塞在薊州兵萬六千馬五百恆陽恆州城東兵六千五百北平定州城西兵六千髙陽在易州兵六千唐興在莫州兵六千橫海在滄州兵六千九軍平盧軍節度治營州兵三萬七千五百馬五千五百鎮撫室韋靺鞨統平州兵萬六千馬四千二百盧龍在平州兵萬馬五百二軍榆關守捉城西四百八十里兵三千馬百安東都護府東二百七十里兵八千五百馬七百隴右節度治鄯州兵七萬五千馬萬六百備羌戎統臨洮洮州兵萬五千馬八千河源西百二十里兵四千馬六百五十白水西北二百四三十里兵千馬五百安人州界兵萬馬三百五十振威西三百里兵千威戎西北三百五十里兵千馬五十莫門洮州兵五千五百馬二百寧塞廓州兵五百馬五十積石廓州西北八十里兵七千馬三百鎮西在河州兵萬一千馬三百十軍綏和西南二百五十里兵千合川南百八十里兵千三守捉劍南節度治成都府兵三萬九百馬二千西撫吐蕃南撫蠻獠統團結營在城內兵萬四千馬八百唐制差㸃土人春夏歸農秋冬追集給身糧醬菜者謂之團結及松兵二千八百維兵四百蓬兵五百恭雅兵四百黎兵千姚兵三百悉兵五千八州兵翼州兵五百茂州兵三百拓州兵五百當州兵五百天寶恭州東南九十里兵千平戎城在恭州南八十里兵千昆明巂州南兵五千二百馬二百寧逺城在巂州西兵三百澄川守捉在姚州東六百里兵二千南江郡兵三百等六軍鎮嶺南五府經略使治廣州兵萬五千四百綏靜夷獠統經略在城內兵五千四百清海在恩州兵二千二軍桂管兵千容管兵千一百安南都護府治交州兵四千二百雍管兵千七百四經略使長樂經略使兵千五百東萊守捉兵千東牟守捉兵千至德之後中原用兵刺史皆治軍戎遂有防禦團練制置之名要衝大郡皆有節度之額冦盜稍急則易以觀察之號新地理志關內道華州鎮國軍商州興平軍鳳翔府普潤縣保義軍隴州義寧軍武州白草軍鄜州肅戎軍靈州朔方軍經略軍黃河外豐安定逺新昌等軍會州新泉守捉鹽州保塞軍夏州朔方縣天柱軍宥州延恩縣經略軍勝州義勇軍豐州中受降城天德軍天安軍安樂戍河南道滑州宣義軍陳州忠武軍汴州宣武軍登州東牟守捉萊州東萊守捉蓬萊鎮兵河東道河中府耀德軍太原府天兵軍嵐州守捉嵐谷縣岢嵐守捉欣州守捉代州守捉大同軍天安軍代北軍雲州雲中樓煩二守捉蔚州天成軍清塞軍河北道孟州河陽軍相州昭義軍鎮州恆陽軍滄州橫海軍景州南皮縣唐昌軍定州義武軍北平軍易州髙陽軍滿城縣永清軍幽州經略軍納降軍安塞軍石堆等四戍昌平縣防禦軍莫州唐興軍渤海軍平州盧龍軍栁城軍溫溝等十二戍媯州清夷軍堆北等四鎮兵橫河柴城二戍懷柔軍在媯蔚之境懷戎縣寧武軍廣邊軍檀州威武軍鎮逺軍臨河黃崖一戍燕樂縣東軍北口二守捉薊州靜塞軍雄武軍洪水鹽城守捉玉田縣壕門等七戍營州平盧軍鎮安軍渝關守捉汝羅等四守捉安東都護府安東守捉懷逺軍保定軍山南道江陵府永安軍成州靜戎軍隴右道河州鎮西軍天成軍振威軍平夷守捉鄯州安人軍威戎軍綏和合川守捉鄯城縣河源軍白水軍天威軍蘭州榆林軍臨州臨軍洮州莫門軍神䇿