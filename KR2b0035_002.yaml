body:
  text: 大事記續編卷二明王禕撰漢孝宣皇帝地節二年春三月以中郎將霍禹為右將軍以列傳朱熹綱目修庚午博陸宣成侯霍光薨以本紀修解題曰班固叙傳曰博陸堂堂受遺武皇擁毓孝昭末命道揚遭家不造立帝廢王權定社稷忠配阿衡懐禄眈寵漸化不祥隂妻之逆至子而亡事見通鑑夏四月鳳凰集魯大赦天下本紀帝始親政事封奉車都尉霍山為樂平侯領尚書事以紀傳修魏相請損霍氏權去上書副封詔相給事中以列傳通鑑目録修解題曰御史大夫三公也給事中加官卑者也以三公而兼卑官蓋上意欲引以自近故越故事而用之也事見通鑑帝五日一聽事丞相以下奉職奏事考試功能侍中尚書功勞當遷及有異善厚加賞賜至于子孫終不改易樞機周密品式備具上下相安莫有茍且之意以本紀修解題曰漢無每日常朝之禮至是始五日一聽事也蕭望之謂尚書百官之本國家樞機時𢎞恭為尚書令石顯為僕射安在其為樞機周密乎餘見通鑑以張安世為大司馬車騎将軍領尚書事以通鑑修匈奴壺衍鞮單于死弟左賢王立以列傳修甲寅漢孝宣皇帝地節三年春三月秩膠東相王成中二千石賜爵闗内侯以本紀修解題曰顔師古曰漢制秩二千石一嵗得一千四百四十石中二千石一嵗得二千一百六十石舉成數言之中者滿也事見通鑑内郡國舉賢良方正以本紀修夏四月戊申立子奭為皇太子大赦天下賜御史大夫以下爵諸侯王黄金有差以本紀修解題曰此宣帝親政第一事也五月甲申扶陽侯韋賢致仕六月壬辰以魏相為丞相封髙平侯辛丑太子太傅丙吉為御史大夫以百官表列傳修大中大夫疏廣為太子太傅廣兄子太子家令受為少傅以列傳朱熹綱目修封許皇后父廣漢為平恩侯位特進以列傳通鑑修封中郎將霍雲為冠陽侯以列傳通鑑修京師大雨雹大行丞蕭望之上書以為謁者以列傳朱熹綱目修解題曰京師雨雹望之上疏以為春秋昭公三年大雨雹是時季氏專權卒逐昭公鄉使魯君察於天變宜亡此害今陛下以聖徳居位思政求賢堯舜之用心也然而美祥未臻隂陽不和是大臣任政一姓擅執之所致也附枝大者賊本心私家盛者公室危唯明主躬萬極選同姓舉賢材以為腹心與參政謀令公卿大臣朝見奏事明陳其職以考功能如是則庶事理公道立姦邪塞私權廢矣餘見通鑑秋九月壬申地震冬十一月詔舉賢良方正直言極諌罷車騎右將軍屯兵池籞未御幸者假與貧民郡國宫館勿治流民還歸者假公田貸種食勿算事以本紀朱熹綱目修戊戌以張安世為衛将軍領尚書事兩宫衛尉城門北軍兵皆屬霍禹為大司馬罷其屯兵以百官表列傳修解題曰罷霍禹屯兵此明年誅霍氏之張本也事見通鑑按百官表左右前後將軍皆掌兵及四夷蔡質漢儀漢興置車騎將軍左右前後典京師兵衛四夷屯警蓋南北軍也太尉本兵柄則總之者又太尉也文帝使周舍為衛将軍張武為車騎將軍擊匈奴景帝使太尉亞夫将三十六将軍擊呉楚大略可見然皆有事則調發事已則罷故謂之四夷屯警也南軍則衛士之屯在宫門内衛尉所統者是也北軍則衛士之屯在未央宫之北者也産將南軍禄将北軍太尉特守虚名而已周勃既入北軍尚慮南軍必使衛尉毋内吕産馳斬長樂衛尉而後定文帝夜拜宋昌為衛將軍鎮撫南北軍以太尉為相越一年因日食之變罷衛将軍蓋罷南北軍之屯非罷其軍也武帝平百粤置中壘屯騎歩兵越騎長水胡騎射聲虎賁八校尉則其軍常屯矣或謂八校謂之増置又在北軍之外是不然以史考之可證者五表稱中壘校尉掌北軍壘門内故監軍御史穿垣壘為賈區則軍正丞斬之一也胡建傳當選士馬日監御史與護軍諸校列坐堂皇上諸校謂中壘校尉以下二也霍光之葬發北軍五校士季賢注謂不以南軍則五校北軍也三也王莽以北軍中壘為中軍北壘大司馬養士習射其中後遣九虎將北軍精兵尚數萬人四也中興省中壘置北軍中候監屯騎越騎歩兵長水射聲五營五也特其前後制度不能無損益耳十一月令郡國舉孝弟以本紀修十二月初置廷尉平四人本紀省汶山郡并蜀郡以本紀荀悦漢紀修解題曰蜀郡宋成都嘉定崇慶三府彭卬隆雅茂黎威嶲翼靜恭當悉十三州永康石泉二軍之地侍郎鄭吉破車師因田其地以通鑑修漢孝宣皇帝地節四年春二月封外祖母為博平君故鄼侯蕭何曾孫建世為侯以本紀修詔民有大父母父母喪者勿繇事荀悦漢紀夏五月山陽濟隂雨雹如雞子荀悦漢紀詔子匿父妻匿夫孫匿大父母勿坐以本紀修解題曰詔曰父子之親夫婦之道天性也雖有患禍蒙死而存之誠愛結於心仁厚之至也豈能違之哉自今子有匿父母妻匿夫孫匿大父母皆勿坐其父母匿子夫匿妻大父母匿孫罪殊死皆上請廷尉以聞陳瓘曰宣帝之政及於風俗方見於此霍雲霍山免秋七月雲山等遂與霍禹禹母宣城侯夫人顯等謀反丙申雲山禹皆伏誅夷三族八月己酉廢皇后霍氏九月封告反者五人為列侯以紀傳通鑑邵雍皇極經世修解題曰霍禹為大司馬稱病禹故長史任宣候問禹曰我何病縣官非我將軍不得至是今將軍墳墓未乾盡外我家反任許史奪我印綬令人不省死宣曰大將軍時何可復行持國權柄殺生在手中廷尉李种王平左馮翊賈勝胡及少府徐仁皆坐逆將軍意下獄死史樂成小家子得幸將軍至九卿封侯百官以下但事馮子都即紀所謂馮殷王子方等視丞相亡如也今許史自天子骨肉貴正宜耳大司馬欲用是怨恨不可禹黙然數日起視事山陽太守張敞上封事曰迺者大將軍決大計安宗廟定天下功亦不細矣夫周公七年耳而大將軍二十嵗海内之命斷於掌握方其隆盛時感動天地侵迫隂陽朝臣宜有明言曰陛下褒寵故大将軍以報功徳足矣輔臣顓政貴戚大盛君臣之分不明請罷霍氏三侯皆就第及衛将軍張安世宜賜几杖歸休時存問召見以列侯為天子師明詔以恩不聽羣臣以義固爭而後許天下必以陛下為不忘功徳而朝臣為知禮霍氏世世無所患苦今朝廷不聞直聲而令明詔自親其文非䇿之得也今兩侯已出人情不相逺以臣心度之大司馬及其枝屬必有畏懼之心夫近臣自危非完計也臣敞願於廣朝白發其端直守逺郡其路無由陛下省察上善其計然不徵也餘見通鑑敞與魏相蕭望之皆不得志於光者也光薨之後三人上疏言霍氏俱援季氏專權為證然相望之所言若未能盡除私意唯張敞辭正氣平又善處事惜不用也杜延年免以通鑑列傳修解題曰上以延年霍氏舊人欲退之魏相奏延年素貴用事官職多姦遣吏考案但得苑馬多死官奴婢乏衣食坐免官削户二千餘見通鑑吕祖謙曰以相之賢猶不免於趍附惜哉詔減鹽賈郡國嵗上繫囚掠笞庾死者丞相御史課殿最以本紀朱熹綱目修十二月清河王年有罪廢遷房陵國除以紀傳修解題曰清河故郡景帝為國今恩博冀三州大名府之地以北海太守朱邑為大司農渤海太守龔遂為水衡都尉以百官表修解題曰班固序循吏漢興之初反秦之敝與民休息凡事簡易禁罔疏闊而相國蕭曹以寛厚清靜為天下帥顔師古曰帥道也民作畫一之歌孝惠垂拱髙后女主不出房闥而天下晏然民務稼穡衣食滋殖至于文景遂移風易俗是時循吏如河南守呉公蜀守文翁之屬皆謹身帥先居以廉平不至於嚴而民從化孝武之世外攘四夷内改法度民用凋敝姦軌不禁時少能以化治稱者唯江都相董仲舒内史公孫𢎞兒寛居官可紀三人皆儒者通於世務明習文法以經術潤飾吏事天子器之仲舒數謝病去𢎞寛至三公孝昭幼冲霍光秉政承奢侈師旅之後海内虚耗光因循守職無所改作至於始元元鳳之間匈奴鄉化百姓益富舉賢良文學問民所疾苦於是罷酒𣙜而議鹽鐵矣及至孝宣繇仄陋而登至尊興於閭閻知民事之囏難自霍光薨後始躬萬幾厲精為治五日一聽事自丞相以下各奉職而退及拜刺史守相輙親見問觀其所繇退而考察所行以質其言有名實不相應必知其所以然常稱曰庶民所以安其田里而亡歎息愁恨之心者政平訟理也與我共此者其惟良二千石乎以為太守吏民之本也數變易則下不安民知其將久不可欺罔迺服從其教化故二千石有治理效輙以璽書勉厲増秩賜金或爵至闗内侯公卿闕選諸所表以次用之是故漢世良吏於是為盛稱中興焉王通曰季扎日小雅其周之衰乎孰謂季子知樂小雅烏乎衰其周之盛乎蘇軾謂札之所謂衰者蓋不覩乎文武成康之盛也通之所謂盛者言文武之餘烈厯數百年而未忘也班孟堅謂漢世良吏至孝宣而盛然則班固之謂盛亦猶小雅為周之盛乎觀者當有考焉漢孝宣皇帝元康元年解題曰改元誅霍氏故也春初為杜陵徙丞相将軍列侯吏二千石訾百萬者家杜陵以本紀修解題曰臣瓉曰杜陵在長安南五十里三月鳳凰集泰山陳留甘露降未央宫赦天下賜吏民爵鰥寡孤獨三老孝弟力田帛所振貸勿收以本紀荀悦漢紀修夏五月追尊悼考曰皇考戾夫人曰戾后立寝廟以本紀列傳修解題曰有司言禮父為士子為天子祭以天子悼園宜稱尊號曰皇考立廟因園為寝以時為享尊戾夫人曰戻后置園奉邑范祖禹曰宣帝於昭帝為孫則稱其父為皇考可也然議者終不以為是者以其以小宗而合大宗之統也程頤曰為人後者謂其所後者為父母而謂其所生者為伯叔父母此天地之大義生人之大倫不可得而變易者也然所生之義至尊至大雖當專意於正統豈得盡絶於私恩是以先王制禮既明大義降其服以正統緒然不以正統之親疏而皆為齊衰不杖期以别之則兩以明其至重而與諸伯叔父不同也宣帝稱其所生為皇考亂倫失禮固已甚矣而後之議禮者又不能推所生之至恩以明尊崇之正禮乃欲奉以髙官大國但如朞親尊屬故事則亦非至當之論也然禮謂為人後者為其父母云者猶以父母稱之何也曰既為人後則所生之父母者今為伯叔父母矣然直曰伯叔父母則無以别於諸伯叔父母而見其為所生之父母故其立文不得不爾非謂既為人後而猶得以父母名其所生之父母也胡寅曰禮曰為人後者為其父母降不敢貳尊也孟子曰天之生物使之一本覆載之内非有二本之物也復髙皇帝功臣絳侯周勃等百三十六人家以本紀荀悦漢紀修解題曰孟康曰諸復家皆世世無所與得傳同産子通鑑考異按功臣表詔復家者皆云元康四年不容盡誤故載於四年今考漢紀書於元年當是元年即下此令訪求至四年事方竟耳今從漢紀秋八月詔舉通文學者以本紀修解題曰詔曰朕不明六藝鬱于大道是以隂陽風雨未時其博舉吏民厥身脩正通文學明於先王之術宣究其意者各二人中二千石各一人趙廣漢下廷尉要斬以百官表通鑑修少府宋疇坐議鳳凰貶泗水王太傳以百官表修以諫大夫蕭望之為平原太守復徵守少府以列傳修解題曰望之為平原太守雅意在本朝上疏曰陛下悉出諫官以補郡吏所謂憂其末而忘其本者也朝無争臣則不知過國無達士則不聞善願陛下選明經術温故知新通於幾微謀慮之士以為内臣與叅政事乃徵入守少府餘見通鑑吕祖謙曰汲黯蕭望之之不欲補外蓋心在王室發於至誠非重内輕外之徒也東海太守尹翁歸為右扶風以百官表修解題曰翁歸治東海明察郡中吏民賢不肖及姦邪罪名盡知之縣縣各有記籍自聽其政有急名則少緩之吏民小解輙披籍縣縣收取黠吏豪民案致其罪髙至於死其有所取也以一警百吏民皆服恐懼改行自新東海大治以髙第入守右扶風治如在東海緩於小弱急於豪彊京師畏其威嚴扶風大治盜賊課當為三府最餘見通鑑陳瓘曰翁歸賢於廣漢逺矣莎車叛衛候馮奉世矯發諸國兵破之以奉世為光禄大夫以通鑑修漢孝宣皇帝元康二年春正月赦天下本紀解題曰與士大夫厲精更始也二月乙丑立倢伃王氏為皇后朱熹綱目三月鳳凰甘露降集賜吏民爵鰥寡孤獨髙年帛以本紀荀悦漢紀修夏五月詔二千石察官屬治獄不平者郡國疾疫者毋出今年租朱熹綱目詔更名詢以本紀修匈奴擾車師田者帝欲擊之魏相諌詔衛司馬鄭吉屯渠犂以列傳修解題曰魏相上書諫願陛下與平昌侯樂昌侯平恩侯及有識者詳議乃可上從相言乃止餘見通鑑平恩侯等許伯王元故王武也彼豈足以計天下事而相固推之此其所以稱上意歟蕭望之為左馮翊以列傳修漢孝宣皇帝元康三年春神雀集泰山賜諸侯王將軍列侯二千石金郎從官帛有差吏民爵鰥寡孤獨髙年帛以荀悦漢紀修三月封故昌邑王賀為海昏侯以木紀修以舊恩封丙吉等為列侯以通鑑修夏六月立子欽為淮陽王以本紀修解題曰張倢伃所生之子也淮陽宋淮寧開封應天三府拱亳二州之地疏廣疏受請老賜金遣歸以朱熹綱目修解題曰唐仲友曰人論二疏但以為知足不知廣以正論内忤許伯外咈丞相意上以此器重遂為二人所忌不去禍必及兼在位五嵗知元帝資質非能保全師傅者故斷然去之不然縱不為許史所害終亦必如蕭望之不殖産亦所以避禍也事見通鑑潁川太守黄霸為京兆尹尋罷歸故官朱熹綱目解題曰先是趙廣漢為潁川太守患其俗多朋黨故構㑹吏民令相告訐潁川由是以為俗民多怨讐及韓延夀徙潁川欲改更之教以禮讓乃厯召郡中長老為陳和睦親愛銷除怨咎之路長老皆以為便因與議定嫁娶喪祭儀品略依古禮不得過法百姓遵用其教數年徙為東郡太守黄霸代延夀居潁川因其迹而大治事見通鑑陳瓘曰延夀改廣漢之治黄霸因延夀之政而潁川皆治因革當也漢孝宣皇帝元康四年春正月詔年八十以上非誣告殺傷人勿坐以本紀刑法志修解題曰詔曰朕惟耆老之人髮齒墮落血氣衰微亦亡暴虐之心今或罹文法拘執囹圄不終天命朕甚憐之自今以後諸年八十以上非誣告殺傷人他皆勿坐遣太中大夫彊等循行天下以本紀修秋八月富平敬侯張安世薨以本紀修遣光禄大夫義渠安國行邊兵以列傳朱熹綱目修比年豐榖石五錢本紀解題曰金城湟中今邈川地榖斛八錢糴三百萬斛羌不敢動正此時也特邊郡價直差貴耳漢孝宣皇帝神爵元年解題曰應劭曰前年神雀集長樂宫故改元春正月帝幸甘泉郊泰畤三月幸河東祠后土改元以本紀修解題曰宣帝即位大将軍輔政上共已南面非宗廟之祠不出十二年迺下詔曰蓋聞天子尊事天地修祀山川古今通禮也間者上帝之祠闕而不親十有餘年朕甚懼焉朕飭躬齋戒親奉祀為百姓蒙嘉氣獲豐年焉明年正月上始幸甘泉郊見泰畤數有美祥修武帝故事盛車服敬齋祠之禮頗作詩歌詔曰朕承宗廟戰戰栗栗惟萬事統未燭厥理迺元康四年嘉榖𤣥稷服䖍日黒粟也神爵仍集金芝九莖産于函徳殿銅池中顔師古曰承霤也以銅為之九真獲竒獸南郡獲白虎威鳳為寳晉灼曰竒獸駒形麟色牛角仁而愛人威鳳有威儀者朕之不明震于珍物顔師古曰獲珍物而心感動也飭躬齋精祈為百姓東濟大河天氣清靜神魚舞河幸萬嵗宫神爵翔集晉灼曰汾隂有萬嵗宫朕之不徳懼不能任其以五年為神爵元年宣帝赦令為符而下者居多何其甚似乎武帝也賜吏民爵鰥寡孤獨髙年帛本紀詔祠江海雒水以郊祀志修諌大夫王吉上書不用謝病歸以列傳修解題曰吉疏言明衣服貴賤之章論男女隂陽之序選賢而除任子之令厚賞以減外戚之權減樂府省尚方此皆宣帝之闕政而三代之先務也宣帝治不本於王道則其迂闊之也宜哉事見通鑑西羌反發三輔中都官徒弛刑及佽飛射士羽林孤兒胡越騎郡國材官騎士詣金城以本紀修解題曰顔師古曰中都官京師諸官府也漢儀注長安諸官獄三十六所李竒曰弛廢也謂若今徒解鉗赭衣置任輸作也臣瓉曰秦左弋官武帝改曰佽飛官有令丞在上林苑中結繒繳弋鳬鴈以供祀宗廟服䖍曰周時度江越人在船下負船将覆之佽飛入水殺之顔師古曰取古勇力以名官熊渠之類是也亦因取其便利輕疾若飛也應劭曰天有羽林大將軍之星林喻若林木之盛羽羽翼鷙擊之意故以名武官如淳曰百官表取從軍死事者之子養羽林官教以五兵少壮令從軍漢儀注羽林從官七百人顔師古曰胡越騎之在三輔者也事見通鑑羽林至是始出征夏四月遣後将軍趙充國擊西羌六月有星孛于東方以侍中許延夀酒泉太守辛武賢為将軍與充國等並進以紀傳修秋大旱五行志詔軍旅暴露令諸侯王列侯毋朝二年以本紀修以前将軍韓増為大司馬車騎将軍領尚書事以百官表列傳修趙充國奏罷騎兵留萬人屯田以列傳修解題曰充國上屯田奏謂羌虜易以計破難用兵碎也願罷騎兵留弛刑應募及淮陽汝南歩兵與吏士私從者合凡萬二百八十一人分屯要害處繕鄉亭浚溝渠治湟陿以西道橋令可至鮮水田事出賦人二十畮四月草生發郡騎及屬國胡騎伉健各千倅馬十二就草為田者遊兵以充入金城郡益積蓄省大費上報孰計其便復奏充國上狀條不出兵留田便宜十二事因田致榖一也排折羌虜令不得歸肥饒之墬以成相畔之漸二也居民得並田作三也罷騎兵以省大費四也至春省甲士卒循河隍漕榖至臨羌以示羌虜五也以暇時下所伐木繕治郵亭六也兵不出令虜竄於風寒之地離霜露疾疫瘃墮之患七也亡經阻逺追死傷之害八也内不損威武之重外不令虜得乗間之執九也亡驚動河南大开小开十也治道橋至鮮水以制西域十一也大費既省繇役豫息十二也留屯田得十二便出兵失十二利上復賜報孰計充國奏曰先零精兵不過七八千人失地逺客分散饑凍虜破壊逺在來春騎兵雖罷虜見萬人留田從今盡二月虜馬羸瘦必不敢捐其妻子於它種中逺渉河山而來為寇又見屯田之士精兵萬人終不敢復将其累重還歸故地不戰而自破之䇿也餘見通鑑曾鞏曰始觀充國䇿先零匈奴情偽何其明也又觀遣雕庫行羌中告諭沮辛武賢先攻罕开守便宜不出師畫屯田十二利專務以恩信積榖招降羌以謂此以義用與逞詐詭疲人於一戰者絶矣末觀其語諸校曰諸君皆便文自營非為公家忠計也語中郎曰是何言之不忠也吾固以死守之語浩星賜曰吾老矣豈嫌伐一時事以欺明主哉兵執國之大事當為後法老臣不以餘命明言兵之利害卒死誰當復言之者嗚呼使有位之君子用心皆如充國之不為隱則天下豈有不治者哉充國奏疏乃兵家計䇿其實不在於屯田也先零罕开類皆烏合執不能久充國故欲以計挫之其曰兵難踰度願至金城圖上方畧又曰兵當以全取勝是幾也宣帝及在庭諸公未有能知之者充國往復議論不過糧草多少爾幾務不露也羌人見其調度異於尋常故輸誠而退充國尋亦凱還在邊自冬渉夏未嘗收粒粟不然五月榖将熟詎肯留以資敵耶充國之荅浩星賜曰兵執國之大事當為後法正是宣帝蓋始悟其幾矣魏相條漢興故事詔書采表易隂陽月令奏之以列傳修漢孝宣皇帝神爵二年春正月鳳凰集祋祤得寳璧玉器起歩壽宫以郊祀志史記大事紀修解題曰祋祤馮翊縣也二月赦天下以本紀修夏五月西羌降秋斬其大豪楊玉首初置金城屬國以本紀修匈奴虚閭權渠單于死顓渠閼氏廢其子稽侯㹪而立右賢王為握衍朐鞮單于以列傳通鑑目録修匈奴日逐王先賢撣來降遣鄭吉迎之吉都䕶西域以紀傳修九月殺司隸校尉蓋寛饒以本紀修解題曰陳瓘曰宣帝殺趙蓋韓楊皆過而寛饒尤為可惜寛饒直箴宣帝用刑法任中書之失使用其言治效當何如也事見通鑑匈奴單于遣名王奉獻賀正月本紀漢孝宣皇帝神爵三年春起樂游苑本紀解題曰三輔黄圖云在杜陵西北闗中記云宣帝立廟於曲池之北號樂游三月丙午髙平憲侯魏相薨以紀傳修解題曰張栻曰魏相所存不得為正觀其有許史之累則可見矣夫欲其説之行而假許史以為重此詭御獲禽之心君子不道也然其為相四方有異聞逆賊灾變輒奏言之其諫伐匈奴書有曰今年子弟殺父兄妻殺夫凡二百二十人臣愚以為此非小變也此他人不知為憂者而相獨憂之亦槩乎有聞矣惜其進之不以正牽制徇從之意多而感格正救之風鮮耳四月戊戍丙吉為丞相以百官表紀傳修秋七月甲子大鴻臚蕭望之為御史大夫以百官表列傳修八月益小吏俸以朱熹綱目修以東郡太守韓延壽為左馮翊以百官表列傳修漢孝宣皇帝神爵四年春二月赦天下以本紀荀悦漢紀修解題曰為嘉瑞而下也夏四月秩潁川太守黄霸中二千石賜爵闗内侯賜潁川孝弟民三老力田爵及帛以紀傳修令内郡國舉賢良以荀悦漢紀修冬十月鳳凰集杜陵十一月殺河南太守嚴延年以紀傳修解題曰延年坐怨望誹謗死刑濫甚矣然所謂是殺人多矣寧無及此乎事見通鑑十二月鳳凰集上林以本紀郊祀志修匈奴稽侯㹪立為呼韓邪單于握衍朐鞮單于自殺左大且渠立日逐王胥薄堂為屠耆單于以列傳修甲午漢孝宣皇帝五鳳元年解題曰應劭曰先者鳳凰五至因以改元春正月帝幸甘泉郊泰畤以本紀修皇太子冠皇太后賜丞相將軍列侯中二千石大夫帛又賜列侯嗣子爵五大夫男子為父後者爵一級夏赦徒作杜陵者本紀秋匈奴呼掲王右奥鞬王烏藉都尉並立為單于屠耆單于敗走之以列傳修冬十二月乙酉朔日有食之本紀殺韓延壽以紀傳修解題曰陳瓘曰宣帝為魏相殺廣漢為蕭望之殺延壽豈不知韓趙為可惜哉蓋其操術以謂尊信大臣明辨上下不得不然耳事見通鑑漢孝宣皇帝五鳳二年春正月帝幸雍祠五畤以本紀修夏四月己丑龍雒定侯韓増薨五月將軍許延壽為大司馬車騎將軍以紀傳通鑑修解題曰自是以後司馬將軍之任外戚躡居之矣秋八月詔民嫁娶郡國勿禁酒食以本紀修左遷蕭望之太子太傅以太子太傅黄霸為御史大夫以列傳修匈奴呼韓邪單于敗屠耆單于殺之呼韓邪兄左賢王屠吾斯立為郅支骨都侯單于以列傳修十二月免平通侯楊惲為庶人朱熹綱目漢孝宣皇帝五鳳三年春正月癸卯博平定侯丙吉薨二月黄霸為丞相封建成侯以本紀百官表修三月帝幸河東祠后土以本紀修詔減天下口錢赦殊死以下以本紀修遣諌大夫王褒求金馬碧雞之神以荀悦漢紀修解題曰通鑑以褒傳有宣帝時脩武帝故事之語故載於神爵元年幸甘泉之後按本傳神爵五鳳之間數有嘉應上頗作歌詩欲興協律之事知音善鼔雅琴者皆召見待詔於是益州刺史王褒欲宣風化於衆庶使褒作中和樂職宣布詩選好事者令依鹿鳴之聲習而歌之久之歌太學下轉而上聞褒自奏褒有軼材上迺徵褒詔褒為聖主得賢臣頌令褒與張子僑等並待詔頃之擢為諫大夫太子體不安苦忽忽善忘使褒等皆之東宫虞侍太子後方士言益州有金馬碧雞之寳可祭祀致也帝使褒往祀焉道病死則非神爵年間事明矣元后傳五鳳中太子所幸司馬良娣死太子悲恚發病不樂宣帝令皇后擇後宫家人子可以虞侍太子者送王政君太子宫以此尤知非神爵年間事今從荀悦漢紀載之於此如淳曰金形似馬碧形似雞後漢青蚙縣禺同山有碧雞金馬光景時時出見張敞請逺方士以郊祀志修解題曰或言益州有金馬碧雞之神詔遣王褒求之劉更生獻淮南枕中鴻寳苑秘方令尚方鑄作京兆尹張敞上疏諌後尚方待詔皆罷敞閲一年即免故書於遣褒之後置西河北地屬國以處匈奴降者本紀漢孝宣皇帝五鳳四年春正月廣陵王胥伏誅以本紀通鑑目録修解題曰廣陵故江都國武帝元狩三年更名今揚真泰三州髙郵府之地匈奴呼韓邪單于稱臣遣弟谷蠡王入侍減戍卒什二以本紀修大司農中丞耿夀昌奏糴三輔近郡榖省漕運邊郡設常平倉賜爵闗内侯以本紀食貨志修夏四月辛丑朔日有食之以五行志修遣丞相御史掾循行天下以本紀修殺楊惲以列傳修解題曰舉寃獄之使方出而惲遽當不道之誅于定國時為廷尉民自以不寃觀其奏惲妖言大逆不道是民不寃而士大夫固寃甚也惜哉事見通鑑匈奴郅支單于破呼韓邪單于都單于庭以朱熹綱目修漢孝宣皇帝甘露元年解題曰宋庠紀年通譜元年詔甘露降集京師四年詔鳳凰甘露五鳳三年祠后土甘露降神爵集至此改元以協瑞春正月帝幸甘泉郊泰畤以本紀修皇太子奭見上所用多文法吏言宜用儒生帝曰漢家自有制度本以霸王道雜之柰何純任徳教用周政歎曰亂我家者太子也以本紀修解題曰張栻曰王者之政皆無所為而為之霸者則莫非有為而然也無所為者天理義之公也有所為者人欲利之私也漢自髙祖取天下固非若湯武弔民伐罪之心其立國規模大抵皆因秦舊而無復三代封建井田公天下之心其合於王道者如約法三章為義帝發喪要亦未免有假之之意其實不孚也則其雜霸固有自來惟文帝天資為近之然亦雜於黄老刑名考其設施動皆有術但其資美而術髙耳至於宣帝則又霸之下者西京之亡自宣帝始蓋文景養民之意至是消靡盡矣且帝豈真知所謂徳教者哉王者之政本乎天理建立人紀施於萬事仁立義行而無偏弊不舉之處此古人之所以制治保邦而垂裕乎無疆者後世未嘗真知王道顧曰儒生之説迂闊而難行蓋亦未之思矣吕祖謙曰宣帝自以為能知制度所在殊不知漢家大制度自髙恵文景蕭曹絳灌養成大規模所謂其政悶悶者帝固未之識也餘見通鑑以闗内侯韋𤣥成為淮陽中尉以列傳通鑑修解題曰丞相扶陽侯賢病篤子𢎞以事繫獄宗家矯賢令以𤣥成為後𤣥成深知非賢雅意即陽狂不應召大鴻臚奏狀章下丞相御史案驗丞相御史以𤣥成實不病劾之引拜𤣥成不得已受爵帝髙其節淮陽王明察好法母張倢伃尤幸上有意欲用代太子然用太子起於細微又蚤失母故不忍也久之上以𤣥成陽狂讓侯兄乃召拜𤣥成為淮陽中尉欲感諭王輔以推讓之道太子由是遂安陳瓘曰是將以絶憲王覬覦之念消患於未萌其事豈細哉匈奴呼韓邪單于遣子右賢王入侍朱熹綱目二月丁巳樂成敬侯許延壽薨以本紀修夏四月黄龍見新豐本紀建章未央長樂宫鐘簴銅人皆生毛郊祀志丙申太上皇廟火甲辰孝文廟火上素服五日本紀冬匈奴呼韓邪單于遣弟左賢王朝賀以本紀修烏孫王死遣使立大小昆彌以列傳修漢孝宣皇帝甘露二年春正月立子囂為定陶王以荀悦漢紀修解題曰定陶故梁國景帝中六年别為濟隂國赦天下減民算三十以本紀修解題曰顔師古曰算減錢三十也朱崖郡反夏四月遣兵擊之朱熹綱目解題曰賈捐之謂自武帝立儋耳朱崖郡二十餘年間凡六反叛甘露元年九縣反發兵擊定之蓋去年又反今年始遣護軍都尉禄将兵擊之耳初元捐之建罷朱崖之議于定國以為前日興兵擊之連年護軍都尉校尉及丞凡十一人還者二人卒及轉輸死者萬人以上費用三萬萬餘兩尚未能盡降正謂是役也五月己丑于定國為御史大夫以百官表列傳修秋九月立子宇為東平王以本紀修解題曰東平故梁國景帝中六年别為濟東國武帝元鼎元年為大河郡至是為東平國宋東平襲慶二府沂濟二州之地十二月帝幸萯陽宫屬玉觀以本紀修解題曰應劭曰宫在鄠秦文王所起李斐曰萯音倍服䖍曰觀在扶風晉灼曰屬玉水鳥似鵁鶄以名觀也營平壯武侯趙充國卒以通鑑修漢孝宣皇帝甘露三年春正月帝幸甘泉郊泰畤匈奴呼韓邪單于來朝位諸侯王上稱藩臣而不名賜璽綬冠帶衣裳車馬金繒置酒建章宫二月罷歸保幕南光禄城郅支單于遁以本紀修圖畫功臣於麒麟閣通鑑目録解題曰顔師古曰漢宫閣疏麒麟閣蕭何造鳳凰集新蔡賜汝南太守新蔡長吏三老孝弟力田鰥寡孤獨帛有差民爵二級毋出今年租以本紀修三月己丑建成安侯黄霸薨以本紀列傳修解題曰樂陵侯史髙以外屬舊恩侍中貴重霸薦髙可太尉天子使尚書召問霸太尉官罷久矣丞相兼之所以偃武興文也如國家不虞邊境有事左右之臣皆将率也夫宣明教化通達幽隱使獄無寃刑邑無盜賊君之職也將相之官朕之任焉侍中樂陵侯髙帷幄近臣朕之所自親君何越職而舉之尚書令受丞相對霸免冠謝罪數日乃決自是後不敢復有所請霸死後樂陵侯髙竟為大司馬吕祖謙曰當丙魏為相帝已親細務權已在外戚特其望重尚可掩覆故君道尚未見其失及黄霸為相帝待之亡如也夫國有重臣故内則姦雄畏憚而不敢發外則夷狄震懾而不敢叛朝廷所以有此重臣者皆由人主虚心屈己養成其徳望今帝之待霸乃如此此自賊其根本也漢自髙恵以來寛大淳厚養成治體至宣帝信賞必罰綜核名實至於百工技巧咸精其能譬如元氣不實而盡發於外其死可立而待矣班固謂宣帝功光祖宗不知宣帝之治正與漢家相悖固豈足以語此五月甲午于定國為丞相封西平侯以百官表紀傳修詔諸儒講五經同異於石渠閣帝親稱制臨決立梁邱易大小夏侯尚書榖梁春秋博士以紀傳修解題曰時論易則施讐梁丘臨論書則歐陽地餘林尊周堪張山拊假倉論詩則韋𤣥成張長安薛廣徳論禮則戴聖聞人通漢春秋公羊則嚴彭祖申輓伊推宋顯許廣榖梁則尹更始劉向周慶丁姓王亥太傅蕭望之等平奏其議於是顓門之風自是益長至後漢而甚矣藝文志載尚書議奏四十二篇禮議奏三十八篇春秋議奏三十九篇論語議奏十八篇五經雜議十八篇顔師古曰三輔故事石渠閣在未央殿北以藏秘書冬烏孫公主來歸以通鑑修皇孫驁生通鑑漢孝宣皇帝甘露四年夏廣川王海陽有罪遷房陵國除以本紀列傳修冬十月未央宫宣室閣災以本紀修徙定陶王囂為楚王以列傳修匈奴呼韓邪郅支單于俱遣使朝獻以通鑑修漢孝宣皇帝黄龍元年解題曰顔師古曰此年二月黄龍見廣漢郡故改元春正月帝幸甘泉郊泰畤匈奴呼韓邪單于來朝二月歸國以本紀修郅支單于徙都堅昆以列傳修解題曰按匈奴傳堅昆東去單于庭七千里西去車師五千里唐賈眈四夷述堅昆即戛㸃斯地詔諸請詔省卒徒自給者皆止御史察計簿疑非實者按之以本紀修解題曰應劭曰時有請云詔使出者省卒徒以其直自給不復取廩假雖有進入於官非舊章也故絶之張晏曰先是武帝以用度不足宜有以益官者或奉使求不受奉禄自省其徒衆以取其廩者或自給於是姦吏縁以為利所得多於本禄故絶之三月有星孛于王良閣道入紫微宫帝寝疾以侍中樂陵侯史髙為大司馬車騎將軍蕭望之為前將軍光禄勲太子少傅周堪為光禄大夫受遺詔輔政領尚書事以本紀修解題曰踵武帝故事也宣帝不信儒學宜於經生學士落落不合然以望之經明持重材任宰相又使之與周堪傅相太子臨終選大臣可屬者遂付以受遺不可謂無所見者夫何平時所信之史髙乃居其首卒使之表裏恭顯以危正人詒厥孫謀以燕翼子宣帝豈能知之耶事見通鑑冬十二月甲戍帝崩于未央宫癸巳太子即皇帝位謁髙廟尊皇太后曰太皇太后皇后曰皇太后以本紀修解題曰太皇太后上官皇后也按上官皇后傳雖云皇太后廢王賀立孝宣皇帝宣帝即位為太皇太后而本紀不書也至宣帝崩癸巳太子即位乃書之所以元平元年歸長樂宫五鳳元年賜列侯嗣子爵止書曰皇太后不曰太皇太后通鑑既本外戚傳於元平元年書尊皇太后為太皇太后又據本紀於黄龍元年書尊皇太后為太皇太后似為重複今止於黄龍元年書之大事記續編卷二
