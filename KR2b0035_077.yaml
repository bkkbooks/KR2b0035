body:
  text: 大事記續編卷七十七明王禕撰周太祖皇帝郭威廣順元年年南唐元宗皇帝保大九年南漢中宗皇帝乾和九蜀秦國公廣政十四年保東漢帝劉旻乾祐四年髙融吳越淮海王錢俶楚王馬希蕚耶南平王遼穆宗皇帝律舒嚕應厯元年春正月丁卯漢監國威即皇帝位國號周改元大赦減耗米罷羡餘竊盜及姦並依天福以前刑名非反逆毋得誅親族籍家資以吕祖謙標目修己巳周上漢太后尊號曰昭聖皇太后以新紀修周開封尹劉勳卒以通鑑修癸酉周王峻同平章事以新史通鑑修乙亥周以王殷為天雄節度使以通鑑修戊寅周殺湘隂公贇於宋州通鑑解題曰按新五代史世家列傳髙祖二弟曰崇曰信三子曰承訓承祐承勳從弟信崇子贇承訓長而賢髙祖方屬以為嗣承訓薨髙祖悲哀疾劇乃以承祐屬諸將相楊邠等不欲領許州信在京師乃遣信就鎮信涕泣而去隱帝遇弒太祖入京師謂漢大臣必相推戴及見宰相馮道等道殊無意太祖素不拜道因不得已拜之道受之如平時徐勞之曰公行良苦太祖意色皆沮知漢未可代因白漢太后擇立漢嗣太后誥曰河東節度使崇許州節度使信皆髙祖之弟徐州節度使贇開封府尹承勳皆髙祖之子其擇嗣君周太祖與王峻入見太后言承勳宜立太后以承勳久病不任為嗣太祖與羣臣請見承勳視起居太后命以卧榻舁承勳出見羣臣視之信然乃奏曰贇髙祖愛之以為子宜立乃遣太師馮道率羣臣迎贇道揣周太祖意不在贇謂太祖曰公此舉由衷乎太祖指天為誓道既行謂人曰吾平生不為謬語人今謬語矣道見贇傳太后意召之期以來年正月五日即帝位贇乃具天子仗衛赴京師左右皆稱萬嵗至睢陽太祖自澶州擁兵而反王峻王殷遣馬軍指揮使郭崇之宋州申州刺史馬鐸之許州以伺變崇領七百騎奄至贇登樓問所以來之意對曰澶州軍變懼未察之故郭公遣兵來衛非惡意也贇召之不入馮道出與語方登樓贇執手泣下崇以周祖意開諭之初贇令護聖指揮使張令超以部兵從徐州判官董裔説贇曰崇視速言而嗄有異圖矣人皆言郭公已帝大梁陛下猶深入不止禍且至矣請急召張令超率所部兵夜劫郭崇奪其兵明日略睢陽取金帛以賞募士東還晉陽觀釁而動郭威方定京邑未暇追我此䇿之上也贇猶豫未決是夕郭崇密招令超以兵屬焉贇大懼太祖以書召道先歸贇謂道曰寡人此來所恃者公三十年舊相是以不疑今郭崇奪吾衛兵事危矣公意以為何如道默然親將賈貞數目道欲殺之贇曰勿草草豈關令公事俄而郭崇幽贇於外館誅董裔及賈貞等太后下誥降封贇湘隂公周祖即位遂害之馬鐸巡檢許州信自殺承勳後以疾卒餘見通鑑劉崇稱漢帝於太原用乾祐年號以通鑑修解題曰歐陽修曰十國之封爵外而不書則東漢之立何以書曰吾於東漢帝異其辭於九國也或謂劉旻嘗致書於周求其子贇不得而後自立然則旻之志不以亡漢為讐而以失子為讐也曰漢嘗詔立贇為嗣則贇為漢國之君不獨為旻子也旻之大義宜不為周屈其立雖未必是而義當不屈於周此其所以異乎九國矣終旻之世猶稱乾祐至承鈞立然後改元則旻之志豈不可哀也哉事見通鑑己卯周以馮道為中書令以新紀修庚辰周詔罷貢獻珍食求直言以吕祖謙標目修二月丁酉周以養子天雄衙內指揮使榮為鎮寧節度使校書郎王朴為掌書記以稽古録吕祖謙標目修三月周克徐州鞏廷美楊溫死之以新紀通鑑修解題曰歐陽修曰豫既悲湘隂公之事又嘉廷美溫之所為贇於漢非嫡長特以周氏移國畏天下而難之故假贇以俟間爾當是時天下皆知贇之必不立也然廷美溫之區區為贇守孤城以死其始終之迹何愧於死節之士哉然史氏不著其何以死豫因嘉二人之忠而悲其志然不得列於死節之士惜哉事見通鑑夏五月周追尊髙祖以來考妣為帝后以舊紀修六月辛亥周王峻為左僕射兼門下侍郎樞密副使范質為户部侍郎李穀為中書侍郎並同平章事蘇禹圭罷癸丑范質參知樞密院事以通鑑修楚朗州指揮使王逵逐武平節度使馬光惠以辰州刺史劉言為留後以吕祖謙標目修遼册東漢主崇為大漢皇帝更名旻以五代史通鑑修秋九月東漢主旻冦周以新紀通鑑修遼弒其主烏雲立德光之子齊王舒嚕改元以吕祖謙標目修戊寅楚馬希崇囚其主希蕚於衡山自為武安留後希蕚據衡山希崇召兵於唐冬十月唐信州刺史邊鎬至醴陵希崇降十一月辛酉唐遷馬氏於金陵以吕祖謙標目修解題曰按徐無黨五代史注馬殷自唐乾寧三年入湖南至周廣順元年凡五十七年東漢以遼冦晉州甲子周遣王峻救之以通鑑新紀修丙寅南漢取楚桂州盡有嶺南之地以吕祖謙標目修十二月東漢遼兵敗歸以通鑑修唐封留從效為晉江王以十國紀年修周太祖廣順二年年南唐元宗皇帝保大十年中宗皇帝乾和十蜀秦國公廣政十五年南漢東漢帝劉旻乾祐五年南南平王髙保融二吳越淮海王錢俶湖劉言遼應厯年春正月周慕容彥超反甲子以侍衛步軍都指揮使曹英為兖州都部署唐遣兵救之敗走以新紀通鑑修夏四月丙戌朔日有食之通鑑五月庚申周主討慕容彥超乙亥伏誅以吕祖謙標目修六月乙酉朔周主如曲阜謁孔子庚子至自兖州以新紀修周朔方節度使馮暉卒其子繼業自知軍府事以為留後以吕祖謙標目修周始詔犯鹽麯以斤兩定刑以通鑑修解題曰按會要廣順二年九月敕犯鹽麯一斤已下至一兩杖八十配役五斤已下一斤已上徒三年配役五斤已上並決重杖一頓處死冬十月劉言遣王逵攻唐武安節度使邊鎬走之復馬氏嶺北地以吕祖謙標目修辛亥周制訴訟先厯縣州觀察使乃詣臺省以吕祖謙標目修劉言徙治朗州以吕祖謙標目修周太祖皇帝廣順三年十南唐元宗皇帝保大十一年南漢中宗皇帝乾和一年蜀秦國公孟昶廣政十六年淮東漢帝劉旻乾祐六年吳越海王錢俶湖南王逵南平王髙保融遼應厯三年春正月丙辰周以劉言為武平節度使王逵為武安節度使朗州指揮副使周行逢為行軍司馬以通鑑修乙丑周以營田務𨽻州縣以通鑑修周王峻領平盧節度使以新史列傳修解題曰按新史列傳峻為樞密使兼宰相又求兼領平盧已受命暫之鎮餘見通鑑周更作二寶朱熹綱目二月甲子周貶王峻為商州司馬三月甲申周以養子榮為開封尹晉王以通鑑修解題曰安重誨之欲去潞王以明宗有子故也周太祖無親子而王峻惎間榮其意安在哉使峻不貶則榮之得立未可知也事見通鑑夏王逵襲朗州執劉言而代之秋八月逵移治潭州以周行逢知朗州以吕祖謙標目修九月周大水以通鑑修周始立圓丘社稷太廟迎神主於洛陽以通鑑修冬十二月乙丑周王殷入朝壬申殺之以吕祖謙標目修解題曰按唐末泛聞録十二月將有事於南郊時髙祖久不豫又聞王殷潛謀不軌召之恐不從命乃謀因郊祀肆覲方鎮殷果不自疑來朝明年正月朔助祭畢命歸本鎮縊之於夷門山餘見通鑑夷門山在東京開封縣周世宗皇帝郭榮顯德元年十南唐元宗皇帝保大十二年南漢中宗皇帝乾和三年蜀秦國公孟昶廣政十七年海東漢劉旻乾祐七年融吳越淮王錢俶湖南王逵南平王髙保遼應厯四年春正月丙子朔周祀圜丘改元以新紀通鑑修戊寅周罷鄴都以新紀修解題曰王殷既誅故也庚辰周晉王榮判內外兵馬事以通鑑修戊子周以馮繼業為節度使以通鑑修河決周靈河漁原武等八口分遣使者塞之以通鑑修壬辰周端明殿學士户部侍郎王溥為中書侍郎同平章事以殿前都指揮使李重進領武信節度使馬軍都指揮使樊愛能領武定節度使步軍都指揮使何徽領昭武節度使是日周主威殂丙申晉王榮即皇帝位以新紀修二月東漢主旻以契丹冦周潞州三月乙酉周主自將攻之癸巳戰於髙原大敗之追至髙平又敗之丁酉周主如潞州己亥樊愛能何徽伏誅以趙匡胤為殿前都虞候壬寅天雄節度使符彥卿為河東都部署以新紀稽古録吕祖謙標目修夏四月庚申周太師中書令瀛王馮道卒以通鑑修壬戌周立衛國夫人符氏為皇后以新紀修庚午周主如太原以新紀修五月甲戌朔王逵徙治朗州以周行逢知潭州以吕祖謙標目修遼救東漢丙申周符彥卿及遼戰於欣口敗績以新紀修解題曰方輿記欣州北三十里至范池驛又北二十五里至欣州口驛水經注呼沱南厯欣中口俯會欣川水水出西管涔東山也辛丑周以折德扆為永安節度使以通鑑修六月庚午周主至自太原以新紀修冬十月周大簡諸軍募壯士詣闕選為殿前諸班以吕祖謙標目修戊辰周罷捕盜使臣専委州縣以吕祖謙標目修十一月東漢主旻殂子鈞即帝位以吕祖謙標目修周世宗皇帝顯德二年十南唐元宗皇帝保大十三年南漢中宗皇帝乾和三年蜀秦國公孟昶廣政十八年淮東漢帝劉鈞乾祐八年吳越海王錢俶湖南王逵南平王髙保融遼應厯五年解題曰宋庠紀年通譜世宗即位凡六年不改元恭帝踰嵗而亡亦仍故號一元三世古未之聞兹禮之失始於唐中宗厥襲其迹者真偽八君而漢周二朝尤為巨謬劉以乾祐興滅郭柴以顯德始終庸非喪亂荐臻禮法前壞天厭其禍將啓聖人若曰受命而王者乃能改元布度為天下正此建隆所以承五代之弊而克復舊章頒朔之文於是乎正矣春正月庚辰周詔漕運給耗以吕祖謙標目修辛卯周初令翰林學士兩省官舉令録以吕祖謙標目修周浚胡盧河以吕祖謙標目修解題曰今冀州信都縣有胡盧河即衡漳水别名李晏口二月庚子朔日有食之通鑑壬戌周求直言以新紀修夏四月乙卯周廣汴京外城以通鑑修解題曰按宋敏求東京記舊城唐李勉築周二十里一百五十五步宋號關城東面二門曰望春麗景南面三門曰朱雀保康崇明西面二門曰宜秋閶闔北面三門曰景龍安逺天波新城周四十八里二百三十二步東面二門南延春北含輝南面三門東朱雀中景風西畏景西面二門南迎秋北肅政北面三門西玄德中長景東愛景實録朱梁建國都城制度未備好利者復恣侵占九衢之中容軌者才一兩街上命開拓以繩直洞豁為務居人保其第者惟一二周比部郎中王朴獻開邊䇿尋擢為諫議大夫知開封府事以吕祖謙標目修五月辛未周遣宣徽南院使向訓鳯翔節度使王景伐蜀以新紀修甲戌周大毁佛寺禁私度僧尼以新紀吕祖謙標目修秋九月丙寅朔周置錢監毁銅器佛像以吕祖謙標目修閏月周取蜀秦成階三州以吕祖謙標目修冬十一月乙未朔周以李穀為淮南都部署伐唐以吕祖謙標目修周疏汴河以吕祖謙標目修解題曰見漢永平十二年解題戊申周取蜀鳯州吕祖謙標目唐清淮節度使劉仁贍守夀州李穀攻之以吕祖謙標目修周世宗皇帝顯德三年十南唐元宗皇帝保大十四年南漢中宗皇帝乾和四年蜀秦國公孟昶廣政十九年海東漢帝乾祐九年行南平王髙保融年吳越淮王錢俶湖南周逢遼應厯六春正月壬寅周主伐唐唐都部署劉彥貞救夀州李穀退保正陽侍衛親軍都指揮使李重進大破彥貞於正陽東斬之甲寅以重進為淮南都招討使解題曰今穎州穎上縣有正陽鎮或云西正陽蓋安豐又有東正陽也丙辰周主圍夀州二月壬申取滁州壬午唐主景使其臣鍾謨稱臣請平丙戌取唐揚州唐殺吳讓皇之族於泰州辛卯取唐泰州以新紀修周嶽州團練使潘叔嗣襲朗州殺王逵迎周行逢行逢殺之以吕祖謙標目修三月唐主景遣司空孫晟表請罷兵周取唐光舒蘄三州以新紀通鑑修吳越克唐常州唐龍武都虞候柴克宏大敗之唐主景遣齊王景逹救夀州夏四月復泰州己巳周主循淮而東景逹至六合敗還五月乙卯周主至自淮南六月唐以駕部員外郎朱元將兵復江北以吕祖謙標目修秋七月辛卯周以周行逢為武平節度使以吕祖謙標目修周皇后符氏殂以新紀修唐復取光舒蘄和滁揚等州以吕祖謙標目修八月戊辰周行欽天厯以通鑑修九月周以端明殿學士王朴為户部侍郎樞密副使以吕祖謙標目修冬十月丙子周詔夏稅六月秋稅十月起徵以吕祖謙標目修周山南東道節度使安審琦入朝以為太師遣還鎮以吕祖謙標目修甲申周以趙匡胤為定國節度使殿前都指揮使匡胤表渭州軍事判官趙普為節度推官以通鑑修十一月周殺孫晟以新紀通鑑修周召華山隱士陳摶戊申遣還山以吕祖謙標目修周世宗皇帝顯德四年十南唐元宗皇帝保大十五年南漢中宗皇帝乾和五年蜀秦國公孟昶廣政二十年海東漢帝天會元年行南平王髙保融年吳越淮王錢俶湖南周逢遼應厯七春正月己丑朔東漢改元以吕祖謙標目修二月乙亥周主如夀州以吕祖謙標目修三月辛卯唐朱元降周周大破唐軍於紫金山齊王景逹走以吕祖謙標目修解題曰紫金山在安豐夀春縣北與八公山相連唐劉仁贍疾甚其將以夀州降周仁贍卒徙夀州於下蔡以吕祖謙標目修夏四月己巳周主至自夀州以新紀修乙酉周通汴於五丈河以吕祖謙標目修解題曰按李燾長編五丈河泥淤不利行舟宋建隆元年詔陳承昭於京城西夾汴河造斗門自滎陽鑿渠百餘里引京索二水通壕入斗門以大木架汴流導水以過其上北注為河廣五丈貫曹鄆以入黃河嵗運京東芻粟唐濠州都監郭廷謂斷渦口浮梁以吕祖謙標目修秋八月乙亥周李穀罷吕祖謙標目周以王朴為樞密使以新紀修九月周中書舍人竇儼請修禮樂以吕祖謙標目修冬十月壬申周主攻淮南十二月唐泗濠二州降復取揚泰二州以吕祖謙標目修周世宗皇帝顯德五年六南唐元宗皇帝顯德五年年南漢中宗皇帝乾和十年恩赦侯劉鋹大寶元蜀秦國公孟昶廣政二十一年錢東漢帝天會二年南平王髙保融吳越淮海王俶湖南周行逢厯遼應八年春正月唐改元中興吕祖謙標目丁未周克唐海州壬辰克靜海軍丁未克楚州以通鑑修三月丁亥唐改元交泰以吕祖謙標目修唐獻廬舒蘄黃四州於周江北悉平以吕祖謙標目修周浚汴口逹於淮以通鑑修夏四月壬申周主至自淮南以新紀通鑑修解題曰按新舊史紀傳世家實録劉恕十國紀年陸遊南唐書自楊氏有吳吳即南唐嵗暮淮涸輒增戍以備侵軼監軍吳廷紹以為無事徒費糧糗罷之清淮清淮軍即夀春府節度使劉仁贍表陳不可罷未及行世宗顯德二年十一月乙未詔以宰臣李穀為淮南道行營都部署許州節度使王彥超為副侍衛馬軍都指揮使韓令坤以下十二將各帶征將之號攻自夀州始報至唐上下失色仁贍獨部分號令間暇如平時唐以神武統軍劉彥貞為北面都部署帥師三萬赴夀州奉化節度使皇甫暉為應援使常州團練使姚鳯為應援都監帥師三萬屯定逺唐召鎮南軍節度使宋齊丘入朝謀難齊丘請徵諸郡兵屯淮泗以裨將有才略者主之聲言偏師敵人不測其實必難輕進春水時至糧道阻隔懸軍日久自當遁去然後遣使請平庶可無大喪敗議者不同遂止壬戌李穀奏先鋒破賊於來逺鎮在安豐縣西北四十五里謂之臨頴口西正陽也十二月甲戌奏破賊二千人於夀州己卯奏破賊千餘人於山口鎮在夀春縣東六十里三年正月丁酉奏破賊於上窑濠州渦口西南戊戌發丁夫十萬城京師庚子詔幸淮南以宣徽南院使向訓權東京留守端明殿學士王朴為副壬寅發京師武平節度使王逵南面都統入淮南界先是李穀軍城下曉夕攻擊既而淮南援軍大至乃與將佐謀曰賊舟䑲將及正陽東正陽也吾無水戰之具才一橋梁不守則大軍隔絶矣不如退守正陽西正陽也浮橋以俟鑾輅諸將皆以為然遂焚糧草而退兵回無復嚴整多失亡帝聞之遣侍衛都指揮使李重進率師赴之曰唐兵且至宜急擊之穀又請大駕且駐陳穎以觀賊勢上不悅劉彥貞旌旗輜重數百里聞穀退軍急追之仁贍以為不可彥貞不聽仁贍獨按兵城守發戰棹百艘泝淮而上且張斷橋之勢彥貞列陳而進比及正陽而重進先至壬寅率諸將渡橋與賊遇合勢擊之斬彥貞擒偏將咸師朗已下斬首萬餘級伏尸三十里獲戈甲三十萬降者三千人上大悅甲寅車駕至正陽以重進為淮南道都招討使李穀判夀州行府事乙卯車駕渡淮丙辰營於淝水之陽移正陽浮橋於下蔡頴州縣丁巳命趙匡胤本文作今上後倣此領兵赴濠州城下徵宋亳陳穎徐宿許蔡等州丁夫數十萬以攻城庚申耀兵城下壬戌匡胤奏破賊萬餘衆於渦口在濠州鍾離縣西九十里有唐大中濠州刺史充本州團練渦口兩城等使侯固碑即荆山與渦口城也五代因之斬兵馬都監何延錫等獲戰船五十艘二月丙寅幸下蔡王逵上言入淮南界戊辰廬夀巡檢使司超奏破賊三千人於盛唐方輿志夀州縣晉馬頭戍在縣北獲都監髙弼景遣皇甫暉姚鳯守清流關在滁州上命匡胤倍道襲之暉等陳於山下將戰匡胤領所部兵出山後乘之暉等走入滁州匡胤麾兵涉水踰城而入盡戮其黨擒暉鳯以獻景懼遣泗州牙將王知朗齎書至徐州稱唐皇帝奉書於大周皇帝願以兄事嵗獻方物甲戌本州以聞不答戊寅命前鄧州節度使侯章攻賊水寨己卯韓令坤襲揚州壬午景遣其臣鍾謨李德明奉表稱臣為附庸之國嵗貢百萬獻犒軍牛五百頭酒二千石金銀羅綺及衣帶茶藥詔吳越國王錢俶攻常宣二州以牽景韓令坤奏下揚州執副留守馮延魯辛卯匡胤表偽天長軍制置使耿謙降韓令坤言泰州降癸巳荆南言王逵為部將所殺遣人詣潭州請周行逢為帥三月丙申行光州刺史何超奏光州都監張承翰以城歸順行舒州刺史郭令圖奏下舒州丁酉取和州丙午景遣司空孫晟等奉表進金銀羅綺賞給將士茶絹等願割濠夀泗楚光海六州之地乞罷攻討庚戌吳越王俶言領兵入淮南界李德明等見周師急攻夀春慮不能保乃奏云寬臣五日之誅容臣等往江南取本國表章盡獻江北地上許其行賜景書曰必若盡淮甸之土地為大國之提封猶且逺圖豈同迷復但存帝號何爽嵗寒倘堅事大之心終不迫人於險俟諸郡之悉來即大軍之立罷又賜其將佐書德明盛稱世宗英武景不悅宋齊丘陳覺等皆以割地無益而德明賣國以圖利景斬德明遣元帥齊王景逹與陳覺邊鎬許文稹帥兵趨夀春吳越陷常州之郭燕王𢎞冀遣龍武都虞侯柴克宏救常州壬子大敗吳越兵夏四月甲子以侍衛親軍都指揮使歸德節度使李重進等為廬州都招討使徐州節度使武行德為濠州城下都部署世宗攻夀州圍之數重以方舟載炮自淝河中流擊其城又束巨竹數萬竿上施版屋號為竹龍載甲士以攻之又決其水皆入於淝河攻之百端自正月至於四月不能下而嵗大暑霖雨彌旬周兵營寨水深數尺淮淝暴漲炮舟竹龍皆飄南岸為景兵所焚周兵多死己巳車駕發夀春乙亥駐蹕於濠州城下齊王景逹由瓜步濟江距六合一舍而設柵居數日棄柵來迫我軍匡胤擊之賊兵大敗己卯韓令坤奏敗楚州萬餘衆於灣頭在揚州東北十五里殿前都指揮使張永德言敗賊於曲溪在招信軍之西丙戌以向訓為淮南節度使沿江招討使韓令坤為副丁亥車駕幸渦口景乘常州之捷遣陸孟俊迫泰州王師不守韓令坤欲棄揚州帝怒急遣張永德帥親兵援之又命趙匡胤領步騎二千屯六合惟留偏師數千守夀春命李重進總之俄而孟俊抵揚州令坤擒孟俊匡胤又敗二萬餘人於六合五月壬辰以渦口為鎮淮軍戊戌發渦口乙卯至自淮南六月壬申赦淮南見禁罪人先時非理科配一切停罷步軍都指揮使李繼勳營於夀州之南攻賊壘賊自城中來攻破柵而入將士死者數百人攻具並為所焚李重進在東呰不能救時城堅未下師老於外加之暑毒糧運不繼諸將欲退軍匡胤自六合歸過其城下為留旬日王師復振七月辛卯朔以周行逢為武平軍節度使庚子李重進奏破賊千餘人丁未武行德奏破賊二千人向訓班師回夀春時江南賊盜充斥而舒蘄光和滁等州復為唐所據訓上言欲抽揚州之師併力夀春上可之八月永德奏破賊下蔡先是景遣其將林仁肇郭廷謂率水陸軍奪浮梁以舟實薪芻乘風縱火永德禦之風勢倒指賊衆却因敗冬十月癸酉李重進奏破賊盛唐壬午永德言敗賊下蔡甲申授趙匡胤定國軍節度使殿前都指揮使先是永德守下蔡素與重進不協一日乘醉大言重進潛蓄姦謀將校無不驚駭重進自夀陽去其部從直詣永德帳下宴飲終日而去人情稍安景知之因密令人賫蠟書遺重進重進以其書進呈世宗覽之皆斥讟反間之言孫晟隨駕到闕禮遇殊優每召見問江南事但言唐畏陛下神武永保無二世宗怒晟前言失實十一月收晟下獄與其從者百餘人皆誅之十二月壬申以張永德為殿前都點檢發陳蔡宋亳穎兖曹單等州工夫數萬城下蔡戊子李重進奏破賊塌山在紫金山之東北四年正月丁未重進奏破賊五千人於夀州北先是朝廷所得州郡分兵鎮守地濕時暑頗為敵窺伺繼而李繼勳以南呰失守重進抽軍近外張從恩焦繼勳屯鎮淮軍武行德屯定逺縣為淮軍所襲皆披靡挫衄敵人復振齊王景逹遣許文稹朱元領軍數萬泝淮而上至紫金山設十餘寨與城內烽火相應連延夾道抵夀春為運糧之路至是為重進所敗二月向訓奏破賊於黃蕃呰乙亥車駕發京師命右驍衛大將軍王環率舟師數千以從乙酉至下蔡三月庚寅旦上率諸軍擊賊於紫金山趙匡胤擊先鋒呰一鼓破之餘衆保山寨攻之未下匡胤擊紫金山北一呰破之初朱元恃功或違景逹節制監軍使陳覺與元有隙屢表元不可信不宜付以兵柄景乃命楊守忠代之景逹檄元計事元欲自殺其客曰丈夫乃為妻子死耶遂舉呰萬餘人降翌日盡陷諸呰獲萬餘人許文稹邊鎬楊守忠皆被擒其餘沿流東奔景逹遁歸金陵是役也所喪四萬人上率親騎沿淮北岸追賊命諸將縱舟師順流擊之匡胤於淮南岸追擊晡至鎮淮軍殺溺之外擒數千人奪艦糧船數百錢帛器仗不可勝數劉仁贍聞援兵既敗計無所出但扼吭浩嘆甲午城鎮淮軍仍構浮梁於淮戊戌授向訓徐州節度使淮南行營都監屯鎮淮軍己亥復幸下蔡劉仁贍病甚已不知人其副使孫羽詐為仁贍書以城降戊申幸夀州城北世宗命舁仁贍至帳前嗟嘆久之賜以玉帶御馬復使入城養疾庚戌移夀州於下蔡以故州為夀春縣曲赦夀州辛亥仁贍為特進檢校太尉兼中書令鄆州節度使是日卒追封彭城郡王丙辰車駕發下蔡四月己巳至自下蔡五月癸巳李重進加檢校太傅兼侍中向訓為徐州節度使加檢校太尉同平章事張永德為澶州節度使檢校太尉趙匡胤為滑州節度使加檢校太保六月己未以鍾謨為衛尉少卿十月前徐州節度使檢校太師兼中書令武行德為左衛上將軍先是行德屯定逺為冦所襲死者數百人帝懲僨軍之咎故以環衛處之前河陽節度使李繼勳為右衛大將軍責南呰之敗也壬申發京師十一月丙戌至濠州戊子親破十八里灘呰在州東北淮水之中上令甲士數百人跨駝以濟今濠州西北十二里有乘龍洲在水中世宗乘駝濠人以為鬼乘龍故名癸巳上親率諸軍攻賊壘奪關城在東城之南以城外地髙故以關城護之今基迹尚存破小呰焚戰艦七十餘斬首二千級進攻羊馬城丙申夜濠州團練使郭廷謂上表願請命於唐而後降辛丑帝率水陸軍循淮而下癸卯大破賊於渦口斬首五千級降二千餘人奪戰船三百鼓行追奔晝夜不息江淮城柵所至皆下乙巳攻泗州十二月乙卯降戊午帝率衆東下趙匡胤領兵南岸夾淮而進己未至清口即清河口追及賊且戰且行鼓譟之聲聞數十里辛酉至楚州西北大破賊衆賊順流而逸匡胤追之數十里擒應援使陳承昭以獻獲船三百餘艘將士七千餘人初帝之渡淮也無水戰之備每遇賊戰艦無如之何敵亦以此自負有輕我意帝即於京師集工徒修作樓艦踰嵗得數百艘兼得江淮舟船令所獲南軍教北人水戰未幾舟師大備至是水陸克捷江南大震壬戌濠州歸順乙丑漣水歸順景驅揚州士庶渡江焚州郭而去丁丑泰州平五年正月乙酉詔韓令坤權知揚州丙戌取海州庚寅發楚州管內丁壯開鶴河在淮安州城西南以通運路壬辰取靜海軍通州也楚州未下乙巳親攻丙午克之防禦使張彥卿死之六軍大掠軍民死者萬餘人二月甲寅天長歸順戊午車駕發楚州丁卯詔城揚州乙亥司超奏破賊擒舒州刺史三月壬午朔幸泰州丁亥復幸廣陵辛卯幸迎鑾江口在真州初王師已臨長江景大發舟師順流至海口以扼蘇杭之路上遣右神武統軍宋延渥率戰棹百艘襲之令殿前都虞候慕容延釗以驍騎緣岸而行至東㳍州在今通州海中與賊遇戰於江中大破之丙申景遣其臣陳覺奉表貢方物請傳位太子以國附庸覺覩樓船戰棹已泊江岸以為自天而降愕然大駭時江北唯廬舒蘄黃未下世宗謂覺曰國主若能以江北之地盡歸則朕亦不至窮兵黷武覺聞命欣然丁酉荆南髙保融奏舟船已至鄂州戊戌錢俶奏發戰棹四百艘水軍萬七千人泊江岸請師期己亥景遣劉承遇上表稱唐國主盡獻江北郡縣之未陷者鄂州漢陽今漢陽軍時為縣汊川今漢川縣二縣在江北亦獻焉嵗輸土貢數十萬而乞海陵鹽監南屬不許庚子上報略曰既能如此又復何求其常潤一路及沿江兵掉已指揮抽退兩浙荆湖湖南水陸兵士各合罷兵廬黃蘄三路將士亦抽近外候彼中起揭了畢交割許奉正朔罷兵而不許傳位太子丙午景遣宰相馮延已獻犒軍銀十萬兩絹十萬匹錢十萬貫茶五十萬斤麥二十萬石庚戌詔故淮南節度使楊行密故升府節度使徐溫各給守冢户應江南臣僚墓在江北者委長吏檢校四月乙卯車駕發揚州壬申至自淮南五月唐去帝號稱國主去交泰年號稱顯德五年置進奏邸于汴都詔諸軍將士等第優給行營將士殁於王事者各贈官子孫量才録用淮南及徐宿宋亳陳穎許蔡等州欠去年夏秋稅並放辛卯以趙匡胤為忠武軍節度使己酉以太府卿馮延魯充江南國信使鍾謨為副賜御衣玉帶錦綺羅帛十萬匹金器千兩銀器萬兩士卒俘於周者皆遣還凡五千七百五十人别賜書曰已下三司逐年支撥供軍食鹽二十萬石南唐書升元初括定民賦每正米一斛别輸三斗於官廩授鹽二斤謂之鹽米至是淮甸鹽場皆入周遂不支鹽而輸米為定式又賜厯日一軸九月以延魯為刑部侍郎謨為給事中並放歸江南十月甲午遣許文稹邊鎬周廷構歸江南初帝之南征也唐人大懼陳覺李徵古皆齊丘門人因説景請委國事於齊丘景銜之及鍾謨李德明奉表至行在德明復命説景割江北之地求和而覺徵古等以為賣國請戮之景殺德明鍾謨德明之黨也及歸譖齊丘等故齊丘等得罪齊丘歸九華山覺等貶官尋害之四月乙卯車駕發揚州壬申至自淮南此世宗取江北之大略也陸遊論曰元宗舉閩楚之師境內虛耗及契丹滅晉中原有隙可乘而南唐兵力國用弗支熟視而弗能出世以為恨不然唐有江淮比諸國地大力強人材衆多若用其人乘閩楚昏亂一舉而平之然後取吳越五嶺成南北之勢中原豈易動哉不幸諸將失律國勢遂弱且陳覺馮延魯輩用師閩楚猶喪敗若北鄉而爭天下其禍可勝言哉五月辛巳朔日有食之以通鑑修辛卯周以趙匡胤領忠武節度使以通鑑修唐主更名景去帝號稱國主用周正朔以通鑑修解題曰按南唐書南唐開國子監復有廬山國學其徒不下數百時廢君如吳越弒主如南漢叛親如閩楚亂臣賊子無國無之唯南唐兄弟輯睦君臣奠位此好儒之效也餘見通鑑秋七月丙戌周行刑統以通鑑修解題曰按六典注魏李悝集諸國刑書造法經六篇一盜法二賊法三囚法四捕法五雜法六具法商鞅改為律增相坐之法造參夷之誅大辟加鑿顛抽脅鑊亨車裂之制漢蕭何加事律擅興廄戶三篇謂之九章九律文帝除肉刑景帝定律武帝時張湯趙禹增律令條章宣帝時于定國刪定成帝時律令煩多百餘萬言魏命陳羣為魏律十八篇增蕭何律劫掠詐偽毁亡造劾繫訊斷獄請財驚事償賦等九篇晉命賈充等增損為二十篇梁命蔡法度等增損為二十篇後魏孝文時定律凡八百三十二章北齊武成時趙郡王睿等造律成凡十二篇大抵採魏晉故事後周造律凡二十五篇比於齊律煩而不當宣帝廣刑法要制為刑經聖制謂之法經隋開皇定律凡十二篇煬帝以律令猶重更制大業律十八篇一名例二衛宫三違制四請求五户六婚七擅興八告劾九賊十盜十一鬬十二捕亡十三倉庫十四廄牧十五關市十六雜十七詐偽十八斷獄唐武德定律令其篇目一準開皇之律貞觀初又命釐正比古死刑殆除其半至宋建隆四年竇儀等進一名例二禁衛三職制四户婚五廄庫六賊盜七鬬訟八詐偽九雜律十捕亡十一斷獄大抵皆因乎周之舊也八月辛巳南漢主晟薨子衛王鋹立改元以吕祖謙標目修冬十月周均田以吕祖謙標目修解題曰朱熹曰周世宗可謂有天下之量矣事見通鑑十二月己亥唐放宋齊丘以吕祖謙標目修周世宗皇帝恭皇帝顯德六年年唐元宗皇帝顯德六年南漢恩赦侯劉鋹大寶二蜀秦國公孟昶廣政二十二年錢東漢帝天會三年吳越淮海王俶湖南周行逢南平王髙保融遼應厯九年春正月周王朴正樂律以吕祖謙標目修唐宋齊丘伏誅以吕祖謙標目修解題曰按南唐書宋齊邱陳覺李徵古馮延魯魏岑查文徽為一黨孫晟常夢錫萬嚴韓熙載江文蔚鍾謨李德明為一黨餘見通鑑二月庚申周王朴卒以吕祖謙標目修甲戌周主伐契丹夏四月壬辰取乾寧軍辛丑取益津癸卯取益津關瓦橋關淤口關降莫州五月乙巳降瀛州丙午議取幽州周主有疾乃止戊申取易州己酉以瓦橋關為雄州益津關為霸州甲戌周主至自雄州以新紀通鑑修解題曰按新史附録世宗北伐以保大軍節度使田景咸為淤口關部署右神武統軍李洪信為合流口部署前鳯翔節度使王晏為益津關部署侍衛親軍馬步都虞候韓通為陸路都部署世宗自乾寧軍御龍舟樓船戰艦首尾數十里至益津關降其守將而河路漸狹舟不能進乃捨舟陸行瓦橋淤口關瀛莫州守將皆迎降方下令進攻幽州世宗遇疾乃置雄州於瓦橋關霸州於益津關而還周師下三關瀛莫兵不血刃述律聞之謂其國人曰此本漢地今以還漢又何惜耶餘見通鑑徐無黨曰世宗下三關瓦橋益津以建州及克淤口關止置寨故舊史實録皆闕不書遂不見取得時日今信安軍是也歐陽修曰豫讀周日厯見世宗取瀛莫定三關兵不血刃而史官譏其以王者之師馳千里而襲人輕萬乘之重於萑葦之間以僥幸一勝夫兵法決機因勢有不可失之時世宗南平淮甸北伐契丹乘其勝威擊其昏殆世徒見周師之出何速而不知述律有可取之機也是時述律以謂周之所取皆漢故地不足顧也然則十四州之故地皆可指麾而取矣不幸世宗遇疾功志不就然瀛莫三關遂得復為中國之人而十四州之俗至今陷於夷狄彼其為志豈不可惜而其功不亦壯哉唐主景遣其子貢於周周主令其修守備以吕祖謙標目修解題曰陸遊曰司馬光以為大邦畏其力小邦懷其德是比之文王也是時世宗將有事燕晉其謀以為若南方有變雖不能為大害然北伐之師勢亦不得不還故先思有以安江南之心又疲其力於大役使不得動比北伐成功江南折闕謂之近於文王豈不過哉然世宗則誠竒謀闕心之患不乘勝取吳蜀楚粵而舉勝兵以取幽州闕平四方何足定哉甫得三關而以疾歸則天也其後中國先取蜀闕江南吳越太原最後取幽州而兵已弊矣故雖得諸國而中國之勢終弱然後知世宗之本謀為善也事見通鑑癸未周立皇后符氏以新紀通鑑修周立子宗訓為梁王以吕祖謙標目修周范質王溥參知樞密院事樞密使魏仁浦為中書門下平章事趙匡胤兼殿前都點檢以通鑑修癸巳周主榮殂梁王宗訓即皇帝位以通鑑新紀修解題曰歐陽修曰世宗五六年間取秦隴平淮右復三關威武之聲震懾夷夏而方內延儒學文章之士考制度修通禮定正樂議刑統其制作之法皆可施於後世其為人明達英果議論偉然即位之明年廢天下佛寺三千三百三十六是時中國乏錢乃詔悉毁銅佛像以鑄錢嘗夜讀書見元稹均田圖嘆曰此致治之本也乃詔頒其圖法使吏民先習知之期以一嵗大均天下之田其規為豈小哉其伐南唐問宰相李穀以計䇿後克淮南出穀疏使學士陶穀為贊而盛似錦囊置之坐側其英武之材可謂雄傑及其虛心聽納用人不疑豈非所謂賢主哉秋七月趙匡胤領歸德節度使以通鑑修大事記續編卷七十七
