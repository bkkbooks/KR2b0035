body:
  text: 大事記續編卷五十三明王褘撰唐則天順聖皇后武氏光宅元年春正月甲申朔改元嗣聖以新舊紀修立太子妃韋氏為皇后以吕祖謙標目修二月戊午皇太后廢帝為廬陵王己未立豫王旦為皇帝居别殿妃劉氏為皇后永平郡王成器為皇太子改元文明皇太后仍臨朝稱制庚申廢皇太孫重照為庶人以通鑑及吕祖謙標目修解題曰胡寅曰中宗之廢世往往歸咎武氏而不知事起裴炎也炎但知韋𤣥貞與政必分己權不若倚后為重而不知為唐逺慮以啓革命屠戮之禍其罪又不止廢君而已武氏包藏禍心自髙宗中世其迹益彰炎茍不能識是不智也識其意趨而勸成廢立此其情為何如他日劉景先胡元範輩以炎為不反者吾不信也事見通鑑宋庠紀年通譜文明本梁簡文帝年號劉仁軌留守西京以吕祖謙標目修丁丑中書侍郎劉禕之同三品以新舊紀修三月殺庶人賢以通鑑修甲子皇帝率羣臣上尊號於武成殿丁卯册皇帝新紀夏四月癸酉遷廬陵王於房州又遷之於均州以吕祖謙標目修閏五月甲子禮部尚書武承嗣為太常卿同三品以新紀修秋七月彗星出於西方以新紀修八月庚寅葬天皇大帝於乾陵廟號髙宗以通鑑修解題曰歐陽修曰小雅曰赫赫宗周褒姒滅之是時幽王雖亡而太子立而詩人乃言滅之者以為文武之業於是蕩盡東周雖在不復能興矣其曰滅者甚疾之之辭也武氏之亂唐之宗室戕殺殆盡其賢士大夫不免者十八九以太宗之治其遺德餘烈在人者未逺而幾於遂絶其為惡豈一褒姒之比耶以太宗之明昧於知子廢立之際不能自决卒用昏童髙宗溺愛袵席不戒履霜之漸而流毒天下貽禍邦家嗚呼父子夫婦之間可謂難哉可不慎哉丙午武承嗣罷新紀九月甲寅改元及服色官名以東都為神都新紀解題曰此革命之漸也事見通鑑己巳追尊武氏五世祖考妣裴炎諌不聽以本紀通鑑修解題曰按新舊史列傳武承嗣請立七廟及追王父祖炎諌曰太后天下母以盛德臨朝當存至公不容追王祖考示自私且獨不見吕氏之敗乎太后曰吕氏之王權屬生人今追崇先世存沒殊迹安得同哉炎曰蔓草難圖漸不可長太后不悅而止據此則止是追崇五世若立七廟之事猶以炎之言而止至天授元年乃立七廟於神都通鑑乃云太后不從則是並追崇五世亦不從也餘見通鑑丁丑柳州司馬李敬業起兵於揚州冬十月甲申遣玉鈐衛大將軍李孝逸為揚州大總管拒之裴炎請皇太后反政坐下獄以吕祖謙標目修解題曰按新史列傳豫王雖為帝未嘗省天下事炎謀乘太后出游龍門以兵執之還政天子㑹久雨太后不出而止餘見通鑑壬辰敬業克潤州丙申殺裴炎侍中同三品劉齊賢貶刺史十一月敬業兵敗於下阿走死以吕祖謙標目修解題曰下阿溪在今髙郵軍西北又謂平阿渡十二月癸卯殺單于道安撫大使程務挺以新紀通鑑修解題曰按新史列傳太后方怫忿一日召羣臣廷讓曰朕於天下無負若等知之乎羣臣唯唯太后曰朕輔先帝踰三十年憂勞天下爵位富貴朕所與也天下安逸朕所養也先帝棄羣臣以社稷為託朕不敢愛身而知愛人今為戎首者皆將相何見負之遽且受遺老臣伉扈難制有若裴炎乎世將種能合亡命若徐敬業乎宿將善戰若程務挺乎彼皆人豪不利於朕朕能戮之公等才有過彼早為之不然謹以事朕無詒天下笑羣臣頓首不敢仰視曰惟陛下命此正武氏箝制天下之術也通鑑謂其輕淺棄而不取餘見通鑑唐則天順聖皇后武氏垂拱元年春正月丁未朔廬陵王出居於均州以唐鑑修改元以新舊紀修解題曰唐史臣沈既濟曰中宗以始年登大位季年復大業雖尊名中奪而天命未改是以首事表年昔魯昭公之出春秋書其居曰公在乾侯君雖失位不敢廢也今請併太后紀合中宗紀每於嵗首必書中宗所居曰某年春正月皇帝在某太后某事改某制則紀稱中宗而事述太后名不失正禮不違常矣按此蓋朱熹所祖以為綱目者也然吕祖謙大事記之作無所褒貶若用既濟之法而黜武氏是用褒貶也故每嵗正月惟書廬陵王皇太子居於某而表年則因史之舊文昔孔子作春秋而亂臣賊子懼其於弒君篡國之主皆不黜絶之豈以其盜而有之者莫大之罪不沒其實所以著其大惡而不隱歟自司馬遷班固皆作髙后紀吕氏雖非篡漢然盜執其國政遂不敢沒其實豈其得春秋之意歟唐之舊史因之列武后於本紀蓋其所從來逺矣宋庠紀年通譜徐敬業平故改元新舊史傳春官尚書李思文詭言周書有垂拱天下治為受命之符后喜皆班示天下稍圖革命二月乙巳春官尚書武承嗣同三品以新紀修突厥冦邊以新紀修三月丙辰遷廬陵王於房州以朱熹綱目修辛酉武承嗣罷新紀辛未頒垂拱格新紀制官民皆得自舉以朱熹綱目修秋七月己酉文昌左丞魏𤣥同為鸞臺侍郎同三品以通鑑修冬十一月癸卯天官尚書同三品韋待價為行軍大總管擊突厥以新紀修時開告密之門擢胡人索元禮為逰擊將軍於是周興來俊臣之徒繼起以通鑑舊傳修解題曰按新史列傳徐敬業兵興武后患之見大臣常切齒欲因大獄去異已元禮揣㫖即上書言急變召對擢逰擊將軍則此事當在垂拱之初通鑑因作銅匭牽連書之若太緩今載於此唐則天順聖皇后武氏垂拱二年春正月廬陵王出居於房州以唐鑑修二月辛未朔日有食之以新舊紀修右衛大將軍李孝逸左遷刺史以通鑑修三月戊申作銅匭新紀冬十月己巳有山出于新豐縣以新紀修唐則天順聖皇后武氏垂拱三年春正月廬陵王出居於房州以唐鑑修閏正月丁卯封皇帝子四人為王以舊紀修夏五月庚午殺劉禕之新紀解題曰胡寅曰禕之受知武氏位為宰相茍有所見面陳之可也况返政大議乎而與人言之是不知害成之戒也雖然不經鳳閣鸞臺何名為敕此則宰相之言也命令之出治亂安危繫焉雖小事不可不謹况殺宰相乎是時與政者六七人無敢執議豈數使然耶抑人不能配三才而斡之也事見通鑑秋七月丁卯冀州雌雞化為雄新紀八月壬子魏𤣥同兼檢校納言以新舊紀修九月乙卯虢州人楊初成矯制迎廬陵王於房州不果見殺以新紀朱熹綱目修冬十二月壬辰韋待價為行軍大總管擊吐蕃罷監軍御史以新紀通鑑修解題曰胡寅曰武后不置監軍為可法矣自明皇肅代德憲皆不免此蔽賢良勸諌終莫肯回用是見后智術之髙控勒四海奇才碩德皆不能出其籠絡豈偶然哉事見通鑑是嵗大饑以新紀修唐則天順聖皇后武氏垂拱四年春正月廬陵王出居於房州以唐鑑修甲子增七廟立髙祖太宗髙宗廟於神都新紀立崇先廟祀武氏以朱熹綱目修庚午毁乾元殿為明堂以新紀通鑑修夏四月戊戌殺太子通事舍人郝象賢新紀武承嗣獻瑞石命曰寶圖五月乙亥加尊號聖母神皇以新舊紀修解題曰甚矣武氏之似王莽也事見通鑑六月丁亥朔日有食之新紀秋八月丙午博州刺史琅邪郡王冲起兵遣金吾衛大將軍邱神績拒之戊申冲死之庚戌豫州刺史越王貞起兵九月遣鳳閣侍郎同平章事張光輔統諸軍拒之貞死之殺韓王元嘉魯王靈䕫范陽郡王藹黃國公撰東莞郡公融及長樂公主以新紀傳及通鑑修冬十一月辛酉殺濟州刺史薛顗及其弟十二月乙酉殺霍王元軌江都郡王緒及殿中監裴承光大殺唐宗室幼者流嶺南以新紀修乙亥殺左臺大夫同平章事騫味道以新紀修乙酉拜洛受圖新紀辛亥改明堂為萬象神宫僧薛懷義以功拜威衛大將軍梁國公以新紀通鑑修唐則天順聖皇后武氏永昌元年春正月廬陵王出居於房州以唐鑑修乙卯享於萬象神宫改元以新紀修解題曰宋庠紀年通譜瑞石文云聖后臨人永昌帝業故改元己未朗州雌雞化為雄新紀二月尊考曰周忠孝太皇妣曰周忠孝太后以新紀修三月癸酉天官尚書武承嗣為納言以新紀修夏四月甲辰殺江南郡王煒鄱陽公諲等宗室十二人以新紀通鑑修己酉殺天官侍郎鄧𤣥挺新紀五月己巳以薛懷義為行軍大總管伐突厥以新紀通鑑修秋七月丁巳流紀王慎於巴州新紀韋待價兵敗於寅識迦河流繡州以通鑑修解題曰按新紀垂拱三年十二月書待價為安息道行軍大總管擊吐蕃舊紀於今年五月始書之通鑑考異曰實録垂拱三年十二月壬辰命待價擊吐蕃至永昌元年五月又云命待價擊吐蕃本傳不云兩曽將兵遂載於永昌元年今考舊紀及傳皆云待價坐遲留不進若待價以五月出師七月而敗謂之倉卒則可謂之遲留則不可蓋待價實以三年出師至是以其遲留命其進擊舊史誤於此年始書之爾八月甲申殺內史張光輔及洛州司馬弓嗣業乙未松州雌雞化為雄辛丑殺陜州刺史郭正一九月庚戌殺恆山王承乾之子厥以新紀修壬子以薛懷義為行軍大總管伐突厥以通鑑修閏九月甲午殺魏𤣥同夏官侍郎崔察冬十月戊午殺武威衛大將軍黑齒常之鷹郎衛將軍趙懷節己未殺嗣王璥等六人以新紀通鑑修唐則天順聖皇后武氏天授元年春正月庚辰朔廬陵王出居於房州以唐鑑修改元載初以十一月為正月十二月為臘月正月為一月以新紀通鑑修解題曰將改國號故用周正與王莽之改商正同宋庠紀年通譜親享明堂以建子為月故改元改詔曰制通鑑乙未除唐宗室屬籍新紀臘月殺劉齊賢新紀一月戊子左肅政大夫同三品王本立罷尋殺之以新紀修武承嗣同三品鳳閣侍郎武攸寧為納言以新舊紀修甲午流地官尚書同三品韋方質於儋州尋殺之以通鑑修二月辛酉䇿貢士於廷以吕祖謙標目修解題曰廷試貢士自此始胡寅曰漢䇿賢良非試之也延於大廷訪以理道其事重矣若貢士既試於南宫而又試之殿廡是以南宫為不足信也故富弼請罷殿試其說甚當然未能焉則亦悅其名而未察其實爾况其事始於武后尤不可以不革也按新史選舉志唐取士之科多因隋舊然其大要有三由學館者曰生徒由州縣者曰鄉貢皆升於有司而進退之其科之目有秀才明經俊士進士明法明字明算一史三史開元禮道舉童子而明經之别有五經三經二經學究一經三禮三傳史科此嵗舉之常選也其天子自詔者曰制舉所以待非常之才焉禮部貟外郎沈既濟曰武太后參决大政與天子並太后頗涉文史永隆中始以文章選士太后君臨天下二十餘年公卿百辟無不以文章逹因循遐久浸以成風百餘年間五尺童子恥不言文墨是以進士為士林華選忠賢雋彥咸出於是而桀姦無良者或有焉五月戊子殺春官尚書尚平章事范履氷以新紀修己亥殺梁郡公李孝逸以新紀修七月壬午殺豫章郡王亶以侯思止為游擊將軍以通鑑修丁亥殺澤王上金許王素節尋又殺素節諸子以新紀修八月甲寅殺納言裴居道癸亥殺尚書右丞張行廉以新紀修辛未殺安南郡王頴鄅國公昭及宗室十二人以新紀修殺庶人賢二子以通鑑修九月壬午改國號曰周改元解題曰宋庠紀年通譜天授本劉獲年號乙酉加尊號曰聖神皇帝以皇帝為皇嗣賜姓武氏皇太子為皇孫丙戌立武氏七廟於神都並稱帝后封伯父及兄弟之子為王堂兄為郡王以新紀修解題曰新舊史列傳承嗣元爽之子三思元慶之子兄弟之子也攸寧攸歸攸望士讓之孫懿宗嗣宗仁範士逸之孫攸暨士稜之孫堂姪也攸冝攸緒惟良之子載德仁範之子延基延秀承嗣之子崇訓崇烈三思之子延暉延祚承業之子姪之子也又攸止重規皆從子也無所謂堂兄為郡王者舊紀書堂姪十二人為郡王新紀書堂兄當作堂兄弟之子為是十月檢校內史宗秦客貶遵化尉以新紀修辛未內史邢文偉貶刺史以新紀修改唐太廟為享德廟武氏七廟為太廟新紀以前秋官郎中徐有功為侍御史以通鑑修唐則天順聖皇后武氏天授二年正月廬陵王出居於房州以唐鑑修甲戌改置社稷旗幟尚赤新紀戊寅殺雅州刺史劉行實弟姪等四人以新紀修戊子武承嗣為文昌左相新紀乙未殺丘神績以新紀修庚子殺納言史務滋以新紀修二月右丞周興流嶺南死索元禮後亦坐死以通鑑修四月壬寅朔日有食之以新紀修七月庚午徙關內數十萬户實神都以新舊紀修八月戊申武攸寧罷以新紀修九月壬辰殺鸞臺侍郎同平章事傅游藝以新紀修癸巳羽林衛大將軍武攸寧守納言洛州司馬狄仁傑為地官侍郎同平章事以新紀修十月殺右相同三品岑長倩司禮卿兼納言歐陽通地官尚書同平章事格輔元鸞臺侍郎同平章事樂思晦以新紀修解題曰張九成曰岑長倩以則天革命請改皇嗣姓武則天悅之及張嘉福請立武承嗣為皇太子長倩不從以謂皇嗣已立東宫不可更立以此獲誅人皆以長倩為不忠於唐冝獲此報張唐英獨言其所以存皇嗣者固欲存唐室也其不欲立承嗣者恐皇嗣不得立也其意與陳平順吕后之意同人之不察乃真以為不忠誤矣事見通鑑唐則天順聖皇后武氏長壽元年正月廬陵王出居於房州以唐鑑修一月引見存撫使所舉人悉加擢用始有試官以吕祖謙標目修築神都外城以通鑑修庚午貶鳳閣侍郎同平章事任知古及狄仁傑為縣令流冬官侍郎同平章事裴行本於嶺南以新紀修四月丙申朔日有食之改元如意以新紀修解題曰宋庠紀年通譜如意本釋書語八月戊寅武承嗣武攸寧罷夏官侍郎李昭德為鳳閣侍郎同平章事以新舊紀修解題曰奪人位者必忌人之奪其位盜人權者必惡人之盜其權理固然也武后猜阻鷙悍奄唐神器而有之其心豈能一日自安也哉鰓鰓然惟恐人以己之所以施於唐者而施於己承嗣輩雖其親姪要不過羈縻而已非有恩交義結之情也昭德惟深探其情故能以片言去之而代其位殆如范睢之於穰侯也胡寅曰其為武氏計不思昭德前後所陳如姪不祔姑之說姑姪何如母子之說議論正大是果為武氏計耶為李氏計耶史稱其區區一情抑武興唐必有能辨之者矣事見通鑑九月庚子改元以新舊紀修以并州為北都新紀癸丑流冬官尚書同鳳閣鸞臺平章事李游道秋官尚書袁智𢎞夏官尚書同鳳閣鸞臺平章事王濬司賓卿同平章事崔神基文昌右丞同平章事李元素於嶺南以新紀通鑑修十月丙戌武威道行軍總管王孝傑大敗吐蕃復四鎮以新舊紀修流監察御史嚴善思於歡州尋復召之以通鑑修右補闕朱敬則侍御史周矩上疏治獄稍衰以吕祖謙標目修唐則天順聖皇后武氏長夀二年正月廬陵王出居於房州以唐鑑修戊申文昌左丞同平章事姚璹請令宰相撰時政記月送史館以通鑑修臘月癸亥殺皇嗣妃劉氏德妃竇氏以新紀修丁卯降皇孫五人為郡王以通鑑修一月庚子夏官侍郎婁師德同平章事以新舊紀修二月乙亥侍御史侯思止有罪伏誅以通鑑修殺諸道流人以通鑑修九月丁亥朔日有食之通鑑乙未加尊號金輪聖神皇帝以新舊紀修唐則天順聖皇后武氏延載元年正月廬陵王出居於房州以唐鑑修突厥可汗骨篤祿卒弟默啜立臘月甲戌冦靈州以吕祖謙標目修一月甲午婁師德為河源等軍營田大使以新紀修二月己卯王孝傑敗吐蕃於冷泉及大嶺以新紀修三月以薛懷義為行軍大總管率十八將軍擊突厥鳳閣侍郎同平章事蘇味道檢校內史李昭德為司馬長史以通鑑修四月王孝傑同三品以新紀修五月甲午加尊號改元以新紀修七月癸未山人武什方為正諌大夫同平章事八月罷以新紀修流鸞臺侍郎同平章事崔元綜於振州以新紀修九月壬午朔日有食之新紀殿中丞來俊臣坐貶以通鑑修壬寅貶檢校內史李昭德為南賓尉以吕祖謙標目修唐則天順聖皇后武氏天冊萬嵗元年解題曰宋庠紀年通譜南郊受天冊金輪聖神之號司餼局人於水際得石函有玉冊云神皇萬忠輔聖母長安故改元天冊萬嵗與孫皓天册同義正月廬陵王出居於房州以唐鑑修辛巳加尊號改元證聖以新紀修丙申萬象神宫火新紀二月己酉朔日有食之本紀壬子薛懷義伏誅以新紀修四月建大周萬國頌德天樞新紀七月辛酉以王孝傑為行軍大總管伐吐蕃以新紀修九月甲寅祀南郊改號天冊金輪大聖皇帝改元以新紀修以崇先廟為崇尊廟新紀十月突厥請降以通鑑修唐則天順聖皇后武氏萬嵗通天元年正月廬陵王出居於房州以唐鑑修臘月甲申封神嶽改元萬嵗登封丁亥禪少室癸巳復於神都以新紀修一月甲寅婁師德為行軍副總管擊吐蕃以新紀修己巳改崇尊廟為太廟新紀二月壬寅王孝傑婁師德敗於素羅汗山以新紀修解題曰見漢永平十六年解題丁巳復作明堂曰通天宫改元以新紀修四月免王孝傑為庶人貶婁師德為司馬以通鑑新紀修五月壬子契丹首領李盡忠孫萬榮反陷營州乙丑遣鷹揚衛將軍曹仁師等擊之七月辛亥以春官尚書武三思為安撫大使以備之八月丁酉仁師等敗於黃麞谷九月庚子以同州刺史武攸冝為行軍大總管擊之以新紀通鑑修突厥默啜求婚以吕祖謙標目修十月辛卯李盡忠死孫萬榮領其衆陷冀州以吕祖謙標目修以彭澤令狄仁傑為冀州刺史以夏官郎中姚崇為侍郎以吕祖謙標目修唐則天順聖皇后武氏神功元年正月廬陵王出居於房州以唐鑑修族誅鳳閣侍郎同平章事李元素夏官侍郎同平章事孫元亨等三十六家以新紀通鑑修甲子婁師德守鳳閣侍郎同平章事以新紀修三月庚子王孝傑及孫萬榮戰於東硤石谷兵敗死之以吕祖謙標目修解題曰新史地理志平州有西硤石東硤石立突厥默啜可汗以朱熹綱目修四月鑄九鼎以舊紀修癸未金吾衛大將軍武懿宗為行軍大總管五月癸卯婁師德為行軍副大總管擊契丹以新舊紀修六月辛卯司僕少卿來俊臣伏誅亦殺監察御史李昭德以新紀修解題曰王莽以符命而篡漢既已得志遂禁符命之說以掩前日之迹武后以刑誅而篡唐既已改物則以刑誅為周興等之過而掩前日之非事見通鑑突厥襲契丹孫萬榮兵潰死以通鑑修戊子特進武承嗣春官尚書武三思同三品以新紀修辛卯婁師德安撫河北以新紀修七月武承嗣三思罷以新紀修九月壬寅改元以新舊紀修解題曰宋庠紀年通譜平契丹故改元庚戌婁師德守納言新紀閏十月甲寅檢校司刑卿幽州都督狄仁傑為鸞臺侍郎同平章事以新舊紀修置員外官數千人以通鑑修大事記續編卷五十三
