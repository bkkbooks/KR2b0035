body:
  text: 大事記續編卷四十二明王禕撰梁髙祖武皇帝大通二年永安元年魏敬宗孝莊皇帝元子攸春正月杜洛周陷魏定瀛二州以魏紀修乙丑魏皇女生胡太后詐言皇子丙寅改元武泰以吕祖謙標目修丙子魏長孫稚克潼關寶寅敗奔万俟醜奴魏以稚為雍州刺史以魏紀吕祖謙標目修二月葛榮殺杜洛周併其衆以吕祖謙標目修魏主召并肆汾廣恆雲大都督爾朱榮兵以脅太后癸丑太后與鄭儼弒之甲寅立皇女為帝既而立臨洮王世子釗始生三歲以吕祖謙標目修解題曰并州領太原宋太原府汾州之地上黨隆德平陽二府樂平太原府遼州平定軍襄垣隆德府威勝軍鄉威勝軍隆德府遼州之地五郡汾州領西河汾州威勝軍之地吐京儑州五城平陽府臨汾縣西慈州吉鄉縣仵城鎮之地定陽平陽府臨汾縣西慈州吉鄉縣四郡雲州領盛樂雲中建安真興並太原府之地四郡三月癸未葛榮陷魏滄州以魏紀修魏爾朱榮舉兵於晉陽夏四月戊戌立魏長樂王子攸為皇帝自為都督中外軍事大將軍開府尚書令領軍將軍太原王徐紇鄭儼亡走庚子榮沉太后幼主於河殺髙陽王雍以下二千餘人辛丑入洛陽改元建義以吕祖謙標目修解題曰漢之召董卓也卓兵不過三千人而漢以亡魏之召爾朱榮也榮兵不出萬人而魏以亡是故太阿不可以授人也事見通鑑宋庠紀年通譜建義本乞伏國仁楊難當雍道晞年號魏郢州降梁改為北司州以梁紀修魏太尉汝南王悅太傅相州刺史北海王皓奔梁以梁紀修魏北青南荆州降梁以梁紀修解題曰南青州治國城北青州治東陽領齊今屬青密淄三州北海今屬濰青萊三州樂安今屬淄青二州勃海今屬淄州髙陽今屬密青二州河間今屬河間中山二府樂陵今屬青州郡七五月魏立肅宗嬪爾朱氏為后解題曰按北史列傳榮女先為明帝嬪榮欲立為后帝疑未決給事黃門侍郎祖瑩曰晉文公在秦懷嬴入侍事有反經合義陛下獨何疑焉上遂從之餘見通鑑胡寅曰反經合道先儒釋經者往往有此言反背也經常也既已背常安能合道乎或曰如舜不告湯放桀武王伐紂周公殺管叔仲尼出妻若此者非反經乎曰此聖人處事之變是之謂權權者猶衡之石焉進退前却與所懸之物輕重適等故雖權也乃所以為經也故權者道之中處也豈變詐亂倫之謂哉祖瑩之言違道甚矣正家者治國之本初政者治亂之原魏子攸惑於邪説而不能辨惕於強臣而不能正早墜厥命於是乎在矣辛酉爾朱榮還晉陽以太尉并州刺史上黨王天穆録尚書事京畿大都督領軍將軍以吕祖謙標目修梁曹義宗圍荆州癸未魏遣將軍費穆救之以通鑑修六月魏邢杲反於北海自稱漢王改元以吕祖謙標目修解題曰北海宋濰州秋七月万俟醜奴稱天子改元以通鑑修八月魏泰山太守羊侃降梁以魏紀通鑑修解題曰泰山宋襲慶府葛榮圍魏相州九月壬申爾朱榮討擒之乙亥改元以吕祖謙標目修解題曰宋庠紀年通譜魏比年三易號永安本孫休晉惠張實沮渠蒙遜年號辛巳魏爾朱榮自為大丞相都督河北畿外軍事以城陽王徽為司徒以吕祖謙標目修冬十月丁亥葛榮伏誅以吕祖謙標目修梁以北海王皓為魏主遣將軍陳慶之送之據銍城以吕祖謙標目修解題曰通鑑考異梁魏紀皆云以皓為魏主唯皓傳作魏王魏封劉昶為宋王蕭寶寅為齊王蕭察為梁王皆俟得國然後使稱帝若皓在南已稱帝當行即位之禮蓋王字與主字止欠一點故致繆誤是不然若使之還北主魏雖以王主之可也紀書元皓元悅元法僧元貞皆書還北主魏及齊書載元悅及魏書元悅傳皆然惟元顯傳書魏王通鑑疑點畫之誤安知非主字之誤為王字乎今從本紀銍城今亳州臨渙縣魏費穆獲曹義宗以本紀修魏豫州降梁以梁紀修解題曰豫州領汝南宋蔡州之地頴川頴昌府汝陽淮寧頴昌二府蔡州之地義陽蔡州之地新蔡頴昌淮寧二府蔡光二州之地初安蔡州之地襄城蔡州之地城陽唐州之地廣陵後省郡九十一月魏復取梁泰山以通鑑修戊寅魏以上黨王天穆為大將軍開府世襲并州刺史以通鑑修十二月魏韓樓據幽州反以吕祖謙標目修梁髙祖武皇帝中大通元年魏敬宗孝莊皇帝永安二年春二月甲午魏主追尊考妣為帝后以髙祖為伯考以通鑑修夏四月梁陳慶之拔榮城魏北海王皓即皇帝位於睢陽改元孝基以吕祖謙標目修魏邢杲伏誅以吕祖謙標目修五月戊辰魏主皓克梁國大破上黨王天穆甲戌魏主子攸奔河內丙子皓入洛陽改元建武解題曰按梁史王規傳陳慶之北侵陷洛陽百僚稱慶規退曰可弔也又何賀焉道家有云非為功難成功難也昔桓溫得而復失宋武竟無成功我孤軍無援深入冦境將為亂階俄見覆沒餘見通鑑宋庠紀年通譜建武本漢光武晉惠帝元帝石虎慕容忠齊明帝年號費穆降六月誅之皓與陳慶之相忌閠月爾朱榮渡河皓走死慶之奔還庚午魏主入洛陽壬申榮自為天柱大將軍甲戌以上黨王天穆為太宰榮還晉陽以吕祖謙標目魏紀傳修秋七月魏鑄五銖錢以魏紀修魏巴州降梁以吕祖謙標目修九月癸巳梁主復沒身同泰寺癸卯羣臣以錢一億萬奉贖以皇極經世修魏平韓樓以吕祖謙標目修万俟醜奴陷魏東秦州以魏紀修解題曰東秦州見孝昌三年解題冬十月己酉梁改元以梁紀修解題曰宋庠紀年通譜大通加中字也十一月就德興降魏以吕祖謙標目修十二月魏以第三鎮酋長髙歡為晉州刺史以魏傳修梁髙祖武皇帝中大通二年魏敬宗孝莊皇帝永安三年春正月己丑魏復取巴州以吕祖謙標目修夏四月丁巳魏以太尉丹陽王蕭贊都督齊濟兖三州軍事開府齊州刺史以魏紀修魏驃騎大將軍爾朱天光左右大都督賀拔嶽侯莫陳悅取安定万俟醜奴蕭寶寅皆伏誅以吕祖謙標目修六月丁巳梁遣魏汝南王悅還北主魏以梁紀修秋七月魏以賀拔嶽為涇州刺史侯莫陳悅為渭州刺史將軍宇文泰行原州事以通鑑修九月長星見以朱熹綱目修魏爾朱榮上黨王天穆至洛陽戊戌榮父子及天穆等皆伏誅己亥僕射爾朱世隆據北中城冬十月乙卯退走與車騎大將軍儀同汾州刺史爾朱兆立行并州事長廣王曄為皇帝改元建明三徐州刺史爾朱仲遠亦起兵十二月甲辰兆陷洛陽執魏主子攸遷之於晉陽殺司徒臨淮王彧等甲子弒魏主以吕祖謙標目修魏大將軍爾朱兆使髙歡領六鎮部衆以吕祖謙標目修魏齊州亂蕭贊走死以朱熹綱目修魏汝南王悅自東徐州南還以通鑑修梁髙祖武皇帝中大通三年魏節閔帝元恭普泰元年春二月魏尚書令爾朱世隆廢其主曄更立儀同廣陵王恭改元庚午詔但稱帝以吕祖謙標目修魏河北大使髙乾雍襲據冀州迎髙歡以魏紀通鑑修三月癸酉魏封故主曄為東海王加爾朱兆十州都督世襲并州刺史封髙歡為勃海王徴之不至以魏紀通鑑修己丑魏以賀拔嶽為岐州刺史侯莫陳悅為秦州刺史以魏紀修夏四月乙巳梁太子統卒五月丙申立晉安王綱為皇太子六月癸丑立統之子歡為豫章王譽為河東王察為嶽陽王以梁紀修庚申魏勃海王歡起兵討爾朱氏以吕祖謙標目修秋七月魏太保爾朱世隆殺前太保楊椿夷其族以魏紀修冬十月壬寅魏勃海王歡立勃海太守元朗為皇帝改元中興歡自為丞相都督中外諸軍大將軍録尚書事辛亥大破爾朱兆於廣阿以吕祖謙標目修解題曰按北齊書列傳戰于韓陵歡將中軍髙敖曹將左軍髙嶽將右軍中軍敗績賊乘之嶽以五百騎衝其前斛律敦收散卒躡其後敖曹以千騎自栗園出橫擊兆軍歡方得回師表裏奮擊兆衆大敗是日微敖曹等髙祖幾殆又後周書列傳兆率鐵騎陷陳出歡之後將乘其背而擊之爾朱度律惡兆之驕悍懼其陵已勒兵不肯進賀拔勝以其擕二遂率其麾下降於歡度律軍以此先退遂大敗餘見通鑑韓陵在相州安陽縣東北十五里是歲魏南兖州降梁以通鑑修梁髙祖武皇帝中大通四年魏孝武皇帝元修永熙元年春正月梁立西豐侯正德為臨賀王以梁紀修梁送魏汝南王悅入洛以通鑑修壬午魏勃海王歡取相州以吕祖謙標目修二月壬寅梁以太尉元法僧還北主魏以梁紀修梁揚州刺史邵陵王綸有罪免為庶人以通鑑修甲子魏勃海王歡自為大丞相柱國大將軍太師以魏紀修三月丁丑魏主朗入鄴以魏紀修閏月壬寅魏儀同爾朱世隆召爾朱兆大司馬雍州刺史爾朱天光太宰徐州刺史爾朱仲遠等攻鄴壬戌勃海王歡大敗之于韓陵夏四月世隆伏誅仲遠奔梁以魏紀吕祖謙標目修魏賀拔嶽侯莫陳悅宇文泰取長安以吕祖謙標目修魏勃海王歡入洛陽廢其主恭又廢其主朗於河陽戊子立儀同左僕射平陽王修為皇帝改元太昌歡自為大丞相以皇極經世吕祖謙標目修魏徵關西大行臺賀拔嶽為冀州刺史不至以通鑑修壬辰魏勃海王歡還鄴以魏紀修魏爾朱天光伏誅以通鑑修五月魏封故主朗為安定郡王以魏紀修丙申魏弒其故主恭以吕祖謙標目修秋七月甲辰星隕如雨南史梁紀魏勃海王歡擊爾朱兆走之遂據晉陽以吕祖謙標目修冬十一月甲辰魏弒其故主朗及曄以魏紀修十二月梁以元法僧為郢州刺史以通鑑修魏殺大司馬汝南王悅以魏紀修魏改元以魏紀修解題曰宋庠紀年通譜永興本漢桓帝晉惠帝冉閔苻堅魏元明帝年號以同元明號尋改永熙魏主納勃海王歡女為后以通鑑修梁髙祖武皇帝中大通五年魏孝武皇帝永熙二年春正月魏勃海王歡襲秀容爾朱兆伏誅以吕祖謙標目修魏罷行臺以吕祖謙標目修己酉長星見以梁紀修魏侍中賀拔勝都督三荆等七州軍事荆州刺史以吕祖謙標目修解題曰三荆州者荆州北荆州東荆州也按魏書地形志荆州領南陽宋屬鄧唐二州順陽屬鄧州新野屬襄陽府鄧州東恆州屬鄧州漢廣屬唐州襄城屬唐州北清屬鄧州恆農屬鄧州八郡隋志所謂南陽郡舊置荆州者也北荆州領伊川屬河南府虢州新城屬河南府汝北屬汝州三郡隋志所謂河南陸渾縣襄城郡東魏置北荆州者也隋志又云淮安郡後魏置東荆州舂陵郡後魏置南荆州又通典釋三荆謂北荆州東荆州荆州而南不與焉十道志宿豫縣魏置徐州改為東徐州復為東楚州周宣帝改泗州三月辛卯魏勃海王歡復為大行臺以吕祖謙標目修魏驃騎大將軍開府徐州刺史髙乾雍伏誅大都督髙敖曹奔晉陽以吕祖謙標目修夏四月魏青州人殺膠州刺史五月東徐州人殺刺史降梁以魏紀修解題曰膠州領東武屬密州髙密屬密州平昌屬濰密青三州三郡秋八月魏以賀拔嶽都督雍華等二十州軍事雍州刺史嶽以行臺左丞宇文泰為夏州刺史以魏紀通鑑修冬十二月魏賀拔勝冦梁雍州破沔陽以吕祖謙標目修魏勃海王歡遣使間賀拔嶽侯莫陳悅以吕祖謙標目修梁髙祖武皇帝中大通六年孝靜皇帝元善見天平元年魏孝武皇帝永熙三年東魏春二月魏賀拔嶽侯莫陳悅討靈州刺史曹泥悅襲殺嶽於河曲嶽衆迎宇文泰魏以泰為大都督三月泰引兵討悅以吕祖謙標目修解題曰唐武德中突厥牙帳在於河曲數十萬騎將過原州今嶽衆散還平涼即此河曲也夏四月癸丑朔日有食之以魏志修侯莫陳悅奔上邽自殺魏以宇文泰為驃騎大將軍開府關西大都督承制以吕祖謙標目修六月魏勃海王歡反魏主以宇文泰兼僕射為大行臺秋七月己丑魏主屯河橋戊申奔長安己酉歡入洛陽八月推司徒清河王亶為大司馬承制決事魏主以泰為大將軍雍州刺史尚書令歡追魏主九月取潼關還使行臺侯景取荆州賀拔勝奔梁以魏紀吕祖謙標目修冬十月丙寅勃海王歡立清河世子善見為皇帝改元是為東魏魏始分為二以吕祖謙標目北史齊紀修解題曰范祖禹曰拓跋氏乘後燕之衰蠶食并冀蹀血三十餘年而國中略定其始也公卿方鎮皆故部落酋長雖參用趙魏舊族往往以猜忌夷滅爵而無祿故吏多貪墨刑法峻急故人相殘賊不貴禮義故士無風節貨賂大行故俗尚傾奪遷洛之後稍用夏禮宣武柔弱孝明幼沖母后亂於內羣盜撓其外禍始於六鎮釁成於爾朱國分為二而亡矣雖享國百餘年典章制度內外風俗大抵與劉石慕容苻姚略同道武大武暴戾甚於聰虎孝文之強不及苻堅其文章儒學之流既無足紀謀臣辨士將帥功名又不可希望前世自道武元年至是一百四十九年丁卯梁以將軍元慶和為驃騎大將軍伐東魏以本紀修魏宇文泰克潼關進位大丞相以通鑑修丙子東魏遷鄴勃海王歡還晉陽以吕祖謙標目齊紀修解題曰相臺志鄴自苻丕失守慕容農入之以城廣難固乃築鳳陽門大道之東為隔城自是殘毁髙歡以城窄隘天平二年發衆營新宫元象元年九月城鄴二年魏帝徙御新宫即南城也東西六里南北八里六十步凡十一門南靣三門東四門西四門四民輻輳里閭填溢有四百餘坊其制度大扺取之洛陽鄴自歡營之洋飾之奢侈往往甚於石趙胡寅曰遷國大事也必君與民皆不寧厥居然後遷然民情猶安土重遷也則必丁寧告諭使之曉然知安危大計寬其期日制其先後衛其道途飢餒盜賊之虞立其坊里巷曲屋廬之所不使之生怨嗟傷和氣也魏都洛四十年以爾朱之暴初欲遷都見帝居之盛歎息而止而髙歡於三日之內逼逐四十餘萬户狼狽入鄴雖軀牛羊犬豕不至若是烈也其不仁亦甚矣哉事見通鑑十二月魏擊曹泥以通鑑修閏十二月癸巳魏宇文泰弒其主修立太宰南陽王寶炬以吕祖謙標目修是時魏取荆州東魏尋襲取之以吕祖謙標目修梁髙祖武皇帝大同元年東魏孝靜皇帝天平二年魏文帝元寶炬大統元年春正月戊申朔梁改元以梁紀修魏主寶炬即皇帝位改元以魏紀周紀修魏克靈州以本紀修己酉魏宇文泰自為都督中外軍事大行臺以本紀修魏主立妃乙弗氏為皇后子欽為皇太子以通鑑修己巳東魏勃海王歡自為相國加殊禮復辭不受以魏紀齊紀修二月戊戌梁司州刺史陳慶之伐東魏不利而還以魏紀通鑑修三月東魏平劉蠡升以吕祖謙標目修魏宇文泰為新制二十四條以著作郎蘇綽為大行臺左丞參典機密以通鑑修解題曰泰與公卿往昆明池觀漁行至城西漢故倉池水經注故渠與沉水枝渠會飛渠漸水入城東為倉池池在未央宫西中有引臺顧問左右莫有知者或曰蘇綽博物多通請問之泰乃召綽具以狀對泰大悅因問天地造化之始厯代興亡之迹綽應對如流泰與綽並馬徐行至池竟不設網罟而還遂留綽至夜問以治道泰臥而聼之於是指陳帝王之道兼述申韓之要此正可見綽之學術通鑑刪去此一語泰乃起整衣危坐不覺膝之前席語遂達曙不厭餘見通鑑夏四月魏元慶和攻東魏遣司徒髙敖曹等拒之以通鑑修解題曰按丘悅三國典略魏制曰逆賊髙歡初從爾朱榮入洛勸榮篡位罪一孝莊幽辱實歡之由無辭可反詐為建議罪二廢殺建明罪三廢殺中興罪四廢殺普泰罪五廢殺汝南王罪六雖尊先帝然實輕凌舉兵逼逐罪七先帝嘗使舍人元士弼詣歡論事歡露髮袒體見士弼直問何物來士弼曰有敕歡曰何物敕取書裂之肆口惡罵罪八毁撤宫廟焚除塔寺户口百萬驅擁北遷死者過半罪九蒸孝莊皇后逼令為尼罪十取普泰皇后列在私房罪十一改嫁孝武皇后與彭城王更相擬以圖廢置罪十二髙乾兄弟起義立勳歡忌其豪強密令誅殺帝不獲已而從之歡見敖曹哭稱其枉死罪十三兄事賀拔允令看額上有天子相否允不敢答由是害之罪十四武衛伊林先帝親委歡收斬之罪十五歡上事天柱下承兒姪銜瀝餘血誓同生死乃背爾朱盡加誅滅罪十六從叔自南歸國歡忌而殺之罪十七尚書崔孝芬辛雄等國家勳舊責以駕行不從一時屠害罪十八永熙中求并州城營起臺殿詐云誘賊劉蠡升中旨頻抑終不肯停罪十九歡逐先帝之後扶清河王嫌其長大難制復廢之立其幼男猶忌清河尋行鴆毒罪二十歡有莫大之罪未伏天誅朕將親帥六軍龔行薄伐丞相董兹戎律計日殱定勃海王自以爵位署其檄曰告宇文黑獺逆徒等汝擁逼乘輿遠遁關隴豫秉丹誠龔行天罰今遣相州刺史孫騰自潼關西入都督濟州刺史竇泰為南靣都督前冀州刺史司徒公髙昻直截隴口前濟州刺史蔡擕領魯陽蠻兵從鹽池西渡為西靣開府定州刺史十二州大行臺侯景領四海雄豪為後軍克十一月三十日大集西雍州餘見通鑑五月魏宇文泰自加柱國以魏紀修秋七月魏東益州降梁以通鑑修八月甲午東魏營新宫以魏紀修冬十一月丁酉梁侍中中衛將軍徐勉卒以吕祖謙標目修梁北梁州刺史蘭欽攻魏梁州降之以梁紀修解題曰按通典天監二年失漢州四十二年始復今考之天監四年魏取漢州至是始三十一年通典誤也隋書地理志及通典梁於普安郡宋慶隆府置南梁州復改為安州於西城郡金州置梁州尋改曰南梁州寰宇記梁於魏興金州郡置北梁州尋改為南梁州西城即魏興也蘭欽稱北梁州刺史其時未改為南梁州也又欽傳云密敕欽向魏興經南鄭而寰宇記亦云欽克梁州復移治在南鄭縣尤明白也魏書地形志梁州領晉昌宋屬洋州褒中屬興元府漢中屬興元府金州華州屬興元府四郡十二月甲午東魏始量給百官祿以吕祖謙標目修是歲魏與柔然和親以通鑑修梁髙祖武皇帝大同二年靜皇帝天平三年魏文帝大統二年東魏考春正月東魏勃海王歡襲取魏夏州拔靈涼二州以歸以吕祖謙標目修解題曰按魏書地形志夏州領化政宋屬夏州闡熙屬宥州金明屬延安府保安軍代名未詳四郡涼州領武安屬涼州臨松屬甘州建昌屬蘭州番和屬涼州泉城屬西和州武興武威昌松並屬涼州東涇梁寧並未詳十郡又按靈州前漢北地郡富平縣地後漢廢晉亂為夏果園城後魏置薄骨律鎮太和更為沃野鎮尋復孝昌中改置靈州移治胡地城以在河渚上故亦取漢縣為名天平中又置寄治汾州隰城縣界隋為靈武郡𨽻雍州今為靈州回樂縣靜州保靜縣後周書列傳歡襲陷夏州宇文泰慮其南下與朝臣議之郭賢曰髙歡兵士雖衆智勇已竭䇿其舉措必不敢遠來昔賀拔公薨關中振駭而歡不能因利乘便進取雍州是無智及鑾駕西遷六軍寡弱毛鴻喪敗關門不守又不能乘此危機以要一戰是無勇今上下同心歡寧敢送死且豳夏荒阻千里無煙縱欲南侵資糧莫繼歡果退餘見通鑑葉適曰歡趦趄過放於狼狽洶湧之時而乃噤齘決死於安徐已定之後宜其屢進而屢却哉二月丁酉東魏勃海王歡世子大行臺并州刺史澄為尚書令加領軍京畿大都督入鄴輔政以魏紀修解題曰通鑑考異曰魏紀為尚書令大行臺大都督北齊文襄紀天平元年為尚書令大行臺并州刺史入朝輔政光疑尚書令不在外大行臺不在內不知歡遣其子自并入鄴輔政事固有出於故常之外者也夏五月癸卯梁以尚書右丞江子四封事付尚書檢括以梁紀修秋七月賀拔勝等復歸於魏以通鑑修九月壬寅東魏以定州刺史侯景兼右僕射南道行臺攻梁冬十月梁陳慶之破走之以魏紀梁紀吕祖謙標目修冬十二月壬申東魏請和於梁自是交聘不絶以吕祖謙標目修東魏勃海王歡殺大司馬清河王亶以通鑑考異修解題曰通鑑考異國典云亶為髙歡所鴆典略周太祖數歡罪亦云殺亶魏帝紀云亶薨今從之夫魏收齊人也其作魏史固為齊諱國典典略則公言也通鑑不從此而從彼何耶丁丑東魏勃海王歡伐魏次蒲津遣髙敖曹趣上洛車騎大將軍竇泰趣潼關以魏紀齊紀修是歲魏大飢死者十七八以魏紀修梁髙祖武皇帝大同三年靜皇帝天平四年魏文帝大統三年東魏孝春正月癸丑魏宇文泰襲敗竇泰殺之勃海王歡遁髙敖曹亦還以吕祖謙標目修秋八月丁丑魏宇文泰伐東魏庚寅拔恆農以吕祖謙標目修閏九月甲子梁以揚州刺史武陵王紀都督梁益等州軍事益州刺史以傳紀吕祖謙標目修東魏勃海王歡趨蒲津魏宇文泰還師冬十月癸巳大破歡於渭曲泰自為柱國大將軍取蒲坂洛陽滎陽降潁梁廣三州十一月降陽豫二州以吕祖謙標目修解題曰按魏書地形志潁州領汝陰弋陽北陳留頴川宋並屬穎昌府頓邱梁興西恆農陳南二郡屬頴昌府東郡汝南清河南陽東恆農屬安豐軍新蔡南陳留滎陽北通汝南太原新興二十郡陽州領宜陽屬河南府金門屬河南府虢州二郡韋述兩京道里記福昌縣界穀州城東魏陽州理此梁髙祖武皇帝大同四年靜皇帝元象元年魏文帝大統四年東魏孝春正月辛酉朔日有食之以魏紀修丁卯東魏改元以吕祖謙標目修二月魏南汾頴豫廣州復入東魏以通鑑修解題曰按梁載言十道志慈州西魏為南汾州魏書地形志南汾州領北吐京南吐京五城西五城定陽西定陽北鄉中陽龍門並宋西慈州之地九郡廣州領南陽宋潁昌府汝州之地定陵潁昌府之地魯陽汝南漢廣並汝州之地襄城潁昌府汝州之地順陽潁昌府汝州七郡三月魏廢其后乙弗氏立柔然女郁久閭氏為后以吕祖謙標目修魏宇文泰屯華州以吕祖謙標目修秋七月東魏侯景圍洛陽魏宇文泰奉魏主救之八月庚寅景退辛卯泰追之不利而還關中大擾泰討平之以魏紀朱熹綱目吕祖謙標目修東魏取洛陽以吕祖謙標目修九月魏主入長安以通鑑修冬十二月魏襲取東魏洛陽廣州以吕祖謙標目修魏正光後僧尼至二百萬東魏始禁立寺以吕祖謙標目修魏南兖州刺史韋孝寬取東魏宜陽行臺王思政城玉壁以吕祖謙標目修解題曰通典曰玉壁今絳郡稷山縣東魏髙澄攝吏部尚書始改年勞之制以吕祖謙標目修解題曰胡寅曰澄既改年勞之制銓擢賢能而他日辛術管銓取士必以才器然則停年之法髙澄髙洋尚知其弊而通變之况明君賢相而反不能乎事見通鑑梁髙祖武皇帝大同五年靜皇帝興和元年魏文帝大統五年東魏孝春正月乙卯梁以丹陽尹何敬容為尚書令自晉末宰相皆以文義自逸敬容獨勤簿領以綱維為己任以紀傳修解題曰姚察曰魏正始及晉之中朝俗尚虛玄貴為放誕尚書丞郎以上簿領文案不復經懷皆成於令史逮乎江左此道彌扇惟卞壼以臺閣之務頗欲綜理阮孚謂之曰卿常無間暇不乃勞乎宋世王敬𢎞身居端右未嘗省牒風流相尚其流遂遠望白署空是稱清貴恪勤匪懈終滯鄙俗是使朝經廢於上職事隳於下永嘉不競戎馬生郊何國理之識見譏薄俗惜哉魏宇文泰置華州行臺學以吕祖謙標目修解題曰泰於行臺置學取丞郎及府佐德行明敏者充之悉令旦理公務晚就講習先六經後諸子夏五月甲戌東魏主納勃海王歡女為后以魏紀修秋九月甲子東魏城鄴冬十月癸亥東魏改元以魏紀古録修十一月東魏行興光厯以魏紀厯志修梁分州為五品時方恢拓境宇建置紛綸州郡雖多而户口日耗以通鑑修梁髙祖武皇帝大同六年靜皇帝興和二年魏文帝大統六年東魏孝春正月庚戌魏朝羣臣禮樂稍備以魏紀修二月柔然侵魏魏主殺其故后乙弗氏未幾郁久閭氏亦殂以周紀通鑑修夏閏五月丁丑朔日有食之以魏志修是時吐谷渾始稱可汗以吕祖謙標目修梁髙祖武皇帝大同七年靜皇帝興和三年魏文帝大統七年東魏孝秋魏省官屯田九月魏頒六條以通鑑修解題曰按後周書列傳蘇綽為六條詔書奏施行之其一先治心治民之本莫若守宰之最重也治民之要在清心而已心氣清和志慮端靜則邪僻之慮無因而作以臨其民孰不從化其次又在治身凡人君之身乃百姓之表故人君必心如清水形如白玉躬行仁義孝弟忠信禮讓亷平儉約繼之以無倦加之以明察行此八者以訓其民不待家教日見而自興行矣其二敦教化曰性無常守隨化而遷化於敦朴者則質直化於澆偽者則浮薄凡諸守牧令長宜洗心格慮上承朝旨下宣教化扇之以淳風浸之以太和被之以道德示之以朴素使百姓亹亹日遷於善而不知此之謂化教之以孝悌仁順禮義使慈愛和睦敬讓此之謂教其三盡地利曰人生天地之間以衣食為命是以聖王先足其衣食然後教化隨之諸州郡縣每至歲首必戒敕部民但能操農器者皆令就田及布種既訖嘉苗須理麥秋在野蠶停於室皆宜少長悉力男女併功若有遊手怠惰者則隨事加罰罪一勸百此則明宰之教也夫三時者農之要也若不務省事而令民廢農者是絶民之命驅以就死農隙又當教民種桑植果藝其菜蔬畜育雞豚以備生生之資其四擢賢良曰刺史府官則命於天朝其州吏以下並守牧自置州郡大吏但取門資多不擇賢良今之選舉者當不限資蔭唯在得人求材藝者必先擇志行善者舉之不善者去之凡求賢之路自非一途然所以得之審者必由任而試之考而察之起於居室至於鄉黨訪其所以觀其所由則賢不肖别矣其五恤獄訟曰治獄之官精心悉理推究事源先之以五聽參之以證驗使姦無所容罪人必得然後消息情理斟酌禮律此則善之上也有疑則從輕未審不妄罰隨事斷理獄無停滯此亦其次其六均賦役曰三五以來皆有征稅之法雖輕重不同而濟用一也今軍用資廣雖未遑減省以恤民瘼然令平均使下無匱夫不捨豪強而懲貧弱不縱姦巧而困愚拙之謂均又差發徭役多不在意貧弱者重徭而遠戍富強者輕使而近防此王政之罪人也泰甚重之令百官誦習其牧守令長非通六條及計帳者不得居官葉適曰六條平實無茟自董仲舒蕭望之劉向崔實王苻之流皆論治道而無一言之幾如綽者固未易也冬十月甲寅東魏頒行麟趾格以朱熹綱目修十二月交州李賁反梁遣兵擊之以吕祖謙標目修是歲魏頒十二條制以魏紀修東魏勃海王歡命濵河積穀轉漕傍海煮鹽連歲大稔民稍蘇息以吕祖謙標目修解題曰自遷鄴後傍海煮鹽滄州置竈一千四百八十四瀛州置竈四百五十二幽州置竈一百八十青州置竈五百四十六又於邯鄲置竈四終歲收鹽二十萬九千七百八十斛四升軍國所資得以周贍蓋魏前此止𣙜池鹽至是始𣙜海鹽梁髙祖武皇帝大同八年靜皇帝興和四年魏文帝大統八年東魏孝春正月梁安成妖賊反改元三月江州司馬王僧辨斬之以魏傳修魏置六軍以魏紀修秋八月東魏以吏部尚書侯景兼僕射河南大行臺以魏紀修冬十月東魏勃海王歡伐魏圍玉壁弗克而還以魏紀修十二月梁盧子略等反攻廣州參軍陳霸先討平之以陳紀通鑑修梁髙祖武皇帝大同九年靜皇帝武定元年魏文帝大統九年東魏孝春正月壬戌東魏改元以魏紀修解題曰宋庠紀年通譜歐陽修語宋靖國曰魏武定元年當在大統九年不當在八年二月壬申東魏北豫州刺史髙仲密以虎牢降魏魏宇文泰應之三月圍河橋戊申東魏勃海王歡大敗之於邙山己酉泰遁歡追至陕而還夏四月取北豫洛州以稽古録及吕祖謙標目修解題曰東魏改司州為洛州領洛陽今河南府洛陽縣河陰屬河南府洛陽縣新安河南府新安縣中川河南府登封縣河南河南府縣陽城河南府登封縣六郡冬十一月東魏築長城於肆州以魏紀修梁髙祖武皇帝大同十年靜皇帝武定二年魏文帝大統十年東魏孝春正月魏詔公卿以下月上封事三條以魏紀修李賁稱越帝改元以本紀修解題曰按三國典略賁興建雙闕立二十四鎮郡縣百餘三月壬子魏以髙澄為大將軍領中書監侍中太原公髙洋為左僕射門下機事皆歸中書以通鑑目録修秋七月魏更權衡度量損益新制三十六條以魏紀周紀修冬十月丁巳東魏括隱户以吕祖謙標目修梁髙祖武皇帝大同十一年靜皇帝武定三年魏文帝大統十一年東魏孝春二月魏遣使如突厥以通鑑修夏六月魏命蘇綽作大誥以通鑑修梁交州刺史楊㬓討李賁敗之以通鑑修秋八月東魏髙歡納柔然女以吕祖謙標目修冬十月梁復贖刑以梁紀修解題曰程大昌曰古者金作贖刑或百鍰或五十鍰至漢又以金價計贓自唐至今例皆以絹始自北齊髙睿等定律變古贖刑之制以中絹代之至唐贖罪雖用銅而計贓遂用絹價開元十五年敕定為五百五十餘見天監元年梁議贖刑解題十二月梁散騎常侍賀琛陳四事詔詰責之以朱熹綱目修解題曰胡寅曰武帝謂公車讜言日關聽覽今考之獨江子四嘗上封事而琛繼之四十年間讜言止此尚以日聞答塞臣下可乎夫琛目擊時事粗條其目帝誠聽納而召問之則暴橫姦猾之名可得矣夫風俗侈靡飢寒之本也善為國者雖躬行節儉必為制度使不得踰越令出必行又何有苛擾之患誠使禮節既定則雖太牢而祭大烹養賢乃人主所當為又何以蔬菜為哉今禮制不立而風俗侈靡守宰貪殘為良民害則雖粗衣糲飯無益也凡臣庶則有私藏人主豈有私藏哉武帝謂不食公食其用徒匠資於傭借是有私藏也是非天降地出不謂國家之制而謂之何哉周公作無逸戒成王自古聖賢之君罔或不勤武帝夜半而起日昃而食勤亦至矣而國破身辱何也所治者事而非政也偏聽生姦獨任成亂此言是也如趙髙王莽固不可也如得賢人君子而用之不專亦不能成治功矣武帝雖並置三公而所信惟朱異人譽侯景為忠臣雖指鹿為馬不是過也然則屈折賀琛率皆強辨又安能服琛之心哉事見通鑑梁主疏簡刑法公卿不以鞠獄為意枉濫者多以通鑑目録修梁髙祖武皇帝中大同元年靜皇帝武定四年魏文帝大統十二年東魏孝春正月李賁奔獠中以吕祖謙標目修解題曰按魏史方輿記蜀本無獠李勢時諸獠始出巴西渠川廣漢陽安資中犍為梓橦布在山谷十餘萬落攻破郡縣為益州大患自桓溫破蜀之後力不能制又蜀人東流山險之地多空獠遂挾山旁谷與人參居者頗輸租賦在深山者仍為匪人三月庚戌梁主講佛書於同泰寺夏四月丙戌解講改元是夜同泰浮圖災復作之以梁紀通鑑修魏涼瓜州亂五月討平之以朱熹綱目修六月庚子東魏以司徒侯景為河南大將軍大行臺以通鑑修秋七月丙寅梁用足陌錢人不從以梁紀通鑑修解題曰程大昌曰憲宗時淮蔡用兵皇甫鏄建議每緡墊二十外復抽五十元和十二年民間墊陌外有至七十者穆宗時京兆尹柳公綽禁止之尋以用錢墊陌不一從俗所置內外經用每緡墊八十昭宗末京師用錢八百五十為貫河南府以八十為百後漢隱帝時王章為三司使每百又減三錢餘見通鑑八月東魏遷洛陽石經于鄴以魏紀修魏以晉州刺史韋孝寬守玉壁九月東魏勃海王歡圍之以吕祖謙標目修解題曰通典當齊神武之時與周文帝抗敵十三四年間凡四出師大舉西伐周師東討者三焉略舉親征命將攻戰則不復紀自文宣之後才守境而已梁載言十道志晉州後魏立東雍州孝明改唐州尋為晉州李賁自獠中出梁陳霸先敗之以通鑑目録修冬十月乙亥梁前東揚州刺史嶽陽王察為雍州刺史以梁紀吕祖謙標目修東魏勃海王歡攻玉壁弗克十一月庚子還以其子太原公洋鎮鄴澄還晉陽以吕祖謙標目齊紀修魏以韋孝寬為驃騎開府以通鑑修魏宇文泰屯同州十二月大行臺度支尚書司農卿蘇綽卒以吕祖謙標目修大事記續編卷四十二
