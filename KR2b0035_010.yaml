body:
  text: 大事記續編卷十明王禕撰漢顯宗孝明皇帝永平元年春正月帝朝原陵如元會儀以夲紀修觧題曰西都舊有上陵東都之儀百官四姓婦女公主諸王大夫外國朝者侍子郡國計吏㑹陵晝漏上水大鴻臚設九賔随立寝殿前薛綜曰九賔謂王侯公卿二千石六百石下及郎吏匈奴侍子凡九等鐘鳴就位如儀乗輿自東廂下太常導出西向拜升阼階拜神座退東廂侍中尚書陛者皆在神座後公卿群臣謁神坐太官上食太常樂奏食舉文始五行之舞禮樂闋君臣受賜食畢郡國上計吏以次前當神軒占其郡榖價民所疾苦欲神知其動静孝子盡禮敬爱之心也八月飲酎上陵禮亦如之漢官儀古不墓祭秦始皇起寝於墓側漢因而不改諸陵寝皆以晦望二十四氣三伏臘社及四時上飲其親陵所宫人随鼔漏理被枕具盥水陳荘具天子以正月上原陵胡寅曰送死之禮即逺而無退至於墓則終事盡矣人子孝思不忘則專精於廟享而已矣盖墓藏體魄而致生之是不知也廟以宅神而致死之是不仁也此聖人制禮明乎幽明之故仁智合而禮義盡也既已送形而徃安于地下迎精而反主乎廟中又致隆於陵園如元㑹儀是反易陵廟之禮以體魄為有知虚廟祏而不重設復奉廟中之主而終祭于陵所皆違禮也明帝此舉盖生於原廟蔡邕不折衷以聖人之制而直論其情情豈有既哉夏五月髙宻元侯鄧禹薨以夲紀修戊寅東海恭王彊薨以夲紀修秋七月馬武等擊燒當羗大破之募士卒戍隴右以夲紀修觧題曰自罷車騎材官之後募士弛刑不絶書矣八月徙山陽王荆為廣陵王遣就國以夲紀修觧題曰唐仲友曰荆以飛書與東海王彊殆類管蔡流言罪浮於楚王英顯宗嚴於楚獄而寛於荆者以同母異母而有私情也事見通鑑祭彤使鮮卑擊烏桓大破之罷縁邉屯兵以夲紀修觧題曰烏桓赤山烏桓也李賢曰赤山在遼東西北數千里漢顯宗孝明皇帝永平二年春正月辛未宗祀光武皇帝於明堂始服冠冕衣裳佩履以行事登靈䑓望雲物以夲紀通鑑修觧題曰李賢曰漢官儀曰天子冠通天諸侯王冠逺逰三公諸侯冠進賢三梁卿大夫尚書二千石慱士冠両梁二千石已下至小吏冠一梁天子公卿特進諸侯祀天地明堂皆冠平冕天子十二旒三公九卿諸侯七其纓各如其綬色𤣥衣纁裳周禮曰王祀昊天上帝則服大裘而冕祀五帝亦如之三禮圗冕以三十升布漆而為之廣八寸長尺六寸前圜後方前髙後下有俛伏之形欲人之位彌髙而志彌下董巴輿服志顯宗初祀天地衣裳以𤣥上纁下乗輿偹文日月星辰十二章三公諸侯用山龍九章卿已下用華蟲七章皆五色采乗輿刺繡公卿已下皆織成徐廣車服注禮記曰天子佩白玉諸侯佩山𤣥玉大夫佩水蒼玉世子佩瑜玉周禮屨人掌王赤舃青絇三月帝臨辟雍初行大射禮以夲紀修觧題曰李賢曰儀禮大射之禮三将祭射宫擇士以助祭也張虎侯熊侯豹侯天子侯中一丈八尺畫以雲氣焉王以六耦射三侯樂以騶虞九節諸侯以四耦射二侯樂以貍首七節孤卿大夫以三耦射一侯樂以采蘋五節士以三耦射豻侯樂以采蘩三節袁山松書曰天子皮弁素積親射大侯令郡國行鄉飲酒禮于學以禮儀志袁宏漢紀修觧題曰禮儀志皆祀聖師周公孔子牲以太牢李賢曰鄭𤣥注鄉飲酒禮曰今郡國十月行鄉飲酒禮黨正每嵗邦索鬼神而祭祀則以禮属民而飲酒于序以正齒位之禮凡鄉黨飲酒必於民聚之時欲其見化知尚賢尊長也𤣥冠衣皮弁服與禮異冬十月壬子帝幸辟雍初行養老禮賜五更桓榮爵闗内侯三老五更以二千石祿養終身賜天下三老酒肉以夲紀修觧題曰夲紀詔曰光武皇帝建三朝之禮而未及臨饗李賢曰三朝明堂辟雍靈臺也眇眇小子属當聖業間暮春吉辰初行大射今月元日復踐辟雍尊事三老兄事五更安車輭輪供綏執授侯王設醤公卿饌珍朕親袒割執醤而饋執爵而酳祝哽在前祝噎在後升歌鹿鳴下管新宫李賢曰升登也登堂而歌所以重人聲也新宫小雅逸篇也八佾具偹萬舞於庭朕固薄徳何以克當易陳負乗詩刺彼已永念慙疚無忘厥心三老李躬年耆學明五更桓榮授朕尚書詩曰無徳不報無言不酬其賜榮爵闗内侯食邑五千户三老五更皆以二千石禄養終厥身其賜天下三老酒人一石肉四十斤有司其存耆耋恤幼孤惠鰥寡稱朕意焉餘見通鑑古人養老者将以乞言非直為觀美而已也詩曰養老乞言以成其福祿焉盖可見矣惜明帝徒事一時之觀美而失古人乞言之意反以師道自居而傳授於人後周之主亦嘗視學以太傅于謹為三老周主幸太學謹入門周主迎拜於門屏之間謹荅拜有司設三老席於中楹南向太師䕶升階設几謹升席南面慿几而坐大司馬升階正舄周主升階立於斧扆之前西面有司進饌周主跪設醤親為袒割謹食畢周主親跪祓爵以飲有司徹周主乃北面立而訪道謹起立於席後對曰木受繩則正后從諌則聖明主虚心納諌以知得失天下乃安又曰去食去兵信不可去願陛下守信勿失又曰有功必賞有罪必罰則為善者日進為悪者日止又曰言行者立身之基願三思而言九慮而行勿使有過天子之過如日月之食人莫不知願陛下謹之周主再拜受言曽謂明帝而不知此乎甲子帝幸長安祠廟陵十一月癸卯還宫以夲紀修十二月䕶羗校尉竇林下獄死以夲紀修是嵗始迎氣於五郊夲紀解題曰以禮䜟及月令有五郊迎氣服色因采元始中故事兆五郊於雒陽四方之兆各依其方中央之兆在未按祭祀志建武二年正月初制郊兆采元始中故事為圓壇八陛中又為重壇天地位其上其外壇上為五帝位其外為㙺重營皆紫以象紫宫隴蜀平後増廣郊祀髙帝配食位在中壇上建武三十二年初營北郊在洛陽城北四里為方壇四陛三十三年正月郊别祀地祗位南面西上髙皇后配西面北上皆在壇上併此迎五帝於五郊是為七郊也少府新陽侯隂就自殺以夲紀修南單于汗死單于比之子適立以列傳通鑑修漢顯宗孝明皇帝永平三年春正月癸巳詔勸農桑以夲紀修二月甲寅趙熹李訢免丙辰左馮翊郭丹為司徒己未南陽太守虞延為太尉以夲紀修甲子立貴人馬氏為皇后子炟為皇太子賜民爵有差以夲紀修圖畫中興功臣於南宫雲䑓以列傳通鑑修觧題曰事見通鑑朱黼曰范史雲䑓功臣分為上下二列各十六人經次而横數之上自鄧禹呉漢至劉隆下自馬成王梁至卓茂其功伐大小名次髙下皆有攸當盖古人編寫之法如此通鑑誤以范史緯次為縱數以二人為一列故以馬成次鄧禹王梁次呉漢而馮異耿純反位其下輕重差紊不可不正也五行志雲䑓者乃周家之所造也圗書術籍珍玩寳噐皆所藏在也夏四月封皇子二人為王以夲紀修六月丁夘有星孛于天舡北以夲紀修大起北宫尚書僕射鍾離意諌乃罷以列傳修秋八月戊辰詔改太樂曰大予樂以夲紀修觧題曰陳瓘曰光武信䜟而明帝用䜟改大予之官訓于子孫可不謹乎壬申晦日有食之以夲紀修觧題曰夲紀詔曰朕奉承祖業無有善政日月薄蝕彗孛見天水旱不莭稼穡不成人無宿儲下生愁墊雖夙夜勤思而智能不逮昔楚荘無災以致戒懼魯哀禍大天不降譴今之動變倘尚可救有司勉思厥職以匡無徳古者卿士獻詩百工箴諌其言事者靡有所諱列傳帝性𥚹察好以耳目𨼆發為明故公卿大臣數被詆毁近臣尚書以下至見提拽陽嘉中大司農劉據被譴召詣尚書傳呼促歩加以捶撲尚書令左雄言九卿位亞三事班在大臣孝明皇帝始有撲罸皆非古典帝納之是後九卿無復捶撲者朝廷莫不悚慄争為嚴切以避誅責惟尚書僕射鍾離意獨敢諌争數封還詔書臣下過失輙救觧之㑹連有變異復上䟽曰陛下畏敬鬼神憂恤黎元而天氣未和日月不明水泉湧溢寒暑違莭者咎在群臣不能宣化理職而以苛刻為俗吏殺良人繼踵不絶百官無相親之心吏人無雍雍之志至於盛逆和氣以致天災百姓可以徳勝難以力服先王要道民用和睦故能致天下和平鹿鳴之詩必言宴樂者以人神之心洽然後天氣和也願陛下垂聖徳揆萬幾詔有司慎人命緩刑罸順時氣以調隂陽帝雖不能用然知其至誠亦以此故不得乆留冬十月烝祭光武廟初奏文始五行武徳之舞以夲紀修觧題曰見永平十八年顕宗觧題甲子帝從皇太后幸章陵賜荆州刺史郭賀三公之服戊辰還宫以紀傳修是嵗大水以夲紀修漢顯宗孝明皇帝永平四年春帝幸近城欲獵于河内東平王蒼諌乃還以通鑑修二月辛亥詔耕籍田以夲紀修冬十月乙夘郭丹馮魴免丙辰以河内尹范遷為司徒大僕㐲恭為司空以夲紀修十二月陵鄉侯梁松下獄死以夲紀修漢顯宗孝明皇帝永平五年春二月庚戌東平王蒼罷歸藩以夲紀修冬十月帝幸鄴復元氏田租更賦六嵗還宫以夲紀修十一月北匈奴㓂五原十二月㓂雲中南單于擊却之以夲紀修是嵗免城門校尉竇穆等官以列傳通鑑修觧題曰百官志城門校尉一人比二千石司馬一人千石每門候一人六百石夲注曰雒陽十二門其南一門曰平城門漢官秩曰平城門為宫門不置候置屯司馬北宫門属衛尉其餘上西門雍門廣陽門津門小苑門開陽門中東門上東門榖門夏門漢顯宗孝明皇帝永平六年春二月王雒山出寳鼎夏四月甲子賜公卿帛禁章奏虚譽以夲紀修觧題曰事見通鑑漢雜事曰凡群臣之書通於天子者四品一曰章二曰奏三曰表四曰駮議章者需頭稱稽首上以聞謝恩陳事詣闕通者也奏者亦需頭其京師官但言稽首言下稽首以聞其中有所請若罪法劾案公府送御史臺卿校送謁者䑓也表者不需頭上言臣某言下言誠惶誠恐頓首頓首死罪死罪左方下附曰某官臣甲乙上冬十月帝幸魯祠東海恭王陵十二月幸陽城壬午還宫以夲紀修是嵗南單于適死單于莫之子蘓立數月死單于適之弟長立以列傳通鑑修漢顯宗孝明皇帝永平七年春正月癸夘皇太后隂氏崩以夲紀修北匈奴求合市許之以夲紀修漢顯宗孝明皇帝永平八年春正月己夘范遷薨二月虞延為司徒衛尉趙熹行太尉事以夲紀修初置度遼營以中郎将呉棠行度遼将軍事将黎陽虎牙營士屯五原曼栢以紀傳修觧題曰建武二十七年大司農耿國言宜置度遼将軍左右校尉屯五原以防逃亡顯宗如其議焉又按漢官儀建武二十二年建立三營虎牙營在長安亦號長安營雍在扶風李賢曰曼栢今勝州銀城縣也秋雨水以夲紀修冬十月北宫成以夲紀修丙子帝臨辟雍養三老五更以夲紀修詔死罪繫囚亡命减贖詣度遼營以夲紀修觧題曰亡命入贖始見於此按列傳章和元年赦天下繫囚在四月丙子以前减死罪一等勿笞詣金城而文不及亡命未發覺者廷尉郭躬謂死罪亡命亡慮萬人又自赦以來捕得甚衆而詔令不及皆當衆論肅宗即下詔赦焉帝遣使之天竺求得佛書以來以列傳通鑑修觧題曰按袁宏漢紀西域天竺有佛道焉佛者漢言覺将悟群生其教以修善慈心為主不殺生専務清淨其精者號為沙門沙門者漢言息盖息意去欲而歸於無為也程顥曰釋氏之學於敬以直内則有之矣義以方外則未之有也無義以方外其直内者其夲亦非又曰釋氏惟務上逹而無下學然則其上逹處豈有是也朱熹曰釋氏謂人死為鬼鬼復為人如此則天地間止是許多人來來去去更不由造化生生必無是理又以為人死精神不滅隨復受形生時所行善惡皆有報應故貴行善修道以錬精神而不已至無為而得為佛佛長一丈六尺黄金色頂中佩日月光變化無方無所不入故能化通萬物而大濟群生胡寅曰佛氏所謂外道者類能變匿身形飛騰𨼆顯幻出光景怪異佛欲降伏之於是無所不學遂盡其術如黄金色日月光皆幻術之一二也初帝夢見金人長大頂有日月光以問群臣或曰西方有神其名曰佛其形長大而問其道術遂傳于中國而圖其形像焉有經數千萬以虚無為宗包羅精粗無所不統善為宏濶勝大之言所求在一體之内所明在視聴之外世俗之人以為虚誕然歸于𤣥微深逺難得而測故王公大人觀死生報應之際莫不矍然自失餘見通鑑按三國志後魏佛老志漢武元狩中昆邪王殺休屠王來降獲其金人帝以為大神列於甘泉宫金人長丈餘不祭祀但燒香禮拜而已及張騫使大夏還始聞有浮屠之教哀帝元夀元年博士弟子秦景受大月氐王使伊存口授浮屠經所載與中國老子經相出入盖以為老子西出闗過西域之天竺教胡中土聞之未之信了也後明帝夢金人乃訪群臣傅毅始以佛對遣郎中蔡偣博士弟子秦景等使天竺寫浮屠遺範仍與沙門攝摩騰竺法蘭束還又得佛經四十二章及釋迦之像壬寅晦日有食之既詔群司極言班封事示百官以夲紀修北匈奴㓂西河諸郡以夲紀修漢顯宗孝明皇帝永平九年春三月辛丑詔死囚减罪詣五原朔方以夲紀修夏四月以公田賜貧人以夲紀修令司𨽻校尉刺史嵗上長吏治状尤異者以夲紀袁宏漢紀修是嵗大有年以夲紀修置四姓小侯學以夲紀修漢顯宗孝明皇帝永平十年春二月廣陵王荆有罪自殺國除以夲紀修觧題曰胡寅曰孟子没聖學不傳帝王之興未有能明先王之教以善天下者也設有為文具不過廣築師弟子宫養士數千貟而已至于子孫支属則致諸富貴之地尤不知教光武使鍾興授諸王侯春秋善矣興之學不傳於後世不知其有益於諸王侯否歟學經者必優㳺涵泳乆而後成非一日之暫遽能有功又不知諸王侯之受於興者日月何如也春秋為誅亂臣賊子而作廣陵王楚王皆以悖逆相繼誅死何昧於春秋也豈非師道不立之過哉事見通鑑夏閏四月甲午帝幸南陽祠章陵舊宅十二月甲午還宫以夲紀修作呼虖蒲吾渠以古今注修漢顯宗孝明皇帝永平十一年漅湖出黄金麒麟白雉醴泉嘉禾所在出焉夲紀漢顯宗孝明皇帝永平十二年春正月哀牢夷内属置永昌郡以夲紀修觧題曰李賢曰永昌在今匡州匡川縣西夏四月遣王景與将作謁者王呉修汴渠東至海口以夲紀修觧題曰水經注濟源出河北濟河而南也溢為滎澤大禹塞其淫水於滎陽下引河東南以通淮泗濟水分河東南流明帝詔王景與謁者王呉築堤修堰明年渠成帝親循行詔濵河郡國置河堤員吏如西京舊制十五年東至無塩嘉景功拜河堤謁者順帝陽嘉中又自汴口以東縁河積石為堰通淮口曰金堤靈帝建寕中又増修石門以遏渠水盛則通注津耗則輟流按漢地里志河南郡滎陽縣注卞水馮池皆在西南有狼湯渠首受泲東南至陳入頴過郡四行七百八十里李賢謂汴渠即莨蕩渠是也又河東郡垣縣注王屋山沇水所出入河軼出滎陽北地中東至琅槐入海過郡九行千八百四十里李賢謂濟水出今洛州濟源縣西北渡河東南入鄭州又東入滑曹鄆濟齊青等州入海是也陳師道汳水新渠記曰水經謂河至滎陽蒗蕩渠出焉渠至陽武其下為沙蔡水是也其出為隂溝至浚儀其下為渦别為汳汳至蒙别為獲餘波迣于淮陽東歴蕭彭城入于泗注謂鴻溝官渡甾獲舟浚與渠一也禹塞滎澤而通渠于甫田其後河絶旃然入焉即索水也漢地里志滎陽既有汴水又有狼湯而受泲蒙有獲水首受甾獲至彭城入泗考河渠書云自禹之後滎陽引河為鴻溝以通宋鄭陳蔡曹衛與濟汝淮泗會于楚而竹書紀年梁惠成王入河于甫田又引而東明非禹之舊也書曰濟入于河東出于陶丘北者入而復出也溢為滎者濟之别滎波既豬者障而東之也周官豫之川滎洛幽兖之川河泲則河南無濟矣其謂莨蕩受濟禹塞滎澤而用河者皆失之漢志莨蕩無出甾獲無始余謂與經合而滎水諸書皆不載又疑渠汳為二而滎有一焉自漢末河入于汳灌注兖豫永平中導汳起自滎陽别而東北至千乗入于海而河于是故凟在新渠之南注所謂絶河而受索自此始隋開皇中因漢之舊導河于汳大業合河索為通濟渠别而東南入于淮而故道竭今始東都受退水為臭河於畿為白溝于宋為長沙於單為石梁於徐為汳而南入於清南清故泗也五月詔禁百姓䘮葬車服過制以夲紀修秋七月乙亥伏恭罷大司農牟融為司空以夲紀修是嵗天下平安人無徭役粟斛三十牛羊被野以夲紀修漢顯宗孝明皇帝永平十三年春二月帝耕藉田以夲紀修夏四月汴渠成辛巳帝循河渠遂幸上黨壬寅還宫以夲紀修冬十月甲辰日有食之以五行志修楚王英謀反十一月廢遷丹陽所連及死徙者數千人以夲紀修漢顯宗孝明皇帝永平十四年春二月甲戌虞延免自殺以夲紀修觧題曰建武二十四年延遷洛陽令隂氏有客馬成常為姦盗延收考之信陽侯隂就訴帝帝乃親錄囚徒知延不私成伏誅於是外戚歛手楚王英謀反隂氏欲中傷之使人私以楚謀告延延不然其言及事發詔書切譲遂自殺夏四月丁巳以鉅鹿太守邢穆為司徒以夲紀修故楚王英自殺時治楚獄累年帝幸雒陽獄理出千餘人以列傳通鑑修觧題曰故侍御史寒朗與三府掾属共考按楚獄心傷其寃帝召朗入問對曰臣見考囚在事者咸云言妖惡大故臣子所宜同疾故出之不如入入無後責是以考一連十考十連百又公卿朝會陛下問以得失皆長跽言舊制大罪禍及九族陛下大恩裁止於身天下幸甚及其歸舍雖不言而仰屋竊歎莫不知其多寃無敢悟陛下者臣今所陳誠死無悔餘見通鑑陳瓘曰獄之所以有寃而乆不决者朗之言盡之矣五月作初陵以夲紀修漢顯宗孝明皇帝永平十五年春二月庚子帝東狩三月幸孔子宅親御講堂命皇太子諸王説經夏四月庚子還宫以夲紀修觧題曰李賢曰孔子宅在今兖州曲阜縣故魯城中歸徳門内闕里之中背洙面泗矍相圃之東北封皇子六人為王以夲紀修冬獵于上林苑以夲紀修十二月以謁者僕射耿秉為駙馬都尉顯親侯竇固為奉車都尉屯凉州以夲紀修漢顯宗孝明皇帝永平十六年春二月遣太僕祭彤等四道伐匈奴竇固留兵屯田伊吾盧城彤坐畏懦下獄死以紀傳修觧題曰竇固與耿忠率酒泉燉煌張掖甲卒及盧水羗胡李賢曰湟水東經臨羗縣故城北又東盧溪水注之水出西南盧州萬二千騎出酒泉塞耿秉秦彭率武威隴西天水募士及羗胡萬騎出居延塞李賢曰居延塞在今甘州張掖縣東北祭彤呉棠将河東北地西河羗胡及南單于兵萬一千騎出髙闕塞李賢曰髙闕山名在朔方北來苗文穆将太原鴈門代郡上谷漁陽右北平定㐮郡兵及烏桓鮮卑萬一千騎出平城塞固忠至天山按魏王泰括地志李賢後漢注杜佑通典祁連山在甘州張掖縣西南二百里即天山又名白山雪山折羅漢山折羅漫山在伊吾縣北百二十里綿亘甘伊西數州之境通典又以為時羅漫山唐列傳吐蕃敗娄師徳於素羅汗山其實一也河西舊事白山之中有好水匈奴謂之天山去蒲類海百里擊呼衍王斬首千餘級王走追至蒲類海李賢曰今名婆悉海在庭州蒲昌縣東南留吏士屯伊吾盧城李賢曰匈奴中地名明帝置宜禾都尉以為屯田今伊州納職縣伊吾故小城地是李繪曰伊吾秦漢之際置屯田竇憲班超破西域始於此築城班勇為西域長史居此地後魏後周鄯善咸居之隋始於漢城之東築城為伊吾郡隋末雜胡據之貞觀四年置西伊州天寳仍為郡王容曰宜禾故城在𤓰州耿秉秦穆絶漠六百餘里至三木樓山來苗文穆至匈奴河水山虜皆奔走無所獲祭彤呉棠坐不至涿邪山免為庻人餘見通鑑以竇固假司馬班超為軍司馬使于寘西域皆遣子入侍以列傳通鑑修夏五月淮陽王謀反癸丑邢穆下獄死所連及誅死甚衆以夲紀修觧題曰楚獄之濫寒朗激切馬后勸止帝為之感悟夜起彷徨多所降宥若有徙仁悔過之機淮陽濟南之獄連坐死徙者甚衆終帝之世錮者不釋遷者不徙豈其天資之明察至是而復不能自克耶至章帝然後還徙除禁錮耳事見通鑑戊午晦日有食之夲紀六月丙寅以大司農王敏為司徒以夲紀修秋七月徙淮陽王延為阜陵王食二縣以紀傳修是嵗北匈奴㓂雲中以夲紀修濟南王康坐謀不軌削五縣以列傳修觧題曰按夲傳康在國不循法度交通賔客其後人上書告康招來州郡姦猾漁陽顔忠劉子産等又多遺繒帛案圖書謀議不軌事下考有司舉奏之顯宗以親親故不忍窮竟其事但削祝柯隰隂東朝陽安徳西平昌五縣建初八年肅宗復還所削地夲紀通鑑皆不載嵗月不可考建初元年楊終以廣陵楚淮陽濟南之獄徙者數萬今因淮陽王之徙牽連書之按郡國志祝柯隰隂安徳属平原郡李賢曰東朝陽在齊川臨濟縣東西平昌今徳州般縣漢顯宗孝明皇帝永平十七年春二月王敏薨三月癸丑以汝南太守鮑昱為司徒以夲紀修甘露仍降樹枝内附芝草生殿前五色爵翔集京師西南夷白狼等百餘種奉貢以夲紀修班超執䟽勒王兠題立故王弟忠為王以列傳修夏五月戊子公卿以帝威徳懐逺祥物顯應奉觴上夀詔太常告宗廟賜民爵以夲紀修觧題曰陳瓘曰中元有醴泉芝草甘露之瑞群臣請付太史光武謙而不許又郡國所上抑而不當所以訓示子孫者如此故群臣舉觴上夀帝自以虚薄不能致此策告宗廟歸徳於髙祖光武雖出於徳性成以學術亦由取法於前人也事見通鑑冬十一月遣竇固耿秉等出敦煌擊西域破之於蒲類海遂入車師復置西域都䕶戊巳校尉以夲紀修漢顯宗孝明皇帝永平十八年夏六月己未有星孛於太微以夲紀修焉耆龜茲攻殺西域都護陳睦北匈奴及車師後王圍戊巳校尉以夲紀修秋八月壬子帝崩於東宫前殿遺詔無起寝廟藏主於世祖廟便殿觧題曰帝遺詔遵儉無起寝廟藏主於世祖廟更衣孝章不敢違以更衣有小别上尊號曰顯宗廟間祀於更衣四時合祭於世祖廟李賢曰續漢書五年再殷祭三年一祫五年一禘四時正祭外有五月嘗麥三伏立秋嘗粢盛酎十月嘗稲等謂之間祀更衣者非正處也園中有寝有便殿寝者陵上正殿便殿寝側之别殿即更衣也章帝遺詔如先帝故事和帝不敢違後帝承尊皆藏主于世祖廟積多無别是後顯宗但為陵廟之號朱熹曰胡宏論漢文之短䘮其失不在文帝而景帝當任其責子於不起寝廟之詔則以為明帝固不為無失然使章帝有魏顆之孝群臣有宋仲幾楚子囊之忠則必不以一時之亂命壊千古之彛制况事體之輕重又非如三子所正者而已耶自是更魏晋隋唐其間非無奉先思孝之君据經守禮之臣而皆不能有所裁正其弊至使太祖之位下同孫子既無以見其為七廟之尊群廟之神則上厭祖考而不得自為一廟之主孝子順孫之心宜亦有所不安于此矣虎賁中郎将馬廖受遺詔典門禁觧題曰踵梁松故事也陳瓘曰郎中令掌郎衛如三署郎及公卿大夫子弟皆與人主親昵故属郎中令此猶有意至後漢别光禄勲為一司如五官中郎将左右中郎将羽林虎賁中郎将羽林監在外執㦸儀衛之人故以武属光禄太中中散諌議大夫議郎謁者僕射常侍謁者居中與人主謀議故以文属既以文属便為一司其後不惟不属光禄勲而已所謂諌議大夫者又别為門下省惟其地近言行所以權重至此耳太子即皇帝位尊皇后曰皇太后壬戌塟孝明皇帝于顯節陵以紀傳及袁宏漢紀修觧題曰楊衒之洛陽伽藍記帝崩起祇洹於陵上自後百姓冢上或作浮屠李賢曰帝王紀顯節陵西北去洛陽三十七里吕祖謙曰漢武漢明文物最盛當時封㤗山禪梁父登明堂立辟雍興太學大畧相似然武帝過雖多而規模大明帝過雖少而規模狹武帝多欲知人善任使畧識君道政如夫子言衛靈公之無道而不䘮者也明帝恃其察慧以耳目擿發自重之士少立其朝人才逺不及武帝一時雖晏然而培飬根夲欠缺多矣幸而章帝以長者繼之其病未見自此後所謂不任大臣者其病盡見一失而為外戚再失而為宦官漢遂以亡由光武明帝任明察未嘗培養根夲所以西漢之後猶有東漢東漢之後雖諸葛孔明不能强民以思漢也冬十月以趙熹為太傅牟融為太尉並録尚書事觧題曰録尚書事始此盖取納于大麓之義謂其大録萬幾之政也十一月戊戌以蜀郡太守第五倫為司空以夲紀修觧題曰按袁宏漢紀上新即位倫以逺郡入為三公用清能也詔征西将軍耿秉屯酒泉遣酒泉太守叚彭救戊巳校尉耿恭以夲紀修甲辰晦日有食之以夲紀修十二月以馬廖為衛尉黄門侍郎馬防為中郎将黄門侍郎馬光為越騎校尉以列傳修尊孝明廟曰顯宗以夲紀修觧題曰東觀書章帝賜東平王蒼書曰先帝躬履九徳對於八政今廹遺詔誡不起寝廟臣子悲結僉以為雖祀於更衣猶宜有所宗之號以克配功徳公卿議駁今皆并送及太尉喜等奏上尊號曰顯宗四時祫食於世祖廟奏武徳文始五行之舞蒼上言孝文廟樂曰昭徳之舞孝武廟樂曰盛徳之舞不進與髙廟同樂孝明皇帝主在世祖廟當同樂盛徳之樂無所施如自立廟當作舞樂者不當與世祖廟盛徳之舞同名即不改作舞樂當進武徳之舞上報如王議是嵗大旱觧題曰大旱榖貴肅宗召司徒鮑昱問曰将何以消復災青對曰陛下始踐天位刑政未著如有失得何能致異但臣前在汝南典理楚事繫者千餘人恐未能盡當其罪大獄一起寃者過半又諸徙者骨肉離分孤魂不祀一人呼嗟王政為虧宜一切還諸徙家属蠲除禁錮死生獲所和氣可致帝納其言校書郎楊終以為廣陵楚淮陽濟南之獄徙者萬數又逺屯絶域吏民怨曠上疏曰永平以來仍連大獄有司窮考轉相牽引家属徙邉加以北征匈奴西開三十六國轉輸煩費及逺屯伊吾樓蘭車師戊巳民懐土思怨結邉域肅宗下其章第五倫亦同議牟融鮑昱以孝子無改父之道先帝所建不宜回異終復上書曰秦築長城功役繁興胡亥不革卒亡四海故孝元棄珠崖光武絶西域不以鱗介易我衣裳魯文公毁泉臺春秋譏之曰先祖為之已毁之不如勿居而已㐮公作三軍昭公舍之君子大其復古以為不舍則有害於民也今伊吾之役樓蘭之屯乆而未還非天意也帝從之陳瓘曰楚獄雖先朝已行之事改以便民所以為繼志述事鮑昱敢言可謂忠矣章帝能聴可謂孝矣至於乆役逺輸百姓愁困楊終之論正而不阿昱不論其當改與否而專謂先帝所建不宜回異是不以武王周公繼志述事望其君而頋以孟荘子之不改為大也况楚獄亦先帝所行而北征西戍獨不可改乎章帝從之其孝䆒矣昱之論可以少媿詔勿收兖豫徐州田租芻槀以本紀修大事記續編卷十
