body:
  text: 大事記續編卷五十明王禕撰唐高祖神堯皇帝武德九年梁梁師都永隆十年春正月己亥詔定雅樂以吕祖謙標目修甲寅裴寂為司空以新舊紀修二月丙子初令郡縣祀社稷戊寅親祀社稷以吕祖謙標目修夏四月辛巳沙汰僧道限寺觀六月丁巳太白經天庚申秦王世民殺皇太子建成齊王元吉及其諸子大赦復僧道癸亥立世民為皇太子聽政以新紀及吕祖謙標目修觧題曰按新舊史實録太子建成齊王元吉將起難王本文作世民後倣此以洛州形勝之地一朝有變將岀保之令大行臺工部尚書温大雅鎮洛陽以俟變大雅数陳秘䇿甚䝉嘉賞遣秦府車騎將軍張亮統左右千餘人之洛陽隂結山東豪傑多岀金帛恣其所用元吉告亮欲圖不軌屬吏詰訊終無所言事釋還洛陽王嘗從高祖幸齊王第元吉伏其䕶軍宇文寳於帳内將刺王建成恐事不成止之元吉愠曰為兄計耳於我何害建成等召王夜宴毒酒而進之王暴疾吐血數升淮安王狼狽扶還西宫帝問疾因敕建成秦王素不能飲母夜聚又謂王曰𤼵跡晉陽尅平宇内皆爾力欲升儲位汝固譲不受以成汝美志建成居東宫多厯年所今不忍奪之觀汝兄弟不和同在京邑必有忿競汝還行臺居洛陽自陜以東悉主之仍令汝建天子旌旗如梁孝王故事王泣奏不能逺離膝下帝曰天下為家東西兩宫塗路咫尺憶汝即往無勞悲也將行建成等謀曰秦王往洛陽得土地甲兵必為後患留之京師一匹夫耳宻令數人上封事曰秦王左右皆山東人聞往洛陽非常欣躍觀其意不復來矣事果寢王中毒府中震駭行臺考功郎中房𤣥齡謂比部郎中長孫無忌曰令嫌隙已成禍機將發非直禍及府朝正恐傾危社稷莫若遵周公之事外寧區夏内安宗祏申孝養之禮無忌曰久懷此謀未敢披露公今所説深㑹宿心無忌乃入白之王召𤣥齡謂曰將若之何對曰大王功盖天地神賛所在匪藉人謀因與府屬杜如晦同心戮力朱熹曰太宗誅建成元吉安可與周公誅管蔡並論周公以周家天下為心太宗無周公之心不過顧身而已建成日夜與元吉連結後宫譛訴愈切高祖惑之納言陳叔達極意救辯乃止内史令封德彛數從秦王征討特蒙頋遇亦潜勸王圖之王以為誠横賜累萬而徳彛又宻言於高祖曰秦王既有大功終不為太子下若不立之願早為之所又説建成曰為四海不顧親漢高乞羔此之謂矣司馬光疑許敬宗銜徳彛立𫝊盛加其惡故棄不取然通鑑貞觀十七年又載上與太子巢刺王有隙德彛隂持兩端楊文幹之亂上皇欲廢太子而立上德彛固諫而止何也建成元吉宻致書招秦府左二副䕶軍尉遲敬德贈以金銀器物一車敬德辭曰敬德起幽賤㑹天下喪亂久䧟逆地實荷秦王惠以生命今又𨽻名藩邸唯當以身報㤙於殿下無功不敢謬當重賜若私許殿下便是二心徇利忘忠殿下亦何所用建成怒是後遂絶敬德以聞王曰公心如山嶽雖積金至斗知公不移送來但取不然恐公身不安且知彼陰計足為良䇿元吉等令壯士往刺之敬德知其計重門洞開安卧不動賊立其庭終不敢入元吉乃譛敬德於高祖下詔獄訊騐將殺之王固爭得免譛秦府左一馬軍總管程知節岀為康州刺史知節白王曰大王去左右手矣身必不久知節以死不去願速自全㑹突厥郁射設屯河南建成薦元吉代王督軍北討秦府右三統軍秦叔寳尉遲敬德程知節段志𤣥等並同行又追秦府帳簡閲驍勇以益其府又譛杜如晦房𤣥齡逐令歸第高祖知其謀而不制元吉因宻請害王高祖曰是有定四海之功罪迹未見何以為辭元吉曰秦王常違詔勅初平東都顧望不還散錢帛以樹私惠豈非反逆但須速殺何患無辭高祖不對元吉遂退建成謂元吉曰既得秦王精兵統數萬之衆吾與秦王至昆明池宴别但令壯士拉之於幙下因云暴卒主上宜無不信吾當使人進説令付吾國務正位以汝為太弟敬德等既入汝手一時坑之孰敢不服率更丞王晊聞其謀宻告王王召府僚告之皆曰大王若不正位社稷非唐所有使建成元吉肆其毒心羣小得志元吉狼戾終亦不事其兄往者䕶軍薛寳上符録云元吉合成唐字齊王喜曰但除秦王取東宫如反掌耳為亂未成預懷相奪以大王之威襲二人如拾地芥王歎曰今二宫離阻寡人雖被猜忌禍在須臾然情終未忍欲待其先起然後以義討之公意以為如何敬德曰人情畏死衆人以死奉王此天授也天予不取反受其咎雖存仁愛之小情忘社稷之大計失人臣臨難不避之節乏先賢大義滅親之事非所聞也王若不從敬德請奔逃亡命不能交手受戮王猶豫未决長孫無忌曰今不從敬德之言事敗矣王曰寡人之言未可全棄公更圖之敬德曰處事有疑非智臨難不决非勇王縱不從敬徳言如家國何如身命何且在外勇士八百餘人今悉入宫控弦被甲事勢已就王得何辭衆又曰大王以舜為何如人曰為子孝為君聖安可議乎府僚曰使舜浚井不岀自同魚鱉之斃焉得為孝子乎塗廪不下便成煨燼之餘焉得為聖君乎小杖受大杖避良有以也王於是定計使卜者灼龜占之幕府張公謹自外來遽投於地曰卜以决疑不疑何卜卜之不吉勢不可已願大王思之朱熹曰太宗當時誤為府僚所迫於心不能無歉云待其先𤼵然後應之即鄭伯克段之事也司馬光此處看不破時房𤣥齡杜如晦皆斥岀秦府不得復入王令無忌宻召之報曰有勅不許更事王今若私謁必至誅滅不敢奉命王大怒謂敬德曰𤣥齡如晦豈背我耶取所佩刀授敬德曰公且往觀其無來心斬其首持來也敬德與無忌喻曰王已决計公宜即入籌之我等四人不宜羣行於是𤣥齡如晦著道士服隨無忌入敬徳别道亦至五月太史令傅奕宻奏太白見秦分秦王當有天下高祖以狀授秦王六月三日王宻奏建成元吉滛亂後宫因自陳曰臣於兄弟無絲毫負今欲殺臣似為世充建德報讎臣今枉死永違君親魂歸地下實亦恥見諸賊高祖省之愕然報曰明當勘問汝宜早參程逈謂既許明早理㑹又却往汎舟此處有闕文或為隱諱朱熹謂此一段與前後無情理必是添入太宗决不曽奏既奏了高祖見三子欲相殺如何尚去汎舟四日王將無忌敬徳侯君集張公謹劉師立公孫武達獨孤彦雲杜君綽鄭仁㤗季孟嘗等此㨿舊史長孫無忌傳舊紀云率長孫無忌尉遲敬德房𤣥齡杜如晦宇文士及高士亷侯君集程知節秦叔寳段志𤣥屈突通張士貴等入𤣥武門西内太極宫北門曰𤣥武討建成元吉張婕妤馳語建成建成召元吉謀曰請勒宫甲託疾不朝建成曰善然不共入朝事何由知遲明乘馬至𤣥武門高祖已召裴寂蕭瑀陳叔達封倫宇文士及等欲窮覈其事建成元吉至臨湖殿在𤣥武門内覺變即回馬將歸宫府王隨而呼之元吉張弓再三不彀王射建成應絃而斃敬徳將七十騎繼至元吉東奔左右射之墜馬王所乘馬逸於林下横為所絓墜不能興元吉遽來奪弓垂欲相扼敬徳躍馬叱之元吉步走武德殿在太極宫北䖍化門内敬徳奔射殺之其宫府諸將薛萬徹馮立等率兵屯𤣥武門張公謹有勇力獨閉闗以拒之宫府兵戰不解敬徳持建成元吉首示之乃去時高祖汎舟於海池王命敬徳侍衛高祖敬德擐甲持矛直至高祖所高祖大驚問曰今日作亂為誰爾來此何也對曰秦王以太子齊王作亂舉兵誅之恐陛下驚動遣臣宿衛高祖大驚謂裴寂等曰今日之事如何蕭瑀陳叔達進曰建成元吉義旗草創之際並不預謀建立已來又無功徳常自懷憂相濟為惡釁起蕭墻遂有今日之事秦王功盖天下率土歸心若處以元良委之國務陛下如釋重負高祖曰善此亦吾之夙心也南衙北門兵與府兵東宫及齊王二府之兵非府兵之兵也尚雜鬭敬德請降手勅令諸軍並受秦王處分内外遂定高祖召王撫之曰近日已來幾有投杼之惑王哀號久之建成子安陸王承道河東王承徳武安王承訓汝南王承明鉅鹿王承義元吉子梁郡王承業漁陽王承鸞普安王承奨江夏王承裕義陽王承度皆坐誅項安世曰太宗殺兄及弟自以為學周公也又殺其子十人則不學周公而學蕭鸞矣至納元吉之妻與廬江之妾及以廬江家口賜其臣充賞則全學高洋矣要知唐世家法終有夷狄之風氣故承乾志希突厥而治亦麀聚云癸亥立王為皇太子聽政餘見通鑑太子世民命縱鷹犬罷貢獻陳治道以吕祖謙標目修廢益州大行臺置大都督府通鑑庚辰幽州都督廬江郡王瑗反伏誅新紀七月楊恭仁罷以太子右庶子高士㢘為侍中左庶子房𤣥齡及宇文士及為中書令蕭瑀封徳彛為左右僕射以新紀及吕祖謙標目修八月癸亥皇太子世民即皇帝位尊帝為太上皇以新舊紀修解題曰朱熹曰高祖以軍國事付之太宗亦岀於不得已爾唐世内禪者三若肅宗固不待論睿宗之於𤣥宗亦以其誅韋氏有功出於不得已爾事見通鑑給復天下一年新紀丙子立妃長孫氏為皇后以新舊紀修解題曰皇后而下有貴妃淑妃徳妃賢妃是為夫人昭儀昭容昭媛脩儀脩容脩媛充儀充容充媛是為嬪婕妤美人才人各九合二十七是代世婦寳林御女采女各二十七合八十一是代御妻自餘六向分典乘輿服御皆有員次後世改復不常開元以后以下復有四妃非是乃置惠麗華三妃六儀四美人七才人而尚宫尚儀尚服各二參合前號大抵踵周官相損益云癸未放宫女以通鑑修解題曰孫甫曰隋煬荒虐强取良家女置後宫者無數高祖入闗放離宫之人還親屬得美事之一節及受禪安然有其後宫欲不荒恣得乎頼太宗承之立矯其過出三千之衆使天下聳動歌謡唐之盛徳也以太子詹事主簿魏徴王珪韋挺為諫議大夫以舊傳及吕祖謙標目修解題曰范祖禹曰聞之程頥齊桓公殺公子糾召忽死之管仲不死又相桓公以霸而孔子取之何哉桓公子糾皆以公子岀奔子糾未嘗為世子也桓公先入而得齊非取之子糾也桓公既入而殺子糾惡則惡矣然納桓公者齊也春秋書公伐齊納糾不稱子不當立者也齊小白入于齊以小白繋之齊當立者也是以管仲不得讎桓公而得以之為君建成為太子且兄也秦王為藩王又弟也王魏受命為東宫之臣則建成其君也豈有人殺其君而可北靣為之臣乎以弟殺兄以藩王殺太子而奪其位太宗亦非可事之君矣食君之禄而不死其難朝以為讎暮以為君於其不可事而事之雖曰不為利吾不信也事見通鑑突厥頡利突利可汗入冦至便橋帝自將禦之請盟而退以吕祖謙標目修九月丁未引諸衛將卒習射於殿庭以吕祖謙標目修壬子禁滛祀雜占以通鑑修置𢎞文館以通鑑修冬十月丙辰朔日有食之以新紀修追封故太子建成為息隱王齊王元吉為海陵王以通鑑修癸亥立子中山王承乾為皇太子以新舊紀修癸酉定功臣封户以舊紀修庚辰蕭瑀陳叔達罷新紀十一月庚寅降宗室郡王非有功者為縣公以新紀修解題曰唐仲友曰有封建之名而無其實則王䟽屬以填天下降䟽屬以示至公皆隨時之宜爾初不為大利害也事見通鑑十二月己巳益州大都督竇軌請𤼵兵討獠弗許以吕祖謙標目修以景州録事張𤣥素為侍御史以通鑑修解題曰按通典自貞觀初以法理天下尤重憲官故侍御史復為雄要其將除拜皆吏部與臺長官宰相議定然後依選例補奏其内詔别拜者不在其限麟徳以來用人尤重選受之命不由銓管及李義府掌大選寵任既重始得補之自後無岀於吏部者前幽州記室張藴古上大寳箴以為大理丞以通鑑修是歲進子郡王二人為王以本紀修唐太宗文武皇帝貞觀元年梁梁師都永隆十一年春正月乙酉改元以舊紀修己亥制中書門下三品以上入閣諫官隨之有失輙諫以吕祖謙標目修解題曰孫甫曰天下之務至廣軍國之機至要雖明主賢相亦不能無失議事之際使忠良之士預聞有闕失從而正之豈不美哉若以小臣不得預聞必衆知闕失方許諫正事或已行而不可救過或已彰而不可言故剛直之臣有矯訐不顧以争之者君從之或掩其過君不從則其過大臣之罪亦大矣太宗命諫官入閣李義府廢之至明皇而復李林甫又廢之至肅宗而復程元振又廢之至德宗而復盧把又廢之至憲宗而復元和之後奏事雖在閣中論事者久絶長慶初鄭覃崔郾始於羣臣退後論宴樂遊畋之失穆宗問此何人宰相以諫官對雖是法在庸主未必有益其闗國體豈不大哉事見通鑑更定律令以通鑑修辛丑李藝反於涇州伏誅以舊紀修二月併省州縣分為十道以吕祖謙標目修三月癸巳皇后親蠶以舊紀修閏三月癸丑朔日有食之以新紀修壬申命五品以上更宿中書内省以吕祖謙標目修夏四月癸巳凉州都督長樂郡王㓜良有罪伏誅新紀六月辛巳封徳彛薨壬辰太子少師蕭瑀為左僕射以通鑑修山東旱免今年租以新紀修秋七月壬子長孫無忌為右僕射以新紀修八月戊戌高士㢘罷以舊紀修九月庚戌朔日有食之新紀宇文士及罷御史大夫杜淹檢校吏部尚書參預朝政以舊紀通鑑修解題曰他官豫政自此始盖太宗以宰相下行有司之事又以他官上任宰相之職杜如晦既攝吏部又監東宫兵馬魏徴戴胄岑文本張亮禇遂良之徒皆自下位參預朝廷或専典機宻無有一定之統終唐世宰相無常職亦無常員乃至守本官為之而有守如故判如故之目坐政事堂而分决本司事以自便或至十數人同時為之又以授帥臣而謂之外宰相其不可取法盖非一端太宗但能責房杜日閱訟牒為非宜不知下兼他職已失其宜房杜但知遜諫臣直為得大體不知下行選部參掌考功監修國史兼領學官皆非體也當時陳師古上拔士論謂一人不可總衆職而太宗斥之嶺表史稱太宗能柄任大臣不知謂之宰相自然無所不總何煩又兼他職而後謂之柄任耶師古之論非輕宰相也正以重宰相也時君既以貽譴史臣又以歸曲宜其論之不傳也辛未幽州都督王君廓叛奔突厥死以通鑑修冬十二月壬午蕭瑀罷以新紀修以孫伏伽為諫議大夫以通鑑修省官留六百四十三員以吕祖謙標目修薛延陀回紇叛突厥以吕祖謙標目修解題曰按新史列傳回紇其先匈奴也元魏時號高車部或曰敕勒其部落曰袁紇薛延陀契苾羽都播骨利幹多濫葛僕骨拔野古同羅渾思結斛薛奚結阿跌白霫十有五種散居磧北袁紇隋曰韋紇大業中自為俟斤稱回紇姓藥羅葛氏居薛延陀北娑陵水上距京師七千里薛延陀姓一利咥氏事見通鑑馮盎遣子入朝以朱熹綱目修唐太宗文武皇帝貞觀二年梁梁師都永隆十二年春正月長孫無忌罷兵部尚書杜如晦檢校侍中總監東宫兵馬事以新舊紀修置六司侍郎左右司郎中以朱熹綱目修庚午刑部尚書李靖檢校中書令新紀三月戊申朔日有食之新紀壬子命中書門下五品以上及尚書議决死罪新紀己巳遣使巡闗内贖饑民鬻子者庚午以旱蝗責躬大赦癸酉雨以新紀修夏四月己夘瘞隋人暴骸新紀遣右衛大將軍柴紹等圍朔方壬寅梁師都伏誅以通鑑及新紀修六月乙酉太常少卿祖孝孫等奏新樂以通鑑修蝗帝吞之蝗不為灾以通鑑修流辰州刺史裴䖍通于驩州秋七月戊申徙其餘黨于邉以新紀修八月甲戍朔省寃獄于朝堂以新紀通鑑目録修九月壬子有年賜酺三日以新紀修冬十月庚辰杜淹卒以列傳修戊子殺瀛洲刺史盧祖尚新紀十一月辛酉祀圓丘以通鑑修十二月壬寅黄門侍郎王珪守侍中新紀䟽都督刺史名于屏風舉堪為縣令者以吕祖謙標目修解題曰唐仲友曰當時有循吏無酷吏與漢文相若宣帝比之駮矣事見通鑑册薛延陀夷男為真珠可汗以吕祖謙標目修吏部侍郎劉林甫請以四時聽選以列傳舊史㑹要修解題曰按舊史列傳㑹要林甫言隋制以十一月為選始至春乃畢今選者衆請四時聽選隨到注擬當時以為便始州府及詔使以赤牒授官至是停省集吏部將萬餘人通典㑹要皆云正觀二年通鑑載於元年非也選舉志文選吏部主之武選兵部主之皆為三銓尚書侍郎分主之凡擇人之法有四一曰身體貎豐偉二曰言言辭中正三曰書楷法遒美四曰判文理優長四事皆可取則先徳行德均以才才均以勞五品以上不試上其名中書門下六品以下始集而試觀其書判已試而銓察其身言已銓而注詢其便利而擬已注而唱不厭者得反通其辭三唱而不厭聽冬集厭者為甲上千僕射乃上門下省給事中讀之黄門侍郎省侍中審之然後以聞王者受㫖而奉行焉謂之奏受視品及流外則判補皆給以符謂之告身通典時太宗謂吏部尚書杜如晦曰今吏部取人獨舉其言辭刀筆而不詳才行如之何對曰昔兩漢取人必本於鄉閭選之然後入官每歳選集動踰數千人厚貌飾辭何可知也選曹但校其階品而已若掄材辨行未見其術上由是將依漢法令本州辟召㑹議行封建事乃寢他日上又曰吾將使人自舉如之何魏徴曰是長澆競也不可是時吏部之法行始二十餘年雖弊而未甚故或未之覺至永徽中官紀已紊迨麟德之後不勝其弊栁芳唐厯杜如晦參掌選事舊制内外官皆吏部啓奏授之大則署置三公小則惣覈流品自隋五品已上官中書門下訪擇聞奏然後下制授之唐制尚書銓掌六品七品選侍郎銓掌八品九品三年一大集毎年一小集其後尚書侍郎通掌六品下選其員外郎監察御史亦吏部唱訖尚書侍郎為之典自太宗已後員外郎制授矣則天已後御史制授矣其銓綜也南曹惣覈之廢置與奪之銓曹注擬之尚書僕射同異之門下詳覆之覆成而後過官至肅宗强冦在郊始令中書以功狀除官非舊制也唐太宗文武皇帝貞觀三年春正月戊午享于太廟以新紀修癸亥耕籍田新紀辛未裴寂罷尋坐貶以新紀修解題曰歐陽脩曰寂始為晉陽宫監私以宫人饋高祖因見親暱可謂貳隋矣及太宗以愽奕㗖之遂開義師之謀卒成唐室武周為冦請行自敗不即就誅者非特佐命有功豈非曩時私狎之恩哉坐交沙門法雅雖免官見放復有所陳太宗數之曰計公勲庸不至於此數以武徳時政之謬皆歸其人又聞妖言不自明乃欲殺人緘口遂被流放列其四罪貸不致理盖由進身之私恩衰即敗也事見通鑑二月戊寅房𤣥齡杜如晦為左右僕射右丞魏徴為祕書監參預朝政以新舊紀修解題曰按舊史列傳𤣥齡䖍恭夙夜盡心竭節不欲一物失所聞人有善若已有之明達吏事飾以文學審定法令意在寛平不以求備取人不以己長格物隨能收敘無隔卑賤如晦與𤣥齡共掌朝政臺閣規摹典章文物皆二人所定又云世傳太宗嘗與文昭圖事則曰非如晦莫能籌之及如晦至竟從𤣥齡䇿盖房知杜之能㫁大事杜知房之善建嘉謀禆諶草創東里潤色相須而成俾無悔事餘見通鑑唐仲友曰房杜謀㫁固是同心濟謀亦常示不足之意所以明哲保身也夏四月乙亥太上皇徙居大安宫甲午帝始御太極殿申明中書門下省審駮正之制以新紀吕祖謙標目修解題曰武徳五年高祖建𢎞義宫以居秦王至是徙居之改名大安宫在宫城之西六月旱壬午詔文武官言事以茌平馬周直門下省以通鑑修解題曰事見通鑑通典始馬周以布衣有詔令於監察御史裏行遂以為名高祖時王立本自忻州定㐮尉為之秋八月己巳朔日有食之以新紀修丁亥以兵部尚書李靖為行軍大總管冬率六總管兵伐突厥以新紀通鑑修解題曰事見通鑑韓元吉曰唐踵隋舊文武各置散官文職隷於三省六部武職隷於諸府十六衛未嘗相侵然自武徳初武臣大功重任或加文職故李靖平輔公祏則為東南道行臺兵部尚書繼授刑部尚書復改兵部為定㐮道行軍總管遂正遷僕射而為相太宗之時武臣為尚書者例皆拜相李勣張亮侯君集是也惟屈突通除刑部尚書自以不習文法固辭中葉以後武臣致仕或除尚書身後或贈尚書唐末武臣任藩鎮者必兼臺省長官而其僚佐亦遙領臺省之職正官不足又増檢校由是僕射司徒之稱逮於皂隷祭酒賔客之號加於將校迄五代而不可攷矣十二月戊辰突厥突利可汗入朝以吕祖謙標目修癸未杜如晦罷以吕祖謙標目修是歳治書侍御史權萬紀劾房𤣥齡王珪帝命推之魏徴諫乃止以吕祖謙標目修解題曰唐仲友曰太宗能斥陳師古不能知萬紀之姦能諭蕭瑀不能不以萬紀為直使輔驕子激成悖逆萬紀亦以喪身大與息夫躬類浸潤膚受不行可謂逺也矣斯言猶信事見通鑑唐太宗文武皇帝貞觀四年春正月丁夘朔日有食之以新紀修乙亥李靖襲定㐮破之頡利可汗遁于磧口以吕祖謙標目修解題曰按元和郡縣志豊州東受降城北至磧口八百里中城至磧口五百里西城至磧口三百里西至回紇衙帳一千五里二月己亥帝幸温湯丙午還宫以通鑑修御史大夫温彦愽為中書令王珪為侍中民部尚書戴胄檢校吏部尚書參預朝政太常卿蕭瑀為御史大夫參議朝政以新舊紀修解題曰參預朝政始於此三月甲申蔡成公杜如晦卒以吕祖謙標目修甲午李靖俘頡利可汗以獻夏四月戊戌西北君長請帝號為天可汗解題曰唐仲友曰突厥既平若分其故地衆建酋長使為外臣中國可以息肩喜功不已復受天可汗之號此最處置之失也盖既為之主則叛服必勞中國終唐世受夷狄之患職此之由也事見通鑑處突厥降衆於塞下州縣其地五月辛未以突利為順州都督壬申以阿史那思摩為北開州都督統其衆以新紀吕祖謙標目修解題曰按新舊史傳頡利之亡其下或走薛延陀或入西域而來降者尚十餘萬詔議所宜咸言突厥擾中國久今天喪之非慕義自歸請悉籍降俘内兖豫閑處使習耕織百萬之衆可化為齊人是中國有加户而漠北遂空也中書令温彦愽曰漢建武時置降匈奴於五原塞下全其部落得為捍蔽又不離土俗因而撫之若遣向河南則乖物性祕書監魏徴建言突厥世為中國仇今其來降當遣還河北彼鳥獸野心非我族類弱則伏强則叛其天性也且秦漢擊取河南地為郡縣者不欲使近中國也陞下奈何以河南居之降者十萬若令數年孳息略倍近在畿内腹心疾也彦博曰天地養萬物覆載全安之今突厥破滅餘種歸命不加哀憐而棄之非天地蒙覆之義臣謂處以河南彼世將懷德何叛之為徴曰魏時有胡落分處近郡晉已平呉郭欽江統勸武帝逐岀之不能用劉石之亂卒傾中夏陛下必欲引突厥居河南所謂養虎自遺患也彦愽曰聖人之道無所不通故曰有教無類彼以窮歸我我收處内地將教以禮法職以耕農又選酋長入宿衛何患之䘏且光武置南單于卒無叛亡於是中書侍郎顔師古給事中杜楚客禮部侍郎李百藥等皆勸帝不如使處河北樹酋長俾統部落視地多少令不相臣國小權分終不得亢衡中國夏州都督竇静上封曰外裔僻處遐荒不可以刑法威不可以仁義教衣食仰給不務耕桑徒損有為之民以資無益之虜彼首邱之情未易忘也恐一旦變生犯我王畧莫如因其破亡之餘加其無妄之福假以賢王之號妻以宗室之女分其土地析其部落使其權弱勢分易為覊制此長轡逺御之道帝主彦愽語卒度朔方地自幽州屬靈州建順祐化長四州為都督府剖頡利故地左置定㐮都督右置雲中都督二府統之擢豪酋為將軍郎將者五百人奉朝請者且百員入長安自籍者數千户議者尤以為不便欲建突厥國於河外彦博又奏曰既以納之無故遣去深為可惜與魏徴等爭論數年不决其後突厥可汗弟結杜謀反帝始悔云餘見通鑑唐仲友曰江統郭欽在晉朝最為有識彦愽儒者也猥以後漢事處降虜竇静外戚邉將乃能力爭一書所言曲盡虜情與魏徴暗合太宗不用静言而徒嘉其忠可謂善善而不能用矣鄭寅曰朝議欲納之河南者古兖豫之地彦愽所以謂遣向河南則乖物性也温魏爭辨之河南者漢衛青所取河南之地唐靈夏豊州之間也師古等勸帝使處河北者亦對此河南而言故又謂之河外非十道之河北也丁亥蕭瑀劾李靖御軍無法赦而賞之以吕祖謙標目修六月乙夘修洛陽宫張𤣥素諫而止以通鑑修秋七月甲子朔日有食之以新紀修癸酉蕭瑀罷新紀解題曰按新舊史列傳太宗即位瑀遷尚書左僕射封倫為右僕射倫素險詖與瑀商量將為可奏者至太宗前盡易之時房𤣥齡杜如晦新用事疎瑀日親倫瑀不能平遂上封事論之而辭㫖寥落由是廢于家未幾復為左僕射坐不敬免歲餘為晉州都督徴御史大夫與宰臣參議朝政瑀多辭辯毎有評議𤣥齡等不能抗然心知其是不用其言瑀彌怏怏𤣥齡魏徴温彦愽嘗有㣲過瑀劾之而罪竟不問因此自失罷為太子少傅張唐英曰房杜賢相也經綸草昧以啓天下之業竭忠悉慮以成天下之務不以求備責人不以己長格物貞觀之治誠有力焉而尚失於瑀豈瑀之褊忿議論之際以直氣自豪而不能從容委曲詳悉評議故房杜自以持天下之政恥其不能卑論忽有不容其説然二公才過於人雖不從一瑀無害為賢相後之執政者倘心知其是而不用其言則國家之政蔽而不通矣八月詔定常服差等以朱熹綱目修解題曰胡寅曰朝服當以正色綠近於青猶之可也惡紫奪朱而加於緋上可乎青者色之正也綠為間也而加於青上可乎必欲歸諸正必則古昔師先王可也事見通鑑甲寅李靖為右僕射以新舊紀修九月己夘帝幸隴州冬十月辛丑獵于貴泉谷甲辰獵于魚龍川以新舊紀修解題曰魚龍川在隴州汧源縣十一月右衛大將軍侯君集檢校吏部尚書參預朝政以紀傳通鑑修解題曰按新紀君集為兵部尚書參預朝政新傳君集先為兵部尚書後檢校吏部尚書參預朝政通鑑從紀今從傳甲子帝至自隴州以新紀修十二月禁鞭囚背以舊紀修甲辰帝獵于鹿苑乙巳還宫以新紀修解題曰寰宇記在雍州高陵縣三輔黄圖安陵有果園鹿苑此也甲寅高昌王麯文泰入朝西域將入貢帝遣人迎之魏徴諫而止以吕祖謙標目修是歳大稔流散者咸歸鄉里米斗不過三四錢斷死刑二十九人外户不閉行旅不齎粮以舊紀及通鑑修解題曰按新舊史列傳先是帝嘗歎曰今大亂之後其難治乎魏徴曰大亂之易治譬猶飢人之易食也帝曰古不云善人為邦百年然後勝殘去殺耶曰此不為聖哲論也聖哲之治其應如影響期月而可盖不其難封德彛曰三代之後澆詭日滋秦任法律漢雜霸道皆欲治不能非能治不欲徴書生好虛論徒亂國家不可聽徴曰五帝三王不易民以教行帝道而帝行王道而王顧所行何如爾黄帝逐蚩尤七十戰而勝其亂因致無為九黎亂德顓頊征之已克而治桀為亂湯放之紂無道武王伐之湯武身及太平若人漸澆詭不復返朴今當為鬼為魅尚安得而化哉德彛不能對然心以為不可帝納之不疑至是天下大治蠻夷君長襲衣冠帶刀宿衛東薄海南踰嶺户闔不閉行旅不齎粮取給於道帝嘗謂長孫無忌曰朕即位之初上書者或言人主必須威權獨運不得委任羣下或欲耀兵懾服四夷唯魏徴勸朕偃革興文布徳施惠中國既安逺人自服朕從其語天下大寧絶域君長皆來朝貢九夷重譯相望於道此皆徴之力也胡寅曰一治一亂天地之大數也亂極人少則氣厚而人淳治極人夥則氣漓而人澆盖或三二百歳或五六百歳淳漓一變盈虛消息後世誠不及古逺矣若人之本心不可泯滅者則古猶今爾故可懷之以仁理之以義先之以敬譲示之以好惡魏徴有見於飢渇者易為飲食而無見於人心之未亡者故其效止是則無以進矣固不能使人人有士君子之器也今觀元年闗中饑二年蝗三年大水帝勤而撫之盖以儆畏存心也至是而驕心啓矣所以明年有殺張藴古之事也大事記續編卷五十
