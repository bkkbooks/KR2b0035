body:
  text: 大事記續編卷三十三明王禕撰晉安皇帝隆安元年燕惠閔皇帝永康二年文西秦乞伏乾歸太初十年秦桓皇帝皇初四年皇始二年凉王吕光龍飛二年元魏大祖道武皇帝南凉秃髮烏孤太初年北凉假業神璽元年春正月己亥朔帝加元服改元會稽王道子歸政以夲紀修領軍將軍王國寶為左僕射以紀傳修魏師潰於鄴燕都督中外軍事范陽王德大破之以載紀修癸亥魏王圭降信都以吕祖謙標目修秃髮烏孤稱西平王改元攻凉金城克之以吕祖謙標目修解題曰宋庠紀年通譜太初夲漢武帝苻登乞伏乾歸年號二月魏王圭欲還永和於燕燕主寶不許邀之於滹沱河大敗魏復圍中山三月清河王會引兵至薊燕衛大將軍趙王麟作亂出奔壬子燕主寶奔會軍開封公詳守中山以吕祖謙標目修甲寅尊皇太后為太皇太后立妃王氏為皇后以紀傳修魏追燕主寶及之夏謙澤清河王會敗之夏四月甲戌寶至龍城㑹反敗奔中山開封公詳殺之以通鑑修解題曰水經注幽州潞縣鮑丘水東南入夏謙澤地理志寶遷和龍自幽州至於廬溥鎮以南地入於魏事見通鑑王恭及豫州刺史庾楷反解題曰按列傳恭抗表曰後將軍國寶得以姻戚頻登顯列不能感恩效力而專寵肆威將危社稷先帝登遐夜乃犯閣欲矯遺詔賴皇太后聰明相王神武故逆謀不果又割東宫見兵以為己府讒疾二昆甚於讎敵與其從弟緒同黨凶狡共相扇動此不忠不義之明白也以臣忠誠必亡身殉國是以譛臣非一賴先帝明鑑浸潤不行昔趙鞅興甲誅君側之惡臣雖駑劣敢忘斯義表至內外戒嚴餘見通鑑胡安國曰春秋書晉趙鞅歸于晋先儒或謂言歸者以地正國也其說誤矣鞅取晉陽之甲以逐君側之惡人以地正國而可是人主可得而脅人臣擅興無罪以兵諫者真愛其君也使後世賊臣稱兵向闕以誅君側為名而實欲脅君取國者則此說啓之也觀王恭始為亂階而桓𤣥遂以篡晋安國之論可謂得春秋之㫖矣甲申會稽王道子殺王國寶將軍王緒以恱之乃罷兵殷仲堪復抗表舉兵至巴陵而還以吕祖謙標目修會稽世子元顯為征虜將軍以吕祖謙標目修盧水胡沮渠蒙遜拔凉臨松郡以通鑑修解題曰王容曰盧水胡有在杏城者杏城盧水胡郝奴是也有在馮翊北地者馮翊北地胡是也此云張掖盧水胡則胡之在張掖者也事見通鑑五月燕開封公詳稱帝改元建始燕主寶奔黃龍以吕祖謙標目修解題曰宋庠紀年通譜改元建始夲漢成帝司馬倫年號事見通鑑沮渠男成推凉建康太守假業為凉州牧改元沮渠蒙遜歸之以吕祖謙標目修秋七月燕趙王麟襲殺慕容詳稱帝以吕祖謙標目修九月秦太后蛇氏卒既葬秦主興以素服臨朝以通鑑修秦主興取𢎞農至陜城遣將寇洛陽以通鑑目録修冬十月甲戌魏王圭與慕容麟戰於義臺大破之麟奔鄴甲申魏克中山以吕祖謙標目修解題曰義臺在中山府新樂縣西南十三里按後魏書列傳自太祖平中山多置軍府以相威攝凡有八軍軍各配兵五千食祿主師軍各四十六人自中原稍定八軍之兵漸割南戍餘見通鑑晋安皇帝隆安二年燕昭武皇帝慕容盛建平元年乞秦文桓皇帝皇初五年西秦伏乾歸太初十一年道武皇帝天興元年凉王吕光龍飛三年二魏太祖南凉禿髮烏孤太初年北凉假業神璽二年德南燕獻武皇帝慕容偹元年春正月燕范陽王德徙滑臺魏取鄴德稱燕王改元以吕祖謙標目修解題曰滑臺今滑州夲衛之漕邑州城即滑臺城水經注即鄭廪延邑下有延津孔悝載伯姫于平陽行于延津是也在靈河縣廪延南故城即衛之平陽亭也在韋城縣事見通鑑慕容麟謀反燕王德殺之以通鑑修魏王圭置行臺於鄴中山辛酉北還徙山東六州民夷十餘萬口以實代以通鑑目録修二月乙亥燕主寶引軍南壬午衛兵假速骨作亂衆潰而還以吕祖謙標目修驃騎司馬王愈都督江州豫州之四郡軍事江州刺史以吕祖謙標目修三月假速骨陷龍城燕主寶奔黎陽庚子尚書蘭汗殺速骨夏四月寶還汗弒之自稱昌黎王改元青龍以吕祖謙標目修解題曰事見通鑑宋庠紀年通譜青龍夲魏明帝石鍳年號北凉取凉西郡晋昌敦煌以通鑑修秋七月燕長樂王盛攻蘭汗斬之改元攝行統制以吕祖謙標目修解題曰事見通鑑宋庠紀年通譜建平夲漢哀帝石勒慕容瑶年號魏都平城始營宫室廟社以呂祖謙標目修庾楷說王恭殷仲堪廣州刺史桓𤣥南蠻校尉楊佺期舉兵反八月陷江州王愈走以吕祖謙標目修魏王圭命正封畿標道里平權衡審度量黜陟守宰以通鑑修九月辛卯加㑹稽王道子黃鉞會稽世子元顯為征討都督討桓𤣥等以夲紀修乙巳桓𤣥大破王師於白石王恭司馬劉牢之襲恭恭伏誅牢之都督兖青等六州揚州晋陵軍事𤣥等至石頭而還以𤣥為江州刺史楊佺期為雍州刺史殷仲堪為廣州刺史以通鑑修解題曰白石即白石壘冬十月丙子燕長樂王盛即帝位以吕祖謙標目修壬午桓𤣥殷仲堪楊佺期盟于尋陽俱不受命詔復以仲堪為荆州刺史乃還𤣥屯夏口以夲紀通鑑修十一月辛亥魏王圭命立官制協音律制禮儀定律令考天象以通鑑目録修十二月魏王圭即帝位改元以吕祖謙標目修魏徙六州守宰豪傑二千家于代以通鑑修妖人孫泰伏誅其兄子恩逃入海以通鑑修西平王烏孤稱武威王以通鑑修解題曰元和郡縣志烏孤徙都西平方輿志鄯州鄯城縣夲漢西平郡之地晋安皇帝隆安三年燕昭武皇帝長樂元年乞秦文桓皇帝𢎞始元年西秦伏乾歸太初十二年帝天興二年凉王吕纂咸寧元年三魏太祖道武皇南凉秃髮烏孤太初年北凉假業天璽元年德南燕獻武皇帝偹二年春正月庚午魏主圭襲髙車尋大破之以吕祖謙標目修解題曰髙車古赤狄之餘種初號為狄歷北方以為敕勒諸夏以為髙車丁零癸未燕改元以吕祖謙標目修二月建康公業即凉王位改元以吕祖謙標目修三月魏置五經博士增國子太學生員大索書籍以通鑑修南燕王德出討叛將滑臺降魏德引而南夏四月乙未會稽世子元顯為揚州刺史以吕祖謙標目修秋七月秦寇洛陽八月魏救之以通鑑目録修武威王烏孤卒弟利鹿孤立以吕祖謙標目修南燕王德陷青州殺將軍辟閭渾都廣固以夲紀載記修解題曰慕容德自鄴而奔滑臺自滑臺而南走猶能取青社而定都則晋人前日之不能開拓中原謝𤣥朱序不得不執其咎也事見通鑑九月秦主興降稱王改元以吕祖謙標目修冬十月秦陷洛陽以吕祖謙標目修十一月甲寅孫恩陷會稽殺內史王凝之八郡應之詔徐州刺史謝琰輔國將軍劉牢之討之十二月恩逃入海以紀傳修㑹稽世子元顯録尚書事以吕祖謙標目修桓𤣥襲江陵殷仲堪請救於楊佺期佺期敗死仲堪自殺以列傳修凉王光傳位太子紹光卒大司馬太原公纂弒紹而代之改元以吕祖謙標目修解題曰宋庠紀年通譜咸寧夲晉武帝年號事見通鑑晋安皇帝隆安四年燕昭武皇帝長樂二年乞秦文桓皇帝𢎞始二年西秦伏乾歸太初十三年帝天興三年凉王吕纂咸寧二年和魏太祖道武皇南凉秃髮利鹿孤建元年北凉假業天璽二年凉南燕獻武皇帝建平元年西李皓庚子元年春正月壬子朔燕王盛貶號為庶人天王以通鑑修武威王衍鹿孤改元以吕祖謙標目修解題曰宋庠紀年通譜建和夲漢桓帝年號二月燕破髙麗吕祖謙標目三月彗星見太微以夲紀修桓𤣥都督荆江等八州軍事荆江二州刺史𤣥以其兄南蠻校尉偉為雍州刺史以通鑑修凉王纂殺其弟大都督録尚書事常山公𢎞以通鑑修夏四月北凉效榖令李皓自為燉煌太守以通鑑修解題曰效榖縣屬燉煌郡五月己卯孫恩破㑹稽殺都督五郡事謝琰以通鑑修解題曰按列傳琰以資望鎮越土議者謂無復東顧之憂及至郡無綏撫之能而不為武偹將帥皆諌曰强賊在海伺人形便宜開其自新之路琰曰苻堅百萬尚送死淮南况孫恩奔衄歸海何能復出若其復至正是天令速就戮耳不從其言恩後果復寇浹口入餘姚破上虞進及刑浦去山隂北三十五里琰遣恭軍距破恩既而上黨太守張䖍碩戰敗群賊鋭進人情震駭咸謂宜持重嚴偹且列水軍於南湖分兵設伏以待之琰不聼賊既至尚未食琰曰要當先滅此寇而後食也跨馬而出廣武將軍桓寶為前鋒殺賊甚多而塘路窄狹琰軍魚貫而前賊於艦中傍射之前後斷絶琰至千秋亭敗績帳下都督張猛於後斫琰馬墜地與二子俱被害事見通鑑琰之取敗有二焉一則師其父之矯情鎮物而不知其綜理二則狃於淮淝之捷而不思敵無小而不可忽况變生於肘腋史謂其無綏撫之能信矣去年孫恩之寇㑹稽王凝之以不設偹而死近在目睫而琰略不知警其無具如此秦伐西秦西秦王乾歸拒之以通鑑修六月庚辰朔日有食之以夲紀修秋七月壬子太皇太后崩以夲紀修西秦王乾歸敗奔南凉又奔秦以吕祖謙標目修冬十一月以劉牢之都督㑹稽等五郡擊孫恩走之以通鑑修㑹稽世子元顯後將軍開府都督揚豫等十六州軍事徐州刺史以夲紀修十二月戊寅有星孛于天市夲紀㑹稽世子元顯殺吏部尚書車𦙍御史中丞江績以列傳修解題曰按列傳元顯專政夜開六門御史中丞江績密啓會稽王道子欲以奏聞道子不許吏部尚書車𦙍亦曰元顯驕縱宜禁制之道子默然元顯聞而謂衆曰江績車𦙍間我父子逼令自裁朝野悼之葉適曰元顯一日而殺御史中丞吏部尚書晋安得而不亡耶餘見通鑑是嵗李皓自稱大將軍凉公改元以夲紀修解題曰葉適曰地志凉州户三萬七百而張軌世襲號稱大邦至李皓秃髮沮渠三方分割爭為雄霸人衆土地幾何按李皓傳中州江漢流者不過二萬家干戈日尋攘奪嵗異生齒不加益餘民靡孑遺可悲也事見通鑑南燕王德即帝位改元更名偹德以吕祖謙標目修解題曰宋庠紀年通譜建平夲漢哀帝石勒慕容瑶慕容盛年號餘見通鑑晉安皇帝隆安五年燕昭文皇帝慕容熙建始元年乞秦文桓皇帝𢎞始三年西秦伏乾歸太初十四年凉王吕隆神鼎元年魏太祖道武皇帝天興四年南凉秃髮利鹿孤建和二年北凉假業天璽三年西凉李皓庚子二年南燕獻武皇帝建平二年北凉沮渠䝉遜永安元年春正月武威王利鹿孤稱河西王以通鑑修解題曰按載記利鹿孤立三年龍見于長寧晋西平郡縣麒麟遊於經羌晋西平郡有寧羌縣疑是郡臣勸進僣稱河西王其時鍮勿崘進曰若我先君肇自幽朔被髮左袵無冠冕之儀遷徙不常無城邑之制用能中分天下威振殊境今建大號誠順人心然寧居樂土非貽厥之規倉府粟帛生敵人之志且首兵始號事必無成宜置晉人於諸城勸課桑農以供軍國之用我則習戰法以誅未賔若東西有變長算以縻之如其敵强於我徙而避其鋒不亦善乎利鹿孤然其言於是率師伐吕隆大敗之自此居者專耕出者專戰餘見通鑑髙歡入魏每令軍士其語鮮卑則曰漢民是汝奴夫為汝耕婦為汝織輸汝粟帛令汝溫飽何為陵之其語華人則曰鮮卑是汝作客得汝一斛粟一匹絹為汝擊賊令汝安寧汝何為疾之夫惟兵農之不相入則其患至於相陵且相疾也先王之法其為慮也逺矣二月丙子孫恩寇句章鎮北將軍劉牢之使其恭軍劉裕破走之以宋書夲紀修秦歸乞伏乾歸于苑川以吕祖謙標目修解題曰苑川在天興縣西四十二里凉畨禾太守吕超中領軍吕隆弒其王纂隆自立改元以吕祖謙標目修解題曰畨禾令凉州天寶縣宋庠紀年通譜吕超得小鼎於畨禾以為瑞乃紀年三月甲寅衆星西流歷大微夲紀夏五月北凉西安太守沮渠蒙遜弒其主業以吕祖謙標目修秦伐凉以通鑑修六月甲戌孫恩至丹徒劉裕破之恩别將陷廣陵以吕祖謙標目修沮渠蒙遜稱張掖公改元以吕祖謙標目修解題曰宋庠紀年通譜永安孫休晉惠張實年號秋七月魏徇許昌彭城以通鑑修秦大破凉軍西凉河西張掖皆入貢以通鑑修以劉裕為下邳太守討孫恩於郁州大破走之以通鑑宋書夲紀修解題曰郁州海州東海縣有鬱洲燕弒其王盛其叔父河間公熙即天王位閏月改元以吕祖謙標目修解題曰宋庠紀年通譜建始夲漢成帝司馬倫慕容詳年號秦圍姑臧九月凉王隆請和以吕祖謙標目修冬十一月劉裕追擊孫恩破之以通鑑修十二月桓𤣥以桓偉為江州刺史鎮夏口以舉要歷補遺修晉安皇帝元興元年燕昭文皇帝光始二年乞秦文桓皇帝𢎞始四年西秦伏乾歸太初十五年隆神鼎二年魏太祖道武皇帝天興五年南凉王吕南凉秃髮傉檀𢎞昌元年燕獻武皇帝建平三年渠西凉李皓庚子三年北凉沮䝉遜永安二年春正月庚午朔改元解題曰宋庠紀年通譜元興夲漢和帝孫皓年號以㑹稽世子元顯為驃騎大將軍征討大都督加黃鉞劉牢之為前鋒都督前將軍譙王尚之為後部討桓𤣥以夲紀修桓𤣥舉兵東下以通鑑修二月沮渠蒙遜攻凉姑臧盟而還以通鑑修解題曰姑臧武威郡治也丁卯桓𤣥至姑熟譙王尚之軍潰三月己巳朔劉牢之叛辛未元顯軍潰壬申𤣥入建康自為都督中外諸軍丞相録尚書事尋自為太尉揚州牧總百揆癸酉徙會稽王道子於安成殺元顯等劉牢之為會稽內史牢之自殺以列傳吕祖謙標目修解題曰王容曰宋齊志皆無成安通鑑据南史書之疑當作安成輿地志晋惠帝元年築安城郡方輿記在今吉州安福縣改元大享以吕祖謙標目修孫恩伏誅衆推其將盧循為主桓𤣥以為永嘉太守以吕祖謙標目修河西王利鹿孤卒弟傉檀立更稱凉改元以吕祖謙標目修夏四月桓𤣥屯姑熟以通鑑修五月盧循寇東陽撫軍中兵參軍劉裕走之以通鑑修秦伐魏秋七月魏主圭擊之冬十月取秦軍于柴壁以吕祖謙標目修解題曰絳州太平縣東三十里有子竒壘子竒秦將姚平字也其側尚有柴村冀州刺史劉軌邀襄城太守司馬休之將軍劉敬宣廣陵相髙雅之據山陽起兵不克乃奔南燕將軍袁䖍之劉夀等奔秦以通鑑修燕王熙弒太后丁氏以舉要歷補遺修十二月殺㑹稽王道子以夲紀修是時柔然社崘據漠北自號可汗以吕祖謙標目修解題曰杜佑謂稱可汗始於此按拓跋之先雖有可汗毛可汗推寅可汗鄰可汗力微皆追封耳故知始於柔然非始於拓跋也晉安皇帝元興二年燕昭文皇帝光始三年乞秦文桓皇帝𢎞始五年西秦伏乾歸太初十六年隆神鼎三年魏太祖道武皇帝天興六年南凉王吕南凉秃髮傉檀𢎞昌二年燕獻武皇帝建平四年渠西凉李皓庚子四年北凉沮蒙遜永安三年春正月盧循司馬徐道覆寇東陽二月辛丑建威將軍劉裕破之以夲紀修夏四月癸巳朔日有食之以夲紀修秋七月南凉北凉攻凉凉王隆請降于秦八月秦取姑臧以吕祖謙標目修解題曰按載記吕光以孝武太元十二年守凉州十五年僣位至隆凡十有三載以安帝元興二年滅宋庠曰三主十七年劉裕追盧循至晋安連破之以通鑑修九月丙子大將軍桓𤣥自為相國楚王加九錫冬十二月壬辰𤣥自即皇帝位改元永始廢帝為平固王戊戌𤣥入建康辛亥遷帝于尋陽以夲紀通鑑修解題曰宋庠紀年通譜永始夲漢成帝年號世說新語晋安帝紀桓修少為𤣥所侮言論常鄙之修深憾焉密有圗𤣥之意修母曰靈寶視我如母汝等何忍骨肉相圖修乃止是嵗魏始制冠服以通鑑修大事記續編卷三十三
