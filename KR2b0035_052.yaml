body:
  text: 大事記續編卷五十二明王禕撰唐髙宗皇帝永徽四年春二月甲申駙馬都尉房遺愛薛萬徹柴令武髙陽巴陵公主謀反伏誅殺司徒荆王元景吳王恪流宇文節太常卿江夏王道宗於嶺表廢恪母弟蜀王愔為庶人以新紀朱熹綱目修解題曰胡寅曰唐起晉陽裴劉之謀太宗承統房杜之䇿也是其富貴安榮當與有唐相終始而禍敗之及或在其身或在其子孫何也裴寂以孤貧為歎文靜在縲絏之中贊唐公父子起事非有拯亂救時之略亦欲自免因圖富貴而已房杜固非裴劉所敢班然太白經天之際密進籌畫使太宗手剪兄弟并殺其子此不但陳平之隂謀而已其宗嗣不延冝哉故四族既殞而唐之子孫亦幾殱於武氏善惡之積各以其類詎不信夫無忌因遺愛之獄濫及吳王遂良所冝救止也既不能然復以素不相協而斥道宗其不能保終而來讒口有以哉事見通鑑己亥李績為司空以新舊紀修秋八月己亥隕石十八於馮翊有聲如雷以舊紀修解題曰髙宗問此何祥也朕欲悔往修來以自戒若何志寧對曰春秋隕石於宋五內史過曰是隂陽之事非吉凶所生物固有自然非一繫人事雖然陛下無災而戒不害為福也唐仲友曰唐人大抵不謹天戒故言災異多操適然之説志寧之論即姚崇之言也以姚崇之説告明皇猶不可而况以志寧之説告髙宗乎志寧不諌武后之事已兆於此九月壬戌北平定公張行成薨甲戌褚遂良為右僕射以新舊紀通鑑修冬十月庚子帝幸溫湯乙巳還宮以新舊紀修十一月癸丑兵部尚書崔敦禮為侍中丁巳柳奭為中書令以新紀修十二月庚子蓚憲公髙季輔薨以通鑑修以太宗才人武氏為昭儀以新舊大紀傳通鑑修唐髙宗皇帝永徽五年春三月戊午帝幸萬年宫次鳳泉湯以新舊紀修解題曰鳳泉湯在鳳翔府郿縣武昭儀欲追贈其父士彠庚申加贈武德功臣等以通鑑修夏閏四月丁丑大雨漂溺麟遊縣民及衛士三千餘人以舊紀修六月癸亥柳奭罷新紀丙寅河北大水新紀秋九月丁酉帝還宫以通鑑修冬十月癸卯築京師外郭三十日罷以新舊紀修解題曰按唐六典宋敏求河南志京城東西十八里一百一十五步南北十五里一百七十五步亦曰外郭城南三門中明德左啓夏右安化東三門中春明北通化南延興西三門中金光北開逺南延平皇城在京城之中東西五里一百一十五步南北三里一百四十步今謂之子城南三門中朱雀左安上右含元東二門北延喜南景風西二門北安福南順義宫城在皇城之北北抵苑東西四里南北二里二百七十步南三門中承天東長樂西永安太極宫南六門南承天承天門東長樂次東廣運北重明次東永春承天門西永安大明宫在禁苑之東南接鳳城之東北隅南五門正南丹鳳東望仙次延政西建福次興安紫宸殿東太和門西日營門北玄武門當皇城朱雀門有南北大街萬年領街東五十四坊及東市長安領街西五十四坊及西市是嵗大稔以通鑑修帝幸長孫無忌第官其三子議立武昭儀為后無忌不可以吕祖謙標目修唐髙宗皇帝永徽六年春正月壬申朔帝謁昭陵甲戌還宫以通鑑修庚寅立子二人為王以本紀修二月乙丑營州都督程名振等伐髙麗以新紀修夏五月癸未遣屯衛大將軍程知節等為行軍大總管伐賀魯以新舊紀修壬辰韓瑗為侍中來濟為中書令秋七月乙酉崔敦禮為中書令以新紀修中書舍人李義府請廢皇后立武昭儀遷中書侍郎參知政事以新紀修八月初置員外同正員以通鑑修解題曰按通典以蔣孝璋為尚藥奉御員外特置仍同正員自是員外官復有同正員者同正員者唯不給職由其祿奉賜會與正官同單言員外者則祿奉減正員之半九月戊辰以許敬宗為禮部尚書以通鑑修解題曰唐仲友曰太宗好兵之禍天道好還故以武后斫喪唐室而敬宗義府為之羽翼殆有不可得而去者豈人力哉帝欲立武昭儀褚遂良韓瑗來濟爭之李績曰陛下家事何必問外人庚午貶遂良為潭州都督冬十月己酉廢皇后為庶人乙卯立武氏為皇后以新紀及通鑑舉要厯修解題曰語曰涓涓不止將成江河兩葉不去將用斧柯遂良當武氏入為昭儀之時既不能引禮廷靜以絶其萌及掖庭怙寵之際又不能陳義力諌以決其去至於惡熖既成且將奪嫡然後言其託體先帝雖叩頭流血無及矣事見通鑑按舊史紀新史傳髙宗雖特置宸妃欲以處武氏然未嘗居其位也新紀書宸妃武氏為皇后誤也髙宗欲立武氏李世績曰此陛下家事何須問外人髙宗之意遂定而武氏之禍至於夷唐社稷豈非一言而喪邦乎及武氏既篡承嗣三思求為太子而狄仁傑爭之甚力后曰此朕家事卿無預知是無異於世績之言也仁傑則曰王者以四海為家四海之內孰非臣妾何者不為陛下家事君為元首臣為股肱義同一體况臣備位宰相豈不與知此言既發廬陵王遂還而唐室復歸於李氏豈非一言而興邦乎興喪之言特在反覆手之間耳是冬皇后殺王庶人新紀唐髙宗皇帝顯慶元年春正月辛未廢皇太子忠為梁王立子代王𢎞為皇太子以吕祖謙標目修壬申改元以新舊紀修解題曰宋庠紀年通譜立太子故改元孫甫曰人君即位之年謂之元年漢文惑方士之言始亂古制孝武因事别立年號厯代因之唐武德貞觀雖為年號亦終其身髙宗不奉祖宗之法而改元何也二月辛未贈武士彠司徒周國公以吕祖謙標目修三月户部侍郎杜正倫為黃門侍郎同三品以新舊紀修夏六月辛亥以髙祖配圓丘太宗配明堂以通鑑修秋七月癸未崔敦禮為太子少師同三品八月丙申薨以新紀通鑑修辛丑程知節敗賀魯所部於榆慕谷以新紀修侍御史王義方劾李義府貶為萊州司戶以通鑑舉要厯修九月程知節敗賀魯於怛篤城以新紀修唐髙宗皇帝顯慶二年春閏正月壬寅帝幸洛陽以新舊紀修庚戌遣屯衛將軍蘇定方等為行軍總管伐賀魯以新紀修二月封子顯為周王以新紀修三月癸丑褚遂良徙桂州都督以通鑑修李義府兼中書令以新舊紀修夏五月丙申帝幸明德宮庚子始隔日視事以新舊紀修秋七月丁亥朔帝還洛陽以通鑑修八月許敬宗誣韓瑗來濟與褚遂良謀反并柳奭皆貶逺州刺史以稽古録修詔廢六天之祀合方丘神州為一祭朱熹綱目辛未許敬宗為侍中九月庚寅兼度支尚書杜正倫兼中書令以新舊紀修冬十一月戊戌帝如許州以新紀修十二月乙卯帝還洛陽以通鑑修丁巳蘇定方敗賀魯於金牙山執之分西突厥地為兩可汗以吕祖謙標目修丁卯以洛陽為東都新紀解題曰按新史地理志注皇城長千八百一十七步廣千三百七十八步周四千九百三十步其崇三丈七尺曰太微城宫城在皇城北長千六百二十步廣八百有五步周四千九百二十一步其崇四丈八尺曰紫微城武后號太初宫都城前直伊闕後據邙山左瀍右澗洛水貫其中東五千六百一十步南北五千四百七十步西連苑北自東城而東二千五百四十步周二萬二千五十步其崇丈有八尺武后號曰金城禁僧尼受父母及尊者拜以通鑑修吏部侍郎劉祥道以每年入流過一千四百請年别入流者五百人不報以吕祖謙標目修解題曰按通典新史列傳祥道父林甫知選事既世職乃釐補敝闕上疏一曰今選司取士入流嵗千四百多也雜色入流未始銓汰濫也通典雜色解文三衛內外行署內外蕃官親事帳內品子在掌伎術直司書手兵部品子兵部散官勳官記室及功曹參軍撿挍官屯副驛長挍尉牧監經生時務等比雜色人三分不居其一其雜色應入流人切責有司試判為四等第一等付吏部第二等付兵部第三等付主爵第四等付司􅈴則官不雜矣二曰內外官一品至九品萬三千六百四十五員不過三十年略盡若年别入流者五百人入流嵗千四百所減幾三分之二足充所須之數今入流嵗千四百其倍兩之又停選常六七千人復年别新加望請釐革蘇冕曰今河西隴右虜盜其境河北河南問不上計員數比天寶二分減一入流比天寶三分加一須造格阻進士子一年守官十年待選欲吏有善稱不可得也若比祥道所述豈不十倍更弊乎三曰入流以三分論二分取明經進士一分取雜色人四曰庠序五曰唐有天下未嘗舉秀才請加搜訪六曰請四考進階八考聽選以減迎新送故之弊七曰三省都事主事主書皆取流外有刀筆雖欲用士流率以儔類為恥冝稍革之杜正倫亦言入流者衆詔與祥道參議而執政憚改作又以勳戚子進取無他門遂格通典舊史傳魏玄同為吏部侍郎垂拱中疏曰周穆王以伯冏為太僕正命曰慎簡乃僚王命其大者而自擇小者漢諸侯得自置吏其傳相大官則漢為置之州郡掾吏督郵從事悉任之於牧守爰自魏晉始歸吏部相襲迄今用刀筆以量下按簿書以察行至乃為人擇官為身擇利顧親疏而下筆看勢要而措情使百行九能折之於一面具僚庶品專斷於有司不亦難矣今諸色入流嵗以千計羣司列位無復新加官有常員人無定限選集之始霧集雲屯擢敘於終十不收一貴戚子弟例早求官𢎞文崇賢千牛輦腳之類課試既淺藝能亦薄少仕則廢學輕試則無才又勳官三衛流外之屬不待州縣之舉直取書判恐非先德後言之義也葉適曰後學但稱陸贄而未知玄同之論比贄尤精確新史刪其文故觀者莫辨唐髙宗皇帝顯慶三年春正月戊子頒新禮以舊紀修二月甲戌帝還京師以新紀修夏五月癸未徙安西都護府於龜兹以舊安西府為西州都督府以舊紀通鑑修解題曰王容曰明年以庭州司馬崔智於西州分置州縣龜兹國內置西夜罽陵虞泉崦嵫寫鳳鳥飛犂凡七州九縣改龜兹為都護府王為都護都督境內一千五百里冬十一月乙酉貶李義府杜正倫為刺史戊戌許敬宗為中書令大理卿辛茂將兼侍中以新紀修是嵗禇遂良卒吕祖謙標目唐髙宗皇帝顯慶四年夏四月于志寧為太子太師黃門侍郎許圉師並同三品以新紀修許敬宗誣長孫無忌謀反戊辰流之黔州追削褚遂良官爵除柳奭韓瑗名罷于志寧以通鑑修解題曰胡寅曰人主之惑讒言由不知其人之為蔽耳髙宗於許敬宗非不知其人也如敬宗修實録移威鳳賦事明知不足信况鞫獄之際於事外言所嫉之人大罪詎可信乎無忌親則元舅位則三公忠亮許國一姦人譛之不自臨問遂竄遐裔此非不知敬宗之誣謗正快嬖者之意爾不惟昏塞之過實不孝不仁之甚也事見通鑑五月丙申兵部尚書任雅相度支尚書盧承慶參知政事以新舊紀修殺涼州刺史趙持滿以通鑑修六月更修姓氏録以通鑑録目修秋七月殺長孫無忌柳奭韓瑗已死並褚遂良皆籍之以通鑑修解題曰唐仲友曰甚矣家法之當正而天道之好還也隱巢之事太宗適處其不幸髙祖不早為之定分事勢急迫而無忌決其謀太宗為之太過至承乾以逆泰以窺望兩棄晉王以母弟次立太宗病其柔懦屬意吳王竟以無忌諌止吳王初無覬心也無忌誣而殺之太宗之子賢者死才者廢而髙宗竟以昏懦政歸武氏唐宗室連頸受戮者數千百人無忌始以舅甥立晉王而敬宗之誣昏不省録無忌族滅竟如吳王臨終之言悲夫事見通鑑八月壬子李義府為吏部尚書同三品以新舊紀修冬閏十月戊寅帝幸東都以新舊紀修十一月丙午許圉師為散騎常侍撿挍侍中以舊紀修戊午辛茂將卒以宰相表修賀魯部悉闕結俟斤都曼反驍衛大將軍蘇定方伐之以新紀修盧承慶同三品以新紀通鑑修是嵗蘇定方擒都曼以新紀通鑑修唐髙宗皇帝顯慶五年春正月甲子帝幸并州以新舊紀修二月甲午祠舊宅三月丙午皇后宴親族鄰里於朝堂會命婦於內殿以新紀修遣武衛大將軍蘇定方為行軍大總管率三將軍及新羅兵伐百濟以新紀修解題曰按通典新史東夷傳百濟即漢末夫餘王尉仇台之後直京師東六千里而贏西界越州南倭北髙麗皆踰海乃至東新羅餘衆後漸寡弱土地盡沒於新羅靺鞨百濟遂絶夏四月癸巳帝還東都以通鑑修五月造合璧宫以通鑑修戊辰定襄都督阿史德樞賓等為行軍總管伐契丹以新紀修六月庚午朔日有食之以新舊紀修秋七月乙巳廢梁王忠為庶人徙黔州以通鑑目録修戊辰盧承慶罷以通鑑目録修八月庚午蘇定方等平百濟擒其王以吕祖謙標目修冬十月始命皇后決政事以吕祖謙標目修十一月甲寅帝如許州十二月辛未獵於安樂川己卯如東都以新紀修壬午遣驍衛大將軍契苾何力等行軍三大總管伐髙麗以新紀修唐髙宗皇帝龍朔元年春二月乙未改元以新舊紀修解題曰宋庠紀年通譜益綿等州皆言龍見故改元以協瑞三月百濟故王子豐據故地以吕祖謙標目修夏四月庚辰遣任雅相等行軍六總管率三十五軍伐髙麗以新紀修甲午晦日有食之以新舊紀修秋八月甲戌平壤道總管蘇定方敗髙麗兵於浿江圍平壤城以吕祖謙標目修解題曰竇蘋音訓浿江出樂浪郡平壤依浿水立城今髙麗以為西京冬十月帝畋於陸渾又畋於非山以通鑑修回紇犯邊遣武衛大將軍鄭仁泰等行軍三大總管伐之以新紀修解題曰回紇侵犯始於此事見通鑑唐髙宗皇帝龍朔二年春二月甲子改官名以吕祖謙標目修甲戌任雅相卒於軍蘇定方等還以舊紀修三月庚辰鄭仁泰等敗鐵勒於天山以新紀修夏四月庚申帝還京師以新舊紀修辛巳作蓬萊宫新紀解題曰石定叟曰貞觀八年置永安宫九年曰大明龍朔始大興葺曰蓬萊宫咸亨元年曰含元宫上元元年復曰大明宫第一殿曰含元第二殿曰宣政紫宸又在其後延英在紫宸殿之東在西內東北故曰東內六月乙丑初令僧道致敬父母以吕祖謙標目修秋七月右威衛將軍孫仁師為行軍總管伐百濟以新紀修八月壬寅許敬宗為太子少師同三品以新舊紀修冬十月丁酉帝幸溫湯丁未還宫以通鑑修庚戌西臺侍郎上官儀同三品以新舊紀修十一月辛未許圉師罷以通鑑修癸酉封子為王以新紀修十二月右衛將軍蘇海政為行軍總管伐龜兹與西突厥繼往絶可汗殺興昔亡可汗其衆歸吐蕃以通鑑目録修是嵗西突厥冦庭州刺史來濟死之以朱熹綱目修唐髙宗皇帝龍朔三年春正月乙丑李義府為右相新紀二月減百官俸一月賦雍同等十五州民錢作蓬萊宫以新紀修徙燕然都護府於回紇更名瀚海徙故瀚海都護於雲中更名雲中分主磧北南以吕祖謙標目修解題曰程大昌曰唐太宗降滅北虜不止一國皆列郡縣遙羈縻之小則為州大則為都督府皆用其酋長其或欵塞內附亦度邊障而居之貞觀二十一年置燕然都護府凡州與都督皆統之龍朔三年兩都護府夾磧而立磧北隸瀚海領頡利車鼻回紇之衆磧南隸雲中領來降之在塞內者瀚海直豐勝二州間總章改為安北大都護府雲中麟德改為單于大都護府是後改易尚多史紀其效曰自立府二十年北方無戎馬警事見通鑑夏四月流李義府於雋州新紀丙午帝移御蓬萊宫更命故宫曰西內以吕祖謙標目修五月吐蕃擊破吐谷渾遣涼州都督鄭仁泰為行軍大總管救之以新紀修解題曰吐谷渾自晉永嘉有國至吐蕃取其地凡三百五十年及此封嗣絶矣事見通鑑秋八月癸卯彗星出於左攝提以新紀修罷三十六州所造船遣大使按察十道以新紀通鑑修九月孫仁師敗百濟平之以吕祖謙標目修冬十二月庚子改來年元以新舊紀修唐髙宗皇帝麟德元年春正月甲子改雲中都護府為單于大都護府以吕祖謙標目修解題曰宋庠紀年通譜前嵗麟再見故改元二月戊子帝如萬年宫秋七月詔以三年正月封禪八月壬午還宫以新舊紀通鑑修丁亥司列太常伯劉祥道兼右相大司憲竇德玄為司元太常伯兼檢校左相新紀皇后專恣帝與上官儀議廢之事泄冬十二月丙戌歸罪於儀而殺之戊子殺庶人忠罷劉祥道自是上每視事則后垂簾於後大權歸中宫矣以新紀舉要厯修太子右中護樂彥瑋西臺侍郎孫處約同知軍國政事以新紀及表修唐髙宗皇帝麟德二年春二月壬午帝幸東都以舊紀修三月甲寅司戎太常伯薑恪同東西臺三品以新紀修辛未東都乾元殿成舊紀解題曰河南志乾元門內正殿隋之乾陽殿麟德造乾元殿長壽三年改造明堂開元元年改乾元殿十年為明堂閏三月癸酉日有食之以新紀修夏四月戊辰左侍極陸敦信檢校右相孫處豹樂彥瑋罷新紀五月辛卯頒麟德厯以舊紀修冬十月壬戌帶方州刺史劉仁軌為大司憲兼知政事新紀丁卯帝如泰山以新紀修大有年新紀唐髙宗皇帝乾封元年春正月戊辰朔封泰山庚午禪社首皇后亞獻壬申改元解題曰宋庠紀年通譜乾字讀作乾坤之乾封以封禪為義孫甫曰太宗以功德平治天下賢才在位法度施張刑罰幾措嵗時屢穰四夷帖服尚以封禪盛德之事慮己所為未當天心髙宗在位雖賴先帝遺德生民安業奈姦人亂政忠賢竄戮太子廢殺中宫垂簾有何功德可以告成蓋徇后之欲舉希濶儀物夸耀天下耳登封之後嵗飢民困日食彗見豈非功德之薄妄告於天勞費民力干動和氣所致歟姦人預慮天時不順先引漢乾封故事建為年號以嵗旱為乾封則民之飢困災變頻仍果天祐哉事見通鑑賜文武官階勳爵以新紀通鑑修解題曰十月之交曰皇甫卿士畨維司徒家伯冢宰仲允膳夫棸子內史蹶維趣馬楀為師氏艷妻煽方處幽王之時小人之所以滿朝而官爵所以多濫者由艷妻之方處也文武之朝有任姒以居內則官爵曷至是哉貞觀之初內治有長孫皇后雖以無忌之賢而皇后尚請不使久居寵位則朝廷之名器冝其無泛加者矣永徽之際內有武后而義府敬宗之徒聚於朝廷之上則官有泛階而末年服緋者滿朝以敗太宗之典刑亦其冝也事見通鑑李義府卒以吕祖謙標目修辛卯帝幸曲阜祠孔子贈太師二月己未至亳州祠老子追號太上玄元皇帝夏四月甲辰至京師以新紀修庚戌陸敦信罷新紀五月庚寅鑄乾封泉寶錢一當十以通鑑修髙麗泉蓋蘇文死子男生男建相攻六月壬寅詔武衛大將軍契苾何力將兵援男生以舊紀修秋七月庚午劉仁軌兼右相以新紀修八月辛丑竇德玄薨以通鑑修丁未皇后殺其從兄刺史武惟良武懷運以新紀修冬十二月己酉遣李績為行臺大總管率六總管兵伐髙麗以新紀修唐髙宗皇帝乾封二年春正月帝耕籍田以通鑑修罷乾封泉寶錢以通鑑修二月辛丑萬年宮復名九成宫以舊紀修禁工商乘馬新紀皇極經世三月戊寅廢生羌十二州以吕祖謙標目修夏六月乙卯西臺侍郎楊𢎞武戴至德東臺侍郎李安期司列少常伯趙仁本同東西臺三品東臺舍人張文瓘參知政事以新紀修秋八月己丑朔日有食之舊紀辛亥李安期罷新紀九月李績拔髙麗十七城以朱熹綱目修唐髙宗皇帝總章元年春正月壬子劉仁軌為遼東道副大總管以舊紀修二月戊寅帝幸九成宫以通鑑修三月庚寅改元以通鑑修解題曰宋庠紀年通譜頒明堂之制故改元夏四月丙辰彗星出於五車以新紀修辛巳楊𢎞武薨以新舊紀通鑑修秋八月癸酉帝還宫以通鑑修九月癸巳李績拔平壤城執其王髙麗平冬十月獻於太廟十二月州府其地置安東都護府統之解題曰髙麗自隋唐以來國數被兵煬帝太宗至於親臨遼東皆無功而歸而髙宗卒克之賈言忠對髙宗謂先帝所以不得志者虜未有釁也諺曰軍無媒中道回今男生兄弟鬩狠為我鄉導虜之情偽我盡知之將忠士力是行不再舉矣其説固然然髙麗地止四郡唐自貞觀以來七伐其國何以支梧縱其國無內釁亦終於亡况男生與其王皆舉國內附乎此所以能收前人未集之功也按通典新史列傳髙麗出於夫餘先祖朱蒙棄夫餘至紇升骨城居焉號句麗以髙為氏漢滅朝鮮以髙句麗為縣屬玄菟郡建武復其王號地東跨海距新樂南跨海距百濟西北渡遼水與營州接北靺鞨去京師五千里而贏其後餘衆不能自保散投新羅靺鞨髙氏遂絶丁卯祀南郊以吕祖謙標目修甲戌薑恪檢校左相司平太常伯閻立本守右相以新紀修是嵗旱以通鑑修唐髙宗皇帝總章二年春二月辛酉張文瓘及右肅機李敬玄為東西臺侍郎同三品同三品始入銜以新紀通鑑修三月丙戌東臺侍郎郝處俊同三品以新紀修丁亥詔定明堂制度以通鑑修夏四月己酉帝幸九成宫以通鑑修徙髙麗民於江淮山南京西以通鑑修六月戊申朔日有食之以新舊紀修秋八月甲戌改瀚海都護府為安北都護府以吕祖謙標目修解題曰長夀元年陳子昻為喬補闕論突厥臣比在同城接居延海西逼近漢南去月敕於同城權置安北都護府以招納亡叛扼胸奴之喉其地東西及北皆是大磧磧並石鹵水草不生突厥所入道莫過同城今居延澤接張掖河中間堪營田處數百頃水草蓄牧足供具萬人又甘州諸屯犬牙相接所蓄粟麥積數十萬田園水利種無不收居延海多有漁鹽強兵用武之國也冬十月帝還宫以通鑑修十二月戊申英貞武公李績薨以通鑑修司列少常伯裴行儉設銓注長名姓厯榜以通鑑修解題曰手揣輕重則無事乎權衡目量多寡則無事乎斗斛然手揣目量之人不可以多得也故權衡斗斛不可一日廢行儉名姓榜亦銓法之斗斛權衡耳此唐家銓選之法遂可為後世之永制歟事見通鑑唐髙宗皇帝咸亨元年春正月丁丑劉仁軌致仕以朱熹綱目修三月甲戌朔改元以新舊紀修丁丑建蓬萊宫為含元宫以吕祖謙標目修壬辰許敬宗致仕以吕祖謙標目修夏四月癸卯吐蕃陷龜兹撥換城廢安西四鎮辛亥遣威衛大將軍薛仁貴為行軍大總管伐之以新紀修解題曰龜兹治白山之南去瓜州三千里貞觀二十二年閏十二月朔阿史那社爾執龜兹王以歸始徙安西都護於其都統于闐碎葉疏勒號四鎮于闐在蔥嶺北二百里貞觀二十二年閏十二月內附焉耆去瓜州二千里貞觀十八年郭孝恪滅之疏勒在白山之南去瓜州四千六百里貞觀九年內附蘇冕記咸亨元年罷四鎮是龜兹于闐焉耆踈勒長夀復四鎮是龜兹于闐疏勒碎葉四鎮不同蓋焉耆有碎葉城置四鎮之初固曰統碎葉不曰統焉耆也開元以後十姓可汗請居碎葉城安西節度使湯嘉惠始表以焉耆備四鎮安西西出拓厥關四百二十里至撥換城一曰威戎城又七百六十里至碎葉城城北有碎葉水自碎葉西南渡渾河八百四十里至疏勒鎮自撥換南而東九百三十里至于闐鎮自焉耆西六百三十里至安西都護府帝幸九成宫以通鑑修髙麗酋長叛遣監門衛大將軍髙侃等為行軍總管伐之新紀六月壬寅朔日有食之以新舊紀修秋七月薛仁貴大敗於大非川以新舊紀修解題曰十道圖大非川在青海南新史地理志鄯州鄯城縣西南石堡城經尉遲川苦拔海王孝傑乘柵莫離釋公主佛堂大非川八月帝還宫以通鑑修閏九月壬子贈武士彠為太原王以吕祖謙標目修甲寅薑恪為行軍大總管伐吐蕃以新紀修冬十月乙未趙仁本罷新紀十二月庚寅官名復舊以新舊紀修是嵗大飢新紀唐髙宗皇帝咸亨二年春正月甲子帝幸東都以新舊紀修冬十一月甲午朔日有食之舊紀是嵗薑恪為侍中閻立本為中書令新紀唐髙宗皇帝咸亨三年春二月辛丑徙吐谷渾於靈州其地入吐蕃以吕祖謙標目修己卯薑恪薨新紀秋八月許敬宗卒以吕祖謙標目修冬十月戊子朔日有食之以新紀修甲辰帝還京師以通鑑修十二月劉仁軌為太子左庶子同三品以新紀修唐髙宗皇帝咸亨四年春三月丙戌詔劉仁軌等改修史以朱熹綱目修夏四月帝幸九成宫通鑑冬十月壬午閻立本薨以通鑑修乙巳帝還宫以通鑑修唐髙宗皇帝上元元年春正月遣劉仁軌為行軍大總管伐新羅以新舊紀修三月辛亥朔日有食之以新舊紀修秋八月壬辰帝稱天皇后稱天后追尊六代五代祖妣為帝后增髙祖太宗及后諡改元以新紀吕祖謙標目修解題曰孫甫曰諡所以尊名也古之天子諸侯卿大夫善名雖多惟取大善為稱不使名浮於實也厯代帝王諡號雖不能盡如古制然必以祔廟之始一二字為定髙祖太宗廟號久定而增其名豈禮乎哉二后號聖神尤乖其實武后欲自尊大妄稱天后髙宗遂稱天皇因追尊祖宗以掩其迹此髙宗之過也亦由大臣有司不守經義逢君之惡所致爾事見通鑑宋庠紀年通譜追崇祖帝后自稱天帝天后故改元九月癸丑復長孫無忌官爵以舊紀修冬十一月丙午朔帝幸東都以新舊紀通鑑修十二月蔣王惲被誣自殺以通鑑修壬寅天后上便冝十二條其一請加母服以吕祖謙標目修唐髙宗皇帝上元二年春二月劉仁軌敗新羅兵於七重城以新紀修三月帝欲使天后攝政郝處俊諌乃止以通鑑修夏四月己亥天后殺皇太子𢎞五月戊申追諡為孝敬皇帝解題曰按新舊史列傳義陽宣城二公主以母得罪幽於掖庭吳縝唐書糾繆曰新書云二公主以母故幽掖庭四十不嫁按髙宗以貞觀二年生而太子𢎞以上元二年薨髙宗方四十八嵗爾何緣有四十嵗之女當日史臣欲甚武氏之惡不顧事過其實也今按通鑑改為三十餘要亦非是惟舊史為得其實太子見之驚惻遽奏請令出降武后怒即以當上衛士配之由是失愛又請以同州沙苑地分假貧民又詔詣東都納右衛將軍裴居道女為妃帝嘗語侍臣𢎞仁孝賓禮大臣未嘗有過而后將騁志𢎞奏請數咈旨從幸合璧宫遇鴆薨餘見通鑑胡寅曰太子𢎞幼有美質嘗愛春秋至商臣事廢書歎曰經籍聖人垂訓而至此何耶郭瑜對曰春秋義存褒貶故商臣千載而惡名不滅𢎞曰非惟口不可道耳亦不忍聞願受他經瑜請讀禮從之𢎞方志學而心志如此豈非賢乎其死也非有他過特以奏請咈旨嗚呼為人臣子而不知春秋之義者必陷誅死之罪𢎞之謂矣太子之職問安侍膳此外非所預也君父懦昏母后専忍尤當遵飬時晦以絶疑忌之萌而輕用其智不自韜默此春秋所禁也使瑜知此教𢎞以為太子之道豈至於一言違忤而見鴆哉范祖禹曰皇帝者有天下之號非所以為贈也父沒而后子立今父在而追尊其子豈禮也哉蓋武后謀篡國鴆太子而加之尊名以掩其迹李泌之言信矣六月戊寅立子雍王賢為皇太子以新紀及栁芳唐厯修秋八月張文瓘為侍中郝處俊為中書令劉仁軌戴至德為左右僕射以新紀修冬十月壬午彗星出於角亢以新紀修唐髙宗皇帝儀鳳元年春二月甲戌移安東都護府於遼東舊紀三月癸卯黃門侍郎來恆中書侍郎薛元超同三品以舊紀修閏三月己巳吐蕃入冦乙酉以洛州牧周王顯為行軍元帥領左衛大將軍劉審禮等并州大都督相王輪為行軍元帥領契苾何力等伐之二王竟不行以通鑑新紀修夏四月戊申帝還京師以新舊紀修甲寅中書侍郎李義琰同三品以新紀修六月癸亥黃門侍郎髙智周同三品以新紀修秋七月辛亥彗星出於東井以新紀修九月以大理丞狄仁傑為侍御史以吕祖謙標目修冬十月帝還京師以通鑑修丁酉祫享太廟以通鑑修十一月壬申改元以新紀修解題曰宋庠紀年通譜鳳皇見故改元庚寅李敬玄為中書令新紀十二月戊午來恆薛元超為河南北道大使以新紀修唐髙宗皇帝儀鳯二年夏四月左庶子張大安同三品以新紀修秋八月辛亥劉仁軌為洮河軍鎮守使新紀冬十月壬辰徙封王顯為英王更名哲新紀唐髙宗皇帝儀鳳三年春正月辛酉百官朝天后於光順門以吕祖謙標目修解題曰新史傳昭儀為皇后命羣臣及四夷酋長朝后肅義門內外命婦入謁朝皇后自此始兹踵前事而為之也事見通鑑竇蘋音訓光順門紫宸殿之西南門丙子李敬玄代劉仁軌為行軍大總管以通鑑修解題曰方仁軌之自百濟召還也計其非便與劉仁願議請留仁願難之仁軌曰人臣茍利於國知無不為豈恤其私乃表陳便冝其拳拳體國如此及出鎮洮河忿為李敬玄所抑知其非將帥才而故薦以代己遂覆其師視前日幾若二人之為蓋仁軌雖有知識而未必知學問一時慷慨自許固能輸其忠力及有所忿懥則不得其正矣此所以見天資之不足恃也事見通鑑五月帝幸九成宫秋九月還宫以通鑑修癸亥張文瓘薨以新紀修丙寅李敬玄及左衛大將軍劉審禮敗於青海審禮死之以通鑑修解題曰新史列傳吐谷渾居甘松山之陽洮水之西有青海周八九百里冬十一月壬子來恆薨以舊紀修唐髙宗皇帝調露元年春正月帝幸東都以新舊紀修庚戌道恭公戴至德薨以通鑑修夏四月辛酉郝處俊為侍中以新舊紀修五月戊戌作紫桂宫新紀解題曰按新史地理志注河南府澠池縣西有紫桂宫六月辛亥改元以新舊紀修解題曰宋庠紀年通譜甘露降故改元事見栁芳唐厯遣吏部侍郎裴行儉伐西突厥秋九月執其可汗都支以新舊紀修冬十月突厥溫傳奉職二部反敗單于大都護府長史蕭嗣業以新紀吕祖謙標目修十一月戊寅髙智周罷新紀甲辰禮部尚書裴行儉為行軍大總管伐突厥以新紀修唐髙宗皇帝永隆元年春三月裴行儉大破突厥於黑山擒奉職以吕祖謙標目修解題曰竇蘋音訓黑山在雲州西北六百里武經總要在契丹慶州北三十里沈括筆談在大幕北今謂之姚家族有水出其下所謂黑水也夏四月戊辰黃門侍郎裴炎崔知溫中書侍郎王德真同三品以新舊紀修秋七月己卯吐蕃冦河源辛巳李敬玄大敗於湟川武衛將軍黑齒常之擊却之以為河源軍經略大使時吐蕃盡據羊同諸羌之地方萬餘里以吕祖謙標目修解題曰按新舊史本紀儀鳳三年正月李敬玄為洮河道行軍大總管以伐吐蕃九月李敬玄劉審禮及吐番戰於青海敗績審禮被俘永隆元年七月吐蕃冦河源李敬玄及吐蕃戰於湟川敗績貶敬玄為衡州刺史前戰青海後戰湟川自是再戰新史吐蕃傳敬玄率劉審禮擊吐蕃青海上審禮戰沒敬玄頓承風嶺礙險不得縱吐蕃壓王師屯將軍黑齒常之率死士五百夜斧其營虜驚自相轥藉而死者甚衆乃引去敬玄僅脫雖不及後一戰然李敬玄傳則云拜洮河道大總管兼檢校鄯州都督統兵十八萬與吐蕃將論欽陵戰青海使劉審禮為先鋒鏖虜敬玄按軍自如審禮戰沒尚首鼠不進乃頓承風嶺虜壓其營偏將黑齒常之率死士夜擊賊敬玄始得至鄯州又戰湟川遂大敗黑齒常之傳則云儀鳳三年從李敬玄劉審禮擊吐蕃審禮敗敬玄欲引還阻泥溝兵不得出常之夜率敢死士五百人掩其營殺掠數百人賊酋跋地設棄軍走帝歎其才擢左武衛將軍進為河源軍副使調露中吐蕃使贊婆等入冦屯良非川李敬玄之敗常之引精騎三千夜襲其軍斬首二千級獲羊馬數萬贊婆等單騎去即拜河源道經略大使事迹前後自是分明但多李敬玄之敗五字是衍文所以通鑑考異疑其止是一戰也新史地理志注元和郡縣志鄯州鄯城縣儀鳳二年分湟水縣置有河源軍會要在湟川東西本趙充國亭候新史吐蕃傳大羊同國古所謂崑崙也東距長安五千里八月丁巳李敬玄貶刺史以新舊紀修甲子廢皇太子賢為庶人乙丑立英王哲為皇太子改元以舊紀修解題曰廣平王使李泌獻捷與帝從容語曰陛下嘗聞黃臺瓜乎髙宗八子天后所生者四人自為行而睿宗最幼長曰𢎞為太子后方圖臨朝鴆殺之而立次子賢賢日憂惕每侍上不敢有言乃作樂章使工歌之欲感悟上及后曰種瓜黃臺下瓜熟子離離一摘使瓜好再摘令瓜稀三摘尚云可四摘抱蔓歸而賢終為后斥死餘見通鑑立皇太子故改元宋庠紀年通譜永隆本梁師都年號己巳張大安貶刺史以新紀修九月甲申王德真罷新紀十一月壬申朔日有食之以新紀修唐髙宗皇帝開耀元年春正月乙亥突厥入冦癸巳遣裴行儉為行軍大總管伐之以通鑑修三月辛卯郝處俊罷新紀夏五月己丑黑齒常之敗吐蕃於良非川以新紀修秋七月甲午劉仁軌罷左僕射新紀閏七月丁未裴炎為侍中崔知溫薛元超守中書令以新紀修裴行儉大破突厥擒其可汗及溫傳以吕祖謙標目修九月丙申彗星出於天市以新舊紀修乙丑改元新紀冬十月丙寅朔日有食之舊紀十一月癸卯徙庶人賢於巴州新紀唐髙宗皇帝永淳元年春二月作萬泉宫以通鑑修解題曰新史地理志注萬泉宫在京兆府藍田縣癸未改元以新紀修西突厥反以新紀修三月戊午立孫重照為皇太孫以新紀修夏四月甲子朔日有食之以通鑑修丙寅關中飢帝幸東都以新紀修以裴行儉為行軍大總管率三總管伐西突厥未行聞喜憲公行儉卒安西副都護王方翼大敗西突厥於熱海遂平之以舊紀修解題曰自安西出柘厥關九百五十里至碎卜水又五十里至熱海丁亥黃門侍郎郭時舉兵部侍郎岑長倩祕書員外少監郭正一吏部侍郎魏玄同與中書門下同承受進止平章事自是外司四品以下知政事者始以平章事為名以新舊紀修六月蝗人相食以新舊紀修秋七月己亥作奉天宫監察御史裏行李善感諌不納以新紀通鑑修解題曰新史地理志注奉天宫在河南府登封縣冬十月丙寅黃門侍郎劉景先同平章政事以新紀修唐髙宗皇帝𢎞道元年春正月帝幸奉天宫二月突厥入冦以新紀通鑑修三月庚子李義琰致仕以通鑑修解題曰范祖禹曰髙宗責義琰為宰相而陵其母家不可以率天下斯言當矣然已以讒殺元舅而不自知其惡何以責臣下之薄於母黨乎由此觀之自古人主能知其過鮮矣事見通鑑丙午彗星出於五車以新舊紀修癸丑崔知溫薨以新紀修夏四月帝幸東都以新紀修壬申郭時舉郭正一同平章政事以朱熹綱目修秋七月甲辰封相王輪為豫王更名旦以新紀修薛元超罷新紀八月乙丑皇太子朝於東都新紀冬十月帝幸奉天宫以新紀修十一月戊戌右武衛將軍程務挺為安撫大使以伐突厥以新紀修丁未帝如東都以新紀修十二月丁巳改元帝崩於貞觀殿裴炎受遺詔廢萬泉芳桂奉天等官甲子皇太子哲即皇帝位尊天后為皇太后政事咸取決焉以吕祖謙標目修甲戌劉仁軌為左僕射裴炎為中書令劉景先為侍中同三品戊寅郭時舉魏玄同岑長倩同三品癸未郭正一罷以新紀修大事記續編卷五十二
