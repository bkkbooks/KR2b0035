body:
  text: 大事記續編卷六十二明王禕撰唐順宗皇帝永貞元年春正月癸巳帝崩於會寧殿丙申太子誦即皇帝位有疾新舊紀通鑑修解題曰范祖禹曰先王於其即位也必以禮正其始於其將没也亦以禮正其終顧命之書所以為萬世帝王之法也後世之君以富有天下為心惟恐失之大利所在天理滅焉故父子相疑以終事為諱以後嗣為忌是以繼承之際鮮有能正其理者順宗為太子二十餘年既有壯子一旦病不能言而德宗亦寢疾彌留中外隔絶大臣不得聞知德宗既崩宦者猶有他議或太子幼弱儲位未定幾何而不亂也德宗將没不能召宰相而屬以社稷儲君廢置繋於宦者次公等特以草詔得至禁中遂沮其謀不然幾有趙髙之事後之人主可不鑑哉事見通鑑宋敏求長安志會寧殿在大明宫二月癸夘始朝見百官以新舊紀通鑑修辛亥吏部郎中韋執誼為尚書左丞同平章事以新紀通鑑修辛酉李實貶以通鑑修壬戌以殿中丞王伾為散騎常侍蘓州司功參軍王叔文為起居舍人翰林學士以舊紀通鑑修甲子大赦罷進奉宫市吕祖謙標目修乙丑罷鹽鐵使月進新紀三月辛未王伾為翰林學士以通鑑修壬申追陸贄鄭餘慶陽城等赴京師贄與城已卒尋贈贄兵部尚書諡曰宣城左散騎常侍以韓愈實録修以李錡為鎮海節度使加杜祐度支諸道鹽鐵轉運使王叔文副之以通鑑修以張愔為節度使以通鑑修癸巳立子廣陵郡王純為皇太子以新紀修夏四月壬寅立子弟二十一人為王以新紀修五月辛未以金吾大將軍范希朝為神䇿京西行營節度使欲奪宦官兵柄不克以新史兵志修解題曰葉適曰王叔文収宦者兵權不就韓愈著於實録方以為幸其曰六軍百萬虎與貔天子自將非他師一朝奪印付私黨凛凛朝士何能為蓋知目前之禍未知他日之禍也事見通鑑韓虎曰范希朝雖為王叔文用將收宦者兵權宦者不能害也及劉從諫論仇士良終為身後之害宋白續通典左神䇿軍六萬二千四百四十二人馬八千四十四匹在城三萬四千三百九十二人外鎮及採造二萬九千六百三人京西北普潤鎮崇信城在鳳翔府西北二百二十五里復改崇信軍定平鎮歸化城定逺城永安城邰陽縣等八鎮二萬六千一百十七人馬一萬二千一百六十六匹右神䇿軍四萬六千五百二十四人馬五千九百五十一疋在城二萬七千四十五人外鎮及採造一萬九千四百七十九人京西北奉天麟逰良原慶州鎮懷逺城一萬七千四百二十七人馬四千七百八疋實録元和十五年十月制神䇿十二鎮共十八萬六千七百餘廣明元年田令孜充左右神䇿外八鎮内八鎮諸道兵馬都指揮等使辛夘王叔文為户部侍郎以通鑑修六月癸丑韋臯表請太子監國以朱熹綱目修丁巳王叔文以母喪去位以通鑑目録修秋七月乙未皇太子權句當軍國政事太常卿杜黄裳為門下侍郎金吾衛大將軍袁滋為中書侍郎同平章事鄭珣瑜髙郢罷以新紀修八月庚子帝自稱太上皇辛丑徙居興慶宫改元立良娣王氏為太上皇后以新紀修壬寅貶王伾開州司馬王叔文渝州司户叔文尋伏誅以通鑑修乙巳太子純即皇帝位以新舊紀修庚戌罷獻祥瑞珍竒以新紀修癸丑南康忠武王韋臯薨行軍司馬劉闢自稱西川留後己未以袁滋為劒南東西川山南西道安撫大使以新紀通鑑修併别庫於正庫以吕祖謙標目修癸亥尚書左丞鄭餘慶同平章事通鑑九月己巳罷教坊樂工正員官新紀己夘貶神䇿行軍司馬韓泰司封郎中韓曄員外郎栁宗元劉禹錫為諸州刺史以舊紀修冬十月丁酉賈耽薨以舊紀修戊戌袁滋罷為西川節度使以通鑑修己酉𦵏崇陵廟號德宗以新舊紀修解題曰宋祁賛曰德宗猜忌刻薄以彊明自任恥見辱於正論而忘受欺於姦䛕故其疑蕭復之輕已謂姜公輔為賣直而不能容用盧把趙賛則至於敗亂而終不悔及奉天之難深自懲艾遂行姑息之政由是朝廷益弱而藩鎮愈彊至於唐亡其患以此十一月遷髙宗主於西夾室以通鑑目録修壬申韋執誼貶崖州司馬以舊紀修夏綏留後楊惠琳反以新紀修回鶻懐信可汗死遣使册其嗣為騰里録可汗以列傳通鑑修十二月己酉以給事中劉闢為西川節度副使以舊紀修壬戌翰林學士鄭絪同平章事以新紀修以考功郎中李吉甫為中書舎人員外郎裴洎為考功郎中並充翰林學士以舊紀修大事記續編卷六十二
