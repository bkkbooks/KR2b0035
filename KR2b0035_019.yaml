body:
  text: 大事記續編卷十九明王禕撰漢孝靈皇帝中平六年二月皇甫嵩大破王國於陳倉以本紀修徵董卓為少府不就以為并州牧復不從皇甫嵩從子酈說嵩誅卓不能用以袁宏漢紀修三月劉虞斬張純以本紀修夏四月丙午朔日有食之本紀通鑑拜劉虞為太尉以本紀修丙辰帝崩於南宫嘉德殿戊午皇子辨即皇帝位解題曰何皇后生皇子辨王貴人生皇子協群臣請立太子帝以辨輕佻無威儀不可為人主然皇后有寵且進又居重權故久不决六年帝疾篤屬協於蹇碩猶唐宣宗之屬䕫王於王歸長也烏有不召亂者哉尊皇后曰皇太后臨朝改元光熹封弟協為勃海王以本紀修後將軍袁隗為太𫝊與大將軍何進參録尚書事庚午蹇碩伏誅以列傳修五月遷孝仁皇后於河間辛巳董重自殺六月辛亥后暴崩以本紀修辛酉葬孝靈皇帝於文陵以本紀修秋七月徙勃海王協為陳留王本紀袁紹說何進召外兵主簿陳琳諫不聽乃召董卓侍御史鄭泰尚書盧植諫不從以紹為司𨽻校尉從事中郎王允為河南尹八月戊辰中常侍張讓等殺進於嘉德殿前虎賁中郎將袁術燒南宫九龍門解題曰袁紹說何進曰前竇武欲誅內寵而反為所害者但坐言語漏泄五營兵士皆畏服中人故也今將軍既有元舅之重而兄弟並領禁兵部曲將吏皆英俊名士樂盡力命事在掌握此天贊之時也將軍宜為天下除患名埀後世雖周之申伯何足道哉今大行在前殿將軍宜受詔領禁兵不宜輕出入宫省進甚然之遂與紹定籌䇿而以其計白太后太后不聽曰中官統領禁省自古及今漢家故事不可廢也且先帝新棄天下我奈何楚楚與士人共對事乎進難違太后意且欲誅其放縱者紹以為中官親近至尊出入號令今不悉發後必為患而太后母舞陽君及何苖數受諸宦官賂遺知進欲誅之數白太后為其障蔽又言大將軍專殺左右擅權以弱社稷太后疑以為然中官膠固內外進新當重任素敬憚之雖外收大名而內不能斷故事久不决紹等又為畫䇿多召四方猛將及諸豪傑使並引兵向京城以脅太后進然之主簿陳琳入諫遂西召前將軍董卓屯上林苑又使府掾太山王匡東發其郡强弩并召東郡太守橋瑁屯成臯使武猛都尉丁原燒孟津皆以誅宦官為言續漢書曰進欲誅趙忠等乃詐令武猛都尉丁原放兵數千人為賊於河內稱黑山伯上事以誅忠等為辭燒平隂河津人舍以怖動太后太后猶不從進弟苖曰始共從南陽來俱以貧賤依省內以致貴富國家之事亦何容易覆水不可收宜深思之紹懼進變訃脅之進於是以紹為司𨽻校尉假節專命擊斷從事中郎王允為河南尹促董卓等使馳驛上奏欲進兵平樂觀太后乃恐悉罷中常侍小黃門使還里舍惟留進素所私人以守省中諸常侍小黃門皆詣進謝罪惟所措置進謂曰天下胸胸正患諸君耳今董卓垂至諸君何不早各就國袁紹勸進便於此决之至於再三進不許三國志袁紹傳又令紹從弟虎賁中郎將術選溫厚虎賁二百人當入禁中代持兵黃門陛守門户紹又為書告諸州郡詐宣進意使捕案中官親屬進謀積日頗泄中官懼而思變張讓子婦太后之妹也讓向子婦叩頭曰老臣得罪當與新婦俱歸私門今當遠離宫殿願復一入直暫望太后陛下顔色然後退就溝壑子婦言於舞陽君入白太后乃詔諸常侍皆復入直八月進入長樂白太后請盡誅諸常侍以下選三署郎入守宦官廬諸宦官相謂曰大將軍稱疾不臨喪不送葬今倐入省此意何為竇氏事竟復起邪又張讓等使人潛聽具聞其語乃率常侍假圭畢嵐等數十人持兵竊自側闥入伏省中及進出因詐以太后詔召進入坐省闥讓等語進曰天下憒憒亦非獨我曹罪也先帝嘗與太后不快幾至成敗李賢曰陳留王協母王美人何后鴆殺之帝怒欲廢后宦官固請得止我曹涕泣救解各出家財千萬為禮和恱上意但欲託卿門户耳今乃欲滅我曹種族不亦太甚乎卿言省內穢濁公卿以下忠清者為誰於是上方監渠穆拔劍斬進於嘉德殿前餘見通鑑己巳讓等以帝及陳留王幸北宫紹閉北宫門誅宦者二千餘人解題曰蘇軾曰國之有小人猶人之有癭人之癭必生於頸而附於咽是以不可去有賤丈夫者不勝其忿而决去之夫是以去疾而得死漢之亡唐之滅由此故也自桓靈權歸內署當時議者以為天下之患獨在宦官宦官去則天下無事然竇武何進擊之不勝止於身死袁紹擊之而勝漢遂以亡唐之衰也其迹亦大類此自輔國元振之後天子之廢立聽於宦官當時士大夫之論亦惟宦官之為去然而李訓鄭注擊之不勝止於身死崔昌遐擊之而勝唐亦以亡方其未去是纍然者癭而已矣及其既去則潰裂四出而繼之以死何者此侵君之權而不可居之功也故其成則為袁為崔敗則為何竇為訓注然則忠臣義士亦奚取於此哉事見通鑑庚午讓等以帝及陳留王走小平津解題曰李賢曰小平津在今鞏縣西北尚書盧植追讓斬之餘投河而死辛未帝還宫卓至改元昭寧使執金吾丁原司馬吕布殺原自為司空解題曰事見通鑑朱熹曰權臣擅命例多書以某人為某王某公范曄書曹操自立為魏公故用此例紹奔冀州九月甲戌卓廢帝為𢎞農王奉陳留王即皇帝位遷太后於永安宫解題曰李賢曰洛陽宫殿名永安宫周回六百九十八丈故基在洛陽故城中改元永漢丙子弒皇太后初令侍中給事黃門侍郎員各六人解題曰續漢志侍中無員漢官儀侍中左蟬右貂本秦丞相史往來殿內故謂之侍中分掌乘輿服物下至䙝器虎子之屬東京屬少府亦無員駕出則一人負傳國璽操斬蛇劍乘輿中官俱止禁中又曰給事黃門無員掌侍從左右給事中使關通中外輿服志曰禁中曰黃闥以中人主之故號曰黃門令獻帝起居注自誅黃門後侍中侍郎出入禁中機事頗露王允乃奏侍中黃門不得出入不通賔客自此始也賜公卿以下至黃門侍郎家一人為郎以補宦者所領署解題曰李賢曰靈帝建元四年改平准為中准使宦者為令自是諸內署令丞悉以閹人為之今士人代領之乙酉以劉虞為大司馬封襄賁侯解題曰大司馬與太尉並置始於此事見通鑑卓自為太尉領前將軍丙戍以大中大夫楊彪為司空甲午以豫州牧黃琬為司徒卓上書追理陳蕃竇武及黨人復其爵位以紀傳皇極經世修自六月雨至於是月本紀冬於扶羅居平陽須卜立一年死南庭遂虛以列傳袁宏漢紀修解題曰此所以胎劉淵之禍也事見通鑑十一月董卓自為相國加殊禮以紀傳修尚書周毖城門校尉伍瓊說董卓用名士乃徵荀爽韓融陳紀申屠蟠等蟠不至解題曰朱熹曰荀淑能譏刺梁氏而爽已不敢忤董卓至彧遂為唐衡之壻曹操之役事見通鑑十二月黃琬為太尉楊彪為司徒光祿勳荀爽為司空以列傳修除光熹昭寧永漢三號以本紀修解題曰宋庠紀年通譜禮國君即位必踰年然後改元杜預以謂繼父之志者不忍有變於中年也今追去三號復為中平蓋悟前失而歸正禮以袁紹為勃海太守袁術為後將軍典軍校尉曹操為驃騎校尉術奔南陽操奔陳留以吕祖謙標目修解題曰鄭泰等與侍中伍瓊卓長史何顒共說卓以袁紹為勃海太守以發山東之謀及義兵起卓乃㑹公卿議大發卒討之羣僚莫敢忤㫖泰恐其衆多溢橫凶狂難制獨曰夫政在德不在衆也卓不恱曰如卿此言兵為無用耶泰懼乃詭詞更對曰非謂無用以為山東不足加大兵耳今山東合謀非不强盛然光武以來中國無警百姓優逸忘戰日久其衆雖多不能為害一也明公出自西州少為國將數踐戰場名振當世二也袁本初公卿子弟生處京師張孟子卓東平長者坐不窺堂孔公緒清談髙論噓枯吹生並無軍旅之才三也山秉之士素乏精悍四也尊卑無序王爵不加若恃衆恬力將各棊峙以觀成敗不肯同心共膽與齊進退五也關西諸郡頗習兵事頃與羌戰婦人猶載㦸操矛挾弓負矢况其壯勇之士以當妄戰之人乎六也且百姓所畏者胸奴屠各湟中義從西羌八種而明公擁之為爪牙譬驅虎兕以赴犬羊七也明公將帥皆中表腹心周旋日久以膠固之衆當解合之勢猶以烈風掃彼枯葉八也夫戰有三亡以亂攻理者亡以邪攻正者亡以逆攻順者亡今明公以此三德待彼三亡誰敢禦之九也東州鄭𤣥學該古今北海邴原清髙直亮皆儒生所仰羣士楷式諸將若詢其計足知彊弱彼豈讃成其謀哉十也無事徵兵以驚天下使患役之民相聚為非棄德恃衆自虧威重卓乃恱葉適曰鄭泰勸何進無召董卓是也至於用袁術以發山東之謀使卓懼而西遷則何其明於前而暗於後豈與紹素厚且以其世胄所歸遂不悟其能為亂乎扶興者易為䇿救亡者難為謀信矣漢孝獻皇帝初平元年春正月關東州郡起兵討董卓推袁紹為盟主紹自號車騎將軍板授諸將官號以紀傳修董卓弒𢎞農王本紀董卓議大發兵討山東尚書鄭泰止之以吕祖謙標目修董卓議徙都楊彪黃琬止之二月乙亥免琬彪以太僕王允為司徒紀傳庚辰董卓殺城門校尉伍瓊尚書周毖紀傳徵蓋勳為議郎皇甫嵩屯扶風徵為城門校尉以列傳修解題曰李遘曰皇甫嵩朱雋平黃巾威震天下梁衍說之而不肯從陶謙推之而不肯應聞命馳走就拘朝廷其忠不可及矣或曰不有郭子儀乎曰子儀可人也然唐室雖衰人心未去程魚雖巧言肅代猶出命君命而違不反則叛矣此子儀之所憚也嵩雋則不然卓傕之猖狂無獻帝矣因兵威乘衆欲以伐其罪孰不曰宜彼以君命來遂不敢拒哀哉范曄評嵩雋以為舍格天之大業蹈匹夫之小諒卒狼狽虎口為智士笑夫曄鄙也宜乎其笑之矣事見通鑑丁亥董卓劫帝遷都長安自屯罼圭苑以本紀修三月乙巳帝入長安以本紀修己酉董卓焚洛陽宫廟居室發諸陵以紀傳修解題曰徙天子都長安焚燒洛陽宫室悉發掘陵墓取寶物續漢書大駕即西部兵燒洛陽城外面百里又自將兵燒南北宫及宗廟府庫民家城內掃地殄盡又收諸富室以罪惡沒入其財物無辜而死者不可勝計餘見通鑑戊午董卓殺袁隗夷其族以紀傳修曹操與董卓兵戰於滎陽失利關東諸軍潰於酸棗以列傳修夏四月劉虞為太𫝊以列傳修五月荀爽薨本紀六月遣大鴻臚韓融等五人安集關東袁術等殺之免融以本紀修壞五銖錢鑄小錢以本紀修冬左中郎將蔡雍議和帝以下不宜稱宗從之以紀傳修解題曰按袁宏漢紀禮儀志建武初立宗廟於洛陽祭祀而已不加名號光武崩以中興之主更為起廟上尊號曰世祖元帝於光武為禰故雖非宗不毁也明帝遺詔無起寢廟藏主於世祖廟更上尊號曰顯宗章帝崩遺詔如先帝故事上尊號曰肅宗後帝遵承皆藏主於世祖廟積多無别是後顯宗但為陵寢之號和帝崩上尊號曰穆宗安帝崩因陵號恭宗順帝崩上尊號曰敬宗桓帝崩上尊號曰威宗於是有司奏議宗廟迭毁蔡雍議曰漢宗廟之制不用周禮每帝即位輒立一廟不止於七不列昭穆不定迭毁元帝時匡衡貢禹始請依典禮孝文孝武孝宣皆以功德茂盛為宗不毁孝宣尊崇孝武廟稱世宗夏侯勝等猶執異議至成帝議猶不定王舜劉歆據不可毁上從其議光武中興廟稱世祖孝明廟稱顯宗孝章廟稱肅宗皆方前世得禮之宜自此以嗣帝殷勤各欲褒崇至親而已臣下懷弱莫能執夏侯之直元帝世在第八光武世在第九故以元帝為考廟孝明亦不敢毁孝和以下穆宗恭宗敬宗威宗之號皆宜省去議遂施行是歲孫堅殺荆州刺史王睿南陽太守張咨以北軍中候劉表為荆州刺史表表袁術為南陽太守術表堅領豫州刺史以紀傳修以故冀州刺史公孫度為遼東太守度自立為平州牧以列傳修漢孝獻皇帝初平二年春正月帝居長安以春秋修解題曰程迥曰春秋書王在畿內曰居於狄泉在畿外曰出居於鄭諸侯在境曰公在乾侯在境外曰居于鄆晉史用春秋法書惠帝宜曰帝居於長安懷帝宜曰帝出居於平陽乃援諸侯在他國例論大體則是其考經未精者歟關東諸將議立劉虞為帝虞拒之以列傳修二月丁丑董卓自為太師位諸侯王上以紀傳修袁術遣孫堅與董卓將胡軫戰於陽人大敗之又擊卓敗之遂入洛陽修塞諸陵夏四月卓入關以紀傳修解題曰孫堅收合散卒進屯梁縣之陽人李賢曰梁縣屬河南郡今汝州縣也陽人聚故城在梁縣西卓遣將胡軫即胡文才也吕布攻之布與軫不相能軍中自驚恐堅追擊之軫布敗走卓遣將李傕詣堅求和堅拒絶不受進軍大谷李賢曰大谷在故嵩陽西北三十五里北出對洛陽故城距洛九十里卓自出與堅戰於諸陵墓間卓敗走却屯黽池聚兵於陜堅進洛陽宣陽城門更擊吕布布復破走堅乃掃除宗廟平塞諸陵分兵出函谷關至新安澠池間以截卓後卓乃使董越屯澠池假煨屯華隂牛輔屯安邑其餘布在諸縣以禦山東卓乃引還長安餘見通鑑董卓之西還畏孫堅之逼也使山東諸將人人如堅則滅卓安漢特易為力耳奈何名為義兵自相矛盾堅未及還而周昻已襲奪陽人使堅之志卒不克究天方禍漢固宜人謀之乖哉六月丙戍地震本紀秋七月袁紹脅冀州牧韓馥而代之以廣平沮授為將軍巨鹿田豐為别駕馥尋自殺以魏書紀傳修解題曰按袁宏漢紀紹謂授曰今賊臣作變朝廷遷移孤厯世受寵欲竭命致死以復漢室然桓公非夷吾不能成霸越王非范蠡無以存國今欲與君戮力同心共安社稷授曰將軍弱冠登朝播名海內值廢立之際則忠義憤發卓雖凶暴弗能加兵昔相如叱秦晏嬰哭莊方之將軍曷足以喻單騎出奔則卓懷怖懼濟河而北則勃海稽首擁一郡之卒撮冀州之衆威震河朔名重天下雖黃巾散亂黑山跋扈舉軍東向則青州可定還討黑山則張燕可滅回師北首則劉虞必喪震脅戎狄則胸奴順從橫大河之北合四州之地收英雄之用擁百萬之衆迎大駕於長安復宗廟於洛邑號令天下以討未服以此爭鋒誰敢禦之比及數年此功不難紹喜曰此孤之本心也餘見通鑑冀州部魏郡巨鹿常山中山安平河間清河趙國勃海九郡國袁紹表奮武將軍曹操為東郡太守以魏書紀通鑑目録修解題曰曹操始基之地如此以前假司馬張揚為河內太守以魏書傳修九月蚩尤旗見本紀冬十月壬戍董卓殺衛尉張溫本紀解題曰前溫屯美陽卓與邊章等戰無功溫召不峕應命既到而辭對不遜時孫堅為溫參軍勸溫陳兵斬之溫不從而猶懷忌恨故及於難溫少有名譽亦隂與王允共謀誅卓事未及發而見害餘見通鑑十一月青州黃巾起泰山太守應劭破之轉冦勃海公孫瓉大破之於東光解題曰李賢曰東光今滄州縣瓉攻袁紹以宗室劉備為平原相以紀傳修河南尹朱㒞檄州郡討董卓以列傳修劉焉斷斜谷關以列傳修解題曰北口曰斜南口曰褒在興元府褒城縣北五十里自褒谷至鳯州界一百三十里始通斜谷唐大中三年鄭涯以褒斜舊路修阻奏開文川谷古道自興元府抵扶風四百七十里涯謂减十驛孫樵以山關險易逺邇折校謂愈於斜谷髙祖送張良至褒中諸葛亮出斜谷鍾㑹從斜谷伐蜀皆由此處士管寧邴原王烈奔遼東以列傳修曹操以潁川荀彧為司馬以列傳修漢孝獻皇帝初平三年春正月帝居長安以春秋修孫堅襲劉表敗之圍襄陽戰殁以列傳修解題曰英雄記曰四年正月七日死通鑑載於往年非也今從漢紀董卓遣校尉李傕郭汜張濟賈詡擊關東牛輔屯陜以列傳袁宏漢紀修袁紹擊公孫瓉於界橋大敗之以本紀修解題曰李賢曰今貝州宗城縣東有古界城近枯漳水則界橋在此也夏四月辛巳王允等使中郎將吕布誅董卓夷其三族王允録尚書事以布為奮武將軍儀同三司共秉朝政紀傳遣使者張种慰撫關東本紀蔡雍下獄死列傳青州黃巾殺兗州刺史劉岱濟北相鮑信迎曹操為兗州刺史操大破黃巾以魏志紀傳修解題曰兗州部陳留東郡東平任城泰山濟北山陽濟隂八郡國五月丁未以征西將軍皇甫嵩為車騎將軍以本紀修賈詡說李㴶郭汜等圍長安六月戊午城陷太常种拂等死之吕布出奔解題曰允初議赦卓部曲吕布亦數勸之既而疑曰此輩無罪從其主耳今若名為惡逆而特赦之適足使其自疑非所以安之之道也通鑑據雜傳記云吕布勸王允盡殺董卓部曲允曰此輩無罪按吕布數勸允赦卓部曲允曰此輩無罪耳非勸允殺之而云然也今不取吕布又欲以卓財物班賜公卿將校允又不從而素輕布以劍客遇之布亦負其功勞多自誇伐既失意望漸不相平允性剛稜疾惡初懼董卓故折節圖之卓既殱滅自謂無復患難及在際㑹每乏溫潤之色仗正持重不循權宜之計是以羣下不甚附之王師古曰允圖董卓由其謀深而死於傕汜之手由其智淺觀其不聽吕布之言謂傕汜為鼠子是不知蜂蠆有毒而蟻冗可以潰隄也卓將校及在位者多凉州人允議罷其軍或說允曰凉州人素憚袁氏畏關東今若一旦解兵開關必人人自危可以皇甫義真為將軍就領其衆因使留陜以安撫之而徐與關東通謀以觀其變允曰不然關東舉義兵者皆吾徒耳今若距險屯陜雖安凉州而疑關東之心甚不可也時百姓訛言當悉誅凉州人遂轉相恐動其在關中皆擁兵自守更相謂曰丁彥思蔡伯喈但以董公親厚並尚從坐今既不赦我曹而欲解兵今日解兵明日當復為魚肉矣布乃使李肅以詔命至陜討牛輔輔等逆與肅戰肅敗走𢎞農布誅之輔營中無故大驚輔懼踰城走左右斬輔傕汜等以允布殺董卓故忿怒并州人其在軍者男女數百人皆誅殺之牛輔既敗衆無所依欲各散去傕等恐乃先遣使詣長安求乞赦免允以為一歲不可再赦不許傕等益懼不知所為武威人賈詡時在傕軍說之曰諸君若棄軍單行則一亭長能束君矣不如相率而西以攻長安為董公報讎事濟奉國家以正天下若其不合走未後也傕等然之於是共結盟率軍數千晨夜西行胡文才楊整修皆凉州大人而允素所不善也及李傕之叛允乃呼文才整修使東解釋之不假借以溫顔謂曰關東鼠子欲何為邪卿往呼之於是二人往實召兵而還傕隨道收兵比之長安已十餘萬與卓故部曲樊稠李䝉等合圍長安城餘見通鑑裴松之曰傳曰仁人之言其利溥哉然則不仁之言理必反是夫仁功難著而亂源易成是故有禍機一發而殃流百世者矣當是時元惡既梟天地始開致使厲階重結豈不由賈詡片言乎詡之罪也一何大哉自古兆亂未有如是之甚傕汜自為將軍殺司𨽻校尉黃琬甲子殺王允夷其族以列傳修以賈詡為尚書以通鑑修秋七月庚子太尉馬日磾為太傅録尚書事八月遣日磾等慰撫關東以紀傳修皇甫嵩為太尉九月李㴶為車騎將軍開府郭汜後將軍樊稠右將軍張濟鎮東將軍封侯傕汜稠管朝政濟屯𢎞農以本紀通鑑目録修甲申楊彪為司空録尚書事以本紀修冬十月劉表遣使入貢以為荆州牧以列𫝊修十二月皇甫嵩免以本紀修曹操追黃巾至濟北降之以魏書本紀修曹操遣使入貢以通鑑修朱儶就徵為太僕以列傳修漢孝獻皇帝初平四年春正月甲寅朔帝居長安以春秋修日有食之本紀袁術入陳留曹操破走之三月術逐揚州刺史陳瑀據其州以為左將軍以魏書紀漢書傳修解題曰揚州部九江丹陽廬江㑹稽吳郡豫章六郡夏徐州刺史陶謙遣使入貢以為除州牧以列傳修六月華山崩以本紀修朱儶為太尉録尚書事以本紀修陶謙别將殺前太尉曹嵩秋曹操引兵擊謙謙敗走操坑男女數十萬口以列傳修冬十月帝幸太學以本紀修有星孛於天市以本紀修楊彪免以本紀修劉虞討公孫瓉兵敗見殺以紀傳修解題曰初虞歎曰朝廷播蕩今欲奉使安得不辱命之士乎衆曰田疇雖年少多稱其竒虞乃署為從事疇至長安致命還未至虞已為瓉所害疇謁祭虞墓陳發章表哭泣而去餘見通鑑胡寅曰東漢風俗士重名節部民為太守致死屬吏為主將讎寃君臣之義立矣田疇事虞日亦淺耳感其國士之知曰君讎不報不可立於世其聞子房之風而興起者乎彼世受國恩當運去物改之時東門迎降西門勸進者亦何人哉十二月辛丑地震本紀是歲孫堅之子䇿見袁術請父兵不許以魏紀吳傳修甲戌漢孝獻皇帝興平元年春正月帝居長安以春秋修改元以本紀修甲子帝加元服以本紀修二月壬午追尊母王氏為靈懷皇后以本紀修劉備救陶謙謙表備為豫州刺史以列傳修解題曰豫州部潁川汝南梁國沛國陳國魯國六郡國三月韓遂馬騰與郭汜樊稠戰於長平觀敗還以本紀列傳修解題曰按袁宏漢紀是時馬騰以李傕等專亂益州刺史劉焉宗室大臣遣使招引共誅傕焉遣子範將兵就騰故凉州刺史种劭拂之子也拂為傕所害劭欲報讎故為此戰餘見通鑑夏四月曹操攻陶謙陳留太守張邈迎吕布為兗州牧荀彧等完三城以待操以列傳修解題曰此操失勢之時也五月郭汜樊稠開府以列傳修夏六月丙子分河西四郡為雍州以通鑑目録修京師地震本紀乙巳晦日有食之本紀秋七月壬子朱俊免本紀戊午太常楊彪為太尉録尚書事以通鑑修甲子鎮南將軍楊定為安西將軍開府以列傳修自四月不雨至於是月穀一斛直錢五十萬以本紀修曹操攻吕布不克九月還鄄城以列傳修冬十二月劉焉卒以其子璋為益州牧以列傳修陶謙卒劉備領徐州以列傳修解題曰劉備臨豫州辟陳羣為别駕陶謙死徐州迎備備欲往羣說備曰袁術尚彊今東必與之爭吕布若襲將軍之後將軍雖得徐州事必無成備東與袁術戰布果襲下邳遣兵助術大破備軍備恨不用羣言餘見通鑑徐州部東海琅邪彭城廣陵下邳五郡國馬日磾薨於壽春本紀是歲袁術表孫䇿為懷義校尉以千餘人還之以吳傳通鑑修解題曰江東之業基於此漢孝獻皇帝興平二年春正月帝居長安春秋拜袁紹為右將軍封邟鄉侯以列傳修二月李傕殺樊稠與郭汜相攻三月丙寅劫帝幸其營汜留公卿為質以紀傳修夏四月甲午立貴人伏氏為皇后本紀丙申郭汜攻李傕傕以帝幸北塢以本紀修大旱本紀五月李傕自為大司馬本紀曹操大破吕布拔定陶布奔劉備張邈使其弟廣陵太守超保雍丘以列傳修解題曰此操勢再振之時也陶謙死操欲遂取徐州還定吕布荀彧諫曰昔髙祖保關中先武據河內皆深根固本以制天下進可以勝敵退足以堅守故雖有困敗而終濟大業將軍本以兗州首事故能平定山東此實天下之要地而將軍之關河也若不先定之根本將何寄乎宜急分討陳宫使虜不得西顧乘其間而收熟麥約食畜榖以資一舉則吕布不足破也今舍之而東未見其便多留兵則力不勝敵少留兵則後不足固布乘虛寇暴震動人心縱數城或全其餘非復已有則將軍尚安歸乎餘見通鑑胡寅曰荀彧初見曹公曹公曰吾子房也至是彧言髙祖光武根本之基勸曹以兖州為關中河內操信之伯業由此而起司馬光乃謂關中河內之比及史氏之文非彧所言不亦固乎六月張濟和李傕郭汜秋七月帝東歸汜自為車騎將軍楊定楊奉董承並為將軍送乘輿張濟為將軍開府屯還陜以本紀修曹操圍雍丘張邈為其下所殺冬十月操為兖州牧以列傳修壬寅帝幸華隂楊定奔荆州十一月庚午張濟李傕郭汜追乘輿於東澗王師敗績楊奉董承招白波帥胡才李樂韓暹擊傕等破之十二月帝前進傕等復敗之帝渡河幸安邑以胡才為并州牧與李樂韓暹張揚並為將軍開府沮授說袁紹迎天子不從以本紀列傳袁宏漢紀修解題曰沮授說紹曰將軍纍葉輔弼世濟忠義今朝廷播越宗廟毁壞觀諸州郡外託義兵內圖相滅未有存主恤民者且州域粗定宜迎大駕安居鄴都挾天子而令諸侯畜士馬以討不庭誰能禦之紹恱將從之郭圖淳于瓊曰漢室陵遲為日久矣今欲興之不亦難乎且今英雄據有州郡衆動萬計所謂秦失其鹿先得者王若迎天子以自近動輒聞表從之則權輕違之則拒命非計之善者也授曰今迎朝廷至義也又於時為宜大計也若不早圖必有先人者也將軍其圖之紹弗能用餘見通鑑按袁宏漢紀范史列傳皆據獻帝傳載沮授勸袁紹迎帝郭圖淳于瓊沮之三國志獨稱天子在河東紹遣郭圖使焉圖還說紹迎天子都鄴紹不從夫沮授為紹謀臣粗有識解嘗勸紹遣使獻捷天子而郭圖沮之則今茲之謀必發於授而非出於圖也孫䇿擊揚州牧劉繇於曲阿走之以吳傳及通鑑修解題曰曲阿今鎮江府丹陽金壇縣地劉繇攻豫章以前太傅掾華歆為太守以列傳修吳郡都尉朱治據吳郡以從孫䇿以吳傳修雍丘潰張超自殺曹操夷其三族以列傳修南單于於扶羅死弟呼厨泉立以列傳修劉虞從事鮮于輔迎虞子和攻公孫瓉於鮑丘破之瓉徙鎮易以列傳修解題曰李賢曰鮑丘水出北塞中南流經九莊山嶺東俗謂之大榆河又東南經漁陽故城東是戰處見水經注又名潞水袁紹以子談為青州刺史熙為幽州刺史甥髙幹為并州刺史以後漢三國志列傳修解題曰按袁紹取冀青幽三州皆可考見惟取并州傳記不載蓋胡才為并州牧後為怨家所殺紹取之爾當紹取冀州之初沮授固說以橫大河之北合四州之地矣談為青州通鑑載於初平四年今因後漢三國紹本傳載於此青州部濟南平原樂安北海東萊齊國六郡國幽州部涿郡廣陽代郡上谷漁陽右北平遼西遼東𤣥莬樂浪遼東屬國十郡一屬國并州部上黨太原上郡西河五原雲中定襄鴈門朔方九郡大事記續編卷十九
