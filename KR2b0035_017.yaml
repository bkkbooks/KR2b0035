body:
  text: 大事記續編卷十七明王禕撰漢孝桓皇帝延熹二年春二月鮮卑寇鴈門本紀三月復斷刺史二千石行三年喪本紀夏六月鮮卑寇遼東李膺破之以本紀袁宏漢紀修秋七月丙午皇后梁氏崩本紀梁冀謀為亂八月癸酉帝與中常侍單超等謀誅之丁丑御前殿使尚書令尹勳守省閣黃門令具瑗將虎賁等與司𨽻校尉張彪圍冀第冀伏誅夷三族以本紀修解題曰皇后崩帝因如厠獨呼小黃門史唐衡問左右與外舍不相得者誰乎衡曰單超左悺前詣河南尹不疑禮敬小簡不疑收其兄弟送洛陽獄二人詣門謝乃得解徐璜具瑗常私忿疾外舍放橫口不敢道于是帝呼超悺入室謂曰梁將軍兄弟專朝迫脅外內公卿以下從其風㫖今欲誅之于常侍意何如對曰誠國姦賊當誅日久臣等弱劣未知聖意如何耳帝曰審然者常侍密圖之對曰圖之不難但恐陛下腹中狐疑帝曰何疑乎於是更召璜瑗等五人遂定其議帝齧超臂出血為盟冀心疑超等乃使中黃門張惲入省宿以防其變具瑗𠡠吏收惲以輒自外入欲圖不軌帝於是御前殿召諸尚書入發其事使尚書令尹勳持節勒丞郎以下尚書左右丞侍郎也皆操兵守省閣斂諸符節送省中使黃門令具瑗將左右廏騶虎賁羽林都候劒㦸士合千餘人中興省約大廏但置一廏後又置友駿令廏别主乘輿御馬武帝置期門平帝更名虎賁蔡質漢儀曰主虎賁千五百人漢官曰孝廉郎主羽林九百人左右都候主劒㦸士漢官曰右都候員吏二十二人衛士四百一十六人左都候員吏二十八人衛士三百八十三人蔡質漢儀曰宫中諸有劾奏罪左都候執㦸戲車縳送付詔獄與司𨽻校尉張彪共圍冀第使光祿勳袁旴持節收冀將軍印綬徙封比景都鄉侯餘見通鑑七十年間去竇憲則鄭衆也翊濟隂則孫程也誅梁冀則單超也三公不獲預謀尚書無所效力權雖欲不歸中官得乎免胡廣為庶人韓縯下獄斥賣梁氏財減天下稅租之半壬午立皇后鄧氏以紀傳修解題曰袁宏曰后即鄧悉之姑悉禹之孫初后母宣起於微賤生后後適梁紀故后冒姓梁氏紀姊子孫夀冀之妻也進后入掖庭有寵惡梁姓之同改為亳氏后復姓鄧氏追廢梁皇后陵為貴人冢封超等五人為縣侯勳等七人為亭侯以大司農黃瓊為太尉以紀傳修初置祕書監官本紀尚書令陳蕃上疏薦處士徐稚姜肱袁閎韋著李曇徴以安車𤣥纁不至時又徴魏桓遂隱不出以列傳修解題曰陳蕃上疏曰臣聞善人天地之紀政之所由也詩云思皇多士生此王國天生俊乂為陛下出當輔弼明時左右大業者也伏見處士豫章徐稚彭城姜肱汝南袁閎京兆韋著潁川李曇德行純備著於人聽若使擢登三事協亮天工必能翼宣盛美增光日月矣徴之不至帝因問蕃曰稚閎著孰為後先對曰閎生公族聞道漸訓著長于三輔禮義之俗所謂不扶自直不鏤自雕至于稚者爰自江南卑薄之域而角立傑出宜當為先餘見通鑑封中常侍侯覽等為侯白馬令李雲上書諌詔送黃門北寺獄五官掾杜衆上書併下廷尉獄以列傳修解題曰李賢曰北寺獄名屬黃門署即若盧獄也冬十月壬申帝幸長安祠陵廟以本紀修十一月壬寅以單超為車騎將軍以本紀修十二月還宫本紀燒當等八種羌寇隴右護羌校尉段熲追擊於羅亭破之以本紀修解題曰李賢曰東觀記曰追到積石山即與羅亭相近在今鄯州處士黃憲卒以列傳修解題曰通鑑於安帝延光二年載王龔為汝南太守引進憲等因言其卒而通鑑綱目乃于是年遂書汝南黃憲卒則遽矣按荀淑周舉名輩皆先於憲郭泰名輩後於憲淑年六十七與舉俱卒于建和三年泰年四十一卒于建寧二年憲年四十八其終正在淑舉之後泰之前又陳蕃為三公歎曰叔度若在吾不敢先佩印綬矣此延熹八年事今因蕃薦五處士併書之漢孝桓皇帝延熹三年春正月丙申詔求李固後以列傳修丙午單超卒以本紀修閏月燒當羌寇張掖段熲追擊於積石大破之以本紀修解題曰李賢曰積石山在今鄯州龍支縣南大鴻臚陳蕃太常楊秉等上疏請李雲罪坐免雲與杜衆皆死獄中以紀傳修解題曰李雲之死本紀與楊秉傳書于三年而李雲傳書於二年蓋雲上書在二年其死則在三年耳今據傳書雲上疏于前而據紀書雲死於後庶不抵牾事見通鑑雲衆下獄陳蕃楊秉沐茂上官資皆請之黃瓊為太尉救之殊不甚力他日垂絶乃極論其寃豈瓊平日所歉至是始不能忘耶夏五月甲戌漢中山崩本紀秋長沙零陵蠻反以本紀通鑑修冬十一月日南蠻降以本紀修勒姐羌圍允街段熲擊破之本紀解題曰李賢曰允街縣屬金城郡太山賊叛十二月遣中郎將宗資討破之以袁宏漢紀修是嵗以議郎陳蕃為光祿勳楊秉為河南尹秉尋輸作左校以列傳修漢孝桓皇帝延熹四年春正月辛酉南宫嘉德殿火戊子丙署火本紀解題曰李賢曰續漢志曰丙署長七人秩四百石黃綬宦者為之主中宫别處二月壬辰武庫火本紀三月黃瓊免夏四月以太常劉矩為太尉以本紀修五月辛酉有星孛于心以本紀修丁卯原陵長夀門火本紀六月庚子岱山及博尤來山頽裂本紀解題曰李賢曰博今博城縣徂來山一名尤來黃瓊為司空以本紀修零吾羌與先零諸種寇三輔以本紀修秋七月減公卿以下俸貣王侯半租占賣關內侯以下錢各有差以本紀修九月黃瓊免本紀冬十月先零諸種羌寇并凉段熲討之湟中義從叛熲坐徴輸作左校十一月中郎將皇甫規破降之解題曰湟中義從胡大月氏之别也在張掖酒泉地月氏王為冒頓所殺餘種西踰葱嶺其羸弱者南入山阻依諸羌與共婚姻霍去病取西河地開湟中月氏來降與漢人錯居雖依附縣官而首施兩端其大種有七勝兵合九千餘人分在湟中及令居又數百户在張掖號曰義從胡中平元年反遂寇亂隴右漢孝桓皇帝延熹五年春正月壬午南宫丙署火本紀三月沈氐羌寇張掖酒泉皇甫規討降之以紀傳修夏四月恭陵東闕火本紀虎賁掖門火本紀五月康陵園寢火本紀長沙零陵賊攻桂陽蒼梧南海交址以本紀修乙亥京師地震本紀中藏府丞祿署火本紀秋七月己未南宮承善闥火本紀烏吾羌寇漢陽隴西金城本紀解題曰烏吾羌在隴西冬十月武陵蠻寇江陵南郡太守李肅坐奔北伏誅以右校令度尚為荆州刺史辛丑以馮緄為車騎將軍討叛蠻降之以本紀修假公卿以下奉換王侯租以助軍糧以本紀修十一月馮緄破叛蠻以本紀修滇那羌寇武威張掖酒泉本紀劉矩免太常楊秉為太尉以吕祖謙標目修徴皇甫規為議郎尋坐輸作左校以列傳修漢孝桓皇帝延熹六年夏四月辛亥康陵東署火本紀五月鮮卑寇遼東屬國本紀秋七月甲申平陵園寢火以本紀修武陵蠻復反太守陳奉討降之八月馮緄免以本紀修冬十二月衛尉周景為司空與楊秉劾宦官子弟為牧守者五十餘人天下肅然以紀傳修以度遼將軍皇甫規為使胸奴中郎將武威太守張奐為度遼將軍以列傳修以段熲為護羌校尉以列傳修尚書朱穆卒以列傳修漢孝桓皇帝延熹七年春二月邟鄉忠侯黃瓊卒以列傳修解題曰事見通鑑後魏崔光隨時俯俯嘗慕胡廣黃瓊之為人則瓊亦廣之流耳安能為國之輕重有無哉秋度尚擊零陵桂陽賊及蠻夷大破平之以本紀修冬十月壬寅帝南狩幸章陵幸雲夢而還以本紀修段熲擊煎當羌破之以本紀修十二月辛丑還宫以本紀修漢孝桓皇帝延熹八年春正月遣中常侍左悺之苦縣祠老子本紀勃海王悝謀反徙為廮陶王以本紀修丙申晦日有食之解題曰按劉羲叟長厯正月丁卯朔本紀丙申晦之下三月之上有己酉癸亥合係之二月不書闕也今補之二月千秋萬嵗殿火本紀楊秉劾免中常侍侯覽司𨽻校尉韓縯劾奏左悺悺自殺又奏貶中常侍具瑗為都鄉侯宦官襲封者降為鄉侯以紀傳修解題曰按袁宏漢紀書奏尚書詰掾曰設官分職各有司存三公統外御史察內今越奏左右何所依據其開公具對秉使對曰除君之惡惟力是視鄧通失禮申屠嘉召而責讓文帝從而請之漢故事三公鼎司無所不統尚書不能詰餘見通鑑觀尚書之問則後漢三公之失職可知兹光武詒謀之不臧也幸而秉能援古義以對不然豈不貽千萬世之笑耶癸亥皇后鄧氏廢以憂死以紀傳修段熲擊牢姐羌破之以本紀修三月河南尹李膺廷尉馮緄大司農劉祐以治宦官輸作左校以列傳修夏四月甲寅安陵園寢火本紀丁巳壞諸房祀以本紀袁宏漢紀修解題曰李賢曰房謂祠堂也王渙傳曰時唯密縣存卓茂廟洛陽留王渙祠壬戌河水清以袁宏漢紀修五月丙戌楊秉薨以本紀修賢良劉瑜上書以為議郎以通鑑修桂陽賊攻零陵遣中郎將度尚等擊斬之以本紀修六月段熲擊煎當羌於湟中大破之以本紀修秋七月以太中大夫陳蕃為太尉以本紀修八月戊辰初稅田畝錢以本紀修九月丁未京師地震以本紀修冬十月周景免以本紀修辛巳立貴人竇氏為皇后本紀解題曰袁宏曰初憲之誅家屬廢為庶民武字遊平少有學行生五男二女十一月壬子德陽殿西閣黃門北寺火以本紀通鑑修十二月使中常侍管霸之苦縣祠老子以本紀修以李膺為司𨽻校尉以列傳修漢孝桓皇帝延熹九年春正月朔日有食之以本紀修三月癸巳京師有火光轉行人驚譟以本紀修司𨽻豫州飢死者十四五本紀夏四月庚午河水清以袁宏漢紀修五月以太常胡廣為司徒以本紀修六月南胸奴烏桓鮮卑寇緣邉九郡秋七月沈氐羌寇武威張掖以大司農張奐為護胸奴中郎將擊之以紀傳修帝親祠黃帝老子于濯龍宫用郊天樂以本紀修解題曰後世列黃老于天帝其必自此始矣西域傳桓帝數祀浮圖老子百姓稍有奉者後遂轉盛又襄楷傳宫中立黃老浮屠之祠此道清虛貴尚無為或言老子入夷狄為浮屠浮屠不三宿桑下不欲久生恩愛今陛下奈何欲如黃老乎南陽太守成瑨太原太守劉瓆下獄死以通鑑修解題曰太尉陳蕃司徒劉矩司空劉茂共諫請瓆瑨等帝不恱有司劾奏之矩茂不敢復言蕃獨上疏曰小黃門趙津大猾張汜等肆行貪虐姦媚左右前太原太守劉瓆南陽太守成瑨糾而戮之雖言赦後不當誅殺原其誠心在乎去惡至于陛下有何悁悁而小人道長營惑聖聽遂使天威為之發怒必加刑謫已而過甚况乃重罰令伏歐刀乎又前山陽太守翟超東海相黃浮奉上不撓疾惡如讎超沒侯覽財物浮誅徐宣之罪並䝉刑坐不逢赦恕左右羣豎惡傷黨類妄相交構致此刑譴聞臣是言當復號訴陛下深宜割塞近習預政之源引納尚書朝省之事公卿大官五日一朝李賢曰宣帝五日一聽事自丞相已下各敷奏其言魏王肅上疏陳政本曰周官五日視朝公卿大夫並進而司士辨其位焉坐而論道謂之王公作而行之謂之學士大夫漢初依擬前代公卿皆親以事升朝故髙祖躬追反走之周昌武帝特可奉奏之汲黯宣帝使公卿五日一朝成帝始置尚書五人自是陵遲朝禮遂闕可復五日視朝之儀使公卿尚書各以事進由此觀之視朝之禮其廢人矣至蕃始言之通鑑載蕃上疏獨除此二句蓋未深考簡練清髙斥黜邪佞如是天和于上地洽于下休禎符瑞豈逺乎哉帝不納餘見通鑑下郡國捕黨人陳蕃却之下李膺等於黃門北市獄蕃極諫坐免以吕祖謙標目修解題曰按黨錮傳序初帝為蠡吾侯受學于甘陵周福及即位擢福為尚書時同郡河南尹房植有名當朝鄉人為之謡曰天下規矩房伯武因師獲印周仲進二家賔客互相譏揣遂各樹朋徒漸成尤隙由是甘陵有南北部黨人之議自此始矣後汝南太守宗資任功曹范滂南陽太守成瑨亦委功曹岑晊二郡又為謡曰汝南太守范孟博南陽宗資主畫諾南陽太守岑公孝𢎞農成瑨但坐嘯因此流言轉入太學諸生三萬餘人郭林宗賈偉節為其冠並與李膺陳蕃王暢更相褒重學中語曰天下模楷李元禮不畏强禦陳仲舉天下俊秀王叔茂自公卿以下莫不畏其貶議餘見通鑑王師古曰陳蕃明言黨錮非罪固可喜皇甫規自置身於黨錮非慕之也正欲帝灼見黨錮皆君子為天下之向慕如此一旦悟則黨錮事解矣如此然後見規之心吕祖謙曰天下之事最是互相譏揣妄分清濁為禍最大且如房周賔客初不過學舍中譏誚戲笑之語豈知自此致天下之大禍哉大抵此等語易于相傳自一人以至一州一縣夫以一人而當一州之怒自然至于殺身又推而廣之豈不大可畏哉大抵為學須當推廣大之心凡執卷皆同志也何必與親厚者及相近者方謂之同志而疏逺者非同志之理此正是忌心又如朋黨之禍亦有二等一是輕薄如房周之賔客一是髙自標置如范滂李膺之類其賢愚雖如霄壤其禍天下則一九月光祿勳周景為太尉以本紀修冬十二月以越騎校尉竇武為城門校尉以列傳修李膺等二百餘人受誣為黨人並坐下獄書名王府本紀南胸奴烏桓降封鮮卑檀石槐為王不受以本紀修漢孝桓皇帝永康元年春正月先零羌寇三輔張奐破平之以本紀修煎當羌寇武威段熲追擊于鸞鳥大破之以本紀修夏四月先零羌寇三輔以通鑑修五月壬子晦日有食之以本紀修六月庚申大赦天下改元縱黨人禁錮終身以紀傳修秋八月大水勃海海溢本紀冬十月先零羌冦三輔張奐擊破之以本紀修十二月復廮陶王悝為勃海王本紀丁丑帝崩于德陽前殿戊寅尊皇后曰皇太后臨朝與父武定策禁中迎肅宗元孫解瀆亭侯宏于河間以本紀修解題曰帝崩無嗣武召侍御史河間劉鯈參問其國中王子侯之賢者鯈稱解瀆亭侯宏武入白太后遂徴立之餘見通鑑大事記續編卷十七
