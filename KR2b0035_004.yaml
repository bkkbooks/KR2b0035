body:
  text: 大事記續編卷四明王禕撰漢孝成皇帝建始元年春正月乙丑悼皇考廟災以本紀五行志修石顯徙長信中太僕丞相御史奏免顯官徙故郡自殺以列傳修觧題曰石顯貴幸專權為姦邪丞相匡衡御史大夫張譚皆阿附畏事顯不敢言成帝初遷顯為長信中太僕顔師古曰皇后之属官不復與權衡譚乃奏顯舊惡請免顯等司𨽻校尉王尊劾奏丞相御史知顯等顓權擅執大作威福為海内患害不以時白奏行罰而阿諛曲從附下㒺上皆不道在赦令前赦後舉奏不自陳不忠之罪而反揚著先帝任用傾覆之徒妄言百官畏之其於主上卑君尊臣非所冝稱失大臣體餘見通鑑胡寅曰尊謂衡譚知顯等專權擅執不以時奏白行罰無大臣輔政之義當矣而論其言百官畏顯甚於主上卑君尊臣則非也顯殺蕭望之戮張猛誅京房髠陳咸百官重足一迹其視元帝猶虚器爾衡譚奏之以警上心豈可指為尊臣卑君乎雖失之於前而能劾之於後固賢於終不劾者且顯縁此遂免徙死少伸天下之憤衡譚之責亦少塞矣當峕群臣多是尊者未見其是也有星孛於營室本紀立故河間王元弟良為王本紀罷上林詔獄以本紀修觧題曰顔師古曰漢舊儀云上林詔獄主治苑中禽獸宮館事属水衡二月壬子封舅諸吏光禄大夫關内侯王崇為安成侯賜譚商立根逢時爵闗内侯以本紀修觧題曰按長厯壬子二月也通鑑不書二月恩澤侯表可攷今從之夏四月黄霧四塞愽問公卿大夫王鳯乞骸骨不許以紀傳五行志修御史中丞薛宣論部刺史苛政以列傳通鑑修六月青蠅集未央宮殿中以本紀修秋罷上林宮館希幸者以本紀修八月有兩月相承晨見東方本紀九月戊子流星光燭地貫紫宮以本紀修冬十二月作長安南北郊罷甘泉汾隂祠是日大風拔甘泉畤中大木以本紀修觧題曰應劭曰天郊在長安城南地郊在長安城北長陵界中按周制冬至祀天於南郊之圓丘夏至祀地於北郊之方澤漢承秦敝自武帝以来祀天于甘泉五畤祀后土于汾隂至是用匡衡等議始作南北郊復古制也詳見元始五年觧題漢孝成皇帝建始二年春正月罷雍五畤及陳寳祠以本紀及郊祀志修辛巳帝始祀南郊以紀傳修詔减賦錢筭四十以本紀修觧題曰孟康曰本筭百二十今减四十為八十閏月為初陵以本紀修二月詔三輔内郡舉賢良方正本紀三月北宮井水溢出本紀帝祀后土于北郊以本紀修立妃許氏為皇后以紀傳修罷六厩技巧官本紀夏大旱本紀减乗輿馬本紀匡衡奏罷郡國祠四百餘所山川羣祠百二十餘所以郊祀志荀悦漢紀修匈奴呼韓邪單于死子復株累若鞮單于立以列傳修觧題曰按匈奴傳匈奴謂孝曰若鞮自呼韓邪與漢親密見漢謚帝為孝慕之故皆稱為若鞮漢孝成皇帝建始三年春三月賜孝弟力田爵二級以本紀修秋闗内大雨訛言大水至以本紀荀悦漢紀修八月許嘉免以列傳修觧題曰嘉自元帝時為大司馬車騎将軍輔政已八九年及成帝立復以王鳯為大司馬大将軍與嘉並杜欽以為故事后父重於帝舅乃説鳯曰車騎将軍至貴将軍冝尊之敬之無失其意衛将軍之日盛於盖侯顔師古曰衛将軍衛青衛后弟盖侯王信武帝之舊唯将軍察焉乆之上欲專委任鳯乃策嘉以特進就朝位許王之執不能以俱盛欽輩心黨王氏宜其專攻許氏也九月遣諌大夫等循行天下以本紀修張譚免通鑑冬十月光禄大夫尹忠為御史大夫百官表十二月戊申朔日有食之夜地震未央宮殿中詔舉賢良方正直言極諫以本紀修觧題曰合陽侯梁放舉杜欽太常陽城侯劉慶忌舉谷永欽延年之子永吉之子也欽對曰日蝕地震陽㣲隂盛也臣者君之隂也妻者夫之隂也夷狄者中國之隂也春秋日蝕三十六地震五或夷狄侵中國或政權在臣下或婦乗夫或臣子背君父事雖不同其類一也臣竊觀人事以考變異則本朝大臣無不自安之人外戚親属無乖剌之心闗東諸侯無彊大之國三垂蠻夷無逆理之節殆為後宮日以戊申蝕時加未戊未土也土者中宫之部其夜地震未央宫殿中此必適妾将有爭寵相害而為患者唯陛下正后妾抑女寵防奢泰去佚游躬節儉理萬事永對曰災異之發各象過失以類告人日食地震同日俱發厥咎不逺豈陛下志在閨門未䘏政事不慎舉錯婁失中與内寵太盛女不遵道嫉妬專上妨繼嗣與古之王者廢五事之中失夫妻之紀妻妾得意謁行於内埶行於外至覆傾國家惑亂隂陽二人所言其指相類越嶲山崩本紀丁丑匡衡免為庶人以百官表列傳修漢孝成皇帝建始四年春正月癸邜隕石于亳四于肥累二以五行志修罷中書宦官初置尚書員五人本紀觧題曰臣瓉曰漢初中人有中謁者令孝武加中謁者令為中書謁者令置僕射宣帝時𢎞恭為令石顯為僕射至是乃罷其官按六典通典司馬遷被刑之後為中書令不言謁者省文也宣帝任恭顯初元初蕭望之以為中書百官之本武帝㳺宴後庭始用宦者非古制宜更用士人元帝不聽至是始罷中書謁者令奪其所典尚書之事而増置尚書員秦尚書不分曹成帝初置五人一人為僕射四人分四曹應劭謂四員武帝初置成帝加其一司馬彪謂皆成帝所創非也五人者常侍曹二千石曹民曹主客曹三公曹也光武改常侍為吏部曹又分南北主客為六曹魏有吏部左民客曹五兵度支五曹晋初有吏部三公客曹駕部屯田度支六曹渡江有吏部祠部五兵左民度支五曹宋齊梁陳有吏部祠部度支左民都官五兵尚書亦有起部而不常置隋唐有吏禮兵刑户工六部三月甲申左将軍樂昌侯王商為丞相以百官表列傳修夏四月雨雪復召直言之士對筞白虎殿以列傳修觧題曰策曰天地之道何貴王者之法何如六經之義何上用人之行何先取人之術何以當世之治何務杜欽對曰臣聞玩色無厭必生好憎之心好憎之心生則愛寵偏於一人愛寵偏於一人則繼嗣之路不廣而嫉妬之心興矣唯陞下純德普施無欲是從則衆庶咸悦繼嗣日廣萬事之是非何足偹言谷永對畢因曰臣前幸得條對灾異之效陛下委棄不納而更使方正對策背可懼之大異問不急之常論廢承天之至言角無用之虚文吕祖謙曰按其所問豈得謂之虚文不急乎欲末殺灾異滿讕誣天顔師古曰殺音先曷反讕音来亶反上復問永永對以日食婺女九度占在皇后地震蕭墻之内咎在貴妾指班偼伃也二者俱發明同事異人共掩制陽将害繼嗣也時上委政王鳯議者多歸咎焉永隂欲自託乃復曰方今四夷賔服靡有兵革之警諸侯大者乃食数縣漢吏制其權柄不得有為百官盤互親䟽相錯骨肉大臣小心畏忌無毛髮之辜竊恐陛下歸咎乎無辜倚異乎政事重失天心陛下誠奮乾剛之威平天覆之施使列妾人人更進益納冝子婦人以遇天所開右則繼嗣蕃滋灾異訖息峕對者數十人永與欽為上第焉五月中謁者丞陳臨殺司𨽻校尉於殿中以本紀修秋桃李寔本紀大雨水河决館陶及東郡金隄灌四郡以木紀溝洫志修解題曰禹所治河凡九道下流䟽通可以分殺水勢故河久不為患至漢九河故道盡滅而決屯氏靈鳴犢口通兩川分流其後屯氏河塞靈鳴犢口又益不利獨一川兼受數河之任故雖髙増隄防而易為泛溢至是遂決館陶及東郡金隄泛濫兖豫入平原千乗濟南凡灌四郡三十二縣水居地十五萬餘頃深者三丈壊敗官亭室廬且四萬所餘見通鑑冬十一月壬戌少府張忠為御史大夫以百官表修漢孝成皇帝河平元年解題曰宋庠紀年通譜詔王延世隄塞河輙平改元春河隄成三月以河隄使者王延世為光禄大夫爵關内侯改元賜吏民爵以紀傳修解題曰酈道元水經注河北決於館陶縣分為屯氏河成帝之世河決館陶及東郡金隄上使王延世塞之是水亦斷屯氏故瀆東北屯氏别河出焉别河故瀆東北逕信城縣張甲出焉地里志注張甲河及瀆首受屯氏别河於信城縣張甲河及瀆北絶清河於廣宗縣分為二瀆餘見通鑑夏四月己亥晦日有食之不盡如鈎詔百官陳過失以本紀五行志修解題曰劉向對曰四月交於五月月同孝惠日同孝昭其占恐害繼嗣時許皇后專寵後宮希得進見又数有災異劉向谷永等皆陳其咎在後宮劉向之詆後宮若無異於谷永然向指陳王氏其痛至骨與永之自託於王氏志邪異矣於是省减椒房掖廷用度皇后上疏以為不可行上采劉向谷永之言以報餘見通鑑秋九月復太上皇寝廟園本紀解題曰初韋𤣥成奏罷太上皇寝園至是給事中平當言周公成文武之業而制禮作樂修嚴父配天之事知文王不欲以子臨父故推而序之上極於后稷而以配天髙帝聖徳受命有天下尊太上皇猶周文武之追王太王王季也此漢之始祖後嗣所宜尊奉以廣盛德孝之至也上納其言朱熹曰后稷本封於邰而不窟已竄於戎狄公劉太王又再遷而後定文武之興何嘗盡由於后稷但推其本始為出於此故不可不祭而祭之不可以不尊耳豈計其功德之小大有無哉然周人雖以后稷為太祖而祭法亦曰祖文王而宗武王是乃所謂祖有功而宗有德之意故目為世室而百世不遷或謂祖無功業亦當祧是英雄以得天下自己力為之並不與祖也又謂靈芝無根醴泉無源物豈有無本而生者乎詔蠲除苛法以通鑑目録修解題曰見哀帝建平三年光武建武十四年解題漢孝成皇帝河平二年春正月沛郡鐡飛以本紀五行志修夏四月楚國雨雹大如釡五行志徙山陽王康為定陶王以列傳修六月封王譚為平阿侯商為成都侯立為紅陽侯根為曲陽侯逢時為髙平侯以本紀修漢孝成皇帝河平三年春正月楚王囂来朝以本紀修二月丙戌犍為地震山崩雍江水逆流以本紀修秋八月乙夘晦日有食之本紀光禄大夫劉向等校中秘書本紀使謁者陳農求遺書以本紀修河决平原命王延世塞之以溝洫志通鑑目録修劉向奏洪範五行傳以列傳修解題曰歐陽脩五行志序曰萬物盈於天地之間而其為物最大且多者有五一曰水二曰火三曰木四曰金五曰土其用於人也非此五物不能以為生而闕其一不可是以聖王重焉夫所謂五物者其見象於天也為五星分位於地也為五方行於四峕也為五德禀於人也為五常播於音律為五聲發於文章為五色而搃其精氣之用謂之五行自三代之後数術之士興而為灾異之學者務極其説至舉天地萬物動植無大小皆推其類而附之於五物曰五行之属以謂人稟五行之全氣以生故於物為最靈其於動植之類各得其氣之偏者其發為英華羙實氣臭滋味羽毛鱗介文采剛柔亦首得其一氣之盛至其為變恠非常失其本性則推以事類吉㐫影響其説尤為委曲繁密蓋王者之有天下也順天地以治人而取材於萬物以足用若政得其道而取不過度則天地順成萬物茂盛而民以安樂謂之至治若政失其道用物傷夭民被其害而愁苦則天地之氣沴三光錯行隂陽寒暑失節以為水旱蝗螟風雹雷火山崩水溢泉竭雪霜不峕雨非其物或發為氛霧虹霓光恠之類此天地灾異之大者皆生於亂政而考其所發驗以人事徃徃道其所失而以類至然峕有推而不能合者豈非天地之大固有不可知者耶若其諸物種類不可勝數下至細㣲家人里巷之占有考於人事而合者有漠然而無所應者皆不足道語曰迅雷風烈必變蓋君子之畏天也見物有反常而為變者失其本性則思其有以致而為之戒懼雖微不敢忽而已至為灾異之學者不然莫不指事以為應及其難合則旁引曲取而遷就其説蓋自漢儒董仲舒劉向與其子歆之徒皆以春秋洪範為學而失聖人之本意至其不通也父子之言自相戾可勝歎哉昔者箕子為周武王陳禹所有洪範之書條其事為九類别其説為九章謂之九疇考其説初不相附属而向為五行傳乃取其五事皇極庶證附於五行以為八事皆属五行歟則至於八政五紀三德稽疑福極之類又不能附至俾洪範之書失其倫理有以見所謂旁引曲取而遷就其説也然自漢以来未有非之者又其祥眚祸痾之説自其獨得之學故畧存之庶幾深議愽聞之士有以考而擇焉夫所謂灾者被於物而可知者也水旱螟蝗之類是已異者不可知其所以然者也日食星孛五石六鷁之類是已孔子於春秋記灾異而不書其事應蓋謹之也以謂天道遠非諄諄以諭人而君子見其變則知天之所以譴告恐懼修省而已若推其事應而有合有不合有同有不同則將使君子怠焉以為偶然而不懼此其深意也蓋聖人謹而不言如此而後世猶為曲說以妄意天此其不可以傳也漢孝成皇帝河平四年春正月匈奴單于来朝賜孝弟力田爵二級以本紀修三月癸丑朔日有食之遣光禄大夫愽士十一人行瀕河郡舉敦厚有行能直言之士以本紀修壬申長陵臨涇岸崩壅涇水本紀夏四月壬寅収王商印綬商發病死以百官表列傳修解題曰商為左将軍而王鳯顓權驕僣商議論不能平鳯知之亦疏商建始三年秋民相警大水至長安中大亂天子召公卿議鳯以為太后與上及後宫可御舩令吏民上城以避水商獨曰此必訛言也問之果訛言上於是壮美商之固守而鳯大慙商為丞相鳯連昏楊彤為琅邪太守郡有灾害商部属按問顔師古曰部属猶差次其属令治之鳯重怨商使人上書言商閨門事天子以為暗昧之過不足以傷大臣鳯固爭先是皇太后嘗詔問商女欲以備後宫商意難之及為鳯所中惶怖乃因新幸李倢伃家白見其女㑹日食太中大夫張匡上書言商誣罔悖大臣節冝窮竟考問制曰勿治鳯固爭之商免相三日嘔血死餘見通鑑吕祖謙曰商之拒鳯者以區區之正也以正獲罪雖不免猶足以自立於世奈何改行詭道以不正而濟之身名俱辱冝哉荀悦論曰王商言水不至非以見智也非以傷鳯也将欲忠主安民意不得已而鳯以為恨馮倢伃之當熊非欲求媚也非以髙左右也惻怛於心将以救上而傳昭儀以為隙皆至於死其可痛乎六月丙戌光禄大夫給事中領尚書事張禹為丞相封安昌侯以百官表列傳修解題曰禹善論語上之為太子也受論語於禹及即位賜爵闗内侯拜為諸吏光禄大夫給事中領尚書事峕王鳯專權而上方鄉經學敬重師傅禹與鳯並領尚書心自不安数上書乞骸骨欲退避鳯上不許撫待愈厚遂代王商為丞相夫商以忤鳯死則禹之貴顯固其冝哉庚戌楚孝王嚻薨列傳以司𨽻校尉王章為亰兆尹以百官表修山陽火生石中改元以本紀修漢孝成皇帝陽朔元年解題曰應劭曰時隂盛陽微故改元陽朔欲陽之蘇息也顔師古曰朔始也以火生石中言陽氣之始春二月丁未晦日有食之本紀冬王章下獄死以本紀修解題曰章字仲卿泰山人也定陶恭王来朝上謂王我未有子爾長留侍我矣恭王因留國邸大将軍鳯心不便恭王在京師㑹日食鳯因言隂盛之象定陶王雖親於禮當奉藩在國今留侍京師故天見戒冝遣之國王辭去上與相對涕泣而訣日食或歸咎蕭望之周堪劉向或歸咎後宫或歸咎王商或歸咎定陶王皆見於施行至於咎由王氏則雖言而不聼也章乃奏封事言日食之咎皆鳯專權蔽主之過天子召見章曰陛下以未有繼嗣引近定陶王所以承宗廟重社稷上順天心下安百姓何故致灾異灾異之發為大臣專政者也今聞大将軍猥歸咎於定陶王建遣之國茍欲使天子孤立於上顯擅朝事以便其私非忠臣也且日食隂侵陽臣專君之咎鳯不内自省責反歸咎善人且鳯誣罔不忠非一事也前丞相樂昌侯商不肯詘節隨鳯委曲卒用閨門之事為鳯所罷又鳯知其小婦弟張美人已嘗適人於禮不冝配御至尊託以為冝子内之後宫王商内其女張匡以春申君吕不韋之事詆之王鳯之内張美人則谷永為之㳺説謂冝内冝子婦人毋避嘗字微章孰能發其姦哉鳯不可令乆典事冝選忠賢以代之上聞章言感悟謂章曰君試為朕求可以自輔者於是章奏封事薦中山孝王舅琅邪太守馮野王上方倚欲以代鳯時太后從弟子侍中音具知章言以語鳯鳯聞之稱病出就第杜欽令鳯上䟽謝罪文指甚哀上少而親倚鳯太后涕泣為不食弗忍廢復起鳯就位鳯心慙欲遂退欽復説之曰将軍輔政十年變異不已故乞骸骨歸咎於身是無屬之臣執進退之分潔去就之節者耳非主上所以待将軍将軍所以報主上也唯将軍不為四國流言自疑於成王以固至忠鳯復起視事上令尚書劾奏章章死詔獄既死衆庶寃之以譏朝廷欽欲救其過復説鳯冝因章事舉直言極諫並見郎從官展盡其意以明示四方使天下咸知主上聖明不以言罪下也鳯白行其策餘見通鑑吕祖謙曰亡漢者杜欽也罪甚於張禹又曰石顯事貢禹而人以為不譛殺蕭望之甚矣欽之姦似顯也漢孝成皇帝陽朔二年春寒詔務順四峕月令以本紀修夏四月丁邜侍中太僕王音為御史大夫以百官表列傳修解題曰音既列於三公於是王氏愈盛五侯群弟争為奢侈遺賂珍寳四靣而至然皆好士養賢傾財施予以相髙尚賔客滿門競為聲譽陳瓘曰武帝之所切齒成帝之所優容秋闗東大水遣諫大夫愽士行視以本紀修八月定陶恭王康薨以本紀修詔舉愽士以本紀修是嵗徙信都王興為中山王以本傳修漢孝成皇帝陽朔三年春三月隕石東郡八本紀夏六月潁川鐵官徒作亂討平之朱熹通鑑綱目秋八月陽平敬成侯王鳯薨九月王音為大司馬車騎将軍領尚書事平阿侯王譚位特進領城門兵以列傳修冬十一月丁邜光禄勲于永為御史大夫漢孝成皇帝陽朔四年春正月詔二千石勸農桑以本紀修夏四月雨雪本紀秋九月壬申東平思王宇薨本紀少府王駿為京兆尹漢孝成皇帝鴻嘉元年春正月癸巳薛宣為御史大夫百官表二月壬午帝幸初陵以新豐戲鄉為昌陵縣奉初陵以本紀修帝始為微行本紀三月庚戌張禹以列侯朝朔望夏四月庚辰御史大夫薛宣為丞相封髙陽侯王駿為御史大夫以百官表列傳修六月封王音為安陽侯以百官表列傳修冬黄龍見真定本紀匈奴復姝累單于死弟搜諧若鞮單于立以列傳修漢孝成皇帝鴻嘉二年春帝幸雲陽以本紀修三月博士行大射飲酒禮有飛雉升堂而雊復集諸府又集承明殿詔舉惇厚有行義能直言者以本紀修夏徙郡國豪傑貲五百萬以上五千户于昌陵以紀傳修五月癸未隕石于杜郵三以五行志修六月立中山王脩從父弟子雲客為廣德王以列傳諸侯王表修是歳城陽哀王雲薨無子國除本紀漢孝成皇帝鴻嘉三年夏四月令吏民得買爵本紀大旱本紀五月乙亥天水兾南山大石鳴以五行志修王氏僣奢詔尚書奏文帝誅薄昭故事王音等藉藁謝罪乃已以列傳修秋八月乙邜孝景廟闕災本紀冬十一月甲寅廢皇后許氏以本紀修解題曰按通鑑上微行過陽阿主家悦歌舞者趙飛燕召入宫大幸有女弟復召入姿性尤醲粹左右見之皆嘖嘖嗟賞有宣帝時披香愽士淖方成在帝後唾曰此禍水也滅火必矣姊弟俱為偼伃貴傾後宫於是飛燕譛告許皇后班偼伃挟媚道祝詛後宫詈及主上許后廢䖏昭臺宫而班偼伃共養太后於長信宫淖方成之説不見於漢史而出於伶𤣥所撰趙飛燕外傳此後世偽書不可取信禍水之言尤渉滛陋廣漢男子鄭躬作亂攻官寺以本紀修漢孝成皇帝鴻嘉四年春正月詔青幽兾部水旱遣使者循行以本紀修秋雨魚於新都以五行志修渤海清河溢本紀解題曰河水湓溢灌縣邑三十一敗官亭民舍四萬餘所季尋等奏言議者嘗欲求索九河故迹而穿之今因其自決可且勿塞以觀水勢河欲居之當稍自成川䟽出沙土然後順天心而圖之必有成功而用財力寡於是遂止不塞滿昌等数言百姓可哀上数遣使者䖏業振瞻之陳瓘曰此最治河之上策也待朝臣言然後遣使者亦已晚矣胡不早計以順天心民茍安則所居地不足惜也冬鄭躬等犯四縣尋伏誅以本紀修是嵗王譚卒成都侯王商位特進領城門兵以列傳修解題曰上悔廢譚不輔政而薨乃復進商領城門兵置幕府得舉吏如将軍杜鄴見車騎将軍音前與平阿侯譚有隙即説音宜承順聖意加異往峕每事凡議必與及之音由是與商親密二人皆聖鄴漢孝成皇帝永始元年春正月癸丑太官凌室火戊午戾后園闕火本紀夏四月乙亥封偼伃趙氏父臨為成陽侯諌大夫劉輔上書諌論為鬼薪以紀傳修解題曰成帝欲立趙偼伃為皇后皇太后嫌其所出微甚難之乃先封偼伃父臨為列侯輔上書諌謂觸情縱欲傾於卑賤之女欲以母天下不畏於天不媿於人惑莫大焉上使侍御史収縳輔繋掖庭秘獄顔師古曰獄令丞官者為之主理婦人女官也群臣莫知其故於是中朝左将軍辛慶忌右将軍㢘褎光録勲師丹太中大夫谷永俱上書曰公卿以下見陛下進用輔亟而折傷之暴人有懼心精鋭銷耎莫敢盡節正言臣等竊深傷之迺徙繫共工獄顔師古曰少府之屬官也减死罪一等論為鬼薪餘見通鑑孟康曰中朝内朝也大司馬左右前後将軍侍中中常侍散騎諸吏為中朝丞相以下至六百石為外朝丹永所以得預者其必兼給事中也宣元以来或下於中朝或議於中朝或遣中朝雜問或中朝上書外朝不與則中朝之任信重矣五月乙未封舅子侍中光禄大夫王莽為新都侯以本紀恩澤侯表修六月丙寅立偼伃趙氏為皇后以本紀修秋七月罷昌陵及故陵勿徙吏民本紀立城陽哀王弟俚為王本紀八月丁丑太皇太后王氏崩本紀解題曰宣帝卭成王后也九月黑龍見東萊以本紀修丁巳晦日有食之以五行志修漢孝成皇帝永始二年春正月己丑安陽敬侯王音薨以本紀修二月癸未夜星隕如雨繹繹未至地㓕以本紀五行志修乙酉晦日有食之本紀解題曰谷永以亰房易占對曰元年九月日食酒亡節之所致獨使京師知之四國不見祸在内也今年日食賦歛不得度民愁怨之所致所以四方皆見京師隂蔽祸在外也詔百寮條奏可省減者又詔關東比嵗不登吏民収食貧民助縣官振贍者賜爵有差以本紀修三月丁酉王商為大司馬衛将軍紅陽侯王立位特進領城門兵以列傳修京兆尹翟方進為御史大夫百官表光禄大夫劉向上書言王氏帝不用以列傳修解題曰峕上無繼嗣政由王氏災異寖甚向雅竒陳湯智謀謂湯曰災異如此而外家日盛其漸必危劉氏吾幸得以同姓末屬累世蒙漢厚恩身為宗室遺老歴事三主上以我先帝舊臣每進見常加優禮吾而不言孰當言者遂上封事極諫曰王氏一門乗朱輪華轂者二十三人青紫貂蟬充盈幄内魚鱗左右大将軍秉事用權五侯驕奢僣盛並作威福擊斷自恣逺絶宗室之任不得令給事朝省恐與已分權厯上古至秦漢外戚僣貴未有如王氏者也事執不兩大王氏與劉氏亦不並立如下有泰山之安則上有累卵之危冝黜逺外戚毋授以政皆罷令就第使王氏永存保其爵禄劉氏長安不失社稷所以褒睦外内之姓子子孫孫無疆之計也通鑑以此䟽載之陽朔二年王鳯未死之前以䟽言大将軍用事故也攷向本傳向諌作昌陵又次列女傳以諷趙衛之屬衞即李偼伃也然後載所上封事則所謂大将軍者蓋追言曩事耳今附見於王商為衛将軍之後且陳湯亦以是年方徙燉煌云餘見通鑑王師古曰漢懲七國之變踈逺同姓忘吕霍之禍親近外戚蓋恃外者易疎而恃内者易親易疎者知其惡而易親者忘其危成帝峕王氏用事劉氏㣲弱王氏子弟滿朝廷而劉氏遺老獨向一人周旋列大夫三十餘年不得為九卿向不避同姓之嫌反覆論外戚同姓詞語深切帝深為之感動而不能奪王氏之權也豈非沿習近事寜信外戚而不信同姓耶左遷侍中張放北地都尉以通鑑修冬十一月己丑薛宣免為庻人翟方進左遷執金吾壬子翟方進為丞相封髙陵侯諸吏散騎光禄勲孔光為御史大夫以百官表列傳修帝幸雍祠五畤以本紀修十二月賜常侍王閎侍中衛尉淳于長爵闗内侯以紀傳修徙陳湯燉煌以通鑑修漢孝成皇帝永始三年春正月己邜晦日有食之遣太中大夫等循行天下與部刺史舉敦樸遜譲有行義者以本紀修夏大旱以五行志修冬十月庚辰復甘泉汾隂雍陳寳祠以本紀郊祀志修解題曰初帝用匡衡議罷甘泉泰畤等祠而作南北郊至是復因劉向言罷南北郊而甘泉汾隂諸祠皆復詳見元始五年解題尉氏男子樊並山陽鐵官徒蘇令等作亂殺郡國長吏尋伏誅本紀故南昌尉梅福上書論峕政不報以列傳通鑑修漢孝成皇帝永始四年春正月帝幸甘泉郊泰畤三月幸河東祠后土以本紀修夏四月癸未長樂宫臨華殿未央宫東司馬門災六月甲午覆陵園門闕災以本紀五行志修大早以五行志修詔禁奢僣踰制以本紀修秋七月辛未晦日有食之本紀冬十一月庚申衞将軍王商病免漢孝成皇帝元延元年解題曰宋庠紀年通譜義取元祚而更為延始春正月己亥朔日有食之本紀壬戌王商復為大司馬衞将軍以列傳修三月帝幸雍祠五畤以本紀修夏四月丁酉無雲而雷有流星從日下東南行燿燿如雨以本紀天文志修秋七月有星孛於東井詔内郡國舉方正直言極諌北邉二十二郡舉勇猛知兵法者以本紀修封故相國蕭何後喜為鄼侯以本紀修解題曰通鑑載於永始元年本紀載於元延元年今從本紀冬十二月己未王商為大将軍辛亥商薨庚申曲陽侯王根為大司馬驃騎将軍領尚書事以百官表列傳修吏民上書言灾異譏切王氏帝以問安昌侯張禹禹言天道災變難見鄙儒新學誤人帝由此不疑故槐里令朱雲請斬禹帝怒欲誅雲尋釋之以列傳修解題曰永始元延之間日食地震尤数吏民多上書言王氏專政所致上懼變異数見意頗然之未有以明見乃車駕至禹第辟左右親問以天變因用吏民所言王氏事禹自見年老子孫弱又與曲陽侯不平恐為所怨則謂上曰春秋日食地震或為諸侯相殺或為夷狄侵中國灾變之意深逺難見故聖人罕言命不語怪神性與天道自子貢之屬不得聞何況淺見鄙儒之所言陛下宜修政事以善應之新學小生亂道誤人宜無信用以經術斷之上雅信愛禹由是不疑餘見通鑑胡寅曰日者衆陽所宗而受侵翳以天喻人非小變也或妾婦侵陵或臣子背叛或政權在下或夷狄亂華人君於此克自飭正則雖有象而無其應矣今禹條陳日食頋歸之諸侯相殺夷狄内侵之逺事而不端言臣子背上政權在下之近禍又畏避王氏而委曲其説且外家擅國其勢将移衆所共睹安得指為神恠而不語也正君臣之分杜禍亂之門收還主威答塞變異是即性與天道安得指為不可聞而不告也且曰宜修政事以善應之當時善政之宜修孰有大於勢隆於主者乎凡禹数言之中老姦偹見尚方劍雖不得加而禹之戮終古不可免矣五侯初封黄霧四塞公卿多言本后諸弟王鳯欲避位帝眷留之而鳯遂不去鳯白罷王商遣定陶王帝不能平王章因日食言其咎帝欲廢鳯又以太后不食故不忍而鳯終不去矣帝目擊王商僣侈尚書奏誅薄昭故事王音等謝罪帝即釋之而王氏之勢遂成及後日食地震吏民言由王氏帝懼以問張禹因禹言不復疑而王氏之勢迄不可敗矣使其初杜欽谷永之對稍持正論而其後張禹之對無復曲說則王氏之盛豈至是哉陳瓘謂天子無忠臣權門有説客嗟乎此漢之所以亡於王氏也是嵗昭儀趙氏害後宫皇子以本紀修匈奴搜諧單于死弟車牙若鞮單于立以列傳修徴張放尋出為河東都尉以列傳通鑑修漢孝成皇帝元延二年春正月帝幸甘泉郊泰畤二月幸河東祠后土㳺龍門􅕾西嶽而歸以紀傳修解題曰龍門東在絳州龍門縣西西在同州韓城縣北李復曰禹鑿龍門起於唐張仁愿所築東受降城之東自北而南至此山盡兩岸石壁峭立大河盤束千数百里至此山開岸濶豁然奔放顔師古曰在今蒲州龍門縣北夏四月立廣陵孝王子宇為王本紀冬帝校獵長楊宫以本紀修左曹中郎将光禄大夫叚㑹宗殺烏孫小昆彌太子番丘賜爵關内侯以列傳稽古録修漢孝成皇帝元延三年春正月丙寅蜀郡岷山崩壅江三日江水竭本紀解題曰蜀郡秦思王置漢因之東漢之末劉焉為益州牧自廣漢之雒移治於成都劉偹取劉璋㩀其地魏咸熈中取之晋為成都國復置蜀郡為益州刺史治唐武德初為益州夭寳又改蜀郡至德二年為成都府又分為劍南西川節度宋太平興國淳化嘗再降為益州尋復故地里志岷山在蜀郡湔道西徼外今茂州汶山縣江水所出也蜀以山近江原者通為岷山青城天彭諸山之所連接皆古之岷山二月丙午封侍中衛尉淳于長為定陵侯本紀三月帝幸雍祠五畤以本紀修中壘校尉劉向上書陳災異不用以列傳修解題曰按向傳星孛于東井岷山崩向懐不能自已復上奏則在三年以後無疑通鑑以此䟽云自建始以来二十嵗間而日八食故載之元年以合二十嵗之數不知向謂二十嵗間八食耳非謂至此年二十嵗也今從本傳載於岷山崩之後自建始至元延日凡十食向止言八食蓋永始元年二年日食一則京師見而四方不見一則四方見而京師不見故不叙耳漢孝成皇帝元延四年春正月帝幸甘泉郊泰畤以本紀修中山王興定陶王欣来朝以列傳通鑑修二月罷司𨽻校尉官本紀三月帝幸河東祠后土本紀甘露降亰師本紀隕石于關東二以五行志修漢孝成皇帝綏和元年解題曰宋庠紀年通譜綏安也義取安和以冠元春二月癸丑立定陶王欣為皇太子賜諸侯王列侯金天下當為父後者爵以本紀修戊午左遷孔光廷尉以廷尉何武為御史大夫以列傳修封殷後孔吉為殷紹嘉侯三月及周承休侯皆進爵公以本紀修帝幸雍祠五畤以本紀修夏四月建三公官王根罷将軍為大司馬御史大夫何武為大司空封氾鄉侯以本紀通鑑修解題曰初漢興襲秦官置丞相御史大夫太尉至武帝罷太尉置大司馬以冠将軍之號非有印綬官屬也何武為九卿建言冝建三公官分職授任以考功効上以問張禹禹以為然於是王根為大司馬賜印綬設官屬而何武為大司空封列侯朱熹曰漢自古文尚書出方有周官篇伏生口授二十五篇無周官故漢止置太尉司徒司空為三公而無周三公三少古者天子置三公三孤六卿侯國置司徒司馬司空牧誓立政所紀周是時方為諸侯及周官篇則周已得天下矣所以不同韓詩外傳曰三公之德者何司馬主天司空主土司徒主人以韓嬰時未見古文尚書也其後古文尚書既出故班固百官表序言三公三孤與周官同秋八月庚戌中山王孝王興薨以本紀修匈奴車牙單于死弟烏珠留若鞮單于立遣使求其地以列傳修解題曰王介曰匈奴自宣帝末年欵塞来朝今無故而求其地自是始不誠服矣事見通鑑冬十月王根免以列傳修十一月立楚王囂孫景為定陶王本紀遣王立就國淳于長下獄死以本紀修解題曰翟方進劾奏紅陽侯立狡猾不道請下獄上遣立就國方進復奏立黨友後将軍朱愽鉅鹿太守孫閎皆免官故光禄大夫陳咸歸故郡方淳于長用事方進獨與長交稱薦之及長誅上以方進大臣為之隱諱方進既復視事輙復條奏長所厚善孫寳等免二十餘人建平侯杜業素與方進不平方進奏業聽請不敬免就國及方進薨業上書言方進本與長深結厚更相稱薦長䧟大惡獨得不坐故事大逆朋友坐免官無歸故郡者今坐長者歸故郡已深一等紅陽侯立坐子受長貨賂故就國耳非大逆也而方進復奏立黨友朱博孫閎陳咸皆免官歸咸故郡刑罰無平在方進之筆端庶衆莫不疑惑餘見通鑑陳瓘曰以大逆誅者乃其所交通推薦之人天子為之隱諱見留輙止無恥已甚又因其事以復私怨號為通明相而其為如此賜廢后許氏死本紀王莽為大司馬以列傳修解題曰淳于長死莽以忠直獲名王根因乞骸骨薦莽自代遂擢從侍中騎都尉光禄大夫為大司馬前此所未有也莽外除定陵之偪内攘曲陽之位姦状已偹見而世猶未覺何哉餘見通鑑十二月罷部刺史置州牧秩二千石以本紀修解題曰丞相方進大司空武議刺史位下大夫而臨二千石輕重不相得宜更置州牧以應古制乃罷刺史置州牧秩二千石􅛳為郡得古磬劉向因説帝冝興辟雍設庠序陳禮樂乃議立辟雍長安城南㑹向卒尋寝以禮樂志荀悦漢紀修増博士弟子員三千人嵗餘復故以儒林傳通鑑修大事記續編卷四
