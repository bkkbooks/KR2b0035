body:
  text: 大事記續編卷三十六明王禕撰宋髙祖武皇帝劉裕永初元年燕馮跋太平十二年魏太宗明元皇帝泰常五年秦乞伏熾磐建𢎞元年涼沮渠蒙遜玄始九年西涼李恂永建元年年北夏赫連勃勃真興二解題曰歐陽修正統論絶晉於建興而復不與魏阮逸作元經絶南於齊之初進魏於孝文太和五年司馬光通鑑以宋齊梁陳為正統及隋滅陳然後以統歸之宋庠紀年通譜絶南於晉亡進魏於明元帝泰常五年朱熹曰劉聰石勒諸人皆晉之故臣故東晉以君臨之宋齊何可比東晉自古亦有無統時南北止當並書今從朱氏及紀年通譜春正月秦王熾磐改元以吕祖謙標目修解題曰西秦自是稱秦夏四月宋王裕以其子義康都督豫司雍並州軍事豫州刺史六月裕至建康丁卯即皇帝位解題曰髙祖有受禪意而難于發言乃集朝臣宴飲從容言曰桓玄暴篡鼎命已移我首倡大義興復皇室南征北伐平定四海功成業著遂荷九錫今年將衰暮崇極如此物戒盛滿非可久安今欲奉還爵位歸老京師羣臣唯盛稱功德莫曉此意日晚坐散傅亮還外乃悟云餘見通鑑朱全忠急於傳禪使蔣玄暉等謀之玄暉與栁璨等議以魏晉以來皆先封大國加九錫殊禮然後受禪乃先除全忠諸道元帥全忠謂玄暉故逗遛其事以須變及加九錫遂不受世道至此又可浩歎也大赦改元其犯鄉論清議一皆滌蕩本紀解題曰朱黻曰自昔帝王皆采求鄉論以為取士之本培埴清議以善風俗之原不以朝廷之都俞而棄比閭之私語公卿之訓誥而廢羣下之清談彼誠知務也哉劉裕落拓無行不為當世之所推許雖已極富貴猶未免介然於其心故始初肆赦犯清議鄉論之人一切蕩滌而與之更始使取士不復以鄉論士大夫肆行不復畏清議者裕實啓之也宋廢晉帝為零陵王遷之秣陵追尊考妣為帝后尊繼妣王太后蕭氏為皇太后以本紀修宋廢晉封爵置王𨗳謝安溫嶠陶侃謝玄後以本紀修戊寅宋量增百官俸以本紀修秋七月辛卯宋復置五校三將官增殿中將軍員以本紀修宋交州刺史杜慧度擊林邑大破之以列傳修解題曰交州漢治龍編獻帝治蒼梧廣信縣後徙治南海畨禺縣還治龍編領交趾宋安南府愛陸陽三州之地武平安南府峯武安二州之地新昌峯州九真安南府愛福祿二州之地九德歡濵愛長四州之地日南安南義昌未詳宋平安南府武安州之地郡八北涼王蒙遜伐西涼西涼公歆襲張掖蒙遜大敗之殺歆入酒泉以吕祖謙標目修八月宋立太子義苻為皇太子以本紀修九月壬子朔宋置東宫殿中將軍十人以本紀修燉煌人迎前太守李恂為涼州刺史以通鑑修解題曰宋庠紀年通譜時改元永建本漢順帝年號宋髙祖武皇帝永初二年年魏太宗明元皇帝泰常六燕馮跋太平十三年秦乞伏熾磐建𢎞二年涼沮渠蒙遜玄始十年西涼李恂永建二年年北夏赫連勃勃真興三春正月辛酉宋主祀南郊大赦以本紀修解題曰郊赦始於此宋廬陵王義真為司徒尚書僕射徐羡之為尚書令揚州刺史中書令傅亮為尚書僕射以本紀通鑑修解題曰揚州後漢治厯陽魏晉治夀春平吳治建業宋治京邑領丹陽尹今建康常太平三州之地會稽紹興慶元台州之地吳平江嘉興杭嚴婺之地吳興杭湖之地淮南寧國池太平之地宣城寧國池州廣德之地東陽紹興婺衢處信五州之地臨海慶元台三州之地永嘉溫處之地新安嚴徽池之地郡十二月宋親策試秀才孝廉以本紀修河西王蒙遜攻燉煌以通鑑修三月乙丑宋初限荆州將吏以本紀修解題曰初限荆州府置將不得過二千人吏不得過一萬人州置將不得過五百人吏不得過五千人兵士不在此限薛季宣曰晉兵不競惟北府有功方桓玄篡竊義師之興不過一千七百人卒定天下髙祖代晉亦惟內弱外強之故首置五校殿中東宫諸兵而限荆州置將不得過二千人且以揚州兵本不付長沙正以享國日淺欲為貽後之業以荆居上流甲兵半朝廷遺詔諸王遍居之此髙祖之略也按州郡志荆州漢治江陵漢壽魏晉治江陵武昌沔陽襄陽夏口上明領南今江陵襄陽荆門之地南平江陵澧嶽之地天門澧州宜都峽施歸三州之地巴東夔施開忠萬五州之地汶陽峽州南義陽澧州新興晉僑置南河東晉僑置今屬江陵建平夔歸施三州大寧監之地永寧今荆門州武寧今荆門州郡十二河西王蒙遜陷燉煌李恂自殺以通鑑修解題曰按列傳皓以安帝隆安四年立至宋少帝景平元年滅凡二十四年則燉煌之陷似在後兩年當考夏四月己卯宋毁淫祠以本紀修五月己酉宋置東宫屯騎步兵翊軍三校尉以本紀修秋七月河西王蒙遜遣將伐秦秦大敗之以通鑑修九月宋弒零陵王諡曰恭皇帝葬沖平陵以通鑑修解題曰弒舊君自此始世道又一變矣宋髙祖武皇帝永初三年年魏太宗明元皇帝泰常七燕馮跋太平十四年秦乞伏熾磐建𢎞三年勃涼沮渠蒙遜玄始十一年夏赫連勃真興四年春正月癸丑宋加徐羡之司空録尚書事以本紀修二月丁丑宋分豫州淮以東為南豫州分荆州置湘州以吕祖謙標目修解題曰分淮東為南豫州淮西為豫州南豫州所領厯陽今屬和州南譙滁無為二州之地廬江廬州無為州之地南汝隂廬州南梁屬安豐晉熙屬安慶弋陽光安豐二州之地安豐安豐汝南安豐新蔡光州陳安慶南頓僑置帖治陳郡潁川僑置未詳西汝隂安豐汝陽僑置未詳陳留僑置屬安豐南陳左郡邊城左郡光城左郡今並屬安豐豫州所領汝南蔡州新蔡潁昌蔡光之地譙郡睢拱宿三州之地梁郡睢單二州陳郡淮寧順昌亳州南頓淮寧潁川頴昌汝陽淮寧蔡州之地汝隂順昌陳留睢亳二州之地十郡淮東自永初至大明便為南豫雖乍有離合而分立居多自泰始失淮西後於淮東分立兩豫南豫以淮東為境不復更列二州覽者按此推尋之則可得泰始兩豫分域齊州郡志豫州領南汝隂晉熙潁川汝陽梁北陳陳留南頓西南頓北梁西汝隂北譙汝南北新蔡弋陽陳安豐光城左郡邊城建寧齊昌等二十一郡永明二年割揚州宣城淮南豫州厯陽譙廬江臨江六郡復置南豫州湘州領長沙今屬潭衡二州衡陽宋常德寶慶二府潭衡二州之地桂陽郴衡二州桂陽軍之地零陵永全二州靜江府之地營陽道州湘東衡潭二州邵陵寶慶靖州武岡之地廣興韶連廣南雄四州英德府南安軍之地臨慶賀昭廣封道新六州靜江府之地始建靜江府昭潯二州之地十郡元嘉七年又分豫州南豫州泰始二年合九月又分三年五月又合四年以淮南宣城為南豫州五年罷七年復分厯陽淮隂南譙南兖州之臨江立南豫州元嘉八年省湘州十七年又立二十九年又省孝建元年又立分合不常今皆略而不書三月宋以護軍將軍檀道濟為南兖州刺史以吕祖謙標目修解題曰南兖州晉成帝立寄治京口元嘉割江淮治廣陵二十八年治盱眙其後還廣陵宋末領廣陵今揚真泰三州髙郵府之地海陵泰通二州髙郵府之地山陽淮安濠州宋招信軍之地盱眙淮安招信軍秦真州招信軍南沛真州髙郵招信之地新平北淮隂北濟隂北下邳東莞並僑寄十一郡宋廬陵王義真都督南豫豫六州軍事車騎將軍南豫州刺史以紀傳修夏四月乙亥宋封楊盛為武都王以本紀修五月宋詔後世母后不臨朝以吕祖謙標目修宋徐羡之傅亮領軍將軍謝晦鎮北將軍檀道濟受遺癸亥宋主殂以本紀修解題曰上不豫羣臣請祈禱神祇上不許唯使侍中謝方明以疾告廟而已上疾甚召太子誡之曰檀道濟雖有幹略而無逺志非如其兄韶有難御之氣也徐羡之傅亮當無異圖謝晦數從征伐頗識機變若有同異必此人也小却可以會稽江州處之又為手詔曰朝不須復有别府宰相帶揚州可置甲士千人若大臣中任要宜有爪牙以偹不祥人者可以臺見隊給之有征討悉配以臺見軍隊行還復舊後世若有幼主朝事一委宰相母后不煩臨朝仗既不許入臺殿門要重人可詳給班劒昔漢髙帝將終吕后問曰蕭相國既死令誰代之上曰曹參可問其次曰王陵可然少戇陳平可以助之陳平知有餘然難獨任周勃重厚少文然安劉氏者必勃也可令為太尉宋武帝垂絶之際評議其臣若無愧髙帝之知人矣然髙帝言如蓍龜武帝之肉未寒而徐傅諸人戕賊嗣君幾無遺育豈非武帝所處置不及髙祖故歟至若遺詔母后不許臨朝則萬世不易之論也皇太子義符即皇帝位尊皇太后曰太皇太后立妃司馬氏為皇后以本紀修魏皇子太平王燾臨朝以吕祖謙標目修解題曰劉恕校正後魏書太宗紀四月封皇子燾為太平王五月詔皇子臨朝聽政世祖紀四月封太平王五月為監國亦不言曾立為皇太子惟北史書立太平王燾為皇太子臨朝聽政高氏小史修文殿御覽亦無立皇太子事今從之六月壬申宋傅亮為中書監尚書令謝晦領中書令以紀傳修秋九月魏遣司空奚斤等攻宋冬十一月庚戌陷滑臺以吕祖謙標目修解題曰按北史列傳宋武帝殂帝欲取洛陽虎牢滑臺崔浩曰陛下不以劉裕歘起納其使貢裕亦敬事陛下不幸今死乘喪伐之雖得之不令春秋晉士丐侵齊聞齊侯卒乃還君子大其不伐喪今國家未能一舉而定江南宜遣人弔祭恤其凶災義風於天下令德之事也且裕新死黨與未離不如緩之待其惡稔如其強臣爭權變難必起然後命將揚威可以不勞士卒而收淮北之地帝鋭意南伐曰劉裕因姚興死而滅其國裕死我伐之何為不可浩固執曰興死二子交爭裕乃伐之帝大怒不從遂遣奚斤等南伐餘見通鑑按南史列傳崔宏因苻氏亂欲避地江南為張願所獲本圖不遂作詩以自傷浩以孝聞必能察其中心之所存矣其力止魏之南伐豈不欲夷狄得志於中國猶王猛諫苻堅乎栁元景傳河北太守栁光世姊夫崔浩元嘉二十七年拓跋燾南冦浩密有異圖光世要河北義士為應浩謀泄被誅坐夷滅者甚衆光世南奔得免此自解之詞不足信也通典宋初強盛南鄭襄陽懸瓠彭城厯城東陽皆為藩扞明帝時淮北四州豫州西境陷殁則長淮為北境僑徐兖於淮南青冀二州寄治贛榆後十餘年而亡十二月丙戌魏主至冀州遣將軍叔孫建徇青兖宋兖州刺史徐琰棄尹卯走己丑宋遣檀道濟等救之以通鑑修解題曰冀州義熙治青州文帝分青州立厯城領廣川今青淄二州平原濟南淄州清河淄州樂陵青州魏濟南河間僑置頓丘濟南髙陽青密二州勃海淄州九郡青州治臨淄江左治廣陵義熙治東陽城孝武移厯城大明還治東陽明帝於鬱州僑立齊北海西海郡舊領齊青淄密三州濟南濟南淄州樂安濟南淄青髙密濰密二州平昌密青二州北海青濰萊三州東萊登萊二州太原屬濟南長廣屬萊州郡九兖州後漢治山陽昌邑魏晉治廩丘武帝治滑臺文帝治鄒山又治彭城復治瑕丘山陽有瑕丘縣宋末兖州寄治淮隂領泰山宋襲慶府沂淄二州髙平襲慶府單濟二州冀襲慶府東平東平濮州之地陽平僑置濟北襲慶濟南東平之地郡六按宋書索虜傳虜將娥青二千南渡於碻磝東下至泗瀆口去尹卯百許里兖州刺史委軍鎮走水經注濟水側岸有尹卯壘南去魚山四十餘里是穀城縣界春秋之小穀城也在東平東阿縣後魏書有尹卯固尹卯城宋營陽王劉義符景平元年魏太宗明元皇帝泰常八年燕馮跋太平十五年秦乞伏熾磐建𢎞四年勃涼沮渠蒙遜玄始十二年夏赫連勃真興五年春正月己亥朔宋改元以本紀修癸卯魏取宋洛陽以吕祖謙標目修己未宋徵豫章太守蔡廓為吏部尚書不受以列傳修解題曰徵廓為吏部尚書廓因傅隆問亮選事若悉以見付不論不然不能拜也亮以語録尚書徐羡之羡之曰黃門郎以下悉以委蔡吾徒不復厝懷自此以上故宜參同異廓曰我不能為徐干木署紙尾遂不拜羡之亦以廓正直不欲使居權要徙為祠部尚書葉適曰魏晉吏部即已専用人之柄况尚書乎後世盡奪吏銓歸廟堂宰相事但有此一條是其上者皆淪滅不復見矣二月戊辰魏築長城備柔然以吕祖謙標目修丁丑宋太皇太后殂以本紀修三月魏將軍公孫表攻宋虎牢不克伏誅以魏傳修魏叔孫建攻宋青州刺史竺夔於東陽不克以吕祖謙標目修夏四月魏主攻虎牢不克而還以通鑑修閏月魏陷虎牢執宋冠軍將軍司州刺史毛德祖取司兖豫郡縣以吕祖謙標目修解題曰晉太康天下一統州為二十自司冀雍涼青并兖豫幽平諸州淪沒遺民南渡僑置牧司江右又分荆為湘或離或合凡有揚荆湘江梁益交廣其徐州則有過半豫州唯有譙城而已宋分揚為南徐徐為南兖揚州之江西悉屬豫州分荆為雍分荆湘為郢分荆為司分廣為越分青為冀分梁為南北秦太宗初索虜南侵青冀徐兖及豫州淮西並皆不守於是於鍾離置徐州淮隂為北兖而青冀二州治贛榆之縣通典宋孝武大明凡二十二州揚治建業南徐治京口徐治彭城南兖治廣陵兖治瑕南豫治厯陽豫治汝南江治尋陽縣青治臨淄冀治厯城司治義陽荆治南郡郢治江夏湘治臨湘雍治襄陽梁秦治南郡益治成都寧治建寧廣治南海交治龍編越治臨漳自流民南度遂於江漢淮之間僑立州郡廢置離合非一不能詳制紀其所治經久者冬十月己未有星孛于氐宋本紀解題曰按宋書本紀指尾貫攝提向大角仲月在危季月掃天倉而後滅是嵗魏主薨十一月魏取宋許昌汝陽以吕祖謙標日修魏主殂太平王燾即皇帝位以魏紀修十二月魏封司徒長孫嵩為北平王奚斤為宜都王藍田公長孫翰為平陽王以魏紀修解題曰王爵之輕自此始至唐而卒伍皆王矣通鑑載於魏太延元年書封穆夀等非事始也魏起道士冦謙之道場謙之合老莊神仙符呪為一以吕祖謙標目修解題曰崔浩少好學博覽經史玄象隂陽百家之言無不閡綜研精義理性不好老莊之書每讀不過數十行輒棄之曰此矯誣之説不近人情必非老子所作老聃習禮仲尼所師豈設敗法文書以亂先王之教胡寅曰浩以研精義理得名乃當時之譽云耳其實未嘗精也老莊之學雖或過或不及不得中道大抵皆奧窈宏達彼圖籙真經天宫靜輪之法後世無傳焉且有出於李譜文之作者其劣於老莊明矣浩顧信之而不信老莊烏在其為研精也仲尼焉不學而亦無常師其問於老聃者或以證舊聞或以折疑似或以其絶滅禮學之故而使於答問之際有所啓發非以為師也且禮之因革損益名數形器固自可問矣其絶滅禮學而以為忠信之薄而亂之者固自不足取豈相悖哉浩殆未之識也浩尤不信佛常謂虛誕為世患害左右忌浩正直共排毁之世祖雖知其能不免羣議故浩以公歸第浩纎妍潔白如婦人常自比張良謂已稽古過之既得歸第因欲修服食養性之術浩自比張良故效其𨗳引辟榖而修服食養性之術然此特其迹耳良明哲保身之道非浩所能知也時道士冦謙之好仙道少修張魯之術居嵩嶽有李譜文來臨云老君之玄孫授文録六十餘卷號曰圖籙真經付汝奉持輔佐北方太平真君出天宫靜輪之法能興造克就則起真仙矣李君手筆有數篇謙之奉其書而獻之朝野未全信也浩獨異其言因師事之授其法術上書贊明其事曰臣聞聖王受命則有天應而河圖洛書皆寄言於蟲獸之文未若今日人神接對手筆粲然辭旨深妙自古無比豈可以世俗常談而忽上靈之命世祖欣然乃使謁者奉玉帛牲牢祭嵩嶽崇奉天師顯揚新法起天師道場於京城之東南重壇五層給道士百二十人衣食月設厨會數千人甲子宋太祖文皇帝劉義隆元嘉元年年魏世祖太武皇帝拓跋燾始光元燕馮跋太平十六年始秦乞伏熾磐建𢎞五年真涼沮年渠蒙遜玄十三年夏赫連勃勃興六春正月癸巳朔日有食之宋紀魏改元以魏紀修宋徐羡之等廢廬陵王義真為庶人徙之新安前吉陽令張約之諌尋被殺以通鑑目録修解題曰按列傳徐羡之將廢廬陵王以告檀道濟道濟意不同屢陳不可不見納餘見通鑑夏四月宋召檀道濟及江州刺史王𢎞入朝解題曰江州晉惠初治豫章成帝移尋陽領尋陽今江池興興南康之地豫章隆興瑞袁臨江南康興國之地鄱陽饒徽池信撫之地廬陵撫吉安臨江之地安成袁吉安臨江之地南康贛吉安南安之地南新蔡僑置建安建寧信延平邵武之地晉安建寧福泉漳汀延平興化之地郡九五月乙酉徐羡之傅亮謝晦廢其主為營陽王遷之吳郡六月遣傅亮迎宜都王義隆于江陵癸丑弒營陽王解題曰按列傳傅亮帥百僚奉迎宜都王蔡廓亦俱行至尋陽遇疾不前亮詣廓别廓曰營陽在吳宜厚加供奉不幸營陽卿諸人有弒主之名欲立於世將可得耶時亮已與羡之議害少帝乃馳信止之信至已不及羡之大怒曰與人共計議奈何裁轉背便賣惡於人餘見通鑑廓之言即霍光勑左右謹護昌邑之言也光猶不免於赤族况羡之輩乎昔伊尹之告太甲反覆懇到惟恐其陷於過其以欲縱敗度禮則放之既又從而復之營陽失德羡之輩居受遺之任未聞一語諌教殆養成其惡以為藉手之資廢徙未幾旋行戕賊豈非不學之過歟鄭鮮之方謂觀徐傅議論不復以學問為長豈其然乎殺前廬陵王義真解題曰羡之等連斃二王有若刲孤豚蓋習見零陵王之事而不以為怪也事見通鑑謝晦都督荆湘等州軍事荆州刺史以吕祖謙標目修解題曰薛季宣曰宋鎮荆州者十一人唯謝晦朱修之沈攸之三異姓耳初髙祖用義隆次謝晦晦元嘉三年反誅次義康次義恭次義慶次義宣義宣孝建元年反誅次朱修之次子頊以應子勛誅次休佑次休若泰始七年皆誅次沈攸之反誅秋八月丙申宋宜都王義隆至建康丁酉即皇帝位改元解題曰事見通鑑宋庠紀年通譜元嘉本漢桓帝年號癸卯徐羡之為司徒其餘除拜有差以本紀修宋以鎮西長史王曇首為侍中右衛將軍司馬王華為侍中南蠻校尉到彥之為中領軍以紀傳修解題曰文帝既以王華為領軍將軍又以彥之為中領軍蓋用漢文任宋昌張武故事也雖人情事勢之所使然其示天下亦不廣矣事見通鑑九月丙子宋立妃袁氏為皇后本紀冬十二月夏太子璝殺其弟酒泉公倫倫兄太原公昌襲璝殺之以朱熹綱目修宋太祖文皇帝元嘉二年年魏世祖太武皇帝始光二燕馮跋太平十七年秦乞伏熾磐建𢎞六年昌涼沮渠蒙遜玄始十四年夏赫連承光元年春正月宋徐羡之傅亮歸政以吕祖謙標目修三月丙寅魏主尊保母竇氏為保太后以吕祖謙標目修魏以長孫嵩為太尉長孫翰為司徒奚斤為司空以本紀修夏六月武都王楊盛卒以列傳修秋八月夏主勃勃卒太子昌即帝位改元以吕祖謙標目修冬十月癸卯魏伐柔然以魏紀修十一月宋以武都世子楊玄為王以通鑑修宋太祖文皇帝元嘉三年年魏世祖太武皇帝始光三燕馮跋太平十八年秦乞伏熾磐建𢎞七年昌涼沮渠蒙遜玄始十五年夏赫連承光二年春正月宋徐羡之傅亮伏誅遣到彥之征北將軍檀道濟討謝晦以吕祖謙標目修丁卯宋車騎大將軍江州刺史王𢎞為司徒録尚書事揚州刺史驃騎將軍開府南徐州刺史彭城王義康都督荆湘等八州軍事荆州刺史以紀傳通鑑修解題曰按州郡志晉永嘉大亂流民過淮亦有過江在晉陵者郤鑒又徙流民之在淮南者於晉陵諸縣其徙江南及留江北者並僑立郡縣徐兖或治江南或治江北江北又立幽冀青並四州義熙七年始分淮北為北徐淮南為徐州後又以幽冀合徐青并合兖永初二年加徐曰南徐而淮北曰徐元嘉八年以江北為南兖江南為南徐故南徐備有徐兖幽冀青并揚七州郡邑領南東海今鎮江揚常江隂之地南琅琊今屬建康晉陵鎮江平江常州江隂之地義興常安吉江隂之地南蘭陵屬建康南東莞僑置臨淮今屬常州淮陵屬常州南趨城屬建康南清河僑置南髙平僑置南平昌僑置南濟隂僑置南濮陽僑置南泰山僑置南濟陽僑置南魯僑置郡十七二月庚申宋主討謝晦戊辰到彥之等大破晦軍丙子宋主還晦尋伏誅以本紀修解題曰按列傳晦至江口到彥之已到彭城洲在今嶽州巴陵縣東北庾登之據巴陵畏懦不敢進會霖雨停軍十五日乃攻蕭欣於彭城洲中兵參軍孔延秀率三千人進戰甚力欣於陳後擁盾自衛又委軍還船於是大敗延秀又攻洲口柵陷之彥之退保隱圻即隱磯水經江水自彭城磯東徑如山北注謂彭城磯北對隱磯江中有大石孤立按嶽陽志江水又北東徑彭城口過臨湘縣初晦與徐羡之傅亮謀為自全之計晦據上流而檀道濟鎮廣陵各有強兵以制朝廷羡之亮於中秉權可得持久及太祖將行誅王華之徒咸云道濟不可信太祖曰道濟止於脅從本非事主殺害之事又所不關吾召而問之必異於是詔道濟入朝授之以衆委之西討晦聞羡之等死謂道濟必不獨全及聞率衆來上惶懼無計晦初上表曰雖未知臣道濟問推理即事不容獨存又上表曰羡之亮橫被酷害并及臣門雖未知道濟存亡不容獨免晦以為道濟信死矣及聞其率衆來上所以惶懼也道濟既至與彥之軍合牽艦緣岸晦始見艦數不多輕之不即出戰至晚因風帆上前後連咽西人離阻無復鬭心臺軍至忌置洲尾水經江水又東左得二夏浦酈注夏浦俗謂之西江口又東徑忌置山南山東即隱口浦江之右岸有城陵山按圖經城陵山在嶽州東北五十里又嶽陽志江水徑城陵山下過道人磯與别港合則忌置洲蓋與城陵山道人磯相邇也列艦過江晦大軍一時潰散餘見通鑑夏五月乙未宋南兖州刺史檀道濟都督江州之江夏豫州四郡軍事征南大將軍江州刺史到彥之為南豫州刺史以本紀修六月宋以王華為中護軍時宰相無常官尚書令僕中書監令侍中侍郎給事中凡帝所與論政事者皆要官當時號華與侍中劉湛王曇首殷景仁黃門侍郎謝𢎞微為五臣以通鑑修解題曰按通典宋齊梁陳丞相相國多非常人臣之職或掌機密或録尚書或綜朝權或管朝政或為侍中或給事中或受顧命皆為宰相然中書機務之司不必他名亦為宰相其有侍中兼外官若王𢎞侍中兼內官若沈演之其例不少即非宰相並在當時委任而已又按列傳上欲封曇首等會宴集舉酒勸之因拊御床曰此坐非卿兄弟無復今日時封詔已成出以示曇首曇首曰近日之事賴陛下英明速斷故罪人斯戮臣等雖得仰憑天光效其毫露豈可因國之災以為身幸陛下雖欲私臣當如直史何上不能奪餘見通鑑胡寅曰易曰聖人之大寶曰位又曰崇髙莫大乎富貴此非以利言也中天下而立負黼扆而朝所謂天位也普天之下莫非王土非私富也天生民而立之君非私貴也以天德居天位貴為天子而富有天下天地之常經古今之通義也王者之迹熄而正心誠意之學不傳於是乎由欲而滅理徇利而忘義以富貴寶位為己私於是位不為寶富貴不足以崇髙而人之大彝泯矣文帝拊床自慶一何其所見之褊而度量之隘乎曇首之對亦微足以警之矣秋八月秦攻河西夏襲秦秦師還以通鑑修宋大旱蝗以本紀修九月魏攻夏蒲坂陜城冬十月丁巳魏主襲夏十一月壬午入統萬城别將克蒲坂長安以魏紀修是嵗魏以漏户屬郡縣以通鑑修宋太祖文皇帝元嘉四年年魏世祖太武皇帝始光四燕馮跋太平十九年秦乞伏熾磐建𢎞八年昌涼沮渠蒙遜玄始十六年夏赫連承光三年春正月乙酉魏主還以通鑑修夏五月魏主伐夏以魏紀修宋王華卒以本紀修六月癸卯朔日有食之以本紀修甲辰夏主昌及魏戰于城下軍潰奔上邽乙巳魏取統萬秋八月魏主還以吕祖謙標目朱熹綱目修九月丁酉夏安定降魏以魏紀修冬十一月魏封楊玄為南秦王以朱熹綱目修晉前彭澤令陶潛卒以晉宋列傳修解題曰按宋書列傳陶潛字淵明或云淵明字元亮侃之曽孫少有髙趣嘗著五栁先生傳以自况親老家貧起為州祭酒不堪吏職少日自解歸州召主簿不就躬耕自資遂抱羸疾江州刺史檀道濟請候之謂曰賢者處世奈何自苦如此對曰潛也何敢望賢志不及也道濟饋以粱肉麾而去之為彭澤令不以家纍自隨郡遣督郵至縣吏曰應束帶見之潛歎曰我不能為五斗米折腰向鄉里小人即日解印綬去賦歸去來以遂其志義熙末徵著作佐郎不就潛弱年薄宦不潔去就之迹自以曽祖晉世宰輔恥復屈身後代自宋武帝王業漸隆不復肯仕所著文章皆題年月義熙以前則書晉氏年號自永初以來唯云甲子而已卒號靖節先生宋太祖文皇帝元嘉五年年魏世祖太武皇帝神麚元燕馮跋太平二十年秦乞伏暮末永𢎞元年定涼沮渠蒙遜玄始十七年夏赫連勝光元年春正月戊子宋大火以本紀修二月魏改元以本紀修解題曰按靈證志時定州獲白麚故改元夏主昌自平涼進攻安定兵敗被擒其弟平原公定奔平涼即帝位改元魏兵追之三月敗於馬髦嶺夏復取安定長安以吕祖謙標目修解題曰馬髦嶺在今渭州平涼縣西載記苻登奔平涼集遺衆入馬毛山元和郡縣志寰宇記作馬屯山字之訛也夏五月秦王熾磐卒子暮末立改元以吕祖謙標目修宋王𢎞遜位降為衛將軍開府以本紀修解題曰按列傳左光祿大夫范泰謂𢎞曰天下務廣而權要難居卿兄弟盛滿當深存謙挹彭城王帝之次弟宜徵入朝共參朝政時旱災未巳加以疾疫𢎞引咎遜位平陸令成粲與𢎞書曰周之宗盟異姓為後權軸之要任歸二南彭城王道德昭備上之懿弟所應推先𢎞本有退志由是固有陳請胡寅曰親賢並用古今通義也然用親故亦以賢為尚非専取其親也取親而不擇賢晉之事可鑑矣義康吏能足稱豈有道德可居輔相之地耶泰粲忠於王𢎞宜勸使博求賢人與共天位乃猥以義恭為言於是乎志正而識近矣六月河西圍秦樂都秦請和乃還以通鑑修冬十一月乙未朔日有食之十二月河西復侵秦以通鑑修宋太祖文皇帝元嘉六年年魏世祖太武皇帝神麚二燕馮跋太平二十一年遜秦乞伏暮末永𢎞二年勝涼沮渠蒙承玄元年夏赫連定光二年春正月宋彭城王義康都督揚南徐兖州軍事司徒録尚書事平北將軍徐州刺史撫軍將軍徐州刺史江夏王義恭為散騎常侍都督荆湘等八州軍事荆州刺史以吕祖謙標目修解題曰按列傳義恭涉獵文義而驕奢不節太祖與書誡之曰汝以弱冠便親方任天下艱難國家事重雖曰守成實亦未易豈可不感尋王業深自砥礪思而後行開布誠心厝懷平當親禮國士友接佳流識别賢愚鑑察邪正然後盡君子之心收小人之力汝性褊急性之所滯其欲必行意所不在從物回改此最弊事豁達大度漢祖之德猜忌𥚹急魏武之纍衛青遇士大夫以禮與小人有恩西門安于矯性齊美關羽張飛任偏同弊深宜鑑此若事異今日嗣子幼蒙司徒便當周公之事汝不可不盡祇順之理爾時安危天下決汝二人耳汝一月日自用不可過三十萬若能省此益美西楚殷曠常宜早起接對賔佐勿使留滯府舍住止計當無須改作凡訊獄多決當時難可逆慮此實為難訊前一二日取訊簿密與劉湛輩共詳至訊日虛懷博盡慎無以喜怒加人能擇善者而從之美自歸已不可專意自決以矜獨斷之明也刑獄不可擁滯一月可再訊人有至誠所陳不可漏泄以負忠信之款也名器深宜慎惜不可妄以假人昵近爵賜尤應裁量吾於左右雖為少恩如聞外論不以為非聲樂嬉遊不宜令過蒲酒漁獵一切勿為供用奉身皆有節度竒服異器不宜興長宜數引見佐吏非唯臣主自應相見不數則彼我不親無因得盡人也觀此書則元嘉之規模略可見矣三月丁巳宋立劭為皇太子以吕祖謙標目修夏四月魏命太常卿崔浩為國書以通鑑修庚寅魏主伐柔然以魏紀修解題曰事見通鑑林之竒曰違衆議而用人之䇿以決大事此誠天下之至難善用人之策則如晉武之於杜預魏太武之於崔浩隋文帝之於賀若弼不善用之則如晉顯宗之於庾亮苻堅之於慕容垂晉出帝之於薛文遇五月壬辰朔日有食之本紀河西伐秦六月秦敗之以通鑑修魏大破柔然以吕祖謙標目修秋七月武都王楊玄卒其弟難當廢其子保宗自立以通鑑修八月魏主擊髙車降之冬十月徙柔然髙車降民於漠南以吕祖謙標目修十一月己丑朔日有食之不盡如鈎星晝見以紀志修十二月河西吐谷渾遣使貢宋以本紀修解題曰水經注闞駰十三州志廣大坂在抱罕西北罕开在焉吐谷渾自燕厯隂山西馳而居於此秦地震以通鑑修是嵗河西改元以通鑑目録修解題曰通鑑目録是嵗河西王蒙遜改元承玄通鑑不書宋太祖文皇帝元嘉七年年魏世祖太武皇帝神麚三燕馮跋太平二十二年遜秦乞伏暮末永𢎞三年勝涼沮渠蒙承玄二年夏赫連定光三年春三月戊子宋遣將軍到彥之王仲德等自清水入河以伐魏以宋魏本紀修甲寅宋前軍中領軍殷景仁為領軍將軍本紀夏六月己卯宋以揚難當為武都王以紀傳修秋七月宋到彥之至須昌魏攝碻磝滑臺虎牢洛陽戍兵北渡彥之緣河屯守八月丙寅遣將渡河魏將軍安頡破之以吕祖謙標目修解題曰須昌故城在今東平府須城縣東三十里事見通鑑碻磝在濟州盧縣北一里輿地廣記盧縣故城在鄆州陽穀縣西北九月燕王跋卒其弟司徒𢎞殺太子翼而自立以吕祖謙標目修甲辰魏主伐夏以通鑑修冬十月戊午宋鑄四銖錢本紀丙子魏安頡取洛陽辛巳取虎牢以吕祖謙標目修秦王暮末逼於河西走保南安地入吐谷渾以吕祖謙標目修十一月己酉魏主圍夏主定於鶉觚原以通鑑修解題曰今涇州良原縣本漢鶉觚縣地古密國有白石原首起縣西南三十里東下分為兩原壬辰宋遣檀道濟督諸軍北討甲午魏軍濟河到彥之走以吕祖謙標目修解題曰殿中將軍垣護之隨到彥之北伐彥之將回師護之為書諌曰殘虜畏威望風奔迸八載侵地不戰克復方當長驅朔漠窮掃遺醜况乃自送無假逺勞宜使竺靈秀速進滑臺助朱修之固守節下大軍進擬河北則牢洛遺冦自然奔退昔人有連年攻戰失衆乏糧者猶張膽爭前莫肯輕退况今青州豐穰濟漕流通士馬飽逸威力無損若空棄滑臺坐喪成業豈是朝廷受任之旨彥之不納餘見通鑑李舜臣曰宋文帝大舉北伐而魏人遽斂戍相避此豈其情也哉觀崔浩欲縱使北來徐取於秋髙馬肥之際而魏主亦欲躬自往擊於冬寒地淨之時此其謀甚不可忽也使彥之輩勵兵秣馬以攻為守東道衝冀西道指鄴如此則敵常備我之不暇而何暇於攻哉列守河南東西二千里一處不過數千祗足為敵人之餌爾而謂之知兵可乎方魏之伐蠕蠕也其國人皆謂宋師南侵而捨之北伐此危道也當時既不知搗其虛及魏之伐赫連也其國人又謂宋師皆在河中若捨之西行則失山東矣又不能乘其隙魏人既舉蠕蠕赫連旁無後憂然後致疾於我雖有智者不知所以為計矣夏主定走保上邽魏取安定隴西以吕祖謙標目魏紀修辛丑魏攻滑臺以魏紀修魏叔孫建都督冀青等四州軍事以通鑑修己酉魏主圍夏主定於鶉觚原以通鑑修十二月丁卯魏克夏平涼取關中以魏紀修宋到彥之王仲德下獄免官以通鑑修宋王曇首卒以列傳修宋太祖文皇帝元嘉八年年魏世祖太武皇帝神麚四燕馮𢎞大興元年秦乞伏暮末永𢎞四年定涼沮渠蒙遜義初元年夏赫連勝光四年春正月壬午朔燕改元以吕祖謙標目修解題曰宋庠紀年通譜太興本晉元帝年號宋檀道濟救滑臺丁酉大破魏師于夀張以紀傳修解題曰夀張今東平屬縣夏取南安執秦王暮末以歸殺之以吕祖謙標目修解題曰按載記始國仁以晉太元十年僣位至暮末四世凡四十六載而滅宋庠紀年通譜乞伏上距國仁通乾歸降姚興復自立四十七年矣二月辛酉魏取滑臺以吕祖謙標目修癸酉魏主還以朱熹綱目修宋檀道濟軍還丁丑青州刺史蕭思話奔平昌以本紀修解題曰按宋書州郡志平昌郡魏文帝分城陽立今密州夏六月夏主定擊河西吐谷渾邀而執之以吕祖謙標目修閏七月魏請昏于宋自是聘使不絶以吕祖謙標目修宋撫軍長史劉湛為太子詹事給事中參知政事以吕祖謙標目修秋九月庚申魏特進光祿大夫崔浩為司徒以本紀修癸亥魏以河西王蒙遜為涼王以本紀修解題曰北涼自是稱涼壬申魏徵世胄名士以朱熹綱目吕祖謙標目修解題曰本紀詔曰頃方夏未寧戎車屢駕今二冦摧殄將偃武修文理廢職舉逸民拔起幽窮延登雋乂昧旦思求想遇師輔雖殷宗之夢版築罔以加也訪諸有司咸稱范陽盧玄博陵崔綽趙郡李靈河間邢穎勃海髙允廣平遊雅太原張偉等皆賢雋之胄冠冕州邦皆羽儀之用詩不云乎鶴鳴于九皋聲聞于天庶得其人任之政事共臻雍熙之化易曰我有好爵吾與爾縻之如玄之比隱迹衡門不耀名譽者盡敕州郡以禮發遣遂徵玄等及州郡所遣至者數百人皆差次敘用明年髙允同徵盧玄崔綽廣寧燕崇常陟勃海髙毗李歆博陵許堪京兆杜銓韋闔趙郡李詵李靈李遐太原張偉范陽祖邁祖侃中山劉策常山許琛西河宋宣燕郡劉遐河間邢穎勃海高濟雁門李熙廣平遊雅博陵崔建西河宋愔長樂潘天符杜熙中山張綱上谷張誕鴈門王道雅閔弼中山郎苗上谷侯辨趙郡吕季才冬十月戊寅魏崔浩更定律令以魏紀修是嵗涼改元以通鑑修解題曰宋庠紀年通譜蒙遜受魏涼州牧涼王之號故改元宋太祖文皇帝元嘉九年年魏世祖太武皇帝延和元燕馮𢎞大興二年涼沮渠蒙遜義和二年春正月丙午魏尊保太后為皇太后立貴人赫連氏為皇后子晃為皇太子改元以本紀修解題曰按魏書皇后傳序太祖追尊祖妣皆從帝諡為皇后始立中宫餘妾或稱夫人多少無限然皆有品次世祖稍增左右昭儀及貴人椒房中式數等後庭漸已多矣又世祖髙宗緣保母劬勞之恩並極尊崇之義髙祖改定內官左右昭儀位視大司馬三夫人視三公三嬪視三卿六嬪視六卿世婦視中大夫御女視元士後置女職以典內事內司視尚書令僕作司大監女侍中三官視二品監女尚書美人女史女賢人書史書女小書女五官視三品中才人供人中使女生才人恭使宫人視四品春衣女酒女饗女食奚官女奴視五品二月壬申吐谷渾送故夏主定于魏魏殺之以吕祖謙標目修解題曰按晉書載記自勃勃至定凡二十有六載而亡王容曰赫連三主二十五年胸奴左賢王劉毅之子淵興于汾晉而右賢王去罕之孫劉虎亦興于北方淵之後既衷而虎之後赫連勃勃浸盛至是亦滅矣夏六月戊寅宋彭城王義康改領揚州刺史以本紀修宋分青州置冀州以吕祖謙標目修吐谷渾王慕璝告捷于宋封為隴西王以通鑑修庚寅魏主伐燕以魏本紀修秋七月庚午宋以殷景仁為尚書僕射劉湛為領軍將軍以本紀修宋妖賊趙廣反於蜀以本紀修魏主圍燕和龍取十部九月乙卯還以吕祖謙標目修趙廣推程道養為蜀王圍成都以吕祖謙標目修解題曰程道養改元泰始宋庠紀年通譜泰始本晉武帝年號冬十二月燕故太子崇以遼西降魏以稽古録修宋益州參軍裴方明破趙廣以列傳修解題曰益州領蜀宋成都府簡普彭三州懷安軍之地廣漢成都潼川二府漢彭二州懷安軍之地巴西順慶潼川二府閬巴蓬三州廣安石泉二軍之地梓橦隆慶潼川二府綿州石泉軍之地遂寧遂寧府普漢二州之地江陽屬眉州懷寧屬成都府寧蜀潼川成都二府茂隆二州之地越嶲敘州嶲州之地汶山彭州永康軍之地南隂軍屬漢州犍為嘉定紹熙崇慶三府敘眉資普隆五州長寧軍之地始康屬成都府晉熙漢州晉原崇慶嘉定二府黎卭雅三州永康軍之地宋寧屬成都府安固僑置南漢中屬漢州北隂平屬隆慶州武都屬同慶府新城屬潼川府南新巴僑置南晉夀屬彭州宋興屬成都府南宕渠渠巴蓬達四州廣安軍之地天水僑置東江陽屬紹熙府資瀘昌三州長寧軍富順監之地沈黎黎州嶲州之地郡二十九宋太祖文皇帝元嘉十年年魏世祖太武皇帝延和二燕馮𢎞大興三年涼沮渠牧犍永和元年春二月庚午魏封馮崇為遼西王以魏本紀修宋裴方明擊程道養大敗走之以通鑑修夏四月涼王蒙遜卒子牧犍立改元魏封為河西王以吕祖謙標目修五月宋裴方明軍涪城趙廣等奔散以吕祖謙標目修秋九月戊午魏封楊難當為南秦王冬十一月丁未楊難當陷漢中以吕祖謙標目修解題曰楊難當改元建義宋庠紀年通譜建義本乞伏國仁年號漢中自晉建興二年陷于李雄三十三年而復康寧元年陷于苻堅十三年而復義熙元年楊盛據之九年而復宋元嘉十年楊難當陷之未幾而復梁天監四年元魏陷之三十一年而復承聖元年西魏復陷之厯陳而不能復十二月宋前臨川內史謝靈運伏誅以列傳修解題曰靈運家世為晉元勳屈身劉氏非其本心也觀其詩云韓亡子房奮秦帝魯連恥又臨終作詩云龔勝無餘生李業有終盡其意亦略可觀矣廣州之刑野史謂靈運舍司馬協少子正寢酣笑不止文帝聞而隱之諷主者劾以瀆貨史皆沒而不書餘見通鑑魏立徐州於外黃以吕祖謙標目修解題曰外黃在今開封雍丘縣東六十里甲戌宋太祖文皇帝元嘉十一年魏世祖太武皇帝延和三年燕馮𢎞大興四年犍涼沮渠牧永和二年春二月丁卯魏寬徭賦以魏本紀修宋梁南秦二州刺史蕭思話破楊難當閏三月復漢中以通鑑本紀修魏殺赫連昌以吕祖謙標目修辛巳燕王𢎞稱藩于魏以朱熹綱目修夏五月戊寅宋以沮渠牧犍為河西王以本紀修六月辛亥魏伐燕以魏本紀修宋太祖文皇帝元嘉十二年魏世祖太武皇帝太延元年燕馮𢎞大興五年涼沮渠牧犍永和三年春正月己未朔日有食之以本紀修燕王𢎞稱藩于宋癸酉詔封之以本紀修甲申魏改元以魏本紀修夏四月宋加殷景仁中書令中護軍以通鑑修六月戊申魏伐燕以魏本紀修宋大水賑恤禁酒以南史本紀修冬宋禁擅鑄佛像造塔寺以通鑑修宋太祖文皇帝元嘉十三年魏世祖太武皇帝太延二年燕馮𢎞大興六年涼沮渠牧犍永和四年春宋徴司空檀道濟三月己未併其諸子殺之以吕祖謙標目修解題曰以討謝晦之事觀之文帝未必有殺道濟之心殺之者劉湛也事見通鑑魏伐燕以吕祖謙標目修楊難當稱秦王改元以吕祖謙標目修夏五月乙卯燕王𢎞奔髙麗以吕祖謙標目修解題曰跋以晉安帝義熙五年僣號至𢎞二世凡二十八載秋七月魏伐楊難當九月走之以吕祖謙標目修宋太祖文皇帝元嘉十四年魏世祖太武皇帝太延三年涼沮渠牧犍永和五年夏四月趙廣降宋以通鑑修二月己丑魏詔吏民得告守令罪以魏本紀修是嵗西域十六國朝貢于魏以魏本紀修解題曰按三國志注西戎傳漢初開西域道時有三十六國後分為五十餘建武以來更相吞滅今有二十從燉煌玉門關入西域前有二道今有三道從玉門西出經婼羌轉西越蔥嶺經懸度入大月氏為南道從玉門西出發都護并回三隴沙北頭經居盧倉從沙西井轉西北過龍堆到故接蘭轉西詣龜兹至蔥嶺為中道從玉門西北出經橫坑辟三隴沙及龍堆出五船北到車師界戊巳校尉所治髙昌轉西與中道合龜兹為新道後魏西域傳散騎侍郎董琬髙明等出鄯善凡所經見及傳聞太延中十六國分其地為四域自黃嶺以東流沙以西為一域黃嶺以西海曲以東為一域者舌以南月氏以北為一域兩海之間水澤以南為一域內諸小渠長蓋以百數其出西域本有二道後更為四出自玉門渡流沙西行二千里至鄯善為一道自玉門渡流沙北行二千二百里至車師為一道從莎車南行一百里至蔥嶺蔥嶺西一千三百里至伽倍為一道自莎車西南五百里蔥嶺西南一千三百里至沙路為一道南史列傳隋裴矩西域圖記自燉煌至西海凡三道北道從伊吾經蒲類海鐵勒部突厥可汗庭渡北流河至拂菻國達西海中道從髙昌焉耆龜兹疏勒度蔥嶺又經鏺汗蘇勒沙那國康國曹國何國安國穆國至波斯達西海南道從鄯善于闐朱俱波喝盤陀度蔥嶺又經護密吐火羅挹忛延漕國至北波羅門達西海宋太祖文皇帝元嘉十五年魏世祖太武皇帝太延四年涼沮渠牧犍永和六年春三月癸未魏罷沙門年五十已下以魏本紀修馮𢎞遣使求迎于宋髙麗殺之以吕祖謙標目修秋七月魏主伐柔然以魏紀傳修冬十一月丁卯朔日有食之以通鑑修十二月宋立玄史文儒四學以通鑑修宋主仁厚恭儉勤於為政百官久於其職守宰皆六期四境晏安户口蕃息後之言治者稱元嘉焉以通鑑修宋太祖文皇帝元嘉十六年魏世祖太武皇帝太延五年涼沮渠牧犍永和七年春正月庚寅宋彭城王義康為大將軍領司徒以本紀修三月楊保宗奔魏庚寅魏以為武都王守上邽以魏紀修夏六月甲辰魏主伐河西以通鑑修秋九月丙戌魏拔姑臧河西王牧犍降酒泉太守沮渠無諱奔燉煌以吕祖謙標目修解題曰按載記蒙遜以晉安帝隆安元年稱州牧義熙八年僣位元嘉十年死子為魏所擒合三十九載而滅王容曰胸奴之後興于晉末惟赫連沮渠至是滅矣五胡之後宋初尚有六國至是秦燕涼夏之地皆入于魏魏獨盛矣戊子柔然襲魏不克而還以魏紀傳修冬十月癸亥魏張掖王秃髮保周叛以魏紀修十二月宋東宫置兵與羽林等以通鑑修解題曰胡寅曰善養太子者使之近正人見正事聞正言凡異端詭道無自入焉否則漢武為戾園置博望苑而敗矣太子之職舍問安侍膳守軍監國餘無事焉否則楚成為商臣置宫甲而敗矣此二端前監甚明文帝皆犯之使太子延賔客盛兵衛是𨗳之於亂也薛季宣曰時北伐再敗邑里蕭條唯荆州尚存衆卒十萬帝深思所以制之乃更東宫之兵至與羽林相若不知一旦禍起於父子之間非獨劭凶忍亦勢之使然也事見通鑑魏除田禁以朱熹綱目修魏以涼州索敞為中書博士常爽為河西右相時魏方尚武功貴遊不以講學為意敞勤於誘𨗳爽置館教授儒風始振以吕祖謙標目修宋太祖文皇帝元嘉十七年元年魏世祖太武皇帝太平真君春三月沮渠無諱陷魏酒泉遂冦張掖以吕祖謙標目修夏四月戊午朔日有食之以紀六月魏改元以魏紀修解題曰宋庠紀年通譜皇孫生故大赦改元魏討秃髮保周殺之以通鑑修秋七月丙申魏太后殂通鑑壬子宋皇后殂以本紀修八月甲申沮渠無諱降於魏以通鑑修冬十月戊午宋誅劉湛父子及其黨八人解題曰按列傳湛所生母亡伏甲於室以待上臨弔謀又泄竟弗之幸十月詔收付廷尉餘見通鑑劉湛等結黨欲排廢殷景仁司徒掾沈演之雅仗正義與湛等不同湛因讒之於義康嘗因論事不合義康變色曰自今而後我不復相信演之與景仁素善盡心于朝廷太祖甚嘉之以為尚書吏部郎彭城王義康罷為江州刺史鎮豫章司空征北將軍開府南兖州刺史江夏王義恭為司徒録尚書事護軍將軍殷景仁為揚州刺史十一月癸丑景仁卒以本紀舉要厯補遺修十二月宋後軍長史范煜吏部郎沈演之為左右衛將軍後將軍司馬庾炳之為吏部郎參機密以列傳修解題曰按列傳左衛將軍范煜任參機密吏部尚書何尚之察其意趣異常白太祖宜出為廣州若在內釁成不得不加鈇鉞屢誅大臣有虧皇化上曰始誅劉湛等方欲超升後進煜事迹未彰便豫黜斥萬方將謂卿等不能容才以我為信受讒説但使共知如此不憂致大變也餘見通鑑程頥易傳曰姤初六繫于金柅貞吉有攸往見凶羸豕孚蹢躅姤隂始生而將長之卦制之當於其微而未盛之時豕隂躁之物雖羸而在下然其心常在乎蹢躅而消陽止之以金柅而又繫之使不得進則吉使之進而往則害陽見凶矣曄之事是也是嵗楊難當復稱武都王以吕祖謙標目修宋太祖文皇帝元嘉十八年二年魏世祖太武皇帝太平真君春正月癸卯魏以沮渠無諱為酒泉王以通鑑目録修甲辰宋彭城王義康都督江交廣三州軍事前龍驤參軍扶令育諌賜死以通鑑目録修夏四月魏伐酒泉冬十一月庚子拔之以魏紀修楊難當冦蜀十二月宋遣梁秦二州刺史劉真道將軍裴方明討之以吕祖謙標目修解題曰按州郡志梁州漢為益治廣漢雒縣魏立梁州治漢中江左於襄陽僑立李氏滅復舊譙縱刺史治魏興縱滅治漢中苞中縣元嘉十年治南鄭領漢中宋興元府洋州之地魏興金均二州之地新興未詳新城襄陽府房州之地上庸金房二州之地晉壽隆慶府利閬巴三州大安軍之地華陽興元府之地新巴利州之地北巴西未詳北隂平僑置南隂平僑置巴渠達州之地懷安寄治州下宋熙利閬二州白水僑置南上洛均州之地北上洛金州之地安康金州之地南宕渠僑置懷漢未詳郡二十秦州晉治天水冀縣孝武寄治襄陽安帝在南鄭領武都略陽安固西京兆南太原南安馮翊隴西始平金城安定天水西扶風北扶風并僑置郡十四宋太祖文皇帝元嘉十九年三年魏世祖太武皇帝太平真君春正月甲申魏主至道壇受符籙自是每帝即位行之以魏紀修夏四月沮渠無諱據鄯善李皓孫寶據燉煌以吕祖謙標目修五月庚寅宋劉真道裴方明平仇池立揚保熾揚難當奔魏秋七月丙寅魏救之以吕祖謙標目修甲戌晦日有食之本紀九月沮渠無諱據髙昌宋封為河西王以吕祖謙標目修冬十月甲申柔然聘宋以本紀修十二月丙申宋詔兖州修孔子廟以本紀修魏封李寶為燉煌公以魏紀修宋雍州蠻叛以通鑑修解題曰雍州晉孝武於襄陽僑立領襄陽今襄陽府南陽鄧唐二州新野襄陽鄧州棗陽信陽之地順陽屬鄧州京兆屬襄陽始平屬均州扶風襄陽光化之地南上洛僑置河南唐鄧棗陽廣平鄧唐光化之地義成屬襄陽馮翊屬郢州荆門南天水屬襄陽建昌未詳華山屬襄陽北河南屬鄧州𢎞農未詳郡十七齊州郡志晉太元雍州刺史始督秦州未有刺史隆安二年郭銓始為梁南秦州刺史元興荆州都督常督秦州梁州帶南秦州義熙以氐王為北秦州刺史十四年置東秦州刺史永明郡國志秦州寄治南鄭不曰南北元嘉計偕荆州都督常督二秦梁南秦一刺史是則志所載秦州為南秦氐為北秦魏殺尚書李順以列傳修解題曰按魏書南史列傳世祖將討赫連昌謂崔浩曰朕前北征李順獻策數事實合經略大計今欲使總攝前驅之事卿以為如何浩曰順智足周務然性果於去就不可専委乃止沮渠蒙遜內附世祖欲精簡行人崔浩曰李順即其人也以為太常策拜蒙遜使還世祖問蒙遜往復辭及其政得失順曰蒙遜不復周矣既而蒙遜死寵待彌厚政之巨細無所不參浩惡之順使涼州十有二返世祖稱其能而蒙遜數與順遊晏頗有悖言恐順泄之以金寶納順懷中故蒙遜罪釁不聞浩知之密言於世祖未之信太延三年順復使涼州及還世祖問以將平河右計順以民勞既久不可頻動從之五年議征涼州順以涼州乏水草與浩廷諍世祖從浩議及至姑臧甚豐水草世祖謂浩曰卿昔所言今果驗矣浩曰臣之所言虛實皆如此類猶以寵舊未加其罪詔順差次群臣賜以爵位順頗受納品第不平涼州人發其事浩又毁之云順不忠若是反言臣讒之於陛下世祖大怒遂刑之於城西後數年浩誅世祖謂其從父弟孝伯曰卿兄雖誤國朕意亦未便至此由浩譛毁朕忿遂盛殺卿兄者浩也宋太祖文皇帝元嘉二十年四年魏世祖太武皇帝太平真君春二月魏取仇池以吕祖謙標目修夏四月魏殺楊保宗楊文德自號仇池公以魏紀修六月庚寅魏復民資賦三年以魏紀修秋七月癸丑宋以楊文德為武都王以本紀修甲子宋殺前雍州刺史劉真道梁南秦二州刺史裴方明以吕祖謙標目修解題曰按索虜傳魏主燾與太祖書曰彼前使裴方明取仇池既得疾其勇功不能容有臣如此尚殺之烏得與我校耶前日檀道濟之死魏既有吳子輩不足憚之言今又殺裴方明以快敵人之心借曰藏匿金寶罪在不貸獨無議功之法乎欲圖中原乃先自廢其人此所以召飲江之禍也事見通鑑九月魏主襲柔然以魏紀修冬十一月宋將軍薑道盛及楊文德攻魏敗績以本紀修甲子魏詔太子晃總百揆功臣歸第以魏紀修甲申宋太祖文皇帝元嘉二十一年年魏世祖太武皇帝太平真君五春正月戊申魏禁私養沙門巫覡以魏紀修庚戌魏詔王公已下子詣太學百工騶卒之子不聽私立學校以魏紀修二月己丑宋江夏王義恭為太尉領司徒以本紀修夏六月宋大水以宋書五行志修沮渠無諱卒弟安周立以通鑑目録修魏罷胡神祀以通鑑修秋八月戊辰宋以征西大將軍荆州刺史衡陽王義季為征北大將軍開府南兖州刺史征北將軍南徐州刺史南譙王義宣為車騎將軍荆州刺史以本紀修魏伐吐谷渾其王奔白蘭以吕祖謙標目修冬十月宋徙兖州鎮須昌冀州鎮厯下以通鑑修解題曰今濟南府厯城縣齊厯下城也是嵗李寶朝于魏魏留之以通鑑修宋太祖文皇帝元嘉二十二年年魏世祖太武皇帝太平真君六春正月辛卯朔宋始用元嘉厯本紀壬辰宋以撫軍將軍南豫州刺史武陵王駿為雍州刺史以本紀修解題曰按本紀自晉江左以來襄陽未有皇子重鎮時帝欲經略關河故有此授列傳二十三年何承天上表稱去嵗三王出鎮思振逺圖則武陵南譙衡陽之出鎮皆伐魏之張本也餘見通鑑二月魏詔中書以經義決疑獄以本紀修夏四月魏擊吐谷渾以魏紀修魏伐鄯善以魏紀修六月戊子朔日有食之通鑑目録宋罷南豫州入豫州辛亥南豫州刺史南平王鑠為豫州刺史以本紀修秋七月宋平羣蠻以通鑑修八月壬辰鄯善降魏西域復通以吕祖謙標目修吐谷渾王走據于闐以吕祖謙標目修九月魏盧冰胡蓋吳反於杏城河東薛永宗聚衆應之冬十一月庚午魏討之以吕祖謙標目修魏掠宋青徐民以實河北以吕祖謙標目修癸未魏主西狩以通鑑修十二月乙未宋太子詹事范曄等謀反伏誅丁酉廢彭城王義康為庶人徙安城以吕祖謙標目修是嵗宋始備郊廟之樂以通鑑修宋太祖文皇帝元嘉二十三年年魏世祖太武皇帝太平真君七春正月魏主平薛永宗二月丙戌至長安諸將大破蓋吳宋救之以通鑑修宋遣交州兵討林邑以通鑑修三月魏坑沙門以吕祖謙標目修解題曰按釋老志下詔曰昔漢荒君信惑邪偽妄假睡夢事胡妖鬼以亂天常自古九州之中無此也夸誕大言不本人情由是政教不行禮義大壞鬼道熾盛五服之內鞠為丘墟朕欲一切蕩除胡神滅其蹤迹問今胡神共言皆是前世漢人無賴子弟劉元真吕伯疆之徒乞胡之誕言用老莊之虛假附而益之皆非真實蓋大姦之魁也餘見通鑑及咸通十四年解題魏攻宋兖豫青冀州以本紀修夏五月宋破林邑以吕祖謙標目修六月癸未朔日有食之本紀甲申魏築塞圍以魏紀修秋八月魏蓋吳伏誅以吕祖謙標目修是嵗宋大有年以本紀修宋立玄武湖築景陽山以本紀修時宋王謝族盛北人晚渡者以傖荒目之不得踐清塗以吕祖謙標目修吐谷渾復還舊土以吕祖謙標目修宋太祖文皇帝元嘉二十四年年魏世祖太武皇帝太平真君八春三月魏殺沮渠牧犍以吕祖謙標目修夏六月宋鑄當兩大錢以本紀修冬十月壬午宋胡誕世據豫章反討平之以本紀修十二月楊文德據葭蘆五郡氐應之以魏紀修解題曰葭蘆今文州曲水縣盧北故城是也宋太祖文皇帝元嘉二十五年年魏世祖太武皇帝太平真君九春正月魏擊楊文德文德奔漢中以魏紀宋傳修二月魏山東飢罷塞圍作以魏紀修閏二月宋吏部尚書庾炳之免以本紀修夏四月乙卯宋加撫軍將軍武陵王駿為徐州刺史以本紀修解題曰按列傳王玄謨領汝隂太守時虜攻陷滑臺執朱修之玄謨上疏曰王途始開隨復淪塞非惟天時抑亦人事虎牢滑臺豈惟將之不良抑亦本之不固本之不固皆由民憚逺役臣請以西陽之魯陽襄陽之南鄉發甲卒分為兩道直趣淆澠征士無逺徭之思吏士有屢休之歌若欲以東國之衆經營宋洛道途既逺獨克實難玄謨每陳北征之策上謂殷景仁曰聞王玄謨陳説使人有封狼居意後為彭城太守上表以彭城要兼水陸請以皇子撫臨州事乃以孝武出鎮事見通鑑按州郡志徐州後漢治東海郯縣魏晉宋治彭城明帝僑立治鍾離泰豫移治朐山元徽分南兖州之鍾離豫州之馬頭秦郡之穀孰厯陽之鄼立新昌郡徐州還治鍾離舊領彭城今屬徐州沛屬徐宿亳三州下邳屬宿泗二州及淮陽蘭陵屬沂州淮陽屬泗州淮陽漣水東海屬沂海二州東莞屬密沂二州東安屬沂州琅邪屬沂州陽平僑置濟隂宋屬興仁府淮陽廣濟二軍北濟隂屬興仁府徐單二州郡十二鍾離今屬濠州馬頭屬濠州新昌郡屬滁州五月己卯宋罷大錢本紀秋九月魏擊焉耆大破之以吕祖謙標目修冬十二月魏主伐柔然以通鑑修宋太祖文皇帝元嘉二十六年年魏世祖太武皇帝太平真君十春正月甲戌魏主復伐柔然走之魏紀秋七月辛未宋以南徐州刺史廣陵王誕為雍州刺史罷江州軍府配雍州湘州入臺租稅給襄陽以廣其資力以吕祖謙標目修九月魏主伐柔然大獲柔然自是不敢犯塞以魏紀傳修冬十月癸卯彗星入太微宋天文志宋雍州蠻反以通鑑修宋太祖文皇帝元嘉二十七年一年魏世祖太武皇帝太平真君十春正月乙酉魏主如洛陽以魏紀修宋雍州蠻降以通鑑修二月魏大治宫室以魏紀修魏主冦宋圍懸瓠以吕祖謙標目修三月宋減百官俸以吕祖謙標目修夏四月魏主還以通鑑修宋以左衛將軍江湛為吏部尚書以通鑑修六月己亥魏崔浩坐史事夷五族以魏紀傳修秋七月庚午宋遣青冀二州刺史蕭斌等伐魏江夏王義恭次彭城統諸軍以紀傳修宋貸富民資以通鑑修乙亥魏碻磝戍走宋將軍王玄謨圍滑臺冬閏十月乙丑魏主渡河玄謨走碻磝魏主至東平蕭斌退保厯城以吕祖謙標目修辛未宋隨王誕遣軍克魏𢎞農十一月甲午克陜城至潼關而還以吕祖謙標目修解題曰按水經注開山圖曰衝山在函谷山西南水東注厯澗東北出謂之開方口宋將軍魯方平薛安都等與栁元景北入軍次方伯堆者即方伯所築也又東北徑邑川城南在函谷關南七里又東北流徑故丘亭是安都軍所從城也餘見通鑑魏拔懸瓠癸卯殺宋將軍劉康祖於尉武以本紀修解題曰宋書劉康祖傳尉武去夀陽數十里餘見通鑑魏列傳永昌王仁出汝隂濟淮康祖屯尉武亭以邀軍路師人患之元崘曰風徑推草車乘風縱火以精兵乘之破之必矣斬康祖魏主攻彭城不克十二月庚午至瓜步請昏于宋宋報之以通鑑修宋太祖文皇帝元嘉二十八年魏世祖太武皇帝正平元年春正月丁亥魏退師以吕祖謙標目修宋殺庶人義康以通鑑目録修宋王玄謨還厯城魏取碻磝以吕祖謙標目修魏主攻盱眙將軍臧質却之二月丙辰至彭城江夏王義恭遣兵追之不及時南兖徐兖豫青冀州殺掠無餘邑里蕭條元嘉之政衰矣以通鑑及稽古録修宋江夏王義恭降為驃騎將軍開府鎮軍將軍武陵王駿為北中郎將三月庚子以輔國將軍臧質為雍州刺史以本紀修夏四月魏荆州刺史魯爽及其弟秀歸宋以本紀修五月彗星入太微逼帝座天文志修解題曰按宋書天文志彗星見卷舌入太微逼帝座犯上相拂屏出端門滅翼軫六月壬戌宋南兖州刺史武陵王駿都督江州荆州之江夏豫州四郡軍事江州刺史以本紀修魏改元以吕祖謙標目修魏更定律令以通鑑修魏中常侍宗愛譛太子晃以憂卒以吕祖謙標目修秋七月宋蕭斌王玄謨免官以通鑑修冬十月宋聘魏魏報之以吕祖謙標目修十二月宋吏部郎中王僧綽為侍中以通鑑修解題曰按列傳殷景仁與王華王曇首劉湛四人為侍中皆以風力局幹冠冕一時謝𢎞微與華等五臣參預機密湛誅景仁卒委任沈演之庾炳之范煜等後又有江湛何瑀之煜誅炳之免演之瑀之卒江湛為吏部尚書與徐湛之並居權要元嘉末太祖頗以後事為念以王僧綽年少欲大相付託朝政大小皆與參焉觀帝所委任如此則元嘉之治大略可想矣宋太祖文皇帝元嘉二十九年元年魏髙宗文成皇帝拓跋濬興安春二月甲寅魏宗愛弒其主燾殺東平王翰迎立南安王余改元永平尊皇后為皇太后愛為宰相専政以吕祖謙標目修夏六月己酉宋遣將軍蕭思話等三道伐魏以本紀修秋七月宋太子劭征北將軍開府始興王濬巫蠱事發赦不誅以吕祖謙標目修解題曰君親無將將而誅焉而文帝猶豫不斷以稔大禍由辨之不早也事見通鑑八月宋蕭思話攻碻磝不克丁卯退屯厯城以吕祖謙標目修解題曰文帝凡三用大師于魏到彥之之出魏人至攝四鎮以相避雖其計叵測然是時虜之得河南尚新守備未固猶有畏懼之心也暨王玄謨之出則相去二十年矣虜方席其滅夏滅涼滅燕之餘威非前比也故當時僅能取碻磝而力屈於滑臺適以召飲江之恥耳及今年之役蓋因魏主燾之死欲乘喪以取償然輕舉妄動雖碻磝亦不可復得力愈用而愈屈文帝曷亦奠而後發也哉事見通鑑九月宋冠軍司馬栁元景至潼關司州刺史魯爽攻虎牢皆還以本紀通鑑修解題曰王玄謨之伐魏也栁元景輩取𢎞農潼關關中響應及蕭思話之再行也元景亦進據洪關然無損於魏者以玄謨思話之無功也使元景敗於關陜當無害於玄謨思話玄謨思話敗則元景無能為矣勢之緩急輕重異也事見通鑑冬十月丙午朔魏宗愛弒其主余羽林郎中劉尼等誅愛迎皇孫濬即皇帝位改元追尊父妣為帝后保母為保太后以吕祖謙標目修解題曰宋庠紀年通譜不俟踰年而改元宋西陽蠻反以通鑑修十二月乙卯魏復佛法吕祖謙標目魏用玄始厯以魏紀修大事記續編卷三十六
