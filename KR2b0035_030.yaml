body:
  text: 大事記續編卷三十明王禕撰晉孝宗穆皇帝永和六年趙帝石祗永寧元年年涼張重華建興三十八代高祖皇帝建國十三年永燕景昭皇帝元平三年魏帝冉閔興元年春正月趙冉閔更其國號曰衛改元青龍趙汝隂王琨等討之大敗閏二月閔弒其主鑒盡滅石氏自即帝位改元國號魏以呂祖謙標目修解題曰事見通鑑按載記勒以成帝咸和三年僣立二主四子凡二十三年以永和五年滅宋庠紀年通譜青龍本魏明帝年號永興本漢桓帝惠帝年號陳亮曰晉自元帝息心于一隅而胡羯鮮卑氐羌迭起中國無歲不尋干戈而江左卒亦不得一日寧然淵勒遂無遺種而愍懷之痛猶有所諉以自安也晉之植根本無可言者而江左諸臣若祖逖周訪之徒皆有虎視河洛之意而桓溫之師西至灞上東至枋頭又於其間修陵寢于洛陽蓋未盡置中國于度外也故劉裕竟能一平河洛而後晉亡百年之間其事既已如此而天地之正氣固將有所發泄矣元魏起而承之孝文遂定都洛陽以修中國之衣冠禮樂而江左非復天命人心之所繫矣是以一天下者卒在西北而不在東南天人之際豈不甚可畏哉丁丑彗星見于亢本紀己丑中軍將軍殷浩都督揚豫徐兖青五州軍事蒲洪都督河北軍事其子健監征討前鋒軍事洪自稱三秦王改姓苻氏以通鑑呂祖謙標目修解題曰李舜臣曰往年以燕王之號命慕容雋今年以信都襄國之號命蒲洪及其子健明年以高陵太原之號命姚弋仲及其子襄客主初不相通而但以方州遙授此曹窘於變故應時受命旋則背去苻健則自枋頭以入關慕容雋則自薊以入冀姚襄則自潁昌以入洛前日之願受封爵者今皆起為敵國于關河許洛之間矣可勝歎哉事見通鑑三月燕伐趙取幽州徙都薊以載記修故趙將麻秋鴆殺苻洪苻健斬之以本紀修趙新興王祗即帝位于襄國改元解題曰宋庠紀年通譜永寧本漢安帝晉惠帝年號夏四月遣汝隂王琨伐魏以呂祖謙標目修五月取魏合肥以本紀修六月魏敗趙兵以通鑑修秋七月段龕據廣固稱齊王以通鑑修解題曰事見通鑑水經注濁水一名溷水出廣固縣為山東北流徑廣固城城四周絶澗岨水深隍晏謨齊地記城曹嶷所築有大澗甚廣因之為固曾肇青州南洋橋記青州治臨淄晉曹嶷築廣固城劉裕平燕羊穆之築東陽城即今治北城洋水出石膏山東北入巨定見班固書今石膏山距城二十五里水經謂之巨洋或曰朐瀰今曰渠洱河與固説合今俗呼洋水有二曰南洋河今橋是也曰北洋河距北城若干里者是也八月故趙司馬杜洪據長安自稱晉征西將軍苻健稱晉征西大將軍帥衆入關以舉要厯補遺修故趙統衛軍張賀度等攻鄴魏主閔大敗之以通鑑目録修九月燕王雋循冀州以載記修冬十月杜洪出奔以通鑑修十一月魏主閔圍襄國以本紀修十二月免蔡謨為庶人以本紀修解題曰程逈曰孟子曰無罪而殺士則大夫可以去無罪而戮民則士可以徙若無罪而誅三公此亡國之證也紂殺比干是也桓溫謂浩儀刑百揆亦過論也事見通鑑晉孝宗穆皇帝永和七年趙帝石祗永寧二年年涼張重華建興三十九代高祖皇帝建國十四年景燕景昭皇帝元平四年魏帝冉閔永興二年秦明皇帝苻健皇始元年春正月丁酉日有食之本紀段龕來降以本紀修丙辰苻健即天王位國號秦改元以載記修魏主閔圍襄國姚弋仲燕王雋遣兵救趙三月趙汝隂王琨會之閔大敗而還趙遣其將劉顯伐魏閔敗之以載記修杜洪召司馬􅈴夏四月􅈴與苻健戰于五丈原敗還以本紀修解題曰往年􅈴出駱谷畏石苞王朗之衆而還及苞朗退杜洪苻健各借晉名字以相圖此勳進取之時也乃恬若不聞健入長安而苻氏國矣方始赴杜洪之招不亦晚乎其敗宜也事見通鑑趙劉顯弒其主祗以降魏秋七月顯復叛魏稱帝以載記修八月魏豫州牧張遇及徐兖荆洛州皆來降以本紀載記修燕慕容恪取魏中山以呂祖謙標目修冬十一月姚弋仲遣使來降以為車騎將軍督江北軍事其子襄為平北將軍都督并州軍事以本紀修十二月辛未桓溫北伐拜表輒行軍次武昌會稽王昱諭之乃止以紀傳修晉孝宗穆皇帝永和八年涼張重華建興四十年年代高祖皇帝建國十五永燕景昭皇帝元璽元年皇魏帝冉閔興三年秦景明皇帝始二年春正月辛卯朔日有食之以本紀修秦王健即帝位以呂祖謙標目修杜洪為司馬張琚所殺以通鑑修劉顯攻常山魏主閔敗之取襄國誅顯以呂祖謙標目修趙汝隂王琨來奔斬之以舉要厯補遺修解題曰按載記季龍十三子五人為冉閔所殺八人自相殘害琨至此又死於是石氏遂絶程逈曰石勒囚執天子妻辱妃主塗炭生靈石虎繼之凶暴尤甚易曰積不善之家必有餘殃琨當餘殃之報其禍方興晉氏斬之合天心也胡寅指以為敵彼賊也何敵之云又豈一人之惠怨乎哉事見通鑑殷浩北伐中軍將軍王羲之諫止之不聽解題曰浩將北伐王羲之以為必敗以書上之言甚切至浩遂行果為姚襄所敗復圖再舉又遺浩書曰知安西喪敗公私惋怛不能須臾去懷以區區江左所營綜如此天下寒心固已久矣而加之喪敗此可熟念往事豈復可追願思宏將來令天下寄命有所自隆中興之業政以道勝寬和為本力爭武功作非所當自冦亂以來處內外之任者未有深謀逺慮而疲竭根本各從所至竟無一功可論忠言嘉謀棄而莫用遂令天下將有土崩之勢任其事者豈得辭四海之責更宜虛已求當與有識共之不可復令忠允之言屈於當權今軍破於外資竭於內保淮之志非復所及莫過還保長江都督將各復舊鎮自長江以外羈縻而已任國鈞者引咎責躬深自貶降以謝百姓更與朝賢思布平政除其煩苛省其賦役與百姓更始庶可以救倒懸之急使君起於布衣當董統之任而喪敗至此恐闔朝羣賢未有與人分其謗者若猶以前事為未工復求之於分外宇宙雖廣自容何所復被州符增運千石徵役兼至皆以運期對之喪氣罔知所厝又與會稽王昱箋陳浩不宜北伐并論時事曰今雖有可欣之會內求諸已而所憂乃重於所欣傳云自非聖人外寧必有內憂今外不寧內憂以深且千里饋糧自古為難况今轉運西輸許洛北入黃河雖秦政之弊未至于此以區區吳越經緯天下十分之九不亡何待而不度德量力不弊不已此封內所痛心歎悼而莫敢吐誠願殿下暫廢虛逺之懷以救倒懸之急可謂以亡為存以禍為福矣計有功曰自陶侃之死慷慨圖復河洛者庾亮庾翼禇裒殷浩也庾禇以帝戚之重保寵懼禍其總戎外禦僥幸一切之功特弭謗固位爾商浩區區出於簡文之謬舉而浸淫以喪邦尤為可哀簡文懼桓溫之不可制而引浩以為腹心浩知溫有不臣之迹必西伐蜀北伐胡以張其威使朝廷無可誰何於是先啓北伐之謀浩之料溫則明矣而暗於審已夫以一夫之隙而欲經營天下以伐其謀何其大也竭江淮之力經營天下十之九而乃蠅營狗茍委情刺俠又何其小也如是而圖中原所謂不度德不量力矣餘見通鑑以豫州刺史謝尚為安西將軍北中郎將荀羡屯夀春張遇反于許昌浩不能進以通鑑修三月姚弋仲卒襄帥衆來降屯譙城以呂祖謙標目修夏四月燕慕容恪大敗魏主閔五月辛卯殺之六月閔子智以鄴降獲傳國璽以載記修謝尚姚襄攻許昌秦主健遣兵救之丁亥尚等大敗于誡橋殷浩退屯夀春以列傳修解題曰按晉惠帝紀云許昌之誡橋秋八月庚午燕取鄴以呂祖謙標目修鎮軍大將軍武陵王晞為大宰本紀九月殷浩屯泗口以軍興罷太學生徒以通鑑修冬十月謝尚遣兵克許昌以通鑑修十一月戊辰燕王雋即帝位改元以呂祖謙標目修晉孝宗穆皇帝永和九年涼張重華建興四十一年代高祖皇帝建國十六年燕景昭皇帝元璽二年秦景明皇帝皇始三年春涼張重華遣兵伐秦敗歸夏五月重華復伐秦詔以為涼州牧以本紀通鑑修秋八月遣河間王欽修復五陵以本紀修姚襄屯歷陽殷浩遣客刺之不克冬十月浩北伐以襄為前鋒襄敗浩于山桑以紀傳修十一月丁卯西平王敬烈公張重華卒其子耀靈立其都督中外軍事張祚弒之自立以通鑑修殷浩遣將攻山桑兵敗姚襄據盱眙以呂祖謙標目修尚書僕射謝尚都督豫揚江西軍事前將軍豫州刺史鎮歷陽以本紀載紀修是歲燕以給事黃門侍郎慕容垂鎮常山以通鑑修甲寅晉孝宗穆皇帝永和十年涼張祚和平元年十代高祖皇帝建國七年秦燕景昭皇帝元璽三年景明皇帝皇始四年春正月涼張祚稱王改元以本紀修故魏將周成反襲取洛陽以本紀修桓溫表廢殷浩為庶人內外大權一歸之矣溫二月遂伐秦以呂祖謙標目修前會稽內史王述為揚州刺史以通鑑修三月姚襄降燕以本紀修夏四月己亥桓溫及秦太子萇戰于藍田敗之北海王猛説溫渡灞水不能用以猛為軍謀祭酒以載記本紀修解題曰按載記猛字景略瓌姿雋偉博學好兵書謹重嚴毅氣度雄逺細事不干其慮浮華之士咸輕而笑之猛悠然自得不以屑懷惟徐統見而竒之召為功曹不應隱于華隂山桓溫入關猛被褐詣之一面談當世之事捫虱而言旁若無人溫察而異之問曰吾奉天子之命率鋭師十萬仗義討逆為百姓除殘賊而三秦豪傑未有至者何也曰公不逺數千里深入冦境長安咫尺而不渡灞水百姓未見公心故也所以不至溫默然無以酬之餘見通鑑胡寅曰猛居華山即彼土之豪傑矣溫乃舍而問三秦猛固以輕之矣溫雖至灞上實憚苻堅而不前猛固已窺之矣所以不肯從之溫若以猛為謀主咨訪取秦之䇿苻氏不知所以為計矣當時徑逼長安上計也薛珍猶知之以偏師進猶有所獲猛豈不能辨此哉溫上不能致猛下不能容珍宜功名之不遂也燕衛將軍慕容恪為大司馬録尚書事以呂祖謙標目修五月江西流民郭敞執陳留內史降姚襄以通鑑修桓溫及秦丞相苻雄戰于白鹿原敗績六月丁丑還溫欲以王猛歸猛辭以本紀修解題曰按王猛傳溫之將還賜猛車馬拜高官督護請以俱南猛還山咨師師曰卿與桓溫豈並世哉在此自可富貴何為逺乎猛乃止北史列傳薛強字威明與王猛友善桓溫入關猛謁之溫曰江東無卿比也秦國定多竒士如生輩尚有幾人吾欲與之俱南猛曰公求可與撥亂濟時者薛威明其人也溫曰聞之久矣強聞之自商山來謁與猛皆署軍謀祭酒強察溫有大志而無成功乃勸猛止俄而溫敗餘見通鑑北史陽平公融為書將以車馬聘強猛以為不可屈乃止苻堅如河東伐張平自與數百騎馳至強壘下求與相見強使主簿責之因宣言曰此城終無生降之理但有死節之將耳諸將請攻之堅曰須吾平晉自當面縳舍之以勸事君者後堅伐晉軍敗強遂總宗室強兵威振河輔破慕容永于陳川姚興聞而憚之重加禮命晉孝宗穆皇帝永和十一年涼張玄靚建興四十三年代高祖皇帝建國十八年厲燕景昭皇帝元璽四年秦主苻生夀光元年夏五月姚襄據許昌以呂祖謙標目修六月乙酉秦主健卒丙戌太子生即帝位改元以呂祖謙標目修秋八月涼張祚弒張耀靈其將軍宋混河州刺史張瓘弒之立其弟玄靚復稱建興年以呂祖謙標目修九月秦主生殺其后梁氏及太傅毛貴等以朱熹綱目修冬十月謝尚督并冀幽州軍事鎮西將軍鎮夀春以通鑑修十一月燕太原王恪擊段龕以載記修是歲以蔡謨為左光祿大夫開府謨尋卒諡文穆以列傳修晉孝宗穆皇帝永和十二年涼張玄靚建興四十四年代高祖皇帝建國十九年厲燕景明皇帝元璽五年秦主苻生夀光二年春正月丙申燕慕容恪圍廣固鎮北將軍段龕大敗之以通鑑目録修三月桓溫請移都洛陽不許三月以溫為征討大都督討姚襄以呂祖謙標目修夏五月秦太后強氏以憂卒以通鑑修姚襄攻周成于洛陽以通鑑修秋八月己亥桓溫及姚襄戰于伊水大敗之執周成而歸以紀傳修遣兖州刺史荀羡救段龕以通鑑修冬十月癸巳朔日有食之以本紀修十一月丙子段龕降于燕以通鑑修詔修洛陽五陵十二月緦服臨于太極殿三日以本紀通鑑修晉孝宗穆皇帝升平元年涼張玄靚建興四十五年代高祖皇帝建國二十年秦燕景明皇帝元夀元年年昭宣皇帝苻堅永興元春正月壬戌朔帝加元服太后歸政改元以本紀修二月癸丑燕改元以呂祖謙標目修夏五月秦大敗姚襄于三原斬之降其弟萇以呂祖謙標目修解題曰按載記姚襄帥衆萬餘攻平陽太守苻産于胸奴堡符柳救之為襄所敗引還蒲坂襄遂克之殺苻産遣使從苻生假道將還隴西生將許之苻堅諫曰姚襄人傑也今還隴西必為深害不如誘以厚利伺隙而擊之生乃止遣使拜襄官爵襄不受斬其使者焚所送章䇿冦掠河東生怒命其大將軍張平討之襄乃卑辭厚幣與平結為兄弟平更與襄通和襄尋徙北屈西慈州吉鄉縣通典文城郡西有萇所築城徐鍇方輿志姚襄築西臨黃河控帶龍門要津之險將圖關中進屯杏城今中部縣漢書朔方為西部休屠為北部渠搜為中部屬坊州西七里有杏城鎮劉石苻重兵守之後魏文帝改東秦州孝明改北華州遣其從兄姚蘭略地鄜城今鄜州縣本漢鄜縣地兄益生及將軍王欽盧招集北地戎夏歸附者五萬餘戶生遣其將苻飛拒戰蘭敗為飛所執襄率衆西引生又遣苻堅鄧羌等要之襄將戰沙門智通固諫宜厲兵收衆更思後舉襄曰二雄不俱立冀天不棄德以濟黎元吾計決矣會羌來逼襄怒遂長驅而進戰于三原今耀州三原縣本漢池陽地襄敗為堅所殺時年二十七餘見通鑑六月東海王堅弒其主生自稱天王改元以王猛為中書侍郎以呂祖謙標目修解題曰宋庠紀年通譜永興本漢桓帝晉惠帝魏冉閔年號事見通鑑燕殺段龕以通鑑修秋七月秦冀州牧張平來降以為并州刺史以本紀修八月丁未立皇后何氏本紀冬十一月癸酉燕徙都鄴以呂祖謙標目修秦王堅殺其兄丞相録尚書事清河王法以載記修解題曰按載記初堅母以法長而賢又得衆心懼終為變至此遣殺之堅性仁友與法訣于東堂慟哭嘔血餘見通鑑殺法者堅也借曰出於太后之意獨不能力爭而脫其死乎凡若此類史家多為之文飾未可憑也十二月秦以王猛為尚書左丞舉異才修廢職課農桑恤困窮立學校旌節義秦民大悅以通鑑修解題曰按王猛傳苻堅將有大志聞猛名遣呂婆樓招之一見便若平生語及廢興大事異符同契若元德之遇孔明也及堅僣位以猛為中書侍郎時始平梁載言十道志興平漢平陵縣魏文帝改為始平苻堅移于茂陵多枋頭西歸之人豪右縱橫劫盜充斥乃轉猛為始平令猛下車明法峻刑澄察善惡禁勒強豪鞭殺一吏百姓上書訟之有司劾奏檻車徴下廷尉詔獄堅親問之曰為政之體德化為先蒞位未幾而殺戮無數何其酷也猛曰臣聞宰寧國以禮治亂邦以法陛下不以臣不才任臣以劇邑謹為明君揃除凶猾始殺一姦餘尚萬數若以臣不能窮殘盡暴肅清軌法者敢不甘心鼎鑊以謝孤負酷政之刑臣實未敢受之堅謂羣臣曰王景略故是夷吾子産之流也於是赦之遷尚書左丞相餘見通鑑晉孝宗穆皇帝升平二年涼張玄靚建興四十六年代高祖皇帝建國二十一年秦燕景明皇帝元夀二年昭宣皇帝永興二年春正月會稽王昱歸政不許以本紀修二月秦王堅討張平三月降之以通鑑修夏五月有星孛于天船以本紀修秋八月壬申吳興太守謝萬為西中郎將監司豫冀并州軍事豫州刺史以本紀修九月秦殺特進樊世以呂祖謙標目修解題曰蘇軾曰諸葛亮之治蜀王猛之治秦使人悚然不敢飾非務盡其心凡此者皆庸人之所大惡而讒言之所由興也是故先主拒關張之間而後孔明得以盡其才苻堅斬樊世黜席寶而後王猛得以畢其功事見通鑑燕取并州冬略地河南十二月荀羡取山荏遂與燕戰兵敗徵還以散騎常侍郤曇為北中郎將都督徐兖青冀幽州軍事徐兖二州刺史鎮下邳以本紀通鑑修晉孝宗穆皇帝升平三年涼張玄靚建興四十七年代高祖皇帝建國二十二年秦燕景明皇帝元夀三年昭宣皇帝甘露元年夏六月秦改元以呂祖謙標目修解題曰宋庠紀年通譜甘露漢宣帝魏高貴鄉公吳孫皓年號時以甘露降安邑故改元涼尚書僕射宋混殺都督中外軍事張瓘請玄靚去涼王之號以呂祖謙標目修秋八月泰山太守諸葛攸擊燕敗績冬十月遣謝萬郤曇擊燕曇病還萬遁廢為庶人許昌潁川譙郡皆入于燕以通鑑修解題曰往年荀羡既敗今年諸葛攸謝萬又敗則昔之以地來歸者尚安繫其心哉事見通鑑十二月秦以僕射王猛為輔國將軍司𨽻校尉僕射詹事侍中中書令領選如故以舉要厯補遺修晉孝宗穆皇帝升平四年涼張玄靚建興四十八年代高祖皇帝建國二十三年年燕幽皇帝慕容暐建熙元秦昭宣皇帝甘露二年春正月甲午燕主雋卒太子暐即帝位改元以呂祖謙標目修解題曰按載記雋寢疾謂慕容恪曰吾疾惙然當恐不濟修短命也復何所恨但二冦未除景茂沖幼慮其未堪多難吾欲逺追宋宣以社稷屬汝恪曰太子雖幼沖天縱聰聖必能勝殘刑措不可以亂正統也雋怒曰兄弟之間豈虛飾也恪曰陛下若以臣堪荷天下之任者寧不能輔少主乎雋曰若汝行周公之事吾復何憂餘見通鑑二月燕以太原王恪為太宰專録朝政太師慕輿根伏誅以呂祖謙標目修三月燕以前平州刺史吳王垂都督河南軍事鎮蟸臺以載記通鑑修解題曰水經注司馬彪郡國志睢陽縣盧門亭城內續述征記回道似蟸故謂之蟸非也按關尹子稱宋景公登虎圈之臺蟸臺即虎圈臺秋八月辛丑朔日有食之既以本紀修桓溫以謝安為征西司馬以通鑑修晉孝宗穆皇帝升平五年涼張玄靚升平五年四代高祖皇帝建國二十年秦燕幽皇帝建熙二年昭宣皇帝甘露三年春二月燕河內太守呂護來降三月太原王恪圍之以通鑑修夏四月桓溫鎮宛使其弟黃門郎豁為建威將軍督沔中七郡軍事取許昌以本紀修涼都督中外軍事宋混卒其弟澄為領軍輔政以呂祖謙標目修五月丁巳帝崩于顯陽殿解題曰王容曰魏明帝青龍三年昭陽殿也避司馬昭改元名庚申琅邪王丕即皇帝位以本紀修秋七月戊午葬穆皇帝于永平陵廟號孝宗以本紀修燕克野王以本紀修九月戊申立妃王氏為皇后以本紀修涼司馬張雍殺宋澄為中護軍張天錫為中領軍同輔政以呂祖謙標目修秦滅張平以通鑑修冬十月呂護復奔燕以本紀修十一月涼張天錫殺張雍為都督中外軍事十二月涼用升平年號詔加張玄靚大都督西平公以通鑑本紀修解題曰宋庠紀年通譜張軌傳實茂駿重華耀靈祚玄靚天錫晉傳述其始末皆世襲州牧西平公之位元帝中興江左而涼州但稱愍帝建興年號其門惟張祚篡僣改建興四十二年為和平元年不及三周而被戕及玄靚立去帝制復稱建興至四十九年始奉穆帝升平正朔訖天錫不聞有改元事近世龔頴作厯運圖述張氏年號張實永安張茂永元張駿太元重華永樂玄靚太始天錫太清頗有倫貫詢之諸儒或云出崔鴻十六國春秋疑張氏於國則私用已年通朝廷則明奉王厯而崔書卷帙多散亂莫得稽證永安孫休晉惠帝永元漢和帝太元孫權太始漢武帝和平漢桓帝年號秦舉孝悌廉直文學政事四科解題曰此王景略之政也事見通鑑晉哀皇帝隆和元年涼張玄靚升平六年皇帝建國二十五年代高祖燕幽皇帝建熙三年四秦昭宣皇帝甘露年春正月壬子改元以本紀修甲寅減田稅畝收二升本紀二月辛未輔國將軍吳國內史庾希為北中郎將徐兖二州刺史鎮下邳龍驤將軍袁真為西中郎將監豫司并冀四州軍事豫州刺史鎮汝南以本紀修燕呂護攻洛陽夏五月桓溫遣兵救洛陽因請遷都不果行以通鑑修解題曰永和之末溫嘗請都洛矣事既不行六年之間不知溫之所以植根者何如而復有此議也此心以為有鴻鵠將至固宜其屢發而不中節也哉事見通鑑秦王堅親臨太學以通鑑修解題曰按崔鴻十六國春秋堅考學生經義優劣品而第之問難五經博士多不能對謂易博士王實曰朕一月三臨太學躬親厲奬庶幾周孔微言不由朕而墜漢之二武其可追乎實曰自劉石之擾儒生罕有或存墳籍滅而莫紀經綸學廢奄若秦皇陛下開庠序之美𢎞儒教之風化盛隆周垂馨千祀漢之二武焉足論哉自是每月一臨太學又三月甲子堅臨太學謂博士盧壺曰經籍湮滅追蹤漢初求書之術不可令典謨有闕也可令諸經訓注悉通音義壺對曰諸經音義已備惟周官音義散落經注未有成師太常韋逞母宋氏傳其父業今年八十有六而神爽無虧天其將以此母演發斯文使不墜於地堅大悅起􅊰堂於逞家使書生百二十人隔紗幃而受業冬十二月戊午朔日有食之以本紀修庾希退屯山陽袁真退屯夀陽以本紀修晉哀皇帝興寧元年涼張天錫一年建國二十六年代高祖皇帝燕幽皇帝建熙四年露秦昭宣皇帝甘五年春二月改元以本紀修夏四月燕陷滎陽以本紀修五月加桓溫大司馬都督中外諸軍録尚書事假黃鉞袁真都督司冀并州軍事庾希都督青州軍事以本紀修秋八月有星孛于角亢入天市以本紀修閏月涼張天錫弒其主玄靚而自立以呂祖謙標目修九月桓溫帥師北伐以本紀修冬十一月汝南太守朱斌襲許昌克之以本紀修甲子晉哀皇帝興寧二年涼張天錫二年七代高祖皇帝建國二十年燕幽皇帝建熙五年年秦昭宣皇帝甘露六春三月庚戌朔大閲戶口令所在土斷以本紀修辛未帝不豫皇太后復臨朝以本紀修夏四月燕陷許昌汝南陳郡以呂祖謙標目修解題曰慕容恪將取洛陽先遣人招納土民逺近諸塢皆歸之通鑑綱目既書燕陷許昌汝南陳郡又書燕陷河南諸城似為重復事見通鑑五月戊辰以王述為尚書令衛將軍徵桓溫為揚州牧秋八月溫城赭圻而居之以本紀修秦殺故秦王生之弟汝南公騰以通鑑修解題曰生以弒死故騰繆栁雙庾武等皆囂然有欲叛之心猛教堅以殺人為事所謂民不見德惟戮是聞亦弗思之甚矣事見通鑑九月秦詔非命士不得乘車馬工商皂𨽻不得服金銀錦繡以載紀修解題曰此王景略之政也晉哀皇帝興寧三年涼張天錫三年建國二十八年代高祖皇帝燕幽皇帝建熙六年元秦宣昭皇帝建元年春正月庚申皇后王氏崩以本紀修桓溫鎮姑孰三月右將軍桓豁監荆州揚州義城雍州京兆軍事荆州刺史桓沖監江州荆州二郡豫州四郡軍事南中郎將江州刺史以本紀通鑑目録修丙申帝崩于西堂丁酉琅邪王奕即皇帝位以本紀修秦改元以呂祖謙標目修解題曰宋庠紀年通譜建元本漢武帝劉聰晉康帝年號三月燕太原王恪吳王垂陷洛陽將軍沈徑死之垂都督荆揚等州軍事鎮魯陽以本紀通鑑修解題曰按地理志南陽國有魯陽縣顔師古謂淮南子云魯陽公與韓戰日反三舍者也唐為汝州魯山縣壬申葬哀皇帝于安平陵以本紀修夏六月戊子鎮西將軍建城襄公周撫卒以其子犍為太守楚為益州刺史以通鑑修秋七月壬子立妃庾氏為皇后以通鑑修冬十月秦淮南公幼反伏誅以通鑑修司馬􅈴反十一月乙卯圍成都桓溫遣江夏相朱序救之以本紀修晉海西公太和元年涼張天錫四年建國二十九年代高祖皇帝燕幽皇帝建熙六年元秦宣昭皇帝建二年春二月己丑以張天錫為大將軍西平郡公以本紀修丙申以輔國將軍宣城內史桓祕監梁益州軍事以本紀修夏五月皇后庾氏崩以本紀修朱序周楚擊司馬􅈴斬之以通鑑修秋七月秦冦荆州以本紀修冬十月司徒會稽王昱為丞相録尚書事加殊禮以通鑑修涼張天錫告絶于秦以通鑑修燕陷兖州數郡以本紀修是歲改元以本紀修解題曰晉紀不書改元通鑑因之宋庠紀年通譜太和本魏明帝石勒李勢年號晉海西公太和二年涼張天錫五年燕代高祖皇帝建國三十年幽皇帝建熙七年建秦昭宣皇帝元三年春正月庾希有罪出走以紀傳修夏四月涼張天錫攻叛將李儼于抱罕秦將軍王猛等敗之取抱罕以呂祖謙標目修五月燕太原桓王恪卒以載記修解題曰按載記范亨燕書恪臨終暐親臨問以後事恪曰臣聞報恩莫大薦士版築猶可而况國之懿藩吳王文武兼才管蕭之亞陛下若任之以政國其少安不然臣恐二冦必有窺𨵦之計言終而死餘見通鑑昔史鰍以不能進蘧伯玉而退彌子瑕故有身後之諫彼疏逺之臣誠有不能盡如其意者矣恪以叔父之尊居受遺之任非鰍比也知慕容評之庸瑣則當退之而援垂以同任國事顧乃每事推評未嘗專訣逮臨絶然後惓惓以垂為言垂不用而燕亡矣吾恐恪之目終不得瞑於地下也餘見通鑑冬十月秦并州牧晉公栁秦州刺史趙公雙洛州刺史魏公庾雍州刺史燕公武反秦遣兵討之以呂祖謙標目修解題曰按地理志苻堅姚興赫連勃勃并州並徙置河東晉海西公太和三年涼張天錫六年建國三十一年代高祖皇帝燕幽皇帝建熙八年元秦昭宣皇帝建四年春二月秦魏公庾以陜城降燕請兵應接不納以呂祖謙標目修解題曰燕用慕容評自無久存之理然亦可謂失機矣事見通鑑陜城在今陜州平陸縣三月丁巳朔日有食之以本紀修秋七月秦誅趙公雙燕公武九月誅晉公栁以呂祖謙標目修燕尚書僕射悅綰出蔭戶以呂祖謙標目修冬十二月秦誅魏公庾以通鑑修加桓溫殊禮以通鑑修是歲以仇池公楊世為秦州刺史通鑑晉海西公太和四年涼張天錫七年建國三十二年代高祖皇帝燕幽皇帝建熙九年元秦宣昭皇帝建五年春三月桓溫領徐兖二州刺史夏四月溫帥舟師伐燕六月敗其大都督慕容厲于黃墟燕求救于秦秋七月溫至枋頭燕主暐謀奔和龍吳王垂止之八月秦遣將軍茍池等救燕九月丙申溫陸道奔還燕大都督吳王垂大破之于襄邑秦師又破之于譙冬十月溫還歸罪于袁真而廢之真以夀春降燕以紀傳修解題曰按列傳載記范亨燕書溫率弟南中郎沖西中郎袁真步騎五萬北伐郤超諫以道逺汴水又淺運道不通溫不從軍次胡陸胡陸今單州魚臺縣水經注胡陸漢章帝更名胡陵泗水東經胡陸東城南范攻慕容暐將慕容忠獲之進次金鄉今濟州縣時亢旱水道不通乃鑿巨野三百餘里以通舟運今濟州巨野縣有大野澤東平府頁城縣及濟州任城縣有桓公􅗂中都縣有桓水即溫所鑿之地也自清水入河毛穆之傳使穆之監鑿巨野百餘里引汶會于濟川按水經汶水出泰山萊蕪縣西南流至夀張縣北至安民亭入濟濟水出東垣縣至溫縣西北當鞏縣北入于河東至北礫磎南東出過滎陽北東北過夀張汶水從東北來注之清水出河內修武縣之北黑山東過汲縣北又東入于河注桓溫以太和四年率衆北入掘渠通濟至義熙十三年劉武帝又廣其功謂之桓公瀆超又進䇿于溫曰清水入河無通運理若冦不戰運道又難因資無所實為深慮盛夏悉力徑造鄴城彼服公威略必望陳而走退還幽朔矣若能決戰則呼吸可定設欲城鄴難為功力百姓布野盡為官有易水以南必交臂請命但恐此計輕決明公必務其持重耳若此計不從便當頓兵河濟控引糧運令資儲充備足及來夏雖如賖遲終亦濟克若舍此二䇿而連軍西進不速決退必愆乏賊因此勢日月相引僶俯秋冬船道澀滯且北土早寒三軍裘褐者少恐不可以涉冬此大限閡非惟無食而已溫不從宋文帝之遣劉彥之伐魏也魏崔浩答魏主曰始謂義隆軍來當上屯河中兩道北上東道向冀州西道衝鄴如此則陛下當自討之不得徐行今則不然東列兵徑二千里一處不過數千形分勢弱以此觀之此不過欲因何自守無北度意也其説大槩與郤超相類燕遣其將慕容厲與溫戰于黃墟水經注黃水上承巨野諸陂東流又巨野薛訓渚歷薛材前分為二水一東注黃水一西北入濟皇覽曰巨野縣有肩髀冢重聚大小與闕冡等大敗單馬奔還高平今濟州巨野縣太守徐翻以郡歸順前鋒人朱序又破暐將傅顔于林渚疑即薛訓渚七月溫次武陽陽平人孫元舉衆反遂至枋頭燕書將軍李述石氏舊將溫恃為鄉道招懷趙魏東武陽陽平陽平郡今屬大名開德東平府博濟二州暐懼謀奔和龍和龍即黃龍府慕容垂曰臣請擊之若戰不捷走未晚也乃以垂為使持節南討大都督慕容德為征南將軍率衆五萬距溫使散騎侍郎樂嵩乞師于苻堅堅遣將軍茍池率衆二萬出洛陽師于潁川燕行臺封孚問行臺左丞申胤曰溫衆強士整乘流直進而大軍徒逡巡高岸風馬不交無克殄之理君謂將如何胤曰溫雖似能有為然終于破敗不能成功方今晉室衰弱勢在強家袁桓王謝俱執兵權溫之得志彼所不願必將乖阻以敗其事而溫虐而恃衆拙于知變大衆深入值可乘之會反更逍遙不出赴利欲望持久坐致廣勝若糧廩愆懸情見力屈不戰而敗此左車所謂二將之頭必懸麾下者也始溫遣袁真伐譙梁開石門以通運真討譙梁平之而不能開石門慕容德屯石門水經注睢陽蟸臺宋世牢虎所在袁真開石門鮮卑堅戍此臺真頓兵堅城之下不果而還豫州刺史李邽率州兵五千斷溫餽運燕書蘭臺治書侍御劉當領五千騎屯石門斷溫運道溫頻戰不利糧運復絶燕書溫及義河斬其大都督李述溫大震不敢上岸及聞堅師之至九月乃焚舟步退自東燕滑州胙城縣出倉垣經陳留鑿井而飲行七百餘里德徑騎四千先溫至襄邑東拱州襄邑縣伏于澗中與垂前後夾擊王師大敗死者二萬餘人茍池邀擊于譙溫衆又敗死者萬計溫甚恥之歸罪于真表廢為庶人真怨溫誣已據夀陽以自固潛通苻堅慕容暐餘見通鑑燕吳王垂奔秦王猛請殺之秦主堅不從以呂祖謙標目修解題曰劉備奔曹操或勸操殺之郭嘉曰備有英雄名以窮歸已而害之則智士將日疑公誰與定天下乎操曰君得之矣王猛之教苻堅其識在嘉之下矣事見通鑑十一月秦遣王猛等伐燕十二月攻洛陽以載記修解題曰呂祖謙曰王猛之於慕容垂長孫無忌之於吳王恪若此者自以為有意於忠國而不知非所以為忠也事見通鑑桓溫鎮廣陵以呂祖謙標目修晉海西公太和五年涼張天錫八年建國三十三年代高祖皇帝燕幽皇帝建熙十年元秦昭宣皇帝建六年春正月秦取燕洛陽而還以呂祖謙標目修二月癸酉袁真死子瑾代領其衆夏四月燕秦遣兵助之以通鑑修秦王猛復代燕以呂祖謙標目修秋七月癸酉朔日有食之以本紀修八月秦克燕壺關以通鑑修桓溫敗袁瑾圍夀陽以紀傳修九月辛巳秦入燕晉陽以通鑑修冬十月甲子秦王猛大破燕太傅上庸王評于潞川丁卯圍鄴十一月秦王堅赴鄴戊寅克之燕主暐奔龍城追獲之猛為車騎大將軍都督關東六州軍事鎮鄴十二月遷暐及鮮卑四萬戶于長安封暐為新興侯以呂祖謙標目修解題曰潞川今潞州潞城縣水經注縣北對故壁臺元和郡縣志漳水一名潞水闡駰曰在縣北為冀州浸朱熹曰堅之遣王猛也嘗欲親督繼發猛謂臣仗威靈不煩鑾輿及鄴之圍倐然而至蓋恐其功大亟欲分之耳器量亦小矣他時急欲亡晉以紹正統掃境而出一敗塗地亦急躁之過也韓淲曰五胡中惟堅不易及觀其赴王猛伐燕之軍殆有漢祖奪韓信軍之風惟猛亦能自防遂潛入安陽謁堅堅責其臨敵而棄軍猛即以亞夫求名自解反責其主忌灞上之言而自出將君臣之智蓋相上下也至下燕之後下詔大赦責躬自反氣象尤不可及事見通鑑燕自慕容廆始徙河之青山及皓由棘城而遷龍城至雋遷薊遷鄴始據有中土恪死踰年而晉伐之又踰年而秦滅之何其興之難而亡之速也一國以一人存以一人亡有以哉按載記始廆以武帝太康六年稱公至暐四世以太和五年滅通廆皓凡八十五年宋庠紀年通譜慕容氏僣號十二年通廆皓八十六年是歲楊世卒子纂立始與秦絶以通鑑修大事記續編卷三十
