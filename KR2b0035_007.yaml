body:
  text: 大事記續編卷七明王禕撰漢淮陽王更始元年淮南李憲元年王郎元年梁王劉永元年解題曰張衡以更始居位人無異望光武初為其將然後即真宜以更始之號建於光武之初春正月劉縯劉秀率下江兵攻甄阜梁丘賜大破斬之縯又破嚴尤陳茂於淯陽下遂圍宛以本紀通鑑目録修解題曰李賢曰淯陽縣屬南郡在淯水之陽故城在今鄧州南陽縣南二月辛巳朔新市平林諸將立長沙王發六世孫更始將軍𤣥為皇帝改元以族父良為國三老王匡為定國上公王鳯為成國上公劉縯為大司徒劉秀為太常偏將軍以紀傳修解題曰劉縯曰諸將軍幸欲尊立宗室其德甚厚然赤眉起青徐衆數十萬其中必有諸劉聞南陽立宗室恐赤眉徐有所立如此必將內爭王莽未滅而宗室相攻是疑天下而自損權也且首兵唱號鮮有能遂陳涉項羽即其事也舂陵去宛三百里耳未足為功遽自尊立為天下凖的使後人得承吾敝非計之善者也今且稱王以號令若赤眉所立者賢相率而往從之必不奪吾爵位若無所立破莽降赤眉然後舉尊號亦未晚也餘見通鑑伯升雖不樂聖公之立而有是言其實利害甚明未幾劉盆子立王莽大發兵攻假號者於是其言驗矣夏四月漢兵徇昆陽定陵郾莽遣司徒王尋司空王邑將四十二萬人五月與嚴尤等圍王鳯等於昆陽以本紀修解題曰李賢曰昆陽縣屬潁川郡故城在今許州葉縣北定陵縣屬潁川郡故城在今郾城縣西北郾縣屬潁川郡今豫州郾城縣宛城降入都之以列傳修劉秀救昆陽六月大破之殺王尋王邑嚴尤陳茂逃以本紀修解題曰諸將見尋邑兵盛反走入昆陽皆惶怖欲散歸劉秀曰今兵穀既少而外冦彊大并力禦之功庶可立如欲分散勢無俱全今不同心膽共舉功名反欲守妻子財物耶秀使王鳯王常留守夜自與宗佻李軼等十三騎出城南門於外收兵至郾定陵悉發諸營兵而諸將貪惜財貨欲分留守之秀曰今若破敵珍寶萬倍如為所敗首領無餘何財物之有秀與敢死者三千人從城西水上衝其中堅尋邑易之自將萬餘人行陳敕諸營皆按部毋得動獨與漢兵戰不利大軍不敢擅相救尋邑陳亂漢兵乘鋭崩之遂殺王尋城中亦鼓譟而出中外合勢莽兵大潰餘見通鑑尋邑之師四十二萬而敗於光武三千之衆苻堅之師百萬而敗於謝𤣥八千之兵蓋大師難用而王尋苻融又先就斃此固必敗之道或者乃歸之於天何耶殺劉縯以劉秀為破虜大將軍封武信侯以本紀修解題曰王莽之所忌者伯升劉稷之所推者伯升以此立於昏庸之朝難矣事見通鑑莽大司馬董忠國師公劉秀等謀劫莽以降莽殺忠秀自殺以列傳修秋太白流入太微光如月以列傳修成紀隗囂起兵據隴前清水長公孫述起兵於成都以通鑑修前鍾武侯劉望稱帝於汝南以嚴尤為大司馬陳茂為丞相以列傳通鑑目録修解題曰汝南今蔡光等州之地吕祖謙曰尤長於料事短於擇君事見通鑑遣王匡攻洛陽以列傳修西屏大將軍申屠建丞相司直李松等攻武關析人鄧曄起兵應漢九月戊申朔漢兵入宣平門王邑等距戰北闕下己酉焚未央宫孝平皇后赴火死庚戌三輔豪傑共殺莽臠之以列傳修解題曰班固曰莽既不仁而有佞邪之材又乘四父歷世之權遭漢中微國統三絶而太后壽考為之宗主故得肆其姦慝以成篡竊之禍推是言之亦天時非人力之致矣及其竊位南面乃始恣睢奮其威詐毒流諸夏亂延蠻貉猶未足逞其欲焉是以四海之內囂然喪其樂生之心中外憤怨逺近俱發城池不守支體分裂遂令天下城邑為虛害遍生民自書傳所載亂臣賊子考其禍敗未有如莽之甚者也拔洛陽以列傳修冬十月奮威大將軍劉信擊殺劉望嚴尤陳茂伏誅以列傳修劉秀行司𨽻校尉使修整宫府遷都洛陽以本紀修解題曰王莽地皇三年十月秀與李通李軼等起於宛時年二十八十一月秀本文作光武後放此將賔客還舂陵伯升招新市平林兵與其帥王鳯陳牧擊長聚前漢音義曰小於鄉曰聚秀騎牛殺新野尉乃得馬進屠唐子鄉李賢曰唐子鄉在今唐州湖陽縣西南又殺湖陽尉李賢曰縣屬南陽郡今唐州縣進拔棘陽與王莽前隊大夫甄阜屬正梁丘賜戰於小長安李賢曰續漢書濟陽縣有小長安聚故城在今鄧州南陽縣南漢軍大敗還保棘陽更始元年正月甲子朔復與阜賜戰於沘水之西大破斬之李賢曰今唐州沘陽縣南廬江灊縣沘水與此别伯升又破莽將軍嚴尤陳茂於淯陽進圍宛城二月立劉聖公為天子伯升為大司馬秀為太常偏將軍三月秀别與諸將徇昆陽定陵郾皆下之多得牛馬財物穀數十萬斛轉以饋宛下莽遣王尋王邑將甲士四十二萬人五月與嚴尤陳茂合秀與宗佻李軼等收兵至郾定陵發諸營兵六月已卯秀與營部俱進自將步騎千餘尋邑遣兵數千合戰奔之斬首數十級秀復進尋邑兵却諸部共乘之斬首數百千級連勝遂前秀與三千人衝其中堅尋邑陳亂遂殺尋莽兵大潰秀因復徇下潁陽李賢曰縣屬潁川郡故城今在許州㑹伯升為更始所害秀自城父李賢曰縣屬潁川郡古應國故城在今許州葉縣東北馳詣宛謝更始拜秀為破虜大將軍封武信侯九月更始將北都洛陽以秀行司𨽻校尉使前整修宫府於是置僚屬作文移東觀記曰文書移與屬縣也從事續漢書曰司𨽻置從事史十二人司察一如舊章此光武初起及北渡河以前二年中所厯也遣使者徇郡國以列傳修樊崇等降封為列侯尋亡去以列傳修廬江連率李憲據郡自稱淮南王立故梁王立之子永為梁王以列傳修解題曰廬江今廬蘄光江安慶無為安豐諸州之地劉秀行大司馬事持節巡慰河北以本紀修解題曰更始欲令親近大將徇河北未知所使大司徒言諸家子獨有文叔可用大司馬朱鮪以為不可更始狐疑大司徒賜深勸之乃拜秀行大司馬持節過河馮異傳更始數欲遣光武徇河北諸將皆以為不可時左丞相曹竟子詡為尚書父子用事主簿馮異勸秀厚結納之及渡河北詡有力焉然則沮之者非止一朱鮪也秀渡河馮異因間進說曰天下同苦王氏思漢久矣今更始諸將縱橫暴虐所至虜掠百姓失望無所依戴今公專令方面施行恩德夫有桀紂之亂乃見湯武之功人久飢渴易為充飽宜急分遣官屬徇行郡縣理寃結布惠澤秀納之至邯鄲遣異與銚期乘傳撫循屬縣録囚徒存鰥寡亡命自詣者除其罪隂條二千石長吏同心及不附者上之餘見通鑑大司徒劉賜為丞相入關修宗廟宫室以本紀修劉秀至河北除莽苛政復漢官名以本紀修南陽鄧禹謁劉秀以紀傳修解題曰按列傳袁宏漢紀更始立豪傑多薦舉禹禹不肯從及聞光武安集河北即杖策北渡追及於鄴宋相州今彰德路光武見之甚歡因留宿間語禹進說曰聖人不違時時亦不可失也歷觀往古聖明之興因時立功二科而已天時與人事也今以天時觀之更始既立而變方興人事觀之帝王大業非凡夫所任更始既是庸才而其佐無有忠良明智深謀逺慮欲尊主安民者也公推誠接士揔攬英雄天下之人皆樂為驅馳公之德衆所歸也初戰昆陽破王莽四十萬衆公之武衆所服也軍政齊肅少長有禮公之文衆所安也以公之威德應民之望收天下英雄而分授之立高祖之業救萬民之命河內被山帶河足以為固其土地富貴殷之舊都公之有此猶高祖之有關中也進兵定冀州北取幽并胡馬之用東舉青徐引負海之利三州既集南面以號命天下不足定也光武笑曰且相隨北去因勑左右號禹曰鄧將軍餘見通鑑方禹進䇿之時未有王郎之變故勸以守河內為根本然後定冀州取幽并舉青徐以令天下及王郎起於倉卒光武客寄其地然卒用幽冀兵定河北下河內三年間降鮑永張步大略亦如禹之言杜牧曰冀州舜以其大離為幽并程其水土與河南等常重十一二故其人沉鷙多材力重許可能辛苦兵常當天下黃帝時蚩尤為兵階自後帝王多居其地晉大常役諸侯秦得韓遂折天下脊復得趙因取諸國韓信聯齊有之故蒯通知漢楚輕重在信光武始於上谷成於鄗魏武舉官渡三分天下有其二宋武有天下十分之八然不能渡河以窺胡髙齊荒蕩宇文取得隋文因以滅陳山東王者不得不可為王霸者不得不可為霸大抵秦漢之間專論關洛形勢時移事改又論山東矣十二月故趙繆王子林立邯鄲王郎為帝徇下幽冀以紀傳修解題曰王師古曰行一不義殺一不辜雖得天下不為者聖人所以創業垂統必為可繼也光武仗漢遺德以起義兵行天討正渠魁之罪以圖中興而已豈肯詭詐殺人以僥幸一勝哉劉林請決水以灌赤眉宜光武之不從也事見通鑑李賢曰邯鄲縣屬趙國今洺州縣邯山名鄲盡也邯山至此而盡漢淮陽王更始二年淮南李憲二年梁王劉永二年王郎二年楚王秦豐元年春正月劉秀北徇薊以茂陵耿弇為長史以紀傳修解題曰薊縣屬涿郡今為州屬大興府二月西遷長安封宗室功臣為王使左大司馬朱鮪五威中郎將李軼等鎮撫關東徴隗囂為右將軍以列傳通鑑目録修故廣陽王嘉子接以薊應王郎劉秀走信都發兵移檄擊邯鄲郡縣復響應真定王揚起兵附郎秀遣驍騎將軍劉植說降之以列傳修解題曰秀失軍至信都李賢曰今冀州太守任光開門出迎和戎卒正邳彤舉郡降李賢曰卒正如太守秀雖得二郡之助而兵衆未合議者多言可因信都兵自送西還長安邳彤廷對曰吏民歌吟思漢久矣故更始舉尊號而天下嚮應一夫大呼無不捐城遁逃虜伏請降自古以來未有感物動民其易如此者也卜者王郎假名目執驅集烏合之衆遂震燕趙之地明公奮二郡之兵掦響應之威以攻則克以戰則服今釋此而歸豈徒空失河北必更驚動三輔墮損威重若明公無復征伐之意則雖信都之兵猶難㑹也何者明公既西則邯鄲勢成民不肯捐父母背成主而千里送公其離散亡逃可必也秀善其言而止唐仲友曰光武之謀非誤欲發彤之議以一衆論耳邳彤云邯鄲成民不肯背成主而千里送公此范史也袁紀云邯鄲和城民不捐棄和城而千里送公通鑑考異謂城皆當作成邯鄲成謂邯鄲勢成也成主謂王郎為已成之主也胡銓謂光武馳赴信都王莽和戎卒正邳彤舉郡降彤傳彤初為莽和戎卒正注莽分巨鹿為和成郡東觀漢記或作和戎或作和成考之袁紀則和成為是特以成為城耳邯鄲和城者和成與邯鄲也城主者和城之主也謂王郎也延岑據漢中漢中王嘉擊降之以列傳修遣尚書僕射鮑永安集并州尚書僕射謝躬討王郎以列傳修上谷太守耿況漁陽太守彭寵遣突騎助秀擊王郎夏四月圍邯鄲五月甲辰拔之郎伏誅以紀傳修解題曰耿弇走昌平李賢曰縣屬上谷郡說父況使功曹寇恂東約彭寵恂與門下掾閔業共說況曰邯鄲拔起難可信向王莽時所難獨劉伯升耳大司馬伯升母弟尊賢下士可攀附也況曰邯鄲方盛力不能獨拒如何恂曰今上谷完實李賢曰上谷故城在今媯州懷戎縣控弦萬騎恂請東約漁陽李賢曰郡在漁水之陽今幽州縣齊心合衆邯鄲不足圖也況乃遣恂到漁陽結謀彭寵各發突騎二千匹步兵千人安樂令李賢曰縣屬漁陽郡吳漢說寵曰漁陽上谷突騎天下所聞也君何不合二郡精鋭附劉公擊邯鄲此一時之功也寵以為然㑹寇恂至寵乃發步騎三千人以漢行長史及都尉嚴宣護軍蓋延狐奴令李賢曰縣屬漁陽郡王梁與上谷長史景丹及耿弇將兵俱南所過擊斬王郎大將九卿校尉以下首三萬級定涿郡中山巨鹿清河河間凡二十二縣乃以景丹寇恂耿弇蓋延吳漢王梁皆為偏將軍加耿況彭寵大將軍封況寵延皆為列侯時謝躬率六將軍討王郎不能下秀至與之合軍東圍巨鹿未下留將軍鄧滿守巨鹿進軍邯鄲連戰破之郎乃使其諫大夫杜威請降不許急攻之郎少傅李立開門納漢兵遂拔邯鄲郎夜亡走王霸追斬之餘見通鑑陳瓘曰二郡之歸發其議者弇也成其謀者恂與漢也二郡歸而邯鄲可平邯鄲平而天下漸服矣封劉秀為蕭王令罷兵詣行在所以苗曽為幽州牧秀辭不就徴遣偏將軍吳漢北發十郡兵曽不從漢斬之將突騎㑹秀擊銅馬賊大破降之破赤眉於射犬徇河內降之漢襲殺謝躬於鄴以本紀通鑑目録修解題曰按袁宏漢紀更始遣使封秀為蕭王令罷兵將有功者詣行在所遣幽州牧苗曽入部王幸溫明殿李賢曰漢趙王如意之殿在今洺州邯鄲縣內耿弇請間曰吏士死傷者多願歸上谷益兵王曰王郎已破河北略平國家今都長安天下大定復用兵何為弇曰王郎雖破天下兵革乃始耳今使者來欲罷兵不可聽也銅馬赤眉之屬數十萬人所向無前聖公不能辦也敗必不久王曰卿勿妄言我告斬卿弇曰大王哀厚弇如父子故敢披赤心王曰我戲卿耳弇曰百姓患苦王莽復思劉氏聞漢起莫不歡喜從風倒㦸橫矢不足以喻更始未都長安時百姓未具責也今都長安靈室為天子而大臣專權貴戚縱橫政令不出諸將虜掠甚於盜賊百姓愁怨天下失望是以知必敗也明公首事南陽破昆陽下百萬衆今復定河北發號響應望風而至天下至重公可自取無令他姓得之王曰卿得無為人道之弇曰此重事不敢為人道於是王謂鄧禹曰吾欲取幽州突騎誰可使者禹曰吳漢文能柔未附武足斷大事可用之乃拜漢弇俱為大將軍持節北發幽州十郡突騎苗曽隂敕諸郡不得應調漢先馳至無終曽出迎於路漢即收斬之弇到上谷亦收斬韋順蔡充北州震駭於是悉發其兵往擊銅馬漢將突騎來㑹銅馬食盡夜遁王追及大破之於館陶赤眉别帥與青犢上江大彤鐡脛五幡十餘萬衆在射犬王引兵進擊大破之乃南徇河內河內太守韓歆降初謝躬與王共滅王郎還屯於鄴而與王積不相能及王南擊青犢使躬邀擊尤來於隆慮山躬兵大敗因躬在外使漢與岑彭襲據鄴城躬不知輕騎還鄴漢等收斬之其衆悉降餘見通鑑李賢曰續漢志野王有射犬聚故城在今懷州武德縣北公孫述自立為蜀王以列傳修遣使使胸奴以列傳修赤眉分二部攻長安遣王匡等據河東𢎞農以拒之以列傳通鑑目録修解題曰赤眉樊崇等將兵入潁川分其衆為二部崇與逢安為一部徐宣謝祿楊音為一部赤眉雖數戰勝然皆疲敝愁泣思東歸崇等慮東向兵必散乃議西攻長安於是自武關陸渾關兩道俱入更始使王匡成丹劉均等分據河東𢎞農以拒之蕭王北徇燕趙以鄧禹為大將軍西入關偏將軍寇恂為河內太守以列傳修梁王永起兵以賊帥絞彊董憲張步等為將軍以列傳修秦豐自號楚黎王田戎陷夷陵以列傳修大事記續編卷七
