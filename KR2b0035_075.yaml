body:
  text: 大事記續編卷七十五明王禕撰晉髙祖皇帝石敬瑭天福元年秦吳睿帝天祚二年年南漢髙祖皇帝大有九年蜀國公孟昶明徳三髙閩帝王昶通文元年瓘楚王馬希範十南平王從誨吳越王錢元契丹天顯一年春三月唐端明殿學士李崧吕琦請和契丹樞宻直學士薛文遇沮之以通鑑脩閩改元以十國紀年脩夏五月辛夘唐徙石敬瑭為天平節度使敬瑭反以建雄節度使張敬達為太原都招討使義武節度使楊光逺副之以新紀脩壬子唐天雄捧聖都虞候張令昭逐節度使劉延皓六月甲戌以宣武節度使范延光為四面都招討使以新紀通鑑脩秋七月唐殺石敬瑭子若弟以通鑑脩丁未唐張令昭伏誅以新紀通鑑脩石敬瑭稱臣於契丹且請納地以求救劉知逺諫不從以通鑑脩八月己未唐以范延光為天雄節度使以通鑑脩唐張敬逹圍晉陽九月契丹主徳光救之辛丑敗敬逹於汾曲遂圍之於晉安戊申唐主從珂如河陽辛亥如懐州解題曰胡寅曰龍敏之䇿必可以解晉之圍而唐之君臣不能用豈天固亡之先禠其魄乎事見通鑑冬十月唐括馬籍民兵十一月戊子以盧龍節度使趙徳鈞為行營都統其子延夀及范延光為招討使以新紀通鑑脩唐前坊州刺史劉景岩殺彰武節度使楊漢章自為留後以通鑑脩契丹立石敬瑭為皇帝國號晉晉主割幽薊等十六州以賂之嵗輸三十萬疋解題曰歐陽脩塞垣論曰漢唐之世東自遼海碣石榆關漁陽盧龍飛狐鴈門雲中馬邑定襄西抵五原朔方諸郡每匈奴犯境據險而出竒持重而待外冦晉髙祖以幽薊山後諸郡為耶律之夀自滄海乾寧雄霸順安廣信由中山距并代自兹關東無復關險故契丹奄有幽陵遂絶古北之隘徑度常山陵獵全魏民不聊生矣事見通鑑昔辛有適伊川見被髮而祭於野者曰不及百年此其戎乎而秦晉果遷陸渾之戎於伊川幽燕經安史之亂其人自視猶犬豕然終唐之世不復知有朝廷甚者稱安史父子為四聖則雖未為夷狄已胥而為夷久矣此所以至石晉竟陷左衽至今數百年而未復也己亥晉改元以河東掌書記桑維翰為翰林學士知樞宻使事軍城都巡檢使劉知逺為侍衞親軍都虞候客將景延廣為步軍都指揮使立晉國長公主為皇后閏月甲子楊光逺殺張敬達降契丹丙寅晉翰林學士承㫖趙瑩為門下侍郎維翰為中書侍郎同平章事權樞宻使光逺為侍衞馬步軍都指揮使知逺為保義節度使侍衞馬步軍都虞候晉主契丹主至潞州趙徳鈞父子降契丹執之契丹主還解題曰按秦再興洛中記異契丹主破團拍谷得趙延夀北歸情甚狎宻復用之秉政晉祖患之潛遣使上表述趙父子事清泰於上黨擁重兵窺翫神器清泰亡國不忠不孝天下所知請勿用戎主以示趙趙覽訖曰晉主不欲令皇帝用臣者欲負皇帝之厚恩也戎主曰何也對曰臣在中原日掌樞機此輩方守外鎮常為臣之所制中原土地河山人民甲馬子女玉帛津梁要害内外帑藏舟車轉輸臣並知之恐皇帝用臣即為晉主之患也戎主甚悦乃曰卿在中原日所為之事我不能知自卿事我以來即未有過乃火其書曰我誓不疑汝趙再拜復命兼鎮幽州後晉之滅皆趙賛而成之餘見通鑑丁丑唐主從珂至自懐州辛巳舉室自焚死惟王淑妃許王從益免解題曰後唐自莊宗同光元年稱帝至廢帝清泰三年亡凡十四年晉主入洛陽甲申殺張延朗劉延皓劉延朗以新紀通鑑脩十二月乙酉朔晉主如河陽以新紀脩晉追廢唐主從珂為庶人以通鑑脩丁亥晉馮道兼中書門下侍郎同平章事以新紀脩己丑晉曹州指揮使石重立殺刺史癸巳鎮州牙將祕瓊逐節度副使李彦珂以新紀通鑑脩辛丑唐安逺節度使盧文進奔吳以通鑑脩髙麗擊破新羅百濟東夷諸國皆附之以吕祖謙標目脩晉髙祖皇帝天福二年有南唐烈祖皇帝李昇昇元元年南漢髙祖皇帝大十年閩帝王昶通文二年髙蜀秦國公孟昶明徳四年遼楚王馬希範律南平王從誨吳越王錢元瓘太宗皇帝耶徳光㑹同元年春正月乙夘日有食之通鑑解題曰通鑑目錄曰本志正月乙夘朔晉正月甲寅朔蓋用馬重績調元小厯五年而差通鑑考異又曰十國紀年蜀乙夘朔日食蓋晉人避三朝日食改厯耳晉以前招收指揮使安重榮為成徳節度使以通鑑脩晉范延光殺齊州防禦使祕瓊以通鑑脩戊寅晉兵部侍郎李崧為中書侍郎同平章事樞宻使以新紀脩三月庚辰晉主如汴州以新紀脩漢交州將皎公羨殺楊延藝而代之以通鑑脩夏五月晉追尊髙祖已下考妣為帝后以通鑑脩六月晉范延光反丁未以侍衞步軍都指揮使楊光逺為魏府四面都部署東都巡檢使張從賔副之從賔反遣奉國都指揮使侯益䕶聖都指揮使杜重威討之從賔陷洛陽解題曰按新史列傳髙祖取天下不順常以此慚藩鎮多務為姑息而藩鎮之臣或不自安或心慕髙祖所為謂舉事可成故在位七年而反者六起然皆不免也餘見通鑑反者范延光張從賔王暉李金全安從進安重榮也秋七月晉義成節度使符彦饒殺戍將侍衞馬步軍都指揮使白奉進甲寅戍將盧順宻執彦饒詔殺之解題曰按新史列傳范延光反白奉進以侍衞兵屯滑州兵士犯法奉進捕得五人其三人義成兵也并斬之彦饒怒明日奉進從數騎過彦饒謝不先告而殺彦饒曰軍士各有部分義成兵卒豈公所得斬耶何無客主之禮也奉進怒曰軍士犯法安有彼此且僕已謝過而公怒不息豈欲與延光同反耶拂衣而起彦饒不復留之其麾下大譟追奉進殺之彦饒不之止也已而屯駐軍將馬萬等聞亂以兵擒彦饒送之京師遂以彦饒應延光反聞行至赤崗秦宗權將張晊冦汴州屯北郊盧瑭屯萬勝復徙就晊屯赤岡則赤岡蓋在北郊也髙祖使人殺之彦饒與晉初無釁隙以一旦之忿不能馭其軍殺奉進已非其本意以反見誅非其罪也朱熹綱目書彦饒舉兵反似與歐陽脩意異乙夘晉以光逺為都招討使辛酉重威克汜水關從賔走死以新紀通鑑脩晉安州將王暉殺節度使周瓌遣領軍上將軍李金全討之暉尋伏誅以新紀通鑑脩冬十月甲申吳齊王徐誥廢其主溥為讓皇自稱唐帝改元以吕祖謙標目脩解題曰楊行宻以景福元年為淮南節度使傳三世而為徐誥所篡凡四十六年十一月戊辰晉封吳越王元瓘為國王以通鑑脩十二月戊申蜀改明年元以通鑑脩解題曰宋庠紀年通譜孟昶廣政嗣位涉五年乃改元雖區區陋邦理均自鄶然此之不省其何國之有是嵗契丹改元國號大遼以趙延夀為樞宻使尋兼政事令以吕祖謙標目脩晉髙祖皇帝天福三年一南唐烈祖皇帝昇元二年元南漢髙祖皇帝大有十年蜀秦國公孟昶廣政年王閩帝王昶通文三年元楚王馬希範二南平髙從誨吳越王錢瓘遼㑹同年春正月戊申朔日有食之以通鑑考異脩解題曰通鑑目錄晉本志正月戊申朔南唐正月己酉朔通鑑作己酉用南唐厯也二月戊戌晉諸鎮進助國物以新紀修解題曰歐陽脩曰五代之民其何以堪之哉上輸兵賦之急下困剝歛之苛自莊宗以來方鎮進獻之事稍作至於晉而不可勝紀矣其添都助國之物動以千數計至於來朝奉使買宴贖罪莫不出於進獻而功臣大將不幸而死則其子孫率以家資求刺史其物多者得大州善地蓋自天子皆以賄賂為事矣則其民何以堪之哉秋七月辛酉晉作受命寳以通鑑脩八月晉上遼主徳光及太后尊號以通鑑脩九月范延光降晉以為天平節度使以吕祖謙標目脩辛未晉以楊光逺為天雄節度使以通鑑脩冬十月戊寅遼加晉主尊號以通鑑脩晉建東京於汴州以汴州為開封府東都為西京西都為晉昌軍以吕祖謙標目脩晉楊光逺論執政過失桑維翰李崧罷樞宻使以吕祖謙標目脩楊延藝故將吳權殺皎公羨據交州以通鑑脩十一月丙午晉以閩主昶為閩國王以十國紀年脩晉以楊光逺為西京留守兼河陽節度使以通鑑新史列傳脩辛亥晉升廣晉府為鄴都置彰徳軍於相州以澶衞𨽻之置永清軍於貝州以博冀𨽻之徙澶州城跨徳勝軍以吕祖謙標目脩解題曰按寰宇記徳勝本漢頓邱縣地在魏州之南今縣北古隂安城是也唐置州晉於此夾河造舟為梁漢乾祐元年移就徳勝寨故基周又移今治甲寅晉范延光以太子太師致仕以通鑑脩癸亥晉聴民自鑄錢以吕祖謙標目脩唐弑讓皇溥以十國紀年餘錄脩解題曰通鑑考異據舊史唐餘錄皆云溥禪位逾年以幽卒劉恕十國紀年曰辛丑唐人弑讓皇新史但云卒路振國志云溥能委運授終不罹篡殺之禍亦云溥卒今據薛史唐餘錄十國紀年書之從其多者也晉髙祖皇帝天福四年二南唐烈祖皇帝昇元三年二南漢髙祖皇帝大有十年蜀秦國公孟昶廣政年王閩帝王曦永隆元年元楚王馬希範三南平髙從誨吳越王錢瓘遼㑹同年春正月甲寅晉以義成節度使馮暉為朔方節度使以通鑑脩解題曰唐地理志夏州朔方郡靈州靈武郡新五代史職方考靈州朔方節度唐主誥復姓李更名昇不受尊號以吕祖謙標目脩解題曰按劉恕十國紀年帝欲祖太宗子吳王恪議者以恪誅欲祖髙宗子鄭王元懿命有司檢討二王苗裔有司言吳王後宰相峴見於國史恪生琨琨生禕禕生峴峴生渙渙生倬倬生超超生志志生榮榮生帝乃為吳王苗裔餘見通鑑周世宗實錄及五代史稱昇𤣥宗子永王璘苗裔徐鉉江南錄云憲宗子建王恪之𤣥孫蜀後主實錄云唐嗣薛王知柔為剱南節度使卒官其子知誥流落江淮為徐温養子吳越備史云昇本潘氏湖州人父為安吉呰將吳將李神福過湖州虜昇歸為𨽻徐温嘗過神福求為養子按昇曽祖超祖志乃與徐氏曽祖同名附㑹祖宗固非李氏吳越與唐仇亦非實錄今存衆説以備傳疑夏四月甲申晉廢樞宻院宰相分判以吕祖謙標目脩解題曰按舊史職官志先是宰臣桑維翰兼樞宻使懇求免職只在中書遂以劉處讓代之每有奏議多不稱㫖及處讓丁憂乃以樞宻院印付中書門下晁補之曰樞宻院自唐以宦者為之内持權脅制人主其患非一日之故也莊宗改用武臣而安重誨之徒實制朝廷髙祖奪以付宰相名實稱矣雖其初宦者武臣不悦至於罷維翰等然卒廢樞宻使不畀近習握兵之人自此始餘見通鑑秋七月庚子朔日有食之通鑑丙辰晉復禁鑄錢以新紀脩閏月壬申晉桑維翰罷以新紀脩解題曰去年維翰之罷樞宻使出於楊光逺之意也今年維翰之罷相又以光逺之疏也强蕃跋扈如此使賢相不得安於厥位國其能久乎事見通鑑閩弑其主昶及后昶叔父延羲自稱閩國王更名曦改元以吕祖謙標目脩解題曰宋庠紀年通譜永隆本梁師都唐髙宗年號八月河決晉博州以新紀通鑑脩解題曰按新史職方考晉無薄州通鑑作薄州誤也辛丑晉馮道守司徒兼侍中以通鑑脩九月晉以唐許王李從益為郇國公奉唐祀以新紀通鑑脩十二月晉禁創造佛寺以通鑑脩晉髙祖皇帝天福五年年唐烈祖皇帝昇元四年三南漢髙祖皇帝大有十三蜀秦國公孟昶廣政年王閩帝王曦永隆二年元楚王馬希範四南平髙從誨吳越王錢瓘遼㑹同年春二月閩王曦攻建州刺史王延政吳越遣兵救之夏五月延政與閩合擊吳越大破之以吕祖謙標目脩晉安逺節度使李全金叛附於唐六月癸夘唐將李承裕入之全金奔唐晉安逺節度使馬全節大破承裕丁未克安州以新紀通鑑脩秋八月晉楊光逺殺范延光以新紀脩解題曰按新史列傳初祕瓊殺董温而取其貲延光又殺瓊而取之而終以貲為光逺所殺而光逺亦不能免也餘見通鑑九月辛未晉李崧奏倉糧有餘晉主敬瑭曰法外税民罪同枉法痛懲之以通鑑脩甲申晉徙楊光逺為平盧節度使爵東平王以通鑑脩冬十月晉以閩王曦為閩國王以朱熹綱目脩晉髙祖皇帝天福六年四南唐烈祖皇帝昇元五年四南漢髙祖皇帝大有十年蜀秦國公孟昶廣政年王閩帝王曦永隆三年𢎞楚王馬希範五南平髙從誨吳越王錢佑遼㑹同年春二月閩以建州為鎮安軍王延政為節度使以十國紀年脩夏六月晉安重榮執遼使者請擊之晉主不能制以通鑑脩秋七月己巳晉以鄴都留守劉知逺為河東節度使八月以天平節度使侍衞馬步副都指揮使杜重威為都指揮使以吕祖謙標目脩解題曰胡寅曰晉祖為楊光逺而出桑維翰為杜重威而出劉知逺此亡國之本也契丹之事維翰知逺任之有餘矣委付不專則心不固施設不久則政不堅他日契丹入冦維翰無權而知逺顧望蓋晉祖使然也事見通鑑壬辰晉主如鄴都以吕祖謙標目脩吳越王元瓘卒九月庚申子𢎞佐立以吕祖謙標目脩辛酉河決晉滑州以通鑑脩冬十月閩主曦稱帝以通鑑脩十一月晉山南東道節度使安從進反丁丑以西京留守髙行周為都部署討之監軍張從恩大敗從進於花山以新紀通鑑脩解題曰按舊史李建崇傳從進冦南陽張從恩焦繼勲㑹建崇拒賊至湖陽縣之花山遇從進軍大敗之十二月晉安重榮反以杜重威為招討使戊戌大敗之於宗城以新紀通鑑脩漢主龔更名龑以通鑑脩庚戍晉以吳越王𢎞佐為國王以通鑑脩晉髙祖皇帝天福七年南漢帝劉玢光天元年南唐烈祖皇帝昇元六年蜀秦國公孟昶廣政五年閩帝王曦永隆四年錢楚王馬希範同南平王髙從誨吳越王𢎞佐遼㑹六年春正月丁巳晉克鎮州安重榮伏誅以新紀脩二月唐左丞相宋齊邱知尚書省事既而復罷以通鑑脩夏四月晉諫議大夫鄭受益刑部郎中李濤等請誅右武衞大將軍張彦澤止削階降爵以吕祖謙標目脩丁丑漢主龑薨子秦王玢立改元以吕祖謙標目脩五月晉尊太妃劉氏為皇太后以新紀脩晉主寢疾屬㓜子重睿於馮道六月乙丑晉主敬瑭殂道與侍衞馬步都虞候景延廣奉其兄子齊王重貴即皇帝位丁夘尊皇太后曰太皇太后皇后曰皇太后以吕祖謙標目脩晉告哀於遼稱孫不稱臣自此有隙以新紀稽古錄脩秋七月晉加景延廣同平章事兼侍衞馬步都指揮使以通鑑脩八月晉克襄州安從進伏誅以吕祖謙標目脩冬晉官自賣鹽復収食鹽錢以吕祖謙標目脩晉出帝石重貴天福八年晟南唐元宗皇帝李璟保大元年南漢中宗皇帝劉乾和元年蜀秦國公孟昶廣政六年王閩帝王曦永隆五年從殷帝王延政天徳元年楚馬希範南平王髙誨吳越王錢𢎞佐七遼㑹同年春二月己未晉主如東京以新紀脩唐主昪薨以吕祖謙標目脩閩王延政稱殷帝改元以吕祖謙標目脩三月己夘朔晉中書令趙瑩罷以晉昌節度使桑維翰為侍中以新紀脩解題曰按孔平仲續世説出帝之初浸用景延廣維翰恐與虜失歡上疏曰議者以陛下於契丹有所供億謂之耗蠧有所卑遜謂之屈辱微臣所見則曰不然漢祖英雄猶輸貨於冒頓神堯武畧尚稱臣於可汗此謂達於權變善於屈伸所損者微所利者大必若因兹遂成釁隙自此嵗嵗調發日日轉輸困天下之生靈空國家之府藏此為耗蠧不亦甚乎兵戈既起將帥擅權武吏功臣過求姑息邉藩逺郡得以驕矜外剛内柔上陵下替此為屈辱又非多乎議論雖不止此其揣度事勢深切著明唐齊王璟即帝位改元以鎮南節度使宋齊邱為太保中書令以通鑑脩漢晉王𢎞熈弑其主玢自稱帝更名晟改元應乾以吕祖謙標目脩夏四月戊申朔日有食之通鑑晉旱蝗大起以新紀通鑑脩晉馮道罷以新紀脩秋七月己丑晉括民穀殺藏者以新紀脩冬十月戊申晉立吳國夫人馮氏為皇后以通鑑脩解題曰馮氏叔母也新史世家契丹薄京師暴帝之惡於天下曰納叔母於宫中亂人倫之大典雖聞者猶知愧而帝不知愧乎事見通鑑十一月丁亥漢改元以通鑑脩十二月晉楊光逺反以吕祖謙標目脩唐宋齊丘罷以通鑑脩晉出帝開運元年年南唐元宗皇帝保大二年年南漢中宗皇帝乾和二蜀秦國公孟昶廣政七殷帝王延政天徳二年越閩王朱文政遼楚王馬希範南平王髙從誨吳王錢𢎞佐㑹同八年解題曰宋庠紀年通譜開運即位三年始改元與梁貞元同失春正月甲戍朔遼主徳光冦晉晉以歸徳節度使髙行周為北面都部署乙酉晉主如澶州甲午以劉知逺為幽州道招討使辛丑知逺敗遼兵於秀容二月丙午遼圍行周於戚城晉主自將救之戊申前軍都虞候李守貞敗之於馬家口三月癸酉朔遼逼澶州行周與戰於戚城遼兵遁以新紀通鑑脩晉封劉知逺為太原王以實錄脩乙酉閩都將朱文進弑其主曦自立以吕祖謙標目脩晉籍鄉兵以通鑑脩夏四月甲寅晉主至自澶州以新紀脩辛酉晉景延廣罷為西京留守以髙行周為侍衞馬步都指揮使以吕祖謙標目脩晉括民財以吕祖謙標目脩五月戊寅晉命李守貞討楊光逺以吕祖謙標目脩六月癸夘晉馮道罷以通鑑脩丙午晉復置樞宻院以桑維翰為中書令兼樞宻使以吕祖謙標目脩丙辰河決晉滑州以新紀脩戊午晉以府州刺史折從阮為團練使以吕祖謙標目脩秋七月辛未晉改元以通鑑脩八月辛丑朔晉以劉知逺為北面都統順徳節度使杜重威為都招討使督十三節度使以備遼以吕祖謙標目脩解題曰按新史職方考鎮州故曰成徳梁改武順唐復成徳晉改順徳漢復成徳通鑑以順徳為順國當攷九月庚午朔日有食之通鑑冬十一月閩泉州指揮使留從效陷泉州殷漳汀二州亦降之閩遣兵攻之尋大敗以吕祖謙標目脩十二月癸丑晉封知閩國事朱文進為王以通鑑脩丁巳晉萊州防禦使楊承勲囚其父光逺以降以新紀脩殷攻閩唐代殷以救之以吕祖謙標目脩閏月晉楊光逺伏誅丙戌起復楊承勲汝州防禦使以吕祖謙標目脩閩殺其主文進以降殷以吕祖謙標目脩遼主徳光冦晉屯元氏以吕祖謙標目脩晉出帝開運二年年南唐元宗皇帝保大三年年南漢中宗皇帝乾和三蜀秦國公孟昶廣政八閩帝王延政天徳三年錢楚王馬希範同南平王髙從誨吳越王𢎞佐遼㑹九年春正月殷以同平章事王繼昌鎮福州以十國紀年脩遼陷晉泰州至相州而還解題曰按樂史太平寰宇記保州莫州清苑縣地蕃戎立泰州開運元年復二年陷乙丑晉主如澶州以新史脩殷改號閩吕祖謙標目二月晉端明殿學士户部侍郎馮玉為户部尚書兼樞宻使以吕祖謙標目脩唐敗閩兵圍建州以十國紀年脩三月福州李逹殺王繼昌己亥立僧卓岩明為帝奉晉正朔以十國紀年脩庚戍晉取泰州遼復入冦己未杜重威等敗之於陽城甲子大敗之於衞村解題曰澤州有陽城縣縣有衞村夏四月甲申晉主至自澶州以新紀脩晉封劉知逺為北平王以實錄脩己丑晉以鄴都為天雄軍通鑑五月晉杜重威入朝桑維翰請廢之不從以吕祖謙標目脩丁巳李逹殺卓岩明自稱留後奉唐正朔以十國紀年脩六月癸酉晉以杜重威為天雄節度使以通鑑脩晉遣軍將張暉奉表稱臣於遼以通鑑脩秋八月甲子朔日有食之通鑑丙寅晉加馮玉中書侍郎同平章事以新紀脩唐克閩降王延政九月泉漳汀三州亦降以南唐書脩解題曰宋庠紀年通譜王延政上距延鈞僣號四主十四年通延翰審知王潮五主六十年冬十二月晉桑維翰罷以開封尹趙瑩為中書令李崧為樞宻使以吕祖謙標目脩晉出帝開運三年年南唐元宗皇帝保大四年年南漢中宗皇帝乾和四蜀秦國公孟昶廣政九楚王馬希範𢎞南平王髙從誨年吳越王錢佐遼㑹同十春正月唐以鎮海節度使宋齊邱為太傅中書令不預政事以通鑑脩二月壬戌朔日有食之通鑑夏五月留從効自領泉州以十國紀年脩六月丙寅晉以步軍都指揮使馮暉為朔方節度使以通鑑脩遼冦晉己丑晉以李守貞為北面都部署以新紀脩秋七月河決晉楊劉以通鑑脩八月唐樞宻使陳覺使福州矯命攻李逹以十國紀年脩九月遼冦河東壬辰晉劉知逺敗之於陽武谷以通鑑脩解題曰方輿志忻口東北三十里至代州界陽武驛實錄作楊武又羊武谷甲午晉以李逹知閩國事以通鑑脩晉彰徳節度使都排陣使張彦澤敗遼於新興以新紀列傳脩解題曰入塞圖云從晉陽西北一百八十里至新興通典隋新興郡改為忻州唐克閩外城以十國紀年脩丙辰河決晉澶州以通鑑脩遼劉延祚詐以瀛州降冬十月晉以杜重威為北面都招討使李守貞為兵馬都監以列傳脩壬午吳越救閩以吕祖謙標目脩十一月遼主徳光冦晉杜重威張彦澤等至中渡遼圍之十二月壬戍奉國都指揮使王清戰於滹沱河死之重威彦澤李守貞降遼解題曰歐陽脩曰晉之事醜矣而惡亦極也其禍亂覆亡不暇蓋必然之理爾使重威等雖不叛以降虜亦未必不亡然開虜之隙自一景延廣而卒成晉禍者此三人也重威彦澤之死晉人至於争已戮之尸臠其肉剔其髓而食之撦裂蹈踐斯須而盡何其甚哉此自古所未有也然當是時舉晉之兵皆在北面國之存亡係此三人之勝敗則其任可謂重矣蓋天下惡之如彼晉方任之如此而終以不悟豈非所謂臨亂之君各賢其臣者歟事見通鑑癸酉彦澤入汴晉主重貴降遼彦澤殺開封尹桑維翰以新紀通鑑脩解題曰按新史耶律徳光犯京師遣張彦澤遺太后書問維翰延廣在否可使先來而帝以維翰嘗議毋絶盟而已違之也不欲維翰見徳光因諷彦澤圖之而彦澤亦利其貲産維翰坐府中彦澤以兵入問維翰何在維翰厲聲曰吾晉大臣自當死國安得無禮耶彦澤股慄不敢仰視退而謂人吾不知桑維翰何如人今見之猶使人恐懼如此其可再見乎乃以帝命召維翰新史書此事最得晉出帝殺維翰之情舊史帝思維翰在朝時累貢謀畫請與虜和慮戎主到京則顯彰已過欲殺維翰以滅口因令張彦澤殺之范質陷蕃記亦云帝使彦澤羈縻桑維翰於侍衞司通鑑疑彦澤是時未必肯從出帝之命不取此説餘見通鑑大事記續編卷七十五
