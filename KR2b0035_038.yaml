body:
  text: 大事記續編卷三十八明王禕撰宋太宗明皇帝泰始三年年魏顯祖獻文皇帝皇興元春正月癸巳魏都督諸軍尉元大破張永等於吕梁東遂取淮北及豫州淮西之地以魏紀及吕祖謙標目修解題曰按通鑑考異索虜傳曰永攸之敗退虜攻青兾二州執文秀道固又下書曰淮北三州民自天安二年正月三十日壬寅昧爽已前罪一切原免按青州破在五年淮北三州蓋徐司豫壬寅二十日壬子三十日也閏月宋青州刺史沈文秀兾州刺史崔道固降魏二月復降宋三月魏征南大將軍慕容白曜督諸軍攻之以通鑑修秋八月壬寅宋遣中領軍沈攸之攻彭城魏拒之攸之敗走魏取下邳宿豫淮陽磐陽以通鑑修解題曰按宋州郡志淮陽郡屬徐州宿豫屬淮陽磐陽屬青州齊郡戊申魏改元以魏紀修解題曰通鑑不載闕也魏馮太后還政以吕祖謙標目修冬十二月常珍奇降宋以通鑑修時宋斷內外百官俸以吕祖謙標目修宋太宗明皇帝泰始四年年魏顯祖獻文皇帝皇興二春正月魏攻宋豫州刺史劉勔破之以通鑑修魏尉元都督徐南北兖三州軍事徐州刺史以通鑑修解題曰按魏書地形志南北兖州宋治瑕邱魏領泰山宋襲慶府淄州之地魯襲慶府之地髙平襲慶府單濟二州之地任城濟州之地東平東平襲慶二府濮州之地東陽平後省郡六既有南兖州則兖州為北兖州矣二月崔道固降魏以吕祖謙標目修宋交州人李長仁據州反以吕祖謙標目修夏四月丙子朔日有食之通鑑目録己卯宋減郡縣田租之半以本紀修解題曰王容曰宋自孝建以來用度奢侈安得有蠲賦減租之事宋書廢帝紀永光元年二月減州郡縣田租之半謂州郡縣官公田及奉祿也明帝泰始三年復郡縣公田故今年又減其租入之半然則田租乃廢帝紀所書田祿也通鑑偶不書減田祿復公田二事故難稽其端緒爾秋七月庚申宋以驍騎將軍蕭道成為南兖州刺史以本紀修冬十月癸酉朔日有食之以本紀修十一月李長仁降宋以通鑑修宋將軍阮佃夫中書通事舍人王道隆員外散騎侍郎楊運長預政以吕祖謙標目修解題曰按齊書幸臣傳晉令中書舍人九品江左置通事郎管司詔誥其後郎為侍郎而舍人亦稱通事宋孝武以來士庶雜選明帝世專為佞幸矣齊初關讞表啓發署詔敕侍郎之局復見侵矣建武世詔令殆不關中書專出舍人省內舍人四人所置四省其下有主書令史人數無員莫非左右要密天下文簿版籍入副其省萬機嚴祕有如尚書宋太宗明皇帝泰始五年年魏顯祖獻文皇帝皇興三春正月乙丑魏執沈文秀青冀盡入於魏以吕祖謙標目修解題曰通典魏自太武以後漸更強盛宋明以後及于齊梁國土漸蹙自守不暇雖時有侵掠而退不旋踵故魏之城鎮少被攻圍二月己卯魏上黨公慕容白曜都督青齊東徐三州軍事開府青州刺史封濟南王以魏紀修魏立輸租法除雜調以通鑑修夏五月魏立僧祗佛圖戶以通鑑修解題曰沙門統曇曜奏平齊户及諸民有能歲輸穀六十斛入僧曹者即為僧祗户粟為僧祗粟至於儉歲賑給飢民又請民犯重罪及官奴以為佛圖戶以供諸寺掃灑歲兼營田輸粟並許之於是僧祗戶粟及寺戶遍於州鎮矣朱黼曰先王度地而授民料民以制食因口之多寡而賦之地故有夫井之定數因歲之登耗而給之食故有釜鍾之定法惟其品節劑量於細微之中故地無曠土民無失業自佛教入中國民之遊惰者盡歸沙門於是天下多不耕之人自魏顯祖聽民入粟為僧祗戶於是天下有不耕之地聽民之犯罪者得入為浮屠戶於是天下有不得役使之人然曇曜始初輸粟之請猶以遇凶歲即以賑給今雖凶歉不得而用也始初灑掃之請猶以民有重罪及沒入官奴者今雖平民不得而止也流弊日甚可勝歎哉六月魏立子宏為皇太子以魏紀修宋殺車騎將軍開府南豫州刺史廬江王禕以紀傳修冬十月丁卯朔日有食之以本紀修十一月丁未魏復修好於宋以通鑑修十二月戊戌宋建安王休仁解楊州刺史以吕祖謙標目修宋置三巴校尉以吕祖謙標目修宋太宗明皇帝泰始六年年魏顯宗獻文皇帝皇興四春正月乙亥宋制歲祀明堂間祀南郊以本紀修夏六月癸卯宋以鎮南將軍江州刺史王景文為左僕射楊州刺史以本紀修秋九月柔然侵魏魏伐柔然大敗之以魏紀修冬十月魏殺慕容白曜以魏紀修宋太宗明皇帝泰始七年興元年魏髙祖孝文帝拓跋宏延春二月戊戍宋分交廣州置越州以吕祖謙標目修解題曰按州郡志越州分交之合浦屬廉欽宜雍柳容高雷瓊鬱林南寧萬安吉陽等州宋壽屬欽州廣之臨漳屬廉州又新立百梁壠蘇永寧安昌屬廉州富昌南流屬容鬱林二州六郡甲寅宋殺驃騎大將軍南徐州刺史晉平王休祐以吕祖謙標目修夏五月戊午宋殺太尉領司徒建安王休仁以吕祖謙標目修解題曰休仁為計誅鉏孝武諸子至無遺育終亦不能自免而已矣事見通鑑庚午宋以右僕射袁粲為尚書令吏部尚書禇淵為左朴射以本紀修宋殺太子屯騎校尉壽寂之以吕祖謙標目修秋七月乙丑宋殺車騎大將軍江州刺史巴陵王休若以驃騎大將軍桂陽王休範為江州刺史以吕祖謙標目修宋殺前督豫州軍事吳喜以吕祖謙標目修宋徵蕭道成為散騎常侍以通鑑修八月丙午魏太子宏即皇帝位改元丁未尊魏主為太上皇帝總大政以吕祖謙標目修宋太宗明皇帝泰豫元年魏高祖孝文帝延興二年春正月甲寅朔宋改元以本紀修一月己丑宋殺中書監揚州刺史王景文以本紀修解題曰蘇軾曰明帝答景文詔曰有心於避禍不若無心於任運千仞之木既摧於斤斧一寸之草亦悴於踐踏晉將軍畢萬七戰皆獲死於牖下蜀將費禕從容坐談斃於刺客故甘心於履危未必逢禍縱意於處安未必全福此言近於達者然明帝竟殺景文哀哉景文之死也手敕曰與卿周旋欲全卿門户故有此處分敕至景文與客棊棊竟斂子納奩畢徐曰有詔見賜以死酒至未飲門生焦度在側發酒覆地曰大丈夫安能坐受死州中文武足以一奮景文曰知卿至心若見念者為我百口計乃作墨啓答敕致謝死生亦大矣而景文安之豈貪權竊國者乎明帝可謂不知人矣餘見通鑑明帝殺壽寂之吳喜王景文而不能殺蕭道成休仁休若兄弟勦戮略盡而不慮及休範天下事豈智術之所能盡哉夏四月己亥宋袁粲及護軍將軍禇淵右僕射劉勔荆州刺史蔡興宗郢州刺史沈攸之受顧命淵薦蕭道成為右衛將軍共掌機事宋主殂庚子太子昱即皇帝位乙巳以安成王凖為揚州刺史以吕祖謙標目修解題曰道成之自南兖被徴也嘗以兵動虜逡巡而不至矣及在北兖被徴也又嘗有骨肉相殘禍難將興方與卿等戮力之言矣使淵而不知是不智也知而薦之是不忠也天方厭劉氏厚其毒而降之罰於淵何尤哉事見通鑑按齊書禇淵傳淵為丹陽與從弟照同載出道逢太祖淵謂照曰此非常人也出為吳興太祖餉物别淵又謂人曰此人材貌非常將來不可測也及顧命之際引太祖豫焉六月乙巳宋尊皇后曰皇太后立妃江氏為皇后以本紀修秋閏七月甲辰宋鎮西將軍沈攸之都督荆湘梁寧等八州軍事荆州刺史以吕祖謙標目修解題曰按州郡志寧州領建寧宋黔敘二州長寧軍及姚州之地晉寧敘州姚州之地牂柯黔珍靖三州及南平軍平蠻思黔珍三州夜郎黔施珍融四州南平軍朱提敘州長寧軍南廣敘州建都未詳西平嶲州西河陽嶲州東河陽姚州雲南敘州姚州興寧敘州姚州之地興古黔敘嶲州之地梁水敘黔二州郡十五八月戊午宋開府樂安宣穆公蔡興宗卒以吕祖謙標目修冬十一月魏上皇擊柔然以魏紀修己亥宋平西將軍郢州刺史劉秉為左僕射以吕祖謙標目修宋中書通事舍人阮佃夫加給事中輔國將軍以列傳修魏詔非天地宗廟社稷勿用牲以通鑑修宋蒼梧王劉昱元徽元年魏高祖孝文帝延興三年春正月戊寅朔宋改元以本紀修二月吐谷渾寇魏夏四月戊申魏伐之以魏紀修秋七月魏詔河南六州戶收絹一匹綿一斤租三十石以魏紀修八月吐谷渾降魏以魏紀修冬十月武都王楊僧嗣卒從弟文度自立降魏以通鑑修十一月宋袁粲罷固辭起復以紀傳修十二月癸卯朔日有食之以本紀修宋蒼梧王元徽二年四年魏高祖孝文帝延興夏五月壬午宋太尉桂陽王休範反平南將軍蕭道成屯新亭壬辰休範攻之死其將攻朱雀桁鎮軍將軍劉勔死之東府陷丙申始平六六月庚子以道成為中領軍鎮南將軍南兖州刺史以吕祖謙標目修解題曰道成振旅凱入百姓緣道聚觀曰全國家者此公也以道成為中領軍賞其功也道成之得兵權始於此而篡宋之基亦始於此餘見通鑑南朝宫苑記朱雀門吳所立名大航門南臨淮水北直對宣陽門去臺城可七里晉咸和中改朱雀門禇淵傳載道成辭領軍啓甚力彼其初猶有所退託未敢徑居之也郢州刺史晉熙王燮克尋陽以本紀修魏罷門房之誅以吕祖謙標目修魏不赦以吕祖謙標目修宋蒼梧王元徽三年五年魏高祖孝文帝延興春三月宋以車騎將軍張敬兒都督雍梁州軍事雍州刺史以吕祖謙標目修秋七月宋以開府衛將軍袁粲為中書監開府領司徒中軍將軍禇淵為尚書令以本紀修八月魏置河東鹽官以食貨志修解題曰按魏書食貨志河東郡鹽池舊立官司以收稅利是時罷之而民有富強者專擅其用貧弱者不得資益延興末復立監司量其貴賤節其賦入公私兼利世宗即位政存寬簡復罷其禁與百姓共之其國利所須别為倐制取足而已自後豪貴之家復乘勢占奪近池之民又輒障吝強弱相陵神龜初太師高陽王雍太傅清河王懌等奏繞池之民尉保光等擅自障禁取與自由貴賤任口請依先朝之詔禁之為便於是復置監官以監檢焉其後更罷更立以至於永熙宋蒼梧王元徽四年元年魏髙祖孝文帝承明夏六月辛未魏皇太后馮氏弒太上皇壬申改元以吕祖謙標目修乙亥宋以左僕射劉秉為中書令加蕭道成左僕射以吕祖謙標目修戊寅魏尊皇太后曰太皇太后臨朝稱制諡太上皇獻文皇帝以魏紀修秋七月戊子宋征北將軍南徐州刺史建平王景素起兵乙未敗死以吕祖謙標目修宋順皇帝劉凖升明元年魏高祖孝文帝大和元年春正月乙酉朔魏改元以魏紀修解題曰太和本魏明帝石勒晉海西公李勢年號夏四月宋南豫州刺史阮佃夫等謀廢立甲戍伏誅以紀傳修秋七月戊子宋蕭道成弒其主追廢為蒼梧王壬辰安成王凖即皇帝位改元以吕祖謙標目修甲午宋蕭道成鎮東府丙申自為録尚書事袁粲為中書監禇淵開府劉秉遷尚書令加中領軍加沈攸之車騎大將軍開府八月癸亥粲鎮石頭以通鑑吕祖謙標目修解題曰按齊書列傳髙祖坐東府高樓紀僧真侍側上曰諸將勸我誅袁劉我意不欲便耳袁劉在道成掌握中久矣事見通鑑丙子魏詔工商皂𨽻有役者止本部丞以本紀修九月乙酉魏定律令以本紀修冬十月楊文度取仇池十二月魏擊走之以本紀修宋沈攸之舉兵討蕭道成以吕祖謙標目修壬申宋袁粲劉秉謀誅蕭道成不克死之以吕祖謙標目修解題曰按列傳粲與蕭道成禇淵劉秉入直平決萬機時謂之四貴粲間默寡言不肯當事主書每往咨決或高詠對之時立一意則衆莫能改好飲酒善吟諷獨酌園庭以此自適居負南郭門無雜客及受遺當權四方輻湊間居髙卧一無所接順帝即位遷中書監司徒侍中如故時道成居東府使粲鎮石頭粲自以身受顧託不欲事二姓密有異圖丹陽尹劉秉宋代宗室前湘州刺史王藴太后兄子素好武事並慮不見容於道成皆與粲相結將帥黃回任候伯孫曇瓘王宜興彭文之卜伯興等並與粲合餘見通鑑王師古曰沈攸之之討道成以為少帝昏狂宜與諸公密議共白太后下令廢之奈何交結左右親行弒逆其言當矣蓋人臣弒逆之罪夫人皆得以討之况受遺之大臣乎方道成召袁粲劉秉入議其心猶有所顧忌二子當正色明義而不為凶𦦨所脅可也乃退縮畏沮拱手而付之道成及篡弒已成乃行茍簡之計欲以一死報國所謂匹夫匹婦之為諒也豈大臣之義哉閏月乙未宋沈攸之攻郢州以吕祖謙標目修壬寅魏斬楊文度以楊文𢎞為武都王以本紀修乙巳宋蕭道成假黃鉞屯新亭以本紀修宋順皇帝升明二年二年魏髙祖孝文帝太和春正月沈攸之衆潰于郢張敬兒襲據江陵攸之自殺以吕祖謙標目修二月癸未宋蕭道成自加太尉都督十六州軍事衛將軍禇淵為中書監司空吏部郎王儉為太尉長史以紀傳修夏四月辛卯宋殺前郢州刺史黃回以本紀修五月魏禁皇族貴戚與非類昏偶以魏紀修六月丁酉宋以楊文𢎞為武都王以本紀修秋八月乙未宋以散騎常侍中領軍蕭嶷為江州刺史江州刺史蕭賾為領軍將軍以吕祖謙標目修九月乙巳朔日有食之以本紀修丙午宋蕭道成自加太傅大都督中外軍事加殊禮辭不受以本紀修冬十月壬寅宋立皇后謝氏以本紀修十二月宋尚書令王僧虔奏補綴禮樂以吕祖謙標目修大事記續編卷三十八
