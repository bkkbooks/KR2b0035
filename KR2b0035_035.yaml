body:
  text: 大事記續編卷三十五明王禕撰晉安皇帝義熙十三年燕馮跋太平九年乞秦帝姚泓永和二年西秦伏熾磐永康六年凉魏明元皇帝泰常二年夏西凉李歆嘉興元年北沮渠䝉遜𤣥始六年赫連勃勃鳳翔五年春正月甲戌朔日有食之以本紀修秦將軍齊公恢反於安定東平公紹擊誅之以吕祖謙標目修劉裕發彭城留其子彭城公義隆鎮之以通鑑修二月西凉公皓卒子歆立改元以吕祖謙標目修解題曰宋庠紀年通譜曰不俟踰年改元秦都督中外軍事魯公紹守潼關三月檀道濟沈林子等與戰大破之紹退屯定城以載記修庚辰劉裕自清河入河魏師救秦與裕夾河而行以通鑑修王鎮惡說𢎞農百姓送義租給軍食以通鑑修夏四月劉裕遣兵破魏河北軍遂至洛陽以通鑑修秦魯公紹卒以吕祖謙標目修五月魏置六部大人以朱熹綱目修秋七月沈田子等入武關屯青泥八月秦主泓襲之大敗而還以吕祖謙標目修辛丑劉裕至潼關王鎮惡水軍入渭大破秦軍遂入長安癸亥秦主泓降其子佛念死之解題曰按載記姚萇以孝武太元九年僣立傳興至泓三世以安帝義熙十三年滅凡三十二年九月裕至長安執泓以歸殺之通鑑夏人據安定降秦嶺北郡縣以通鑑修冬十一月辛未劉穆之卒以太尉司馬徐羡之掌留任以宋書紀傳修劉裕以其子桂陽公義真都督雍凉秦州軍事雍東秦二州刺史太尉參軍王修為安西長史王鎮惡為安西司馬沈田子為安西中兵參軍十二月庚子裕發長安夏王勃勃遣兵攻長安以通鑑吕祖謙標目修晉安皇帝義熙十四年燕馮跋太平十年太秦乞伏熾磐永康七年魏宗明元皇帝泰常三年七西凉李歆嘉興二年武北凉沮渠蒙遜𤣥始年夏赫連勃勃昌元年春正月沈田子王鎮惡拒夏兵田子殺鎮惡王修殺田子雍州治中從事史傅𢎞之破夏兵却之以朱熹綱目修壬戌劉裕至彭城以吕祖謙標目修劉裕以其子彭城公義隆都督荆益等六州軍事荆州刺史以吕祖謙標目修三月遣使聘魏以吕祖謙標目修夏五月魏襲燕圍和龍不克以通鑑修六月劉裕受相國宋公加九錫之命以吕祖謙標目修秋七月癸亥彗星出太微進掃紫微以宋書五行志修冬十月以西凉公歆為酒泉公以本紀修桂陽公義真殺王修宋公裕以相國司馬朱齡石鎮長安十一月義真東還齡石亦走夏兵追之青泥大敗之獲傅𢎞之齡石奔潼關見殺解題曰按晉書宋書魏書南史紀傳義熙十二年三月加裕中外大都督初裕平齊仍有定關洛之意值盧循侵逼故其事不諧荆雍既平方謀外略㑹姚興死子泓立兄弟相殺關中擾亂裕乃戒嚴北討加領征西將軍司豫二州刺史以世子義符為徐兖二州刺史裕欲以義聲懷逺奉琅邪王北伐五月加裕北雍州刺史以義符為中軍將軍監太尉留府事劉穆之為左僕射監領軍中軍二府軍事入居東府總攝內外以征虜王仲德為前鋒諸軍事遣冠軍檀道濟龍驤王鎮惡步向許洛寧朔劉遵考建武沈林子出石門東平府之石門從汴入河寧朔朱超石胡藩向半城未詳咸受統於仲德仲德率龍驤朱牧等開巨野入河建威傅𢎞之振武沈田子等自武關入八月丁巳發京師九月裕次彭城加領徐州刺史道濟鎮惡自淮淝攻漆丘杜預注左傳髙平南平陽縣東北有漆鄉項城泓將王茍生以漆丘降鎮惡徐州刺史姚掌以項城降道濟遂入潁口水經淮水又東潁水從西北注之所至多降服惟新蔡今蔡州縣太守董遵固守道濟攻破殺之進克許昌獲潁川太守姚坦及大將楊業林子從汴入河攻倉垣克之秦兖州刺史韋華降仲德將逼滑臺魏兖州刺史尉建棄城濟河仲德入滑臺魏主嗣遣叔孫建公孫表自河內向枋頭渡河曜威斬尉建於城下呼仲德軍人詰其侵境之意仲德遣竺和之答曰王征虜為劉太尉所遣入河西行將取洛城掃山陵之冦非敢侵犯魏境魏河內鎮將魏河內郡在懷川于栗磾築壘於河上禁防嚴密裕甚憚之不敢前裕遺栗磾書求假道西上裕舟師自淮泗入清欲泝河西上泓乞師于魏魏主詔羣臣議之咸曰函谷關天險劉裕舟船步兵何能西入若北上河岸其行為易揚言伐姚意或難測冦不可縱宜先發軍斷河上流勿令西過崔浩曰興死子劣乘其危而伐之臣觀其意必欲入關若塞其西路裕必上岸北侵如此則姚無事而我受敵今蠕蠕內冦民食又乏發軍赴南則北冦進擊救北則南州復危未若假之水道縱裕西入然後興兵塞其東歸之路此卞莊刺虎之勢也使裕勝必德我假道之惠姚氏勝亦不失救鄰之名縱使裕得關中縣逺難守終為我物假令國家棄恆山以南裕必不能發吳越之兵與官軍爭河北居然可知乃遣黃門郎娥清冀州刺史乙旃眷襄州刺史長孫道生青州刺史阿薄干步騎十萬屯河北常有數千騎緣河隨大軍進止裕以冠軍向彌留戍碻磝水經注其城臨水西南崩于河即故荏平縣宋王𤣥謨平碻磝劉義恭以沙城令毁之魏登城之立濟州治王容曰廣韻作䂭磝元和郡縣志作碻磝津在濟州盧縣北一里通典曰宋書作敲磝輿地廣記盧縣故城在鄆州陽穀縣西北今城已圯于河惟津在爾進屯石門柏谷初裕與鎮惡等期若尅洛陽須大軍至未可輕前既而鎮惡等徑向潼關為姚紹所拒不得進軍乏食馳告裕求遣糧援時虜屯據河岸軍不得前鎮惡乃親到𢎞農督上民租百姓競送義粟軍食復振時軍人緣南岸牽百丈河流迅急有漂流北岸者輒為虜所殺略遣軍過岸虜便退走軍還復來裕乃遣白直隊主丁旿率七百人及車百乘於河北岸上去水百餘步為却月陳兩頭抱河車置七仗士事畢使豎一白眊結毛為飾即今馬及刀槊上纓眊也虜見數百人步牽車上不解其意並未動裕先命朱超石馳赴之並齎大弩百張一車益二十人設彭排唐六典彭排之制六一曰膝排二曰團排三曰漆排四曰木排五曰聮木排六曰皮排注釋名曰彭旁也在旁排敵禦冦也纂文曰鹵大楯也今謂之彭排故諸葛亮曰帳下持彭排百枚其膝團漆木皮皆古制也於轅上虜見營陳既立乃進圍營超石先以軟弓小箭射虜虜以衆少兵弱四面俱至又遣長孫嵩三萬騎至遂肉薄攻營於是百弩俱發又選善射者叢箭射之虜衆多不能制超石初行别齎大鎚並千餘張矟乃斷矟長三四尺以鎚鎚之一矟輒洞貫三四虜虜不能當一時奔潰臨陳斬阿薄干虜退還畔城超石率胡藩劉榮祖等追之復為虜所圍奮擊盡日殺虜千計虜乃退走魏主聞之恨不用崔浩計魏書列傳太宗遣長孫道生娥清破朱超石於石河擒騎將揚豐斬首千七百級秦征南姚洸鎮洛陽馳使請救泓遣越騎校尉閻生率騎三千以赴之武衛姚益男將步卒一萬助守洛陽又遣並州牧姚懿南屯陜津在今陜州平陸縣對岸有茅津為之聲援洸部將趙𤣥說洸曰今冦逼已深百姓駭懼衆寡勢殊難以應敵宜攝諸戍兵士固守金墉以待京師之援金墉既固吳冦終不敢越金墉而西困之堅城之下可以坐制其弊司馬姚禹潜通于道濟主簿閻恢楊䖍等皆禹之黨嫉𤣥忠誠咸共毁之固勸洸出戰洸從之乃遣𤣥率精兵千餘南守柏谷塢宋敏求河南志因原為塢高數尺在河南府緱氏縣東廣武石無諱東戍鞏城今河南府鞏縣𤣥泣謂洸曰明公不用忠臣之言為姦孽所誤後必悔之㑹陽城成皋滎陽虎牢諸城悉降冬十月道濟等長驅而至無諱至石關河南志石關在河南府鞏縣西北五里奔還𤣥與晉將毛德祖戰于柏谷以衆寡而敗死於陳姚禹踰城奔于王師道濟進至洛陽洸降閻生益男遂不進裕修復五陵置守衛以冠軍將軍毛修之為河南河內二郡太守行司州事戍洛陽修治城壘十二月進裕相國封宋公備九錫之禮乞伏熾磐遣使詣裕求效討羌姚懿舉兵僣號東平公姚紹入蒲坂執懿十三年正月征北姚恢率安定鎮户三萬八千焚室宇以車為方陳自北雍州趣長安自稱大都督建義大將軍移檄州郡欲除君側之惡揚威姜紀率衆奔之建節毛完都棄新密奔長安恢至新支姚興徙李潤羌於安定尋徙新支則新支近安定也姚萇自安定如長安至新支則新支入長安之路也紀說曰國家重將在東京師空虛公輕兵徑襲可必克矣恢不從南攻郿城鎮西姚諶為恢所敗長安大震泓馳遣姚裕及輔國胡翼度屯灃西紹率輕騎先赴難使姚洽司馬國璠將步卒三萬赴長安紹與恢相持于靈臺姚讃留寧朔尹稚為𢎞農太守守潼關率諸軍還長安恢見諸軍悉進懼其將黃齊等棄恢而降恢進軍逼紹讃自後要擊大破之殺恢及其三弟裕以舟師進討留彭城公劉義隆鎮彭城鎮惡進次澠池遣毛德祖攻秦𢎞農太守尹稚于蠡城按四夷郡國縣道記曹魏移漢澠池於河南福昌縣西蠡城周地圖魏賈逵為澠池令時縣治蠡城宋書王鎮惡傳水經注皆云蠡城惟姚泓載記云蠡吾城通鑑因之司馬康釋文云在髙陽國屬冀州時方攻潼關不應及河北蓋誤也鎮惡領𢎞農太守方軌徑據潼關水經注西征記曰沿路迤邐入函道六里得舊城周百餘步北臨大河南對髙山姚氏置關以守峽王鎮惡檀道濟或據山或平地濵河帶險大小七營姚氏亦保據山原尚𫝊故跡關之直北隔河有層阜世謂之風陵南則河濵姚氏之營與晉對岸寰宇志七營皆在閿鄉縣西道濟林子攻拔襄邑堡建威薛帛奔河東道濟自陜北渡攻蒲坂使將軍荀早攻胸奴堡在河東姚襄嘗攻之為泓寧東姚成都所敗辛酉滎陽守將傅洪降魏求軍赴接泓進紹太宰大將軍都督中外諸軍事假黃鉞率武衛姚鸞等步騎五萬距潼關武衛姚驢與并州刺史尹昭表裏夾攻道濟道濟深壁不戰林子說道濟曰蒲坂城堅池浚不可旬月而尅攻之則士卒傷守之則引日久不如棄之還援潼關若潼關事捷尹昭可不戰而服道濟從之三月既至紹舉關右之衆設重圍圍林子及鎮惡等時懸師深入糧輸難逺道濟議欲度河避其鋒或欲捐棄輜重還赴裕林子按劒曰許洛已平關右將定事之濟否所係前鋒今捨已捷之形棄垂成之業大軍尚逺雖欲求還豈可復得下官受命前驅誓在盡命今日之事自為將軍辨之率麾下數百人犯其西北紹衆小靡乘其亂而薄之紹大潰俘虜以千數紹退保定城今華州華隂縣郭緣生述征記亦云潼關三十里夾道各一城西征記曰城因原上留姚鸞斷兵守險絶道濟糧道時裕别將姚珍入自子午竇霸入自駱谷衆各數千泓遣姚萬拒霸姚疆拒珍鸞遣將尹稚與道濟司馬徐琰戰於關南為琰所獲紹謂諸將曰道濟等衆旅不多嬰壘自固者正欲曠日持久以待繼援耳吾欲分軍徑據閿鄉本漢湖縣之閿鄉今屬陜州縣以絶其糧道不至一月道濟之首可懸之麾下矣諸將咸以為然其將胡翼度曰軍勢宜集不可以分若偏師不利人心駭懼胡可以戰紹乃止紹欲絶道濟糧道此即周亞夫破吳楚之䇿也翼度隂通劉裕所以力沮其謀薛帛據河曲即春秋秦晉所戰之地在今河中之河東華之華隂以叛紹遣胡翼度據東原姚鸞營大路與晉軍相接林子簡精鋭銜枚夜襲鸞衆潰戰死紹復遣撫軍姚讃屯河上絶水道壘塹未立林子邀擊連破之讃奔定城姚紹遣長史姚洽寧朔安鸞護軍姚黑蠡河東太守唐小方率騎三千屯河北之九原在綘州正平縣欲絶道濟諸縣租輸裕以通津阻要兵糧所急復遣林子爭據河源林子率衆八千要洽大破之斬洽黑蠡小方紹忿恚託姚讃以後事使姚難屯關西嘔血而死裕至洛陽五月齊郡太守王懿降魏上書稱劉裕在洛以軍絶其後路可不戰而克魏主善之崔浩在前講書𫝊問曰劉裕前軍已至潼關事得濟否浩曰昔姚興好養虛名而無實用子泓又病衆叛親離裕乘其危兵精將勇克之必矣裕還必篡其主秦地戎夷混並虎狼之國裕亦不能守之風俗不同人情難變欲行荆揚之化於三秦之地不得也若留衆守之必資于冦且可治戎束甲息民備境以待其歸秦地亦終為國有嗣笑曰卿量之審矣又敕長孫嵩簡精兵為戰備若裕西過者便率精鋭南出彭沛如不時過但引軍隨之於是叔孫建等尋河趣洛遂入關秋七月裕至陜城沈田子傅𢎞之從武關屯據青泥今永興軍藍田縣治水經注泥水西徑嶢關北厯嶢栁城魏置青泥軍晉中興書桓溫使京兆太守擊青泥城泓使姚裕率步騎八千距之裕至閿鄉泓欲自禦大軍慮田子襲其後欲先平田子然後傾國東出乃率步軍數萬奄至青泥田子本為疑兵所領才數百欲擊之傅𢎞之曰彼衆我寡難可與敵田子曰師貴用竒不必在衆𢎞之猶固執田子曰衆寡相傾勢不兩立若賊圍既固人情喪沮則事去矣及其未整薄之必克獨率所領鼓而進合圍數重躬勒士卒前後奮擊江東勇士便習短兵鼓譟奔之賊衆潰散所殺萬餘人裕慮衆寡不敵遣林子步自秦嶺通典藍田縣秦嶺在此界接援比至泓已摧破復共追討泓乃奔灞西裕至潼關遣朱超石徐猗之㑹薛帛于河北以攻蒲坂姚讃距裕于關西姚難屯于香城河南志在河南府河清縣西北十五里載記姚讃遣姚難運蒲坂穀以給其軍至香城為王師所敗蓋可考也裕遣王鎮惡王敬自秋社西渡渭以逼難軍鎮東姚璞及姚和都擊敗猗之等超石奔潼關姚讃遣司馬休之司馬國璠引魏兵以躡裕後姚難為鎮惡所逼引師而西時大霖雨渭水泛溢讃等不得北渡鎮惡水陸兼進追及難泓自灞上還屯石橋水經注石橋水出馬嶺山積石據其東麗山距其西北徑鄭城西去城十里北注于渭以援之讃退屯鄭城今華州鄭縣鎮北姚彊與難陳于涇上拒鎮惡鎮惡遣毛德祖擊彊彊死難遁還長安裕進據鄭城泓使姚洸屯灃西姚丕守渭橋胡翼度屯石積姚讃屯灞東泓軍逍遙園姚興於此聽說佛經水經注渭水承沈水東北流又東分為二一東入逍遙圃一北流于渭鎮惡所乘皆蒙衝小艦行船者悉在艦內羌見艦進艦外不見有行船人北土素無舟楫莫不驚惋鎮惡既至令將士食畢便棄船登岸渭水流急倐忽間諸艦悉逐流去時泓猶數萬人鎮惡撫慰士卒曰卿諸人並家在江南此是長安城北門外去家萬里而舫乘衣糧並已逐流去豈復有求生之計邪唯宜死戰可以立大功不然則無遺類矣乃身先士卒衆騰踴爭先破姚丕於渭橋泓赴之逼水地狹遂相踐而退姚諶等皆死泓單馬還宫鎮惡入自平朔門周地圗記北面第四平朔門符氏所開泓與姚裕等數百騎奔石橋讃聞泓敗大泣胡翼度先與劉裕隂通是日棄衆奔裕讃將㑹泓于石橋不得入衆皆驚散泓將妻子詣壘門而降讃率宗室子弟百餘人降於裕裕盡殺之送泓于建康斬之裕欲遷都洛陽衆議咸以為宜王仲德曰非常之事常人所駭今暴師日久士有歸心俟文軌大同然後議之可也裕深納之夏王勃勃謂羣臣曰劉裕伐秦水陸兼進裕有髙世之略姚泓豈能自固又其兄弟內叛安可以距人裕既克長安利在速返正可留子弟及諸將守關中待裕發軫吾取之若拾芥耳于是秣馬厲兵進據安定姚泓嶺北鎮戍郡縣悉降裕遣使遺勃勃書約為兄弟長孫嵩等自成皋南濟晉屯戍皆奔潰冬十月己酉魏主召嵩等還詔進宋公爵為王十一月劉穆之卒以左司馬徐羡之代掌留任大事昔決于穆之者悉以咨裕裕欲息駕長安經略趙魏㑹穆之卒乃歸留子桂陽公義真都督雍梁秦三州諸軍事安西將軍領雍秦二州刺史義真時年十二太尉咨議參軍王修為長史王鎮惡領司馬馮翊太守委以扞禦之任沈田子毛德祖為中兵參軍傅𢎞之為雍州治中從事史三秦父老詣門流涕訴曰殘民不霑王化於今百年始覩衣冠方仰聖澤長安十陵是公家墳墓咸陽宫殿是公家屋宅捨此欲何之裕為之愍然慰譬之曰受命朝廷不得擅留感諸君戀本之志今以第二兒令文武賢才共鎮此境十二月庚子裕發長安自洛入河開汴渠以歸勃勃謂王買德曰朕將圖長安卿試言取之方略買德曰劉裕滅秦所謂以亂平亂未有德政以濟蒼生關中形勝之地而以小兒守之狼狽而返者欲速成篡事耳無暇有意於中原青泥上洛南師之衝要宜置游軍斷其去來之路然後杜潼關塞崤陜絶其水陸之道聲檄長安申布恩澤三輔父老皆壺漿以迎王師矣義真獨坐空城逃竄無所一旬之間必面縛麾下勃勃以子璝都督前鋒諸軍事率騎二萬伐長安前將軍赫連昌屯兵潼關以買德為撫軍右長史南斷青泥勃勃率大軍繼發十四年正月璝至渭陽降者屬路義真遣沈田子拒之虜甚盛田子屯劉回堡遣使還報鎮惡謂王修曰公以十嵗兒付吾等當各思竭力而擁兵不進虜何由得平使還具說鎮惡言田子益激怒田子鎮惡俱出北地論者謂鎮惡欲盡殺南人以數十人送義真南還因據關中反田子宗人敬仁有勇力田子於𢎞之營內請鎮惡計事使敬仁殺之又於鎮惡營內殺鎮惡兄基弟鴻道淵及從弟昭郎𢎞凡七人𢎞之奔告義真義真率王修被甲登橫門以察其變俄而田子至言鎮惡反修執田子以専戮斬焉壬戌裕至彭城解嚴義真賜與左右不節王修常裁減之左右並怨義真曰鎮惡欲反故田子殺之修殺田子是又欲反也義真乃使左右劉乞等殺修修既死人情離駭無相統一悉召外軍入于城中閉門拒守關中郡縣悉降璝夜襲長安不克勃勃進據咸陽長安樵採路絶裕聞之召義真東歸遣朱齡石鎮關中使義真輕兵疾發中書侍郎朱超石慰勞河洛諸將競斂財貨子女方軌徐行赫連璝帥衆三萬追義真將軍蒯恩斷後不能禁至青泥後軍大敗諸將悉被俘虜義真在前日暮虜不窮追中兵參軍段宏負之而歸百姓逐朱齡石齡石焚長安宫殿奔潼關超石至蒲坂值齡石至曹公壘水經注郭緣生述征記函谷關濟河之西有曹公壘濟河就之俱沒初裕聞青泥敗未得義真審問怒甚尅日北伐侍中謝晦奉常鄭鮮之上表諌及知義真已免乃止登城北望慨然不恱命羣僚誦詩謝晦詠王粲詩曰南登灞陵岸回首望長安悟彼泉下人喟然傷心肝裕流涕不自勝於是夏王勃勃為壇於灞上僣即帝位此劉裕滅秦之本末也夏王勃勃即帝位於灞上改元以吕祖謙標目修十二月戊寅宋公裕弒帝立大司馬琅邪王德文為皇帝以吕祖謙標目修是嵗以北凉王蒙遜為凉州刺史以通鑑修晉恭皇帝元熙元年燕馮跋太平十一年宗秦乞伏熾磐永康八年魏太明元皇帝泰常四年始西凉李皓嘉興三年真北凉沮渠蒙遜𤣥八年夏赫連勃勃興元年春正月壬辰朔改元本紀解題曰宋庠紀年通譜元熙本劉淵年號立妃禇氏為皇后以本紀修宋公裕還朝以本紀修戊戌有星孛于太微以本紀修庚申葬安皇帝于休平陵以本紀修夏陷蒲坂以吕祖謙標目修二月夏王勃勃還統萬改元以吕祖謙標目修秋七月宋公裕自進王爵八月移鎮夀春以吕祖謙標目修冬十月宋王裕以其子司州刺史義真為揚州刺史以通鑑修十一月丁亥朔日有食之以本紀修十二月宋王裕自加殊禮以本紀修大事記續編卷三十五
