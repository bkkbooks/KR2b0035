body:
  text: 大事記續編卷六十一明王禕撰唐德宗皇帝建中四年春正月丁亥張鎰及吐蕃尚結賛盟于清水以新紀脩庚寅李希烈䧟汝州甲午遣太子太師顔真卿宣慰之以朱熹綱目脩戊戌以龍武大將軍哥舒曜爲東都汝州節度使討李希烈二月丁卯復汝州以新舊紀觧題曰東都汝州節度使見乾元二年東畿解題三月戊寅江西節度使曹王臯敗李希烈兵取黄蘄二州以吕祖謙標目脩夏四月命神䇿軍使白志貞召募禁兵以吕祖謙標目脩庚申加李勉淮西招討使哥舒曜副之以通鑑脩甲子京師地震新紀五月京師地震新紀六月庚戌稅屋間架筭除陌錢新紀七月馬璲為魏博澶相節度招討使新紀秋八月丁未李希烈冦襄城新紀乙卯李希烈將以随州降以新紀脩發涇原諸道兵救襄城冬十月丁未涇原節度使姚令言作亂于京師戊申帝幸奉天令言等奉朱泚為帥庚戌段秀實欲誅泚不克死之以新紀吕祖謙標目脩觧題曰李希烈圍哥舒曜於襄城詔涇原節度使姚令言督鎮兵五千東救曜涇師多携子弟而來望獲厚賞及上路一無所賜次滻水詔京尹王栩犒軍唯糲食菜餤衆怒覆而不顧羣譟曰國家瓊林大盈寳貨如山尚何徃乃盡甲反旗而皷居人狼狽走竄亂兵呼勿走不奪汝商貨僦質矣不税汝間架矣帝遣使者開諭賊已陣通化門殺使者帝遣普王姜公輔載金綵慰撫賊薄丹鳳門詔集六軍無至者先是闗東河北戰不利禁兵悉東衛士内空而神䇿軍使白志真藉市人𨽻兵聽其居肆私取庸自入故遽迫皆不至餘見通鑑范祖禹曰周公作立政以戒成王自左右常伯至于綴衣虎賁皆選忠良而勿以憸人晋悼公使弁糾御戎荀賔爲右使訓諸御知義羣騶知禮故可用也至漢宿衛者猶以忠力之臣與公卿之子盖古之遺法也夫以天子之尊必使諸侯與天下之賢者共扞衛之訓其徒旅使知禮義不如是不足以為國也後世茍簡人君多疑寧與小人而不與君子德宗所任尤非其人至於變起京邑而無一卒之衛其後懲前之失委之宦者而其禍愈深夫聚天下不義之人使執利器而環天子之居不以付之忠賢之臣是以知後世人主之不尊國家之無法也胡寅曰自大厯四年元載欲逺郭子儀自邠州徙馬璘鎮涇自河中徙子儀鎮邠四鎮北庭之兵刃覊旅勞弊重於遷徙遂謀作亂頼段秀實處之有方衆不敢動遂遷於涇然非所欲也及楊炎紹述載志築原州城涇當為城具將士怒曰吾屬始居邠州甫營耕桑地著即來屯涇披荆榛立軍府今又投之塞外何罪至此於是劉文喜據州不受詔涇人之心可知矣撫之不至徒驅之以威力無怨之民猶不可使况役怨民而又犒以糲食菜餤哉辛亥以金吾衛大將軍渾瑊爲行在都虞候以呂祖謙標目脩壬子鳳翔將李楚琳殺張鎰自爲節度使降朱泚以舊紀通鑑脩朱泚自稱秦帝改元殺郡王王子王孫七十七人以通鑑脩癸丑李希烈䧟襄城新紀乙卯殺右僕射崔寧以新紀脩解題曰庾凖言劉晏與朱泚書怨望召兵拒命德宗不加按驗既命中使宻殺之矣及王翃使康湛詐為崔寧遣朱泚書復匆匆殺之何以服人心乎事見通鑑丁巳户部尚書蕭復為吏部尚書吏部郎中劉從一為刑部侍郎翰林學士姜公輔為諌議大夫並同平章事以新舊紀脩朱泚圍奉天渾瑊與邠寧兵馬使韓游瓌拒之龍武大將軍呂希倩將軍髙重傑死之以吕祖謙標目脩十一月靈武留後杜希全渭北節度使李建徽等入援敗于漠谷以新舊紀通鑑脩解題曰靈武見開元九年朔方節度使觧題按方鎮表渭北節度使上元置渭北郛坊節度使并領丹延永泰罷領丹延増領綏州丹延别置都團練使尋升為觀察使大厯六年更名渭北節度使領丹延慶觀察使十四年罷節度置都團練觀察使建中四年復置渭北節度使尋罷置都團練觀察防禦使貞元復置渭北節度綏州𨽻銀夏元和析丹州置防禦使中和渭北號保大軍増領翟州延州置保塞軍光化更名寧塞後又更衛國軍罷丹州防禦𨽻衛國軍又按漠谷水出醴州永夀縣髙要山幕谷過武功奉天李懐光及神䇿河北行營節度使李晟入援以通鑑脩癸巳李懐光敗朱泚于醴泉泚遁懐光將入朝盧把沮之以為中書令諸道兵馬副元帥以新舊紀脩解題曰醴泉縣屬醴州翰林學士祠部貟外郎陸贄上䟽以通鑑脩解題曰蘇軾進贄奏議狀曰贄才本王佐學為帝師論深切於事情言不離於道德智如子房而文則過辯如賈誼而術不疎上以格君心之非下以迪天下之志但其不幸仕不遇時德宗以苛刻為能而贄諌之以忠厚德宗以猜忌為術而贄勸之以推誠德宗好用兵而贄以銷兵為先德宗吝用財而贄以散財為急至於用人聽言之法治邊取將之方罪已以収人心改過以應天道去小人以除民患惜名器以待有功如此之流未易悉數可謂進苦口之藥石鍼害身之膏肓使德宗盡用其言則貞觀可得而復十二月壬戌貶盧把白志貞趙賛為逺州司馬以舊紀修李希烈陷汴鄭二州稱帝改元以新舊紀列傳修解題曰按通鑑考異謂希烈稱帝實録舊希烈傳顔真卿傳皆無年月據奉天録幸天記及實録閏月庚午詔謂在興元元年正月初今以新舊史列傳攷之建中四年冬議改元加尊號陸贄奏僣帝者二豎則其時希烈已僣號矣不待至興元也况新舊史皆載希烈入汴州僣號改元豈不可攷癸酉闗播罷以通鑑修以李楚琳為節度使以通鑑修六軍各置統軍以新舊官志修解題曰按新史兵志會要龍朔二年置左右羽林軍開元二十七年析置左右龍武軍以左右萬騎營𨽻焉至德二載置左右神武軍緫曰北衙六軍新史官志左右羽林大將軍各一人正三品將軍各二人從三品左右龍武大將軍各一人正二品綂軍各一人正三品將軍三人從三品左右神武大將軍各一人正二品綂軍各一人正二品將軍三人從三品龍武神武軍皆視羽林者也大將軍猶正二品而羽林大將軍乃正三品又無統軍此史於大將軍各一人之下缺正二品統軍各一人八字顯然新史兵志及官志注以左右龍武神武神䇿號六軍誤也舊史官志羽林龍武神武謂之北衙六軍會要貞元十四年始詔神䇿左右軍置統軍品秩同六年則神䇿不在六軍之數明矣唐德宗皇帝興元元年春正月癸酉朔下詔罪已大赦改元去聖神文武號復李希烈田悦王武俊李納官爵罷間架墊陌錢竹木茶漆稅人心大恱以新舊紀修朱泚更號漢以吕祖謙標目修王武俊田恱李納去王號以吕祖謙標目修丙戌吏部侍郎盧翰為兵部侍郎同中書門下平章事以新舊紀修立瓊林大盈庫陸贄諫罷之以吕祖謙標目修戊子蕭復出為山南等道宣慰安撫使以新舊紀脩辛卯以王武俊為恒冀深趙節度使通鑑庚子遣祕書監崔漢衡使吐蕃以通鑑修二月戊申贈段秀實太尉諡忠烈以舊紀修李晟會李懐光于陳濤斜既而移軍東渭橋以通鑑修解題曰秦漢唐架渭者凡三橋咸陽西十里者名便橋漢武帝造在咸陽二十二里者為中渭橋秦始皇造在萬年縣四十里者為東渭橋三橋之外以船渡者十一處李懐光奪郛坊京畿金商節度使李建徽神䇿兵馬使陽惠元兵惠元死之甲子以懷光為太尉以新舊紀修加李晟河中節度使同中書門下平章事丁夘帝幸梁州李懐光以兵來追不及以新舊紀傳修解題曰凌凖邠志二十六日懐光又使持書促韓游瓌渾公獲而奏之且使其卒物色我軍游瓌不知不得以聞又怒瑊之虞己也嫚罵于途上疑其變即日幸梁州餘見通鑑三月癸酉魏博兵馬使田緒殺田恱自稱留後以新紀修甲戌李懐光殺兵馬使張名振石演芬歸河中以新舊紀修解題曰韓愈董晉行狀曰晉宣慰恒州還懐光反公造懐光言曰公之功天下無以與敵公之過未有聞於人晉至上所言公之情上寛明將無不赦宥焉乃能為朱泚臣乎彼為臣而背其君茍得志於公何有且公既為太尉矣彼雖寵公何以加此彼不能事君能以臣事公乎公能事彼而有不能事君乎彼知天下之怒朝夕戮死者也求其同罪而與之比公何所利焉公之敵彼有餘力不如明告之絶而起兵襲取之清宫而迎天子庶人服而請罪有司雖有大過猶將掩焉如公則誰敢議語已懐光拜曰天賜公活懐光之命喜且泣公亦泣則又語其將卒如語懐光者將卒呼曰天賜公活吾三軍之命拜且泣公亦泣故懐光卒不與朱泚餘見通鑑己亥渾瑊為朔方邠寧等道行營兵馬副元帥以新紀修解題曰按新史列傳陸贄上䟽曰開元天寳時制西北二蕃則朔方河西隴右三節度而已尚慮權分或詔兼領之中興未遑外討則僑四鎮𨽻安定以隴右附扶風所當二蕃則朔方涇原隴右河東四節度而已以闗東戍卒屬之雖任未得人而措置之法存焉自賊泚亂以誘涇原懐光反以汙朔方則分朔方為三節度其鎮軍且四十皆特詔任之各有中人監軍咸得相抗既無軍法臨下莫能禀屬邊書告急方使闗白可謂力分於將多矣餘見通鑑夏四月壬寅以韓游環為邠寧節度使以舊紀修甲辰李晟為京畿渭北商華兵馬副元帥以新舊紀修庚戌以田緒為節度使以通鑑修吐蕃遣兵助渾瑊破朱泚尋引去以吕祖謙標目修甲寅姜公輔罷新紀涇原兵馬使田希鑒殺其節度使馮河清自稱留後以新紀修李抱真會王武俊於南宫呂祖謙標目修解題曰葉適曰朱泚既反朱滔連四叛圍貝州將絶河津窺東都與泚合時李懐光據河中李希烈自汴逼江漢李納田緒猖狂未巳唐號令所及十纔二三然而天下卒不至土崩者李抱真結王武俊之力抱真所以能說囬武俊者賴賈林之詞也存唐之功過於燭之武矣德宗初立運動天下事出萬全及其荒忽繆計自取遷辱而以存亡俯仰之勢寄於辯士之口為人主者可不鑒哉事見通鑑五月丙子抱真武俊大敗朱滔於貝州滔還幽州以吕祖謙目修乙未李晟移軍光泰門外戊戌大敗朱泚復京師六月癸夘姚令言伏誅甲辰泚伏誅以吕祖謙標目修解題曰宋敏求長安志禁苑東二門南曰光化外郭城東二門北曰通化光泰門在通化門東北小城之東門竇苹音訓遂謂為苑城之東北門非也事見通鑑晟破泚露布鎮國軍節度使駱元光商州節度使尚可孤本軍副元帥都知兵馬使吳説都虞候邢君牙京西行營都知兵馬使孟渉右廂兵馬使郭審全權文成神䇿行營商州節度都虞候彭光俊等陳兵於光泰門外盡鋭於神䴥倉東賊將姚令言張雲等横列堅陣旁速髙岡衙前兵馬使王佖知衙兼刀斧將史萬頃先登進擊深入合攻乗其踣藉遂至於上蘭取彼鯨鯢直通於中禁段成諫賊之心膂既已生擒沈厚運賊之羽毛終制死命令言等力扞王師退而復合又使决勝軍節度使唐良臣等領馬歩為副己酉以李晟為司徒中書令餘遷官有差田希鑒為節度使甲寅渾瑊為侍中以舊紀通鑑修偽署官李忠臣等伏誅以舊紀修秋七月壬午帝至自梁州以新紀修丁亥李懐光害宣慰使給事中孔巢父以新紀修乙未以杭州刺史李泌為㪚騎常侍以通鑑修八月壬寅李希烈害顔真卿以朱熹綱目修甲辰李楚琳罷為金吾大將軍紀傳通鑑解題曰按郭元一奉天録朱泚攻奉天楚琳供應及泚守長安楚琳勢窮遂進貢奉天後懐光阻兵帝幸洋梁楚琳又與泚通耗帝聞深不平還京楚琳從駕至長安詔授將軍表請出家詔依請愁憤而卒餘見通鑑癸夘李晟兼鳳翔隴右節度等使涇原四鎮北庭行營副元帥爵西平王以紀傳通鑑修馬燧為奉誠軍節度使渾瑊為河中節度使並為管内行營副元帥討李懐光以紀傳通鑑修解題曰奉誠軍見大厯元年京畿解題冬十月辛丑李勉檢校司徒同平章事以新紀通鑑修戊辰宦官竇文瑒王希遷為神䇿軍左右兵馬使以舊紀修解題曰栁芳唐厯李晟自山東來詔加神䇿行營節度使晟鎮鳳翔始分神䇿為左右廂令内官竇文􅛒王希遷分知兩廂兵馬貞元二年始置神䇿軍大將軍官員十二年又置䕶軍中尉官員餘見通鑑竇苹音訓太和門外之北從西第三乃左神䇿軍九仙門外之北從東第三乃右神䇿軍閏月田希鑒伏誅以通鑑修李希烈將以滑州降以新紀修閏十二月劉𤣥佐等大敗李希烈兵于陳州希烈走戊午復汴州鄭州降以吕祖謙標目修乙丑蕭復罷新紀十二月庚辰加鎮海節度使韓滉檢校左僕射同平章事江淮轉運使以通鑑修解題曰鎮海節度見至德元年江南西道節度解題是歳蝗大饑以通鑑修唐德宗皇帝貞元元年春正月丁酉朔改元以新舊紀修解題曰宋庠紀年通譜李泌云元嘉麟德寳應多以年號為厯陛下即位用貞元厯年號貞元而用貞元厯則相應矣皇朝之盛無若貞觀開元各取一字以明則效遂用之癸丑贈顔真卿司徒諡文忠以舊紀通鑑修帝欲用吉州長史盧把為饒州刺史給事中袁高補闕陳京等諌壬戌以把為澧州别駕尋卒以舊紀修解題曰按新舊史列傳張獻恭檢校吏部尚書盧把移饒州刺史袁髙論其不可獻恭入對言高所奏至當帝不答復前曰高是陛下一良臣望特優異上遂不徙把世咨其不撓餘見通鑑三月丁未李希烈陷鄧州以新舊紀修夏六月朱滔卒涿州刺史劉怦自稱幽州盧龍留後以吕祖謙標目修辛夘劒南西川節度使張延賞為中書侍郎同平章事金吾衛大將軍韋臯為西川節度使以新舊紀修秋七月陜虢兵馬使達奚抱暉殺節度使張勸辛丑以李泌為都防禦觀察水陸運使平之以舊紀修解題曰陜虢節度見大厯元年東畿解題壬子以劉怦為節度使以通鑑修大旱通鑑八月甲戌李懐光伏誅新紀馬燧為侍中新紀張延賞罷新紀九月劉從一罷以新紀修劉怦請以其子濟權知幽州軍府事怦卒以濟為節度使以舊紀修唐德宗皇帝貞元二年春正月壬寅盧翰罷吏部侍郎劉滋為散騎常侍給事中崔造中書舍人齊映同平章事以新舊紀修崔造奏罷水陸運使度支廵院江淮轉運等諸道租賦委觀察使刺史以吕祖謙標目修解題曰胡寅曰財賦出於縣而總於州使觀察刺史任貢賦之責何患乎不辦而多張使名衆建官吏若非委以聚斂則安所用哉利聚于上怨興于下其弊不可勝言造所建明非特當時可行後世固可行也顧革弊之初事難遽集四相在内未必恊謀韓滉力行沮止故造不能獨濟耳事見通鑑宰相分判六曹以通鑑目録修夏四月丙寅李希烈伏誅甲申以淮西衙將陳仙竒為節度使以吕祖謙標目修秋七月淮西兵馬使呉少誠殺陳仙竒自為留後以吕祖謙標目修八月丙戌吐蕃寇邠寧涇隴四州以新紀通鑑修九月吐蕃寇好畤李晟遣兵敗之以新紀通鑑修解題曰好畤醴州縣冬十一月甲午立淑妃王氏為皇后丁酉崩以新紀修辛丑吐蕃陷鹽州新紀十二月丁巳以韓滉兼度支諸道鹽鐵轉運等使以吕祖謙標目修吐蕃陷夏州新紀庚申崔造罷以新紀修是歳李勉罷以新舊史列傳修解題曰按新史紀表勉罷相皆失書惟列傳云居相二歳辭位以太子太師罷故書於此唐德宗皇帝貞元三年春正月壬寅左僕射張延賞同平章事壬子劉滋罷齊映貶䕫州刺史兵部侍郎栁渾同平章事以新舊紀修韋臯招南詔以吕祖謙標目修二月戊寅韓滉卒分浙江東西道為三以果州刺史白志貞為浙西觀察使以吕祖謙標目修三月丁未以李晟為太尉中書令罷其兵以吕祖謙標目修夏五月丁亥以渾瑊為吐蕃會盟使以舊紀修閏月庚申省州縣官尋復之以通鑑列傳修辛未吐蕃刼盟于平凉以吕祖謙標目修六月馬燧為司徒罷其兵以新舊紀修李泌為中書侍郎同平章事泌請罷宰相分判六曹從之以新舊紀修復鹽夏二州以通鑑修秋七月遣使勾檢兩税以吕祖謙標目修張延賞卒以舊紀修解題曰按舊史列傳延賞與栁渾同列延賞怙權矜已而嫉渾守正俾其所厚謂渾曰相公舊德但節言於廟堂則重位可久渾曰為我謝張公渾頭可斷舌不可禁也自是為其所擠餘見通鑑胡寅曰此林甫之所以待陳希烈盧把之所以待闗播者也而延賞亦以此施之栁渾何哉李泌議復府兵請募戍卒屯田京西以朱熹綱目修解題曰李燾曰戍卒因屯田致富則安於其土不復思歸舊制三年而代及期將滿下令有願留者即以所開田為永業家人願來者聽遣之據應募之數移報本道河朔諸帥得免更代之煩亦喜聞矣不過數畨則戍卒皆土著乃悉以府兵之法理之變闗中之疲弊為富强此易成也夫不復府兵則已如欲復之舍此䇿安出乎使張說少有智慮此䇿必行於開元矣開元可行而不行貞元將行而復廢此願治者所為太息也餘見通鑑及貞觀十年府兵解題八月辛巳朔日有食之新紀己丑栁渾罷新紀帝欲廢太子李泌救之以吕祖謙標目修解題曰德宗之答李泌謂此朕家事非他人所預而泌以為天子以四海為家則莫非家事可謂大臣之言矣狄仁傑之對武后曰王者以四海為家四海之内孰非臣妾何者不為陛下家事仁傑之言泌有取云爾乃若李勣之答髙宗李林甫之語宦人彼不學之人何足以語此餘見通鑑戊申吐蕃寇隴州以新紀通鑑修九月李泌請罷貢獻歳供宫中錢百萬緡以吕祖謙標目修囬紇和親以吕祖謙標目修吐蕃陷涇州連雲堡冬十月甲申寇豐義城乙酉寇長武城城故原州而屯之以新紀通鑑修解題曰寧州彭陽縣本隋豐義城寰宇記長武城在邠州宜禄縣西五十里郭子儀置兵備西戎舊史列傳李懐光頻歳城長武城據原首臨涇水俯瞰通道吐蕃不敢南侵唐德宗皇帝貞元四年春正月増京官俸以通鑑修夏四月乙未改殿前射生軍曰左右神威軍與左右羽林龍武神武神䇿為十軍以吕祖謙標目修南詔内附以通鑑修五月吐蕃寇涇邠寧慶鄜五州新紀六月封子為王以新紀修徴處士陽城為諫議大夫以舊紀修秋七月邠寧軍亂都虞候楊朝晟敗之新紀九月罷勾檢兩稅以吕祖謙標目修冬十月戊子囬紇可汗來迎咸安公主請改號回鶻以吕祖謙標目修吐蕃寇西川韋臯遣兵破之以通鑑修册回鶻長壽天親可汗以通鑑修十一月以壽廬豪都團練使張建封為徐泗豪節度使以吕祖謙標目修解題曰按地理志元和郡縣志濠初作豪元和三年改彭晁杜亭記碑隂載武德間州印豪字不從水元和二年刺史崔中始請依舊以濠水為州名又按方鎮表建中置徐海沂密都團練觀察使興元元年廢是年復置徐泗豪節度使貞元廢未幾置泗豪觀察使徐州領本州留後元和二年廢觀察使置武寧節度領徐泗濠四年増領宿州長慶宿𨽻淮南大和復領宿咸通三年罷節度使置徐州團練防禦使𨽻兖海又置宿泗都團練觀察使四年罷防禦使濠州𨽻淮南五年置徐泗團練觀察處置使十年置徐泗節度使是年復置都團練防禦使增領濠宿十一年置徐泗觀察使尋號感化軍節度乾符二年罷領泗州天復二年罷節度横海節度使程日華卒其子懐直自為留後以通鑑修是歳京師地震二十新紀唐德宗皇帝貞元五年春正月甲辰朔日有食之新紀二月程懐直請分置景州廷授刺史帝嘉其忠以為横海留後以新史傳修解題曰按新史傳懐直使參軍李宇入朝願於東光景城二縣置景州且請刺史河朔刺史不廷授幾三十年帝嘉其忠以徐申為刺史昇横海軍為節度使其後横海節度使烏重胤請以支郡兵馬並令刺史領之蓋本於懷直也餘見元和十四年支郡兵馬解題庚子大理卿董晉為門下侍郎御史大夫竇參為中書侍郎同平章事以新舊紀修三月甲辰李泌薨新紀解題曰宋祁賛曰泌之為人也異哉其謀事近忠其輕去近髙其自全近智卒而建上宰近立功名者肅宗時泌於獻納為不少又佐代宗收兩京猶不見録寧二主不以宰相器之耶德宗晚好鬼神事乃獲用蓋以怪自置而為之助也則知當時議者切而不與有為而然至勸帝先事范陽明太子無罪亦不可誣也冬十月韋臯遣將破吐蕃克嶲州以通鑑修十二月回鶻天親可汗死戊寅册其子為忠貞可汗尋為其弟所弑以朱熹綱目修是歳以吳少誠為節度使新舊列傳修解題曰通鑑不書闕也唐德宗皇帝貞元六年春迎佛骨于岐山以通鑑修夏吐蕃陷北庭安西亦陷以吕祖謙標目修秋八月辛丑殺太子妃蕭氏以新紀修解題曰按新史列傳郜國公主貞元四年以厭蠱廢六年薨子位坐為蠱祝囚端州佩儒偲囚房州前生子駙馬都尉裴液囚錦州主女為皇太子妃帝畏妃怨望將殺之未發㑹主薨太子属疾乃殺妃以厭災是歲程懷直為節度使以新史列傳修唐德宗皇帝貞元七年春二月遣使册回鶻奉誠可汗以通鑑修三月癸未張孝忠卒秋七月戊寅以其子定州刺史茂昭為義武留後以通鑑修八月丙午陸贄解翰林學士為兵部侍郎以通鑑修解題曰胡寅曰贄自李泌相後不復諫說豈帝訪問之遺歟抑推尊長源而然也以吾度之正謂長源周旋二帝間已為後進嫌有争材競能之意耳或問贄何如人也曰孟子所謂有安社稷臣以安社稷為恱者歟不然道合則留不合則去乃天民矣事見通鑑唐德宗皇帝貞元八年春三月庚午劉𤣥佐卒夏四月其子士寧自稱宣武留後尋以為節度使以新紀通鑑修殺諫議大夫知制誥呉通𤣥乙未貶竇參為彬州别駕左丞趙憬兵部侍郎陸贄為中書侍郎同平章事以新舊紀修壬子吐蕃寇靈州通鑑五月陸贄請䑓省長官舉其屬從之尋復止以吕祖謙標目修癸酉李納卒其子師古自稱平盧留後尋以為節度使以新紀通鑑修六月吐蕃寇涇州舊紀秋七月己未司農少卿裴延齡判度支以吕祖謙標目修大水以通鑑修冬十一月壬子朔日有食之以新舊紀修十二月神䇿大將軍柏良器左遷右領軍軍政始專掌於宦官以吕祖謙標目修唐德宗皇帝貞元九年春正月癸夘初稅茶以吕祖謙標目修二月甲寅以張茂昭為節度使以通鑑修辛酉城鹽州以通鑑修解題曰按後梁實錄乾化元年降鹽州刺史髙行存其下云鹽州與吐蕃党項犬牙相接又烏池鹽鹺之利戎羌意未甞息唐建中初為吐蕃所陷由是銀夏寧延洎於靈武歲以河南河東山南淮南青徐江浙等道兵士不啻四萬分䕶其地謂之防秋貞元九年命渾瑊總兵三萬復取其地邊患遂止事見通鑑三月貶竇參驩州司馬尋殺之以吕祖謙標目修解題曰按陸贄奏議希顔宣進止竇參結朕左右兼有隂謀皆有憑據事不曖昧只縁連及處多不可推按卿等宜更商量若恐事體不稳即且流貶向絶逺惡處竇申竇榮李則之首未同惡冝便商量處置其竇參等所有朋黨親密並不可容在側近可便條流盡發遣向僻逺無兵馬處蓋唐朋黨之名始於太宗疑魏徴阿黨繼以肅宗疑李峴德宗指竇參迄憲宗而牢不可解矣餘見通鑑夏五月甲辰義成節度使賈耽為右僕射右丞盧邁同平章事以新舊紀修解題曰義成節度使見乾元二年汴滑節度使解題韋臯平吐蕃五十餘堡以舊紀修丙午董晉罷新紀裴延齡為户部侍郎判度支以舊紀修秋七月令宰相旬更秉筆未幾日易之以吕祖謙標目修八月庚戌西平忠武王李晟薨以通鑑修解題曰蘓軾賛曰以吾觀西平王提孤軍自北方赴行在走懐光斬朱泚如反掌及其後帥鳳翔與隴右瞰河湟兵益振謀既臧終不能取尋常堕賊計困平涼卒罷兵仆三將誰之咎在廟堂斬馬劔誅延賞為葅醢不足償覽遺像涕泗滂冬十二月乙夘宣武軍將李萬榮逐劉士寧自稱留後以新舊紀修陸贄奏均節財賦六條以通鑑修解題曰范祖禹曰穀帛出於民而官不可為也錢出於官而民不可為也取其所有而予其所無則上下皆濟矣是故以穀帛為賦則民不得不耕織以奉公上此駈之於農桑也如不取其所有而取其所無則民之所有棄之必賤矣官之所無收之必貴矣穀帛輕則民為之者少錢重則物甚賤者多是以利壅於上民困於下至於田野荒杼軸空由取其所無故也然則以錢為賦官豈得其利乎為法者必使民去末而反本則富國之道也事見通鑑唐德宗皇帝貞元十年春正月壬辰南詔大破吐蕃來獻㨗夏六月南詔王遣其弟入貢遣使賜之印以新舊紀修解題曰胡寅曰李泌力勸德宗與回紇和親而詔雲南大食天竺以分吐蕃之勢於是韋臯遣使要結累年而異牟尋棄吐蕃向中國此後吐蕃為邊患益稀豈非其國盛衰自有數耶然後數十年唐之禍不起於吐蕃而起於雲南以此知中國當自治以為强而外夷之離合非所計也事見通鑑秋八月西原蠻陷欽横潯貴四州以新舊紀修冬十一月壬申陸贄上書論裴延齡罪十二月壬戌罷以通鑑修唐德宗皇帝貞元十一年夏四月壬戌貶太子賓客陸贄為忠州别駕帝意不測陽城率諫官上疏論裴延齡明贄無罪以通鑑修解題曰事見通鑑蘓轍曰贄始事德宗從之出奔而與之反國彌縫其闗而濟其危亡比其老也功業定矣而卒斃於裴延齡之手何也贄以有常之德而事德宗之無常以巫醫之明而治無常之疾是以承其羞耳帝初好名而貪功河朔三畔父子相襲帝將以力勝之田恱驚疑而起朱滔王武俊和之帝使馬燧李抱真往迎其鋒復使李晟出禁衛之兵李懷光舉朔方之衆萃於魏郊而李希烈乗間而起兵連禍結常賦所不能贍於是為之抽貫筭間假貸商賈闗中已亂而帝不知也贄曰今為禍亂之首者獨四五凶人而已其間必有旁遭詿誤内蓄危疑而計不能止者而况於脅從之黨乎陛下若能招懐以禮悔禍以誠使來者必安安者必久人知獲免則誰為惡者帝忽其言而不用而涇原之變起倉皇避寇半年而歸帝亦老而厭兵矣於是一切以姑息養蕃鎮凡節度使將佐之得士心者皆就命留後雖以簒奪請命者亦如之宣武劉士寧以暴慢失衆贄曰萬榮搆亂之日諸郡守將固非其同謀也一城士衆亦未必皆其黨也方成敗逆順之勢交戰於中其肯捐軀與之同惡乎今若選命賢將降詔軍中奬萬榮撫定之功别加寵任褒將士輯睦之義例賜恩賞使衆知保安則誰肯復助其亂萬榮縱欲䟦扈勢亦無所至矣帝方茍安無事竟亦不許由此觀之帝持無常之心故前勇而後怯贄持有常之心故勇怯各得其當君臣之間異同至此雖欲上下相保不可得矣回鶻奉誠可汗死其相骨咄禄立五月册為懷信可汗以朱熹綱目修以李萬榮為節度使以通鑑修秋七月丙寅陽城左遷國子司業以列傳通鑑修八月辛亥北平莊武王馬燧薨以舊紀通鑑修解題曰宋祁賛曰唐史臣稱燧沈雄忠力常先計後戰每戰親令於衆無不感慨用命鬪必决死未嘗折北名蓋一時然力能得田恱而不取虜不可信而決信之故河北三盜卒不臣平凉大臣奔辱燧之罪也唐德宗皇帝貞元十二年春正月加方鎮中書令同平章事及檢校官以通鑑舊紀修三月癸巳朔以閑廐宫苑使李齊運為禮部尚書裴延齡為户部尚書每宰相對罷則齊運次進以吕祖謙標目修解題曰按新史列傳德宗臨御久益不假備宰相自竇參陸贄斥罷中書取充位白居易張平叔户部侍郎判度支制坐而决事丞相以下不過四五而主計之臣在焉蘓軾曰以此知唐制主計蓋坐而論事也不知四五者悉何人事見通鑑夏四月庚午田緒卒其子魏博節度副大使季安自稱留後以新紀修六月乙未以監句當左右神䇿竇瑒瑒霍仙鳴為䕶軍中尉以吕祖謙標目修解題曰按舊史宦官傳李輔國從幸靈武程元振翼衛代宗怙寵邀君至守三公封王爵干預國政亦未全握兵權代宗時子儀北伐親王東討遂特立觀軍容宣尉使令魚朝恩為之然自有統帥亦監領而已德宗以禁軍委白志貞志貞多納豪門賂補為軍士取其傭直身無在軍者涇師之亂帝詔禁軍無至者唯竇文瑒霍仙鳴諸宦者及親王左右從行志貞貶官左右禁旅悉委文瑒主之從幸山南兩軍漸集還京頗忌宿將凡握兵多者悉罷之文瑒仙鳴分統焉貞元十二年以文瑒仙鳴為左右神䇿䕶軍中尉内謁者監焦希望右神威軍使張尚進為左右神䇿中䕶軍此二句畧櫽括則本文自是神䇿親軍之權全歸於宦者矣竇霍之權震於天下藩鎮節將多出禁軍䑓省清要時出其門餘見通鑑葉夢得曰神䇿兵始奪魚朝恩德宗親見其患至用崔祐甫謀以白志貞代王駕鸛僅能得之而復以俾竇文瑒蓋朝恩之盛由肅代德宗未必得其心而文瑒積累之漸皆自我始故昵其私而弗悟也李萬榮子兵馬使迺自稱宣武兵馬使秋七月乙未以東都留守董晉為節度使丙申萬榮卒迺伏誅以新紀通鑑修八月己未朔日有食之以通鑑目録修以田季安為節度使以通鑑修趙憬薨以新紀修九月丙午裴延齡卒以通鑑修冬十月甲戌諌議大夫崔損給事中趙崇儒同平章事以新舊紀修十一月乙未以右補闕韋渠牟為諌議大夫以通鑑修唐德宗皇帝貞元十三年秋九月乙丑盧邁罷新紀冬十二月張建封入朝諌宫市弗聽以吕祖謙標目修唐德宗皇帝貞元十四年夏閏五月辛酉長武城軍亂逐其使韓全義新紀秋七月壬申趙崇儒罷工部侍郎鄭餘慶為中書侍郎同平章事以新紀修八月初置神䇿統軍以通鑑修九月吳少誠侵壽州以通鑑修己巳貶陽城為刺史以朱熹綱目修唐德宗皇帝貞元十五年春二月丁丑宣武軍節度使董晉薨乙酉宣武軍亂殺其行軍司馬陸長源等宋州刺史劉全諒自稱留後以新紀通鑑修以常州刺史李錡為浙西觀察使諸道鹽鐵轉運使以吕祖謙標目修己丑以劉全諒為節度使以通鑑修三月甲寅吳少誠陷唐州以新紀修秋八月乙未吳少誠寇陳許二州以吕祖謙標目修九月庚戌劉全諒卒兵馬使韓𢎞自稱宣武留後尋以為節度使以新紀修丙辰詔發十六道兵討吳少誠以通鑑修冬十二月辛未咸寧忠武王渾瑊薨以舊紀修乙未諸道兵潰於小溵河新紀解題曰小溵河在穎昌府郾城縣北唐德宗皇帝貞元十六年春二月乙酉以夏綏節度使韓全義為蔡州招討處置使新紀解題曰夏綏節度使見開元八年朔方節度使解題夏五月庚戌韓全義及吳少誠將戰于廣利原敗績以新紀修解題曰竇苹音訓廣利城在溵水縣之南壬子張建封卒其子愔自稱徐泗豪留後以新舊紀修秋七月吳少誠敗韓全義於五樓以通鑑修解題曰竇苹音訓今商水東有五樓村九月庚戌鄭餘慶貶郴州司馬庚申太常卿齊抗為中書侍郎同平章事新紀冬十月戊子赦吳少誠以吕祖謙標目修唐德宗皇帝貞元十七年春二月大雨雹己亥霜戊申大雨雪震雹庚戌大雪雨雹夏五月壬戌朔日有食之以新舊紀修乙酉朔方邠寧慶節度使楊朝晟卒六月兵馬使高固自稱知軍事以新紀通鑑修浙西崔善貞論宫市進奉鹽鐵之弊送李錡殺之以通鑑修解題曰范祖禹曰德宗本惡崔善貞直言故使李錡甘心善貞之死非特以告錡也鉗天下之口而長姦臣之威實德宗殺之是朝廷殺諌者非錡殺告者也事見通鑑崔偃曰髙祖信皇甫無逸斬皇甫希仁太宗信房喬斬上變者天下是之明皇縳告者付安禄山德宗械崔善貞付李錡則禍亂相仍顧不異哉己酉以髙固為節度使以通鑑修丁巳王武俊卒其子成德節度副大使士貞自稱留後秋七月辛巳以為節度使以新紀通鑑修己丑吐蕃陷麟州通鑑九月韋臯大破吐蕃冬十月庚子加臯中書令爵南康王以通鑑修唐德宗皇帝貞元十八年秋七月乙亥罷正衙奏事新紀唐德宗皇帝貞元十九年春三月壬子淮南節度使杜佑檢校司空同平章事以新紀修丁夘遷獻懿二祖於德明興聖廟以朱熹綱目修解題曰按新史禮樂志唐興以景帝為太祖而世近在三昭三穆之内至禘祫乃虛東向之位而太祖列於昭穆代宗祔𤣥宗肅宗而遷獻祖懿祖於夾室於是太祖居第一室禘祫得東向而獻懿不合食建中二年太學博士陳京請獻懿立别廟至禘祫則享禮儀使顔真卿議曰太祖居百代不遷之尊而禘祫之時暫居昭穆屈己以奉祖宗乃引蔡謨議以獻祖居東向而懿祖太祖以下左右為昭穆貞元十七年太常裴郁議以非是請下百寮議工部郎中張薦議與真卿同太子左庶子李嶸等七人曰獻懿二祖宜藏夾室以合祭法逺廟為祧而壇墠有禱則祭無禱則止之義吏部郎中栁冕等十二人曰周禮有先公之祧遷主藏於后稷之廟又有先王之祧其遷主藏於文武之廟今懿獻猶周先公也請築别廟以居之司勲員外裴樞曰建石室於寢園以藏神主至禘祫之歲則祭之考功貟外郎陳京同官尉仲子陵皆曰遷神主於德明興聖廟李繪曰天寳元年詔追尊咎繇為德明皇帝凉武昭王為興聖皇帝十年立廟欲遷獻懿祔此廟者陳京建中二年奏議本意至此復申其説京兆少尹韋武曰祫則獻祖東向禘則太祖東向十一年左司郎中陸淳曰議者多矣一曰復太祖之正位二曰並列昭穆而虚東向三曰祫則獻祖禘則太祖迭居東向而復正太祖之位為是然太祖復位則獻懿之主宜有所歸一曰藏諸夾室二曰置之别廟三曰遷於園寢四曰祔於興聖唯祔於興聖為是至十九年左僕射姚南仲等獻議五十七封付都省集議户部尚書王紹等五十五人請遷懿祖祔興聖廟議遂定由是太祖始復東向之位乙亥司農卿李實兼京兆尹以通鑑修秋七月己未齊抗罷新紀自正月不雨至是月甲戌始雨以新紀修翰林待詔王伾王叔文侍太子翰林學士韋執誼等與之交結以吕祖謙標目修解題曰范祖禹曰古之教太子者必選天下之賢使與之共處左右前後皆正人也其後嗣猶或不能成德而小人之依德宗不能選賢以輔導東宫而惟使技藝博奕之人入侍豈不愚其子乎夫有十金之産者必欲其子守之有一命之爵者必欲其子繼之此常人之情也而况天下至大祖業至重可不求賢以傳其子而愚之乎詩曰其誰知之蓋亦勿思昔之人君疑賢者導其子之為非而不疑於小人因之不教其子者亦不思而已矣事見通鑑冬閏十月崔損卒十二月太常卿髙郢為中書侍郎吏部侍郎鄭珣瑜為門下侍郎同平章事以新紀修貶監察御史韓愈為陽山令以通鑑修解題曰按新舊史韓愈之貶皆以為論宫市事方崧卿云李翺所作行狀但云為幸臣所惡皇甫湜神道碑亦止云闗中旱饑專政者惡之則非為宫市明矣公詩云或疑自上疏上疏豈其由是未必皆上疏之罪也又詩云伾文未揃崖州熾雖得赦宥常愁猜是其為叔文等所排明甚不知新舊史何以不取唐德宗皇帝貞元二十年夏六月昭義節度使李長榮卒兵馬使盧從史自立秋八月己未以為節度使以吕祖謙標目修大事記續編卷六十一
