body:
  text: 大事記續編卷二十二明王禕撰漢安樂思公建興十二年吳大皇帝嘉禾三年魏烈祖明皇帝青龍二年春二月諸葛亮出斜谷約吳大舉伐魏以通鑑修三月庚寅山陽公薨於魏以魏紀修夏四月諸葛亮屯渭南魏司馬懿拒之亮分兵屯田以蜀傳通鑑修解題曰按蜀志晉書夲紀亮悉大衆由斜谷出以流馬運亮壘於郿之渭水南原引軍而濟諸將欲住渭北以待之懿曰百姓積聚皆在渭南此必爭之地遂引軍而濟背水為壘因謂諸將曰亮若勇者當出武功依山而東若西上五丈原在郿縣西南二十三里則諸軍無事矣亮果屯上原諸將渡渭懿夲文作帝遣周當屯陽遂以餌之數日亮不動懿曰亮欲爭原而不向陽遂此意可知也遣胡遵郭淮共偹陽遂遂與亮㑹於積石臨原而戰即北原也在郿縣西北二十五里亮不能進還於五丈原亮每患糧不繼使已志不伸是以分兵屯田為久駐之基懿弟孚書問軍事懿復書曰亮志大而不見機多謀而少決好兵而無權雖提卒十萬已墮吾畫中破之必矣餘見通鑑後魏崔浩謂亮既據蜀恃山嶮之固不達時宜嚴威法控勒蜀人矜才負能髙自矯舉出兵隴右再攻祁山一攻陳倉踈遲失㑹摧衄而反後入秦川不復攻城更求野戰魏人知其意以不戰屈之憤結而死浩豈足以知亮哉五月吳主三道伐魏六月魏主遣兵助司馬懿秋七月自率水軍東下吳軍皆退以魏紀吳傳修解題曰權遣陸遜諸葛瑾等屯江夏沔口孫韶張承等向廣陵淮陽權率大衆圍合肥周魴𫝊孫韶等入淮全琮朱桓趨合肥諸葛瑾步隲朱然到襄陽陸遜潘璋等討梅敷東主自掩石陽孫奐治安陸城餘見通鑑八月漢武鄉忠武侯諸葛亮卒於軍征西大將軍魏延與丞相長史楊儀相攻儀斬延率師還左將軍吳懿為車騎將軍督漢中丞相長史蔣琬為尚書令總國事尋加益州刺史以蜀傳修解題曰晉紀亮卒諸將燒營遁走百姓奔告懿出兵追之亮長史楊儀反旗鳴鼓若將距懿者懿不之逼於是楊儀結陳而去經日懿行其營壘觀其遺事獲其圖書糧穀甚衆懿審其必死曰天下竒才也辛毗以為尚未可知也懿曰軍家所重軍書密計兵馬糧穀今皆棄之豈有人捐其五藏而可以生乎宜急追之追到赤岸乃知亮死審問亮部將楊儀魏延爭權儀斬延并其衆懿欲乘隙而進有詔不許水經注趙子龍退軍燒壞閣道緣谷一百餘里諸葛死魏延焚之是道也餘見通鑑王通曰使諸葛亮而無死禮樂其有興乎陳壽曰備殂嗣子幼弱事無巨細亮皆専之於是外連東吳內平南越立法施度整理戎旅工械技巧物究其極科教嚴明賞罰必信至於吏不容奸人懷自厲道不拾遺强不侵弱風化肅然也當此之時亮之素志進欲龍驤虎視包括四海退欲跨陵邉疆震蕩宇內又自以為無身之日則未有能蹈涉中原抗衡上國者是以用兵不戢屢耀其武然亮所與對敵或值人傑加衆寡不侔攻守異體故雖連年動衆未能有克至今梁益之民咨述亮者雖甘棠之咏召公鄭人之歌子産無以逺譬也孟軻云以佚道使民雖勞不怨生道殺人雖死不忿信矣袁暐曰亮受六尺之孤攝一國之政事凡庸之君専權而不失禮行君事而國人不疑行法嚴而國人悅服用民盡其力而下不怨及其兵出入如賔行不冦芻蕘者不獵如在國中其用兵也師止如山進退如風兵出日天下震動而人心不憂田疇辟倉廪實器械利蓄積饒朝㑹不譁路無醉人孔子曰雍也可使南面諸葛亮有焉吳以節度諸葛恪為丹陽太守討山越以吳傳修解題曰江表𫝊曰吳王初置節度官使典掌軍糧非漢制也漢安樂思公建興十三年吳大皇帝嘉禾四年魏烈祖明皇帝青龍三年春正月戊子魏以司馬懿為太尉以魏紀修解題曰賞禦敵之功也魏皇太后以憂殂以魏紀修漢徙中軍師楊儀於漢嘉尋自殺以蜀傳通鑑修解題曰事見通鑑薛季宣曰蜀五軍其左右將軍督護各一人其中師監護典參軍各一人都護一人其前師將軍監護督軍各一人其後督將軍兼一人是時户籍士民異號往往充兵之家已非民伍然諸葛治軍有法帥十二更張郃之戰在者八萬去者願留亮卒士卒更相重冒姦巧非一蜀兵耗矣漢嘉在漢為蜀郡青衣縣今雅州盧山名山及西北徼外之地是也顔師古杜佑李賢皆誤以嘉定龍遊為青衣餘見永和三年青衣注夏四月漢蔣琬為大將軍録尚書事後軍師費禕尚書令以蜀傳通鑑修魏大營宫殿减將吏俸祿以魏紀修解題曰按水經注榖水東歷大夏門故夏門也陸機與弟書云門有三層髙百尺魏明帝造榖水又東徑廣莫門北漢之榖門也北對芒阜連嶺修亘魏志曰明帝欲平北芒令登臺見孟津侍中辛毗諌乃止其一水自千秋門南流徑神虎門下東對雲龍門衡栿之上皆列龍虎之狀以火齊薄之又南徑通門掖門西又南流東轉徑閶闔門南案禮王有五門魏明帝上法太極於洛陽南宫起太極殿於漢崇德殿之故處改雉門為閶闔門渠水又枝分夾路南徑太尉司徒兩坊間謂之銅駝街明帝置銅駝諸獵於閶闔南街東徑司馬門南明帝始築無闕門餘見通鑑華雋洛陽記太極殿有四金柱戴延之西征記殿上有金井閳金博山蛟龍負山於井上又有金獅子魚豢魏略九龍殿前為玉井綺欄宋敏求曰昭陽殿在太極之北鑄黃龍髙四丈鳳凰髙二丈置殿前歷代正殿皆以太極名自此始也秋七月魏崇華殿火以魏紀修八月魏立子芳為齊王以魏紀修是嵗魏幽州刺史王雄使人刺殺軻比能部落離散以通鑑修魏張掖水涌石負圖以朱熹綱目修魏以馬易珠翠於吳以吕祖謙標目修漢安樂思公建興十四年吳大皇帝嘉禾五年魏烈祖明皇帝青龍四年春吳鑄大錢一當五百以吳傳修夏四月漢主如湔觀汶水以蜀傳修解題曰諸葛亮既死而禪始自縱矣今茂州汶山縣漢湔縣地漢徙武都氐王符健於廣都以鄭樵年譜修冬十月有星孛於大辰又孛於東方十一月己亥彗星見以魏紀修漢安樂思公建興十吳大皇帝嘉禾六年年魏烈祖明皇帝景初元年春正月魏黃龍見山荏散騎常侍髙堂隆以為魏得土德三月改元首建丑之月以魏紀修解題曰按宋禮志魏初正朔依虞夏故事若禮樂服色牲幣自當隨土德之數尚書令桓階等奏國家承漢氏人正之後當受之以地正令從漢正則犧牲不得獨改明帝在位便有改正朔之意朝議不决乃下詔公卿以下博議侍中髙堂隆議軒轅髙辛夏后氏漢皆以十三月為正少昊唐殷皆以十二月為正髙陽虞周皆以十一月為正雖百世皆以前代正而復也大尉司馬懿尚書僕射衛臻尚書薛悌中書監劉放中書侍郎刁幹博士秦靜以為不宜改青龍五年山荏縣言黃龍見帝乃詔三公推三統之次魏得地統當以建丑之月為正改青龍五年春三月為景初元年孟夏四月服色尚黃犧牲用白或問朱熹作綱目之意曰主在正統三國當以蜀為正而司馬光乃云諸葛亮入寇冠屨倒置何以示訓緣此遂欲成書熹之主意如此竊謂通鑑以魏為正則景初三年之中故應改蜀建寅之正以從魏建丑之正綱目既以蜀為主乃不能改魏建丑之正以從蜀建寅之正豈未及訂定故耶秋七月魏制三祖為不毁之廟以通鑑修魏徵公孫淵淵反八月遣幽州刺史毌丘儉討之不利淵自立為燕王改元以魏紀通鑑修漢皇后殂以蜀傳修解題曰蜀𫝊書於六月而通鑑載於七月之後誤也冬十月魏大水以魏紀修魏殺其后毛氏以魏紀修十一月魏詔漢四百年無禘禮始營圎方丘南北郊以魏紀修吳諸葛恪平山越以吳傳修是嵗魏作都官考課法不果行以通鑑修漢將軍王平督漢中以蜀傳修解題曰建興六年屬參軍馬謖先鋒謖舍水上山舉措煩擾平連規諌謖不能用大敗於街亭衆盡星散惟平所領千人鳴鼓自持魏將張郃疑其伏兵不往逼也於是平徐徐收合諸營遺迸率將士而還亮既誅謖等平特見崇顯加拜參軍統五部兼當營事九年亮圍祁山平别守南圍司馬懿攻亮張郃攻平平堅守不動郃不能克十二年亮卒軍退還魏延作亂一戰而敗平之功也遷後典軍副吳懿住漢中又領漢中太守十五年代懿督漢中延熙元年蔣琬住沔陽平署琬府事漢安樂思公延熙元年吳大皇帝赤烏元年魏烈祖明皇帝景初二年春正月漢立皇后張氏改元立子璿為皇太子以蜀傳修二月魏遣司馬懿伐遼東以魏紀修吳鑄大錢一當千以吳傳修六月彗星見於張以魏紀修魏司馬懿圍襄平丙寅克之斬公孫淵以魏紀修解題曰按晉書夲紀公孫淵遣車騎數萬阻遼隧堅壁而守南北六七十里以拒懿懿盛兵多張旗幟欲出其南賊盡鋭赴之乃泛舟潛濟以出其北與賊營相逼沉舟焚梁傍遼水作長圍棄賊而向襄平諸將曰不攻賊而作圍非所以示衆也懿曰賊堅營髙壘欲以老我兵也攻之正入其計此王邑所以耻過昆陽也古人曰敵雖髙壘不得不與我戰者攻其所必救賊大衆在此則巢窟虛矣我直指襄平必人懷內懼懼而求戰破之必矣遂整陳而過賊見兵出其後果邀之懿謂諸將曰所以不攻其營政欲致此不可失也乃縱兵逆擊大破之三戰皆捷賊保襄平進軍圍之餘見通鑑始公孫度以中平六年據遼東至淵三世凡五十年通鑑先載諸將欲擊之然後載懿潛濟水出其北但懿既未濟水安能擊賊懿謂敵雖髙壘不得不與我戰者攻其所必救故懿整陳而過賊兵邀之乃縱兵逆擊通鑑所載不如晉紀明白秋八月吳改元以吳傳修吳中書郎吕一伏誅以通鑑修冬十一月漢蔣琬屯漢中以王平為前護軍以蜀傳修魏立夫人郭氏為皇后以燕王宇為大將軍劉放孫資薦武衛將軍曹爽及司馬懿甲申免宇以爽代之十二月丁亥朔立齊王芳為太子懿爽受遺輔政魏主殂太子芳即皇帝位尊皇后曰皇太后加懿爽侍中假節鉞都督中外諸軍録尚書事諸宫室之役皆以遺詔罷之以魏紀通鑑修解題曰按晉書后妃傳魏明帝世懿居上將之任諸子並有雄才大略師妻夏侯氏知師非魏之純臣而夏侯氏魏之甥師深忌之青龍二年遂以鴆卒青龍二年明帝即祚之八年也時國未有釁而懿父子逆節已萌其婦與妻知之而舉朝莫之知也孫資劉放且薦懿入朝使參顧命天方以典午為曹氏之斤斧固宜人謀之踈哉餘見通鑑又按光武征伐四方始置督軍御史建安中曹操以曹仁都督七軍討田銀魏文即位改監某州諸軍事為都督某州諸軍事曹仁都督荆揚益州曹真都督雍凉州臧霸都督青州是也杜佑謂始於黃初三年非也都督中外諸軍事始黃初三年爾至是爽懿以受遺居此任大和四年懿代蜀遂加大都督矣宋職官志曰都督諸軍為上監諸軍次之督諸軍為下使持節為上持節次之假節為下使持節得殺二千石以下持節殺無官位人若軍事得與使持節同假節惟軍事得殺犯軍令者江左都督中外尤重惟王導等乃居之宋氏人臣無居者惟江夏王義恭假黃鉞假黃鉞則専戮節將非人臣常器漢安樂思公延熙二年吳大皇帝赤烏二年魏邵陵厲公曹芳景初三年春正月丁丑魏以司馬懿為太傅曹爽弟羲為中領軍訓為武衛將軍彥為散騎常侍爽引散騎侍郎何晏散騎常侍丁謐等為腹心以魏紀修三月漢蔣琬為大司馬以蜀傳修冬十一月吳將廖式反於臨賀討平之以通鑑目録修魏復以建寅為正改元以通鑑修漢安樂思公延熙三年吳大皇帝赤烏三年魏邵陵厲公正始元年漢安樂思公延熙四年吳大皇帝赤烏四年魏邵陵厲公正始二年春吳零陵太守殷札請大舉伐魏不能用夏四月吳遣四將入魏境以吳傳修解題曰漢晉春秋殷札言於權曰今天棄曹氏喪誅纍見虎爭之際而幼童蒞事陛下身自御戎取亂侮亡宜滌荆揚之地舉彊羸之數使强者執戰羸者轉運西命益州軍於隴右授諸葛瑾朱然大衆指事襄陽陸遜朱桓别征夀春大駕入淮陽歷青徐襄陽以西困於受敵長安以西務對蜀軍許洛之衆勢必分離掎角瓦解民必內應將軍對向或失便冝一軍敗績則三軍離心便當秣馬脂車陵蹈城邑乘勝逐北以定華夏若不悉軍動衆循前輕舉則不足大用易於屢退民疲威消時往力竭非出兵之䇿也五月吳太子登卒以通鑑修吳圍樊六月魏司馬懿帥師拒之吳師遁以魏紀吳傳修是嵗魏屯田淮南北開漕渠以通鑑修解題曰時欲廣田畜穀使鄧艾行陳項已東至壽春艾以為田良水少不足以盡地利宜開河渠引水澆溉大積軍糧又通運漕之道又以為昔破黃巾因為屯田積穀許都以制四方今三隅已定事在淮南每大軍征舉運兵過半功費巨億陳蔡之間土下田良可省許昌左右諸稻田并水東下令淮北屯二萬人淮南三萬人十二分休常有四萬人且田且守計除衆費嵗完五百萬斛六七年間可積三千萬斛此則十萬之衆五年食也事皆施行餘見通鑑葉適曰以今約之則收少而食多未知當時調度如何然作田計夫軍食計口古今所同不能一夫耕百畝而食六十斛也管寧卒於魏以朱熹綱目修解題曰蘇軾曰曹操既得志士人靡然歸之文若盛德猶為之經營謀慮一旦小異便為所殺孔文舉竒逸博聞志大而才踈每所建輒中操病况肯為用乎然終亦不免桓溫謂孟嘉曰人不可無勢我乃能駕御卿溫之才百倍於嘉所以云爾者自知其隂賊險狠不為髙人勝士所比數爾管幼安懷寶遁世龍驤海表其視曹操父子真穿窬斗筲而已終身不屈既不可得而用其可得而殺乎賢於文若文舉逺矣蘇轍贊曰幼安之賢無以過人余獨何以謂賢賢其明於知人審於處己以能自全幼安之老歸自海東一畝之宫閉不求通白帽布裙舞雩而風四時蒸嘗饋奠必躬八十有四蟬蛻而終少非漢人老非魏人何以命之天之逸民漢安樂思公延熙五年吳大皇帝赤烏五年魏邵陵厲公正始三年春正月吳立子和為皇太子以吕祖謙標目修秋七月吳擊儋耳珠崖以通鑑修解題曰按吳傳權欲遣偏師取夷州及珠崖皆以咨陸遜遜上疏曰今兵興歷年見衆損减陛下憂勞聖慮忘寢與食將逺規夷州以定大事臣惟萬里襲取風波難測民易水土必致疾疫今驅見衆經涉不毛欲益更損欲利反害又珠崖絶險民猶禽獸得其民不足濟事無其兵不足虧衆但當育養士民寬其租賦衆克在和義以勸勇則河渭可清矣全琮曰殊方異域隔絶瘴海水土氣毒自古有之兵入民出必生疾病轉相汚染往者懼不能返所獲何可多致權不聽餘見通鑑八月吳封子霸為魯王以吳傳修漢安樂思公延熙六年吳大皇帝赤烏六年魏邵陵厲公正始四年夏四月魏立皇后甄氏以魏紀修五月朔日有食之既以通鑑修冬十月漢蔣琬還涪王平為前監軍督漢中十一月費褘為大將軍録尚書事以蜀傳修解題曰琬以諸葛亮數窺秦川道險運艱竟不能克乃作舟船欲由漢沔襲魏興上庸㑹疾未行而衆論咸謂如不克捷還路甚難於是遣費褘等喻指琬承命上疏曰自臣奉辭漢中已經六年規方無成夙夜憂慘今魏跨帶九州平除未易若東西并力首尾掎角雖未能速得如志且當分裂蠶食先摧其支黨然吳期二三連不克果輒以褘等議以凉州胡塞之要進退有資且羌胡乃心思漢如渴宜以姜維為凉州刺史若維征行䘖持河右臣當帥軍為繼今涪水陸四通惟急是應若東北有虞赴之不難由是遂還住涪張栻曰琬非應變之才也琬疏通鑑載於四年按年琬言奉辭漢中已經六琬以元年十一月屯漢至此已經六年始還住涪又姜維傳亦云六年領凉州刺史則此疏在六年無疑魏曹固上疏論封建曹爽不能用以舉要厯補遺修漢安樂思公延熙七年吳大皇帝赤烏七年魏邵陵厲公正始五年春正月吳上大將軍陸遜為丞相鎮武昌以吕祖謙標目修二月魏曹爽帥師伐漢三月漢王平据興執以拒之閠三月復遣費褘救之以魏紀修解題曰左護軍劉敏與鎮北大將軍王平俱鎮漢中曹爽襲蜀或謂但可守城不出拒敵必自引退敏以為男女布野農穀栖畝若聽敵入則大事去矣遂率所領與平據興勢多張旗幟綿亘百餘里餘見通鑑夏四月朔日有食之以通鑑修五月魏軍退走魏紀是嵗冬漢費褘為益州刺史侍中董允守尚書令以通鑑修漢安樂思公延熙八年吳大皇帝赤烏八年魏邵陵厲公正始六年春正月吳太子和與魯王霸禮秩如一陸遜上疏諌吳主切責之二月遜自殺子建武校尉抗代領其衆以吳傳蕭方二十國春秋修解題曰按吳録權見楊竺辟左右而論霸之才竺深述霸有文武英姿宜為嫡嗣權許焉有給使伏於牀下具聞之以告太子陸𦙍當至武昌往辭太子太子不見而微服至其車上與共密議欲令陸遜表諌既而遜有表極諌權疑竺泄之竺辭不服權使竺出尋其由竺白頃惟𦙍西行必其所道又遣問遜遜言𦙍所述召𦙍考問𦙍為太子隱曰楊竺向臣道之遂共為獄竺不勝痛毒服是所道乃斬竺晉春秋蕭方三十國春秋云遜自縊死抗年二十以父喪還遂絶賔客權所賜一無所領及權意解使抗屯柴桑泣涕與别曰吾前用讒言與汝父大義不篤以此負汝前後之事一皆焚也抗流涕不答時人髙之餘見通鑑秋八月漢皇太后殂以蜀傳修解題太后吳氏通鑑云甘太后未見所出冬十二月漢費褘行漢中圍守以通鑑修解題曰時王平以武將鎮漢中故褘自行圍守至明年六月而還漢安樂思公延熙九年吳大皇帝赤烏九年魏邵陵厲公正始七年春二月吳車騎將軍朱然攻魏柤中破之以通鑑目録修解題曰按漢晉春秋柤中民吏萬餘家渡沔司馬宣王謂曹爽曰若便令還必復致冦宜權留之爽曰今不修守沔南留民沔北非長策也宣王曰不然凡物置之安地則安危地則危故兵書曰成敗形也安危勢也形勢御衆之要不可不審設令賊二萬人斷沔水三萬人與沔南諸軍相持萬人陸鈔柤中君將何以救之爽不聽卒令還然後襲破之袁淮言於爽曰吳楚之民脆弱寡能英才大賢不出其土不足與中國相抗然常為中國患者蓋以江漢為池舟楫為用利則陸鈔不利則入水攻之道逺中國之長技無所用也孫權十數年來大畋江北繕治甲兵精其守禦數出盜竊敢逺其水陸次平土此中國所願聞也夫用兵者貴以飽待饑以逸擊勞師不欲久行不欲逺守少則固力専則强今宜捐淮漢已南退却避之若賊入居中央來侵邊境則隨其所短中國之長技得用矣若不敢來則邊境得安無鈔盜之憂我國富兵强政修民一矣今襄陽孤在漢南賊循漢而上則斷而不通一戰而勝則不攻而自服故置之無益於國亡之不足為辱遂不徙襄陽記柤中在上黃界去襄陽一百五十里鄭獬曰木渠木里溝也出中廬西上擁鄢水東南四十五里徑宜城東北四十五里入沔後漢王寵復鑿蠻水與之合溉田六十餘頃曹魏時夷王梅敷弟兄聚民萬餘家據之後朱然兩提兵爭其地不得後渠益廢葉適曰權是時不止於守江而又欲為取淮漢以比之規故也孫氏及五代江淮攻守大略類此自吳揚氏無爭淮北之勢而淮不可守唐李氏割淮臣周不敢窺江以北而江不可守宋建炎紹興則以淮守淮以江守江而孫氏及五代之故實遂不及講魏毋丘儉討髙句驪夏討濊貊破之以魏紀修秋九月吳驃騎將軍步隲為丞相分荆州為二部鎮南將軍吕岱為上大將軍督武昌以西將軍諸葛恪為大將軍鎮武昌以通鑑修吳罷大錢以通鑑修冬十一月漢安陽恭侯蔣琬卒以蜀傳修漢董允卒以蜀傳修解題曰按蜀志琬與董允俱以延熙九年卒通鑑載於八年而目録書於九年疑編寫之誤漢安樂思公延熙十年吳大皇帝赤烏十年魏邵陵厲公正始八年春二月朔日有食之以魏紀修解題曰以長歷考之庚午朔也三月吳作太初宫以吳傳修解題曰南朝宫苑記太初宫方五百丈本長沙桓王故府黃龍元年都建業因居故府不改北直臺城西掖門路魏曹爽遷太后於永寧宫夏五月魏司馬懿稱疾不與政以通鑑修解題曰丁謐畢軌等既進用數言於爽曰宣王有大志而甚得民心不可以推誠委之由是爽恆猜防焉禮貌雖存而諸所興造皆不復由宣王宣王不能爭且懼其禍故避之餘見通鑑是嵗漢以選曹郎陳祇為侍中黃門令黃皓始用事以蜀傳修解題曰陳祇代董允為侍中則在允既卒之後也通鑑亦誤於八年書之漢凉州刺史姜維為衛將軍録尚書事以蜀傳修解題曰十年維遷衛將軍與大將軍費禕録尚書事通鑑載於九年魏雍凉羌胡降漢漢姜維出隴右與魏雍州刺史郭淮戰於洮西以通鑑蜀傳修漢安樂思公延熙十一年吳大皇帝赤烏十一年魏邵陵厲公正始九年夏四月魏以光祿大夫徐邈為司空不受以魏紀修解題曰盧欽著書稱邈曰或問徐公當武帝之時人以為通自在凉州及還京師人以為介何也答曰往者毛孝先崔季圭等用事貴清素之士於時皆變易車服以求名髙而徐公不改其常故人以為通比來天下奢靡轉相倣效而徐公雅尚自若不與俗同故前日之通乃今日之介也是世人之無常而徐公之有常也餘見通鑑吕祖謙曰大抵人為世俗所驅有為善所驅者有為惡所驅者不為惡所驅猶可用力至於不為善所驅始可見其胸中之有所立五月漢費禕屯漢中以通鑑目録修解題曰王平卒故也大事記續編卷二十二
