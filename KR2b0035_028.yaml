body:
  text: 大事記續編卷二十八明王禕撰晉中宗孝元皇帝大興元年趙帝劉矅光初元年成武皇帝玉衡八年凉張實建興六年春三月丙辰晉王睿即皇帝位改元解題曰周嵩上疏曰古之王者應天順時義全而後取讓成而後得是以享世長久重光萬載今議者以殿下化流江漢澤被六州欲推崇尊號臣謂今梓宫未反舊京未清義夫泣血士女震動冝先雪社稷大恥盡忠言嘉謀之助以時濟𢎞仁之功推後已之誠誰敢不從由是忤旨出為新安太守餘見通鑑程逈曰魯昭公三十二年十二月己未薨于乾侯次年夏六月癸亥公之喪至自乾侯戊辰定公即位不於聞喪之日即位必俟喪至五日之後如始薨既斂之時然後即位此成周之典禮也周嵩之言必有依據乃以忤㫖而出之尸是責者非王導乎必謂愍帝之喪不可卒至姑從嵩言少俟祥除豈不可也以蜀先主之賢猶不容費詩之論自古輔佐之臣撫事機之㑹知問學者少此君子所以撫卷而屢歎也庚午立太子紹為皇太子以本紀修李矩使郭默等救洛陽大破漢兵以列傳修解題曰漢太子粲遣劉稚生攻趙固於洛固奔陽城山矩遣郭誦屯洛口以救之誦使將張皮載記云遣耿稚張皮簡精卒千人夜渡河粲候者告有兵至粲恃其衆不以為虞既而誦等掩至十道俱攻粲衆奔潰殺傷大半載記云粲奔據陽鄉因據其營獲其器械軍資不可勝數及旦粲見皮等人少更與稚生悉餘衆攻之聰聞粲敗使太尉范隆率騎赴之苦戰二十餘日不能下矩進救之使壯士三千泛舟迎皮賊臨河列陳數日不得渡皮選精騎千餘殺所獲牛馬焚燒器械突圍奔虎牢載記云稚等懼率衆五千突圍趨北山而南追之不及聰因憤恚發病而死帝嘉其功除矩都督河南三郡軍事封修武縣侯餘見通鑑漢螽斯則百堂災燒殺漢主聰子二十一人以載記通鑑目録修夏四月丁丑朔日有食之以本紀修荀組來歸以通鑑目録修漢曹嶷來降五月叛歸石勒以通鑑修癸丑廣武愍侯劉琨為段匹磾所害以本紀修解題曰琨為匹磾所拘自知必死神色怡如也為五言詩贈其别駕盧湛曰幄中有懸璧本自荆山球惟彼太公望昔是渭濵叟鄧生何感激千里來相求白登幸曲逆鴻門賴留侯重耳憑五賢小白相射鈎能隆二伯主安問黨與讎中夜撫枕歎想與數子逰吾衰久矣夫何其不夢周誰云聖達節知命故無憂宣尼悲獲麟西狩涕孔丘功業未及見夕陽忽西流時哉不與我去矣如雲浮朱實隕徑風繁英落素秋狹路傾華蓋駭駟摧雙輈何意百鍊剛化為繞指柔琨詩託意非常攄暢幽憤用以激湛湛素無竒略以常詞酬和殊乖琨心重以詩贈之乃謂琨曰前篇帝王大志非人臣所言矣然琨既忠於晉室素有重望被拘經月逺近憤歎匹磾所署代郡太守辟閭嵩與琨所署雁門太守王據後將軍韓據連謀襲匹磾韓據女為匹殫兒妾聞其謀而告之匹磾於是執王據辟閭嵩及其徒黨悉誅之餘見通鑑列傳桓溫自以雄姿風氣是宣帝劉琨之儔有以比王敦者意甚不平於北方得琨伎女一見溫便潸然而泣溫問其故答曰公甚似劉司空溫大悅整理衣冠又呼婢問婢云面甚似恨薄眼甚似恨小鬚甚似恨赤形甚似恨短聲甚似恨雌溫裭冠解𢃄昏然而睡不懌者數日蘇軾曰桓溫之所成殆過於越石而區區慕之者英雄必自有以相伏初不以成敗言耶以此論之光武之度本不如𤣥德唐文皇之英氣未必過寄奴也六月旱以本紀修甲申刁協為尚書令以本紀修庚寅李矩都督司州諸軍事司州刺史以本紀修秋七月漢主聰寢疾召秦王曜石勒輔政不至癸亥聰卒甲子太子粲即位改元八月大將軍靳凖弒之發淵陵斬聰尸劉氏男女無少長皆斬之以載記舉要歷補遺修解題曰胡寅曰五胡之魁其才亦有過人者而不能輔之以學矯揉成就故其所為雖有幸中於善而暴戻之氣禀於所賦者終不可得而掩劉聰弒主而力蹀血神州擒二帝而殺之腥羶淫汚薰染河華斬戮忠諫矯誣上天專以無道而行未十年乃為昏㭬之徒變易耳目而不知也至於殺其子屠其族戮其尸禍及父陵火逮宗廟天之報也亦稱其施聖人所為謹華夷之辨不使入居中土禁其猾夏之漸豈非為後世深思而逺計哉事見通鑑凖稱漢天王遣使來降曜勒討之冬十月曜稱帝改元以勒為大將軍趙公加九錫以載記舉要歷補遺修十一月乙卯日夜出高三丈本紀加江州牧王敦為荆州牧以紀傳修御史中丞熊逺上疏論時政以列傳修復州郡秀孝試經策之法以通鑑修十二月漢將喬泰等殺靳凖降漢以本紀載記修彭城內史周撫叛降石勒詔下邳內史劉遐等討之以本紀修石勒克平陽以載記修晉中宗元皇帝大興二年漢帝劉曜光初二年成武皇帝玉衡九年後趙明皇帝石勒元年涼張實建興七年春二月泰山太守徐龕斬周撫以本紀修立郊丘三月辛卯合祭天地以通鑑修解題曰胡寅曰周禮大司樂凡樂以圜鍾為宫黃鍾為角太簇為徴姑洗為羽冬日至於地上之圜丘奏之六變以祀天神以函鍾為宫太簇為角姑洗為徴南呂為羽夏日至於澤中之方丘奏之八變以祭地示又大宗伯以禋祀實柴槱燎祀其在天者而以蒼璧禮之以血祭貍沈疈羣祭其在地者而以黃琮禮之皆所以順其隂陽辨其時位設其形色而以氣類求之此禮之不得不異者也漢元始中姦臣附㑹周官大合樂之說謂宜合祭故天地共犢禮之失自此始晉元帝乘亂離之餘因陋就簡遂行合祭之說而不自以為瀆也由漢歷唐千有餘年之間而以五月親祀北郊者惟魏文之太和周武之建德隋高祖之開皇唐睿宗之先天皆希闊一時之舉然而隨得隨失卒無所定典禮廢墜可勝歎哉夏四月將軍陳川以浚儀叛徐龕亦叛降石勒以本紀修漢主曜斬石勒使者勒與之絶以通鑑目録修漢主曜都長安立妃羊氏為后以載記修南陽王保稱晉王改元建康以列傳修解題曰宋庠紀年通譜建康本漢順帝年號徐揚蝗吳郡大饑詔百官言事益州刺史應詹論𤣥虛以本紀吕祖謙標目修祖逖攻陳川于蓬關石勒遣石虎救之逖退屯淮南以通鑑目録修解題曰今汴梁尉氏縣俱有蓬池陳川為蓬陂塢主疑即此地石勒陷幽州段匹磾奔邵續以列傳通鑑目録修曹嶷賂石勒以河為境以吕祖謙標目修梁州刺史周訪擊杜曽斬之加安南將軍以本紀修六月漢改號趙以吕祖謙標目修秋八月遣將軍羊鑒討徐龕以本紀修冬十一月戍寅石勒自稱趙王以本紀修十二月慕容廆陷遼東平州刺史崔毖奔髙句驪以本紀修是嵗蒲洪降趙以吕祖謙標目修晉中宗元皇帝大興三年趙帝劉矅光初三年成武皇帝玉衡十年後趙明皇帝二年凉張茂建興八年春正月趙中山公虎圍厭次二月執邵續詔以續子緝為冀州刺史以本紀修趙將尹安等以洛陽降李矩以通鑑修三月以慕容廆為安北將軍平州刺史以通鑑修夏五月庚寅地震以本紀修晉王保為其將張春所殺以吕祖謙標目修徐龕請降不受除羊鑒名以徐州刺史蔡豹領其兵以列傳修六月丁酉盜殺涼州刺史西平元公張實其弟茂立以本紀修氐羌巴羯叛趙趙以光祿大夫游子逺為征討都督破降之以吕祖謙標目修祖逖屯雍邱秋七月加逖鎮西將軍河以南多來歸以紀傳修解題曰雍邱開封府縣本杞國蘇轍曰敵國相圖必審於彼已將彊敵弱則利於進取將弱敵彊則利於自守東晉渡江中原雖屢有變而南兵不出出亦無功皆夷狄自相屠滅而已石勒之死庾亮為北伐之計石虎之老庾翼為徙鎮之役皆無成而死及符堅之敗謝安父子有席卷之意終以兵將奔潰無尺寸之得其後宋文自謂富强以兵挑元魏梁武志於并吞失信於高氏陳宣乘高氏之衰攘取淮南皆繼之以亡敗者何東南地薄兵脆將非命世之雄其世固如此也自江南建國惟桓溫西征符健東討慕容兵鋒所及敵人震動及宋武破廣固陷長安所至蕩定有弔伐之風此二人者誠非常將也然桓溫終以敗衄宋武未能定秦狼狽而反況其下者乎晉元帝初定江南以祖逖為豫州刺史進據譙城然未嘗為深入計也石勒遣兵攻逖逖輒破其衆自河以南盡為晉土方將經略河北而帝使戴若思擁節直據其上逖怏怏不得志死蓋敵强將弱能知自守之為利者惟逖一人夫惟知自守之為進取而後可以言進取也哉事見通鑑八月周訪卒以湘州刺史甘卓為梁州刺史以本紀修解題曰訪卒而王敦之難迫矣徐龕降後趙敗蔡豹冬十月丙辰殺豹本紀解題曰豹在徐土內撫將士外懷諸衆甚得近逺情聞其死多悼惜之餘見通鑑十二月以左將軍譙王丞為湘州刺史以列傳修晉中宗元皇帝大興四年趙帝劉曜光初四年年成武皇帝玉衡十一後趙明皇帝三年凉張茂建興九年春二月徐龕復降以本紀修夏四月後趙中山公虎陷厭次執邵續假匹磾尋殺之以本紀修五月庚申免中州良民為揚州僮客者以備征役以本紀修解題曰薛季宣曰自用刁協議後皆以奴為兵庾翼發所部六州奴征伐何充悉發二州編户奴㑹稽王道子發諸郡奴號曰樂屬移置京師往往百姓怨嗟遇敵奔敗是時雖嘗從賀循之議欲嚴分界多亭候時畨休以備冦然竟無成績也終南山崩以通鑑修秋七月甲戌尚書僕射戴淵都督司兖豫并冀雍六州軍事司州刺史鎮合肥丹陽尹劉隗都督青徐幽平四州軍事青州刺史鎮淮隂解題曰按世說新語戴淵少游俠不治行檢常在江淮間攻掠商旅陸機還洛輜重甚盛淵使少年掠劫淵處鄙事神氣猶異機遙謂之曰卿才如此亦復作劫邪淵便泣涕投劒歸機機重之作筆薦焉晉陽秋祖逖性通濟不拘小節又賓從多是桀黠勇士逖待之如子弟永嘉中流民萬數揚土大饑賓客攻剽逖輒擁護全衛談者以此少之然則淵逖皆所謂不羈之士特逖才氣又差高爾壬午開府儀同三司王導為司空録尚書領中書監以本紀修九月祖逖卒冬十月以其弟侍中約為豫州刺史以本紀修解題曰逖卒而王敦之難愈迫矣葉夢得曰潘佑得辜於逖以其將歸石勒勒斬之以歸逖自是得勒降亦拒不納阻晉民歸心使堅事虜以一時之感而失天下之望勒斬一亡將而換河北之民以為逖墮勒計中而不悟古之為國者必視民之所向背其向不可遏其背不可挽雖湯武亦不過東征西怨西征東怨曰徯我后后來其蘇而已寧有人歸我反不納而可以得之者乎佑又謂勒自知其危故修逖先塋而還其叛將以求媚誠得之矣羊陸之事蓋彼此相圖而各知其謀故文雖為好而實伺其間兩境並獵獲其禽即歸之此殆兒戲耳胡為步闡降而晉不辭乎世常恨逖有志不遂以是觀之縱逖不死亦未見其能得勒也事見通鑑十一月後趙禁民釀酒以通鑑目録修十二月以慕容廆為都督幽平二州東夷軍事遼東公以本紀修晉中宗元皇帝永昌元年趙帝劉曜光初五年年成武皇帝玉衡十二後趙明皇帝四年凉張茂建興十年春正月乙卯改元以本紀修戊辰王敦舉兵武昌將軍沈充起兵於吳以應之以本紀通鑑修解題曰敦構逆太子中庶子溫嶠謂周顗曰大將軍此舉似有所在當無濫耶顗曰君少年未更事人主自非堯舜何能無失人臣豈可得舉兵以脅主共相推戴未能數年一旦如此豈云非亂乎處仲剛愎强忍狼抗無上其言寧有恨耶餘見通鑑葉適曰王氏威勢所脅人不知有君嶠設此語以觀人情爾顗雖踈然此語足以定當年是非之實矣譙王承甘卓移檄討王敦以吕祖謙標目修解題曰甘卓遣參軍羅英至廣州與陶侃剋期侃得信即遣參軍高寶率兵下餘見通鑑王敦蘇峻發難一也卓約陶侃侃為之發兵不敢留難溫嶠要侃侃乃以不敢越局為辭暨遣龔登而又追回前後異情者一則侃於王敦有宿怨二則侃以不預顧命為恨故也二月趙以仇池公楊難敵為武都王以通鑑修秦州刺史陳安叛趙氐羌皆附之以通鑑修徵戴淵劉隗還三月以王導為前鋒大都督解題曰元帥三軍之司命也而王導之言一則曰如導之徒心思外濟二則曰往年之事臣等有識皆所未悟然則功何由而成乎此周札所以開門而延冦也事見通鑑王敦據石頭淵隗等攻之敗績隗奔後趙刁協出奔見殺解題曰李遘曰魯昭不忍季氏薨于乾侯晉元不忍王敦憂憤告謝子家駒諫而劉隗勸焉隗之罪著矣帝終不悟雪涕而遣之暗矣事見通鑑敦自為丞相都督中外諸軍録尚書事復不受殺驃騎將軍戴淵左僕射周顗沈充陷吳國內史張茂死之甘卓至猪口而還解題曰陳敏之叛卓為之表裏及周玘倡義顧榮邀卓卓聞陳昶死懼而從榮王敦發難卓初依違顧望迫於鄧騫樂道融之正義既出師攻討矣及王敦使王卭求和又適王師敗績遂還襄陽始之懷懼則自逆而之順終之懷懼即自順而之逆亦終於不能保其身而已矣事見通鑑按水經沔水徑江夏雲杜縣東夏水從西來注之注云即猪口也夏四月敦還武昌南蠻校尉魏又陷湘州譙王承死之解題曰按水經注公安縣有油水東有澋口即武陵郡界東有淪口淪水南與澋水合又南通澧水及諸陂淵湖池相接悉是南蠻府屯故側江有大城相承云倉渚城即邸閣也五月敦使襄陽太守周慮襲殺卓以紀傳吕祖謙標目修秋七月後趙中山公虎拔泰山執徐龕尋殺之以本傳修兖州刺史郗鑒退屯合肥以呂祖謙標目修冬十月後趙圍譙祖約退屯夀春以吕祖謙標目修新昌太守梁碩反以本紀修十一月罷司徒并丞相府以通鑑修閏月己丑帝崩於內殿王導受遺輔政庚寅皇太子紹即皇帝位尊所生母荀氏為建安郡君以本紀修解題曰胡寅曰漢文尊薄氏與太后比自是帝王妾母按例推崇以為常典其能矯制私情祈合正義者十無一二若明帝之與荀氏可謂事親以道者矣十二月後趙濮陽景侯張賓卒以通鑑修張茂取趙隴西南安之地以通鑑修是嵗大旱以宋五行志修晉肅宗明皇帝太寧元年趙帝劉曜光初六年年成武皇帝玉衡十三後趙明皇帝五年年凉張茂建興十一春正月成冦臺登降越嶲漢嘉二郡以本紀修解題曰按韋齊休雲南行記黎州至臺登城五百餘里至嶲州百餘里孫水出臺登山二月庚戌葬孝元皇帝于建平陵廟號世宗以本紀修三月戊寅朔改元本紀後趙陷下邳徐州刺史卞敦退保盱眙以本紀修詔徵王敦夏四月加敦殊禮敦屯于湖自領揚州牧以王導為司徒以本紀修五月成冦寧州刺史王遜大破之以紀傳修梁碩陷交州刺史王諒死之以本紀修六月壬子立妃庾氏為皇后以后兄中領軍亮為中書監以本紀修陶侃平梁碩加征南大將軍開府以本紀修秋七月趙平陳安以姚弋仲為平西將軍以本紀修解題曰按蕭方三十國春秋姚弋仲燒當羌也以尚書郗鑒都督揚州江西軍事揚州刺史八月為尚書令以紀傳修解題曰淮南廬江二郡屬揚州三國以來謂之江西者以其在大江之西也劉裕欲拓河南義熙九年始割揚州大江以西大靁以北悉屬豫州後趙石虎擊青州曹嶷降殺之以吕祖謙標目修趙主曜擊張茂降之封為凉王以通鑑修冬十一月王敦以其兄荆州刺史含為征東將軍都督揚州江西軍事以本紀修大事記續編卷二十八
