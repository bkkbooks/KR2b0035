body:
  text: 大事記續編卷四十八明王禕撰隋煬皇帝大業元年春正月壬辰朔改元以本紀修立妃蕭氏為皇后以本紀修廢總管府以吕祖謙標目修丙申立晉王昭為太子以本紀修二月己卯楊素為尚書令以本紀修詔天下公除以通鑑修三月營東京徙商賈數萬家以實之以本紀修營顯仁宫以本紀修開通濟渠自河入淮自𨝍溝入江置離宫造龍舟以本紀通鑑修解題曰按寰宇記開濟渠開封府開封縣南二里隋以汴水迂曲自大梁城西南鑿渠引汴水入號通濟渠鄭樵通志𨝍溝東北通射陽湖西北至末口入淮末口在今楚州山陽然此乃舊通江淮之道後以湖道多風晉永和中陳敏改由津湖興寧中又自湖之南沿東岸穿渠二十里入北口即末口也然猶有淮患至宋復穿令徑達盱眙廣陵志唐揚子縣在江都縣南十五里舊臨江故𨝍溝自揚子入江夏四月將軍劉方破林邑以吕祖謙標目修五月築西苑以通鑑修解題曰按杜寶大業雜記苑內造山為海周十餘里水源數丈中有方丈蓬萊瀛洲諸山相去各三百步山高出水百餘尺秋七月丙午徙衛王集於邊以本紀修八月壬寅帝御龍舟幸江都以本紀及吕祖謙標目修契丹冦營州遣通事謁者韋雲起護突厥兵討之以本紀修是歲西突厥處羅可汗擊鐵勒鐵勒叛之自立為莫何可汗以吕祖謙標目修隋煬皇帝大業二年春正月辛酉東京成本紀解題曰按洛誥周公將宅洛邑使召公先相宅乃卜澗水東瀍水西所謂王城今宫城西唐苑內故城是也周平王都之周公又卜瀍水東謂之成周今河南府東故洛陽城也周敬王居焉後漢魏晉隋初並都之煬帝始徙新都東去故城十八里唐以來皆都之元和郡縣志按華延雋洛陽記洛陽城東西七里南北九里城內宫殿臺觀府藏寺舍凡一萬一千二百一十九自劉曜入洛官署里閭鞠為茂草後魏孝文太和十七年幸洛陽定遷都而經營洛京煬帝嘗登邙山觀伊闕顧曰此非龍門耶自古何因不建都於此蘇威對曰自古非不知以俟陛下帝大悅遂議都焉詔楊素營之大業二年成徙都之其宫北據邙山南直伊闕之口洛水貫都有河漢之象其宫室臺殿皆宇文愷所創愷巧思絶倫制造頗窮奢麗前代都邑莫之比焉餘見通鑑大業記洛南九十六坊洛北三十坊大街小陌縱橫相對丁卯並省州縣以本紀修二月丙戌作輿服儀衛以本紀通鑑修解題曰大業雜記輦路輿車並朱絲碧油網絡裝以金玉填以雜寶珠璫紅翠極天下竒妙文物羽儀自三代以降書記未有也夏四月庚戌帝還東京以本紀修六月壬子楊素為司徒以本紀修秋七月建進士科制百官不得計考增級以通典本紀修解題曰蕭子顯曰自宋謝靈運顔延年以文章彰於世謝莊袁淑又以才藻繼之衣冠莫不仰其風流競為詩賦之事而五經文句無復通其義者朱熹曰進士更唐三百年以至國初大抵皆尚文辭事見通鑑甲戌太子昭薨以吕祖謙標目修解題曰按大業雜記始太子與楊素同侍宴帝深忌素因宴置毒太子及素並起二杯同至侍酒者誤進太子飲三日而毒發下血太子知之歎曰吾乃代楊素死乎命也數日而薨後素亦以毒斃餘見通鑑乙亥楚景武公楊素薨以本紀通鑑修冬置洛口回洛倉以吕祖謙標目修解題曰杜佑曰隋西京太倉東京含嘉倉洛口倉華州永豐倉陜州太原倉儲粟多者千萬石少者不減數百石天下義倉又皆充滿京都及并州庫布帛各數千萬亦魏晉以降之未有餘見通鑑按元和郡縣志洛水東經洛汭北對郎官渚入河渭之洛口亦名什谷張儀説秦王塞什谷之口即此也集天下散樂以吕祖謙標目修解題曰按隋志有魚龍爛漫俳優侏儒山車巨象拔井種瓜殺馬剝驢等竒怪異端百有餘物名為百戲餘見通鑑隋煬皇帝大業三年春正月突厥啓民可汗來朝以通鑑修丙子長星竟天本紀二月己丑彗星見以本紀修三月辛亥帝還西京以本紀修殺故太子勇之子八人以吕祖謙標目修夏四月甲申頒新律以本紀修解題曰牛𢎞劉炫修律令𢎞嘗從容問曰周禮士多而府史少今令史百倍於前判官減則不濟其故何也炫曰古人委任責成歲終考其殿最案不重校文不繁悉府史之任掌要目而已今之文簿恆慮覆治鍛鍊若其不密萬里追證百年舊按故諺云老吏抱按死事繁政弊職此之由𢎞又問魏齊之時令史從容而已今則不遑寧舍其事何由炫曰齊氏立州不過數十三府行臺遞相統領文字行下不過十條今州三百一也往者州唯置綱紀郡置守丞縣唯令而已其所具僚則長官自辟受詔赴任每州不過數十今大小之官悉由吏部纎芥之迹皆屬考功二也省官不如省事省事不如清心官事不省而望從容可得乎𢎞善其言而不能用胡寅曰炫之答𢎞是矣而未盡也其不敢正言耶夫令史數多而不遑寧處者良由隋文之治皆吏道也繁文有覆治之慮舊按有追證之虞官盡屬銓曹事悉循條例則權必歸於令史而簿書日多簿書既多則令史勢必加衆欲其簡省從容何可得也然後知隋文勤勞旰食者大抵法律文按而已此乃老胥吏用以困眩長官者而以人主之重自弊精神其末流如𢎞所問固宜也壬辰改州為郡以本紀修改上柱國以下官為大夫增省臺寺監十六府廢伯子男爵以北史本紀修丙申帝北巡六月戊子次榆林郡丁酉突厥啓民可汗及公主皆來朝以吕祖謙標目修解題曰榆林郡今勝州北距黃河五里秋七月築長城以吕祖謙標目修解題曰發丁男百餘萬築長城西距榆林勝州為榆林郡蘭州河南有大小榆谷唐置榆林軍若自勝州至紫河太近此榆林蓋蘭州也東至紫河隋地里志紫河在定襄郡大利東西相距千餘里定襄欣州也通典金河在榆林郡與紫塞河自馬邑善陽縣界流入一旬而罷死者十五六至明年秋又發丁男十餘萬築長城自榆谷而東大業雜記長城北邊自崑崙塞肅州有崑崙山以東有居延甘州刪丹有居延海路博德所築遮虜障也五原豐州或曰九原雞鹿水經注朔方郡渾窳縣北有路出雞鹿塞後漢竇憲耿秉出朔方雞鹿塞高闕水經注河水出朔方郡窳渾縣故城東道徑高闕南史記趙武靈自代並陰山下至高闕為塞山下有長城長城之際連山刺天其山中斷兩岸雙闕自闕北至荒中闕口有城跨山結勢謂之高闕戍漁陽薊州鴈門代州樓煩嵐州柳城營州西南又有龍勒敦煌郡有漢龍勒縣故地總十塞並築城置鎮鎮兵五百人通典靈州懷逺縣大業長城在縣界河外餘見通鑑丙子殺太常卿高熲禮部尚書宇文弼光祿大夫賀若弼免蘇威以本紀吕祖謙標目修八月帝厯雲中乙酉幸突厥啓民可汗帳見高麗使者吏部侍郎裴矩請脅其王入朝壬寅至太原營晉陽宫九月己巳還東京以皇極經世吕祖謙標目修冬以裴矩為黃門侍郎使通西域以吕祖謙標目修隋煬皇帝大業四年春正月己巳開永濟渠自河通涿郡以皇極經世修解題曰御河之役王通聞之曰人力盡矣按列傳將興遼東之役自洛口開渠達於涿郡以通運漕殿內丞閻毗董其役元和郡縣志魏武在淇水口為堰遏淇水合入白渠以開運漕白溝水本名白渠隋導為永濟渠自黎陽入澶州臨河縣西北東北入魏州界永濟渠南自汲郡引清淇二水入白溝入魏州洹水魏館陶永濟縣闊一百七十尺深二丈四尺入臨清縣漢武時河決館陶分為屯氏河東北入海此渠蓋屯氏古瀆今自恩冀倉州乾寧軍東北入潮河合流縣東獨流口入海西通於雄霸等州水路三月帝幸五原巡長城本紀夏四月營汾陽宫帝幸之以本紀修解題曰按大業雜記敕於汾州北四十里臨汾水起汾陽宫即管涔山汾河所出之地在嵐州靜樂縣秋七月辛巳築長城以通鑑修翊衛大將軍宇文述破吐谷渾郡縣其地以吕祖謙標目修九月戊寅彗星見以本紀修冬十月將軍薛世雄降伊吾城之以吕祖謙標目修隋煬皇帝大業五年春正月丙子改東京為東都以本紀修突厥啓民可汗來朝以通鑑修癸未詔均田以本紀修戊子帝西還三月己巳自西京西狩夏五月擊吐谷渾六月壬子至燕支山西域諸國來朝獻地癸丑置西海河源鄯善且末等郡謫罪人戍之解題曰燕支山即焉支山屬涼州天寶縣唐楊炎燕支山神祠碑西北巨鎮曰燕支本胸奴王庭昔漢武納渾邪置武威張掖而山界二郡之間積高之勢四向千里按隋書地理志西海古伏俟城吐谷渾國都河源古赤水城鄯善古樓蘭城且末古且末城通典漢武帝置西海郡在今酒泉郡肅州北千二百里又曰今西平郡鄯州之西張掖甘州酒泉郡之北隋置西海且末河源等郡是時郡一百九十縣一千二百五十五户八百九十萬有竒隋氏之盛極於此矣以本紀通鑑修解題曰杜佑曰後周靜帝有户三百九十九萬九百六十四至平陳得户五十萬及是才十六七年直增四百八十萬七千九百三十二煬帝承其全盛遂肆荒淫登極之初即建洛邑每月役丁二百萬人導洛至河及淮又引沁水達河北通涿郡築長城東西千餘里皆徵百萬餘人丁男不充以婦人兼役而死者大半及親征吐谷渾駐軍青海遇雨雪士卒死者十二三又三駕征遼皆興百餘萬衆餽運者倍之又逆徵數年之賦窮奢極侈舉天下之人十九為盜賊身喪國滅實自取之秋九月癸未帝還西京冬十一月丙子幸東都以本紀通鑑修是歲民部侍郎裴蘊奏令貌閲户口凡進丁二十四萬三千新附口六十四萬有竒以通鑑吕祖謙標目修解題曰朱黼曰隋氏貌閲户口至大業初富庶之盛幾漢元始而裴蘊獻議猶以民間版籍脫漏户口詐增老小為言復令貌閲一人不實則官司解職糾得一丁令代賦役於是進丁二十四萬有竒其以老癃為丁壯廢疾為平人必矣唐世聚斂之臣多以括丁為急務民益無聊可不監哉事見通鑑擢蘊御史大夫與宇文述裴矩內史侍郎虞世基參掌機密以通鑑列傳吕祖謙標目修突厥啓民可汗死子始畢可汗立以吕祖謙標目修殺司隸大夫薛道衡以吕祖謙標目修隋煬皇帝大業六年春正月丁丑以蕃酋畢集於端門街盛陳百戲以本紀修遣將破流求以本紀修二月乙卯詔舊五等爵非有功者除之以本紀修庚申以散樂配太常以朱熹綱目修三月癸亥帝幸江都宫以郡丞王世充領宫監以吕祖謙標目修冬十二月穿江南河以吕祖謙標目修解題曰陸遊曰京口至錢塘梁陳以來不通漕至隋始鑿渠八百里皆闊十丈是歲始令從駕者戎衣著紫緋緑袍以吕祖謙標目修隋煬皇帝大業七年春二月乙亥帝御龍舟入通濟渠夏四月庚午至臨朔宫徵天下兵會涿郡伐高麗以通鑑修解題曰按唐志臨朔宫在幽州薊縣秋山東河南大水以本紀修冬十月乙卯底柱崩擁河逆流以本紀修裴矩誘西突厥酋射匱逐處羅可汗十二月處羅來朝更號為曷娑那可汗常從巡幸以吕祖謙標目修羣盜起漳南竇建德舉兵以吕祖謙標目修解題曰漳南屬今恩州厯亭縣隋煬皇帝大業八年春正月壬午伐高麗兵發凡一百十三萬人以吕祖謙標目修三月圍遼東城弗克夏六月右翊衛大將軍來護兒水軍敗於平壤城秋七月左翊衛大將軍宇文述等潰於薩水癸卯帝班師九月庚寅至東都冬十一月諸將除名以本紀通鑑修解題曰平壤在安東府即漢遼東郡襄平城寰宇記以為即漢樂浪郡王險城非也自慕容皓來伐後徙國內城移都此城其地後漢時南北二千里至後魏才千餘里至隋東西六千里薩水去平壤城三十里是歲大旱疫以本紀修前御史大夫張衡伏誅以吕祖謙標目修隋煬皇帝大業九年春正月丁丑徵天下兵募民為驍果集涿郡以本紀及吕祖謙標目修己亥命刑部尚書衛文升輔代王侑守西京以通鑑修二月復宇文述等官爵以本紀修三月丁丑城太興以本紀修戊寅帝伐高麗命吏部尚書樊子蓋輔越王侗守東都以通鑑修齊郡丞張須陀擊羣盜破之以吕祖謙標目修夏四月庚午帝渡遼水遣宇文述等趣平壤本紀通鑑解題曰按水經寰宇記大遼水源出靺鞨西南山南流至安市入海小遼水出遼山西南入大遼水六月乙巳禮部尚書楊玄感反於黎陽蒲山公李密説以䇿不從丙辰圍東都庚午帝班師遣宇文述等討玄感秋七月餘杭劉元進起兵應玄感壬辰玄感趣潼關八月敗死殺其黨三萬餘人以本紀通鑑吕祖謙標目修解題曰大業雜記樊子蓋既斬裴𢎞䇿達官子弟募出征者並不敢入悉投玄感韓擒虎子世萼等十人觀王子恭道虞世基子柔來護兒子淵裴蘊子爽鄭善果子儼周羅㬋子仲隱藺達通子世直等二十餘人或父從駕子入賊受玄感重任帝在遼東城下聞事起曰玄感無帝王之量直欲亂朕天下耳又聞達官兒郎皆入賊益憂懼計無所出冬十月敕大理卿鄭善果御史大夫裴蘊刑部侍郎滑儀等還東都與樊子蓋推繩玄感徒黨近逺連及殺三萬餘人枉死者大半僧尼道士及河南百姓被流徒者亦七八千人殘酷之甚致四方騷動冦賊蜂起國家空虛雖屢出兵不能制敵盧明月起淮南殺守令江都贊治王世充討平之王薄起青兖聚衆長白頻征不克厯山飛起河北四方結聚皆玄感之徒懼誅起而為賊餘見通鑑葉適曰煬帝篡弒之事楊素終始左右之而禍亂之端乃發於玄感所謂寡助之至親戚叛之大抵天下將亂之時人物氣象自異如玄感李密皆功臣之子其少年意趣已自異常及人君失德政繁賦重人心已搖不計親疏逺近皆得乘間而起玄感入黎陽取􅀈布為牟甲政與勝廣挈干為旗相類勝廣玄感密皆不足以亂天下而天下之亂由之而生要之天下之勢不在瓦解而在土崩秦隋之亡皆土崩之勢也又曰密為玄感畫三䇿邀天子歸路上䇿也入關中䇿也取東都下䇿也所謂上䇿獨可逼煬帝耳天下已亂安得遽定是不可用也入關之䇿玄感與密皆欲用而不可唐取而用之遂得天下下䇿終於不可用故玄感與密皆敗閏九月帝幸博陵冬十月遣屯衛大將軍吐萬緒討元進十二月王世充平之以本紀通鑑及吕祖謙標目修解題曰博陵今博州章邱是歲詔籍沒為盜者家以吕祖謙標目修章邱杜伏威臨濟輔公祐舉兵淮南以吕祖謙標目修解題曰今濟南屬縣有臨濟鎮本漢朝陽縣隋煬皇帝大業十年春二月戊子詔徵天下兵三月壬子帝幸涿郡秋七月癸丑次懷逺鎮兵多不至甲子高麗請降八月己巳帝班師冬十月丁卯還東都己丑還西京以本紀通鑑及吕祖謙標目修解題曰按新唐志營州有懷遠守捉十一月祀南郊帝不齊于次以吕祖謙標目修十二月帝幸東都以本紀修以張須陀為黜陟討捕大使以列傳修隋煬皇帝大業十一年春正月增祕書省官百二十員以本紀修二月庚午城郡縣亭塢以通鑑修三月丁酉族誅驍衛大將軍李渾將作監李敏以本紀通鑑修己酉帝幸太原夏四月幸汾陽宫以本紀修以衛尉少卿唐公李淵為山西河東撫慰大使以通鑑修秋八月乙丑帝北巡癸酉突厥始畢可汗圍帝於鴈門帝下令重賞格停伐高麗募兵赴難九月甲辰圍解冬十月壬戌帝還東都減賞格仍議伐高麗以本紀吕祖謙標目修東海李子通據海陵以吕祖謙標目修城父朱粲掠漢南以吕祖謙標目修解題曰城父亳州縣隋煬皇帝大業十二年楚帝林士𢎞太平元年春正月作毗陵宫以通鑑修夏四月大業殿火以通鑑修五月丙戌日有食之既以本紀修納言薊威除名以列傳修秋七月帝幸江都命越王伺與光祿大夫假逹太府卿元文都揔留後事殺諫者建節尉任宗奉信郎崔民象王愛仁以吕祖謙及通鑑標目修冬十月己丑許恭公宇文述卒以其子太僕少卿化及為屯衛將軍以吕祖謙標目修前東都法曺翟讓為盜李密歸之讓殺滎陽通守張須陀以吕祖謙標目修十二月壬辰鄱陽林士𢎞稱楚帝于豫章改元以吕祖謙標目修以驍衛將軍唐公李淵為太原留守虎賁郎將王威虎牙郎將髙君雅副之以吕祖謙標目修太僕卿楊義以破降河北賊數十萬虞世基奏罷其兵侍御史韋雲起劾世基裴藴隱蔽盜賊坐左遷以吕祖謙標目修賊將髙開道起兵于燕以吕祖謙標目修虎賁郎將羅藝起兵涿郡以吕祖謙標目修解題曰隋涿郡即幽州隋煬皇帝大業十三年隋恭皇帝侑義寧元年年長樂王竇建德丁丑元楚林士𢎞太平二年年梁帝梁師都永隆元梁王蕭銑鳴鳯元年興元年定楊可汗劉武周天秦帝薛舉秦興元年魏公李密元年梁王李軌元年春正月杜伏威據歷陽以本紀通鑑修丙辰竇建德稱長樂王改元以本紀通鑑修辛巳兖州徐圎朗陷東平以吕祖謙標目修二月壬午朔方鷹揚郎將梁師都起兵連突厥以吕祖謙標目修馬邑鷹揚府校尉劉武周起兵附于突厥以吕祖謙標目修虎賁郎將劉長恭討李密兵敗密自稱魏公城洛口倉陷河南郡縣以吕祖謙標目修解題曰按元和郡志河南府鞏縣本與成皋中分洛水西則鞏東則成皋後魏並焉李密自潁川襲據鞏城斷洛川包南北山周三十餘里事見通鑑三月劉武周取汾陽宫突厥立為定楊可汗武周即帝位改元以吕祖謙標目修解題曰楊隋姓也言能定隋也梁師都稱梁帝改元引突厥居河南地以吕祖謙標目修夏四月癸未金城校尉薛舉自稱西秦霸王改元以吕祖謙標目修河南討捕大使裴仁基以虎牢降魏公密密據回洛倉以通鑑及吕祖謙標目修五月甲子唐公淵殺王威高君雅以吕祖謙標目修護軍柴孝和説魏公密襲長安不從丁丑東都遣兵擊密大破之密奔洛口以通鑑及吕祖謙標目修六月唐公淵舉兵尊代王侑遣晉陽令劉文靜使突厥己丑淵子建成世民拔西河郡癸巳建大將軍府以晉陽宫監裴寂為長史劉文靜為司馬以吕祖謙標目修解題曰范祖禹曰匹夫欲自立於鄉黨猶不可不自重也況欲圖王業舉大事而可以不正啓之乎太宗陷罪於父而脅之以起兵高祖昵裴寂之邪受其宫女而不辭又稱臣於突厥倚以為助何以示後世乎夫創業之君其子孫則而象之如影響之應形聲尤不可不慎舉也是以唐世人主無正家之法戎狄多猾夏之禍蓋高祖以此始也按通鑑考異溫大雅創業起居注云命大郎二郎率衆討西河高祖太宗實録但云命太宗徇西河蓋史官沒建成之名耳唐殷嶠傳從隱太子攻西河今從起居注餘見通鑑西河今汾州又按李璋晉陽事迹晉陽宫齊天保元年置周武平廢大業三年又置在乾陽門直北秋七月壬子遣江都通守王世充赴東都以吕祖謙標目修癸丑唐公淵發晉陽代王侑遣虎牙郎將宋老生屯霍邑武候大將軍屈突通屯河東會積雨淵欲還世民諫止之以通鑑修解題曰河中府唐為河東郡武威鷹揚府司馬李軌起兵稱河西大涼王以吕祖謙標目修薛舉稱帝以吕祖謙標目修八月辛巳唐公淵敗宋老生斬之拔霍邑以吕祖謙標目修解題曰平陽有霍邑縣以吕祖謙標目修癸巳劉文靜以突厥兵會唐公淵以通鑑修九月括江都婦女配從兵以本紀修魏公密取黎陽倉以吕祖謙標目修彗星見以本紀修戊午唐公淵圍河東庚申濟河丙寅遣建成屯永豐倉世民徇渭北淵女李氏從弟神通各起兵以應淵關中羣盜皆降世民引隰城尉房玄齡為謀主冬十月辛卯圍長安以吕祖謙標目修解題曰竇蘋音訓曰永豐倉在渭南倉之東太原倉之西丙申羅今蕭銑起兵巴陵稱梁王改元以吕祖謙標目修解題曰按隋紀作羅新唐紀作羅山隋志巴陵郡有羅縣舊唐志羅縣即古汨羅之地新志武德八年廢入湘陰羅山自屬申州新紀蓋誤通鑑云羅川亦非也今從隋紀王世充大敗魏公密於洛北既而敗於黑石以通鑑修解題曰黑石在河南府鞏縣十一月丙辰唐公淵克長安約法十二條除隋苛禁下馬邑郡丞李靖獄既而赦之以吕祖謙標目修解題曰按隋書新舊唐書紀傳高祖太宗實録溫大雅創業起居注柳芳唐厯陳嶽唐統紀大業十二年淵為太原留守時羣盜蜂起高祖子世民本文作太宗後倣此知隋祚已盡陰有安天下之志推財養士結納豪傑咸得其歡心長孫順德劉𢎞基等皆因事亡命匿之又與晉陽令劉文靜尤善文靜坐李密事繫獄世民私入視之文靜喜挑言曰喪亂方劇非高光不能定世民曰安知無其人哉今過此非兒女之情直欲共大計宜籌其事文靜曰今李密圍洛邑主上流播淮南賊盜以十萬數須真主取而用之則四海不足定也今汾晉避盜者皆入此城文靜為令數年知其豪傑一朝號召立可數萬人尊公所領之兵復且數萬一言出口誰敢不從乘虛入關號令天下不盈年歲帝業可成世民笑曰卿言差合人意於是部署賓客陰圖起義欲白淵慮必不從欲竊發又恐驚淵沈吟久之淵領太原宫監而所善客裴寂為副監文靜謀因寂説引寂交於世民世民出私錢數百萬餉龍山令高斌亷與寂博陽不勝寂大喜日滋昵世民以情告之許諾寂因選晉陽宫人私侍淵淵過寂飲酒酒酣寂具以大事告之淵大驚寂曰正為宫人奉公事發當誅為此爾未幾突厥冦馬邑淵令郡丞高君雅與馬邑太守王仁恭並力拒之不利淵懼為煬帝所譴甚憂之世民因進曰今主上無道百姓愁怨城門之外皆已為賊若守小節必旦暮死亡若起義兵可因機轉福天與不取憂之何益淵大驚曰何意敢發此言吾將執汝告官世民復曰見天時人事如此所以敢言必欲告執不敢辭死淵曰豈能告汝慎勿出口且去明日更來明日復進説曰此萬全之䇿以救滅族之事今盜賊遍天下大人受命討捕其可盡乎賊既不盡自當獲罪且又世傳李氏姓纂應圖録李金才隆貴一朝族滅大人能平賊即有功當不賞以此求活莫可得淵意少解曰我一夜思汝言亦有大理今日破家滅身亦由汝化家為國亦由汝突厥數犯邊淵兵出無功帝遣使者執淵詣江都淵素被猜忌及是大懼世民流涕曰奉事國家惟忠與孝今國亂主昏盡忠何益傾家絶嗣非孝所宜事急矣須早為大計又遣文靜及寂進説曰晉陽士馬精鋭宫庫豐饒以兹舉事可立大功關中天府代王沖幼酋豪並起未有適從願公引兵西誅暴除亂乃受單使囚乎淵然之世民與文靜等議尅日舉事已而帝復馳使者赦止淵其事遂已文靜謂寂曰先發制人後發制於人唐公名載圖讖聞天下尚可帖帖以待禍哉公為監以宫人侍客公死何憾奈何纍唐公寂懼乃勸起兵世民教文靜偽為詔發太原西河鴈門馬邑男子年二十至五十悉為兵期歲盡集涿郡以伐遼繇是人心愁擾益思亂會馬邑人劉武周殺王仁恭舉兵反攻汾陽宫世民復曰大人受委鎮守而賊徒竊據不能捍禦不早舉大計身陷禍機悔無所及淵因集將佐謂之曰賊據汾陽宫我輩不能制自當族滅將如之何王威高君雅及僚吏咸請集兵淵欲觀威等之意曰朝廷出師皆稟詔敕今賊稱尊號近在數百里內江都懸隔若待奏報還期未測復將何計威等咸曰公地居賢戚務盡丹誠逡巡聽奏豈及事機淵曰善於是命世民與文靜長孫順德劉𢎞基等各募兵旬日間衆且一萬密遣使召子建成元吉於河東威君雅等見兵大集疑懼請禱雨晉祠唐叔祠在大原府平晉縣西南十二里將為不利淵知其謀陰為之備五月甲子旦淵與威君雅等同坐視事世民嚴兵在外以備非常文靜導開陽府司馬劉政會入告變云二人謀反陰引突厥將覆太原淵陽驚曰豈有是耶徐以文書示之曰人告公反宜受勘當君雅詬曰反人欲殺我耳文靜叱左右執之丙寅突厥數萬騎冦城下淵令開門偃旗幟虜不測所為引兵掠城外而去淵令曰人告威君雅勾致此賊效矣遂殺之以起兵甲戌遣劉文靜連和於突厥六月己卯建成本文作世子與元吉本文作齊王至自河東裴寂等請準伊尹放太甲霍光廢昌邑故事尊煬帝為太上皇立代王以安隋室傳檄郡縣淵曰如此所作可謂掩耳盜鈴事相逼不得不爾甲申命建成世民將兵徇西河郡下之獲郡丞高德儒數之曰卿見野鳥謬稱是鸞以諂時主義兵之舉正欲誅佞人耳斬之餘皆慰撫盡復其業百姓大悅癸巳開大將軍府置三軍以建成為隴西公左領軍大都督左軍隸焉世民為燉煌公右領軍大都督右軍隸焉元吉為姑臧公中軍隸焉裴寂為長史劉文靜為司馬石艾長縣屬太原郡殷開山為掾劉政會為屬長孫順德王長諧劉𢎞基竇琮為統軍開倉庫賑窮乏逺近響應七月壬子淵杖白旗誓於野有兵三萬以元吉為太原留守癸丑發太原遣將張綸徇稽胡離石石州龍泉隰州文城西慈州三郡隋將宋老生屯霍邑晉州縣屈突通鎮河東議者憚之世民曰天實棄隋老生之輩當如我何壬戌霖雨甚營于賈胡堡在靈石縣南三十五里老生拒險師不得進己巳李密遣使致書請合從淵覽書謂所司曰密誇誕宜卑辭以驕其志使不虞於我密得書甚悅議者以老生通相去不遙密姦謀難測突厥見利而行武周事胡者也太原一郡之會義兵家屬在焉愚夫所慮淵謀於衆世民曰武周突厥外雖相附內實相猜突厥必利太原寧肯近忘馬邑武周悉其此勢未必同謀京都留守特畏義旗所以驍將精兵鱗次而進今若卻還諸軍恐動必有變生若突厥武周不謀同至老生屈突追奔競來還無所入往無所之今禾菽被野人馬無憂李密戀於倉粟未遑逺略老生輕躁破之不疑本興大義以救蒼生不顧煞身以安百姓當先入咸陽號令天下雨罷進軍若不殺老生取霍邑敢以死謝通鑑考異據溫大雅創業起居注唐公顧謂大郎二郎曰何如對曰云云太宗實録盡以為太宗之䇿無建成名今從創業注按創業注作於武德時建成位居上嗣太宗止藩王爾所以每事大雅不使太宗獨專其名故並建成言之也觀其諫高祖回師之辭洞究敵情辭語明白建成庸人豈能及此今削其名淵不納促令引發世民將復諫會暝淵已寢世民不得入號泣聲聞於內問其故曰今以義動進戰則尅退還則兵散於前敵乘其後死亡須臾是以悲耳淵乃悟曰兵馬已去如何世民曰右軍嚴而未發左軍去猶不逺請自追之淵曰吾成敗在汝知復何言世民親與建成分路追兵回八月己卯雨霽辛巳引師從傍山細道趨霍邑淵曰老生若嬰城自守當即攻之主客勢懸卒難致力建成世民曰老生勇而無謀以輕兵挑之必當出戰戰必擒矣世民以數騎詣其城下舉鞭指麾若將圍城者老生怒開門出兵淵曰兵疲未食且欲停營世民曰機不可失淵謂建成曰汝看兩陳將交引左軍趨東門命世民引右軍趨南門斷其歸路老生背城而陳淵與建成合陳於城東世民及柴紹陳於城南老生麾兵先薄淵建成墜馬老生乘之中軍左軍咸却世民與軍頭段志玄馳下埈坂衝斷其軍出其陳後手殺數十人刀盡缺血流入袖灑而復戰表裏齊譟響若崩山隋師大潰老生不得入城棄馬投塹軍士斬首於麾下流血數里四面進薄其城時無攻具士卒緣矟攀堞無敢當者遂平霍邑撫其餘衆而用之丙戌下臨汾郡晉州後改平陽縣辛卯克絳郡癸巳營於龍門縣河東户曹任瓌請見淵曰吾此舉其濟乎瓌曰公仗順而起軍令嚴明所下城邑無秋毫之犯關中起兵者跂踵而待何不濟乎瓌在馮翊久悉其人情願入關宣布威靈以收左輔繇梁山在韓城縣濟河趣韓城逼郃陽徇朝邑二縣皆屬同州蕭造文吏勢當自下次招諸賊然後鼓行據永豐在華州華陰縣積粟雖未得京師關中固已定矣淵曰是吾心也與劉文靜會於麾下淵謂文靜曰吾已及河突厥始至馬多人少甚愜本懷己亥營於壺口在慈州吉鄉縣西南五十里通絶津梁水濱居人競進船舫前後數百乃置水軍壬寅馮翊賊帥孫華土門後為京兆府美原縣賊帥白玄度具舟於河以濟師淵命華及王長諧等引兵先渡以任瓌為慰撫大使説下韓城九月乙卯張綸自離石下龍泉文城等郡初王長諧之濟河也淵戒之曰屈突通相去五十餘里不敢與我爭鋒其勢可知但其懼罪必當伺便相襲宜為之備通果遣虎牙郎將桑顯和率精兵數千夜襲長諧義軍不利隋人逐北史大奈以遊兵掩其後顯和敗績僅以身免丙辰馮翊太守蕭造降戊午淵率衆攻河東不克將吏勸領太尉加置僚屬從之通未下而三輔多歸者淵欲先取京師恐通犄其後裴寂曰不若破通而後趨京師世民曰不然兵尚權權利於速今乘機度河以奪其心關中羣賊處處屯結撫而有之何向不濟通自守賊耳何能患我一失其機勝負未可知也淵兩從之華陰令李孝常以永豐倉歸義以少牢祀河乃濟甲子次長春宫在同州朝邑縣梁載言十道志周宇文護築士庶至者日有萬數淵禮之人人喜悅丙寅遣建成劉文靜王長諧屯永豐倉以拒潼關世民率劉𢎞基長孫順德等數萬人往高陵涇陽雲陽武功盩厔鄠諸縣屈突通留鷹揚郎將堯君素守蒲將自武關援長安至潼關阻文靜兵不得進淵從父弟神通起兵於鄠柴氏婦淵女也亦起兵於司竹鳳翔府盩厔縣有司竹園皆與世民會郿賊邱師利李仲文盩厔賊何潘仁向善志宜君賊劉昊等各率衆數千來降庚午淵觀永豐倉開倉大賑窮乏壬申次馮翊馮翊縣南三十二里有興德宫淵所次乙亥世民屯阿城阿房宫一名阿城建成自新豐趨霸上是日延安延州上郡鄜州雕陰綏州郡並遣使來降丙子淵自下邽華州縣西上所經隋宫苑悉罷之出宫女還其家十月辛巳至長樂宫時京師留守衛文升陰世師挾代王以拒義師淵屯春明門外長安志外郭城東面三門中春明門衆二十餘萬各依壁壘不入村居無為侵暴遣使諭以匡復之意再三皆不報辛卯世民帥師頓城西建成頓城東分朱雀大街連營圍之甲辰圍城下令曰犯隋七廟及宗室者罪三族十一月丙辰軍頭雷紹吉先登京師平命主符郎宋公弼收圖籍殺人劫盜背軍叛者死戊午以陰世師黷貨郡丞骨儀苛酷並斬之連坐者十餘人淵擊突厥馬邑郡丞李靖察淵有四方之志因自鎖上變將詣江都至長安道塞不通而止淵已定京師將斬之靖呼曰公起兵為天下除暴亂以私怨殺誼士乎世民亦為請得釋癸亥率百僚備法駕尊代王為天子大赦改義寧元年十一月甲子淵自長樂宫入京師以淵為相國假黃鉞進封唐王此高祖平長安之本末也王世充與魏公密戰于石子河敗績以朱熹綱目修解題曰石子河在河南府鞏縣戊午魏公密殺翟讓以吕祖謙標目修壬戌唐公淵立代王侑為皇帝改元義寧尊帝為太上皇以吕祖謙標目修解題曰朱熹曰漢高祖取天下正當為其直截做去無委曲回護處隋大亂如此唐高祖太宗因羣盜之起直截做去止是誅獨夫為其中不能無慊又立恭帝假援突厥回護委曲如此所以不及漢之創業也事見通鑑宋庠紀年通譜義寧取因義師之興而天下寧一也甲子淵假黃鉞大都督內外軍事大丞相唐王己巳以子建成為世子世民為秦公元吉為齊公以吕祖謙標目修滎陽郡降李密以通鑑修十二月薛舉遣其子仁杲圍扶風秦公世民擊敗之以本紀修唐王淵以光祿大夫李孝恭為山南招慰大使破朱粲降三十餘州以唐紀吕祖謙標目修屈突通降唐王淵招河東通守堯君素不下以通鑑及吕祖謙標目修王世充襲倉城魏公密大敗之以通鑑修唐王淵遣丞相司馬劉文靜定新安以西雲陽令詹俊等下巴蜀以吕祖謙標目修梁王銑襲取豫章林士𢎞保餘干以吕祖謙標目修大事記續編卷四十八
