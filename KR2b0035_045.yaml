  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2b0035_WYG_045-1a, image: WYG0333/WYG0333-0630c.png}
body:
  text: 大事記續編卷四十五明王禕撰陳高宗宣皇帝大建九年周武皇帝建德六年後梁中宗皇帝天保十六年齊後主高恆承光元年春正月乙亥朔齊主傳位於太子恆改元甲午周主入鄴乙未齊幼主傳位於大丞相任城王湝父子將奔陳高阿那肱召周師追獲之齊滅以吕祖謙標目修解題曰北齊自文宣帝而至後主五世通幼主恆為六世凡二十八年按通典後魏起自陰山盡有中夏明帝正光以前時惟全盛户口之數比晉太康倍而餘矣晉太康平吳後大凡户二百四十五萬九千八百今倍而餘則户有五百餘萬矣及爾朱之亂政移臣下遂分為東西二國戰爭不息官司文簿又多散棄今按舊史户三百三十七萬五千三百六十八北齊承魏末喪亂雖開拓淮南而郡縣褊小文宣暴虐而能委政宰輔十數年間亦稱為理及為周所滅有户三百二萬二千五百二十八口二千萬六千八百八十二月齊任城王湝太宰廣寧王孝珩起兵冀州周齊王憲擒之齊北朔州前長史迎定州刺史范陽王紹義起兵敗奔突厥以周紀及吕祖謙標目修梁主朝周主于鄴以通鑑修乙卯周主還以周紀修三月壬午周舉山東明經幹治者以周紀修夏四月戊申周以高緯為溫公以周紀修六月周主東巡通鑑秋七月周舉山東有才者以周紀修八月壬寅周頒權衡度量以周紀修周放雜户為民以吕祖謙標目修九月戊寅周制衣禁以吕祖謙標目修冬十月陳吳明徹攻周彭城戊午破徐州總管梁士彥以本紀修解題曰按陳書列傳高宗鋭意河南以為指麾可定通直散騎常侍蔡景厯諫稱師老將驕不宜過窮逺略高宗惡其沮衆大怒又問五兵尚書毛喜曰我欲進兵彭汴於卿意如何對曰淮左新平邊氓未乂周氏始吞齊國難與爭鋒豈宜以弊卒疲兵復加深入且棄舟楫之工踐車騎之地去長就短非吾所便不若安民保境寢兵復約然後廣募英竒順時而動斯久長之術也不從餘見通鑑葉適曰明徹初北出疑沮滿朝後爭取河南乃無以為不可蓋畏怯於未形奮迅於已驗常人之情無不然景厯之言非止小事乃江左三百年興亡所係也周族誅高緯殺穆提婆等以吕祖謙標目修解題曰按北齊書紀傳周武帝以提婆為柱國宜州刺史建國七年云將據州起兵與後主相應誅死高阿那肱至長安授大將軍封公為隆州刺史大象末在蜀從王謙起兵誅死韓長鸞仕隋位終於隴州刺史十一月周遣上大將軍王軌救彭城以周紀修周稽胡反討平之以周紀修解題曰見魏孝明帝孝昌元年山胡解題周減妃嬪之數以周紀修己亥晦日有食之以周紀修周初行刑書要制以周紀修十二月周徙並州四萬户於關中以周紀修齊北營州刺史高寶寧請高紹義稱帝從之改元武平以通鑑修解題曰宋庠紀年通譜武平乃其本朝武成帝之年再用之者將有意耶抑亂亡之無法耶陳高宗宣皇帝大建十年周武皇帝宣政元年後梁中宗皇帝天保十七年春二月周王軌據淮口吳明徹遁軍潰見執以陳周紀傳修解題曰按周史列傳達奚長儒與王軌圍明徹於吕梁陳援軍至軌令長儒拒之長儒取車輪數百繫以大石沈之清水連轂相次以待之艦礙輪不得進長儒縱竒兵大破之獲明徹餘見通鑑清水見晉太寧二年泗口解題葉適曰江左自劉裕後未有明徹之功所以能然者乘齊政亂也及齊滅而周人方鋭明徹不量時度力輕棄根本貪進無繼豈惟已得復失敗棄前功而南北兩立之勢自此不完不然叔寶未遽亡也三月甲戌周主初服常冠以周紀修解題曰胡寅曰周家紗襆此後世巾幘朝冠之所自始也紗襆既行諸冠漸廢紗而用漆為兩帶上結兩帶後垂唐以來則然矣此四腳之變也其後則又以其垂者左右橫之而其頂則起後平前方為六角稽之法象果何所則求之意義果何所據然而行之數百年莫有以為非也治天下莫大於禮必欲盡善其必放古而立制夫亦何獨冠為然哉沈括曰幞頭一謂之四腳乃四帶也亦謂之折上巾唐制唯人主得用硬腳晚唐方鎮擅命始僭用硬腳壬辰周改元以周紀修夏四月壬子周令遭喪者聽終制以周紀修五月己丑周主伐突厥有疾而還六月丁酉朔殂戊戌太子贇即皇帝位尊皇后為皇太后以吏部下大夫鄭譯為開府儀同大將軍委以朝政甲子殺齊王憲閏月乙亥立妃楊氏為皇后秋七月壬戌以亳州總管楊堅為上柱國大司馬以通鑑及吕祖謙標目修解題曰唐勳級自武騎尉十二轉而至上柱國前代皆為正官自宇文高齊日尋干戈始於正官外加勳官以寵軍功後遂及文臣普加之是歲周以太師蜀公尉遲迥為相州總管以周紀修周𣙜鹽酒以隋食貨志修解題曰按隋食貨志周末官置酒場收利鹽池鹽井皆禁百姓採用今載於孝靜帝即位之初陳高宗宣皇帝大建十一年周孝靜帝宇文闡大象元年後梁中宗皇帝天保十八年春正月癸巳周王始服漢衣冠改元大成置四輔以周紀修戊午周立子魯王闡為太子以吕祖謙標目修二月周以洛陽為東京治洛陽宫以周紀修解題曰按周書洛陽宫殿雖未成畢其規摹壯麗逾於漢魏逺矣周主殺徐州總管王軌司衛上大夫宇文孝伯等以吕祖謙標目修周以趙王招女妻突厥以吕祖謙標目修辛巳周主傳位於太子闡改元自稱天元皇帝以吕祖謙標目修夏五月陳初用大貨六銖錢以陳紀修周遣趙王招陳王純越王盛代王達滕王逌之國以吕祖謙標目修秋七月周天元帝立四后以周紀修八月周行刑經聖制法益深矣以周紀修九月周遣大司空鄖公韋孝寬為行軍元帥侵陳以吕祖謙標目修解題曰李繪曰晉作三軍謀元帥雖有元帥之稱而非官名元帥之名始於周事見通鑑冬十月壬戌周復佛老像以吕祖謙標目修十一月周取陳壽陽黃城廣陵以周紀修解題曰江北要害在此三城故孝寬等三將自攻之取三城而江北舉矣水經注柴水又東徑黃城西今黃州黃陂縣周鑄當千錢與五行大布並行以周紀修十二月周初作乞寒胡戲以周紀修解題曰通典乞寒者西蕃之樂也唐張説諫曰揮水投泥失容斯甚裸體跳足盛德何觀徐錯方輿記庭州車師後王庭發汗胡國即古渠搜國高宗朝此國進發汗胡戲陳江北三州九郡之民還江南周取其地以舉要厯補遺修解題曰江北之復僅六年爾而遽失之按周書列傳初韋孝寬到淮南所在皆密送誠𣢾然彼五門尤為險要陳人若開放塘水即津濟路絶孝寬遽令分據守之陳刺史吳文立果遣決堰已無及於是陳人退走江北悉平餘見通鑑陳高宗宣皇帝大建十二年周孝靜皇帝大象二年後梁中宗皇帝天保十九年春正月乙卯周稅入市者人一錢以吕祖謙標目修三月周大司徒行軍總管杞公亮反襲韋孝寬不克戊子伏誅以周紀修周天元帝立五后以吕祖謙標目修夏五月乙未周天元帝殂御正下大夫劉昉內史上大夫鄭譯等矯詔以前大疑楊堅總知中外兵馬事御正中大夫顔之儀請召趙王招不克堅徵趙陳越代滕五王丁未堅自為左丞相假黃鉞以鄭譯為相府長史劉昉為司馬內史下大夫高熲為司録行寬政罷入市稅錢以周紀傳修解題曰按隋書列傳鄭譯劉昉謀引高祖入受顧託既而譯宣詔文武百官皆受高祖節度時顔之儀與宦者謀引大將軍宇文仲輔政仲已至御座譯知之遽率開府楊惠及劉昉皇甫績柳裘俱入仲與之儀見譯等愕然逡巡欲出高祖因執之周史列傳宣帝崩文帝入禁中將總朝政令子勇召滕王瓚瓚素與帝不協不從曰作隋國公恐不能保何乃更為族滅事邪餘見通鑑北史列傳開皇中蔡王智積將葬尉太妃帝曰我有同生二弟並倚婦家勢常憎嫉我醫師邊隱逐勢言我後百日當病癩二弟私意喜以告父母父母泣謂我曰爾二弟大劇不能愛兄我因言一日有天下當改其姓為悖父母許我此言及母亡後二弟及婦又讒我言於晉公蓋堅萌不軌之志久矣況假之以篡竊之機便耶六月庚申周復佛道二教以吕祖謙標目修周尉遲回起兵討楊堅堅遣行軍元帥韋孝寬將關中兵擊之以吕祖謙標目修周楊堅殺畢王賢以周紀修突厥執高紹義送于周以吕祖謙標目修秋七月青州總管尉遲勤滎州刺史宇文胄皆應尉遲回周遣清河公楊素擊胄丁未楊堅自加都督中外軍事己酉鄖州總管司馬消難應尉遲回周以柱國王誼為行軍元帥擊之以吕祖謙標目修解題曰隋書地理志滎陽郡汜水縣後周置滎州鄖州宋德安府壬子周楊堅殺趙王招越王盛以吕祖謙標目修司馬消難以九州八鎮降陳以本紀修八月益州總管王謙舉兵周以柱國梁睿為行軍元帥擊之以吕祖謙標目修庚午周韋孝寬破尉遲回於鄴回死之以周紀修司馬消難奔陳以吕祖謙標目修周宇文胄敗死以通鑑修九月周楊堅以其世子勇為洛州總管統舊齊之地以通鑑修壬子周楊堅自為大丞相以周紀修冬十月甲寅日有食之以周紀修周楊堅殺陳王純以吕祖謙標目修周王謙敗死以吕祖謙標目修十一月周鄖襄公韋孝寬卒以周紀修十二月周詔諸改姓者悉復舊以通鑑修甲子周楊堅自為相國隋王加殊禮九錫以周紀修辛巳周隋王堅殺代王達滕王逌以周紀修大事記續編卷四十五
