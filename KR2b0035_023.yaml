body:
  text: 大事記續編卷二十三明王禕撰漢安樂思公延熈十二年十魏邵陵厲公正始十年嘉平元年吳大皇帝赤烏二年春正月甲午魏主謁明帝陵曹爽兄弟從司馬懿以皇太后令閉城門勒兵奏免爽等魏主還戊戌懿殺爽兄弟及尚書丁謐鄧颺何晏大司農桓範等皆夷三族丁未懿自為丞相加九錫辭不受右將軍夏侯覇奔漢以魏紀通鑑修解題曰按晉書本紀世語正始六年大將軍曹爽毁中壘營以兵屬其弟中領軍羲懿禁之不可八年爽遷太后於永寧宫專擅朝政兄弟並典禁兵屢改制度懿不能禁爽兄弟數俱出逰司農桓範謂曰總萬機典禁兵不宜並出若有閉城門誰復納人者爽曰誰敢爾耶由此不復並行天子謁高平陵孫盛魏世籍曰高平陵在洛水南太后山去城九十里爽兄弟皆從懿於是奏太后廢爽兄弟時懿子師為中護軍將兵屯司馬門懿列陣闕下假司徒高柔節行大將軍事領爽營謂柔曰君為周勃矣命太僕王觀行中領軍攝羲營懿帥太尉蔣濟等勒兵出迎天子屯于洛水浮橋餘見通鑑薛季宣曰魏兵制畧如東漢南北軍如故有中左右前後軍各一師又有中護軍中領軍領護軍將軍各一人其他雜號無常數初操置武衛營於相府以領軍主之文帝増置中壘營於是有二營將軍而以領軍將軍并五校統之也葉適曰曹操三世諸將未有擅兵於外者盖人主自執其權也司馬懿累立大功年當垂七十欲取其兵柄而不能忽值齊王童㓜爽羲子弟晏颺文吏皆莫以為意故懿父子得募士於外以逆行之然亦可謂至危矣使晏等有一人知出於此苐不至棄軍逰蕩懿父子何由得肆其志正與吕須事同矣夏四月乙丑魏改元以魏紀修秋漢姜維攻魏雍州不克以蜀傳修解題曰史容曰建安中復禹貢九州置雍州魏文帝分河西為凉州隴右為秦州三輔屬司𨽻晉地理志通典皆云晉初置雍州而此時已有雍州則不始於晉矣大抵晉書言晉所置州郡往往已多見於魏冬十二月辛卯魏以司空都督揚州軍事王凌為太尉以魏紀修解題曰按列傳晉春秋凌外甥令狐愚為兖州刺史舅甥並典兵專淮南之重宻恊計謂齊王不任天位楚王彪長而才欲迎立彪都許昌九月愚遣將張式至白馬與彪相問往来凌又遣舎人勞精詣洛陽語子廣廣曰凢興大事應本人情今曹爽以驕奢失民何平叔虚而不治丁畢桓鄧雖並有宿望皆專競於世加變易朝典政令數改所存雖高而事不下接民習於舊衆莫之從故雖勢傾四海聲震天下同日斬戮名士减半而百姓安之莫之或哀失民故也今懿情雖難量事未有變而擢用賢能廣樹勝已修先朝之政令副衆心之所求爽之所以為惡者彼莫不改夙夜匪懈以恤民為先父子兄弟並握兵要未易亡也凌不從餘見通鑑裴松之曰如此言之類前史不載而獨出習氏疑鑿齒所自造者也漢安樂思公延熈十三年吳大皇帝赤烏十三年魏邵陵厲公嘉平二年秋八月吳廢太子和賜魯王覇死冬十一月吳立子亮為皇太子以吳傳修吳作堂邑涂塘以吳傳修解題曰塗塘在今真州六合縣西二十五里盖塞滁水以為塘也後周置瓦梁郡陳吳明徹平之有上瓦梁下瓦梁堰上瓦梁一名石梁在天長下瓦梁在六合南塘何延錫曰由滁河而上數百里五十四流輻湊吳堰李氏發煬帝陵石封滁口欲揖長源西流指高岸横亘未及就宋景德元年毁之十二月魏征南將軍王昶襲吳破之以魏紀修魏罷校事官以魏傳修解題曰時校事放横黄門侍郎程暁上疏曰周禮云設官分職以為民極春秋傳曰天有十日人有十等愚不臨賢賤不臨貴明試以功九載考績各修厥業思不出位斯誠為國要道也秦漢雖官名改易職司不同初無校事之官干預庶政者也武皇帝大業草創衆官未備而軍旅勤苦民心不安乃有小罪不可不察故置校事取其一切此覇世之權宜其後漸䝉見任上察宫廟下設衆司官無局業職無分限隨意任情惟心所適法造於筆端不依科詔獄成於門下不顧覆訊其選官屬以謹慎為粗疏以􅢽詷為賢能其治事以刻暴為公嚴以循理為怯弱外則託天威以為聲勢内則聚羣奸以為腹心大臣耻與分勢含忍而不言小人畏其鋒芒鬱結而無告至使尹模公於目下肆其奸慝今外有公卿將校總統諸署内有侍中尚書綜理萬機司𨽻校尉督察京輦御史中丞董攝宫殿皆高選賢才以充其職申明科詔以督其違者此諸賢猶不足任校事小吏益不可信於是遂罷校事官漢安樂思公延熈十四年吳大皇帝太元元年魏邵陵厲公嘉平三年夏魏王凌謀立楚王彪司馬懿帥師討之五月甲寅凌自殺併其黨夷三族以魏紀傳通鑑修解題曰頴州穎丘縣吳魏之際關防莫謹於此事見通鑑魏揚州刺史諸葛誕為鎮東將軍都督揚州軍事以通鑑修吳立夫人潘氏為皇后以呉傳修六月魏賜楚王彪死録諸王公於鄴以魏紀通鑑修漢費禕還成都以蜀傳修秋七月壬戌魏皇后甄氏殂以魏紀修八月戊寅魏舞陽宣文侯司馬懿卒其子衛將軍師自為撫軍大將軍録尚書事以魏紀修解題曰蘇轍曰世之説者曰司馬仲達之於魏即曹孟德之於漢也二人智勇權畧則同而所䖏則異漢自董卓之後内潰外畔帝王之勢盡矣獨其名在且曹公假其名號以服天下擁而植之許昌建都邑征畔逆皆曹公也仲達則不然明帝之末曹氏之業固矣雖明帝以淫虐失衆曹爽以驕縱得罪而顛覆之形未見天下未畔魏也仲達因其隙而乗之拊其背而奪其成業事與曹公異矣事見通鑑冬十月吳徴諸葛恪領太子太傅以吳傳修漢費禕屯漢夀以蜀傳修解題曰今利州綿谷縣蜀王弟所封史記所謂直蜀相攻者也漢安樂思公延熈十五年吳會稽王孫亮建興元年魏邵陵厲公嘉平四年春正月癸卯魏司馬師自為大将軍以魏紀修吳封故太子和為王以吳傳修二月魏立皇后張氏以魏紀修吳改元神鳯以吳傳修吳殺其后潘氏以吳傳修吳主召諸葛恪㑹稽太守滕𦙍受遺輔政夏四月殂太子亮即皇帝位改元閏五月以恪為太傅太常滕胤為衛將軍領尚書事吕岱為大司馬以吳傳修解題曰吳書權寢疾意頗感悟欲徴太子和還立之全公主及孫峻孫𢎞固爭之乃止餘見通鑑宋庠紀年通譜亮立不俟踰年而改元建興本劉禪年號蘇轍曰任人莫難於託國漢武帝因文景之後虐用其民㡬䘮天下晩歲託國於霍光知用兵之害與民休息而天下復安固蜀先主知嗣子之暗弱舉國而付之孔明孔明又廢李嚴楊儀援蔣琬而授之雖後主之不明而守國三十餘年其君臣過於魏吳逺甚吳大帝方其屬任賢將抗衡中原曹公憚之及其老也賢臣死亡畧盡喜諸葛恪之勁悍越衆而付以後事恪乘用兵勞民之後繼起大役兵折於外既歸而不能自克時復肆志於僚友既以喪其軀而孫氏因之三世絶統國隨以亡彼以進取之資用進取之臣以徼一時之功可耳至於託六尺之孤寄千里之命而亦屬之斯人其勢必至是㢤冬十月吳諸葛恪城東興十一月魏三道擊吳十二月恪大破之以魏紀吳傳修解題曰東興一名東關在今和州含山縣無為軍巢縣今在無為州東南五十里濡須之上七寶濡須兩山之間吳武昌端門内殿災以吳傳修解題曰吳録諸葛恪有遷都意更起武昌宫今災者恪所新作漢安樂思公延熈十六年吳㑹稽王建興十年魏郡陵厲公嘉平五年春正月朔盗殺漢費禕以蜀傳修解題曰事見通鑑陳亮曰亮死漢事不可為蔣琬費禕亦相繼淪謝漢之區區遺文猶不使之自託地上耶天命果可畏㢤吕祖謙曰諸葛亮治蜀之規模其耕戰之法立國之紀綱賞罸之信必人所共知亮死後其䂓模猶足以維持二十年以劉禪之庸而蜀不亂此後人所不能知也盖亮能收拾人才故亮死蔣琬代之琬之後董允費禕代之此亮之䂓模也丙寅吳立皇后全氏以吳傳修庚午魏軍退以吳傳修魏諸葛誕為鎮南將軍都督豫州毌丘儉為鎮東將軍都督揚州軍事以通鑑修二月吳加諸葛恪荆揚牧督中外軍事以通鑑修夏四月漢姜維出石營圍魏南安以通鑑修解題曰按蜀書列傳姜維出石營圍魏南安通鑑云圍狄道乃明年事夏四月吳諸葛恪攻魏五月圍新城魏遣太尉司馬孚救之以吳傳修漢姜維還以吕祖謙標目修秋七月吳軍還冬十月將軍孫峻殺諸葛恪夷其三族自為丞相大將軍都督中外諸軍事殺南陽王和以吳傳通鑑修十一月吳改明年元以魏紀修解題曰通鑑不書闕也漢安樂思公延熈十七年年呉㑹稽王五鳯元年魏高貴郷公曹髦正元元解題曰宋庠紀年通譜五鳯本漢宣帝年號吳有大鳯五故改元宋書五行志吳人改元五鳯漢桓帝時有五色大鳥司馬彪云政治衰缺無以致鳯乃羽孽耳孫亮殆與桓帝同歟春二月魏司馬師殺中書令李豐太常夏侯𤣥光禄大夫張緝等夷其三族三月廢皇后張氏夏四月立王氏為皇后以通鑑修解題曰按三國志列傳魏畧世語𤣥以曹爽抑絀内不得意中書令李豐雖宿為大將軍所親待然私心在𤣥遂結皇后父張緝謀欲以𤣥輔政豐既内握權柄子尚公主又與緝俱馮翊人故緝信之嘉平六年二月當拜貴人豐等欲因御臨軒諸門有陛兵誅大將軍以𤣥代之以緝為驃騎將軍豐宻語黄門監蘇鑠永寧署令樂敦冗從僕射劉賢等曰卿諸人居内多有不法大將軍嚴毅累以為言張當可以為誡鑠等皆許從命豐為中書令二歲帝比每獨召與語不知所說大將軍本文作景王知其議已舍人王羕請以命請豐豐若無備情屈勢迫必不來若不來羕一人足以制之若知謀泄以衆挾輪長㦸自衛徑入雲龍門挾天子登陵雲臺臺上有三千人衆鳴皷㑹衆如此羕所不及也乃遣羕以車迎之豐見劫迫隨羕而至餘見通鑑蘇軾曰夏侯𤣥好老莊之言與何晏等皆有盛名然晏卒䧟曹爽黨中𤣥亦不免李豐之禍晏目𤣥以易之所謂深者而𤣥目晏以神及其遇禍深與神果安在乎漢姜維加督中外軍事六月攻魏隴西以蜀傳修秋九月甲戌魏司馬師廢其主為齊王太宰中郎范粲稱疾不出丁丑師迎立文帝孫高貴卿公髦冬十月庚寅即皇帝位改元遷齊王於河内以魏紀修癸巳魏司馬師自加殊禮以魏紀修解題曰按魏志假大將軍司馬景王黄鉞入朝不趨奏事不名劒履上殿通鑑不書闕也漢姜維㧞魏河間臨洮而還以通鑑修解題曰河間今熈州史容曰河間當作河關今西寧州龍支城臨洮按晉載記吕光遣弟延攻臨洮武始河闗皆克之則河闗為是西和州大潭縣東臨洮城漢安樂思公延熈十八年吳㑹稽王五鳳二年魏髙貴鄉公正元二年春正月魏毋丘儉及楊州刺史文欽起兵討司馬師戊午師帥師拒之閏月吴孫峻等襲魏壽春己亥師破欽於樂嘉欽降吴儉走死夷其三族諸葛誕為鎮東大將軍都督揚州軍事師卒于許昌二月丁巳其弟衛將軍昭自為大將軍録尚書事吳以文欽為都護鎮北大將軍以魏紀吳傳通鑑修解題曰水經注潁水入東南逕愽陽縣城東城在南頓縣北四十里王莽更名樂嘉今淮寧府宛丘縣四十里有博陽城三月魏立皇后卞氏以魏紀修夏漢姜維攻魏秋八月大破魏雍州刺史王經于洮西圍狄道不克遂屯鍾提以蜀傳通鑑修解題曰或作鍾題未詳其地冬十二月吳始作太廟以通鑑修是歲吳城廣陵以吳傳修解題曰按孫韶為廣陵太守權為吳王遷將軍為邉將數十年青徐汝沛頗來歸附淮南濵江屯候皆撤兵逺徙徐泗江淮之地不居者各數百里則吳初疑已得廣陵及考杜佑通典注乃謂嘉平後屬吳三國志吳傳五鳯二年使衛尉馮朝城廣陵拜將軍吳穰為廣陵太守則孫韶盖遙領耳通典建興元年馮朝城亦非也漢安樂思公延熈十九年吳㑹稽王太平元年魏髙貴鄉公甘露元年春正月漢以姜維為大将軍以蜀傳修夏四月庚戌魏司馬昭服衮冕赤舄以魏紀修丙辰六月丙午魏改元以通鑑修解題曰宋庠紀年通譜甘露本漢宣帝年號五月鄴上谷並言甘露降故改元秋七月漢姜維攻魏八月魏將軍鄧艾大破之於段谷魏以艾為鎮西將軍都督隴右軍事漢貶維為衛將軍以魏紀蜀傳通鑑修解題曰通典秦州上邽有段谷水天水軍庚午魏司馬昭自加大都督奏事不名假黄鉞以魏紀修吳孫峻遣文欽及將軍吕㩀等圖魏青徐九月丁亥峻卒其從弟偏將軍綝自為侍中領中外軍事召㩀等還㩀等表驃衛將軍滕𦙍為丞相冬十月綝殺𦙍夷其三族己酉改元辛亥㩀自殺十一月綝自為大將軍以吳傳通鑑修漢安樂思公延熈二十年吳㑹稽王太平二年魏髙貴鄉公甘露二年夏四月甲子魏徴諸葛誕為司空不就五月降吴六月司馬昭奉魏主及太后討之吴遣文欽等救誕魏圍夀春秋七月吴孫綝屯鑊里使將軍朱異救之不克九月殺異而歸冬漢姜維出駱谷至芒水以攻魏以魏紀吳蜀傳修解題曰鑊里在今安豐之夀春縣駱谷在鳳翔府盩厔縣西南漢魏舊道自鄠縣入谷出洋州興勢縣界夏侯𤣥入漢中鍾㑹伐蜀晉司馬勲破後趙唐李元奕高崇文趨梓州德宗僖宗韋興元出入皆由此道姜維連歲出師不過隴西今出隴東者盖魏分關中兵以赴淮南維欲乘其虚也漢安樂思公景耀元年年魏髙貴郷公甘露三年吴景皇帝孫休永安元春正月諸葛誕殺文欽二月魏克夀春殺誕夷其三族以魏紀舉要厯補遺修解題曰事見通鑑周端朝曰司馬篡勢定矣淮南三臣皆嬰鋒先死諸葛誕麾下數百人拱手為列不降每降一人輒斬之卒不變以至於盡此與田横之士何異不聞一言表而出之通鑑徒舉習鑿齒史論嗚呼習生不耻為司馬氏頌功德千百年後當有回易此論者反表而出之尊叛逆而排死節高篡奪而抑寃忠顯叛臣賊子為功髙業大去春秋大義不已逺乎所謂使揚土懐愧不知揚土當愧晉乎抑晉愧揚土乎彼誕麾下數百人盖揚土之人而反使愧昭嗚呼甚哉漢姜維復為大將軍以蜀傳修夏五月司馬昭自為相國晉公加九錫復讓不受以通鑑修秋八月吳主謀誅孫綝九月綝廢之為㑹稽王尚書桓彛死之己未迎立琅邪王休冬十月己卯即皇帝位改元綝自為丞相己丑封故南陽王和子皓為烏程侯十二月戊辰綝伏誅夷其三族以吳傳通鑑修是歲漢改元以蜀傳修解題曰宋庠紀年通譜史官言景星見故改元通鑑不書闕也漢黄皓為中常侍奉車都尉以蜀傳修漢撤漢中兵屯樂夀及漢樂二城以吕祖謙標目修解題曰曹爽之入漢中蜀諸將欲退守漢樂城王平謂賊若得闗便為深禍乃屯興勢而爽不得前盖要害之地當尺寸爭之今無故撤圍而退此鍾㑹所以得綴王含蔣斌而趣陽安口也事見通鑑漢安樂思公景耀二年吴景皇帝永安二年魏髙貴郷公甘露四年漢安樂思公景耀三年吳景皇帝永安三年魏元皇帝曹奐景元元年春正月乙酉朔日有食之以晉志修夏五月己丑魏主討司馬昭見弑尚書王經死之昭迎立武帝曽孫常道卿公璜更名奐甲寅即皇帝位改元以魏紀修解題曰按魏氏春秋戊子夜帝自將冗從僕射李昭從官焦伯等下陵雲鎧仗授兵欲因際會自出討昭㑹雨有司奏却日遂見王經等出黄素詔於懐曰是可忍也孰不可忍也今日便當决行此事入白太后遂㧞劒升輦率殿中宿衛蒼頭官僮擊戰皷出雲龍門賈充自外入帝師潰散薛季宣曰魏氏兵權外聚於州牧而内歸於大將軍太尉自曹爽誅而兵柄在司馬氏於是潜銷方面併營以貳於已故文欽數其罪謂三方之守一朝廢闕多選精兵以自營衛五營領兵闕而不補多載器仗歸之本營也是時天子親兵唯殿中蒼頭黄門是以高貴卿公徒手為禍然司馬師猶憚四征遂召諸葛誕以奪其兵及誕等敗而魏祚移矣猶稱天子手劍奮擊衆莫敢逼充帥厲將士騎督成倅弟濟以矛進帝崩于車餘見通鑑魏伐蜀吳人問張悌曰司馬氏得政以來大難屢作智力雖豐而百姓未服也今又竭其資力逺征巴蜀兵勞民疲而不知恤何以能濟悌曰不然曹操雖功盖中夏崇詐仗術征伐而已民畏其威不懐其德也丕叡承之係以慘虐内興宫室外懼雄豪彼之失民為日久矣司馬懿父子自握其柄除其煩苛而布其平恵為之謀主而救其疾苦民心歸之亦已久矣淮南三叛而腹心不擾曹髦之死四方不動任賢使能各盡其心其根本固矣姦計立矣今蜀閹宦專朝國無政令因危而伐殆其克乎陳亮曰民心要何常㢤飽食以嬉不知堂厦之為適負戴而疲勞望婆娑之木而憩焉往往忘去木固不可久也又將安所底止乎哉吳黜㑹稽王亮為候官侯亮自殺以吳傳修是歲鮮卑索頭部拓䟦力㣲遷定襄之盛樂以後魏紀修解題曰此元魏之先也水經注曰渠水西北逕成樂固北魏土地記雲中城東八十里有成樂城今雲中郡治也又西南逕雲中故城趙武侯築也元和郡縣志唐單于大都護府東受降城漢定襄之盛樂也管金河縣通典雲州注後魏盛樂縣亦在郡界然則盛樂盖在都護府雲州之間也漢安樂思公景耀四年吳景皇帝永安四年魏元皇帝景元二年漢安樂思公景耀五年吳景皇帝永安五年魏元皇帝景元三年秋八月乙酉吳立皇后朱氏戊子立子雨單為皇太子以吳傳修解題曰吳録音如湖水灣澳之灣冬十月漢姜維攻魏洮陽鄧艾大破之於侯和維退屯沓中以蜀傳修解題曰晉恵帝分臨洮立洮陽縣今洮州臨潭縣有洮陽城張駿収河南地至于狄道今熈州有狄道縣置武街石門侯和漒川甘松五屯則侯和盖和南地也王猛救隴西李儼使王撫守侯和則侯和盖近秦州也按輿地廣記唐洮州於舊洪和城置美相縣疑洪與侯音近鄧艾自狄道趣沓中至隂平則沓中正在狄道隂平之間崔鴻十六國春秋乞伏熾磐討彭利和於漒川師次沓中漒川沓中相近也甘松沓中為古松州去文州三百里維退沓中此鄧艾所以得綴其軍也事見通鑑吳衛將軍濮陽興為丞相與尤將軍張布用事以吕祖謙標目修魏嵇康等放逸司馬昭殺康以通鑑修解題曰按晉書列傳虞預雅好經史憎疾𤣥虚其論阮籍裸袒比之伊川被髪所以胡虜遍於中國以為過衰周之時餘見通鑑魏司𨽻校尉鍾㑹為鎮西將軍都督闗中軍事漢姜維請備陽安闗口及橋頭黄皓啓寢其事以吕祖謙標目修解題曰韓子中曰闗口即闗城在武興南漢水上水經注漢水西南注闗城北太平寰宇記三泉縣治嘉陵江闗城倉陌可推闗城所在水經注曰水東南逕隂平故城南又東南逕橋頭諸葛緒邀姜維於此今文州有隂平橋事見通鑑漢安樂思公炎興元年吳景皇帝永安六年魏元皇帝景元四年夏五月吴交趾吕興反降魏以吕傳通鑑目録修魏遣鍾㑹鄧艾及雍州刺史諸葛緒伐漢廷尉衛瓘監其軍秋八月漢遣将張翼廖化等拒之改元九月㑹入漢中㧞闗口艾敗姜維于漒川維退屯劒閣冬十月吳攻魏夀春沔中以救漢以魏紀蜀呉傳修解題曰按魏蜀志魏使征西將軍鄧艾督帥諸軍趣甘松沓中以羅取維雍州刺史諸葛緒㑹諸軍趣武都高樓首尾踧討若禽維便當東西並進又命鎮西將軍鍾㑹由駱谷伐蜀㑹將向駱谷艾將入沓中遣廖化詣沓中為維援張翼董厥等詣陽安闗口為諸軍外助至隂平聞諸葛緒向建威故住待之月餘改元炎興譙昌曰晉武帝名炎後一年而受禪此炎興之兆也令諸軍皆不得戰退還漢樂二城魏興太守劉欽趣子午谷諸軍數道平行至漢中監軍王含守樂城護軍蔣斌守漢城兵各五千㑹使護軍荀愷前將軍李輔各統萬人圍漢樂城㑹經過西出陽安口使護軍胡烈等行前攻破闗城得庫藏積榖維自沓中還至隂平合集士衆欲赴闗城未到聞其已破退趣白水今隆慶府隂平縣漢白水縣也與翼化等合守劒閣拒㑹餘見通鑑史容曰鄧艾遣金城太守楊吹詣甘松及艾於漒川口今甘松嶺在松州嘉城縣似與沓中相近水經注強水出隂平西北強山一曰強川今甘松又在漒川之西盖松州界也劒閣在隆慶府劒門縣水經注小劒戍去大劒戍三十里連山絶險飛閣相連魏司馬昭自為相國晉公加九錫以魏紀修癸卯魏立皇后卞氏以魏紀修鍾㑹併將諸葛緒軍鄧艾鑿隂平道破漢衛將軍諸葛瞻於綿竹瞻及子尚死之十一月漢主降北地王諶死之姜維等皆降以魏紀蜀傳修解題曰艾至隂平晉春秋三十國春秋云隂平景谷按今文州漢隂平道也樂史云隆慶隂平宋始置伐蜀時未有也簡選精鋭欲從漢德陽入江油今龍州縣左擔道自文州界青塘嶺至龍州一百一十五里自州南行為左擔路言不得右肩也詣綿竹趣成都㑹遣將軍田章等從劒閣西徑出江油未至百里章先破蜀伏兵三校艾自隂平道行無人之地七百餘里鑿山通道造作橋閣山高谷深至為艱險又糧將匱瀕於危殆艾以氊自褁推轉而下將士攀木縁崖魚貫而進先登至江油蜀守將馬邈降瞻自涪還綿竹艾大破之斬瞻及尚書張遵等進軍到雒後主使羣臣㑹議或以為蜀之與吳本為和國冝可奔吳或以南中七郡朱提越嶲牂柯雲南興古建寧永昌斗絶易以自守冝可奔南光禄大夫譙周以為自古以來無寄他國為天子者今若入吳國亦當臣服且治政不殊則大能吞小魏能并吳吳不能併魏明矣茍為稱臣為小孰與為大再辱之耻何與一辱且若欲奔南則當早為之計然後可今大敵已近禍敗將及羣小之心無可保恐發足之日其變不測何至南之有乎或曰今艾已不逺恐不受降如之何周曰方今東吳未賔事勢不得不受受之後不得不禮若陛下降魏魏不裂土以封陛下者周請身詣京都以古義爭之後主猶疑於入南周上疏遂從周䇿餘見通鑑孫盛曰禪雖庸主實無桀紂之酷戰雖屢北未有土崩之亂縱不能君臣固守背城借一自可退次東鄙以思後圖是時羅憲以重兵㩀白帝霍弋以強卒鎮夜郎蜀土險狹山水峻隔絶岩激湍非歩卒所渉者若悉収舟楫保㩀江州徴兵南中乞師東國如此則姜廖五將自然雲從吳之三師承命電赴夫何投寄之無所而慮於必亡耶且屈伸有㑹情勢代起何為匆匆遽自囚虜下堅璧於敵人致斫石之至恨哉葛生有云事之不濟則已耳安能復為之下壯哉斯言可以立懦夫之志矣禪既闇主周實駑臣方之申包田單范蠡大夫種不亦逺乎袁暐曰方鄧艾以萬人入江油之危險鍾㑹以二十餘萬衆留劒閣而不得進三軍之士已饑艾雖勝克使劉禪數日不降則二將之軍難以反矣故功業如此之難也漢亡上距劉備即漢中王位二主四十五年吳罷兵以通鑑修魏攻吳五谿武陵太守鍾離牧平之以吕祖謙標目修十二月壬子魏分益州為梁州以魏紀修解題曰分廣漢巴涪陵以北諸郡為梁州治沔陽縣李繪曰禹貢華陽黒水惟梁州其山川有岷蔡䝉江沱皆在今成都府路盖成都則古梁州之域漢改益州魏分益州置梁州益州治成都梁州治南鄭自此專謂漢中為梁州成都失梁州本名己卯魏以鄧艾為太尉鍾㑹為司徒以通鑑修魏皇太后殂以通鑑修魏元皇帝咸熈元年年呉景皇帝永安七年歸命侯孫皓元興元春正月魏檻車徴鄧艾晉公昭以其主如長安衛瓘執艾鍾㑹反衆誅之瓘殺艾二月丙辰魏主還以魏紀通鑑修解題曰㑹十五日至明日悉請護軍郡守牙門騎督以上及蜀之故官為太后發喪於蜀朝堂矯太后詔使㑹起兵廢司馬昭本文作文王皆班示坐上人使下議訖書版署置更所親信代領諸軍所請羣官悉閉着益州諸曹屋中於是士卒思歸内外騷動㑹留瓘謀議乃書版云欲殺胡烈等舉以示瓘瓘不許因相疑貳瓘如厠見胡烈故紿使使宣語三軍言㑹反㑹逼瓘定議經宿不眠各横刀膝上在外諸軍已潜欲攻㑹瓘既不出未敢先發㑹使瓘慰勞諸軍瓘心欲去且堅其意曰卿三軍之主冝自行㑹曰卿監司監司之名見於此且先行吾當後出瓘便下殿㑹悔遣之使呼瓘瓘辭眩疾動詐仆地比出閣數十信追之瓘至外廨服鹽湯大吐瓘素羸便似困篤㑹遣所親人及醫視之皆言不起㑹由是無所憚及暮門閉瓘作檄宣告諸軍諸軍並已唱義凌旦共攻㑹㑹率左右距戰諸將擊敗之唯帳下數百人隨㑹繞殿而走盡殺之瓘於是部分諸將羣情肅然魏紀詔曰鍾㑹構亂集征行將士刼以兵威始吐姦謀逼脅衆人下議莫不驚懾相國左司馬夏侯和騎士曹屬朱撫時使成都中領軍司馬賈輔郎中羊琇各𠫭㑹軍事和琇撫皆抗節拒㑹臨危不顧輔語散將王起説㑹凶暴欲盡殺將士又云相國已率三十萬衆西討欲以稱張形勢感激衆心起以輔言宣語諸軍遂使將士益懐奮勵宜加寵顯餘見通鑑吳遣將軍陸抗等圍巴東以呉傳修解題曰羅憲所將不過三千人加以病者大半歩恊陸抗之兵奚翅十倍恊不足道也而抗亦不能辦此耶盖抗專以西陵為重魏兵既在西陵此抗之所以速退也事見通鑑三月己卯魏晉公昭自進王爵以魏紀修南中六郡降魏以通鑑修丁亥魏封漢主劉禪為安樂公以魏紀修夏五月庚申魏復五等爵以魏紀修甲戍魏改元以魏紀修魏攻吳西陵以救巴東秋七月吳師退以吳傳修魏晉王昭使司空荀愷定禮儀中護軍賈充正法律尚書僕射裴秀議官制太保鄭冲裁之以通鑑修解題曰按晉志傳文帝命荀顗因魏代前事撰為新禮㕘考古今更其節文羊祐任愷庾峻應貞並共刋定成百六十五篇奏之賈充定法律令與太傅鄭冲等十四人典其事就漢九章增十一篇仍其族類正其體號律合二十篇六百二十條二萬七千六百五十七言律令合二千九百二十六條十二萬六千三百言六十卷泰始三年表上秀改官制議立五等之爵吳分交州置廣州以吳傳修吳主休殂尊皇后為皇太后濮陽興驃騎將軍張布迎烏程侯皓即皇帝位改元以吳傳修解題曰不俟踰年改元八月庚寅魏中撫軍司馬炎副相國事九月戊午自為撫軍大將軍以魏紀修吴主貶皇太后為景皇帝后追謐父和為帝母何氏為皇太后以吳傳修冬十月魏遣使聘吳以通鑑修丙午魏晉王昭以炎為世子以魏紀修吳封故太子雨單為王立妃滕氏為皇后十一月殺濮陽興及張布夷三族以吳傳修是歲魏罷屯田官以通鑑修解題曰以均政役諸典農皆為太守都尉皆為令長大事記續編卷二十三
