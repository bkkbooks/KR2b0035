body:
  text: 大事記續編卷七十明王禕撰唐昭宗皇帝龍紀元年春正月癸巳改元以新舊紀修兵部侍郎劉崇望同平章事通鑑壬子宣武軍將郭璠殺申叢自稱奉國留後以新紀通鑑修二月戊辰朱全忠俘秦宗權以獻己丑宗權伏誅新紀解題曰按舊五代史全忠本文作太祖後同請判官韋震奏事且疏時溥之罪願委討伐仍降滄盧彥威兖朱瑾二帥之命時溥破黃巢功第一又與兖鄆連衡結中官為內援時溥忌全忠者復右之左拾遺徐彥樞亦請所在斬宗權不必陳獻俘之禮蓋以溥獻黃巢止函首故也震往復論列於天子前敢大言所請多允舊紀黃巢與宗權合巢雖平而宗權之凶徒大集西至金商陜虢南極荆襄東過淮甸北侵徐兖汴鄭數十州民無耕織千室之邑不存一二嵗既凶荒皆膾人而食宗權既平而朱全忠連兵十萬蠶噬河南兖鄆青徐之間血戰不解唐祚以亡餘見通鑑三月孔緯為司徒杜讓能為司空新紀六月李克用拔磁洺二州解題曰此克用始得山東也昭義節度使孟方立自殺其弟遷自稱留後以新紀通鑑修楊行密陷宣州以為宣歙觀察使以吕祖謙標目修孫儒陷廬州以通鑑修冬十月王敬武卒其子師範自稱平盧留後以新紀修十一月帝改名曄以通鑑修己酉有事于南郊宦者始以法服侍祠以吕祖謙標目修十二月孔緯為太保杜讓能為司徒新紀是嵗以天威軍使李順節為天武都頭領鎮海節度使以通鑑修以鍾傳為鎮南節度使以方鎮表新五代史列傳修解題曰按新五代史列傳以洪州為鎮南軍拜傳節度使龍紀元年始復節度故書于此方鎮表乾元元年置洪吉都防禦團練使觀察處置使領洪吉䖍撫袁治洪州宣歙饒觀察使治饒州二年廢宣歙饒觀察使上元洪吉增領信州廣德更號江南西道大厯元年復置宣歙池等州都團練觀察處置等使十四年置團練使建中升江南西道為節度使貞元元年廢置都團練觀察使四年增領江州咸通升為鎮南軍節度使乾符廢置江南西道觀察使龍紀復為鎮南節度使景福升宣歙為寧國軍節度使天復廢為都團練觀察使唐昭宗皇帝大順元年春正月戊子上尊號改元以新舊紀修孟遷降于李克用以通鑑修三月李克修卒李克用以决勝軍使李克恭為昭義留後以新紀修以楊行密為寧國節度使以通鑑修解題曰寧國節度使見龍紀元年鎮南節度使解題五月以張濬為河東都招討宣慰使京兆尹孫揆為昭義節度使副之以討李克用以新舊紀傳修解題曰新史贊昭宗初亦有志於興復而外患已成內無賢佐頗亦思得非常之材而用匪其人徒以益亂唐中世以來其為大患者藩鎮宦官而已使昭宗得賢相如裴度德裕猶懼不濟而付之張濬之徒帝與濬論治亂濬曰陛下英睿如此而中外制於強臣此臣所以痛心疾首也上問以當今所急曰莫若強兵以服天下於是募兵至十萬人旋興太原之役一敗而不可收拾唐卒以亡昔子家羈之告魯昭公終始謂不可求多於季氏昭宗之君臣曽未之前聞乎孫甫曰昭宗即位世已亂矣雖志欲興復而大臣竭忠者杜讓能一人而已其他無不與方鎮相結孔緯有名望尚交通朱全忠崔昭緯輩固宜交邠岐矣大勢橫流而昭宗輕信易動動而無謀何以制服諸鎮哉太原有平賊大功但為全忠所圖蓄忿不解若加之恩意虜性徑直感恩必深太原順則河東近輔鎮魏舊帥必順使讓能經營於內復引同心之賢贊助時政則朝廷漸治國威可振矣奈何不用其言而聽張濬之計許全忠舉兵致太原拒命讓能雖以死許國自是諸鎮交亂車駕不能寧處唐祚迄亡哀哉事見通鑑克用為全忠所攻上表訟寃請帥本道兵討之不用度支糧餉而朝廷不許全忠因克用之敗上言請統汴滑孟三軍與河北三鎮共除之而朝廷許之所以然者由張濬私有怨於克用故也濬敗之後李存孝以濬為宰相俘之無益天子禁兵不宜加害乃退軍以使之帥則猶有所顧忌官軍北伐朝廷仗全忠之助而乃連兵徐鄆身不至於行營則公肆欺罔忠者吾討之而反為所敗不忠者吾倚之而反為所欺是皆濬之罪也壬寅昭義軍將安居受殺李克恭附于朱全忠以新紀修解題曰此李克用之失潞州也六月辛未朱全忠兼宣義節度使以舊五代史本紀修解題曰宣義節度使見乾元二年汴滑節度使解題河東將安知建以邢洺磁三州附于朱全忠以新紀修解題曰按舊紀是年六月李克用大將權知邢洺兵馬留後安知建上表請以三州歸順遣中使勞之此克用之始失山東也秋八月李克用將李存孝執孫揆殺之以新紀通鑑修朱全忠為中書令新紀九月李克用取潞州以新紀修解題曰此李克用之再得潞州也冬十月李克用陷邢洺磁三州新紀解題曰此克用之再得山東也按舊五代史紀傳晉邢洺節度使安知建叛歸青州天子以為神武統軍自棣州沂河歸朝鄆州朱宣邀斬於河上傳首晉陽克用本文作武皇令存孝定邢洺因授之節鉞則克用之失三州與復三州正在大順二年新舊唐史誤書於元年合以舊五代史為據十一月張濬及李克用戰于隂地敗績新紀解題曰胡寅曰昭宗即位三年外諸侯雖擅兵未有問鼎者及伐河東不勝然後侵叛四起昭宗坐不安席矣事見通鑑方輿志隂地關在汾州靈石縣南二十七里十國紀年太原劉崇即帝位屯兵於隂地黃澤團柏三路聲言南討蓋此三路入太原之要路也十二月李克用陷晉絳二州以通鑑修孫儒據蘇潤二州以通鑑修是嵗置升州以吕祖謙標目修唐昭宗皇帝大順二年春正月丙辰朱全忠遣將攻羅𢎞信大敗之于永定橋降之以吕祖謙標目修庚申孔緯張濬罷兵部侍郎崔昭緯御史中丞徐彥若為户部侍郎同平章事二月濬再貶為繡州司户以新紀通鑑修三月赦陳敬瑄以通鑑修以王師範為節度使以通鑑修李克用以李存孝為邢洺節度使以通鑑修夏四月庚辰彗星入于太微以新紀修王建逐韋昭度守劔門關以吕祖謙標目修封子為王以新紀修秋七月李克用陷雲州赫連鐸奔吐谷渾以新紀修孫儒焚揚州渡江以逃以新紀修解題曰按十國紀年朱全忠屢遣使渡江約楊行密同討儒儒衆雖盛畏行密與全忠合而已力分欲先平行密然後北討全忠七月儒焚揚州廬舍掠吏民及女口盡室南渡殺其老弱以給軍食使沈文昌草牒暴行密全忠罪告諸藩俟平宣汴當帥兵除君側之惡餘見通鑑八月癸卯王建陷成都執陳敬瑄自稱西川留後以新紀修九月東川節度使顔彥朗卒其弟彥暉自知留後以通鑑修冬十月癸未以王建為節度使以通鑑修帝以李順節等討楊復恭復恭奔興元楊守亮等拒命以吕祖謙標目修李克用攻王鎔大破之以通鑑修十二月宦官殺李順節以通鑑修是嵗陳巖卒都將范暉自稱福建留後王潮攻之以通鑑修唐昭宗皇帝景福元年春正月己未朱全忠陷孟州新紀丙寅改元以新舊紀修王鎔李匡威攻堯山李克用大破之以通鑑修二月以李茂貞為山南西道招討使討楊守亮以通鑑修朱全忠冦鄆州丁亥朱宣大破之以新紀通鑑修楊行密陷常潤二州以吕祖謙標目修劉崇望罷新紀忠義節度使趙德諲卒其子匡凝自立以通鑑修解題曰忠義節度使見至德元年南陽節度使解題三月户部侍郎鄭延昌為中書侍郎同平章事以新紀修李克用王處存攻王鎔戊午鎔擊敗之新市以通鑑修夏四月杜讓能為太尉新紀乙酉以錢鏐為武勝防禦使以通鑑修解題曰武勝軍見乾元元年浙江東西道解題六月楊行密大敗孫儒殺之秋七月還揚州以吕祖謙標目修八月以楊行密為淮南節度使以通鑑修李匡威赫連鐸攻雲州丁酉李克用大破走之以通鑑列傳修辛丑李茂貞拔興元楊復恭楊守亮等奔閬州以吕祖謙標目修冬十月李存孝附于朱全忠以新紀通鑑修解題曰此李克用之再失山東也十二月行崇𤣥厯以通鑑修是嵗以顧彥暉為節度使以新史列傳修唐昭宗皇帝景福二年春正月徐彥若罷以新紀修以李茂貞為山南西道武定節度使不受命以新紀通鑑修三月李匡威為其弟匡籌所逐匡籌自稱盧龍留後以新紀修夏四月乙亥陳敬瑄田令孜伏誅以新紀修乙酉彗星入于太微以新紀修丁酉王鎔殺李匡威新紀戊子朱全忠陷徐州殺時溥以新紀吕祖謙標目修解題曰自是而全忠之勢益張矣五月王潮陷福州殺范暉自稱留後以新紀修閏月以扈蹕都頭曹誠等為諸道節度使六月諸王代掌禁兵以吕祖謙標目修解題曰按新史兵志唐㑹要僖宗幸蜀田令孜募新軍五十四都每都千人左右神䇿各二十七都分為五軍令孜為左右神䇿十軍兼十二衛觀軍容使以左右神䇿大將軍為左右神䇿諸都指揮使諸都領都將亦曰都頭昭宗以藩臣跋扈天子孤弱以宗室典禁兵及伐李茂貞悉發五十四軍屯興平已而自潰乾寧元年同州節度使王行實入迫神䇿中尉請天子幸邠州帝御承天門敕諸王率禁軍捍之捧日都頭李筠以其軍衛樓下帝幸筠軍扈蹕都頭李君實亦至帝出石門月餘乃還詔諸王閲親軍收拾神䇿亡散得數萬益置安聖捧宸保寧安化軍曰殿後四軍三年李茂貞再犯闕昭宗幸華州明年韓建畏諸王有兵請歸十六宅於是四軍二萬餘人皆罷俄遂殺十一王及還長安神䇿軍復稍置之以六千人為定是嵗中尉劉季述王仲先以其兵千人廢帝季述等誅昭宗召朱全忠兵入誅宦官宦官劫天子幸鳯翔全忠圍之嵗餘天子乃誅中尉等二十餘人以解梁兵乃還長安悉誅宦官而左右神䇿軍廢矣諸司悉歸尚書省郎官兩軍兵皆𨽻六軍六軍者左右龍武神武羽林名存而已八月丙申以嗣覃王嗣周為京西招討使討李茂貞以新紀吕祖謙標目修九月丁未以蘇杭觀察使錢鏐為鎮海節度使以舊紀修李茂貞王行瑜拒官軍壬午嗣覃王嗣周敗績甲申茂貞犯京師太尉杜讓能再貶為雷州司户尋賜死以東都留守韋昭度為司徒御史中丞崔𦙍為户部侍郎同平章事以新紀通鑑修升州降于楊行密以新紀修冬十月以王潮為福建觀察使以通鑑修十一月以李茂貞為鳯翔山南西道節度使中書令秦王以舊紀通鑑修王行瑜為太師號尚父以通鑑修十二月韋昭度為太傅新紀邵州刺史鄧處訥陷潭州殺周嶽自稱欽化留後以新紀通鑑修唐昭宗皇帝乾寧元年春正月乙丑朔改元以新舊紀修李茂貞以兵來朝新紀以李臣籌為節度使以通鑑修二月朱全忠大破兖鄆兵於魚山朱熹綱目解題曰魚山在東平府東阿縣一名吾山散騎常侍鄭綮為禮部侍郎同平章事以新紀修以鄧處訥為武安節度使以通鑑修解題曰武安節度使見大厯四年湖南解題彰義節度使張鈞卒其兄磻自為留後以新紀通鑑修解題曰彰義節度使見大厯三年涇原節度使解題三月甲申李克用克邢州殺李存孝以新紀修解題曰此克用之再收山東也夏五月孫儒將劉建鋒馬殷陷潭州殺鄧處訥建鋒自稱武安留後以新紀修丙子王建克彭州殺威戎節度使楊晟以新紀修解題曰威戎節度使見開元七年劔南解題鄭延昌罷新紀六月李克用大破吐谷渾殺赫連鐸通鑑戊午禮部尚書李磎同平章事庚申罷御史大夫徐彥若為中書侍郎同平章事以通鑑修秋七月鄭綮罷新紀李茂貞克閬州八月楊復恭等伏誅以通鑑新紀修解題曰范祖禹曰小人無功猶不可長况其有功何以堪之故小人而有非常之功者國之不幸也復恭刑臣至與天子為敵昭宗親戰用大師而後克之其不臣如此由其恃援立之功故也豈不足為戒哉餘見通鑑冬十月立子四人為王以通鑑修十一月以張璠為節度使以通鑑修十二月李克用大破李匡籌據幽州以吕祖謙標目修是嵗劉謙卒尋以其子隱為封州刺史以通鑑修唐昭宗皇帝乾寧二年春正月己巳給事中陸希聲為户部侍郎同平章事通鑑壬申王重盈卒其子珂自稱護國留後新紀二月董昌稱帝以吕祖謙標目修乙未太子太傅李磎為户部侍郎同平章事以新紀修李克用以其將劉仁恭為盧龍留後以列傳吕祖謙標目修三月崔𦙍李磎罷户部侍郎王搏為中書侍郎同平章事以新紀修夏四月宗室諸王罷掌禁兵以朱熹綱目修解題曰胡寅曰昭宗欲使諸王將兵雖非上䇿然亦足以外攝藩鎮內制中官矣北司不便可也而南牙亦請罷之此必崔昭緯與邠岐為腹心耳小人姦邪視人主昏明剛柔而作止者也李克用有勞則伐之杜讓能忠計則殺之李順節出死力去叛奄則戮之然則大臣何所恃於君父哉昭緯崔𦙍張濬各倚藩鎮以為外援蓋由此也事見通鑑陸希聲韋昭度罷以通鑑修戊戌以劉建鋒為節度使通鑑五月甲子王行瑜李茂貞及鎮國節度使韓建以兵來朝殺韋昭度李磎留邠寧鳯翔兵各二千人宿衛以吕祖謙標目修解題曰鎮國節度使見大厯元年京畿解題李克用討王行瑜等克絳州以通鑑新紀修六月庚寅以錢鏐為浙東招討使以新紀修癸巳孔緯為司空門下侍郎同平章事秋七月丙辰李克用屯河中匡國節度使王行約走解題曰匡國節度使見大厯元年京畿解題辛酉左右神䇿軍中尉駱全瓘劉景宣等謀劫帝幸邠歧辛酉行在莎城甲子次石門解題曰莎城鎮在啓夏門外屬京兆府萬年縣石門鎮在京兆府藍田縣西南四十里以前護國節度使崔𦙍為中書侍郎同平章事八月克用屯渭橋全瓘景宣等伏誅辛丑以克用守太師邠寧招討使辛亥帝至自石門以新舊紀年表列傳吕祖謙標目修壬子崔昭緯罷新紀以王珂劉仁恭為節度使以通鑑修九月徐彥若為司空新紀癸亥孔緯薨以新紀修冬十月貶崔昭緯梧州司馬以通鑑修京兆尹孫偓為兵部侍郎同平章事以通鑑修王處存卒其子義成節度副使郜自稱留後尋以為節度使以新舊紀傳修解題曰通鑑不載舊史列傳郜為留後朝廷從而命之授以旄鉞新史略同今併書之十一月李克用克邠州王行瑜伏誅以吕祖謙標目修丁丑王建陷利州新紀十二月王建攻東川以通鑑修乙未爵李克用晉王以吕祖謙標目修晉王克用請討李茂貞不許吕祖謙標目解題曰按新五代史晉兵破王行瑜還軍渭北請擊茂貞昭宗以謂晉逺而茂貞近因欲庇之以為德而冀緩急之可恃也茂貞殺其子自贖乃詔罷歸晉軍克用歎曰不誅茂貞憂未巳也餘見通鑑是嵗安州防禦使宣晟陷桂州自稱知軍府事以新紀修唐昭宗皇帝乾寧三年春閏正月晉王克用遣兵救兖鄆羅𢎞信襲之軍潰以通鑑修二月置殿後四軍以通王滋判侍衛諸軍事以通鑑修夏四月晉王克用敗魏博兵遂攻之以朱熹綱目修武安軍亂殺劉建鋒馬殷自稱留後以新紀修五月董昌去帝號以通鑑修戊子崔昭緯伏誅以吕祖謙標目修錢鏐充越州董昌伏誅以吕祖謙標目修朱全忠救魏博晉王克用還以稽古録修六月庚戌李茂貞犯京師嗣延王戒丕禦之敗績秋七月壬辰行在渭北甲午韓建來朝丙申次華州茂貞焚京師以新紀吕祖謙標目修解題曰按新五代史列傳昭宗將奔太原次渭北韓建遣子允請幸華州是時天子孤弱獨有殿後軍及定州三都將李筠等兵千餘人為衛以諸王將之建巳得昭宗幸其鎮遂欲制之因請罷諸王將兵散去殿後諸軍纍表不報昭宗登齊雲樓顧望京師酒酣與從臣悲歌泣下建心尤不說因遣人告諸王謀殺建劫天子幸他鎮昭宗召建將辨之建稱疾不出乃遣諸王自詣建建不見送諸王十六宅昭宗難之建乃率精兵數千圍行宫請誅李筠昭宗大懼遽詔斬筠悉散殿後及三都衛兵幽諸王於十六宅昭宗益悔幸華遣延王戒丕使晉以謀興復戒丕還建與中尉劉季述誣諸王謀反以兵圍十六宅諸王皆登屋呼呌遂見殺昭宗無如之何建營南莊起樓閣欲邀昭宗遊幸因廢之而立德王裕其叔父豐謂建曰汝陳許間一田夫爾遭時之亂䝉天子厚恩至此欲以兩州百姓之地行大事覆族之禍吾不忍見不如先死因泣下歔欷李茂貞朱全忠皆欲發兵迎天子建稍恐懼乃止餘見通鑑宦者張承業監河東軍以五代史列傳修乙巳崔𦙍罷新紀丙午尚書左丞陸扆為户部侍郎同平章事八月甲寅王搏罷乙丑國子博士朱朴為諫議大夫同平章事以新紀修九月庚辰以王潮為威武節度使以通鑑修解題曰威武節度使見大順二年福建解題乙未武安節度使崔𦙍為中書侍郎兵部侍郎崔逺同平章事丁酉陸扆貶刺史以新紀修冬十月晉王克用及羅𢎞信戰于白龍潭敗之以新紀修解題曰竇蘋音訓白龍潭在魏縣西今名萬嵗潭以孫偓為鳯翔行營節度都統招討處置使李茂貞請罪師不果出以新紀通鑑修戊午威勝節度使王搏為吏部尚書同平章事以新紀修解題曰威勝見乾元元年浙江東西道解題以錢鏐為鎮海威勝節度使以新紀通鑑修是嵗以劉隱為清海行軍司馬以通鑑修解題曰清海見至德元年嶺南解題唐昭宗皇帝乾寧四年春正月帝出居于華州以春秋修乙酉韓建圍行宫罷諸王領兵及殿後軍殺扈蹕都將李筠以新紀吕祖謙標目修解題曰諸王於是再領兵而再罷矣朱全忠陷鄆州執朱宣以歸殺之二月陷兖州朱瑾奔淮南以吕祖謙標目修己未立德王裕為皇太子新紀馬殷陷邵州以為武安節度使以新舊五代史修夏四月遣使和兩川以通鑑修五月丙戌王建攻東川六月甲寅貶建為南州刺史乙卯以李茂貞為西川節度使嗣覃王嗣周為鳯翔隴右節度使茂貞不受命嗣周及茂貞戰于奉天敗績以新紀修晉王克用徴兵於劉仁恭不從秋八月擊之以新史列傳吕祖譙標目修韓建殺諸王吕祖謙標目解題曰胡寅曰御得其道則昆蟲草木無札瘥夭閼之患不然一身無所容於天地之間况妻子哉古之明君所以不敢不敬德不敢不教子不敢用小人不敢失大柄為末流之至此也唐室至此豈非祖宗詒謀有未逺歟事見通鑑九月晉王克用攻劉仁恭大敗以稽古録修以彰義節度使張璉為鳯翔行營招討使以通鑑修復以王建為節度使以通鑑修朱全忠屯宿州遣武寧留後龎師古泰寧留後葛從周擊楊行密以吕祖謙標目修解題曰按新舊紀傳文德元年以兼有濟孟之地無西顧之患將大整師徒畢力誅蔡九月知宗權殘孽不足為患遂移兵伐徐景福二年拔彭城命龎師古移兵攻兖州乾寧四年九月以兖鄆既平軍士雄勇大舉南伐事見通鑑十一月淮南大將朱瑾潛出舟師襲汴軍於清口龎師古舉軍皆沒師古被執時葛從周自霍丘渡淮至濠州聞師古敗乃退軍至渒河方渡而瑾至殺傷溺死殆盡還者不滿千人唯牛存節一軍先渡獲免比至潁州大雪寒凍死者十五六自古喪師之甚無如此此行密所以能立國也清口見晉大寧二年宋大明二年解題渒水水經出廬江北入于淮注出弋陽縣南垂山東北徑博安山徑安豐縣故城冬十月以韓建為鎮國匡國節度使以通鑑修遂州叛降于王建建陷東川殺顧彥暉以卬州刺史王宗滌為留後以吕祖謙標目修立子三人為王以通鑑修十一月癸酉楊行密大敗龎師古於清口殺之又敗葛從周於渒水朱全忠遁以吕祖謙標目修戊寅立淑妃何氏為皇后通鑑十二月丁未王潮卒其弟審知自稱威武留後以吕祖謙標目修是嵗貶右拾遺張道古為施州司户以通鑑修唐昭宗皇帝光化元年春正月帝出居于華州以春秋修徐彥若為司徒新紀下詔罪已息兵二月復以李茂貞為鳯翔節度使以通鑑修三月朱全忠兼天平節度使其從事李振為副使以舊五代史紀傳修解題曰按舊史本紀朱全忠遣判官韋震奏事求兼領鄆州時全忠軍敗之後欲自大其權以柅藩鄰之變餘見通鑑劉仁恭襲逐盧彥威遂取滄景德三州以其子守文為義昌留後以吕祖謙標目修夏四月朱全忠陷洺州五月陷邢磁二州以舊五代史本紀修解題曰李克用於是三失山東矣秋七月壬戌帝至自華州甲子改元以吕祖謙標目修八月以太子賔客張有孚為河東汴州宣慰使朱全忠不受命以通鑑修九月羅𢎞信卒其子魏博節度副使紹威自稱留後以新紀通鑑修冬十月癸卯以王審知為節度使以通鑑修丁巳以王宗滌為節度使以通鑑修十一月以羅紹威為節度使以通鑑修封子二人為王以新紀修十二月昭義節度使薛至勤卒澤州刺史李罕之據潞州附于朱全忠以通鑑修解題曰此李克用之再失潞州也唐昭宗皇帝光化二年春正月丁未崔𦙍罷兵部尚書陸扆同平章事以新紀修楊行密攻徐州朱全忠救之以通鑑修劉仁恭陷貝州遂攻魏州三月朱全忠遣將救之仁恭大敗丁巳全忠陷澤州夏四月遂攻太原晉將周德威敗走之以通鑑舊紀修晉王克用攻潞州以通鑑修六月保義軍亂殺王珙其將李璠自稱留後以新紀通鑑修解題曰保義軍見大厯元年東畿解題秋八月己巳晉王克用陷澤潞懷三州以新紀修解題曰克用於是三得潞州矣九月癸卯以李茂貞為鳯翔彰義節度使以通鑑修以汾州刺史孟遷為昭義留後以通鑑修冬十一月徐彥若為太保王搏為司空新紀馬殷陷郴連二州盡據湖南以新紀吕祖謙標目修辛丑保義軍將朱友謙殺李璠自稱留後以新紀通鑑修唐昭宗皇帝光化三年夏四月朱全忠遣葛從周擊劉仁恭五月己亥圍滄州以通鑑修六月丁卯以清海節度使崔𦙍為左僕射同平章事王搏罷己巳殺之以新紀修葛從周大破劉仁恭於老鴉堤晉王克用遣李嗣昭攻邢洺以救之以通鑑修解題曰老鴉堤在乾寧軍秋七月庚戌以孟遷為節度使以通鑑修九月乙巳徐彥若罷丙午崔逺罷戊申刑部尚書裴贄為中書侍郎同平章事以新紀修朱全忠攻鎮州不克遣將擊劉仁恭陷瀛州冬十月陷景莫二州辛巳陷祁州以新紀修解題曰全忠於是服河北矣以朱友謙為節度使以通鑑修朱全忠遣兵攻定州義武兵馬使王處直禦之大敗甲申王郜奔晉陽處直自為留後附于全忠劉仁恭遣兵救定州大敗由是河北諸鎮皆服全忠以通鑑新紀修十一月庚寅左右神䇿軍中尉劉季述王仲先等作亂帝居少陽院辛卯立太子裕為帝以新紀通鑑修是嵗馬殷陷桂宜巖栁象五州新紀唐昭宗皇帝天復元年春正月乙酉朔神䇿軍將孫德昭等討亂帝復位劉季述等伏誅黜太子裕為德王戊戌以德昭為靜海節度使賜姓名李繼昭以新紀修解題曰按新舊史列傳神䇿軍大將軍孫德昭常忿閹尹廢辱天子崔𦙍伺知之令判官石戩與遊伺其深意每酒酣德昭泣下𦙍乃使戩說曰今中外大臣自廢立己來無不含怒至於軍旅亦懷憤惋今反者獨季述仲先耳君能誅此二豎復帝寶位垂名萬代今正其時即不早計功落他人之手德昭謝曰豫軍吏耳社稷大計不敢自專如相公委使不敢避也𦙍割帶納蜜丸通意德昭邀别將周承誨期十二月晦伏士安福門待旦仲先肩輿造朝德昭等劫之斬東宫門叩少陽院宋敏求長安志翰林院北少陽院呼曰逆賊斬矣帝疑未信皇后曰可獻賊首德昭擲仲先頭以進宫人毁扉出御長樂門兩京記宮城南門東曰長樂門羣臣稱賀承誨馳入左軍執劉季述王彥範至樓前帝詰季述未巳已為亂棒擊死乃尸之實録劉季述知崔𦙍遣使告朱全忠欲盡殺兩司官以潑醋為號後即弒逆於東內挾少主而專大權程匡柔唐補紀南班栁承謙令左軍李總以難告呼出季述擒上馬至樓前兩軍支黨死者數十人中官奉太子遁入左軍收傳國璽季述等夷三族以德昭檢校太保靜海軍節度使同中書門下平章事賜氏李曰繼昭承誨檢校司徒雍管節度使皆號扶傾濟難功臣圖形凌煙閣餘見通鑑癸巳爵朱全忠東平王以通鑑修壬子崔𦙍為司空新紀李茂貞來朝進爵歧王守尚書令以通鑑修解題曰景福二年茂貞逼京師朝廷不獲已為之殺宰相始肯罷兵明年來朝大陳甲兵遂唘問鼎之端明年挾韓建行瑜偕來遂謀廢立之舉又明年兵逼京畿則播越華州矣及光化之末茂貞亟來遂劫遷鳯翔矣况尚書令之官太宗由之以登大位未嘗輕以授人前日不以俾王行瑜而茂貞偃然居之充是以往將何所不至哉事見通鑑崔𦙍陸扆請分主左右軍不從以樞密使韓全誨鳯翔監軍張彥𢎞為左右神䇿軍中尉解題曰按新史列傳劉季述之誅崔𦙍陸扆見武德殿右廡𦙍曰自中人典兵王室愈微臣請主神䇿左軍扆主右則四方藩臣不敢謀昭宗意不决李茂貞語人曰崔𦙍奪軍權未及手志滅藩鎮矣帝聞召李繼昭等問以𦙍所請對曰臣世世在軍不聞書生主衛兵且罪人已得持軍還北司便帝謂𦙍曰議者不同勿庸主軍乃以全誨為左神䇿中尉彥𢎞為右袁易簡周敬容為樞密使餘見通鑑胡寅曰崔𦙍之言其心雖私其䇿則是冢宰六卿之長於事無所不統况兵權有國之司命而可不豫知乎但不當分為左右通掌可也彼三武夫固北司之𨽻也夫豈足與謀乎留歧兵三千人宿衛諫議大夫韓偓諫不聽以新史列傳修解題曰按程匡柔唐補紀其月八日李茂貞朝覲留二千人左右街侍衛而回崔𦙍申朱全忠請三千人在南坊宅側安下新史列傳韓全誨等知崔𦙍必除己乃己因諷茂貞留選士四千宿衛以李繼筠繼徽總之𦙍亦諷朱全忠內兵二千居南司以婁敬思領之韓偓聞汴歧交戍數諫止𦙍𦙍曰兵不肯去耳偓曰初何為召耶𦙍不對通鑑考異據韓偓金鑾密記謂𦙍召茂貞入朝仍留其兵若如補紀所言則昭宗西幸時兩道兵必先鬭於闕下否則汴兵皆為宦官所誅否則皆先遁去今皆無此事𦙍所以欲留茂貞兵者蓋以茂貞自以誅季述為己功必能與己同心讐疾宦官耳今從之又據密記九月偓又奏云本駐侍衛兵馬制伏宦者今𠡠使衛兵合為一體甚難為計乞差使宣示茂貞且說其僭慢之狀速令抽退衛軍兼遣人密與李繼徽語使其止遏具言人情忿怒如此則東諸侯之師旦夕必至於國家何利於卿家亦何利繼徽必竭力匡扶今日狀候臣春初已知必至此蓋𦙍為一二人所誤不計其所終當駐兵之時臣屢與𦙍力爭𦙍無以對臣與𦙍言纍日言於令狐滈請極力發遣滈云若無歧軍則上公必為內官所圖臣曰無兵則國家俱安有兵則國家難保𦙍良久謂臣曰必當萬計斷送翌日臣又見𦙍𦙍云且喜歧兵只駐三千人臣曰只數十人便可為患况三千人耶𦙍不樂而罷上下無不痛惜此事今朕兆已成悔之無及臣料𦙍之謀急則召東諸侯兩鎮之兵鬬於闕下朝廷危矣上曰只有且用繼徽又十月上曰全忠軍勢恐必來若到闕下兩軍相見必大段不安熟為籌之對曰全忠亦未便輕進必且往河中或駐陜府以候勑分乞陛下處分崔𦙍飛書與全忠貽書茂貞云宦官叛逆聖上不安勑分處分皆不遵承天下人情以為不可某今領兵以進君側必望令公同成勳烈便請抽却侍衛兵士并便擒捉罪人致於明庭䖍候聖㫖茍茂貞不肯抽軍詔全忠赴闕下觀此則當時不曽留汴兵新傳補紀之言未可憑也東平王全忠陷絳晉二州解題曰按實録全忠既服河朔三鎮欲窺王室篡代之謀益露以李克用在太原懼兵犄角乃襲河中餘見通鑑二月戊辰陷河中執王珂封全忠梁王以新紀修解題曰全忠自是以河中為巢穴矣按舊五代史自王重榮帥河中至珂三世二十年又云克用自是不能援京師霸業由是中否户部侍郎王溥為中書侍郎吏部侍郎裴樞為户部侍郎同平章事以新紀修三月梁王全忠陷沁澤二州攻潞州降孟遷夏四月丁巳陷遼州己未拔承天軍以通鑑新紀修解題曰克用於是三失潞州矣承天軍在太原府廣陽縣今屬平定軍往年葛從周自土門攻河東拔之今日奉德㑹成德兵自井陘入又拔之丁丑大赦改元雪王涯等十七家以通鑑修解題曰韓偓金鑾密記上問崔𦙍請於兩軍取鹽麯如何對曰鹽麯本度支課利張濬判使日楊復恭奏請權借一年自此索未得今度支庶事不濟若復舊制公用稍寬上然之按此係鹽麯二事通鑑止云賣麯之利何也汴兵圍太原不克五月還吕祖謙標目修梁王全忠自為宣武宣義天平護國節度使以吕祖謙標目修六月梁王全忠如河中以通鑑修晉王克用陷隰慈二州以新紀修崔𦙍召梁王全忠秋七月還汴冬十一月己酉朔梁王全忠陷同州以吕祖謙標目修解題曰全忠又兼并關中矣壬子韓全誨等劫帝西幸以新紀修解題曰范祖禹曰崔𦙍本與韓全誨有隙故各倚強藩以為外援而歧汴亦憑宦官宰相以制朝廷故𦙍召全忠而全誨劫帝西幸唐室之亡由南北司相吞滅而人主受其禍豈不足為將來之永鑒哉事見通鑑梁王全忠徙韓建為忠武節度使取華州以吕祖謙標目修壬戌帝至自鳳翔以通鑑修丁卯兵部侍郎盧光啓為諫議大夫參知機務以新紀修戊辰梁王全忠軍鳯翔以通鑑修甲戌崔𦙍裴樞罷新紀丁丑梁王全忠陷邠州降節度使楊崇本以舊五代史本紀修是嵗清海節度使徐彥若卒劉隱自稱留後以吕祖謙標目修解題曰自是河東不敢出兵者五年遣金吾將軍李儼拜楊行密為東面都統中書令吳王以討朱全忠以通鑑修夏四月盧光啓罷以新紀修五月爵錢鏐越王以通鑑修六月丙子中書舍人蘇檢為兵部侍郎同平章事以新紀修丁丑梁王全忠軍虢縣歧王茂貞擊之大敗以吕祖謙標目修解題曰按新舊史傳全忠攻鳯翔𦙍居華州為全忠畫王之䇿先是全忠雖據河南憚強諸侯未敢萌問鼎之志及得𦙍為鄉導乃電擊潼關始謀移國自古與盜合從覆亡宗社無如𦙍之甚餘見通鑑吳王行密陷升州以吕祖謙標目修吳王行密發兵討梁至宿州而還以通鑑修秋七月梁王全忠陷成隴二州以新紀通鑑修解題曰全忠又兼併秦隴矣八月韋貽範起復新紀越將徐綰作亂以通鑑修王建陷興元以新紀通鑑修九月丁未歧王茂貞及梁王全忠戰于槐林敗績以新紀修解題曰按敬翔朱梁開創遺編録李茂貞於東門大出兵步卒皆於槐林排陳全忠出軍殺戮騎兵奔入北門則槐林止在鳯翔府門外爾癸亥以歧王茂貞為鳯翔靜難武定昭武節度使以通鑑修解題曰昭武節度使見大厯二年山南西道解題吳將田頵攻杭州以通鑑修冬十月吳王行密建制敕院以通鑑修王建陷興州新紀十一月癸卯朔保大節度使李周彞救鳯翔以舊五代史本紀修解題曰保大節度使見建中四年渭北節度使解題梁王全忠陷坊鄜二州以吕祖謙標目修韋貽範薨以新紀通鑑修十二月李周彞降于梁以新舊五代史紀修吳王行密召田頵頵以徐綰歸以通鑑修唐昭宗皇帝天復三年春正月帝出居于鳳翔以春秋修王師範起兵討梁王全忠丙午其行軍司馬劉鄩取兖州以新紀通鑑修戊申韓全誨等伏誅甲子帝幸梁王全忠營丁卯工部尚書崔𦙍為門下侍郎同平章事乙巳帝至自鳯翔哭于太廟解題曰王容曰帝在鳯翔凡一年有餘而還朱全忠自是竊國柄矣庚午崔𦙍以全忠殺宦官七百餘人解題曰歐陽修曰自古宦者亂人之國其源深於女禍女色而已宦者之害非一端也蓋其用事也近而習其為心也專而忍能以小善中人之意小信固人之心使人主必信而親之待其已信然後懼以禍福而把持之雖忠臣碩士列于朝廷而人主以為去已踈逺不若起居飲食前後左右之親為可恃也故前後左右者日益親則忠臣碩士日益踈而人主之勢日益孤勢孤則懼禍之心日益切而把持日益牢安危出其喜怒禍患伏於帷闥則向之所謂可恃者乃所以為患也患已深而覺之欲與踈逺之臣圖左右之親近緩之則養禍而益深急之則挾人主以為質雖有聖智不能與謀謀之而不可為為之而不可成至其甚則俱傷而兩敗故其大者亡國其次亡身而使姦豪得借以為資而起至抉其種類盡殺以快天下之心而後已此前史所載宦者之禍常如此者非一世也夫為人主者非欲養禍於內而踈忠臣碩士於外蓋其漸積而勢使之然也辛未𦙍判六軍十二衛事以舊紀通鑑修吳王行密遣兵擊杜洪以通鑑修二月甲戌陸扆貶為沂王傅新紀丙子王溥罷新紀梁王全忠殺蘇檢及吏部侍郎盧光啓以新紀修己卯以輝王祚為諸道兵馬都元帥庚辰梁王全忠自為守太尉副之以新紀通鑑修崔𦙍為司徒新紀以檢校禮部尚書敬翔為太府卿以舊五代史列傳通鑑修解題曰按新五代史列傳昭宗自歧還長安召翔與李振升延喜樓勞之拜太府卿初全忠本文作太祖後倣此常侍殿上昭宗意衛兵有能擒之者乃徉為鞋結解以顧全忠全忠跪而結之而左右無敢動者全忠流汗洽背自此稀復進見昭宗遷洛陽宴崇勳殿酒半起使人召全忠入內殿將有所託全忠益懼辭以疾昭宗曰卿不欲來可使敬翔來全忠遽麾翔出亦佯醉去事見通鑑癸未貶翰林學士承㫖韓偓為濮州司馬以通鑑修解題曰按偓詩集自貶濮州後其詩皆以甲子自記所在豈亦欲效陶潛之於宋耶乙丑天祐二年也在袁州得人賀除承㫖有詩丁卯梁開平元年也聞再除前職又有詩皆言不往之意是兩召皆辭癸酉乾化二年也載其在南安之作終身不食梁祿大節與司空圖略相等乙未清海節度使裴樞為門下侍郎同平章事以新紀修梁王全忠留兵萬人于京師戊戌還鎮以通鑑修解題曰茂貞留兵三千而昭宗遷鳯翔全忠留兵萬人而昭宗遷洛陽矣事見通鑑三月梁王全忠遣兵圍兖州自將圍青州以通鑑修成汭及馬殷救杜洪以通鑑修夏四月梁王全忠判元帥府事以新紀修五月馬殷遣將襲江陵庚戌陷之成汭及吳將戰於君山敗死以新紀通鑑修崔𦙍募衛兵以通鑑修解題曰昭宗再使諸王掌兵而茂貞韓建間之崔𦙍召募衛兵而朱全忠忌之猶太阿之倒持也事見通鑑六月王師範以吳兵擊梁將朱友寧大破斬之以新紀通鑑修秋八月戊辰朔梁王全忠留其將楊師厚攻青州而還以通鑑修庚辰爵王建蜀王守司徒以通鑑修吳宣潤二州作亂遣將討之以通鑑修九月癸卯楊師厚大破王師範降之遂陷淄青二州以吕祖謙標目修解題曰按舊五代史李振至青州王師範即日受代而疑撓特甚屢揮泣求貸其族振諭之曰公不念張繡事耶繡與曹公為敵袁紹遣使招繡賈詡曰曹公不以私讐為意不宜疑之今梁王亦豈以私害忠賢耶師範大悟梁王表振為青州留後餘見通鑑冬十月蜀王建陷䕫州以吕祖謙標目修劉鄩降梁以通鑑修趙匡凝襲荆南取之以其弟匡明為留後以通鑑修歧王茂貞及楊崇本兵逼京畿以舊紀通鑑修十二月乙亥吳克宣州殺寧國節度使田頵以通鑑修裴贄罷禮部尚書獨孤損為兵部侍郎同平章事以新紀修丙申梁王全忠殺致仕張濬以新紀修唐昭宗皇帝天祐元年春正月乙巳梁王全忠表罷崔𦙍為太子少傅兵部尚書崔逺為中書侍郎右拾遺栁璨為右諫議大夫同平章事戊申𦙍等伏誅以新紀修解題曰按新舊史列傳初天子還宫全忠東歸𦙍以事權在己慮全忠急於篡代乃與鄭元規謀招致兵甲以扞李茂貞為辭全忠知其意許之元規為六軍諸衛副使陳班為威逺軍使毁浮圖取銅鐵為兵仗全忠隂令汴人數百應募以其子友倫入宿衛㑹為毬戲墜馬死全忠疑𦙍隂計大怒時傳𦙍將挾帝幸荆襄而全忠方謀脅乘輿都洛懼其異議密表𦙍專權亂國請誅之即罷為太子少傅令其子友諒以兵圍開化坊第萬年縣朱雀街東從北第二坊殺𦙍汴士皆出市人爭投瓦礫擊其尸元規班皆死餘見通鑑己酉梁王全忠屯河中劫帝遷都洛陽二月乙亥帝至陜全忠來朝以新紀通鑑修解題曰按汴水滔天録鑾輿幸陜州其夕宿寶應縣夜分雪甚凍死者萬餘人餘見通鑑封子五人為王以新紀修三月丁未全忠兼判左右神䇿及六軍諸衛以新紀通鑑修以長安為佑國軍韓建為節度使以吕祖謙標目修解題曰通鑑考異曰河南府先已為佑國軍今京兆府乃與同名者蓋車駕既在河南則無用軍額故移其治於京兆耳天祐三年鄭賨猶為西京留守判官然則雖立軍額京名尚在吳遣兵擊杜洪朱熹綱目閏四月甲辰帝自西都至洛陽乙巳改元戊申以宫苑使蔣𤣥暉為宣徽南院使兼樞密使以吕祖謙標目修爵錢鏐吳王以通鑑修爵長沙郡王羅紹威鄴王以通鑑修五月辛未梁王全忠還鎮以通鑑修六月歧王茂貞晉王克用蜀王建楊崇本等傳檄討梁王全忠秋七月壬申全忠屯河中八月壬寅使蔣𤣥暉等弒帝癸卯立輝王祚為皇太子更名柷丙午即皇帝位九月己巳尊皇后為皇太后辛未全忠還鎮以新舊史紀通鑑修解題曰按新五代史列傳當殺昭宗時諸王宗屬數百人皆遇害而同為一坎瘞於龍興寺北餘見通鑑范祖禹曰唐末藩鎮惟李克用最為有功雖嘗跋扈而終不失臣節若倚為藩翰使太原之勢常重則諸鎮未敢窺唐也而唐以其戎狄之人疑而不信是以不競於汴而全忠獨強吞噬諸鎮卒滅唐室自古忠者不見信而信者不忠豈有不亡者乎冬十月辛卯朔日有食之通鑑癸巳梁王全忠來朝歸罪於左右龍武統軍朱友恭氏叔琮而殺之乙巳還鎮以新舊紀修解題曰孫愐唐韻氏字子盈切狋氏縣名十二月以劉隱為節度使以通鑑修唐昭宗皇帝天祐二年解題曰宋庠紀年通譜不敢改元忌全忠之逼也春正月吳王行密克潤州以新紀通鑑修庚子吳克鄂州殺杜洪以吕祖謙標目修二月戊戌梁王全忠殺德王裕等九人朱熹綱目己酉葬和陵廟號昭宗以通鑑修解題曰歐陽修贊曰自古亡國未必皆愚庸暴虐之君也其禍亂之來有漸積及其大勢已去適丁斯時雖有智勇有不能為者矣可謂真不幸也昭宗為人明雋初亦有志於興復而外患已成內無賢佐頗亦慨然思得非常之材而用匪其人徒以益亂自唐之亡更五代五十餘年至於天下分裂大壞極亂而後止跡其禍亂其積漸豈一朝一夕哉三月裴樞獨孤損罷禮部侍郎張文蔚同平章事甲申崔逺罷吏部侍郎楊涉同平章事以新紀修夏四月庚子彗星見西北甲辰出于北河以朱熹綱目修五月梁王全忠貶裴樞獨孤損崔逺陸扆王溥為外州司户六月戊子朔殺樞等三十餘人以吕祖謙標目修解題曰范祖禹曰白馬之禍至今悲之歐陽修有言一太常卿與社稷孰為重使樞等不死尚惜一卿其肯以國與人乎雖樞等之力不能存唐必不亡唐而獨存也是不然昭宗返自鳯翔篡奪之勢成矣樞乃被其薦引為宰相全忠之劫遷也昭宗未及下樓樞受賊㫖已率百官出長安東門昭宗卒以弒殞而唐遂亡由此觀之樞為忠於李氏乎忠於朱氏乎且長安與一太常卿孰重國亡君弒與流品不分孰急樞不惜長安以與全忠乃惜一卿不與廷範不恤國亡君弒而恤流品之不分其愚豈不甚哉夫樞非有忠義之心能為社稷也不勝利欲之心畏全忠而附之弒其君父既從之矣以為除太常卿小事也持之不與未必咈全忠之心欲微示人以至公而不意全忠之怒至此也全忠以為此小事也猶不從己其肯聽己取天下乎是以肆其誅鋤無所不至不知樞等實非能為唐輕重乃全忠疑之過也使樞等有存唐之心當全忠之劫遷端委而受刃於國門天下忠義之士聞之必有奮發而起者矣樞不為此而惜一卿不死於昭宗之弒而死於廷範之事處身如此豈能為國慮乎白馬之禍蓋自取之也事見通鑑秋七月卜郊新紀八月徴前禮部員外郎司空圖尋放還山以朱熹綱目修梁王全忠擊趙匡凝九月陷襄陽匡凝奔淮南丁卯趙匡明奔成都梁王全忠陷荆南以吕祖謙標目修解題曰全忠又規度漢南也事見通鑑封弟二人為王以新紀修乙酉改卜郊新紀冬十月丙戌朔梁王全忠自為諸道兵馬元帥以通鑑修改昭宗廟號曰襄宗以通鑑修梁王全忠攻吳弗克十一月還以吕祖謙標目修庚午三卜郊新紀庚辰吳王行密薨其子淮南留後渥自稱節度大使東面都統𢎞農郡王以新史列傳通鑑修辛巳梁王全忠自為相國魏王加九錫十一月自為天下兵馬元帥復不受蔣𤣥暉伏誅以新紀修栁璨為司空新紀己酉梁王全忠弒皇太后以新紀通鑑修辛亥罷郊新紀癸丑貶司空栁璨為登州刺史甲寅璨及太常卿張廷範伏誅以新紀修唐昭宗皇帝天祐三年春正月庚午鄴王紹威以梁王全忠誅牙兵以通鑑修三月戊寅梁王全忠自為鹽鐵度支户部三司都制置使復不受以通鑑修解題曰三司之名始此夏四月癸未朔日有食之通鑑鎮南節度使鍾𫝊卒其子匡時自稱留後以新紀修解題曰按新五代史列傳傅居江西三十餘年蓋自乾符四年已陷撫州矣天雄軍亂梁王全忠討平之秋八月克相州而還以新紀通鑑修九月梁王全忠攻滄州以通鑑修楊偓克洪州自兼鎮南節度使以吕祖謙標目修楊崇本以鳯翔涇原鄜延秦隴之兵攻夏州以新紀通鑑修解題曰按新紀書楊崇本㑹鳯翔涇原鄜延秦隴兵以討朱全忠蓋六鎮也通鑑書靜難節度使以鳯翔保塞彰義保義之兵攻夏州則五鎮也保塞延州也彰義涇原也保義陜虢也鄜州時為保大軍秦隴時為保勝軍通鑑蓋闕保勝而又誤以保大為保義也劉仁恭救滄州兵始文面以吕祖謙標目修解題曰胡寅日伊訓曰臣下不匡其刑墨孔安國曰鑿其額以墨涅之吕刑曰苖氏淫為劓刖㭬黥孔安國曰黥其面也然則涅其額者乃五刑之正而黥其面者乃五虐之法也至劉仁恭朱全忠籍民為兵無罪而黥之使終身不能去非至不仁者孰忍為也其可以為故常而無改易耶事見通鑑冬十月丙戌蜀王建承制封拜以通鑑修晉王克用攻潞州以救燕以通鑑修梁王全忠遣匡國節度使劉知俊救夏州大敗楊崇本于美原以新紀通鑑修解題曰同州唐曰匡國梁改忠武後唐復匡國美原京兆府縣梁王全忠以頴州防禦使髙季興為荆南留後以吕祖謙標目修閏十二月晉王克用陷潞州昭義節度使丁㑹降晉梁王全忠還以吕祖謙標目修解題曰李克用於是三得澤潞矣大事記續編卷七十
