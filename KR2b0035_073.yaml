body:
  text: 大事記續編卷七十三明王禕撰唐明宗皇帝李亶天成元年越吳睿帝順義六年漢髙祖皇帝白龍二年吳王錢鏐寶貞元年南楚王馬殷丹南平王髙季興天閩王王延翰契太宗皇帝德光顯元年春正月唐朱友謙入朝以通鑑修甲子唐魏王繼岌以皇后教殺郭崇韜及其子參預兵機任圜總軍政以通鑑修唐主殺郭崇韜諸子又殺弟睦王存義族誅朱友謙以通鑑修二月唐魏博軍將趙在禮反于貝州癸巳陷鄴都命歸德節度使元行欽招撫之以朱熹綱目修解題曰魏牙兵劫賀德倫西降而莊宗因以滅梁及趙在禮叛李嗣源入魏而唐亦亡興唐者牙兵也亡唐者亦牙兵也作使作敵呼吸間爾可不畏哉事見通鑑丁酉唐保義節度使康延孝反于劒州魏王繼岌遣任圜討之以朱熹綱目修唐邢州兵趙太反遣東北面招討使霍彥威討之以通鑑修唐命李嗣源討魏州以通鑑修唐任圜大破康延孝於漢州尋誅之以通鑑修三月丁巳朔唐趙太伏誅以新紀修唐以王延翰為節度使以朱熹綱目修乙丑唐李嗣源入于魏與趙在禮俱反以新紀通鑑修唐諸道多殺監軍以吕祖謙標目修唐左射軍使石敬瑭説李嗣源取汴州嗣源使為先鋒以新紀通鑑修唐族誅王衍以新紀修乙亥唐主如汴州壬午李嗣源入汴唐主還夏四月丁亥朔從馬直指揮使郭從謙弒之己丑嗣源入洛陽甲午監國解題曰按新舊史實録二月六日趙在禮據魏州莊宗遣元行欽將兵攻之不利退保澶州丁未行欽以諸道之師再攻鄴都賊無降意命李嗣源統親軍赴鄴帝素倚愛元行欽鄴城軍亂即命為招討使久而無功時趙太據邢州詔霍彥威討之王景戡據滄州帝欲親征樞密使宰臣言四方有變但命將出征奚煩躬御士伍帝曰無可將者斷在自行馬紹宏即李紹宏等曰李嗣源陛下宗臣威名振於夷夏若委以專征冦不足平帝素寬大無疑於物自誅崇韜友謙之後閹豎伶官交搆讒諂由是漸多猜惑不欲大臣典兵乃曰當擇其次者又奏非嗣源不可張全義亦奏宜令總管進兵乃命嗣源行營三月丁巳朔彥威收復邢州嗣源至魏軍城西行欽軍城南彥威還以兵屬嗣源八月命詰旦進攻是夜從馬直軍吏張破敗謀殺都將縱火燒營遲明逼嗣源營親軍拒戰亂兵益盛嗣源叱之曰自吾為帥十有餘年何負爾輩今賊城破在旦夕乃爾輩立功名取富貴之時况爾天子親軍反效賊耶對曰將士十年血戰於國有功昨貝州戍卒思歸主上不垂原宥又從馬直兩人醉競而欲盡誅其衆且聞破魏之後盡坑魏博之軍某等初無叛心直畏死耳今宜與城中合勢擊退諸道之師欲主上帝河南令公帝河北且與軍民為主嗣源泣諭之曰余與主上位則君臣親則骨肉爾不從吾命任爾所為自歸朝當取上旨亂兵抽刀露刃環繞嗣源曰今公欲何之安重誨霍彥威躡嗣源足請詭之亂軍擁嗣源彥威入鄴趙在禮迎嗣源謝曰軍士負令公敢不惟命是聽皇甫暉擒張破敗斬之部兵在外者聞嗣源反皆潰散嗣源謂在禮曰欲建大事非兵不集此輩不可令散卿等守城吾於城外招撫之嗣源得出夜宿魏縣親軍稍有至者髙逺南唐烈祖實録明宗附傳魏博反同光不得已而用之既至鄴內外不謀同辭俱請天成為主閻自若唐末泛聞録趙在禮襲據魏府以叛諸將不能克起明宗討之在禮等開門迎明宗上尊號元行欽步騎萬人營城南嗣源密令張虔釗戒之曰且堅壁勿動計會同殺亂軍行欽不聽棄甲而退嗣源部下不滿百人時彥威將鎮州兵獨全聞嗣源得出相率歸嗣源嗣源掩泣曰來日歸藩上章請罪一任聖裁重誨彥威曰此䇿非宜國家付以閫外之事不幸為賊驚奔元行欽未聞戰聲無故棄甲如到闕之後信彼奏陳何所不至若歸藩聽命便是強據邀君正當星行歸闕以沮間謀嗣源曰善翌日之相州獲官馬二千匹始得成軍行欽保退衛州奏曰鎮帥入賊軍終不為國家用嗣源一日之中上章申理者數輩嗣源長子從審為金槍指揮使帝謂從審曰吾深知爾父忠厚因遣內官白從訓與從審宣詔諭嗣源行欽將殺之從審曰我父為亂兵所迫公等不亮其心而更加離間如此我亦不能省父願歸宿衛乃許之嗣源章奏不逹旬日之間音驛斷絶嗣源憂疑左射軍石敬瑭曰猶豫者兵家大忌必若求訴宜決其行某願率三百騎先趨汴水以探虎口如遂其志請大軍速進夷門天下要害得之可以成事康義誠曰主上不慮社稷阽危不思戰士勞苦禁骨肉於宫中囚功臣於闕下荒耽禽色沉溺酒樂今從衆則有歸守節則將死嗣源納其言李從珂在橫水率其軍趨常山會王建立倍道而南嗣源以行欽在衛州自白臯史朝義自白臯渡河會汴州楊光逺自白臯趨滑州渡河遣敬瑭將三百騎為先鋒從珂軍其後癸酉上遣懷逺指揮使白從暉領騎扼河陽橋甲戌行欽率兵歸京上幸鷂店勞之行欽曰鄴都亂兵已據博州翟建自為刺史將渡河襲汴鄆請車駕幸關東招討之乙亥次石橋陸機洛陽記城東有石橋丁丑次汜水關今屬孟州汜水縣改為行慶關戊寅令行欽沿河東向將士多亡於道獨李從審不去左右或勸其逃不聽帝聞嗣源已渡黎陽復欲遣從審通問行欽以為不可遂殺之上至滎澤今鄭州縣東曹州刺史西方鄴方以兵屯汴州嗣源渡河而帝東幸汴州汴州節度使孔循使北門迎嗣源西門迎帝供帳委積如一曰先至者入之鄴責循曰主上破梁而得公有不殺之恩奈何欲納總管而負國循不答鄴度循不可爭而石敬瑭妻嗣源女也時方在汴鄴欲殺之以堅人心循知其謀取藏其家鄴無如之何壬午嗣源入汴鄴將五百騎西迎帝於汜水嗚咽泣下帝亦為之噓唏龍驤指揮使姚彥溫三千騎為前軍彥溫奔汴州曰京師危迫主上為行欽所惑事勢已離難與共事嗣源曰汝自不忠何言之悖也即奪其師時王村寨有芻粟數萬潘環保其壘上令騎軍急視之環亦歸汴州上神色沮喪至萬勝鎮在今東京中牟縣即命旋師是夜次汜水關帝出關從駕兵二萬五千及復至汜水已失萬餘人甲申還宫初衛兵散走京師恐駭及帝至人情稍安嗣源命敬瑭前軍入汜水收撫亂兵而房知溫杜晏球自北靣繼至唐末泛聞録帝親征明宗過河先據汴州帝亦尋至畏其鋒不敢進信宿班師明宗躡之二日一夜在道降其衆十七八丙戌馬紹宏與宰相同奏魏王西軍將至車駕且宜控汜水賫詔撫諸軍以俟魏王上從之出上東門宋敏求河南志京城東靣三門之北門親閲騎軍戒以詰旦東幸四月丁亥朔從駕馬軍陳於宣仁門外河南志東城東門直外郭正東門步兵陳於五鳯門外河南志宫城正南應天門天祐改五鳳從馬直指揮使郭從謙自本營露刀大呼與黃甲兩軍射興教門河南志宫城南面次東門上率諸王近衛騎軍禦之逐亂兵出門步人始亂蕃漢馬步軍都虞候朱守殷將騎兵陳門外急召守殷守殷不動亂兵焚門緣城而入登宫墻歡譟上御親軍格鬭俄而樓上流矢犯御崩於絳霄殿河南志廣夀殿西曰明福門內太清殿正寢也本絳霄殿太平興國改之廄下皇后與元行欽皇弟存渥焚嘉慶殿河南志建禮門之西明宗重修改廣夀殿自師子門河南志城西門之俗名也遁去守殷在北邙憩於茂林聞凶問即馳入宫中選載嬪御寶貨以歸恣軍士劫掠翌日方定嗣源入罌子谷聞釁慟哭謂諸將曰君父如此吾安所歸守殷遣人馳報京城大亂燔剽不息願令公速救亂己丑嗣源至洛陽止于舊宅河南志本羅紹威第天成元年為至德宫命諸將止焚剽謂守殷曰公善巡徼以待魏王淑妃德妃在宫供膳尤宜豐厚不正守殷掠宫人竊珍玩之罪而望以扶持宗社之事此言豈發於誠心哉吾奉山陵畢社稷有奉則歸藩為國家當北面之事是日豆盧革率百僚拜箋勸進嗣源靣諭之曰吾奉命討賊不幸部曲離散及單騎歸朝又被行欽阻構倒行逆施吾本無心諸君遽此見推殆非相悉吾執心有素勿復再言馬紹宏等言廟社無依願俯徇樂推不從壬辰三箋請行監國之禮從之甲午朝羣臣于興聖宮河南志東宫在蒼龍門西興聖宮以東宫為之明宗初居東宫示謙也丙午自興聖宫赴西宫服斬衰於柩前即帝位餘見通鑑莊宗實録係明宗時宰相趙鳳修明宗實録係潞王時宰相姚顗修其紀嗣源入鄴已後類非實録薛居正遂取以為正史司馬光又據以為通鑑覽者當詳之王禹稱五代史闕文曰世傳武皇臨薨以三矢付莊宗曰一矢討劉仁恭一矢擊契丹且曰阿保機與吾結為兄弟誓復唐社稷今背約附梁汝必伐之一矢滅朱溫汝能成吾志死無恨矣莊宗藏三矢于武皇廟庭及討劉仁恭命幕吏以少牢告廟請一矢盛以錦囊使親將負之以為前驅凱旋之日隨俘馘納矢於太廟伐契丹滅朱氏亦如之歐陽修曰方其繫燕父子以組函梁君臣之首入於太廟而告以成功其意氣之盛可謂壯哉及仇讐已滅天下已定一夫夜呼亂者四應倉皇東出未及見賊而士卒離散君臣相顧不知所歸至於誓天斷髮泣下沾襟何其衰也豈得之難而失之易歟抑本其成敗之迹而皆自於人歟書曰滿招損謙受益憂勞可以興國逸豫可以亡身自然之理也故方其盛也舉天下之豪傑莫能與之爭及其衰也數十伶人困之而身死國滅為天下笑夫禍亂常積於忽微而智勇多困於所溺豈獨伶人也哉又曰傳曰君以此始必以此終莊宗好伶而弒於門髙焚以樂器可不信哉通鑑考異曰監國太子非官非爵然唐明宗潞王周太祖皆嘗監國漢太后令曰中外事取監國處分又誥曰監國可即皇帝位時有以監國為稱號也乙未以中門使安重誨為樞密使殺元行欽解題曰按新史列傳行欽出奔至平陸野人執送虢州刺史折其兩足檻車送京師明宗見之罵曰我兒何負於爾行欽瞋目直視曰先皇帝何負於爾乃斬於洛陽市市人皆為之流涕歐陽修曰嗚呼死之所以可貴者以其義不茍生爾故曰主在與在主亡與亡者社稷之臣也方明宗兵變於魏諸將未知去就而行欽獨以反聞又殺其子至於斷髮自誓言其誠節有足嘉矣及莊宗之崩不能自決而反逃死以求生終於被執而見殺其言雖不屈而死非其志也烏足貴哉以石敬瑭為陜州留後孔謙伏誅廢租庸使及內勾司仍為三司殺諸道監軍以實録修唐魏王繼岌至渭南自殺任圜將其軍而東吕祖謙標目解題曰胡寅曰任圜參預軍機而主帥一旦至此是誰之過歟崇韜死圜即代總軍政繼岌死圜即將其衆而東其周身之智則賢於鍾會矣當變故時隂謀如此他日無故死於重誨之手非不幸也李愚職與圜同而寂無所施亦不得為無罪矣歐陽修以為向使張籛不斷橋使繼岌得東明宗未必能自立是不然繼岌受制從襲莫能可否使其有立豈以皇后教殺郭崇韜既聞大變整比六師倍道赴難豈斷橋所能遏乎以彼之才政使東行夫豈嗣源之敵也事見通鑑辛丑唐監國嗣源放溫韜段凝歸田里壬寅以前知汴州孔循為樞密使以通鑑修丙午唐監國嗣源始奠於西宫即皇帝位解題曰徐無黨曰曰始奠見其緩也自己丑入洛至此二十餘日矣柩前即位嗣君之禮也反逆之臣自立而用嗣君之禮見其猶有自愧之心而欲逃大惡之名也事見通鑑庚戌殺太原尹張憲解題曰歐陽修曰憲之志誠可謂忠矣當其不顧其家絶在禮而斬其使涕泣以拒昭逺之説其志甚明至欲與存霸俱死及存霸被殺反棄太原而出奔然猶不知其心果欲何為也而舊史書憲坐棄城而賜死豫為之痛惜也事見通鑑殺皇后及諸王解題曰新五代史傳當莊宗過弒時太祖子孫在者十有一人明宗入立其四人見殺其餘皆不知所終太祖之後遂絶餘見通鑑甲寅大赦改元解題曰宋庠紀年通譜天成本蕭淵明操乞師髙開道安慶緒年號留後宫百人宦官三十人廢諸司使務遣諸軍就食近畿除夏秋稅省耗裁節度防禦貢奉以新紀通鑑修五月丙辰朔唐以太子賔客鄭珏工部尚書任圜為中書侍郎同平章事以新紀修唐初令百官常朝外五日起居轉對奏事以通鑑修解題曰按五代史列傳唐末喪亂天子未嘗視朝而入閣之制亦廢常參之官日至正衙者傳聞不坐即退獨大臣奏事一見便殿而侍從內諸司再朝而已御史中丞李琪謂非唐故事請罷五日起居而復朔望入閣明宗曰五日起居不可罷而朔望入閣可復唐故事天子日御殿見羣臣曰常參朔望薦食諸陵寢有思慕之心不能臨前殿則御便殿見羣臣曰入閣宣政前殿也謂之衙衙有仗紫宸便殿也謂之閣其自正衙喚仗由閣門而入百官俟朝于衙者因隨以入見故謂之入閣然衙朝也其禮尊閣宴見也其事殺乾符已後天子不能日見羣臣而見朔望故正衙常日廢仗而朔望入閣有仗其後遂以入閣為重至出御前殿猶謂之入閣其後亦廢至是而復然羣臣五日一入見中興殿便殿也此入閣之遺制而謂之起居朔望一出御文明殿前殿也反謂之入閣琪皆不能正也琪又建言入閣有待制次對官論事而內殿起居一見而退其欲言者無由而陳明宗乃詔起居曰有言事者許出行自陳又詔百官以次轉對葉夢得曰唐日御宣政殿遇朔望諸陵薦食則御紫宸猶今之忌前一日坐崇政殿也宣政未嘗不立仗若御紫宸則旋轉宣喚仗宰相押之由紫宸殿門而入百官隨進紫宸言閣猶古之言寢也中世亂離宣政不復御立仗之禮遂廢惟以隻日御紫宸而不設仗敬宗始復修之因使朔望陳仗紫宸亦謂之入閣後唐明宗詔羣臣五日一隨宰相入見謂之起居朔望出御文明前殿宋朝因之元豐始命侍從官以上日朝垂拱為常參朝官以上五日一朝紫宸為六參官京朝官以上朔望一朝紫宸為朝參官戊辰唐以趙在禮為義成節度使魏博卒皇甫暉趙大為刺史新紀實録解題曰按後周實録暉附傳明宗即位以暉有唱義功授陳州刺史自後纍為名郡明宗之本心如此他日從榮從厚之事其禍至慘天理真可畏哉事見通鑑乙亥唐以翰林學士馮道趙鳳為端明殿學士以吕祖謙標目修丙子唐聽郭崇韜歸葬復朱反謙官爵通鑑六月丁酉唐汴州軍亂庚子以孔循知汴州誅之以吕祖謙標目修唐以夔忠萬三州𨽻南平以吕祖謙標目修秋七月唐豆盧革韋説罷以新紀修辛巳契丹主安巴堅殂以吕祖謙標目修唐孟知祥增營兵以通鑑修八月乙酉朔日有食之通鑑九月契丹主德光立以吕祖謙標目修冬十月己丑土延翰自稱大閩國王以十國紀年修契丹盧龍節度使盧文進奔于唐以通鑑修己酉唐以客省使李嚴為西川都監以通鑑修十一月唐罷告身朱膠綾軸錢時試銜帖號正以寵將校長興以後卒伍胥吏皆得銀青階及憲官告身以萬數以吕祖謙標目修十二月閩建州刺史王延稟泉州刺史王延鈞弒其王延翰延鈞自為威武留後以朱熹綱目修契丹改元以五代會要修是歲吳越王鏐改元以五代史世家年譜修解題曰歐陽修曰按世家年譜五代十國稱帝改元者七吳越荆楚常行中國年號然豫聞故老謂吳越亦嘗稱帝改元而求其事迹不可得頗疑吳越後自諱之及旁採閩楚南漢諸國之書與吳越往來者多矣皆無稱帝之事獨得其封落星石為寶石山制書稱寶貞六年辛卯即知其嘗改元矣辛卯長興二年乃鏐之末世也錢氏訖五代嘗外尊中國豈其張軌之比乎今考臨安府水月寺幢云寶貞元年錢鏐建又招賢寺小昭慶金牛碼瑙等十幢皆二年至五年寶石山制書稱六年次年天竺日觀庵幢稱長興三年則復用唐正朔矣其年三月武肅薨方疾語其子元瓘曰子孫善事中國勿以易姓廢事大之禮於是以遺命去國儀用藩鎮法然則吳越有天寶寶大寶貞三號不止寶貞而已按余公綽閩王事迹吳越改元寶貞文穆薨稱世宗林仁志王氏啓運圖云吳越改元寶貞武肅王崩子世皇嗣世皇崩子成宗嗣則改元僣號可知所以祕而不彰者蓋當時僣偽諸國二蜀及唐史差完備惟吳越史皆子弟於後追書之故多為之隱諱也唐明宗皇帝天成二年越吳睿帝乾貞元年祖皇帝白龍三年吳王錢鏐寶貞二年南漢髙楚王馬殷王南平王髙季興二閩帝鏻契丹天顯年春正月癸丑朔唐主更名亶通鑑癸亥唐兵部侍郎馮道太常卿崔協為中書侍郎同平章事以新紀修庚午唐初令長吏每旬慮囚朱熹綱目解題曰漢書録囚顔師古注省録之知其情狀有寃滯與否今云慮囚本録聲之去者耳而俗訛為思慮之慮失矣集韻録省也通作慮以太玄蹛于狴獄三歲見録王涯説為據唐孟知祥殺李嚴以吕祖謙標目修二月丙申唐以郭從謙為景州刺史既而族之以新紀通鑑修南平王季興襲取夔州唐遣山南東道節度使劉訓討之以通鑑新紀修三月唐盧臺戍軍作亂夏四月庚寅討誅之以吕祖謙標目修五月癸丑唐以王延鈞為節度使琅琊王以通鑑修唐攻南平弗克庚午罷兵以吕祖謙標目修六月丙戌唐任圜罷以新紀修丙申唐封楚王殷為楚國王通鑑唐復取夔忠萬三州以吕祖謙標目修秋七月癸酉唐殺豆盧革韋説以新紀修八月己卯朔日有食之通鑑冬十月乙酉唐主如汴州宣武節度使朱守殷反尋伏誅以吕祖謙標目修乙未唐殺太子少保致仕任圜以新紀修辛丑吳徐溫卒吕祖謙標目十一月庚戌吳楊溥稱帝改元以朱熹綱目修吳以鎮海寧海行軍司馬徐知詢為節度使加徐誥都督中外軍事以通鑑修解題曰按大中祥符間太常博士許載吳唐拾遺録吳順義年中差官興版簿定租稅厥田上上者每一頃稅錢一貫一百中田一頃稅錢一貫八百下田一頃千五百皆見錢如見錢不足許依市價折以金銀并計丁口課調亦科錢宋齊邱時為貟外郎上䇿曰江淮之地唐季戰爭之所今兵革乍息黎氓始安而必率以見錢折以金銀此非民耕鑿可得也無非興販以求之是為教民棄本逐末耳是時絹每匹市賣五百紬六百綿每兩十五文請絹每匹擡為一貫七百紬為二貫四百綿為四十丁口課調亦請蠲除朝議喧然謂虧損官錢萬數不少齊邱致書于徐誥曰明公總百官理大國督民見錢金銀求國富庶所謂擁篲救火撓水求清欲火滅水清可得乎誥得書曰此勸農上䇿也即行之自是不十年間野無間田桑無隙地自吳變唐歸宋民到于今受其賜而九國志齊邱傳中略不書通鑑亦佚此事今因誥都督附見之十二月丙午唐追尊髙祖考妣已下為帝后别立廟于應州舊宅以朱熹綱目修唐明宗皇帝天成三年越吳睿帝乾貞二年祖皇帝大有元年吳王錢鏐寶貞三年南漢髙楚王馬殷王南平王髙季興三閩帝鏻契丹天顯年春正月契丹陷唐平州以通鑑修解題曰按舊史列傳同光中安巴堅欲大舉慮渤海踵其後三年討渤海之遼東令托諾盧文進據營平等州擾我燕薊德光天顯元年陷平州易州西北金坡關昌平縣西居庸關順州北古北口景州東北松亭關平州東渝關所以限蕃漢之勢契丹陷營平入於關內所以易為邊患二月丁丑朔日有食之通鑑乙未唐孔循罷以新傳修三月楚擊南平大破之以朱熹綱目修漢改元以通鑑修解題曰宋庠紀年通譜術者卜祚得火天大有故改元大有夏四月吳攻楚大敗以朱熹綱目修庚子唐以歸德節度使王晏球為義武招討使五月王都以奚契丹及晏球戰于曲陽大敗秋七月契丹復遣兵救都晏球大敗之于唐河北以吕祖謙標目修解題曰按新史列傳王都反以晏球為招討與宣徽南院使張延朗等討之都遣人北招契丹契丹遣秃餒萴刺將萬騎救都晏球聞秃餒等兵且來留張延朗屯新樂自逆於望都而契丹從他道入定州與都出不意擊延朗軍延朗大敗收餘兵會晏球趨曲陽中山府縣隋恆陽也都乘勝追之晏球先至水次方坐胡床指麾而都衆掩至晏球與左右十餘人連矢射之都衆稍却而後軍亦至晏球立髙岡號令諸將皆橐弓矢用短兵回顧者斬符彥卿以左軍攻其左髙行圭以右軍攻其右中軍騎士抱馬項馳入都遂大敗自曲陽至定州橫尸棄甲六十餘里都與秃餒入城不敢復出契丹又遣惕隱赫邈益秃餒騎七千晏球遇之唐河在今中山府望都縣即􅋤水也追擊至滿城今易州縣斬首二千級獲馬千匹契丹自中國多故強於北方北方諸夷皆畏服而中國之兵遭契丹者未嘗少得志自晏球擊敗秃餒又走惕隱其餘奔潰村落之人以鋤耰臼梃所在擊殺之無復遺類惕隱與數十騎走至幽州西為趙德鈞所執晏球攻破定州擒秃餒萴刺皆送京師明宗斬秃餒等六百餘人而赦赫邈契丹後數遣使至中國之威幾於大震而契丹少衰伏矣自晏球始也餘見通鑑唐以王延鈞為閩王朱熹綱目九月乙未唐溫韜段凝伏誅以通鑑修己亥唐復伐南平以吕祖謙標目修冬十二月丙辰南平王季興卒其子行軍司馬從誨自為荆南節度使以吕祖謙標目修唐史館修撰張昭逺請㨂皇子師傅辨嫡庶不能用以吕祖謙標目修唐明宗皇帝天成四年越吳睿帝大和元年祖皇帝大有二年吳王錢鏐寶貞四年南漢髙楚王馬殷王南平王髙從誨四閩帝鏻契丹天顯年春二月癸丑唐克定州王都自焚死以吕祖謙標目修庚午唐主至自汴州以新紀修夏四月壬子唐以子河東節度使從榮為河南尹判六軍諸衛事河南尹判六軍諸衛宣武節度使從厚為河東節度使以吕祖謙標目修解題曰按新史列傳從榮於諸皇子次最長又握兵柄然其為人輕雋而鷹視頗喜儒學為歌詩多招文學之士賦詩飲酒故後生浮薄之徒日進諛佞以驕其心自將相大臣皆患之明宗頗知其非而不能裁制嘗問曰爾軍政之餘習何事業對曰有暇讀書與諸儒講論經義爾明宗曰經有君臣父子之道然須碩儒端士乃可親之吾見先帝好作詩汝將家子文章非素習傳於人口徒取笑也吾老矣於經義雖不能曉然尚喜聞之其餘不足學也餘見通鑑甲寅唐兵部侍郎趙鳳為門下侍郎同平章事以新紀修五月乙酉唐追諡少帝曰昭宣光烈孝皇帝以新紀修六月唐罷鄴都以通鑑新紀修秋七月甲申唐以髙從誨為節度使以吕祖謙標目修九月癸巳唐制錢鏐以太師致仕以通鑑修冬十一月吳徐知詢自金陵入朝徐誥留之誥始專國政以吕祖謙標目修壬辰吳改元以通鑑修解題曰宋庠紀年通譜太和本文宗年號唐明宗皇帝長興元年越吳睿帝大和二年祖皇帝大有三年吳王錢鏐寶貞五年南漢髙湖南馬希聲鏻南平王髙從誨年閩帝王契丹天顯五春二月乙卯唐改元以新紀修三月壬申唐以李從曮為宣武節度使以吕祖謙標目修解題曰李茂貞以唐光啓元年節度鳳翔傳子凡四十四年庚寅唐立淑妃曹氏為皇后以新紀修夏四月戊戌唐河中衙內指揮使楊彥溫逐節度使李從珂辛亥殺彥溫以新紀修解題曰逐從珂安重誨之意也按新史列傳時明宗春秋已髙從珂本文作潞王於諸子次最長重誨謂從珂非李氏子後必為國家患乃欲隂圖之通鑑止載帝在真定時從珂嘗毆重誨重誨銜之遂疑其盡出於私意故不取新史戊午唐上尊號以新紀修五月唐孟知祥請以雲安等鹽監𨽻西川以通鑑修六月癸巳朔日有食之通鑑秋八月唐以前忠武節度使張延朗充三司使以吕祖謙標目修解題曰三司使始於此按舊史會要戶部度支鹽鐵唐以宰相各判一司不帶使額乾符後兵興隨處置租庸使以掌調發兵罷則停梁租庸使總天下征賦莊宗踵梁故事以孔謙充租庸使明帝思革其弊乃削去使名重臣一人專其事曰判三司餘見通鑑唐立子從榮為秦王從厚為宋王以新紀修九月唐董璋與孟知祥反庚辰陷閬州殺節度使李仁矩指揮使姚洪死之以吕祖謙標目修丙戌唐遣天雄節度使石敬瑭討董璋以吕祖謙標目修漢取交州朱熹綱目冬十月唐族誅董璋之子光業陷東川璋陷徴合巴蓬果五州十一月孟知祥陷渝瀘二州以朱熹綱目修楚王殷卒其子希聲自立始去國號以吕祖謙標目修乙亥孟知祥陷黔涪二州以吕祖謙標目修丙戌契丹東丹王突欲奔唐以新紀修十二月唐石敬瑭屯劍門不進以朱熹綱目修庚戌唐以馬希聲為武安靜江節度使以通鑑修癸丑唐遣安重誨督蜀軍吕祖謙標目唐明宗皇帝長興二年越吳睿帝大和三年祖皇帝大有四年吳王錢鏐寶貞六年南漢髙湖南馬希聲鏻南平王髙從誨年閩帝王契丹天顯六春正月庚午西川孟知祥陷遂州唐武信節度使夏魯竒死之以吕祖謙標目修唐召安重誨還二月己丑朔石敬瑭還兩川兵追之孟知祥據利州辛丑重誨罷孟知祥陷忠州三月陷萬夔二州以吕祖謙標目修唐以李從珂為左衛大將軍乙酉復吳越國王鏐官爵以通鑑修解題曰於是知安重誨之禍迫矣歐陽修曰重誨既以天下為己任遂欲內為社稷之計而外制諸侯之強然其輕信韓政之譛而絶錢鏐之臣徒陷彥溫於死而不能去潞王之患李嚴一出而知祥二仁矩未至而董璋叛四方騷動師旅並興如投膏止火適以速之耳事見通鑑丁亥唐太常卿李愚為中書侍郎同平章事以新紀修夏四月閩奉國節度使王延稟率建州兵襲福州尋敗死以通鑑修五月己卯唐以宣徽使孟漢瓊知內侍省事以通鑑修閏月唐殺太子太師致仕安重誨及其妻子丙午唐使諭西川以重誨專命致討之罪以新紀通鑑修解題曰按五代闕文李從璋奮一擊重誨於地重誨曰重誨死無恨但不與官家誅得潞王他日必為朝廷之患言終而絶新史亦有取焉通鑑考異謂重誨自以私憾欲殺從珂時從珂未有跋扈之迹重誨何以知其為朝廷之患此恐清泰篡立之後譽重誨者造此語夫重誨於從珂固有私憾然養子之禍不待智者而知况重誨乎歐陽修掊擊重誨不遺餘力獨於從珂一節為之抑揚感慨蓋有深意事見通鑑六月丙子唐均田稅以朱熹綱目修秋九月吳以徐知詢為鎮南節度使以通鑑修冬十一月甲申朔日有食之通鑑吳徐誥為鎮海寧國節度使鎮金陵以其子參政事璟為司徒右僕射致仕宋齊邱並同平章事以通鑑修十二月甲寅朔唐初聽民鑄田器收農具錢以通鑑修漢愛州將楊廷藝據交州以吕祖謙標目修唐明宗皇帝長興三年王吳睿帝大和四年髙南漢髙祖皇帝大有五年楚馬希聲南平王從誨吳越王錢元瓘顯閩帝王鏻契丹天七年春二月唐爵髙從誨渤海王以通鑑修三月庚戌吳越王鏐卒子元瓘立以朱熹綱目修孟知祥屢説董璋表謝不從夏四月璋襲知祥五月知祥至漢州禦之璋敗走死六月知祥兼領東川節度使以吕祖謙標目修秋七月辛卯馬希聲卒其弟鎮南節度使希範自立以朱熹綱目修庚子唐以李從珂為鳳翔節度使以吕祖謙標目修九月壬午唐以馬希範為武安節度使以通鑑修冬十月己酉朔唐詔孟知祥得除劍南節度使以下官以通鑑修十一月丁亥唐以河陽節度使石敬瑭為河東節度使大同彰國振武威塞等軍蕃漢馬步總管以五代會要修解題曰按新史四夷附録距幽州七百里有餘渝關東臨海北有兔耳覆舟山山皆斗絶並海東北有路狹僅通車其傍地可耕植唐置東西狹石等戍以扼契丹於此戍兵常自耕植惟衣絹歲給幽州久之皆有田宅養子孫以堅守為己利自唐末幽薊戍兵廢散契丹因得出陷平營而幽薊之人歲苦冦鈔自涿州至幽州百里人迹斷絶轉餉常以兵護送趙德鈞鎮幽州置良鄉縣又於幽州東五十里築城及破赫邈等又於其東置三河縣幽薊之人始得耕牧而輸餉可通耶律德光乃西徙橫帳居摖刺泊出冦雲朔之間明宗患之以石敬瑭鎮河東總大同彰國振武威塞等軍禦之職方考新州唐置威塞軍應州故屬大同軍唐明宗置彰國軍吳縝纂誤案劉延朗傳廢帝入立晉髙祖來朝復授河東而遣之時契丹冦北邊以為大同振武威塞彰國等軍馬步都總管屯欣州張敬達傳清泰二年契丹數犯邉以河東節度使石敬瑭兼大同彰國振武威塞等軍蕃漢馬步都總管屯欣州廢帝紀清泰元年九月契丹冦邊十二月冦雲州二年五月契丹冦邉則晉髙祖清泰二年始兼大同等都總管遂疑總管之授非出於長興之時今按五代會要髙祖以長興三年十一月授北京留守兼大同振武威塞彰國馬步總管范質五代通録契丹冦雲州明宗擇威望大將以禦之以帝為太原節度使兼大同振武匡國威塞等軍蕃漢馬步總管廢帝復以為河東節度使總管如故縝所疑皆過也唐蔚州刺史張彥超降契丹以通鑑修唐石敬瑭以部將劉知逺為都押衙以通鑑修唐明宗皇帝長興四年王吳睿帝大和五年髙南漢髙祖皇帝大有六年楚馬希範南平王從誨吳越王錢元瓘丹閩帝王鏻龍啓元年契天顯八年春正月閩王延翰稱帝改元更名鏻以吕祖謙標目修二月乙卯以馬希範為武安武平節度使以通鑑修戊午唐李仁福卒其子彛超自稱定難留後以通鑑修癸亥唐以孟知祥為東西川節度使蜀王通鑑三月癸未唐以彰武節度使安從進為定難留後李彛超為彰武留後彛超不奉詔命從進討之以朱熹綱目修夏五月戊寅唐立子從益為許王從珂潞王以吕祖謙標目修秋七月壬午唐召安從進還以吕祖謙標目修乙酉唐優賜在京諸軍以通鑑修丁亥唐爵錢元瓘吳王以通鑑修八月戊申唐加上尊號優給內外將士以通鑑修唐太僕少卿致仕何澤請立皇太子辛未以秦王從榮為天下兵馬大元帥以通鑑修解題曰大位姦之窺也危病邪之伺也明宗既病不立太子之位國本曷自而定今假以天下兵馬元帥之名則兵權徒重而已施之一差禍不旋踵而至矣事見通鑑新史列傳有司言元帥或統諸道或專一靣自前世無天下大元帥之名禮無所考請自節度使以下凡領兵職者皆具櫜鞬以軍禮庭參其兼同中書門下平章事者初見亦如之其後許如客禮凡元帥府文符行天下皆用帖九月戊戌唐以侍中樞密使趙延夀為宣武節度使山南東道節度使朱𢎞昭為樞密使同平章事冬十月庚申樞密使范延光為成德節度使三司使同中書門下二品馮贇為樞密使以通鑑修壬戌唐以李彛超為節度使以通鑑修十二月己丑唐主大漸壬辰秦王從榮以兵入宫不克死甲午召天雄節度使宋王從厚戊戌唐主殂十二月癸卯宋王從厚即皇帝位以新紀修解題曰歐陽修曰明宗晚而多病王淑妃專內以干政宦者孟漢瓊因以用事秦王入視明宗疾已革既出而聞哭聲以謂帝崩矣乃謀以兵入宫者懼不得立也大臣朱𢎞昭等方圖其事議未決漢瓊遽入見明宗言秦王反陷秦王大惡而明宗以此飲恨而終又曰豫聞長老為豫言明帝雖出夷狄而為人純質寬仁愛人於五代之君有足稱也嘗夜焚香而祝曰臣本蕃人豈足以治天下世亂久矣願天早生聖人自初即位減罷宫人伶官廢內藏庫四方所上物悉歸之有司廣夀殿火災有司理之請加丹雘喟然嘆曰天以火災戒我豈宜增以侈耶歲嘗旱已而雪暴坐庭中詔武德司宫中無掃雪曰此天所以賜我也數問宰相馮道等民間疾苦道等言榖帛賤民無疾疫則欣然曰吾何以堪之當與公等作好事以報上天吏有犯贓輒置之死曰此民之蠧也以詔書褒廉吏孫嶽等以風示天下其愛人恤物蓋亦有意於治矣其即位時春秋已髙不邇聲色不樂遊畋在位七年兵革粗息年屢豐登生民賴以休息然夷狄性果仁而不明屢以非辜誅殺臣下至於從榮父子之間不能慮患為防而變起倉卒陷之以大惡帝亦由此飲恨而終事見通鑑大事記續編卷七十三
