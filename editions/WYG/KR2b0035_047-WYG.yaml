body:
  text: 大事記續編卷四十七明王禕撰隋高祖文皇帝開皇九年春正月乙丑朔賀若弼濟自廣陵韓擒虎濟自横江甲申若弼敗陳師於蔣山攻宫城擒虎執陳主叔寶丙戌晉王廣至建康施文慶沈客卿等皆伏誅癸巳遣巡撫陳州郡周羅㬋等亦降陳亡以陳隋本紀舉要厯補遺王通元經修解題曰陳自武帝霸先至後主叔寶五世凡三十三年王凝問於王通曰元經書陳亡而具五國何也曰江東中國之舊也衣冠禮樂之所就也永嘉之後江東貴焉而卒不貴無人也齊梁陳於是乎不與其為國也及其亡也君子猶懷之故書曰晉宋齊梁陳亡具五以歸其國且言其國亡也嗚呼棄先王之禮樂以至是乎凝曰晉宋亡國久矣今具之何謂也曰晉衣冠文物之舊君子不欲其先亡宋嘗有樹晉之功有復中國之志亦不欲其先亡也故具齊梁以歸其國也其未亡則君子奪其國焉曰中國之禮樂安在其已亡則君子予其國焉曰猶我中國之遺人也觀通之抑揚感嘅其志亦可悲也已二月丙申置鄉正里長以本紀修陳湘州刺史岳陽王叔慎起兵敗死以吕祖謙標目修遣柱國韋洸安撫嶺外降之以隋紀修解題曰安撫之名始於此平建康城於石頭城置蔣州以吕祖謙標目修夏四月己亥帝幸驪山勞還師乙巳獻俘太廟賞賜將士故陳境内給復十年餘州免租賦一年己未流孔範王瑳等於邊以江總為上開府儀同三司陳都督魯廣達死之以通鑑修解題曰胡寅曰孔範等亡陳之臣也帝既知之當戮之江南以謝三吳之人既貸其死又置諸邊刑寛而義不類矣江總身為宰相惟以詩酒陪從邪慝蓋孔寧儀父之徒楚子不殺仲尼所非者也乃寵以爵禄是訓臣子敗人家國而無後憂也豈不惜哉事見通鑑秦王俊為楊州總管四十四州軍事以通鑑修壬戌詔寢兵以吕祖謙標目修六月吏部蘇威為右僕射閏月以荆州總管楊素為納言以本紀修秋七月羣臣請封禪弗許以本紀修冬十二月詔太常牛𢎞參定雅樂以本紀修隋高祖文皇帝開皇十年春二月庚申帝幸并州夏四月至自并州以本紀修出李德林為湖州刺史以吕祖謙標目修五月乙未詔軍人悉屬州縣以本紀吕祖謙標目修解題曰按本紀詔曰魏末喪亂寓縣𤓰分役車歲動未遑休息兵士軍人權置坊府南征北伐居處無定家無完堵地罕苞桑恒為流寓之人竟無鄉里之號朕甚愍之凡是軍人可悉屬州縣墾田籍帳一與民同軍府統領宜依舊式罷山東河南及北方縁邊之地新置軍府葉適曰按李繁家傳載蘇綽初置府兵與此利害優苦殊不同然詔文乃當時實事蓋綽雖創始而地狹民寡加以長征不歸故未能盡行其説至平陳後乃修完成法爾六月辛酉制民年五十免役収庸以本紀修秋七月癸卯楊素為内史令以本紀修冬十一月辛卯帝幸國學以本紀修有事於南郊本紀江南盜起遣楊素討平之以本紀及吕祖謙標目修并州總管晉王廣為揚州總管秦王俊為并州總管以通鑑修畨禺夷反給事郎裴矩討平之高涼洗氏置幕府以通鑑及吕祖謙標目修隋高祖文皇帝開皇十一年春二月丙子以臨潁令劉曠為莒州刺史以本紀修辛巳晦日有食之以本紀修秋八月壬申殺弟滕王瓚以通鑑修解題曰按列傳瓚見高祖執政羣情未一恐為家禍陰有圖高祖之計餘見大建十二年周天元帝殂解題上柱國沛達公鄭譯卒以紀傳修隋高祖文皇帝開皇十二年秋七月乙巳蘇威免官爵禮部尚書盧愷除名以本紀及吕祖謙標目修有事於太廟本紀壬申晦日有食之以本紀修八月甲戌制死罪令大理覆治以本紀通鑑修冬十二月乙酉楊素為右僕射與高熲專掌朝政以吕祖謙標目修免右領軍大將軍賀若弼官以吕祖謙標目修府藏皆滿免河東北功調減田租一年以通鑑修解題曰李燾曰古今之富者莫如隋而所以卒為隋禍者亦惟其富爾夫帝王之所謂富而教之者豈曰盈其倉廩則羣黎百姓徧為爾德也哉惟在布大利於天下而吾無所私焉使斯民安居樂業養生喪死而無憾相與從事於孝弟忠信之際則吾之禮樂刑政可以四達而不悖矣高祖躬履儉約而户口日滋此固致富之道始高祖疾山東之巧偽重謫其正長而開相糾之科以出齊民隱户於是丁口益增而高熲復為輸籍法使豪强不能以容其奸此隋之所以富也君臣方自以為得計而不知其惡殆與賊虐者無異高祖在位雖省徭寛賦然取之者固已深而推以予之者蓋未數數然也不然何天之於隋遽泯然棄而不知耶遣使均田以朱熹綱目修隋高祖文皇帝開皇十三年春正月壬戌帝幸岐州二月作仁壽宫三月至自岐州以本紀及吕祖謙標目修禁藏讖緯以本紀修解題曰按列傳著作郎王邵表言符命又引民間歌謡引圖書讖緯依約符命捃摭佛經撰皇靈感書三十卷奏之上令宣示天下劭集諸州朝集使焚香而讀之上益喜賞賜優洽其所令反其所好而民不從其是之謂矣事見通鑑秋七月戊辰晦日有食之以本紀修隋高祖文皇帝開皇十四年夏四月乙丑行新樂以本紀修六月丁卯給公卿以下職田以本紀及吕祖謙標目修秋七月乙未以蘇威為納言以吕祖謙標目修關中大旱帝幸洛陽以本紀修解題曰李燾曰古者三年耕而後有一年之儲九年耕而後有三年之儲以三十年之通制國用則雖有凶旱水溢民無菜色今隋之為隋僅十餘年而粟帛之入至於倉廩府庫已無所容然而一有天災則關中之民至於屑豆雜糠而食流離遷徙救死不暇然則隋之所謂富者獨其倉廩府庫而餘食遺貨之在天下者殆無幾爾為富不仁諒其然矣事見通鑑冬閏十月甲寅詔給北齊梁陳祭祀器物以本紀修齊州刺史盧賁除名以本給通鑑修羣臣請封禪十二月乙未帝東狩以本紀通鑑修隋高祖文皇帝開皇十五年春正月壬戌帝幸齊州庚午以歲旱謝咎泰山以本紀及稽古録修二月丙辰収天下兵器以本紀修三月乙未至自東方以本紀修丁亥帝幸仁壽宫以本紀修解題曰通鑑考異隋書北史皆曰宫成上令高熲前視奏稱頗傷綺麗大損人丁帝不悦楊素懼即於北門啓獨孤后曰帝王法有離宫别館今天下太平造一宫何足損費后以此理諭上上乃解今從唐書然唐書所載不如隋史北史為得其實事見通鑑夏六月庚寅焚相州所貢綾文布於朝堂以朱熹綱目修秋七月戊寅至自仁壽宫以本紀修冬十月戊子以吏部尚書韋世康為荆州總管與并楊益州為四總管以通鑑及吕祖謙標目修十一月辛酉帝幸溫湯乙丑還宫以本紀修十二月戊子勅盜邊糧一升皆斬以本紀修己丑詔文武官四考受代以本紀修汴州刺史令狐熙考績為天下最賜帛旌之以通鑑修隋高祖文皇帝開皇十六年夏六月甲午制工商不得仕進以通鑑修秋八月丙戌詔死罪三覆奏以通鑑修解題曰刑者侀也成也一成而不可變故君子盡心焉文帝初有隋國遂定新律盡除魏周苛刻以從寛簡初令死罪大理覆治又令死罪三奏然後行刑誠得古帝王好生惡殺之意矣然盜邊糧一升以上者皆斬一錢以上者棄市則雖三奏而後行亦何補哉冬十月帝幸長春宫十一月還以公主妻吐谷渾可汗以通鑑修隋高祖文皇帝開皇十七年春二月癸未遣太平公史萬歲討南寧羌平之以本紀修帝幸仁壽宫以通鑑修桂州俚帥反遣兵討平之以令狐熙為桂州總管以本紀及吕祖謙標目修三月丙辰詔諸司得於律外杖屬官以通鑑目録修令盜一錢以上棄市以通鑑及吕祖謙標目修夏四月戊寅頒張胄𤣥厯以本紀修秋七月桂州人反遣右武侯大將軍虞慶則討平之以本紀修丁亥并州總管秦王俊免以本紀及吕祖謙標目修以宗女公主妻突厥突利可汗以通鑑目録修九月帝至自仁壽宫以通鑑修冬十二月殺虞慶則以本紀修隋高祖文皇帝開皇十八年春正月辛丑詔江南民船長三丈者入官以本紀修二月高麗冦遼西乙巳遣漢王諒討之遇疫秋九月己丑師還以本紀及吕祖謙標目修解題曰隋伐高麗始於此冬十二月置離宫於仁壽宫道上以本紀修南寧羌復反史萬歲坐除名以通鑑修隋高祖文皇帝開皇十九年春二月遣漢王諒為元帥三道伐突厥都藍可汗都藍與達頭可汗襲突利破之夏四月突利來降諸軍大破突厥兵以通鑑修六月殺涼州總管王丗則以通鑑修秋八月高熲除名以紀傳修九月乙丑以太常卿牛𢎞為吏部尚書以本紀修解題曰按通典開皇七年制諸州歲貢三人工商不得入仕十八年又詔京官五品以上及總管刺史並以志行修謹清平幹濟二科舉人牛𢎞為吏部尚書高搆為侍郎最為稱職當時尚書舉其大者侍郎銓其小者則六品以下官吏咸吏部所掌自一命以上之官州郡無復辟署矣自北齊以來州郡僚佐已多為吏部所授至隋一切歸省司杜佑曰文帝素非學術盜有天下不欲權分罷州郡之辟廢鄉里之舉内外二命悉歸吏曹纔厠班列皆由執政則執政參吏部之職吏部總州郡之權罔徵體國推誠代天理物之本意是故銓綜失叙受任多濫豈有萬里封域九流叢凑論材授職仰成吏曹以俄頃之周旋定材行之優劣求其無失不亦謬歟爾後有司尊賢之道先於文華辯論之方擇於書判所以閲佐號為倒拔徵詞同乎射覆置循資之格立選數之制壓例示其定限平配絶其逾涯或糊名考覈或十銓分掌茍濟其末不澄其源誠宜詳酌古今拯勘刓弊實為大政可不務乎冬十月甲午以突利為啓民可汗處之五原遣楊素等擊都藍可汗十二月都藍為其下所殺達頭立為步迦可汗以吕祖謙標目修隋高祖文皇帝開皇二十年夏四月壬戌突厥步迦可汗犯塞晉王廣等擊之太平公史萬歲大破之以本紀修六月丁丑秦王俊以憂薨廢其國以吕祖謙標目及朱熹綱目修晉王廣結楊素贊帝廢立冬十月乙丑廢太子勇及其諸子為庶人己巳殺左衛大將軍元旻等素又譖殺史萬歲十一月戊子立廣為皇太子天下地震以本紀修禁毁佛天尊及神像以朱熹綱目修隋高祖文皇帝仁壽元年正月乙酉朔改元以本紀修楊素蘇威為左右僕射以本紀修二月乙卯朔日有食之以本紀修夏六月廢太學四門及州縣學前殿内將軍劉炫諫不聽以吕祖謙標目修冬遣楊素擊突厥以通鑑修隋高祖文皇帝仁壽二年春三月楊素大破步迦可汗以通鑑修秋七月徵蜀王秀還以列傳修八月己巳皇后獨孤氏崩以本紀修解題曰按后妃傳序開皇二年著内官之式畧依周禮減省其數嬪三員世婦九員女御三十八員又採漢晉舊儀置六尚六司六典初文獻皇后懷嫉妬之心虚嬪妾之位不設二妃防其上逼自嬪以下置六十員又抑損其服章降其品秩文獻崩後始置貴人三員增嬪九員世婦二十七員御女八十一員貴人等闗掌宫闈之務六尚以下皆分𨽻焉煬帝參詳典故製嘉名著之於今貴妃淑妃徳妃為三夫人順儀順容順華修儀修容修華充儀充容充華為九嬪婕妤十二員美人才人十五員為世婦寳林二十員御女二十四員采女三十七員為女御總一百二十又有承衣刀人皆趨侍左右又増置女官准尚書省以六局管二十四司葉適曰六尚六司六典掌宫中之政此漢晉舊事也至煬帝置女官准尚書省則出於創建内外分庭人臣不得分毫預矣晉楊后以立惠基亂而天下為之分裂者數百年隋獨孤后以立煬稔禍而編氓十喪八九詩首二南有以也夫九月大水以本紀修冬閏十月甲申詔修五禮以本紀修十二月癸巳廢蜀王秀為庶人以吕祖謙標目修詔楊素三五日一入省論大事以通鑑修交州俚帥反遣瓜州刺史劉方為行軍總管平之以通鑑修隋高祖文皇帝仁壽三年秋九月壬戌置常平官以本紀修是歲龍門王通獻太平䇿罷歸教授於河汾之間以舉要補遺修解題曰通字仲淹河汾人文帝徵之不至大業元年一徵又不至乃續詩書正禮樂修元經讚易道朱熹曰通見識高明説治體甚高特本領欠闕如古人明德新民至善等處固未之講也李遘曰文中子之言聖人之徒也傳之者非其人為之癰創而已耳世誚房魏輩不稱師也未嘗以為師也蓋文中子教授河汾迹未甚顯没後門人欲尊寵之故扳太宗時公卿以欺後世耳突厥步迦可汗降於啓民可汗啓民歸磧石以吕祖謙標目修解題曰按元和郡縣志豐州東受降城北至磧口八百里中城至磧口五百里西城至磧口三百里磧口至囘紇衙帳一千五里隋高祖文皇帝仁壽四年春正月甲子帝幸仁壽宫夏四月不豫秋七月命兵部尚書柳述黃門侍郎元巖召故太子勇太子廣囚述巖丁未弑帝乙卯即皇帝位殺勇八月丁卯喪還京師以本紀及吕祖謙標目修解題曰胡寅曰述巖親逢事㑹則當白帝倂召楊素楊廣入閤質問陳夫人正其罪而廢廣出諸外熟論故太子可立則召之否則别命子孫之賢者素若不從降詔以軍法從事登時而宗社定矣乃出閤為詔出以示素反受制賊手俄頃之間福禍判焉述巖死有餘辜矣事見通鑑漢王諒起兵於晉陽以楊素為并州總管討之素執諒以歸殺之以本紀吕祖謙標目修解題曰胡寅曰舉兵必有其名立事不可行詐隋文之崩當時中外頗有異論諒獨不聞耶借曰未審而所被璽書不如高祖所約則可用此聲問晏駕不明之故以十九州附從之衆用王頍長駈之䇿既近京師則情實必彰天不共戴死生以之豈不忠孝兩得乎而詭言為素反舉兵是詐也詐而無名是自為逆也可乎事見通鑑冬十月己卯葬文皇帝于太陵廟號高祖以本紀馬總通厯修解題曰蘇轍曰昔者三代之君享國長久後世莫能及然而亡國之暴未有如秦隋之速二世而亡者也夫秦隋之亡其弊果安在哉自周失其政諸侯用事而秦獨得山西之地不過千里韓魏壓其衝楚脅其肩燕趙伺其北而齊掉其東秦人被甲持兵七世而不得解寸攘尺取至始皇然後合而為一秦人見其取天下若此其難也而以為不急持之則後世且復割裂以為敵國是以銷名城殺豪傑鑄鋒鏑以絶天下之望其所以備慮而固之者其密如此然而海内愁苦無聊莫有不忍去之意是以陳勝項籍因民之不服長呼起兵而山澤皆應由此觀之豈其重失天下而防之太過之弊歟今夫隋文之世亦見天下之久不定而重失其定也蓋自東晉以來劉聰石勒慕容苻堅姚興赫連之徒紛紛而起者不可勝數至於元氏并吞滅取畧已盡矣而南方未服元氏自分而為周齊周并齊而授之隋隋文取梁滅陳而後天下為一彼亦見天下之久不定也是以既得天下之衆而恐其失之享天下之樂而懼其不久立於萬民之上而常有猜防不安之心以為舉世之人皆有曩者英雄割據之懷制為嚴法峻令以杜天下之變謀臣舊將誅滅畧盡而獨死於楊素之手終於煬帝之際天下大亂塗地而莫之救由此觀之則夫隋之所以亡者無以異於秦也悲夫除婦人及奴婢部曲之課令男子二十成丁以通鑑修十一月乙未帝幸洛陽以本紀修丙申掘塹自龍門至臨清關度河抵上洛以本紀修壬子陳叔寶卒贈長城煬公以吕祖謙標目修癸丑以洛陽為東京以吕祖謙標目修大事記續編卷四十七
