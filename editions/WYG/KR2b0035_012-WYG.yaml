body:
  text: 大事記續編卷十二明王禕撰漢肅宗孝章皇帝章和二年春正月壬辰帝崩於章徳前殿遺詔無起寝廟二月皇太子肇即皇帝位年十嵗尊皇后曰皇太后臨朝改元以本紀修以遺詔用黄門侍郎竇篤為虎賁中郎將竇璟竇􅅛為中常侍以列傳修三月癸卯𦵏孝章皇帝於敬陵以本紀修觧題曰吕祖謙曰章帝繼明帝之後承以寛大如觧楚淮陽之獄輕徭薄賦與天下休息所以得為賢君然氣質甚偏若論其慈祥長者如第五倫之争議朱暉之争均輸莫不温辭慰藉如崔駟孔僖為人告訐不特恕其罪又從而寵秩之又如郭躬之為廷尉以寛大為上當時天下少窮民其於宗族恩意備至諸王就封遲遲不忍使之去東平王蒼名徳重望凡事咨問此皆其長者然其短亦畧相當西都以寛大為治體帝之天資幸而與家法合而東漢規模初未嘗變且事在臺閣三公具員此最體統不正之大者帝不過持循以度嵗月未嘗改其規模所以東漢之治不及西都正以有其資當機而失之故也南單于宣死單于長之弟屯屠河立以列傳修庚戌鄧彪為太傅賜爵闗内侯録尚書事百官總已以聴以本紀修觧題曰太后臨朝竇憲以侍中内幹機宻出宣誥命兄弟並在親要之地憲以鄧彪有義讓先帝所敬而仁厚委隨故尊崇之以為太傅其所施為輙外令彪奏内白太后事無不從王莽以孔光為舊相名儒天下所信太后敬之備禮事光所欲搏擊輙為草以太后指風光令上之人厓眥莫不誅傷憲用此術也屯騎校尉桓郁累世帝師而性和退自守故上書薦之令授經禁中所以内外協附莫生疑異餘見通鑑辛酉尊孝章廟曰肅宗以本紀修諸王始就國以列傳修夏四月詔郡國罷鹽鐵以本紀通鑑修觧題曰建初六年鄭衆為大司農時議復鹽鐵官衆諫以為不可詔數切責衆執之不移又元和中榖貴縣官經用不足朝廷憂之尚書張林上言榖所以貴由錢賤故也可盡封錢一取布帛為租以通天下之用又鹽食之急者雖貴人不得不須官可自鬻又宜因交阯上計吏徃來市珎寳收采其利武帝時所謂均輸者也於是詔諸尚書通議尚書僕射朱暉奏不可事遂寝後陳事者復述林前議有詔施行暉復獨奏非明主所當行帝以林等言為然切責諸尚書暉等皆自繫獄三日出之暉稱病篤不肯復署議諸尚書不知所為共劾奏暉帝意觧寢其事唐仲友曰西都用度奢廣而不見其貧東京用度節約而不見其富無他西漢宰相權重體統歸一後漢宰相權輕戚宦耗蠧也詔曰昔孝武皇帝致誅胡越故𣙜收鹽鐵之利以奉師旅之費自中興以來匈奴未賔永平末年復修征伐先帝即位務休力役然猶深思逺慮探觀舊典復收鹽鐵欲以防備不虞寧安邊境而吏多不良動失其便先帝恨之故遺戒郡國罷鹽鐵之禁縱民鑄煮入税縣官如故事其申勅刺史二千石奉順聖㫖勉宏徳化鹽鐵均輸肅宗行之甚遲疑而遺詔決然去之可見其天資之厚矣五月京師旱以本紀修長樂少府桓郁侍講禁中本紀北匈奴饑秋七月南單于請討之以通鑑修侍中竇憲殺都鄉侯暢於屯衛求擊匈奴以贖死冬十月乙亥以憲為車騎将軍伐北匈奴以紀傳修觧題曰齊殤王子都鄉侯暢來弔國憂暢與歩兵校尉鄧疊親屬數徃來京師因疊母元自通長樂宫得幸太后被詔召詣上東門憲懼分宫省之權遣客刺殺暢於屯衛之中而歸罪於暢弟利侯剛乃使侍御史與青州刺史雜考剛等尚書令韓稜以為賊在京師不宜舎近問逺恐為姦臣所笑太后怒以切責稜稜固執其議何敞説宋由曰暢宗室肺腑茅土藩臣來弔國憂親在武衛致此殘酷主名不立敞備股肱職典賊曹欲親至發所以紏其變而二府執事李賢曰敞在太尉府二府謂司徒司空以為故事三公不與賊盗三公之權輕如此公縱姦慝敞請獨奏案由乃許焉二府聞敞行皆遣主者隨之於是推舉具得事實太后怒閉憲於内宫憲懼誅因自求擊匈奴以贖死㑹南單于請兵北伐乃拜憲車騎將軍以執金吾耿秉為副發北軍五校黎陽雍營縁邊十二郡騎士及羌胡兵出塞餘見通鑑陳瓘曰竇憲嘗殺韓紆之子以復私怨無敢誰何狃於前事復殺劉暢輕君自恣無忌憚如此而韓稜以言憲見怒非何敞請徃案而宋由用其議憲賊害之迹其可得乎既得其迹不能誅也又怵其詭計勞師逺伐然則閉憲於内宫者非實怒也憲懼而請行者非真懼也薛季宣曰漢畧循周王畿之制訖於西京都兵無過一再出自中興郡兵不練而南北軍交鶩於境外竇憲鄧鴻何熈三將以擊胡劉尚鄧隲任尚朱寵馬賢張喬將以禦羌而鮮卑之冦南單于之變亦數數移屯連年暴露由是王旅無復鎮衛之職而奔命四方之不暇又方募為陷陣徴為積射誘為義從大畧剏立名號皇甫規所謂列屯坐食之兵衆矣終於亡而後已䕶羌校尉鄧訓擊迷唐破之以列傳修漢孝和皇帝永元元年春鄧訓罷屯兵以吕祖謙標目修袁安任隗等諫伐匈奴不聽時又為竇憲等起邸第侍御史何敞諫不省觧題曰竇憲擊匈奴安與太尉宋由司空任隗及九卿詣朝堂上書諫書連上輙寢宋由懼遂不敢復署議而諸卿稍自欲止唯安隗守正不移至免冠朝堂固争者十上太后不聽衆皆為之危懼安隗正色自若侍御史魯恭上疏曰陛下新遭大憂人懐恐懼今乃以盛春之月興發軍役擾動天下以事戎夷誠非所以垂恩中國改元正時由内及外也萬民者天之所生天愛其所生猶父母愛其子一物有不得其所者則天氣為之舛錯况於人乎故愛人者必有天報昔太王重人命而去邠故獲上天之祐夫夷狄者四方之異氣也蹲夷踞肆與鳥獸無别若雜居中國錯亂天氣汙辱善人是以聖王之制覊縻不絶而已今始徴發而大司農調度不足羣僚百姓咸曰不可陛下獨何以一人之計棄萬人之命不䘏其言乎臣恐中國不為中國豈徒匈奴而已哉尚書令韓稜騎都尉朱暉議郎樂恢侍御史何敞皆上疏諫太后不從餘見通鑑陳瓘曰諫書連上宋由懼矣而安隗守正不移三公者百僚之倡也故宋由不敢書議而諸卿稍自引止安隗固争而魯恭韓稜朱暉樂恢相繼上書尚書僕射郅夀以軍旅未休府藏空虚譏刺甚切憲殺之以列傳吕祖謙標目修夏六月竇憲等與北單于戰於稽落山大破之勒功燕然山以紀傳修觧題曰唐仲友曰勒功燕然本欲藉以謀􅆲徐鍇方輿志燕然山在振武金河縣北近磧沈約宋紀山形似廬山有草無木事見通鑑秋七月乙未㑹稽山崩以本紀修九月庚申竇憲為大將軍位次太傅封武陽侯時篤為衛尉景􅅛皆侍中奉車駙馬都尉袁安劾景擅發邊兵不報以列傳修觧題曰景擅使乗驛施檄縁邊諸郡發突騎有才力者漁陽雁門上谷各遣吏將送詣景第有司畏憚莫敢言者安劾景擅發邊兵驚惑吏人二千石不待符信而輙承檄當伏顯誅又奏司𨽻校尉河南尹阿附貴戚無盡節之義請免官案罪不報餘見通鑑南陽太守杜詩上疏舊制發兵皆以虎符其餘徴調竹使而已所以明著國命歛持威重也間者但用璽書或以詔令如有姦人詐偽無由知覺可立虎符以絶姦端光武從之則調兵之必以虎符尚矣非若髙帝之討陳狶以羽檄而徴兵也檄以木簡為書長尺二寸景擅發兵恐諸郡弗信故乗驛施檄為是警急之狀所以吏人驚惑也尚書何敞論竇氏出為濟南王太傅以列傳修觧題曰唐仲友曰竇氏出何敞與公孫𢎞徙董仲舒同敞以道義法度驕王敬憚事亦與仲舒同夫天之相善人固也而二人之學亦足以自保况𢎞憲出於有心而二王初無心耶驕王可以道輔亦可以見性無有不善者矣化百姓特餘事耳事見通鑑是嵗大水以本紀修漢孝和皇帝永元二年春二月壬午日有食之以本紀修夏五月丙辰封弟三人為王以本紀修竇憲遣兵取伊吾盧地以本紀修丁卯封齊武王縯孫無忌為齊王威為北海王以紀傳修月氏攻班超超擊降之以本紀修封竇憲為冠軍侯篤景􅅛皆為列侯憲辭不受以列傳修秋七月乙卯竇憲屯凉州本紀九月北匈奴遣使稱臣以本紀修冬十月南單于擊北匈奴大破之以本紀修漢孝和皇帝永元三年春正月甲子帝加元服賜王公以下金帛賜民爵及粟帛以本紀列傳修二月竇憲遣左校尉耿夔圍北單于於金微山大破之以本紀修鮮卑據北匈奴地以列傳修袁安任隗奏劾二千石四十餘人竇氏恨之以列傳修竇憲殺尚書僕射樂恢以吕祖謙標目修觧題曰唐仲友曰恢不忍素餐去之可也力諌而繼之以死可以為忠未可以為中道均死也死於家不如死於職蓋在職則未必害何敞韓稜是也事見通鑑冬十月帝幸長安竇憲來㑹十一月祠陵廟以本紀修班超定西域十二月以為西域都䕶復置騎都尉戊巳校尉以紀傳修庚辰帝還宫以本紀修漢孝和皇帝永元四年春正月用竇憲議立北匈奴右谷蠡王於除鞬為單于使中郎將任尚屯伊吾如南單于故事以紀傳修三月袁安薨本紀觧題曰陳瓘曰徐齮方以刺客恐周榮而袁安遽亡悲夫事見通鑑閏月太常丁鴻為司徒以本紀修夏四月丙辰竇憲還以本紀修六月戊戌朔日有食之以本紀修地震以本紀修竇憲謀逆帝與鉤盾令鄭衆謀庚申幸北宫勒兵屯南北宮遣憲及其弟篤景瓌就國憲篤景㝷皆伏誅併誅長樂少府郭璜衛尉鄧疊等以紀傳袁宏漢紀吕祖謙標目修觧題曰憲既負重勞陵肆滋甚封鄧疊與其弟歩兵校尉磊及母元又憲女壻射聲校尉郭舉舉父長樂少府璜紀載璜為射聲校尉誤也皆相交結元舉並出入禁中舉得幸太后遂共圖為殺害帝隂知其謀乃與近幸中常侍鄭衆定議誅之以憲在外慮其懼禍為亂忍而未發㑹憲及鄧疊班師詔使大鴻臚持節郊迎憲等既至帝乃幸北宮詔執金吾五校尉勒兵屯衛南北宮以司徒丁鴻行太尉兼衛尉屯南北宫按百官志本注南宫南屯司馬主平城門北宫門蒼龍司馬主東門𤣥武司馬主𤣥武門北屯司馬主北門北宫朱爵司馬主南掖門東明司馬主東門朔平司馬主北門凡七門閉城門收捕疊磊璜舉皆下獄誅遣謁者僕射收憲大將軍印綬更封為冠軍侯憲及篤景􅅛皆遣就國帝以太后故不欲名誅憲選嚴明相督察之憲篤景到國皆廹令自殺餘見通鑑唐仲友曰惜乎憲誅在袁安既薨之後使安預誅憲之謀則事體正可以收還三公之權矣前中郎將班固下獄死以列傳修觧題曰固著漢書其八表及天文志未及竟而卒帝詔固女弟昭就東觀藏書閣踵而成之唐仲友曰馬遷世為史官其法直班固出於外戚其法婉以鄭衆為大長秋以紀傳袁宏漢紀吕祖謙標目修觧題曰宦官用權自此始秋七月己丑宋由自殺以本紀修觧題曰按袁宏漢紀竇氏既廢天子追覧前議嘉袁安之忠知宋由之不正也乃䇿免由餘見通鑑袁安任隗力持正議而由依違其間人莫不以由為得計而為安隗危之也然由不免於死而安隗之嗣各被褒録然則為臣而不忠者亦果何所利哉八月辛亥任隗薨本紀觧題曰隗義行内修不求名譽而以沈正見重於世竇憲擊匈奴國用勞費隗奏議徴憲還前後什上獨與袁安同心畢力持重處正鯁言直議無所囘𨼆鄧彪辭録尚書事癸丑大司農尹睦為太尉録尚書事冬十月以宗正劉方為司空以本紀修漢孝和皇帝永元五年春正月乙亥宗祀明堂登靈臺以本紀修二月戊戍詔省减内外廐及涼州諸苑馬京師離宫上林廣成囿以假貧民以本紀修觧題曰唐仲友曰和帝以苑囿假貧民遣使賑廪勸民蓄䟽食官陂池得采取皆一時惠政但不乆逺耳封弟為王以本紀修甲寅鄧彪罷以本紀修觧題曰唐仲友曰彪孟子所謂鄉原之類也為大臣不能正論則焉用彼相矣事見通鑑三月庚寅遣使者賑貧民以本紀修夏六月丁酉雨雹大如雁子以袁宏漢紀修秋九月於除鞬單于叛歸北庭遣任尚討㓕之以本紀修觧題曰范曄曰漢初遭冒頓凶黠種衆强熾高祖威加四海而窘平城之圍太宗政鄰刑措不雪憤辱之恥逮孝武亟興邊畧赫然命將候列郊甸火通甘泉而猶鳴鏑揚塵出入畿内至於窮竭武力單用天財厯紀嵗以攘之寇雖頗折而漢之疫耗畧相當矣宣帝值虜庭分争呼韓邪來臣乃權納懐柔因為邊衛罷闗徼之儆息兵民之勞龍駕帝服鳴鐘𫝊鼓於清渭之上南面而朝單于朔易無復匹馬之蹤六十餘年矣後王莽陵􅆲擾動戎夷續以更始之亂方夏幅裂自是匈奴得志狼心復生乗間侵軼害流傍境及中興之初更通舊好而單于驕踞益横内暴滋深世祖以用事諸華未遑沙塞之外忍愧思難徒報謝而已因徙幽并之民增邊屯之卒及闗東稍定隴蜀已清其猛夫悍將莫不頓足攘手争言衛霍之事帝方厭兵間修文政未之許也其後匈奴争立日逐來奔願修呼韓之好以禦北狄之衝奉藩稱臣永為外扞天子總攬羣䇿和而納焉乃詔有司開北鄙擇肥羙之地量水草以處之馳中郎之使盡法度以臨之制衣裳備文物加璽紱之綬正單于之名於是匈奴分破始有南北二庭焉讐釁既深互伺便隙控弦抗戈覘望風塵至於陷潰創傷者靡嵗或寧而漢之塞地晏然矣後亦頗為出師并兵窮討命竇憲耿夔之徒前後並進皆用果譎設竒數異道同㑹究掩其窟穴躡北追奔三千餘里遂破龍祠焚􅄢幕阬十角梏閼氏銘功封石倡呼而還單于震懾屏氣䝉氈遁走於烏孫之地而漢北空矣若因其時埶及其虚曠還南虜於隂山歸河西於内地上申光武權宜之畧下防戎羯亂華之變使耿國之筭不謬於當世袁安之議見從於後王平易正直若此其𢎞也而竇憲矜三㨗之效忽經世之規狼戾不端専行威恵遂復更立北虜反其故庭並恩兩䕶以私已福棄蔑天公坐樹大鯁永言前載何恨憤之深乎自後經綸失方叛服不一其為疢毒胡可單言降及後世翫為常俗終於吞噬神鄉邱墟帝宅嗚呼千里之差興自毫端失得之源百世不磨矣冬十月尹睦薨十一月乙丑太僕張酺為太尉以本紀修是嵗䕶羌校尉貫友討燒當羌羌逺徙以紀傳修南單于屯屠何死單于宣弟安國立以列傳修漢孝和皇帝永元六年春正月度遼將軍朱徽使中郎將杜崇殺安國立單于適之子師子以紀傳修己卯丁鴻薨二月丁未以劉方為司徒太常張奮為司空以本紀修三月詔舉賢良方正直言極諫選補郎吏以本紀修秋七月京師旱詔减中都官徒丁巳帝幸洛陽寺録囚徒未還宫而雨以本紀修班超大破焉耆尉犂斬其王以本紀修觧題曰唐仲友曰班超開西域二十二年然後成功蓋乆任之效若任之不終則累年之功一旦皆䘮矣事見通鑑按袁宏漢紀永元中班超遣掾甘英臨大海而還具葱嶺西諸國地形風俗自燉煌西出玉門陽闗北通伊吾千餘里自伊吾北通車師前部高昌壁千二百里自髙昌壁北通後部五百里是匈奴西域之門也伊吾北有栁中皆膏腴之地故漢與匈奴争伊吾盧以制西域鄯善國去洛陽七千一百里北通車師前後王及東且彌卑陸蒲類移支是為車師六國北與匈奴接前部西通焉耆北道後部西通烏孫漢欲隔絶西域匈奴必屯田伊吾焉耆去洛陽八千二百里東南與山離接其餘危湏尉黎龜兹姑墨温宿疎勒休修大宛康居大月氏安息大秦烏戈罽賔莎車于闐且彌諸國轉相通大月氏去洛陽萬六千三百七十里其東南數千里通天竺天竺一名身毒臨大水西通大秦從月氏南至西海東至盤越國皆身毒地又有别城數十置王而皆總名身毒西域之遠者安息國也去洛陽二萬五千里北與康居南與烏戈山離接地方數百西至條支馬行六十日臨海暑熱卑濕與西海接自安息西至阿蠻三千四百里自阿蠻西至斯賔國渡河西南至于羅國九百六十里安息西界極矣其南乗海乃通大秦大秦一名黎軒在海西漢使皆自烏弋還莫能通條支者甘英踰懸度烏弋山離抵條支臨大海乃止大秦地方數千自交州塞外檀國諸蠻夷相通又一道與益州塞外通其長老或傳言其國西有弱水近日入所矣又云從安息陸道繞海北行出海西至大秦人庶連屬十里一亭三十里一署無盗賊而有猛虎獅子遮食又言旁國渡海飛橋數百里山離還自條支東北通烏弋山離可百餘日行而烏弋山離罽賔莎車于寘寧彌諸國相接逺者二萬一千里近者萬餘里焉降胡二十餘萬人立單于屯屠何之子逢侯為單于亡出塞九月遣車騎將軍鄧鴻等追之不及冬十一月䕶烏桓校尉任尚大破之以紀傳修以大司農陳寵為廷尉以列傳通鑑修漢孝和皇帝永元七年春鄧鴻坐逗留朱徽杜崇坐失胡和下獄死以紀傳修夏四月辛亥朔日有食之以本紀修引公卿問得失選郎補長相以本紀修秋九月癸卯京師地震以本紀修漢孝和皇帝永元八年春二月立貴人隂氏為皇后以本紀修觧題曰袁宏曰原鹿侯識曾孫也夏五月蝗以本紀修南單于右温禺犢王入冦秋七月行度遼將軍龎奮等討斬之以本紀修冬十二月丁巳南宫宣室殿火以本紀修漢孝和皇帝永元九年春三月庚辰隴西地震以本紀修夏六月旱蝗除田租及山澤税以本紀修秋八月鮮卑冦肥如本紀觧題曰李賢曰肥如縣屬遼西郡前書音義曰肥子奔燕封於此今平州也閏月辛巳皇太后竇氏崩以本紀修燒當羌冦隴西遣將軍劉尚等討破之以本紀修九月庚申劉方免自殺以本紀修甲子追尊梁貴人為皇太后冬十月乙酉改塟之追封其父竦為褒親愍侯竦子三人為侯以傳紀修十一月癸卯以光禄勲吕蓋為司徒以本紀修十二月丙寅張奮罷壬申以太僕韓稜為司空以本紀修漢孝和皇帝永元十年夏五月京師大水以本紀修秋七月韓稜薨八月丙子以太常巢堪為司空以本紀修冬十二月燒當羌詣闕貢獻以本紀修南單于師子死單于長之子檀立以本紀修漢孝和皇帝永元十一年春二月遣使循行禀貸被災者除山澤税以本紀修漢孝和皇帝永元十二年春二月詔貸被災民種糧賜下貧鰥寡孤獨者以本紀修三月詔賜三老力田及天下男子爵有差鰥寡孤獨貧癃者以本紀修夏四月象林蠻反以本紀修觧題曰李賢曰象林縣屬日南郡今林邑國閏月戊辰秭歸山崩本紀觧題曰李賢曰秭歸縣屬南郡古之夔國今歸州也秋七月辛亥􅃋日有食之九月戊午張酺免丙寅以大司農張禹為大尉以本紀修觧題曰酺以事與司􅈻校尉晏稱㑹於朝堂酺從容謂稱曰三府辟吏多非其人稱歸即奏令三府各實其掾吏酺本以私言不意稱奏之甚恨㑹復共謝闕下因責讓稱稱語不順酺廷叱之稱乃劾奏酺有怨言詔朝臣㑹議司徒吕蓋奏酺知公門有儀反作色大言怨讓使臣於是䇿免唐仲友曰三公固失體司𨽻亦烏得無罪而酺以䇿免漢之重刺舉輕三公也甚矣漢孝和皇帝永元十三年春正月丁丑帝幸東觀以本紀修秋八月己亥北宫盛饌門閣火本紀䕶羌校尉周鮪擊燒當羌破之本紀秋九月壬子詔田租芻藁半入以本紀修冬十一月丙辰詔縁邊舉孝亷以本紀修鮮卑冦右北平漁陽以本紀修戊辰吕蓋請老十二月丁丑以光禄勲魯恭為司徒以本紀修漢孝和皇帝永元十四年春安定降羌反二月繕西海郡徙金城西部都尉戍之以傳紀修觧題曰陳瓘曰迷唐既死其子既降之後西海榆谷無復羌冦曹鳳請乗此時建復西海郡可謂時然後言功垂立而不成惜哉事見通鑑方輿志榆中縣故城在蘭州五泉縣東三月戊辰帝臨辟雍饗射以本紀修夏五月丁未初置象林將兵長史以本紀修觧題曰闞駰十三州志曰將兵長史居在日南郡又有將兵司馬薛季宣曰明帝之初罷沿邊屯兵其後北胡有變則置度遼營南蠻或變則置象林兵羌犯三輔則置長安雍二營鮮卑冦居庸則置漁陽營其後盗作縁邊縁海稍稍增兵而扶風漢陽三百塢魏郡常山六百十六塢置屯多矣六月辛卯廢皇后隂氏后父特進綱自殺后以憂死以紀傳修秋兖豫荆雨水以本紀修徵班超為射聲校尉以戊巳校尉任尚代之以列傳修觧題曰葉適曰班超以三十六人開西域不費漢兵積三十年事成功立古所未有也古之人材必在分限之内上自禹稷下至方召勤智慮縻嵗月至能成天地不及之功然未有踰分超限者雖春秋時尚然及蘇張資揣摩之學韓彭起飄揚之思張騫陳湯鑿空外國而後世乃有分外人材劉向云千里之鎬猶以為逺况萬里之外其勤至矣然不知千里為分限之内而欲與陳湯較其短長向之論蓋失正矣其後愈降分内者枯竭不繼分外者誕謾不酬則亦安所戾止耶事見通鑑冬十月詔三州田租芻藁半入以本紀修辛卯立貴人鄧氏為皇后以本紀修觧題曰袁宏曰鄧訓女也丁酉巢堪免十一月癸卯以大司農徐防為司空以本紀修是嵗封鄭衆為鄛鄉侯以吕祖謙標目修漢孝和皇帝永元十五年夏四月甲子晦日有食之以本紀修秋九月壬午帝南狩以本紀修雨水以本紀修冬十月幸章陵進幸雲夢十一月甲申還宫以本紀修詔太官勿受獻以列傳修是嵗初令郡國以日北至按薄刑本紀漢孝和皇帝永元十六年秋七月旱以本紀修辛酉魯恭免庚午以光禄勲張酺為司徒以本紀修辛巳詔田租芻藁皆半入以本紀修八月己酉張酺薨冬十月辛卯以徐防為司徒大鴻臚陳寵為司空以本紀修十一月帝幸緱氏以本紀修北匈奴請和親以紀傳修漢孝和皇帝元興元年春戊午選三署郎補長相以本紀修髙句驪冦遼東以紀傳修夏四月改元本紀冬十二月辛未帝崩於章徳前殿觧題曰自竇憲誅後帝躬親萬幾每災異延問公卿極言得失前後符瑞八十一所自稱徳薄皆抑而不宣舊南海獻龍眼荔枝奔騰阻險死者繼路時臨武長唐羌上書陳狀帝下詔太府勿復受獻由是遂省焉唐仲友曰論此規模猶有無逸之風而史不載何耶皇后廢長子勝立少子隆為皇太子即皇帝位生百餘日矣賜三老孝悌力田天下男子爵有差鰥寡孤獨貧癃者粟尊皇后曰皇太后臨朝以本紀修漢孝殤皇帝延平元年春正月辛卯以張禹為太傅徐防為太尉參録尚書事百官總已以聽本紀封皇兄勝為平原王以本紀修癸卯以光禄勲梁鮪為司徒以本紀修三月甲申塟孝和皇帝於慎陵以本紀修觧題曰劉攽曰紀書塟慎陵李賢注云俗本作順陵者誤按皇后紀和熹皇后合塟順陵以為后紀誤而靈帝父孝仁皇稱慎陵世數不逺陵名必不相襲叅校前後孝和實塟順陵言慎乃更為誤耳遣清和王慶就國留其子祐於邸以紀傳修夏四月庚申罷祠官不在祀典者以本紀修鮮卑冦漁陽以本紀修丙寅以虎賁中郎將鄧隲為車騎將軍儀同三司隲弟黄門侍郎悝為虎賁中郎將𢎞閶皆侍中以本紀通鑑修陳寵罷本紀五月壬辰河東垣山崩本紀觧題曰李賢曰垣今絳州縣六月丁未以太常尹勒為司空以本紀修雨水己未詔减服御珍膳靡麗之物丁卯免宗室没入者及遣掖庭宫人以本紀修秋八月辛亥帝崩太后與兄隲等定策禁中迎清河王子祐封為長安侯癸丑即皇帝位太后臨朝以吕祖謙標目修觧題曰胡寅曰立天下之主當與三公大臣共議選建賢明豈一家之私哉而乃定䇿禁中公卿不與假如立非其人則無由改悔清河王慶章帝長子嘗正位儲宫廢不以罪年齒益長過失不聞於是迎立以主漢祚豈不善哉而鄧太后終利㓜弱欲乆臨朝至安帝年二十八猶不歸政故自永初而後地震雨水日食風雹之變嵗不絶書母氏常隆閹尹得志接乎桓靈而漢祚遂滅矣事見通鑑檢勅外戚賔客以吕祖謙標目修九月大水以本紀修塟孝殤皇帝於康陵以通鑑修西域反圍任尚徴尚還以騎都尉叚禧代之以吕祖謙標目修冬十月大水雨雹以本紀修十二月甲子清河孝王慶薨以吕祖謙標目修乙酉罷魚龍曼延百戯通鑑大事記續編卷十二
