body:
  text: 大事記續編卷二十明王禕撰漢孝獻皇帝建安元年解題曰宋庠紀年通譜正月郊祀上帝於安邑改元建安春正月帝居安邑以春秋脩郊祀上帝改元以本紀脩二月張揚使董承治洛陽宫室劉表遣兵助之以列傳脩六月乙未帝幸聞喜本紀袁術攻劉備備拒之吕布襲破下邳降備布自為徐州牧以列傳脩秋七月甲子帝至洛陽以本紀脩丁丑郊祀上帝本紀八月癸卯張揚為大司馬韓暹為大将軍楊奉為車騎将軍領司𨽻校尉以本紀袁宏漢紀脩袁術謀稱帝孫䇿諫之不從遂與之絶以舉要厯補遺脩曹操将迎天子楊奉表為鎮東将軍操至韓暹奔奉辛亥操自領司𨽻校尉録尚書事庚申遷帝於許操自為大将軍封武平侯以紀傳脩解題曰帝自河東還洛陽操欲奉迎車駕徙都於許衆以山東未定韓暹楊奉負功恣睢未可卒制荀彧勸操曰昔晉文公納周襄王而諸侯景從漢髙祖為義帝縞素而天下歸心自天子蒙塵将軍首倡義兵徒以山東擾亂未遑遠赴今鸞駕旋軫東京榛蕪誠因此時奉主上以從人望大順也秉至公以服天下大畧也扶𢎞義以致英俊大德也四方雖有逆節其何能為若不峕定使豪傑生心後雖為慮亦無及矣從之操朝天子於洛陽引董昭並坐問曰今孤來此當施何計昭曰将軍興義兵以誅暴亂入朝天子輔翼王室此五伯之功也此下諸将人殊異意未必服從今留匡弼事勢不便惟有移駕幸許耳然朝廷播越新還舊京遠近企望冀一朝獲安今復徙駕不厭衆心夫行非常之事乃有非常之功願将軍算其多者餘見通鑑觀荀彧勸操之辭與董昭之所以進說則他日九錫之議意向不同可以前知矣立宗廟社稷以本紀脩孫策攻㑹稽降太守王朗自稱太守以吕祖謙標目脩九月楊彪罷以本紀脩冬十月曹操攻楊奉於梁奉奔袁術以列傳脩以袁紹為太尉封鄴侯不受以列傳脩十一月丙戍曹操自為司空行車騎将軍事百官總已以聽荀彧為侍中守尚書令蜀郡太守荀攸為軍師以紀傳脩徵北海太守孔融為将作大匠以列傳脩解題曰融為北海相収合士民起兵講武賊張饒等二十萬衆從冀州還融逆擊為饒所敗乃収散兵保朱虛縣稍復鳩集吏民為黄巾所誤者男女四萬餘人更置城邑立學校表顯儒術薦舉賢良鄭𤣥彭璆邴原等時袁曹方盛而融無所恊附左丞祖者稱有意謀勸融有所結納融知紹操終圖漢室不欲與同故怒而殺之融負其髙氣志在靖難而才疎意廣迄無成功在郡六年劉備表領青州刺史建安元年為袁譚所攻自春至夏戰士所餘纔數百人流矢雨集戈矛内接融隱几讀書談笑自若城夜䧟乃奔東山妻子為譚所虜及獻帝都許徵以為将作大匠遷少府每朝㑹訪對融輙引正定議公卿大夫皆𨽻名而已餘見通鑑蘇軾賛曰文舉以英偉冠世之資師表海内意所予奪天下從之此人中龍也而曹操隂賊險狠特鬼蜮之雄者耳其勢决不兩立使天未欲亡漢公誅操如殺狐兔何足道哉辭㫖抑揚誠為太過若通鑑据司馬彪九州春秋謂其所任用好竒取異多剽輕小才尊事名儒皆備在坐席而已不與共政則又貶之已甚今不取以羽林監棗祗為屯田都尉以魏書紀傳脩袁術求婚於吕布布許之術攻劉備布救之布復攻下邳備奔曹操表備為鎮東将軍以列傳脩解題曰按三國志本紀程昱説操曰觀劉備有雄才而甚得衆心終不為人下不如早圖之操曰方今収英雄時也殺一人而失天下之心不可傳亦明載通鑑據魏書或謂太祖圖備不如本紀明白程迥曰項羽殺義帝公孫瓉害劉虞皆負不道之名適所以兆其亡操英雄盖世所不足者虚曠之度耳昱復賛其無罪而殺英賢非計也先主寓迹於曹之巢穴關羽欲為盗賊之計殺之彼操之黨将畢命於先主豈所當為哉張濟攻穰死族子繡以衆歸劉表以列傳脩袁紹䧟東郡殺太守臧洪以列傳脩解題曰開德府朝城縣漢東郡東武陽縣臧洪據此以拒紹漢孝獻皇帝建安二年春曹操擊張繡降之繡復襲敗操以列傳脩以尚書僕射鍾繇為司𨽻校尉督關中軍韓遂馬騰遣子入侍以列傳脩袁術稱帝以列傳脩三月袁紹為大将軍督冀青幽并四州以本紀脩解題曰以紹為太尉封鄴侯時曹操自為大将軍紹恥為之下偽表辭不受操大懼乃讓位於紹二年使孔融持節拜紹大将軍賜弓矢節鉞虎賁百人兼督冀青幽并四州然後受之李賢曰太尉位大将軍上初武帝以衛青征伐有功以為大将軍欲尊寵之故置大司馬官號以冠之其後霍光等皆然明帝以東平王蒼有賢才以為驃騎大将軍以王故位公上和帝以竇憲征匈奴還遷大将軍在公上以勲戚者不拘常例焉夏五月蝗本紀吕布絶袁術詔以為左将軍術攻布布敗之以列傳脩以孫䇿為騎都尉襲烏程侯以通鑑脩秋九月曹操討袁術術走渡淮以舉要厯補遺脩下楊彪獄既而赦之以列傳脩冬劉備誘楊奉殺之以通鑑脩是歳袁術殺陳王寵本紀漢孝獻皇帝建安三年春三月曹操圍張繡於穰以通鑑脩夏四月遣謁者裴茂率中郎将叚煨討李傕夷其三族以列傳脩郭汜為其将所殺曹操還五月敗張繡劉表兵以通鑑脩吕布復通袁術秋九月布破劉備於沛城備奔曹操操擊布冬十一月張揚将殺揚以應操十二月癸酉操克下邳殺吕布以備為左将軍以列傳脩孫䇿遣使入貢以為討逆将軍封吳侯䇿以居巢長周瑜為建威中郎将以列傳脩徵鄭𤣥為大司農不至以袁宏漢紀脩漢孝獻皇帝建安四年春袁紹攻公孫瓉於易京三月瓉自焚死以紀傳脩解題曰李賢曰公孫瓉臨易河築京故號易京其城三重其内城中有土京在幽州歸義縣南今雄州歸信縣南漢易縣也以漁陽太守鮮于輔為将軍都督幽州以列傳脩袁紹承制以烏桓蹋頓等為單于以列傳脩夏袁術将奔袁譚曹操遣劉備邀之術走六月死以列傳脩秋八月曹操以袁紹将攻許軍黎陽九月還分兵守官渡以魏紀脩解題曰水經注黎侯國也晉灼曰黎山在其南河水逕其東取山之名水之陽以為名竹書紀年梁惠成王十三年鄭釐侯使許息來致地我取軹道與鄭鹿即是城今城内有鹿鳴臺又曰白馬津李賢曰官渡在今鄭州中牟縣北水經注莨蕩渠經曹公壘北有髙臺謂之官渡臺俗謂中牟臺冬十一月張繡降曹操以為将軍将軍賈詡為執金吾以魏傳脩曹操使治書侍御史衛覬鎮關中以魏傳脩復置鹽官徙司𨽻校尉治𢎞農以魏傳脩孫䇿克皖城廬江太守劉勲走䇿擊江夏太守黄祖十二月辛亥劉表遣将救之甲寅䇿大破之徇豫章華歆降分豫章為廬陵郡以吳書脩劉備殺徐州刺史車胄與袁紹連兵以蜀書脩時曹操制新科以吕祖謙標目脩漢孝獻皇帝建安五年春正月車騎将軍董承等受宻詔誅曹操事洩操夷其三族以本紀脩曹操破劉備備奔袁紹操還官渡二月紹軍黎陽以魏紀脩夏四月丙午孫䇿卒於丹徒弟權領其衆以吳書脩解題曰按漢書三國志紀傳袁宏漢紀江表傳吳書吳厯吳録魏畧漢晉春秋孫破虜吳夫人生四男䇿權翊匡一女堅為朱儁佐軍留家壽春䇿年十餘歲已交結知名聲譽發聞有周瑜者與䇿同年亦英達夙成聞䇿聲問自舒唐屬廬州廬江縣今屬舒城縣來造焉便推結分好勸䇿徙居舒推道南大宅以舍䇿升堂拜母有無通共堅薨䇿年十七還𦵏曲阿乃渡江居江都徐州牧陶謙深忌䇿初平三年揚州刺史陳褘死袁術使陳瑀領揚州牧四年術為曹公敗於封丘南向壽春瑀拒不納術保隂陵在濠州合軍攻瑀瑀走術領其州術上吳景領丹陽太守本秦鄣郡今寧國府討故太守周昕遂據其郡術表孫賁丹陽都尉䇿以母弟委張紘徑到壽春見術涕泣而言曰亡父昔從長沙入討董卓與明使君㑹於南陽同盟結好不幸遇難勲業不終䇿感惟先人舊恩欲自慿結願明使君垂察其誠術甚異之然未肯還其父兵謂䇿曰孤用賁舅為丹陽太守賢從伯陽為校尉彼精兵之地唐稱宣潤努手可還依召募䇿乃載母徙曲阿與吕範孫河俱就景募得數百人而為涇縣大帥祖郎所襲幾殆興平元年復往見術太傅馬日磾杖節在壽春辟䇿懐義校尉術大将喬蕤張勲皆傾心焉術初許用䇿為九江太守安豐軍壽春縣九江郡治已而更用陳紀後術欲攻徐州從廬江太守陸康求米三萬斛康不與術大怒遣䇿攻康謂曰前用陳紀毎恨本意不遂今若得康廬江真卿有也䇿攻康㧞之術復用其故吏劉勲為太守䇿益失望先是劉繇為揚州刺史治壽春術已據之繇欲南渡江吳景孫賁迎置曲阿術攻没諸郡繇遣樊能于麋屯横江在和州厯陽縣東南二十六里張英屯當利口在和州城東十二里以拒之以景賁術所授廹逐使去術乃自用惠衢為揚州刺史以景為督軍中郎将與賁併力攻英能等歲餘不下丹陽朱治知術政德不立勸䇿還平江東䇿説術云家有舊恩在江東願助舅討横江横江㧞因投本土召募可得三萬兵以佐明使君匡濟漢室術知其恨而以繇據曲阿王朗在㑹稽䇿未必能定故許之表為折衝校尉行殄㓂将軍兵千餘騎數十匹賔客願從者數百人比至厯陽衆五六千周瑜從父尚為丹陽太守䇿馳書報瑜本文瑜作公瑾瑜發衆及船糧迎䇿䇿大喜曰吾得卿諧也䇿母先自曲阿徙於厯陽䇿又徙母阜陵後漢九江郡縣今滁州全椒縣攻横江當利皆㧞之渡江攻牛渚營在太平州采石盡得邸閣糧榖戰具興平二年也時彭城相薛禮下邳相笮融依繇為盟主禮據秣陵城故縣在建康府南五十五里秣陵橋東北融屯縣南䇿大破之攻繇别将於梅陵轉攻胡孰在建康府上元縣淮水北故城猶在江乘後漢志丹陽郡縣今廢城在建康府皆下之䇿善姿顔喜笑語性濶達聽受善用人士民見者莫不盡心樂為致死呼為孫郎百姓聞孫郎至皆失魂魄長吏委城郭竄伏及至軍士奉令不敢虜掠雞犬菜茹一無所犯民乃大恱競以牛酒詣軍進入曲阿劉繇同郡太史慈見繇未去㑹䇿至繇使慈偵視輕重獨與一騎卒遇䇿䇿從騎十三皆韓當宋謙黄盖輩慈便前鬬正與䇿對䇿刺慈馬掔得項上手㦸慈亦得䇿兠鍪㑹兩家兵騎各來赴於是解散繇奔丹徒䇿身臨行陣張紘諫曰主将籌謀之所自出三軍之所寄命也不宜輕脫自敵小㓂願麾下重天授之姿無令上下危懼䇿勞賜將士遣将陳寳迎母及弟發恩布令告諸縣劉繇笮融故鄉部曲來降首者一無所問樂從軍者一身行復除門户不樂者勿彊旬日之間得見兵二萬餘人馬千餘匹威震江東繇将奔㑹稽許劭本文作子将曰㑹稽富實䇿之所貪且窮在海隅不可往也不如豫章北連豫壤西接荆州若収吏民遣使貢獻與曹兖州相聞雖有袁公路在其間其人豺狼不能久也足下受王命孟德景升必相救濟繇從之䇿從容與吕範棊範曰今将軍事業日大士衆日盛範在遠聞紀綱猶有不整者範願暫領都督佐将軍部分之䇿曰子衡既士大夫加手下已有大衆立功於外豈宜復屈小職範曰不然今舍本土而託将軍者非為妻子也欲濟世務猶同舟渉海一事不牢即俱受其敗此亦範計非但将軍也䇿笑無以答範出便釋褠著袴褶執鞭詣閣下啓事自稱領都督䇿乃授𫝊委以衆事由是軍中肅睦威禁大行䇿命張昭為長史張紘為正議校尉並與參謀常令一人居守一人從征討䇿謂周瑜曰吾以此衆取吳㑹平山越見建安八年平山越解題卿還鎮丹陽頃之袁術遣從弟􅏷代尚為太守瑜尚俱還壽春劉繇南保豫章駐彭澤今池州東流縣笮融至殺太守朱晧入居郡中繇進討為融所破復招屬縣攻融融敗走詔以華歆為豫章太守朱治為吳郡都尉從錢塘欲進到吳吳郡太守許貢拒之於由拳在嘉興府嘉興縣治與戰大破之貢南就山賊嚴白虎䇿進攻㑹稽烏程鄒他及嘉興王晟等各聚衆萬餘吳景等欲先擊破虎等䇿曰虎等群盗非有大志此成禽爾㑹稽功曹虞翻説王朗以為力不能拒不如避之朗以為宜保城邑拒䇿於固陵即西陵也䇿數渡水戰不能克孫静説䇿曰郎負阻城守難可卒㧞查瀆水經注浙江又東逕祖塘謂之祖瀆昔王郎拒孫䇿孫静説䇿祖塘是道要也若從此出破之必矣䇿從之破即固陵南去此數十里宜從彼據其内所謂攻其無備出其不意者也䇿曰善昏暮然火誑朗夜分軍投查浦道夏侯曾先地志吳王伐越次查浦越立城以守查吳作城於浦東以守越今蕭山縣西九里越王城襲髙遷屯寰宇記䇿入郡郡人迎於髙遷在蕭山界朗大驚遣周昕等帥兵前戰䇿破斬之朗亡走浮海至東冶光武時曰東侯官今福州閩縣䇿追擊大破之朗乃詣䇿䇿以其儒雅詰讓而不害自領㑹稽太守命虞翻為功曹待以交友之禮䇿好游獵翻諫曰明府喜輕出微行從官不暇嚴吏卒常苦之夫君人者不重則不威故白龍魚服困於豫且願少留意策遣劉由髙承奉章詣許獻方物建安二年袁術僣號䇿以書責而絶之復以吳景為丹陽太守夏曹公遣議郎王浦奉詔書以䇿為騎都尉襲烏程侯領㑹稽太守勑與吕布及吳郡太守陳瑀共討術䇿欲得将軍號使人諷浦浦便承制假䇿明漢将軍時陳瑀屯海西後漢志廣陵郡縣合屬漣水軍䇿治嚴行到錢塘瑀隂圖襲䇿遣萬演渡江持印傳三十餘紐與丹陽宣城陵陽後漢志丹陽郡縣今池州石埭縣始安在今池州青陽縣黝歙諸險縣大帥祖郎焦已及嚴白虎等使為内應伺䇿軍發攻諸郡䇿覺之遣吕範徐逸攻瑀大破瑀瑀奔冀州袁術欲以周瑜為将瑜觀術終無所成故求為居巢長今無為軍巢縣魯肅署東城長晉灼曰在九江郡李賢曰故城在今濠州定遠縣東南見術不足與立事擕老弱将輕俠少年百餘人就瑜瑜欲東歸術聽之肅因與同行是歲建安三年也䇿自迎瑜授建威中郎将肅留家曲阿曹操本文作太祖表徵王朗䇿遣之操問孫䇿何以得至此朗曰䇿勇冠一世有雋才大志張子布民之望也北面而相之周公瑾江淮之傑攘臂而為其将謀而有成所規不細将為天下大賊非狗盗而已䇿逐袁𦙍術深怨䇿乃隂遣使齎印綬與丹陽宗帥陵陽祖郎等使激動山越合衆攻䇿太史慈與劉繇俱奔豫章而遁於蕪湖見晉咸和二年解題山中稱丹陽太守時䇿已定宣城以東惟涇以西六縣未服慈進住涇縣大為山越所附䇿攻朗於陵陽慈於勇里生獲朗謂曰爾昔襲孤斫孤馬鞍今創軍立事除棄宿恨惟取能用與天下通耳非但汝汝莫恐怖朗叩頭謝罪即破械賜衣服署門下賊曹慈為䇿所執即解縛捉其手曰寕識神亭時耶若卿爾時得我云何慈曰未可量也䇿大笑曰今日之事當與卿共之署門下督還吳授兵拜折衝中郎将後劉繇亡於豫章士衆萬餘人願奉華歆為主歆以為因時擅命非人臣之宜衆守之連月不從䇿命慈往撫焉謂慈曰劉牧往責吾為袁氏攻廬江此繇之所以逼逐吳景孫賁也其意頗猥先君手下數千人盡在公路許孤志在立事不得不屈意於公路求索故兵再往纔得千餘人仍令孤攻廬江不得不為行其後自作邪僣事諫之不從丈夫義交茍有大過不得不離孤交公路及絶之本末如此恨不及其生時與共論辯今兒子在豫章不知華子魚待遇何如卿部曲復依隨之否卿往並宣孤意部曲樂來者與俱來不樂者且慰安之并觀子魚所以牧御廬陵鄱陽人親附之否卿手下兵多少由意慈曰今並息兵不宜多将數十人自足往還左右皆曰慈必北去不還䇿曰子義捨我當復與誰餞送昌門把腕别曰何時能還答曰不過十日議者猶紛紛謂慈與子魚州里恐留彼為籌䇿或疑慈託黄祖假路還北䇿曰孤斷之詳矣子義雖氣勇有膽烈然非縱横之人其心有士模貴重然諾一以意許知已死亡不相負諸君勿憂也慈還議者乃服慈見䇿曰子魚良德也然無他方規自守而已又丹陽僮芝自擅廬陵鄱陽民帥别立宗部言已别立郡海昏南康縣城太史慈所築盖䇿以慈為建昌都尉治海昏也上繚建昌縣有上繚亭在東南十七里雷次宗云亭側三百家昌邑王家劉姓謂之宗人不受發召子魚視之而已䇿拊掌大笑有兼并之志矣䇿遣張紘奉章至許曹公表䇿為討逆将軍以弟女配䇿弟匡又為子彰取賁女禮辟䇿弟權翊又命揚州刺史嚴象舉權茂才張紘為侍御史廬江太守劉勲兵彊於江淮之間䇿惡之遣使卑辭厚幣説勲曰上繚宗民數欺下國擊之路不便願因大國伐之上繚富實得可以富國請出兵為外援勲信之又得䇿珠寳葛越喜恱外内盡賀劉曄獨否勲問其故曰上繚雖小城堅池深不可旬日而舉兵疲於外而國内虛䇿乘虛襲我則後不能獨守是将軍進屈於敵退無所歸若軍必出禍今至矣勲不從伐上繚到海昏宗帥知之空壁逃匿勲了無所得時䇿西討黄祖行及石城後漢志丹陽郡縣今池州貴池縣聞勲輕身詣海昏分遣從兄賁輔率二萬人於彭澤待勲自與周瑜率二萬人歩襲皖城後漢志廬江郡有皖縣即克之得部曲三萬餘人袁術妻子依勲策復収視上用李術為廬江太守給兵三千以守皖皆徙所得人東詣吳賁輔於彭澤破勲勲走從潯陽見晉咸和三年解題歩上到置馬亭後漢志潯陽置馬亭劉繇士衆散處聞䇿已克皖乃投西塞在興國軍至沂築壘告急於黄祖劉表祖遣太子射船軍五千人助勲䇿就攻大破勲勲北歸曹公射亦走䇿収得勲兵二千餘人船千艘遂前攻祖十二月八日到沙羡見建安十三年解題劉表遣從子虎南陽韓晞将長矛五千為祖前鋒䇿大破之斬晞已下二萬餘級溺者二萬餘口船六千餘艘䇿還軍欲取豫章請虞翻曰子魚自有名字然非吾敵也加聞其戰具甚少若不開門讓城金鼔一震不得無所傷害卿便在前具宣孤意翻到郡見歆曰竊明府與王府君齊名中州海内所宗雖在東華常懐瞻仰歆荅曰孤不如王㑹稽翻復問豫章精兵何如會稽曰大不如也翻曰明府言不如王會稽謙光之譚也且精兵不如會稽實如尊教討逆智畧超世用兵如神前走劉揚州君所親見南定鄙郡亦君所聞也今欲守孤城自料資糧已知不足不早為計悔無及也今大軍已次椒丘城在隆興府北一百八十里僕便還去明日日中迎檄不到者與君辭矣歆曰久在江表常欲北歸孫㑹稽來吾便去也翻還報䇿䇿乃進軍歆葛巾迎䇿䇿曰府君年德名望遠近所歸䇿年㓜穉宜修子弟之禮便向歆拜収載劉繇䘮善遇其家以孫賁為豫章太守分豫章為廬陵郡以孫輔為太守䇿謂賁曰兄據豫章已扼僮芝咽喉當伺形便令國儀仗兵而進公瑾為作勢援後聞芝病即如䇿計周瑜到巴丘見建安十五年解題輔遂據廬陵建安五年曹袁相拒於官渡䇿隂欲襲許迎漢帝宻治兵部署諸将将北襲許衆皆懼郭嘉曰䇿所誅皆英雄豪傑能得人死力者也然䇿輕而無備雖有百萬之衆無異於獨行中原也若刺客伏起一人之敵耳䇿臨江未濟果為許貢客所殺陸機辨亡論桓王将北伐諸華誅鉏十紀旋皇輿於夷庚反帝坐於紫闥挾天子以令諸侯清大歩而歸舊物戎車既次中世而殞以此觀之則孫盛所謂曹袁虎争勢傾山海䇿豈暇遠師汝潁遷帝吳越者盖非實録矣䇿性好獵所乘馬精駿從騎絶不能及初許貢表漢帝曰孫䇿驍雄與項羽相似宜加貴寵召還京邑若放於外必作世患候吏得表以示䇿䇿請貢責讓絞殺之貢奴客潜民間欲報讎獵日䇿與客遇客擊傷䇿創甚請張昭等謂曰中國方亂以吳越之衆三江之固足以觀成敗公等善相吾弟呼權佩以印綬謂曰舉江東之衆决機於兩陳之間與天下争衡卿不如我舉能任賢各盡其心以保江東我不如卿至夜卒時年二十六此孫䇿平江左之始末也吕祖謙曰䇿不死興固不可知亡亦不可知盖不為保江東之計使待曹操死則可逞其志耳秋七月劉備屯汝南以蜀書脩九月庚午朔日有食之本紀袁紹圍曹操於官渡冬十月操襲破其輜重於烏巢紹軍潰操殺其八萬人紹殺田豐以魏書紀傳脩解題曰按三國志列傳袁紹圍操本文作大祖下同於官渡操糧方盡問賈翊計焉出翊曰公明勝紹勇勝紹用人勝紹决機勝紹有此四勝而半年不定者但顧萬全故也必决其機湏臾可定也操曰善乃并兵出圍擊紹三十里營破之餘見通鑑帝之在安邑沮授説紹以西迎大駕即宫鄴都此上䇿也紹既失之而為曹氏所先矣及田豐説紹襲許而又不能從操既破袁術平吕布敗張繡紹始簡兵騎欲以攻許亦既晚矣幸而操自討劉備田豐曰曹劉連兵未可卒解若舉軍襲其後可一往而定而紹復以子疾辭及操還軍官渡紹乃議攻許田豐曰操善用兵變化無方衆雖少未可輕也今不如以久持之簡其精銳分為竒兵乘虛迭出以擾河南救右則擊其左救左則擊其右使敵疲於奔命民不得安業我未勞而敵已困不及三年可坐克也今釋廟勝之䇿而决成敗於一戰若不如志悔無及也凡此數策紹皆失之則惟有戰耳而其失又有甚焉者紹之渡河也沮授諫曰勝負變化不可不詳今宜留屯延津分兵官渡若其克獲還迎不晩設其有難衆弗可還紹弗從紹遣軍運榖使淳于瓊将兵送之授復請遣蒋竒别為歩軍於表以絶操之鈔又弗從許攸曰曹操少兵而悉師拒我許下空弱輕軍掩襲可㧞也許㧞則奉迎天子以討操如其未潰可令首尾奔命紹又不從暨攸改計歸操而紹敗矣當呼吸安危之秋而坐失機㑹如此方且慙於田豐而殺之其短於從善不已甚乎晉索綝討趙染染有輕綝之色長史魯徽曰将軍宜整陣案兵以擊之弗可輕也染曰索綝小竪要擒之而後食戰於城西敗績而歸悔曰吾不用魯徽之言以至於此何面見之於是斬徽徽曰将軍愎諫耻敗而復誅戮忠良以逞愚忿袁紹為之於前将軍踵之於後死者無知則已若其有知下見田豐為徒要當訴将軍於黄泉正指此也李賢曰烏巢在滑州酸棗城東水經注烏巢澤在酸棗之東南辛亥有星孛於大梁本紀以司徒掾劉馥為揚州刺史以魏傳脩以孫權為討虜将軍㑹稽太守以吳書脩劉表平長沙零陵桂陽立學校郊祀天地以列傳修解題曰長沙宋潭岳衡鄂吉五州寳慶常德二府武岡軍之地零陵宋永全道靖衡潭六州静江寳慶二府武岡軍之地桂陽宋郴韶連衡潭南雄六州英德府武岡軍之地益州司馬張魯據漢中征東中郎将趙韙攻劉璋以列傳脩漢孝獻皇帝建安六年春二月丁卯朔日有食之以本紀脩夏四月曹操破袁紹於倉亭秋九月曹操擊劉備備奔劉表以魏書本紀脩趙韙圍成都敗死張魯取巴郡以為漢寧太守以列傳脩解題曰漢寧即漢中郡漢孝獻皇帝建安七年春正月曹操軍官渡以魏紀脩夏五月庚戌袁紹薨少子尚領冀州牧長子譚自稱車騎将軍屯黎陽秋九月曹操攻譚尚救之俱敗以列傳脩袁尚遣并州刺史髙幹河東太守郭援南單于攻河東鍾繇破援斬之以列傳脩曹操責孫權侍子不從以吳書脩解題曰按三國志江表傳曹公新破袁紹兵威日盛下書責權質任子權召君臣㑹議張昭秦松等猶豫不能决權意不欲遣質乃獨将周瑜詣母前定議瑜曰昔楚國初封不過百里繼嗣賢能廣土開境遂至荆揚延祚九百今将軍承父兄餘資兼六郡之衆兵精糧多将士用命鑄山為銅煮海為鹽境内富饒人不思亂汎舟舉帆朝發夕至士風勁勇所向無敵有何逼迫而欲送質質一入不得不與曹氏相首尾與相首尾則命召不得不往便見制於人也極不過一侯印僕從十餘人車數乘馬數匹豈與南面稱孤同哉不如勿遣徐觀其變若曹氏能率義以正天下将軍事之未晩若圖為暴亂兵猶火也不戢将自焚将軍韜勇抗威以待天命何送質之有權母曰公瑾議是也餘見通鑑張秦諸人與公瑾所見不同論議迥别已决於此不待他日而後見也漢孝獻皇帝建安八年春二月曹操攻黎陽袁譚袁尚戰敗夏四月操追至鄴解題曰按相臺志商河亶甲居相秦屬邯鄲郡漢為魏郡曹公為魏王都此分為東西部黄初二年以東部為陽平郡西部為廣平郡并魏為三魏文帝分十部為三部石虎慕容雋皆都之後魏置相州東魏北齊都焉改為司州又改清都尹後周復置相州及魏郡徙州於安陽故城唐為相州天寳曰鄴郡屬天雄軍後梁為昭德軍宋省鄴縣入臨漳縣曹操破袁氏因其富强遂居之天下方亂百姓奔赴依以小康久之户口視天下為最民號難治餘見晉永嘉七年梁中大同六年解題五月操還許袁譚攻尚敗還南皮以列傳脩秋七月令郡國脩學校以魏紀脩解題曰葉適曰操令縣滿五百户者置校官而其辭曰其令郡國各脩文學按操雖竊漢柄號令所行施其統内若兗冀之郡國可也與人主制詔並行於天下可乎荀彧非不見微者猶曰愛人以德何也陳壽雖著魏書然有漢則無魏而事辭錯雜後世無别史法不復存矣事見通鑑八月曹操擊劉表以魏紀脩袁尚攻譚大破之譚奔平原冬十月曹操救譚至黎陽尚走以列傳脩孫權平山越以吳書脩解題曰按三國志賀齊傳守剡長又諸葛恪傳丹陽地勢險阻與吳郡㑹稽新都今徽州鄱陽四郡隣接周旋數千里山谷萬重盖今宣潤徽廣德嚴杭衢饒之境皆是也甲申漢孝獻皇帝建安九年春二月袁尚攻譚曹操圍鄴解題曰操濟河遏淇水入白溝以通糧道引漳水以圍之周四十里初淺而狹如或可越審配不出爭利望而笑之一夜增修廣修二丈引漳水注之餘見通鑑水經注淇水南厯枋堰舊淇水南東流逕黎陽縣南入河溝洫志曰在遮害亭西十八里至淇水口是漢建安九年魏武王於水口下大枋木以成堰遏淇水東入白溝故號其處為枋頭其後遂廢魏熈平中復通之按史白起為鄴令堰漳水灌田魏武王又捍漳水回流東注宋王訟議復鄴渠言相州圖經載天井堰魏武所作凡二十里分十二墱墱相距三百歩互相灌注然漳水淺不與岸平就髙處鑿岸為平而截流為堰然後水行數里秋七月尚還救之敗奔中山八月操破鄴九月令河北毋出今年租賦操自領冀州牧定田租之制以魏紀晉食貨志脩解題曰按三國志魏書載公令曰袁氏之治也使豪强擅恣親戚兼并下民貧弱代出租賦衒鬻家財不足應命欲百姓親附甲兵彊盛其可得耶其収田租畆四升户出絹二疋綿二斤而已他不得擅興發郡國守相明檢察之無令强民有所隱藏而弱民兼賦也水經注魏武引漳水自城西東入逕銅雀臺下伏流束注謂之長明溝渠水又南逕上東門下魏武於鄴為北宮宫有文昌殿溝水南北夾道枝流引灌於文昌殿處造東西太武二殿城西北三臺因城為之七門南鳯陽中中陽次廣陽東建春北廣德次廐門西金商冬十月有星孛於東井本紀高幹降以列傳脩解題曰幹才志𢎞邈曹操本文作太祖圍鄴袁尚遣牽招至上黨督軍糧未還尚破走中山時幹為并州刺史招以并州左有恒山之險右有大河之固帶甲五萬北阻彊胡勸幹迎尚并力觀變幹既不能而隂欲害招招間行而去餘見通鑑袁譚攻尚尚奔袁熈曹操討譚十二月譚保南皮以列傳脩解題曰郡國志南皮勃海郡縣是歲公孫度卒子康立以魏傳脩漢孝獻皇帝建安十年春正月曹操斬袁譚幽州将焦觸逐袁熈而降操熈尚奔烏桓以紀傳脩夏四月張燕降以本紀脩冬十月髙幹叛解題曰按三國志列傳荀衍以監軍校尉守鄴都督河北事操本文作太祖之征袁尚也幹宻遣兵謀襲鄴衍逆覺盡誅之餘見通鑑曹操以西平太守杜畿為河東太守以列傳脩祕書監荀恱上申鑑五篇以列傳脩解題曰時政在曹氏天子恭已恱志在獻替而謀無所用故作是書餘見通鑑程迥曰恱當獻帝時不肯同荀文若輩為曹操用亦不同孔文舉為操所忌獨以著書見於後世其書有益於治道盖一時之望也然欲使凡噐與顔冉同趨則申商之習也賢如恱尚不能不為習俗所移何望於他人哉漢孝獻皇帝建安十一年春正月有星孛於北斗本紀曹操擊髙幹三月斬之以陳羣梁習為并州刺史以魏傳脩漢孝獻皇帝建安十二年春三月曹操襲烏桓秋八月大破之斬蹋頓解題曰按魏書列傳漢末遼西烏丸大人丘力居衆五千餘落上谷大人難樓衆九千餘落各稱王而遼東屬國大人蘇僕延衆千餘落自稱峭王右北平大人烏延衆八百餘落自稱汗魯王後丘力居死子樓班年小從子踏頓有武畧代立總攝三王部衆皆從其教令後樓班大峭王率其部衆奉樓班為單于踏頓為王操本文作太祖下同北征三郡烏丸軍次無終故無終子國時屬右北平郡方夏雨水濵海洿下濘滯不通虜亦遮守蹊要操患之以問田疇疇曰此道秋夏每常有水淺不通車馬深不載舟船為難久矣舊北平郡治在平岡前漢右北平郡治平岡後漢治上垠道出盧龍達於栁城前漢遼西郡縣以地有三栁水取名後魏置營州於和龍城領六郡李繪曰唐營州南又有五栁城自建武以來陷壊斷絶而尚有微徑可從今虜将以大軍當由無終不得進而退懈弛無備若嘿回軍從盧龍口漢遼西肥如縣隋唐為盧龍縣有盧水南入海故曰盧龍口越白檀之險前漢屬漁陽郡隋樂安郡武德改檀州以白檀城名出空虛之地路近而便掩其不備踏頓之首可不戰而禽也操曰善乃引軍還而署大木表於水側路傍曰方今暑夏道路不通且俟秋冬乃復進軍虜候騎見之誠以為大軍去也操令疇将其衆為鄉導出盧龍塞壍山陻谷五百餘里渉鮮卑庭東指栁城未至二百里虜乃知之蹋頓等将數萬騎逆軍八月登白狼山前漢右北平白狼縣有白狼山卒與虜遇衆甚盛操車重在後被甲者少左右皆懼操登髙望虜陣不整乃縱兵擊之虜衆大崩斬蹋頓及名王已下降者二十餘萬時寒且旱二百里無水軍又乏食殺馬數千匹以為糧鑿地三十餘丈乃得水既還科問前諫者人人皆懼操皆厚賞之曰孤前行乘危以僥倖雖得之天所佐也顧不可以為常諸君之諫萬安之計是以相賞後勿難言之餘見通鑑蘇軾曰操既勝烏桓曰前諫我者萬全之計也乃賞諫者曰後勿難言袁紹既敗於官渡曰諸人聞吾敗必相哀惟田别駕不然當幸其言之中也乃殺豐為明主謀而不中不惟無罪乃有賞為庸主謀而忠賞固不可得而禍隨之吾今乃知袁曹所以興亡者袁熈袁尚奔遼東九月公孫康斬送之以紀傳脩冬十月辛卯有星孛於鶉尾本紀劉備説劉表襲許不能用以通鑑脩是歲劉備三顧處士諸葛亮於隆中以蜀書修解題曰先主詣亮凡三往乃見因屏人曰漢室傾頽姦臣竊命主上䝉塵孤不度德量力欲信大義於天下而智術淺短遂用猖蹶至於今日然志猶未巳君謂計将安出亮答曰自董卓已來豪傑並起跨州連郡者不可勝數曹操比於袁紹則名微而衆寡然操遂能克紹以弱為强者非為天時抑亦人謀也今操已擁百萬之衆挾天子而令諸侯此誠不可與爭鋒孫權據有江東已厯三世國險而民附賢能為之用此可與為援而不可圖也荆州北據漢沔利盡南海東連吳㑹西通巴蜀此用武之國而其主不能守此殆天所以資将軍豈有意乎益州險塞沃野千里天府之土髙祖因之以成帝業劉璋闇塞張魯在北民殷國富而不知存䘏智能之士思得明君将軍既帝室之胄信義著於四海總覧英雄思賢如渇跨有荆益保其岩阻西和諸戎南撫夷越外結好孫權内脩政理天下有變則命一上将将荆州之軍以向宛洛将軍身率益州之衆出於秦川百姓孰敢不簞食壺漿以迎将軍者乎誠如是則覇業可成漢室可興矣先主曰善於是與亮情好日宻餘見通鑑漢晉春秋亮家於南陽鄧縣襄陽二十里號曰隆中蘇軾曰古之君子如伊尹太公管仲樂毅之流其王覇之略皆定於畎畆中非仕而後學者也諸葛孔明卧草廬中與先主論曹操孫權規取劉璋因蜀之資以爭天下終身不易其言此豈口傳耳受嘗試為之而僥倖其或成者哉漢孝獻皇帝建安十三年春正月曹操作𤣥武池肄舟師以魏紀脩解題曰水經注淇水又西逕魏武𤣥武故苑苑有𤣥武池肄舟師孫權擊黄祖斬之以吳書脩解題曰江夏宋鄂黄光蘄隨郢復七州德安府漢陽信陽興國荆門四軍之地祖横兩蒙衝本作艨艟戰船也挾守沔口以栟閭大紲繫石為矴上有千人以弩交射飛矢雨下軍不得進前偏将軍董襲與别部司馬凌統俱為前部各将死士百人被兩鎧乘大舸突入蒙衝裏襲以刀斷兩紲蒙衝乃横流大兵遂進祖便開門走兵追斬之餘見通鑑通典黄祖屯沙羡縣即今鄂州水經注沔左有却月城沙羡縣治黄祖所守董襲凌統攻之却月城乃今漢陽漢安陸縣地不應立沙羡縣然酈道元援襲統為言者盖建安四年孫䇿走黄祖於沙羡今鄂州也十三年孫權破祖今漢陽也八年權破祖舟師惟城未克沙羡城赤烏始築當時未有城則所謂城者却月城也漢江夏郡在安陸縣東南往往祖為䇿殘破之後竄伏江北故守沔口耳水經以却月城為祖所守已得之而遂以為沙羡縣治則非也夏六月罷三公官復置丞相御史大夫癸巳曹操自為丞相以東西曹掾毛玠崔琰典選舉河内司馬勲為文學掾以魏傳脩徵前将軍馬騰為衛尉其子超為偏将軍領其衆以列傳脩秋七月曹操擊劉表以本紀脩解題曰按三國志列傳操本文作太祖下同将伐表問荀彧䇿安出彧曰今華夏已平南土知困矣可顯出宛葉間而間行以輕進掩其不意遂行㑹表死操直趨宛葉如彧計餘見通鑑八月壬子殺太中大夫孔融夷其族以本紀脩解題曰事見通鑑黄庭堅曰陳壽叙武侯躬耕隴畆好為梁甫吟語既不盡其意又失載此詩此盖好簡之過余觀梁甫吟云歩出齊城門遥望蕩隂里里中有三墳纍纍正相似問是誰家冡田彊古冶氏力可排南山文能絶地理一朝被䜛言二桃殺三士誰能為此謀相國齊晏子武侯盖以曹公專國殺楊脩孔融荀彧耳但云好為梁甫吟不知壽意所在豈既作此詩時時為客歌之故云爾乎劉表卒少子琮領荆州牧九月曹操至新野琮降劉備走操追破之於長坂進軍江陵以本紀蜀書脩解題曰諸葛亮説先主攻琮荆州可有備曰吾不忍也餘見通鑑程頥曰孔明有王佐之才道則未盡王者如天地之無私心焉行一不義而得天下不為孔明必求有成而取劉璋聖人寧無成耳此不可為也若劉表子琮将為曹公所并取而興劉氏可也張栻曰亮一見昭烈遂定取荆益之計盖亮之心欲昭烈以興復漢室為己任以興復為己任則天下諸侯内懐他圖者吾固得以正名而討之矣况琮之迎降於操則荆固魏之荆州矣於以取之豈不正乎昭烈徇於小不忍而妨大計故劉琮可取而不取及狼狽而遁雖藉吳之力敗操赤壁然終迫於吳乃始入蜀以譎計取之亮於此時盖亦有黽勉不得已者長阪在今荆門軍當陽江陵古郢之南鄙今縣北十里汜南城故漢縣舊治於郢在縣東南今治晉桓温所築冬十月癸未朔日有食之本紀劉備屯樊口遣諸葛亮求救於孫權十一月曹操舟師東下備以權将周瑜迎擊於赤壁大破之操走追至南郡弗及操留将軍曹仁等守南郡瑜大破之於夷陵以皇極經世吳書脩解題曰按三國志列傳江表傳山陽公載記操本文作太祖下同破荆州欲順流東下賈翊諫曰公昔破袁氏今収漢南威名遠著軍勢既大若乗舊楚之饒以享吏士撫安百姓使安土樂業則可不勞衆而江東稽服矣不從裴松之曰於時韓馬之徒尚狼顧關右魏武不得安坐郢都以威懐吳㑹也彼荆州者孫劉之所必爭荆人服劉主之雄姿憚孫權之武畧為日既久誠非曹氏諸将所能禦故曹仁守江陵敗不旋踵何撫安之得行稽服之可期将此既平江漢威懾吳越資劉表水戰之具藉荆楚擑棹之手實廓定之大機不乘此取吳将安俟哉至於赤壁之敗實由疾疫大興以損凌厲之鋒凱風自南以成焚如之勢天實為之豈人事哉魏武後平張魯蜀中一日數十驚劉備雖斬之而不能止由不用劉曄之計以失席卷之㑹世咸謂劉計為是則愈見賈言之非也魯肅請奉命吊表二子并慰勞其軍中用事者及説備使撫表衆同心一意共治曹操今不速往恐為操所先權遣肅行到夏口夏水本江之别自江陵東南流入沔謂之䐗口又與沔水至魯山下㑹於江謂之夏口又謂之魯口宜在江北史言夏口多指鄂州按水經注黄鶴山夏口城孫權所築對岸則入沔津故城以夏口為名若然則自權築城後始取對岸之名名之傳者遂不曰城而曰夏口江北之名始晦矣聞曹公已向荆州晨夜兼道比至南郡而琮已降曹公備惶遽奔走欲南渡江肅逕迎之到當陽長阪與備㑹騰權㫖及陳江東彊固勸備與權并力備甚恱時諸葛亮與備相隨肅謂亮曰我子瑜友也即共交備遂到夏口亮曰事急矣請奉命求救於孫将軍時權擁軍在柴桑在今江州彭澤縣觀望成敗亮說權曰海内大亂将軍起兵據有江東劉豫州收衆漢南與曹操並爭天下今操芟夷大難畧已平矣遂破荆州威震四海英雄無所用武故豫州遁逃至此将軍量力而取之若能以吳越之衆與中國抗衡不如早與之絶若不能當何不按兵束甲北面而事之今将軍外託服從之名而内懐猶豫之計事急而不斷禍至無日矣權曰苟如君言劉豫州何不遂事之乎亮曰田横齊之壮士耳猶守義不辱况劉豫州王室之胄英才盖世衆士慕之若水之歸海事之不濟此乃天也安能復為之下乎權勃然曰吾不能舉全吳之地十萬之衆受制於人吾計決矣非劉豫州莫可當操者然豫州新敗之後安能抗此難乎亮曰豫州軍雖敗於長阪今戰士還者及關羽水軍精甲萬人劉琦合江夏戰士亦不下萬人操之衆遠來疲弊聞追豫州輕騎一日一夜行三百餘里此所謂强弩之末勢不能穿魯縞者也故兵法忌之曰必蹶上将軍且北方之人不習水戰又荆州之民附操者偪兵勢耳非心服也今将軍誠命猛将統兵數萬與豫州恊規同力破操軍必矣操破必北還如此則荆吳之勢强鼎足之形成矣成敗之機在於今日權大恱袁暐曰張子布薦亮於權亮不肯留人問其故曰孫将軍可謂人主然觀其度能賢亮而不能盡亮吾是以不留朱熹曰亮對面説得如說權一叚辨士不及也曹公兵數十萬将士聞之皆恐權延見羣下問以計䇿咸曰曹公豺虎也挾天子以征四方動以朝廷為辭今日扼之事更不順且将軍大勢可以拒操者長江也今操得荆州掩有其地劉表治水軍蒙衝鬭艦以千數操悉浮以㳂江兼有歩兵水陸俱東此為長江之險已與我共之矣而勢力衆寡又不可論愚謂大計不如迎之朱治傳權從兄豫章太守賁女為曹公子婦公破荆州賁欲遣子入質治聞之求往見賁為陳安危賁遂止當是時幾於親戚叛之矣㣲瑜肅决定大計殆哉魯肅獨不言權起更衣肅追於宇下權知其意執肅手曰卿欲何言肅對曰向察衆人之議專欲誤将軍不足與圖大事今肅可迎操耳如将軍不可也肅迎操操當以肅還付鄉黨品其名位猶不失下曹從事乘犢車從吏卒交游士林累官故不失州郡也将軍迎操欲安所歸願早定大計莫用衆人之議也權嘆息曰諸人持議甚失孤望今卿廓開大計正與孤同此天以卿賜我也時周瑜受使至鄱陽肅勸追召瑜還瑜曰操雖託名漢相其實漢賊也将軍以神武雄才兼仗父兄之烈割據江東地方數千里兵精足用英雄樂業尚當横行天下為漢家除殘去穢况操自送死而可迎之邪請為将軍籌之使北土已安操無内憂能曠日持久來爭疆埸又能與我校勝負於船楫可乎今北土未平加馬超韓遂尚在關西為操後患舍鞍馬仗舟楫與吳越爭衡又今盛寒馬無藁草驅中國士衆遠渉江湖之間不習水土必生疾病此數者用兵之患也而操皆冐行之将軍擒操宜在今日瑜請得精兵三萬人進往夏口保為将軍破之吕䝉傳孫權與陸遜論曰孟德張言方率數十萬衆水歩俱下孤普請諸將咨問所宜無適先對至子布文表俱言宜遣使脩檄迎之子敬即駁言不可勸孤急呼公瑾付任以衆逆而擊之則是設計拒操肅實發其端周瑜傳云權延見羣下問以計䇿瑜擺撥衆人之議獨言抗拒之計了不及肅故裴松之直言其攘肅之善也權曰老賊欲廢漢自立久矣徒忌二袁吕布劉表與孤耳今數雄已滅惟孤尚存孤與老賊勢不兩立君言當擊甚與孤合此天以孤授君也㧞刀斫前奏案曰諸将吏敢復有言迎操者與此案同及㑹罷之夜瑜請見曰諸人徒見操書言水歩八十萬而各恐懾不復料其虛實便開此議甚無謂也今以實校之彼所将中國人不過十五六萬且已久疲所得表衆亦極七八萬耳尚懐狐疑夫以疲病之卒御狐疑之衆衆數雖多甚未足畏得精兵五萬自足制之願将軍勿慮權撫背曰公瑾卿言至此甚合孤心子布文表諸人各顧妻子挾持私慮深失所望獨卿與子敬與孤同耳此天以卿二人賛孤也五萬兵難卒合已選三萬人船糧戰具俱辦卿與子敬程公便在前發孤當續發人衆多載資糧為卿後援卿能辦之者誠决邂逅不如意便還就孤孤當與孟德决之瑜程普為左右督與備并力逆操江表傳曰普頗以年長數陵侮瑜瑜折節容下終不與校普後自敬服而親重之孫皎傳吕䝉襲南郡權欲令皎與䝉為左右部大督䝉説權曰昔周瑜程普為左右部督共攻江陵雖事决於瑜普自恃乆將且俱是督遂共不睦㡬敗國事肅為賛軍校尉助畫方畧備住樊口日遣邏吏於水次候望權軍吏望見瑜船馳往白備備遣人慰勞之瑜曰有軍任不可得委署倘能屈威誠副所望備與關羽張飛曰彼欲致我不往非同盟之意也乃乘單舸往見瑜問曰今拒曹公深為得計戰卒有幾瑜曰三萬人備曰恨少瑜曰此自足用豫州但觀瑜破之備欲呼魯肅等㑹語瑜曰受命不得妄委署欲見子敬可别過之又孔明已俱來不過三兩日到也於是與操遇於赤壁時操軍衆已有疾病初一交戰操軍敗退引次江北瑜等在南岸瑜歩将黄盖曰今冦衆我寡難與持久然觀操軍方連船艦首尾相接可燒而走也乃取蒙衝鬭艦數十艘實以薪草膏油灌其中裹以帷幕上建牙旗先書報曹公欺以欲降又豫備走舸各繫大船後因引俱前曹公軍吏士皆延頸觀望指言盖降盖放諸船同時發火時風盛猛悉延燒岸上營落頃之烟炎張天人馬燒溺死者甚衆軍遂退敗山陽公載記軍既得出公大喜諸将問之劉備吾儔也但得計少晩向使早放火吾徒無類矣備尋亦放火而無所及公詭為此言所以安其下之心也操引軍從華容道今江陵府監利石首縣地皆是也歩歸遇泥濘道不通天又大風悉使羸兵負草填之騎乃得過羸兵為人馬所踏藉陷泥中死者甚衆李舜臣曰老瞞禠魂顛沛頻死倘乘此之鋭命一二将間道以要其歸路而周瑜輩繼以大兵懾之則彼衆可盡而操可生虜惜孫劉之不知出此也備之奔吳也論者以為權必殺備程昱料之曰權新在位未為海内所憚曹公無敵於天下初舉荆州威震江表權雖有謀不能獨當也劉備有美名關羽張飛皆萬人之敵權必資之以禦我難解勢分備資以成又不可得而殺也權果與備兵以禦操本文作太祖餘見通鑑水經注參之江水左徑烏林南吳壁黄盖敗魏武於烏林處右徑之赤山魏去鄂州九十里其北岸即百人山周瑜黄盖詐大軍所起處元和郡縣志赤壁在蒲圻縣一百二十里北岸即烏林但相去二百餘里兩軍共在一江既未退走而先敗其首後敗其尾於二百里之外恐無此理今詳焚舟之處實在赤壁曹公大敗之後周瑜劉備自後追之越二百里軍至烏林遂自華容歩歸元和郡縣志洞庭湖口有曹公洲曹公於巴丘遇疾燒船歎曰郭奉孝在不使孤至此十二月孫權圍合肥以吳書脩劉備徇武陵長沙桂陽零陵下之以諸葛亮為軍師中郎将督三郡以蜀書修解題曰武陵今常德江陵灃辰沅岳靖七郡之地漢孝獻皇帝建安十四年春三月曹操軍譙孫權還以吳書脩秋七月曹操水軍自渦合肥屯田芍陂解題曰事見通鑑水經肥水出九江成德縣廣陽鄉西施水别北過其縣西北入芍陂注陂周一百三十許里在壽春縣南八十里芍音鵲壽春志芍陂在安豐縣東楚孫叔敖作陂面百里周圍三百四十里灌壽春安豐民田萬頃東漢王景魏鄧艾宋長沙王義欣並脩之魏劉馥開七門以溉田隋趙􅁤更開三十六門宋慶厯四年宋祁通開陶子午渠灌陂及皇祐元年吕公弼奏度鄱山龍穴兩源水利於窗口立限木分水入陂冬十二月操使将軍張遼守合肥而還以魏書紀傳脩周瑜克南郡曹仁走孫權以瑜領南郡太守劉備表權行車騎将軍領徐州牧權以備領荆州牧屯公安以蜀書脩解題曰按三國志李通傳劉備與周瑜圍曹仁於江陵别遣關羽絶北道江表傳曹公聞瑜年少有美才謂可游説動也乃宻下揚州遣九江蒋幹往見瑜幹有儀容才辯獨歩於江淮之間乃布衣葛巾自託私行詣瑜瑜出迎之立謂幹曰子翼良苦逺渉江湖為曹公作説客耶幹曰吾與足下州里中年隔别遥聞芳烈故來叙濶并觀雅規而云説客無乃逆詐矣乎瑜曰吾雖不及䕫曠聞絃賞音足知雅曲因延幹入為設酒食後三日請幹與周觀營中行視倉庫軍資噐仗訖還飲宴視之侍者服飾珍玩之物因謂幹曰丈夫處世遇知己之主外託君臣之義内結骨肉之恩言行計從祸福共之假使蘇張更生猶将撫其背而折其辭豈足下幼生所能移乎幹笑而不言還稱瑜雅量髙致非言辭所能間中州之士亦以此多之劉備之自京口還也權乘飛雲大船追送之大宴㑹叙别權與備留語因歎瑜曰公瑾籌畧萬人之英顧其噐量廣大恐不久為人臣耳瑜之破魏軍也曹公曰孤不羞走後書與權曰赤壁之役值有疾病孤燒船自退横使周瑜虛獲此名瑜威聲遠著故曹劉咸欲疑譛之蘇軾曰孟德所用皆為人役者也以子房待文若然終不免殺之豈能用公瑾之流度外之士哉備立營改名公安油河在縣西九十歩出施州由松滋至縣入江漢孝獻皇帝建安十五年春曹操下令求才以魏紀脩二月乙巳朔日有食之本紀冬曹操作銅爵臺於鄴以魏紀脩解題曰魏武立三臺銅爵中臺也金虎南臺也冰井北臺也左思魏都賦三臺列峙而崢嶸餘見建安九年解題十二月劉備見孫權於京口求督荆州以蜀書皇極經世脩周瑜見孫權請取蜀及襄陽還卒於巴丘權以校尉魯肅領其兵以蜀書吳書皇極經世脩解題曰劉璋為益州牧外有張魯㓂侵瑜詣京見權曰今曹操新折衂方憂在腹心未能與将軍相事也乞與奮威俱進取蜀得蜀而并張魯因留奮武固守其地與馬超結援瑜還與将軍據襄陽以蹙操北方可圖也權許之瑜還江陵為行装而道於巴丘病卒蜀傳權遣使欲共取蜀或以為宜報聽許吳終不能越荆有蜀蜀地可為己有荆州主簿殷觀進曰若為吳先驅進未能克蜀退為吳所乘則事去矣今但可賛其伐蜀而自説新據諸郡未可與動吳必不敢越我而獨取蜀如此進退之計可以収吳蜀之利從之權果輟計輿地廣記吳巴丘邸閣資水沅水灃水湘水注洞庭㑹大江名五渚瑜病因上疏曰當今天下方有事役是瑜乃心夙夜所憂願至尊先慮未然然後康樂今既與曹操為敵劉備近在公安邊境宻邇百姓未附宜得良将以鎮撫之魯肅智畧足任乞以代瑜瑜隕踣之日所懐盡矣即拜肅奮武校尉代瑜領兵瑜士衆數千奉邑四縣皆屬焉肅初住江陵後下屯陸口雋水一名陸水自巴陵入鄂州界至嘉魚入江水經注水出下雋縣三山溪東逕陸城又東逕下雋縣南故長沙舊縣又逕蒲􅑑西北入大江謂之刀環口又謂之蒲􅑑口威恩大行衆增萬餘人肅過尋陽令吕蒙屯下詣䝉酒酣䝉問肅曰君受重任與關羽為隣将何計畧以備不虞肅造次應曰臨時施宜蒙曰今東西雖為一家而關羽實熊虎也計安可不豫定因為肅畫五䇿肅於是越席就之拊其背曰子明吾不知卿才畧所及乃至於此遂拜䝉母結友而别餘見通鑑孫權以荆州借劉備分豫章為畨陽郡長沙為漢昌郡以吳書脩解題曰按魯肅傳曹公聞權以土地業備方作書落筆於地唐庚曰漢荆州七郡劉表没南陽入於中原而荆州獨有南郡江夏武陵長沙桂陽零陵備之南奔劉琦以江夏從之其後四郡相繼歸附於是備有武陵長沙桂陽零陵之地曹仁既退關羽周瑜錯處南郡而備領荆州牧居公安則六郡之地備已悉據之矣其所以云借者猶韓信之言假也雖欲不子得乎魯肅之議正合躡足之機而周瑜獨以為不然屢勝之家果不可與料敵哉諸葛亮始見劉備即論曹操不可與争鋒孫權可為援而不可圖魯肅一與權語亦謂曹操不可卒除惟有鼎足江東以觀天下之勢曹操自赤壁北歸備既夙有雄名且新破大敵又得荆州人心權雖欲不割地授之不可也以操之智而膽破落筆亦可見其非計之誤矣權後論肅以借地為二短盖夸衆之辭耳若孫䇿與周瑜則志大而才未必稱故䇿欲襲許以爭中原瑜欲取蜀以圖北方惟䇿可以用瑜瑜可以佐䇿䇿既隕瑜早亡使權終用之未必不敗事也䇿瑜雖人傑豈若備權之審於料敵亮肅之審於量主哉畨陽今饒州漢昌今岳之平江州劉備以從事龎統守耒陽令以蜀書脩孫權以畨陽太守歩隲為交州刺史以吳書脩漢孝獻皇帝建安十六年春正月以曹操世子丕為五官中郎将副丞相以魏紀袁宏漢紀脩三月曹操遣鍾繇討張魯将軍韓遂馬超等十部反據潼關秋七月操討之九月戰於渭南大破之遂超奔凉州以魏紀脩解題曰按三國志列傳司𨽻校尉鍾繇求以三千兵入關外託討張魯内以脅取質任操本文作太祖下同使荀彧問衛覬覬以為西方諸将皆竪夫崛起無雄天下意茍安樂目前而已今國家厚加爵號得其所志非有大故不憂為變也宜為後圖若以兵入關中當討張魯魯在深山道徑不通彼必疑之一相驚動地險衆强殆難為慮彧以覬議呈操操初善之而繇自典其任遂從繇議兵始進關右大叛操自親征僅乃平之死者萬計操悔不從覬議馬超遂與韓遂楊秋李堪成宜等叛遣曹仁討之超等屯潼關通典潼關在華州華隂縣即左傳桃林塞本名衝關河水自龍門南流衝激華山而東故名按秦函谷關漢𢎞農郡𢎞農縣在陜州靈寳縣界武帝徙於新安縣界獻帝初平二年出函谷關關在新安後二十年破馬超於潼關即是中間徙於今所史失之隋大業移於南北鎮去舊關四里唐天授二年移向北近河為路操飭諸将關西兵精悍堅壁勿與戰秋七月操西征與超等夾關而軍操急持之而潜遣徐晃朱靈等夜渡蒲坂津據河西為營操自潼關臨河先渡兵獨與虎士百餘人留南岸斷後超将歩騎萬餘人來奔操本文作太祖下同軍矢下如雨操猶坐胡床不起張郃見事急共引操入船軍爭濟船重欲没校尉許禇斬扳船者左手舉馬鞍蔽操船工為流矢所中死禇右手平立泝船校尉丁斐放牛馬以餌賊賊亂取牛馬操乃得渡循河為甬道而南賊退拒渭口操乃多設疑兵潜以舟載兵入渭為浮橋夜分兵結營於渭南賊夜攻營伏兵擊破之超等屯渭南遣信求割河以西請和操不許九月進軍渡渭超等數挑戰又不許固請割地求送任子操用賈詡計偽許之韓遂請與操相見操與遂父同歲孝亷於是交馬語移時不及軍事但説京都舊故拊手歡笑列傳操與遂超等單馬㑹語左右皆不得從惟将許禇超負其力隂欲前突操素聞禇勇疑從騎是禇問曰公有虎侯者安在操顧禇禇目盻之超不敢動乃各散既罷超等問遂操何言遂曰無所言也超等疑之他日操又與遂書多所㸃竄如遂改定者超等愈疑操乃與克日㑹戰先以輕兵挑之良久乃縱虎騎夾擊大破之斬成宜李堪等遂超走凉州楊秋奔安定餘見通鑑冬十二月劉璋迎劉備使討張魯備與璋㑹於涪諸葛亮及将軍關羽守荆州以蜀書脩解題曰龎統言於備曰荆州荒殘人物殫盡東有孫車騎北有曹操難以得志益州户口百萬土沃財富誠得以為資大業可成也備曰今指與吾為水火者曹操也操以急吾以寛操以暴吾以仁操以譎吾以忠每與操反事乃可成耳今以小利而失信義於天下柰何統曰離亂之時固非一道所能定也且兼弱攻昧逆取順守古人所貴若事定之後封以大國何負於信義今不取終為人利耳備以為然餘見通鑑朱熹曰劉備當時無以為資若聲劉焉父子之罪而討之名却正當但彼亦得人情恐未易取聖人處此必有其道寧事之不成後世事欲茍成不暇顧理道也孔明始發荆益之謀蜀志稱龎統法正為謀主不及亮者為之諱也漢孝獻皇帝建安十七年春正月曹操還鄴自加殊禮以本紀脩夏五月誅馬騰夷三族本紀六月庚寅晦日有食之本紀秋七月洧水潁水溢本紀解題曰水經潁水出潁川陽城縣宋河南府永安縣西北少室山水經注潁水三源右水出陽乾山之潁谷東南流中水導源少室通阜東南流東與右水合左水出少室南溪東合潁水東南過陽翟縣今屬潁昌府潁陽縣屬河南府潁隂縣順昌府臨潁縣臨潁屬順昌府汝南屬蔡川縣隱强縣屬淮寧府商水縣北洧水東流注之又過西華屬淮寧府汝陽淮寧府商水縣南頓在淮寧府新陽至慎縣東南入於淮洧水出河南宻縣宋屬鄭州西南馬嶺山東南過其縣南又至鄭縣鄭州新鄭縣長社屬潁昌府新汲茅城縣習陽城西折入於潁九月孫權作石頭城自京口徙治建業作濡湏塢以吳書皇極經世脩解題曰濡湏塢在今和州厯陽縣西南一百八十里無為軍巢縣東南二百八里濡湏水出巢湖夾水立塢状如偃月餘見建興元年東興解題事見通鑑冬十月曹操擊孫權以魏紀脩侍中光禄大夫參丞相軍事荀彧自殺以列傳脩解題曰袁暐獻帝春秋董承之誅伏后與父完書言司空殺董承帝方為報怨完得書以示彧彧隱而不言後恐事覺欲自發之因求使至鄴勸操本文作太祖下同以女配帝操曰今朝廷有伏后吾何得以配上彧曰伏后無子性又凶邪往嘗與父書言辭愧惡可因此廢也操曰卿昔何不道之彧陽驚曰昔已嘗為公言也操曰此豈小事而吾忘之彧又驚曰誠未語公邪昔公在官渡與袁紹相持恐增内顧之念故不言耳操曰官渡事後何以不言彧無對謝闕而已操以此恨彧而外含容之故世莫得知至董昭建立魏公之議彧意不同欲言之於操及齎璽書犒軍飲享禮畢彧留請間操知彧欲言封事揖而遣之遂不得言彧卒於壽春壽春亡者告孫權言操使彧殺伏后彧不從故自殺權以露布於蜀餘見通鑑楊時曰議者謂曹公取漢於天下不取於漢其説非也曹公以强忍之資因亂假義挾主威以令諸侯其包藏禍心天下庸人知之矣荀彧間關河冀從曹氏志欲扶義奮謀以紓倒懸之急迹其行事可謂智勇兼人矣乃獨不知曹氏之無君乎其拒董昭之議豈誠有忠貞之節歟抑欲以晩節盖之歟觀彧臨大議斷大謀玩弄强敵於股掌之間輔成曹氏之覇業至其威加海内下陵上逼乃欲潜杜其不􅁤是猶揚瀾潰堤以成滔天之勢而後徐以一葦障之尚可得乎而范曄猶謂其有殺身成仁之美吾不知其説也十二月有星孛於五諸侯本紀劉備攻劉璋據涪城以蜀書脩漢孝獻皇帝建安十八年春正月曹操軍濡湏口尋還以魏紀脩庚寅并十四州為九州以魏紀脩解題曰冀荆豫雍揚兖青徐梁禹貢九州也漢改雍曰凉梁曰益以職方之幽并併交州司𨽻為十三州興平元年分河西為雍州為十四州按列傳操領冀州牧或説宜復古置九州則冀州所制者廣大将從之荀彧曰若是則冀州當得河東馮翊西河幽并之地所奪者衆前日破袁尚海内震駭必人人自慮不得保其土地守其兵衆也今使分屬冀州将皆動心且人多説關右諸将以閉關之計今聞此以為必以次見奪一旦生變雖有善守者轉相脅為非則天下未易圖也願先定河北然後脩復舊京南臨荆州則人人自安天下大定乃議古制遂寝至是天下畧平故復行之獻帝春秋時幽并州并於冀州省司𨽻校尉凉州幷為雍州省交州幷荆州益州有兖豫青徐荆揚冀益雍也唐庚曰三桓諷魯作三軍合周禮其志乃欲卑公室而奪之權曹操諷復九州合禹貢其志乃欲廣冀州而益其地夫引經術据古誼者固未必皆姦人而姦人之欲濟其邪謀者亦未嘗不援經術而据古義要在乎察之而已夏曹操徙濵江郡縣民東渡江以列傳脩五月丙申曹操自為魏公加九錫以本紀脩劉璋遣将劉璝等拒劉備皆敗圍洛城以蜀書脩解題曰雒城今漢州雒縣秋九月魏始建宗廟社稷以魏紀脩魏公操納三女為貴人以魏紀脩馬超據隴右自稱督凉州軍事以吕祖謙標目脩九月凉州參軍楊阜攻馬超超奔張魯以蜀書脩冬魏公操議復肉刑不克行以魏紀脩解題曰程迥曰古者養民以井田故禁民之非以肉刑稱其情也後世養之不備故刑罸不輕於筆削救時弊也若禮樂則有聖人之方䇿在焉事見通鑑魏公操使曹仁屯樊以魏傳脩甲午漢孝獻皇帝建安十九年春馬超圍祁山征西将軍夏侯淵走之進擊韓遂破之以魏紀傳脩三月魏公操位諸侯王上以魏紀脩夏閏五月孫權取皖城以尋陽令吕䝉為廬江太守以吳書脩諸葛亮與宜都太守張飛破巴郡㑹劉備圍成都馬超降備克成都自領益州牧以亮為軍師将軍署左将軍府事軍議校尉法正為蜀郡太守廣漢太守許靖為左将軍長史亮政尚嚴以蜀書脩解題曰備分遣趙雲從外水定江陽犍為張飛定巴西德陽江陽今瀘州巴西今閬州德陽今漢州德陽縣外水蜀江也涪江自涪城至潼川與中江合過射洪與梓潼江合過長江與郪水合東流至遂寧入合州與嘉陵江合至重慶府與外江合謂之内水餘見晉義熈八年伐蜀解題亮治頗傷嚴峻人多怨者法正謂亮曰昔髙祖入關約法三章秦民知德今君假借威力跨據一州初有其國未垂惠撫且客主之義宜相降下願緩刑弛禁以慰其望亮曰君知其一未知其二秦以無道政苛民怨匹夫大呼天下土崩髙祖因之可以𢎞濟劉璋闇弱自焉已來有累世之恩文法覊縻互相承奉徳政不舉威刑不肅蜀土人士專權自恣君臣之道漸以陵替寵之以位位極則賤順之以恩恩竭則慢所以致敝實由於此今吾感之以法法行則知恩限之以爵爵加則知榮榮恩並濟上下有節為治之要於斯而著矣蜀傳諸葛亮法正劉巴李平伊藉共造蜀科蜀科之制由此五人餘見通鑑朱熹曰孔明之學大抵出於申韓秋七月魏公操擊孫權留少子臨淄侯植守鄴以魏書紀傳修解題曰按植傳使植留守戒之曰吾昔為頓丘令年二十三思此時所行無悔於今今汝年亦二十三矣可不勉歟植既以才見異丁儀等為之羽翼幾為太子者數矣餘見通鑑冬十月夏侯淵圍宗建於枹罕斬之以本紀魏書脩解題曰枹罕縣屬金城郡今屬河州十一月魏公操廢皇后伏氏滅其族殺皇子二人以本紀脩漢孝獻皇帝建安二十年春正月甲子立貴人曹氏為皇后以本紀脩省雲中定襄五原朔方郡為新興郡以魏紀脩三月魏公操擊張魯夏四月出散關解題曰散關在鳯翔府寳雞縣西今𨽻鳯州梁泉漢髙祖引兵從故道曹操出散關周伐蜀後唐郭宗韜取鳯州石敬塘伐蜀後周王璟趨秦州宋初伐蜀皆出入此道五月西平諸将斬送韓遂首以魏紀脩孫權求荆州諸郡於劉備備不從權乃遣吕蒙取長沙桂陽零陵備拒之公安既而求和分荆州以湘水為界以吳書通鑑目録脩解題曰按䝉傳蒙移書二郡望風歸服惟零陵太守郝普城守不降而劉備自蜀親至公安遣關羽爭三郡權時住陸口使魯肅萬人屯益陽拒備飛書召蒙捨零陵急還助肅初䝉既定長沙過酃載鄧𤣥之𤣥之者普之舊也欲令誘普及被書䝉秘之夜召諸将授以方畧晨當攻城顧謂𤣥之曰郝子太聞世間有忠義事亦欲為之而不知時也左将軍在漢中為夏侯淵所圍關羽在南郡今至尊身自臨之彼方首尾倒懸救死不給豈有餘力復營此哉今吾計力度慮以攻此曾不移日城必破城破之後身死何益於事而令百歲母戴白受誅度此家不得外問謂援可恃故至此耳君可見之為陳禍福𤣥之見普具宣蒙意普懼而聽之普出䝉迎執其手與俱下船語畢出書示之因拊手大笑普見書知備在公安羽在益陽慙恨入地䝉之詐郝普即他日之所以詐關羽者也餘見通鑑秋七月魏公操破張魯陽平屯魯奔巴中操以夏侯淵及將軍張郃守漢中而還以魏書紀傳脩解題曰水經沔水又東逕白馬戍南濜水入焉注白馬城一名陽平關濜水南流入沔謂之濜口在興元府西去府六十里有白馬山按魏志操本文作太祖下同征張魯軍食頗乏操自引歸令劉煜督後諸軍使以次出煜䇿魯可克加糧道不繼雖出軍猶不能皆全馳白操不如致攻遂進兵多出弩以射其營魯走漢中遂平煜進曰劉備人傑也有度而遲得蜀日淺蜀人未附也今破漢中蜀人震恐其勢自傾以公之神明因其傾而壓之無不克也若小緩之諸葛亮明於治而為相關羽張飛勇冠三軍而為将蜀民既定據險守要不可犯矣今不取必為後憂居七日蜀降者説蜀中一日數十驚備雖斬之不能安也操問煜曰今尚可克否煜曰今已小定不可擊也遂還餘見通鑑蘇轍曰曹公欲順江東下取孫氏賈詡陳公威名遠聞若因舊楚之饒以享吏士江東可以不勞衆而定也公不用其計遂敗於赤壁夫詡之所以説曹公即李左車之所以説淮隂侯使乘破趙之勢傳檄以下燕者也方是時孫氏之據江東已三世矣國險而民附賢材為用而曹公以劉琮待之欲一舉而下之孰謂曹公之智而不如淮隂哉其後既降張魯下漢中劉煜勸公乘勝取蜀公不從而反天下皆惜煜之不用夫𤣥徳之賢過於仲謀賈詡欲以文告懐仲謀而煜欲以虛聲下𤣥徳其愚智盖已遠矣曹公不用計豈非以詡言為戒也哉八月孫權圍合肥張遼走之以吳書脩解題曰孫權之所以能成鼎峙之勢者赤壁之㨗也所以不能成混一之功者合肥之敗也方曹操之入漢中權舉十萬之衆於合肥乃困於張遼數百人之鋒幾不自脫英雄之氣索盡無餘故自是專為保守之規而無復北方之志矣越二年操攻濡湏則甘心請降又二年操使襲關羽則願立功自効其後雖數舉兵不過侵掠邊境無進取之謀逮明帝即世之後魏已多故殷劄勸之大舉權終不能用也孫䇿謂權能保守江東而魯肅勸以王業亦不過竟長江而止彼固知其分量之所限哉事見通鑑九月巴賨降以魏紀修解題曰今渠州古巴國故賨國城在渠江縣東北七十四里廩君子孫秦為黔中郡薄其賦税人出錢四十謂賦為賨遂名冬十月始置名號侯以賞軍功以魏紀脩解題曰按魏志始置名號侯至五大夫與舊列侯關内侯凡六等通典魏黄初三年初制封王之庶子為鄉公嗣王庶子為鄉侯公之世子為亭伯其後定制凡國王公侯伯子男六等次縣侯次鄉侯次亭侯次關内侯又置名號侯爵十八級關中侯爵十七級關外侯十六級五大夫十五級裴松之以為今之虚封盖自此始十一月張郃徇三巴巴西太守張飛大破之以蜀書脩解題曰按飛傳郃督諸軍下巴西欲徙其民於漢中進軍宕渠今渠州流江縣東北七十里有漢故城蒙頭盪石與飛相拒五十餘日飛率精兵從他道邀郃軍交戰山道迮狹前後不得相救遂破郃流江縣東北七里有八䝉山起伏八處常有烟霧䝉其上張郤進軍宕渠蒙頭飛從他道邀郃即䝉山也郃棄馬縁山獨與十餘人從間道退引還軍南鄭餘見通鑑譙周巴記建興六年劉璋分巴郡墊江以上為巴西郡漢孝獻皇帝建安二十一年夏四月甲午魏公操自進王爵以本紀脩魏王操殺中尉崔琰廢尚書僕射毛玠以魏傳脩五月己亥朔日有食之本紀秋七月南單于呼厨泉來朝魏王操留之鄴使右賢王監其國分其衆為五部以魏紀脩解題曰魏武分其衆為五部以於扶羅子左賢王豹左部帥選漢人為司馬監督之其餘部帥皆以漢人為之魏末復改帥為都尉其左部所統可萬餘落居太原茲氏今汾州孝義縣南二十五里有左部城水經注汾水之右有右部城左部可六千餘落居祁今太原府祁縣南部可三千餘落居蒲子今隰州隰縣北部可四千餘落居新興漢末初立郡今嵐州忻州中部可六千餘落居大陵今太原府文水縣劉氏雖分居五部然皆家於晉陽汾澗之濵冬十月魏王操擊孫權以魏紀脩是歲嚴才攻魏王操於鄴不克以魏傳脩解題曰按王脩傳脩為奉常嚴才反與其徒屬數十人攻掖門脩聞變召車馬未至便将官屬歩至宫門操本文作太祖在銅爵臺望見之曰彼來者必王叔治也相國鍾繇謂脩舊京城有變九卿各居其府脩曰食其禄焉避其難居府雖舊非赴難之義按鍾繇以是年為相國故繫於其後唐髙宗謂郝處俊曰朕嘗以秦法猶為太寛荆軻匹夫耳匕首竊發始皇駭懼莫有救者豈不由積習寛慢使然乎對曰此由法急所致非寛也上曰何以知之對曰秦法輙升殿者夷三族人皆懼族安有敢拒者魏武法尚峻嚴才攻左掖門魏武遠望無敢救者王脩為奉常聞變召車馬未至便将官屬歩至宫門此由脩察變知機吕祖謙曰觀此則知申韓之害後世不少矣然申韓之言且曰使人不忍欺不如使人不敢欺不忍欺在人不敢欺在我所以立法用刑皆尚嚴峻殊不知以法服人外若宻而中實疎以德結人外若疎而中實宻漢孝獻皇帝建安二十二年春二月魏王操攻濡湏三月還孫權請降以魏紀脩夏四月魏王操設天子旌旗出入警蹕以魏紀修冬十月魏王操冕十二旒乘金根車以魏書本紀脩解題曰十七年春詔操賛拜不名加殊禮十八年夏封魏公加九錫十九年春位諸侯王上二十一年進王爵二十二年夏天子旗旄出入警蹕是冬冕十有二旒乘金根車魏王操立子丕為太子以魏紀脩解題曰丕本文作文帝下同為五官将植有奪宗之議丕使人問賈詡自得之術詡曰願将軍朝夕孜孜不違於道如此而已丕從之深自砥礪操本文作太祖下同又嘗屏除左右問詡詡黙然不對操曰與卿言而不答何也詡曰屬有所思故不即對耳操曰何思詡曰思袁本初劉景升父子也操大笑太子遂定餘見通鑑吕祖謙曰詡之委曲調䕶可謂得其道矣若使居漢武帝唐太宗隋文帝父子之間則必無廢立之禍大抵惟賢人君子之言有利而無害若游談捭闔之士言而善則其利固大若其不善則害不細如詡不過游談之士偶能辯此耳詡勸董卓之黨攻城殺王允漢由此亡今於魏父子危疑之時乃能調䕶如此是亡漢者由詡之一言存魏者亦由詡之一言使詡能以其説操者説傕等散兵歸農則漢之社稷不亡而詡亦得為全人矣劉備進兵漢中魏王操遣将軍曹洪拒之以魏紀脩孫權漢昌太守魯肅卒以左䕶軍吕䝉代之以吳書脩孫權使校尉陸遜平山越部伍其民以吳志吕祖謙標目脩漢孝獻皇帝建安二十三年春正月太醫令吉本少府耿紀等起兵於許謀誅魏王操不克夷三族以本紀袁宏漢紀脩三月有星孛於東方本紀夏四月代郡上谷烏桓反魏王操使其子彰行車騎将軍討之以魏紀脩解題曰裴潜為魏郡太守北邊大震百姓歸心三年還為丞相理掾操本文作太祖下同褒稱治代之功潜曰潜於百姓雖寛於諸胡為峻今繼者必以潜為理過嚴而事加寛惠彼素驕恣過寛必弛既弛又将攝之以法此訟爭所由生也以勢料之代必復叛於是操深悔還潜之速後數十日三單于反問果至餘見通鑑後魏陸俟為懐荒鎮大将未朞髙車諸莫弗訟俟嚴急無恩請還前鎮将郎孤世祖徵俟還既至曰陛下今以郎孤復鎮不過周年必敗世祖怒明年諸莫弗果殺郎孤而叛世祖即召俟問其知敗之意俟曰髙車上下無禮之人難為其上臣所以莅之以威嚴節之以憲綱欲漸加訓導使知分限而惡直醜正實繁有徒故訟臣無恩稱孤之美孤獲還鎮欣其名譽必加恩於百姓譏臣為失專欲以寛惠治之仁恕待之無禮之人易生陵傲不過朞年無復上下然後収之以威則人懐怨懟敗亂彰矣世祖曰卿身乃短慮何長也事正類此劉備屯陽平關秋七月魏王操擊之九月還長安以魏紀脩解題曰備屯陽平關夏侯淵率諸将拒之備遣陳式等十餘營絶馬鳴閣道寰宇記今利州昭化縣有馬鳴閣道太平御覧云在益昌縣徐晃别征破之操聞甚喜假晃節令曰此閣道漢中之咽喉也劉備欲斷絶外内以取漢中将軍一舉克奪賊計善之善者也遂自至陽平引出漢中諸軍餘見通鑑曹彰擊烏桓大破之以魏傳脩冬十月宛守将侯音反魏王操使曹仁討之以魏紀脩漢孝獻皇帝建安二十四年春正月曹仁斬侯音以魏傳吕祖謙標目修劉備大敗夏侯淵於定軍山斬之張郃走以魏書紀傳修解題曰劉備屯陽平郃屯廣石備以精兵萬餘分為十部夜急攻郃郃率親兵搏戰備不能克其後備於走馬谷燒都圍淵救兵從他道與備相遇交戰短兵接刃淵遂没餘見通鑑吳之立國者赤壁一戰也蜀之立國者漢中一戰也定軍山在今興元府西縣南十五里有八陣圖諸葛亮𦵏於此二月壬子晦日有食之本紀三月魏王操出斜谷與劉備相持於平陽夏五月還長安以魏紀脩徙武都氐於扶風天水以通鑑列傳脩解題曰操本文作太祖下同将㧞漢中守恐備北取武都氐以逼關中問雍州刺史張既既曰可勸使北出就榖以避賊前至者厚其寵賞則先者知利後必慕之操從其䇿乃自到漢中引出諸軍令既之武都徙氐五萬餘落出居天水扶風界葉適曰漢魏之際匈奴氐羗皆居内地兆於漢宣成於魏武張既設䇿當時方以為快不以為虞也使魏稍傳世未亡則諸胡之禍親自當之何待晉哉劉備取房陵上庸秋七月劉備即漢中王位於沔陽立子禪為太子以将軍魏延為都督鎮漢中備還治成都以許靖為太傅将軍法正為尚書令關羽為前将軍張飛為右将軍馬超為左将軍黄忠為後将軍以蜀書脩解題曰按三國志列傳平西将軍都亭侯臣馬超等一百二十人上言曰陛下遭厄運不造之艱董卓首難蕩覆京畿曹操階禍竊執天衡皇后太子鴆殺見害剥亂天下殘毁民物左将軍領司𨽻校尉豫荆益三州牧宜城亭侯備覩其機兆赫然奮發與車騎将軍董承同謀誅操将安國家克寧舊都㑹承不宻令操遊魂得遂長惡殘泯海内臣等以備肺腑枝葉宗子藩翰而爵號不顯非所以鎮衛社稷光昭萬世也輙封備漢中王拜大司馬餘見通鑑劉備亦上言云臣昔與董承同謀討操機事不宻承見陷害臣播越失據夫名其為賊敵乃可服兵出無名事故不成此髙祖所以為義帝發䘮也備之謀誅操名義正矣其能鼎據天下盖亦藉此為楨幹爾房陵今房州竹山縣古庸國輿地廣記今興元府西縣本沔陽縣有故城在西蕭何所築劉備即位在此孫權攻合肥以吳書脩關羽攻曹仁於樊魏王操使左将軍于禁等攻之八月大霖雨漢水溢禁降羽圍樊襄陽魏王操遣将軍徐晃救之以魏書紀傳脩九月丞相西曹掾魏諷謀襲鄴事泄誅以魏紀袁宏漢紀脩冬十月魏王操還雒陽以魏紀脩關羽威震華夏魏王操議徙都以避之軍司馬司馬懿請封孫權使討羽從之以魏書吳書脩解題曰孫權遣使辭以遣兵西上欲掩取羽江陵公安累重羽失二城必自奔走樊軍之圍不救自解乞宻不漏令羽有備操本文作太祖誥羣臣咸言宜當宻之董昭曰軍事尚權期於合宜宜應權以宻而内露之羽聞權上若還自䕶圍則速解便獲其利可使兩賊相對衘持坐待其弊袐而不露使權得志非計之上又圍中将吏不知有救計糧怖懼倘有他意為難不小露之為便操曰善即勑徐晃以權書射著圍裏及羽屯中圍裏聞之志氣百倍羽聞南郡破即走南還曹仁㑹諸将議咸曰今因羽懼可追擒也趙儼曰權邀羽連兵之難欲掩制其後顧羽還救恐我乘其兩疲故順辭求救乘釁因變以觀利鈍耳今羽已孤迸更宜存之以為權害若深入追北權則改虞於彼将生患於我矣王必以此為深慮仁乃解嚴操聞羽走恐諸将追之果疾敕仁如儼所䇿餘見通鑑當權之以土地業備也操方作書落筆於地則權之搆隙於備固操之所甚欲也羽之傲桀肆侮誠有不可堪者然同盟之國也無故而為讐敵獨不慮卞荘子之乘其利乎權規取羽乞宻勿漏而故漏之使自相持羽走南還其勢可擒而故縱之以為權害是操之舉措無一不得機便而權則囿其術中而不自知也既憂蜀又憂魏君臣上下岌若不可保吕蒙號為學問開益而計謀乃如此史方稱其擒羽之妙陳壽有知其猶在君子之後乎吕䝉稱病還權以陸遜鎮陸口䝉襲公安江陵降之操救曹仁将軍徐晃擊羽破之權至江陵羽走權追斬之蒙卒權以将軍朱然鎮江陵操表權為驃騎将軍領荆州牧封南昌侯權上書臣操以魏書吳書脩解題曰按魏畧權上書稱臣稱説天命王以權書示外曰是兒欲踞吾着爐火上邪侍中陳羣桓階奏曰漢自安帝已來政去公室國統數絶至於今者惟有名號尺土一民皆非漢有期運久已終非適今日也是以桓靈之間諸明圖緯者皆言漢行氣盡黄家當興後漢多言圖緯皆起於光武殿下應期十分天下而有其九以服事漢羣生注望遐邇怨嘆是故孫權在遠稱臣此天人之應異氣齊聲臣愚以為虞夏不以謙辭殷周不吝誅放畏天知命無所與讓也魏氏春秋夏侯惇謂王曰天下咸知漢祚已盡異代方起自古以來能除民害為百姓所歸者則民主也今陛下即戎三十餘年功德著於黎庶為天下所依歸應天順民復何疑哉王曰施於有政是亦為政若天命在吾吾為周文王矣餘見通鑑漢孝獻皇帝延康元年漢昭烈皇帝二年丕黄初元年魏髙祖文皇帝曹春正月庚子魏王操薨於洛陽子丕嗣位於鄴改元以魏書紀通鑑舉要厯脩二月丁未朔日有食之以通鑑脩壬戍魏王丕以太中大夫賈詡為太尉御史大夫華歆為相國大理王朗為御史大夫以魏志脩解題曰陳亮曰當曹公之末年天下無復為異者矣及文帝山陽之際雖朗等皆以為真受命也是以甘心相之而無愧色不然身為一時儒宗豈其無恥至此乎然則吳之自立其亦差强人意也哉荀勗别傳晉司徒闕武帝問其人於朂答曰三公具瞻所歸不可用非其人昔魏文帝用賈詡為三公孫權笑之則詡之人品可知矣史以為良平之亞何哉魏王丕貶其弟植為安鄉侯以吕祖謙標目脩魏宦官不得過諸署令魏書紀脩魏尚書陳羣立九品官人法州郡置中正以通鑑目録脩解題曰通典陳勝為楚王朱房為中正而不言職事陳羣以天臺選用不盡人才擇州郡之才優有昭鑑者除為中正自㧞人才銓定九品州郡皆置吳有大公平亦其任也晉有大小中正夫中正之法貴土著而攷才行猶有鄉舉里選之遺意然行之數百年卒至大弊者由其出於私情而不參之公論也成周賔興之法自五比為閭則書其敬敏任恤而知其質之美自四閭為族則書其孝弟睦婣有學行者而知其學之粹至於德行道藝之成則黨正書之州長攷之然後於大比之歳鄉老及鄉大夫帥其史以禮賔之夫舉之不專於一人而必參之以衆見所以酌公論而審人才也人才者天之所付而以公天下之用選才者公舉而公用之然後不失籲俊尊帝之意中正之法正由主於一人之私而不參衆人之論是以法弊而不可用餘見晉太康五年解題黄龍見譙以本紀脩三月漢改元以本紀脩夏五月魏張掖酒泉反尋平以通鑑舉要厯脩六月庚午魏王丕南狩以魏本紀脩孫權貢於魏以通鑑脩漢漢中将軍孟達以上庸降魏以魏書脩秋七月魏王丕設伎樂百戲大享於譙以魏紀脩解題曰按宋書五行志魏文帝居諒闇之始數出遊獵體貌不重風尚通脱故戴凌以直諫抵罪鮑勛以忤㫖極刑天下化之咸賤守節而晉傅𤣥亦謂魏文帝慕通達而天下賤守節故一變而為正始之𤣥虛再變而為阮籍之放達迄乎晉遂以清談亡國冬十月庚午魏王丕自即皇帝位於繁陽改元十一月癸酉廢漢帝為山陽公以魏書脩解題曰按魏氏春秋帝升壇禮畢顧謂羣臣曰舜禹之事吾知之矣餘見通鑑宋庠紀年通譜魏以土承火故改元黄初以承其運通王莽更始二漢合四百二十六年三國志列傳魏受禪遣使求璽綬曹皇后怒不與如此數輩乃呼使者入親數讓之以璽抵軒下因涕泣横流曰天不祚爾左右皆莫能仰視絶與元皇后相類按華嶠譜叙劉義慶世説新語文帝受禪陳羣有戚容帝問曰我應天受命百辟莫不説喜而相國華歆及公獨不怡何耶羣對曰臣與相國皆事漢朝心雖説喜義干其色亦懼陛下實應見憎帝大説歎息良久盖歆之情雖未可知若羣則親勸操受命者也今睹禪代而不怡此故為矯飾以盖其大不忍耳異乎徐廣之所以對謝晦者矣追尊皇祖考妣為帝后考武王為武皇帝尊母王太后曰皇太后改相國為司徒御史大夫為司空三公不與政郡縣多所改易以魏書紀傳脩解題曰曹氏簒漢專以智術防患創立法制每欲徵漢之弊宦寺不得過諸郎署懲預政之禍也羣臣不得奏事東宫懲臨朝之患也外戚不得封侯輔政懲擅朝之害也至於變異不劾三公選舉不拘年齒類皆深懲往事漢世戚宦用事而賢人君子不得以行其志政以事權不出於三公故也而魏代三公之官復不得參預朝政夫三公無所不統故緩急有所倚仗而姦臣無坐移國柄之憂曹氏自恃智術足以雄長一世忽之而不慮故禍變之來潜伏於立國之初不一再傳而事權盡歸司馬氏三公不聞正色於朝以折奸萌者勢使然也唐庚曰漢初置丞相御史府後置三公府将帥出征置幕府軍罷即廢不常置也魏既置三公而司馬懿等並為大将軍開府京師此何理耶公室之卑自此始矣蜀将李平聞懿等開府辭召以説孔明孔明鄙之十二月魏初營洛陽宫戊午魏主如洛陽以通鑑脩解題曰裴松之按諸書紀是時帝居北宫以建始殿朝羣臣門曰承明陳思王植詩謁帝承明廬是也至明帝時始於漢南宫崇德殿處起太極昭陽諸殿大事記續編卷二十
