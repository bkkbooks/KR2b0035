body:
  text: 大事記續編卷八明王禕撰漢世祖光武皇帝建武元年漢劉盆子建世元年述梁劉永三年成公孫龍興元年年淮南李憲三年元楚王秦豐二西平王盧芳年春正月平陵方望立前定安公嬰為帝更始遣丞相李松擊斬之以夲紀通鑑目録修赤眉二部㑹𢎞農三月李松大敗於蓩鄉以列傳通鑑目録修觧題曰李賢曰續漢志𢎞農有蓩鄉葢在今虢州湖城縣之間夏四月公孫述稱帝改元國號成以列傳修蕭王擊尤來大槍五幡於元氏破之又戰於順水北失利歸保范陽遣吴漢等追滅之以夲紀修觧題曰李賢曰元氏属常山郡今趙州縣順水即徐水經北平縣故城北今在易州作慎者誤范陽縣属涿郡范水之陽故城在今易州易縣東南朱鮪殺李軼攻温平隂㓂恂等大破之以紀傳修觧題曰李賢曰温今洛州縣平隂縣属河南郡儒生彊華奉赤伏符來六月己未蕭王即皇帝位于鄗南改元大赦以夲紀修觧題曰更始元年九月以秀為破虜将軍行大司馬事十月持節北渡河鎮慰州郡考察黜陟如州牧行部事至邯鄲故趙繆王子林説曰赤眉今在河東樊崇時在河南此其别部也决水灌之百萬之衆可使為魚李賢曰續漢書曰林言赤眉可破上問其故對曰河水從列人北流如决灌之可令為魚列人故城在今肥鄉縣東北秀不從十二月林立卜者王郎為天子都邯鄲更始二年正月以郎新盛北徇薊故廣陽王子劉接起兵薊中以應郎大司馬乃南奔至饒陽李賢曰縣属安平國故城在今瀛州饒陽縣東北官属乏食晨夜兼行至呼沱河李賢曰山海經云大戯之山呼沱之水出焉在今代州繁畤縣東流經定州深澤縣東南即光武所渡處俗謂之危渡口史容曰出代州崞縣東經蔚州真定府祁州深州河間府莫州保定軍覇州至信安軍入海遇氷合得過進至下愽城西李賢曰属信都國在愽水之下故城在今下􅀶縣南不知所之有白衣父老指曰信都為長安守去此八十里馳赴之太守任光出迎因發旁縣得四千人先擊堂陽貰縣皆䧏之任光傳多作檄文遣馳至鉅鹿界中世祖與光等投暮入堂陽界使騎各持炬火光炎震天地舉城震驚又邳彤傳比至堂陽已属王郎彤使張萬尹綏曉譬吏民即開門出迎李賢曰堂陽及貰並属鉅鹿郡堂陽故城在今冀州鹿城縣西北和戎卒正邳彤亦舉郡䧏昌城人劉植李賢曰昌城属信都國故城在今兾州西北宋子人耿純李賢曰宋子縣属鉅鹿郡故城在今趙州平棘縣之北各據縣邑以奉大司馬北䧏下曲陽李賢曰縣属鉅鹿郡衆數萬人北擊中山㧞盧奴李賢曰中山府安喜縣有盧水黑曰盧不流曰奴所過發奔命兵時真定王揚起兵附郎大司馬遣劉植說降揚因留真定南擊新市真定元氏防子皆下之攻柏人不下引兵拔廣阿李賢曰新市縣属鉅鹿郡故城在今恒州東北房子属常山郡今趙州縣真定縣故東垣柏人縣属趙國今邢州縣故城在縣西北廣阿縣属鉅鹿郡故城在趙州象城縣西北㑹上谷太守耿况漁陽太守彭寵各遣突騎來助擊郎更始亦遣尚書僕射謝躬討郎遂東圍鉅鹿月餘不下郎遣将􅌼宏劉奉率數萬人救鉅鹿逆戰於南䜌李賢曰縣属鉅鹿郡故城在邢州柏人縣東北斬首數千級四月圍邯鄲五月㧞其城誅郎更始遣侍御史立為蕭王令罷兵詣行在所辭不就徴時諸賊銅馬大彤髙湖重連䥫脛大槍尤來上江青犢五校檀鄉五幡五樓富平獲索等李賢曰諸賊或以山川土地為名或以軍容強盛為號銅馬帥東山荒秃上淮汎等大彤帥樊重尤來帥樊崇五校帥髙邕檀鄉帥董次仲五樓帥張文富平帥徐少獲索帥古師郎等各領部曲衆合數百萬人秋王擊銅馬於􅀈李賢曰縣属鉅鹿郡故城在今兾州鹿城縣東呉漢将幽州突騎會清陽李賢曰縣属清河郡今伊州縣賊食盡夜遁追至舘陶大破之李賢曰縣属魏郡今魏州縣受䧏未盡而髙湖重連從東南來與銅馬餘衆合王復與大戰於蒲陽悉破降之李賢曰蒲陽山蒲水所出在今定州北平縣西赤眉别與大彤青犢十餘萬衆在射大王進擊大破之使呉漢岑彭襲殺謝躬於鄴青犢赤眉入函谷闗乃遣鄧禹引兵而西時更始使朱鮪李軼等屯洛陽令馮異守孟津以拒之建武元年王北擊尤來大槍五幡於元氏追至北平李賢曰縣属中山國今易州永樂縣營州西南别有右北平郡非此連破之又戰於順水北為賊所敗散兵歸保范陽賊引去大軍復進至安次李賢曰縣属勃海郡今幽州縣破之賊入漁陽乃遣吴漢等追戰於潞東及平谷李賢曰潞縣属漁陽郡平谷亦属漁陽在潞縣北大破滅之朱鮪遣蘓茂攻温馮異㓂恂與戰大破之於是諸将議上尊號馬武先進曰天下無主大王雖執謙退奈宗廟社稷何宜且還薊即尊位乃議征伐王驚曰何将軍出是言可斬也乃引軍還薊夏四月至中山諸将復上奏曰漢遭王莽宗廟廢絶王與伯升首舉義兵更始因其資以據帝位而不能奉承大統敗亂紀綱盗賊日多群生危蹙大王初征昆陽王莽自潰後㧞邯鄲北州弭定三分天下而有其二跨州據土帯甲百萬臣聞帝王不可以乆曠天命不可以謙拒惟大王以社稷為計萬姓為心王又不聽行到南平棘李賢曰縣属常山郡今趙州縣故城在縣南諸将復固請之王曰㓂賊未平四面受敵何遽正位號乎諸将且出耿純進言甚切至王曰吾将思之行至鄗李賢曰今趙州髙邑縣先在長安時同舍生彊華自闗中奉赤伏符來群臣復奏命有司設壇場於鄗南千秋亭五成陌李賢曰在今趙州柏鄉縣水經注曰亭有石壇碑六月己未即位燔燎告天禋于六宗望於群神大赦天下此光武渡河北後即位前所歴也髙祖殺羽成功始即帝位光武未成功而遂即位者紹漢統繫人心也自此以後凡赦不悉書甲子鄧禹擊王匡於安邑大破之以紀傳修觧題曰李賢曰安邑縣属河東郡今蒲州縣赤眉立宗室劉盆子為帝改元以紀傳修觧題曰赤眉軍中祠城陽景王以求福助及樊崇欲立帝求軍中景王後崇盖城陽人也餘見通鑑申屠建隗囂勸更始避位與張卭等謀劫之歸南陽更始斬建卭等距戰囂歸天水更始奔新豐以列傳通鑑目録修觧題曰按袁宏漢紀更始諸将懼赤眉至申屠建隗囂共勸更始不應謀劫更始司馬光通鑑考異不取而從范曄書范書隗囂傳流聞光武即位河北囂即說更始歸政於光武叔父良更始不聽諸将欲劫更始東歸囂亦與通謀盖赤眉将至羣情震恐張卭廖湛軰以盗賊規模故欲東歸申屠建隗囂所見差髙故勸之避位及更始不從然後建囂與卭等通謀耳餘見通鑑秋七月辛未鄧禹為大司徒封鄼侯丁五以野王令王梁為大司空封武強侯壬午呉漢為大司馬封舞陽侯以紀傳修以平原太守伏湛為尚書以列傳袁宏漢紀修觧題曰按袁宏漢紀更始立湛為平原太守遭倉卒驚􅅰而湛獨晏然教授如故俸禄分以賑鄉里來客者百餘家時郡中不安湛移書属縣不得相侵凌天生蒸民為立君非乆亂也且飬老育幼以待真主門下督欲起兵湛即誅督示百姓又按列傳光武即位知湛名儒舊臣欲令幹任内職徴拜尚書使典定舊制鄧禹渡河以列傳修觧題曰禹渡汾隂河入夏陽更始中郎将左輔都尉公乗歙引其衆十萬與左馮翊兵共拒禹於衙李賢曰縣属左馮翊禹復破走之武帝元鼎四年置三輔都尉丞各一人地志左輔都尉治髙陵右輔都尉治郿不言京輔都尉所治者治長安也三輔之兵皆主之中尉令公乗歙以左輔兵拒禹而嚴夲以右輔兵圍更始於髙陵也己亥帝幸懐遣建威大将軍耿弇等屯五社津呉漢率十一将軍圍洛陽以夲紀修觧題曰先屯五社津偹滎陽以東而後圍洛陽秦漢以來形勢所在光武盖熟之矣李賢曰懐縣属河内郡在今懐州武陟縣西水經曰鞏縣北五社津有山臨河其穴潜通淮浦有渚謂之鮪渚八月壬子祭社稷癸丑祠髙祖太宗世宗以夲紀修帝幸河陽以夲紀修李松趙萌攻王匡張卭於長安更始入之赤眉至髙陵匡卭䧏九月䧟長安更始奔髙陵以紀傳修觧題曰髙陵縣属馮翊封更始為淮陽王以紀傳修甲申以前髙宻令卓茂為太傅封褒徳侯以夲紀修觧題曰初茂與同縣孔休陳留蔡勲安衆劉宣楚國龔勝上黨鮑宣六人同志不仕王莽時並名重當時詔曰夫名冠天下當受天下重賞盖光武嘗為諸生受學故能發此論惜其不尊任三公故茂之事業他無聞焉餘見通鑑辛卯朱鮪䧏以本紀修冬十月癸丑帝幸洛陽都之以夲紀皇極經世修觧題曰洛陽纔下光武即入都之盖洛陽非若長安更始赤眉之燬蕩此光武所以定都而不遷也宋敏求河南志洛陽即成周敬王之成周也蔡質漢典職儀曰南宫至北宫中央作大屋複道三道行天子從中道從官夾左右十歩一衛兩宫相去七里淮陽王䧏赤眉以紀傳通鑑修鄧禹屯栒邑以列傳通鑑修觧題曰蘓轍曰赤眉之亂光武欲急攻之禹欲緩取之議者見禹之敗因以禹為失計是不然赤眉方強急之實難緩之為得逮其自敗西走扶風而禹乗之猶能還兵敗禹而况其未敗也哉光武若審知如此聼禹堅守北道時出撓之而使别将挾持其東東西蹙之磨以歲月而赤眉成禽矣禹之敗而西歸也要馮異共攻異謂虜餘衆尚多難卒用兵破禹又不從而敗由此觀之禹夲計不失而帝不能用禹亦廹於君命而不能自固耳事見通鑑李賢曰栒邑縣属右扶風故城在今豳州三水縣東北十一月帝幸懐以夲紀修梁王永稱帝以夲紀修十二月丙戌帝至自懐以夲紀修赤眉殺淮陽王以通鑑修隗囂自稱西州上将軍據隴右以紀傳修觧題曰按列傳囂天水成紀人也李賢曰故城在今秦州隴城縣西北更始立崔廣等推囂為上将軍擊殺雍州牧安定大尹安定悉䧏長安誅王莽遂分徇隴西武都金城武威張掖酒泉敦煌皆下之其後囂被徴及自長安再歸天水則竇融據河西五郡囂所有者天水武帝分秦州置後改漢陽宋同慶府西和秦鞏會四州天水軍地安定涇渭原邠四州鎮戎徳順懐徳三軍之地隴西北地慶陽府靈環塩寕宥五州之地而已此據紀傳建武六年赦四郡吏人為囂詿誤者餘見通鑑張掖属國都尉竇融自稱五郡大将軍據河西以列傳通鑑修觧題曰按李賢注班勇傳河西四郡盖金城張掖酒泉敦煌今稱五郡者併武威言之也事見通鑑盧芳詐稱劉文伯據安定稱西平王以紀傳修觧題曰芳安定三水人也李賢曰續漢志三水縣有左右谷故城在今江州安定縣南更始元年隗囂等殺安定大尹王向降之二年更始徴囂芳亦被徴為騎都尉使鎮撫安定以西三年囂亡歸天水三水豪傑立芳為西平王匈奴立芳為漢帝将胡騎還入安定盖是時囂未必能復取安定至建武五年芳都九原縣掠有五原朔方雲中定㐮鳫門然後隗囂再取安定耳事見通鑑将軍馮愔據栒邑反護軍黄防執之以䧏以列傳通鑑修上黨大守田邑降以通鑑修漢世祖光武皇帝建武二年漢劉盆子建世二年述梁劉永四年成公孫龍興二年年淮南李憲四年二楚王秦豐三西平王盧芳年春正月甲子朔日有食之以夲紀修呉漢擊檀鄉賊於鄴東䧏之以夲紀修觧題曰力子都餘黨與諸賊會於檀鄉李賢曰今兖州瑕丘縣東北有檀鄉檀鄉渠帥董次仲起茌平李賢曰縣属東郡故城在今愽州聊城縣東渡河入魏郡清河與五校合庚辰封功臣為列侯大國四縣餘有差以夲紀修立宗廟社稷郊兆夲紀觧題曰立髙廟于洛陽四時祫祀髙帝為太祖文帝為太宗武帝為世宗餘帝嵗五祀大社稷在宗廟之右制郊兆於城南七里赤眉焚宫室而西鄧禹入長安修復陵廟以夲紀通鑑目録修真定王揚謀反誅以列傳通鑑修二月己酉帝幸修武以夲紀修觧題曰李賢曰修武縣属河内郡今懐州縣夲殷之寗邑鮑永䧏以紀傳修觧題曰永封上将軍列侯印綬悉罷兵但幅巾與諸将及同心客百餘人詣河内帝見永問曰卿衆何在永離席叩頭曰臣事更始不能令全誠慙以其衆幸富貴故悉罷之帝曰卿言大而意不悦既而永以立功遂見任用餘見通鑑范曄曰鮑永守義於故主斯可以事新主矣耻以其衆受寵斯可以大寵矣若乃言之者雖誠而聞之者未譬豈茍進之恱易以情納持正之忤難以理求乎誠能釋利以循道居方以從義君子之槩也王梁免太中大夫宋𢎞為大司空封栒邑侯以夲紀修觧題曰唐仲友曰宋𢎞不易妻之對諷意深矣事見通鑑彭寵反以夲紀修觧題曰光武圍邯鄲寵轉糧食前後不絶王郎死光武追銅馬至薊寵上謁自負其功意望甚髙光武接之不能滿以此懐不平而反光武以問幽州牧朱浮浮曰前吴漢北發兵時大王遺寵以所服劍又倚以為北道主人寵謂至當迎閤握手交歡並坐今既不然所以失望餘見通鑑光武之待彭寵正與髙祖之待英布相反布之始至意望甚髙髙祖倨傲以折之布悔恨欲死及供張服御如漢王始大喜過望此盖自薄而至厚彭寵遣兵轉粮助討王郎光武倚以為北道主又遺以所服劍及來上謁接之乃不能滿其意此盖自厚而至薄此布所以終為髙祖用而寵反不旋踵也延岑稱王於漢中以夲紀修帝至自修武以夲紀修三月詔議省刑法夲紀遣執金吾賈復擊郾郾王尹尊䧏夲紀遣虎牙大将軍盖延等討劉永夏四月圍睢陽以夲紀修遣呉漢撃宛宛王劉賜降以列傳通鑑修甲午封叔父良為廣陽王兄子章為太原王興為魯王淮陽王子三人為列侯以夲紀通鑑修鄧王王常䧏以列傳修五月庚辰封周後姫常為周承休公以夲紀修癸未詔民嫁妻賣子欲歸父母者聽之以夲紀修六月戊戌立貴人郭氏為皇后夲紀觧題曰光武中興六宫稱號惟皇后貴人貴人金印紫綬奉不過粟數十斛又置美人宫人采女三等並無爵秩嵗時賞賜充給而已漢法常因八月筭人遣中大夫與掖庭丞及相工於洛陽鄉中閱視良家童女年十三以上二十以下姿色端麗合法相者載還後宫擇視可否乃用登御所以明慎聘納詳求淑哲明帝聿遵先㫖宫教頗修登建嬪后必先令徳内無出閫之言權無私溺之竊可謂矯其弊矣立子彊為皇太子増郎謁者從官秩一等夲紀秋八月帝征五校幸内黄降之夲紀觧題曰李賢曰内黄縣属魏郡今相州縣将軍鄧隆討彭寵敗績夲紀盖延㧞睢陽劉永走湖陵以紀傳修觧題曰張晏曰湖陵属山陽郡遣太中大夫伏隆安輯青徐張歩等降以夲紀修将軍鄧奉據淯陽反以夲紀修九月壬戍帝至自内黄以夲紀修赤眉發諸陵鄧禹遣兵擊之敗赤眉入長安禹襲之復敗以列傳修赤眉攻漢中王嘉於谷口大敗嘉降鄧禹以列傳修觧題曰李賢曰谷口縣故城在今醴泉郡東北四十里水經注涇水東經九􅉄山東中山西謂之谷口冬十一月以廷尉岑彭為征南大将軍討鄧奉以夲紀修遣偏将軍馮異代鄧禹以夲紀修觧題曰帝之遣異也敕曰三輔遭王莽更始之亂重以赤眉延岑之酷元元塗炭無所依訴将軍今奉辭討諸不軌非必畧地屠城要在平定安集之耳異受命而西所至布威信羣盗多降遣伏隆拜張歩為東萊太守列傳十二月戊午詔封宗室列侯夲紀三輔大饑赤眉東走遣将軍侯進屯新安耿弇屯宜陽以要之以列傳通鑑修是嵗野榖旅生野蠶成繭以夲紀修漢世祖光武皇帝建武三年梁劉永五年淮成公孫述龍興三年南李憲五年王楚王秦豐四年西西平王盧芳三年齊張歩元年海王董憲元年春正月馮異為征西大将軍鄧禹與赤眉戰於回溪異救之俱敗以袁宏漢紀修觧題曰李賢曰回溪俗名回坈在今洛州永寜縣東辛巳立皇考南頓君以上四親廟以夲紀修鄧禹免為右将軍以通鑑修閏月馮異大破赤眉於崤底賊南走己亥帝幸宜陽勒六軍待之以紀傳修劉盆子奉璽綬䧏以夲紀修觧題曰李賢曰崤山名底阪也一名嶔岺山在今洛州永寕縣西北赤眉既䧏帝令縣厨賜食十餘萬人皆得飽飫明旦大陳兵馬臨洛水令盆子君臣列而觀之謂樊崇等曰得無悔降乎朕今遣卿歸營勒兵鳴鼓相攻决其勝負不欲強相服也徐宣等叩頭曰今日得降猶去虎口歸慈母誠歡誠喜無所恨也餘見通鑑光武降銅馬降者不自安光武知其意勅令勒兵歸營乃自乗輕騎案行部陳降者曰蕭王推赤心置人腹中安得不投死乎及是赤眉降又令樊崇等歸營勒兵與决勝負不欲強服之馬謖之所謂股心諸葛亮之擒縱孟獲光武之餘畧也戊申帝至自宜陽以夲紀修二月己未祠髙廟賜天下長子當為父後者爵一級以夲紀修劉永立董憲為海西王張歩為齊王歩殺伏隆而反以夲紀修觧題曰歩欲留隆與共守二州隆求得反命歩遂執隆而受永封隆遣間使上書曰願得以時進兵無以臣隆為念臣隆得生到闕庭受誅有司此其大願若今没身宼手以父母昆弟長累陛下帝得隆奏召其父湛流涕以示之曰隆可謂有蘇武之莭恨不且許而遽求還也其後歩竟殺之陳瓘曰伏隆之求還足以成命矣死而無憾安用且許之乎光武之言所以慰其父耳帝幸懐遣呉漢等擊青犢於軹西大破降之以夲紀修觧題曰李賢曰軹西縣属河内郡故城在今洛州濟源縣東南三月壬寅以司直伏湛為大司徒封陽都侯以紀傳修觧題曰唐仲友曰伏湛侯覇即後漢宰相規摹蔡茂馮勤趙熹張湛杜林郭丹皆賢德智能之士大抵皆有大臣之節人才非不盛而中興之美未盡者用人不盡其才故也涿郡大守張豐反以通鑑修彭寵陷薊自立為燕王夲紀帝幸堵陽夲紀觧題曰李賢曰水經注堵水南經小堵鄉在今唐州方城縣夏四月大破鄧奉於小長安斬之夲紀馮異與延岑戰於上林破走之以紀傳修呉漢與劉永将蘓茂戰於廣樂大破之夲紀觧題曰廣樂地闕今宋州虞城有長樂故城盖避隋煬帝諱睢陽反迎劉永以夲紀通鑑目録修五月己酉帝還宫夲紀乙夘晦日有食之夲紀六月耿弇與延岑戰于穰大破之夲紀觧題曰李賢曰穣縣属南陽郡今鄧州縣秋七月遣岑彭等討秦豐大破之於黎丘以紀傳修遣将軍傅俊徇江東以夲紀通鑑修盖延㧞睢陽斬劉永蘇茂等復立其子紆於垂惠以夲紀修觧題曰郡國志汝南郡山桑縣有垂惠聚一名禮城冬十月壬申帝幸㫪陵祠園廟置酒舊宅以夲紀修耿弇請再發上谷兵許之以通鑑修十一月乙未帝至自㫪陵以夲紀修是嵗李憲稱帝以紀傳修隗囂奉奏以紀傳修漢世祖光武皇帝建武四年梁王劉紆元年淮成公孫述龍興四年南李憲六年齊楚王秦豐五年海西平王盧芳四年王張歩二年西王董憲二年春二月壬子帝幸懐壬申還宫以夲紀修鄧禹等破延岑於武當岑奔公孫述以紀傳修觧題曰李賢曰武當縣属南陽郡今均州縣夏四月丁巳帝幸鄴遣呉漢擊五校於箕山大破之五月辛巳幸盧奴遣將軍祭遵等討張豐斬之六月辛亥還宫以紀傳修觧題曰李賢曰箕山東郡箕山也時彭寵攻朱浮遣鄧隆助浮浮以帝怠於敵不能救之上疏曰昔髙祖聖武天下既定猶身自征伐未嘗寧居陛下雖興大業而獨逸豫不頋北垂百姓皇皇無所繫心三河兾州曷足以傳哉詔報曰軍資未充故湏後舉耳帝幸盧奴将親征彭寵伏湛諌曰今兖豫青兾中國之都㓂賊從横未及從化漁陽地接外虜豈足先圖帝竟不親征唐仲友曰伏湛諌征彭寵不特以漁陽兵精亦以寵為功臣以嫌隙反不欲光武親征欲使曲在寵而自斃此宰相之職也秋七月丁亥帝幸譙遣将軍馬武等圍劉紆八月戊午帝幸夀春遣将軍馬成等討李憲九月圍舒以夲紀修觧題曰夀春乃下蔡也水經注淮水又北經下蔡縣故城蔡成公自新蔡遷于州來謂之下蔡東㟁又有一城即下蔡新城二城對據翼帶淮流李賢曰夀春今夀州縣舒縣在今廬州廬江縣西以臨淮大尹侯覇為尚書令覇奏每春下寛大之詔奉四時之令以列傳通鑑修觧題曰時無典故朝廷又少舊臣覇明習故事收録遺文條奏前世善政法度有益於時者皆施行之陳瓘曰侯覇之於漢事猶伏生之於書也唐仲友曰伏湛知有禮樂所奏惟行鄉飲酒禮侯覇所奏惟下寛大詔書若宋𢎞則不復有所建明盖三公不過奉職而已非復古者論道之意矣以孝亷為尚書郎以列傳修冬十月甲寅帝還宫以夲紀修隗囂遣馬援入見以列傳修觧題曰援至帝在宣徳殿南廡迎笑謂援曰卿遨逰二帝間今見卿使人大慙援頓首辭謝因曰當今之世非獨君擇臣也臣亦擇君矣臣與公孫述同縣少相善臣前至蜀述陛交㦸而後進臣臣今逺來陛下何知非刺客姦人而簡易若是帝復笑曰卿非刺客頋說客耳援曰天下反覆盗名字者不可勝數今見陛下恢廓大度同符髙祖乃知帝王自有真也餘見通鑑光武之見馬援岸幘迎笑亦以駕御豪傑矯揉為之耳援雖謂帝同符髙祖而又謂髙帝無可無不可今上好吏事動如莭度不喜飲酒未必不有以窺其微也卓茂薨以夲紀修十一月丙申帝幸宛遣建義大將軍朱祜等圍秦豐以夲紀修十二月馮異與公孫述将程焉戰于陳倉隗囂遣兵助異大破之述遣使招囂囂斬其使以紀傳修伏湛奏行鄉飲酒禮以列傳修漢世祖光武皇帝建武五年成公孫述龍興五年芳淮南李憲七年漢盧五年憲海西王董三年春正月癸巳帝還宫以夲紀修遣太中大夫來歙送馬援歸隴右以列傳修二月馬武等㧞垂惠劉紆走以紀傳修乙丑帝幸魏郡夲紀封殷後孔安為殷紹嘉公夲紀彭寵奴殺寵以降封為不義侯以夲紀注通鑑目録修觧題曰隋滑州刺史王軌為奴所殺携其首以奔竇建徳建徳曰奴殺主為大逆我何可納之命立斬奴而返軌首於滑州吏人感之即日而䧏齊濟二州及兖州賊帥皆聞風而下惜哉光武之不出此也事見通鑑以中山太守郭伋為漁陽太守徴上谷太守耿况封牟平侯以列傳通鑑修呉漢耿弇大破富平獲索於平原降之夲紀三月将軍龎萌反以夲紀袁宏漢紀修岑彭㧞夷陵田戎奔公孫述以紀傳修夏四月旱蝗以夲紀修竇融遣使入貢以為凉州牧以夲紀列傳修六月朱祜㧞黎丘獲秦豐夲紀帝幸䝉龎萌董憲等攻桃城帝大破之夲紀觧題曰李賢曰蒙縣属梁國故城在今宋州北任城國有桃聚故城在今兖州任城縣北秋七月丁丑帝幸沛祠髙祖幸蕃大破憲於昌慮八月己酉幸剡呉漢㧞之斬劉紆遂圍萌憲於朐以夲紀修觧題曰李賢曰蕃縣属魯國故城在今徐州勝縣昌慮縣属東海郡故城在今徐州滕縣東南古邾之濫邑郯縣属東海郡故城在今泗州下邳縣東北朐縣属東海郡故城在今海州胊山縣西冬十月還幸魯使大司空祠孔子以夲紀修耿弇與張歩戰於臨淄大破之帝幸劇張歩斬蘓茂以降夲紀袁宏漢紀觧題曰李賢曰劇縣故城在今青州夀光縣南故紀國初起太學立五經愽士十四家帝還幸之以紀傳修觧題曰按陸機洛陽記太學在洛城縣開陽門外去宫八里儒林傳序立五經愽士易有施孟梁丘京氏書歐陽大小夏侯詩齊魯韓禮大小戴春秋嚴顔初起太學稽式古典籩豆干戚之容偹之於列服方領習矩歩者委蛇乎其中十一月伏湛免以侯覇為大司徒以夲紀修十二月西平王盧芳據五郡稱漢帝以列傳修隗囂遣子入侍以夲紀修交州牧鄧譲遣使入貢以夲紀修詔復濟陽徭役二年以夲紀修觧題曰李賢曰濟陽縣故城在今曹州寃句縣西南地理志陳留郡有濟陽縣是嵗徴處士嚴光周黨王良等至京師拜光及良為諌議大夫光不受以列傳袁宏漢紀皇極經世修觧題曰光字子陵㑹稽餘姚人也少與光武同逰學光武即位以物色求之後齊國言有一男子釣澤中乃偹安車𤣥纁遣使聘之三反而後至舍於北軍司徒覇與光素舊遣使奉書光不答乃投札與之口授曰君房足下位至鼎足甚善懐仁輔義天下恱阿諛順㫖要領絶覇得書封奏之帝笑曰狂奴故態也車駕即日幸其館光卧不起帝即其卧所撫光腹曰咄咄子陵不可相助為理耶光又眠不應良乆乃張目熟視曰昔唐堯著徳巢父洗耳士故有志何至相廹乎帝曰子陵我竟不能下汝耶於是升輿歎息而去復引光入論道舊故相對累日從容問光曰朕何如昔對曰陛下差增於徃因共偃卧以足加帝腹上拜諌議大夫不肯受去耕釣於富春山中黨字伯况太原廣武人也王莽竊位託病杜門賊暴縱横唯至廣武過城不入建武中徴為議郎以病去職被徴不得已乃著短布單衣榖皮綃頭待見尚書李賢曰以穀樹為綃頭也鄭𤣥注儀禮云如今著㡎頭自項中而前交額上即蹺髻及引見伏而不謁朱熹曰如單于來朝賛謁謁之禮未聞自陳願守所志帝許焉時又徴王良逢萌薛子方等良東海蘭陵人也王莽時寝病不仕三年徴拜諌議大夫遷沛郡大守乞骸骨徴拜太中大夫六年為大司徒司直在位恭儉妻子不入官舍布被瓦噐以病歸一嵗復徴至榮陽疾篤不任進道乃過其友人友人不肯見曰不有忠言竒謀而取大位何其徃來屑屑不憚煩也良慙自後連徴不應萌北海都昌人也之長安學通春秋王莽殺其子宇萌謂友人曰三綱絶矣不去禍将及人即觧冠挂東都城門歸將家属浮海客遼東光武即位乃之琅琊勞山詔書徴萌託以老耄述路東西即便駕歸連徴不起又按前漢列傳薛方齊人也嘗為郡掾祭酒徴不至莽以安車迎方方因使者辭謝曰堯舜在上下有巢由莽說其言不強致世祖即位徴方道病卒唐仲友曰光武召隠逸二百年莭義所出也漢世祖光武皇帝建武六年成公孫述龍興六年即漢盧芳六年春正月改㫪陵為章陵縣復其民比豐沛以夲紀袁宏漢紀修辛酉詔郡國有榖者給髙年孤寡貧癃者如律以夲紀修觧題曰李賢曰漢律今亡按成帝永始二年詔吏民以義收食貧民入榖物助縣官賑贍者已賜直其百萬以上加賜爵不更欲為吏補三百石三十萬以上賜爵五大夫吏並遷二等民補郎十萬以上無出租賦三嵗萬錢以上一年豈亦律耶馬成等㧞舒獲李憲二月呉漢㧞朐獲董憲龐萌帝以天下粗定廼休諸将於洛陽分軍士於河内置酒賞賜以夲紀袁宏漢紀修馬援鄭興申屠剛杜林自隗囂所來歸以援興為太中大夫剛林為侍御史以列傳通鑑修三月公孫述遣田戎任滿㓂南郡以夲紀修夏四月丙子帝幸長安始謁髙廟遂有事于十一陵鄭樵年譜遣盖延等七將軍從隴道討公孫述五月己未還宫隗囂反使其将王元塞隴坻諸将敗還以紀傳修觧題曰郭仲産秦州記曰隴山東西百八十里在隴州汧源縣西六月辛夘詔省縣四百餘吏職十置一以夲紀修觧題曰太常省太宰均官都水雍太祝五畤各一尉光禄勲省左右曹黄門郎車户騎三将羽林令衛尉省旅賁令衛士一人丞太僕省太廐家馬令丞尉車府路軨騎馬駿馬令丞六牧師菀令廷尉中都官獄二十六所各令長皆省大鴻臚省驛官别火二令丞郡邸長丞宗正省都司空令丞大司農省均輸等少府省五丞場官織室令官者昆䑓佽飛三令二十一丞水衡省属官令長丞尉二十餘人執金吾省式道左右中候中壘寺互都舩令丞尉左右京輔都尉八校省中壘胡騎虎賁三校尉此中興省在内官職之大畧也蝗本紀秋九月丙寅晦日有食之本紀觧題曰執金吾朱浮上疏曰陛下疾徃者上威不行下專國命即位以來不用舊典信舉刺之官黜鼎輔之任至於有所劾奏便加退免覆案不闗三府罪譴不蒙澄察陛下以使者為腹心而使者以從事為耳目是為尚書之平决於百石之吏人不自保廹於舉劾懼於刺譏故争飾詐偽以希虚譽所以致日月失行之應也願陛下遊意於經年之外望治於一世之後天下幸甚帝采其言自是牧守易代頗簡冬十月丁丑詔舉賢良方正百寮上封事無𨼆有司遵法度以夲紀修十一月詔王莽時吏人没為奴婢者免為庶人以夲紀修觧題曰髙祖即位即下免奴婢之詔識者謂其得作民主之職光武十年之間奴婢之詔六七下其猶髙祖之意哉十二月壬辰宋𢎞免以夲紀修觧題曰𢎞坐考上黨太守無所據免歸唐仲友曰進賢退不肖宰相職也𢎞守正疾惡所考必非賢以是免之過矣癸巳詔田租復三十稅一以夲紀修觧題曰詔曰頃者師旅未觧用度不足故行什一之稅今軍士屯田糧儲差積其令郡國見收田租三十稅一如舊制劉隆屯田武當李通屯田順陽張純屯田南陽王覇屯田新安皆在虢鄧間也隗囂遣行廵王元㓂扶風馮異及祭遵拒破之以紀傳修是嵗罷郡國都尉官本紀觧題曰郡尉秦官掌佐守典武職甲卒景帝更名都尉劉攽曰郡有都尉國有中尉此時罷郡都尉官夲紀有國字誤也至是始罷并職太守無都試之役明年遂罷郡國材官矣李竒曰材宫騎士習射馳戰陣常以八月太守都尉令長丞尉都試課殿最水處則習舡邉郡将萬騎行障塞應劭曰每有劇盗郡臨時置都尉事已罷之薛季宣曰光武乆在兵間思欲息肩又西都之季都肄或以為患韓延壽始以試士僣擬不道誅而翟義之反王莽隗囂之刼更始李通之勸光武皆以秋試因勒車騎誅令長號令起事光武懲之遂罷不講始遣列侯就國夲紀匈奴遣使來獻夲紀漢世祖光武皇帝建武七年成公孫述龍興七年隗漢盧芳七年朔寕王囂元年春時民得休息樂吏職而勤農桑乃革王莽偽薄之弊聼言觀行明試以功以袁宏漢紀稽古録修詔申薄𦵏之義以夲紀修三月丁酉詔罷輕車騎士材官樓舡士及軍假吏為民以夲紀修觧題曰詔曰今國有衆軍並多精勇宜且罷輕車騎士材官樓舡士及軍假吏令復還民伍漢官儀曰髙祖命天下郡國選能引闗蹶張材力武猛者以為輕車騎士材官樓舩常以秋後講肄課試各有員數平地用車騎山阻用材官水泉用樓舡李賢曰軍假吏謂軍中權置吏也應劭漢官儀曰自郡國罷材官騎士之後官無警偹實啓戎心一方有難三面救之一切取辦黔首囂然不及講其射御用其戒誓一旦驅之以即強敵是以每戰常負張角摇蕩八州並發乃逺徴三邉殊俗之兵非我族類忿鷙縱横多僵良善以為己功不教而戰是謂棄之豈虗也哉魏鄭泰之論亦然公孫述以隗囂為朔寧王以夲紀修觧題曰囂稱臣於述述騎都尉荆邯見東方将平兵且西向說述曰漢祖起於行陣之中兵破身困者數矣然軍敗復合創愈復戰何則前死而成功踰於却就而㓕亡也隗囂割有雍州兵强士附威加山東遇更始復失天下囂不及此時推危乗勝以争天命而退欲為西伯之事尊師章句賔友處士偃武息戈卑身事漢令漢帝釋闗隴之憂專精東伐四分天下而有其三使西州豪傑咸歸心於山東發間使召携貳則五分有其四若舉兵天水必至沮潰則九分而有其八陛下以梁州之地内奉萬乗外給三軍百姓愁困臣愚以為宜及天下之望未絶豪傑尚可招誘急以此時發國内精兵令田戎據江陵臨江南之㑹倚巫山之固築壘堅守傳檄呉楚長沙以南必随風而靡令延岑出漢中定三輔天水隴西拱手自服如此海内震摇兾有大利餘見通鑑陳瓘曰邯之謀於漢則不利於述則忠矣而述以縣令之器識近慮狹無能逺也癸亥晦日有食之詔百僚上封事不得言聖鄭興上疏論政事帝多納用以列傳袁宏漢紀修夏四月壬午詔舉賢良方正以夲紀修五月前将軍固始侯李通為大司空以夲紀修使司𨽻校尉督察三公司空椽陳元諌從之以吕祖謙標目題秋隗囂㓂安定馮異祭遵擊却之囂将王遵降以紀傳修冬漢朔方雲中太守降以夲紀修以汝南都尉杜詩為南陽太守以列傳修漢世祖光武皇帝建武八年成公孫述龍興八年隗漢盧芳八年朔寕王囂二年春正月中郎将來歙襲據略陽隗囂攻之不克夏閏四月帝自将征囂竇融率五郡太守會于髙平囂将牛邯降囂衆潰奔西城遣呉漢等圍之帝幸上邽遣盖延等攻圍上邽封竇融等為列侯以紀傳袁宏漢紀修觧題曰李賢曰畧陽縣属天水郡故城在今秦州隴城縣西北髙平縣属安定郡今原州縣西城縣属漢陽郡一名始昌城在今秦州上邽縣西南上邽縣属隴西郡故邽戎邑今秦州縣盗起頴川秋大水以本紀修八月帝東歸九月乙夘還宫庚申南征盗皆䧏戊寅還宫冬十月丙午幸懐十一月乙丑還宫以本紀修公孫述遣兵救隗囂呉漢盖延等退却以夲紀修十二月髙勾麗王遣使來貢通鑑漢世祖光武皇帝建武九年成公孫述龍興九年年漢盧芳九年隗純元春正月潁陽成侯祭遵卒于汧詔馮異領其營以列傳通鑑修觧題曰李賢曰汧縣属右扶風故城在今隴州汧源縣隗囂死王元立其子純以夲紀修觧題曰蘓轍曰隗囂初據隴坻謙恭下士豪傑歸之然聖公君臣不改盗賊之舊而囂束手稱臣䧟諸父於死地及光武自河北入洛而囂懲既徃之禍方擁兵自固謀臣去之義士笑之而囂與王㨗一二人以死守之始從聖公而不疑終背光武而不悔去就之計無一得者劉表専制荆州曹袁相距於官渡二人皆求助於表表方晏然自守一無所與卒為曹公所并隗囂劉表雍容風義皆有長者譽於其敗也皆以去就不明失之不如張魯於敗亡之餘知所歸徃猶能保其後嗣也三月公孫述遣田戎任滿據荆州以紀傳修觧題曰述遣田戎任滿程汎将數萬人乗枋箄李賢曰以竹木為之浮於水上下江闗李賢曰華陽國志曰巴楚相攻故置江關舊在赤甲城後移在江南岸對白帝城故基在今䕫州魚復縣南擊破馮駿等㧞巫及夷陵夷道李賢曰巫夷陵二縣並属南郡據荆門虎牙李賢曰水經注曰江水東歴荆門虎牙之間荆門山在南上合下開其状似門虎牙在北石壁色紅間有白文類牙在峽州夷陵縣東南宜都縣西北横江水起浮橋鬭樓立攅柱絶水道結營山上以拒漢兵公孫述拒漢兵之西孫皓拒晋兵之東皆於險要置浮橋鬭樓鐡鎻之属然岑彭卒焚之而破蜀王濬亦燒之而滅呉險其可恃哉餘見通鑑夏六月丙戌帝幸緱氏以夲紀修觧題曰李賢曰緱氏在洛陽之東遣呉漢等擊盧芳将賈覽於髙栁匈奴救之漢等不利以紀傳修觧題曰李賢曰髙栁縣属代郡故城在今雲州定㐮縣秋八月遣來歙率馮異等討隗純於天水以紀傳修是嵗省闗都尉復置䕶羌校尉以夲紀修封隂就為宣恩侯以列傳通鑑修漢世祖光武皇帝建武十年成公孫􅄒龍興十年漢盧芳十年春正月呉漢等撃賈覧破之夲紀夏馮異斬公孫述将趙匡於天水夲紀夏陽莭侯馮異卒以紀傳修秋八月帝幸長安祠陵廟遂幸汧隗純将髙峻降夲紀冬十月來歙等大破隗純於落門純降王元奔蜀以夲紀修觧題曰李賢曰今渭州隴西縣東南有落門山落門水出焉先零羌㓂金城隴西來歙大破之以夲紀修庚寅帝還宫以夲紀修漢世祖光武皇帝建武十一年成公孫􅄒龍興十一年漢盧芳十一年春二月己夘詔殺奴婢不得减罪以夲紀修三月己酉帝幸南陽章陵祠園陵庚午還宫以夲紀修閏月遣呉漢等發兵與岑彭會彭大破田戎任滿於荆門獲滿遂率舟師討公孫述留将軍馮駿圍戎於江州以夲紀修觧題曰田戎等據荆門虎牙彭數攻之不利於是装直進樓舩冐突露橈數千艘彭與呉漢及劉隆臧宫劉歆發南陽武陵南郡兵又發桂陽零陵長沙委輸棹卒凡六萬餘人騎五千疋皆㑹荆門呉漢以三郡棹卒多費粮榖欲罷之彭以蜀兵盛不可遣上書言状帝報曰大司馬習用歩騎不曉水戰荆門之事一由征南公為重而已彭乃令軍中募攻浮橋先登者上賞於是魯竒應募而前飛炬焚之彭復悉軍順風並進所向無前蜀兵大亂溺死者數千人餘見通鑑李賢曰江州縣属巴郡今渝州巴縣樓舩秦制也秦使尉屠睢将樓舩之士以攻越漢官儀以為髙帝所置誤也岑呉伐蜀用樓舩露橈舩紀皆謂之舟師然則樓舩盖舟師之一也七年既罷樓舩士而伐蜀討交趾皆用樓舩者盖所罷者其士而舩則未罷也水戰則徐募櫂卒耳逮永平而樓舩之名始冺夏四月丁夘省大司徒司直官以夲紀修先零羌㓂臨洮以太中大夫馬援為隴西太守破之以紀傳修六月來歙等破公孫述將王元環安於下辯安使盗殺歙詔以馬成代之以紀傳修觧題曰下辯縣属武都郡今成州同谷縣舊名武街城帝自将征述秋七月次長安八月岑彭破述将侯丹於黄石将軍臧宫大破延岑於沈水王元䧏帝還宫以紀傳修觧題曰唐仲友曰光武常以大軍隨諸将後不特為人才有限亦所以搃攬權綱也事見通鑑李賢曰黄石即黄石灘也水經注曰江水自涪陵東出百里而届于黄石在今涪州涪陵縣沈水出廣漢縣下入涪水冬十月述使盗殺岑彭以紀傳修馬成平武都遂與馬援擊破先零羌徙之天水隴西扶風以夲紀修觧題曰武都今同慶府鳳沔階州之地十二月呉漢率舟師討公孫述以本紀修是嵗省朔方牧并并州㫁州牧奏事以夲紀修觧題曰杜佑通典舊制州牧奏二千石長吏不任位者皆先下三公三公遣掾吏按驗然後黜退光武即位用法明察不復委三府故權歸舉刺之吏漢世祖光武皇帝建武十二年漢盧芳十二年春正月呉漢破公孫述将魏黨公孫永及其壻史興於武陽以夲紀修觧題曰李賢曰武陽縣属蜀郡故城在今益州成都縣東南夏六月黄龍見東阿以夲紀修觧題曰李賢曰東阿今濟州縣秋七月馮駿㧞江州以夲紀修九月呉漢大破公孫述将謝豐於廣都斬之臧宫㧞涪城引兵與漢會以紀傳修觧題曰廣都縣属蜀郡故城在今益州成都縣東南涪城今綿州縣按通典於梓州涪城縣注臧宫㧞涪城斬公孫恢即此盖兩漢涪縣東晉立始平郡西魏改郡為涪城縣為潼隋改潼為涪城属綿州大歴十三年属梓州所以新唐書𨽻梓州舊唐書𨽻綿州李通免以夲紀修觧題曰陳元以髙才著名辟司空李通府時大司農江馮上言宜令司𨽻校尉督察三公事下三府元上䟽曰臣聞師臣者帝賔臣者覇故武王以太公為師齊桓以夷吾為仲父近則髙帝優相國之禮太宗假宰輔之權及王莽遭漢中衰專操國柄以偷天下况已自喻不信群臣奪公輔之任損宰相之威以刺舉為明徼訐為直至乃陪僕告其君長子弟變其父兄網宻法峻大臣無所措手足然不能禁董忠之謀身為世戮今四方尚擾百姓觀聼咸張耳目陛下宜勞心下士屈莭待賢不宜使有司有察公輔之名帝從之永元中司𨽻校尉晏稱劾太尉張酺通性謙恭常欲避權勢自為宰相謝病不視事連年乞骸骨帝每優寵之令以公位歸第飬疾通復固辭積二嵗乃聼上大司空印綬吕祖謙曰髙祖識大體而莭目未免踈漏光武莭目甚詳悉而大體不能無遺所以二漢風聲氣習厚薄緩急不同髙祖㫁無他技其心休休焉有容故能屈羣策盡衆智規模所以寛光武縁有他技不識大體一時之治非不可觀終無餘味大抵政事統體上則人主下則大臣相與共持治體者也羣有司百執事奉而行之者也光武不任三公事歸臺閣而人主下親簿書期㑹故當人主聪明強力耳目手足之所及事固皆舉至後世少惰即衰不可用如西漢諸君何嘗盡賢惟其有規模統體故子孫有所慿藉東漢自光武之後明章皆賢君論其積累自當深厚纔至和帝以後反不若西漢以此知其全無統體西漢輔相如禹光軰多庸繆懐姦若東漢大臣袁安李固楊震之徒過之甚逺然而終不能救天下者正由事不在三公故也冬十一月戊寅呉漢臧宫與公孫述戰於成都大破之殺述己夘時延岑以城降辛巳漢滅公孫氏及岑焚宫室大掠詔祠譙𤣥表李業之閭徴費貽等西土歸心焉以紀傳修觧題曰建武十一年岑彭上劉隆為南郡太守自率臧宫劉歆長驅入江闗臧宫傳宫與彭等破荆門别至垂鵲山通道出秭歸至江州令軍中無得虜掠乗利直指墊江今合州本两漢巴郡之墊江縣攻破平曲李賢曰縣属巴郡今忠州縣到江州留馮駿討之六月來歙與盖延馬成進攻述将王元環安於河池李賢曰一名仇池縣属武都郡今鳳州縣下辯䧟之乗勝遂進蜀人大懼使刺客刺歙馬成代歙守中郎将帝自将征述七月次長安述使延岑吕鮪王元及其弟恢率兵拒廣漢今漢州綿州地及資中今資州資陽縣又遣侯丹率二萬餘人拒黄石彭乃多張疑兵使䕶軍楊翕與臧宫拒延岑等自分兵浮江下還江州泝都江而上都江成都江也襲擊侯丹大破之因晨夜倍道兼行二千餘里徑㧞武陽使精騎馳廣都去成都數十里勢若風雨初述聞漢兵在平曲故遣大兵逆之及彭至武陽繞出延岑軍後蜀地震駭述大驚曰是何神也延岑盛兵於沈水臧宫衆多食少降者皆欲散宫欲引還會帝遣謁者将兵詣岑彭有馬七百匹宫矯制取以自益晨夜進兵多張旗幟登山鼓噪右歩左騎挾舩而引岑不意漢軍卒至登山望之大震恐宫因縱擊大破之斬首溺死者萬餘人岑奔成都其衆悉降自是乗勝追北軍至平陽鄉王元降馬成等平武都帝在長安馬成既平武都王元已降臧宫可以進兵矣而僅破先零遽罷其軍者帝慮述連諸𦍑動摇三輔則蜀未可平故幸長安為之聲援其實重兵全在呉漢岑彭也蜀刺客詐為亡奴降夜刺殺彭詔鄭興領其營呉漢装露橈舩将南陽兵及㢮刑募士三萬人泝江而上漢并将彭軍十二年與述将魏黨公孫永戰於魚涪津李賢曰續漢書曰犍為郡南安縣有漁涪津在縣北臨大江大破之遂圍武陽述遣子壻史興将五千人救之漢迎擊盡殄其衆因出犍為界諸縣皆城守漢乃進兵攻廣都㧞之武陽東諸小城皆降述将帥離叛雖誅㓕其家不能禁帝必欲降之乃下詔諭述曰勿以來歙岑彭受害自疑今以時自詣則宗族完全詔書手記不可數得述終無降意秋七月馮駿㧞江州漢乗利将歩騎二萬餘人進逼成都去城十餘里阻江北為營作浮橋使将軍劉尚将萬餘人屯於江南相去一十餘里述使其将謝豐袁吉将衆十許萬分為二十餘營并出攻漢使别将萬餘人刼劉尚令不得相救漢與大戰一日兵敗走入壁豐因圍之漢饗士秣馬閉營三日不出乃多樹幡旗使烟火不絶夜銜枚引兵與劉尚合軍豐等不覺明日乃分兵拒水北自将攻江南漢率兵引戰自旦至晡大破之斬豐吉引還廣都自是戰廣都成都之間八戰八克遂軍于其郭中臧宫㧞綿竹破涪城斬述弟恢復攻繁郫李賢曰繁郫二縣属蜀郡至呉漢營飲酒髙會􅄒募敢死士五千餘人以配延岑於市橋李膺益州記中星橋舊市橋也在今成都縣西南五里偽建旗幟鳴鼔挑戰而潜遣竒兵出漢軍後襲破漢漢堕水縁馬尾得出時漢軍餘七日糧隂具舩欲遁蜀郡大守張堪馳見漢説述必敗不宜退師漢從之乃示弱挑敵冬十一月臧宫軍咸門李賢曰成都北面有二門西曰咸門戊寅述自将數萬人攻漢使延岑拒宫大戰岑三合三勝自旦及日中軍士不得食並疲漢因令壮士突之述兵大亂被刺洞胸堕馬呉漢傳云䕶軍髙午奔陣刺殺􅄒左右輿入城以兵属延岑其夜死明旦岑降辛巳漢夷述妻子盡滅公孫氏并族延岑放兵大掠焚述宫室帝聞之怒以譴漢又譲劉尚曰城降三日一旦放兵縱火聞之可為酸鼻尚宗室子孫嘗更吏職何忍行此良失斬将弔民之義也譙𤣥者巴郡閬中人平帝元始四年為繡衣使者王莽居攝變姓名竄歸述連聘不詣乃遣使者偹禮徴之若不肯起便賜以毒藥太守自至𤣥廬曰誠不宜復辭𤣥曰保志全髙死亦奚恨遂受毒藥𤣥子瑛泣血叩頭於太守願奉家錢千萬贖父死太守為請述許之李業廣漢梓潼人王莽居攝以病去官述徴為愽士固稱疾不起述羞不致之使大鴻臚尹融持毒酒奉詔命以刼業融譬㫖曰今天下分崩孰知是非而以區區之身試於不測之淵乎業乃嘆曰古人危邦不入亂邦不居何乃誘以髙爵重餌哉融曰宜呼室家計之業曰大丈夫㫁之於心乆矣何妻子之為遂飲毒而死述聞業死大驚又耻有殺賢之名乃遣使弔祠賻贈百匹業子翬逃辭不受平帝時蜀郡王皓為羙陽令王嘉為郎王莽􅆲位並棄官歸述使徴皓嘉恐不至先繫其妻子使者謂皓曰速裝妻子可全對曰大馬猶識主况於人乎自刎以首付使者述怒誅皓家属嘉聞而歎對使者伏劍而死犍為費貽不肯事述乃漆身為癘陽狂以避之同郡任永馮信述連徴命皆託青肓以避世難建武十一年卒明年天下平詔夲郡祠以中牢其忠莭志義之士並蒙旌􅂋程烏李育以有才幹皆擢用之於是西土咸悦莫不歸心焉夫以譙𤣥數子不汙莽朝其莭固與周黨王覇薛方之徒無以大相過至其不為述起則其貞操卓識尤過人逺甚而述以盗賊之行脅之以死是其規模猶出王莽下而欲長有其國難矣光武尊寵而表厲之惟恐不至其知為君之道者哉參狼羌㓂武都馬援降之以夲紀修觧題曰按列傳爰劍曾孫忍秦獻公兵臨渭首忍季父卬将其種人南出賜支河曲西數千里與衆羌絶逺其後子孫任隨所之或為􅈊牛種越􅸋羗是也或為白馬種廣漢羗是也或為参狼種武都羗是也忍與弟舞獨留湟中徃年先零㓂臨洮援既破之其㓂鈔拒浩亹隘李賢曰音告門縣属金城郡浩水名門者水流夾山門兩岸深若門金城郡故城在今蘭州廣武縣西援與馬成又破降之而徙之天水隴西扶風至是参狼羗諸種㓂武都援復擊破之而隴右始清餘見通鑑范曄論曰先零侵境趙充國遷之内地當煎作㓂馬文淵徙之三輔貪其暫安之勢信其馴服之情計日用之權宜忘經世之逺畧豈夫識㣲者之為乎故㣲子垂泣於象箸辛有浩歎於伊川也詔邉吏追虜料敵不拘以戰守逗留法以陳瓘通鑑約論修觧題曰李賢曰説文逗留止也前漢書音義逗是曲行避敵也漢法軍行逗留畏愞者斬至是令追虜者或逺或近量敵進退不拘以軍法直取勝敵為務也逗古住字遣驃騎大将軍杜茂将死刑等築北邉亭候以本紀修詔竇融與五郡太守入朝以列傳修執金吾雍奴盛侯㓂恂卒以列傳修觧題曰袁宏曰㓂恂之才足居内外之任雖暫撫河内再綏頴川未足究其逺畧也及在汝南延儒生受左氏何其閑也晚莭從容不得預於治體以世祖之明㓂生之智猶不得自盡於時况庸主乎大事記續編卷八
