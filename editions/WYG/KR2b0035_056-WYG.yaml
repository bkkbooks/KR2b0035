body:
  text: 大事記續編卷五十六明王禕撰唐睿宗皇帝景雲元年春正月帝及后為微行以新紀脩三月以河源九曲予吐蕃新紀解題曰按㑹要天寶十三載以黄河九曲置洮陽郡及神䇿軍於臨洮之西二百里置澆河郡及宛秀軍於積石軍之西百里以實河曲之地洮陽今洮州澆河城趙充國所築在廓州達化縣西夏四月殺定州郎岌五月丁卯殺許州司兵燕欽融六月壬午皇后韋氏及安樂公主弑帝秘不發喪以温王重茂為皇太子徵府兵屯京師韋温總知兵馬刑部尚書裴談工部尚書張錫同三品吏部尚書張嘉福中書侍郎岑羲吏部侍郎崔湜同平章事甲申發喪皇后自立為皇太后臨朝攝政太子重茂即皇帝位改元唐隆安國相王為太尉封其子壽春郡王成器為王庚子臨淄郡王隆基率萬騎入北軍誅韋氏及安樂公主等辛丑封隆基為平王朝邑尉劉幽求為中書舍人總苑監鍾紹京為中書侍郎參知機務黄門侍郎李日知同三品紹京尋罷紀處訥韋温宗楚客張嘉福諸韋武黨皆伏誅出蕭至忠韋嗣立趙彦昭崔湜為諸州刺史平王隆基同三品甲辰相王旦即皇帝位廢重茂為温王以新舊紀傳吕祖謙標目脩解題曰按新舊史紀傳志實録景龍文館記陸贄𤣥宗編遺録初武三思通於韋氏欲行簒逆國子祭酒葉靜能善符禁小術散騎常侍馬秦客閑醫藥光禄少卿楊均以調膳皆出入宫掖得幸於后燕欽融直言其事雖殺欽融而中宗怏怏不樂韋氏恐變生安樂公主欲后臨朝而求為皇太女丁丑遂鴆帝六月壬午帝覺鴆發召馬秦客因是又持鴆毒焉帝崩于神龍殿在西内兩儀殿北甘露殿東蓋帝自東都之還不居東内而居西内后懼秘不發喪引所親入禁中謀自安之䇿召郎將蕭璿等二十餘人各令守捉諸門徵衛兵千餘分屯重城以刑部尚書裴談工部尚書張錫並同中書門下三品依舊東都留守又命左金吾大將軍趙承恩左監門大將軍薛簡帥兵五百人備譙王重福立温王重茂為太子安國相王旦為太子太師癸未召府兵五萬屯京城分為左右營以吏部尚書張嘉福中書侍郎岑羲吏部侍郎崔湜並同中書門下平章事甲申發喪於太極殿西内正殿遺制皇后知政事安國相王參謀政事宗楚客謂韋温曰皇后臨朝相王輔政嫂叔不通問難為儀注理全不可僕射蘇瓌曰遺制是先帝意安可更改楚客及温大怒遂削相王輔政而宣行焉大赦天下改元唐隆進相王旦為太尉韋温總知内外兵馬立妃陸氏為皇后壬辰遣使諸道巡撫紀處訥闗内道張嘉福河北道岑羲河南道韋温宗楚客武延秀等說后託圖䜟韋氏當受命謀害少主駙馬韋捷韋濯分掌左右屯營武延秀及温從子播族弟璿外甥髙崇共典羽林軍及飛騎中書舍人韋元徼循六街廣招不逞連結中外宗楚客與弟將作大匠晉卿及太常少卿李曳少匠李守貞日夜速令延秀起事楚客温深憚相王太平公主屬尊欲先除之然後發相王子隆基常隂引材力之士以自助初太宗擇官户蕃口中少年驍勇者百人每出遊獵令持弓矢於御馬前射生令騎豹文韉著畫虎文衫謂之百騎則天時謂之千騎分𨽻左右羽林營孝和謂之萬騎亦置使領之隆基接其豪俊或賜飲食財帛以此歸心焉時楚客為朋黨崔日用附之驟遷兵部侍郎恐禍及己乃因沙門普潤道士王曄宻報隆基隆基乃與公主及苑總監鍾紹京前朝邑尉劉幽求長上折衝麻嗣宗等定䇿誅之韋播韋璿拜官日鞭督萬騎士怨不為之用果毅葛福順陳𤣥禮訴於隆基諷之皆願效死或曰先啟大王隆基曰請而從是王與危事不從則吾計失矣庚子乙夜福順李仙鳬至隆基曰舊史傳作𤣥宗與公等除大逆安社稷各取富貴在於俄頃何以取信福順等請號而行攻𤣥武門景龍元年改為神武門樓為制勝樓斬韋璿韋播髙嵩於寢帳令曰韋氏酖殺先帝欲危社稷今韋氏馬鞭以上皆斬立相王以安天下敢有助逆者罪及三族衆歡叫大集攻白獸𤣥德等門宋敏求長安志東宫北門曰𤣥德門斬闗而進左萬騎自左入右萬騎自右入㑹於凌烟閣前隆基自苑南入西内苑接太極宫之北故自苑南入鍾紹京率丁匠百餘以從太極殿前有宿衛梓宫萬騎聞譟聲皆被甲應之韋后惶惑遁入殿前飛騎營唐書補闕方欲就女兵求救為亂兵所害武延秀與安樂公主在内宅格戰良久皆斬之新史傳公主方覽鏡作眉聞亂走至右延明門兵及斬其首通鑑取其說吳縝糾繆曰𤣥宗起事在夜而主方覽鏡作眉何為哉斯妄也設使其事誠然亦不足書也斬内將軍賀婁氏於太極殿西始上官婉兒從母子王昱為拾遺戒婉兒母鄭曰上往囚房陵武氏得志矣卒而中興天命所在不可幸也三思雖乗釁天下知必敗今昭容上所信而附之且滅族鄭以責婉兒不從節愍誅三思果索之始憂懼及草遺制即引相王輔政臨淄王兵起被收婉兒以詔草示劉幽求幽求言之王王不許遂誅之少帝時在太極殿劉幽求曰衆期今夜立相王何不早定臨淄王止之分遣誅馬秦客葉靜能楊均比明馳謁相王謝不先啟之罪相王泣曰宗社安定汝之力不然吾且及難皇城及京城門並閉相王奉少帝御安福門大赦分遣萬騎捕諸逆黨斬韋温宗楚客宗晉卿趙履温諸韋無少長皆斬之並懸首於市新傳楚客嘗宻語其黨曰始吾在卑位尤愛宰相及居之又思天子南面一日足矣雖外附韋氏而内蓄逆謀故卒以敗左僕射韋巨源為亂兵所殺進封臨淄王為平王兼知内外閑廏兼押左右萬騎鍾紹京守中書侍郎劉幽求守中書舍人並參預機務麻嗣宗雲麾將軍行左右金吾衛翊府中郎將薛崇簡太僕卿立節郡王餘封拜有差追戮紀處訥于華州遣使分行諸道宣諭仍往均州慰勞譙王壬寅以宋王成器衡陽王成義為左右衛大將軍巴隆王隆範彭城王隆業為左右羽林衛大將軍紹京及黄門侍郎李日知並同中書門下三品中書令蕭至忠為許州刺史兵部尚書韋嗣立為宋州刺史中書侍郎趙彦昭為絳州刺史吏部侍郎崔湜為華州刺史癸夘平王隆基同中書門下三品鍾紹京行中書令張嘉福伏誅於懷州王公百寮上表咸以國家多難宜立長君相王衆望所歸宜即尊位甲辰少帝令太平公主請讓于相王王固辭其夜幽求謂宋王成器平王隆基曰相王昔臨天下謳歌所屬今不即位禍難不息平王以為王實録作上後倣此性虚淡不以世事嬰心况子姪之間必不忍代位幽求曰衆望所歸豈不為社稷計平王等極言於王乃從之王出太極殿少帝於東隅西面王於梓宫側東向太平公主曰皇帝實録作少帝欲以此位讓叔父合否幽求跪曰家國事重有此推讓誠為至公是日少帝制請王即皇帝位少帝遜於别宫王即位御承天門大赦封少帝為温王餘見通鑑胡寅曰隆基舉事之初或請先白相王隆基恐王預危事而不白既誅韋氏劉幽求曰衆約今夕共立相王何不早定隆基又止之至是復拒幽求之議不得已而入告然則隆基之志本欲自取特迫於父子不敢出言惜乎睿宗之不見幾幽求之不知變也丙午太常少卿薛稷為黄門侍郎參知機務以新紀修丁未立平王隆基為皇太子以新紀修復則天大聖皇后號曰天后新紀追削武三思武崇訓爵諡斵棺暴屍通鑑戊申許州刺史姚崇為兵部尚書同三品韋嗣立蕭至忠為中書令趙彦昭為中書侍郎崔湜為吏部侍郎同平章事以新紀通鑑修帝妹太平公主用事以吕祖謙標目修贈郎岌燕欽融諫議大夫以通鑑修秋七月庚戌朔封子三人為王以新紀修贈韋月將宣州刺史通鑑癸丑兵部侍郎崔日用為黄門侍郎參知機務通鑑追復故太子重俊位號敬暉桓彦範崔𤣥暐張柬之袁恕己李多祚等官爵以通鑑修丁巳洛州長史宋璟檢校吏部尚書同三品璟與姚崇協心革弊政進忠良退不肖賞罰盡公有貞觀永徽之風以通鑑修岑羲罷新紀貶蕭至忠韋嗣立趙彦昭張錫李嶠為刺史以新舊紀修崔湜罷新紀蘇瓌為左僕射以新紀修丁夘唐休璟張仁愿罷以新舊紀修改元新紀解題曰宋庠紀年通譜景雲見故改元以協瑞孫甫曰古之人君即位必踰年而改元者先君之年不可不終也繼大位不可無年也一年不可二君也先君之年不終則後嗣急於為君而忘孝心矣繼大位無始則布政立事無以正本矣一年二君則國統不一而民聴惑矣典法如是之重人君可不謹其事歟睿宗於中宗雖兄弟之序然繼其位則同於先君安可不待踰年而改元蓋大臣昧於經義而然也崔日用薛稷罷新紀乙亥廢武氏廟陵追廢韋后為庶人安樂公主為悖逆庶人以新紀脩譙王重福及汴州刺史鄭愔入東都八月伏誅以新紀修置羽林飛騎以通鑑修罷斜封官凡數千人以新紀修貶裴談為刺史以新紀修贈蘇安恒諫議大夫通鑑冬十月追號天后曰大聖天后以新紀修解題曰鼂補之曰武氏之惡非其子嗣立則為世大戮無復列於唐宗廟矣今追尊其無名之號以為愛親是播其惡於衆也諡太子重俊曰節愍以通鑑修十一月戊申姚崇為中書令以新舊紀脩己酉葬定陵廟號中宗以新舊紀修解題曰歐陽脩曰吉凶之於人猶影響也而為善者得吉常多其不幸而罹於凶者有矣為惡者未始不及於凶其幸而免者亦時有焉而小人之慮遂以為天道難知為善未必福而為惡未必禍也武后之惡不及於大戮所謂幸免者也至中宗韋氏則禍不旋踵矣然其親遭母后之難而躬自踵之所謂下愚之不移者歟壬子蘇瓌韋安石罷新紀是嵗初置河西節度支度營田大使方鎮表文解題曰節度使始於此按通典㑹要並云景雲二年四月以賀拔延嗣為河西節度使為節度使之始方鎮表景雲元年置河西諸軍州節度支度營田督察九姓部落赤水軍兵馬大使通鑑考異以實録所載薛訥先是已為幽州鎮守經畧節度大使則節度之名不始於延嗣今考新舊史薛訥𫝊訥為幽州都督蓋永徽以後都督帶使持節即為節度使訥之所以為節度使者蓋帶使持節爾若節度使定名則實自延嗣始也河西節度大使領涼甘肅伊𤓰沙西治涼州副使治甘州開元二年兼隴右羣牧都使七年領經畧大使天寶四載張掖太守領節度副使大厯元年徙治沙州咸通四年置涼州節度領涼洮西鄯河臨治涼州永徽已後都督帶使持節即為節度雖有其任而未正其名也景雲之世延嗣為河西節度雖正其名而未重其權也接于開元文武迭用不久任不兼領不遥授及遥授之端一啟於鄫王嗣貞之寵兼領之任復溺於蓋嘉運之私愛銳意邊功而為邊將者十餘年而不易募彍騎以宿衛府無可交之兵而在内之勢日輕置長征兵於邊要精兵咸聚西北而在外之勢日重十道置使徧於邊陲而藩鎮益强節度之職盡用蕃將而國體益輕漁陽之變豈待智者而後知哉唐睿宗皇帝景雲二年春正月癸丑突厥請和親以通鑑修己未太僕卿郭元振中書侍郎張說同平章事以新舊紀修甲子徙封重茂為襄王乙丑追尊妃劉氏竇氏為皇后以舊紀修二月太平公主蒲州安置以實録修丁丑皇太子監國甲申貶姚崇宋璟為外州刺史以新舊紀修丙戌太子少保韋安石為侍中劉幽求罷以新舊紀修以左右萬騎羽林為北門四軍朱熹綱目解題曰按兵志天子禁軍者南北衙兵也南衙諸衛兵是也北衙禁軍也龍朔二年始取府兵置左右羽林軍𤣥宗以萬騎平韋氏改為左右龍武軍至德二載置左右神武軍總曰北衙六軍又擇便騎射者置衙前射生手千人曰殿前射生分左右廂初哥舒翰臨洮西置神䇿軍禄山反衛伯玉將千人赴難屯于陜廣德元年代宗幸陜魚朝恩舉在陜兵與神䇿軍迎扈悉號神䇿軍貞元二年為左右神䇿軍三年改殿前左右射生軍曰左右神威軍總曰左右十軍元和二年省神武軍明年廢左右神威軍合為一曰天威軍八年分隸神䇿軍昭宗誅宦官神䇿軍廢皆隸六軍名存而已復墨敕斜封官以新舊紀修三月癸丑作金仙玉真觀新紀夏四月韋安石為中書令李日知為侍中新紀甲辰作𤣥元皇帝廟新紀五月召太平公主還京師朱熹綱目復武氏陵以新舊紀修壬戌殿中監竇懷貞為御史大夫同平章事以新舊紀修閏六月初置十道按察使自後廢置不常以舊紀通鑑修秋八月庚午韋安石為左僕射同三品以新舊紀修九月乙亥竇懷貞為侍中以新舊紀修冬十月甲辰吏部尚書劉幽求為侍中散騎常侍魏知古太子詹事崔湜為中書侍郎並同三品中書侍郎陸象先同平章事韋安石李日知郭元振竇懷貞張說罷以新紀修十一月令百姓二十五入軍五十免朱熹綱目唐𤣥宗皇帝先天元年春正月辛巳合祭天地于南郊以通鑑修己丑改元太極以新舊紀修解題曰宋庠紀年通譜籍田故改元壬辰陸象先同三品以新紀修乙未户部尚書岑羲御史大夫竇懷貞同三品以通鑑修夏五月戊寅祭北郊朱熹綱目辛巳改元延和以新紀修解題曰宋庠紀年通譜延和本魏太武年號六月癸丑岑羲為侍中朱熹綱目以刑部尚書郭元振為行軍大總管伐突厥以新紀修幽州都督孫佺等襲奚敗于冷陘山以新紀通鑑修解題曰新書地理志檀州燕樂縣北有吐䕶真河奚王衙帳薊州傍吐䕶真河五百里至奚契丹衙帳舊五代史列傳奚本匈奴别種即東胡之地凡五部其大首領號奚王居隂涼州東去營州五百里西南去幽州九百里後徙居琵琶川在幽州東北數百里天祐初契丹漸盛奚為契丹戍守邊上暨虜政苛虐其首領以别部徙媯州故有東西奚之號武經總要賈耽說媯州西北八百里至陘山新唐書傳契丹之地西至冷陘事見通鑑秋七月辛未彗星出西方入太微朱熹綱目乙亥竇懷貞為右僕射平章軍國重事以朱熹綱目修八月庚子立皇太子隆基為皇帝自尊為太上皇大事聴之以新紀通鑑修解題曰按新史列傳帝傳位太子左拾遺韓朝宗與將軍龎承宗諫曰太子雖睿聖宜且養成盛德帝不聴孫甫曰睿宗以次子賢而有功取内外屬望之意從長子辭讓之誠立為太子又以時多難上象示變知行事不當天意遂傳位焉實大公之心安宗社之計也柰何為一妹所惑雖傳位而不授以政使太子稱帝而主細務自稱太上皇而斷大事此體豈正乎故養成一妹之惡致姦人黨附遂生逆謀由明斷之不足也餘見通鑑壬寅上大聖天后尊號為聖帝天后以通鑑修甲辰改元以新紀脩丁未立妃王氏為皇后朱熹綱目戊申封子二人為王以本紀修庚戌竇懷貞劉幽求為左右僕射同三品魏知古為侍中崔湜檢校中書令以宰相表修戊午流劉幽求于封州新紀九月丁夘朔日有食之新紀辛夘立子為王以本紀通鑑修冬十月癸夘獵於驪山以新舊紀修十一月誥遣皇帝巡邊後竟不行以新紀通鑑修大事記續編卷五十六
