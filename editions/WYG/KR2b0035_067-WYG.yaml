body:
  text: 大事記續編卷六十七明王禕撰唐武宗皇帝㑹昌六年春三月帝改名炎不豫左神䇿中尉馬元贄立光王怡爲皇太叔甲子帝崩于大明宫太叔即皇帝位改名忱以新紀修解題曰韋昭度續皇王寳運錄宣宗憲皇第四子早本文作便合紹位乃與姪文宗文宗崩武皇慮有他謀宻令幽之宦者仇公武慜之乃奏武宗武宗唯唯公武取出將歸家宻養之三年後武皇晏駕百官奉迎於玉宸殿立之擢公武爲觀軍容使尉遲偓中朝故事敬宗文宗武宗相次即位宣皇叔父也武宗深忌焉一日㑹鞠禁苑武宗本文作上召之目中官仇士良士良躍馬前曰有㫖王可下馬士良命中官輿出軍中奏云落馬已不救矣尋請爲僧㳺行江表間㑹昌末中人請還京遂即位通鑑不之取然釋氏傳燈錄具載宣帝爲僧時問荅之語則其嘗浪跡江湖明矣即位之後追仇前事至於武宗諸子皆不保其終宋敏求補宣宗實錄謂自大中後皆宣宗子孫繼世故唐人不敢道則昭度偓輩所紀未可以其鄙妄而棄之也夏四月辛未尊母鄭氏爲皇太后以舊紀通鑑修丙子李徳裕罷以新紀修趙歸真伏誅流山人軒轅集于嶺南五月乙巳復僧寺吕祖謙標目修解題曰按舊紀明年閏三月勅應㑹昌五年所廢寺有僧能脩創不得禁止孫樵復佛寺奏曰武皇帝元年籍天下羣髠十七萬夫以十家給一髠是編户一百七十萬困于羣髠矣武皇帝一旦髪天下髠悉歸平民陛下即位以來詔營廢寺臣恐數年之間十七萬髠如故矣請以開元之率明之開元之間率户出兵藉而爲伍兵未始廢於農農未嘗奪於兵故民力有餘今天下常兵不下百萬皆不食於平民嵗度費率中户五僅能活一兵如此則編户不五百萬不足以給之故民力不足今欲以一百七十萬給於羣髠是六百七十萬無羡賦矣兵部侍郎白敏中同平章事以新紀通鑑修解題曰敏中黨於僧孺者也立子五人爲王以通鑑修六月太廟爲九代十一室朱熹綱目秋七月李讓夷罷新紀囘鶻殺烏介可汗立其弟特勒遏捻爲可汗以朱熹綱目修八月壬申𦵏端陵廟號武宗以通鑑修以牛僧孺爲衡州長史李宗閔爲郴州司馬以吕祖謙標目修九月鄭肅罷兵部侍郎盧商爲中書侍郎同平章事以新紀修冬十月甲申帝受法籙於道士劉𤣥静以通鑑修十二月戊辰朔日有食之新紀唐宣宗皇帝大中元年春正月甲寅改元以新紀通鑑修二月癸未以旱理京師囚罷太常教坊習樂損百官食出宫女放五坊鷹犬停飛龍粟以新紀修盧商罷刑部侍郎崔元式爲門下侍郎户部侍郎韋琮爲中書侍郎同平章事以新舊紀修夏四月己酉積慶太后蕭氏崩以新舊紀修六月遣使冊黠戛斯可汗以通鑑修秋八月丙申李囘罷以新紀修十二月貶太子少保分司東都李徳裕爲潮州司馬以新紀修復增州縣官三百八十三員朱熹綱目唐宣宗皇帝大中二年春正月甲子上尊號以新紀修右補闕丁柔立訟李徳裕貶南陽尉以朱熹綱目修囘鶻可汗西走黠戛斯俘其餘衆以歸以通鑑修三月封子爲王以新紀修夏五月己未朔日有食之以新舊紀修崔元式罷兵部侍郎周墀刑部侍郎馬植同平章事以新紀修六月皇太后郭氏以憂崩以吕祖謙標目修解題曰葉適曰新史記其爲宣宗不禮欲自殞是夕暴崩及貶禮官王皥白敏中周墀皆詰怒甚詳而舊史乃言宣宗即后之諸子恩禮愈異於前朝無一語類新史豈唐故史之所諱遂承用之耶事見通鑑秋九月甲子貶李徳裕爲崖州司户以吕祖謙標目修解題曰實錄九月甲子勅徳裕動多詭異之謀潜懐僣越之志又云擢爾之髪數罪無窮載窺罔上之由益驗無君之意帝素惡徳裕及是譴斥命内外制各撰詞而擇用者乃翰林學士令狐綯所作餘見通鑑按實錄㑹昌中皇子益王兖王已長議䇿立之際徳裕必當有語及之故深忤宣宗意朋黨挾吳湘事以希上指卒逺貶之夫徳裕之相武宗得君如此其專也宣宗之怨武宗如彼其深也宣宗既立徳裕固難立於其朝矣况白敏中崔鉉輩抵掌㦸手搆成其罪順流抑墜其勢然爾宋敏求謂徳裕以請立二王忤宣宗之意必有所據云然也冬十一月韋琮罷以新紀修唐宣宗皇帝大中三年春二月吐蕃以秦原安樂三州及七關來歸以新舊紀修解題曰按舊紀新地志傳行原州治臨涇大中收復歸治平高縣縣有木峽石門驛藏制勝石峽木崝六盤七關涇原節度使康季榮奏收復原州石門驛藏木峽制勝六盤石峽六關邠寜張君緒奏收復蕭關新紀載蕭關而不載木崝吐蕃陷河隴八十八年始復三月馬植罷新紀夏四月乙酉周墀罷御史大夫崔鉉爲中書侍郎兵部侍郎魏扶同平章事以新紀修癸巳張仲武卒其子幽州盧龍節度副使直方自稱留後以新紀通鑑修五月武寕軍亂逐其節度使李廓以新紀修六月戊申以張直方爲節度使以通鑑修冬十月改備邉庫爲延資庫通鑑解題曰按新史夷狄傳置備邉庫收度支户部鹽鐵錢物宣宗更號延資庫初以度支郎中判之至是屬宰相其任益重取吐蕃維州以通鑑修十一月封弟爲王以新紀修閏十一月以克復河湟加上順宗憲宗諡號以通鑑修解題曰宋祁曰唐興四夷有弗率者皆利兵移之蹷其牙犂其庭而後已惟吐蕃囘鶻號彊雄爲中國患㝡乆賛普遂盡盗河湟薄王畿爲東境犯京師掠近輔殘馘華人謀夫虓帥圜視共計卒不得要領晚節二姓自亡而唐亦衰焉盧龍軍逐張直方衙將周綝自爲留後以通鑑修李徳裕卒吕祖謙標目解題曰范祖禹曰裴度李徳裕皆有功烈爲唐賢相無能繼之者徳裕才優於度而徳器不及也葢度不爲黨而徳裕爲黨是以度雖爲小人所傾而能以功名終徳裕一失勢而斥死海上也雖牛僧孺之黨多小人徳裕之黨多君子然其因私以害公挾埶以報怨則一而已孔子曰克伐怨欲不行焉可以爲難矣又曰君子矜而不爭羣而不黨徳裕克伐怨欲必行焉矜而爭羣而黨其能免乎唐宣宗皇帝大中四年夏六月戊申魏扶薨户部尚書崔龜從同平章事以新紀修秋八月周綝卒衙將張允伸自稱盧龍留後以通鑑修冬十月辛未兵部侍郎令狐綯同平章事通鑑解題曰按通鑑上臨朝接對羣臣如賔客雖左右近習未嘗見其有惰容每宰相奏事旁無一人立者威嚴不可仰視奏事畢忽怡然曰可以閑語矣因問閭閻細事或談宫中遊宴無所不至一刻許復整容曰卿輩善爲之朕常恐卿輩負朕日後不復得再相見乃起入宫令狐綯謂人曰吾十年秉政最承恩遇然每延英奏事未嘗不汗霑衣也范祖禹曰古者君臣交脩所以勤於徳也宣宗視輔相之臣體貎雖恭而心實防之如遇胥史惟恐其欺也拘之以利祿憚之以威嚴故所用多流俗之人而賢者不能有所設施白敏中令狐綯之徒崇極將相持寵保位二十餘年其相如此則其君之功烈亦可知矣十一月党項入冦以新紀修以張允伸爲節度使以通鑑修唐宣宗皇帝大中五年春三月白敏中爲司空招討党項行營兵馬都統制置使兼邠寜節度使以新紀通鑑修夏六月封子爲王以通鑑修秋八月党項平吕祖謙標目冬十月白敏中罷戊辰户部侍郎魏謩同平章事以新紀通鑑修沙洲人張義潮以瓜沙等十一州來歸十一月以爲歸義軍節度使以新舊紀修解題曰歸義軍節度使見開元二年隴右節度使解題崔龜從罷新紀唐宣宗皇帝大中六年春三月彗星出于觜參以新紀修秋八月甲子禮部尚書裴休同平章事以新紀修冬十一月封弟爲王以通鑑修十二月復禁私度僧尼朱熹綱目唐宣宗皇帝大中七年唐宣宗皇帝大中八年春正月丙戌朔日有食之以新紀修秋九月封子三人爲王以通鑑修冬十月詔雪王涯賈餗等以通鑑修唐宣宗皇帝大中九年春正月甲申王元逵卒其子成徳節度副使紹鼎自爲留後夏五月丙寅以爲節度使以新紀通鑑修秋七月丙辰崔鉉罷新紀浙東軍亂逐其觀察使李訥通鑑唐宣宗皇帝大中十年春正月丁巳御史大夫鄭朗爲工部尚書同平章事通鑑秋九月封子爲王以新紀修冬十月裴休罷以通鑑修十二月壬辰户部侍郎崔慎由爲工部尚書同平章事以新紀修唐宣宗皇帝大中十一年春二月辛巳魏謩罷以新紀修夏五月容管軍亂逐其經畧使王球以吕祖謙標目修六月立子二人爲王以通鑑修秋七月庚子兵部侍郎蕭鄴同平章事以新紀通鑑修王紹鼎卒其弟成德節度副大使紹懿自爲留後以新紀通鑑修九月彗星出於房以新紀修冬十月鄭朗罷以新紀修遣使迎軒轅集於羅浮山以通鑑修解題曰趙歸真既放矣而武宗復信之軒轅集既放矣而宣宗復迎之甚矣異端之易以惑人也事見通鑑十一月以王紹懿爲節度使以通鑑修唐宣宗皇帝大中十二年春正月以康王𫝊王式爲安南都䕶經畧使以通鑑修解題曰按方鎮表天寳十載置安南管内經畧使領交陸等十一州治交州乾元元年升爲節度使廣徳元年改爲大都䕶防禦觀察經畧使咸通七年升爲靜海軍節度使又地志列傳都䕶府本交趾郡經太平至甘棠州皆生獠也又至龍武州皆爨蠻安南境也又至曲江劔南地也又至晉寜驛戎州地也又至羊苴咩城南詔王所都也户部侍郎劉瑑同平章事以新紀修二月廢穆宗忌日停光陵朝拜新紀崔慎由罷以新紀修夏四月庚子嶺南軍亂逐其節度使楊發以新紀修戊申兵部侍郎夏侯孜同平章事以新紀修五月丙寅劉瑑薨以新紀修湖南軍亂逐其觀察使韓琮以吕祖謙標目修六月丙申江西將毛鶴逐其觀察使鄭憲以吕祖謙標目修安南都䕶李涿貪暴羣蠻爲邉患以通鑑考異修秋七月丁邜右補闕張潜論藩府奏羡餘南方數有不寕帝嘉納之以吕祖謙標目修八月大水以五行志修解題曰胡寅曰三川震而知周將亡岷山崩江水竭而知漢將亡龎勛亂徐土芝巢起山東唐自是亡則河南淮南大水而徐泗爲甚天之示戒明矣夫天理高明悠乆非如人喜怒報施之促狹也禍在十年之後則目前之異誠非淺丈夫之所經意於是置而不䘏至於國家敗壊則亦無如之何矣宣歙將康全泰逐其觀察使鄭薫冬十月全泰伏誅以新紀修十二月毛鶴伏誅新紀甲寅兵部侍郎蔣伸同平章事以新紀修唐宣宗皇帝大中十三年春三月武寕軍亂逐其節度使康季榮以通鑑修秋八月帝不豫以子䕫王滋屬内樞宻王歸長等左軍中尉王宗實立帝長子鄆王温爲太子更名漼癸巳帝崩於咸寜殿太子即皇帝位殺歸長等以通鑑修解題曰長安志咸寜殿在大眀宫竇苹音訓載盧氏雜説中官持其議至中書他相有異同者夏侯孜曰三十年前外大臣猶得預禁中大議三十年後禁中大議惟内大臣主之但得所立者爲李氏則外臣北靣而已又何問焉乃定所謂三十年前者立順宗憲宗之時也自立穆宗以來權皆在宦豎矣餘見通鑑胡寅曰立嗣天下至重事也必賢必長必嫡必豫必公然後禍亂不作宣宗反之其亂冝矣王宗實非能以正義奉長君葢素不爲上所厚事勢所激耳使王歸長等意屬鄆王安知其不以䕫王友愛而立之耶不可不辨也癸邜令狐綯爲司空尊皇太后爲太皇太后以新紀修九月追尊母爲皇太后新紀冬十一月戊午蕭鄴罷以新舊紀修十二月甲申兵部侍郎杜審權同平章事以新紀修丁酉令狐綯罷以新紀修解題曰按列傳統紀咸通三年綯子滈遷右拾遺詔下左拾遺劉蛻起居郎張雲交疏指其惡又劾綯大臣當調䕶國本而大中時乃引諫議大夫豆盧籍刑部侍郎李鄴等爲䕫王侍讀亂長㓜序使先帝貽厥之謀幾不及亟下陛下受天昭命羣臣定䇿宫禁之事則臣不知但欲冊䕫王便可知綯臣節綯之罷或者以此也荆南節度使白敏中爲司徒門下侍郎同平章事以新紀修解題曰按方鎮表至徳元載置䕫州防禦守捉使二載置荆南節度領荆澧朗郢復䕫峽忠萬歸州治荆州乾元䕫峽忠歸萬𨽻䕫州上元元年復領忠峽二年增涪衡潭岳郴邵道永連廣徳罷領忠涪衡潭邵永道𨽻湖南置䕫忠涪都防禦使永泰荆南罷領岳州大厯復領澧朗涪元和涪𨽻黔中大和廢節度置都團練觀察使開成復置光化罷爲武貞軍節度領澧朗淑天祐升䕫忠涪爲鎮江節度使是嵗南詔酋龍穪帝改元國號大禮以吕祖謙標目修唐懿宗皇帝咸通元年春正月浙東賊裘甫反以王式爲浙東觀察使討之以新紀修二月丙申葬貞陵廟號宣宗以通鑑修解題曰宋祁曰唐亡諸盗皆生於大中之朝太宗之遺徳餘澤去民也乆矣而賢臣斥死庸懦在位厚賦天下愁苦方是時也天将去唐諸盗並出厯五姓兵未嘗少解至宋然後天下復安漢之亡也天下大亂至晉然後稍定晉之亡也天下大亂至唐然後復安治少而亂多者古今之勢盛王業業以求治可少忽哉秋七月封憲宗子爲王以通鑑修夏四月右拾遺薛調論賦歛無度從之以吕祖謙標目修八月己邜裘甫伏誅以新紀修九月白敏中爲中書令以通鑑修冬十月丁亥追復李徳裕太子少保衛國公以通鑑修己亥夏侯孜罷户部尚書畢諴爲禮部尚書同平章事以新紀修十一月丁丑改元新紀解題曰宋庠紀年通譜宣宗製泰邉陲樂曲有海晏咸通之句及改元頗爲符協十二月戊申南詔䧟交趾吕祖謙標目修樞宻使始得與宰臣延英同奏事以通鑑修解題曰按韓偓金鑾宻記天復元年正月勅近宰臣延英奏事樞宻使侍側争論紛然既出又穪上㫖未􅁢復有改易撓權亂政自今並依大中舊制俟宰臣奏事畢方得升殿承受公事癸邜韓全誨等令上入閣召百官追寢勅書悉如咸通以來近例是日開延英全誨等即侍側同議政事唐懿宗皇帝咸通二年春二月白敏中罷左僕射杜悰兼門下侍郎同平章事以新紀年表修解題曰按新史列傳懿宗遣樞宻使楊慶詣中書獨揖悰他宰相畢諴杜審權蔣伸不敢進乃授悰中人請弟監國奏因諭悰劾大臣名不在者抵罪悰遽封授使者復命謂慶曰上踐祚未乆君等秉權以愛憎殺大臣禍無日矣慶色沮去帝怒亦釋大臣遂安通鑑云一日兩樞宻使詣中書宣徽使楊公慶繼至獨揖悰受宣三相起避之西軒公慶出斜封文書以授悰發之乃宣宗大漸時宦官請鄆王監國奏也且曰當時宰相無名者當以反法處之悰反復讀良乆曰聖上登極萬方欣戴今日此文書非臣下所宜窺復封以授公慶曰主上欲罪宰相當於延英靣示聖㫖明行誅譴公慶去悰復與兩樞宻坐謂曰内外之臣事猶一體宰相樞宻共叅國政今主上新踐阼未熟萬機資内外禆補固當以仁愛爲先刑殺爲後豈得遽賛成殺宰相事若主上習以性成則中尉樞宻權重禁闈豈得不自憂乎悰受恩六朝所望致君堯舜不欲朝廷以愛憎行法兩樞宻相顧黙然徐曰當具以公言白至尊非公重徳無人及此慙悚而退三相復來見悰㣲請宣意悰無言三相惶怖乞存家族悰曰勿爲他慮既而寂然無復宣命及開延英上色甚悦此多取之林恩補國史按杜審權以大中十三年十二月相畢諴以咸通元年十一月相當請命監國時二人未相也唐書誤載故吳縝糾其繆洪邁謂懿宗即位之日宰相令狐綯蕭鄴夏侯孜蔣伸三人已罷惟伸在耳諴及審權乃懿宗自用無由有斯事盖野史之誤通鑑新史誤采之今觀懿宗即位未㡬鄴等三人相繼罷逐伸明年亦去盖不能不以徃事爲念也帝雖不欲誅諴審權安知其無誅鄴等意乎又安知諴等以宣命獨下悰而不及他相故倉皇而請宣意乎杜悰之救諸人亦猶李徳裕之救楊嗣復李珏也安得謂無斯事通鑑所載大體甚詳但欠明指三相名氏爾夏六月復交趾以通鑑修唐懿宗皇帝咸通三年春正月戊寅上尊號以新紀修蔣伸罷以新紀修二月杜悰爲司空新紀以前湖南觀察使蔡襲爲安南經畧招討使以新紀修三月以左庻子蔡京充荆襄山南宣慰安撫使以吕祖謙標目修夏五月分嶺南爲東西道東道治廣州西道治邕州以舊紀修嶺南東道節度使蔡京請罷安南戍兵以吕祖謙標目修秋七月武寕軍亂逐其節度使温璋乙亥以王式代之以新紀修西川節度使夏侯孜爲左僕射門下侍郎同平章事以通鑑修八月王式誅驕兵三千人以舊紀修解題曰此龎勛之叛所以招之而不信也事見通鑑九月嶺南西道軍亂逐蔡京京㝷伏誅以吕祖謙標目修冬十月丙申封子三人爲王以新紀修杜悰爲司徒新紀十一月封叔祖及叔爲王以新舊紀修南詔冦安南以新紀修唐懿宗皇帝咸通四年春正月庚午南詔䧟安南蔡襲死之以新紀修三月張義潮克凉州以通鑑修夏四月畢諴罷新紀以義武節度使康承訓爲嶺南西道節度使以通鑑修五月兵部侍郎楊收同平章事以新紀修廢容管以通鑑修戊子杜審權罷新紀閏六月杜悰罷兵部侍郎曹確同平章事新紀秋七月辛邜朔日有食之以新紀修冬十二月乙酉昭義軍亂殺其節度使沈詢以新紀修唐懿宗皇帝咸通五年春正月南詔冦嶲州三月冦邕州以新紀脩夏四月兵部侍郎蕭寘同平章事以新紀修五月己亥彗星出于婁以新紀修秋七月康承訓罷復容管以驍衛將軍高駢爲安南都䕶以通鑑修八月夏侯孜爲司空冬十一月罷兵部侍郎路巖同平章事以新紀修唐懿宗皇帝咸通六年春正月始以懿安郭后配饗憲宗室以通鑑修三月蕭寘薨夏四月東川節度使高璩爲兵部侍郎同平章事六月璩薨御史大夫徐商爲兵部侍郎同平章事以新紀修秋七月封子爲王以新紀修冬十二月壬子太皇太后鄭氏崩通鑑唐懿宗皇帝咸通七年春三月王紹懿卒其兄子都知兵馬使景崇自穪成徳留後以新紀通鑑修閏月吐蕃冦邠寕新紀夏六月何𢎞敬卒其子左司馬全皥自穪魏博留後以新紀通鑑修高駢大破南詔於交趾以通鑑修冬十月楊收罷以新紀修高駢復交趾十一月以爲靜海節度使以吕祖謙標目修解題曰按新史列傳安南都䕶府爲靜海軍授駢節度使范祖禹曰戎狄自古爲中國患由秦以來未有得志於南蠻者也盖以瘴毒險阻不得天時地利所恃人和者而已而民從征役皆知必死則是三者皆亡矣明皇之末南詔盛强至于懿宗䧟安南圍成都中國首尾疲於奔命唐室之衰宦者蠧其内南詔擾其外財竭民困海内大亂而國以亡矣事見通鑑十二月以王景崇爲節度使以通鑑修吐蕃衰絶吕祖謙標目唐懿宗皇帝咸通八年春正月以何全皥爲節度使以通鑑修二月張義潮入朝命其族子惟深守歸義以通鑑修秋七月懐州民亂逐其刺史劉仁規以通鑑修甲子兵部侍郎于琮同平章事以新紀修大事記續編卷六十七
