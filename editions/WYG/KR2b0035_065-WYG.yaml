body:
  text: 大事記續編卷六十五明王禕撰唐文宗皇帝太和元年春二月乙巳改元以新舊紀修三月壬戌􅃋王守澄爲右神䇿中尉以舊紀修夏五月戊辰罷宰臣奏事監搜新紀丙子以李同捷爲兖海節度使以舊紀年表修六月癸巳淮南節度使王播爲左僕射同平章事兼鹽鐡轉運使以新舊紀修秋七月癸酉𦵏莊陵廟號敬宗以通鑑修解題曰胡寅曰敬宗免崔發之死聴韋處厚而悟李紳宣慰李渤而擢劉栖楚納李程而罷營殿賞㳺宴之諫而賜錦綵聞瑶臺之諷而宥李漢覽夫丁之奏而禁度僧受丹扆之箴而優荅詔從北門之奏而寛量移用張仲方之説而减船費沮逢吉所引而伸李絳采言者所陳而禮裴度知洛宫荒廢而罷東行凡此十餘條方之徳宗豈不優哉其惡在於狎暱羣小好戱逰妄賜予而已然裴度無能改於其徳使至於遇弑何也曰帝之習爲不義其日已乆度固忠賢若伊尹告祖甲之道當有所不及况在位日淺耶李同捷不受命八月庚子發諸道兵討之以通鑑修唐文宗皇帝太和二年春三月辛巳親䇿制舉昌平劉蕡對䇿以極言宦官黜以吕祖謙標目修解題曰按新舊史列傳及唐文粹蕡對䇿其畧曰春秋元者氣之始也春者嵗之始也春秋以元加於嵗以春加於王明王者當奉若天道以謹其始也又舉時以終嵗舉月以終時春秋雖無事必書首月以存時明王者當奉若天道以謹其終也王者動作終始必法於天者以其運行不息也臣聞不宜憂而憂者國必衰宜憂而不憂者國必危陛下宜先憂者宫闈將變社稷將危天下將傾海内將亂此四者國家已然之兆故臣謂聖慮冝先及之春秋人君之道在體元以居正繼故必書即位所以正其始也終必書所終之地所以正其終也春秋閽弑吳子餘祭不書其君春秋譏其踈賢士昵刑人有不君之道陛下發正言履正道居正位近正人逺刀鋸之賤親骨鯁之直輔相得以専其任庻職得以守其官奈何以褻近五六人總天下大政外専陛下之命内竊陛下之權羣臣莫敢指其狀天子不得制其心禍稔蕭墻奸生帷幄臣恐曹節侯覽復生於今日此宫闈将變也春秋定公元年春王不言正月者春秋以爲先君不得正其終則後君不得正其始故曰定無正也今忠賢無腹心之寄閽寺専廢立之權䧟先帝不得正其終致陛下不得正其始皇儲未建郊祀未修此社稷將危也春秋王子札殺邵伯毛伯兩下相殺不書書者重其專王命也天之所授者在君君之所授者在命操其命而失之是不君也侵其命而專之是不臣也君不君臣不臣此天下所以將傾也春秋趙鞅以晉陽之兵叛入于晉書其歸者以其能逐君側之惡人以安其君故春秋善之今威柄陵夷藩臣跋扈或有不逹人臣之節首亂者以安君爲名不究春秋之微穪兵者以逐惡爲義則典刑不由天子征伐必自諸侯此海内之將亂也春秋晉狐射姑殺陽處父書㐮公殺之者以其君漏言也㐮公不能固隂重之機處父所以及殘賊之禍夫上漏其情則下不敢盡意上泄其事則下不敢盡言今公卿大臣非不欲爲陛下言之慮陛下不能用也陛下既忽而不用必泄其言臣下既言而不行必嬰其禍是以裴囘鬱塞以須陛下感悟然後盡其啓沃陛下何不聴朝之餘時御便殿召當世賢相老臣訪持變扶危之謀求定傾捄亂之術塞隂邪之路屏褻狎之臣制侵陵迫脅之心復門户掃除之役戒其所宜戒憂其所宜憂既不得治其前當治於後既不得正其始當正其終矣昔秦之亡也失於强暴漢之亡也失於微弱强暴則賊臣畏死而害上微弱則奸臣竊權而震主伏見敬宗皇帝不虞亡秦之禍不剪其萌伏惟陛下深軫亡漢之憂以杜其漸今海内困窮處處流散饑者不得食寒者不得衣鰥寡孤獨者不得存老㓜疾病者不得養加以國之權柄專在左右貪臣聚歛以固寵奸吏因縁而㺯法寃痛之聲上達九天下流九泉鬼神怨怒隂陽愆錯君門萬里而不得告訴士人無所歸化百姓無所歸命官亂人貧盗賊並起土崩之勢憂在旦夕昔漢元帝即位之初更制七十餘事其心甚誠其穪甚美然而紀綱日紊國祚日衰奸宄日强黎元日困者以其不能擇賢明而任之失其操柄也陛下誠能揭國權以歸其相持兵柄以歸其將去貪臣聚歛之政除奸吏因縁之害唯忠賢是近惟正直是用内寵便僻無所聽焉選清慎之官擇仁恵之長敏之以利煦之以和教之以孝慈𨗳之以徳義去耳目之塞通上下之情俾萬國歡康兆民蘇息則心無不達行無不孚矣法冝畫一官宜正名今分外官中官之能立南司北司之局或犯禁于南則亡命于北或正刑于外則破律于中法出多門人無所措實由兵農勢異而中外法殊也今夏官不知兵籍止于奉朝請六軍不主兵事止於養勲階軍容合中官之政戎律附内臣之職首一戴武弁疾文吏如仇讎足一蹈軍門視農夫如草芥謀不足以剪除兇逆而詐足以抑揚威福勇不足以鎮衛社稷而暴足以侵軼里閭羈絏藩臣干陵宰輔隳裂王度汩亂朝經張武夫之威上以制君父假天子之命下以御英豪有藏奸觀釁之心無伏節死難之義豈先王經文緯武之㫖邪是時第䇿官左散騎常侍馮宿太常少卿賈餗庫部郎中龎嚴見蕡對嗟伏以爲過古晁董而畏中官眦睚不敢取士人讀其辭至感槩流涕諫官御史交章論其直於時被選者二十有三人所言皆冗齪常務類得優調河南府叅軍事李郃曰蕡逐我留吾顔其厚邪乃上䟽曰蕡所對敢空臆盡言又引春秋爲據漢魏以來無與蕡比有司以言渉訐忤不敢聞自詔書下萬口籍籍誠恐忠良道窮綱紀遂絶况臣所對不及蕡逺甚乞囘臣所授以旌蕡直帝不納始帝恭儉求治志除兇人然懦而不睿臣下畏禍不敢言故蕡對極陳晉㐮公殺陽處父以戒帝又引閽殺吳子隂賛帝决帝後與宋申錫謀誅王守澄不克守澄廢帝弟漳王而斥申錫帝依違其間不敢主也賈餗王涯李訓舒元輿位宰相以謀敗皆爲中官夷其宗而宦者益横帝遂以憂崩秋七月甲辰彗星出于右攝提以新紀修八月己巳王庭湊反九月甲午發隣道兵討之以舊紀通鑑修冬十月癸酉竇易直罷以新舊紀修十二月乙丑魏􅀶行營兵作亂以朱熹綱目修壬申韋處厚薨戊寅兵部侍郎路隋爲中書侍郎同平章事以新舊紀修唐文宗皇帝太和三年春正月丁亥平魏博亂兵以新紀修三月義武兵馬使張璠自穪節度使詔從之以新紀修夏四月戊辰滄景節度使李祐克徳州李同捷伏誅以吕祖謙標目修六月甲戌魏博軍亂殺史憲誠兵馬使何進滔自穪留後秋八月辛亥割相衛澶三州𨽻相衛節度不受命壬子以進滔爲節度使以新紀修壬申赦王庭湊新紀甲戌吏部侍郎李宗閔同平章事以新紀修解題曰宗閔僧孺之黨也按韓愈猛虎行贈李宗閔注云宗閔初爲裴度所引後度薦徳裕相宗閔遂怨九月辛巳命宦官毋得衣紗縠綾羅以通鑑修冬十一月禁獻竒巧纎麗布帛以通鑑修南詔䧟嶲卭二州十二月南詔冦成都梓州以新舊紀修唐文宗皇帝太和四年春正月戊子封子永爲王以通鑑修辛邜武昌節度使牛僧孺爲兵部尚書同平章事以新舊紀修解題曰僧孺宗閔所薦也按方鎮表乾元元置鄂岳沔都團練使治鄂州上元岳𨽻荆南永㤗陞爲觀察使增領岳蘄黄大厯年罷建中置貞元十五年置安黄節度觀察使治安州十九年賜號奉義軍元和元年罷陞觀察使爲武昌節度領安黄五年罷置鄂岳都團練觀察使十三年增領申州寳厯省沔州大中元年復節度使二年罷四年復六年罷文徳復置甲午王播薨新紀二月乙邜山南西道軍亂害節度使李絳三月己邜節度使温造平之以新舊紀修解題曰按裴度撰絳神道碑益部爲蠻㓂掠有詔發兵赴救既行而賊去不逺而軍迴監軍楊叔元者憚公守正不可寄私因是遣間者迎勞迴軍言公將收責所募之帛令占著田畞瓦合之衆信然遂相驚譟疾入爲亂部校請公且避兇鋒之逼由他門止近縣彼無宿惡偶爲所嗾少頃自定當可行公嶷然不受遂握節登城以至薨落新史取以傳絳實録則云絳召諸卒以詔書諭而遣之發廪麥以賞衆皆怏怏而退出壘門有請辭監軍者而監軍使楊叔元貪財怙寵素與絳隙至是因以賞薄激之散卒遂作亂似不如新史之有據夏六月丁未以裴度爲司徒平章軍國重事新舊紀修秋七月癸未尚書右丞宋申錫同平章事以新舊紀修九月壬午裴度罷新紀唐文宗皇帝太和五年春正月庚申幽州盧龍軍亂逐李載義兵馬使楊志誠自穪留後以新舊紀修三月庚子宋申錫罷癸邜降漳王湊爲縣公貶申錫開州司馬以吕祖謙標目修夏四月己丑以楊志誠爲節度使以舊紀修秋九月吐蕃維州降西川節度使李徳裕據之牛僧孺請勿受以吕祖謙標目修解題曰朱熹曰司馬光以徳裕所言爲利僧孺所言爲義徳裕以利害言雖若爲利然意却在爲國僧孺所言雖義然却在濟其己私且德裕既受其降矣雖義有未安亦須爲之區處乃縳送悉怛謀使得甘心焉果何爲也事見通鑑維即威州上元後䧟吐蕃韋臯在蜀二十年不能復至是降而不受至大中末首領始内附唐文宗皇帝太和六年春正月壬子上尊號不受以通鑑修三月囘鶻可汗爲其下所殺從子胡特勒立以通鑑修夏六月戊寅右僕射王涯條流士庻衣服車馬第舍之制事竞不行以舊紀修解題曰按舊紀敕下後浮議沸騰杜悰於勅内條件易施行者寛其限事竟不行公議惜之明年冊皇太子永降詔皇太子方從師傅授六經一二年後當令齒胄國庠以興墜典宜令國子選名儒置五經博士各一人其公卿士族子弟明年已後不先入國學習業不在應明經進士限其進士舉宜先試帖經并畧問大義取經義精通者放及第卿大夫者下人之所視逺方之所傚若非恭儉克己廉貞任人而望其服從固不可得况朕不寳珠玉不御纎華逮于六宫皆務儉薄卿大夫得不叶朕此志率先兆人比年所頒制度皆約國家令式去其甚者稍謂得中而士大夫茍自便身安於習俗因循未革以至于今百官士族起今年十月其衣服輿馬並宜凖太和六年十月七日勅如有故違重加黜責胡寅曰文宗清約儉素終始不變其可與爲善無疑矣而旦夕承弼之人無伊傅周召之業遂使其君有祖甲成王之質而懐周赧漢獻之憤聖學不傳豈細故哉冬十月甲子立魯王永爲皇太子新紀十二月乙丑牛僧孺罷新紀乙亥劉從諫入朝以通鑑修唐文宗皇帝太和七年春正月甲午劉從諫同平章事遣歸鎮以通鑑修二月丙戌兵部尚書李徳裕同平章事以新舊紀修解題曰僧孺罷則徳裕相矣夏四月丙戌冊囘鶻彰信可汗以舊紀修六月乙亥李宗閔罷新紀解題曰徳裕相則宗閔罷矣秋七月壬寅王涯同平章事兼度支鹽鐡轉運使以通鑑修八月庚寅詔諸王出閤進士停詩賦㝷復不行以舊紀通鑑修唐文宗皇帝太和八年春二月壬午朔日有食之舊紀秋九月辛亥彗星出于太微以新紀修冬十月辛巳盧龍兵馬使史元忠逐楊志誠自爲留後以通鑑修庚寅山南西道節度使李宗閔爲中書侍郎同平章事甲午李徳裕罷以新紀修解題曰宗閔相則徳裕罷矣以國子四門助教李訓爲國子博士翰林侍講學士以舊紀修十一月癸丑王庭湊卒其子都知兵馬使元逵自穪成徳留後以新舊紀修丁邜流楊志誠於嶺南尋伏誅以通鑑修唐文宗皇帝太和九年春正月乙邜以王元逵爲節度使以舊紀修癸亥巢公湊薨以新舊紀修三月丙辰以史元忠爲節度使以舊紀修夏四月癸巳以昭義節度副使鄭注爲太僕卿兼御史大夫以通鑑修丙申路隋罷以新紀修戊戌浙西觀察使賈餗爲中書侍郎同平章事以舊紀修庚子貶太子賔客李徳裕爲袁州長史以舊紀修五月乙丑以領軍將仇士良爲左神䇿中尉以舊紀修辛未王涯爲司空新紀六月壬寅貶李宗閔爲明州刺史新紀秋七月辛亥御史大夫李固言爲門下侍郎同平章事以新舊紀修甲子以李訓爲兵部郎中知制誥八月丁丑鄭注爲兵部尚書翰林侍講學士訓注所惡朝士皆以李宗閔徳裕之黨逐之九月癸邜􅃋下詔人情稍安以舊紀通鑑修王涯增茶稅以通鑑修解題曰按新舊史志初徳宗納趙賛議税天下茶漆竹木十取一以爲常平本錢及出奉天乃罷之貞元九年張滂奏立稅茶法嵗得錢四十萬緍然水旱亦未嘗拯之也穆宗即位鹽鐵使王播增天下茶稅率百錢增五十其後王涯判二使置搉茶使徙民茶樹於官場焚其舊積者天下大怨太和九年令狐楚兼𣙜茶使復令納𣙜加價而已李石爲相以茶税皆歸鹽鐵復貞元之制大中初鹽鐵轉運使裴休立税茶之法十二條增倍貞元癸亥陳𢎞志伏誅以新舊紀修解題曰歐陽脩曰春秋之法君弑而賊不討則深責其國以爲無臣子也憲宗之弑厯三世而賊猶在至於文宗不能明𢎞志等罪惡以正國之典刑僅能殺之而已是可歎也穆敬昏童失徳以其在位不乆故天下未至於敗亂而敬宗卒及其身是豈有討賊之志哉事見通鑑丁邜李固言罷新紀以鄭注爲鳯翔節度使以舊紀通鑑修己巳御史中丞舒元輿爲刑部侍郎兵部郎中李訓爲禮部侍郎同平章事以新紀修冬十月辛巳左右神䇿觀軍容使王守澄伏誅以吕謙標目修解題曰文宗之誅王守澄也必先解其樞宻使以爲神䇿觀軍容使而後天討可得而加武宗之於仇士良也亦然神䇿中尉既爲觀軍容使則請老而罷矣不然固未可以直致也事見通鑑十一月壬戌李訓舒元輿等伏兵誅宦官不克右僕射鄭覃權知户部侍郎李石同平章事仇士良殺王涯賈餗舒元輿李訓河東節度使王璠邠寧節度使郭行餘御史中丞李孝本及鄭注等十一族自是天下事皆决於北司宰相行文書而已以新舊史紀傳稽古錄修解題曰按新舊史列傳甘露之事王涯等倉惶歩至永昌里茶肆爲禁兵所擒并其家屬皆繫於獄仇士良鞠涯反状涯實不知謀榜笞不勝其酷乃令手書反状自誣與訓同謀羣臣朝至建福門大明宫南靣五門丹鳯門之西從者不得入光範門在含元殿之西尚閉乃繇金吾右仗至宣政衙兵皆露持是時無宰相御史中丞羣臣不能班帝初未知涯等被繋猶遲其不朝既而士良白涯與訓謀逆將立鄭注遽召僕射令狐楚鄭覃等至帝對悲憤因付涯訊牒曰果涯書邪楚曰然涯誠有謀罪應死然外有三司御史不則大臣雜治内仗非宰相繋所也帝頷之既草詔以王涯賈餗寃指其罪不切士良等怨之始帝許相楚乃不果更用李石餘見通鑑李徳裕窮愁志自古天下有常勢不可變也五王之誅二張召大將軍李多祚受命定䇿元載之圖魚朝恩以崔昭尹神州與北門大將軍王駕鶴等結歡而朝恩敗夫舉大事非北軍無以成功李訓因守澄得幸雖職在近宻而日夕遊於禁軍挾守澄之勢與天子契於魚水北軍諸將望其顧盻與目覩天顔無異若以中㫖喻之購以爵賞即諸將風靡矣捨此不用而欲以神州憲臺遊徼摶撃之吏抱關擁篲之徒以當精甲利兵頼中人覺其變未及禍亂使訓計盡行所誅者不過數十人其徒尚數百人與北軍協力報怨則天下横流矣昔竇武以五校士屯都亭下中人矯詔令張奐率五營士與武對陣大呼曰武反汝皆禁兵何故隨反者由是知禁軍唯伏中人宰相焉得使其效死乎按大和摧兇記所族者鄭注王涯賈餗舒元輿李訓王播郭行餘李孝本羅立言韓約李貞素魏逢十二家外此又有顧師邕錢可復盧簡能蕭傑盧𢎞茂皆誅死故天復洗雪者十七家十二月罷榷茶以吕祖謙標目修唐文宗皇帝開成元年春正月辛丑朔日有食之舊紀改元新紀三月劉從諫三上疏請王涯等罪名仇士良等沮恐天下差以自强以舊紀新史列傳修夏四月甲午山南西道節度使李固言爲門下侍郎同平章事以新舊紀修秋九月庚辰復宋申錫官爵以舊紀通鑑修唐文宗皇帝開成二年春二月丙午彗星出東方以舊紀通鑑修夏四月戊戌工部侍郎陳夷行同平章事以新舊紀修六月丙午河陽軍亂逐其節度使李泳以新紀修秋八月立兄子四人子一人爲王以通鑑修冬十月國子監石經成通鑑戊申李固言罷新紀唐文宗皇帝開成三年春正月甲子盗傷李石新紀戊辰户部尚書楊嗣復户部侍郎李珏同平章事以新舊紀吳鎮糾繆修解題曰嗣復珏黨於僧孺者也按新舊史列傳嗣復輔政與宗閔善欲復用而畏鄭覃乃託宦人諷帝帝因紫宸對曰宗閔乆斥應授一官覃曰陛下徙令少近則可若再用臣請先退陳夷行曰宗閔之罪不即死爲幸寳厯時李續張又新等朋比姦險㡬傾朝廷李珏曰此李逢吉罪夷行曰朝廷何惜數纎人使亂紀綱嗣復曰事貴得中不可但徇憎愛帝曰與一郡可也覃請授洪州别駕夷行曰宗閔養成鄭注之惡幾覆邦家嗣復曰陛下向欲官鄭注宗閔不奉詔覃曰嗣復黨宗閔臣觀宗閔之惡甚於李林甫嗣復曰覃語太過林甫妒賢害能破人家族宗閔固無之始宗閔與徳裕俱得罪徳裕再徙鎮而宗閔故在貶地夫懲勸宜一不可謂黨翌日以宗閔爲杭州刺史丙子李石罷新紀冬十月乙酉張璠卒其子元益自穪義武留後以新紀修殺太子永以吕祖謙標目修解題曰漳王之死帝既悔之矣永之死帝又悔之悔其可數乎事見通鑑李徳裕窮愁志東宫爲人所搆天子大怒召宰臣公卿議於内殿徃復移時昔千秋上書武帝一言而寝葢以簡而當理魏太祖嘗謂諸子曰吾必不用左右之言以治汝曹何者使左右君子也必不離人父子之間小人也言必不可用其時無人以此言寤主因問太子之過得於何人言之者與太子恩愛厚薄何如文宗必悟太子必安矣惜哉不聞是言也乙巳彗星出于軫以新紀修十二月詔裴度入知政事以通鑑修是嵗吐蕃賛普逹磨立荒滛殘虐災異相繼其國益衰以吕祖謙標目修唐文宗皇帝開成四年春正月癸酉彗星出于羽林閏正月丙午出于卷舌以新紀修三月丙寅晉文忠公裴度薨以舊紀通鑑修解題曰宋祁賛曰憲宗討蔡出入四年元濟外連姦臣沮駭朝謀惟天子赫然排羣議任度政事倚以破賊身督戰遂平淮西非度破賊之難任度之爲難也韓愈頌其功曰凡此蔡功惟斷乃成其知言哉穆敬不君憸人腐夫乗釁鐫詆而度遂無顯功非前智後愚用不用勢當然矣前史穪度晚節頗沉浮爲自安計是不然大雅曰既明且哲以保其身度何訿云夏五月丙申鄭覃陳夷行罷以新紀修秋七月甲辰太常卿崔鄲同平章事以新紀修冬十月丙寅立兄子陳王成美爲皇太子以吕祖謙標目修是嵗囘鶻弑彰信可汗廅馺特勒立㑹疾疫大雪羊馬多死其國遂衰以通鑑修大事記續編卷六十五
