body:
  text: 大事記續編卷四十四明王禕撰陳高祖武皇帝陳霸先永定元年周孝明皇帝宇文毓元年後梁中宗皇帝大定三年齊文宣皇帝天保八年春正月辛丑魏周公覺自稱天王廢其主為宋公柱國宇文䕶為大司馬以吕祖謙標目修二月庚午梁蕭勃及前郢州刺史歐陽頠反遣將軍周文育討之以吕祖謙標目修丁亥周宇文䕶殺大冢宰趙貴免太保獨孤信以吕祖謙標目修癸巳梁周文育擒歐陽頠蕭勃尋伏誅以吕祖謙標目修周宇文䕶弑宋公諡曰恭皇帝以吕祖謙標目修三月甲辰梁以司空王琳為湘郢二州刺史以吕祖謙標目修己酉周宇文䕶殺柱國獨孤信以周紀修夏四月己卯梁鑄四柱錢丙申禁細錢以本紀修解題曰洪遵泉志四柱錢面文上下有四柱左右有五銖二字齊斛律金為右丞相尚書令常山王演為司空録尚書事長廣王湛為尚書令以通鑑修梁以歐陽頠為衡州刺史平嶺南以吕祖謙標目修五月梁王琳將攻陳霸先六月戊寅遣開府侯安都及周文育討之以吕祖謙標目修秋八月丁卯周歸故梁主繹之柩於王琳以通鑑修甲午梁陳霸先自為太傅加黄鉞殊禮九月辛丑自為相國封陳公備九錫以本紀及吕祖謙標目修周宇文䕶廢其主覺為洛陽公迎立岐州刺史寜都公毓甲子即天王位殺柱國大將軍李逺以吕祖謙標目修解題曰按周史列傳晉公䕶廢愍帝召羣臣議之户部中大夫薛端頗有同異䕶不悦出為蔡州刺史餘見通鑑冬十月戊辰陳公霸先自進王爵己亥即皇帝位改元廢梁主為江陰王以吕祖謙標目修解題曰詔曰禮陳杞宋詩詠二客弗臣之重厯代所敦其奉梁主為江陰王餘見通鑑吕祖謙曰振鷺之詩曰振鷺于飛于彼西雝我客戾止亦有斯容味其辭意其是二王之後來儀止可觀初不見有可疑可疾者又曰在彼無惡在此無斁庶幾夙夜以永終譽蓋聖人動皆天理奉行天討是以無惡無斁庶幾終譽念念不忘後世如魏晉南北朝疑忌前代之子孫視之若蛇虺虎狼然必欲戕殺剪截俾無遺育此皆小見淺慮汨以私慾而不能動之以天故耳周弑畧陽公以通鑑修陳以給事黃門侍郎蔡景厯為秘書監兼中書通事舍人政事皆由中書省置二十一局以當尚書諸曹以吕祖謙標目修解題曰通典魏晉重中書之官居喉舌之任則尚書之職稍以疎逺至梁陳舉國機要悉在中書獻納之任又歸門下尚書但聽命受事而已事見通鑑庚辰陳主設無遮大㑹親膜拜以通鑑修解題曰膜拜出穆天子傳如今之禮拜一曰胡禮拜也辛巳陳主追尊考妣為帝后立夫人章氏為皇后以本紀修梁王琳大敗侯安都周文育擒之琳屯郢城遣將據江州以吕祖謙標目修是歲齊於長城内築重城以齊紀修陳高祖武皇帝永定二年周孝明皇帝二年後梁中宗皇帝大定四年齊文宣皇帝天保九年春正月梁王琳屯白水浦乞師於齊以通鑑修解題曰今江州東有白水港陳以歐陽頠都督交廣等州軍事廣州刺史以吕祖謙標目修周宇文䕶自為太師以周紀修二月齊北豫州刺史司馬消難奔周以通鑑修齊納梁永嘉王莊於王琳琳奉莊即梁帝位改元天啓以吕祖謙標目修解題曰齊之納蕭莊也猶淵明之故也僧辯死而淵明卒王琳敗而莊逃矣事見通鑑宋庠紀年通譜天啓本元法僧年號夏四月乙丑陳弑江陰王追諡曰敬皇帝以吕祖謙標目修五月辛丑齊長廣王湛録尚書事甲辰以前左僕射楊愔為尚書令以齊紀修六月乙丑齊主北巡立大都督府與尚書省分治衆務以吕祖謙標目修秋八月侯安都周文育復歸于陳以通鑑修梁王琳還湘州以通鑑修冬十一月齊減禄廩以吕祖謙標目修十二月齊殺永安王浚上黨王渙以齊紀修後梁取長沙武陵南平郡以吕祖謙標目修解題曰按隋地理志澧陽郡孱陵縣舊置南平郡陳高祖武皇帝永定三年周孝明皇帝武成元年後梁中宗皇帝大定五年齊文宣皇帝天保十年春正月己酉周宇文䕶歸政以周紀修周改都督軍事為總管以吕祖謙標目修解題曰通典有大都督都督隋並以為散官煬帝改大都督為校尉帥都督為旅帥都督為隊正則都督之名微矣夏閏四月戊子周更定新厯以周紀通鑑修齊殺右僕射高德政以吕祖謙標目修五月丙辰朔日有食之以陳紀及通鑑目録修齊主殺元氏七百餘人以北齊紀修陳豫章内史熊曇朗殺周文育于軍以本紀修六月丙午陳主殂召臨川王蒨於南皖甲寅即皇帝位秋七月丙辰尊皇后為皇太后辛酉以司空侯瑱為太尉侯安都為司空以陳紀修解題曰胡寅曰陳高祖雖享國日淺其過舉亦少所可恨者無宰相也自古聖人為天下亦必求賢為輔相以助己宰相又廣求人材布之内外然後治道可立豈可役其耳目運其心思以當萬幾之衆獨委共事五六武夫而能開物成務者哉豈世衰道微無名世之士可為時用耶抑高祖不知古今不能求而致之也八月周稱皇帝改元以吕祖謙標目修九月辛酉陳立子伯宗為太子乙亥立妃沈氏為皇后以陳紀吕祖謙標目修冬十月甲午齊主殂于晉陽太子殷即皇帝位以吕祖謙標目修解題曰王通曰甚矣齊文宣之虐也姚義曰何以克終子曰有陽遵彦者實掌國命視民如傷奚為不終梁王琳屯濡須口齊師援之十一月陳遣侯瑱侯安都禦之以陳紀修齊以斛律金為左丞相常山王演為太傅長廣王湛為太尉以通鑑修陳世祖文皇帝陳蒨天嘉元年周孝明皇帝武成二年後梁中宗皇帝大定六年建元年齊肅宗孝昭皇帝高演皇春正月癸丑朔陳改元以陳紀修齊改元乾明以齊紀修二月丙申陳侯瑱敗梁王琳于梁山敗齊兵于博望琳及其主皆奔齊以吕祖謙標目及本紀修解題曰博望在太平當塗縣顧野王輿地志云博望梁山東西隔江相對如門己亥齊常山王演為太師録尚書事長廣王湛為大司馬并省録尚書事以齊紀修乙巳陳以侯瑱都督湘巴等州軍事鎮湓城本紀齊常山王演殺楊愔等以中書令趙彦深總機務戊申演自為大丞相都督中外諸軍録尚書事長廣王湛為太傅京畿大都督以齊紀修周襲梁郢州弗克三月郢州降陳以通鑑陳紀修陳江州刺史周迪攻熊曇朗殺之以吕祖謙標目修陳高祖世子昌自周來歸丙子殺之江中以吕祖謙標目修陳聘周以通鑑修夏四月辛丑周宇文䕶弑其主壬寅魯公邕即皇帝位以周紀修六月壬辰陳葬梁元帝于江寧以本紀修八月壬午齊常山王演廢其主為濟南王自即皇帝位於晉陽改元戊子以長廣王湛為右丞相以齊紀修九月周將賀若敦獨孤盛攻陳冬十月侯瑱襲敗盛於楊葉州以本紀修解題曰曹大宗郡國志楊葉州在岳州巴陵縣今在潭州湘陰縣十一月辛亥齊主立妃元氏為皇后子百年為太子以齊紀修十二月己亥陳取周巴陵獨孤盛遁以吕祖謙標目修齊屯田以吕祖謙標目修陳世祖文皇帝天嘉二年定元年周高祖武皇帝宇文邕保後梁中宗皇帝大定七年元年齊世祖武成帝高湛大寜春正月戊申周改元大冢宰宇文䕶自為都督中外軍事以周紀修解題曰紀年通譜保定其取詩天保定爾之義乎辛未陳取周湘州以陳紀通鑑修賀若敦遁陳取周武陵天門南平義陽等郡以通鑑修解題曰按隋志澧陽郡安鄉縣舊義陽郡二月周以小司徒韋孝寛為勳州刺史守玉璧以吕祖謙標目修解題曰按通典河南自洛陽之東之北河東自平陽之界屬齊全盛戰爭之際則玉璧邵郡齊子嶺魏地理志邵郡屬東雍州領縣四萇平有王屋山王屋縣注古召公之邑東二十里齊子嶺周齊交境處通典邵郡今絳州恒縣通洛防故函關城在新安縣東黃櫨三城洛州永寧縣西北通典後周黃櫨同軌永昌三城以備齊宜陽郡陜州土剗長水郡西北二十五里三荆三鵶鎮汝州魯山縣西南平高城通典鄧州向城縣北百重山即第一又北分嶺山北即第二第三入魯山縣界置兵以備東軍三月丙寅周改八丁兵為十二丁兵以周紀修解題曰薛季宣曰劉曜河上之役戎卒二十八萬五千自以為畏威而來居三之二其調民可見石虎五丁取三四丁取二凡士五人車一乗牛一頭米各十五斛絹十匹又括民馬四萬餘匹百姓窮窘鬻妻子以供軍須蓋合鄴中兵常五十餘萬州郡造甲者稱是船夫十有七萬不與焉慕容氏精覈隱漏户畱一丁欲滿一百五十萬雖以劉貴極諫復用三五後燕畧有齊岱步兵七十餘萬車一萬七千乗鐵騎五萬三千大抵諸胡之兵空國而作敗亡之禍特不相逺王猛用秦而十丁一兵之制猶見於身後宇文泰造周其子猶能改八丁兵為十二丁兵民庶幾其有瘳乎夏四月丙子朔日有食之以周紀修六月乙酉周聘陳以周紀修秋七月周更鑄當五錢與五銖並行以周紀修九月齊弑濟南王以朱熹綱目修冬十月甲戌朔日有食之以周紀修十一月甲辰齊主殂長廣王湛至自鄴癸丑即皇帝位改元以吕祖謙標目修周聘陳陳報之以通鑑修齊主廢太子百年為樂陵王以齊紀修十二月陳賦鹽榷酤以吕祖謙標目修解題曰葉適曰梁陳之間窮匱極矣至此方斂及鹽酒是公家尚有遺利未取不如後世雖無事之時已竭而無繼也事見通鑑陳遣侯安都討縉州刺史畱異于東陽以本紀修解題曰縉州今處州之縉雲縣陳世祖文皇帝天嘉三年周武皇帝保定二年後梁世宗皇帝蕭巋天保元年齊武成帝河清元年春二月乙亥齊主至鄴丙戌立妃胡氏為皇后子緯為太子丁未以領軍大將軍平秦王歸彦為太宰冀州刺史以齊紀修解題曰按長厯齊置閏於徃年十二月故正月辛未朔周置閏於今年正月陳置閏於今年二月故二月辛未朔乙亥本齊正月若因其本紀舊文則厯法龎雜姑從陳正改作二月閏二月齊以參軍和士開為侍中以吕祖謙標目及列傳修解題曰士開説世祖云自古帝王盡為灰燼堯舜桀紂竟復何異陛下宜及少壯恣意作樂縱橫行之即是一日快活敵十年國事分付大臣何慮不辦無為自勤苦也世祖大悦餘見通鑑葉適曰李斯趙高用此詐二世與士開智愚有異其詞意皆不約而同也齊始聘陳以通鑑修甲子陳改鑄五銖錢以陳紀修後梁主殂太子巋即位改元以吕祖謙標目修三月丙子陳安成王頊自周來歸以本紀通鑑修陳詔周迪鎮湓城不至丁丑遣將討之以本紀修陳畱異敗奔閩州刺史陳寶應以吕祖謙標目修夏四月辛丑齊皇太后殂以通鑑修齊改元以齊紀修秋七月齊冀州刺史平秦王歸彦反伏誅以吕祖謙標目修陳聘齊以通鑑修九月戊辰朔日有食之以周紀修冬十月戊戌陳詔減省用度以通鑑修陳世祖文皇帝天嘉四年周武皇帝保定三年後梁世宗皇帝天保二年齊武成帝河清二年春正月甲申陳周迪衆潰奔陳寶應以吕祖謙標目修二月庚子周頒大律以周紀修解題曰朱黼曰周齊繼魏之後以暴虐為常今年周頒律曰杖鞕徒流殺凡五則自輕而之重明年齊頒律曰死流徒鞭杖亦五則自重而之輕度其討論固未嘗不稽之書禮也朴作敎刑庠序之用也鞭作官刑施之胥吏也五刑有服五服三就五流有宅五宅三居其重輕逺近之差如此周條狼所掌有屋殺轘鞭墨屋刑者或以為三夫之誅鄭𤣥曰此罄于甸人之事是矣車轘之説以為車裂秦用之梟首秦法漢用孰謂周人忍開其端哉師旅之誓詳于魯費御右之不供命嚴于夏甘今誓車右以殺誓御以車轘何也刑不上大夫太史掌邦之典册而竟殺之至小史則墨高下隆殺俱不可考是豈周公成王之法哉今周齊死刑有罄有轘有梟蓋取諸此是殆未深考古之過也事見通鑑三月乙丑朔日有食之以周紀修齊築軹關城以齊紀修夏四月周主養老於太學以周紀修六月陳殺司空侯安都以吕祖謙標目修秋七月周主如原州以後周紀修九月壬戌陳歐陽頠卒以其子紇為廣州刺史以吕祖謙標目修周主自原州如同州以後周紀修周迪入東興嶺陳討之以本紀修解題曰東興嶺在建昌新城縣北三十里舊撫州東興縣戊子周及突厥伐齊齊主禦之以吕祖謙標目修冬十一月辛酉周迪敗走十二月討陳寶應本紀十二月周主還長安通鑑陳世祖文皇帝天嘉五年周武皇帝保定四年後梁世宗皇帝天保三年齊武成帝河清三年春正月庚申朔齊并州刺史段韶大敗周師于晉陽突厥遁以吕祖謙標目修二月庚寅朔日有食之以周紀修三月辛酉齊頒律令以本紀修齊制租調立義租以通鑑修解題曰按通典令男子率以十八受田輸租調二十充兵六十免力役六十六退田免租調一夫受露田八十畆婦人四十畆奴婢依良人丁牛一頭受田六十畆限止四牛餘見通鑑朱黼曰魏均田七十年矣至是復修其法魏制男子十五以上受露田四十畆婦人二十畆齊則十八受田男八十畆婦人四十畆魏則奴婢依良人丁牛一頭受田三十畆齊則受六十畆唐合而酌裁之下中之民受田一頃以十之八為口分二分為世業篤疾減十之六寡妻妾減七夫周之百畆今四十一畆也以家五口歲耕而食之不見其不足今魏一夫一婦則半倍唐一倍有半齊二倍之多牛者受田自倍奴婢餘丁無曾止法不幾於過多哉魏承劉石符姚喪亂之後土田無主悉為公田除兼并大族外貧民往往無田可耕故文帝均田創法不易兩魏相攻齊周互簒孑遺黎民非復太和之舊矣故齊人立法從便使耕非平世制也庚辰周百官初執笏以周紀修夏六月齊殺樂陵王百年以吕祖謙標目修秋八月丁亥朔日有食之以周紀修九月丁巳周封隴西公李昞為唐公以朱熹綱目修解題曰唐之業基於此突厥冦齊冬十月周宇文䕶分三道伐齊以吕祖謙標目修十一月陳克晉安陳寶應畱異伏誅以吕祖謙標目修甲午周圍洛陽甲辰齊敗周師于軹關周圍懸瓠十二月取豫永二州齊主自晉陽赴洛陽壬戌齊太師段韶及并州刺史蘭陵王長恭等大敗周師于邙山周師遁己巳以韶為太宰長恭為尚書令司徒斛律光為太尉以齊紀吕祖謙標目修解題曰按隋書地理志汝南郡城隍縣齊曰永州陳世祖文皇帝天嘉六年周武皇帝保定五年後梁世宗皇帝天保四年齊後主高緯天統元年夏四月甲寅陳以安成王頊為司空以吕祖謙標目修辛酉彗星見丙子齊太子緯即皇帝位於晉陽改元立妃斛律氏為皇后尊齊主為太上皇帝以散騎常侍祖珽為祕書監以吕祖謙標目修五月突厥聘齊以吕祖謙標目修六月庚申彗星出以周紀齊紀修秋七月辛巳朔日有食之以周紀陳紀修陳周迪伏誅以吕祖謙標目修冬十月周宇文䕶殺中州刺史賀若敦以通鑑修解題曰隋書地理志河南郡新安縣後周置中州即通洛防陳世祖文皇帝天康元年周武皇帝天和元年後梁世宗皇帝天保五年齊後主天統二年春正月己卯日有食之以周紀修癸未周改元以周紀修二月丙子陳改元以本紀修夏四月癸酉陳主殂太子伯宗即皇帝位尚書令揚州刺史安成王頊中書舍人劉師知尚書僕射到仲舉受遺輔政五月庚寅頊自為司徒録尚書都督中外軍事以通鑑及吕祖謙標目修秋七月丁酉陳主立妃王氏為皇后以本紀修是歲齊始用士人為縣令以吕祖謙標目修陳臨海王陳伯宗光大元年周武皇帝天和二年後梁世宗皇帝天保六年齊後主天統三年春正月癸酉朔日有食之以周紀修乙亥陳改元以陳紀修二月陳劉師知到仲舉等謀出安成王頊不克見殺以吕祖謙標目修夏四月陳湘州刺史華皎叛附于周五月癸巳以丹陽尹吳明徹為湘州刺史與征南大將軍淳于亮等討之以本紀修六月周主尊母叱奴氏為皇太后以通鑑修辛巳齊咸陽武王斛律金卒以吕祖謙標目修秋七月戊申陳立子至澤為皇太子以本紀修九月周梁㑹華皎侵陳吳明徹大破之于沌口皎奔梁陳别將取周軍于巴陵克周沔州以吕祖謙標目修解題曰沌口漢陽府漢陽縣界出江陵之建寧鎮皆沌也冬十一月戊戌朔日有食之以周紀修是時齊徙祖珽于光州以通鑑修解題曰隋書地理志東鄴郡舊置光州陳臨海王光大二年周武皇帝天和三年後梁世宗皇帝天保七年齊後主天統四年春正月己亥陳安成王頊自為太傅領司徒加殊禮以本紀修三月周納突厥女阿史那氏為后以通鑑修戊午周燕文公于謹卒以周紀通鑑修陳吳明徹攻梁江陵尋退以吕祖謙標目修夏五月癸卯齊中書監和士開為右僕射以通鑑修六月丁卯彗星見以本紀修秋七月壬寅周隋公楊忠卒子堅襲爵以通鑑修解題曰隋之業基於此八月齊周通和以吕祖謙標目修冬十一月壬辰朔日有食之以周紀修甲寅陳安成王頊廢其主為臨海王尋殺始興王伯茂以吕祖謙標目修十二月辛未齊上皇殂齊主自晉陽還鄴丙子尊太上皇后為太后以齊紀修陳高宗皇帝陳頊大建元年周武皇帝天和四年後梁世宗皇帝天保八年齊後主天統五年春正月甲午陳安成王頊即皇帝位改元立妃柳氏為皇后世子叔寶為太子以紀傳修二月齊太尉趙郡王叡謀出和士開不克見殺士開為侍中左僕射以吕祖謙標目修夏齊以祖珽為海州刺史以通鑑修秋九月陳歐陽紇反冬十月辛未遣車騎將軍章昭達討之以本紀修十二月周齊王憲圍齊宜陽以周紀通鑑修周陳復通好以吕祖謙標目修陳高宗宣皇帝大建二年周武皇帝天和五年後梁世宗皇帝天保九年齊後主武平元年春正月乙酉朔齊改元以北齊紀修齊太傅斛律光屢破周軍二月己巳以為右丞相并州刺史以通鑑修陳歐陽紇伏誅陽春太守馮僕母洗氏以功封石龍太夫人以吕祖謙標目及朱熹綱目修三月丙午陳太后殂以本紀修夏四月乙卯陳弑臨海王以陳紀修解題曰通鑑不書闕也秋七月甲寅齊中領軍和士開為尚書令淮陽王以通鑑修陳司空章昭達攻梁江陵周救之乃還以通鑑修九月齊立子恒為太子以通鑑修冬十月辛巳朔日有食之以周紀修十二月周平越巂以吕祖謙標目修齊築汾北城周大司馬齊公憲還救之以周紀修陳高宗宣皇帝大建三年周武皇帝天和六年後梁中宗皇帝天保十年齊後主武平二年春二月壬寅齊録尚書事蘭陵王長恭為太尉趙彦深為司空和士開録尚書事以北齊紀修夏四月戊寅朔日有食之以周紀修庚子周取齊宜陽等九城斛律光赴之以周紀修六月齊取周汾州以齊紀修秋七月庚午齊太保琅邪王儼殺和士開九月齊出趙彦深為兖州刺史以祖珽為侍中儼見殺以吕祖謙標目修冬十月齊主幽其太后胡氏以吕祖謙標目修十一月癸酉齊斛律光為左丞相以通鑑修陳高宗宣皇帝大建四年周武皇帝建德元年後梁中宗皇帝天保十一年齊後主武平三年春正月齊并省尚書令領軍大將軍高阿那肱侍中領軍韓長鸞女侍中陸令萱及子穆提婆用事二月己卯祖珽為左僕射以通鑑齊紀修解題曰李百藥曰甚哉齊末之嬖幸也蓋書契以降未之有焉心利錐刀居台鼎之任智昏菽麥當機衡之重刑殘閹宦蒼頭盧兒西域醜胡龜兹雜伎封王者接武開府者比肩非直獨守弄臣且復多干朝政賜予之費帑藏以虚杼軸之資剥掠將盡縱鼎龜之祚卜世靈長屬此淫昏無不亡之理齊運短促固其宜哉事見通鑑三月癸卯朔日有食之以周紀修丙辰周宇文䕶及其子弟黨與皆伏誅丁巳改元以周紀修夏四月庚寅周追尊略陽公為孝閔皇帝以通鑑修癸巳周立子贇為太子以吕祖謙標目修六月齊殺丞相咸陽王斛律光併其子弟以齊紀及吕祖謙標目修解題曰按韓鳳傳即韓長鸞祖珽曾與鳳於後主前論事珽語鳳云彊弓長矟容相推謝軍國謀算何由得爭鳳云各出意見豈在文武優劣後主將誅斛律光本文作明月鳳固執不從珽有讒言既誅光數日後主不與語餘見通鑑秋八月庚午齊廢其后斛律氏以蘭陵王長恭為大司徒戊子立昭儀胡氏為后以齊紀修九月庚子朔日有食之以周紀修冬十月甲午齊立昭儀穆氏為右后以齊紀修十一月周集東西諸軍而賜之以吕祖謙標目修閏十二月辛丑齊廢其后胡氏以齊紀修是歲突厥木杆可汗死弟佗鉢可汗立復分立東西二可汗以吕祖謙標目修陳高宗宣皇帝大建五年周武皇帝建德二年後梁中宗皇帝天保十二年齊後主武平四年春正月戊寅齊高阿那肱録尚書事以朱熹綱目修二月乙巳齊立右后穆氏為皇后以吕祖謙標目修丙午齊祖珽奏置文林館以吕祖謙標目修三月壬午陳遣將軍吳明徹都督諸軍伐齊以本紀修夏四月戊申齊蘭陵王長恭為太保開府宜陽王趙彦深為司空以通鑑修辛酉陳吳明徹大破齊師于吕梁齊使侍中巴陵郡王王琳赴壽陽五月陳取齊廬江厯陽合肥以本紀修齊陸令萱等出祖珽為北徐州刺史以吕祖謙標目修齊殺蘭陵王長恭以吕祖謙標目修六月庚戌陳取齊沐陽淮陽郡以通鑑修齊主遊南苑殺從官六十人以高阿那肱為司徒以本紀通鑑修陳克齊涇合仁三州以通鑑修解題曰按通典揚州天長縣齊於石梁置涇州隋書地理志彭城郡蘄縣後齊置仁州秋七月陳敗齊師于巴蘄八月降山陽盱眙城九月甲子降陽平城甲戌降齊安城丙子克廣陵城以本紀通鑑修解題曰隋書地理志黃州黃岡縣後齊曰巴州壬午周納大將軍楊堅女為太子贇妃以吕祖謙標目修冬十月辛丑齊侍中崔季舒等諫齊主如晉陽見殺以紀傳修齊行臺僕射皮景和救壽陽不進乙巳陳吳明徹攻拔之殺王琳景和走丙辰以明徹都督豫合等州軍事豫州刺史十一月己丑克北徐州以本紀修十二月齊以高阿那肱為右丞相以齊紀修乙未齊譙城降陳復江北之地以吕祖謙標目修陳高宗宣皇帝大建六年周武皇帝建德三年後梁中宗皇帝天保十三年齊後主武平五年春周進大冢宰齊公憲等十三人爵為王以吕祖謙標目修二月壬辰朔日有食之以本紀修齊朔州行臺南安王思好反伏誅以北齊紀修三月癸酉周太后叱奴氏殂周主行三年之喪以吕祖謙標目修解題曰胡寅曰自漢文短喪之後能斷然行三年者惟晉武帝魏孝文周高祖可謂難得矣然春秋之義責備賢者晉武既為裴杜所惑行禮不備魏孝文之禮若備矣而服非所服周高祖衰麻苫塊卒三年之制最為賢行然推明通喪止於五服之内不及羣臣非所以教天下著於君臣之義也而又在喪頻出遊幸無門庭之冦興師伐隣皆禮所不得為者由高祖不學左右無稽古之臣以輔成之也事見通鑑夏四月庚子彗星見以本紀修齊以婢馮氏為淑妃以通鑑修五月丙子周廢佛道教淫祀以吕祖謙標目修六月壬子周更鑄當十大布錢以周紀修戊午周立通道觀以周紀修秋七月乙酉周大司徒衛王直反八月伏誅以周紀修陳高宗宣皇帝大建七年周武皇帝建德四年後梁中宗皇帝天保十四年齊後主武平六年春二月丙戌朔日有食之以周紀修戊申陳克齊下邳等城以通鑑修三月周聘齊齊人畱之以周紀傳修秋七月丁丑周主大舉伐齊八月丁未拔河陰大城攻金墉不克九月乃有疾而還以吕祖謙標目修齊以趙彦深為司徒以齊紀修閏九月陳吳明徹攻彭城壬辰敗齊師于吕梁以本紀修齊税關市舟車山澤鹽鐵店肆以北齊紀修解題曰按隋志武平之後權幸並進賜予無限加之旱蝗國用轉屈乃料六等富人調令出錢而給事黃門侍郎顔之推奏請立關市邸店之税開府鄧長顒贊成之後主大悦於是以其所入供御府聲色之費未幾而亡鄧長顒不足道也顔之推世之所謂儒者亦復逢君之惡他何責焉冬十二月辛亥朔日有食之以周紀修陳高宗宣皇帝大建八年周武皇帝建德五年後梁中宗皇帝天保十五年齊後主隆化元年春二月齊括雜户女未嫁者以通鑑修壬申陳開府吳明徹為司空以本紀修夏六月戊申朔日有食之以周紀修陳户部尚書江總為太子詹事以吕祖謙標目修庚申齊宜陽王趙彦深卒以吕祖謙標目修秋八月丁卯陳吳明徹為南兖州刺史以通鑑修齊主如晉陽以通鑑修冬十月己酉周主伐齊癸酉克晉州十一月還齊主攻晉州丁酉周主復伐齊十二月齊師潰齊主奔晉陽丁巳改元奔鄴穆提婆降周陸令萱自殺戊午晉陽人立相國并州刺史安德王延宗為帝改元德昌辛酉周拔之以周齊紀及吕祖謙標目修大事記續編卷四十四
