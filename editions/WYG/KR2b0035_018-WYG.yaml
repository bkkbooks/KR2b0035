body:
  text: 大事記續編卷十八明王禕撰漢孝靈皇帝建寧元年春正月壬午竇武為大將軍以本紀修庚子解瀆亭侯即皇帝位改元以本紀修陳蕃為太傅與竇武胡廣參錄尚書事以本紀修二月辛酉葬孝桓皇帝於宣陵以本紀修段熲大破先零於逢義山本紀解題曰李賢曰逢義山在今原州髙平縣閏月追尊祖解瀆亭侯淑為孝元皇夫人夏氏為孝元皇后嗣侯萇為孝仁皇夫人董氏為慎園貴人以本紀袁宏漢紀修夏四月周景薨以吕祖謙標目修五月丁未朔日有食之本紀以太中大夫劉矩為太尉以本紀修六月論定䇿功封竇武及中常侍曹節等十一人為列侯解題曰竇武援立靈帝初秉機政朝議欲加封爵盧植雖布衣以武素有名譽乃獻書以規之武不能用餘見通鑑張栻曰宦者竊柄已乆人知有此曹而已大臣當深自刻苦至誠惻怛舉動無失而後人有以孚信而趨向於我則勢立而形成然後可以消弭禍亂而武於靈帝踐位之初一門四侯妄自封植其誰心服後来得以藉口則可見此曹平日之所竊議而衆志之所不平者矣故雖曰忠義而莫或應之士大夫莫知逆順之所在則以武平日所為未有以慰其心故也封陳蕃為髙陽鄉侯蕃固讓不受以袁宏漢紀列傳修解題曰蕃上疏曰臣聞讓身之文徳之昭也然不敢盜以為名竊推割地之封功徳是為臣熟自思省前後厯職無他異能合亦食祿不合亦食祿臣雖無素潔之行竊慕君子不以其道得之不居也若受爵不讓掩面受之使皇天震怒災流下民于臣立身亦何所寄顧惟陛下哀臣朽老戒之在得竇太后不許餘見通鑑張栻曰蕃之疏其辭逹其義正東京之文若此者盖鮮亦足以見其忠義之氣然蕃雖辭爵而不能力止竇武之封是亦潔身之為耳任天下之重顧止如是哉破羌將軍段熲破先零羌於涇陽以本紀修解題曰段熲破西羌而東羌先零等自覆沒馬賢後朝廷不能討遂數寇擾三輔其後度遼將軍皇甫規中郎將張奐招之連年既降又叛桓帝詔問熲曰東羌反逆皇甫規張奐各擁强衆不時輯定欲移兵東討可參思術略熲上言曰伏見先零東羌雖數叛逆而降於皇甫規者已二萬許落善惡既分餘寇無㡬今張奐躊躇乆不進者當慮外離内合兵往必驚且自冬踐春屯結不散人畜疲羸自亡之勢欲更招降坐制强敵耳臣以為狼子野心難以恩納勢窮雖服兵去復動惟當長矛挟脅白刃加頸耳計東種所餘三萬餘落居近塞内路無險折非有燕齊秦趙從横之勢而乆亂并凉累侵三輔自雲中五原西至漢陽二千餘里匈奴諸羌並擅其地是為癰疽伏疾留滯脅下如不加誅轉就滋大今若以騎五千步萬人車三千兩三冬二夏足以破定毋慮用費為錢五十四億如此則可令羣羌破盡匈奴長服内徙郡縣得反本土伏計永初中諸羌反叛十有四年用二百四十億永和之末復經七年用八十餘億費耗若此猶不誅盡餘孽復起于兹作害今不暫疲人則永寧無期臣庶竭駑劣伏待節度帝許之悉聽如所上建寧元年春熲將兵萬餘人齎十五日粮從彭陽李賢曰今原州彭原縣直指髙平與先零諸種戰于逢義山虜兵盛熲衆恐熲乃令軍中張鏃利刃長矛三重挟以强弩列輕騎為左右翼激怒兵將大呼騰赴熲馳騎于傍突而撃之虜衆大潰斬首八千餘級獲牛馬羊二十八萬頭太后下詔襃美賜錢二十萬勅中藏府調金錢綵物增助軍費拜熲破羌將軍夏熲復追羌出橋門東觀記熲出橋門谷至馬水上水經注走馬水出陽周縣故城南橋山門即橋定長城門東北流入長城又東北注奢延水尋聞虜在奢延澤李賢曰即上郡奢延縣界乃將輕兵兼行一日一夜二百餘里晨及賊撃破之餘虜走落川水經落川謂之奢延水復相屯結熲追之於鮮水上李賢曰在今甘州張掖縣界一名合黎水一名羌谷水程大昌曰非也在張掖名鮮水趙充國所謂令可至鮮水者是也今所追乃東羌在上郡虜復散走熲遂與相連綴及於靈武谷李賢曰靈州靈武縣有谷在今靈州懐逺縣西北羌遂大敗既到涇陽李賢曰縣屬安定郡故城在原州平凉縣南餘寇四千落悉散入漢陽山谷間時張奐上言東羌雖破餘種難盡熲性輕果慮負敗難常宜且以恩降可無後悔按張奐傳奐為度遼將軍與段熲争撃羌不相平及熲為司𨽻校尉欲逐奐歸燉煌害之奐憂懼奏記謝熲熲雖剛忍省書哀之卒不忍也夫士大夫出身任事雖意見不同議論矛盾然國事耳何至蓄憾懐忿相視如仇哉辛武賢因先零事歸官遂陷趙充國之子於死以武賢之賢而猶若此况如熲之剛愎者乎詔書下熲熲復上言臣本知東羌雖衆而輭弱易制所以比陳愚慮思為永寧之筭而張奐説虜强難破宜用招降聖朝明監信納瞽言故臣謀得行奐計不用事勢相反遂懐猜恨信叛羌之訴飾潤辭意云臣兵累見折衂又言羌一氣所生不可誅盡山谷廣大不可空静血流汙野傷和致災臣伏念周秦之際戎狄為害中興以来羌寇最盛今先零雜種累以反覆攻沒縣邑剽掠人物上天震怒假手行誅臣動兵涉夏連獲甘㴻嵗時豐稔人無疪疫自橋門以西落川以東杜佑曰今金城㑹寧平凉等郡地故宫縣邑更相通屬非為深險之地車騎安行無應折衂奐自當武職駐軍二年不能平寇虚欲修文戢武招降獷敵誕辭空説僣而無徴昔先零作寇趙充國徙令居内在今蘭州蘭泉縣煎當亂邉馬援遷之三輔始服終叛至今為鯁故逺識之士以為深憂今傍郡户口單少數為羌所創毒而欲令徙與之雜居是猶種枳棘于良田養虺蛇于室内也故臣欲絶其本根不使能殖臣每奉詔書軍不内御願卒斯言一以任臣臨時量宜不失權便餘見通鑑熲平東羌費用四十四億纔十餘年而黄巾之變起漢遂不支熹平六年夏育請撃鮮卑謂一冬二春不能禽滅育常從熲于羌事故習為喜功生事之舉善乎蔡邕之議曰邉陲之患手足之疥搔中國之困胷背之瘭疽靈帝聽之藐然奈之何哉八月中常侍管覇蘇康等伏誅以前廬江太守朱㝢為司𨽻校尉中散大夫劉祐為河南尹竇武奏收曹節及尚食監王甫等九月辛亥節白帝御徳陽殿收武等武屯都亭下甫執陳蕃殺之矯詔以少府周靖行車騎將軍與張奐等討武武走遂自殺併族誅蕃及尚書令尹勲侍中劉瑜屯騎校尉馮述遷皇太后於南宫節為長樂衛尉封育陽侯甫為中常侍胡廣為太傅錄尚書事虎賁中郎將劉淑故尚書魏朗尋亦被殺以紀傳袁宏漢紀修解題曰武既輔朝政常有誅翦宦官之意太傅陳蕃亦素有謀時共㑹朝堂蕃私謂武曰中常侍曹節王甫等自先帝時操㺯國權濁亂海内今不誅節等後必難圖武深然之蕃大喜以手推席而起武于是引同志尹勲為尚書令劉瑜為侍中馮述為屯騎校尉又徴天下名士廢黜者前司𨽻李膺宗正劉猛太僕杜宻廬江太守朱㝢等列於朝廷請前越雟太守荀翊為從事中郎辟潁川陳寔為屬共定計策於是天下雄俊知其風㫖莫不延頸企踵思奮其智力㑹五月日食蕃復説武曰昔蕭望之困一石顯近者李杜諸公禍及妻子况今石顯數十輩乎蕃以八十之年欲為將軍除害今可且因日食斥罷宦官以塞天變又趙夫人及女尚書旦夕亂太后急宜退絶惟將軍慮焉武乃白太后曰故事黄門常侍但當給事省内典門户主近署財物耳今乃使與政事而任重權子弟布列專為貪暴天下匈匈正以此故宜悉誅廢以清朝廷太后曰漢故事世有宦官但當誅其有罪豈可盡廢耶時中常侍管霸頗有才略專制省内武白誅霸及蘇康等竟死武復數白誅曹節等太后冘豫未忍冘字音由故事乆不發蕃上疏曰今京師囂囂道路諠譁言侯覽曹節公乗昕王甫鄭颯音立等與趙夫人諸女尚書並亂天下附從者升進忤逆者中傷方今一朝羣臣如河中木耳汎汎東西耽祿畏害今不急誅必生變亂傾危社稷其禍難量願出臣章宣示左右并令天下諸姦知臣疾之太后不納朝廷聞者莫不震恐蘇轍曰易曰君不宻則失臣臣不宻則失身㡬事不宻則害成是故鷙鳥將撃必匿其形非以智御物而事不得不爾謀未發而使人知之未有不殆者也陳蕃將與竇武共誅宦官蕃自謂外從人望内有徳于竇后事無不克乃先事願出臣章宣示左右令諸奸知臣疾之謀未及發曺節等殺之蕃一朝老臣名重天下而輕狂寡慮乃與未嘗更事者比八月以朱㝢為司𨽻校尉劉祐為河南尹虞祁為雒陽令武奏免黄門令魏彪以所親小黄門山氷代之使氷奏素狡猾尤無狀者長樂尚書鄭颯送北寺獄蕃謂武曰此曹子便當收殺何復考為武不從令冰與尹勲侍御史祝瑨雜考颯辭連及曹節王甫勲氷即奏收節等侍中劉瑜内奏時武出宿歸府典中書者先以告長樂五官史朱瑀瑀盜發武奏罵曰中官放縱者自可誅耳我曹何罪而當盡見族滅因大呼曰陳蕃竇武奏白太后廢帝為大逆乃夜召素所親壮健者長樂從官史共普等十七人㰱血共盟謀誅武等曺節聞之驚起白帝曰外間切切請出御徳陽殿令帝抜劒踴躍使乳母趙嬈等擁衛左右取棨信閉諸禁門漢官儀曰凡居宫中皆施籍于掖門案姓名當入者本官為封棨傳審印信然後受之召尚書官屬脅以白刃使作詔版拜王甫為黄門令持節至北寺獄收尹勲山氷氷疑不受詔甫格殺之遂害勲出颯還共劫太后奪璽書令中謁者守南宫閉門絶複道使颯等持節及侍御史謁者捕收武等武不受詔馳入步兵營與竇紹共射殺使者召㑹北軍五校士紹為步兵校尉馮述為屯騎校尉皆掌北軍數千人屯都亭下令軍士黄門常侍反盡力者封侯重賞詔以少府周靖行車騎將軍加節與護匈奴中郎將張奐率五營士討武竇紹馮述之外尚有越騎長水射聲三校武未必盡得其兵也夜漏盡王甫將虎賁羽林廏騶都侯劒㦸士合千餘人出屯朱雀掖門與奐等合梁冀之誅黄門令具瑗亦將左右廏騶虎賁羽林都侯劒㦸士合千餘人吕祖謙曰張奐雖為忠直剛正之人止緣在外未嘗知朝廷士大夫賢否忠邪一旦被徴遂為姦人所賣反害正人後雖悔痛因事上疏乞改葬蕃武已無及矣明旦悉軍闕下與武對陳甫兵漸盛使其士大呼武軍曰竇武反汝皆禁兵當宿衛宫省何故随反者乎先降有賞營府素畏服中官東牟侯清宫左右執㦸者數十人不肯去兵宦者令張釋諭之乃去時宦者不掌兵而宿衛士已稟畏如此况後宦者將兵乎袁紹説何進竇武以五營士為兵五營士生長京師服畏中人西都北軍多三輔人東都五營士多京師人於是武軍稍稍歸甫自旦至食時兵降畧盡武紹走諸軍追圍之皆自殺餘見通鑑張栻曰竇武陳蕃雖據權處位而事當至難主弱一也政在房闥二也宦者之勢已成三也武等雖漸引類於朝而植根未固上則太后之心未明禍亂之原下則中外之情未識朝廷之尊而武等之謀但欲速决為誅小人之計夫當時宦者雖有罪然豈無先後輕重之倫乃一槩欲誅之舉動草草先後失序非天討矣且使之人人自疑反締其黨與而速其姦謀使蕃武施之有道行之有序則雖此曹盖亦有心服者殱厥渠魁脅從罔治此待盜賊與小人之法而亦天心也况其所自處者又自有失哉冬十月甲辰晦日有食之本紀十一月劉矩免以本紀修十二月鮮卑及濊貊寇幽并二州本紀烏桓大人稱王以列傳通鑑修處士徐穉卒以列傳修漢孝靈皇帝建寧二年春正月乙巳尊董貴人為孝仁皇后本紀解題曰續漢志置永樂宫儀如桓帝尊匽貴人之禮夏四月壬辰有青蛇見於御座癸巳大風雨雷雹紀傳秋七月段熲大破先零羌于射虎塞外谷本紀解題曰范曄論曰永初之間羣種蜂起遂解仇嫌結盟詛招引山豪轉相嘯聚掲木為兵負柴為械轂馬揚埃陸梁于三輔建號稱制恣睢于北地東犯趙魏之郊南入蜀漢之鄙塞湟中斷隴道燒陵園剽城市傷敗踵係羽書日聞并凉之士特衝殘斃壯悍則委身于兵場女婦則徽纆而為虜發冢露胔死生塗炭和熹以女君親政威不外接朝議憚兵力之損情存苟安或以邉州難援宜見捐棄或懼疽食浸淫莫知所限謀夫回遑猛士疑慮遂徙西河四郡之人雜寓闗右之縣發屋伐樹塞其戀土之心燔破貲積以防顧還之思諸將鄧隲任尚馬賢皇甫規張奐之徒争設雄規更奉征討之命東西奔救首尾摇動數州之境日耗千金之資至于假人增賦借俸侯王引金錢縑綵之珍徴粮粟鹽鐡之積所以賂遺購賞轉輸勞來之費前後數十鉅萬或梟尅酋健摧破附落降俘載路牛羊滿山軍士未奏其利害而離叛之狀已言矣官人屈竭烈士憤䘮段熲受事專掌軍任資山西之猛性練戎俗之態情窮武思盡飈鋭以事之始殄西種卒定東寇陷撃之所殱傷追走之所崩藉頭顱斷落于萬丈之山支革判解於重崖之上其能窮竄草石自脫於鋒鏃者百不一二惜哉寇敵略定矣而漢祚亦衰焉餘見通鑑九月江夏蠻反州郡討平之以本紀修冬十月丁亥中常侍侯覽諷有司奏前司空虞放太僕杜宻長樂少府李膺等為鉤黨下獄死者百餘人于是天下豪傑及學行者皆指為黨人以本紀修解題曰初黨人赦歸田里禁錮終身而黨人之名猶書王府自是正直廢放邪枉熾結海内希風之流遂共相標榜指天下名士為之稱號竇武劉㳤陳蕃為三君言一世之所宗也李膺荀昱杜宻王暢劉祐魏朗趙典朱㝢為八俊言人之英也郭林宗宗慈巴肅夏馥范滂尹勲蔡衍羊陟為八顧言能以徳行引人者也張儉岑晊劉表陳翔孔昱苑康檀敷翟超為八及言能導人追宗者也度尚張邈王孝劉儒胡母班秦周蕃嚮王章為八厨言能以財救人者也張儉鄉人朱並承望侯覽意㫖上書告儉與同鄉二十四人别相署號共為部黨圖危社稷以儉及檀彬褚鳳張肅薛蘭馮禧魏元徐乾為八俊田林張隠劉表薛郁王訪劉祗宣靖公緒恭為八顧朱楷田槃疎耽薛敦宋布唐龍嬴咨宣襃為八及刻石立墠共為部黨而儉為之魁靈帝詔刋章捕儉等大長秋曹節因此諷有司奏捕前黨故司空虞放太僕杜宻長樂少府李膺司𨽻校尉朱㝢潁川太守巴肅沛相荀昱河内太守魏朗山陽太守翟超任城相劉儒太尉掾范滂等百餘人皆死獄中自此諸為怨隙者因相陷害濫入黨中又州郡承㫖或有未嘗交闗亦離禍毒其死徙廢禁者六七百人熹平五年永昌太守曺鸞上書大訟黨人言甚方切帝省奏大怒即詔司𨽻益州檻車收鸞送槐里獄掠殺之中平元年黄巾賊起乃大赦黨人誅徙之家皆歸故郡其後黄巾遂盛朝野崩離綱紀文章蕩然矣時中常侍張讓權傾天下讓父死歸葬穎川雖一郡畢至而名士無往者讓甚恥之陳寔乃獨弔焉及後復誅黨人讓感寔故多所全宥張栻曰太邱在諸君子之中天資加美持心最平而所處張讓之事亦非中節在當時隠迹自晦豈無其方何至送宦者之葬此又矯枉之過范滂等非訐朝政自公卿以下皆折節下之太學生爭慕其風以為文學將興處士復用申屠蟠獨嘆曰昔戰國之世處士横議列國之主至為擁篲先驅卒有坑儒燒書之禍今之謂矣乃絶迹于梁碭之間因樹為屋自同傭人居二年滂等果罹黨錮或死或刑者數百人蟠確然免於疑論吕祖謙曰蟠固知微矣然亦未盡也盖君子思不出其位而務量他人之得失利害則于己必有不及致察者心無二用故也君子不出其位非固不敢出位乃不暇也蟠雖能終免疑論然其所以絶迹者亦由其始不能磨礲圭角故强制力拘方免于疑耳若本無迹何用絶迹山林若本不髙何用自同傭保盖蟠始初不知己之所為無非常之事故見其異而制之也按列傳袁氏漢紀武字㳺平扶風平陵人淑字仲承河間樂承人遷虎賁中郎將上疏宜罷宦官辭甚切直桓帝雖不能用亦不罪焉靈帝即位下獄自殺蕃字仲舉汝南平輿人泰字林宗太原介休人為縣小吏言於母欲就師問至成皋屈伯彦精廬并日而食衣不盖形人不堪其憂林宗不改其樂三年之後藝兼㳺夏慈字孝初南陽安衆人徴拜議郎道卒肅字恭祖勃海髙城人拜議郎與陳蕃等謀誅閹官坐黨禁錮曹節後聞其謀被害馥字子治陳留郡人馥雖不交時官然以聲名為中官所憚遂與范滂張儉等俱被誣陷詔下州郡捕為黨魁及儉等亡命經厯之處皆被收考辭所連及布徧天下馥頓足而嘆曰孽自己作空汙良善一人逃死禍及萬家何以生為乃自翦鬚變形入林慮山中隠匿姓名為冶家傭黨禁未解而卒滂字孟博汝南細陽人太守宗資先聞其名請署功曹委任政事滂在職嚴整疾惡顯薦異節抽拔幽陋郡中中人以下莫不歸怨乃指滂之所用以為范黨後宋脩誣言鉤黨坐繋黄門北寺獄事釋南歸建寧二年詔下急捕滂等死時年三十三勲字伯元河南鞏人轉大司農下獄自殺衍字孟喜汝南項人拜議郎疾卒陟字嗣祖太山梁父人黨事起免官禁錮卒儉字元節山陽髙平人張耳後也太守翟超請為東部督郵時侯覽家在防東李賢曰縣屬山陽郡故城在今兖州金鄉縣南所為不軌儉舉劾覽及其母罪惡請誅之覽遏絶章表並不得通鄉人朱並素性佞邪為儉所棄遂上書告儉與同郡二十四人為黨儉亡命困廹望門投止莫不重其名行破家相容東萊李篤送出塞以故得免中平元年黨事解乃還鄉里建安初徴為衛尉不得已而起儉見曹氏世徳已萌乃闔門懸車不預政事嵗餘卒晊字公孝南陽棘陽人成瑨死亡匿齊魯之間㑹赦出及李杜之誅復逃竄終于江夏山中表字景升山陽髙平人魯恭王之後詔捕黨人表亡走得免翔字子麟汝南邵陵人補御史中丞考黄門北寺獄以無驗見原昱字元世魯國人七世祖覇昱遭黨事禁錮靈帝即位補洛陽令以師䘮棄官卒於家康字仲直勃海重合人遷太山太守是時張儉殺侯覽母案其宗黨賔客或有迸匿太山界者康窮相收掩毋得遺脱覽大怨之誣康與兖州刺史第五種及都尉壺嘉詐上賊降徴詣廷尉減死罪一等徙日南穎隂人及太山羊陟等詣闕為訟乃原還本郡卒敷字文右山陽瑕邱人補䝉令以郡守非其人棄官去卒超為山陽太守沒入侯覽財物坐髠鉗輸作左校尚字博平山陽湖陸人為遼東太守延熹九年卒于官邈字孟卓東平人陳留太守考字文祖東平夀張人冀州刺史儒字叔林東郡陽平人拜議郎下獄自殺班執金吾董卓遣譬解袁紹等紹使王匡殺班周字平尹陳留平邱人北海相嚮字景嘉魯國人郎中璋字伯儀東萊曲城人彪字偉節頴川定陵人少㳺京師黨事起陳蕃争之不能得朝廷莫敢復言彪謂同志曰吾不西行大禍不解乃入洛陽説城門校尉竇武尚書霍諝武等訟之桓帝以此大赦黨人李膺出曰吾得免此賈生之謀以黨禁錮卒顒字伯求南陽襄鄉人少㳺洛陽顯名太學陳蕃李膺之敗顒以與善遂為宦者所陷變名姓亡匿汝南間袁紹私與往来黨事起天下多離其難顒常私入洛陽從紹計議其窮困閉阨者為求援救以濟其急有被掩捕者則廣設權計使得逃隠全免者甚衆黨錮解辟司空府與荀爽王􅁢等共謀董卓爽薨顒以他事為卓所繋憂憤而卒程頥曰後漢名節成於風俗非自得也若一變之則可以至道矣張栻曰黨錮諸君子其志氣甚美而所處則未盡其天資甚髙而於學則不足方隂邪得路天下日趨于頽敗而諸君子曾不少貶慷慨視死如歸其志氣可謂美矣然當困之時則有居困之道當屯之時則有亨屯之法時不我用則晦處自修危行言遜其進不可苟也若乃居位則思其艱而慮其周扶持根本漸以圖濟其為不可驟也諸君子在下則標榜眩露昧夫處困之道及有位于朝不過奮袂正色以搏撃豪强為事業又進而居髙位則果于有為直欲一施之而不顧身死非所然而國勢愈傾又失夫亨屯之法如膺蕃輩其天資可謂剛特不羣惟其未知從事于聖門故所行雖正立節雖嚴未免發于意氣之所動出于惡聲之所感而非循乎義理之安其處之有未盡由學之有未足也庚子晦日有食之本紀十一月鮮卑寇并州以本紀修是嵗曹節為車騎將軍尋罷以本紀修封乳母趙嬈為平氏君以袁宏漢紀修漢孝靈皇帝建寧三年春三月丙寅晦日有食之以本紀修冬濟南盜起以本紀修漢孝靈皇帝建寧四年春正月甲子帝加元服大赦天下唯黨人不赦以本紀修二月癸夘地震本紀海水溢河水清本紀三月辛酉朔日有食之以本紀修秋七月立貴人宋氏為皇后本紀觧題曰袁宏曰宋隠從孫也冬十月戊子朔帝朝太后于南宫黄門令董萌訟太后寃曹節王甫殺之以列傳修鮮卑寇并州本紀漢孝靈皇帝熹平元年春三月壬戌安樂文恭侯胡廣薨本紀夏五月己巳改元以本紀修長樂太僕侯覽伏誅以本紀修六月癸巳皇太后竇氏崩曹節等議欲别葬廷尉陳球太尉李咸固争秋以太后配桓帝以吕祖謙標目修解題曰按袁氏漢紀將葬曺節等以竇氏之誅不用太后禮以馮貴人袝桓帝公卿莫敢諫李咸執藥上書曰中常侍曹節王甫等因寵乗勢賊害忠良讒譛故大將軍竇武太傅陳蕃虚遭無刑之釁被以滔天之罪陛下不復省覽猥發雷霆之怒海内賢愚莫不痛心武已殁矣無可奈何皇太后親與孝桓皇帝共奉宗廟母養蒸庶繋乎天心仁風豐霈四海所宗禮為人後者為之子陛下仰繼桓帝豈得不以太后為母存既未蒙顧復之報殁又不聞諒闇之哀太后未崩武先坐誅存亡各異事不相逮而恚武不已欲貶太后非崇有虞之孝昭蒸蒸之仁八方聞之莫不泣血臣謹冒昧陳誠左手齎章右手執藥詣闕自聞唯陛下復母子之恩崇皇太后園陵之禮如遂不省臣當飲鴆自裁下覲先帝具陳得失終不為刀鋸所裁章省上感其言使公卿更議詔中常侍趙忠監臨衆官數百人各相顧望無敢下議廷尉陳球曰皇太后以舊姓盛徳選入椒房宜配桓帝是無所疑忠笑曰廷尉宜便操筆球遂下議忠省議作色曰陳廷尉此議甚健欲以蚩球球曰陳竇既寃皇太后無辜被幽臣常痛之今日言之退而受罪乃臣宿昔之願也諸公卿皆從球議奏御節甫復言曰竇氏罪深無以為比上曰雖犯惡逆后有大徳于朕節甫于是不復言按陳球傳太尉李咸時病乃扶輿而起𢷬􅎛自隨謂妻子若皇太后不得配食桓帝吾不生還矣既議坐者數百人各瞻望中官良乆莫肯先言李咸始不敢先發見陳球辭正然後大言曰臣本謂宜爾誠與臣意合㑹者皆為之愧曹節王甫復争咸乃詣闕上疏且咸既𢷬椒與妻子訣不應遲回觀望其書凡數有言范𫝊通鑑俱不載止載其後疏故備錄之以御史中丞段熲為司𨽻校尉宦者諷熲捕繋太學諸生千餘人以本紀修冬十月宦者誣勃海王悝謀反丁亥悝自殺以本紀修十一月㑹稽賊許生稱越王遣揚州刺史臧旻等討之以通鑑修十二月鮮卑寇并州本紀是嵗南匈奴車兒單于死子屠特若尸逐就單于立以列傳修漢孝靈皇帝熹平二年春二月以光祿勲揚賜為司空本紀夏六月北海地震以本紀修海水溢以本紀修秋七月楊賜免本紀冬十二月鮮卑寇幽并二州以本紀修癸酉晦日有食之本紀漢孝靈皇帝熹平三年春二月以太常陳耽為太尉本紀秋洛水溢本紀冬十一月臧旻等破許生斬之以本紀修十二月鮮卑寇北地并州以本紀修漢孝靈皇帝熹平四年春三月詔諸儒正五經文字刻石太學門外以本紀修立三互法以列傳修解題曰李石曰三互謂婚姻之家及兩州不得交互為官也謝承書曰史弼遷山陽太守其妻鉅野薛氏女以三互自上轉拜平原相是也事見通鑑夏五月延陵園火本紀鮮卑宼幽州本紀冬改平準為中準列於内署自是諸署悉以宦者為丞令以本紀修解題曰平準令丞掌知物賈主練染作綵色屬大司農漢以司農筦經費少府掌私蔵其職分矣然宫中盡屬少府而少府猶屬丞相御史自光武以山澤鹽鐵歸郡縣宫中私用付之有司章帝以後别立監奄人領之自此器用盡付之宦者而大臣不復問矣帝嘗嘆桓帝不能作家計曾無私財而專為私稸吕强謂中尚方歛諸郡之寳中御府積天下之繒西園引司農之蔵中廏聚太僕之馬而所輸之府輙有導行之財勢所必至也漢孝靈皇帝熹平五年夏五月陳耽罷以本紀修閏五月永昌太守曹鸞坐訟黨人棄市詔黨人禁錮五屬以本紀修冬十一月光祿勲楊賜為司徒本紀是嵗鮮卑寇幽州以本紀修漢孝靈皇帝熹平六年春二月南宫平城門及武庫東垣屋自壊本紀解題曰李賢曰平城門洛陽城南門蔡邕曰平城門正陽之門與宫連郊祀法駕所從出門之最尊者武庫禁兵所蔵東垣庫之外障夏四月大旱蝗以本紀修鮮卑寇三邉本紀小民為宣陵孝子者皆除太子舎人以本紀修秋七月衛尉陳球為司空本紀八月遣鮮卑中郎將田晏等三道伐鮮卑大敗以本紀修冬十月癸丑朔日有食之本紀京師地震本紀十一月陳球免以本紀修十二月楊賜免太常陳耽為司空以本紀修鮮卑寇遼西以本紀修解題曰趙苞遷遼西太守遣使迎母道經栁城值鮮卑入寇劫質苞母載以撃郡苞出戰賊出母示苞苞悲號謂母曰為子無狀欲以微祿奉養朝夕不圖為母作禍昔為母子今為王臣義不得顧私恩毁忠節唯當萬死無以塞罪母遥謂曰人各有命何得相顧以虧忠義爾其勉之苞即時進戰賊悉摧破其母為賊所害苞歸葬訖謂鄉人曰食祿而避難非忠也殺母以全義非孝也如是有何面目立於天下遂歐血而死程頥曰以君城降賊而求生其母固不可然亦當求所以生母之方奈何不顧而遽戰乎必不得已身往降之可也徐庶于此盖得之矣漢孝靈皇帝光和元年春二月辛亥􅃋日有食之以本紀修己未地震本紀置鴻都門學生以本紀修解題曰李賢曰鴻都名也於内置學諸生皆敇州郡三公舉召能為尺牘辭賦及工書鳥篆者相課試至千人焉胡寅曰靈帝好學習春秋而所引以自近者乃文賦小才書篆末技凶醜細人也所力行而不變者則禁錮忠良寵任常侍賣官聚貨也人君無髙逺之志則已苟有髙逺之志勿謂世無賢人可備師友求之則至勿謂書無禆補可廣徳業講之則明監漢靈之好文法髙宗之典學師成湯之受教慕成王之緝熈然後知書之不吾欺也三月辛丑改元以本紀修夏四月丙辰地震本紀侍中寺雌雞化為雄以袁宏漢紀修陳耽免以本紀修六月丁丑有黒氣墮温徳殿廷中以本紀修秋七月青虹見嘉徳殿前召光祿大夫楊賜議郎蔡邕等詣金商門問災異邕坐下獄中常侍吕强力請乃徙朔方以紀傳修八月有星孛于天市本紀九月太常陳球為太尉本紀冬十月皇后宋氏廢以憂死以本紀修丙子晦日有食之以本紀修十一月陳球免以本紀修是嵗鮮卑寇酒泉本紀開西邸賣闗内侯以下入錢有差以本紀修大鬻爵至三公以皇極經世修南匈奴屠特若尸就逐單于死子呼徴立以列傳修漢孝靈皇帝光和二年春三月大鴻臚劉郃為司徒本紀夏四月甲戌朔日有食之本紀尚書令陽球為司𨽻校尉劾奏太尉段熲及王甫等下獄伏誅球遷衛尉大長秋曹節領尚書令以紀傳修吕强封都鄉侯固辭上疏陳事帝不能用以吕祖謙標目修丁酉大赦天下除黨人從祖以下禁錮以本紀通鑑修五月護匈奴中郎將張修斬南單于呼徴更立右賢王羌渠為單于秋七月修坐徴下獄死以紀傳修冬十月劉郃陽球永樂少府陳球步兵校尉劉納謀誅宦者謀泄甲申皆下獄死以本紀修板楯蠻反以本紀修十二月光祿勲楊賜為司徒本紀鮮卑寇幽并二州以本紀修漢孝靈皇帝光和三年夏四月江夏蠻反以本紀修冬鮮卑寇幽并二州本紀十二月己巳立貴人何氏為皇后本紀是嵗作罼圭靈昆苑本紀解題曰李賢曰東罼圭苑周一千五百步中有魚梁臺西罼圭苑周三千三百步司馬康云皆畢羅之象並在洛陽宣平門外也漢孝靈皇帝光和四年春正月置騄驥廏初調民馬以本紀修夏六月庚辰雨雹如鷄子以本紀修秋九月庚寅朔日有食之以本紀修閏九月北宫永巷署灾以本紀修楊賜罷冬十月太常陳耽為司徒本紀鉅鹿張角以妖術遣弟子誑誘四方楊賜請散其黨㑹賜罷司徒掾劉陶申前議不省以吕祖謙標目修解題曰初順帝時琅邪宫崇詣闕上其師干吉所得神書百七十卷皆縹白素朱介青首朱自號太平清領書其言以隂陽五行為家而多巫覡雜語有司奏崇所上妖妄不經乃收藏之後張角頗有其術焉餘見通鑑鮮卑寇幽并二州檀石槐死子和連立以本紀修是嵗於後宫作列肆以本紀修吕彊論私蔵及選舉不由三公不省以吕祖謙標目修大長秋曹節死中常侍趙忠代之以列傳修漢孝靈皇帝光和五年春二月詔公卿以謡言察刺史二千石虚糾有惠化者二十六人陳耽上言乃拜議郎三月耽免以袁宏漢紀吕祖謙標目修解題曰漢官儀曰三公聽採長吏臧否人所疾苦還條奏之頃者舉謡言掾屬令史都㑹殿上主者大言州郡行狀云何善者同聲稱之不善者黙爾銜枚魏紀詔書𠡠三府舉奏州縣政理無效民為作謡者免罷之三公傾邪皆希世見用貨賂並行强者為怨不見舉奏弱者守道多被陷毁太祖疾之以災異博問得失上書切諫天子感悟以示三府責讓之諸以謡言徴者皆拜議郎餘見通鑑夏五月庚申永樂宮署災本紀解題曰續漢志曰徳陽前殿西北入門内永樂太后宫署秋七月有星孛于太微本紀板楯蠻降以本紀修八月起四百尺觀以本紀修冬十月以太常楊賜為太尉以本紀修漢孝靈皇帝光和六年夏大旱本紀秋金城河水溢本紀五原山岸崩本紀漢孝靈皇帝中平元年解題曰宋庠紀年通譜是嵗張角反出兵獲其渠帥義取自中而平亂云春二月張角號黄巾賊以吕祖謙標目修三月戊申以河南尹何進為大將軍屯都亭以紀傳修解題曰李賢曰都亭在洛陽置八闗都尉官本紀解題曰李賢曰八闗凾谷在河南府新安縣又夀安縣東北有八闗城漢凾谷都尉治廣成汝州梁縣伊闗在河南府伊陽縣大谷在河南府潁陽縣轘轅在河南府永安縣旋門孟州汜水縣有旋門寰宇記作􅕆門小平津在河南府鞏縣孟津在河南府偃師縣吕彊請赦黨人簡刺史二千石能否從之壬子大赦天下還黨人徙者以吕祖謙標目修遣北中郎將盧植討張角左右中郎將皇甫嵩朱儁討穎川黄巾以本紀修解題曰張角遣弟子八人使於四方以善道教化天下轉相誑惑遂置三十六方方猶將軍號也大方萬餘人小方六七千各立渠帥大方馬元義等先收荆揚數萬人期㑹發于鄴數往來京師以中常侍封諝徐奉等為内應角弟子唐周上書告之收元義車裂於洛陽于是以嵩為左中郎將持節與右中郎將朱儁共發五校三河騎士及募精勇合四萬餘人共討穎川黄巾帝因怒詰責中常侍張讓等曰汝曹常言黨人所為不軌皆令禁錮或有伏誅今黨人更為國用汝曺反與張角通為可斬未皆叩頭云王甫侯覽所為帝乃止餘見通鑑典畧曰熹平中妖賊大起三輔有駱曜光和中東方有張角漢中有張修曜教民緬匿法角為太平道修為五斗米道後角被誅修亦亡及魯在漢中因其民信行修業遂增飾之盖自桓帝諂事黄老妖民聞風相挺而起示民之方可不謹乎趙忠等譛吕彊彊自殺以通鑑修南陽黄巾張曼成殺太守以本紀修夏四月楊賜免以本紀修朱儁為黄巾波才所敗本紀侍中向栩郎中張鈞言宦者下獄死以本紀修汝南黄巾敗郡兵廣陽黄巾殺刺史太守以本紀修五月皇甫嵩朱儁與波才戰於長杜破之解題曰李賢曰長社許州縣故城在長葛縣西六月南陽太守秦頡撃斬張曼成以本紀修交阯屯兵反刺史賈琮降之以本紀修皇甫嵩朱儁大破汝南黄巾於西華本紀解題曰李賢曰西華縣屬汝南郡故城在今陳州項城縣西盧植破黄巾圍張角於廣宗小黄門誣奏植坐徴抵罪以中郎將董卓代之以本紀修秋八月皇甫嵩與黄巾戰於倉亭獲其帥以本紀修觧題曰水經河水於范縣東北為倉亭津乙巳董卓以無功徴詔皇甫嵩討張角角病死冬十月嵩與角弟梁戰于廣宗斬之十一月復斬角弟寳以嵩為左車騎將軍冀州牧以紀傳修解題曰按袁氏漢紀嵩既破黄巾威振天下故信都令閻忠説嵩曰夫難得而易失者時也時至而不旋踵者機也故聖人常順時而動智者必見機而發今將軍遭難得之時蹈之而不發將何以權大名乎嵩曰何謂也忠曰天道無親百姓與能今將軍受鉞于暮春收功于末秋旬月之間神兵電掃封户刻石南向以報威振本朝聲馳海外雖湯武之舉未有髙將軍者也身立髙人之功乃北面以事庸主何以圖安也嵩曰夙夜在公心不忘忠何故不安忠曰昔韓信不忍一飡之遇拒蒯通之説利劒拂其喉乃歎息而悔今主勢弱於劉項將軍權重于淮隂赫然奮發因危抵頽崇恩以綏前附振武以臨後伏徴冀方之士勒七州之衆蹈流漳河飲馬盟津誅中官之罪除羣怨之積雖童兒女子可使用命况厲熊羆之卒因迅風之勢哉天下已順乃請呼上帝喻以大命混齊六合南北稱制實神機之至决風發之良時方今權宦羣居同惡如市上不自由政出左右庸主之下難以乆居不賞之功讒人側目本文作讒人所貫今用范傳語如不早圖後悔無及嵩懼曰黄巾小孽非秦項之敵也新結易散非我之能民未忘主而子欲逆求之是虛造不冀之功以速朝夕之禍孰與委忠本朝雖有多讒不過放廢猶有令名死且不朽逆節之論吾所不敢也忠知計不用乃佯狂為巫朱熹曰司馬光不喜權謀至修書時頗剛之却不見得當時風俗正當存在却别作説以斷之湟中義從胡北宫伯玉與先零羌反以金城邉章韓遂為帥以本紀修癸巳朱儁拔宛城黄巾破散以紀傳修十二月己巳改元以本紀修豫州刺史王允上中黄門張讓客與黄巾交通書讓以事中允再徴下獄以本紀及通鑑目錄修漢孝靈皇帝中平二年春二月己酉南宫雲臺灾庚戌樂城門災以本紀及注修廣陽門外屋自壊本紀稅天下田畝十錢以修宫室鑄銅人時刺史二千石茂才孝㢘遷除皆責助軍修宫錢以吕祖謙標目修盜賊並起常山褚燕號黑山賊乞降拜平難中郎將以通鑑修三月北宫伯玉等寇長安遣皇甫嵩討之以本紀修夏四月庚戌大風雨雹本紀六月以討張角功封中常侍張讓等十二人為列侯以袁宏漢紀修秋七月皇甫嵩免八月司空張温為車騎將軍討北宫伯玉以本紀修解題曰温出征凉州將行張元要説温曰天下寇賊雲起豈不以黄門常侍無道故乎聞中貴人公卿以下當出祖道於平樂觀明公総天下威重握六師之要若於中坐酒酣鳴金皷整行陣召軍正執有罪者誅之引兵還屯都亭以次剪除中官解天下之倒懸報海内之怨毒然後顯用隠逸忠正之士則邉章之徒宛轉股掌之上矣温聞大震不能對良乆曰非不悦子之言顧吾不能行如何元乃嘆曰事行則為福不行則為賊今與公長辭矣即仰藥欲飲之温前執其手曰子忠於我我不能用是吾罪也子何為當然且出口入耳之言誰今知之元遂去唐仲友曰東漢人大抵鋭于疾惡拙于慮患否九四有命无咎疇離祉若無君命而擅行誅殺雖快一時若非覆國則君子之禍必深元之此言未可為權權以用中非以反中權以輔正非以害正若人臣而專誅不可謂中正道之興廢有命而欲以人力勝之其禍必有不可勝言者張温尚不能以軍法誅董卓况能冒大難而誅中官乎元于是為失言矣九月特進楊賜為司空冬十月庚戌薨以通鑑修陳耽及諫議大夫劉陶坐直言下獄死本紀十一月張温破北宫伯玉于美陽參軍孫堅說温誅董卓不從以吕祖謙標目修解題曰朝廷以温為車騎將軍假節執金吾袁滂為副董卓為破虜將軍與盪寇將軍周慎並統於温并諸郡兵步騎十餘萬屯美陽李賢曰故城在今武功縣北以衛園陵邉章韓遂亦進兵美陽温卓與戰輙不利十一月夜有流星如火照章遂營中騾馬盡鳴賊以為不祥欲歸金城卓聞之喜明日乃與右扶風鮑鴻等并兵俱攻大破之斬首千級章遂走榆中卓於望垣北李賢曰縣屬天水郡為羌胡所圍糧食乏絶乃於所度水中偽立􅋣以捕魚而潜從􅋣下過軍續漢書􅋣作堰字義同比賊追之决水已深不得度時衆軍敗退唯卓全師而還屯於扶風封􅘭鄉侯李賢曰斄縣故城在今雍州武功縣字或作邰音台山陽公載記卓謂長史劉艾曰闗東軍皆畏孤無能為也惟孫堅小戅頗能用人當語諸將使知忌之孤昔與周慎西征慎圍邉韓于金城孤語張温求引所將兵為慎作後駐温不聽温又使孤討先零叛羌孤皆知其不然而不得止遂行留别部司馬劉靖將步騎四千屯安定以為聲勢叛羌更還欲截歸道孤小撃輙開畏安定有兵故也虜謂安定當數萬人不知但靖也孫堅隨周慎行謂慎求將萬兵造金城使慎以二萬作後駐邉韓畏慎大兵不敢輕與堅戰而堅兵足以斷其運道兒曹用之凉州或能定也温既不能用孤慎又不用堅自攻金城壊其外垣馳使語温自以克在旦夕温時亦自以計中也而度遼兒果斷蔡園慎棄輜重走果如孤䇿堅所見與人同自為可耳但山東大勢終無所至殺二袁劉表孫堅天下自服從耳鮮卑寇幽并二州以本紀修是嵗造萬金堂於西園以為私藏以袁宏漢紀修漢孝靈皇帝中平三年春二月江夏兵趙慈反本紀以張温為太尉以紀傳修解題曰三公在外自温始趙忠為車騎將軍以列傳修夏五月壬申晦日有食之本紀六月荆州刺史王敏斬趙慈以本紀修趙忠罷以本紀修冬十月武陵蠻反以本紀修十二月鮮卑寇幽并二州本紀徴張温還以列傳修漢孝靈皇帝中平四年春二月滎陽賊起三月河南尹何苗討破之以為車騎將軍以本紀袁宏漢紀修韓遂殺北宫伯玉邉章圍隴西夏殺凉州刺史耿鄙漢陽太守傅燮扶風馬騰漢陽王國寇三輔以紀傳修張温免以本紀修六月漁陽張純張舉等反以本紀修護烏桓校尉公綦稠自稱天子以本紀修冬十月零陵觀鵠宼桂陽長沙太守孫堅撃斬之封烏程侯以紀傳修十二月休屠各胡反以本紀修是嵗賣闗内侯世傳直五百萬以本紀修前太邱長陳寔卒以列傳修解題曰許邵少峻名節好人倫多所賞識嘗到潁川多長者之㳺唯不候寔又陳蕃䘮妻還葬鄉人畢至而邵獨不往或問其故邵曰太邱道廣廣則難周仲舉性峻峻則少通故不造也事見通鑑朱熹曰人之父祖壁立千仞子孫猶不能保其能守家法况太邱之制行如此其末流之弊為權臣佐命亦何足怪哉漢孝靈皇帝中平五年春二月有星孛于紫宫本紀黄巾餘賊起於西河白波谷以本紀修三月改刺史為州牧以太常劉焉為益州牧太僕黄琬為豫州牧宗正劉虞為幽州牧以列傳修解題曰劉昭曰孝武之末始置刺史監糾非法不過六條傳車周流匪有定鎮秩裁數百威望輕寡得有察舉之勤未生陵犯之釁成帝改牧其萌始大世祖中興還遵舊制因茲彌嵗六合危動四海潰斃而諸侯莫敢入伐豈非幹强枝弱控制素重之所致乎至孝靈在位横流既及劉焉矯偽自為身謀盛稱宜重牧伯謂足鎮壓萬里挾姦樹筭茍罔一時故焉牧益土造帝服于岷峨袁紹􅂑冀下制書于燕朔劉表荆南郊天祀地魏祖據兖遂構皇業漢之殄滅禍源乎此及臻後代任寄彌廣委之邦宰之命授之斧鉞之重假之都督之威開之征討之略晉太康之初武帝乃詔省州牧雖有其言不卒其事後漢纉繼牧鎮愈重據地分争竟覆天下休屠各胡殺并州刺史張懿遂與南匈奴左部胡合殺羌渠單于子右賢王於扶羅立國人復立須卜骨都侯為單于以紀傳修解題曰休屠各胡即休屠地也屠音除夏六月益州黄巾馬相自稱天子州從事撃斬之以夲紀修秋八月初置西園八校尉以小黄門蹇碩為上軍校尉統之以本紀及注修解題曰事見通鑑薛季宣曰書稱太保命仲桓南宫毛俾齊侯吕伋以二干戈虎賁百人逆子劍而詩亦亦曰王命尹氏南仲太祖太師皇父整我六師王謂尹氏命程伯休父左右陳行戒我師旅且太保相也非南宫之使不得專令兵師齊侯將也非太保之命不敢擅興禁旅至于皇父整師尹氏播令程伯出征則兵無專將將無重權大略可考是以兵滿天下居然若無自後兵皆常聚帥多世守文武異途將相争長漢氏兵制庶㡬于古南北二軍不能兼萬自武帝置大司馬以冠諸將軍權始偏重于將遂基王莽之禍光武中興懲剏前事而蕩無良法其後戚宦迭將更相傾争然五營畏服中官公卿駢首就戮何進袁紹不勝其怨于是内置園校陽尊黄門外重州牧實召邉將閹豎雖翦而董卓之禍以成義軍四起郡牧争政而漢三分矣可不戒夫九月以衛尉董重為驃騎將軍以本紀修冬十一月青徐黄巾復起本紀甲子講武於平樂觀以本紀修解題曰李賢曰平樂觀在洛陽城西討虜校尉盖勲中軍校尉袁紹謀誅宦官蹇碩懼出勲為京兆尹以列傳修十一月王國圍陳倉以皇甫嵩為左將軍督前將軍董卓救之以紀傳修騎都尉公孫瓉與張純戰於石門大破之以本紀修解題曰李賢曰石門山名在今營州西南大事記續編卷十八
