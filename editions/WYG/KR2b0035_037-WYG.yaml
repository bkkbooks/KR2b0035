body:
  text: 大事記續編卷三十七明王禕撰宋太祖文皇帝元嘉三十年魏高宗文成皇帝興安二年春正月戊子宋武陵王駿討叛蠻以本紀修二月甲子宋太子劭弑其父殺尚書僕射䕶軍將軍徐湛之吏部尚書江湛而自立改元太初以吕祖謙標目修解題曰沈約曰太祖㓜年特秀顧無保𫝊之嚴而天授和敏之姿自稟君人之德及正位南面厯年長乆綱維備舉條禁明密罰有恒科爵無濫品故能内清外晏四海謐如也昔漢氏東京常稱建武永平故事自兹厥後亦每以元嘉爲言斯固盛矣授將遣師乖分閫之命才謝光武而遥制兵畧至於攻日戰時莫不仰聽成筭雖覆師喪旅將非韓白而延冦蹙境抑此之由及至言漏衾衽難結商豎雖禍生非慮盖亦有以成之嗚呼哀哉宋庠紀年通譜太初本漢武帝苻登乞伏乾歸秃髪烏孤年號三月魏尊保太后爲皇太后以本紀修宋殺侍中王僧綽以吕祖謙標目修庚寅宋武陵王駿舉兵討劭司空南譙王義宣及雍州刺史臧質同州刺史魯爽皆應之乙未武陵王駿發尋陽夏四月甲子前鋒柳元景大破劭兵于新亭丁卯江夏王義恭出奔己巳武陵王駿即皇帝位以義恭爲太尉都督徐南徐二州軍事太尉領司徒義宣爲中書監丞相揚州刺史並錄尚書六條事解題曰按宋書百官志王導爲丞相罷司徒府義宣爲丞相司徒府如故臧質爲車騎將軍江州刺史將軍沈慶之爲領軍將軍五月丙子克臺城劭及衛將軍開府始興王濬等伏誅甲申尊所生母路淑媛爲皇太后乙酉立妃王氏爲皇后壬辰以義恭爲太傅領大司馬六月丙午還宫置殿門上閤屯兵己酉以魯爽爲南豫州刺史以本紀吕祖謙標目修解題曰薛季宣曰孝武謂前日之釁近在東宫東宫藏甲與禁旅競殆也乃增殿閤諸屯而併省太子營衛宋雜號將軍徃徃爲寄祿而掌禁兵則自二衛將軍而下有仗主隊主幢主鎧主細伏細鎧主隊主軍主至是有直閤將軍防閤將軍閤主齋帥直寢左右提刀之類大見寵任而中郎將騎諸營又爲外兵矣閏月乙亥魏太皇太后殂以本紀修甲午宋丞相南郡王義宣都督荆湘等分州軍事荆湘二州刺史以本紀修宋置衛尉官本紀解題曰按宋書列傳晉氏過江不置城門校尉及衛尉官孝武欲重城禁故復置衛尉卿衛尉之置自恢始也恢南譙王義宣子也秋七月辛丑朔日有食之既宋詔求直言中軍録事參軍周朗上書忤㫖以紀傳修宋郡縣以三周爲滿以吕祖謙摽目修己巳宋殺司空南平王鑠以通鑑修宋南海太守蕭簡反九月丁卯討平之以本紀修冬十二月癸未宋省太子率更令等官减中庶子等員以本紀修宋世祖孝武皇帝劉駿孝建元年魏高宗文成皇帝光興元年春正月己亥朔宋改元以本紀修解題曰宋庠紀年通譜義取誅滅㐫逆克用孝道壬戌宋更鑄四銖錢本紀解題曰王容曰用年號爲錢文自此始宋立子子業爲皇太子以本紀修二月宋南郡王義宣及臧質魯爽兖州刺史徐遺寶反解題曰宋庠紀年通譜爽改元建平本漢哀帝石勒慕容盛慕容德白亞栗斯年號己卯以領軍將軍柳元景爲撫軍將軍辛卯左衛將軍王𤣥謨爲豫州刺史討義宣癸巳𤣥謨進據梁山丙申以安北司馬夏侯祖歡爲兖州刺史三月遺寶奔爽夏四月南兖州刺史沈慶之討爽於厯陽爽伏誅五月甲寅質攻梁山𤣥謨大破走之義宣走六月戊辰質伏誅于武昌以本紀吕祖謙標目修解題曰按寰宇記太平州當塗縣西南三十里有東梁西梁山宋孝武詔曰層岫雲峙流間海岳天表象魏以旌國形仍以二山爲立闕故曰天門焉初晉以揚州爲京畿穀帛所資皆出焉荆江爲重鎮甲兵所聚皆在焉宋主惡其强癸未分揚州置東揚州分荆湘江豫州置郢州罷南蠻校尉以本紀修解題曰按州郡志分揚州之㑹稽東陽新安永嘉臨海五郡爲東揚州分荆州之江夏竟陵隨武陵天門湘州之巴陵江州之武昌豫州之西陽又以南郡之州陵監利二縣屬巴陵立郢州戊子宋省録尚書事本紀解題曰大難甫夷外則置東揚郢州以奪揚荆江之勢内則省録尚書事以削宰相之權豈亦有所懲戒而然乎庚寅宋南郡王義宣伏誅以吕祖謙標目修秋七月丙申朔日有食之既以本紀及志修辛丑魏改元以吕祖謙標目修宋世祖孝武皇帝孝建二年魏高宗文成皇帝太安元年春二月丙寅宋沈慶之以始興公就第以通鑑修解題曰慶之之請老盖亦畧窺孝武之所爲矣然竟亦不免於子業之世明哲保身豈易言哉事見通鑑夏六月壬戌魏改元以吕祖謙標目修解題曰宋庠紀年通譜太安本晉惠帝苻丕吕光年號秋八月宋殺征虜將軍雍州刺史武昌王渾以本紀修宋郊廟初設備樂以通鑑修冬十月宋江夏王義恭領揚州刺史以本紀修己未宋裁損王侯制度二十四條以吕祖謙標目修宋世祖孝武皇帝孝建三年魏髙宗文成皇帝太安二年春正月乙卯魏立貴人馮氏爲后以吕祖謙標目修二月丁巳魏立子宏爲太子以吕祖謙標目修秋七月丙子宋南兖州刺史西陽王子尚爲揚州刺史以本紀修解題曰子尚子業之母弟也冬十月丙午宋江夏王義恭爲太宰領司徒以本紀修十一月魏隴西王源賀請宥死刑輕者守邊以吕祖謙標目修十二月宋移青州并鎮厯城以吕祖謙標目修宋世祖孝武皇帝大明元年魏高宗文成皇帝太安三年春正月辛亥朔宋改元以本紀修二月魏攻宋兖州尋退以吕祖謙標目修夏六月丁亥宋出丹陽尹顔竣爲東揚州刺史以本紀修秋八月甲辰宋以司空南徐州刺史竟陵王誕爲南兖州刺史太子詹事劉延孫爲南徐州刺史以本紀修解題曰按列傳先是髙祖遺詔京口要地去都密邇非宗室近戚不得居之延孫與帝室雖同彭城人由來不序昭穆不應有此授時竟陵王誕爲徐州上深相畏忌不欲使居京口遷之廣陵與京口對岸欲使腹心爲徐州以防誕故以授延孫而與之合族餘見通鑑荆州居上流之重地廣兵强資實兵甲居朝廷之半故高祖使諸子居之義慶以宗室令美故特有此授髙祖遺詔京口必擇近戚而不以及踈族至於荆州雖近戚亦不得授必帝子然後居之則荆州地望又重於京口矣宋世祖孝武皇帝大明二年魏高宗文成皇帝太安四年春正月魏設酒禁増内外候官以通鑑修三月魏中書侍郎髙允爲中書令以魏傳通鑑修夏六月戊寅宋吏部置尚書二人以吕祖謙標目修解題曰帝又奪選部之權也秋宋詔沙汰沙門尋寢以吕祖謙標目修八月丙戍宋殺中書令王僧逹以本紀修冬十月魏攻宋清口敗退以魏紀修解題曰水經注濟水又北汶水注之戴延之所謂清口也郭縁生述征記清河首受洪水北流濟或謂清即濟也禹貢濟東北㑹于汶今枯渠注巨澤北則清濟與汶㑹也詳見晉太寧二年泗口解題十一月魏主伐柔然以魏紀修時宋主親覽朝政不任大臣委寄南臺侍御史中書通事舍人戴法興戴明寶等以吕祖謙標目修宋世祖孝武皇帝大明三年魏高宗文成皇帝太安五年春二月乙卯宋揚州六郡爲王畿以東揚州爲揚州以吕祖謙標目修解題曰按州郡志揚州管郡十既分五郡爲東揚州揚州止有丹楊吳郡吳興淮南宣城五郡不知何以謂之六郡當攷夏四月宋司空竟陵王誕反以沈慶之爲車騎大將軍南兖州刺史討之以本紀修解題曰按宋史列傳及後魏書列傳誕表曰徃年元凶禍逆陛下入討臣背凶赴順可謂常節及丞相構難臧魯恊從朝野怳忽咸懐憂懼陛下欲建百官羽儀星馳推奉臣前後固執方賜允俞社稷獲全是誰之力右軍宣簡爰及武昌皆以無罪並遇枉酷時帝淫亂無度烝其母路氏顔竣恃舊每戱㺯之慚怒殺竣餘見通鑑五月宋殺顔竣以列傳修秋七月宋竟陵王誕伏誅以本紀修解題曰按宋史列傳上聞廣陵平輿駕出宣陽門敕左右文武呌稱萬歲侍中蔡興宗時陪輦帝顧曰卿獨不呌興宗從容正色答曰陛下今日政應涕泣行誅豈得軍中皆稱萬歲帝不恱餘見通鑑吕祖謙曰王子頽享五大夫樂及徧舞鄭伯見虢叔曰哀樂失時殃咎必至鄭伯享王樂備原伯曰鄭伯效尤其亦將有咎子頽奸王之位固不應用此樂鄭伯納王之後正功成之時用之似未害而謂之效尤者盖子頽王之叔父初殺其叔豈宜用樂宋竟陵王敗死武帝令左右皆呼萬歲蔡興宗正色言之盖此意也九月宋築上林苑以本紀修宋世祖孝武皇帝大明四年魏高宗文成皇帝和平元年春正月甲子朔魏改元以魏紀修夏六月魏伐吐谷渾以魏紀修魏復置史官以吕祖謙標目修冬十月宋殺前廬陵内史周朗以吕祖謙標目修是歲宋徵青兾二州刺史顔師伯爲侍中以通鑑修柔然攻髙昌滅沮渠氏以吕祖謙標目修宋世祖孝武皇帝大明五年魏高宗文成皇帝和平二年夏四月丙午宋雍州刺史海陵王休茂反伏誅以吕祖謙標目修魏大旱復羣祀以通鑑修秋九月甲寅朔日有食之以魏紀修冬十二月甲戍宋制民戸歲輸布四疋以通鑑修是歲宋詔士族雜昬者補將吏以通鑑修宋世祖孝武皇帝大明六年魏高宗文成皇帝和平三年春二月乙卯宋復百官禄以本紀修三月丁未宋殺前廣陵太守沈懷文以吕祖謙標目修夏四月宋貴妃殷氏卒以通鑑修解題曰按宋史列傳南郡王義宣女也義宣敗後帝密取之寵冠後宫假姓殷氏或云殷琰家人入義宣家義宣敗入宫云事見通鑑冬十月壬申宋塟殷貴妃以吕祖謙標目修是歲宋南徐州從事史祖沖之上新厯不果用以厯志修解題曰葉適曰自蔡邕杜預用新術治厯至何承天祖沖之攷索愈精承天以月蝕之衝推日躔次沖之定古術之作在漢初周末所謂求詳於未差之前盖劉歆班固所不能到也事見通鑑宋世祖孝武皇帝大明七年魏高宗文成皇帝和平四年春正月庚寅宋以晉安王子勛爲前將軍江州刺史以本紀修夏四月甲子宋詔非軍陳不得專殺以吕祖謙標目修冬十二月辛丑魏制喪塟嫁娶條格以魏紀修己未宋江夏王義恭加尚書令以通鑑修時宋大脩宫室以吕祖謙標目修宋世祖孝武皇帝大明八年魏高宗文成皇帝和平五年夏閏五月壬寅宋江夏王義恭領太尉以通鑑修庚申宋主殂太子子業即皇帝位江夏王義恭解尚書令加中書監驃騎大將軍柳元景領尚書令輔政大事與沈慶之參决甲子義恭錄尚書事元景開府以吕祖謙標目修秋七月庚戍宋尊皇太后曰太皇太后皇后曰皇太后乙卯罷孝建以來所改制度以本紀修宋江夏王義恭避事政歸戴法興等以通鑑修八月己丑宋皇太后殂以本紀修是歳宋青州移治東陽以通鑑修宋太宗明皇帝泰始元年年魏髙宗文成皇帝和平六春正月乙未朔宋改元永光以吕祖謙標目修解題曰宋庠紀年通譜永光本漢元帝年號二月庚寅宋更鑄二銖錢以本紀修初魏世祖經營四方國頗虚耗重以内難髙宗與時消息懷集中外民心復安夏五月癸卯魏主殂甲辰太子𢎞即皇帝位尊皇后曰皇太后以吕祖謙標目修戊申魏車騎大將軍乙渾殺司徒平原王陸麗等己酉自爲太尉錄尚書事以魏紀修六月魏開酒禁以本紀修魏上諡曰文成皇帝廟號髙宗以本紀修秋七月癸巳魏乙渾自爲丞相以魏紀修八月魏塟金陵以本紀修辛酉宋殺越騎校尉戴法興等癸酉殺江夏王義恭柳元景尚書僕射顔師伯等改元景和以吕祖謙標目修宋并東揚州於揚州以吕祖謙標目修九月辛丑宋殺南徐州刺史新安王子鸞以本紀修己酉宋主討征北將軍徐州刺史義陽王昶昶出奔魏以吕祖謙標目修甲寅宋以安西長史袁顗爲雍州刺史本紀宋聽民私鑄錢以本紀修冬十一月宋寧朔將軍何邁謀立鎮軍將軍江州刺史晉安王子勛以紀傳修宋殺太尉沈慶之以本紀修壬寅宋立皇后路氏以本紀修宋主拘錄諸父南豫州刺史湘東王彧等於殿内賜晉安王子勛死長史鄧琬奉子勛反於尋陽以本紀修戊午宋主殺南平王鑠三子彧弑之己未殺司徒揚州刺史豫章王子尚十二月癸亥驃騎大將軍建安王休仁爲司徒尚書令揚州刺史丙寅彧即皇帝位改元本紀解題曰宋庠紀年通譜泰始本晉武帝程道養年號戊寅尊太皇太后爲崇憲皇太后立妃王氏爲皇后以紀傳吕祖謙標目修解題曰按后妃傳晉武帝採漢魏之制置貴嬪夫人貴人是爲三夫人位視三公淑妃淑媛淑儀脩華脩容脩儀婕妤容華充華是爲九嬪位視九卿其餘有美人才人中才人爵視千石以下至宋髙祖省二才人世祖省夫人脩華脩容置貴妃位比相國進貴嬪位比丞相貴人位比三司以爲三夫人又置昭儀昭容昭華以代脩華脩儀脩容又置中才人充衣以爲散位太宗省淑妃昭華中才人充衣復置脩華脩儀脩容才人良人又省貴人置貴姬以備三夫人之数又置昭華增淑容承徽列榮以淑媛淑儀淑容昭華昭儀昭容脩華脩儀脩容爲九嬪婕妤容華充華承徽列榮凡五職亞九嬪美人中才人才人三職爲散役其後擬外百官備位置内職沈約論曰元嘉以降内職稍繁椒庭傍觀千門萬戸而滛粧怪飾變炫無窮自漢氏昭陽之輪奐魏室九華之昭曜曾不能槩其萬一宋罷二銖錢禁鵝眼綖環錢以通鑑修宋雍郢荆州㑹稽皆應晉安王子勛以朱熹綱目修宋太宗明皇帝泰始二年天安元年魏顯祖獻文皇帝拓䟦𢎞春正月己丑朔魏改元以魏紀修甲午宋建安王休仁都督征討軍事乙未子勛即皇帝位改元義嘉徐司豫青冀湘廣梁益州皆應之兖州刺史殷孝祖赴建康遣都督前鋒加撫軍將軍時吳郡吳興義興晉陵山陽並應子勛宋主分軍討壽陽㑹稽以本紀吕祖謙標目修解題曰按州郡志廣州領南海宋廣惠循二州肇慶府之地蒼梧梧封昭藤四州之地晉康德慶府髙籐二州之地新寧肇慶德慶府新南思二州之地永平梧潯昭三州之地海昌屬高州宋熈屬肇慶府寧浦横州晉興邕象横賓廉欝林六州之地樂昌肇慶府廣横二州之地郡十壬子宋主弑崇憲皇太后以宋書修解題曰按宋史列傳初明帝少失所生爲太后所撫養撫愛甚篤及即位供奉禮儀不異舊日及聞義嘉難作太后心幸之延上飲酒置毒以進侍者引上衣上悟起以其巵上壽是日太后崩秘之二月己未朔宋將軍吳喜平義興以通鑑修庚申魏乙渾謀反伏誅太后臨朝高允等參大政以通鑑修宋吳喜平㑹稽定二吳以吕祖謙標目修宋晉安王子勛前鋒據赭圻三月庚寅殷孝祖戰死之辛卯撫軍將軍沈攸之大破之賊保濃湖以通鑑修壬子宋斷新錢專用古錢本紀夏四月辛酉宋拔赭圻以吕祖謙標目修秋七月丁酉宋以仇池太守揚僧嗣爲武都王以本紀修己亥宋將軍張興世城錢溪八月濃湖軍潰輔國將軍沈攸之等克尋陽殺子勛解題曰按宋書齊書本紀列傳泰始元年十二月鎮軍將軍江州刺史晉安王子勛反長史鄧琬爲其謀主雍州刺史袁顗率衆赴之二年正月甲午司徒建安王休仁都督征討諸軍事王𤣥謨除大將軍江州刺史副建安王於赭圻沈攸之爲尋陽太守率軍據虎檻在繁昌縣東五十里乙未子勛即皇帝位四方貢計皆歸尋陽朝廷所保唯丹陽淮南数郡兖州刺史殷孝祖入衛京都仍遣孝祖前鋒南伐二月鄧琬遣孫沖之帥將軍薛常寶等前鋒一萬攻赭圻沖之於道與子勛書曰舟檝已辦器械亦整人爭效命便欲㳂流挂帆直取白下願速遣陶亮衆軍兼行相接分據新亭南洲則一麾定矣乃加沖之左衛將軍以陶亮爲右衛將軍統州兵俱下亮本無幹畧聞休仁自上殷孝祖又至不敢進屯軍鵲州三月三日水陸攻赭圻亮等率衆來救殷孝祖爲流矢所中死建安王休仁遣將軍江方興劉靈遺各領三千赴赭圻攸之以爲孝祖既死賊有乘勝之心明日若不更攻則示之以弱方興名位相亞必不爲已下軍政不一致敗之由乃率諸軍主詣方興曰四方並反國家所保無復百里之地唯有殷孝祖爲朝廷所委頼鋒鏑纔交輿尸而反文武喪氣事之濟否唯在明旦一戰戰若不捷則大事去矣詰朝之事諸人咸謂吾應統之自卜懦薄幹畧不辦及卿今輙相推爲統但當相與戮力耳方興甚恱攸之既出諸軍主並尤之攸之曰吾本以濟國活家豈計彼此之升降且我能下彼彼必不能下我共濟艱難豈可自厝同異沖之謂陶亮曰殷孝祖裊將一戰便死天下事定矣不須復戰便當直取京都亮不從明旦大破賊於城外追奔至姥山在當塗縣西北四十五里馬鞍山之北冲之等於湖白口蕪湖縣東南五十里有白岸湖築二城爲張興世所拔尋假沈攸之節代孝祖督前鋒諸軍事陶亮聞二城䧟大懼急呼沖之還鵲尾畱薛常寶代守先於姥山及諸岡分立營砦亦敗還共保濃湖濃湖即在鵲尾鄧琬又遣豫州刺史劉胡率衆三萬鐵騎二千屯鵲尾攸之等甚憚之胡入鵲尾無他權畧將軍吳喜平三吳率所領五千人至赭圻於戰鳥山築壘今南陵縣南十五里有戰鳥山在赭圻下流十許里攸之分遣水軍乘勢進討常寶在赭圻食盡劉胡以囊盛米繫流查及船腹陽覆船順風流下以餉赭圻攸之疑其有異遣人取船及流查大得囊米劉胡率步卒一萬夜斫山開道以布囊運米餉赭圻平旦至城下猶隔小塹未能入攸之帥衆軍攻之殊死戰胡衆大敗捨粮棄甲縁山走追獲甚衆常寶惶懼無計四月開城突圍走攸之率諸軍擊之赭圻城䧟建安王休仁自虎檻進屯赭圻劉胡遣陳紹宗出鵲外挑戰吳喜等擊之追至鵲裏而還攸之等與胡相持久不决上又遣將軍任農夫等領兵繼至六月雍州刺史袁顗率樓船千艘來入鵲尾張興世建議曰賊據上流兵彊地勝我今雖相持有餘而制敵不足今若以兵数千潛出其上因險自固隨冝斷截制賊之奇莫過於此攸之吳喜並賛其計興世乃令輕舸泝流而上旋復回還三日輒復如此使不爲之備劉胡笑之興世曰上流唯有錢溪可據地既險要江又甚狹去大衆不逺江有洄洑船下必來泊岸有横浦可以蔵船乃夜渡湖口至鵲頭元和郡縣志鵲頭鎮在宣州南陵縣西一百一十里即春秋時鵲岸也沿流八十里有鵲尾洲吳時屯兵處秋浦志鵲尾在江北鵲頭在江南因復回不疑之四更值風直前賊再遣胡靈秀諸軍於東岸相翼而上夕住景洪浦宿賊亦不進夜潛遣黄道標領七十舸徑據錢溪立城砦明旦興世與軍齊集停一宿劉胡自領二十六軍平旦來攻將士欲迎擊之興世禁之曰賊來尚逺而氣盛矢驟驟既力盡盛亦易衰治城如故賊來轉近乃命壽寂之任農夫率壯士擊之胡敗走時城壘未固建安王休仁慮賊并力攻錢溪命攸之等攻濃湖苦戰連日是日胡果率衆軍欲更攻錢溪未至数十里袁顗以濃湖之急遽追之錢溪城由此得立劉亮率衆所領至胡砦下胡遣其副孫遲取亮不能得亮左右斬遲袁顗曰賊入我肝臓裏何由得活興世粮盡爲賊所逼將軍李安民主舟乘数百越賊五城送米與興世劉胡帥輕舸四百由鵲頭内路欲攻錢溪既而謂其長史王念叔曰吾少習步戰未閑水鬬非萬全之計吾不爲也乃託瘧疾住鵲頭不進遣將軍陳慶領三百舸向錢溪戒不須戰慶於梅根立砦今銅陵縣有梅根治胡遣王起領百舸攻興世興世大破之胡馳還顗更使胡攻興世休仁命攸之等攻濃湖造皮艦千乘拔其營栅苦戰移日大破之顗急召胡還尋陽遣軍至南陵銅陵本漢南陵縣不敢下賊衆漸饑胡遣安北府司馬沈仲玉領千人步取南陵迎粮仲玉領米三十萬斛錢布数十舫豎榜爲城規欲突過行至貴口在今池州貴池縣不敢進胡遣重軍援接興世寂之農夫安民等三千人至貴口擊之仲玉走還顗營悉虜其資實胡衆駭懼胡誑顗云更帥步騎二萬上取興世兼下大雷餘餫令顗悉度馬配之其夜委顗趣梅根先令薛常寶辦船悉發南陵諸軍燒大雷諸城而走顗聞胡走亦棄衆西奔至青林見殺餘見通鑑九月宋殺郢州刺史安陸王子綏荆州刺史臨海王子頊湘州刺史邵陵王子元以吕祖謙標目修己酉魏初立郡學以本紀修冬十月乙卯宋殺永嘉王子仁等十人世祖二十八子至是遂盡以本紀修宋徐州刺史薛安都汝南太守常珍奇等降乙亥命將軍張永等迎之安都珍奇降魏以吕祖謙標目修解題曰太宗謂蔡興宗曰頃日人情云何事當濟否興宗曰今商旅斷絶而米甚豐賤四方雲合而人情更安以此卜之清蕩可必但臣之所憂更在事後禇淵以手版築興宗興宗言之不已上曰如卿言今事猶未平也至是帝之念慮已異前日賈勇示威遂使降者轉側興宗之慮豈不逺哉事見通鑑戊寅宋立子昱爲太子以吕祖謙標目修魏救彭城懸瓠十一月壬子宋兖州刺史畢衆敬降之以通鑑修解題曰按魏書列傳安都以城入魏衆敬不同其謀子元賓以母并百口悉在彭城恐交致禍日夜啼泣遣請衆敬衆敬猶未從之衆敬先已遣表謝授兖州刺史而以元賓有他罪獨不捨之衆敬拔刀斫柱曰皓首之年唯有此子今不原貸何用獨全遂以城降魏夫以他罪殺一畢元賓而兖州喪敗則前日蔡興宗所謂普天同逆冝鎮以静以至信待人逆徒親戚布在宫省宜明罪不相及之義者豈非至言也哉事見通鑑十二月宋豫州刺史殷琰益州刺史蕭惠開梁州刺史柳元怙降益州刺史劉勔克壽陽以本紀通鑑修是歲宋僑立兖州於淮隂徐州於鍾離青冀二州於欝洲以本紀通鑑修大事記續編卷三十七
