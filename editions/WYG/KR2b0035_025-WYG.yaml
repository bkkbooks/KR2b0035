body:
  text: 大事記續編卷二十五明王禕撰晉世祖武皇帝太康元年春二月庚申龍驤將軍王濬等克吳西陵甲戌杜預克江陵乙亥以濬都督梁益州軍事賈充移屯項濬克武昌解題曰項宋淮寧府項城縣古項國也王濬之克武昌也賈充遣使表曰吳未可悉定方夏江淮下濕疾疫必起宜召諸軍以為後圖雖腰斬張華不足以謝天下華預平吳之䇿故充以為言中書監荀朂奏冝如充表帝不從餘見通鑑陸㳺曰禍機亂萌伏於𨼆㣲識者逆見而力止之王猛之於秦是也投機之㑹轉眄已移而常人闇於事機私憂過計馮道之於周是也至於賈充之沮伐吳何説哉盖自漢之季數十年間庸人習見南北分裂謂為故常赤壁之役以魏武之雄而大敗塗地終身不敢南鄉充之心盖竊料吳未可下因為先事之言以徼後日之福而不料天下之遂一也道不足道也若充與猛所謂差毫厘而繆千里者也二月吳張悌與楊州刺史周浚戰死之解題曰按列傳干寶晉紀王渾遣参軍陳慎都尉張喬攻尋陽瀬鄉吴太子登鎮武昌晝夜兼行到瀬鄉自門即此地也張悌孫震沈瑩帥衆三萬濟江圍張喬於楊荷今和州厯陽縣北二十里喬衆才七千閉柵告降諸葛靚欲屠之悌曰強敵在前不宜先事其小且殺降不祥靚曰此等以救兵未至而力少故且偽降以緩我非來伏也因其無戰心而盡坑之可以成三軍之氣若舍之而前必為後患悌不從與周浚成陣相對沈瑩領丹陽鋭卒刀楯五千馳淮南軍三衝不動退引衆亂薛勝蔣班因其亂而乗之呉軍土崩將帥不能止張喬又出其後大敗吳軍餘見通鑑按王渾傳吴丞相張悌大將軍孫震等率衆數萬指城陽渾遣司馬孫疇楊州刺史周浚擊破之臨陣斬二將首虜七千八百級許嵩建康實録王渾周浚攻䧟江西屯戍後主使張悌諸葛靚等督沈瑩孫震帥衆渡江逆之圍都尉張喬於楊荷與周浚等成陣相對吴軍大敗靚等収散兵走呼悌悌不肯退為亂兵所殺二月王渾周浚等進屯横江後主聞悌軍没甚懼自選羽林精甲以配瑩震等屯于板橋己未王濬直指建康司馬佃率六軍濟自三山遣周浚張喬等破吳軍於板橋瑩等皆遇害按周浚張喬先破張悌沈瑩等於楊荷後又破沈瑩等於板橋故陳夀孫皓傳書王渾斬丞相張悌丹楊太守沈瑩等所在戰克通鑑取襄陽記干寳晉記所載大畧與實錄合但㩀本紀俱為周浚大敗吳軍於板橋獲悌震瑩等未免合兩戰為一三山在建康南二十里司馬佃濟自三山沈瑩等禦之板橋其軍既敗後主乃降壬寅濬至石頭呉主皓降夏四月甲申封皓為歸命侯解題曰吳自大帝黄武元年更四主有國五十九年自漢初平元年歲在庚午闗東兵起天下大亂分為三國凢九十一年至庚子而復一皇甫謐曰三帝鼎立不足方漢之二郡以二郡之民供三帝之用斯已勤矣又况三輔流民收於蜀郡江淮商旅募為吳卒而魏武制錯役之法分離天下使人役户各居一方其離逖轉徙之輩又何可勝言哉乙酉改元遣使撫慰荆揚除吳苛政五月擢吳舊望將吏渡江者復十年百姓復二十年安東將軍王渾表濬違節度有司請檻車徴濬帝弗許進渾爵為公以濬為輔國大將軍封襄陽縣侯餘賞賜有差以紀傳通鑑及舉要厯補遺修解題曰成王濬之功者杜預也攘王濬之功者王渾也預於濬未就之功懸以許之渾於濬垂成之功必欲掩之人情之相逺也如此事見通鑑秋九月庚寅賈充等請封禪弗許以通鑑修解題曰事見通鑑計有功曰晉之禍始於武帝之怠荒怠荒故致姦䛕之禍姦䛕擅權故致宫閫之蠱宫闈用事故致藩王之變外失藩垣之固而疆場亡備則逺夷乘隙而禍起於夷狄内有交侵之警則悍將矜功而禍起於權臣自武帝平吳浸淫蔓衍至隋開皇而天下始一侈心一動而海内分裂者三百二十四年可不畏哉錢勰曰晉武帝謂鄒湛曰吾平天下而不封禪焚雉頭裘行布衣禮夫不封禪以為不自滿也焚雉頭裘以為儉也行布衣禮以為孝也是數者皆區區可以自名而非天下之先務湛無經國之慮􅃍以為過漢文何不曰陛下以為不自滿不如無去州郡之武備以為儉不如無納吳宫人數千以為孝不如擇賢嗣而使宗廟血食幸而感悟則山濤之論得行州郡之兵可復則雖永寧之後八王五胡之亂未至於一敗塗地也呉宫之人可出羊車之㳺有所則治天下之志未荒也衛瓘之言見察昏弱之恵遂廢則晉祚靈長未可量也湛不知為此專為逢迎牽合之語可為長太息也是歲以司𨽻所統置司州凡十九州以地理志及通鑑修解題曰按晉地理志宋州郡志禹制九州兾兖青徐揚荆豫梁雍周以徐并青以梁并雍分兾為幽并漢立徐梁二州武帝南置交趾北置朔方改雍曰凉改梁曰益為十三州司𨽻三輔三河東京無朔方改交趾曰交州凡十二州司𨽻如故三國吳得揚荆交三州蜀得益州魏猶得九焉并司𨽻言之也吳分交為廣魏平蜀分益為梁太康一統凢十六州後又分凉雍為秦荆揚為江益為寧幽為平而為二十矣凡增置郡國二十有三榮陽上洛頓丘臨淮東筦襄城汝隂長廣寗昌黎新野隨郡隂平義陽毗陵宣城南康晉安寧浦始平畧陽樂平南平省司𨽻置司州别立梁秦寧平四州仍吳之廣州凡十九州司兾兖豫荆徐揚青幽平并雍梁秦凉益寧交廣郡國一百七十三今計一百七十五元作七十三恐誤仍呉所置二十五仍蜀所置十三仍魏所置二十一仍漢舊九十三置二十二以為冠帶之國盡有殷周之土今按司州統郡十二河南宋河南河陽潁昌三府鄭汝虢三州之地滎陽河陽河南開封三府鄭州之地𢎞農河南府陜華虢三州之地上洛河南京兆二府商號二州之地平陽平陽河陽河中三府澤隰綘西慈四州之地河東河中河陽二府陜解綘三州之地汲河陽府衛懐濬相四州之地河内河陽府懐衛二州之地廣平信德隆德二府洛磁二州之地陽平大名開德東平三府愽濟二州之地魏大名開德二府相磁濬三州之地頓邱開德大名二府之地通典司州治洛陽河南府兖治廪邱濮陽郡雷澤縣豫治項兾治房子趙郡縣并治晉青治臨淄徐治彭城荆初治襄陽後治江陵楊初治夀春後治建業凉治武威分三輔為雍治京兆隴山之西為秦治上邽益治成都分巴漢之地為梁治南鄭分雲南為寧治雲南幽治涿范陽郡范陽縣遼東為平治昌黎安東府交治昌編安南府分合浦之北為廣治畨禺詔罷州郡兵刺史不領兵山濤諌不聴以列傳及通鑑目録修解題曰葉適曰漢光晉武銷兵本欲休息百姓而學者尤以其弛備致患然則左射貍首右射騶虞禆冕搢笏明堂耕籍此成周銷兵節次也銷兵未必非視其君思治進德何如耳不然則後世能不忘戰者豈少耶事見通鑑侍御史郭欽請徙羗胡於邉不聽以通鑑修制户調之式以食貨志修解題曰武帝平吳之後制户調之式丁男之户歲輸絹三匹緜三觔女及次丁男為户者半輸邉郡或三分之二逺者三分之一夷人輸賨户男子人占田七十畝女三十畝其外丁男課田五十畝丁女二十畝次丁男半之女則不課男年十六至六十為正丁十五至十三六十一至六十五為次丁十二已下六十六已上為老小不事其官品第一至于第九各以貴賤占田成帝始度百姓田取十分之一率畝稅米三升哀帝减田租畝收二升孝武除度田收租之制公王以下口税三斛八年又增税米口五石慕容皝以牧牛給貧家田苑中公收其八二分入私有牛而田苑中公収其七三分入私叅軍封裕諌曰魏晉雖道消之世猶削百姓不至於七八持官牛田者官得六分百姓得四分私牛而官田者中分臣猶曰非明王之道而况增乎皝乃令苑囿悉罷以給百姓無田業者貧老各賜牛一頭若樂取官牛墾官田者依魏晉法李雄賦男丁歲穀三斛女丁半之户調絹不過數丈綿數兩晉世祖武皇帝太康二年春三月詔選孫皓宫人五千人入宫以本紀修冬十月鮮卑慕容渉歸冦昌黎以通鑑修解題曰燕之先也是歲揚州刺史移治秣陵以吕祖謙標目修晉世祖武皇帝太康三年春正月丁丑朔帝親祀南郊以禮樂志修解題曰程逈曰周王冬至祀昊天上帝于圓丘魯侯啓蟄而郊以祀五方帝武帝天子也從魯人之祭之時非禮也車騎司馬傅咸上書論奢侈以列傳修甲午出尚書張華都督幽州軍事以本紀吕祖謙標目修夏四月庚午魯武公賈充薨以本紀修荀朂等請遣齊王攸之國冬十二月甲申以攸為大司馬都督青州軍事汝南王亮為太尉録尚書事領太子太傅征東大將軍王渾光禄大夫李熹中護軍羊琇等請留攸不聽以紀傳吕祖謙標目修解題曰渾上書曰攸於大晉姬旦之親也宜贊皇朝與聞政事實為腹心不貳之臣今出攸之國假以都督虚號而無典戒幹方之實傷至親之體虧友于之義懼非陛下追述先帝太后待攸之宿意也若以妃后外親任以朝政則有王氏傾漢之權吕産專朝之禍若以同姓至親則有吳楚七國逆亂之殃厯觀古今茍事之輕重所在無不為害也不可事事曲設疑防慮方來之禍也若以智計猜物雖親見疑至於疏者亦何能自保乎人懐危懼非為安之理此最國家之深忌也愚以為太子太保闕宜留攸居之與汝南王亮楊珧共為保傅幹理朝事三人齊位足相持正餘見通鑑蘇轍曰渾之言天下之至言也帝不能用而用王佑之計使太子母弟秦王柬都督闗中楚王瑋淮南王允並守要害以強帝室然晉室之亂實成於八王如攸之親賢奪嫡之禍非其志也不幸至此天下所宗宗社之計猶有頼也如佑之計使子弟㩀兵以捍外患如梁孝王之禦吳楚尚可若變從中起而使人握兵以救内難此與何進袁紹召丁原董卓以除宦官何異古人有言擇福莫若重擇禍莫若輕如帝之擇禍福可謂不審矣晉世祖武皇帝太康四年春正月詔太常議崇錫齊王攸之物慱士庾旉祭酒曹志以為攸宜輔政坐除名免官以通鑑修三月辛丑朔日有食之以本紀修齊獻王攸薨以本紀修冬十一月大水以本紀修歸命侯孫皓卒以吕祖謙標目修甲辰晉世祖武皇帝太康五年春二月壬辰地震以本紀修冬十二月庚午大赦以本紀修閏月當陽成侯杜預卒以本紀修是歲塞外匈奴胡降處之西河以通鑑修罷寧州入益州以吕祖謙標目修尚書僕射劉毅等請罷郡國中正更用􅁟斷不果行以列傳修解題曰按魏晉史通典魏文帝為王時三方鼎立士流播遷四民錯雜詳覈無所吏部尚書陳羣乃立九品官人之法州郡皆置中正以定其選擇州郡之賢有識鑒者為之區别人物䇿其高下其武官之選俾護軍主之夏侯𤣥為中護軍太傅司馬懿問以時事𤣥議以為官人國之柄也故銓衡專於臺閣上之分也孝行存乎閭巷優劣任之鄉人下之叙也夫欲清教審選在明其分叙不使相渉而已若令中正但考行倫輩輩當行均斯可官矣奚必使中正平銓衡之機於下而執柄者有所倚仗於上哉衆職之屬各有官長但使官長各以其屬能否獻之臺閣則㩀官長能否之䇿㕘以鄉閭德行之次勿使偏頗中正則唯考其行迹勿使升降臺閣總之官長所第中正輩擬比隨次率而用之如其不稱則内外相􅄁得失有所矣晉制内官吏部尚書司徒左長史外官周有大中正郡國有小中正皆掌選舉若吏部選用必下中正徴其人居及父祖官名其後中正任久愛憎由己而法漸弊遂計官資以定品格唯以居位者為貴劉毅上疏曰立中正定九品高下任意榮辱在手一人之身旬日異狀是以上品無寒門下品無勢族一也置州都者取州里清議所歸將以鎮異同一言議不謂一人之身了一州之才一人不審便坐之二也本立格之體為九品者謂才德有優劣倫輩有首尾今乃使優劣易地三也陛下賞善罰惡無不裁之以法獨置中正委以一國之重無賞罰之防四也前聖敦風俗隆鄉黨之義故天下之人退而脩本今一國之士多者千數或流徙異邦或取給殊方面猶不識况盡其才五也凡所以立品設狀者求人才以理物也今於限當報雖職之高遷還附卑品無績於官而獲高叙是為抑功實而崇虚名六也凡官不同事人不同能今品不狀才能之所宜而以九等為例以品取人或非才能之所長以狀取人則為本品所限徙結白論以為虚譽七也九品所下不彰其罪所上不列其善廢褒貶之義任愛憎之斷人焉得不懈德行而鋭人事八也疏奏優詔答之衛瓘與汝南王亮上疏曰魏氏承顛覆之運人士流移詳考無地故立九品之制今九域同規臣等以為自公卿以下皆以所居為正無復懸客逺屬異􅁟者盡除九品之制使舉善進才各由鄉論則奔競自息矣始平王文學李重上疏曰九品始於喪亂軍中之政誠非經國不刋之法今仕無常朝人無定處即吏蓄於軍府豪右聚於都邑事體駁錯與古不同謂九品既除冝先開移徙聽相并就且明貢舉之法不濫於境外則冠帶之倫將不分而自均􅁟斷之實行矣今攷晉世中正之選魏舒以司徒署兖州何兖以中書令領揚州王述以衛將軍領并兾幽平四州丁譚以光禄大夫領吴國任之重也劉毅以峭直既老復推而為青州顔含以操行而為徐州王嶠以風尚王坦之以重名而為并州顧衆以孝聞而領揚州選之精也李重為江夏中正則不行孔嚴為揚州大中正則不就猶有遜讓之風也陳夀居喪使婢丸藥積年沉廢郄詵篤孝以假葬違常降品一等則名義之可畏也劉沉為燕國中正敦儒道愛賢能進霍原而理張華何攀為梁益二州中正引致名士咸免寃濫則區别之有方也劉沉舉霍原為寒素司徒府不從沉奏中書復下司徒参論吏部郎李重奏原應二品是吏部郎得正議也淮南小中正王式以繼母為出母中丞卞壺併劾司徒大中正不能舉奏是中丞得舉職也公論相維上下無壅所以立法厯數百年而不可變歟晉世祖武皇帝太康六年秋八月丙戌朔日有食之以本紀修是歲慕容廆冦遼西以吕祖謙標目修晉世祖武皇帝大康七年春正月甲寅朔日有食之以本紀修夏慕容廆冦遼東以本紀修秋匈奴胡降以通鑑修冬十二月始制大臣終三年喪以本紀修解題曰鄭黙拜大鴻臚遭母喪舊制既葬還職黙自陳懇至遂改法定令聽大臣終喪自黙始也晉世祖武皇帝太康八年春正月戊辰朔日有食之以本紀修太廟殿䧟秋九月改營之以本紀修是歲匈奴都督率種落來降以通鑑修解題曰北狄以部落為類其入居塞者凡十九種皆有部落不相錯雜屠各最豪貴故得為單于綂領諸國武帝不惟不能聽郭欽之言駈之境外方且撫納降胡源源不絶曾不數年而都散叛矣史臣謂生靈塗地凶族滔天武皇之失也諒哉事見通鑑晉世祖武皇帝太康九年春正月壬申朔日有食之以本紀修夏四月地震以本紀修六月庚子朔日有食之以本紀修大旱以本紀修秋八月壬子星隕如雨以本紀修晉世祖武皇帝太康十年夏四月太廟成乙巳祫祭以本紀修慕容廆降五月以為鮮卑都督以本紀修冬十月復郊祀五帝位以通鑑修解題曰詔曰孝經郊祀后稷以配天宗祀文王於明堂以配上帝而周官云祀天旅上帝又曰祀地旅四望望非地則明堂上帝不得為天徃者除明堂五帝位攷之禮文不正且詩序曰文武之功起於后稷故推以配天焉宣帝創業既以配天復以先帝配天於義亦所不安其復五帝位楊駿排汝南王亮十一月甲申以亮為大司馬假黄鉞大都督豫州軍事秦王柬楚王瑋淮南王允之國各督方州軍事封子五人孫三人為王以本紀通鑑修淮南相劉頌上疏論政不聽以列傳修以劉淵為匈奴北部都尉以載記修晉世祖武皇帝太熈元年孝恵皇帝𠂻永熈元年春正月辛丑朔改元以本紀修楊駿惡司空尚書令衛瓘詔瓘以太保就第以通鑑修三月帝疾篤詔留汝南王亮與楊駿同輔政駿匿之夏四月辛丑駿為太尉太子太傅都督中外諸軍事録尚書事本紀解題曰蘇轍曰漢高帝始謂恵帝仁弱欲廢之而立如意既而知人心之在太子也則寢廢立之議而用平勃平勃皆賢而權任均故恵帝雖没産禄雖横而援立文帝漢室不病也武帝既老知燕王旦廣陵王胥之不可用也廢之而立少子任霍光金日磾上官桀桑宏羊以後事當是時昭帝之賢否未可知而四人枉直相半也幸而昭帝明哲霍光忠良桀羊雖欲為亂而不遂其後復廢昌邑立宣帝而朝廷晏然無患盖人君不幸而立幼主當如二帝屬任賢臣乃免於亂魏明帝疾篤而立齊王始欲輔以曹宇曹肇而劉放孫資不便勸帝易以司馬仲逹曹爽齊王既非天下之望而爽又以庸才與仲逹為對數年之間遂成簒弑之禍武帝親見之矣恵帝之不肖羣臣舉知之而牽制不忍忌齊王攸之賢而恃愍懐之慧以為可以消未然之憂獨有一汝南王亮而不早用舉社稷之重而付之楊駿至於一敗塗地無足恠也事見通鑑己酉帝崩于含章殿皇太子𠂻即皇帝位改元解題曰宋庠紀年通譜不俟踰年改元尊皇后曰皇太后立妃賈氏為皇后五月辛未塟孝武皇帝于峻陽陵廟號世祖以本紀修丙子詔加羣臣封爵楊駿為太傅大都督假黄鉞録朝政百官總已以聽以紀傳修秋八月壬午立子廣陵王遹為皇太子以本紀修冬十月辛酉以劉淵為將軍匈奴五部大都督以載紀修大事記續編卷二十五
