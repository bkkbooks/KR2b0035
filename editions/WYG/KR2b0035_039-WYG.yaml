body:
  text: 大事記續編卷三十九明王禕撰齊太祖髙皇帝蕭道成建元元年魏高祖孝文帝太和三年春正月甲辰宋以蕭嶷爲鎮西將軍都督荆湘等八州軍事荆州刺史辛亥以蕭賾爲尚書僕射中軍大將軍開府以本紀修三月癸卯朔日有食之以本紀修甲辰宋蕭道成自爲相國齊公加九錫以吕祖謙標目修庚戌宋齊公道成殺臨川王綽以通鑑修夏四月壬申朔宋齊公道成自進王爵以吕祖謙標目修甲戌宋齊王道成殺武陵王賛以通鑑修丙戌宋齊王道成自加殊禮甲午即皇帝位大赦改元以本紀修解題曰按本紀有犯鄉論清議一皆蕩除盖遵宋高祖之舊也宋庠紀年通譜建元本漢武帝劉聪晉康帝苻堅年號曹操司馬氏劉裕皆出身任人之事辛勤数十年而後得之未有如蕭道成楊堅初無功德在民徒恃其姿相扼吭而攘人之國者也故齊隋運祚亦最促数詩曰皇矣上帝臨下有赫監觀四方求民之莫維此二國其政不獲維彼四國爰究爰度上帝耆之憎其式廓乃眷西顧此維與宅天命其果僭哉事見通鑑廢宋帝爲汝隂王遷之丹揚奉朝請裴顗死之以吕祖謙標目修戊戌齊以子嶷爲尚書令楊州刺史以本紀修齊命羣臣言事以吕祖謙標目修魏罷候官以吕祖謙標目修五月辛亥齊斷衆募以吕祖謙標目修齊封功臣禇淵等有差以本紀修解題曰晁說之曰自開闢以來未有比肩近臣一旦北面稱翊賛佐命以本朝輸人者實自淵始事見通鑑己未齊弑汝隂王尋諡曰宋順帝辛酉殺宋宗室以吕祖謙標目修解題曰宋宗室之受禍尤烈於晉矣事見通鑑丙寅齊尊考妣曰帝后以本紀修齊徙兖州刺史垣崇祖爲豫州刺史以吕祖謙標目修六月甲申齊立王太子賾爲皇太子以吕祖謙標目修秋七月丁未齊赦交州以李長仁弟叔獻爲刺史以本紀修九月丙午齊司空禇淵領尚書令以通鑑修冬十一月癸丑魏遣梁郡王嘉等奉前義楊王昶伐齊以吕祖謙標目修齊太祖髙皇帝建元二年魏髙祖孝文帝太和四年春正月齊王儉爲左僕射以紀傳修二月丁卯魏攻齊壽陽垣崇祖破走之以紀傳修齊定簿籍以吕祖謙標目修齊分荆益州置巴州以吕祖謙標目修夏五月齊立六門都牆以本紀修秋八月魏冦齊以本紀修九月甲午朔日有食之以天文志修閏九月魏圍朐山敗還以通鑑修冬十月徐兖州民叛魏魏討之以魏紀通鑑修十一月戊子齊以楊後起爲武都王以本紀修十二月戊戍齊禇淵爲司徒豫章王嶷爲中書監司空楊州刺史以本紀修齊太祖髙皇帝建元三年魏髙祖孝文帝太和五年春正月魏攻齊淮陽敗走以本紀修解題曰按魏虜傳初虜至縁淮驅略江北居民懲佛貍時事皆驚走不可禁止乃於梁山置二軍南置三軍慈姥置一軍洌洲在建康府江寧縣西南七十里一名栗洲置二軍三山去洌洲可十里置二軍白沙洲未詳置二軍蔡洲置五軍長蘆在今真州六合縣置二軍菰浦未詳置二軍徐浦未詳置一軍餘見通鑑二月癸丑齊罷南蠻校尉以吕祖謙標目修秋七月己未朔日有食之以天文志修齊聘魏以吕祖謙標目修九月魏徐兖州平以吕祖謙標目修冬魏新律成以通鑑修齊太祖高皇帝建元四年魏髙祖孝文帝太和六年春三月庚申齊禇淵王儉受遺壬戌齊主殂本紀解題曰按齊紀帝少沈深有大量寛嚴清儉喜怒無色即位後身不御精細之物敕中書舍人桓景真曰主衣中似有玉介導此制始自大明末泰始尤增其麗畱此政是興長病源可即時打碎凡復有可異物皆冝隨例也毎曰使我治天下當使黃金與土同價欲以身率天下移變風俗蘓軾曰帝之意則善矣然豈有此理者哉孟子曰物之不齊物之情也巨屨小屨同價人豈爲之哉而孟子亦自忘其言爲菽粟如水火之論金之不可賤如土猶土之不可使貴如金也餘見通鑑太子賾即皇帝位乙丑淵錄尚書事儉爲尚書令以本紀吕祖謙標目修夏六月甲申朔齊主立子南郡王長懋爲皇太子以本紀修秋七月齊南康文簡公禇淵卒以本紀修九月楊文宏卒魏以楊後起爲武都王以通鑑目録修冬十一月魏祀廟牲牢器服依古制以吕祖謙標目修齊世祖武皇帝蕭賾永明元年魏高祖孝文帝太和七年春正月辛亥齊改元以通鑑修齊詔治民之官復田秩以吕祖謙標目修解題曰按齊史列傳宋武以來州郡秩俸及雜供給多隨土所出無有定凖豫章王嶷上表請明立定格班下四方永爲恒制夏四月壬午齊改塟袁粲劉秉沈攸之以通鑑修丁亥齊殺五兵尚書垣崇祖散騎常侍荀伯玉以吕祖謙標目修五月齊殺車騎將軍開府張敬兒以吕祖謙標目修秋七月魏聘齊以本紀修冬十二月朔日有食之以天文志修癸丑魏始禁同姓爲㛰以吕祖謙標目修是歳齊省巴州通鑑齊世祖武皇帝永明二年魏髙祖孝文帝太和八年齊中書舍人茹法亮吕文顯等縂重權夏六月壬寅封法亮望蔡男以吕祖謙標目修解題曰事見通鑑按齊史列傳法亮與㑹稽吕文慶臨海吕文顯並以姦謟事武帝文顯爲外監專制兵權領軍將軍守虚位而已法亮文慶並勢傾天下太尉王儉謂人曰我雖有大寄權寄豈及茹公武帝之治其體統乃如此丁卯魏増調帛榖始頒禄論贓以吕祖謙標目修齊世祖武皇帝永明三年魏高祖孝文帝太和九年春正月戊寅魏禁䜟緯巫覡以吕祖謙標目條齊復立國學夏五月開學士館以紀傳修冬十月丁未魏均給田以吕祖謙標目修解題曰按魏書紀傳志及通典太和元年三月詔曰去年牛疫死太半今東作既興人須肄業有牛者加勤於常歳無牛者倍傭於餘年一夫制治四十畝中男二十畝無令人有餘力地有遺利給事中李安世上䟽曰竊見州郡之人或因年儉流移棄賣田宅事渉数世三長既立始復舊墟强宗豪族肆其侵凌爭訟遷延連紀不判良疇委而不開冝更均量令力業相稱又所争之田宜限年斷事久難明悉屬今主帝深納之均田之制始於此矣九年給天下民田諸男夫十五以上受露田四十畝杜佑曰不裁樹者謂之露田婦人二十畝劉恕曰謂男夫之有婦者共受六十畝也奴婢依良丁牛一頭受田三十畝限四牛劉恕曰謂户内更有一丁未娶者反有牛一頭又受三十畝也丁牛雖多給田止於一百二十畝所授之田率倍之劉恕曰謂一丁一牛則倍三十畝三易之田再倍之以供耕作及還受之盈縮諸民年及課則受田老免及身沒則還田奴婢牛隨有無以還受諸桑田不在還受之限但通入倍田分於分雖盈不得以充露田之数不足者以露田充倍初受田者男夫一人給田二十畝課蒔餘種桑五十樹棗五株榆三根非桑之土夫給一畝依法課蒔餘果及多種桑榆者不禁諸應還之田不得種桑榆棗果種者以違令論地入還分諸桑田皆爲世業身終不還劉恕曰謂初受田者雖娶婦同一戸不復給田非桑之土惟種棗榆共八株故止給一畝下文云麻布之土男夫及課别給麻田十畝婦人五畝并榆棗地亦十六畝也桑田用力最多欲勸人種桑故賜爲永業由露田有還受故不得種桑麻恒從見口有盈者無受無還不足者受種如法盈者得賣其盈不足者得買所不足不得賣其分亦不得買過所足劉恕曰謂種桑不還之田計見在男夫及丁口其合給田畝外桑田有餘亦許爲主但不受亦不還耳若受少桑田者復受於官種桑果故盈者得賣不足者得買也諸麻布之土男夫及課别給麻田十畝婦人五畝奴婢依良皆從還受之法諸有舉戸老小癃疾無受田者年十一已上及癃者各受以半夫田年踰七十者不還所受寡婦守志者雖免課亦授婦田還受民田恒以正月諸土廣民稀之處隨力所及官借民種蒔後有來居者依法封授諸地狹之處有進丁受田而不樂遷者則以其家桑田爲正田分又不足不給倍田又不足家内人别減分無桑之鄊凖此爲法樂遷者聽逐空荒不限異州他郡唯不聽避勞就逸其地足之處不得無故而移諸民有新居者三口給地一畝以爲居室奴婢五口給一畝男女十五以上因其地分口課種菜五分畝之一諸一人之分正從正倍從倍不得隔越他畔進丁受田者常從所近劉恕曰謂取逐户傍近不必地相連諸宰民之官各隨地給公田刺史十五頃太守十頃治中别駕各八頃更代相付杜佑曰職分田起於此劉恕曰後魏志云諸逺流配謫無子孫及戸絶者墟宅桑榆盡爲公田以給授受觀均田制度似今佃官田及絶户田出租稅非如井田也劉石苻姚喪亂之後土田無主悉爲公田除兼并大族外貧民徃徃無田可耕故孝文分官田以給之然有分限丁口計畝給田老死還納别授壯者非若今世作全户稅佃不計其嵗月但不得典賣耳齊世祖武皇帝永明四年魏高祖孝文帝太和十年春正月癸亥朔魏朝㑹始服兖冕以本紀修解題曰按魏志髙祖畱意文史文章百篇冠絶終古太和已後詔誥並自運筆事見通鑑閏月楊後起卒齊魏皆以楊集始爲武都王以本紀修二月甲戌魏立黨里鄰三長定民户籍以吕祖謙標目修解題曰王通曰民不里居田不井授終茍道也魏孝文之治國也庶乎其不茍矣事見通鑑夏四月辛酉魏始置五等公服以吕祖謙標目修秋九月辛卯魏作明堂辟雍以通鑑修是歲魏分置州郡以通鑑修齊世祖武皇帝永明五年年魏髙祖孝文帝太和十一春正月丁亥魏定樂章以朱熹綱目修戊子齊以太尉豫章王嶷爲大司馬車騎將軍竟陵王子良爲司徒衛將軍王儉中軍將軍王敬則並加開府以本紀修魏咸陽文公高允卒以吕祖謙標目修魏攻齊沘陽雍州刺史陳顯達大破之以通鑑修解題曰按州郡志廣平郡有沘陽縣屬今唐州沘音比夏魏大旱秋七月己丑聽民出關就食以魏紀修八月柔然寇魏魏大破之以本紀修九月魏出宫人冬十月罷工作散府藏以吕祖謙標目修齊世祖武皇帝永明六年年魏高祖孝文帝太和十二夏四月魏據隔城齊將軍曹虎大破之陳顯達拔魏醴陽城以吕祖謙標目修解題曰按水經注醴水出南陽雉山東流厯唐山下南逕唐城又東南逕葉縣故城北又東與葉西陂水㑹又東注葉陂又東逕潕陽故城北東逕郾縣故城南入汝齊世祖武皇帝永明七年年魏高祖孝文帝太和十三春正月辛亥魏主祀南郊始備犬駕以本紀修夏五月乙巳齊南昌文憲公王儉卒以本紀修秋八月魏聘宋冬十二月宋報之以吕祖謙標目修齊世祖武皇帝永明八年年魏高祖孝文帝太和十四秋八月齊殺荆州刺史巴東王子響以通鑑修九月癸丑魏太皇太后殂魏主欲行三年之喪羣臣諌乃服朞以吕祖謙標目修解題曰事見通鑑胡宏曰晉武魏文徒能知母而不知父豈禮也哉齊世祖武皇帝永明九年年魏高祖孝文帝太和十五春正月魏主始聽政以本紀修齊太廟薦褻味别祀于故宅以通鑑修夏四月己卯魏經始明堂改太廟以本紀修五月己亥魏主更立律令親决疑獄以本紀修丙辰魏造五輅以通鑑修秋閏七月己卯魏始定廟祧之制以通鑑修八月戊戌魏廢道壇以通鑑修乙巳魏定祭禮以本紀修解題曰按禮志帝臨皇信堂引見羣臣詔曰禮記祭法稱有虞氏禘黄帝大傳曰禘其祖之所自出稱不王不禘論曰禘自既灌詩頌長發大禘爾雅曰禘大祭也夏殷四時祫禘烝嘗周改禘爲祠王制稱犆祫祫禘祫嘗祫烝鄭𤣥解天子祭圓丘曰禘祭宗廟太祭亦曰禘三年一祫五年一禘魯禮三年喪畢而祫明年而禘祭有兩禘明也王肅稱天子諸侯皆禘於宗廟非祭天之祭禘祫一名也合而祭之故稱祫審禘之故稱禘三年一祫五年一禘縂而互舉之故稱五年再殷祭卿等便可議其是非尚書游明根等對曰鄭氏之議禘者大祭之名宗廟禘祫並行圓丘一禘而已依禮春廢犆祫於嘗於烝則祫不於三時皆行禘祫之禮中書監高閭等對圓丘之禘於鄭義同宗廟禘祫之祭與王義同長發大禘也殷王之祭斯皆非諸侯之禮諸侯無禘禮唯夏殷夏祭稱禘又非宗廟之禘魯行天子之儀不敢專行圓丘之禘改殷之禘取其禘名於宗廟因先有祫遂生兩名據王氏之義祫而禘祭之故言禘祫禘祫止於一時帝曰王以禘祫爲一祭王義爲長鄭以圓丘爲禘與宗廟大祭同名義亦爲當今互取二義著之於令冬十一月己未朔魏主禫於太和廟始即吉以吕祖謙標目修解題曰胡寅曰方孝文之欲三年也在廷之臣莫不沮遏帝心所陳每下非帝之至情先定幾何不爲邪說所惑喪禮曰百官備百物具不言而事行者扶而起齊衰之喪盖對而不言也若夫八事之權非經禮也今孝文百官備矣是宜三日而粥三月而沐期十三月而練冠三年而禘使禮廢而復起而羣臣狃於漢制雜以國俗使其君不得由改期而禘改月而禫是用古者父在爲母之服不中節矣無乃不得其本遂殺其末邪惜哉事見通鑑乙亥魏定官品以吕祖謙標目修乙酉魏始正四時迎氣以本紀志修十二月辛亥魏脩樂官以通鑑修大事記續編卷三十九
