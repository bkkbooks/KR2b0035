body:
  text: 大事記續編卷二十四明王禕撰晉世祖武皇帝泰始元年吳歸命侯甘露元年解題曰論三國之正統者以魏受漢禪則推而屬之魏以蜀為漢裔則推而屬之蜀以其莫相統一故以無統之例書之以及晉武既受魏禪而蜀漢亦以前年亡於是天下之統復合故自泰始元年復大書之明正統也春三月吳聘魏以通鑑修夏四月吳改元以吴志修解題曰宋庠紀年通譜甘露漢宣魏髙貴鄉公年號蔣陵甘露降故改元五月魏晉王昭用天子冕旒旌旗以魏志修秋七月吳弑景皇后尋殺其二子吳志八月辛卯魏晉王昭薨太子炎嗣位魏志冬吳徙都武昌吳志解題曰按諸葛恪嘗治武昌宫杜預亦慮孫皓怖而生計徙都武昌聚大舩於夏口則皓之徙都未為失計當時謀國如陸抗乃不及此何耶然人心之去吳已甚縱得地利亦豈足恃㢤事見通鑑十二月丙寅魏晉王炎自即皇帝位改元國號晉丁卯廢魏主為陳留王遷之于鄴以本紀修解題曰按劉羲叟長厯置閏在十二月則前十二月不應有丙寅考之魏志本紀閏九月則十二月乃長厯之閏十二月也魏亡上距黄初之元共五帝四十六年相臺志魏雖徙都洛陽而七廟猶在鄴及晉受魏禪奉魏帝為陳留王舎舘于鄴時魏之宗室與豪猾之民四方雜䖏於是建安北平北鎮北將軍之號命高泰王泰高陽王桂趙王倫梁王彤河間王顒成都王頴鎮鄴始則強榦弱枝終焉諸王席勢侵陵卒致石超肆凶嵇紹死難遂成元海石勒之竊㩀皆本乎鄴都所㩀之非也追尊祖考妣已下為帝后尊太妃玉氏曰皇太后以本紀修懲魏氏孤立之敝封叔祖父孚等二十七人為王授以職任以吕祖謙標目修解題曰按職官志本紀王置傳友文學改太守為内史省相及僕有即中令中尉大農為三卿餘有差封皇叔祖父孚為安平王叔父幹為平原王亮為扶風王伷為東莞王駿為汝隂王彤為梁王倫為琅邪王弟攸為齊王鍳為樂安王機為燕王餘見通鑑葉適曰晉武懲創魏氏尊任宗室付授乖繆開路屠戮轉則數四而盗賊諸胡乗之譬如無病之人既服毒藥自當致死所以猶未盡亡㓕者帝素寛厚未至得罪於民爾不然則晉之餘號安能尚存耶以驃騎將軍石苞為大司馬太保鄭冲為太傅太尉王祥為太保晉國丞相何曾為太尉餘増封爵有差以本紀修戊辰詔出御府珠玉賜王公以本紀修以太傅安平王孚為太宰車騎將軍陳騫為大將軍與司徒司空凡八公以紀志修解題曰太師太傅太保則古之三公太尉司徒司空則漢魏之所謂三公而其外又置大司馬大將軍也太師改為太宰避諱也晉志曰八公同辰攀雲附翼者也惟無丞相焉其後為之者非復尋常人臣之職杜佑通典云魏吳蜀多依漢制晉氏大抵畧同今以職官志攷之太宰太傅太保司徒司空左右光禄大夫光禄大夫開府位從公者為文官公大司馬大將軍太尉驃騎車騎衛將軍伏波撫軍都䕶鎮軍中軍四征四鎮龍驤典軍上軍輔國等大將軍開府位從公者為武官公特進左右光禄大夫光禄大夫録尚書事尚書令僕射列曹尚書左右丞尚書郎三十五曹侍中給事黄門侍郎散騎常侍給事中通直散騎常侍員外散騎常侍散騎侍郎奉朝請中書監令中書侍郎中書舎人通事舎人秘書監著作郎佐郎太常光禄勲衛尉太僕廷尉大鴻臚宗正大司農少府將作大匠大后三卿大長秋皆為列卿自少府已上皆有屬官御史中丞殿中侍御史治書侍御史之屬司𨽻校尉謁者僕射都水使者中領軍護軍將軍左右衛將軍驍騎遊擊將軍左右前後軍將軍屯騎歩兵越騎長水射聲校尉太子太傅少傅詹事中庶子中舎人庶子舎人洗馬家令僕左右衛率王置傳友郎中令中尉大農之屬州置刺史别駕郡縣置守令四中郎將或領刺史或持節為之赦王凌鄧艾家除魏宗室禁錮罷將吏質任以本紀修初置諌官以本紀修侍中荀朂為中書監以列傳修晉世祖武皇帝泰始二年吴歸命侯寶鼎元年春正月丁亥廟祭七室以紀志修丙午立皇后楊氏以本紀修郊祀除五帝座以禮樂志修解題曰羣臣議五帝即天地王氣時異故殊其號雖名有五其實一神明堂南郊冝除五帝之座五郊改五精之號皆同稱昊天上帝各設一座而已餘見通鑑新唐史禮樂志禮曰以禋祀昊天上帝此天也鄭𤣥以為天皇太帝者北辰耀魄寶也又曰兆五帝於四郊此五行精氣之神也鄭𤣥以為青帝威靈仰赤帝赤熛怒黄帝含樞紐白帝白招矩黒帝叶光紀者五天也由是有六天之說顯慶二年許敬宗等議曰六天出於緯書南郊圓丘一也而𤣥以為二郊及明堂本以祭天而𤣥皆以為祭太㣲五帝傳曰凡祀啓蟄而郊郊而後耕故郊祀后稷以祈農事而𤣥謂周祭感帝配以后稷因而祈穀皆謬論也由是盡黜𤣥説宋祁曰孝經曰孝莫大於嚴父嚴父莫大於配天又曰郊祀后稷以配天宗祀文王於明堂以配上帝周頌我將曰祀文王也我將我享維牛維羊維天其右之孝經言配天而后言上帝詩當言曰帝右而云天右是天為上帝上帝為天互文以見義也近孫奭建言天雖一神以其至尊故有多名亦猶人君稱王皇后辟天王天子皇帝臣民曰陛下曰太官曰上各隨德義而稱天帝之神分王五時謂之五帝非五帝各一神也號昊天者以其元氣魁然乘五行上氣普臨萬物因時顯功人強以名故春曰青帝夏曰赤帝猶春為蒼天冬為𤣥天耳二月除漢宗室禁錮以舉要厯補遺修三月戊戌吳遣使來吊祭既而復絶以本紀及吳傳修吳殺散騎常侍王蕃以吴志修秋七月丙午晦日有食之以通鑑修解題曰按通鑑作六月丙午晦攷之劉羲叟長厯七月丁丑朔則六月晦非丙午通鑑目録云本志七月丙午晦食今從之八月吳改元以吴傳修解題曰宋庠紀年通譜八月所在言得大鼎故改元帝以䟽素終喪以紀傳修吳陸凱萬彧為左右丞相以吴傳修冬十月丙午朔日有食之以本紀修十一月并圓方丘於南北郊以吕祖謙標目修十二月吳還都建業以吕祖謙標目修散騎常侍傅𤣥論虚誕以吕祖謙標目修解題曰帝初即位廣納直言開不諱之路散騎常侍傅𤣥皇甫陶共掌諫職按晉志文帝合散騎於中常侍謂之散騎常侍掌規諌不典事自司馬懿父子攘刼専擅諌路殆閡塞矣至是始稍還其職耳𤣥上疏曰臣聞先王之臨天下也道化隆於上清議行於下近者魏武好法術而天下貴刑名魏文慕通逹而天下賤守節其後綱維不攝而虚無放誕之論盈於朝野使天下無復清議今陛下龍興受禪惟未舉清逺有禮之臣以敦風節未退虚鄙以懲不恪臣是以猶敢有言詔報使𤣥草詔進之𤣥復上疏曰臣聞舜舉五臣無為而化用人得其要也典謨曰無曠庶官諸有疾病滿百日不差冝令去職臣不廢職於朝國無曠官之累臣聞先王分士農工商以經國制事各一其業而殊其務自士以上子弟為之立學校以教之選明師以訓之各隨其才而用之農以豐其食工以足其器商賈以通其貨故雖天下之大無有一人㳺手漢魏不定其分百官子弟不脩經藝而務交㳺未知􅊩事而坐享天禄農工之業多廢或逐淫利而離其事今散官衆而學校未設㳺手多而親農者少工器不盡其宜臣以為亟定其制通計天下若干人為士足以副在官之吏若干人為農三年足有一年之儲若干人為工足其器用若干人為商賈足以通貨而已前皇甫陶上事今文武之官既衆而拜賜不在職者人多加以服役為兵不得耕稼當農者之半南面食禄者㕘倍於前使冗散之官農而収其租稅家其實而天下之糓可以無乏矣計文武之官足為副貳者使學餘皆歸之於農若百工商賈有長者亦歸之農務農若此何有不贍乎晉世祖武皇帝泰始三年吴歸命侯寶鼎二年春正月丁卯立子𠂻為皇太子下詔不赦以本紀修解題曰葉適曰武帝時大議論恵帝定嗣一也賈后為冢婦二也賈充荀朂進退三也齊王攸去留四也晉之治亂雖在此四者然不過一本昔周子有兄而無慧不能辨菽麥故不可立恵之無慧帝自知之而終不决者恃愍懐爾又明見充女不可然竟納為婦以成愍懐之酷實朂輩彌縫其間末年恐攸挾衆望奪嫡又為逐之以速其斃原於一事之差故四事無不然遂至舉天下棄之惜哉事見通鑑二月戊寅令二千石終三年喪以本紀修司𨽻校尉李熹劾故立進令劉友前尚書山濤等占官稻田友伏誅濤等勿問以列傳修以李熹為太子太傅徴犍為李宻為洗馬不至以紀傳修吳萬彧鎮巴丘以吳傳修夏六月吳作昭明宫以吕祖謙標目修解題曰按太康三年地記昭明宫方五百丈吳立云昭明在太初之東宫苑記在東宫城前路南秋九月甲申增吏俸以紀傳修禁星氣纎緯之學以吕祖謙標目修晉世祖武皇帝泰始四年吴歸命侯寶鼎三年春正月丙戍律令成帝自臨講以本紀修詔河南尹杜預立考課之法不果行以列傳修丁亥帝耕籍田以本紀修解題曰是時江南未平朝廷厲精於稼穡三月戊子皇太后王氏崩帝遵素三年以本紀修秋七月太山石崩衆星流如雨而隕以紀傳修九月大水以本紀修冬十月吳襲江夏襄陽不克而還以吳傳修交趾太守楊稷大破吳兵以通鑑修晉世祖武皇帝泰始五年吳歸命侯建衡元年春正月吳主立子瑾為太子以吳傳修二月分雍凉梁州置秦州以荆州刺史胡烈為刺史鎮撫鮮卑降者以紀傳修解題曰傅𤣥疏曰胡夷獸心鮮卑最甚鄧艾茍取一時之利使鮮卑數萬散於人間此必為害之勢也胡烈素有恩信於四方今烈往諸胡必且消弭然獸心難保恐胡虜東入安定西赴武威外名為降可動復動此二郡非烈所制則惡胡有窟宂浮㳺之地宜更置一郡於高平川因安定西州都尉募樂徙民以充之以通北道漸以實邉詳議此二郡及新置郡皆使并屬秦州烈得專禦邉之宜餘見通鑑雍州統郡國七京兆宋京兆府華州之地馮翊同耀華丹四州河中府之地扶風鳯翔京兆二府隴耀醴三州之地安定涇渭邠原四州懐德鎮戍德順三軍之地北地耀坊二州之地始平京兆鳯翔二府醴州之地新平鳯翔府邠醴二州之地凉州統郡八金城宋河蘭廓凉鹽五州之地西平西寧樂肅三州之地武威唐凉州之地張掖甘州之地酒泉甘肅一州之地敦煌𤓰沙西伊肅五州之地西海甘州之地西郡甘州刪丹縣之地梁州統郡八漢中宋興元府洋州之地梓潼隆慶潼川二府綿利閬巴四州大安軍之地廣漢遂寧潼川二府漢晉二州之地新都成都府漢彭二州懐安軍之地涪陵涪思黔三州之地巴重慶府合忠普昌五涪六州南平廣安梁山三軍之地巴西潼川順慶二府巴渠閬蓬逹五州廣安軍之地巴東䕫萬開施忠五州梁山軍之地秦州統郡六隴西宋熈蘭鞏西和四州之地南安鞏州之地天水秦西和二州天水軍之地略陽秦西和二州之地武都同慶府鳯階沔西和四州之地隂平文龍州之地大水以本紀修以尚書左僕射羊祐都督荆州軍事征東大將軍衛瓘都督青州軍事鎮東大將軍王伷都督徐州軍事以本紀修解題曰為㓕吳之張本也荆州統郡國二十二江夏宋德安府隨郢復三州信陽漢陽荆門三軍之地南郡江陵府復州荆門軍之地襄陽襄陽府峽州荆門路之地順陽鄧均二州光化軍之地義陽襄陽府隨鄧唐三州信陽棗陽二軍之地新城襄陽府均房二州之地魏興金洋均三州之地上庸房均金三州之地建平歸施䕫三州大寧監之地冝都峽歸施三州之也南平江陵府澧岳二州之地武陵常德府辰沅靖豐四州之地天門澧州之地長沙潭岳鄂三州之地衡陽寶慶常德二府衡潭二州之地湘東潭衡二州之地零陵靜江府永道全三州之地邵陵寶慶府靖州武岡軍之地桂陽栁衡二州桂陽軍之地武昌鄂江二州興國軍之地安成郡袁吉二州臨江軍之地南陽國鄧唐汝三州之地青州統郡國六齊國宋青州之地濟南郡濟南府濰萊二州之地樂安國濟南府淄青􅀶三州之地城陽宻沂濰萊四州之地東萊國登萊二州之地長廣郡萊鄧二州之地徐州領郡國七彭城宋徐沂二州淮陽軍之地下邳宿泗二州淮陽軍之地東莞沂宻青濰四州之地廣陵揚泰通真淮安五州寶應高郵二軍之地臨淮泗真淮安三州招信淮陽高郵漣水四軍之地琅琊國沂宻二州之地己未録用蜀臣子孫以吕祖謙標目修夏四月地震以本紀修秋九月有星孛于紫宫以本紀修冬十月吳改元以吳傳修解題曰宋庠紀年通譜厯家以斗杓衡所建為四時之紀疑取斯義吳陸凱卒以吳傳修吳擊交趾以吴傳修晉世祖武皇帝泰始六年吴歸命侯建衡二年春正月吳萬彧還建康以吳傳修夏四月吳鎮軍大將軍陸抗都督諸軍鎮樂鄉以吴傳修解題曰拜抗都督信陵宋書志孫休永安三年分冝都立信陵縣梁以巴東縣為信陵郡西陵今峽州夷陵縣夷道峽州冝都縣樂鄉江陵府松滋縣東七十里􅀈江與江陵縣境接公安諸軍事治樂鄉六月戊午胡烈討鮮卑秃髮樹機能敗死以本紀修解題曰南凉之先也冬十一月立子柬為王以本紀修吳夏口督孫秀來犇以通鑑修以越騎校尉馮紞為左衛將軍以列傳修解題曰按晉宋官志領軍將軍掌内軍魏武帝置主五校中壘武衛等三營武帝使中軍將軍統二衛前後左右驍衛等七軍營罷置北軍中候永嘉改中領軍護軍將軍掌外軍左衛右衛二衛將軍掌宿衛營兵文帝初置中衛及衛武帝分為左右衛驍騎㳺擊將軍為六軍左右前後軍為四軍屯騎歩兵越騎長水射聲等校尉為五校二衛始制前驅由基強弩為三部司馬左衛熊渠虎賁右衛佽飛虎賁二衛各五部督其命中虎賁驍騎㳺擊各領之又置虎賁羽林上騎異力四部并命中為五督更制殿中將軍中郎校尉司馬陳􅎰有才用蜀破後令勰受諸葛亮圍陣用兵倚仗之法又甲乙校摽幟之制通典魏晉江右領護各領營兵江左領軍不復别置營護軍猶有營宋領軍將軍掌内軍護軍將軍掌外軍資輕者為中領軍中護軍梁領軍將軍管天下兵要謂之禁司陳因之晉世祖武皇帝泰始七年吳歸命侯建衡三年春正月匈奴右賢土劉猛叛以通鑑目録修解題曰按載記漢高祖以宗女為公主妻冒頓約為兄弟故其子孫冒姓劉氏中平中單于羗渠使子於扶羅將兵助漢平黄巾留漢自立為單于冦掠太原河東屯于河内於扶羅死弟呼厨泉立以於扶羅子豹為左賢王即淵本文作元海之父魏武分其衆為五部以豹為左部帥其餘部帥皆以劉氏為之㩀此則匈奴自前漢已冒劉姓通鑑云魏武居五部於并州與中國民雜居自謂漢氏外孫因改劉氏豈載記有未足㩀耶吳主舉兵西上遇大雪而還以吳傳修夏四月凉州刺史牽𢎞討北地叛胡胡與樹機能圍之殺𢎞以本紀修五月立子憲為王以本紀修秋七月癸酉以侍中尚書令車騎將軍賈充都督秦凉軍事既而留行以紀傳修解題曰先是羊祜宻啓留充及是帝以語充充謝祜曰始知君長者餘見通鑑李夀曰帝憂闗輔而任愷庾純得成其去佞之謀殆天祐晉假手以除其禍亂之根也而祜排羣議削藁飛奏以留充充既留而晉無以存矣赫赫宗周褒姒㓕之祜不得不執其咎也吳平交趾以蒼梧太守陶璜為交州牧以吕祖謙標目修解題曰交州統郡七合浦宋亷冝邕栁容高雷瓊欝林九州南寧萬安吉陽三軍之地交趾安南都護府愛陸楊三州之地新昌峯州之地武平安南都護府峯武安二州之地九真愛福禄三州之地九德驩演愛長四州之地日南郡安南府武安州之地八月分益州南中四郡置寧州以通鑑修解題曰益州統郡八蜀宋成都崇慶二府隆卭彭三州永康軍之地犍為嘉定崇慶二府眉簡叙資隆普六州長寧懐安二軍之地汶山茂彭威翼當悉靜恭八州石泉永康二軍之地漢嘉嘉定府黎雅嶲三州之地江陽紹熈府瀘昌資三州長寧軍富順監之地朱提叙州長寧軍之地越嶲黎州嶲州之地䍧柯黔珍靖施融思六州南平軍之地寧州統郡四雲南宋叙姚二州之地興古叙嶲黔三州之地建寧黔叙姚三州長寧軍之地永昌叙嶲姚三州之地冬十月丁丑朔日有食之以本紀修十一月劉猛冦并州以通鑑修解題曰并州統郡國六大原宋大原府遼汾二州之地西河平陽府汾石三州晉寧威勝二軍之地上黨隆德平陽二府遼澤二海平定軍之地鴈門代雲朔三州之地新興忻憲嵐代豐六州岢嵐寧化火山保德四軍之地樂平太原府遼州平定軍之地荀朂等請以賈充女為太子妃充復留以吕祖謙標目修是歲安樂思公劉禪卒以蜀志修呉改明年元以呉志修解題曰宋庠紀年通譜吳志前年西苑言鳯凰集故改元晉世祖武皇帝泰始八年吴歸命侯鳯凰元年春正月劉猛敗死以本紀修夏益州殺刺史廣漢太守王濬討平之以濬為刺史以紀傳修秋七月以賈充為司空以通鑑修八月吳主徴西陵督歩闡闡㩀城來降以吴傳修冬十月辛未朔日有食之以本紀修遣車騎將軍羊祜攻江陵荆州刺史楊肇迎歩闡十二月吳陸抗破肇走祜㧞西陵夷闡三族以晉紀吴傳修解題曰抗部分諸軍赴西陵𠡠軍營更築嚴圍自赤谿濶三十丈出夷陵東北西南流至故縣西南入江故市亦名古城在峽州夷陵縣内以圍闡外以禦冦晝夜催切如敵已至諸將咸諫曰今及三軍之銳亟以攻闡比晉救至闡必可㧞何事於圍以敝亡民之力抗曰此城勢固糧足且備禦之具皆抗所宿規今反身攻之非可卒克且北救必至至而無備表裏受難何以禦之圍始合晉車騎將軍羊祜率師向江陵諸將咸以抗不宜上抗曰江陵城固兵足無所憂患假令敵得江陵必不能守所損者小如使西陵槃結則南山羣夷擾動所慮難可言也吾寧棄江陵而赴西陵况江陵牢固乎初江陵平衍道路通利抗𠡠江陵督張咸作大堰遏水漸漬平中以絶冦盗梁岳陽王詧攻江陵作十三營以逼城㑹大雨平地水深四尺詧棄輜重而走周顯德二年高保融自西山分江流方五六里築堤謂之北海環城東西北三面㡬五六十里祜欲因所遏水浮舡運糧揚聲將破堰以通歩軍抗聞使咸亟破之諸將屢諫不聽祜至當陽聞堰敗乃改舡以車運大費功力晉巴東監軍徐􅉙率水軍詣建平今歸州荆州刺史楊肇至西陵抗令咸固守其城公安督孫遵巡南岸禦祜水軍督留慮鎮西將軍朱琬拒􅉙身率三軍慿圍對肇餘見通鑑羊祜傳詔祜迎闡祜率兵出江陵遣楊肇攻抗不克有司奏祐所綂八萬餘人賊衆不過三萬祜頓兵江陵使賊備得設乃遣楊肇偏軍入險兵少糧懸軍人剉衂皆違詔命無大臣節可免官以侯就第竟坐貶而免肇為庶人祜乃遣㩀險要開建五城石城以西盡為晉有自是降者不絶是歲吳萬彧自殺左將軍留平以憂死徙大司農樓𤣥尋殺之以吴傳修解題曰按三國志列傳武昌左部督薛瑩徴下獄陸抗上疏曰夫俊乂者國家之良寶社稷之貴資也故大司農樓𤣥散騎中常侍王蕃少府李朂皆當世秀頴既䝉初寵從容列位而旋受誅殛或圯族替祀或投棄荒裔盖周禮有赦賢之辟春秋有宥善之義蕃等罪名未定大辟以加心經忠義身被極刑豈不痛㢤且已死之刑固無所識至乃焚爍流漂棄之水濵惧非先王之令典也是以百姓哀聳士民同慼蕃朂永已誠望陛下赦召𤣥出而項聞薛瑩率見逮録瑩父綜納言先帝傳弼文皇及瑩承基内厲名行今之所坐罪在可宥臣惧有司未詳其事乞垂天恩原赦瑩罪餘見通鑑羊祜與吳陸抗交歡吳數盗邉抗諫不聽以吴傳修晉世祖武皇帝泰始九年吴歸命侯鳯凰二年春吳以陸抗為大司馬荆州牧以吴傳修三月立子祇為王以本紀修夏四月戊辰朔日有食之以本紀修五月吳殺侍中韋昭以吴傳修秋七月丁酉朔日有食之以本紀修選女備六宫權禁天下嫁娶以本紀修解題曰胡安國春秋狄入衛傳嘗謂河南劉奕曰班固載諸王淫亂事盡削去可也奕曰如墻有茨桑中諸篇仲尼何以不削乎後以問楊時時曰此載衛為狄所㓕之因也故在定之方中之前因以是攷於厯代凢有淫亂者未有不至於殺身敗家而亡其國者也然後知古詩垂戒之大然則晉武選女之事固五胡亂華之本歟事見通鑑以吴傳修吕祖謙曰自古淫亂必召夷狄周幽衛宣以來厯厯可數也是歲吳殺中郎將陳聲以吴傳修甲午晉世祖武皇帝泰始十年吳歸命侯鳯凰三年春正月乙未日有食之以通鑑修閏月丁亥詔自今不得以妾媵為正嫡以本紀修分幽州置平州以本紀修解題曰幽州綂郡國七范陽今涿易雄覇四州之地燕國今涿薊二州之地北平今經薊檀營四州之地上谷今媯州之地廣寗今媯州之地代今雲中路奉聖蔚儒三州之地遼西今平景二州之地平州綂郡國五遼東國昌黎樂浪𤣥莵帶方宋屬營州安東都護府之地三月癸亥日有食之以本紀修夏吳殺章安侯奮及其子以吴傳修秋七月丙寅皇后楊氏崩以本紀修解題曰既葬帝及羣臣除喪即吉愽士陳逵議以為今制所依盖漢帝權制興於有事非禮之正皇太子無有國事自宜終服詔更詳議尚書杜預以為古者天子諸侯三年之喪始同齊斬既葬除服諒闇以居心喪終制不與士庶同禮漢氏承秦天下為天子修服三年文帝見其下不可久行而不知古制更以意制祥禫除喪即吉魏氏直以訖塟為節嗣君皆不復諒闇終制學者非之久矣然竟不推究經傳考其行事專謂王者三年之喪當以衰麻終二十五月則羣臣皆不得除喪雖志在居篤更通而不行至令世主皆從漢文輕典由處制者非其制也今皇太子與尊同體宜復古典卒哭除衰麻以諒闇終制於是尚書僕射盧欽尚書魏舒問預證㩀所依預云傳稱三年之喪自天子逹此謂天子絶朞唯有三年喪也非謂居喪衰服三年與士庶同也故周公不言高宗服喪三年而云諒闇三年此釋服心喪之文也叔向不譏景王除喪而譏其燕樂已早明既塟應除而違諒闇之節也喪服諸侯為天子亦斬衰豈可謂終服三年耶欽舒命預造議於是太子遂以厭降之議從國制降衰麻諒闇終制吕祖謙曰預但見春秋時制不識古制古者三年之喪自天子逹於庶人故孟子曰古之人皆然此謂三年之喪也吳陸抗卒吳主使其諸子分將其兵以吴傳修九月作河橋以本紀修解題曰水經注孟津又曰富平津晉陽秋曰杜預造橋於富平津所謂造舟為梁也是歲邵陵厲公曹芳卒以通鑑修晉世祖武皇帝咸寧元年吴歸命侯天冊元年春正月戊午朔改元以本紀修吳改元以吴傳修解題曰宋庠紀年通譜吳郡言得銀上有年月字故改元義取天之冊命以為瑞吳殺中書令賀邵以吴傳修夏六月鮮卑拓䟦力㣲遣子入貢以本紀修秋七月甲申晦日有食之以本紀修冬十二月丁亥追尊祖宗廟以本紀修晉世祖武皇帝咸寧二年吴歸命侯天璽元年夏六月吳京下督孫楷來奔以本紀修吳臨平湖自開秋七月吳改元以吳傳修有星孛于大角本紀吳殺郡守張詠車浚尚書熊睦以吳傳修八月己亥以賈充為太尉鎮軍大將軍齊王攸為司空以本紀修有星孛于大㣲本紀吳厯陽石印發改明年元以吳傳修冬十月以平南將軍羊祜為征南大將軍祜請伐吳賈充荀朂等以為不可以紀傳修解題曰蘇轍曰晉厲公與楚爭鄭晉人知楚有可乘之隙欒武子為政欲出兵擊之范文子不欲請釋楚以為外懼武子不能用夫文子非茍自安者也厲公侈而多嬖寵諸大夫富而陵上國有大功而君臣不相安亂之所自生也既勝反國曰亂將作矣使其祝宗祈死逾年而厲公殺三郤立胥童欒書殺胥童弑厲公文子雖死而免於大難晉武帝既受禪中原冨強吳孫皓以淫虐失衆晉人習於長江之險以為未可取也羊祜陳可取之策又進王濬杜預以成㓕吳之功後世皆稱其賢嘗論羊祜巧於䇿吳而拙於謀晉武帝之為人好善而不擇人茍安而無逺慮雖賢人滿朝而用賈充荀朂之流以為腹心使彼吳尚在相持而不敢肆雖為賢君可也吳亡之後荒於女色蔽於庸子疎賢臣近小人去武備崇藩國所以兆亡國之禍者不可勝數此則㓕吳之所從致也孟子曰入則無法家拂士出則無敵國外患國恒亡故人常生於憂患而死於安樂祜不慮此而鋭於㓕吳祜之將死也武帝欲使卧護諸將祜曰㓕吳不須臣自行但吳平之後當勞聖慮耳推祜此言盖亦憂在平吳而勇於㓕吳其不若范文子逺矣事見通鑑立皇后楊氏十二月以后父鎮東將軍駿為車騎將軍以本紀通鑑修晉世祖武皇帝咸寧三年吴歸命侯天紀元年解題曰宋庠紀年通譜鄱陽言岩文理成字故改元義取天命之紀春正月丙子朔日有食之以本紀修立子裕為王以本紀修征北大將軍衛瓘討鮮卑力㣲三月平虜護軍文鴦討樹機能並破之以本紀通鑑修夏五月戊子吳將邵顗夏祥來降以本紀修秋七月有星孛于紫宫以通鑑修以豫州都督王渾都督楊州軍事本紀解題曰豫州綂郡國十頴川宋頴昌開封淮寧三府之地汝南淮寧穎昌二府蔡陳二州之地襄城頴昌府汝州之地汝隂順昌頴昌二府亳光蔡三州之地譙應天府亳宿單三州之地魯徐州之地弋陽德安府光蘄黄復四州之地安豐安慶府光州安豐軍之地梁應天興仁淮寧順昌開封五府拱單曹宿亳五州之地沛國宿徐亳三州之地楊州綂郡十八丹陽宋建康寧國二府太平池常三州之地宣城寧國府太平安吉二州廣德軍之地淮南濠滁和廬四州安豐招信無為三軍之地廬江安慶府江廬蘄三州安豐無為二軍之地毗陵鎮江平江二府常州江隂軍之地吳平江嘉興臨安三府嚴婺二州之地吳興臨安府安吉州之地㑹稽紹興慶元台州之地東陽紹興府婺處衢信四州之地新安徽嚴池三州之地臨海慶元府台處温三州之地建安建寧府信南劒二州邵武軍之地晉安建寧府泉福汀漳南劒五州興化軍之地豫章隆興府瑞江池袁四州臨江南康興國三軍之地臨川隆興府撫信二州建昌軍之地鄱陽饒徽池信撫江六州興國軍之地廬陵吉撫二州臨江南安二軍之地南康贑吉二州南安軍之地八月詔諸王皆置軍出就國以列傳通鑑修解題曰衛將軍楊珧與中書監荀朂以齊王攸有時望懼恵帝有後難因追故司空裴秀立五等封建之㫖從容共陳時宜以為古者建侯所以藩衛王室今吳冦未殄方岳任大而諸王為帥都督封國既各不臣其綂内於事重非宜又異姓諸將居邉宜参以親戚而諸王公皆在京師非扞城之義帝初未之察下詔議其制有司奏從諸王公更制户邑皆中尉領兵其平原汝南琅琊扶風齊為大國梁趙樂安燕安平義陽為次國餘為小國益滿萬户為郡公如小國王郡侯如不滿五千户王置一軍一千二百人自此非皇子不得為王而諸王之支庶亦各以􅁟推恩受封大國中軍貳千人上下軍各千五百人次國上軍二千人下軍千人及吳平後齊王攸遂之國立子四人為王以本紀修冬十二月呉襲江夏汝南以呉傳修晉世祖武皇帝咸寧四年吴歸命侯天紀二年春正月庚午朔日有食之以本紀修秋七月以左將軍胡奮都督江北軍事以本紀修大水度支尚書杜預請决兖豫諸陂以牛給民以本紀吕祖謙標目修解題曰兖州綂郡國八陳留宋開封興仁應天三府拱滑鄭三州之地濟陽興仁府拱􅗛濟單徐五州廣濟軍之地泰山襲慶濟南二府沂淄二州之地濮陽開德府􅗛濟滑三州之地高平襲慶府濟單徐三州之地任城襲慶府濟州之地東平東都襲慶二府􅗛沂二州之地濟北濟南東平襲慶三府之地九月以太傅何曾為太宰本紀解題曰初曾侍宴退而告其子遵等曰國家應天受禪創業垂統吾每宴見未嘗聞經國逺圖惟説平生常事非貽厥孫謀之兆也及身而已後嗣其殆乎此子孫之憂也唐太宗答魏徴手詔人臣當進思竭誠退思補過將順其美匡救其惡以共為治者也曾位公台名崇位重固當直辭正諫論道佐時乃退有後言進無廷諍以此為智不亦謬乎呉殺中書令張尚以吴傳修冬十月吳人大佃晥城王渾遣兵破之以本紀修十一月甲申詔毋獻竒技異服以本紀修辛卯以杜預為鎮南大將軍都督􅍮州軍事鉅平成侯羊祜卒以紀傳修解題曰按沈約宋書贊山濤舉羊祜為太子太傅盖欲以後事委之而羊公短世餘見通鑑以祜留賈充之事觀之縱使其居楊駿之任亦烏能已晉之亂乎晉世祖武皇帝咸寧五年吴歸命侯天紀三年春正月樹機能䧟凉州乙丑以司馬督馬隆為武威太守討之以紀傳修齊王攸請除匈奴左部帥任子劉淵不從㑹其父豹死以淵代之以吕祖謙標目修夏四月除部曲督以下質任以本紀修秋七月有星孛于紫宫以本紀修吳廣州督將郭馬等反八月遣兵討之以通鑑修解題曰廣州統郡十南海宋肇慶府廣循恵潮梅新六州之地臨賀靜江府賀昭廣封道五州之地始安靜江府昭州之地始興英德府連韶南雄廣四州南安軍之地蒼梧肇慶德慶靜江三府新梧藤封高昭潯亷南恩九州之地鬱林邕潯貴賔鬱林亷容横八州之地桂林融象栁宜賔五州之地高凉化高容南恩四州之地高興南恩州之地寧浦横州之地吳以軍師張悌為丞相以鄭樵年譜修冬十月汲郡人得竹簡小篆古書藏之秘府以本紀修解題曰按杜預左氏後序云汲冢師春純集左氏傳卜筮事上下次第及其文義皆與左傳同師春杪集者名也項安世曰汲冢所藏竹書紀年盖亦古之愛竒之士私作小史纂輯聞見自為一家其起夏后氏而訖今王亦司馬氏起皇帝訖今天子之意也其中間一節盡採左氏特以夏正改其時月耳此書既成藏之丘陵必有副在人間者意太史公父子嘗見之故其措意本末甚相似而畧相反不然則文人機軸暗合亦其常也竹書尚人正故首夏正子長尊道家故首黄帝然至其論政則止於三王且謂漢當有夏則其所見亦自相若王濬杜預表請伐吳中書令張華贊之賈充等固爭十一月大舉代吳賈充假黄鉞為大都督屯襄陽以紀傳修十二月馬隆大破樹機能斬之以紀傳修詔議省官吏兵以吕祖謙標目修大事記續編卷二十四
