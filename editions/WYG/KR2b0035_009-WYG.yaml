body:
  text: 大事記續編卷九明王禕撰漢世祖光武皇帝建武十三年春正月庚申大司徒則鄉哀侯侯覇薨以夲紀修觧題曰侯覇薦前梁令閻楊楊素有譏議帝嫌之既見覇奏疑其有姦大怒賜壐書曰崇山幽都何可偶黄鉞一下無處所欲以身試法耶将殺身以成仁耶使尚書馮勤奉策至司徒府勤陳覇夲意申釋事理帝意稍觧蘇轍曰髙帝舉天下後世之重属之大臣大臣亦盡其心力以報之風流相接至申屠嘉猶召辱鄧通議斬鼂錯則髙帝之用人其重如此景武之後此風衰矣武帝将立少主知非大臣不可乃委任霍光故能翊昭建宣至於宣帝雖明察有餘而性夲忌刻髙才之士側足而履其朝陵遲至於元成朝無重臣飬成王氏之禍光武之興雖文武之畧足以鼓舞一世而不知用人之長以濟其所不足幸而子孫皆賢權在人主故其害不見及和帝幼小竇憲兄弟恣横殺都鄉侯於朝事發請擊匈奴以自贖及其成功又欲立北單于以樹㤙袁安任隗皆以三公守義力爭而不能勝盖光武不任大臣之積其弊乃見於此其後誅閻􅂋立順帝功出於宦官黜清河王殺李固事成於外戚大臣皆無所與及其末流梁兾之害復假宦官以去之宦官之害至召外兵以除之外兵既入而東漢之事盡矣唐仲友曰光武不任功臣宗室亦抑外戚宦官後世權終移於外戚宦者盖天下權柄必有所歸人主聪明必有所寄惟當委任大臣使百官有司各得其職宗室戚宦各安其分况王氏乃權戚而非大臣耶光武以新室抑外戚則可以此奪大臣之權則不可既不任大臣又不倚宗室託孤之際不免政歸房闥捨戚宦孰得親近東漢之所以亡也戊子詔勿受郡國異味以夲紀修二月遣馬武屯虖沱河以偹匈奴盧芳亡入匈奴以夲紀修降趙王良等十一人為公侯以通鑑日録修觧題曰蘇軾曰髙帝既平天下所憂者韓彭英盧而已此四王者皆相繼仆㓕而不復續及吕氏之禍則由異姓也吕氏滅而呉楚之憂幾至於亡國方韓彭吕氏之禍惟恐同姓之不蕃熾昌大也然至其為變則又過於異姓矣文景之世以為諸侯分裂破弱則漢可以百世而無憂至於武帝諸侯之難少衰而匈奴之患方熾則又以為天下之憂止於此矣及昭宣元成之世諸侯王既無足憂而匈奴又破滅臣事於漢然卒至於中絶而不救則其所不慮之王氏也世祖上懲韓彭之難中鑒七國之變而下悼王氏之禍於是盡侯諸将而不任以事裁减同姓之封而黜三公之權以為前世之弊盡去矣及其衰也宦官之權盛而黨錮之難起士大夫相與搤腕而逰談者以為天子一日誅宦官而觧黨錮則天下猶可以無事於是外名諸将而内脅其君宦官既無遺類而董卓曹操之徒亦因以亡漢漢之所憂者凡六變而其亂與亡輙出於其所不憂而終不可偹封宗室絶國者為侯以夲紀修以殷紹嘉公孔安為宋公周承休公姫常為衛公以夲紀修省并十三國以夲紀修觧題曰按夲紀廣平属鉅鹿真定属常山河間属信都城陽属瑯邪泗水属廣陵淄川属髙宻膠東属北海六安属廬江廣陽属上谷李賢以為唯有九國誤云十三今以地志考之則淄川髙宻膠東皆属北海夲紀云菑川属髙宻衍一属字耳又西京長沙廣陵國今皆為郡實十三國非誤也三月辛未沛郡太守扶陽侯韓歆為大司徒以本紀修夏四月呉漢還京師功臣皆增邑更封左右将軍賈復鄧禹建威大将軍耿弇皆罷并罷左右将軍官帝方以吏事責三公故不用功臣兵革既息文書調役簡省至十存一焉以夲紀吕祖謙標目修觧題曰賈復知帝欲偃干戈修文徳不欲功臣擁衆京師乃與鄧禹並剽甲兵廣雅云剽削也敦儒學帝深然之遂罷左右将軍耿弇上大将軍印綬罷以列侯奉朝請禹内文明篤行淳偹天下既定常欲逺形勢修整閨門教飬子孫復剛毅多大莭既還私第闔門飬威重東觀記復授易經起大義朱祜等薦復宜為宰相帝方以吏事責三公功臣並不用餘見通鑑張栻曰光武不用功臣為三公盖鑒髙帝之弊而欲保全之是固美矣然用人先以一說横於胸中則為私意非立賢無方之意矣髙祖功臣如韓彭之徒天資皆小人在易之師開國承家小人勿用盖於用師既終之後但當寵之以富貴而不可使之有國家而為政也髙帝正犯此義是以不能保功臣之終光武之功臣則異於是以光武時所用之大臣論之鄧㓂賈三子類皆過之與共圖政不亦可乎顧乃執一槩之嫌廢大公之義是反為私意而已矣抑光武之所責於大臣者特為吏事大臣之職顧如是乎甲寅兾州牧安豐侯竇融為大司空以夲紀修五月匈奴㓂河東以夲紀修不其侯伏湛卒以列傳修觧題曰按列傳袁宏漢紀南陽太守杜詩上書曰臣竊見大司徒伏湛經為人師行為儀表遭時兵凶秉莭持重不可推移陛下深見臧否顯以宰相㣲過斤退乆而不用舊制九州五尚書令一郡二人李賢曰舊制九州共選五人以任尚書令則一郡乃有二人故欲以湛代一人之處可以湛代夏徴勑尚書擇拜吏日及就位因讌見中暑病卒唐仲友曰伏湛侯覇宋𢎞皆中興名相也論其噐業豈在蕭曹魏丙之後而功名不及者光武之任宰相非西漢之任宰相也秋九月南徼外蠻夷獻白雉白兎以夲紀修漢世祖光武皇帝建武十四年春正月起南宫前殿以夲紀修匈奴遣使奉獻以夲紀修夏四月辛巳封孔子後為褒成侯以夲紀修秋莎車鄯善遣使請置都䕶弗許以紀傳修是嵗太中大夫梁統請更定律令不報以列傳修觧題曰蘇軾曰漢仍秦法至重髙惠固非虐主然習所見以為常不知其重也孝文始罷肉刑與参夷之誅景帝復孥戮晁錯武帝罪戾有增無損宣帝治尚嚴因武之舊至王嘉為相始輕减法律東京因而不改嘉賢相也輕刑又其盛徳事班固不記其事乃見於梁統傳可謂踈畧矣統言髙惠文景以重法興哀平以輕法衰因上書乞增重法律頼當時不從其議此如人年少時不莭酒色而安老後雖莭而病便謂酒色可以延年可乎統亦東京名流一出此言遂獲罪於天其子松竦皆以非命死冀卒族㓕嗚乎悲夫戒哉事見通鑑漢世祖光武皇帝建武十五年春正月韓歆免自殺以夲紀修丁未有星孛于昴以本紀修汝南太守夜侯歐陽歙為大司徒以本紀修二月遣呉漢等擊匈奴徙邉郡民常山闗居庸闗以東以夲紀修觧題曰前漢地理志代郡有常山闗上谷郡居庸有闗唐幽州昌平縣西北二十五里有居庸闗亦謂軍都闗夏四月癸丑追謚兄縯為齊武公仲為魯哀公丁巳封皇子十人為公以夲紀修六月詔州郡檢覈墾田頃畆及户口年紀以夲紀修觧題曰周官司民掌豋萬民之數自生齒以上皆書於版三年大比以萬民之數詔司㓂司㓂登民數自生齒以上登于天府内史司會冡宰貳之以制國用孟冬獻民數于王王拜受之以圖國用而進退之盖民數定財賦可知而國用可制此王政之先務也光武中興既不能乗時井畫其田而吏恣姦欺田不以實自占則户口年紀豈能得其實乎帝雖盛殺戮而不能正也回視成周上下相與之意無復髣髴可為慨然也哉事見通鑑冬十一月歐陽歙下獄死十二月闗内侯戴渉為大司徒以夲紀修盧芳復居髙栁以夲紀修是嵗杜茂免遣馬成繕治障塞以紀傳修漢世祖光武皇帝建武十六年春交趾女子徴側徴貳反以夲紀修觧題曰李賢曰徴側麊冷縣雒将之女麊冷唐峯州嫁為朱鳶人詩索妻甚雄勇交趾太守以法䋲之故反餘見通鑑三月辛丑晦日有食之以夲紀修秋九月河南尹張伋及郡守十餘人坐度田不實下獄死以夲紀修觧題曰按列傳南郡太守劉隆坐徴下獄其儔軰十餘人皆死帝以隆功臣特免為庶人餘見通鑑羣盗起冬十月聴盗自相斬除罪官吏委守逗留故縱勿罪惟以禽獲為功蔽匿者罪之賊乃觧散以夲紀通鑑目録修盧芳降十二月封為代王以夲紀修行五銖錢以夲紀修漢世祖光武皇帝建武十七年春二月乙未晦日有食之以夲紀修夏四月帝幸章陵五月乙卯還宫以夲紀修冬十月辛巳廢皇后郭氏為中山太后立貴人隂氏為皇后觧題曰列傳上令郅惲授皇太子韓詩侍講殿中及郭皇后廢惲言於帝曰夫婦之好父不能得之於子况臣能得之於君乎是臣所不敢言雖然願陛下念其可否之計無令天下有議社稷而已帝曰惲善恕已量主知我必不有所左右而輕天下也夫惲所居之地與張湛同郭后之廢湛稱疾不出而惲乃謂夫婦之好人所不敢言豈責難於君之義乎然能引髙宗吉甫之事使太子奉身而退則可謂善處父子之間矣事見通鑑進右翊公輔為中山王其餘九國公皆為王以夲紀修觧題曰皇子封王其郡為國毎置傅一人相一人皆二千石傅主導王以善禮如師不臣也相如太守有長史如郡丞中尉一人比二千石職如郡尉主盗賊郎中令一人僕一人皆千石郎中令掌王大夫郎中宿衛官僕主車及馭治書比六伯石夲尚書更名大夫比六伯石無員掌奉王使至京都奉璧賀正月及使諸國謁者比四百石冠長掌冠禮樂長主樂人衛士長主衛士醫工長主醫藥永巷長宦者主宫中婢使祠祀長主祠祀皆比四百石郎中二百石太子太傅張湛稱疾免以列傳修甲申帝幸章陵祠舊宅鳳凰見潁川十二月還宫以夲紀修是嵗以㐮賁令祭彤為遼東太守以列傳通鑑修觧題曰葉適曰王覇在上谷二十餘年祭彤在遼東二十年匈奴烏桓鮮卑不能為患此任人之效也㐮賁縣属東海郡故城在今沂州臨沂縣南以虎賁中郎将馬援為伏波将軍討交趾以列傳通鑑修漢世祖光武皇帝建武十八年春二月蜀守将史歆反遣呉漢等討之以夲紀修帝幸長安三月祠陵廟幸蒲坂祠后土以夲紀修馬援擊徴側徴貳于浪泊大破之以列傳袁宏漢紀修夏四月甲戌還宫以夲紀修帝幸河内戊子還宫以夲紀修五月旱以夲紀修盧芳復入匈奴以夲紀修秋七月呉漢平成都以夲紀修冬十月帝幸宜城還祠章陵十二月乙丑還宫以夲紀修是嵗罷州牧置刺史夲紀漢世祖光武皇帝建武十九年春正月追尊孝宣皇帝曰中宗始祠昭帝元帝於太廟成帝哀帝平帝於長安南頓君以上四世於舂陵以夲紀修觧題曰李賢曰漢官儀曰光武第雖十二於父子之次於成帝為兄弟於哀帝為諸父於平帝為祖父皆不可為之後上至元帝於光武為父故上繼元帝而為九代故河圖云赤九會昌謂光武也然則宣帝為曾祖故追尊及祠之按列傳五官中郎将張純太僕朱浮各奏言陛下興於匹庻雖實同創革而名為中興宜奉先帝恭承祭祀者也為人後者則為之子既事大宗則降其私親今禘祫髙廟陳序昭穆而㫪陵四世君臣並列以卑厠尊不合禮意昔髙帝以自受命不由太上宣帝以孫後祖不敢私親故為父立廟獨群臣侍祠臣愚謂宜除今親廟以則二帝舊典詔下公卿大司徒戴渉大司空竇融議宜以宣元成哀平五帝四世代今親廟宣元尊為父可親奉祠成帝以下有司行事别立皇考廟其祭上至㫪陵莭侯群臣奉祠以明尊尊之敬親親之恩帝從之封馬援為新息侯以通鑑列傳修夏閏四月戊申進趙齊魯公爵為王以本紀通鑑修六月戊申廢皇太子彊為東海王立東海王陽為皇太子改名荘以夲紀列傳修以騎都尉隂識為執金吾侍中隂興為衛尉以列傳修觧題曰後漢外戚掌兵始於此按列傳顯宗立為皇太子以識守執金吾輔導東宫帝每幸郡國識常留鎮守京師委以禁兵顯宗永平元年詔曰故侍中衛尉興典領禁兵從平天下當顯受封爵又諸舅比例應蒙㤙澤興皆固譲其封興子弟為侯餘見通鑑秋九月帝幸汝南南頓縣舍置酒復田租二嵗進幸淮陽梁沛以夲紀修觧題曰李賢曰南頓縣属汝南郡故城在今陳州項城縣西西南夷反遣将軍劉尚討之以通鑑修復置函谷闗都尉以夲紀修觧題曰漢都長安東則函谷南則嶢闗西則散闗北則蕭闗所謂闗中者在其中也踵秦置函谷闗都尉領兵如郡國多選豪傑貴重吏為之然史或言函谷闗都尉或言闗都尉則諸闗皆置都尉非特函谷也建武九年罷闗都尉至是止復置函谷闗都尉故志言罷闗都尉而不書其復也或謂武帝太初四年徙𢎞農都尉治武闗若武闗已有都尉何必復移𢎞農都尉以治之是不然函谷闗在𢎞農縣衝嶺元鼎三年徙於新安相去三百里不應再征税故移𢎞農之稅於武闗非至是而始有都尉也修西京宫室以夲紀修觧題曰杜篤論都賦曰有詔復函谷闗作大駕宫李賢曰大駕宫即天子行幸也六王邸髙車廐於長安脩理東都城門李賢曰長安外城門東靣北頭第一門也橋涇渭徃徃繕離觀東臨㶚滻西望昆明北登長平規龍首撫未央音麥平樂儀建章是時山東翕然狐疑意聖朝之西都闗門之反拒也客有為篤言彼塪井之潢汙固不容夫吞舟且洛邑淳瀯曷足以居乎萬乗哉杜篤奏上論都欲令車駕遷還長安耆老聞者皆動懐土之思莫不眷然竚立西望王景以宫廟已立恐人情疑惑會時有神雀諸瑞乃作金人論頌洛邑之美天人之符漢世祖光武皇帝建武二十年春戊子帝還宫以夲紀修夏四月戴渉下獄死以夲紀修竇融免以夲紀修五月匈奴㓂上黨天水扶風以夲紀修六月庚寅以廣漢太守蔡茂為大司徒太僕武陽侯朱浮為大司空以夲紀修乙未徙中山王輔為沛王以本紀修城門校尉郭况為大鴻臚以列傳修冬十月帝幸魯東海楚沛十二月壬寅還宫以夲紀修匈奴㓂天水夲紀省五原郡以夲紀修馬援屯㐮國以列傳袁宏漢紀修復濟陽縣六嵗夲紀觧題曰李賢曰㐮國縣属趙國今邢州龍岡縣漢世祖光武皇帝建武二十一年春劉尚平西南夷以通鑑修秋鮮卑㓂遼東祭彤大破之以夲紀修冬匈奴㓂上谷中山夲紀鄯善車師等十六國遣侍子請都䕶不許以紀傳修觧題曰唐仲友曰光武閉玉闗故至和帝有都䕶西指之功光武卑辭匈奴故至和帝有空朔庭之功大抵欲速則不逹美成在乆也事見通鑑漢世祖光武皇帝建武二十二年春閏正月丙戌帝幸長安祠廟陵二月還宫以夲紀修夏五月乙未晦日有食之以夲紀修秋九月戊辰地震裂南陽尤甚詔勿輸田租芻槀以夲紀修冬十月朱浮免癸丑光禄勲杜林為大司空以夲紀修是嵗青州蝗以夲紀修匈奴單于輿死子左賢王烏逹鞮侯立復死弟左賢王蒲奴立匈奴連年旱疫遣使求和親以紀傳修烏桓破匈奴匈奴北徙詔罷諸邉亭候吏卒以夲紀修觧題曰天下形勢不獨中國夷狄相為盛衰雖蠻夷種類亦自相為盛哀方匈奴盛時凡北方氊裘之國無不服從及分為南北烏桓鮮卑遂盛烏桓鮮卑盛則匈奴微矣其散處中國不過列於邉民之間於是左賢王再起自此五胡迭興以至拓䟦宇文之属更起迭作至蠕蠕突厥囬紇吐蕃契丹女真莫不皆然無他一消一長天道不息之運也置黎陽營兵以郡國志列傳修觧題曰應劭漢官儀曰中興以幽兾并州兵克定天下故於黎陽立營以謁者監之兵騎千人復除甚重按黎陽魏郡縣也建武十九年單臣等據原武帝遣臧宫将北軍及營兵數千人圍之則是營之得名乆矣郡國志注二十二年始遣中郎将馬援謁者分築烽候堡壁興立郡縣上乃建立三營屯田殖榖弛刑謫徒以充實之今附於罷亭候吏卒之後龜兹鄯善王遣子入侍請都護不許以列傳通鑑修漢世祖光武皇帝建武二十三年夏五月丁夘蔡茂薨秋八月杜林薨九月辛未陳留太守玉况為大司徒觧題曰李賢曰玉音肅冬十月丙申以太僕武始侯張純為大司空以夲紀修十二月武陵蠻反遣劉尚討之戰於沅水敗殁以夲紀修觧題曰李賢曰沅水出牂柯東北過臨沅縣至長沙入洞庭湖漢世祖光武皇帝建武二十四年春正月匈奴薁鞬日逐王比欵五原塞求扞北虜以夲紀修秋七月武陵蠻㓂臨沅遣馬援等討之以夲紀修詔申明阿附藩王法以本紀修觧題曰李賢曰武帝時有淮南衡山之謀作左官之律設附益之法阿曲附益王侯者将有重法是為舊制今更申明之冬十月匈奴南邉八部立薁鞬日逐王比為南單于始分南北匈奴以吕祖謙標目修漢世祖光武皇帝建武二十五年春正月遼東徼外貊人入㓂祭彤招降之以夲紀修鮮卑烏桓入朝貢以紀傳修南單于遣使奉藩稱臣擊破北匈奴以夲紀修三月戊申晦日有食之以夲紀修馬援等破武陵蠻夏援卒詔收其将軍印綬觧題曰按袁宏漢紀朱勃上書訟援不報時梁松竇固等在中上問知朱勃乎曰故雲陽令也以所上章使讀之松固驚相謂曰如是陛下不甚罪伏波也餘見通鑑冬十月監軍謁者宗均矯制降群蠻以列傳修觧題曰葉適曰以均事觀之馬援但志於剪滅而已自負鑒識而賈勇奮鋭乃與臧宫馬武同不逮均矣事見通鑑曾阜曰范史宋均傳南陽安衆人族子意疏意孫俱按袁宏漢紀章和初尚書宗意上建寕四年宗俱為司空則均之不得繫宋明矣范史宋均傳當是茟畫之訛爾是嵗遼西烏桓内属居塞内復置䕶烏桓校尉以列傳修漢世祖光武皇帝建武二十六年春正月詔增减百官俸以夲紀修觧題曰按漢志大将軍三公奉月三百五十斛中二千石月百八十斛二千石月百二十斛比二千石月百斛千石月八十斛六百石月七十斛比六百石月五十斛四百石月四十五斛比四百石月四十斛三百石月四十斛比三百石月三十七斛二百石月三十斛比二百石月二十七斛一百石月十六斛斗食月十一斛佐史月八斛凡諸受奉錢榖各半作初陵務從省約以本紀袁宏漢紀修遣使授南單于璽綬令入居雲中觧題曰漢世徙羗於三輔置匈奴於雲中至晋而其患始見大抵人之慮患苟不在數百年之後者烏足以處天下事哉事見通鑑始置䕶匈奴中郎將以夲紀修秋縁邉八郡民復歸夲土以夲紀修冬南單于徙西河以列傳修觧題曰南單于既居西河亦别置諸部王即為扞戍使韓氏骨都侯屯北地右賢王屯朔方當子骨都侯屯五原呼衍骨都侯屯雲中郎氏骨都侯屯定㐮左南将軍屯鴈門栗籍骨都侯屯代郡皆領部衆為郡縣偵羅音力賀反耳目餘見通鑑是嵗始定禘祫之制以志傳修觧題曰按列傳祭祀志詔問大司空張純禘祫之禮不施行幾年宜據經典詳為其制純奏禮三年一祫五年一禘毁廟及未毁廟之主皆登合食乎太廟五年再殷漢制三年一祫毁廟主合食髙廟存廟主未嘗合元始五年始行禘禮又前十八年幸長安亦行此禮父為昭南嚮子為穆北嚮父子不並坐而孫從王父决疑要注曰父南面故曰昭昭明也子北面故曰穆穆順也始祖特於北其後以次夾始祖而南昭在西穆在東相對禘之為言諦諦諟昭穆尊卑之意以夏四月陽氣在上隂氣在下故正尊卑之義祫以冬十月五榖成熟物偹禮成故合聚飲食也斯典之廢於今八年今宜以時定上難復立廟遂以合祭髙廟為常後以三年冬祫五年夏禘之時但就陳祭毁廟主而已謂之殷太祖東面惠文武元帝為昭景宣帝為穆惠景昭三帝非殷祭時不祭漢世祖光武皇帝建武二十七年夏四月戊午玉况薨以夲紀修五月丁丑司徒司空去大名改大司馬為太尉以太僕趙熹為之賜爵闗内侯大司農馮勤為司徒以夲紀修北匈奴乞和親不許以夲紀修朗陵侯臧宫楊虚侯馬武上書請擊匈奴不許以列傳通鑑修觧題曰張栻曰髙祖天資甚髙所不足者學耳雄傑之氣不能自歛卒至平城之辱一時功臣處之不得其道徃徃赤族光武天資雖不逮而自其少時從諸生講儒學謹行義故天下既定則知兵之不可不戢閉玉闗以謝西域之資安南定北以為單于乆逺之計處置功臣全其終始凡此皆思慮縝宻要自儒學中來至於尊禮隐逸褒崇風莭以振起士氣尤非後世所能及也事見通鑑冬魯王興齊王石始就國以夲紀修漢世祖光武皇帝建武二十八年春正月徙魯王興為北海王以魯益東海以夲紀修夏六月丁卯沛太后郭氏薨以夲紀修誅王侯賔客觧題曰衛尉隂興新陽侯隂就以外戚貴顯深敬重馮衍衍與之交結由是為諸王所聘請帝懲西京外戚賔客故皆以法䋲之大者抵死徙其餘貶黜衍由此得罪餘見通鑑秋八月戊寅遣諸王就國以夲紀修以愽士張佚桓榮為太子太傅少傅以列傳修觧題曰帝大會群臣詔問誰可傅太子者群臣承望上意皆言太子舅執金吾隂識可愽士張佚正色曰今陛下立太子為隂氏乎為天下乎即為隂氏則隂侯可為天下則固宜用天下之賢才帝稱善曰欲置傅者以輔太子也今愽士不難正朕况太子乎即拜佚為太子太傅而以桓榮為少傅餘見通鑑輔導太子則隂識隂興也受顧命則隂興也𫝊相之任群臣烏得而不承望上意哉大哉張佚之言乎其真得䟽廣所以告宣帝之意矣冬北匈奴乞和親許之以紀傳修漢世祖光武皇帝建武二十九年春二月丁巳朔日有食之遣使者舉寃獄庚申賜民爵鰥寡孤獨貧癃粟以夲紀修漢世祖光武皇帝建武三十年春正月鮮卑大人内属朝賀以鄭樵年譜修二月帝東狩群臣請封禪詔却之甲子幸魯濟南閏三月癸丑還宫以夲紀修有星孛于紫宫以夲紀修夏五月大水賜民爵鰥寡孤獨貧癃粟以夲紀修秋七月帝幸魯復濟陽徭役冬十一月還宫以夲紀修漢世祖光武皇帝建武三十一年夏五月大水賜民爵鰥寡孤獨癃貧粟以夲紀修癸酉晦日有食之以夲紀修蝗夲紀漢世祖光武皇帝建武中元元年觧題曰宋庠紀年通譜案夲紀是年改元中元又案禮儀志四月以建武三十二年為建武中元元年紀志所載不同必傳寫脱誤官書累經校定學者失於精審輙以意刪去斯為謬矣梁武帝大同大通之號俱有中字殆憲章於此洪邁曰倭國傳亦云建武中元二年來奉貢盖當時雖别為中元猶冠以建武如文景帝中元後元之類也而夲紀直書為中元元年殆未深考又成都有漢蜀郡太守何君造尊楗閣碑雅州榮經縣西蜀郡治道記其末皆云建武中元二年六月援据最明春正月丁卯帝東狩二月幸魯辛卯封㤗山甲午禪梁父以夲紀修觧題曰胡寅曰登封之事原夲燔柴而失之者也詩書紀狩而燔柴者記所謂因名山也有山則因以為髙無則于郊而壇其義類一也又有大事而告于上帝者武王克商始有天下故柴望而告也舍此則凟矣記以饗帝于郊與升中于天為餘事則亦傳之者失也然則七十二君之編録詩書禮典畧不經見審有是事乃天下國家之盛舉尭舜禹湯周武成康皆身致太平安得闕而弗講世祖享國至是三十年四陲無虞其心浸滿是以告功于天明示得意而不自知其失也不法唐虞三代而法始皇武帝不信六經之言而信河圖㑹昌符盖其智勇出倫而學問不足故也事見通鑑三月戊辰張純薨以夲紀修夏四月癸酉帝還宫以夲紀修己夘改元復嬴愽梁父奉髙勿出今年田租以夲紀袁宏漢紀修戊子帝幸長安祠長陵五月乙丑還宫以夲紀修六月太僕馮魴為司空以夲紀修乙未馮勤薨夲紀京師醴泉出赤草生甘露䧏郡國以夲紀修秋蝗夲紀冬十月辛未司𨽻校尉李訢為司徒以夲紀修甲申尊薄太后曰髙皇后遷吕太后主于園以夲紀修十一月甲子晦日有食之夲紀是嵗起明堂靈䑓辟雍宣布圖䜟於天下以夲紀修觧題曰張衡東京賦曰左制辟雍右立靈䑓薛綜注曰布政頒教曰明堂大合樂射饗者曰辟雍司歴記候莭氣者曰靈䑓漢官儀曰明堂四面起土作壍上作橋壍中無水去平城門二里取天子從平城門先歴明堂乃至郊祀辟雍去明堂三百歩車駕從北門入二月九月皆於中行鄉射禮楊衒之洛陽記曰平昌門直南道東明堂西靈䑓漢宫閣疏曰靈䑓髙三丈十二門餘見元始四年觧題按袁宏漢紀初議靈䑓位上問議郎桓譚曰吾欲以䜟决之何如譚黙然良乆曰臣不讀䜟上問其故譚言䜟之非帝大怒曰桓譚非聖無法将下斬之叩頭流血良乆乃得觧出為六安太守丞又按列傳帝以尹敏愽通經記令校圖䜟使蠲去崔發所為王莽著録次比敏曰䜟書非聖人所作其中多近鄙别字頗類世俗之辭恐疑誤後生帝不納敏因其闕文増之曰君無口為漢輔帝見而怪之召敏問其故對曰臣見前人增損鄙書敢不自量竊幸萬一此盖以諷諌光武也帝深非之雖不罪而亦以此沉滯不用餘見通鑑當時議用三公議郊祀議封禪議辟雍明堂靈䑓議禮議廟樂議歴議律令皆以䜟為據而賈逵至以䜟言經所以六經注䟽至今猥醸而不可䟽剔皆漢儒希世之罪也参狼羗㓂武都隴西太守及郡兵破之以夲紀修南單于比死弟莫立以列傳修漢世祖光武皇帝建武中元二年春正月辛未初立北郊祀后土以夲紀修二月戊戌帝崩於南宫前殿趙熹及虎賁中郎将梁松受遺詔熹典䘮禮以紀傳修觧題曰是時藩王皆在京師舊典不存皇太子與東海王等雜止同席熹正色横劒殿階扶下諸王以明尊卑藩國官属出入宫省與百僚無别乃表奏謁者将䕶官属分止他縣諸王並令就邸唯朝晡入臨整禮儀嚴門衛内外肅然光武在位三十餘年禮制不修國有大䘮呼吸安危乃蕩然無一可恃獨一趙熹仗劒正色僅克有濟不然山陽王荆之邪謀豈待他日而後發哉至此而後知聖賢防慮之周宻也禮儀志大歛五官左右虎賁羽林五将各将所部執虎賁㦸屯殿端門陛中黄門持兵陛殿上大鴻臚設九賔随立殿下位定大鴻臚謁者以聞皇后東向貴人公主宗室婦女以次立後皇太子皇子西向皇子少退在南哭踊如禮三公奏尚書顧命請太子即皇帝位皇后為皇太后羣臣皆出吉服入會如儀太尉升自阼階當柩御坐讀策畢以傳國玉璽綬東面跪授皇太子中黄門掌兵以玉具随侯珠斬蛇寳劍授太尉禮雖不盡與古合亦粗有品節今光武之崩想此禮猶未及定也唐仲友曰光武中興專思先漢所以失故事事革弊鍳叛者九起故不大封功臣鍳吕霍上官王氏故外戚不預政鍳新室之禍故事歸䑓閣鍳七國之變故誅諸王賓客鍳恭􅂋之弊故賤宦官鍳平城之辱故禮匈奴使鍳虚耗之患故謝西域之質鍳嫚罵之失故側席幽人鍳不用儒故愛儒術鍳宫室之侈故從儉約鍳奢廣故約官職併州縣鍳優㳺故吏事刻深規模大率如此皇太子荘即皇帝位尊皇后曰皇太后三月丁夘𦵏光武皇帝于原陵廟曰世祖以夲紀修觧題曰李賢曰帝王紀原陵在臨平亭東南去洛陽十五里孝明立世祖廟以明再受命祖有功之義也嗣遵儉不復改立皆藏主其中夏四月丙辰賜民爵鰥寡孤獨篤癃粟以夲紀修髙宻侯鄧禹為太傅東平王蒼為驃騎将軍位三公上以紀傳修觧題曰詔曰予末小子奉承聖業夙夜震畏不敢荒寕先帝受命中興徳侔帝王協和萬邦假於上下懐柔百神惠於鰥寡朕承大運繼體守文不知稼穡之艱難懼有廢失聖㤙遺戒顧重天下以元元為首公卿百僚将何以輔朕不逮其賜天下男子爵人二級三老孝悌力田人三級爵過公乗得移與子若同産同産子及流人無名數欲自占者人一級鰥寡孤獨篤癃粟人十斛其㢮刑及郡國徒在中元元年四月己卯赦前所犯而後捕繫者悉免其刑又邉人遭亂為内郡人妻在己夘赦前一切遣還邉恣其所樂中二千石下至黄綬貶秩贖論者悉皆秩還贖方今上無天子下無方伯若渉淵水而無舟楫夫萬乗至重而壮者慮輕實頼有徳左右小子髙宻侯禹元功之首東平王蒼寛愽有謀並可以受六尺之託臨大莭而不撓其以禹為太傅蒼為驃騎将軍太尉熹告謚南郊司徒訢奉安梓宫司空魴将校復土其封熹為莭鄉侯訢為安鄉侯魴為楊邑侯秋九月燒當羗㓂隴西謁者張鴻討之敗殁冬十一月復遣馬武等討之以夲紀修觧題曰王容曰今廓州寕塞夲燒當燒何當煎勒姐八種羗所居是嵗南單于莫死弟汙立以通鑑修大事記續編卷九
