body:
  text: 大事記續編卷三十四明王禕撰晉安皇帝元興三年燕昭文皇帝光始四年乞秦文桓皇帝𢎞始六年西秦伏乾歸太初十七年三魏太祖道武皇帝天賜元年年南凉秃髪傉檀𢎞昌年南燕獻武皇帝建平五西凉李暠庚子五年四北凉沮渠蒙遜永安年春正月帝出居于尋陽以審紀修二月益州刺史毛璩起兵討桓𤣥屯白帝以吕祖謙標目修乙夘劉裕帥沛郡劉毅東海何無忌等起兵討桓𤣥丙辰斬徐州刺史脩于京口青州刺史桓𢎞于廣陵丁巳𤣥遣揚州刺史桓謙拒之以紀傳修南凉王傉檀去其年號以通鑑修三月戊午朔劉裕擊桓𤣥将呉甫之皇甫敷己未大破桓謙于覆舟山𤣥挾帝西上庚申裕立留䑓百官遣諸将追𤣥以夲紀通鑑修左僕射王瑜及子荆州刺史綏謀襲劉裕辛酉裕族誅之以通鑑修觧題曰按宋書夲紀綏江左冠族有重名以髙祖起自布衣甚相陵忽綏桓氏甥亦有自疑之意裕悉誅之餘見通鑑壬戌以桓𤣥司徒王謐領揚州刺史録尚書事劉裕都督揚徐等八州軍事徐州刺史劉毅為青州刺史何無忌為琅邪内史以通鑑修桓𤣥至尋陽辛未逼帝西上以通鑑修丙戌大将軍武陵王遵承制總百官行事吕祖謙標目劉敬宣司馬休之來歸以通鑑修夏四月司馬休之監荆雍等六州軍事荆州刺史以通鑑修庚寅帝至江陵以夲紀修庚戌右将軍何無忌等大破桓𤣥将于桑落洲取尋陽𤣥挾帝東下以通鑑修五月癸酉冠軍将軍劉毅等大破桓𤣥于峥嶸洲己夘𤣥以帝入江陵庚辰𤣥走壬午伏誅帝復位閏月己丑𤣥故将桓振䧟江陵毅等大敗于靈溪退守尋陽以紀傳修觧題曰桑落洲在江州徳化縣東北十五里峥嶸洲在夀昌軍西俗訛為新生洲桑落峥嶸之戰衆寡不敵而皆能取勝者心之專氣之鋭也桓振收合餘燼殆無幾耳而無忌等乃以敗聞氣既驕而用心輕也兵故無常形也事見通鑑靈溪在江陵府江陵縣六月毛璩斬梁州刺史桓希自領之以紀傳修秋七月戊申永安皇后崩以夲紀修九月魏改補百官以吕祖謙標目修冬十月壬戌盧循䧟畨禺徐道覆䧟始興以吕祖謙標目修觧題曰畨禺今廣州始興今南雄南安之地辛巳魏改元以吕祖謙標目修十一月魏命宗室置宗師州郡置師如中正之職以通鑑目録修十二月劉毅等克巴陵以通鑑修晋安皇帝義熈元年燕昭文皇帝光始五年乞秦文桓皇帝𢎞始七年西秦伏乾歸太初十八年四魏太祖道武皇帝天賜二年年南凉秃髪傉檀𢎞昌年南燕帝慕容超太上元西凉李暠建初元年五北凉沮渠䝉遜永安年春正月帝出居于江陵以春秋脩南陽太守魯宗之襲㐮陽劉毅等克江陵桓振走戊戌改元觧題曰宋庠紀年通譜熈興也意取因義師而天下興以宗之為雍州刺史毛璩都督益梁等五州軍事以舉要歴補遺修秦命僧鳩摩羅什譯西域經論以吕祖謙標目修觧題曰蘓轍曰姚興區區一隅招致緇素譯經談妙至者凡數千人而姚氏之亡曾不旋踵梁武繼之江南佛事前世所未嘗見至捨身為奴𨽻郊廟之祭不薦毛血父子皆䧟於侯景而國隨以亡觀秦梁之敗則佛法之不足頼信矣西凉公暠改元遣使奉表以通鑑目録修觧題曰宋庠紀年通譜建初夲漢章帝李特姚萇年號二月帝東還以通鑑修平西恭軍譙縱殺毛璩自稱成都王楊盛據漢中以吕祖謙標目修三月桓振復䧟江陵司馬休之敗走振尋伏誅以夲紀修甲午帝至自江陵劉裕為車騎将軍都督中外軍事夏四月裕還京口以夲紀吕祖謙標目修壬申以盧循為廣州刺史徐道覆為始興相以通鑑修五月以劉毅都督淮南五郡軍事豫州刺史以通鑑修六月秦伐仇池秋七月楊盛降之以吕祖謙標目修劉裕遣使請南鄉等郡於秦秦割十二郡歸之以吕祖謙標目修九月南燕主備徳立兄子超為皇太子備徳卒超即帝位改元以吕祖謙標目修西凉公暠徙酒泉以舉要歴補遺修晉安皇帝義熈二年燕昭文皇帝光始六年乞秦文桓皇帝𢎞始八年西秦伏乾歸太初十九年五魏太祖道武皇帝天賜三年年南凉禿髪傉檀𢎞昌年南燕帝慕容超太上二西凉李暠建初二年六北凉沮渠蒙遜永安年夏六月秦以秃髪傉檀為凉州刺史鎮姑臧以吕祖謙標目修魏築灅南宫以通鑑修觧題曰按魏書夲紀天興六年幸南平城寰宇記前漢平城在雲州雲中縣代州燕門縣有平城故城後漢平城故曰南平城規度灅南寰宇記纍頭山在鴈門縣西北六十里面夏屋山背黄𤓰堆寰宇記夏屋山在雁門縣東北三十五里水經注桑乾水又東南逕黄𤓰阜曲西又屈逕其堆南猗盧廢嫡子于黄𤓰堆者也又東右合杖津又東北左合夏屋三水将建新邑穆靈帝六年城盛樂以為北都修故平城以為南都帝登平城西山觀望地勢乃更南百里於灅水之陽黄𤓰堆築新平城晋人謂之小平城使長子六修鎮之統領南郡餘見建興元年盛樂觧題遣将軍毛修之討譙縱秋九月自宕渠還白帝以通鑑修觧題曰宕渠今渠州古賨國也冬十月論建義功封劉裕等有差裕固辭以夲紀修觧題曰按宋書夲紀裕夲文作髙祖上言曰始平京口廣陵二城臣及撫軍将軍毅等二百七十二人并赴義出都縁道大戰所餘一千五百六十六人又輔國将軍長民故給事中王元徳等十人乞正封賞於是尚書奏裕封豫章郡公餘見通鑑十一月西秦王乾歸朝于秦以通鑑修十二月何無忌都督荆江豫三州八郡軍事江州刺史以通鑑脩晉安皇帝義熈三年燕髙雲正始元年乞秦文桓皇帝𢎞始九年西秦㐲乾歸太初二十年六魏太祖道武皇帝天賜四年年南凉禿髪傉檀𢎞昌年南燕帝慕容超太上三西凉李暠建初三年赫北凉沮渠䝉遜永安七年夏連勃勃龍升元年春正月燕改元以吕祖謙標目修秦留西秦王乾歸以其子熾磐監其部以吕祖謙標目修閏二月族誅東陽太守殷仲文前中書令桓𦙍等以夲紀修夏四月楊盛使将軍苻宣入漢中尋復來通以吕祖謙標目修秦以劉勃勃鎮朔方六月勃勃自稱大夏天王改元以吕祖謙標目修秋七月戊戌朔日有食之以夲紀修燕将軍馮䟦髙雲作亂乙丑雲即天王位改元執其王熈弑之以吕祖謙標目修觧題曰按載記垂以孝武太元八年僣立至熈四世凡二十四年以安帝義熈三年㓕宋庠紀年通譜正始魏髙貴卿公年號南燕主超稱藩于秦以求母妻秦歸之以通鑑修八月遣冠軍将軍劉敬宣伐蜀以夲紀修燕以馮䟦都督中外諸軍録尚書事以載記修九月譙縱稱藩于秦通鑑冬十月夏王勃勃侵秦嶺北十一月擊秃髪傉檀大破之以通鑑修觧題曰嶺洪池嶺也唐地理志凉州有洪池府兵麻秋據􅂁罕屯河内遣王擢畧地晋興廣武越洪池嶺至于曲抑姑臧大震趙振謂秃髪氏曰吕氏方强洪池以北未可兾也嶺南五郡庶幾可取嶺北則武威張掖安定隂宻杏城朔方等也嶺南則樂都湟河澆河等郡也嶺東則三輔也嶺西則建康祁連也晉安皇帝義熈四年燕髙雲正始二年乞秦文桓皇帝𢎞始十年西秦伏乾歸太初二十一年元魏太祖道武皇帝天賜五年年南凉秃髪傉檀嘉平年南燕帝慕容超太上四西凉李暠建初四年赫北凉沮渠蒙遜永安八年夏連勃勃龍升二年春正月劉裕為揚州刺史録尚書事徐兖二州刺史如故以夲紀通鑑修觧題曰按宋書列傳揚州刺史王謐薨裕次應入輔劉毅等不欲裕入議以中領軍謝混為揚州或欲令裕於丹徒領州以内事付尚書僕射孟昶遣尚書右丞皮沈以二議諮裕沈先見穆之具說朝議穆之偽起如厠即宻䟽白裕曰皮沈始至其言不可從裕既見沈且令出外呼穆之問曰卿云沈言不可從其意何也穆之曰昔晋朝失政非復一日加以桓𤣥􅆲奪天命已移公興復皇祚勲髙萬古既有大功便有大位位大勲髙非可持乆公今日形勢豈得居謙自弱遂為守藩之将邪劉孟諸公與公俱起布衣共立大義夲欲匡主成勲以取富貴耳事有前後故一時推功非為委體心服宿定臣主之分也力敵勢均終相吞咀揚州根夲所係不可假人前者以授王謐事出權道豈是始終大計必宜若此而已哉今若復以他授便應受制於人一失權柄無由可得而公功髙勲重不可直置疑畏交加異端互起将來之危難可不熟念今朝議如此宜相酬答必云在我措辭又難惟應云神州治夲宰輔崇要此事既大非可懸論便蹔入朝共盡同異公至京彼必不敢越公更授餘人明矣裕從其言由是入輔觀穆之之言如此則劉毅諸葛長民之徒寕有容足之地乎桓温未必遽有廢立之心也而郗超啓之劉裕未必遽萌入輔之想也而穆之發之彼以國輸人之軰亦何所不至哉餘見通鑑夏秦襲南凉討夏皆敗而還以朱熹綱目修秋秦救譙縱劉敬宣至黄虎而還以通鑑修觧題曰黄虎名黄滸自潼川府東闗縣流至通泉合涪江宋遂寕郡領廣漢縣今通泉即其故地宋白續通典通泉有黄滸川冬十月乞伏熾磐叛秦以吕祖謙標目修十一月秃髪傉檀復稱凉改元以吕祖謙標目修觧題曰宋庠紀年通譜嘉平魏髙貴郷公劉聰年號晋安皇帝義熈五年燕馮䟦太平元年秦秦文桓皇帝𢎞始十一年西乞伏乾歸更始元年檀魏太宗明元皇帝拓䟦嗣永興元年年南凉禿髪傉嘉平二年南燕帝慕容超太上五西凉李暠建初五年連北凉沮渠䝉遜永安九年夏赫勃勃龍升三年春正月庚戌撫軍将軍劉毅為衛軍将軍開府以通鑑修秦以譙縱為蜀王以朱熹綱目修二月南燕㓂宿豫以夲紀修乞伏熾磐取枹罕乾歸自秦逃歸以吕祖謙標目修三月劉裕帥師伐南燕以夲紀修夏六月震于太廟夲紀劉裕大敗南燕王超于臨朐圍廣固以通鑑修秋七月乞復乾歸復稱秦王改元以吕祖謙標目修觧題曰宋庠紀年通譜更始夲劉𤣥慕容冲年號九月秦王興擊夏王勃勃大敗之以舉要歴補遺修冬十月戊辰燕弑其王雲馮䟦即天王位於昌黎改元以吕祖謙標目修觧題曰昌黎在營州元魏嘗立昌黎郡宋庠紀年通譜太平夲孫亮年號事見通鑑魏主珪為子清河王紹所弑紹兄齊王嗣誅之壬申即帝位改元以吕祖謙標目修觧題曰宋庠紀年通譜不俟踰年改元永興夲漢桓帝晋惠帝冉閔慕容儁年號事見通鑑晉安皇帝義熈六年燕馮䟦太平二年秦秦文桓皇帝𢎞始十二年西乞伏乾歸更始二年三魏太宗明元皇帝永興二年年南凉禿髪傉檀嘉平年南燕帝慕容超太上六西凉李暠建初六年赫北凉沮渠蒙遜永安十年夏連勃勃龍升四年春二月丁亥劉裕克廣固殺燕王公以下三千人執燕主超以歸斬之以通鑑修觧題曰按晋書紀傳載記宋書紀傳裕宋紀作帝将伐慕容超朝議皆謂不可丹陽尹孟昶賛行劉毅時鎮姑孰固止裕以為苻堅侵境謝太傅猶不自行宰相逺出傾動根夲謝裕獨曰公建桓文之烈應天人之心雖業髙振古而徳刑未樹宜推亡固存廣振威畧平定之後養鋭息徒然後觀兵洛汭脩復園寝豈有縱敵貽患者哉裕從之五年四月舟師發京都泝淮入泗至下邳留船艦輜重歩軍進琅邪所過皆築城留守初議者以為賊聞大軍逺出必不敢戰若不㫁大峴在沂州沂水縣當堅守廣固刈粟清野以絶三軍之資非唯難以有功将不能自反裕曰我揣之熟矣鮮卑貪不及逺計進利尅獲退惜粟苗謂我孤軍逺入不能持乆不過進據臨朐今青州縣退守廣固我一得入峴則人無退心驅必死之衆向懐貳之虜何憂不克彼不能清野固守為諸君保之超引見群臣于東陽殿議距王師公孫五樓曰呉兵輕果所利在戰初鋒勇鋭不可争也宜據大峴使不得入曠日延時沮其鋭氣可徐簡精騎二千循海而南青州自維􅁡逕道海州絶其粮運别敕叚暉率兖州之軍縁山東下腹背擊之上䇿也各命守宰依險自固校其資儲之外餘悉焚蕩堅壁清野以待其釁中策也縱賊入峴出城逆戰下䇿也五樓亡燕者也其論兵乃如此超曰京都殷盛户口衆多非可一時入守青苗布野非可卒芟設使芟苗城守以全性命朕所不能今據五州之彊帯山河之固戰車萬乗鐡馬萬群縱令過峴至於平地徐以精騎踐之此成擒也賀頼盧苦諌不從退謂五樓曰上不用吾計亡無日矣慕容鎮曰若如聖㫖必湏平原用馬為便宜出峴逆戰而不勝猶可退守不宜縱敵入峴自貽窘逼昔成安君不守井陘之闗終屈於韓信諸葛瞻不據束馬之嶮卒擒於鄧艾臣以為天時不如地利阻守大峴策之上也超不從鎮出謂韓􅒲曰主上既不能芟苗守險又不肯徙人逃㓂酷似劉璋矣今年國㓕吾必死之卿等中華之士復為文身矣超聞而大怒收鎮下獄乃攝莒今宻州縣梁父兖州有梁父山二戎脩城隍簡士馬蓄鋭以待之裕既入峴舉手指天曰吾事濟矣王師次東莞在莒縣超遣其左軍叚暉輔國賀頼盧等六将歩騎五萬進據臨朐城王師度峴超懼率卒四萬就暉等臨朐有巨蔑水水經巨洋水出朱虚縣㤗山北注袁宏謂之臣昧王韶之以為巨蔑亦曰朐瀰去城四十里超告五樓曰急徃據之晋軍得水則難擊也五樓馳進龍􅋮将軍孟龍符領騎居前奔徃争之五樓乃退衆軍歩進有車四千両分車為兩翼方軌徐行車悉張幔御者執矟又以輕騎為逰軍袁溉謂薛季宣曰大峴之戰用車而騎為左右翼以夾之也通鑑削騎兵而不載如是則法當敗季宣善之軍令嚴肅行伍齊整未及臨朐數里賊鐡騎萬餘前後交至裕命兖州刺史劉藩等齊力擊之参軍胡藩言於裕曰賊屯軍城外留守必寡今徃取其城而斬其旗幟此韓信所以克趙也裕乃遣檀韶率向彌胡藩馳徃即日䧟城斬其牙旗悉虜超輜重超聞臨朐已㧞引衆走裕親鼓之賊乃大奔超遁還廣固獲超馬偽輦玉璽豹尾等送于京師斬其大将叚暉等十餘人其餘斬獲千計明日大軍進廣固即屠大城超退保小城於是設長圍守之圍髙三丈外穿三重塹停江淮轉輸舘榖於齊土此所以能攻城半年而無後患也撫納降附華戎惟悦援才授爵因而任之超使其尚書郎張綱乞師于姚興赦慕容鎮進録尚書都督中外諸軍事引見群臣謝之鎮曰百姓之心係於一人陛下既躬率六軍身先奔敗群臣觧心士庶䘮氣内外之情不可復恃如聞西秦自有内難恐不暇分兵救人正當更决一戰以争天命今散卒還者猶有數萬可悉出金帛宫女餌令一戰天若相我足以破賊如其不濟死尚為美不可閉門坐受圍擊司徒慕容惠曰不然今晉乗勝有陵人之氣敗軍之将何以禦之秦雖與勃勃相持不足為患且二國連横勢成唇齒今有㓂難秦必救我但自古乞援不遣大臣則不致重兵尚書令韓範徳望燕秦所重宜遣乞援於是遣範與王蒲乞師于姚興七月超大将垣遵遵弟苗並率衆歸順人有竊告裕軍曰若得張綱為攻具者城乃可得綱從長安還㤗山太守申宣執送之裕令綱周城大呼曰勃勃大破秦軍無兵相救超怒伏弩射之於是使綱大治攻具超憂懼乃請稱藩求割大峴為界獻馬千疋不聽圍之轉急河北居民荷戈負粮至者日以千數姚興遣使告裕云慕容見與隣好又以窮告急今當遣鐡騎十萬徑據洛陽晋軍若不退者便當長驅而進裕呼興使而荅曰語汝姚興我定燕之後息甲三年當平關洛今能自送便可速來録事參軍劉穆之聞有羗使馳入而裕發遣已去以興所言并答具語穆之穆之尤裕曰常日事無大小必賜與謀之此宜善詳之云何卒爾便答公所言未能威敵正足怒彼耳若燕未可㧞羗救奄至不審何以待之裕笑曰此是兵機非卿所觧故不語耳夫兵貴神速彼若審能遣救必畏我知寜容先遣信命此是見我伐燕内已懐懼自張之辭耳尚書張俊自長安還降裕説裕曰燕人所以固守者外仗韓範兾得秦援若勃勃敗後秦必救燕宜宻信誘範㗖以重利範來則燕人絶望自然降矣裕從之表範為散騎常侍遺範書以招之時興遣其将姚强率歩騎一萬随範就其将姚紹于洛陽并兵來援會赫連勃勃大破秦軍興追强還長安範歎曰天其㓕燕平會得裕書遂降於裕裕将範循城由是人情離駭無復固志左右勸超誅範家以止後叛超知敗在旦夕又弟􅒲盡忠無貳故不罪焉張綱為裕造衝車覆以版屋䝉之以皮弁設諸竒巧城上火石弓矢無所施用又為飛樓懸梯木幔之属遥臨城上超大怒懸其母而支觧之明年尚書令董銳勸超出降超大怒繋之於獄於是賀頼盧公孫五樓為地道出戰王師不利河間人𤣥文説裕曰昔超攻曹嶷望氣者以為渑水帶城渑水出臨淄縣北經樂安􅀶昌縣南入時水􅀶昌今青州􅀶興也非可攻㧞若塞五龍口城必自䧟石季龍從之而嶷降後慕容恪之圍叚龕亦如之而龕降降後無幾又震開之今舊基猶在可塞之裕從其言至是城中男女患脚弱病者大半超輦而升城尚書恱夀言於超曰天地不仁助㓂為虐戰士尫病日就凋殞守困窮城息望外援天時人事亦可知矣茍歴運有終宜存宗廟之重超歎曰廢興命也吾寧奮劍决死不能衘璧求生城中出降者相繼裕四面進攻殺傷者甚衆悅夀遂開門以納王師超與左右數十騎出亡為裕軍所執裕數之以不降之状超神色自若一無所言惟以母託劉敬宣而已送建康市斬之此劉裕㓕燕之夲末也南燕徳至超二主十二年自垂燕元元年至寶永康三年十五年而徳稱王通二十七年又通廆至暐之年共一百一十三年燕徳盡矣盧循㓂長沙徐道覆㓂南康䧟盧陵豫章以紀傳修三月南凉王傉檀伐北凉及其王蒙遜戰于窮泉大敗遂遷樂都以舉要歴補遺修觧題曰今西寧州湟河一名樂都水壬申鎮南将軍江州刺史何無忌與徐道覆戰于豫章死之夏四月癸未劉裕至建康五月劉毅及盧循戰于桑落洲大敗乙丑循等至淮口劉裕屯石頭以通鑑修觧題曰按宋書紀傳賊至裕策之曰賊若於新亭直進其鋒不可當宜且囬避勝負之事未可量也若廻泊西岸此成擒耳道覆欲自新亭白石焚舟而上循多疑少决毎欲以萬全為慮謂道覆曰大軍未至孟昶便望風自裁以大勢言之自當計日潰亂今决勝負於一朝既非必克之道且殺傷士卒不如按兵待之裕登石頭城以望循軍初見引向新亭顧左右失色既而廻泊蔡洲道覆猶欲上循禁之楊佺期桓𤣥至石頭劉牢之帥北府之衆軍于新亭佺期𤣥見之失色囬軍蔡洲未幾狼狽西還自是衆軍轉集修治越城金陵故事周元王四年范蠡滅呉立城於金陵以張威勢宫苑記在瓦棺寺東南國門橋西北築查浦藥園寰宇記在覆舟山南輿地志晋為藥圃宋為藥㳺苑廷尉未詳三壘守以實衆冠軍劉敬宣屯北郊輔國孟懐玉屯丹陽郡西建武王仲徳屯越城廣武劉黙屯建陽門外建康實録正東建春門後改建陽門使寧朔李邈領鮮卑具装虎班突騎千餘疋賊遣十餘艦來攻石頭柵裕命神弩射之發輙摧䧟乃止不攻柵設伏兵於南岸使羸老悉乗舟向白石裕憂其從白石歩上乃率劉毅諸葛長民北出拒之又裕留参軍沈林子與徐赤特㫁拒查浦林子曰此言妖詐未必有實宜深為之防裕曰石頭城險且淮柵甚固留卿在後足以守之大軍既去賊果上赤特将擊之林子曰賊聲徃白石而屢來挑戰其情可知賊飬鋭待期而吾衆不盈二旅今距嶮足以自固若賊偽計不立大軍尋反君何患焉赤特鼓譟而出賊伏兵齊發赤特軍敗棄軍奔北岸林子率軍收散兵進戰道覆乃更出鋭卒㳂塘數里林子㫁塘而闘裕率諸軍馳歸衆憂賊過淮咸謂裕當徑還拒戰裕先分軍還石頭衆莫之暁觧甲息士洗浴飲食之乃出列陣於南塘以赤特違處分斬之命参軍諸葛叔度朱齡石率勁勇千餘人過淮群賊數千皆長刀矛鋋奮躍争進齡石所領多鮮卑善歩矟並結陣以待之短兵弗能抗死傷數百人乃退走餘見通鑑六月劉裕為太尉中書監加黄鉞裕受黄鉞餘辭以通鑑脩秋七月盧循還循陽甲子劉裕遣将追之以紀傳修八月劉裕遣将軍孫處沈田子自海道襲畨禺以吕祖謙標目修譙縱使桓謙會秦将軍茍林㓂荆州刺史劉道規擊斬之以吕祖謙標目脩冬十月癸巳劉裕擊盧循以吕祖謙標目修徐道覆㓂江陵劉道規大破走之以通鑑修十一月庚戌孫處拔畨禺以通鑑修十二月劉裕及盧循戰于大雷大敗之丙申復敗之于左里循走遣兖州刺史劉藩等追之以通鑑修觧題曰安慶府望江縣有大雷口小雷口左里在南康都昌縣西北四十里晉安皇帝義熈七年燕馮䟦太平三年秦秦文桓皇帝𢎞始十三年西乞伏乾歸更始三年四魏太宗明元皇帝永興三年北南凉禿髪傉檀嘉平年西凉李暠建初七年凉沮渠蒙遜永安十一年五夏赫連勃勃龍升年春正月西秦王乾歸降秦秦以為河南王以吕祖謙標目修觧題曰按載記秦以勃勃之難權宜許之餘見通鑑二月壬午克始興徐道覆伏誅以夲紀修北凉王蒙遜取姑臧圍樂都以吕祖謙標目修三月劉裕受太尉中書監之令以吕祖謙標目修觧題曰三十國春秋裕既拜朝賢畢至僕射謝混後來衣冠傾縱弛慢之容裕甚不平謂之曰謝僕射今日可謂傍若無人混曰明公将隆伊周之化使四海虚襟謝混何人而敢獨異乎乃以手板撥其􅁭領悉皆觧散裕大悦時人莫不竒之盧循圍畨禺不克夏四月沈田子破之循奔交州伏誅以夲紀修秋七月河南王乾歸伐南凉八月敗之以通鑑修晉安皇帝義熈八年燕馮䟦太平四年秦秦文桓皇帝𢎞始十四年西乞伏熾磐永康元年五魏太宗明元皇帝永興四年北南凉秃髪傉檀嘉平年西秦李暠建初八年凉沮渠蒙遜𤣥始元年升夏赫連勃勃龍六年春二月河南王乾歸徙譚郊以載紀修觧題曰蘭州蘭泉縣有苑川縣嵻㟍山一名可㟍山乞伏熾磐城嵻㟍山乾歸攻姚興徙四千餘户於苑川三千餘戸于譚郊乞伏公府走追擒于嵻㟍南山轘之于譚郊皆蘭州境也夏四月劉毅都督荆寧秦雍四州軍事荆州刺史以吕祖謙標目修觧題曰三十國春秋謝混會之屏人累日餘見通鑑六月河南王乾歸為将軍乞伏公府所弑秋七月乾歸子平昌公熾磐討誅之八月即王位改元都枹罕以吕祖謙標目修觧題曰宋庠紀年通譜永康夲漢桓帝晋惠帝慕容寶年號皇后王氏崩以夲紀修九月己夘劉裕殺右将軍劉藩左僕射謝混帥衆襲劉毅冬十月裕参軍王鎮惡䧟江陵殺毅以前會稽内史司馬休之都督荆雍等六州軍事荆州刺史以紀傳修觧題曰毅與裕俱舉大義興復晋室自謂京城廣陵功業足以相抗雖權事推裕而心不服也毅既有雄才大志厚自矜許朝士素望者多歸之與尚書僕射謝混丹陽尹郗僧施並深相結當時兩種議論已成毅為亞相愛才好士當世莫不輻凑揚州主簿張劭不徃或問之邵曰王公命世人傑何煩多問劉穆之聞以白裕裕益親之又胡藩謂劉裕曰豁逹大度功髙天下連百萬之衆毅固以此服公至于渉獵記傳一咏一黙自許雄豪以誇縉紳白面之士輻凑而歸毅不肯為公下也鄭鮮之謂劉毅權重當時朝野莫不歸附鮮之盡心武帝獨不屈意於毅以此可見及鎮江陵豫州舊府多割以自隨請僧施為南蠻校尉裕知毅不能居下終為異端宻圖之毅至西稱疾篤表求從弟兖州刺史藩以為副貳偽許焉九月藩入朝裕命收藩及謝混並於獄賜死自表討毅按宋書謝方明傳劉穆之權重當時朝野輻凑不與穆之相識者惟謝混謝方明郄僧施蔡廓而已穆之甚以為恨方明廓後徃造之大恱盖此四人者以故家風素自許故不屑於穆之而混僧施之不免於死則亦以終不屈莭故也裕與劉穆之謀討毅而王智在焉他日穆之白曰伐國重事也公云何乃使王智知裕笑曰此人髙簡豈聞此軰議論餘見通鑑葉適曰裕夲有濶逹意度而穆之乃以狹劣誤教之也氐揚盛叛秦秦討之不克以通鑑修北凉王䝉遜遷于姑臧十一月即河西王位改元以吕祖謙標目修十二月以西陽太守朱齡石為建威将軍益州刺史伐蜀以吕祖謙標目修觧題曰按宋書列傳初裕與齡石宻謀進取曰劉敬宣徃年出黄虎無功而退賊謂我今應從外水徃而料我當出其不意猶從内水來也如此必以重兵守涪城以備内道若向黄虎正堕其計今以大衆自外水取成都疑兵取内水此制敵之竒也而慮此聲先馳虜審虚實别有凾書全封齡石署函邉曰至白帝乃開諸軍雖進未知處分所由至白帝發書曰衆軍悉從外水取成都臧熈朱林於中水取廣漢使羸弱乗髙艦十餘由内水向黄虎衆軍乃倍道兼行譙縱果偹内水使大将譙道福以重兵戍涪城遣其秦州刺史侯暉蜀郡太守譙詵等率衆萬餘屯彭模夾水為城衆號三萬齡石至彭模去成都二百里詣劉鍾謀曰今天時盛熱而賊嚴兵固險攻之未必可㧞祗增疲困且欲養鋭息兵伺其隙而乗之卿意謂何鍾曰不然前揚聲言大衆向内水道福不敢捨涪城今重兵出其不意蜀人已破膽矣賊今阻兵守險是懼不敢戰非能持重堅守也因其洶懼盡鋭攻之其勢必克鼓行而進成都必不能守矣若緩兵相守彼将知人虚實涪軍忽來并力拒我人情既安良将又集此求戰不獲軍食無資當為蜀子虜耳齡石從之明日進攻䧟其二城斬侯暉譙詵諸營守以次土崩衆軍乃舍舡歩進臧熹病卒朱林至廣漢復破譙道福别軍乗船䧟牛脾元和郡縣志中江水即牛鞞水也昔羅尚乗牛鞞水征李雄在今資州斬其大将譙撫縦聞諸處盡敗奔涪城道福聞平模不守率精鋭五千兼行來赴聞縱已走衆亦散乃逃於獠中巴西民杜瑶縳送之斬于軍門餘見通鑑水出江油自涪城至潼川過遂寧入合州至重慶與大江合此内水也水自汶山自漢州金堂峽歴懐安軍富順監至瀘州與大江合此中水也大江出岷山由眉州嘉定叙瀘至重慶此外水也桓温之伐李勢由外水也劉敬宣之討譙縱則偏師在外水而躬由内水也至齡石則三道並進而重兵又在外水也分荆州置湘州吕祖謙標目晉安皇帝義熈九年燕馮䟦太平五年秦秦文桓皇帝𢎞始十五年西乞伏熾磐永康二年六魏太宗明元皇帝永興五年北南凉秃髪傉檀嘉平年西秦李暠建初九年凉沮渠蒙遜𤣥始二年翔夏赫連勃勃鳳元年春二月乙丑晦劉裕還建康三月丙寅朔殺豫州刺史諸葛長民及其諸弟以夲紀修劉裕請申土㫁省流寓郡縣以通鑑修夏王勃勃改元築統萬城改姓赫連以吕祖謙標目修夏四月南凉王傉檀伐河西河西王蒙遜敗之遂圍樂都降湟河以通鑑修秋七月壬申朱齡石克成都譙縱伏誅以齡石監梁秦六郡軍事以通鑑修是嵗以前淮陵内史索邈為梁州刺史苻宣還仇池以吕祖謙標目修晋安皇帝義熈十年燕馮䟦太平六年秦秦文桓皇帝𢎞始十六年西乞伏熾磐永康三年七魏太宗明元皇帝神瑞元年北南凉秃髪傉檀嘉平年西凉李暠建初十年凉沮渠䝉遜𤣥始三年翔夏赫連勃勃鳳二年春正月辛酉魏改元以吕祖謙標目修秦尚書令廣平公弼謀亂諸鎮欲起兵誅之夏五月免弼乃罷兵以吕祖謙標目修南凉王傉檀伐乙弗部大破之河南王熾磐襲䧟樂都六月傉檀降之以吕祖謙標目修觧題曰烏孤以安帝隆安元年僣立至傉檀三世凡十八年以義熈十年㓕秋八月魏主嗣以相州刺史書聞于劉裕以吕祖謙標目修九月丁巳朔日有食之以夲紀修冬十月河南王熾磐稱秦王以夲紀修是嵗城東府夲紀觧題曰按南朝宫苑記城於十年宋大明移揚州其中景明罷陳初又為揚州廨魏愽士祭酒崔浩與軍國之謀以吕祖謙標目修晉安皇帝義熈十一年燕馮䟦太平七年西秦文桓皇帝𢎞始十七年秦乞伏熾磐永康四年年魏太宗明元皇帝神瑞二年暠建初十一北凉沮渠蒙遜𤣥始四年西凉李夏赫連勃勃鳳翔三年春正月劉裕帥師攻司馬休之魯宗之舉兵應休之三月裕克江陵休之宗之奔㐮陽尋奔秦以吕祖謙標目修觧題曰葉適曰裕有一天下之資其時亦易然卒以不就者既除劉毅司馬休之自應止此規小意狹又再費日月故也事見通鑑夏王勃勃㧞秦杏城以通鑑修夏五月甲申彗星二見夲紀劉裕自加殊禮以通鑑修河西王蒙遜奉表以通鑑修秋七月丙戌京師大水壊太廟夲紀辛亥晦日有食之以通鑑修八月劉裕還建康以通鑑修魏荐饑以朱熹綱目修晉安皇帝義熈十二年燕馮䟦太平八年乞秦帝姚泓永和元年西秦伏熾磐永康五年年魏太宗明元皇帝太常元年初十二北凉沮渠蒙遜𤣥始五年西凉李暠建夏赫連勃勃鳳翔四年春正月秦王興疾篤廣平公弼作亂伏誅興卒太子泓即帝位改元以載記修觧題曰宋庠紀年通譜姚泓不俟踰年改元永和夲漢順帝晉穆帝年號事見通鑑二月劉裕自加中外大都督以夲紀修夏四月壬子魏改元以吕祖謙標目修六月楊盛攻秦祁山㧞之以通鑑修夏㧞秦上邽隂宻安定雍城安定尋復為秦以通鑑修觧題曰隂宻今涇州靈䑓縣有隂宻城秋七月劉裕帥師及太尉琅邪王徳文伐秦以世子義符為中軍将軍監太尉留府左僕射劉穆之領監軍中軍司觧題曰裕伐南燕以孟昶任留務明年追盧循則昶已死遂以劉毅任留務又二年討劉毅以諸葛長民任留務而以劉穆之防之又三年討司馬休之則長民已死遂以其弟任留務而事皆决於劉穆之明年伐秦以其子任留務而使穆之總攝内外及穆之死則裕僕僕南還矣事見通鑑将軍檀道濟王鎮惡歩向許洛沈林子等水軍出石門沈田子等趨武闗兾州刺史王仲徳督前鋒開鉅野入河九月裕至彭城仲徳取魏滑臺冬十月道濟進洛陽丙寅秦将軍陳留公洸降十一月裕自加九錫十二月壬申自為相國揚州牧宋公復辭不受以宋書列傳修秦并州牧姚懿反於蒲坂東平公紹擊誅之以吕祖謙標目修省湘州以宋書州郡志修觧題曰通鑑義熈八年永初三年俱載分荆州置湘州而其間省湘州不書闕也大事記續編卷三十四
