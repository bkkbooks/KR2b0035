body:
  text: 大事記續編卷三十二明王禕撰晉烈宗孝武皇帝太元八年秦宣昭皇帝建元十九年夏五月桓冲伐秦攻㐮陽遣将軍楊亮伐蜀取秦五域六月秦兵救之觧題曰明年於是亮再岀師矣秋七月加冲江州刺史以通鑑修八月秦王堅大舉入㓂以陽平公融慕容垂等為前鋒詔尚書僕射謝石為征討大都督冠軍将軍謝𤣥為前鋒都督以拒之桓冲遣兵入援謝安却之以夲紀通鑑修九月司徒琅邪王道子録尚書六條事以夲紀修冬十月癸酉秦陽平公融䧟夀陽秦主堅輕騎就之十一月謝𤣥遣廣相劉牢之擊斬秦衛将軍梁成於洛澗𤣥等遂殺融於肥水秦兵大敗時慕容垂所将獨全堅单騎赴之至澠池遣垂安集闗東以通鑑目録吕祖謙標目修觧題曰按列傳載記堅東西萬里水陸齊進運漕萬艘自河入石門逹于汝頴融等攻䧟夀春執平虜将軍徐元喜安豐太守王先慕容重攻䧟鄖城杜預江夏雲杜縣東南有鄖城雲杜今應城縣也謝𤣥使胡彬劉牢之距之師次硤石元和郡縣志云在下蔡西南六十里淮經中過對岸山上築二城防津要西岸属下蔡東岸属壽春不敢進衛将軍梁成等率衆五萬屯于洛澗水經洛澗北歴秦墟下注淮謂之洛口寰宇記洛水自濠州定逺縣西入與夀春縣洛水口中流分界至新城村入淮以遏東軍頻敗王師謝石謝𤣥等去洛澗二十五里憚成不進胡彬為融所逼粮盡詐揚沙以示融軍潜遣使告石等曰今賊盛粮盡恐不見大軍融軍人獲之馳使白堅曰賊少易俘但懼其越逸宜速進軍堅大恱恐石等遁捨大軍于項城以輕騎八千兼道赴之初諺曰堅不出項群臣勸堅停項為六軍聲鎮不從令軍人曰敢言吾至夀春者㧞舌故石等弗知崔鳴曰融固言不可而使之其有不敗乎堅若不度項雖前師覆敗大軍可以無土崩堅所以率爾濟淮顛沛而反融之罪也堅遣尚書朱序說石等以衆盛欲脅而降之序謂石曰若堅百萬悉到莫可與敵及其未集擊之可以得志聞堅在夀春而懼謀不戰以疲之謝琰勸從序言許之𤣥遣牢之率参軍劉襲諸葛永等直進渡水臨陣斬成及其弟雲分兵㫁其歸津賊歩騎崩潰争赴淮水殺獲萬餘人盡收其噐械石等水陸繼進堅與苻融登城而望王師見部陣齊整将士精鋭又北望八公山上在安豐夀春縣西四里草木皆類人形顧謂融曰此亦勍敵也何謂小乎憮然有懼色時張蚝敗謝石于肥南𤣥琰勒卒數萬陣以待之蚝乃退列陣逼淝水按四凟編淝水有二其源出南岸安豊軍者曰東淝河出北岸亳州蒙城縣者曰西淝河西淝水出縣西北藪澤入淮之處與風火灘相近東淝水出廬州雞鳴山入淮之處距花靨鎮相近詳見齊永元二年淝口觧題師不得渡遣使謂融曰君懸軍深入置陣逼水此持乆之計豈欲戰者乎若小退師令将士得周旋僕與君緩轡而觀之不亦美乎堅衆皆曰宜阻肥水莫令得上我衆彼寡勢必萬全堅曰但却軍令得過而我以鐡騎數十萬向水逼而殺之融亦以為然遂麾使却陣軍遂奔退制之不可止𤣥與謝琰桓伊等以精鋭八千渡水融馳騎畧陣馬倒被殺軍遂大敗姚㐮攻洛陽桓温至伊水㐮撤圍拒之遣使謂之曰承親帥王師以来今奉身歸命願敕三軍小却當拜㐲路左温曰欲來者便前相見在近何煩使人㐮拒水而戰温結陣而前㐮衆大敗𤣥之請于融即㐮之請于温者也使堅如温之所以待㐮則𤣥之䇿不得施矣毋已則却軍以致師及其未濟而擊之歟固以是俟𤣥矣兵故無常勢也王師乗勝追擊至于青岡在安豊軍夀春縣西十三里死者相枕堅為流矢所中單騎宵遁征虜司馬毛璩與田次之共躡堅至中陽不及而歸聞風聲鶴唳皆以為王師已至草行露宿重以饑凍死者十七八餘見通鑑張栻曰淮淝一戰夷夏離合之大機也苻氏初假晉名字以立國及其馘姚㐮墟慕容㓕凉㓕代且取蜀于晋矣然堅雖操把握之權而無堅凝之策事特可慮耳王猛垂絶拳拳願勿圖晋而深以鮮卑西羗為憂盖知其機之所在矣而堅莫之知也伐晋之役通國皆諌惟慕容垂姚萇勸其行及秦衆皆敗惟垂三萬人獨全是果何心哉未幾而即叛去姚萇效之而乞伏吕光亦皆紛然四起獨惜晋之君相既相猜疑而規恢之功迄不可覬秦分為三燕分為二凉分為四披披藉藉五十餘年而後畧定皆自淮淝之役始也十二月開酒禁增民稅米口五石以通鑑修秦将軍乞伏國仁反於隴西以吕祖謙標目修前句町王翟斌舉兵於河南秦長樂公丕遣慕容垂討之垂叛以夲紀修時帝踈忌謝安以吕祖謙標目修晉烈宗孝武皇帝太元九年秦宣昭皇帝建元二十年燕成武皇帝慕容垂燕元元年武西燕帝慕容泓燕興元年後秦昭皇帝姚萇白雀元年春正月慕容垂至洛陽翟斌降之垂自稱燕王改元庚戌圍長樂公丕於鄴以通鑑修觧題曰王容曰燕載記杜延業晉春秋宋庠記年通譜皆曰燕元元年通鑑闕元字将軍劉牢之克秦譙城以夲紀修桓冲遣兵克秦新城魏興上庸以夲紀修二月辛巳豊城宣穆公桓冲卒振武将軍梁郡太守桓石明為西中郎将荆州刺史冠軍将軍河東太守桓石䖍為衛州刺史西中郎将豫州刺史桓伊都督江荆豫州軍事江州刺史以吕祖謙標目修觧題曰按世說新語桓車騎在上明政獵東信至傳淮上大㨗語左右云羣謝年少大破賊因發病薨餘見通鑑吕祖謙曰冲憂晉室之危而謂吾其左袵乃事理之當然初不足為過淝水之㨗冲於此喜而不寐可也尚何慚耻之有冲之所以慚耻者不過自咎其言之不中耳然推是心而充之則其害事甚矣楊國忠之於禄山是已此誠可為深戒使冲之言果驗吾意其未必能死也三月謝安為太保以夲紀修觧題曰按桓伊傳安壻王國寶專利無檢行安抑制之及孝武末年嗜酒好内而會稽王道子昏醟音詠尤甚惟狎昵謟邪於是國寶䜛諛之計稍行於主相之間而好利險詖之徒以安功名盛極而構㑹之嫌隙遂成帝召伊飲讌安侍坐帝命伊吹笛伊即吹為一弄請以筝歌乃撫筝而歌怨詩曰為君既不易為臣良獨難忠信事不顯乃有見疑患周旦佐文武金縢功不刋推心輔王政二叔反流言聲節慷慨俯仰可觀安泣下霑襟乃越席而就之捋其鬚曰使君於此不凡帝甚有愧色餘見通鑑秦北地長史慕容泓起兵于華隂秦主堅遣将軍符叡姚萇討之平陽太守慕容冲起兵遣将軍竇衝討之夏四月泓敗秦兵殺叡萇奔渭北自稱秦王改元竇衝大破冲冲奔泓泓改元以吕祖謙標目修觧題曰按載記萇懼奔于渭北遂如馬牧在京兆府興平縣東南二十里西州豪族尹詳趙曜王欽盧牛雙狄廣張乾等率五萬餘家咸推萇為盟主萇将距之天水尹緯説萇曰今百六之數既臻秦亡之兆已見以将軍威靈命世必能匡濟時艱故豪傑驅馳咸同推仰明公宜降心從議以副群望不可坐觀沉溺而不拯救之萇乃自稱大将軍大單于萬年秦王稱制行事寰宇記耀州華原縣西七十五里有姚萇殿時慕容冲與苻堅相攻衆甚盛萇将西上恐冲遏之遣使通和以子崇為質於冲進屯北地厲兵積粟以觀時變餘見通鑑五月梁州刺史楊亮伐秦以通鑑修燕降信都以通鑑修六月癸丑朔崇徳太后崩以夲紀修西燕将髙盖殺慕容泓立冲為皇太弟以吕祖謙標目修燕㧞秦常山秋七月克中山以通鑑修秦豫州牧平原公暉奔長安桓石民遣兵戍洛陽以通鑑修取秦涪城以通鑑修觧題曰明年遂平益州矣慕容冲敗秦兵據阿房城以吕祖謙標目修燕王垂殺翟斌斌兄子真領其衆以吕祖謙標目修秦吕光破龜兹定西域以吕祖謙標目修八月燕觧鄴圍以吕祖謙標目修謝安請開拓中原以謝𤣥為前鋒都督伐秦取彭城九月彭城内史劉牢之克鄄城甲午加安大都督揚江等十五州軍事假黄鉞以紀傳吕祖謙標目修觧題曰六月之卒章曰侯誰在矣張仲孝友盖非張仲則無以成吉甫之功也晋之君相既自不和則雖百日而復河南何益哉事見通鑑冬十月辛亥朔日有食之以夲紀修秦青州刺史苻朗降以夲紀修匈奴劉庫仁将救秦爲其下所殺弟頭眷領其衆以吕祖謙標目修謝𤣥遣将克黎陽秦長樂公丕來請救以吕祖謙標目修兖青司豫皆平加謝𤣥都督徐兖等七州軍事以吕祖謙標目修十二月秦殺慕容暐盡誅鮮卑以吕祖謙標目修燕復圍鄴謝𤣥遣劉牢之救之以吕祖謙標目修取秦漢中以通鑑修晉烈宗孝武皇帝太元十年秦帝苻丕太安元年成武皇帝燕元二年燕西燕帝慕容冲更始元年國後秦昭皇帝白雀二年西秦乞伏仁建義元年春正月西燕慕容冲即帝位改元以吕祖謙標目修觧題曰宋庠紀年通譜更始夲劉𤣥年號秦王堅與西燕連戰大破之以通鑑修燕取秦薊以通鑑修三月秦滎陽郡降以夲紀修夏四月劉牢之至鄴燕王垂遁牢之追之大敗秦長樂公丕就食枋頭牢之入鄴尋坐徴還以吕祖謙標目修觧題曰桓温西至覇上東戰枋頭俱以持重失之其後牢之遂以輕易得之謝安欲乗苻氏傾敗開拓中原但狃劉牢之輕易之得而不思桓温之所懼也遂以失利燕秦合而温敗適其隆也晋秦合而牢之敗際其衰也事勢大遼絶矣事見通鑑琅邪王道子與謝安有隙壬戌安出鎮廣陵以吕祖謙標目修取秦益州以夲紀修翟真屯行唐為其下所殺其弟成立翟遼奔黎陽以吕祖謙標目修五月西燕主冲攻長安秦王堅奔五将山六月冲入長安以通鑑修觧題曰五将山在鳳翔府岐山縣西北秋七月旱饑以夲紀修後秦王萇執秦王堅尋弑之以吕祖謙標目修秦太子宏來奔以通鑑目録修秦長樂公丕復入鄴以通鑑目録修癸酉翟成長史執成降燕以通鑑修八月謝安還建康以吕祖謙標目修丁酉建昌文靖公謝安薨庚子司徒琅邪王道子領揚州刺史録尚書都督中外軍事以紀傳修秦長樂公丕奔晋陽稱帝改元燕取鄴以吕祖謙標目修觧題曰王容曰載記宋庠紀年通譜秦改元皆作太安通鑑作大誤也太安夲晋惠帝年號匈奴劉顯弑劉頭眷而自立将殺拓䟦珪珪奔賀蘭部以吕祖謙標目修九月秦吕光還凉州殺刺史梁熈而代之以通鑑修乞伏國仁自稱秦河二州牧改元以吕祖謙標目修觧題曰按載記國仁置武城武陽今渭州安固今蘭州蘭泉縣武始今熈州狄道縣漢陽今秦陽天水今天水縣畧陽今秦州隴城縣漒川漒水即羗水出隴西羗道東南流甘松今松州甘松嶺匡朋十六國春秋乾歸常以叱豆渾為匡朋太守又方輿記綏州延福縣有隋匡州城疑即匡朋白馬今慶陽府安化縣本漢郁郅縣白馬水出北塞水經注洛川南經尉李城東北合馬嶺水號白馬水苑川蘭州蘭泉縣水經注苑川水出勇士縣子城之南山東北流又北逕收師苑又有東西二苑城相去七里西城乞佛所都十二郡築勇士城今會州會寕縣以居之餘見通鑑冬十二月燕都中山以吕祖謙標目修晉烈宗孝武皇帝太元十一年秦帝苻丕太安二年年燕成武皇帝建興元西西燕慕容永中興元年秦乞伏國仁建義二年後秦武昭皇帝建初元年凉王吕光太安元年秦髙皇帝苻登太初元年國魏太祖道武皇帝拓䟦珪登元年春正月戊申拓䟦珪即代王位建元以吕祖謙標目修觧題曰宋庠紀年通譜登成也羙國政之成以冠元詩云登是南邦此其義也燕王垂即帝位立子寶為太子以吕祖謙標目修翟遼據黎陽以吕祖謙標目修二月燕改元以吕祖謙標目修觧題曰宋庠紀年通譜建興夲劉禪孫亮李雄晋愍帝年號西燕弑其主冲立其将叚隨為王改元以吕祖謙標目修代徙都盛樂吕祖謙標目三月泰山太守張願降翟遼謝𤣥還淮隂以吕祖謙標目修觧題曰石氏之亂殷浩嘗北出許洛矣張遇一以許昌叛則師不能尺寸進苻氏之亂謝𤣥嘗經畧中原矣張願一據黎陽則逡廵而還淮隂盖晋之君臣夲無堅凝之志則失色於蜂蠆而奪心於鴻鵠者皆是也欲求中原塊土詎可得哉事見通鑑西燕僕射慕容恒等殺叚随立慕容顗為王而東復見殺立冲之子瑶為帝改元尚書慕容永殺之立泓之子忠稱帝於聞喜改元建武以吕祖謙標目修觧題曰宋庠紀年通譜忠改元建武夲漢光武晋惠帝元帝石勒年號聞喜今解州縣餘見通鑑夏四月後秦取長安以吕祖謙標目修代改稱魏吕祖謙標目後秦王萇即帝位改元以吕祖謙標目修觧題曰宋庠紀年通譜建初夲漢章帝李特年號餘見通鑑六月庚寅以前輔國将軍楊亮為雍州刺史以夲紀修桓石民遣将取𢎞農以通鑑修西燕弑其主忠立太尉慕容永為河東王稱藩于燕以吕祖謙標目修觧題曰西燕一嵗而易六主亂亦甚矣事見通鑑秋七月秦狄道長苻登取南安以登為南安王以吕祖謙標目修劉顯迎故代王什翼犍之子窟咄以逼魏魏王珪北奔請救於燕以吕祖謙標目修冬十月吕光改元以吕祖謙標目修秦主丕攻燕王永大敗於㐮陵丕奔東垣将軍馮該斬之永據長子稱帝改元以吕祖謙標目修觧題曰㐮陵今平陽會縣長子隆德府長子縣甲申海西公薨以吕祖謙標目修燕魏破拓䟦窟咄窟咄走死以通鑑修十一月秦南安王稱帝改元以吕祖謙標目修觧題曰宋庠紀年通譜太初夲漢武帝年號事見通鑑十二月吕光自稱凉州牧酒泉公以通鑑修晉烈宗孝武皇帝太元十二年燕成武皇帝建興二年西燕帝慕容永中興二年年後秦武昭皇帝建初二年魏西秦乞伏國仁建義三凉王吕光太安二年太祖道武皇帝登國二年初秦髙皇帝太二年春正月乙巳以謝𤣥為會稽内史龍驤将軍豫州刺史朱序為青兖二州刺史鎮淮隂以紀傳修燕師濟河以通鑑修二月燕大破張願于瓮口青兖徐州縣多降之以吕祖謙標目修觧題曰瓮口在濟南府禹城縣三月秦以乞伏國仁為苑川王以通鑑修秋七月燕魏㓕劉顯以吕祖謙標目修八月辛巳立子徳宗為皇太子以夲紀修晉烈宗孝武皇帝太元十三年燕成武皇帝建興三年西燕帝慕容永中興三年年後秦武昭皇帝建初三年魏西秦乞伏乾歸太初元凉王吕光太安三年太祖道武皇帝登國三年初秦髙皇帝太三年春正月康樂獻武公謝𤣥卒以通鑑修二月翟遼稱魏天王改元以吕祖謙標目修夏四月戊午征虜将軍朱序都督司雍梁秦州軍事雍州刺史戍洛陽以通鑑修五月翟遼徙滑䑓以通鑑修六月乞伏國仁卒弟乾歸自稱河南王改元以吕祖謙標目修觧題曰宋庠紀年通譜太初夲漢武帝苻登年號餘見通鑑秋八月魏使拓䟦儀使燕以吕祖謙標目修晉烈宗孝武皇帝太元十四年燕成武皇帝建興四年西燕帝慕容永中興四年年後秦武昭皇帝建初四年秦西秦乞伏乾歸太初二梁王吕光麟嘉元年髙皇帝太初四年皇魏太祖道武帝登國四年春正月秦以河南王乾歸為金城王以通鑑修二月吕光稱三河王改元以吕祖謙標目修觧題曰後漢西羗傳羗爰劍亡入三河間李賢曰三河黄河賜支河湟河也宋庠紀年通譜時麟見金澤縣光以為已瑞乃僣號稱王改元麟嘉夲劉聰年號夏四月翟遼䧟滎陽以夲紀修六月左将軍桓石民卒秋七月以驃騎長史王忱都督荆益寕州軍事荆州刺史以通鑑修觧題曰按列傳桓石民為荆州刺史桓石䖍為豫州刺史未嘗更易也夲紀書荆州刺史桓石䖍卒誤也餘見通鑑宋書州郡志荆州刺史陶侃治沌口王敦治武昌其後或還江陵或治夏口桓温治江陵桓冲居上明王忱還江陵不復移動八月後秦破秦軍獲其后毛氏以吕祖謙標目修冬侍中王國寳諷八座請進琅邪王道子丞相加殊禮帝大怒道子譛中書侍郎范寗出之以通鑑修觧題曰帝威權已出雅有人君之量既而溺於酒色為長夜之飲醒日常少不親萬幾太白連年晝見地震水旱為變者相属而傍無正人但與會稽王道子酣歌為務姏武酣反姆莫候反尼僧尤為親䁥並竊弄其權凡所幸接皆出自小竪郡守長吏為道子所樹立中書令王國寳性卑佞特所寵昵官以賄遷政刑謬亂又崇信浮屠之學用度奢侈下不堪命太元以後為長夜之宴蓬首昏目政事多闕左衛領營将軍許榮上疏不省國寳諷八座啓以道子為丞相加殊禮䕶軍将軍車𦙍曰此乃成王所以尊周公也今主上當陽非成王之地相王在位豈得為周公乎乃稱疾不署䟽奏帝大怒而甚嘉𦙍中書侍郎范寗甚被親愛指斥朝士直言無諱國寶寗之甥也寗尤疾其阿䛕勸帝黜之國寳懼使陳郡袁恱之因尼妙音致書太子母陳淑媛説國寶忠謹宜見親信帝知之託以他罪殺恱之國寶大懼遂因道子讃寗由是出為豫章太守餘見通鑑晉烈宗孝武皇帝太元十五年燕成武皇帝建興五年西燕帝慕容永中興五年年後秦武昭皇帝建初五年秦西秦乞伏乾歸太初三凉王吕光麟嘉二年髙皇帝太初五年皇魏太祖道武帝登國五年春正月西燕王永向洛陽朱序敗之於太行還擊翟遼走之序還㐮陽以舉要歴補遺脩二月辛巳中書令王恭都督青兖等五州軍事青兖二州刺史以夲紀修觧題曰按王雅傳帝以道子無社稷噐幹乃選時望以為藩屏将擢王恭殷仲堪等先以訪雅雅以恭等無當世之才不可大任乃從容曰王恭風神簡貴志氣方嚴既居外戚之重當親賢之寄然其禀性峻隘無所包容執自是之操無守節之志仲堪雖謹於細行以文義著稱亦無宏量且幹畧不長若委以連率之重據形勝之地今四海無事足能守職若道不常隆必為亂階帝以恭等為當時之望謂雅疾其勝已故不從二人皆被升用其後竟敗有識之士稱其知人餘見通鑑雅當時所謂佞幸之人其議論乃如此夏四月秦将軍魏掲飛攻後秦杏城後秦主萇斬之以通鑑修觧題曰姚萇在五胡中亦英雄之靡爾然其用兵亦有髣髴曹孟徳者符登進逼安定諸将勸萇疾戰萇曰與窮㓂競勝兵家之下吾将以計取之於是留其尚書令姚旻守安定夜襲登輜重于大界克之此亦孟徳襲烏巢輜重之意也魏掲飛率氐胡數萬人攻姚當成於杏城鎮東将軍雷惡地應之攻姚漢得於李潤萇潜軍赴之萇衆不滿二千掲飛惡地衆至數萬氐胡赴之者首尾不絶萇每見一軍至輙有喜色群下怪而問之萇曰今同悪相濟皆來會集吾得乗勝席卷一舉而覆其巢穴東北無復餘也掲飛等以萇兵少盡衆來攻萇固壘不戰示之以弱潜遣子崇率騎數百出其不意以乗其後掲飛兵擾亂萇遣王超譚亮率歩騎擊之斬掲飛及首級萬餘惡地請降是亦得於孟徳待馬超韓遂等十部之意也萇以崛起之姿而能坐定闗河要亦非偶然而致此者事見通鑑秋七月壬申有星孛于北河經太微入北斗八月戊戌入紫微乃㓕以宋書五行志修朱序遣劉牢之攻翟遼于滑䑓大敗之張願降以紀傳修九月王國寶為中書令以吕祖謙標目修晉烈宗孝武皇帝太元十六年燕成武皇帝建興六年西燕帝慕容永中興六年年後秦武昭皇帝建初六年秦西秦乞伏乾歸太初四凉王吕光麟嘉三年髙皇帝太初六年皇魏太祖道武帝登國五年夏四月秦王登攻後秦五月後秦主萇大破之以通鑑修六月燕趙王麟請攝魏王珪還朝不從秋七月珪遣其弟觚如燕燕留之魏與燕絶以吕祖謙標目修九月以右僕射王恂為左僕射太學愽士范𢎞之請贈殷浩黜桓温恂黜之為餘杭令以列傳修觧題曰盖自簡文父子繼襲之後咸謂廢昏立明當時議論無復以桓温為賊者此𤣥所以敢抗䟽以自陳也謝安王坦之軰方幸温之死而彌縫桓氏况敢正名定罪乎如恂者無青爾矣餘見通鑑冬十月魏王珪大破柔然徙其部於雲中以吕祖謙標目修觧題曰柔然東胡之苗裔姓郁乆閭氏車鹿舍始自號柔然後魏太武以其無知状類於虫改其號為蠕蠕社㖮始并諸部西則焉耆東則朝鮮北窮瀚海南臨大磧其常所會庭則敦煌張掖之北翟遼卒子釗立改元以吕祖謙標目修匈奴劉衛辰攻魏十一月魏破滅之十二月其子勃勃奔薛于部以吕祖謙標目修晉烈宗孝武皇帝太元十七年燕成武皇帝建興七年西燕帝慕容永中興七年年後秦武昭皇帝建初七年秦西秦乞伏乾歸太初五凉王吕光麟嘉四年髙皇帝太初七年皇魏太祖道武帝登國七年夏五月丁夘朔日有食之以夲紀修六月燕主垂擊翟釗敗之釗奔西燕以夲紀載紀修秋七月秦主登逼安定八月後秦主萇拒却之以通鑑修冬十月王忱卒以夲紀修朱序病免以通鑑修十一月癸酉黄門侍郎殷仲堪都督荆益寕州軍事荆州刺史仲堪崇侍南郡公桓𤣥以吕祖謙標目修觧題曰按世説新語王忱死西鎮未定朝貴人人有望時仲堪雖居機要資名輕小人情未以方嶽相許孝武欲㧞親近腹心遂以殷為荆州詔未出王恂問殷曰陜西何故未有處分殷曰已有人王歴問公卿咸云非王自計才地必應在已復問非我耶殷曰亦似非其夜詔出用殷王語所親曰豈有黄門郎而受如此任仲堪此舉乃是國之亡徴餘見通鑑十二月清河李遼請脩兖州孔子廟不報以朱熹綱目修觧題曰胡寅曰遼謂事有如賖而實急者智足以及此矣晋朝合從其言而命之以學校之事遼必繼有建明增光儒者武帝道子方與沙門逰異端惑心宜正論之不入也晋烈宗孝武皇帝太元十八年燕成武皇帝建興八年西燕帝慕容永中興八年年後秦武昭皇帝建初八年秦西秦乞伏乾歸太初六凉王吕光麟嘉五年髙皇帝太初八年魏太祖道武皇帝登國八年夏六月秦丞相竇衝自稱秦王改元元光觧題曰宋庠紀年通譜衝改元元光夲漢武帝年號事見通鑑秋七月秦主登討衝後秦太子興救之以通鑑修冬十一月燕主垂伐西燕以通鑑修十二月後秦主萇卒太子興伐秦晋烈宗孝武皇帝太元十九年燕成武皇帝建興九年西燕帝慕容永中興九年初後秦文桓皇帝姚興皇初元年帝西秦乞伏乾歸太七年凉吕光麟嘉六年秦苻崇延初元年帝魏太祖道武皇登國九年春正月三河王光以秃髪烏孤為河西鮮卑大都統以載紀修夏四月秦主登與後秦戰于廢橋大敗奔平原以通鑑修觧題曰按載記苻登自六陌向廢橋始平太守姚詳據馬嵬堡拒登始平馬嵬皆在京兆府興平縣則廢橋亦應在此事見通鑑五月燕主垂與西燕主永戰大破之取晋陽以載紀修後秦太子興即帝位改元以吕祖謙標目修觧題曰宋庠紀年通譜時敗苻登故改元皇初餘見通鑑六月追尊會稽王太妃鄭氏曰簡文宣太后以夲紀修觧題曰朱熹曰簡文鄭太后與僖公成風一也皆所以著妾母之義國朝真宗崩始以三后並配當時群臣亦争之以其創見也其後習以為常矣事見通鑑秦主登請救於金城王乾歸封之為梁王秋七月後秦主興邀登而殺之太子崇奔湟中即帝位改元以夲紀修觧題曰事見通鑑後秦自是稱秦湟中湟河一名樂都水按載記始健以穆帝永和七年僣立至登五世凡四十四年後秦執竇衝以通鑑修八月己巳尊皇太妃季氏為太后夲紀燕主垂克長子殺西燕王永以夲紀修冬十月梁王乾歸逐秦主崇崇奔仇池楊定乾歸殺定及崇楊盛自稱仇池公來稱藩以通鑑修燕主垂略地青兖以吕祖謙標目修十二月梁主乾歸稱秦王以通鑑修晋烈宗孝武皇帝太元二十年燕成武皇帝建興十年秦文桓皇帝皇初二年嘉西秦乞伏乾歸太初八年登凉王吕光麟七年魏太祖道武皇帝國十年春三月庚辰朔日有食之以夲紀修夏五月魏叛燕燕太子寶伐魏以吕祖謙標目修秋七月三河王光伐西秦西秦王乾歸稱藩於光以通鑑修九月魏王珪臨河拒燕冬十月辛未燕師遁十一月丙戌魏王珪大破之于參合陂以通鑑修十二月燕以清河公會領幽州刺史鎮龍城以舉要歴補遺修晋烈宗孝武皇帝太元二十一年燕惠閔皇帝慕容寳永康元年秦文桓皇帝皇初三年吕光龍飛元年西秦乞伏乾歸太初九年元凉王魏太祖道武皇帝皇始年春三月庚子燕主垂襲魏閏月取平城以疾還夏四月癸未卒於沮陽壬寅太子寶即帝位改元五月弑其太后叚氏以通鑑吕祖謙標目修觧題曰按晋書地理志上谷郡有沮陽縣宋庠紀年通譜永康夲漢桓帝晋惠帝年號六月三河王光即天王位國號凉改元以吕祖謙標目修秋七月魏王珪改元通鑑觧題曰宋庠紀年通譜皇始夲苻健年號八月大舉伐燕九月敗遼西王農取并州以通鑑修貴人張氏弑帝皇太子徳宗即皇帝位㑹稽王道子位太傅攝政以吕祖謙標目修觧題曰春秋君弑賊不討不書𦵏以為無臣子也孝武弑死而會稽王不能推問崩故舍賊不討三綱廢矣無怪乎王恭仲堪之徒接軫而起也魏初建䑓省置百官封公侯刺史尚書郎已下用文人以夲紀修冬十月甲申𦵏孝武皇帝于隆平陵以夲紀修魏主珪取燕常山十一月遣兵攻鄴信都戊午自将攻中山丁卯乃退以通鑑修十二月以楊盛為仇池公以通鑑修秦取蒲坂以通鑑修大事記續編卷三十二
