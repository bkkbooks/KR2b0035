body:
  text: 大事記續編卷五十七明王禕撰唐玄宗明皇帝開元元年春正月乙亥吏部尚書蕭至忠為中書令以通鑑修二月以髙麗大榮祚為渤海郡王以吕祖謙標目修夏六月丙辰兵部尚書郭元振同三品以通鑑修秋七月甲子岑羲蕭至忠竇懷貞伏誅解題曰玄宗為太子久矣即位又一年矣彼羣臣之黨附公主者邪謀亦可息矣而宰相七人五出其門文武大半附之潛謀廢立不至於殄滅不止也亦如貞元二十一年三月憲宗為太子七月監國八月即位而伾文之黨方依慿為姦由此觀之小人假之以尺寸之柄何所不至哉事見通鑑十二月庚寅改元改三省官名以新舊紀修解題曰宋庠紀年通譜受開元神武之號故改元開元壬寅姚崇兼紫微令癸丑貶張説為刺史劉幽求罷甲寅黃門侍郎盧懷慎同平章事以新紀修解題曰按通典先天之前宰相之員頗多景龍中至十餘人開元以來常以二人為限多則三人唐玄宗明皇帝開元二年春正月丙寅姚崇奏沙汰僧尼以吕祖謙標目修壬寅定內外官出入之式以吕祖謙標目修置左右教坊以吕祖謙標目修甲申并州節度大使薛納同三品代契丹以新紀修解題曰按桞芳唐厯唐制命將賜旌節得以専征曰大總管總管髙祖制也鎮軍曰大都督都督行軍曰大總管總管太宗制也都督持節則為將不持節則不為將髙祖制也詩節將曰都督朔方曰大總管邉劇之州别置經略使沃衍之州别置營田使則天制也鎮軍曰節度大使節度使親王行軍總統大將曰元帥玄宗制也其後漸加命數以崇其權邉將大開元中諸道節度兼經略支度營田使或兼採訪使季年盡領之而又益官與使朔方自四使外又有鹽池使押諸蕃部落使六城水陸使單于安北二都護河東兼大同軍使范陽兼水陸運使平盧兼陸運使押兩蕃并渤海黑水等四府使河北海運使河西節度兼長行轉運使九姓等使赤水軍使劍南節度兼山南西道採訪使北庭兼瀚海軍使隴右兼河源軍使凡命將則曰持節不書從簡也事見通鑑十二月甲子置隴右節度大使以吕祖謙標目修解題曰按方鎮表隴右節度開元置亦曰隴西節度兼經略大使領秦河渭鄯蘭臨武洮岷廓疊宕治鄯州至德天水太守兼防禦守捉使大中三年升為秦成兩州經略天雄軍使伍年置歸義軍節度使領沙甘瓜肅鄯伊西河蘭岷廓治沙州咸通四年河鄯西𨽻涼州伍年升秦成為天雄軍節度觀察等使增領階州文德成州𨽻威戎軍唐玄宗明皇帝開元三年春正月丁亥立子郢王嗣謙為皇太子以新舊紀修癸卯盧懷貞檢校吏部尚書兼黃門監以通鑑修貶御史大夫宋璟為刺史以通鑑修突厥十姓部落降二月以河南地處之以吕祖謙標目修夏四月以羽林大將軍薛訥為大總管居涼州右衛大將軍郭虔瓘為大總管居并州備突厥以通鑑修五月山東蝗以通鑑修秋七月庚辰朔日有食之通鑑初置侍讀官以吕祖謙標目修解題曰玄宗可謂有志於學矣惜懷素無量章句陋儒不知帝王之學問不能致之於髙明光大之地也事見通鑑唐玄宗明皇帝開元四年春正月癸未殺尚衣奉御長孫昕朱熹綱目丙午鄫王嗣真遙領安北大都護陜王嗣升遙領安西大都護諸王遙領節度自此始以通鑑修二月丙辰帝幸溫湯丁邜還宫以新紀修夏五月庭試縣令以治民䇿以吕祖謙標目修遣監察御史楊範臣求海南珠翠範臣諫乃止以吕祖謙標目修六月癸亥太上皇崩於百福殿以吕祖謙標目修解題曰宋敏求長安志百福殿在西內公主殿之西唐玄宗明皇帝開元五年春正月癸邜太廟四室壞避殿輟朝以新紀修解題曰按新舊史列傳帝將幸東都而太廟屋壞召宋璟蘇頲問其故對曰三年之喪未終不可以行幸壞壓之變天所以示戒宜停東幸修德以答至譴以問姚崇對曰隋取苻堅故殿以營廟而唐因之胡寅曰唐有天下不自建廟而因隋故屋非禮大矣太宗營繕甚多而忽其所當先何哉久來枯木壞與行會不緣行而壞且四海為家兩京相接陛下以關中無年因幸東都百司已戒不可失信望移神主於太極殿改造新廟以申誠敬帝曰卿言正合朕意賜絹二百匹車駕乃幸東都因令崇五日一參仍入閣供奉右散騎常侍禇無量上疏曰王者陰盛陽微則先祖見變今後宫非御幸者宜悉出之以應變異舉畯良撙奢靡輕賦慎刑納諫爭察諂諛繼絶世則天下和會災異訖息帝是崇語惟先格王正厥事此自昔臣子警君之至情也玄宗畏天之誠本自不篤而崇又逢其惡撤其防而破其鑰則亦何所不至哉末年之事崇不得不執其咎也唐玄宗明皇帝開元六年春正月辛酉禁惡錢以通鑑修秋八月令州縣嵗十二月行鄉飲酒禮朱熹綱目始加賦以給官俸以朱熹綱目修解題曰葉適曰自五胡之亂北方相承百官無俸以户自給雖太宗之治猶未及規畫也唐之常賦不為輕矣又加賦焉崔沔之論過矣公廨錢在京官之俸也故有稅錢令史事見通鑑通典唐給祿之制京官正一品米七百石錢九千八百從一品米六百石正二品米五百石錢八千從二品米四百六十石正三品米四百石錢六千一百從三品米三百六十石正四品米三百石錢四千二百從四品米二百六十石正五品米二百石錢三千六百從五品米一百六十石正六品米一百石錢二千四百從六品米九十石正七品米八十石錢二千二百從七品米七十石正八品米六十七石錢一千六百從八品米六十二石正九品米五十七石錢一千三百從九品米五十二石外官各降一等其幹力防關庶僕别給內外官並給職田京官諸司及郡縣又給公廨田有差冬十一月辛邜帝至自東都以新舊紀修唐玄宗明皇帝開元七年夏五月己丑朔日有食之以新紀修秋八月敕五服並從禮傳朱熹綱目是嵗置劒南節度使以吕祖謙標目修解題曰按方鎮表開元七年益州長史領劒南支度營田松當姚嶲州防禦處置兵馬經略使節度使領益彭蜀漢眉綿梓遂卭劒榮陵嘉普資嶲黎戎雄茂簡龍雅濾合二十二年兼山南西道採訪處置使號山劒西道增領文扶姚二十八年增領奉天寶增領霸至德更號西川節度增領果梓遂綿劒龍閬普陵濾榮資簡𨽻東川節度寶應劍南又領松當悉柘翼恭靜環真廣德復領東川十五州大厯元年復還東川三年劒南增領乾興元果𨽻山南西道永貞西川增領古州元和三年涪𨽻黔中節度四年復領資簡咸通八年置定邉軍節度觀察處置等使領嶲眉蜀卭雅嘉黎十一年廢復𨽻西川中和二年置保勝軍防禦使綿漢皆置防禦使置彭州防禦使文德置平軍節度使領卭蜀黎雅升彭州防禦為威戎軍節度使領彭文成龍茂大順廢復𨽻西川景福元年彭州𨽻龍劒節度三年文州𨽻興文節度唐玄宗明皇帝開元八年春正月辛巳宋璟蘇頲罷京兆尹源乾曜為黃門侍郎并州長史張嘉貞為中書侍郎同平章事以新舊紀修弛錢禁以通鑑修夏五月丁邜源乾曜為侍中張嘉貞為中書令以新舊紀修六月庚寅洛瀍榖水溢新紀秋九月壬申突厥入冦敗河西兵毗伽可汗復振以新舊紀修冬十月帝幸長春宫壬午獵于下邽庚寅溫湯十一月乙邜還宫唐玄宗明皇帝開元九年春正月以監察御史宇文融為覆田使以通鑑列傳修解題曰程逈曰杜佑理道要訣記宇文融檢責客户除每州計會歸本貫外更令所在編附其寬鄉有剩田者約三四十州其浮户任其親戚鄉里相就每十户以上共作一坊每户給五畝充宅并造一兩間屋宇開巷陌立閭伍種桑棗築園蔬使親鄰不失丁别量給五十畝以上為私田任其自營種率十丁於近坊更共給一頃以為公田共令營種每丁一月役功三日十丁一年得三百六十日營公田不啻得足計平收一年不減百石便納隨近州縣倉更無租稅既是營田户且免征行按堵有餘必不流散逈據此説蓋以征戍撓壞租調法故以是救之夏四月蘭池胡康待賔冦邉新紀戊戌舉縣令以通鑑修秋七月己酉幽州都督節度河北諸軍大使王晙擒康待賔以通鑒修九月乙巳朔日有蝕之新紀丁未梁文獻公姚崇卒以通鑑修癸亥天兵軍節度使張説為兵部尚書同三品以新紀修唐玄宗明皇帝開元十年春正月丁巳帝幸東都以新舊紀修癸亥收公廨稅錢充官俸以舊紀通鑑修解題曰按新史食貨志中書舍人張嘉貞陳其不便遂罷天下公廨本錢充稅户以給百官夏四月己亥張説兼朔方節度使通鑑解題曰宰相兼節度使人謂始於張説非也武德六年楊恭仁以中書令檢校涼州軍事其來非一日矣葉夢得曰開元四年郯王嗣真除安北大都護充河西道及四鎮諸蕃落大使知節度使親王遙領節度使自此始以安北大都護張知運為副使於是有副使李林甫遙領隴右節度使以杜希逸為留後於是有留後文宗備問頗具本末五月辛酉伊汝水溢新紀解題曰按水經伊水出南陽縣西荀渠山東北過陸渾縣南又東北過新城縣南又東北過伊闕中又東北至洛陽南北入于洛汝水出河南梁縣勉卿西天息山東南過其縣北又東南徑頴川郟縣南又東南過定陵縣北又東南過郾縣北又東南過汝南上蔡縣西又東南過平輿縣南又東至原鹿縣南入于淮唐玄宗明皇帝開元十一年春正月庚辰帝幸潞州以故第為飛龍宫辛邜次并州以并州為北都以新舊紀通鑑修二月己酉張嘉貞貶刺史以新紀修壬子祭后土于汾陰三月庚午至自汾陰以新舊紀修夏四月甲子張説為中書令吏部尚書王晙為兵部尚書同三品以新舊紀修五月乙丑復中宗于大廟新紀己丑王晙兼朔方節度大使以通鑑修置麗正書院以吕祖謙標目修秋八月戊申尊宣皇帝曰獻祖光皇帝曰懿祖祔大廟九室以新舊紀通鑑修冬十月作溫泉宫以通鑑修十一月戊子初置長從宿衛以吕祖謙標目修解題曰按兵志始以彍騎分𨽻十二衛總十二萬為六畨每衛萬人京兆六萬六千同州九千蒲州萬三千三百絳州二千六百晉州千五百岐州六千河南府三千陜虢汝鄭懷汴六州各六百內弩手六千會要十六年彍騎弩手改為左右羽林騎事見通鑑按唐十六衛惟左右衛驍衛武衛威衛領軍衛金吾衛領諸府監門衛千牛衛不領所以彍騎惟𨽻十二衛也十二月庚申貶王晙為刺史新紀是嵗改政事堂曰中書門下以吕祖謙標目修唐玄宗明皇帝開元十二年夏六月以兵部員外郎宇文融為勸農使以通鑑修山東旱選近臣五人為刺史以通鑑修秋七月癸亥楊思朂平溪州蠻以通鑑修己邜廢皇后王氏為庶人冬十月卒以新紀修八月己亥宇文融為御史中丞通鑑十一月庚午帝幸東都以新舊紀修閠十二月丙辰朔日日有食之新紀唐玄宗明皇帝開元十三年春二月庚申宇文融兼户部侍郎以通鑑修乙亥更命長從宿衛曰彍騎吕祖謙標目選諸司長官十一人為刺史以通鑑修三月皇太子及王四人更名立八人為王以本紀修丙申禁錮酷吏來俊臣等二十三人子孫以舊紀修夏四月丁巳改麗正書院為集賢殿書院以舊紀修冬十月辛酉帝如兖州十一月庚寅封泰山辛邜禪社首以新舊紀修癸巳加內外間廄使王毛仲開府儀同三司以通鑑修丙申帝幸孔子宅以太牢祭墓十一月己巳如東都以新舊紀修唐玄宗明皇帝開元十四年春雍州獠反二月遣楊思朂討之以新紀通鑑修夏四月丁巳户部侍郎李元紘為中書侍郎同平章事庚申張説罷以新紀修解題曰按新舊史列傳説為右丞相兼中書令停中書令罷政事又乞停右丞相不許餘見通鑑唐玄宗明皇帝開元十五年春正月辛丑涼州都督王君㲋大破吐蕃於青海以吕祖謙標目修二月出宇文融為刺史以通鑑修夏五月癸酉以皇子領州牧刺史都督節度大使自是不復出閣以吕祖謙標目修秋七月甲戍震興教門觀災新紀庚寅洛水溢八月澗穀溢新紀九月丙子吐蕃冦瓜州閏九月庚子圍安西以新紀修庚申回紇襲甘州殺王君㲋以吕祖謙標目修冬十月己邜帝至自東都以新舊紀修唐玄宗明皇帝開元十六年春正月乙邜瀧州獠反遣楊思勗討之以通鑑修二月壬辰改彍騎為左右羽林軍飛騎通鑑秋七月乙巳河西節度使蕭嵩等大破吐蕃克其大莫門城八月辛邜復敗之于祁連城以新紀通鑑修解題曰洮州有莫門軍甘州張掖縣有祁連山唐玄宗明皇帝開元十七年春三月戊戍瓜州都督張守圭大破吐蕃于大同軍以通鑑修甲寅朔方節度使信安王褘克吐蕃石堡城以吕祖謙標目修解題曰會要石堡城在鄯州鄯城縣西本吐蕃鐵仭城改為武軍二十九年陷吐蕃天寶八載拔之改為神武軍餘見通鑑夏四月乙亥大風震藍田山崩新紀六月甲戍源乾曜杜暹李元紘罷蕭嵩兼中書令户部侍郎宇文融為黃門侍郎兵部侍郎裴光庭為中書侍郎同平章事以新舊紀修秋八月癸亥立千秋節以通鑑修宇文融始置諸史九月坐貶汝州刺史以吕祖謙標目修唐玄宗明皇帝開元十八年春正月辛邜裴光庭為侍中新紀二月丙寅大雨雷震左飛龍廄災新紀癸酉初令百官選勝行樂以吕祖謙標目修夏四月乙邜築京師外郭以新舊紀修乙丑裴光庭兼吏部尚書始用循資格以吕祖謙標目修解題曰杜佑曰此起於後魏崔亮停年之制也事見通鑑五月乙酉奚契丹叛附突厥以新紀修六月甲子彗星出于五車以新紀修冬十月吐蕃和親以吕祖謙標目修是嵗天下奏死罪止四十二人通鑑唐玄宗明皇帝開元十九年春正月壬戍貶王毛仲為瀼州别駕尋殺之以舊紀通鑑修夏四月丙申立太公廟新紀秋九月辛未許吐蕃互市以通鑑修冬十月丙申帝幸東都以新舊紀修唐玄宗明皇帝開元二十年春正月乙邜以信安王禕為河東河北行軍副元帥伐契丹以新紀修二月甲戍朔日有食之以通鑑目録修三月己巳信安王禕敗奚契丹于薊州以新紀修秋八月辛未朔日有食之以新紀修九月乙巳行開元禮以舊紀修冬十月帝幸潞州十一月如北都祠后土於汾陰十二月辛未至自汾陰以新舊紀修解題曰鼂補之曰祠后土非古也曠代不講而明皇行之行之十年不復講矣而蕭嵩勸之惜哉事見通鑑唐玄宗明皇帝開元二十一年春三月乙巳裴光庭薨甲寅尚書右丞韓休為黃門侍郎同平章事以新紀修閏三月癸酉幽州副總管郭英傑及契丹戰于都山敗死以新紀修解題曰都山在易州滿城縣東北五百里奚地也秋七月乙丑朔日有食之通鑑九月立子七人為王以本紀修冬十二月丁巳蕭嵩韓休罷京兆尹裴耀卿為黃門侍郎起復前中書侍郎張九齡同平章事以新舊紀及通鑑修是時天下官一萬七千六百餘員吏五萬七千四百餘人以吕祖謙標目修分天下為十五道置採訪使以吕祖謙標目修解題曰京畿治京城內關內以京官領都畿治東都河南治汴州河東治蒲州河北治魏州山南東道治襄州山南西道治梁州隴右治鄯州淮南治揚州江南東道治蘇州江南西道治洪州黔中治黔州劒南治蓋州嶺南治廣州按通典初節度與採訪各置一人天寶中始一人兼領之九年勑採訪使但舉大綱郡務並委郡守至德之後改為觀察皆并領都團練使分天下為四十餘道大者十餘州小者二三其職若古之刺史云監察御史楊慎矜知太府始徴布帛折􅀈錢以吕祖謙標目修唐玄宗明皇帝開元二十二年春正月己巳帝幸東都以新舊紀修夏五月戊子裴曜卿為侍中張九齡為中書令黃門侍郎李林甫為禮部尚書同三品是日大風拔木以新紀修解題曰按新舊史列傳林甫善音律舅薑皎愛之源乾曜執政與皎為姻家而乾曜子挈為林甫求司門郎中乾曜曰歌奴豈郎中材耶歌奴林甫小字也授以諭德纍遷國子司業宇文融為御史中丞引與同列稍厯吏部侍郎時武惠妃寵傾後宫子夀王盛王以母愛寵異林甫因中人白妃願保護夀王妃德之裴光庭妻武三思女也與林甫私中官髙力士本出三思家光庭卒武氏祈力士請林甫代其夫位力士未敢發而帝因蕭嵩言自用韓休方具詔力士漏於武氏乃令林甫白休休既相甚德林甫而與嵩隙乃薦林甫堪為宰相妃陰助之即拜黃門侍郎通鑑疑而不取孫甫曰帝王之命輔相或自知其人或大臣所薦必才德素著始協天下之望林甫先圖郎官乾曜不許則其人可知矣及宇文融引為中丞侍郎無一善可稱雖為韓休所薦休之言亦未必取信於主但武妃力士內為之助遂至大用爾輔相之人不擇其才德之素但取嬖寵之言而任之此所以致天下之亂也唐玄宗明皇帝開元二十三年春正月加張守圭羽林大將軍御史大夫以列傳修解題曰吕祖謙曰郝靈筌得默啜之首宋璟抑其賞而不與逾年始受郎將况御史大夫而可授之守圭乎宋璟之於靈􅀈九齡之於守圭其意一也然璟當開元之初明皇之心術猶未蠧則其靳之也易當此之時明皇開邉之心已縱小人蠧壞之疾已深則其靳之也難若其欲用牛仙客以為相則九齡於此不惟不可靳而且為所亂矣事見通鑑冬十月戊申突騎施冦邉以新紀修閏十一月壬午朔日有食之以新紀修大事記續編卷五十七
